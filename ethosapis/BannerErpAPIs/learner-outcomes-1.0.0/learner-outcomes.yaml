openapi: 3.0.0
info:
  title: Learner Outcomes
  description: >
    The Learner Outcomes API supports creating learner outcome (degree), and
    associated learner outcome curricula records, as shown on the SHADEGR admin
    page. The API does not support the rolling of curriculum from learner to
    outcome modules with this version. This API is being released to support the
    importing of learner outcome(degree) records from external products in the
    sought, pending or awarded statuses and does not support the generation of
    associated charges/fees. This version supports only POST (create) method,
    update is not supported. Multiple curricula may be created using the POST
    method. If the same priority, one of them will be marked current. With
    different priorities, all will be current. The learner-outcomes API
    compliments the curricula-summary-curricula API which supports single record
    GET (query) of the learner outcome (degree) records from SHADEGR.
  version: 1.0.0
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/learner-outcomes:
    post:
      tags:
        - learner-outcomes
      summary: Learner outcome details for a student are posted to SHRDGMR, SORLCUR
        and SORLFOS.
      description: Term course header details for a student are posted to the degree
        and curriculum tables.
      requestBody:
        content:
          application/vnd.hedtech.integration.1.0.0+json:
            schema:
              type: object
              $ref: "#/components/schemas/learner-outcomes-1.0.0_post_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response.
              required: true
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/learner-outcomes-1.0.0_post_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "500":
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: object
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      x-method-permissions: API_LEARNER_OUTCOMES
components:
