                      x-lineageReferenceObject: SORLFOS_LFST_CODE
                      x-lineageLookupReferenceObject: gtvlfst
                    priorityNumber:
                      title: Priority Number
                      maxLength: 4
                      type: number
                      description: Priority number, or ranking of the field of study. Priority will be
                        derived if not included in POST request.
                      x-lineageReferenceObject: SORLFOS_PRIORITY_NO
                    curriculumStatus:
                      title: Curriculum Status
                      maxLength: 15
                      type: string
                      description: Status of the curriculum. Curriculum status will be derived if not
                        included in POST request.
                      x-lineageReferenceObject: SORLFOS_CSTS_CODE
                      x-lineageLookupReferenceObject: stvcsts
                    curriculumActivityStatus:
                      title: Curriculum Activity Status Code
                      maxLength: 15
                      type: string
                      description: Curriculum activity status, table SOBCACT tells if the activity
                        status is an active or inactive status.  Curriculum
                        activity status code will be derived if not included in
                        POST request.
                      x-lineageReferenceObject: SORLFOS_CACT_CODE
                      x-lineageLookupReferenceObject: stvcact,sobcact
                    majorCode:
                      title: Field of Study
                      maxLength: 4
                      type: string
                      description: Code for the field of study.
                      x-lineageReferenceObject: SORLFOS_MAJR_CODE
                      x-lineageLookupReferenceObject: stvmajr,SORLFOS
                    termCatalogCode:
