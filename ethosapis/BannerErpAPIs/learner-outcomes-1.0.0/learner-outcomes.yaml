          format: string
          x-lineageReferenceObject: SPRIDEN_ID
        sequenceNumber:
          title: Sequence Number
          maxLength: 2
          type: string
          description: Number assigned to each degree student has.
          x-lineageReferenceObject: SHRDGMR_SEQ_NO
        degreeStatusCode:
          title: Degree Status Code
          maxLength: 2
          type: string
          description: Status of students degree, for example sought, awarded, etc.  Will
            default from degree information if not included in POST request.
          x-lineageReferenceObject: SHRDGMR_DEGS_CODE
          x-lineageLookupReferenceObject: STVDEGS
        applicationDate:
          title: Degree Application Date
          maxLength: 11
          type: string
          description: Date of degree application. Defaults to current date on entry of
            degree.
          format: string
          x-lineageReferenceObject: SHRDGMR_APPL_DATE
        graduationDate:
          title: Graduation Date
          maxLength: 11
          type: string
          description: Graduation date of student.
          format: string
          x-lineageReferenceObject: SHRDGMR_GRAD_DATE
        academicYearBulletin:
          title: Academic Year Bulletin
          maxLength: 4
          type: string
          description: Year of bulletin or catalog under which degree is being offered.
          format: string
          x-lineageReferenceObject: SHRDGMR_ACYR_CODE_BULLETIN
        studentRecordTerm:
          title: Student Record Term Code
          maxLength: 6
          type: string
          description: The term associated with the general student record when degree
            information is defaulted.
          format: string
          x-lineageReferenceObject: SHRDGMR_TERM_CODE_STUREC
        graduationTerm:
          title: Graduation Term
          maxLength: 6
          type: string
          description: Term in which the student graduates.
          format: string
          x-lineageReferenceObject: SHRDGMR_TERM_CODE_GRAD
        academicYear:
          title: Academic Year
          maxLength: 4
          type: string
          description: Year in which the student graduates.
          format: string
          x-lineageReferenceObject: SHRDGMR_ACYR_CODE
        graduationStatus:
          title: Graduation Status
          maxLength: 3
          type: string
          description: Graduation Status
          format: string
          x-lineageReferenceObject: SHRDGMR_GRST_CODE
        termCompleted:
          title: Graduation Completed Term
          maxLength: 6
          type: string
          description: Term designated as the term in which graduate work must be completed.
          format: string
          x-lineageReferenceObject: SHRDGMR_TERM_CODE_COMPLETED
        curriculumDetails:
          title: Curriculum Details
          type: array
          items:
            required:
              - curriculumTermCode
              - priorityNumber
              - levelCode
              - collegeCode
              - degreeCode
              - fieldOfStudyDetails
            type: object
            properties:
              curriculumTermCode:
                title: Term Code
                maxLength: 6
                type: string
                description: Term Code
                x-lineageReferenceObject: SORLCUR_TERM_CODE
                x-lineageLookupReferenceObject: stvterm
              priorityNumber:
                title: Priority Number
                maxLength: 4
                type: number
                description: Priority of the curriculum within the module. Priority will be
                  derived if not included in POST request.
                x-lineageReferenceObject: SORLCUR_PRIORITY_NO
              curriculumActivityStatus:
                title: Curriculum Activity Status
                maxLength: 15
                type: string
                description: Activity status code for the curriculum.
                x-lineageReferenceObject: SORLCUR_CACT_CODE
                x-lineageLookupReferenceObject: stvcact,sobcact
              levelCode:
                title: Level Code
                maxLength: 2
                type: string
                description: Level code of the curriculum.
                x-lineageReferenceObject: SORLCUR_LEVL_CODE
                x-lineageLookupReferenceObject: stvlevl
              collegeCode:
                title: College Code
                maxLength: 2
                type: string
                description: College code of the curriculum.
                x-lineageReferenceObject: SORLCUR_COLL_CODE
                x-lineageLookupReferenceObject: stvcoll
              degreeCode:
                title: Degree Code
                maxLength: 6
                type: string
                description: Degree code of the curriculum.
                x-lineageReferenceObject: SORLCUR_DEGC_CODE
                x-lineageLookupReferenceObject: stvdegc
              termCatalogCode:
                title: Catalog Term Code
                maxLength: 6
                type: string
                description: Catalog term code of the learner curriculum.
                x-lineageReferenceObject: SORLCUR_TERM_CODE_CTLG
                x-lineageLookupReferenceObject: stvterm
              campusCode:
                title: Campus Code
                maxLength: 3
                type: string
                description: Campus code of the curriculum.
                x-lineageReferenceObject: SORLCUR_CAMP_CODE
                x-lineageLookupReferenceObject: stvcamp
              programCode:
                title: Program
                maxLength: 12
                type: string
                description: Program of the curriculum.
                x-lineageReferenceObject: SORLCUR_PROGRAM
                x-lineageLookupReferenceObject: smrprle
              startDate:
                title: Start Date
                maxLength: 11
                type: string
                description: Date curriculum starts.
                format: date
                x-lineageReferenceObject: SORLCUR_START_DATE
              endDate:
                title: End Date
                maxLength: 11
                type: string
                description: Date curriculum ends.
                format: date
                x-lineageReferenceObject: SORLCUR_END_DATE
              fieldOfStudyDetails:
