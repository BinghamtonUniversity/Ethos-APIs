                      maxLength: 6
                      type: string
                      description: Term code identifying the catalog for the curriculum.
                      x-lineageReferenceObject: SORLFOS_TERM_CODE_CTLG
                      x-lineageLookupReferenceObject: stvterm
                    departmentCode:
