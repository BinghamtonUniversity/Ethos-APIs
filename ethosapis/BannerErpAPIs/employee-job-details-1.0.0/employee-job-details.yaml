              * `web` Entered through Employee self-service application
              * `departmental` Entered through PHATIME
              * `thirdParty` Entered through third-party integrations
          type: string
          enum:
            - payroll
            - web
            - departmental
            - thirdParty
          example: "web"
          x-lineageReferenceObject: NBRJOBS_TIME_ENTRY_METHOD
        timeEntryType:
          title: Time Entry Type
          description: >
            The structure of how time will be entered against the job assignment.  Valid values are:
              * `timesheet` All time is entered
              * `exceptionTime` Only exception time is entered
              * `none` Not applicable
          type: string
          enum:
            - timesheet
            - exceptionTime
            - none
          example: "timesheet"
          x-lineageReferenceObject: NBRJOBS_TIME_ENTRY_TYPE
        isTimeInOut:
          title: Time In Out Indicator
          description: Time In/Out Indicator attached to the job. If true, this employee must enter time in and out information on the Web or have it entered by a department administrator on the Electronic Approvals of Time Entry Form (PHATIME).  Time In and out must be entered for all earn codes that require hours entry. Time in and out will not be entered for earn codes that require units entry.
          type: boolean
          example: false
          x-lineageReferenceObject: NBRJOBS_TIME_IN_OUT_IND
        timesheetCoasCode:
