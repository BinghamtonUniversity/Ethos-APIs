components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    employee-job-details-1.0.0_get_request_criteria:    
      properties:
        personId:
          title: Person ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"      
        position:
          title: Position
          description: The position to which the job is attached.
          type: string
          x-lineageReferenceObject: NBRJOBS_POSN
          example: "ADM0001"
        suffix:
          title: Suffix
          description: Used to uniquely create multiple jobs in the same position.
          type: string
          x-lineageReferenceObject: NBRJOBS_SUFF
          example: "00"
        effectiveOn:
          title: Date for which the job detail data becomes effective.
          type: string
          format: date
          description: "Effective date of the job detail data."
          x-lineageReferenceObject: NBRJOBS_EFFECTIVE_DATE
          example: "2024-03-15"
        jobStatus:
          title: Job Status
          description: >
            The status of the employee's job. 
            Valid values are:
              * `active`               Active
              * `leaveWithBenefits`    Leave without pay and with benefits
              * `leaveWithoutBenefits` Leave without pay and without benefits
              * `leaveWithFullPay`     Leave with full pay and with benefits
              * `leaveWithPartialPay`  Leave with partial pay and with benefits
              * `terminated`           Terminated
          type: string
          enum:
            - active
            - leaveWithBenefits
            - leaveWithoutBenefits
            - leaveWithFullPay
            - leaveWithPartialPay
            - terminated
          example: "active"
          x-lineageReferenceObject: NBRJOBS_STATUS
        contractType:
          title: Contract Type
          description: >
            Indicates the type of job assignment. Valid values are:
              * `primary` Primary job
              * `overload` Overload job
              * `secondary` Secondary job
          type: string
          enum:
            - primary
            - overload
            - secondary
          example: "primary"
          x-lineageReferenceObject: NBRBJOB_CONTRACT_TYPE'
    employee-job-details-1.0.0_get_request_effective_as_of:
      properties:
        asOf:
          title: Effective As Of Date
          type: string
          format: date
          description: Used to query a job detail resource that is effective as of this date.
          x-lineageReferenceObject: NBRJOBS_EFFECTIVE_DATE
          example: "2024-03-15"      
        personId:
          title: Person ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"      
        position:
          title: Position
          description: The position to which the job is attached.
          type: string
          x-lineageReferenceObject: NBRJOBS_POSN
          example: "ADM0001"
        suffix:
          title: Suffix
          description: Used to uniquely create multiple jobs in the same position.
          type: string
          x-lineageReferenceObject: NBRJOBS_SUFF
          example: "00"
        jobStatus:
          title: Job Status
          description: >
            The status of the employee's job. 
            Valid values are:
              * `active`               Active
              * `leaveWithBenefits`    Leave without pay and with benefits
              * `leaveWithoutBenefits` Leave without pay and without benefits
              * `leaveWithFullPay`     Leave with full pay and with benefits
              * `leaveWithPartialPay`  Leave with partial pay and with benefits
              * `terminated`           Terminated
          type: string
          enum:
            - active
            - leaveWithBenefits
