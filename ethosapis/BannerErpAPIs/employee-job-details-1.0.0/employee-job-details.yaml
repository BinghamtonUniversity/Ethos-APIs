openapi: 3.0.0
info:
  title: Employee Job Details
  description: >
    This API can be used to retrieve, post, or delete an employee's job detail data.
    This information is displayed in the Banner administrative page NBAJOBS.
    Additionally, the API supports the option to create or update employee job detail data in batches.
  version: 1.0.0-beta
  x-audience: all
  x-release-status: beta
  x-source-domain: Human Resources
  x-source-system: banner
  x-source-name: NBRJOBS
  x-api-type: erp
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employee-job-details:
    get:
      tags:
        - employee-job-details
      summary: Get employee job details
      description: Query and retrieve employee job detail data for a given criteria. Data is extracted from NBRJOBS.
      parameters:
        - name: limit
          in: query
          description:
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/employee-job-details-1.0.0_get_request_criteria'
          description: >
            ### Person ID
            
            Returns the employee job detail information for this Person ID.  This filter should not be used if a Banner ID filter is used.
            
            ```

            /employee-job-details?criteria={"personId": "085df706-ee15-4947-93f8-8c260e64795e"}

            ```

            ### Banner ID
            
            Returns the employee job detail information for this Banner ID.   This filter should not be used if a Person ID filter is used.
            
            ```

            /employee-job-details?criteria={"bannerId":"123456789"}
            
            ```

            ### Position

            Returns the employee job detail information for this Position.

            ```

            /employee-job-details?criteria={"position":"A000001"}

            ```
            
            ### Suffix

            Returns the employee job detail information for this position suffix.

            ```

            /employee-job-details?criteria={"suffix":"00"}

            ```
            
            ### Effective On

            Returns the employee job detail information that becomes effective on this date.  This filter will support the following operators: $eq, $ne, $gt, $gte, $lt, $lte.

            ```

            /employee-job-details?criteria={"effectiveOn":"2024-03-15"}
            

            /employee-job-details?criteria={"effectiveOn":{"$gte": "2024-03-15"}}
          
            ```
            
            ### Job Status

            Returns the employee job detail information that matches the job status.

            ```

            /employee-job-details?criteria={"jobStatus":"active"}
            
            ```
            
            ### Contract Type

            Returns the employee job detail information that matches the contract type.
            
            ```

            /employee-job-details?criteria={"contractType":"primary"}
            
            ```
        - name: effectiveAsOf
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/employee-job-details-1.0.0_get_request_effective_as_of'
          description: >
            A named query that returns a list of employee job detail resources that are effective as of the specified "asOf" date and matches on other filter fields.
            This is an alternative to using the criteria query.
           
            ### As Of

            REQUIRED. Returns the employee job detail information that is in effect as of this date.

            ```

            /employee-job-details?effectiveAsOf={"asOf":"2024-03-15"}

            ```
           
            ### Person ID
            
            Returns the employee job detail information for this Person ID.  This filter should not be used if a Banner ID filter is used.
            
            ```

            /employee-job-details?effectiveAsOf={"personId": "085df706-ee15-4947-93f8-8c260e64795e"}

            ```

            ### Banner ID
            
            Returns the employee job detail information for this Banner ID.   This filter should not be used if a Person ID filter is used.
            
            ```

            /employee-job-details?effectiveAsOf={"bannerId":"123456789"}
            
            ```

            ### Position

            Returns the employee job detail information for this Position.

            ```

            /employee-job-details?effectiveAsOf={"position":"A000001"}

            ```
            
            ### Suffix

            Returns the employee job detail information for this position suffix.

            ```

            /employee-job-details?effectiveAsOf={"suffix":"00"}

            ```

            ### Job Status

            Returns the employee job detail information that matches the job status.

            ```

            /employee-job-details?effectiveAsOf={"jobStatus":"active"}
            
            ```
            
            ### Contract Type

            Returns the employee job detail information that matches the contract type.
            
            ```

            /employee-job-details?effectiveAsOf={"contractType":"primary"}
            
            ```
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
