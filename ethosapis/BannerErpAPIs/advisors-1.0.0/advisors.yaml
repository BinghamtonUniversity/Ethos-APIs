      type: array
      items:
        type: object
        properties:
          bannerId:
            type: string
          confidential:
            type: string
          firstName:
            type: string
          fullName:
            type: string
          lastName:
            type: string
          surnamePrefix:
            type: string
          middleInitial:
            type: string
    advisorObject:
      type: object
      properties:
        bannerId:
          type: string
        firstName:
          type: string
        fullName:
          type: string
        lastName:
          type: string
        address:
          type: object
          properties:
            addressType:
              type: object
              properties:
                version:
                  type: integer
                code:
                  type: string
                description:
                  type: string
            country:
              type: object
              properties:
                version:
                  type: integer
                code:
                  type: string
                description:
                  type: string
            nation:
              type: object
              properties:
                version:
                  type: integer
                code:
                  type: string
                description:
                  type: string
            state:
              type: object
              properties:
                version:
                  type: integer
                code:
                  type: string
                description:
                  type: string
        city:
          type: string
        houseNumber:
          type: string
        id:
          type: string
        streetLine1:
          type: string
        streetLine2:
          type: string
        streetLine3:
          type: string
        streetLine4:
          type: string
        version:
          type: integer
        zip:
          type: string
        email:
          type: string
        namePrefix:
          type: string
        nameSuffix:
          type: string
        preferenceFirstName:
          type: string
        telephone:
          type: object
          properties:
            commentData:
              type: string
            countryPhone:
              type: string
            internationalAccess:
              type: string
            phoneArea:
              type: string
            phoneExtension:
              type: string
            phoneNumber:
              type: string
            primaryIndicator:
              type: string
            statusIndicator:
              type: string
            unlistIndicator:
              type: string
            telephoneType:
              type: object
              properties:
                version:
                  type: integer
                code:
                  type: string
                description:
                  type: string
        deptAndCollegeInformation:
          type: object
          properties:
            homeIndicator:
              type: boolean
            id:
              type: string
            percentage:
              type: integer
            version:
              type: integer
            college:
              type: object
              properties:
                version:
                  type: integer
                code:
                  type: string
                description:
                  type: string
            department:
              type: object
              properties:
                version:
                  type: integer
                code:
                  type: string
                description:
                  type: string
            termEffective:
              type: object
              properties:
                version:
                  type: integer
                code:
                  type: string
                description:
                  type: string
