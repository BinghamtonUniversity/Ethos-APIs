openapi: 3.0.0
info:
  title: Accounting Feed Accounts Payable Details
  description: GURAPAY is a holding table for records transmitting into Finance
    tables. This API retrieves all data and deletes all records in the table.
  version: 1.0.0
  x-source-domain: Finance
  x-source-name: GURAPAY
  x-source-title: null
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/accounting-feed-accounts-payable-details:
    get:
      tags:
        - accounting-feed-accounts-payable-details
      summary: Return resources from GURAPAY
      description: Return resources from GURAPAY
      parameters:
        - name: accept
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```     
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### System Id

            Returns all Accounting Feed Accounts Payable Details for the
            systemId passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"systemId":"331314209"}

            ```

            ### System Time Stamp

            Returns all Accounting Feed Accounts Payable Details for the
            systemTimeStamp passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"systemTimeStamp":"20230728092214"}

            ```

            ### Document Code

            Returns all accounting feed accounts payable details for the docCode
            passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"docCode":"F0003485"}

            ```

            ### User Id

            Returns all accounting feed accounts payable details for the userId
            passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"userId":"GRAILS"}

            ```

            ### BannerId

            Returns all accounting feed accounts payable details for the
            bannerId passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"bannerId":"A00092839"}

            ```            

            ### Transaction Number

            Returns all accounting feed accounts payable details for the
            tranNumber passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"tranNumber":"1"}

            ```

            ### Detail Code

            Returns all accounting feed accounts payable details for the
            detailCode passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"detailCode":"RFND"}

            ```

            ### Debit Credit Indicator

            Returns all accounting feed accounts payable details for the
            debitCreditInd passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"debitCreditInd":"+"}

            ```

            ### Source Code

            Returns all accounting feed accounts payable details for the
            sourceCode passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"sourceCode":"T"}

            ```

            ### Last Name

            Returns all accounting feed accounts payable details for the
            lastName passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"lastName":"Smith"}

            ```

            ### Street Line 1

            Returns all accounting feed accounts payable details for the
            streetLine1 passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"streetLine1":"1
            Apple Dr"}

            ```

            ### City

            Returns all accounting feed accounts payable details for the city
            passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"city":"Charlotte"}

            ```

            ### Address Type Code

            Returns all accounting feed accounts payable details for the
            addressTypeCode passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"addressTypeCode":"XX"}

            ```

            ### Address Sequence Number

            Returns all accounting feed accounts payable details for the
            addressSeqno passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"addressSeqno":"0"}

            ```

            ### Transaction Date

            Returns all accounting feed accounts payable details for the
            transDate passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"transDate":"2010-10-10"}

            ```

            ### Transaction Amount

            Returns all accounting feed accounts payable details for the
            transAmt passed.

            ```

            /accounting-feed-accounts-payable-details?criteria={"transAmt":123.12}

            ```
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/accounting-feed-accounts-payable-details-1.0.0_resp\
                    onse"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                FilterValueDataTypeInvalid:
                  $ref: "#/components/examples/FilterValueDataTypeInvalid"
                InvalidFilterParameter:
                  $ref: "#/components/examples/InvalidFilterParameter"
        "401":
          description: Failure. Unauthorized.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                Unauthorized:
                  $ref: "#/components/examples/Unauthorized"
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                NoPermission:
                  $ref: "#/components/examples/NoPermission"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                MethodNotAllowed:
                  $ref: "#/components/examples/MethodNotAllowed"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                UnsupportedVersion:
                  $ref: "#/components/examples/UnsupportedVersion"
        "500":
          description: Server error. Unexpected configuration or data.
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      x-method-permissions: API_ACCOUNT_PAYABLE_DETAILS
  /api/accounting-feed-accounts-payable-details/{systemId}:
    delete:
      summary: Removes a resource from GURAPAY
      description: >
        Deletes all existing GURAPAY records  from GURAPAY table with the passed
        in systemId.
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      tags:
        - accounting-feed-accounts-payable-details
      parameters:
        - name: systemId
          in: path
          required: true
          description: Contains the system identifier from which the transaction originated.
          schema:
            type: string
            minimum: 1
        - name: accept
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```
          schema:
            type: string
      responses:
        "200":
          description: No Content
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                InvalidsystemId:
                  $ref: "#/components/examples/InvalidsystemId"
        "401":
          description: Failure. Unauthorized.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                Unauthorized:
                  $ref: "#/components/examples/Unauthorized"
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                NoPermission:
                  $ref: "#/components/examples/NoPermission"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                MethodNotAllowed:
                  $ref: "#/components/examples/MethodNotAllowed"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                UnsupportedVersion:
                  $ref: "#/components/examples/UnsupportedVersion"
        "500":
          description: Server error. Unexpected configuration or data.
      x-method-permissions: API_ACCOUNT_PAYABLE_DETAILS
components:
  schemas:
    accounting-feed-accounts-payable-details-1.0.0_response:
      required:
        - systemId
        - systemTimeStamp
        - docCode
        - activityDate
        - userId
        - transDate
        - transAmt
      type: object
      properties:
        systemId:
          title: System ID
          description: The system identifier from which the transaction originated.
          maxLength: 8
          type: string
          x-lineageReferenceObject: GURAPAY_SYSTEM_ID
        systemTimeStamp:
          title: System Time Stamp
          description: The time of the day attached by the system to every record when
            entered into the system.
          maxLength: 14
          type: string
          x-lineageReferenceObject: GURAPAY_SYSTEM_TIME_STAMP
        docCode:
          title: Document Code Number
          description: The unique number of the document being updated.
          maxLength: 8
          type: string
          x-lineageReferenceObject: GURAPAY_DOC_CODE
        userId:
          title: User ID
          description: The unique identification code of the user.
          maxLength: 30
          type: string
          x-lineageReferenceObject: GURAPAY_USER_ID
        bannerId:
          title: Banner ID
          description: The identification number of the person with a student A/R detail
            transaction which is being fed.
          maxLength: 9
          type: string
          x-lineageReferenceObject: GURAPAY_ID
        tranNumber:
          title: Transmission Number
          description: This field identifies the transaction number on the person"s
            account associated with the refund transaction.
          maxLength: 8
          type: string
          x-lineageReferenceObject: GURAPAY_ID
        detailCode:
          title: Detail Code
          description: The detail code of the transaction on the persons A/R account.
          maxLength: 4
          type: string
          x-lineageReferenceObject: GURAPAY_DETAIL_CODE
        detailCodeDesc:
          title: Detail Code
          description: This column contains the description of the GURAPAY_DETAIL_CODE as
            found in the corresponding sbraccd detail transaction.
          maxLength: 35
          type: string
          x-lineageReferenceObject: GURAPAY_DESC
        termCode:
          title: Term Code
          description: The term code of the of the transaction on the persons A/R account.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURAPAY_TERM_CODE
        account:
          title: Account
          description: The account number associated with the detail code of the persons
            A/R detail transaction.
          maxLength: 60
          type: string
          x-lineageReferenceObject: GURAPAY_ACCOUNT
        debitCreditInd:
          title: Debit Credit Indicator
          description: This debit or credit indicator is used for all general ledger
            transactions.  The plus (+) or minus (-) indicators are used for all
            operating account ledger (OPAL) transactions.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURAPAY_DR_CR_IND
        sourceCode:
          title: Source Code
          description: This field identifies the source of how the refund transaction was
            entered onto the person"s account.  The default value is T - User
            entered transaction. All values are contained in the SATURN.STVSRCE
            table.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURAPAY_SRCE_CODE
        lastName:
          title: Last Name
          description: This field identifies the last name of the person who has the
            accounts payable refund transaction.
          maxLength: 60
          type: string
          x-lineageReferenceObject: GURAPAY_LAST_NAME
        firstName:
          title: First Name
          description: This field identifies the first name of the person who has the
            accounts payable refund transaction.
          maxLength: 60
          type: string
          x-lineageReferenceObject: GURAPAY_FIRST_NAME
        middleInitial:
          title: Middle Initial
          description: This field identifies the middle name of the person who has the
            accounts payable refund transaction.
          maxLength: 60
          type: string
          x-lineageReferenceObject: GURAPAY_MI
        streetLine1:
          title: Street Line 1
          description: This field maintains the first line of the address associated with
            the person.
          maxLength: 75
          type: string
          x-lineageReferenceObject: GURAPAY_STREET_LINE1
        streetLine2:
          title: Street Line 2
          description: This field maintains the second line of the address associated with
            the person.
          maxLength: 75
          type: string
          x-lineageReferenceObject: GURAPAY_STREET_LINE2
        streetLine3:
          title: Street Line 3
          description: This field maintains the third line of the address associated with
            the person.
          maxLength: 75
          type: string
          x-lineageReferenceObject: GURAPAY_STREET_LINE3
        city:
          title: City
          description: This field maintains the city of the address associated with the
            person.
          maxLength: 50
          type: string
          x-lineageReferenceObject: GURAPAY_CITY
        stateCode:
          title: State
          description: This field maintains the state of the address associated with the
            person. All values are contained in the SATURN.STVSTAT table.
          maxLength: 3
          type: string
          x-lineageReferenceObject: GURAPAY_STAT_CODE
        zip:
          title: Postal Code
          description: This field maintains the zip code of the address associated with
            the person.
          maxLength: 30
          type: string
          x-lineageReferenceObject: GURAPAY_ZIP
        nationCode:
          title: Nation
          description: This field maintains the nation/country associated with the address
            of the person. All values are contained in the SATURN.STVNATN table.
          maxLength: 5
          type: string
          x-lineageReferenceObject: GURAPAY_NATN_CODE
        addressTypeCode:
          title: Address Type
          description: ATYP CODE
          maxLength: 2
          type: string
          x-lineageReferenceObject: GURAPAY_ATYP_CODE
        addressTypeSeqno:
          title: Address Sequence Number
          description: ATYP SEQNO
          maxLength: 2
          type: string
          x-lineageReferenceObject: GURAPAY_ATYP_SEQNO
        transDate:
          title: Transaction Date
          description: The date the transaction was processed.
          type: string
          format: date
          x-lineageReferenceObject: GURAPAY_TRANS_DATE
        transAmt:
          title: Transaction Amount
          description: The dollar amount of the transaction associated with this
            particular account distribution.
          maxLength: 17
          type: number
          x-lineageReferenceObject: GURAPAY_TRANS_AMT
        coasCode:
          title: COAS Code
          description: The primary identification code for any chart of accounts that
            uniquely identifies that chart from any other in a multi-chart
            environment.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURAPAY_COAS_CODE
        acciCode:
          title: ACCI Code
          description: The user-defined value representing a summarization of any
            combination of user-defined FOAPAL elements.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURAPAY_ACCI_CODE
        fundCode:
          title: Fund Code
          description: Identifies the fund code that appears on a transaction.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURAPAY_FUND_CODE
        orgnCode:
          title: Organization Code
          description: Identifies the organization code that appears on a transaction.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURAPAY_ORGN_CODE
        acctCode:
          title: Account Code
          description: The user-defined value representing an account.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURAPAY_ACCT_CODE
        progCode:
          title: Program Code
          description: The user-defined value to the program classification structure as
            defined by the National Council of Higher Education Management
            Systems.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURAPAY_PROG_CODE
        actvCode:
          title: Actvity Code
          description: The activity that is primarily associated with this organization.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURAPAY_ACTV_CODE
        locnCode:
          title: Location Code
          description: The physical location of the institution financial manager.  For
            example, Vice President, Finance, Suite 10 Adams Hall, Main Campus.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURAPAY_LOCN_CODE
        activityDate:
          title: Activity Date
          description: Date the record was created or last updated.
          type: string
          format: date
          x-lineageReferenceObject: GURAPAY_ACTIVITY_DATE
        houseNumber:
          title: House Number
          description: HOUSE NUMBER
          maxLength: 10
          type: string
          x-lineageReferenceObject: GURAPAY_HOUSE_NUMBER
        streetLine4:
          title: Street Line 4
          description: STREET LINE4
          maxLength: 75
          type: string
          x-lineageReferenceObject: GURAPAY_STREET_LINE4
        surnamePrefix:
          title: Name Prefix
          description: SURNAME PREFIX
          maxLength: 60
          type: string
          x-lineageReferenceObject: GURAPAY_SURNAME_PREFIX
        vendorInvoiceNum:
          title: Vendor Invoice Number
          description: VENDOR INVOICE NUMBER
          maxLength: 35
          type: string
          x-lineageReferenceObject: GURAPAY_VEND_INV_CODE
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
