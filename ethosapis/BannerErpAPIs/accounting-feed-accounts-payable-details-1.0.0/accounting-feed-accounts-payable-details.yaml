                }
            ]
        }
    InvalidsystemId:
      value: |-
        {
            "errors": [
                {
                    "code": "Global.SchemaValidation.Error",
                    "description": "Errors parsing input JSON.",
                    "message": "Transaction not found"
                }
            ]
        }
    NoPermission:
      value: |-
        {
            "errors": [
                {
                    "code": "403",
                    "message": "Access is denied"
                }
            ]
        }
    MethodNotAllowed:
      value: |-
        {
            "errors": [
                {
                    "code": "Operation.Not.Permitted",
                    "description": "Operation not permitted",
                    "message":  "Method not allowed."
                }
            ]
        }
    Unauthorized:
      value: >-
        {
            "errors": [
                {
                    "code": "401",
                    "message": "Full authentication is required to access this resource"
                }
            ]
        }
    UnsupportedVersion:
      value: >-
        {
            "errors": [
                {
                    "code": "unknownrepresentation.error",
                    "description":  "Unknown representation error",
                    "message": "Unsupported media type 'application/vnd.hedtech.integration.vx+json' for resource 'accounting-feed-accounts-payable-details'"
                }
            ]
        }
  securitySchemes:
