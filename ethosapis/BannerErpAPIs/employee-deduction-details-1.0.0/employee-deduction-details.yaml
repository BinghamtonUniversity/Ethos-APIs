openapi: 3.0.0
info:
  title: Employee Deduction Details
  description: >
    This API can be used to retrieve, post, or update an employee's deduction data.
    This information is displayed in the Banner administrative page PDADEDN.
    Additionally, the API supports the option to create or update employee deductions data in batches.
  version: 1.0.0-beta
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: PDRDEDN
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employee-deduction-details:
    get:
      summary: Get employee deductions
      description: Query and retrieve employee deductions data for a given criteria. Data is extracted from PDRBDED and PDRDEDN.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_DEDUCTION_DETAILS
      tags:
        - employee-deduction-details
      parameters:
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: string            
        - name: criteria
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/employee-deduction-details-1.0.0_get_request_criteria'
          description: >
            ### Person ID
            
            Returns the employee deduction information for this Person ID.  This filter should not be used if a Banner ID filter is used.
            
            ```

            /employee-deduction-details?criteria={"personId": "085df706-ee15-4947-93f8-8c260e64795e"}

            ```

            ### Banner ID
            
            Returns the employee deduction information for this Banner ID.   This filter should not be used if a Person ID filter is used.
            
            ```

            /employee-deduction-details?criteria={bannerId":"123456789"}
            
            ```

            ### BenefitDeductionCode

            Returns the employee deduction information for this Deduction.

            ```

            /employee-deduction-details?criteria={"benefitDeductionCode":"LIF"}

            ```
            
             ### effectiveOn

            Returns the employee deduction effective on this date.

            ```

            /employee-deduction-details?criteria={"effectiveOn":"2024-01-09"}

            ```
            
            ### Status

            Returns the employee deduction with this status. Valid values are:
              * `active`
              * `exempt` 
              * `terminated`
              * `waived` 

            ```

            /employee-deduction-details?criteria={"status":"active"}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object 
                $ref: "#/components/schemas/schema-extension-employee-deduction-details.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
          
  /api/employee-deduction-details/{id}:
    get:
      summary: Get employee deduction
      description: Returns a single employee deduction record with the requested global identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_DEDUCTION_DETAILS
      tags:
        - employee-deduction-details
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the employee deduction resource.
          schema:
            type: string
            minimum: 1
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object 
                $ref: "#/components/schemas/schema-extension-employee-deduction-details.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
 
    put:
      summary: Updates an existing PDRDEDN resource.
      description: Update the employee deduction resource for an employee.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_DEDUCTION_DETAILS
      tags:
        - employee-deduction-details
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
        
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Unique identifier of the employee deduction resource.
          schema:
            type: string
            minimum: 1
            
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-extension-employee-deduction-details.json"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
          
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/schema-extension-employee-deduction-details-put-request.json"
      
  /api/employee-deduction-details/:
    post:
      summary: Creates a new resource in PDRDEDN.
      description: >
        Creates a new deduction for an employee including data for PDRBDED (base), and PDRDEDN (detail) resources.
      


        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_DEDUCTION_DETAILS
      tags:
        - employee-deduction-details
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
        
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-extension-employee-deduction-details.json"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/schema-extension-employee-deduction-details-post-request.json"
  /api/employee-deduction-details/batches:
    post:
      summary: Submit a batch of employee deductions to be created or updated
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_DEDUCTION_DETAILS
      tags:
        - employee-deduction-details
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
        
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-extension-employee-batch-deductions.json"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/employee-deduction-details-batch-1.0.0_post_request"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    employee-deduction-details-batch-1.0.0_post_request:
     type: object
     properties:
        items:
          title: items
          description: List of items to be processed.
          type: array
          items:
            type: object
            oneOf:
              - $ref: "#/components/schemas/schema-extension-employee-deduction-details-post-request.json"
              - $ref: "#/components/schemas/schema-extension-employee-deduction-details-put-batch-request.json"
     required:
        - items
    person:
      title: Person
      description: A reference to link an employee deduction to the common persons entity.
      type: object
      properties:
        id:
          title: ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value
    employee-deduction-details-1.0.0_get_request_criteria:
      type: object
      properties:
        personId:
          title: Person ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value 
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"      
        benefitDeductionCode:
          title: BENEFIT/DEDUCTION CODE
          description:  The code assigned to the benefit/deduction.
          type: string
          example: LIF
          maxLength: 3
        status:
          title: STATUS
          description:  The status of the benefit/deduction.
          type: string
          example: active
          maxLength: 12
          x-LineageReferenceObject: PDRDEDN_STATUS
    schema-extension-employee-deduction-details.json:
      title: employee-deduction-details-1.0.0_response
      description: Returns Deductions information. Null values are not shown
      type: object
      properties:
      
        id:
          title: Id
          type: string
          maxLength: 19
          description: "The global identifier of the employee deduction."
          x-lineageReferenceObject: PDRDEDN_GUID
          example: 085df706-ee15-4947-93f8-8c260e64795e
        bannerId:
          title: Banner ID
          description: Banner ID (PIDM Identifier).
          type: string
          example: HOP510001
          x-LineageReferenceObject: SPRIDEN_ID
          maxLength: 9
        benefitDeductionCode:
          title: BENEFIT/DEDUCTION CODE
          description:  The code assigned to the benefit/deduction.
          type: string
          example: LIF
          maxLength: 3
          x-LineageReferenceObject:  PDRDEDN_BDCA_CODE
        effectiveOn:
          title: Effective Date
          description: The date the benefit/deduction becomes effective.
          type: string
          format: date-time
          example: 2020-01-11
          x-LineageReferenceObject: PDRDEDN_EFFECTIVE_DATE
        status:
          title: Status
          description: The status of the benefit/deduction.
          type: string
          example: active
          maxLength: 1
          x-LineageReferenceObject: PDRDEDN_STATUS

        referenceNumber:
          title: Reference Number
          description: An optional alpha/numeric field.
          type: string
          example: 12345
          x-LineageReferenceObject: PDRDEDN_REF_NO
        
        amount1:
          title: Amount 1
          description: The first amount field for the benefit/deduction.
          type: number
          format: float
          example: 100.50
          x-LineageReferenceObject: PDRDEDN_AMOUNT1
        
        amount2:
          title: Amount 2
          description: The second amount field for the benefit/deduction.
          type: number
          format: float
          example: 150.75
          x-LineageReferenceObject: PDRDEDN_AMOUNT2
        
        amount3:
          title: Amount 3
          description: The third amount field for the benefit/deduction.
          type: number
          format: float
          example: 75.25
          x-LineageReferenceObject: PDRDEDN_AMOUNT3
        
        amount4:
          title: Amount 4
          description: The fourth amount field for the benefit/deduction.
          type: number
          format: float
          example: 200.00
          x-LineageReferenceObject: PDRDEDN_AMOUNT4
        
        amount5:
          title: Amount 5
          description: The fifth amount field for the benefit/deduction.
          type: number
          format: float
          example: 250.00
          x-LineageReferenceObject: PDRDEDN_AMOUNT5
        
        amount6:
          title: Amount 6
          description: The sixth amount field for the benefit/deduction.
          type: number
          format: float
          example: 300.00
          x-LineageReferenceObject: PDRDEDN_AMOUNT6
        
        amount7:
          title: Amount 7
          description: The seventh amount field for the benefit/deduction.
          type: number
          format: float
          example: 350.00
          x-LineageReferenceObject: PDRDEDN_AMOUNT7
        
        optionCode1:
          title: Option Code 1
          description: The first option code for the benefit/deduction code.
          type: string
          example: RE
          maxLength: 2
          x-LineageReferenceObject: PDRDEDN_OPT_CODE1
        
        optionCode2:
          title: Option Code 2
          description: The second option code for the benefit/deduction code.
          type: string
          example: RE
          maxLength: 2
          x-LineageReferenceObject: PDRDEDN_OPT_CODE2
        
        optionCode3:
          title: Option Code 3
          description: The third option code for the benefit/deduction code.
          type: string
          example: RE
          maxLength: 2
          x-LineageReferenceObject: PDRDEDN_OPT_CODE3
        
        optionCode4:
          title: Option Code 4
          description: The fourth option code for the benefit/deduction code.
          type: string
          example: RE
          maxLength: 2
          x-LineageReferenceObject: PDRDEDN_OPT_CODE4
        
        optionCode5:
          title: Option Code 5
          description: The fifth option code for the benefit/deduction code.
          type: string
          example: RE
          maxLength: 2
          x-LineageReferenceObject: PDRDEDN_OPT_CODE5
          
          
        coverageOn:
          title: Coverage Date
          description: Set equal to benefit/deduction begin date via the Employee Benefit/Deduction Setup Form.
          type: string
          format: date-time
          example: 2020-01-11
          x-LineageReferenceObject: PDRDEDN_COVERAGE_DATE

        hasW4NameChange:
          title: W4 Name Change Indicator
          description: Indicator for W4 last name change. Valid values are N(o) and Y(es).
          type: boolean
          example: false
          maxLength: 1
          x-LineageReferenceObject: PDRDEDN_W4_NAME_CHANGE_IND
        
        w4SignedBannerId:
          title: W4 Signed bannerId
          description: BannerId of the user that electronically signed the W4.
          type: string
          example: HOP100002
          x-LineageReferenceObject: PDRDEDN_W4_SIGNED_PIDM
        
        w4SignedOn:
          title: W4 Signed Date
          description: The date and time when the W4 was electronically signed.
          type: string
          format: date-time
          example: 2020-01-11
          x-LineageReferenceObject: PDRDEDN_W4_SIGNED_DATE
        
        lockinLetterStatus:
          title: Lock-in Letter Status
          description: >
             IRS Lock-In letter status.. Valid values are:
              * `active`
              * `inactive` 
              * `none`
          type: string
          enum:
            - active
            - inactive
            - none
          example: active
          x-LineageReferenceObject: PDRDEDN_LOCKIN_LETTER_STATUS
        
        lockinLetterOn:
          title: Lock-in Letter Date
          description: Date of IRS Lock-In letter.
          type: string
          format: date-time
          example: 2020-01-11
          x-LineageReferenceObject: PDRDEDN_LOCKIN_LETTER_DATE
        
        lockinWithholdAllow:
          title: Lock-in Withhold Allowance
          description: Number of tax allowances from Lock-In letter.
          type: integer
          example: 2
          x-LineageReferenceObject: PDRDEDN_LOCKIN_WITHHOLD_ALLOW
        
        comment:
          title: Comment
          description: Comment associated with the deduction record.
          type: string
          example: "Employee requested deduction change."
          maxLength: 4000
          x-LineageReferenceObject: PDRDEDN_COMMENT
        
        commentOn:
          title: Comment Date
          description: The date when the comment was created or updated.
          type: string
          format: date-time
          example: 2020-01-11
          x-LineageReferenceObject: PDRDEDN_COMMENT_DATE
        
        commentUserId:
          title: Comment User ID
          description: The unique ID of the user who last updated the comment.
          type: string
          example: USER123
          maxLength: 30
          x-LineageReferenceObject: PDRDEDN_COMMENT_USER_ID
        
        eventOn:
          title: Event Date
          description: The date of the event associated with the deduction change.
          type: string
          format: date-time
          example: 2020-01-11
          x-LineageReferenceObject: PDRDEDN_EVENT_DATE
        
        limitBenefitCode:
          title: 1042 Limitation of Benefits Code
          description: Code identifying qualification for reduced tax withholding under 1042S reporting.
          type: string
          example: test
          maxLength: 5
          x-LineageReferenceObject: PDRDEDN_1042S_LIMIT_BEN_CDE
        
        hasLockinStep2c:
          title: Lock-in Step 2C Indicator
          description: Step 2C Indicator from the IRS Lock-In letter.
          type: boolean
          example: false
          maxLength: 1
          x-LineageReferenceObject: PDRDEDN_LOCKIN_STEP2C_IND
          
        lockinAddholdAmount:
          title: Lock-in Additional Withholding Amount
          type: number
          format: float
          example: 300.00
          x-LineageReferenceObject: PDRDEDN_LOCKIN_ADDHOLD_AMT
        
        lockinDependentAmount:
          title: Lock-in Dependent Amount
          description: Dependent amount from the IRS Lock-In letter.
          type: number
          format: float
          example: 1000.00
          x-LineageReferenceObject: PDRDEDN_LOCKIN_DEPENDENT_AMT
        
        lockinOtherIncomeAmount:
          title: Lock-in Deductions Amount
          description: Deductions amount from the IRS Lock-In letter.
          type: number
          format: float
          example: 2000.00
          x-LineageReferenceObject: PDRDEDN_LOCKIN_DEDUCTIONS_AMT
        lockinDeductionsAmount:
          title: Lock-in Deductions Amount
          description: Deductions amount from the IRS Lock-In letter.
          type: number
          format: float
          example: 2000.00
          x-LineageReferenceObject: PDRDEDN_LOCKIN_DEDUCTIONS_AMT
        lockinFilingStatus:
          title: FILING STATUS
          description: Lock-In Filing Status for federal tax withholding.
          type: string
          example: HH
          x-LineageReferenceObject: PDRDEDN_LOCKIN_FSTA_FIL_ST
        hasMultiJurisdiction:
          title: MULTI JURISDICTIONAL INDICATOR
          description: Multi jurisdictional tax indicator
          type: boolean
          example: true
          x-LineageReferenceObject: PDRDEDN_MULTI_JURIS_IND
        combinedLimitCode:
          title: COMBINED LIMIT CODE
          description:  A code that defines combined annual limits for a benefit/deduction.
          type: string
          example: test
          x-LineageReferenceObject: PDRDEDN_BDCL_CODE
        userId:
          title: USER ID
          description:  The Oracle ID of the user who changed the record.
          type: string
          example: test
          x-LineageReferenceObject: PDRDEDN_USER_ID
        dataOrigin:
          title: DATA ORIGIN
          description:  Source system that created or updated the row.
          type: string
          example: test
          x-LineageReferenceObject: PDRDEDN_DATA_ORIGIN
        activityDate:
          title: ACTIVITY DATE
          description: Date when the record was inserted or last modified.
          type: string
          format: date-time
          example: 2020-01-11
          x-LineageReferenceObject: PDRDEDN_ACTIVITY_DATE
        employeeDeduction:
          title: Employee Deduction
          description: A reference to link an employee deduction to the employee deduction detail entity.
          type: object
          properties:
            id:
              title: Id
              type: string
              maxLength: 19
              description: "The global identifier of the employee deduction."
              x-lineageReferenceObject: PDRDEDN_GUID
              example: 085df706-ee15-4947-93f8-8c260e64795e
        person:
          $ref: '#/components/schemas/person'
          
    schema-extension-employee-batch-deductions.json:
      description: >
        Returns the list of Ids for those employee deductions that were successfully created.
        For those that did not, it returns the list of error messages.
      type: object
      x-last-modified:
      properties:
        id:
          title: ID
          description: A globally unique identifier of a batch to be used in all external references.
          type: string
          example: 085df706-ee15-4947-93f8-8c260e64795e
        status:
          title: status
          description: status of the batch.
          type: string
          enum:
            - completed
            - inProgress
            - aborted
          example: completed
        resource:
          title: Resource
          description: The affected resource.
          type: object
          properties:
            name:
              title: Resource Name
              description: The pluralized name of the affected resource
              type: string
              example: employee-deduction-details
            version:
              title: Resource version
              description: The version of the resource
              type: string
              example: 2.0.0
          additionalProperties: false
          required:
            - name
            - version
        items:
          type: array
          items:
            type: object
            additionalProperties: true
            oneOf:
              -  $ref: "#/components/schemas/schema-extension-employee-deduction-details.json"
              -  $ref: '#/components/schemas/errors_2_0_0'
            required:
              - items
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
