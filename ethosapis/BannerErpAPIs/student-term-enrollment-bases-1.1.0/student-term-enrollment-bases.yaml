components:
  schemas:
    student-term-enrollment-bases-1.1.0_get_response:
      type: object
      properties:
        id:
          title: Term Enrollment Base Record ID
          maxLength: 19
          type: number
          description: "A unique identifier for the base term enrollment record."
          x-lineageReferenceObject: SFBETRM_SURROGATE_ID
          example: 290284
        bannerId:
          title: Banner Id
          maxLength: 9
          type: string
          description: "The Banner person ID of the student."
          x-lineageReferenceObject: SPRIDEN_ID
          example: A00039202
        termCode:
          title: Term
          maxLength: 6
          type: string
          description: "Registration Term"
          x-lineageReferenceObject: SFBETRM_TERM_CODE
          x-lineageLookupReferenceObject: STVTERM
          example: 202510
        enrollmentStatusCode:
          title: Enrollment Status Code
          maxLength: 2
          type: string
          description: "The student's overall registration status for the term."
          x-lineageReferenceObject: SFBETRM_ESTS_CODE
          x-lineageLookupReferenceObject: STVESTS
          example: EL
        enrollmentStatusDesc:
          title: Enrollment Status Description
          maxLength: 30
          type: string
          x-lineageReferenceObject: STVESTS_DESC 
          example: Eligible to Register
        registrationReasonCode:
          title: Registration Reason Code
          maxLength: 2
          type: string
          x-lineageReferenceObject: SFBETRM_RGRE_CODE
          x-lineageLookupReferenceObject: STVRGRE
          example: JR
        registrationReasonDesc:
          title: Registration Reason Description
          maxLength: 30
          type: string
          x-lineageReferenceObject: STVRGRE_DESC
          example: Job Requirement
        minimumRegistrationHours:
          title: Minimum Hours
          type: number
          description: "Minimum Registration Hours Required for Term"
          x-lineageReferenceObject: SFBETRM_MIN_HRS
          example: 12.000
        minimumHoursSourceCode:
          title: Minimum Hours Source
          maxLength: 4
          type: string
          description: "Source of the minimum required hours."
          x-lineageReferenceObject: SFBETRM_MINH_SRCE_CDE
          x-lineageDerivedLogic: Source may be an administrative entry (U=USER) or set by configurations for the minimum maximum hours rules (M=MHRS), academic standing (A=ASTD), or combined academic standing (C=CAST).
          example: USER
        maximumRegistrationHours:
          title: Maximum Hours
          type: number
          description: "Maximum Registration Hours Allowed for Term"
          x-lineageReferenceObject: SFBETRM_MHRS_OVER
          example: 18.000
        maximumHoursSourceCode:
          title: Maximum Hours Source
          maxLength: 4
          type: string
          description: "Source of the maximum required hours."
          x-lineageReferenceObject: SFBETRM_MSXH_SRCE_CDE
          x-lineageDerivedLogic: Soure may be an administrative entry (U=USER) or set by configurations for the minimum maximum hours rules (M=MHRS), academic standing (A=ASTD), or combined academic standing (C=CAST).
          example: MHRS
        chargesAcceptanceIndicator:
          title: Term Charges Acceptance Indicator
          maxLength: 1
          type: string
          description: "Indicates student acceptance of registration charges for the term. Valid values are 'C' for Confirmed, 'N' for None, or 'Y' for Accepted."
          x-lineageReferenceObject: SFBETRM_AR_IND
          example: C
        currentTimeStatusCode:
          title: Current Time Status
          maxLength: 2
          type: string
          x-lineageReferenceObject: SFBETRM_TMST_CODE
          x-lineageLookupReferenceObject: STVTMST
          example: FT
        currentTimeStatusDesc:
          title: Time Status description
          maxLength: 30
          type: string
          x-lineageReferenceObject: STVTMST_DESC
          example: Full Time
        currentTimeStatusDate:
          title: Time Status Date
          type: string
          format: date
          x-lineageReferenceObject: SFBETRM_TMST_DATE
          example: 2025-08-23
        timeStatusMaintenaceInd:
          title: Time Status Maintenance Indicator
          maxLength: 1
          type: string
          description: "Time status may be set by an administrative user (U) or by system configurations (S)."
          x-lineageReferenceObject: SFBETRM_TMST_MAINT_IND
          example: S
      required:
        - id
        - bannerId
        - termCode
        - enrollmentStatusCode
        - enrollmentStatusDate
        - chargesAcceptanceIndicator
        - minimumRegistrationHours
        - maximumRegistrationHours
    student-term-enrollment-bases-1.1.0_post_request:
      type: object
      properties:
        effectiveOn:
          title: Effective Date of the Create
          description: Effective date of the create. If not provided, the system date is defaulted.
          type: string
          format: date
          example: 2025-10-23
        bannerId:
          title: Banner Id
          maxLength: 9
          type: string
          description: "The Banner person ID of the student."
          example: A00039202
        termCode:
          title: Term
          maxLength: 6
          type: string
          description: "Registration Term"
          example: 202510
        holdOverridePassword:
          title: Registration Hold Override Password
          description: The hold override password will bypass registration holds
            and allow creation of the term enrollment base record.
          maxLength: 3
          type: string
          example: OVR
        enrollmentStatusCode:
          title: Enrollment Status Code
          maxLength: 2
          type: string
          description: "The student's overall registration status for the term. If not provided in the request the 'EL' code will be defaulted."
          example: EL
        chargesAcceptanceIndicator:
          title: Term Charges Acceptance Indicator
          maxLength: 1
          type: string
          description: "Indicates student acceptance of registration charges for the term. 
            Valid submission values are 'C' for Confirmed, 'N' for None, or 'Y' for Accepted. If not provided in the request, a 'N' value will be defaulted."
          example: C
        minimumRegistrationHours:
          title: Minimum Hours
          description: Minimum registration hours required for the term. If not provided in the request, system configurations will be defaulted.
          type: number
          example: 12.5
        maximumRegistrationHours:
          title: Maximum Hours
          description: Maximum registration hours required for the term. If not provided in the request, system configurations will be defaulted.
          type: number
          example: 18
        registrationReasonCode:
          title: Registration Reason Code
          maxLength: 2
          type: string
          example: JR
      required:
       - bannerId
       - termCode
    student-term-enrollment-bases-1.1.0_put_request:
      type: object
      properties:
        effectiveOn:
          title: Effective Date of the Update
          description: Effective date of the update. If not provided, the system date is defaulted.
          type: string
          format: date
          example: 2025-10-23
        chargesAcceptanceIndicator:
          title: Term Charges Acceptance Indicator
          maxLength: 1
          type: string
          description: "Indicates student acceptance of registration charges for the term. Valid submission values are 'C' for Confirmed, 'N' for None, or 'Y' for Accepted."
          example: C
        minimumRegistrationHours:
          title: Minimum Hours
          description: Minimum registration hours required for the term.
          type: number
          example: 12.5
        maximumRegistrationHours:
          title: Maximum Hours
          description: Maximum registration hours required for the term.
          type: number
          example: 18
        registrationReasonCode:
          title: Registration Reason Code
          maxLength: 2
