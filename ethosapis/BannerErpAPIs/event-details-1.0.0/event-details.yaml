components:
  schemas:
    event-details-v1.0.0_put_request:
      type: object
      properties:
        id:
          title: Event ID
          maxLength: 5
          type: string
          description: This field is the unique identifier for the event.
          x-lineageReferenceObject: SLBEVNT_CRN
        eventType:
          title: Event Type
          maxLength: 4
          type: string
          description: This field defines type associated with the event.
          x-lineageReferenceObject: SLBEVNT_ETYP_CODE
        eventDescription:
          title: Event Description
          maxLength: 30
          type: string
          description: This field identifies the description of the event.
          x-lineageReferenceObject: SLBEVNT_DESC
        longDescription:
          title: Long Description
          maxLength: 4000
          type: string
          description: Long Description for the event.
          x-lineageReferenceObject: SLBEVNT_LONG_DESCRIPTION
        agencyBannerId:
          title: Agency Banner ID
          maxLength: 9
          type: string
          description: This field identifies the agency Banner ID associated with the event
          x-lineageReferenceObject: SPRIDEN_ID
        systemTypeCode:
          title: System Type Code
          maxLength: 2
          type: string
          description: Code indicating the product that created the event.
          x-lineageReferenceObject: SLBEVNT_SYSI_CODE
        campusCode:
          title: Campus Code
          maxLength: 3
          type: string
          description: This field identifies the campus that is associated with the event.
          x-lineageReferenceObject: SLBEVNT_CAMP_CODE
        siteCode:
          title: Site Code
          maxLength: 3
          type: string
          description: This field identifies the site that is associated with the event.
          x-lineageReferenceObject: SLBEVNT_SITE_CODE
        collegeCode:
          title: College Code
          maxLength: 2
          type: string
          description: This field identifies the college that is associated with the event.
          x-lineageReferenceObject: SLBEVNT_COLL_CODE
        departmentCode:
          title: Department Code
          maxLength: 4
          type: string
          description: This field identifies the department that is associated with the
            event.
          x-lineageReferenceObject: SLBEVNT_DEPT_CODE
        contactBannerId:
          title: Contact Banner ID
          maxLength: 9
          type: string
          description: Banner ID of the Contact assigned to the event.
          x-lineageReferenceObject: SPRIDEN_ID
        addressTypeCode:
          title: Address Type Code
          maxLength: 2
          type: string
          description: Address type of the Contact assigned to the event.  Only populated
            if Contact Pidm is not null..
          x-lineageReferenceObject: SLBEVNT_ATYP_CODE
        districtDivisionCode:
          title: District/Division Code
          maxLength: 3
          type: string
          description: District/Division Code.
          x-lineageReferenceObject: SLBEVNT_DICD_CODE
        restrictedIndicator:
          title: Restricted Indicator
          maxLength: 1
          type: boolean
          description: Indicates whether the function is private or not. Defaults to 'N'.
          x-lineageReferenceObject: SLBEVNT_RESTRICTED_IND
        publishIndicator:
          title: Publish Indicator
          maxLength: 1
          type: boolean
          description: Indicates whether the function is currently published or not.
            Defaults to 'N'.
          x-lineageReferenceObject: SLBEVNT_PUBLISH_IND
        registrationLimit:
          title: Registration Limit
          maxLength: 1
          type: boolean
          description: The number of functions an Attendee can register to (1 or no
            limit). Defaults to 'N'.
          x-lineageReferenceObject: SLBEVNT_LIMIT_ONE
        eventComment:
          title: Event Comments
          maxLength: 4000
          type: string
          description: This field is where the comments for an event are stored.
          x-lineageReferenceObject: SLRECMT_COMMENTS
      required:
        - id
    event-details-v1.0.0_post_request:
      type: object
      properties:
        eventType:
          title: Event Type
          maxLength: 4
          type: string
          description: This field defines type associated with the event.
