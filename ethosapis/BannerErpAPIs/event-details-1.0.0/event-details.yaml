          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### ID
            Returns all records for the ID (event reference number) passed.
            ```
            /event-details?criteria={"eventReferenceNumber":"A0275"}
            ```
            ### Event Type
            Returns all records for the Event Type Code passed.
            ```
            /event-details?criteria={"eventType":"DINR"}
            ```
                        
            ### Contact Banner ID
            Returns all records for the Contact Banner ID passed.
            ```
            /event-details?criteria={"contactBannerId":"A0000025"}
            ```
                        
            ### System Type Code
            Returns all records for the System Type Code passed.
            ```
            /event-details?criteria={"systemTypeCode":"A"}
            ```
