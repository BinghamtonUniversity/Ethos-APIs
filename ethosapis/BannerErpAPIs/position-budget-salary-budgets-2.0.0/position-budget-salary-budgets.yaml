    schema-extension-salary-budgets-batch-post.json:
      description: >
        Returns the list of Ids for those salary budgets that were successfully created.
        For those that did not, it returns the list of error messages.
      type: object
      x-last-modified:
      properties:

        status:
          title: status
          description: status of the batch.
          type: string
          enum:
            - completed
            - inProgress
            - aborted
          example: completed
        resource:
          title: Resource
          description: The affected resource.
          type: object
          properties:
            name:
              title: Resource Name
              description: The pluralized name of the affected resource
              type: string
              example: position-budget-salary-budgets
            version:
