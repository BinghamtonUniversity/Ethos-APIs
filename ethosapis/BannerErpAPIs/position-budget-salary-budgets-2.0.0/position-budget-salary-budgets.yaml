components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    schema-extension-salary-budgets.json:
      title: Position Budget Salary Budgets
      description: Displays the details of the Salary Budgets and comments for the particular year and postion.
      type: object
      properties:
        positionCode:
          title: Position Code
          description: Position number for the position.
          type: string
        activityDate:
          title: Activity Date
          description: Date when the record was inserted or last modified.
          type: string
        positionAnnuals:
          title: Position Annual Basis
          description: The period of time a position is based upon or budgeted for.
          type: number
        budgetAppointmentPct:
          title: Budget Appointment Percent
          description: The position budget appointment percentage.
          type: number
        baseUnits:
          title: Base Units
          description: The number of pay periods for the position.
          type: number
        positionBudgets:
          title: Position Budget Basis
          description: The period of the Position Annual Basis to be worked.
          type: number
        budgetedAmount:
          title: Budgeted Amount
          description: The amount of money budgeted for a position for a fiscal year.
          type: number
        budgetId:
          title: Budgeted ID
          description: System Defined Code for the Position Budget Id.
          type: string
        coasCode:
          title: Chart of Accounts code
          description: The BANNER FINANCE Chart of Accounts Code under which the position is created.
          type: string
        comment:
          title: Comment
          description: This field stores user comments.
          type: string
        orgnCode:
          title: Organization Code
          description: Organization code as defined in the Banner Finance system.
          type: string
        userId:
          title: User ID
          description: The user ID of the person who inserted or last updated this record.
          type: string
        jfteInd:
          title: Create JFTE Indicator
          description: This flag indicates when to create NBRJFTE records. Valid values are:- (Y) - create record or (N) - do not create record.
          type: string
        effectiveDate:
          title: Effective Date
          description: Date the record becomes effective.
          type: string
        encumbAmt:
          title: Encumbered Amount
          description: Amount of money encumbered towards the Salary Budget for this position.
          type: number
        expendedAmt:
          title: Expended Amount
          description: Amount of money expended towards the Salary Budget for this position.
          type: number
        fiscCode:
          title: Fiscal Year
          description: BANNER HR system defined code for the fiscal year.
          type: string
        budgetFte:
          title: Budget FTE
          description: The full time equivalency budgeted for this position.
          type: number
        phase:
          title: Phase
          description: System Defined Code for the Budget Phase.
          type: string
        remainingAmt:
          title: Total Budget Remaining
          description: Total budget available after expended and encumbered amount.
          type: number
        sgrpCode:
          title: Salary group code
          description: Salary group code associated with this record.
          type: string
        status:
          title: Status
          description: Status of Salary Budget Total Record. Values (C)losed, (A)pproved, (W)orking, (T)ransferred.
          type: string
        id:
          title: ID
          description: This field defines the identification number used to access a salary budget record
          type: number
      required:
        - positionCode
        - fiscCode
    schema-extension-salary-budgets-put-request.json:
      title: Position Budget Salary Budgets Request Body
      description: Displays the details of the Salary Budgets and comments for the particular year and postion.
