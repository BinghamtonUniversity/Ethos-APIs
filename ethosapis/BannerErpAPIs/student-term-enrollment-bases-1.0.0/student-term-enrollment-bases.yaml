components:
  schemas:
    student-term-enrollment-bases-1.0.0_put_request:
      type: object
      properties:
        chargesAcceptanceIndicator:
          title: Term Charges Acceptance Indicator
          maxLength: 1
          type: string
          description: Indicates student acceptance of registration charges for the term.
            Valid submission values are 'C' for Confirmed or 'N' for None.
          x-lineageReferenceObject: SFBETRM_AR_IND
    student-term-enrollment-bases-1.0.0_get_response:
      type: object
      properties:
        id:
          title: Term Enrollment Base Record ID
          maxLength: 19
          type: number
          description: A unique identifier for the base term enrollment record.
          x-lineageReferenceObject: SFBETRM_SURROGATE_ID
        bannerId:
          title: Banner Id
          maxLength: 9
          type: string
          description: The Banner person ID of the student.
          x-lineageReferenceObject: SPRIDEN_ID
        termCode:
          title: Term
          maxLength: 6
          type: string
          description: Registration Term
          x-lineageReferenceObject: SFBETRM_TERM_CODE
          x-lineageLookupReferenceObject: STVTERM
        enrollmentStatusCode:
          title: Enrollment Status Code
          maxLength: 2
          type: string
          description: The student's overall registration status for the term.
          x-lineageReferenceObject: SFBETRM_ESTS_CODE
          x-lineageLookupReferenceObject: STVESTS
        enrollmentStatusDesc:
          title: Enrollment Status Description
          maxLength: 30
          type: string
          x-lineageReferenceObject: STVESTS_DESC
        registrationReasonCode:
          title: Registration Reason Code
          maxLength: 2
          type: string
          x-lineageReferenceObject: SFBETRM_RGRE_CODE
          x-lineageLookupReferenceObject: STVRGRE
        registrationReasonDesc:
          title: Registration Reason Description
          maxLength: 30
          type: string
          x-lineageReferenceObject: STVRGRE_DESC
        minimumRegistrationHours:
          title: Minimum Hours
          type: number
          description: Minimum Registration Hours Required for Term
          x-lineageReferenceObject: SFBETRM_MIN_HRS
        minimumHoursSourceCode:
          title: Minimum Hours Source
          maxLength: 4
          type: string
          description: Source of the minimum required hours may be an administrative entry
            (USER) or system configuration (MHRS).
          x-lineageReferenceObject: SFBETRM_MINH_SRCE_CDE
        maximumRegistrationHours:
          title: Maximum Hours
          type: number
          description: Maximum Registration Hours Allowed for Term
          x-lineageReferenceObject: SFBETRM_MIN_HRS
        maximumHoursSourceCode:
          title: Maximum Hours Source
          maxLength: 4
          type: string
          description: Source of the maximum required hours may be an administrative entry
            (USER) or system configuration (MHRS).
          x-lineageReferenceObject: SFBETRM_MSXH_SRCE_CDE
        chargesAcceptanceIndicator:
          title: Term Charges Acceptance Indicator
          maxLength: 1
          type: string
          description: Indicates student acceptance of registration charges for the term.
            Valid values are 'C' for Confirmed, 'N' for None, or 'Y' for
            Accepted.
          x-lineageReferenceObject: SFBETRM_AR_IND
        currentTimeStatusCode:
          title: Current Time Status
          maxLength: 2
          type: string
          x-lineageReferenceObject: SFBETRM_TMST_CODE
          x-lineageLookupReferenceObject: STVTMST
        currentTimeStatusDesc:
          title: Time Status description
          maxLength: 30
          type: string
          x-lineageReferenceObject: STVTMST_DESC
        currentTimeStatusDate:
          title: Time Status Date
          type: string
          format: date
          x-lineageReferenceObject: SFBETRM_TMST_DATE
        timeStatusMaintenaceInd:
          title: Time Status Maintenance Indicator
          maxLength: 2
          type: string
          description: Time status may be set by an administrative user or by system
            configurations.
          x-lineageReferenceObject: SFBETRM_TMST_MAINT_IND
      required:
        - id
        - bannerId
        - termCode
        - enrollmentStatusCode
        - enrollmentStatusDate
        - chargesAcceptanceIndicator
        - minimumRegistrationHours
        - maximumRegistrationHours
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EthosIntegrationBearer:
      type: http
      scheme: bearer
