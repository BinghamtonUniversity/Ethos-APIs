    put:
      tags:
        - student-term-enrollment-bases
      summary: Update of student term enrollment base record.
      description: The Acceptance of Charges indicator may be updated if charges have
        not been accepted.
      requestBody:
        content:
          application/vnd.hedtech.integration.1.0.0+json:
