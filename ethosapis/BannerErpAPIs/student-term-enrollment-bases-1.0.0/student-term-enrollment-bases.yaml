openapi: 3.0.0
info:
  title: Student Term Enrollment Bases
  description: The API returns the base term enrollment records (SFBETRM) as seen
    on the SFAREGS administrative user page. The API can be used to retrieve
    records and to update the term charges acceptance indicator.
  version: 1.0.0
  x-source-domain: Student
  x-source-name: SFBETRM
  x-source-title: null
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-term-enrollment-bases:
    get:
      tags:
        - student-term-enrollment-bases
      summary: Term enrollment base is the foundational term registration record.
      description: This API returns the registration SFBETRM records.
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Banner ID

            Returns all term enrollment base records for the Banner ID passed.

            ```

            /student-term-enrollment-bases?criteria={"bannerId":"300444500"}

            ```

            ### Term

            Returns all term enrollment base records for the term code passed.

            ```

            /student-term-enrollment-bases?criteria={"termCode":"201010"}}

            ```

            ### Enrollment Status

            Returns all term enrollment base records for the enrollment status
            code passed.

            ```

            /student-term-enrollment-bases?criteria={"enrollmentStatusCode":"EL"}

            ```

            ### Enrollment Status Date

            Returns all term enrollment base records based on the enrollment
            status date passed. Equal to (:), less than ($lt), less than or
            equal to ($lte), greater than ($gt), and greater than or equal to
            ($gte) supported. 

            ```

            /student-term-enrollment-bases?criteria={"enrollmentStatusDate":"2023-05-03"}


            /student-term-enrollment-bases?criteria={"enrollmentStatusDate":{"$lt":
            "2023-05-03"}}


            /student-term-enrollment-bases?criteria={"enrollmentStatusDate":{"$lte":
            "2023-05-03"}}


            /student-term-enrollment-bases?criteria={"enrollmentStatusDate":{"$gt":
            "2023-05-03"}}


            /student-term-enrollment-bases?criteria={"enrollmentStatusDate":{"$gte":
            "2023-05-03"}}

            ```

            ### Registration Reason

            Returns all term enrollment base records for the registration reason
            code passed.

            ```

            /student-term-enrollment-bases?criteria={"registrationReasonCode":"CE"}

            ```

            ### Minimum Registration Hours

            Returns all term enrollment base records for the minimum
            registration hours passed. Equal to (:), less than ($lt), less than
            or equal to ($lte), greater than ($gt), and greater than or equal to
            ($gte) supported. 

            ```

            /student-term-enrollment-bases?criteria={"minimumRegistrationHours":12}


            /student-term-enrollment-bases?criteria={"minimumRegistrationHours":{"$lt":12}}


            /student-term-enrollment-bases?criteria={"minimumRegistrationHours":{"$lte":12}}


            /student-term-enrollment-bases?criteria={"minimumRegistrationHours":{"$gt":12}}


            /student-term-enrollment-bases?criteria={"minimumRegistrationHours":{"$gte":12}}

            ```

            ### Minimum Registration Hours Source Code

            Returns all term enrollment base records for the minimum
            registration hours source code passed.

            ```

            /student-term-enrollment-bases?criteria={"minimumHoursSourceCode":"USER"}

            ```

            ### Maximum Registration Hours

            Returns all term enrollment base records for the maximum
            registration hours passed. Equal to (:), less than ($lt), less than
            or equal to ($lte), greater than ($gt), and greater than or equal to
            ($gte) supported. 

            ```

            /student-term-enrollment-bases?criteria={"maximumRegistrationHours":18}


            /student-term-enrollment-bases?criteria={"maximumRegistrationHours":{"$lt":18}}


            /student-term-enrollment-bases?criteria={"maximumRegistrationHours":{"$lte":18}}


            /student-term-enrollment-bases?criteria={"maximumRegistrationHours":{"$gt":18}}


            /student-term-enrollment-bases?criteria={"maximumRegistrationHours":{"$gte":18}}

            ```

            ### Maximum Registration Hours Source Code

            Returns all term enrollment base records for the maximum
            registration hours source code passed.

            ```

            /student-term-enrollment-bases?criteria={"maximumHoursSourceCode":"MHRS"}

            ```

            ### Charges Acceptance Indicator

            Returns all term enrollment base records for the charges acceptance
            indicator passed. Valid values are 'C' for Confirmed, for 'N' for
            None, or 'Y' for Accepted.

            ```

            /student-term-enrollment-bases?criteria={"chargesAcceptanceInd":"N"}

            ```

            ### Current Time Status Code

            Returns all term enrollment base records for the current time status
            code passed.

            ```

            /student-term-enrollment-bases?criteria={"currentTimeStatusCode":"HT"}

            ```
      responses:
