components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    employee-employments-1.1.0_get_request_criteria:
      type: object
      properties:
        personId:
          title: Person ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789" 
    employee-employments-1.0.0_get_response:
      properties:
        id:
          title: Id
          type: string
          description: "The global identifier of the employee employment resource."
          x-lineageReferenceObject: PEBEMPL_GUID
          example: 085df706-ee15-4947-93f8-8c260e64795e
        bannerId:
          title: Banner ID
          type: string
          description: "Internal Identification Number of the employee."
          x-lineageReferenceObject: SPRIDEN_ID
          example: HOP123456
        adjustedServiceOn:
          title: Adjusted Service Date
          description: Date used to determine years of service for leave accrual if the First Hire Date and the Current Hire Date are not equal.
          format: date
          type: string
          example: 2020-07-01
          x-lineageReferenceObject: PEBEMPL_ADJ_SERVICE_DATE
        benefitCategoryCode:
          title: Benefit Category Code
          description: The benefit category code to which the employee belongs.
          type: string
          example: FT
          x-lineageReferenceObject: PEBEMPL_BCAT_CODE
        californiaPensionMemberStatus:
          title: California Pension Member Status
          description: >
            California Pension Member Status. Valid values are:
              * `strsMember` STRS member
              * `strsRetiree` STRS retiree
              * `persMember` PERS member
              * `persRetiree` PERS retiree
              * `strsPersMember` STRS/PERS member
              * `strsPersRetiree` STRS/PERS retiree 
              * `nonMember` Non-member
          type: string
          enum:
            - strsMember
            - strsMember
            - strsRetiree
            - persMember
            - persRetiree
            - strsPersMember
            - strsPersRetiree 
            - nonMember
          example: strsMember
          x-lineageReferenceObject: PEBEMPL_CALIF_PENSION_IND
        campusCode:
          title: Campus Code
          description: The Campus code to which the employee belongs.
          type: string
          example: MN
          x-lineageReferenceObject: PEBEMPL_CAMP_CODE
        canadianNonResidentServiceIndustry:
          title: Canadian Non-resident Service Industry
          description: The non-resident service code.
          type: string
          example: 211
          x-lineageReferenceObject: PEBEMPL_NRSI_CODE
        collegeCode:
          title: College Code
          description: The College code to which the employee belongs.
          type: string
          example: MD
          x-lineageReferenceObject: PEBEMPL_COLL_CODE
        currentHireOn:
          title: Current Hire Date
          description: The employees current date of hire.
          format: date
          type: string
          example: 2020-07-01
          x-lineageReferenceObject: PEBEMPL_CURRENT_HIRE_DATE
        daysInCanada:
          title: Days In Canada
          description: Number of days the employee worked in Canada.
          type: integer
          example: 56
          x-lineageReferenceObject: PEBEMPL_DAYS_IN_CANADA
        distributionCoasCode:
          title: Distribution Chart of Accounts Code
          description: The Chart of Accounts code to which the employee's documents, such as checks, are distributed.
          type: string
          example: A
          x-lineageReferenceObject: PEBEMPL_COAS_CODE_DIST
        distributionOrganizationCode:
          title: Distribution Organization Code
          description: The organization code used for document distribution.
          type: string
          example: 12010
          x-lineageReferenceObject: PEBEMPL_ORGN_CODE_DIST
        districtDivisionCode:
          title: District or Division Code
          description: The district or division code associated with an employee.
          type: string
          example: MNT
          x-lineageReferenceObject: PEBEMPL_DICD_CODE
        eeoFullTimePartTime:
          title: EEO Full Time Part Time
          description: >
            Internal Part Time/Full Time indicator, used for EEO reporting. 
            Valid values are:
              * `fullTime` Full-time
              * `partTime` Part-time
              * `other` Other
          type: string
          enum:
            - fullTime
            - partTime
            - other
          example: fullTime
          x-lineageReferenceObject: PEBEMPL_INTERNAL_FT_PT_IND
        consentedToElectronic1095:
          title: Electronic 1095 Consent
          description: Indicates that the employee has consented to receive the 1095 tax form electronically.  
          type: boolean
          example: true
          x-lineageReferenceObject: PEBEMPL_1095TX_CONSENT_IND 
        electronic1095ConsentOn:
          title: Electronic 1095 Consent Date
          description: This field identifies the most recent date the 1095 Electronic Tax Form Consent Indicator was updated.
          format: date
          type: string
          example: 2020-12-01
          x-lineageReferenceObject: PEBEMPL_1095TX_CONSENT_DATE
        electronic1095ConsentUserId:
          title: Electronic 1095 Consent User Id
          description: The unique identification of the user who last updated the 1095 Electronic Tax Form Consent Indicator.
          type: string
          example: HOP123456
          x-lineageReferenceObject: PEBEMPL_1095TX_CONSENT_USER_ID
        consentedToElectronicTaxForms:
          title: Electronic Tax Consent
          description: Indicates that the employee has consented to receive the tax form electronically. Canada Only.
          type: boolean
          example: true
          x-lineageReferenceObject: PEBEMPL_ETAX_CONSENT_IND
        electronicTaxConsentOn:
          title: Electronic Tax Consent Date
          description: This field identifies the most recent date the Electronic Tax Form Consent Indicator was updated. Canada only.
          format: date
          type: string
          example: 2020-12-01
          x-lineageReferenceObject: PEBEMPL_ETAX_CONSENT_DATE
        electronicTaxConsentUserId:
          title: Electronic Tax Consent User Id
          description: The unique identification of the user who last updated the Electronic Tax Form Consent Indicator. Canada only.
          type: string
          example: HOP123456
          x-lineageReferenceObject: PEBEMPL_ETAX_CONSENT_USER_ID
        consentedToElectronicW2:
          title: Electronic W2 Consent
          description: Indicates that the employee has consented to receive the W-2 electronically.  
          type: boolean
          example: true
          x-lineageReferenceObject: PEBEMPL_EW2_CONSENT_IND
        electronicW2ConsentOn:
          title: Electronic W2 Consent Date
          description: This field identifies the most recent date the Electronic W-2 Consent Indicator was updated.
          format: date
          type: string
          example: 2020-12-01
          x-lineageReferenceObject: PEBEMPL_EW2_CONSENT_DATE
        electronicW2ConsentUserId:
          title: Electronic W2 Consent User Id
          description: The unique identification of the user who last updated the Electronic W-2 Consent Indicator.
          type: string
          example: HOP123456
          x-lineageReferenceObject: PEBEMPL_EW2_CONSENT_USER_ID
        employeeClassCode:
          title: Employee Class Code
          description: The employee grouping code to which the employee belongs.
          type: string
          example: AD
          x-lineageReferenceObject: PEBEMPL_ECLS_CODE
        employeeGroup:
          title: Employee Group
          description: The employee group code is a sub-category of the Employee Class.
          type: string
          example: INTR
          x-lineageReferenceObject: PEBEMPL_EGRP_CODE
        employmentStatus:
