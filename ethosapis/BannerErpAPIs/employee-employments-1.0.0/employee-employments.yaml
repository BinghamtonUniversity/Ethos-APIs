    employee-employments-1.0.0_put_request_batch:
      allOf: # Combines the id with the put request model
        - type: object
          required:
            - id
          properties:
            id:
              title: Id
              type: string
              description: "The global identifier of the employee employment resource."
              x-lineageReferenceObject: PEBEMPL_GUID
              example: 085df706-ee15-4947-93f8-8c260e64795e
        - $ref: '#/components/schemas/employee-employments-1.0.0_put_request'
    employee-employments-1.0.0_put_response:
      $ref: '#/components/schemas/employee-employments-1.0.0_get_response'
    employee-employments-batch-1.0.0_post_request:
      type: object
      properties:
        items:
          title: items
          description: List of items to be processed.
          type: array
          items:
            type: object
            oneOf:
              - $ref: "#/components/schemas/employee-employments-1.0.0_post_request"
              - $ref: "#/components/schemas/employee-employments-1.0.0_put_request_batch"
      required:
        - items
    employee-employments-batch-1.0.0_post_response:
      description: 'Returns the list of Ids for those employee employments that were successfully created. For those that did not, it returns the list of error messages.'
      type: object
      x-last-modified:
      properties:
        id:
          title: ID
          description: A globally unique identifier of a batch to be used in all external references.
          type: string
          example: 085df706-ee15-4947-93f8-8c260e64795e
        status:
          title: status
          description: status of the batch.
          type: string
          enum:
            - completed
            - inProgress
            - aborted
          example: completed
        resource:
          title: Resource
          description: The affected resource.
          type: object
          properties:
            name:
              title: Resource Name
              description: The pluralized name of the affected resource
              type: string
              example: employee-employments
            version:
              title: Resource version
              description: The version of the resource
              type: string
              example: 1.0.0
          additionalProperties: false
          required:
            - name
            - version
        items:
          type: array
          items:
            type: object
            additionalProperties: true
            oneOf:
              - $ref: '#/components/schemas/employee-employments-1.0.0_get_response'
              - $ref: '#/components/schemas/errors_2_0_0'
            required:
              - items
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
    person:
      title: Person
      description: A reference to link the common persons entity for the employee.
      type: object
      properties:
        id:
          title: ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value