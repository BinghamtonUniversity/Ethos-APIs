openapi: 3.0.0
info:
  title: Section Bases
  description: >
  
    The Section Bases API returns section details using a combination of term and course reference number 
    as seen on the SSASECT administrative page. For Open Learning Registration sections, it also 
    returns schedule processing rules as shown on SSARULE.

    
    In addition to the base section (SSBSECT) details, meeting (SSRMEET), instructor (SIRASGN), 
    meeting partition (SSRMPRT), meeting room definition (SSRMRDF), reserved seats (SSRRESV), 
    section partition (SSRSPRT) and section room attribute (SSRSRDF) preference records attached 
    to the base section record are returned in the response.  For Open Learning Registration sections,
    the registration status codes (SSRRSTS) and associated extension processing (SSREXTN) and refunding 
    rules (SSRRFND) are also returned.  

    
    When the Seat Mangement service is enabled, the service for the seat availability is authoritative.
      - If the seat management service is enabled (row exists in SOBREST for XREG with a time out value > 0), the seat management service will be called for the number of registered students (including those whose status is pending), and SSRSEAW will be queried for the number of students on the wait list.
      - If the seat management service is not enabled, but the seat assignment feature is (SSBSEAT_ENABLE_IND = Y), the seat assignment tables SSRSEAT and SSRSEAW will be queried for the number of registered students, and those on the wait list.
      - If neither the seat management service, nor the seat assignment feature are enabled, then use the section table SSBSECT for the number of registered and wait listed students.


    Base section details can be created or updated using section-bases-submission-process.  
    
    
    Section meeting records can be created, updated or deleted using section-meetings.  
    
    
    Instructors for a specific CRN can be managed using section-instructional-assignments-adjustment-process.


  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SSASECT, SSARULE
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /qapi/section-bases:
    post:
      tags:
      - section-bases QAPI
      summary: Returns resources from SSBSECT, SSRMEET, SIRASGN, SSRMPRT, SSRMRDF, SSRRESV, SSRSPRT, SSRSRDF, SSRRSTS, SSREXTN or SSRRFND. 

      description: >
        Queries for the requested resource using a set of attributes provided in the post
        request body.  Please note the path to the server is overridden to use /qapi/{resource} 
        in the URL and not /api/{resource}.
        
        
        Returns the SSBSECT record meeting the required submitted criteria of term and crn. Any SSRMEET, SIRASGN, SSRMPRT, SSRMRDF, 
        SSRRESV, SSRSPRT, SSRSRDF, SSRRSTS, SSREXTN or SSRRFND records associated with the base section record are also returned in the response.        
          
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string     
        - name: limit
          in: query
          description:  |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer

        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer                     
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/section-bases-1.0.0_qapi_post_request"
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/section-bases-1.0.0_qapi_post_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client’s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_SECTION_BASES
components:
  schemas:
    section-bases-1.0.0_qapi_post_request:
      type: object
      required:
        - term        
      properties:              
        term:
          title: Term
          maxLength: 6
          type: string
          description: "A user provided value. The term code is used to retrieve the section details that are equal to the provided value."         
          x-lineageLookupReferenceObject: STVTERM
          example: 202201    
        crn: 
          title: Course Reference Number
          maxLength: 5
          type: string
          description: "The Course Reference Number (CRN) assigned to this course section."
          x-lineageReferenceObject: SSBSECT_CRN
          example: 1001        
        subject:
          title: Subject Code
          maxLength: 4
          type: string
          description: "Subject area of the course section."
          x-lineageReferenceObject: SSBSECT_SUBJ_CODE
          x-lineageLookupReferenceObject: STVSUBJ         
          example: NURS  
        courseNumber:
          title: Course Number
          maxLength: 5
          type: string
          description: "Course number associated with the subject for the section."
          x-lineageReferenceObject: SSBSECT_CRSE_NUMB         
          example: 100   
        crosslistGroup:
          title: Crosslist Group
          maxLength: 15
          type: string
          description: "Identifier of the crosslist group."
          x-lineageReferenceObject: SSBXLST_XLST_GROUP         
          example: JF      
        status:
          title: Status Code
          maxLength: 1
          type: string
          description: "The status of the section."
          x-lineageReferenceObject: SSBSECT_SSTS_CODE
          x-lineageLookupReferenceObject: STVSSTS             
          example: A     
        campus:
          title: Campus Code
          maxLength: 3
          type: string
          description: "Campus on which the section is scheduled."
          x-lineageReferenceObject: SSBSECT_CAMP_CODE
          x-lineageLookupReferenceObject: STVCAMP             
          example: M                         
        scheduleType:
          title: Schedule Type Code
          maxLength: 3
          type: string
          description: "Schedule type defined for the section."
          x-lineageReferenceObject: SSBSECT_SCHD_CODE 
          x-lineageLookupReferenceObject: STVSCHD                              
          example: LR   
        instructionalMethod:
          title: Instructional Method Code
          maxLength: 5
          type: string
          description: "Method used to deliver the course to the learner."
          x-lineageReferenceObject: SSBSECT_INSM_CODE 
          x-lineageLookupReferenceObject: GTVINSM                              
          example: CLASS                              
        integrationPartner:
          title: Integration Partner System Code
          maxLength: 5
          type: string
          description: "The code used to identify a partner system."
          x-lineageReferenceObject: SSBSECT_INTG_CDE 
          x-lineageLookupReferenceObject: GORINTG                              
          example: B   
        session:
          title: Session Code
          maxLength: 1
          type: string
          description: "The session in which the section is scheduled."
          x-lineageReferenceObject: SSBSECT_SESS_CODE
          x-lineageLookupReferenceObject: STVSESS             
          example: 1              
        attribute:
          title: Attribute Code
          maxLength: 4
          type: string
          description: "Student attribute associated with the section for the reserved seats rule."
          x-lineageReferenceObject: SSRRESV_ATTS_CODE
          x-lineageLookupReferenceObject: STVATTS             
          example: 01             
        partOfTerm:
          title: Part of Term Code
          maxLength: 3
          type: string
          description: "The part of term in which the section is offered."
          x-lineageReferenceObject: SSBSECT_PTRM_CODE
          x-lineageLookupReferenceObject: STVPTRM             
          example: 1 
        registrationStartOn:
          title: Registration Start Date
          type: string
          format: date
          description: "First date that registration is open to the learner for this section for an open learning course."
          x-lineageReferenceObject: SSBSECT_REG_FROM_DATE
          example: 2021-07-05    
        registrationEndOn:
          title: Registration End Date
          type: string
          format: date
          description: "Last date that registration is open to the learner for this section for an open learning course."
          x-lineageReferenceObject: SSBSECT_REG_TO_DATE
          example: 2021-08-05                  
        enrollmentMaximum:
          title: Enrollment Maximum
          maxLength: 4
          type: number
          description: "Maximum enrollment for the section."
          x-lineageReferenceObject: SSBSECT_MAX_ENRL
          example: 25                      
    section-bases-1.0.0_qapi_post_response:
      type: object
      required:
        - term  
        - crn  
        - sectionScheduleDetails    
      properties:
        term:
          title: Term
          maxLength: 6
          type: string
          description: "The term code for the set of base section details."         
          x-lineageLookupReferenceObject: STVTERM
          example: 202201    
        crn: 
          title: Course Reference Number
          maxLength: 5
          type: string
          description: "The Course Reference Number (CRN) assigned to this course section."
          x-lineageReferenceObject: SSBSECT_CRN
          example: 1001     
        sectionScheduleDetail:
          title: Schedule Detail
          type: object     
          required:  
            - classTypeDetails 
            - sectionEnrollmentDetails
            - subject
            - courseNumber
            - section
            - campus
            - status
            - scheduleType  
            - enrollmentMaximum
            - waitlistMaximum  
            - anticipatedEnrollment
            - censusOneOn                                     
          properties:           
            modifiedOn:
              title: Modified On
              maxLength: 11
              type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              description: "Most current date the record was created or changed."
              x-lineageReferenceObject: SSBSECT_ACTIVITY_DATE
              example: 2023-07-25T07:27:10Z   
            modifiedBy:
              title: Modified By User ID
              maxLength: 30
              type: string
              description: "User who inserted or last updated the data."
              x-lineageReferenceObject: SSBSECT_USER_ID
              example: SAISUSR                 
            subject:
              title: Subject Code
              maxLength: 4
              type: string
              description: "Subject area of the course section."
              x-lineageReferenceObject: SSBSECT_SUBJ_CODE
              x-lineageLookupReferenceObject: STVSUBJ         
              example: NURS
            subjectDescription:
              title: Subject Code Description
              maxLength: 30
              type: string
              description: "Description of the subject code."
              x-lineageReferenceObject: STVSUBJ_DESC
              example: Nursing
            courseNumber:
              title: Course Number
              maxLength: 5
              type: string
              description: "Course number associated with the subject for the section."
              x-lineageReferenceObject: SSBSECT_CRSE_NUMB         
              example: 1001  
            shortTitle:
              title: Short Title
              maxLength: 30
              type: string
              description: "Short title of the section."
              x-lineageReferenceObject: derived    
              x-lineageDerivedLogic: SSBSECT_CRSE_TITLE if populated, but if SSBSECT_CRSE_TITLE is null then display SCBCRSE_TITLE.
              example: Intro to Prof Nursing I    
            section:
              title: Section Number
              maxLength: 3
              type: string
              description: "Section number associated with a subject/course combination. A section number can be used only one time to identify a subject/course number combination in a term, with the exception of 0 (zero). 0 can be shared by multiple sections."
              x-lineageReferenceObject: SSBSECT_SEQ_NUMB         
              example: 1   
            crosslistGroup:
              title: Crosslist Group
              maxLength: 15
              type: string
              description: "Identifier of the crosslist group."
              x-lineageReferenceObject: SSBXLST_XLST_GROUP         
              example: JF                                                                                    
            status:
              title: Status Code
              maxLength: 1
              type: string
              description: "The status of the section."
              x-lineageReferenceObject: SSBSECT_SSTS_CODE
              x-lineageLookupReferenceObject: STVSSTS             
              example: A 
            statusDescription:
              title: Status Code Description
              maxLength: 30
              type: string
              description: "The description of the section status."
              x-lineageReferenceObject: STVSSTS_DESC
              example: Active   
            campus:
              title: Campus Code
              maxLength: 3
              type: string
              description: "Campus on which the section is scheduled."
              x-lineageReferenceObject: SSBSECT_CAMP_CODE
              x-lineageLookupReferenceObject: STVCAMP             
              example: M
            campusDescription:
              title: Campus Code Description
              maxLength: 30
              type: string
              description: "The description of the campus code."
              x-lineageReferenceObject: STVCAMP_DESC
              example: Main                     
            scheduleType:
              title: Schedule Type Code
              maxLength: 3
              type: string
              description: "Schedule type defined for the section."
              x-lineageReferenceObject: SSBSECT_SCHD_CODE 
              x-lineageLookupReferenceObject: STVSCHD                              
              example: LR
            scheduleTypeDescription:
              title: Schedule Type Code Description
              maxLength: 30
              type: string
              description: "Description of the Schedule Type Code."
              x-lineageReferenceObject: STVSCHD_DESC            
              example: Lecture with Recitation                  
            instructionalMethod:
              title: Instructional Method Code
              maxLength: 5
              type: string
              description: "Method used to deliver the course to the learner."
              x-lineageReferenceObject: SSBSECT_INSM_CODE 
              x-lineageLookupReferenceObject: GTVINSM                              
              example: CLASS  
            instructionalMethodDescription:
              title: Instructional Method Code Description
              maxLength: 30
              type: string
              description: "Description of the Instructional Method Code."
              x-lineageReferenceObject: GTVINSM_DESC            
              example: Classroom Based   
            integrationPartner:
              title: Integration Partner System Code
              maxLength: 5
              type: string
              description: "The code used to identify a partner system."
              x-lineageReferenceObject: SSBSECT_INTG_CDE 
              x-lineageLookupReferenceObject: GORINTG                              
              example: B  
            integrationPartnerDescription:
              title: Integration Partner System Description
              maxLength: 30
              type: string
              description: "Description of the integration partner system code."
              x-lineageReferenceObject: GORINTG_DESC            
              example: Blackboard Integration   
            gradingMode:
              title: Grading Mode Code
              maxLength: 1
              type: string
              description: "The grading mode defined for the section."
              x-lineageReferenceObject: SSBSECT_GMOD_CODE
              x-lineageLookupReferenceObject: STVGMOD             
              example: D        
            gradingModeDescription:
              title: Grading Mode Code Description
              maxLength: 30
              type: string
              description: "Description of the grading mode code. "
              x-lineageReferenceObject: STVGMOD_DESC
              example: Standard Letter
            session:
              title: Session Code
              maxLength: 1
              type: string
              description: "The session in which the section is scheduled."
              x-lineageReferenceObject: SSBSECT_SESS_CODE
              x-lineageLookupReferenceObject: STVSESS             
              example: 1        
            sessionDescription:
              title: Session Code Description
              maxLength: 30
              type: string
              description: "Description of the session code."
              x-lineageReferenceObject: STVSESS_DESC
              example: Daytime  
            specialApproval:
              title: Special Approval Code
              maxLength: 2
              type: string
              description: "The special approval a student must have to register."
              x-lineageReferenceObject: SSBSECT_SAPR_CODE
              x-lineageLookupReferenceObject: STVSAPR             
              example: A      
            specialApprovalDescription:
              title: Special Approval Code Description
              maxLength: 30
              type: string
              description: "Description of the special approval code."
              x-lineageReferenceObject: STVSAPR_DESC
              example: Advisor                                                                                                                                                                                              
            classTypeDetails:
              title: Class Type Details
              type: object         
              oneOf:
              - title: Traditional Class
                type: object
                properties:
                  partOfTerm:
                    title: Part of Term Code
                    maxLength: 3
                    type: string
                    description: "The part of term in which the section is offered."
                    x-lineageReferenceObject: SSBSECT_PTRM_CODE
                    x-lineageLookupReferenceObject: STVPTRM             
                    example: 1       
                  partOfTermDescription:
                    title: Part of Term Code Description
                    maxLength: 30
                    type: string
                    description: "Description of the part of term code."
                    x-lineageReferenceObject: STVPTRM_DESC
                    example: Full Term   
                  partOfTermStartOn:
                    title: Part of Term Start Date
                    type: string
                    format: date
                    description: "The starting date of the part of term."
                    x-lineageReferenceObject: SSBSECT_PTRM_START_DATE
                    example: 2021-08-15    
                  partOfTermEndOn:
                    title: Part of Term End Date
                    type: string
                    format: date
                    description: "The starting date of the part of term."
                    x-lineageReferenceObject: SSBSECT_PTRM_END_DATE
                    example: 2021-12-20   
                  partOfTermNumberOfWeeks:
                    title: Part of Term Number of Weeks
                    maxLength: 3
                    multipleOf: 0.001
                    type: number
                    description: "Number of weeks in the part of term."
                    x-lineageReferenceObject: SSBSECT_PTRM_WEEKS    
                    example: 19                      
              - title: Open Learning Class
                type: object
                properties:
                  registrationStartOn:
                    title: Registration Start Date
                    type: string
                    format: date
                    description: "First date that registration is open to the learner for this section for an open learning course."
                    x-lineageReferenceObject: SSBSECT_REG_FROM_DATE
                    example: 2021-07-05    
                  registrationEndOn:
                    title: Registration End Date
                    type: string
                    format: date
                    description: "Last date that registration is open to the learner for this section for an open learning course."
                    x-lineageReferenceObject: SSBSECT_REG_TO_DATE
                    example: 2021-08-05  
                  learnerStartOn:
                    title: Learner Start Date
                    type: string
                    format: date
                    description: "First date that the learner can start taking the course. "
                    x-lineageReferenceObject: SSBSECT_LEARNER_REGSTART_FDATE
                    example: 2021-08-15    
                  learnerEndOn:
                    title: Learner End Date
                    type: string
                    format: date
                    description: "Last date that the learner can start taking the course. "
                    x-lineageReferenceObject: SSBSECT_LEARNER_REGSTART_TDATE
                    example: 2021-09-15                        
                  maximumExtensions:
                    title: Maximum Extensions
                    maxLength: 3
                    type: number
                    description: Maximum number of extensions permitted for this open learning section for a learner who is actively registered."
                    x-lineageReferenceObject: SSBSECT_NUMBER_OF_EXTENSIONS    
                    example: 3     
                  durationUnit:
                    title: Duration Unit Code
                    maxLength: 4
                    type: string
                    description: "The duration for which the section is offered (e.g. week, day, month, etc.)."
                    x-lineageReferenceObject: SSBSECT_DUNT_CODE
                    x-lineageLookupReferenceObject: GTVDUNT             
                    example: Week       
                  durationUnitDescription:
                    title: Duration Unit Code Description
                    maxLength: 30
                    type: string
                    description: "Description of the duration unit code."
                    x-lineageReferenceObject: GTVDUNT_DESC
                    example: Weeks         
                  durationNumberOfUnits:
                    title: Duration Number of Units
                    maxLength: 7
                    type: number             
                    description: "The total number of times the duration unit extends."
                    x-lineageReferenceObject: SSBSECT_NUMBER_OF_UNITS          
                    example: 19      
                  canOverrideDuration:
                    title: Schedule Duration Override Indicator
                    type: boolean
                    description: "Indicates that students are allowed to enter their start and end-dates with a non-fixed duration when registering."
                    x-lineageReferenceObject: SSBSECT_OVERRIDE_DUR_IND
                    example: true       
            creditCeuHours:
              title: Credit/CEU Hours
              type: object         
              oneOf:
              - title: Section Hours
                type: object
                properties:     
                  creditCeuHours:
                    title: Credit/CEU Hours
                    maxLength: 7
                    type: number
                    description: "The credit/CEU hours specific to this section."
                    x-lineageReferenceObject: SSBSECT_CREDIT_HRS    
                    example: 5                        
              - title: Course Hours
                type: object
                properties:                                                             
                  creditCeuHoursConnector:
                    title: Credit/CEU Hours Connector
                    maxLength: 2
                    type: string
                    description: "This property defines whether the course is offered for variable credit. OR/TO is used to specify the relationship between minimum and maximum credit hours values."
                    x-lineageReferenceObject: SCBCRSE_CREDIT_HR_IND           
                    example: TO        
                  creditCeuHoursMinimum:
                    title: Credit/CEU Hours Minimum
                    maxLength: 7
                    type: number
                    description: "The minimum number of credits/CEU hours for which a course is offered. Credit/CEU hour values will control the number of credit/CEU hours for which sections can be scheduled and for which students may register."
                    x-lineageReferenceObject: SCBCRSE_CREDIT_HR_LOW    
                    example: 3  
                  creditCeuHoursMaximum:
                    title: Credit/CEU Hours Maximum
                    maxLength: 7
                    type: number
                    description: "This property is either a second valid credit/CEU hour value or the maximum credit/CEU hour value within a range."
                    x-lineageReferenceObject: SCBCRSE_CREDIT_HR_HIGH    
                    example: 6       
            lectureHours:
              title: Lecture Hours
              type: object         
              oneOf:
              - title: Section Hours
                type: object
                properties: 
                  lectureHours:
                    title: Lecture Hours
                    maxLength: 9
                    type: number
                    description: "The lecture hours specific to this section."
                    x-lineageReferenceObject: SSBSECT_LEC_HR    
                    example: 5                
              - title: Course Hours
                type: object
                properties:                                       
                  lectureHoursConnector:
                    title: Lecture Hours Connector
                    maxLength: 2
                    type: string
                    description: "This property defines whether the course is offered for variable lecture hours. OR/TO is used to specify the relationship between the minimum and maximum lecture hour values."
                    x-lineageReferenceObject: SCBCRSE_LEC_HR_IND           
                    example: TO        
                  lectureHoursMinimum:
                    title: Lecture Hours Minimum
                    maxLength: 7
                    type: number
                    description: "The minimum number of lecture hours for which a course is offered."
                    x-lineageReferenceObject: SCBCRSE_LEC_HR_LOW    
                    example: 2  
                  lectureHoursMaximum:
                    title: Lecture Hours Maximum
                    maxLength: 7
                    type: number
                    description: "This property is either a second valid lecture hour value or the maximum lecture hour value within a range."
                    x-lineageReferenceObject: SCBCRSE_LEC_HR_HIGH    
                    example: 4  
            labHours:
              title: Lab Hours
              type: object         
              oneOf:
              - title: Section Hours
                type: object
                properties:    
                  labHours:
                    title: Lab Hours
                    maxLength: 9
                    type: number
                    description: "The lab hours specific to this section."
                    x-lineageReferenceObject: SSBSECT_LAB_HR    
                    example: 5                     
              - title: Course Hours
                type: object
                properties:                                                            
                  labHoursConnector:
                    title: Lab Hours Connector
