components:
  schemas:
    faculty-non-instructional-assignments-1.0.0_qapi_post_request:
      type: object        
      properties:              
        bannerId:
          title: Banner ID
          maxLength: 9
          type: string
          description: "Faculty Member ID"
          x-lineageReferenceObject: SPRIDEN_ID
          example: 210009506
        term:
          title: Term
          maxLength: 6
          type: string
          description: "A user provided value. The query term code is used to retrieve the most current faculty non-instructional assignment details that are less than, or equal to, the provided value."         
          x-lineageReferenceObject: SIRNIST_TERM_CODE
          x-lineageLookupReferenceObject: STVTERM
          example: 199510    
        nonInstructionalType:
          title: Non-Instructional Type Code
          maxLength: 4
          type: string
          description: "The non-instructional type code."
          x-lineageReferenceObject: SIRNIST_NIST_CODE
          x-lineageLookupReferenceObject: STVNIST
          example: CHR
        personId:
          title: Person Globally Unique Identifier
          description: "Globally unique identifer of a person."
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$          
          x-lineageReferenceObject: GORGUID_GUID
          x-lineageLookupReferenceObject: persons
          example: 85jklw52-4g71-0915-001b-657bb0e5789z   
          maxLength: 36
    faculty-non-instructional-assignments-1.0.0_response:
      type: object
      required:
        - id
        - bannerId
        - term
      properties:
        id:
          title: ID
          description: "The global identifier of a faculty non-instructional assignment to be used in all external references to the non-instructional assignment."
          type: string
          format: guid
          x-lineageReferenceObject: SIRNIST_GUID
          example: ee711196-0211-483e-b73c-511af692e532
        bannerId:
          title: Banner Id
          maxLength: 9
          type: string
          description: "Faculty Member ID"
          x-lineageReferenceObject: SPRIDEN_ID
          example: 210009506
        personId:
          title: Person Globally Unique Identifier
          description: "Globally unique identifer of a person."
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$          
          x-lineageReferenceObject: GORGUID_GUID
          x-lineageLookupReferenceObject: persons
          example: 85jklw52-4g71-0915-001b-657bb0e5789z   
          maxLength: 36 
        term:
          title: Term
          maxLength: 6
          type: string
          description: "The term code for the faculty non-instructional assignment."         
          x-lineageReferenceObject: SIRNIST_TERM_CODE
          x-lineageLookupReferenceObject: STVTERM
          example: 199510   
        nonInstructionalType:
          title: Non-Instructional Type Code
          maxLength: 4
          type: string
          description: "The non-instructional type code."
          x-lineageReferenceObject: SIRNIST_NIST_CODE
          x-lineageLookupReferenceObject: STVNIST
          example: CHR
        nonInstructionalTypeDescription:
          title:  Non-Instructional Type Code Description
          maxLength: 30
          type: string
          description: "Description of the non-instructional type code."
          x-linegeReferenceObject: STVNIST_DESC
          example: Chairperson 
        workload:
          title: Workload
          maxLength: 9
          multipleOf: 0.001
          type: number
          description: "The workload for the non-instructional assignment."
          x-lineageReferenceObject: SIRNIST_NIST_WORKLOAD                                
          example: 15.000 
        weeklyHours:
          title: Weekly Hours
          maxLength: 9
          multipleOf: 0.001
          type: number
          description: "The weekly contact hours for the non-instructional assignment."
          x-lineageReferenceObject: SIRNIST_WEEKLY_HRS                              
          example: 5.000    
        college:
            title: College Code
            maxLength: 2
            type: string
            description: "The college code for the non-instructional assignment."
            x-lineageReferenceObject: SIRNIST_COLL_CODE
            x-lineageLookupReferenceObject: STVCOLL
            example: 01
        collegeDescription: 
          title: College Code Description
          maxLength: 30
          type: string
          description: "The description of the college code."
          x-lineageReferenceObject: STVCOLL_DESC
          example: School of Behavioral Sciences
        department:
          title: Department Code
          maxLength: 4
          type: string
          description: "The department code for the non-instructional assignment."
          x-lineageReferenceObject: SIRNIST_DEPT_CODE
          x-lineageLookupReferenceObject: STVDEPT
          example: 002
        departmentDescription: 
          title: Department Code Description
          maxLength: 30
          type: string
          description: "The description of the department code."
          x-lineageReferenceObject: STVDEPT_DESC
          example: Biological Sciences
        programTaxomony:
          title: Program Taxonomy
          maxLength: 6
          type: string
          description: "The taxomony of the program code."
          x-lineageReferenceObject: SIRNIST_TOPS_CODE
          x-lineageLookupReferenceObject: STVTOPS
          example: MISONE
        programTaxonomyDescription:
          title: ProgramTaxonomy Description
          maxLength: 30
          type: string
          description: "The description of the program taxonomy."
          x-lineageReferenceObject: STVTOPS_DESC
          example: Cal MIS One Test
        contractType:
          title: Contract Type Code
          maxLength: 2
          type: string
          description: "The contract type of the non-instructional assignment."
          x-lineageReferenceObject: SIRNIST_FCNT_CODE                          
          example: 1 
        assignmentType:
          title: Assignment Type Code
          maxLength: 6
          type: string
          description: "The assignment type of the non-instructional assignment."
          x-lineageReferenceObject: SIRNIST_ASTY_CODE
          x-lineageLookupReferenceObject: STVASTY            
          example: ASPROF 
        assignmentTypeDescription:
          title: Assignment Type Code Description
          maxLength: 30
          type: string
          description: "The description of the assignment type code."
          x-lineageReferenceObject: STVASTY_DESC
          example: Associate Professor  
        position: 
          title: Position Number
          maxLength: 6
          type: string
          description: "The position number for the non-instructional assignment."
          x-lineageReferenceObject: SIRNIST_POSN
          example: 234512 
        suffix: 
          title: Position Number Suffix
          maxLength: 2
          type: string
          description: "The position number suffix."
          x-lineageReferenceObject: SIRNIST_SUFF
          example: 00                             
        overrideConflict: 
          title: Faculty Conflict Load Override Indicator
          maxLength: 1
          type: string
          description: "Indicates an override of faculty load limit error. Valid values: W = Warning, U = User Override."
          x-lineageReferenceObject: SIRNIST_LOAD_OVERRIDE_IND
          x-product-region: CalB-Stu
          example: U
        overrideSource: 
          title: Faculty Conflict Load Override Source
          maxLength: 10
          type: string
          description: "Indicates an override source of faculty load limit error.  Valid values: ID = Faculty ID/Term-Specific Load Limit or TYPE = Staff type's limit."
          x-lineageReferenceObject: SIRNIST_LOAD_OVERRIDE_SOURCE
          x-lineageLookupReferenceObject: STVLOLI_LOAD_LIMIT
          x-product-region: CalB-Stu
          example: ID
        modifiedOn:
          title: Modified On
          maxLength: 11
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          description: "Most current date the record was created or changed."
          x-lineageReferenceObject: SIRNIST_ACTIVITY_DATE
          example: 2024-05-05T04:00:00Z   
        modifiedBy:
          title: Modified By User ID
          maxLength: 30
          type: string
          description: "User who inserted or last updated the data."
          x-lineageReferenceObject: SIRNIST_USER_ID
          example: SYSTEST08                                                                                                                                                                                                                  
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
              type: object
              properties:
                id:
                  type: string
                  description: The global identifier of the resource in error.
                sourceId:
                  type: string
                  description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
                code:
                  type: string
                  description: The error message code used to describe the error details.
                description:
                  type: string
                  description: The error description used to describe the error details.
                message:
                  type: string
                  description: The detailed actionable error message.
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic 