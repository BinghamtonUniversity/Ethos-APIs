        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Aid Year (minimum criteria)

            Returns all records for the Aid Year passed.

            ```

            /student-work-study-pay-adjustments?criteria={"aidYear":"2224"}

            ```

            ### Aid Year and Banner Id

            Returns all records for the Aid Year and Banner ID passed.

            ```

            /student-work-study-pay-adjustments?criteria={"aidYear":"2224","bannerId":"231387509"}

            ```

            ### Aid Year and Pay Period End Date

            Returns all records for the Aid Year and Pay Period End Date passed.

            ```

            /student-work-study-pay-adjustments?criteria={"aidYear":"2224","payEndOn":"2024-09-01"}

            ```

            ### Aid Year and Award Period

            Returns all records for the Aid Year and Award Period passed.

            ```

            /student-work-study-pay-adjustments?criteria={"aidYear":"2224","awardPeriod":"202410"}

            ```
            


      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
