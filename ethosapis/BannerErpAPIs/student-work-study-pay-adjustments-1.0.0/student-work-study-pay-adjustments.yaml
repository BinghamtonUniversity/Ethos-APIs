components:
  schemas:
    student-work-study-pay-adjustments-1.0.0_post_request:
      properties:
        aidYear:
          title: Aid Year
          maxLength: 4
          type:  string
          example: 2324
          description: The Aid Year associated with the pay record.
          x-lineageReferenceObject:  RJRSEWH_AIDY_CODE
          x-lineageLookupReferenceObject: ROIAIDY   
        payEndOn:
          title: Pay Period End Date
          maxLength: 10
          type: string
          format: date
          pattern: "^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$"
          example: "2024-05-01"
          description: The date the pay period ended.
        awardPeriod:
          title: Award Period
          maxLength: 15
          type: string
          example: 202410
          description: The period associated with the student employment work history.
          x-lineageReferenceObject: RJRSEWH_PERIOD 
          x-lineageLookupReferenceObject: ROIPRDS    
        placement:
          title: Placement Code
          maxLength: 6
          type: string
          example: FINAID
          description: The placement location or department associated with the student work assignment. 
            Will default from the student employment authorization if not specified.
          x-lineageReferenceObject: RJRSEAR_PLACE_CDE 
          x-lineageLookupReferenceObject: RJBPLBD            
        bannerId:
          title:  Banner ID
          maxLength: 9
          type:  string
          description:  The Banner ID of the student employee.
          x-lineageReferenceObject:  SPRIDEN_ID
          example: A02444709 
        jobPosition:
          title:  Job Position
          maxLength:  6
          type:  string
          example: 000492
          description: The position associated with the earnings for the student work assignment.
          x-lineageReferenceObject:  RJRSEWH_POSN
          x-lineageLookupReferenceObject: RJRSEAR_POSN
        jobSuffix:
          title:  Job Suffix
          maxLength: 2
          type:  string
          example: 01
          description: The suffix associated with the position. Will default from the student employment authorization if not specified.
          x-lineageReferenceObject:  RJRSEWH_SUFF
          x-lineageLookupReferenceObject: RJRSEAR_SUFF          
        adjustment:
          title: Pay Adjustment
          description: Pay Adjustment for a student employee.
          oneOf:
            - title: Hourly Pay Adjustment
              description:  For students whose Job Title is Hourly (RJBJOBT_HRLY_PAY_IND = Y), provide Hours Worked or 
                Transaction Amount. Hours Worked will be multiplied by the Pay Rate to calculate the Transaction 
                Amount. Transaction Amount will be divide by the Pay Rate to calculate the Hours Worked. Pay rate 
                defined on the student employment authorization is used for this calculation.
              type: object
              required: 
              - transactionAmount
              properties:
                transactionAmount:
                  title:  Transaction Amount
                  maxLength:  11
                  type:  number
                  multipleOf: 0.01
                  example: 2000.42
                  description:  Amount of the earnings.
                  x-lineageReferenceObject:  RJRSEWH_AMT  
            - title: Hourly Pay Adjustment
              description:  For students whose Job Title is Hourly (RJBJOBT_HRLY_PAY_IND = Y), provide Hours Worked or 
                Transaction Amount. Hours Worked will be multiplied by the Pay Rate to calculate the Transaction 
                Amount. Transaction Amount will be divide by the Pay Rate to calculate the Hours Worked. Pay rate 
                defined on the student employment authorization is used for this calculation.
              type: object
              required: 
              - hoursWorked
              properties:
                hoursWorked:
                  title:  Hours Worked
                  maxLength:  6
                  type:  number
                  example: 40
                  description:  Hours the student worked.
                  x-lineageReferenceObject:  RJRSWH_HRS
            - title: Non-Hourly Pay Adjustment
              description:  For students whose Job Title is Non-Hourly (RJBJOBT_HRLY_PAY_IND = N), provide
                the Transaction Amount. 
              type: object
              required:
              - transactionAmount
              properties:     
                transactionAmount:
                  title:  Transaction Amount
                  maxLength:  11
                  type:  number
                  multipleOf: 0.01
                  example: 100
                  description:  Amount of the earnings.
                  x-lineageReferenceObject:  RJRSEWH_AMT     
                hoursWorked:
                  title:  Hours Worked
                  maxLength:  6
                  type:  number
                  example: 40
                  description:  Hours the student worked.
                  x-lineageReferenceObject:  RJRSWH_HRS                  
      required:
        - aidYear
        - awardPeriod
        - payEndOn
        - adjustment   
        - bannerId     
        - jobPosition  
    student-work-study-pay-adjustments-1.0.0_response:
      type: object
      required: 
        - id
        - aidYear
        - awardPeriod
        - payEndOn   
        - bannerId     
        - jobPosition 
        - transactionAmount
      properties:
        id:
          title: Id
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$          
          maxLength: 36
          description: "The global identifier of the work study pay adjustment."
          x-lineageReferenceObject: RJRSEWH_GUID
          example: 49eqfc68-3t89-4036-852c-341aa9d8501a      
        aidYear:
          title: Aid Year
          maxLength: 4
          type:  string
          example: 2324
          description: The Aid Year associated with the pay record.
          x-lineageReferenceObject:  RJRSEWH_AIDY_CODE
          x-lineageLookupReferenceObject: ROIAIDY   
        bannerId:
          title:  Banner ID
          maxLength: 9
          type:  string
          description:  The Banner ID of the student employee.
          x-lineageReferenceObject:  SPRIDEN_ID
          example: A02444709 
        jobPosition:
          title:  Job Position
          maxLength:  6
          type:  string
          example: 000492
          description: The position associated with the earnings for the student work assignment.
          x-lineageReferenceObject:  RJRSEWH_POSN
          x-lineageLookupReferenceObject: RJRSEAR_POSN
        jobSuffix:
          title:  Job Suffix
          maxLength: 2
          type:  string
          example: 01
          description: The suffix associated with the position. 
          x-lineageReferenceObject:  RJRSEWH_SUFF
          x-lineageLookupReferenceObject: RJRSEAR_SUFF
        placement:
          title: Placement Code
          maxLength: 6
          type: string
          example: FINAID
          description: The placement location or department associated with the student work assignment.
          x-lineageReferenceObject: RJRSEAR_PLACE_CDE 
          x-lineageLookupReferenceObject: RJBPLBD      
        placementDescription:
          title: Placement Code Description
          maxLength: 30
          type: string
          example: Financial Aid Office
          description: Description of the placement code. 
          x-lineageReferenceObject: RJBPLBD_PLACE_DESC               
        payEndOn:
          title: Pay Period End Date
          maxLength: 10
          type: string
          format: date
          pattern: "^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$"
          example: "2024-05-01"
          description: The date the pay period ended.
        awardPeriod:
          title: Award Period
          maxLength: 15
          type: string
          example: 202410
          description: The period associated with the student employment work history.
          x-lineageReferenceObject: RJRSEWH_PERIOD 
          x-lineageLookupReferenceObject: ROIPRDS          
        hoursWorked:
          title:  Hours Worked
          maxLength:  6
          type:  number
          example: 40
          description:  Hours the student worked.
          x-lineageReferenceObject:  RJRSWH_HRS
        payRate:
          title:  Pay Rate
          maxLength:  11
          type:  number
          multipleOf: 0.000001          
          example: 11.06
          description:  Rate of pay associated with the earnings.
          x-lineageReferenceObject:  RJRSEWH_RATE
          x-lineageLookupReferenceObject: RJRSEAR_PAY_RATE
        transactionAmount:
          title:  Transaction Amount
          maxLength:  11
          type:  number
          multipleOf: 0.01          
          example: 2000.42
          description:  Amount of the earnings.
          x-lineageReferenceObject:  RJRSEWH_AMT      
    student-work-study-pay-adjustments-batch-1.0.0_post_request:
      type: object
      properties:
        items:
          title: items
          description: List of items to be processed.
          type: array
          items:
            type: object
            $ref: "#/components/schemas/student-work-study-pay-adjustments-batch-1.0.0_post_items"
      required:
        - items    
    student-work-study-pay-adjustments-batch-1.0.0_post_items:
      type: object
      properties:
        aidYear:
          title: Aid Year
          maxLength: 4
          type:  string
          example: 2324
          description: The Aid Year associated with the pay record.
          x-lineageReferenceObject:  RJRSEWH_AIDY_CODE
          x-lineageLookupReferenceObject: ROIAIDY   
        payEndOn:
          title: Pay Period End Date
          maxLength: 10
          type: string
          format: date
          pattern: "^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$"
          example: "2024-05-01"
          description: The date the pay period ended.
        awardPeriod:
          title: Award Period
          maxLength: 15
          type: string
          example: 202410
          description: The period associated with the student employment work history.
          x-lineageReferenceObject: RJRSEWH_PERIOD 
          x-lineageLookupReferenceObject: ROIPRDS     
        placement:
          title: Placement Code
          maxLength: 6
          type: string
          example: FINAID
          description: The placement location or department associated with the student work assignment. Will default from the student employment authorization if not specified.
          x-lineageReferenceObject: RJRSEAR_PLACE_CDE 
          x-lineageLookupReferenceObject: RJBPLBD                
        bannerId:
          title:  Banner ID
          maxLength: 9
          type:  string
          description:  The Banner ID of the student employee.
          x-lineageReferenceObject:  SPRIDEN_ID
          example: A02444709 
        jobPosition:
          title:  Job Position
          maxLength:  6
          type:  string
          example: 000492
          description: The position associated with the earnings for the student work assignment.
          x-lineageReferenceObject:  RJRSEWH_POSN
          x-lineageLookupReferenceObject: RJRSEAR_POSN
        jobSuffix:
          title:  Job Suffix
          maxLength: 2
          type:  string
          example: 01
          description: The suffix associated with the position. Will default from the student employment authorization if not specified.
          x-lineageReferenceObject:  RJRSEWH_SUFF
          x-lineageLookupReferenceObject: RJRSEAR_SUFF              
        adjustment:
          title: Pay Adjustment
          description: Pay Adjustment for a student employee.
          oneOf:
            - title: Hourly Pay Adjustment
              description:  For students whose Job Title is Hourly (RJBJOBT_HRLY_PAY_IND = Y), provide Hours Worked or 
                Transaction Amount. Hours Worked will be multiplied by the Pay Rate to calculate the Transaction 
                Amount. Transaction Amount will be divide by the Pay Rate to calculate the Hours Worked. Pay rate 
                defined on the student employment authorization is used for this calculation.
              type: object
              required: 
              - transactionAmount
              properties:
                transactionAmount:
                  title:  Transaction Amount
                  maxLength:  11
                  type:  number
                  multipleOf: 0.01
                  example: 2000.42
                  description:  Amount of the earnings.
                  x-lineageReferenceObject:  RJRSEWH_AMT  
            - title: Hourly Pay Adjustment
              description:  For students whose Job Title is Hourly (RJBJOBT_HRLY_PAY_IND = Y), provide Hours Worked or 
                Transaction Amount. Hours Worked will be multiplied by the Pay Rate to calculate the Transaction 
                Amount. Transaction Amount will be divide by the Pay Rate to calculate the Hours Worked. Pay rate 
                defined on the student employment authorization is used for this calculation.
              type: object
              required: 
              - hoursWorked
              properties:
                hoursWorked:
                  title:  Hours Worked
                  maxLength:  6
                  type:  number
                  example: 40
                  description:  Hours the student worked.
                  x-lineageReferenceObject:  RJRSWH_HRS
            - title: Non-Hourly Pay Adjustment
              description:  For students whose Job Title is Non-Hourly (RJBJOBT_HRLY_PAY_IND = N), provide
                the Transaction Amount. 
              type: object
              required:
              - transactionAmount
              properties:     
                transactionAmount:
                  title:  Transaction Amount
                  maxLength:  11
                  type:  number
                  multipleOf: 0.01
                  example: 100
                  description:  Amount of the earnings.
                  x-lineageReferenceObject:  RJRSEWH_AMT     
                hoursWorked:
                  title:  Hours Worked
                  maxLength:  6
                  type:  number
                  example: 40
                  description:  Hours the student worked.
                  x-lineageReferenceObject:  RJRSWH_HRS 
      required:
        - aidYear
        - awardPeriod
        - payEndOn
        - adjustment   
        - bannerId     
        - jobPosition  
