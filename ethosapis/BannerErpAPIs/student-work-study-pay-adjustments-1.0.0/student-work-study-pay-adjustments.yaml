openapi: 3.0.0
info:
  title: Student Work Study Pay Adjustments
  description:  >
  
    The Student Work Study Pay Adjustments API is used to retrieve and maintain non-disburseable 
    student work pay adjustments as seen on the Banner administrative page RJASEME.  The API inserts records into the Student Employment 
    Work History Table (RJRSEWH) and triggers updates to: RPRAWRD, RPRATRM and RFRASPC.


    The API can only be used for non-disbursable funds (RFRASPC_DISBURSE_IND = N) 
    and WORK type funds (RFRBASE Fund Types where RTVFTYP_ATYP_IND = W).


    This API differs from federal-award-paid-totals as it does not allow the total of all funds
    throughout the year to be updated.  Instead, this API supports single pay period adjustments.

  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Financial Aid 
  x-source-name: RJRSEWH, RJRSEAR, RFRBASE, RFRASPC, RPRAWRD, RPRATRM
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: '{server_url}'
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-work-study-pay-adjustments:
