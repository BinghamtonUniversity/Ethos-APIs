openapi: 3.0.1
info:
  title: grade-entries
  description: >
    Updates student midterm and final grades and the last date of attendance
    based on course reference number, term and faculty id.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
  x-source-title: Grade Entries
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: grade-entries
paths:
  /api/grade-entries/1:
    put:
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_GRADE_ENTRIES
      tags:
        - grade-entries
      description: JSON-formatted string of data that contains the faculty __banner
        id__ or __source id__ with the course grade information
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version.
                        
            ```
             application/vnd.hedtech.integration.v1.0.0+json
             ```
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              type: object
              oneOf:
                - $ref: "#/components/schemas/grade-entries-1"
                - $ref: "#/components/schemas/grade-entries-2"
            examples:
              grade-entries:
                $ref: "#/components/examples/grade-entries"
          application/vnd.hedtech.integration.v1.0.0+xml:
            schema:
              type: object
              oneOf:
                - $ref: "#/components/schemas/grade-entries-1"
                - $ref: "#/components/schemas/grade-entries-2"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                oneOf:
                  - $ref: "#/components/schemas/grade-entries-response-1"
                  - $ref: "#/components/schemas/grade-entries-response-2"
              examples:
                grade-entries:
                  $ref: "#/components/examples/grade-entries-response"
            application/xml:
              schema:
                type: object
                $ref: "#/components/schemas/grade-entries-1"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
