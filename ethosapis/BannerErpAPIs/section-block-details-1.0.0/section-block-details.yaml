components:
  schemas:
    section-block-details-1.0.0_response:
      type: object
      required:
        - id
        - term
        - block
        - crn
      properties:
        id:
          title: ID
          description: "The global identifier of the section block detail resource."
          type: number
          format: guid
          x-lineageReferenceObject: SSRBLCK_GUID
          example: ee711196-0211-483e-b73c-511af692e532
        term:
          title: Term
          description: "The term code of the section block."
          maxLength: 6
          type: string
          x-lineageReferenceObject: SSRBLCK_TERM_CODE
          x-lineageLookupReferenceObject: STVTERM
          example: 202425
        block:
          title: Section Block Schedule Code
          description: "Code of the section block."
          maxLength: 10
          type: string
          x-lineageReferenceObject: SSRBLCK_BLCK_CODE
          x-lineageLookupReferenceObject: STVBLCK
          example: "AA-T-SOC"
        blockDescription:
          title: Section Block Schedule Code Description
          description: "Description of the section block code."
          maxLength: 30
          type: string
          x-lineageReferenceObject: STVBLCK_DESC
          example: "Sociology"
        crn:
          title: Section Course Reference Number
          maxLength: 5
          type: string
          description: "The Course Reference Number (CRN) of the section assigned to this section block schedule code."
          x-lineageReferenceObject: SSRBLCK_CRN
          example: 25001
        creditCeuHours:
          title: Credit/CEU Hours 
          description: "Credit/CEU hours associated with the CRN."
          maxLength: 7
          type: number
          multipleOf: 0.001
          x-lineageReferenceObject: derived
          x-lineageDerivedLogic: If populated, the API returns the credit hours value from SSRBLCK_CREDIT_HRS. If no value is present, SSBSECT_CREDIT_HRS is returned. If both are null, SCBCRSE_CREDIT_HR_LOW is returned.
          example: 3.000
        billingHours:
          title: Billing Hours 
          description: "Billing hours associated with the CRN."
          maxLength: 7
          type: number
          multipleOf: 0.001
          x-lineageReferenceObject: derived
          x-lineageDerivedLogic: If populated, the API returns the billing hours value from SSRBLCK_BILL_HRS. If no value is present, SSBSECT_BILL_HRS is returned. If both are null, SCBCRSE_BILL_HR_LOW is returned.
          example: 1.000
        gradingMode:
          title: Grading Mode Code 
          description: "Grading mode associated with the CRN."
          maxLength: 1
          type: string                
          x-lineageReferenceObject: derived
          x-lineageDerivedLogic: If populated, the API returns the grading mode from SSRBLCK_GMOD_CODE. If no value is present, SSBSECT_GMOD_CODE is returned. If both are null, SCRGMOD_GMOD_CODE where SCRGMOD_DEFAULT_IND = 'D' is returned.
          example: S
        requiresSpecialApproval:
          title: Requires Special Approval 
          description: "Indicates whether special approval is required for registration."
          type: boolean
          x-lineageReferenceObject: SSRBLCK_APPR_IND
          example: true
        modifiedOn:
          title: Activity Date
          description: "This field identifies the most recent date a record was created or updated."
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          x-lineageReferenceObject: SSRBLCK_ACTIVITY_DATE
          example: 2011-11-17 06:39:14.000
        modifiedBy:
          title: By User ID
          maxLength:  30
          type:  string
          description:  "User who inserted or last update the data."
          x-lineageReferenceObject: SSRBLCK_USER_ID
          example: SAISUSR   
        sectionId:
          title: Section Globally Unique Identifier 
          description: "Section globally unique identifier."
          type: string
          format: guid          
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
