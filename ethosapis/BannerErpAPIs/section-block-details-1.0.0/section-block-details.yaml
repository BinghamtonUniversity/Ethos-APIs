            ### Block Schedule Code 
            Returns all records for the block schedule code passed.
            ```
            /section-block-details?criteria={"block":"AA-T-SOC"}
            ```
            ### CRN
            Returns all records for the crn passed.
            ```
            /section-block-details?criteria={"crn":"10036"}
            ```
            ### Section ID
