openapi: 3.0.0
info:
  title: TCC Student Report Overrides
  description:
    The TCC Student Report Overrides is designed to maintain cb override data for students.
    It supports options to post cb override data requests in batches and retrieve records
    through get requests.
  version: 1.0.0
  x-api-type: erp
  x-release-status: ga
  x-source-system: banner
  x-audience: all
  x-deprecated-on:
  x-source-domain: student
  x-source-name: SZRSCRO
  x-source-title: 
  x-sunset-on:
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
