components:
  schemas:
    tcc-student-report-overrides-1.0.0_response:
      type: object
      properties:
        id:
          title: id
          description: "Immutable unique key"
          type: integer
          format: int64
          x-lineageReferenceObject: SZRSCRO_SURROGATE_ID
          x-lineageLookupReferenceObject: SZRSCRO
          x-product-region: Student
          example: 12345
        bannerId:
          title: bannerId
          description: "This field defines the identification number used to access person on-line."
          maxLength: 9
          type: string
          format: text
          x-lineageReferenceObject: SPRIDEN_ID
          x-lineageLookupReferenceObject: SPRIDEN
          x-product-region: Student
          example: "TCC000001"
        termCode:
          title: termCode
          description: "Term for with this student has manual overrides"
          maxLength: 6
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRO_TERM_CODE
          x-lineageLookupReferenceObject: SZRSCRO
          x-product-region: Student
          example: "202310"
        programIndicator:
          title: programIndicator
          description: "Used to identify programs which indicate the student"
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRO_PROGRAM_INDICATOR
          x-lineageLookupReferenceObject: SZRSCRO
          x-product-region: Student
          example: "8"
        exceededFunding:
          title: exceededFunding
          description: "Manual override of system calculated value for Exceeded UG"
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRO_EXC_FUNDING
          x-lineageLookupReferenceObject: SZRSCRO
          x-product-region: Student
          example: "Y"
      required:
        - id
        - bannerId
        - termCode
    tcc-student-report-overrides-1.0.0_batch_request:
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/tcc-student-report-overrides-1.0.0_batch_item_request"
      required:
        - items
    tcc-student-report-overrides-1.0.0_batch_item_request:
      type: object
      properties:
        bannerId:
          title: bannerId
          description: "This field defines the identnumber used to access person on-line."
          maxLength: 9
          type: string
          format: text
          x-lineageReferenceObject: SPRIDEN_ID
          x-lineageLookupReferenceObject: SPRIDEN
          x-product-region: Student
          example: "TCC000005"
        termCode:
          title: termCode
          description: "This field identifies the term code referenced in the Catalog, Recruiting, Admissions, Gen. Student, Registration, Student Billing and Acad. Hist. Modules. Reqd. value: 999999 - End of Time."
          maxLength: 6
          type: string
          format: text
          x-lineageReferenceObject: STVTERM_TERM_CODE
          x-lineageLookupReferenceObject: STVTERM
          x-product-region: Student
          example: "202510"
        programIndicator:
          title: programIndicator
          description: "Used to identify programs which indicate the student"
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRO_PROGRAM_INDICATOR
          x-lineageLookupReferenceObject: SZRSCRO
          x-product-region: Student
          example: "9"
        exceededFunding:
          title: exceededFunding
          description: "Manual override of system calculated value for Exceeded UG"
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRO_EXC_FUNDING
          x-lineageLookupReferenceObject: SZRSCRO
          x-product-region: Student
          example: "Y"
      required:
        - bannerId
        - termCode
    tcc-student-report-overrides-1.0.0_batch_response:
      properties:
        items:
          type: array
          items:
            - $ref: "#/components/schemas/tcc-student-report-overrides-1.0.0_batch_success_response"
            - $ref: "#/components/schemas/tcc-student-report-overrides-1.0.0_batch_error_response"
      required:
        - items
    tcc-student-report-overrides-1.0.0_batch_success_response:
      type: object
      properties:
        id:
          title: id
          description: "Immutable unique key"
          type: integer
          format: int64
          x-lineageReferenceObject: SZRSCRO_SURROGATE_ID
          x-lineageLookupReferenceObject: SZRSCRO
          x-product-region: Student
          example: 123
    tcc-student-report-overrides-1.0.0_batch_error_response:
      type: object
      properties:
        code:
          title: code
          description: "The error message code used to describe the error details."
          type: string
          format: text
          example: "Global.SchemaValidation.Error"
        description:
          title: description
          description: "The error description used to describe the error details."
          type: string
          format: text
          example: "Errors parsing input JSON."
        message:
          title: message
          description: "The detailed actionable error message."
          type: string
          format: text
          example: "exceededFunding (G) is not a valid. Valid values are: Y, N."
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
              type: object
              properties:
                id:
                  type: string
                  description: The global identifier of the resource in error.
                sourceId:
                  type: string
                  description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
                code:
                  type: string
                  description: The error message code used to describe the error details.
                description:
                  type: string
                  description: The error description used to describe the error details.
                message:
                  type: string
                  description: The detailed actionable error message.
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
