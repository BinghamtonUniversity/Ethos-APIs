                      description: "The field of study of students for which registration restrictions exist. The Include/Exclude field will determine how the field of study is restricted. An unlimited number of fields of study may be defined."
                      x-lineageReferenceObject: SCRRMAJ_MAJR_CODE
                      x-lineageLookupReferenceObject: STVMAJR             
                      example: CHEE
                    fieldOfStudyDescription:
                      title: Field of Study Code Description
                      maxLength: 30
                      type: string
                      description: "The description of the field of study."
                      x-lineageReferenceObject: STVMAJR_DESC        
                      example: Chemical Engineering                  
                    modifiedOn:
                      title: Modified On
                      maxLength: 11
                      type: string
                      format: date-time
                      pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                      description: "Most current date the record was created or changed."
                      x-lineageReferenceObject: SCRRMAJ_ACTIVITY_DATE
                      example: 2024-05-05T04:00:00Z   
                    modifiedBy:
                      title: Modified By User ID
                      maxLength: 30
                      type: string
                      description: "User who inserted or last updated the data."
                      x-lineageReferenceObject: SCRRMAJ_USER_ID
                      example: SYSTEST08 
        classRegistrationRestriction:
          title: Class Registration Restriction
          type: object
          required:
            - fromTerm        
          properties:  
            fromTerm:
              title: Effective Term
              maxLength: 6
              type: string
              description: "The starting term code for a set of course class registration restrictions.  An empty set indicates a period of time with no defined course class registration restrictions."
              x-lineageReferenceObject: SCRRCLS_EFF_TERM
              x-lineageLookupReferenceObject: STVTERM
              example: 202201    
            toTerm:
