components:
  schemas:
    catalog-course-restrictions-1.0.0_qapi_post_request:
      type: object
      required:
        - queryTerm        
      properties:              
        subject:
          title: Subject
          maxLength: 4
          type: string
          description: "The subject area of the course."
          x-lineageReferenceObject: SCBCRKY_SUBJ_CODE
          x-lineageLookupReferenceObject: STVSUBJ
          example: MATH
        courseNumber: 
          title: Course Number
          maxLength: 5
          type: string
          description: "The course number associated with the subject for the course."
          x-lineageReferenceObject: SCBCRKY_CRSE_NUMB
          example: ENGL1        
        queryTerm:
          title: Query Term
          maxLength: 6
          type: string
          description: "A user provided value.  The query term code is used to retrieve the most current course registration and schedule restrictions that are less than, or equal to, the provided value."         
          x-lineageLookupReferenceObject: STVTERM
          example: 202201    
    catalog-course-restrictions-1.0.0_qapi_post_response:
      type: object
      required:
        - subject
        - courseNumber
        - queryTerm        
      properties:
        subject:
          title: Subject
          maxLength: 4
          type: string
          description: "The subject area of the course."
          x-lineageReferenceObject: SCBCRKY_SUBJ_CODE
          x-lineageLookupReferenceObject: STVSUBJ
          example: MATH
        courseNumber: 
          title: Course Number
          maxLength: 5
          type: string
          description: "The course number associated with the subject for the course."
          x-lineageReferenceObject: SCBCRKY_CRSE_NUMB
          example: ENGL1        
        queryTerm:
          title: Query Term
          maxLength: 6
          type: string
          description: "A user provided value.  The query term code is used to retrieve the most current course registration and schedule restriction details that are less than, or equal to, the provided value."
          x-lineageLookupReferenceObject: STVTERM
          example: 202201      
        departmentRegistrationRestriction:
          title: Department Registration Restriction
          type: object
          required:
          - fromTerm 
          properties:  
            fromTerm:
              title: Effective Term
              maxLength: 6
              type: string
              description: "The starting term code for a set of course department registration restrictions.  An empty set indicates a period of time with no defined course department registration restrictions."
              x-lineageReferenceObject: SCRRDEP_EFF_TERM
              x-lineageLookupReferenceObject: STVTERM
              example: 202201    
            toTerm:
              title: Ending Term
              maxLength: 6
              type: string
              description: "The ending term code for a set of course department registration restrictions."
              x-lineageReferenceObject: derived
              x-lineageDerivedLogic: "The to term is derived by querying the system to locate the next effective term that is greater than the from term. On the highest effective term record the system default term of 999999 is displayed as the to term."
              x-lineageLookupReferenceObject: STVTERM
              example: 999999  
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register."
              x-lineageReferenceObject: SCRRDEP_DEPT_IE_CDE   
              enum:
                - includeRestriction
                - excludeRestriction
              example: includeRestriction                             
            departments:
              title: Departments
              type: array               
              items:
                type: object           
                properties:            
                  department:
                    title: Department Code
                    maxLength: 4
                    type: string
                    description: "The department of students for which course registration restrictions exist. The Include/Exclude field will determine how the department is restricted. An unlimited number of departments may be defined."
                    x-lineageReferenceObject: SCRRDEP_DEPT_CODE
                    x-lineageLookupReferenceObject: STVDEPT             
                    example: NURS
                  departmentDescription:
                    title: Department Code Description
                    maxLength: 30
                    type: string
                    description: "The description of the department."
                    x-lineageReferenceObject: STVDEPT_DESC
                    example: Nursing     
                  modifiedOn:
                    title: Modified On
                    maxLength: 11
                    type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                    description: "Most current date the record was created or changed."
                    x-lineageReferenceObject: SCRRDEP_ACTIVITY_DATE
                    example: 2024-05-05T04:00:00Z   
                  modifiedBy:
                    title: Modified By User ID
                    maxLength: 30
                    type: string
                    description: "User who inserted or last updated the data."
                    x-lineageReferenceObject: SCRRDEP_USER_ID
                    example: SYSTEST08                                                                                                                    
        fieldOfStudyRegistrationRestrictions:
          title: Field of Study Registration Restrictions
          type: array
          items:
            type: object
            required:
            - fromTerm         
            properties:  
              fromTerm:
                title: Effective Term
                maxLength: 6
                type: string
                description: "The starting term code for a set of course field of study registration restrictions.  An empty set indicates a period of time with no defined course field of study registration restrictions."
                x-lineageReferenceObject: SCRRMAJ_EFF_TERM
