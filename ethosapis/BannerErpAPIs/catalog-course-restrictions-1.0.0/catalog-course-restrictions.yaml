openapi: 3.0.0
info:
  title: Catalog Course Restrictions
  description: >
  
    This QAPI returns catalog course registration and schedule restriction details using a 
    combination of subject, course number and term as seen on the SCARRES, SCASRES, and SCAMEXC
    administrative pages. 
    

    Course registration restrictions related to department, field of study, class, level, degree, 
    program, campus, college, student attribute, cohort, and mutual exclusions associated with the base 
    catalog course are returned in the response.  Course scheduling restrictions related to 
    term and campus are also included.  

       

    Catalog course restriction details can be created and maintained using catalog-course-restrictions-adjustments-process.

  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SCARRES, SCASRES and SCAMEXC
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /qapi/catalog-course-restrictions:
    post:
      tags:
      - catalog-course-restrictions QAPI
      summary: Returns resources from SCRRDEP, SCRRMAJ, SCRRCLS, SCRRLVL, SCRRDEG, SCRRPRG, SCRRCAM, SCRRCOL, SCRRATT, SCRRCHR, SCRRTRM, SCRRCMP and SCRMEXC.
      description: >
        Queries for the requested resource using a set of attributes provided in the post
        request body.  Please note the path to use is /qapi/{resource} in the URL and not /api/{resource}.
        
        
        Returns any SCRRDEP, SCRRMAJ, SCRRCLS, SCRRLVL, SCRRDEG, SCRRPRG, SCRRCAM, SCRRCOL, SCRRATT, SCRRCHR, SCRRTRM, SCRRCMP and SCRMEXC records meeting the required submitted criteria of subject, course 
        number and query term. 
     
          
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string  
        - name: limit
          in: query
          description:  |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer                      
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/catalog-course-restrictions-1.0.0_qapi_post_request"
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/catalog-course-restrictions-1.0.0_qapi_post_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
