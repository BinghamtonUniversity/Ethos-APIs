openapi: 3.0.0
info:
  title: UCAS Transaction Statuses
  description: The UCAS Transaction Statuses API fetches all UCAS job details
    whose job status is NEW.
  version: 1.0.0
  x-source-name: null
  x-source-title: null
  x-source-domain: Student
  x-source-system: banner
  x-api-type: erp
  x-release-status: beta
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ucas-transaction-statuses:
    get:
      tags:
        - ucas-transaction-statuses
      summary: Returns UCAS jobs details.
      description: Returns resources from SKRUJOB, SARADAP, SKRUDEC and SKVSSDT.
      x-method-permissions: API_UCAS_TRANSACTION_STATUSES
      parameters:
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ucas-transaction-statuses-v1.0.0_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "500":
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    ucas-transaction-statuses-v1.0.0_response:
      type: object
      properties:
        saradapSurrogateId:
          title: Saradap Surrogate Id
          maxLength: 19
          type: string
          description: Immutable unique key.
          x-lineageReferenceObject: SARADAP_SURROGATE_ID
        applicantNo:
          title: Applicant Number
          maxLength: 6
          type: string
          description: UCAS Applicant Number.
          x-lineageReferenceObject: SKRUJOB_APPLICANT_NO
        decisionSequenceNo:
          title: Decision Sequence Number
          maxLength: 10
          type: string
          description: Decision Sequence Number for UCAS Applicant.
          x-lineageReferenceObject: SKRUJOB_DECN_SEQ
        transactionStatus:
          title: Transaction Status
          maxLength: 2
          type: string
          description: Status of the transaction.
          x-lineageReferenceObject: SKRUDEC_TRANS_STATUS
        currentStatus:
          title: Current Status
          maxLength: 10
          type: string
          description: Transaction Status for the Decision (deleted/updated).
          x-lineageReferenceObject: SKRUJOB_TRANS_STATUS
        replyCode:
          title: Reply Code
          maxLength: 300
          type: string
          description: Action code Title.
          x-lineageReferenceObject: SKVSSDT_TITLE
        skrujobSurrogateId:
          title: Skrujob Surrogate Id
          maxLength: 19
          type: string
          description: Unique identifier for each row in the table.
          x-lineageReferenceObject: SKRUJOB_SURROGATE_ID
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
