openapi: 3.0.0
info:
  title: Section Bases Submission Process
  description: >
  
    The Section Bases Submission Process API is used to create or update base section records.  In addition 
    to the base section (SSBSECT) details, section partition (SSRSPRT) and section room attribute 
    (SSRSRDF) preference records can also be created or updated.  For Open Learning Registration sections,
    the registration status codes (SSRRSTS) and associated extension processing (SSREXTN) and refunding 
    rules (SSRRFND) can be created or updated as well.  The API supports the option to post adjustments to base
    sections records in batches.
    

    Base section details can be queried using section-bases.  
    
    
    Section meeting records can be created, updated or deleted using section-meetings.  
    
    
    Instructors for a specific CRN can be managed using section-instructional-assignments-adjustment-process.


  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SSASECT, SSARULE
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/section-bases-submission-process:
    post:
      tags:
      - section-bases-submission-process
      summary: Creates or updates resources in SSBSECT, SSRRESV, SSRSPRT, SSRSRDF, SSRRSTS, SSREXTN or SSRRFND. 

      description: >


        Creates a base section record or updates an existing base section record in SSBSECT, along 
        with the associated section partition (SSRSPRT) and section room attribute (SSRSRDF) preference records.  For Open Learning 
        Registration sections, the registration status codes (SSRRSTS) and associated extension processing (SSREXTN) and refunding 
        rules (SSRRFND) may also be updated.


        API behavior details


        * Replace Functionality -  When the POST request is processed, it will replace any existing data associated 
        with the resource for the specified term and crn with the new data provided in the request. This ensures that the 
        resource is entirely updated to match the new data set provided.

        
        * Complete Data Set Required - The POST request must include complete objects or arrays. This means that the data sent must fully represent 
        the resource being updated. Partial data may result in an incomplete or incorrect update.

      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string            
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/section-bases-submission-process-1.0.0_post_request"
      responses:
        '201':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
