openapi: 3.0.0
info:
  title: Catalog Course Restrictions Adjustments Process
  description: >
  
    The Catalog Course Restrictions Adjustments Process API is used to create and maintain catalog course registration and schedule restrictions.
    
    

    Catalog course restriction details can be queried using catalog-course-restrictions.

  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SCARRES, SCASRES and SCAMEXC
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/catalog-course-restrictions-adjustments-process:
    post:
      tags:
      - catalog-course-restrictions-adjustments-process
      summary: Creates or updates resources in SCRRDEP, SCRRMAJ, SCRRCLS, SCRRLVL, SCRRDEG, SCRRPRG, SCRRCAM, SCRRCOL, SCRRATT, SCRRCHR, SCRRTRM, SCRRCMP and SCRMEXC.
      description: >

        A catalog course restriction record will be created or updated with a POST request in one or all of the following - SCRRDEP, SCRRMAJ, SCRRCLS, SCRRLVL, SCRRDEG, SCRRPRG, SCRRCAM, SCRRCOL, SCRRATT, 
        SCRRCHR, SCRRTRM, SCRRCMP and SCRMEXC. 
        


        API behavior details


        For catalog courses with no existing restrictions, the POST request inserts course restriction records as requested.


        For existing catalog course restrictions records, the POST request replaces the effective term record with the course restriction details included in the POST request. This means that the POST request 
        removes any existing data and replaces it with the data provided in the request.

        


      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string            
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/catalog-course-restrictions-adjustments-process-1.0.0_post_request"
      responses:
        '201':
          description: Success
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client’s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_CAT_CRSE_RESTR_ADJ_PROC
components:
  schemas:
    catalog-course-restrictions-adjustments-process-1.0.0_post_request:
      type: object
      required:
        - subject
        - courseNumber
        - fromTerm  
      properties:
        subject:
          title: Subject
          maxLength: 4
          type: string
          description: "The subject area of the course."
          x-lineageReferenceObject: SCBCRKY_SUBJ_CODE
          x-lineageLookupReferenceObject: STVSUBJ
          example: MATH
        courseNumber: 
          title: Course Number
          maxLength: 5
          type: string
          description: "The course number associated with the subject for the course."
          x-lineageReferenceObject: SCBCRKY_CRSE_NUMB
          example: ENGL1       
        fromTerm:
          title: Effective Term
          maxLength: 6
          type: string
          description: "The starting term code for a set of course department registration and schedule restrictions."         
          x-lineageLookupReferenceObject: STVTERM
          example: 202201                
        departmentRegistrationRestriction:
          title: Department Registration Restriction
          type: object
          required:
          - departments 
          properties:  
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRDEP_DEPT_IE_CDE   
              enum:
                - includeRestriction
                - excludeRestriction
              example: includeRestriction                             
            departments:
              title: Departments
              type: array             
              items:
                type: object   
                required: 
                - department                          
                properties:            
                  department:
                    title: Department Code
                    maxLength: 4
                    type: string
                    description: "The department of students for which course registration restrictions exist. The Include/Exclude field will determine how the department is restricted. An unlimited number of departments may be defined."
                    x-lineageReferenceObject: SCRRDEP_DEPT_CODE
                    x-lineageLookupReferenceObject: STVDEPT             
                    example: NURS                                                                                                                 
        fieldOfStudyRegistrationRestriction:
          title: Field of Study Registration Restriction
          type: array
          items:
            type: object
            required:
            - fieldOfStudyType   
            - fieldsOfStudy    
            properties:    
              restrictionType:
                title: Restriction Type
                maxLength: 1
                type: string
                description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
                x-lineageReferenceObject: SCRRMAJ_MAJOR_IND  
                enum:
                  - includeRestriction
                  - excludeRestriction                        
                example: excludeRestriction                
              fieldOfStudyType:
                oneOf:
                - type: string
                  title: Field of Study Type Code
                  maxLength: 15
                  description: "The field of study type code associated with the field of study."                    
                  x-lineageReferenceObject: SCRRMAJ_LFST_CODE
                  x-lineageLookupReferenceObject: GTVLFST             
                  example: MINOR  
                - type: string
                  enum:
                  - all
                  maxLength: 0                            
              fieldsOfStudy:
                title: Fields of Study
                type: array               
                items:
                  type: object
                  required: 
                  - fieldOfStudy                                
                  properties:            
                    fieldOfStudy:
                      title: Field of Study Code
                      maxLength: 4
                      type: string
                      description: "The field of study of students for which registration restrictions exist. The Include/Exclude field will determine how the field of study is restricted. An unlimited number of fields of study may be defined."
                      x-lineageReferenceObject: SCRRMAJ_MAJR_CODE
                      x-lineageLookupReferenceObject: STVMAJR             
                      example: CHEE
        classRegistrationRestriction:
          title: Class Registration Restriction
          type: object
          required:
            - classes      
          properties:     
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRCLS_CLASS_IND
              enum:
                - includeRestriction
                - excludeRestriction                 
              example: excludeRestriction                            
            classes:
              title: Classes
              type: array               
              items:
                type: object   
                required: 
                - class         
                properties:            
                  class:
                    title: Class Code
                    maxLength: 2
                    type: string
                    description: "The classification of students for which course registration restrictions exist. The Include/Exclude field will determine how the class is restricted. An unlimited number of classes may be defined."
                    x-lineageReferenceObject: SCRRCLS_CLAS_CODE
                    x-lineageLookupReferenceObject: STVCLAS             
                    example: 01   
        levelRegistrationRestriction:
          title: Level Registration Restriction
          type: object
          required:
            - levels        
          properties:      
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRLVL_LEVL_IND 
              enum:
                - includeRestriction
                - excludeRestriction                         
              example: includeRestriction                            
            levels:
              title: Levels
              type: array               
              items:
                type: object  
                required: 
                - level             
                properties:            
                  level:
                    title: Level Code
                    maxLength: 4
                    type: string
                    description: "The level of students for which course registration restrictions exist. The Include/Exclude field will determine how the level is restricted. An unlimited number of levels may be defined."
                    x-lineageReferenceObject: SCRRLVL_LEVL_CODE
                    x-lineageLookupReferenceObject: STVLEVL             
                    example: UG  
        degreeRegistrationRestriction:
          title: Degree Registration Restriction
          type: object
          required:
            - degrees     
          properties:     
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRDEG_DEGC_IND   
              enum:
                - includeRestriction
                - excludeRestriction                     
              example: includeRestriction                        
            degrees:
              title: Degrees
              type: array               
              items:
                type: object 
                required:
                - degree              
                properties:            
                  degree:
                    title: Degree Code
                    maxLength: 6
                    type: string
                    description: "The degree of students for which course registration restrictions exist. The Include/Exclude field will determine how the degree is restricted. An unlimited number of degrees may be defined."
                    x-lineageReferenceObject: SCRRDEG_DEGC_CODE
                    x-lineageLookupReferenceObject: STVDEGC             
                    example: BS
        programRegistrationRestriction:
          title: Program Registration Restriction
          type: object
          required: 
            - programs         
          properties:      
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRPRG_PROGRAM_IND      
              enum:
                - includeRestriction
                - excludeRestriction                    
              example: excludeRestriction                            
            programs:
              title: Programs
              type: array               
              items:
                type: object 
                required: 
                - program             
                properties:            
                  program:
                    title: Program Code
                    maxLength: 12
                    type: string
                    description: "The program of students for which course registration restrictions exist. The Include/Exclude field will determine how the program is restricted. An unlimited number of programs may be defined."
                    x-lineageReferenceObject: SCRRPRG_PROGRAM
                    x-lineageLookupReferenceObject: SMRPRLE             
                    example: BSCE
        campusRegistrationRestriction:
          title: Campus Registration Restriction
          type: object
          required:
            - campuses       
          properties:    
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRCAM_CAMP_IND     
              enum:
                - includeRestriction
                - excludeRestriction                      
              example: includeRestriction
            campuses:
              title: Campuses
              type: array               
              items:
                type: object 
                required: 
                - campus           
                properties:            
                  campus:
                    title: Campus Code
                    maxLength: 3
                    type: string
                    description: "The campus of students for which course registration restrictions exist. The Include/Exclude field will determine how the campus is restricted. An unlimited number of campuses may be defined."
                    x-lineageReferenceObject: SCRRCAM_CAMP_CODE
                    x-lineageLookupReferenceObject: STVCAMP             
                    example: D    
        collegeRegistrationRestriction:
          title: College Registration Restriction
          type: object
          required:
            - colleges       
          properties:    
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRCOL_COLL_IND
              enum:
                - includeRestriction
                - excludeRestriction                 
              example: includeRestriction
            colleges:
              title: Colleges
              type: array               
              items:
                type: object 
                required: 
                - college             
                properties:            
                  college:
                    title: College Code
                    maxLength: 2
                    type: string
                    description: "The college of students for which course registration restrictions exist. The Include/Exclude field will determine how the college is restricted. An unlimited number of colleges may be defined."
                    x-lineageReferenceObject: SCRRCOL_COLL_CODE
                    x-lineageLookupReferenceObject: STVCOLL             
                    example: NU
        studentAttributeRegistrationRestriction:
          title: Student Attribute Registration Restriction
          type: object
          required:
            - studentAttributes      
          properties:  
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRATT_ATTS_IE_CDE   
              enum:
                - includeRestriction
                - excludeRestriction                     
              example: excludeRestriction
            studentAttributes:
              title: Student Attributes
              type: array               
              items:
                type: object 
                required: 
                - studentAttribute         
                properties:            
                  studentAttribute:
                    title: Student Attribute Code
                    maxLength: 4
                    type: string
                    description: "The student attribute of students for which course registration restrictions exist. The Include/Exclude field will determine how the student attribute is restricted. An unlimited number of student attributes may be defined."
                    x-lineageReferenceObject: SCRRATT_ATTS_CODE
                    x-lineageLookupReferenceObject: STVATTS             
                    example: 30 
        cohortRegistrationRestriction:
          title: Cohort Registration Restriction
          type: object
          required:  
            - cohorts   
          properties:     
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRCHR_CHRT_IE_CDE   
              enum:
                - includeRestriction
                - excludeRestriction                     
              example: excludeRestriction                            
            cohorts:
              title: Cohorts
              type: array               
              items:
                type: object  
                required: 
                - cohort         
                properties:            
                  cohort:
                    title: Cohort Code
                    maxLength: 10
                    type: string
                    description: "The cohort of students for which course registration restrictions exist. The Include/Exclude field will determine how the cohort is restricted. An unlimited number of cohorts may be defined."
                    x-lineageReferenceObject: SCRRCHR_CHRT_CODE
                    x-lineageLookupReferenceObject: STVCHRT             
                    example: C4   
        termScheduleRestriction:
          title: Term Schedule Restriction
          type: object
          required:
            - terms         
          properties:    
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRTRM_TERM_IND
              enum:
                - includeRestriction
                - excludeRestriction                 
              example: includeRestriction                            
            terms:
              title: Terms
              type: array               
              items:
                type: object
                required: 
                - term            
                properties:            
                  term:
                    title: Term Code
                    maxLength: 2
                    type: string
                    description: "The term for which term scheduling restrictions exist. The Include/Exclude field will determine how the term is restricted. An unlimited number of terms may be defined."
                    x-lineageReferenceObject: SCRRTRM_RTRM_CODE
                    x-lineageLookupReferenceObject: STVTERM             
                    example: 10      
        campusScheduleRestriction:
          title: Campus Schedule Restriction
          type: object
          required:
            - campuses        
          properties:    
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SCRRCMP_CAMP_IND 
              enum:
                - includeRestriction
                - excludeRestriction                        
              example: excludeRestriction                            
            campuses:
              title: Campuses
              type: array               
              items:
                type: object   
                required:
                - campus           
                properties:            
                  campus:
                    title: Campus Code
                    maxLength: 3
                    type: string
                    description: "The campus for which campus scheduling restrictions exist. The Include/Exclude field will determine how the campus is restricted. An unlimited number of campuses may be defined."
                    x-lineageReferenceObject: SCRRCMP_CAMP_CODE
                    x-lineageLookupReferenceObject: STVCAMP             
                    example: PHL    
        mutualCourseExclusion:
          title: Mutual Course Exclusion Restriction
          type: object
          required: 
          - courseExclusions     
          properties:               
            courseExclusions:
              title: Course Exclusion
              description: Courses with content too similar to the base catalog course to prevent registration in both. 
              type: array               
              items:
                type: object  
                required: 
                - subject
                - courseNumber
                - level
                - gradeMinimum
                - startTerm
                - endTerm
                properties:            
                  subject:
                    title: Subject Code
                    maxLength: 4
                    type: string
                    description: "Subject code of the course that is considered mutually exclusive."
                    x-lineageReferenceObject: SCRMEXC_SUBJ_CODE_MEXC         
                    example: ENG 
                  courseNumber:
                    title: Course Number
                    maxLength: 5
                    type: string
                    description: "Course Number of the course that is considered mutually exclusive."
                    x-lineageReferenceObject: SCRMEXC_CRSE_NUMB_MEXC            
                    example: 201  
                  level:
                    title: Level 
                    maxLength: 2
                    type: string
                    description: "Level for which the minimum grade will be established."
                    x-lineageReferenceObject: SCRMEXC_LEVL_CODE           
                    example: UG  
                  gradeMinimum:
                    title: Grade
                    maxLength: 6
                    type: string
                    description: "Minimum grade for the mutual exclusion restriction."
                    x-lineageReferenceObject: SCRMEXC_GRDE_CODE           
                    example: A  
                  startTerm:
                    title: Start Term
                    maxLength: 6
                    type: string
                    description: "Start term for the mutually exclusive course definition."
                    x-lineageReferenceObject: SCRMEXC_START_TERM            
                    example: 202310 
                  endTerm:
                    title: End Term
                    maxLength: 6
                    type: string
                    description: "Start term for the mutually exclusive course definition."
                    x-lineageReferenceObject: SCRMEXC_END_TERM         
                    example: 202410                                                                                                                                                                                                                                                                                                          
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
              type: object
              properties:
                id:
                  type: string
                  description: The global identifier of the resource in error.
                sourceId:
                  type: string
                  description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
                code:
                  type: string
                  description: The error message code used to describe the error details.
                description:
                  type: string
                  description: The error description used to describe the error details.
                message:
                  type: string
                  description: The detailed actionable error message.
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic