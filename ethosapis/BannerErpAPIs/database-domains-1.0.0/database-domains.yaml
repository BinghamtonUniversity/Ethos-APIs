components:
  securitySchemes:
    EthosIntegrationBearer:
      scheme: bearer
      type: http
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://integrate.elluciancloud.com
          tokenUrl: https://integrate.elluciancloud.com
          scopes:
            read: Read access
            write: Write access
  schemas:
    schema-database-domains-1.0.0:
      title: Database Domains
      description: Domains in the database.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        name:
          title: Name
          description: The name of the domain.
          type: string
          x-lineageReferenceObject: USERNAME(all_users)
        title:
          title: Title
          description: The title of the domain
          type: string
        description:
          title: Description
          description: The description of the domain.
          type: string
        isCustomDomain:
          title: Is Custom Domain
          description: True if the domain is added by the user on the Main configuration table otherwise false.
          type: string
      required:
        - name
      additionalProperties: false
    schema-objects-1.0.0:
      title: Database Domain objects
