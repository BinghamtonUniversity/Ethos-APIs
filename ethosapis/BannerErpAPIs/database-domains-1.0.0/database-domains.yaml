openapi: 3.0.0
info:
  title: Database domains
  description: |
    The database includes domains that are either delivered by Banner or manually added as custom entries. This encompasses selected Banner-delivered domains as well as those configured through the Main Configuration table. 
  version: 1.0.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Foundation
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: '{server_url}'
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/database-domains:
    get:
      summary: Returns resources from all_users
      description: Retrieves both system-defined Banner domains and user-defined custom domains from the database..
      security:
        - EthosIntegrationBearer: []
          BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: API_DESIGNER_QUERY
      tags:
        - database-domains
      parameters:
        - name: accept
          in: header
          required: true
          description: |
            The version of the resource requested. Prefer to use only the whole MAJOR version.  See the semantic versioning topic in the API Standards from more information.
            ```
            application/vnd.hedtech.integration.v1+json
            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set. Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page requested.
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-domains-1.0.0'
              examples:
                database-domain-example:
                  $ref: '#/components/examples/database-domains-example-1.0.0'
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Permission Denied
        '404':
          description: Resource not found
        '500':
          description: Server error, unexpected configuration or data
