                - type: string
                  maxLength: 0
          additionalProperties: false
        name:
          title: Name
          description: The name of the object.
          type: string
          x-lineageReferenceObject: table_name(all_tab_comments)
        title:
          title: Title
          description: The title of the object
          type: string
        description:
