openapi: 3.0.0
info:
  title: Position Definitions
  description: >
    This API can be used to retrieve, post, or delete an position definition data.
    This information is displayed in the Banner administrative page NBAPOSN.
    Additionally, the API supports the option to create or update position definition data in batches.
  version: 1.0.0-beta
  x-audience: all
  x-release-status: beta
  x-source-domain: Human Resources
  x-source-system: banner
  x-source-name: NBBPOSN
  x-api-type: erp
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/position-definitions:
    get:
      tags:
        - position-definitions
      summary: Get position definitions
      description: Query and retrieve position definition data for a given criteria. Data is extracted from NBBPOSN.
      parameters:
        - name: limit
          in: query
          description: 
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/position-definitions-1.0.0_get_request_criteria'
          description: >
            ### Position Code
            
            Returns the position definition information for this Poisition Code.
            
            ```

            /position-definitions?criteria={"positionCode": "A00001"}

            ```

            ### Position Title
            
            Returns the position definition information for this Position Title.
            
            ```

            /position-definitions?criteria={"positionTitle":"President"}
            
            ```

            ### Position Status

            Returns the position definition information for this Position Status.

            ```

            /position-definitions?criteria={"positionStatus":"active"}

            ```
            
            ### Position Class

            Returns the position definition information for this position class.

            ```

            /position-definitions?criteria={"positionClass":"ADM01"}

            ```
            
            ### Employee Class

            Returns the position definition information for this employee class.
            
            ```
            
            /position-definitions?criteria={"employeeClass":"01"}


            ```
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/position-definitions-1.0.0_get_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client’s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_POSITION_DEFINITIONS
    post:
      tags:
        - position-definitions
      summary: Creates a new resource in NBBPOSN.
      description: >
        Creates a new position definition in NBBPOSN with a POST request.


        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.
        
      requestBody:
        content:
          application/vnd.hedtech.integration.1.0.0+json:
            schema:
              $ref: '#/components/schemas/position-definitions-1.0.0_post_request'
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response.
              required: true
