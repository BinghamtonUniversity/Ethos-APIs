components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    position-definitions-1.0.0_get_request_criteria:   
      properties:
        positionCode:
          title: Position Code
          description: Position code.
          type: string
          x-lineageReferenceObject: NBBPOSN_POSN
          example: "A00001"      
        positionTitle:
          title: Position Title
          description: The position title.
          type: string
          x-lineageReferenceObject: NBBPOSN_TITLE
          example: "President"
        positionStatus:
          title: Position Status
          description: Status of the position.
          type: string
          x-lineageReferenceObject: NBBPOSN_STATUS
          example: "active"
        positionClass:
          title: Position class
          description: position class of the position definition
          type: string
          x-lineageReferenceObject: NBBPOSN_PCLS_CODE
          example: "ADM01"
        employeeClass:
          title: Employee Class
          description: The employee class of the position definition record
          type: string
          example: "01"
          x-lineageReferenceObject: NBPOSN_ECLS_CODE
    position-definitions-1.0.0_get_response:
      properties:
        accrueSeniorityIndicator:
          title: Accrue Seniority Indicator
          description: Accrue Seniority Indicator for position definition.
          type: boolean
          x-lineageReferenceObject: NBBPOSN_ACCRUE_SENIORITY_IND
          example: true
        appointmentPercent:
          title: Appointment Percent
          description: Appointment percent of the position definition.
          type: number
          x-lineageReferenceObject: NBBPOSN_APPT_PCT
          example: 100.00
        bargainingUnitCode:
          title: Bargaining Unit Code
          description: Bargaining unit code of the position record.
          type: string
          x-lineageReferenceObject: NBBPOSN_BARG_CODE
          example: "01"
        budgetProfileCode:
          title: Budget Profile Code
          description: Budget profile code of the position definition.
          type: string
          x-lineageReferenceObject: NBBPOSN_BPRO_CODE
          example: "02"
        budgetType:
          title: Budget Type
          description: >
            Budget Type for position definition. Valid values are:
              * `permanent` Permanent
              * `temporary` Temporary
              * `casual` Casual
              * `none` None
          type: string
          enum:
            - permanent
            - temporary
            - casual
            - none
          x-lineageReferenceObject: NBBPOSN_BUDGET_TYPE
          example: "none"
        californiaPensionPositionClassType:
          title: California Pension Position Class Type
          description: >
            Budget Type for position definition. Valid values are:
              * `certified` Certified
              * `classified` Classified
          type: string
          enum:
            - certified
            - classified
          x-lineageReferenceObject: NBBPOSN_CALIF_TYPE
          example: "certified"
        changeDateTime:
          title: Change Date Time
          description: Date and Time this record was changed.
          type: string
          format: date
          x-lineageReferenceObject: NBBPOSN_CHANGE_DATE_TIME
          example: "2010-01-01"
        chartOfAccounts:
          title: Chart of Accounts
          description: Chart of accounts code. Valued only if Banner Finance is installed.
          type: string
          x-lineageReferenceObject: NBBPOSN_COAS_CODE
          example: "A"
        cipcCode:
          title: CIPC Code
          description: Predefined codes that are validated against the Student College Instructional Validation Form.
          type: string
          x-lineageReferenceObject: NBBPOSN_CIPC_CODE
          example: "01"
        comments:
          title: Comments
          description: This field stores user comments.
          type: string
          x-lineageReferenceObject: NBBPOSN_COMMENT
          example: "Comments for the position definition"
        dataOrigin:
          title: Data Origin
          description: Source system that created or updated the data.
          type: string
          x-lineageReferenceObject: NBBPOSN_DATA_ORIGIN
          example: "Banner"
        employeeClass:
          title: Employee Class
          description: Employee class code defaults from the Position Class Rule Form but can be overriden.
          type: string
          x-lineageReferenceObject: NBBPOSN_ECLS_CODE
          example: "01"
        employmentCategoryCode:
          title: Employment Category Code
          description: Employment Category Code used by IPEDS Winter Data Collection to categorize employee categories.
          type: string
          x-lineageReferenceObject: NBBPOSN_ECIP_CODE
          example: "01"
        exemptIndicator:
          title: Exempt Indicator
          description: Indicates if employees assigned to positions in this Position Class will be exempt or non-exempt.
          type: boolean
          x-lineageReferenceObject: NBBPOSN_EXEMPT_IND
          example: true
        federalOccupationCode:
          title: Federal Occupation Code
          description: Federal Occupational Code.
          type: string
          x-lineageReferenceObject: NBBPOSN_PFOC_CODE
          example: "01"
        id:
          title: Id
          type: string
          description: "The global identifier of the position definition."
          example: 085df706-ee15-4947-93f8-8c260e64795e
          x-lineageReferenceObject: NBBPOSN_GUID
        jobLocationCode:
          title: Job Location Code
          description: Location code associated with this Position.
          type: string
          x-lineageReferenceObject: NBBPOSN_JBLN_CODE
          example: "MAIN"
        jobProgressionCode:
          title: Job Progression Code
          description: Job Progression code associated with the position.
          type: string
          x-lineageReferenceObject: NBBPOSN_JOBP_CODE
          example: "01"
        lastModified:
          title: Last Modified
          description: Date of last activity on this record.
          type: string
          format: date
          x-lineageReferenceObject: NBBPOSN_ACTIVITY_DATE
          example: "2010-01-01"
        lastModifiedBy:
          title: Last Modified By
          description: The user ID of the person who inserted or last updated this record.
          type: string
          x-lineageReferenceObject: NBBPOSN_USER_ID
          example: "BANNER_USER"
        nationalOccupationCode:
          title: National Occupation Code
          description: National Occupational Code.
          type: string
          x-lineageReferenceObject: NBBPOSN_PNOC_CODE
          example: "01"
        occupationTitleCode:
          title: Occupation Title Code
          description: Field specifies the Dictionary of Positions Occupational Titles Code.
          type: string
          x-lineageReferenceObject: NBBPOSN_DOTT_CODE
          example: "01"
        positionAuthorizationNumber:
          title: Authorization Number
          description: The position number that authorized the approval of the defined position.
          type: string
          x-lineageReferenceObject: NBBPOSN_AUTH_NUMBER
          example: "A12345678"
        positionClass:
          title: Position Class
          description: The position class the defined position is assigned to.
          type: string
          x-lineageReferenceObject: NBBPOSN_PCLS_CODE
          example: "ADM01"
        positionCode:
          title: Position Code
          description: Position code.
          type: string
          x-lineageReferenceObject: NBBPOSN_POSN
          example: "A00001"
        positionGroupCode:
          title: Position Group Code
          description: The Position Group code.
          type: string
          x-lineageReferenceObject: NBBPOSN_PGRP_CODE
          example: "01"
        positionLocationCode:
          title: Position Location Code.
          description: Position location code.
          type: string
          x-lineageReferenceObject: NBBPOSN_PLOC_CODE
