openapi: 3.0.0
info:
  title: student-comments
  description: >
    Retrieves the list of student grade change reasons for the assessment type
    passed.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
  x-source-title: Student Comments
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: student-comments
paths:
  /api/student-comments:
    get:
      description: >
        __Paging__ Pagination is supported using parameters limit and offset.
        Default value for limit is 500 and upper limit is 1000.

          __Sorting__ NA

        __Filtering__ Filtering is supported using url parameters
        [‘assessmentType’, ‘crn’, ‘term’, ‘componentId’, ‘subComponentId’].
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_COMMENTS
      tags:
        - student-comments
      parameters:
        - name: accept
          in: header
          required: true
          schema:
            type: string
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```
              application/vnd.hedtech.integration.v1.0.0+json
            ```
        - name: componentType
          in: query
          required: true
          schema:
            type: string
          description: component or subComponent
      responses:
        "200":
          description: Success
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/student-comments"
              examples:
                student-grades:
                  $ref: "#/components/examples/student-comments"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    student-comments:
      type: array
      items:
        type: object
        properties:
          comments:
            type: array
            items:
              type: string
  examples:
    student-comments:
      value: |-
        [
        {
            "comments": [
                "Sub-Component Comment 1",
                "Sub-Component Comment 2",
                "Sub-Component Comment 3"
            ]
        }
            ]
