openapi: 3.0.0
info:
  title: faculty-advisors
  description: >
    This API determines whether the given Person is an active faculty or an
    advisor or both.


    The API checks for the person record in the Faculty/Advisor Information form
    (SIAINST) and Faculty and Advisor Access Dates form (SOATERM) to see if
    there is any access restriction on current date specified.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
  x-source-title: Faculty Advisors
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: faculty-advisors
paths:
  /api/faculty-advisors/{id}:
    get:
      description: >
        
        When the specified __term__ is not passed, the API recognizes the given
        person as faculty/advisor, when one of two conditions exists :


        1.When the current date does not fall within any date range for any term
        and person has an active status for any term on the Faculty/Advisor
        Information Form (SIAINST)

         2.When the current date does fall within a date range and person has an active status for the term on SIAINST.
         
         When the specified term is passed, the API still uses the same logic, but restricts to the given term.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_FACULTY_ADVISORS
      tags:
        - faculty-advisors
      parameters:
        - name: term
          in: query
          required: false
          schema:
            type: string
          example: "202014"
        - name: id
          in: path
          required: true
          example: 710000028
          schema:
            type: string
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version.
                        
            ```
             application/vnd.hedtech.integration.v1.0.0+json
             ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/faculty-advisors"
            application/xml:
              schema:
                type: object
                $ref: "#/components/schemas/faculty-advisors"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    faculty-advisors:
      type: object
      properties:
        bannerId:
          type: string
        advisor:
          type: boolean
        faculty:
          type: boolean
        firstName:
          type: string
        lastName:
          type: string
        middleName:
          type: string
