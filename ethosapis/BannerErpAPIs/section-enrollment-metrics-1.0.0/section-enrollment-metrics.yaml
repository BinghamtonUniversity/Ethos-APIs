                      x-lineageReferenceObject: SSRRESV_OVERFLOW_IND
                      example: true
                    enrollmentMaximum:
                      title: Maximum Enrollment
                      maxLength: 4
                      type: number
                      description: "Maximum number of reserved seats for the rule."
                      x-lineageReferenceObject: SSRRESV_MAX_ENRL
                      example: 25           
                    enrollmentActual:
                      title: Actual Enrollment
                      maxLength: 4
                      type: number
                      description: "Number of actual reserved seats taken for the rule. "
                      x-lineageReferenceObject: SSRRESV_ENRL
                      example: 15  
                    enrollmentRemaining:
