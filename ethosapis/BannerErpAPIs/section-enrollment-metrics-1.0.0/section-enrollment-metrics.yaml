                  $ref: '#/components/schemas/errors_2_0_0'
      security:
      - EthosIntegrationBearer: []
      - BasicAuth: []
      x-method-permissions: API_SECTION_ENROLLMENT_METRICS 
     
      
components:
  schemas:
    section-enrollment-metrics-1.0.0_qapi_post_request:
      type: object
      required:
        - term        
      properties:              
        term:
          title: Term
          maxLength: 6
          type: string
          description: "A user provided value. The term code is used to retrieve the section details that are equal to the provided value."         
          x-lineageLookupReferenceObject: SSBSECT_TERM_CODE
          example: 202201    
        crn: 
          title: Course Reference Number
          maxLength: 5
          type: string
          description: "The Course Reference Number (CRN) assigned to this course section."
          x-lineageReferenceObject: SSBSECT_CRN
          example: 10006
        sectionStatus:
          title: Section Status Code
          maxLength: 1
          type: string
          description: "The status of the section."
          x-lineageReferenceObject: SSBSECT_SSTS_CODE
          x-lineageLookupReferenceObject: STVSSTS            
          example: A 
              
    section-enrollment-metrics-1.0.0_qapi_post_response:
      type: object
      required:
        - term  
        - crn  
        - enrollmentMaximum
            
      properties:
        term:
          title: Term
          maxLength: 6
          type: string
          description: "The term code for the set of section details."         
          x-lineageLookupReferenceObject: SSBSECT_TERM_CODE
          example: 202201    
        crn: 
          title: Course Reference Number
          maxLength: 5
          type: string
          description: "The Course Reference Number (CRN) assigned to this course section."
          x-lineageReferenceObject: SSBSECT_CRN
          example: 10006              
        sectionStatus:
          title: Section Status Code
          maxLength: 1
          type: string
          description: "The status of the section."
          x-lineageReferenceObject: SSBSECT_SSTS_CODE
          x-lineageLookupReferenceObject: STVSSTS             
          example: A 
        sectionStatusDescription:
          title: Section Status Code Description
          maxLength: 30
          type: string
          description: "The description of the section status."
          x-lineageReferenceObject: STVSSTS_DESC
          example: Active 
        enrollmentMaximum:
          title: Enrollment Maximum
          maxLength: 4
          type: number
          description: "Maximum enrollment for the section."
          x-lineageReferenceObject: SSBSECT_MAX_ENRL
          example: 21
        enrollmentActual: 
          title: Actual Enrollment
          maxLength: 4
          type: number
          description: "Actual enrollment for the section."
          x-lineageReferenceObject: derived
          x-lineageDerivedLogic: If Seat Management service is enalbled the value is provided by the service. If Seat Management is not 
           enabled and the Seat Assignment feature is enabled, the value retirned is the SSRSEAT rowcount. If neither Seat Mangement 
           nor Seat Assignment are enabled, the value is returned SSBSECT_ENRL.
          example: 3
        enrollmentRemaining:
          title: Remaining Enrollment
          maxLength: 4
          type: number
          description: "Remaining number of seats available for the section."
          x-lineageReferenceObject: derived
          x-lineageDerivedLogic: If the Seat Management service or the Seat Assignment feature is enabled the value items
           (enrollmentMaximum - enrollmentActual). If neither Seat Management are enabled, the value returned is SSBSECT_SEATS_AVAIL.
          example: 10
        waitListMaximum: 
          title: Waitlist Maximum
          maxLength: 4
          type: number
          description: "Maximum number of students allowed to be waitlisted for the section."
          x-lineageReferenceObject: SSBSECT_WAIT_CAPACITY
          example: 25
        waitListActual:
          title: Actual Waitlist
          maxLength: 4
          type: number
          description: "Actual number of students waitlisted for the section."
          x-lineageReferenceObject: derived
          x-lineageDerivedLogic: If the Seat Management service or the Seat Assignment feature are enabled the value is the SSRSEAW
           row count. If neither Seat Management nor Seat Assignment are enabled the value returned is SSBSECT_WAIT_COUNT.
          example: 18
        waitListRemaining: 
          title: Remaining Waitlist
          maxLength: 4
          type: number
          description: "Remaining number of waitlist seats available for the section."
          x-lineageReferenceObject: derived
          x-lineageDerivedLogic: If Seat Management service or Seat Assignment feature are enabled the value is (waitkistMaximun -
           waitListActual). If neither Seat Management nor Seat Assignment are enabled, the value is SSBSECT_WAIT_AVAIL.
          example: 7
        anticipatedEnrollment:
          title: Anticipated Enrollment
          maxLength: 4
          type: number
          description: "Anticipated enrollment in the section."
          x-lineageReferenceObject: SSBSECT_PROJ_ENRL
          example: 0
        priorEnrollment: 
          title: Prior Enrollment
          maxLength: 4
          type: number
          description: "Number of students enrolled in the section in the previous term"
          x-lineageReferenceObject: SSBSECT_PRIOR_ENRL
          example: 0       
        hasReservedSeats: 
          title: Reserved Seats Indicator
          type: boolean
          description: "Indicate that reserved seats exist for the section."
          x-lineageReferenceObject: SSBSECT_RESERVED_IND
          example: true                             
        totalCreditHours: 
          title: Total Credit Hours
          maxLength: 9
          type: number
          description: "Total credit hours of enrolled students."
          x-lineageReferenceObject: SSBSECT_TOT_CREDIT_HRS
          example: 90
        censusOneEnrollment:
          title: Census One Enrollment Count
          maxLength: 4
          type: number
          description: "Census one enrollment count."
          x-lineageReferenceObject: SSBSECT_CENSUS_ENRL
          example: 14
        censusOneOn: 
          title: Census One Freeze Date
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$                        
          description: "Date the enrollment count will be frozen for use in census one reporting."
          x-lineageReferenceObject: SSBSECT_CENSUS_ENRL_DATE
          example: 2021-08-20 
        censusTwoEnrollment:
          title: Census Two Enrollment Count
          maxLength: 4
          type: number
          description: "Census two enrollment count."
          x-lineageReferenceObject: SSBSECT_CENSUS_2_ENRL
          example: 15
        censusTwoOn: 
          title: Census Two Freeze Date
          type: string
          format: date
          description: "Date the enrollment count will be frozen for use in census two reporting."
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$                        
          x-lineageReferenceObject: SSBSECT_CENSUS_2_DATE
          example: 2021-09-15 
        reservedSeatDetails:
                title: Reserved Seat Details
                type: array               
                items: 
                  type: object
                  required:
                      - enrollmentMaximum    
                      - waitlistMaximum 
                  properties:
                    
                    sequenceNumber: 
                        title: Sequence Number
                        maxLength: 4
                        type: number
                        description: "Reserved seats sequence number."
                        x-lineageReferenceObject: SSRRESV_SEQ_NO
                        example: 1                                            
                    level:
                      title: Level Code
                      maxLength: 2
                      type: string
                      description: "Student level associated with the section for the reserved seats rule."
                      x-lineageReferenceObject: SSRRESV_LEVL_CODE
                      x-lineageLookupReferenceObject: STVLEVL             
                      example: UG  
                    levelDescription:
                      title: Level Code Description
                      maxLength: 30
                      type: string
                      description: "Description of the level code."
                      x-lineageReferenceObject: STVLEVL_DESC
                      example: Undergraduate
                    campus:
                      title: Campus Code
                      maxLength: 3
                      type: string
                      description: "Campus associated with the section for the reserved seats rule."
                      x-lineageReferenceObject: SSRRESV_CAMP_CODE
                      x-lineageLookupReferenceObject: STVCAMP             
                      example: 999  
                    campusDescription:
                      title: Campus Code Description
                      maxLength: 30
                      type: string
                      description: "Description of the campus code."
                      x-lineageReferenceObject: STVCAMP_DESC
                      example: All Campuses
                    college:
                      title: College Code
                      maxLength: 2
                      type: string
                      description: "College associated with the section for the reserved seats rule."
                      x-lineageReferenceObject: SSRRESV_COLL_CODE
                      x-lineageLookupReferenceObject: STVCOLL             
                      example: NU  
                    collegeDescription:
                      title: College Code Description
                      maxLength: 30
                      type: string
                      description: "Description of the college code."
                      x-lineageReferenceObject: STVCOLL_DESC
                      example: College of Nursing 
                    degree:
                      title: Degree Code
                      maxLength: 6
                      type: string
                      description: "Degree associated with the section for the reserved seats rule."
                      x-lineageReferenceObject: SSRRESV_DEGC_CODE
                      x-lineageLookupReferenceObject: STVDEGC         
                      example: BSN  
                    degreeDescription:
                      title: Degree Code Description
                      maxLength: 30
                      type: string
                      description: "Description of the degree code."
                      x-lineageReferenceObject: STVDEGC_DESC
                      example: Bachelor of Science in Nursing
                    program:
                      title: Program Code
                      maxLength: 12
                      type: string
                      description: "Program associated with the section for the reserved seats rule."
                      x-lineageReferenceObject: SSRRESV_PROGRAM
                      x-lineageLookupReferenceObject: STVPROG             
                      example: BS-N  
                    programDescription:
                      title: Program Code Description
                      maxLength: 30
                      type: string
                      description: "Description of the program code."
                      x-lineageReferenceObject: STVPROG_DESC
                      example: Bachelor of Science in Nursing
                    fieldOfStudyType:
                      title: Field of Study Type Code
                      maxLength: 15
                      type: string
                      description: "Field of study type code associated with the section for the reserved seats rule."
                      x-lineageReferenceObject: SSRRESV_LFST_CODE
                      x-lineageLookupReferenceObject: GTVLFST
                      example: MAJOR  
                    fieldOfStudyTypeDescription:
                      title: Field of Study Type Code Description
                      maxLength: 30
                      type: string
                      description: "Description of the field of study type code."
                      x-lineageReferenceObject: GTVLFST_DESC
                      example: Major           
                    fieldOfStudy:
                      title: Field of Study Code
                      maxLength: 4
                      type: string
                      description: "Field of study code associated with the section for the reserved seats rule."
                      x-lineageReferenceObject: SSRRESV_LFST_CODE
                      x-lineageLookupReferenceObject: STVMAJR
                      example: NU  
                    fieldOfStudyDescription:
                      title: Field of Study Code Description
                      maxLength: 30
                      type: string
                      description: "Description of the field of study code."
                      x-lineageReferenceObject: STVMAJR_DESC
                      example: Nursing                                                  
                    department:
                      title: Department Code
                      maxLength: 4
                      type: string
                      description: "Department associated with the section for the reserved seats rule."
                      x-lineageReferenceObject: SSRRESV_DEPT_CODE
                      x-lineageLookupReferenceObject: STVDEPT             
                      example: NURS  
                    departmentDescription:
                      title: Department Code Description
                      maxLength: 30
                      type: string
                      description: "Description of the department code."
                      x-lineageReferenceObject: STVDEPT_DESC
                      example: Nursing     
                    curriculum: 
                      title: Curriculum
                      maxLength: 1
                      type: string
                      description: "Curriculum associated with the section for the reserved seats rule. Valid values are: P (primary), S (secondary), or A (any)."
                      x-lineageReferenceObject: SSRRESV_PRIM_SEC_CDE
                      example: A
                    class:
                      title: Class Code
                      maxLength: 2
                      type: string
                      description: "Class code associated with the section for the reserved seats rule."
                      x-lineageReferenceObject: SSRRESV_CLAS_CODE
                      x-lineageLookupReferenceObject: STVCLAS             
                      example: 01                     
                    classDescription:
                      title: Class Code Description
                      maxLength: 30
                      type: string
                      description: "Description of the class code."
                      x-lineageReferenceObject: STVCLAS_DESC           
                      example: First Year                         
                    attribute:
                      title: Attribute Code
                      maxLength: 4
                      type: string
                      description: "Student attribute associated with the section for the reserved seats rule."
                      x-lineageReferenceObject: SSRRESV_ATTS_CODE
