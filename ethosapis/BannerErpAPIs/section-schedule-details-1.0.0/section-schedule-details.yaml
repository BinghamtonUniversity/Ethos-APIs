components:
  schemas:
    section-schedule-details-1.0.0_get_response:
      type: object
      properties:
        id:
          title: id
          description: A unique identifier for course section information record.
          maxLength: 6
          type: number
          x-lineageReferenceObject: SSBSECT_SURROGATE_ID
        termCode:
          title: termCode
          description: It defines the Term code for the course section information.
          maxLength: 6
          type: string
          x-lineageReferenceObject: SSBSECT_TERM_CODE
        crn:
          title: crn
          description: It defines the Course Reference Number (CRN) assigned to the course
            section when it was initially added.
          maxLength: 5
          type: string
          x-lineageReferenceObject: SSBSECT_CRN
        subjectCode:
          title: subjectCode
          description: This field is required in order to add a section.  In addition, the
            combina- tion of Subject, Course Number and Key Block Term must
            identify a valid course version as maintained in the Catalog Module.
          maxLength: 4
          type: string
          x-lineageReferenceObject: SSBSECT_SUBJ_CODE
        courseNumber:
          title: courseNumber
          description: This field is used to the determine the course number in the  Key
            Block with a Term and Subject  to identify a valid course version
            from the Catalog Module.
          maxLength: 5
          type: string
          x-lineageReferenceObject: SSBSECT_CRSE_NUMB
        sequenceNumber:
          title: sequenceNumber
          description: This field identifies the section number of a course.
          maxLength: 3
          type: string
          x-lineageReferenceObject: SSBSECT_SEQ_NUMB
        statusCode:
          title: statusCode
          description: This field maintains the status of a section.
          maxLength: 1
          type: string
          x-lineageReferenceObject: SSBSECT_SSTS_CODE
        statusActiveInd:
          title: statusActiveInd
          description: Section Active Status Indicator.
          maxLength: 1
          type: string
          x-lineageReferenceObject: STVSSTS_ACTIVE_IND
        partOfTerm:
          title: partOfTerm
          description: This field is used to specify the part-of-term in which the section
            is offered.
          maxLength: 3
          type: string
          x-lineageReferenceObject: SSBSECT_PTRM_CODE
        campus:
          title: campus
          description: This field defines the campus on which the section is scheduled.
          maxLength: 3
          type: string
          x-lineageReferenceObject: SSBSECT_CAMP_CODE
        title:
          title: title
          description: This field will display the title of the course as defined on the
            Basic Course Information Form - SCACRSE.
          maxLength: 30
          type: string
          x-lineageReferenceObject: SSBSECT_CRSE_TITLE
        scheduleCode:
          title: scheduleCode
          description: This field identifies the instructional type of the section being
            scheduled.
          maxLength: 3
          type: string
          x-lineageReferenceObject: SSBSECT_SCHD_CODE
        instructionalMethodCode:
          title: instructionalMethodCode
          description: This field defines the instructional method code assigned to the
            section.
          maxLength: 5
          type: string
          x-lineageReferenceObject: SSBSECT_INSM_CODE
        creditHours:
          title: creditHours
          description: This field can be used to restrict a section to a single credit
            hr.value when the course was defined with variable credit hours. on
            the Basic Course Information Form - SCACRSE.
          maxLength: 7
          type: number
          x-lineageReferenceObject: SSBSECT_CREDIT_HRS
        billingHours:
          title: billingHours
          description: This field can be used to restrict a section to a single billing
            hour value when the course was defined with variable billing hours
            on the Basic Course Information Form - SCACRSE.
          maxLength: 7
          type: number
          x-lineageReferenceObject: SSBSECT_BILL_HRS
        maximumEnrollment:
          title: maximumEnrollment
          description: "This field is used to set the maximum enrollment for a section. "
          maxLength: 4
          type: number
          x-lineageReferenceObject: SSBSECT_MAX_ENRL
        actualEnrollment:
          title: actualEnrollment
          description: This field is system maintained.  It displays a running total of
            enrollments in the section which have a course status with a 'Count
            in Enroll' flag of 'Y' on the Registration Status Code Validation
            Form - STVRSTS.
          maxLength: 4
          type: number
          x-lineageReferenceObject: SSBSECT_ENRL
        sectionStartOn:
          title: sectionStartOn
          description: This field is defined in the Start field in the Base Part of Term
            Block on the Term Control Form - SOATERM, and will default to this
            field based on the Key Block Term and Part/Term field in the Section
            Block of this form.
          type: string
          format: date
          x-lineageReferenceObject: SSBSECT_PTRM_START_DATE
        sectionEndOn:
          title: sectionEndOn
          description: This field is defined in the End field in the Base Part of Term
            Block on the Term Control Form - SOATERM, and will default to this
            field based on the Key Block Term and Part/Term field in the Section
            Block of this form.
          type: string
          format: date
          x-lineageReferenceObject: SSBSECT_PTRM_END_DATE
        sectionCensusEnrollOn:
          title: sectionCensusEnrollOn
          description: This field is defined in the Census field in the Base Part of Term
            Block on the Term Control Form - SOATERM, and will default to this
            field based on the Key Block Term and Part/Term field in the Section
            Block of this form.
          type: string
          format: date
          x-lineageReferenceObject: SSBSECT_CENSUS_ENRL_DATE
        startOn:
          title: startOn
          description: This field identifies the calender start date for the Part of
            Term  in the Base Part of Term Block.
          type: string
          format: date
          x-lineageReferenceObject: SOBPTRM_START_DATE
        endOn:
          title: endOn
          description: This field identifies the calender end date for the Part of Term in
            the Base Part of Term Block.
          type: string
          format: date
          x-lineageReferenceObject: SOBPTRM_END_DATE
        censusOn:
          title: censusOn
          description: This field indicates the census date for the Part of Term Code.
          type: string
          format: date
          x-lineageReferenceObject: SOBPTRM_CENSUS_DATE
        courseCollegeCode:
          title: courseCollegeCode
          description: This field is used to specify the college which offers the course.
          maxLength: 2
          type: string
          x-lineageReferenceObject: SCBCRSE_COLL_CODE
        courseDepartmentCode:
          title: courseDepartmentCode
          description: This field is used to specify the department which offers the
            course, if desired.
          maxLength: 4
          type: string
          x-lineageReferenceObject: SCBCRSE_DEPT_CODE
        courseTitle:
          title: courseTitle
          description: This field is used to specify the title of the course which will be
            in effect for the effective term.
          maxLength: 30
          type: string
          x-lineageReferenceObject: SCBCRSE_TITLE
        courseCreditHourMinMaxRelationship:
          title: courseCreditHourMinMaxRelationship
          description: This field defines whether the course can be offered for variable
            credit. OR/TO is used to specify the relationship between low and
            high credit hours values.
          maxLength: 2
          type: string
          x-lineageReferenceObject: SCBCRSE_CREDIT_HR_IND
        courseCreditHourMinimum:
          title: courseCreditHourMinimum
          description: This field specifies the minimum number of credits for which a
            course may be offered.
          maxLength: 7
          type: number
          x-lineageReferenceObject: SCBCRSE_CREDIT_HR_LOW
        courseCreditHourMaximum:
          title: courseCreditHourMaximum
          description: This field is used either to define a second valid credit hour
            value or to define the high credit hour value within a range.
          maxLength: 7
          type: number
          x-lineageReferenceObject: SCBCRSE_CREDIT_HR_HIGH
        courseBillingHourMinMaxRelationship:
          title: courseBillingHourMinMaxRelationship
          description: This field defines whether the course can be billed for variable
            credit. OR/TO is used to specify the relationship between the low
            and high billing hour values.
          maxLength: 2
          type: string
          x-lineageReferenceObject: SCBCRSE_BILL_HR_IND
        courseBillingHoursMinimum:
          title: courseBillingHoursMinimum
          description: This field is used to specify the minimum number of credits for
            which the course can be billed based on defined assessment rules.
          maxLength: 7
          type: number
          x-lineageReferenceObject: SCBCRSE_BILL_HR_LOW
        courseBillingHoursMaximum:
          title: courseBillingHoursMaximum
          description: This field defines a second valid billing hours value or to define
            the high billing hours value within a range.
          maxLength: 7
          type: number
          x-lineageReferenceObject: SCBCRSE_BILL_HR_HIGH
        meetingTimes:
          title: Minors
          description: The meeting Times associated with the course section.
          type: array
          items:
            type: object
            properties:
              meetingScheduleCode:
                title: meetingScheduleCode
                description: Section Schedule Type.
                maxLength: 3
                type: string
                x-lineageReferenceObject: SSRMEET_SCHD_CODE
              meetingBuildingCode:
                title: meetingBuildingCode
                description: This field defines the Building where the course section will be
                  scheduled.
                maxLength: 6
                type: string
                x-lineageReferenceObject: SSRMEET_BLDG_CODE
              meetingRoomCode:
                title: meetingRoomCode
                description: This field defines the Room where the course section will be
                  scheduled.
                maxLength: 10
                type: string
                x-lineageReferenceObject: SSRMEET_ROOM_CODE
              meetingBeginTime:
                title: meetingBeginTime
                description: This field defines the Begin Time of the course section being
                  scheduled.  It is in the format HHMM using military times.
                maxLength: 4
                type: string
                x-lineageReferenceObject: SSRMEET_BEGIN_TIME
              meetingEndTime:
                title: meetingEndTime
                description: This field defines the End Time of the course section being
                  scheduled.  It is in the format HHMM using military times.
                maxLength: 4
                type: string
                x-lineageReferenceObject: SSRMEET_END_TIME
              meetingMondayIndicator:
                title: meetingMondayIndicator
                description: Section Meeting Time Monday Indicator.
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_MON_DAY
              meetingTuesdayIndicator:
                title: meetingTuesdayIndicator
                description: Section Meeting Time Tuesday Indicator.
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_TUE_DAY
              meetingWednesdayIndicator:
                title: meetingWednesdayIndicator
                description: Section Meeting Time Wednesday Indicator.
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_WED_DAY
              meetingThursdayIndicator:
                title: meetingThursdayIndicator
                description: Section Meeting Time Thrusday Indicator.
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_THU_DAY
              meetingFridayIndicator:
                title: meetingFridayIndicator
                description: Section Meeting Time Friday Indicator.
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_FRI_DAY
              meetingSaturdayIndicator:
                title: meetingSaturdayIndicator
                description: Section Meeting Time Saturday Indicator.
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_SAT_DAY
              meetingSundayIndicator:
                title: meetingSundayIndicator
                description: Section Meeting Time Sunday Indicator.
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_SUN_DAY
              meetingSessionIndicator:
                title: meetingSessionIndicator
                description: Section Indicator.
                maxLength: 2
                type: string
                x-lineageReferenceObject: SSRMEET_CATAGORY
        instructors:
          title: instructors
          description: The instructors associated with the course section.
          type: array
          items:
            type: object
            properties:
              instructorbannerId:
                title: instructorbannerId
                description: This field defines the identification number used to access
                  instructor on-line.
                maxLength: 9
                type: string
                x-lineageReferenceObject: SPRIDEN_ID
              instructorsPreferredFirstName:
                title: instructorsPreferredFirstName
                description: The field defines the preferred first name of the instructor.
                maxLength: 60
                type: string
                x-lineageReferenceObject: SPBPERS_PREF_FIRST_NAME
              instructorFirstName:
                title: instructorFirstName
                description: The field defines the first name of the instructor.
                maxLength: 60
                type: string
                x-lineageReferenceObject: SPRIDEN_FIRST_NAME
              instructorLastName:
                title: instructorLastName
                description: The field defines the last name of the instructor.
                maxLength: 60
                type: string
                x-lineageReferenceObject: SPRIDEN_LAST_NAME
              instructorMiddleInitial:
                title: instructorMiddleInitial
                description: This field identifies the middle name of instructor.
                maxLength: 60
                type: string
                x-lineageReferenceObject: SPRIDEN_MI
              instructorNamePrefix:
                title: instructorNamePrefix
                description: This field defines the prefix (Mr, Mrs, etc) used before instructor
                  name.
                maxLength: 20
                type: string
                x-lineageReferenceObject: SPBPERS_NAME_PREFIX
              instructorNameSuffix:
                title: instructorNameSuffix
                description: This field maintains the suffix (Jr, Sr, etc) used after instructor
                  name.
                maxLength: 20
                type: string
                x-lineageReferenceObject: SPBPERS_NAME_SUFFIX
              instructorSessionPercentage:
                title: instructorSessionPercentage
                description: This field defines the Faculty session percentage of responsibility
                  of instructional assignment.
                maxLength: 3
                type: number
                x-lineageReferenceObject: SIRASGN_PERCENT_SESS
              primaryInstructorIndicator:
                title: primaryInstructorIndicator
                description: The primary instructor of the course
                maxLength: 1
                type: string
                x-lineageReferenceObject: SIRASGN_PRIMARY_IND
              instructorExternalUserId:
                title: instructorExternalUserId
                description: This field defines the value which may be passed to the partner
                  systems as a login ID and/or email ID..
                maxLength: 30
                type: string
                x-lineageReferenceObject: GOBTPAC_EXTERNAL_USER
              instructorSessionIndicator:
                title: instructorSessionIndicator
                description: The session indicator associated with the assignment
                maxLength: 2
                type: string
                x-lineageReferenceObject: SIRASGN_CATEGORY
              instructorEmails:
                title: instructorEmails
                description: The Emails associated with the instructors.
                type: array
                items:
                  type: object
                  properties:
                    emailCode:
                      title: emailCode
                      description: The type of e-mail address.
                      maxLength: 4
                      type: string
                      x-lineageReferenceObject: GOREMAL_EMAL_CODE
                    email:
                      title: email
                      description: The e-mail address.
                      maxLength: 128
                      type: string
                      x-lineageReferenceObject: GOREMAL_EMAIL_ADDRESS
                    emailPreferredInd:
                      title: emailPreferredInd
                      description: This field indicates if the e-mail address is the preferred contact
                        address.
                      maxLength: 1
                      type: boolean
                      x-lineageReferenceObject: GOREMAL_PREFERRED_IND
              instructorAlternateIdentifications:
                title: instructorAlternateIdentifications
                description: The Aletrnate Identifications of the instructors.
                type: array
                items:
                  type: object
                  properties:
                    alternateIdNameType:
                      title: alternateIdNameType
                      description: The field is used to store the code that represents the name type
                        associated with a instructors's name
