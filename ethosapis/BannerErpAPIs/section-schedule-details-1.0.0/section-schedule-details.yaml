      summary: Returns a single section schedule with details per term code
      description: >
        Returns a single term codes associated with SSBSECT, SOBPTRM, SCBCRSE,
        SIRASGN, SSRMEET, SPRIDEN, SPBPERS, GOREMAL, GOBPTAC and STVSSTS are
        returned.
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      tags:
