openapi: 3.0.0
info:
  title: Section Schedule Details
  description: This API returns a bulk extraction of course sections and related
    datasets based on Term Code containing course sections, meeting times,
    instructor information including their alternate IDs, and section
    attributes.
  version: 1.0.0
  x-source-domain: Student
  x-source-name: SSBSECT SOBPTRM SCBCRSE SIRASGN SSRMEET SPRIDEN SPBPERS GOREMAL
    GOBPTAC STVSSTS
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/section-schedule-details:
    get:
      tags:
        - section-schedule-details
      summary: A bulk extract of Section Schedule Details associated with a Term Code.
      description: Returns all term codes associated with  SSBSECT, SOBPTRM, SCBCRSE,
        SIRASGN, SSRMEET, SPRIDEN, SPBPERS, GOREMAL, GOBPTAC and STVSSTS are
        returned.
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Term Code

            Returns all records for the termCode.

            ```

            /section-schedule-details?criteria={"termCode":"201410"}

            ```

            ### Course Reference Number   

            Returns all records for the crn.

            ```

            /section-schedule-details?criteria={"crn":"10006"}

            ```

            ### Subject Code   

            Returns all records for the subjectCode.

            ```

            /section-schedule-details?criteria={"subjectCode":"ACCT"}

            ```

            ### Course Number   

            Returns all records for the courseNumber.

            ```

            /section-schedule-details?criteria={"courseNumber":"2310"}

            ```

            ### Status Code   

            Returns all records for the statusCode.

            ```

            /section-schedule-details?criteria={"statusCode":"P"}

            ```

            ### Status Active Indicator   

            Returns all records for the statusActiveInd.

            ```

            /section-schedule-details?criteria={"statusActiveInd":"A"}

            ```

            ### Part Of term   

            Returns all records for the partOfTerm.

            ```

            /section-schedule-details?criteria={"partOfTerm":"1"}

            ```

            ### Campus   

            Returns all records for the campus.

            ```

            /section-schedule-details?criteria={"campus":"M"}

            ```

            ### Course College Code   

            Returns all records for the courseCollegeCode.

            ```

            /section-schedule-details?criteria={"courseCollegeCode":"BU"}

            ```

            ### Email Code   

            Returns all records for the emailCode.

            ```

            /section-schedule-details?criteria={"instructors":
            [{"instructorEmails": [{"emailCode": "PTST"}]}]}

            ```

            ### Email Preferred Indicator   

            Returns all records for the emailPreferredInd.

            ```

            /section-schedule-details?criteria={"instructors":
            [{"instructorEmails": [{"emailPreferredInd": true}]}]}

            ```

            ### Section Attribute Code  

            Returns all records for the sectionAttributeCode.

            ```

            /section-schedule-details?criteria={"sectionAttributes":
            [{"sectionAttributeCode": "AFOU"}]}

            ```

            ### Alternate ID Name type  

            Returns all records for the alternateIdNameType.

            ```

            /section-schedule-details?criteria={ "instructors":
            [{"instructorAlternateIdentifications": [{"alternateIdNameType":
            "CASE"}]}]}

            ```
             ### OR Operators

             It is supported for crn, subjectCode, courseNumber, statusCode, campus, courseCollegeCode, sectionAttributeCode and alternateIdNameType. An OR query can be performed using the $or operator. The example below will return all instances where subjectCode equals ACCT or subjectCode equals BIOL.

            ```

            /section-schedule-details?criteria={"$or":[{"subjectCode":
            "ACCT"},{"subjectCode": "BIOL"}]}

            ```
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/section-schedule-details-1.0.0_get_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "500":
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_SECTION_SCHEDULE_DETAILS
  /api/section-schedule-details/{id}:
