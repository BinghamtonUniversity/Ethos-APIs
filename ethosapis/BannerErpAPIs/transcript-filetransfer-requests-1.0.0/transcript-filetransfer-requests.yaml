openapi: 3.0.0
info:
  title: Transcript Filetransfer Requests
  description: This API Submits request to transcripts processing which will transfer the file to Vendor and finalize the transcript request.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
  x-source-title: Transcript Filetransfer Requests
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/transcript-filetransfer-requests:
    post:
      summary: Submits request to transcripts processing which will transfer the file to Vendor and finalize the transcript request
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_TRANSCRIPT_FILETRANS_REQ
      tags:
        - transcript-filetransfer-requests
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/json

            ```
          schema:
            type: string
        - name: content-type
          in: header
          required: true
          schema:
            type: string
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```
              application/json
            ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/transcript-filetransfer"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/transcript-filetransfer-response"
          headers:
            X-Media-Type:
              description: application/json
              schema:
                type: string
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    transcript-filetransfer:
      type: object
      properties:
        bannerId:
          type: string
          description: "Banner ID"
          x-lineageReferenceObject: SPRIDEN_ID
        processName:
          type: string
          description: "The name of the job process"
          x-lineageReferenceObject: GJRJFLU_JOB
        fileName:
          type: string
          description: "The name of the file got uploaded"
          x-lineageReferenceObject: GJRJFLU_FILE_NAME
        fileuploadOneUpNo:
          type: string
          description: "The number for the file upload job submission"
          x-lineageReferenceObject: GJRJFLU_ONE_UP_NO
        transcriptOneUpNo:
          type: string
          description: "The number for the transcript process job submission"
      required:
        - bannerId
        - processName
        - fileName
        - fileuploadOneUpNo
        - transcriptOneUpNo
    transcript-filetransfer-response:
      type: object
      properties:
        status:
          type: string
          example: 'success'