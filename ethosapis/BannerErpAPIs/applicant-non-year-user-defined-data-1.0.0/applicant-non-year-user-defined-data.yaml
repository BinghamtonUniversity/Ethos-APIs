        type: object
        x-last-modified:
        properties:
          id:
            title: ID
            description: A globally unique identifier of a batch to be used in all external references.
            type: string
            example: 93a63083-0281-4a87-97ae-3c435304d707
          status:
            title: status
            description: status of the batch.
            type: string
            enum:
              - completed
              - inProgress
              - aborted
            example: completed
          resource:
            title: Resource
            description: The affected resource.
            type: object
            properties:
              name:
                title: Resource Name
                description: The pluralized name of the affected resource
                type: string
                example: applicant-non-year-user-defined-data
              version:
                title: Resource version
                description: The version of the resource
                type: string
                example: application/vnd.hedtech.integration.v1.0.0+json
            additionalProperties: false
            required:
              - name
              - version
          items:
            type: array
            items:
              type: object
              additionalProperties: true
              oneOf: 
                - $ref: '#/components/schemas/applicant-non-year-user-defined-data_batch-1.0.0_batch_posted_records'
                - $ref: '#/components/schemas/errors_2_0_0'
