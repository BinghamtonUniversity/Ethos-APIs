      parameters: 
        - name: id
          in: path
          description: |
            Unique identifier for the non year user-defined data.
          required: true
          schema:
            type: string
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            ```

            application/vnd.hedtech.integration.v1+json

            ```     
          schema:
            type: string
      responses:
