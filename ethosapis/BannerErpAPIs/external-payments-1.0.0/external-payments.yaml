openapi: 3.0.0
info:
  title: External Payments
  description: |
    Process one or more External Payments.
  version: 1.0.0
  x-source-system: banner
  x-release-status: ga
  x-api-type: erp
  x-audience: all
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/external-payments:
    post:
      summary: Updated a record on GORCCAU and Create a new resource in TBRACCD
      description: >
        Reads a JSON file with one or more external payments, Searches in
        GORCCAU where gorccau_pay_trans_id equals transactionId and
        gorccau_status equals PENDING, updates this record with its new status.
        If the new status is SUCCESS, a new record is inserted in TBRACCD
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EXTERNAL_PAYMENTS
      tags:
        - external-payments
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-external-payment-response.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-external-payment.json"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-external-payment.json:
      title: External Payment Request
      description: JSON file provided by EPS API
      type: object
      properties:
        data:
          title: data
          type: array
          items:
            type: object
            properties:
              payload:
                title: payload
                type: object
                properties:
                  id:
                    title: ID
                    description: External Transaction ID
                    type: string
                  content:
                    title: content
                    type: object
                    properties:
                      transactionId:
                        title: transactionId
                        description: Internal Transaction ID (gorccau_pay_trans_id)
                        type: string
                      status:
                        title: status
                        description: Transaction status
                        type: string
                        enum:
                          - CANCELLED
                          - FAILED
                          - SUCCESS
                      createdBy:
                        title: createdBy
                        description: Creator user
                        type: string
                      originalAmt:
                        title: originalAmt
                        description: Original Amount
                        type: number
                        format: positiveNumber
                      providerName:
                        title: providerName
                        description: Provider Name
                        type: string
                      providerStatus:
                        title: providerStatus
                        description: Provider Status
                        type: string
                      modifiedBy:
                        title: modifiedBy
                        description: Modifier user
                        type: string
                    additionalProperties: false
                    required:
                      - transactionId
                      - status
                      - createdBy
                      - originalAmt
                      - providerName
                      - providerStatus
                      - modifiedBy
                additionalProperties: false
                required:
                  - id
            additionalProperties: false
            required:
              - payload
      required:
        - data
      additionalProperties: false
    schema-external-payment-response.json:
      title: External Payment Response
      description: List of processed transactions
      type: object
      properties:
        transactionId:
          title: transactionId
          description: External Transaction ID
          type: object
          properties:
            id:
              title: id
              description: External Transaction ID
              type: string
            status:
              title: status
              description: Status of Internal Payment
              type: string
              enum:
                - Processed Record
                - Unprocessed Record
                - Previously Processed Record
            transactionId1:
              title: transactionId1
              description: Internal Transaction ID (gorccau_pay_trans_id)
              type: string
            transactionId2:
              title: transactionId2
              description: Transaction ID of TBRACCD (tbraccd_tran_number)
              type: string
          additionalProperties: false
          required:
            - id
            - status
            - transactionId1
            - transactionId2
      required:
        - transactionId
      additionalProperties: false
