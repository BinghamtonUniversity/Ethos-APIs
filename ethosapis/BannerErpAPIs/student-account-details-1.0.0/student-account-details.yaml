openapi: 3.0.1
info:
  title: student-account-details
  description: This is an alternative representation of the
    student-account-detail-charges-payments API and provides tbbdetc_dcat_code
    and ssbsect_crse_title. This provides a more efficient delivery of this
    content to payment providers.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-source-name: TBRACCD
  x-source-title: Student Account Details
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
servers:
