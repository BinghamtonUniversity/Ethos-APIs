          EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_ACCOUNT_DETAILS
  /api/student-account-details/{id}:
    get:
      tags:
        - student-account-details
      summary: Returns the requested resource from TBRACCD.
      description: Returns a single record from from TBRCCD including GUID from
        TSRTGID. Also included are tbbdetc_dcat_code and ssbsect_crse_title.
      parameters:
