components:
  schemas:
    student-billing-due-date-rules-1.0.0_query_request:
      type: object
      properties:
        termCode:
          title: Term Code
          type: string
          maxLength: 6
          description: "Term for which the due date rule applies."
          x-lineageReferenceObject: TBRDDRL_TERM_CODE
        termCodeList:
          title: Term Code
          description: "Term for which the due date rule applies."
          type: array
          items:
            type: string
          x-lineageReferenceObject: TBRDDRL_TERM_CODE
        ptrmCode:
          title: Part Of Term Code
          type: string
          maxLength: 3
          description: "Part of term for which the due date rule applies. Valid in STVPTRM."
          x-lineageReferenceObject: TBRDDRL_PTRM_CODE
        ptrmCodeList:
          title: Part Of Term Code
          description: "Part of term for which the due date rule applies. Valid in STVPTRM."
          type: array
          items:
            type: string
          x-lineageReferenceObject: TBRDDRL_PTRM_CODE
        dcatCode:
          title: Detail Category Code
          type: string
          maxLength: 3
          description: "Charge/Payment category for which the due date rule applies. Valid in TTVDCAT."
          x-lineageReferenceObject: TBRDDRL_DCAT_CODE
        dcatCodeList:
          title: Detail Category Code
          description: "Charge/Payment category for which the due date rule applies. Valid in TTVDCAT."
          type: array
          items:
            type: string
          x-lineageReferenceObject: TBRDDRL_DCAT_CODE
        detailCode:
          title: Detail Code
          type: string
          maxLength: 4
          description: "Charge/Payment code for which the due date rule applies. Valid in TBBDETC."
          x-lineageReferenceObject: TBRDDRL_DETC_CODE
        detailCodeList:
          title: Detail Category Code
          description: "Charge/Payment code for which the due date rule applies. Valid in TBBDETC."
          type: array
          items:
            type: string
          x-lineageReferenceObject: TBRDDRL_DETC_CODE
    student-billing-due-date-rules-1.0.0_post_request:
      type: object
      properties:
        configurationType:
          title: Configuration Type
          type: string
          maxLength: 1
          description: "Specifies the type of due date configuration. Valid values are (P) - Part of Term, (S) - Section, (D) - Detail Category Code."
          x-lineageReferenceObject: TBRDDRL_CONF_TYPE_CDE
        detailCategoryCode:
          title: Detail Category Code
          type: string
          maxLength: 3
          description: "Charge/Payment category for which the due date rule applies. Valid in TTVDCAT."
          x-lineageReferenceObject: TBRDDRL_DCAT_CODE
        detailCode:
          title: Detail Code
          type: string
          maxLength: 4
          description: "Charge/Payment code for which the due date rule applies. Valid in TBBDETC."
          x-lineageReferenceObject: TBRDDRL_DETC_CODE
        excludeIndicator:
          title: Exclude Indicator
          type: string
          maxLength: 1
          description: "Flag indicating if detail code should be excluded from parent rule. Valid values are (Y) - Yes, (N) - No. Default value is (N)"
          x-lineageReferenceObject: TBRDDRL_DETC_EXCL_IND
        dueNoOfBaseDate:
          title: Offset To Base Date
          type: number
          maxLength: 4
          description: "Number of days to add/subtract from base date for first due date."
          x-lineageReferenceObject: TBRDDRL_DUE1_OFFSET
        dueNoOfRollingDate:
          title: Offset To Rolling Date
          type: number
          maxLength: 4
          description: "Number of days to add/subtract from second base due date."
          x-lineageReferenceObject: TBRDDRL_DUE2_OFFSET
        rollingDueDate:
          title: Rolling Due Date Type
          type: string
          maxLength: 1
          description: "Base date type for second due date. Valid values are System Date, Entry Date, Effective Date, Billing Date."
          x-lineageReferenceObject: TBRDDRL_DUE2_BASE
          example: Entry Date
        termCode:
          title: Term Code
          type: string
          maxLength: 6
          description: "Term for which the due date rule applies."
          x-lineageReferenceObject: TBRDDRL_TERM_CODE
        partOfTerm:
          title: Part Of Term Code
          type: string
          maxLength: 3
          description: "Part of term for which the due date rule applies. Valid in STVPTRM."
          x-lineageReferenceObject: TBRDDRL_PTRM_CODE
      required:
        - termCode
        - configurationType
    student-billing-due-date-rules-1.0.0_put_request:
      type: object
      properties:
        id:
          title: Id
          type: string
          format: guid
