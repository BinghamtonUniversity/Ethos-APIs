openapi: 3.0.0
info:
  title: check-payment-type-details
  description: This API can be used to modify Banner Accounts Payable payment properties for payments that start out as initial Check Type of Batch or Online. For a given Check Number and Check Date, a null Payment Type can be updated to Virtual Card or Direct Deposit, also automatically updating the reconciliation status as Final at the same time. The Payment Type is an extended payment definition added by a third party. After a Payment Type value exists for Virtual Card or Direct Deposit, the update could be reverted by submitting a Payment Type of Check and resetting the reconciliation status as cleared. If needed, the API can also update the Payment Type and optional values after the initial updates.
  version: 1.0.0
  x-source-name: XFAPUPNE
  x-source-title: Check Payment Type Details
  x-source-system: banner
  x-api-type: erp
  x-release-status: beta
  x-audience: all
  x-source-domain: Finance
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: '{server_url}'
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/check-payment-type-details:
    get:
      tags:
        - check-payment-type-details
      summary: Returns payment details for any kind of payment such as checks, direct deposits, and virtual cards.
      description: Returns resources from FABCHKS.
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            ```

            application/vnd.hedtech.integration.v1+json

            ``` 
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
            $ref: '#/components/schemas/check-payment-type-details-v1.0.0_get_request'
          description: >
            ### Check Number 

            Returns all payments based on check number.

            ```

            /check-payment-type-details?criteria={"checkNumber":"Z0000001"}

            ```

            ### Check Date

            Returns all payments based on check date.

            ```

            /check-payment-type-details?criteria={"checkDate":"2023-10-31"}

            ```
            
            ### Origin

            Returns all payments based on origin.

            ```

            /check-payment-type-details?criteria={"dataOrigin":"Banner"}

            ```
            
            ### User ID

            Returns all payments based on user identification.

            ```

            /check-payment-type-details?criteria={"userId":"user"}

            ```
            
            ### Payment Type

            Returns all payments based on payment type, with valid values Check, Virtual Card, and Direct Deposit.

            ```

            /check-payment-type-details?criteria={"paymentType":"Direct Deposit"}

            ```
            
                        
            ### Reconciliation Indicator

            Returns all payments based on reconciliation indicator, with valid values Final, Regular, and None.

            ```

            /check-payment-type-details?criteria={"reconciliationInd":"Final"}

            ```
            
                        
            ### Activity Date

            Returns all payments for the specified activity date.

            ```

            /check-payment-type-details?criteria={"activityDate":"2023-11-05"}

            ```
            
                        
            ### Check Type Indicator

            Returns all payments having a specific check type indicator, with valid values Batch, Direct Deposit, Manual, Online, Zero Amount, Test, Void, and Rolled Back.

            ```

            /check-payment-type-details?criteria={"checkTypeInd":"Direct Deposit"}

            ```
            
                        
            ### Bank Code

            Returns all payments by bank code.

            ```

            /check-payment-type-details?criteria={"bankCode":"A1"}

            ```
             ### ACH Indicator

             Returns all payments made via direct deposit, with valid values true and false.

            ```

            /check-payment-type-details?criteria={"checkAchInd": true}

            ```
                        
            ### Check Amount

            Returns all payments having a specific check amount.

            ```

            /check-payment-type-details?criteria={"checkAmount":"600"}

            ```
            
                        
            ### Check Cancel Reason Code

            Returns all payments by cancel reason code.

            ```

            /check-payment-type-details?criteria={"checkCancelReasonCode":"NLN"}

            ```
            
                        
            ### Check Cancel Indicator

            Returns all payments having a specific cancel indicator, with valid values true and false.

            ```

            /check-payment-type-details?criteria={"checkCancelInd": true}

            ```
            
                        
            ### Check Cancel Date

            Returns all payments for the specified check cancel date. 

            ```

            /check-payment-type-details?criteria={"checkCancelDate":"2023-10-31"}

            ```
      responses:
        '200':
          description: OK
          headers:
