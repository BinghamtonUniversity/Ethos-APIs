openapi: 3.0.0
info:
  title: registration-audits
  description: API for replicating student-course-registration-audit in baseline
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SFASTCA
  x-source-domain: Student
  x-source-title: Student Course Registration Audit
  x-source-system: banner
  x-api-type: erp
servers:
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/registration-audits:
    get:
      tags:
        - registration-audits
      summary: Return resources from SFASTCA
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON representation
            of the property searching for. This can be any of the properties listed
            on the URL or QAPI and must be a json representation that can be validated
            against the GET schema. Limit and Offset are the only supported additional
            parameters on the URL.
          required: false
          schema:
            type: string
        - name: termGuid
          in: query
          required: true
          schema:
            type: string
        - name: personGuid
          in: query
          required: true
          schema:
            type: string
        - name: sectionGuid
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/registration-audits-1.0.0_get_response'
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for
                  the primary data entity used to create the resource. This is useful
                  for referencing the source item through the applications administrative
                  user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: 'The detailed actionable error message. '
    registration-audits-1.0.0_get_response:
      type: object
      properties:
        courseRegistrationAuditGuid:
          type: array
          items:
            type: object
            properties:
              lastModified:
                title: Activity Date
                maxLength: 26
                type: string
                description: "Lineage reference object : SFRSTCA_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SFRSTCA_ACTIVITY_DATE
              addDate:
                title: Add Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SFRSTCA_ADD_DATE"
                format: date-time
                x-lineageReferenceObject: SFRSTCA_ADD_DATE
              sectionGuid:
                title: Section GUID
                maxLength: 36
                type: string
                description: "Lineage reference object : SECTION_GUID"
                x-lineageReferenceObject: SECTION_GUID
                x-lineageLookupReferenceObject: sections
              term:
                title: Term
                maxLength: 6
                type: string
                description: "Lineage reference object : SFRSTCA_TERM_CODE"
                x-lineageReferenceObject: SFRSTCA_TERM_CODE
              termGuid:
                title: Term GUID
                maxLength: 36
                type: string
                description: "Lineage reference object : TERM_GUID"
                x-lineageReferenceObject: TERM_GUID
                x-lineageLookupReferenceObject: academic-periods
              crn:
                title: CRN
                maxLength: 5
                type: string
                description: "Lineage reference object : SFRSTCA_CRN"
                x-lineageReferenceObject: SFRSTCA_CRN
              personGuid:
                title: Person GUID
                maxLength: 36
                type: string
                description: "Lineage reference object : PERSON_GUID"
                x-lineageReferenceObject: PERSON_GUID
                x-lineageLookupReferenceObject: persons
              courseRegistrationStatus:
                title: Course Status
                maxLength: 2
                type: string
                description: "Lineage reference object : SFRSTCA_RSTS_CODE"
                x-lineageReferenceObject: SFRSTCA_RSTS_CODE
              sourceCode:
                title: Source
                maxLength: 4
                type: string
                description: "Lineage reference object : SFRSTCA_SOURCE_CDE"
                x-lineageReferenceObject: SFRSTCA_SOURCE_CDE
              errorFlag:
                title: Error Flag
                maxLength: 1
                type: string
                description: "Lineage reference object : SFRSTCA_ERROR_FLAG"
                x-lineageReferenceObject: SFRSTCA_ERROR_FLAG
              message:
                title: Message
                maxLength: 200
                type: string
                description: "Lineage reference object : SFRSTCA_MESSAGE"
                x-lineageReferenceObject: SFRSTCA_MESSAGE
              messageType:
                title: Result Message Code
                maxLength: 200
                type: string
                description: "Lineage reference object : SFRSTCA_RMSG_CDE"
                x-lineageReferenceObject: SFRSTCA_RMSG_CDE
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer