                  $ref: '#/components/schemas/schema-database-queries-1.1.0'
              examples:
                database-queries-example-1.0.0:
                  $ref: '#/components/examples/database-queries-example-1.1.0'
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-1.1.0'
              examples:
                database-queries-example-1.0.0:
                  $ref: '#/components/examples/database-queries-example-1.1.0'
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-1.1.0'
              examples:
                database-queries-example-1.0.0:
