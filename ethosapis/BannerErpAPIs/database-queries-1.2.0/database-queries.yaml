          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Permission Denied
        '404':
          description: Resource not found
        '500':
          description: Server error, unexpected configuration or data
    put:
      summary: Update the requested resource from GORDQBD
      description: 'Updates a draft/query in GORDQBD with the passed-in identifier. - An update request sent for a draft creates a change in the compiled query in the GORDBQC. In addition to the required properties defined in the data model, the following are required for a PUT request: entities, selects, name, and domain'
      security:
        - EthosIntegrationBearer: []
          BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: API_DESIGNER_CREATE
      tags:
        - database-queries
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Blanket Purchase Orders for use in all external references
          schema:
            type: string
