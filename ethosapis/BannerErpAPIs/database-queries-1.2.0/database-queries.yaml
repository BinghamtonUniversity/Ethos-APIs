    delete:
      summary: Delete the requested resource from the GORDQBD
      description: Deletes the query from the GORDQBD table using the specified identifier.
      x-method-permissions: API_DESIGNER_CREATE
      tags:
        - database-queries
      parameters:
        - name: id
          in: path
