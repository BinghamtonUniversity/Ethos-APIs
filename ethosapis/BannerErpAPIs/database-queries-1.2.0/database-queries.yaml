openapi: 3.0.0
info:
  title: Database Queries
  version: 1.2.0
  x-source-system: banner
  description: |
    Displays all the queries/drafts/models created through API Designer. 
  x-api-type: ethos
  x-source-domain: Foundation
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: '{server_url}'
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/database-queries:
    get:
      summary: Returns the list of all the queries/drafts from GORDQBD
      description: Returns the list of all the records from GORDQBD where GORDQBD_SUB_QUERY_IND is null.
      security:
        - EthosIntegrationBearer: []
          BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: API_DESIGNER_CREATE
      tags:
        - database-queries
      parameters:
        - name: accept
          in: header
          required: true
          description: |
            The version of the resource requested. Prefer to use only the whole MAJOR version.  Refer to the Semantic Versioning topic in the API Standards for more information.
            ```
            application/vnd.hedtech.integration.v1.1.0+json
            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requested for this result set. Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0-based index for a collection of resources for the page requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Domain of the draft API 
            ```
            /database-queries?criteria={"domain":"SATURN"}
            ``` ```
            /database-queries?criteria={"queryVersion":"1.0.0"}
            ```  ```
            /database-queries?criteria={"name":"x-api"}
            ``` ```
            /database-queries?criteria={"queryStatus":"DRAFT"}
            ```
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-1.1.0'
              examples:
                database-queries-example-1.0.0:
                  $ref: '#/components/examples/database-queries-example-1.1.0'
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-1.1.0'
              examples:
                database-queries-example-1.0.0:
                  $ref: '#/components/examples/database-queries-example-1.1.0'
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-1.1.0'
              examples:
                database-queries-example-1.0.0:
                  $ref: '#/components/examples/database-queries-example-1.1.0'
            application/vnd.hedtech.integration.models.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-models-1.0.0'
              examples:
                database-queries-models-example-1.0.0:
                  $ref: '#/components/examples/database-queries-models-example-1.0.0'
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Permission Denied
        '404':
          description: Resource not found
        '500':
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in GORDQBD
      description: 'Creates a draft query in GORDQBD with GORDQBD_SUB_QUERY_IND = null. POST requests must include a nil GUID value (''00000000-0000-0000-0000-000000000000'') for the root id property. In addition to the required properties defined in the data model, the following are required for a POST request: entities, selects, name, and domain'
      security:
        - EthosIntegrationBearer: []
          BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: API_DESIGNER_CREATE
      tags:
        - database-queries
      parameters:
        - name: accept
          in: header
          required: true
          description: |
            The version of the resource requested. Prefer to use only the whole MAJOR version.  Refer to the Semantic Versioning topic in the API Standards for more information.
            ```
            application/vnd.hedtech.integration.v1.1.0+json
            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: |
            The version of the resource supplied in the request. Please refer to the API source documentation for detailed support information. Prefer to use only the whole MAJOR version. 
            ```
            application/vnd.hedtech.integration.v1+json
            ```
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-1.1.0'
              examples:
                database-queries-example-1.0.0:
                  $ref: '#/components/examples/database-queries-example-1.1.0'
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-1.1.0'
              examples:
                database-queries-example-1.0.0:
                  $ref: '#/components/examples/database-queries-example-1.1.0'
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-1.1.0'
              examples:
                database-queries-example-1.0.0:
                  $ref: '#/components/examples/database-queries-example-1.1.0'
            application/vnd.hedtech.integration.models.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-models-1.0.0'
              examples:
                database-queries-models-example-1.0.0:
                  $ref: '#/components/examples/database-queries-models-example-1.0.0'
            application/vnd.hedtech.integration.database-query-artifacts.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-artifacts-1.0.0'
              examples:
                database-queries-artifacts-example-1.0.0:
                  $ref: '#/components/examples/database-queries-artifacts-example-1.0.0'
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Permission Denied
        '404':
          description: Resource not found
        '500':
          description: Server error, unexpected configuration or data
  /api/database-queries/{id}:
    get:
      summary: Return the requested resource from the GORDQBD
      description: Returns the query draft from the GORDQBD table with the passed in identifier.
      security:
        - EthosIntegrationBearer: []
          BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: API_DESIGNER_CREATE
      tags:
        - database-queries
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: |
            The version of the resource requested. Please refer to the API source documentation for detailed support information. Prefer to use only the whole MAJOR version. 
            ```
            application/vnd.hedtech.integration.v1.1.0+json
            ```
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-queries-1.1.0'
              examples:
                database-queries-example-1.0.0:
