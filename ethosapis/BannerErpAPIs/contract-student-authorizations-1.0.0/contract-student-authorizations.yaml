components:
  schemas:
    contract-student-authorizations-1.0.0_put_request:
      type: object
      properties:
        id:
          "title": "surrogateId"
          "description": "Surrogate Identifier"
          "type": number
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_SURROGATE_ID
        activityDate:
          "title": "This field specifies the most current date record was created or updated."
          "description": "Current date is created or updated."
          "type": string
          "format": date-time
          "maxLength": 11
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_ACTIVITY_DATE
        studyPathSequence:
          "title": "studyPathSequenceNumber"
          "description": "Study Path Sequence number for the contract"
          "type": number
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_STSP_KEY_SEQUENCE
      required:
