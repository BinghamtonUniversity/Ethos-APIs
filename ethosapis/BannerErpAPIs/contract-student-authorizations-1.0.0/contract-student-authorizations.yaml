    contract-student-authorizations-1.0.0_response:
      type: object
      properties:
        id:
          "title": "surrogateId"
          "description": "Surrogate Identifier"
          "type": number
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_SURROGATE_ID
        studentId:
          "title": "Internal Identification Number of the student who has been authorized to receive payment from the third party contract."
          "description": "Identification number used to access person on-line."
          "type": string
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_STU_PIDM
        contractPriority:
          "title": "This indicates the priority of this contract for the student, if the student is authorized for more than one contract."
          "description": "Priority of the contract for the Student."
          "type": number
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_CONTRACT_PRIORITY
        contractId:
          "title": "Internal Identification Number of the non-person account that is identified as a third party contract."
          "description": "Identification number used to access non-person on-line."
          "type": string
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_CONTRACT_PIDM
        contractNumber:
          "title": "This field identifies the contract number associated with the third party for the term."
          "description": "Contract Number for the Student."
          "type": string
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_CONTRACT_NUMBER
        termCode:
          "title": "This field identifies the term associated with the third party contract number."
          "description": "Term Code for the contract."
          "type": string
          "maxLength": 6
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_TERM_CODE
        activityDate:
          "title": "This field specifies the most current date record was created or updated."
          "description": "Current date is created or updated."
          "type": string
          "format": date-time
          "maxLength": 11
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_ACTIVITY_DATE
        authorizedIndicator:
          "title": "An indicator signifying whether a student is pre-authorized, authorized, or unauthorized to use a contract."
          "description": "Indicator of the contract issued to the student"
          "type": string
          "maxLength": 1
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_AUTH_IND
        studContRollIndicator:
          "title": "Y denotes that when the process TSRROLL is executed, if the contract the student is in rolls then the student will also roll, N will cause student not to roll."
          "description": "Student Contract Roll Indicator"
          "type": string
          "maxLength": 1
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_STUDENT_CONT_ROLL_IND
        maxStudentAmount:
          "title": "maximumStudent_amount"
          "description": "Maximum Amount the Student can have for the contract"
          "type": number
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_MAX_STUDENT_AMOUNT
        studyPathSequence:
          "title": "studyPathSequenceNumber"
          "description": "Study Path Sequence number for the contract"
          "type": number
          "x-lineageReferenceObject": TBBCSTU.TBBCSTU_STSP_KEY_SEQUENCE
      required:
        - studentId
        - contractPriority
        - contractId
        - contractNumber
        - termCode
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
