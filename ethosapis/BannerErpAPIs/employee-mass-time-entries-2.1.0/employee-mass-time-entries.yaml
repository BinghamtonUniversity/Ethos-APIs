            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v2+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: string            
        - name: bannerId
          in: query
          required: false
          schema:
            type: string
          description: "ID: This field defines the identification number used to access a person on-line."
        
        - name: fundCode
          in: query
          required: false
          schema:
            type: string
          description: "FUND: Valued only if Banner Finance is installed."
        
        - name: progCode
          in: query
          required: false
          schema:
            type: string
          description: "PROGRAM: Valued only if Banner Finance is installed."
        
        - name: earnCode
          in: query
          required: false
          schema:
            type: string
          description: "EARN CODE: History earnings code."
        
        - name: percent
          in: query
          required: false
          schema:
            type: number
            format: decimal
          description: "PERCENT: Percent of pay to be applied to this labor distribution."
        
        - name: locnCode
          in: query
          required: false
          schema:
            type: string
          description: "LOCATION: Valued only if Banner Finance is installed."
        
        - name: beginDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "BEGIN DATE: Begin date of the number of hours for the earnings code."
        
        - name: dataOrigin
          in: query
          required: false
          schema:
            type: string
          description: "DATA ORIGIN: Source system that created or updated the data."
        
        - name: actvCode
          in: query
          required: false
          schema:
            type: string
          description: "ACTIVITY: Valued only if Banner Finance is installed."
        
        - name: projCode
          in: query
          required: false
          schema:
            type: string
          description: "PROJECT CODE: Project within Finance Cost Accounting Module."
        
        - name: year
          in: query
          required: false
          schema:
            type: string
          description: "YEAR: The year associated with the payroll."
        
        - name: ctypCode
          in: query
          required: false
          schema:
            type: string
          description: "COST TYPE CODE: Cost Type within Finance Cost Accounting Module."
        
        - name: activityDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "ACTIVITY DATE: Date when record was inserted or last modified."
        
        - name: pictCode
          in: query
          required: false
          schema:
            type: string
          description: "PAYROLL IDENTIFICATION CODE: The pay id code associated with this payroll."
        
        - name: payNo
          in: query
          required: false
          schema:
            type: integer
          description: "PAYROLL NUMBER: The pay number associated with this payroll."
        
        - name: hrs
          in: query
          required: false
          schema:
            type: number
            format: decimal
          description: "HOURS: Number of hours associated with this earnings code."
        
        - name: effectiveDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "EFFECTIVE DATE: The effective date associated with the assignment."
        
        - name: acciCode
          in: query
          required: false
          schema:
            type: string
          description: "ACCOUNT INDEX: Valued only if Banner Finance is installed."
        
        - name: shift
          in: query
          required: false
          schema:
            type: string
          description: "SHIFT: Shift associated with earnings code."
        
        - name: acctCode
          in: query
          required: false
          schema:
            type: string
          description: "ACCOUNT: Valued only if Banner Finance is installed."
        
        - name: posn
          in: query
          required: false
          schema:
            type: string
          description: "POSITION: Position code associated with the earnings."
        
        - name: specialRate
          in: query
          required: false
          schema:
            type: number
            format: decimal
          description: "RATE: Special rate of pay for this earnings code."
        
        - name: coasCode
          in: query
          required: false
          schema:
            type: string
          description: "CHART OF ACCOUNTS CODE: Valued only if Banner Finance is installed."
        
        - name: changeInd
          in: query
          required: false
          schema:
            type: string
          description: "RECORD CHANGED INDICATOR: Values (N)ot changed; (Y)New Record; (D)eleted; (O)ld Record (C)hanged Record."
        
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "END DATE: End date of the number of hours for the earnings code."
        
        - name: acctCodeExternal
          in: query
          required: false
          schema:
            type: string
          description: "EXTERNAL ACCOUNT: Free form account code to allow update of an accounting system other than Banner Finance."
        
        - name: suff
          in: query
          required: false
          schema:
            type: string
          description: "SUFFIX: The suffix associated with the position."
        
        - name: orgnCode
          in: query
          required: false
          schema:
            type: string
          description: "ORGANIZATION: Valued only if Banner Finance is installed."
        
        - name: deemedHrs
          in: query
          required: false
          schema:
            type: number
            format: decimal
          description: "DEEMED HOURS: Reportable hours for Canadian Employment Insurance."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object 
                $ref: "#/components/schemas/schema-extension-employee-mass-time-entries.json"
          headers:
            X-Media-Type:
