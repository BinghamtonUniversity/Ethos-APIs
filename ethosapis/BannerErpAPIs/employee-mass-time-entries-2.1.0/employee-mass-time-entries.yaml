openapi: 3.0.0
info:
  title: employee-mass-time-entries
  description: PHAMTIM receives data from a third-party interface; it does not edit the data but it does verify that the required fields exist. If the information is incomplete, it is not moved along in the payroll process, and you receive an error when you run PHPMTIM. This is always returned based on the pay event year, pay code, and pay number.
  version: 2.1.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employee-mass-time-entries:
    get:
      summary: Returns data from the PHRMTIM table.
      description: Returns the data from the PHRMTIM table that matches the passed parameters.
