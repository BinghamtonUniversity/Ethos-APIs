        menu:
          title: Menu Code
          maxLength: 10
          type: string
          description: Menu Code for the invitee.
          x-lineageReferenceObject: GERATTD_MENU_CODE
        registrantAttendedIndicator:
          title: Attendance Indicator
          maxLength: 1
          type: boolean
          description: Indicator to display whether or not the invitee actually attended
