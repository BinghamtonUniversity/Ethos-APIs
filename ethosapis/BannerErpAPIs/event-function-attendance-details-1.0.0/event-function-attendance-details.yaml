      tags:
        - event-function-attendance-details
      summary: Returns event function attendance details.
      description: Returns resources from GERATTD.
      parameters:
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          schema:
            type: integer
          in: query
          required: false
          description: >
            ### Event Reference Number

            Returns all records for the Event Reference Number passed.

            ```

            /event-function-attendance-details?criteria={"eventReferenceNumber":"A0275"}

            ```

            ### Function Code

            Returns all records for the Function Code passed.

            ```

            /event-function-attendance-details?criteria={"function":"BREAK"}

            ```            

            ### Registrant ID

            Returns all records for the specified Banner ID or temporary person
            Id.

            ```

            /event-function-attendance-details?criteria={"registrantId":"A005417890"}

            ```                
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
