openapi: 3.0.0
info:
  title: Event Function Attendance Details
  description: The Event Function Attendance Details API supports creation and
    maintenance of details related to function attendees as shown on the GEAATTD
    administrative page.  This API supports batch processing.
  version: 1.0.0
  x-source-domain: Foundation
  x-source-name: GERATTD
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
