      parameters:
        - name: id
          in: path
          description: >-
            A global identifier of the resource for use in all external
            references.
          required: true
          schema:
            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
            type: string
            format: guid
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: >-
                If STP (MEP) is enabled, returns the MEP code the response body
                is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: >-
                If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: >-
                Specifies the maximum number of resources returned in a
                response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: >-
                    #/components/schemas/vendor-details-v1.0.0_get_response
        '400':
          description: >-
            Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: >-
            Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: >-
            Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: >-
            Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
  /api/vendor-details/batches:
    post:
      summary: Creates or updates vendor details, for one vendor at a time.
      description: >
        This API can be used to create and update vendor information for Banner Finance in the following tables:
        
        - FTVVEND, FTVVENT, FTRVTCL, SPRIDEN, SPBPERS, SPRADDR, SPRTELE, GOREMAL

        
        From a single payload the POST API can update all vendor related tables including Vendor Name, Vendor Address, Vendor Telephone, Vendor Email, Vendor Type, and Taxes Collected related to the Vendor Maintenance (FTMVEND) page.
        
        
        From the same payload, the POST method supports Insert and Update for vendor values.
        
        
        - For example with an existing vendor, the API can add new property values previously null and at the same time overwrite or remove existing property values.
        
        
        - For example with a new vendor, the API can be used to update a Person ID and add new payment addresses.
        
        
        With the POST method updates, existing property values will not be removed unless sent as a null value property, for example:
        
        
        - To change Address from three lines to two lines, send Address Line 3 with a null value.
        
        
        - To change Telephone with Extension to Telephone without Extension, send the new Telephone and Telephone Extension with a null value.
        
        
        The POST method does not support Delete for Address, Telephone, Email, Vendor Type, and Taxes Collected.
        
        
        - Taxes Collected can be removed using this API by resetting a vendor to Collects No Taxes and then reverting to Collects Selected Taxes adding back the desired codes for Taxes Collected.
        
        
        Deletions for Address and Email can use different APIs from the Ethos Data Model set of General Person APIs.
      x-method-permissions: API_VENDOR_DETAILS
      tags:
        - vendor-details
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v11+json:
            schema:
              type: array
              items:
                $ref: >-
                  #/components/schemas/vendor-details-v1.0.0_post_batch_request
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: >-
                If STP (MEP) is enabled, returns the MEP code the response body
                is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: >-
                If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: >-
                Specifies the maximum number of resources returned in a
                response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: >-
                    #/components/schemas/vendor-details-v1.0.0_post_batch_response
        '400':
          description: >-
            Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: >-
            Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: >-
            Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: >-
            Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permission: null
components:
  schemas:
    vendor-details-v1.0.0_post_batch_request:
      title: vendor-details-v1.0.0_post_batch_request
      description: >-
        The details submitted for a vendor offering products or services to an institution.
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              addressDefaults:
                title: Default Addresses
                description: The default address(es) associated with the vendor.
                type: array
                items:
                  type: object
                  properties:
                    accountsPayableInvoice:
                      title: Default Accounts Payable Invoice Address
                      description: TThe default Accounts Payable invoice address associated with the vendor.
                      type: object
                      properties:
                        addressTypeSequence:
                          title: Accounts Payable Address Sequence Number
                          description: >-
                           Sequential number associated with the selected address for this vendor.
                          type: number
                          x-lineageReferenceObject: SPRADDR_SEQNO
                          x-lineageLookupReferenceObject: SPRADDR
                        addressTypeCode:
                          title: Account Payable Address Type
                          description: >-
                           The address type associated with the selected address for this vendor.
                          type: string
                          format: string
                          example: BU
                          x-lineageReferenceObject: STVATYP_CODE
                          x-lineageLookupReferenceObject: STVATYP
                        id:
                          title: Address ID
                          description: The global identifier for the Address.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageReferenceObject: SPRADDR_GUID
                          x-lineageLookupReferenceObject: SPRADDR
                    purchaseOrder:
                      title: Default Purchase Order Address
                      description: The default purchase order address associated with the vendor.
                      type: object
                      properties:
                        addressTypeSequence:
                          title: Purchase Order Address Sequence Number
                          description: >-
                            Sequential number associated with the selected address for this
                            vendor.
                          type: number
                          x-lineageReferenceObject: SPRADDR_SEQNO
                          x-lineageLookupReferenceObject: SPRADDR
                        addressTypeCode:
                          title: Purchase Order Address Type
                          description: >-
                           The address type associated with the selected address for this vendor.
                          type: string
                          format: string
                          example: BU
                          x-lineageReferenceObject: STVATYP_CODE
                          x-lineageLookupReferenceObject: STVATYP
                        id:
                          title: Address ID
                          description: The global identifier for the Address.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageReferenceObject: SPRADDR_GUID
                          x-lineageLookupReferenceObject: SPRADDR
                    vendor1099Vendor:
                      title: 1099 Vendor Default Address
                      description: The default address associated with the 1099 vendor.
                      type: object
                      properties:
                        addressTypeSequence:
                          title: 1099 Vendor Address Sequence Number
                          description: >-
                            Sequential number associated with the selected address for this vendor.
                          type: number
                          x-lineageReferenceObject: SPRADDR_SEQNO
                          x-lineageLookupReferenceObject: SPRADDR
                        addressTypeCode:
                          title: 1099 Vendor Address Type
                          description: >-
                            The 1099 vendor address type associated with the selected
                            address for this vendor.
                          type: string
                          format: string
                          example: BU
                          x-lineageReferenceObject: STVATYP_CODE
                          x-lineageLookupReferenceObject: STVATYP
                        id:
                          title: Address ID
                          description: The global identifier for the Address.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageReferenceObject: SPRADDR_GUID
                          x-lineageLookupReferenceObject: SPRADDR
                      additionalProperties: false
              addresses:
                title: Addresses
                description: The address(es) associated with the vendor.
                type: array
                items:
                  type: object
                  properties:
                    addressSequence:
                      title: Address Sequence
                      description: >-
                        The address type sequence associated with the address for the 
                        vendor.
                      type: number
                      format: number
                      example: 1
                      x-lineageReferenceObject: SPRADDR_SEQNO
                      x-lineageLookupReferenceObject: SPRADDR
                    addressType:
                      title: Address Type
                      description: >-
                        The address type associated with the selected address for this vendor.
                      type: string
                      format: string
                      maxLength: 2
                      example: BI
                      x-lineageReferenceObject: STVATYP_CODE
                      x-lineageLookupReferenceObject: STVATYP
                    carrierRoute:
                      title: Carrier Route
                      description: >-
                        Postal carrier-specified code representing the carrier route associated with this address.
                      type: string
                      format: string
                      maxLength: 4
                      example: '1577'
                      x-lineageReferenceObject: SPRADDR_CARRIER_ROUTE
                      x-lineageLookupReferenceObject: SPRADDR
                    city:
                      title: City Name
                      description: >-
                        City for the selected address type/sequence number combination for this vendor.
                      type: string
                      format: string
                      example: Boston
                      x-lineageReferenceObject: SPRADDR_CITY
                      x-lineageLookupReferenceObject: SPRADDR
                    correctionDigit:
                      title: Correction Digit
                      description: >-
                        Postal carrier-specified code representing the correction digit associated with this address.
                      type: number
                      format: number
                      example: 9
                      x-lineageReferenceObject: SPRADDR_CORRECTION_DIGIT
                      x-lineageLookupReferenceObject: SPRADDR
                    county:
                      title: County
                      description: >-
                        County for the selected address type/sequence number combination for
                        this vendor.
                      type: object
                      properties:
                        code:
                          title: >-
                            This field identifies the county code referenced on the Identification (FOAIDEN) page.
                          type: string
                          example: CA101
                          x-lineageReferenceObject: STVCNTY_CODE
                          x-lineageLookupReferenceObject: STVCNTY
                        id:
                          title: ID
                          description: The global identifier for the Usage.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageReferenceObject: STVCNTY_GUID
                          x-lineageLookupReferenceObject: STVCNTY
                    deliveryPoint:
                      title: Delivery Point
                      description: >-
                        Postal carrier-specified code representing the delivery point associated with this address.
                      type: string
                      example: "01"
                      x-lineageReferenceObject: SPRADDR_DELIVERY_POINT
                      x-lineageLookupReferenceObject: SPRADDR
                    houseNumber:
                      title: House Number
                      description: >-
                        House number for the selected address type/sequence number combination for this vendor. The house number is a unique number assigned to each building on a street or in an area and used as part of the postal address in some countries.
                      type: string
                      format: string
                      example: 1234
                      x-lineageReferenceObject: SPRADDR_HOUSE_NUMBER
                      x-lineageLookupReferenceObject: SPRADDR
                    id:
                      title: Address ID
                      description: The global identifier for the Usage.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageReferenceObject: SPRADDR_GUID
                      x-lineageLookupReferenceObject: SPRADDR
                    latestFaxDetails:
                      title: Vendor Fax Details
                      description: The latest vendor fax number information for the vendor address.
                      type: object
                      properties:
                        comment:
                          title: Comments
                          description: Comments associated with this record.
                          type: string
                          example: This is a sample comment text for telephone details.
                          maxLength: 60
                          x-lineageReferenceObject: SPRTELE_COMMENT
                          x-lineageLookupReferenceObject: SPRTELE
                        internationalAccess:
                          title: International Access
                          description: >-
                            International access code. Either phone number or international access code is required.
                          type: string
                          example: '2345678'
                          x-lineageReferenceObject: SPRTELE_INTL_ACCESS
                          x-lineageLookupReferenceObject: SPRTELE
                        phoneAreaCode:
                          title: Phone Area Code
                          description: The telephone area code for the vendor's location.
                          type: string
                          example: '123'
                          x-lineageReferenceObject: SPRTELE_PHONE_AREA
                          x-lineageLookupReferenceObject: SPRTELE
                        phoneExtension:
                          title: Phone Extension
                          description: The extension number for the vendor telephone number.
                          type: string
                          example: '017'
                          x-lineageReferenceObject: SPRTELE_PHONE_EXT
                          x-lineageLookupReferenceObject: SPRTELE
                        phoneNumber:
                          title: Phone Number
                          description: A phone number of the vendor.
                          type: string
                          example: '6784351234'
                          x-lineageReferenceObject: SPRTELE_PHONE_NUMBER
                          x-lineageLookupReferenceObject: SPRTELE
                        primaryIndicator:
                          title: Primary Indicator
