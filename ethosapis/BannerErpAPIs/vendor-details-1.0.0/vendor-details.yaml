openapi: 3.0.0
info:
  title: vendor-details
  description: >
    This API can be used to retrieve, create, and update vendor details for Banner Finance.
    
    
    The API GET and POST methods allow users a choice to send information with either of these styles of identification or both:
    
    
    - guids related to Ethos Data Model APIs, or
    
    
    - Banner codes such as Vendor code, Address Type code, Discount code, 1099 Income Type codes, Vendor Type codes, etc.
  version: 1.0.0
  x-source-name: FTVVEND
  x-source-title: Vendor Details
  x-source-system: banner
  x-api-type: erp
  x-release-status: beta
  x-audience: all
  x-source-domain: Finance
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: '{server_url}'
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/vendor-details:
    get:
      tags:
        - vendor-details
      summary: >
        Returns vendor details for all vendors, or using one of 18 parameter options returns vendor details for selected vendors.  (The number of vendors returned in a payload is regulated by the resource limit, a maximum of 500 vendors at a time.)
      description: >
        Returns resources from FTVVEND, FTVVENT, FTRVTCL, SPRIDEN, SPBPERS, SPRADDR, SPRTELE, and GOREMAL.
      parameters:
        - name: accept
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ``` 
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 500.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: >-
            The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: string
          description: |
            ### Vendor ID
            Returns vendor details for the given Vendor ID (guid).
            ```
            /vendor-details/criteria={"id":"a8d212c6-2f18-495c-9af0-a0d4e9ab8422"}
            ```
            ### vendorCode
            Returns vendor details for the given Vendor Code.
            ```
            /vendor-details?criteria={"vendorCode":"TESTVEND"}
            ```
            ### personIndicator
            Returns vendor details based on the type of person. Person indicator values are "Person" and "Organization".
            ```
            /vendor-details?criteria={"vendorDetails":{"personIndicator": "Person"}}
            ```
            ### lastNamePrefix
            Returns vendor details based on last name prefix.
            ```
            /vendor-details?criteria={"vendorDetails":{"lastNamePrefix":"LN"}}
            ```
            ### firstName
            Returns vendor details based on first name.
            ```
            /vendor-details?criteria={"vendorDetails":{"firstName": "VIFIRST"}}
            ```
            ### lastName
            Returns vendor details based on last name.
            ```
            /vendor-details?criteria={"vendorDetails":{"lastName": "VILAST"}}
            ```
            ### middleName
            Returns vendor details based on middle name.
            ```
            /vendor-details?criteria={"vendorDetails":{"middleName": "VIMID"}}
            ```
            ### firstName, middleName, lastName
            Returns vendor details based on first name, middle name, and last name.
            ```
            /vendor-details?criteria={"vendorDetails":{"firstName": "VIFIRST","middleName": "VIMID","lastName": "VILAST"}}
            ```
            ### vendorDetails id
            Returns vendor details based on the Person ID (guid) or Organization ID (guid).
            ```
            /vendor-details?criteria={"vendorDetails":{"id":"f1f9a3da-8faf-4027-9094-d31b2712c1ad"}}
            ```
            ### eProcurementIndicator
            Returns vendor details based on the eProcurement indicator. Values are "Yes" and "No".
            ```
            /vendor-details?criteria={"eProcurementIndicator": "No"}
            ```
            ### taxFormStatus
            Returns vendor details for the given Tax Form Status.
            ```
            /vendor-details?criteria={"taxFormStatus": "91"}
            ```
            ### vendorClassifications Code
            Returns vendor details for the given Vendor Type Classification Code.
            ```
            /vendor-details?criteria={"vendorClassifications":{"code": ["OS","IS"]}}
            ```
            ### vendorClassifications ID
            Returns vendor details for the given Vendor Type Classification ID (guid).
            ```
            /vendor-details?criteria={"vendorClassifications":{"id":"591ed257-4a6c-48d1-9031-a21851572a51"}}
            ```
            ### vendorCode and vendorClassifications Code
            Returns vendor details for the given Vendor Code and Vendor Type Classification Code.
            ```
            /vendor-details?criteria={"vendorCode":"VITEST","vendorClassifications":{"code": "OS"}}
            ```
            ### Vendor ID and vendorClassifications Code
            Returns vendor details for the given Vendor ID (guid) and Vendor Type Classification Code.
            ```
            /vendor-details?criteria={"id":"a8d212c6-2f18-495c-9af0-a0d4e9ab8422","vendorClassifications":{"code": "OS"}}
            ```
            ### Address ID
            Returns vendor details for the given Address ID (guid).
            ```
            /vendor-details?criteria={"addresses":{"id": "102c56a6-e351-414e-bac6-3a31685969fc"}}
            ```
            ### Vendor ID, addressType Code, and addressSequence Number
            Returns vendor details for the given Vendor ID (guid), Address Type, and Address Sequence.
            ```
            /vendor-details?criteria={"id":"a8d212c6-2f18-495c-9af0-a0d4e9ab8422","addresses":{"addressType": "BU","addressSequence": "1"}}
            ```
            ### vendorCode, addressType Code, and addressSequence Number
            Returns vendor details for the given Vendor Code, Address Type, and Address Sequence.
            ```
            /vendor-details?criteria={"vendorCode":"VITEST","addresses":{"addressType": "BU","addressSequence": "1"}}
            ```
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: >-
                If STP (MEP) is enabled, returns the MEP code the response body
                is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: >-
                If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: >-
                Specifies the maximum number of resources returned in a
                response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: >-
                    #/components/schemas/vendor-details-v1.0.0_get_response
        '400':
          description: >-
            Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: >-
            Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: >-
            Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: >-
            Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
  /api/vendor-details/{id}:
    get:
      tags:
