openapi: 3.0.0
info:
  title: Enrollment Rules
  description: This API create enrollment rule in the table TVRENRL.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
  x-source-title: Transcript Filetransfer Requests
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/enrollment-rules:
    post:
      summary: Create enrollment rule in the table TVRENRL.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ENROLLMENT_RULES
      tags:
        - enrollment-rules
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/json

            ```
          schema:
            type: string
        - name: content-type
          in: header
          required: true
          schema:
            type: string
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```
              application/json
            ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/enrollment-rules"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/enrollment-rules-response"
          headers:
            X-Media-Type:
              description: application/json
              schema:
                type: string
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    enrollment-rules:
      type: object
      properties:
        bannerId:
          type: string
          description: "Banner ID"
          x-lineageReferenceObject: SPRIDEN_ID
        comment:
          type: string
          description: "Comment to be inserted in record."
        enrc:
          type: string
          description: "Enrollment Code to be inserted in record."
          x-lineageReferenceObject: TVVENRC_CODE
        levl:
          type: string
          description: "The Level Code to be inserted in record."
          x-lineageReferenceObject: STVLEVL_CODE
        program:
          type: string
          description: "The Program Code to be inserted in record."
          x-lineageReferenceObject: SMRPRLE_PROGRAM
        term:
          type: string
          description: "The Term Code to be inserted in record."
          x-lineageReferenceObject: STVTERM_CODE
        executeMode:
          type: string
          description: "The execute mode to insert record. A=Audit (Only check if exists error in data) U=Update (Check error and insert data)."
      required:
        - bannerId
        - enrc
        - levl
        - program
        - term
        - executeMode
    enrollment-rules-response:
      type: object
      properties:
        status:
          type: string
          example: 'success'