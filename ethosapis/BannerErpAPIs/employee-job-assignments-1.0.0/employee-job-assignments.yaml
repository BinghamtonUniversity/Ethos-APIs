openapi: 3.0.0
info:
  title: Employee job assignments
  description: API for employee job assignment from NBAJOBS.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employee-job-assignments:
    get:
      summary: Return data from the NBAJOBS page.
      description: Returns the data that is part of NBAJOBS page.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_JOB_ASSIGNMENT
      tags:
        - employee-job-assignments
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: string
        - name: bannerId
          in: query
          required: true
          schema:
            type: string
        - name: posn
          in: query
          required: true
          schema:
            type: string
        - name: suff
          in: query
          required: true
          schema:
            type: string
        - name: effDate
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-extension-job-assignments.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
              examples:
                BannerIdRequired:
                  $ref: "#/components/examples/BannerIdRequired"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new record to NBAJOBS page.
      description: Create a new record to NBAJOBS page.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_JOB_ASSIGNMENT
      tags:
        - employee-job-assignments
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: bannerId
          in: query
          required: true
          schema:
            type: string
        - name: posn
          in: query
          required: true
          schema:
            type: string
        - name: suff
          in: query
          required: true
          schema:
            type: string
        - name: beginDate
          in: query
          required: true
          schema:
            type: string
        - name: jobType
          in: query
          required: true
          schema:
            type: integer
        - name: step
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-extension-job-assignments-post-put-response.json"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
              examples:
                BannerIdRequired:
                  $ref: "#/components/examples/BannerIdRequired"
                PositionCodeRequired:
                  $ref: "#/components/examples/PositionCodeRequired"
                SuffixRequired:
                  $ref: "#/components/examples/SuffixRequired"
                BeginDateRequired:
                  $ref: "#/components/examples/BeginDateRequired"
                JobTypeRequired:
                  $ref: "#/components/examples/JobTypeRequired"
                StepRequired:
                  $ref: "#/components/examples/StepRequired"
                InvalidId:
                  $ref: "#/components/examples/InvalidId"
                InvalidPosn:
                  $ref: "#/components/examples/InvalidPosn"
                InvalidJobType:
                  $ref: "#/components/examples/InvalidJobType"
                InvalidDateFormat:
                  $ref: "#/components/examples/InvalidDateFormat"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-extension-job-assignments-request.json"
    put:
      summary: Update the requested record in NBAJOBS Base Job, Job Detail, Payroll
        Default,Deferred Pay,Miscellaneous and California Pension tabs.
      description: Update the requested record in NBAJOBS Base Job, Job Detail,
        Payroll Default,Deferred Pay,Miscellaneous and California Pension tabs.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_JOB_ASSIGNMENT
      tags:
        - employee-job-assignents
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
          schema:
            type: string
        - name: bannerId
          in: path
          required: true
          description: Banner ID
          schema:
            type: string
        - name: posn
          in: query
          required: true
          schema:
            type: string
        - name: suff
          in: query
          required: true
          schema:
            type: string
        - name: effectiveDate
          in: query
