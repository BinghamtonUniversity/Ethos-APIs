      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-extension-job-assignments-post-put-response.json"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
              examples:
                BannerIdRequired:
                  $ref: "#/components/examples/BannerIdRequired"
                PositionCodeRequired:
                  $ref: "#/components/examples/PositionCodeRequired"
                SuffixRequired:
                  $ref: "#/components/examples/SuffixRequired"
                EffectiveDateRequired:
                  $ref: "#/components/examples/EffectiveDateRequired"
                JobTypeRequired:
                  $ref: "#/components/examples/JobTypeRequired"
                StepRequired:
                  $ref: "#/components/examples/StepRequired"
                InvalidId:
                  $ref: "#/components/examples/InvalidId"
                InvalidPosn:
                  $ref: "#/components/examples/InvalidPosn"
                InvalidJobType:
                  $ref: "#/components/examples/InvalidJobType"
                InvalidDateFormat:
                  $ref: "#/components/examples/InvalidDateFormat"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
