openapi: 3.0.0
info:
  title: Person Course Attributes
  description: "This API can be used to retrieve, post, or delete the attributes associated with a student's course academic history. This information is displayed in the Banner administrative page SHATCKN. Additionally, the API supports the option to post course history attributes in batches."
  version: 1.1.0
  x-source-name: SHATCKN
  x-source-title:
  x-source-system: banner
  x-source-domain: Student
  x-api-type: erp
  x-release-status: beta
  x-audience: all
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/person-course-attributes:
    get:
      tags:
      - person-course-attributes
      summary: Return person course history attributes for a given term and course.
      description: Return person course history attributes for a given term and course. Data is extracted from SHRTCKN and SHRATTR.
      parameters:
        - name: limit
          in: query
          description:  |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Banner Id

            Returns all records for the Banner ID passed.

            ```

            /person-course-attributes?criteria={"bannerId":"331314209"}

            ```

            ### Term

            Returns all records for the Term code passed.

            ```

            /person-course-attributes?criteria={"term":"202210"}

            ```

            ### Course Reference Number

            Returns all records for the Course Reference Number passed.

            ```

            /person-course-attributes?criteria={"courseReferenceNumber":"10123"}

            ```

            ### Person Course Attribute

            Returns all records for the Course Attribute passed.

            ```

            /person-course-attributes?criteria={"personCourseAttribute":"HUMA"}

            ```

            ### Course Sequence Number

            Returns all records for the Course Sequence Number passed.

            ```

            /person-course-attributes?criteria={"courseSequenceNumber":6}

            ```
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/person-course-attributes-1.1.0_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client’s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_PERSON_COURSE_ATTRIBUTES
    post:
      tags:
        - person-course-attributes
      summary: An insert of person course history attribute with respect to Term Code, Student ID, and Course Identifier.
      description: An insert of student person course history attribute with respect to Term Code, Student ID, and Course Reference Number.
      requestBody:
        content:
          application/vnd.hedtech.integration.1.1.0+json:
            schema:
              type: object
