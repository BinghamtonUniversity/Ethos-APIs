    delete:
      summary: Removes a person course attribute resource from SHRATTR.
      description: Removes a person course attribute from a course in academic history.
      tags:
        - person-course-attributes
      parameters:
        - name: id
          in: path
          required: true
          description: The ID for the person course attribute.
          schema:
            type: string
      responses:
        '200':
          description: No Content
        '204':
          description: No Content
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
