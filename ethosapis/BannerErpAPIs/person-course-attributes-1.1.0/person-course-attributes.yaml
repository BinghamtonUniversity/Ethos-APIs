components:
  schemas:
    person-course-attributes-1.1.0_response:
      properties:
        id:
          title: Id
          type: string
          maxLength: 19
          description: "The global identifier of the person course attribute."
          x-lineageReferenceObject: SHRATTR_SURROGATE_ID
          example: 8292
        bannerId:
          title: Banner ID
          maxLength: 9
          type: string
          description: "Identification Number of Student."
          x-lineageReferenceObject: SPRIDEN_ID
          example: A00444500
        term:
          title: Term Code
          maxLength: 6
          type: string
          description: "Term for students academic history course records."
          x-lineageReferenceObject: SHRATTR_TERM_CODE
          x-lineageLookupReferenceObject: STVTERM
          example: 202410
        courseSequenceNumber:
          title: Course Sequence Number
          maxLength: 3
          type: integer
          description: "Course Sequence Number from the students academic history for the term."
          x-lineageReferenceObject: SHRATTR_TCKN_SEQ_NO
          example: 3
        personCourseAttribute:
          title: Assigned Person Course Attribute
          maxLength: 4
          type: string
          description: "Course attribute assigned to the person for the specified course."
          x-lineageReferenceObject: SHRATTR_ATTR_CODE
          x-lineageLookupReferenceObject: STVATTR
          example: SSCI
        subject:
          title: Subject
          maxLength: 4
          type: string
          description: "Subject Area Code.  Subject area associated with the students course."
          x-lineageReferenceObject: SHRTCKN_SUBJ_CODE
          x-lineageLookupReferenceObject: STVSUBJ
          example: POLS
        courseNumber:
          title: Course Number
          maxLength: 5
          type: string
          description: "Course Number.  Course Number associated with the students course."
          x-lineageReferenceObject: SHRTCKN_CRSE_NUMB
          example: 247
        courseTitle:
          title: Course Title
          maxLength: 30
          type: string
          description: "Title of the course taken by the student."
          x-lineageReferenceObject: SHRTCKN_CRSE_TITLE
          example: International Relations
        courseReferenceNumber:
          title: Course Reference Number
          maxLength: 5
          type: string
          description: "Course Reference Number from the students academic history for the term."
          x-lineageReferenceObject: SHRTCKN_CRN
          example: 34826
        courseAlias:
          title: Course Alias
          type: string
        courseIdentifierDisplay:
          title: Course Identifier Display
          type: string
      required:
        - id
        - bannerId
        - term
        - personCourseAttribute
        - courseSequenceNumber
        - subject
        - courseNumber
        - courseTitle
        - courseReferenceNumber
    person-course-attributes-1.1.0_post_request:
      type: object
      properties:
        bannerId:
          title: Banner ID
          maxLength: 9
          type: string
          description: "Internal Identification Number of Student."
          example: A00444500
        term:
          title: Term Code
          maxLength: 6
          type: string
          description: "Term for students academic history course records."
          example: 202410
        courseReferenceNumber:
          title: "Course Reference Number"
          description: "Course Reference Number.  CRN of the students course."
          maxLength: 5
          type: string
          example: 34826
        personCourseAttribute:
          title: Course Attribute Code
          maxLength: 4
          type: string
          description: "Course attribute code."
          example: SSCI
      required:
        - bannerId
        - term
        - courseReferenceNumber
        - personCourseAttribute
    person-course-attributes-batch-1.1.0_post_request:
      type: object
      properties:
        items:
          title: items
          description: List of items to be processed.
          type: array
          items:
            type: object
            $ref: '#/components/schemas/person-course-attributes-batch-1.1.0_post_items'
      required:
        - items
    person-course-attributes-batch-1.1.0_post_items:
      type: object
      properties:
        bannerId:
          title: Banner ID
          maxLength: 9
          type: string
          description: "Internal Identification Number of Student."
          example: A00444500
        term:
          title: Term Code
          maxLength: 6
          type: string
          description: "Term for students academic history course records."
          example: 202410
        courseReferenceNumber:
          title: "Course Reference Number"
          description: "Course Reference Number.  CRN of the students course."
          maxLength: 5
          type: string
          example: 34826
        personCourseAttribute:
          title: Course Attribute Code
          maxLength: 4
          type: string
          description: "Course attribute code."
          example: SSCI
      required:
        - bannerId
        - term
        - courseReferenceNumber
        - personCourseAttribute
    person-course-attributes-batch-1.1.0_post_response:
        description: 'Returns the list of Ids for those person course history attributes that were successfully created. For those that did not, it returns the list of error messages. '
        type: object
        x-last-modified:
        properties:
          id:
            title: ID
            description: A globally unique identifier of a batch to be used in all external references.
            type: string
            example: 8292
          status:
            title: status
            description: status of the batch.
            type: string
            enum:
              - completed
              - inProgress
              - aborted
            example: completed
          resource:
            title: Resource
            description: The affected resource.
            type: object
            properties:
              name:
                title: Resource Name
                description: The pluralized name of the affected resource
                type: string
                example: person-course-attributes
              version:
                title: Resource version
                description: The version of the resource
                type: string
                example: 1.1.0
            additionalProperties: false
            required:
              - name
              - version
        items:
          type: array
          items:
            type: object
            additionalProperties: true
            oneOf:
              - type: object
                $ref: '#/components/schemas/person-course-attributes-1.1.0_response'
              - type: object
                $ref: '#/components/schemas/errors_2_0_0'
          required:
            - items
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
              type: object
              properties:
                id:
                  type: string
                  description: The global identifier of the resource in error.
                sourceId:
                  type: string
                  description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
                code:
                  type: string
                  description: The error message code used to describe the error details.
                description:
                  type: string
                  description: The error description used to describe the error details.
                message:
                  type: string
                  description: The detailed actionable error message.
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
