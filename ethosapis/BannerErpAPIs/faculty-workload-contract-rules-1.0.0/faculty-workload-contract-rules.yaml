components:
  schemas:
    faculty-workload-contract-rules-1.0.0_qapi_post_request:
      type: object
      required:
        - term        
      properties:              
        queryTerm:
          title: Query Term
          maxLength: 6
          type: string
          description: "A user provided value. The query term code is used to retrieve the effective term workload contract rules."
          x-lineageLookupReferenceObject: STVTERM
          example: 202201    
        contractType:
          title: Contract Type
          maxLength: 2
          type: string
          description: "The faculty member workload rule contract code."
          x-lineageReferenceObject: SIRFLRC_FCNT_CODE
          x-lineageLookupReferenceObject: STVFCNT             
          example: FS 
        contractRule: 
          title: Contract Rule
          maxLength: 6
          type: string
          description: "The faculty member workload rule code."
          x-lineageReferenceObject: SIRFLRC_CNTR_CODE
          x-lineageLookupReferenceObject: STVCNTR
          example: CHAIR           
        status: 
          title: Status 
          description: "Indicates whether the faculty member workload rule is active (A) or inactive (I)."
          maxLength: 1
          type: string
          x-lineageReferenceObject: SIRFLRC_STATUS
          example: 'A'             
    faculty-workload-contract-rules-1.0.0_response:
      type: object
      required:
        - id
        - contractType
        - fromTerm
      properties:
        id:
          title: ID
          description: "The global identifier of a faculty workload contract rule to be used in all external references." 
          type: string
          format: guid
          x-lineageReferenceObject: SIRFLRC_GUID
          example: ee711196-0211-483e-b73c-511af692e532      
        fromTerm:
          title: Effective Term
          maxLength: 6
          type: string
          description: "The starting term code for a faculty member workload rule."
          x-lineageReferenceObject: SIRFLRC_TERM_CODE_EFF
          x-lineageLookupReferenceObject: STVTERM
          example: 199510    
        toTerm:
          title: Ending Term
          maxLength: 6
          type: string
          description: "The ending term code for a faculty member workload rule."
          x-lineageReferenceObject: derived
          x-lineageDerivedLogic: "The to term is derived by querying the system to locate the next effective term that is greater than the from term. On the highest effective term record the system default term of 999999 is displayed as the to term."
          x-lineageLookupReferenceObject: STVTERM
          example: 999999              
        contractType:
          title: Contract Type
          maxLength: 2
          type: string
          description: "The faculty member workload rule contract code."
          x-lineageReferenceObject: SIRFLRC_FCNT_CODE
          x-lineageLookupReferenceObject: STVFCNT             
          example: FS 
        contractTypeDescription:
          title: Contract Type Code Description
          maxLength: 30
          type: string
          description: "Description of faculty member contract type code."
          x-lineageReferenceObject: STVFCNT_DESC
          example: Fall Only  
        status: 
          title: Status 
          description: "Indicates whether the faculty member workload rule is active (A) or inactive (I)."
          maxLength: 1
          type: string
          x-lineageReferenceObject: SIRFLRC_STATUS
          example: 'A'       
        contractRule: 
          title: Contract Rule
          maxLength: 6
          type: string
          description: "The faculty member workload rule code."
          x-lineageReferenceObject: SIRFLRC_CNTR_CODE
          x-lineageLookupReferenceObject: STVCNTR
          example: CHAIR 
        contractRuleDescription:
          title: Contract Rule Code Description
          maxLength: 30
          type: string
          description: "Description of the contract rule code."
          x-lineageReferenceObject: STVCNTR_DESC
          example: Chairperson             
        creditCeuHoursMinimum: 
          title: Credit/CEU Hours Minimum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule low range total credit/CEU hours."
          x-lineageReferenceObject: SIRFLRC_CREDIT_HR_LOW
          example: 3
        creditCeuHoursMaximum: 
          title: Credit/CEU Hours Maximum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule high range total credit hours."
          x-lineageReferenceObject: SIRFLRC_CREDIT_HR_HIGH
          example: 4
        creditCeuHoursGeneratedMinimum: 
          title: Credit/CEU Hours Generated Minimum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule low range total generated credit hours."
          x-lineageReferenceObject: SIRFLRC_CREDIT_HR_LOW_GEN
          example: 6
        creditCeuHoursGeneratedMaximum: 
          title: Credit CEU Hours Generated Maximum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule high range total generated credit hours."
          x-lineageReferenceObject: SIRFLRC_CREDIT_HR_HIGH_GEN
          example: 9                
        contactHoursMinimum: 
          title: Contact Hours Minimum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule total low range total contact hours."
          x-lineageReferenceObject: SIRFLRC_CONTACT_HR_LOW
          example: 3
        contactHoursMaximum: 
          title: Contact Hours Maximum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule high range total contact hours."
          x-lineageReferenceObject: SIRFLRC_CONTACT_HR_HIGH
          example: 4
        contactHoursWeeklyMinimum: 
          title: Contact Hours Weekly Minimum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule low range total weekly contact hours."
          x-lineageReferenceObject: SIRFLRC_CONTACT_HR_LOW_WEEK
          example: 6
        contactHoursWeeklyMaximum: 
          title: Contact Hours Weekly Maximum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule high range total weekly contact hours."
          x-lineageReferenceObject: SIRFLRC_CONTACT_HR_HIGH_WEEK
          example: 9 
        instructionalWorkloadMinimum: 
          title: Instructional Workload Minimum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule  low range total instructional workload."
          x-lineageReferenceObject: SIRFLRC_INST_WORKLOAD_LOW
          example: 3
        instructionalWorkloadMaximum: 
          title: Instructional Workload Maximum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule total high range total instructional workload."
          x-lineageReferenceObject: SIRFLRC_INST_WORKLOAD_HIGH
          example: 4
        nonInstructionalWorkloadMinimum: 
          title: Non-Instructional Workload Minimum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule low range total non-instructional workload."
          x-lineageReferenceObject: SIRFLRC_NIST_WORKLOAD_LOW
          example: 6
        nonInstructionalWorkloadMaximum: 
          title: Non-Instructional Workload Maximum
          maxLength: 9
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule high range total non-instructional workload."
          x-lineageReferenceObject: SIRFLRC_NIST_WORKLOAD_HIGH
          example: 9        
        totalWorkloadMinimum: 
          title: Total Workload Minimum
          maxLength: 11
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule low range total workload."
          x-lineageReferenceObject: SIRFLRC_TOT_WORKLOAD_LOW
          example: 6
        totalWorkloadMaximum: 
          title: Total Workload Maximum
          maxLength: 11
          type: number
          multipleOf: 0.001           
          description: "The faculty member workload rule high range total workload."
          x-lineageReferenceObject: SIRFLRC_TOT_WORKLOAD_HIGH
          example: 9                    
        fteMinimum:
          title: FTE Minimum
          maxLength: 5
          type: number
          multipleOf: 0.01                
          description: "The full time equivalent low range."
          x-lineageReferenceObject: SIRFLRC_FTE_LOW
          example: 75
        fteMaximum: 
          title: FTE Maximum
          maxLength: 5
          type: number
          multipleOf: 0.01           
          description: "The full time equivalent high range."
          x-lineageReferenceObject: SIRFLRC_FTE_HIGH
          example: 100
        modifiedOn:
          title: Modified On
          maxLength: 11
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          description: "Most current date the record was created or changed."
          x-lineageReferenceObject: SIRFLRC_ACTIVITY_DATE
          example: 2024-05-05T04:00:00Z                     
        modifiedBy:
          title: Modified By User ID
          maxLength: 30
          type: string
          description: "User who inserted or last updated the data."
          x-lineageReferenceObject: SIRFLRC_USER_ID
          example: SAISUSR        
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
              type: object
              properties:
                id:
                  type: string
                  description: The global identifier of the resource in error.
                sourceId:
                  type: string
                  description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
                code:
                  type: string
                  description: The error message code used to describe the error details.
                description:
                  type: string
                  description: The error description used to describe the error details.
                message:
                  type: string
                  description: The detailed actionable error message.
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic

