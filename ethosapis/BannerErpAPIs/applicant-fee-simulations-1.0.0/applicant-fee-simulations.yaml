openapi: 3.0.0
info:
  title: Applicant Fee Simulations
  description: This QAPI returns the fees to be displayed in ARSAESA during the financial step. It receives information from the student's enrollment process and processes it to obtain student-related information for their fees.
  version: 1.0.0
  x-source-domain: Student
  x-source-system: Banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /qapi/applicant-fee-simulations:
    post:
      tags:
        - applicant-fee-simulations QAPI
      summary: Return fee related information for an applicant.
      description: Queries for the requested resource using a set of attributes provided in the post
        request body.  Please note the path to the server is overridden to use /qapi/{resource} 
        in the URL and not /api/{resource}.
        
        Returns fee related information for an applicant.
      parameters:
        - name: limit
          in: query
          description:
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/applicant-fee-simulations-1.0.0_qapi_post_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client�s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - BearerAuth: []
        - BasicAuth: []
      x-method-permission: API_APPLICANT_FEE_SIMULATIONS
components:
  schemas:
    applicant-fee-simulations-1.0.0_qapi_post_request:
      type: object
      required:
        - guid   
        - termCode     
        - program
      properties:              
        guid:
          title: GUID
          maxLength: 36
          type: string
          description: Student's GUID.
          x-lineageReferenceObject: GORGUID_GUID
        termCode: 
          title: Term Code
          maxLength: 6
          type: string
          description: The term code associated with the applicant.
          x-lineageReferenceObject: STVTERM_CODE
        program:
          title: Program
          maxLength: 12
          type: string
          description: The program selected by the applicant.        
          x-lineageLookupReferenceObject: SMPRPRLE_PROGRAM
        lcurSeqNo:
          title: Base Rule Number
          maxLength: 8
          type: string
          description: The base rule number associated to the applicant.        
          x-lineageLookupReferenceObject: SORLCUR_SEQNO
        lfosSeqNo:
          title: Field of Study
          maxLength: 22
          type: string
          description: The field of study associated to the applicant.         
          x-lineageLookupReferenceObject: SORLFOS_SEQNO
        levlCode:
          title: Level Code
          maxLength: 8
          type: string
          description: The level code associated to the applicant.         
          x-lineageLookupReferenceObject: STVLEVL_CODE
        stypCode:
          title: Student Type Code 
          maxLength: 4
          type: string
          description: The student type code associated to the applicant.         
          x-lineageLookupReferenceObject: SARADAP_STYP_CODE
    applicant-fee-simulations-1.0.0_qapi_post_response:
      type: object
      required:
        - header
        - condition
        - validateFee    
      properties:
        header:
          title: Header
          type: string
          description: Header benefit.
        condition: 
          title: Condition
          type: string
          description: Condition benefit.
        courseDetail:
          title: Course Detail
          type: object
          required:
            - mustBeShownFinancialValidation
            - mandatoryTrans
          properties:    
            mustBeShownFinancialValidation:
              title: Must Be Shown Financial Validation
              type: string
              description: Indicates if the financial validation must be shown.
              example: 'Y'
            mandatoryTrans: 
              title: Mandatory Transaction
              type: object
              properties: 
                tvrpfrg_detail_code:
                  title: Detail Code
                  type: string
                  description: The detail code associated to the mandatory transaction.
                due_date:
                  title: Due Date
                  type: string
                  description: The due date associated to the mandatory transaction.
            exceptionalSkipMsg:
              title: Exceptional Skip Message
              type: string
              description: The starting term code for a set of base course details.
            feeErrorMsg:
              title: Fee Error Message
              type: string
              description: The fee error message associated to the course detail.
            tuiErrorMsg:
              title: TUI Error Message
              type: string
              description: The TUI error message associated to the course detail.
            vErrorMsg:
              title: V Error Message
              type: string
              description: The V error message associated to the course detail.   
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
              type: object
              properties:
                id:
                  type: string
                  description: The global identifier of the resource in error.
                sourceId:
                  type: string
                  description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
                code:
                  type: string
                  description: The error message code used to describe the error details.
                description:
                  type: string
                  description: The error description used to describe the error details.
                message:
                  type: string
                  description: The detailed actionable error message.
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic