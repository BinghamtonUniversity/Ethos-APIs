            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Id

            Returns all source background types for the given code.

            ```

            /source-background-types?criteria={"code":"ex"}

            ```

            ### System required Indicator

            Returns all source background types with the value of the System required Indicator given.

            ```

            /source-background-types?criteria={"systemRequired":"true"}

