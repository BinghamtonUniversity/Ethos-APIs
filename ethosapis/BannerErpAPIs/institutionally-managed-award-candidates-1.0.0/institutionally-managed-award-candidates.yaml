openapi: 3.0.0
info:
  title: institutionally-managed-award-candidates
  description: >
    <p>
      Creates or retrieves the Institutionally Managed Award Candidates. The details are based on the KVAIACA page.
    </p>
    
    <p>
      <strong>GET API</strong> – Retrieves all Institutionally Managed Award Candidate records based on the input parameters provided by the user.  
       Data is sourced from the <strong>KVRIACA</strong> table.
    </p>

    <p>
       <strong>POST API</strong> – Creates a new Institutionally Managed Award Candidate record.  
       Upon successful creation, the data is stored in the following resource table: <strong>KVRIACA</strong>.
    </p>
  version: 1.0.0
  x-api-type: erp
  x-source-title: Institutionally Managed Award Candidates (Student Aid)
  x-source-name: KVRIACA
  x-release-status: ga
  x-source-system: banner
  x-source-domain: Financial Aid
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
