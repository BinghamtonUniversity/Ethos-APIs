            type: string
            x-lineageReferenceObject: KVRIACA_FNDC_CODE
          candidateFundCodeSequenceNumber:
            title: Candidate Fund Code Sequence Number
            description: It is a one-up number used to differentiate one candidate award from the other.
            type: integer
            x-lineageReferenceObject: KVRIACA_CAND_FNDC_SEQ_NO
          candidateStatus:
            title: Candidate Status
            description: It indicates the status of this candidate regarding the Award.
            type: string
            x-lineageReferenceObject: KVRIACA_CAND_STATUS
          candidateStatusDate:
            title: Candidate Status Date
            description: The date when the candidate status was last updated.
            type: string
            format: date
            x-lineageReferenceObject: KVRIACA_CAND_STATUS_DATE
          candidateReasonCode:
            title: Candidate Reason Code
