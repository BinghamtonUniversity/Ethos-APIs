            type: string
            x-lineageReferenceObject: KVRIACA_CREA_CODE
          candidateReasonCodeDate:
            title: Candidate Reason Code Date
            description: The date when the candidate reason code for the applicant was last updated.
            type: string
            format: date
            x-lineageReferenceObject: KVRIACA_CREA_DATE
          candidateSource:
            title: Candidate Source
            description: The source that caused this award to be assigned to this candidate in this table.
            type: string
            x-lineageReferenceObject: KVRIACA_CAND_SOURCE
          studentId:
            title: Student Id
            description: User id of the student
            type: string
            x-lineageReferenceObject: SPRIDEN_ID
          candidateAmount:
            title: Candidate Amount
            description: The amount of money assigned to this candidate for this award.
            type: string
            format: double
            x-lineageReferenceObject: KVRIACA_CAND_AMT
          candidateAmountDate:
            title: Candidate Amount Date
            description: The date in which the amount of money was assigned to this candidate for this award.
            type: string
            format: date
            x-lineageReferenceObject: KVRIACA_CAND_AMT_DATE
          startDate:
            title: Start Date
            description: The award tracking start date for this award for this candidate.
            type: string
            format: date
            x-lineageReferenceObject: KVRIACA_START_DATE
          endDate:
            title: End Date
            description: The award tracking end date for this award for this candidate.
            type: string
            format: date
            x-lineageReferenceObject: KVRIACA_END_DATE
          renewableIndicator:
            title: Renewable Indicator
            description: It indicates if this award is issued for more than one aid year for this candidate.
            type: string
            x-lineageReferenceObject: KVRIACA_RENEW_IND
          renewableNumberOfYears:
            title: Renewable Number Of Years
            description: It is the number of years a fund code is renewable for this candidate
            type: integer
            x-lineageReferenceObject: KVRIACA_RENEW_NUM_YEARS
          candidateEligibilityIndicator:
            title: Candidate Eligibility Indicator
            description: It indicates if the candidate is eligible or not for receiving this award.
            type: string
            x-lineageReferenceObject: KVRIACA_CAND_ELIG_IND
          newCandidateEligibilityIndicator:
            title: New Candidate Eligibility Indicator
            description: The new value of the Candidate eligibility indicator after being overridden by the user.
            type: string
            x-lineageReferenceObject: KVRIACA_NEW_CAND_ELIG_IND
          awardedFundCodeSequenceNumber:
            title: Awarded Fund Code Sequence Number
            description: The aid fund code sequence number attached to the award
            type: integer
            x-lineageReferenceObject: KVRIACA_AWARDED_FNDC_SEQ_NO
          comment:
            title: Comment
            description: The comment attached to this aid fund code for this candidate.
            type: string
            x-lineageReferenceObject: KVRIACA_COMMENT
          dataOrigin:
            title: Data Origin
            description: The latest source for the data contained in this record.
            type: string
            x-lineageReferenceObject: KVRIACA_DATA_ORIGIN
          createdUserId:
            title: Created User Id
            description: The logon ID of the user who created this record.
            type: string
            x-lineageReferenceObject: KVRIACA_CREATE_USER_ID
          createdDate:
            title: Created Date
            description: The date this record was created.
            type: string
            format: date
            x-lineageReferenceObject: KVRIACA_CREATE_DATE
          userId:
            title: User Id
            description: The logon ID of the user who created or last updated this record.
            type: string
            x-lineageReferenceObject: KVRIACA_USER_ID
          webQueryIndicator:
            title: Web Query Indicator
            description: It indicates if this candidate award record can be displayed or not on the query web pages for this applicant.
