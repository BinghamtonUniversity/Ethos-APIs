openapi: 3.0.0
info:
  title: general-student-curricula-details
  description: |
    Retrieves the list of general student curricula details.
  version: 1.0.0-beta
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: beta
  x-source-domain: Student
  x-source-title: General Student Curricula Details
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: general-student-curricula-details
paths:
  /api/general-student-curricula-details:
    get:
      description: >
        __Paging__ NA

          __Sorting__ NA

        __Filtering__ Filtering is supported using url parameters
        ['studentId', 'termCode'].
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_GEN_STUD_CURR_DETAILS
      tags:
        - general-student-curricula-details
      parameters:
        - name: accept
          in: header
          required: true
          schema:
            type: string
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version. See the semantic versioning topic in the API
            Standards from more information.

            ```
              application/vnd.hedtech.integration.v1+json
            ```
        - name: criteria
          in: query
          required: true
          schema:
            type: object
          description: >
            ### Student Id  

            Returns all general-student-curricula-details for the student id
            passed. "studentId" is mandatory filter input

            ```

            /general-student-curricula-details?criteria={"studentId":"A10025118"}

            ```

            ### Term Code  

            Returns all general-student-curricula-details for the student id and term code passed.

            ```

            /general-student-curricula-details?criteria={"studentId":"A10025118","termCode":"201410"}

            ```
      responses:
        "200":
          description: Success
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/general-student-curricula-details"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
