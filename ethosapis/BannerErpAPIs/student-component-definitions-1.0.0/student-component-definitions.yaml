openapi: 3.0.0
info:
  title: student-component-definitions
  description: >
    Retrieves the list of student components definitions for the course
    reference number and term passed.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
  x-source-title: Student Component Definitions
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: student-component-definitions
paths:
  /api/student-component-definitions:
    get:
      description: >
        __Paging__ Pagination is supported using parameters limit and offset.
        Default value for limit is 500 and upper limit is 1000.

          __Sorting__ NA

        __Filtering__ Filtering is supported using url parameters [crn’,
        ‘term’].
          
        __Example:__
        /api/student-gradable-subcomponents?crn=35002&term=201440&componentId=43&subComponentId=41 
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUD_COMP_DEFINITIONS
      tags:
        - student-component-definitions
      parameters:
        - name: accept
          in: header
          required: true
          schema:
            type: string
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```
              application/vnd.hedtech.integration.v1.0.0+json
            ```
        - name: crn
          in: query
          required: true
          schema:
            type: string
          description: course reference number
          example: 35002
        - name: term
          in: query
          required: true
          schema:
            type: string
          description: term code
          example: 201440
      responses:
        "200":
          description: Success
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/student-component-definitions"
              examples:
                student-grades:
                  $ref: "#/components/examples/student-component-definitions"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    student-component-definitions:
      type: array
      items:
        type: object
        properties:
          componentDescription:
            type: string
          componentId:
            type: integer
          componentName:
            type: string
          subComponents:
            type: array
            items:
              type: object
              properties:
                subcomponentDescription:
                  type: string
                subComponentId:
                  type: integer
                subcomponentName:
                  type: string
  examples:
    student-component-definitions:
      value: |-
        [
        {
            "componentDescription": "Physics 1",
            "componentId": 77,
            "componentName": "PHYSICS1"
        },
        {
            "componentDescription": "Physics 2",
            "componentId": 78,
            "componentName": "PHYSICS2"
        },
        {
            "componentDescription": "Physics 3",
            "componentId": 79,
            "componentName": "PHYSICS3",
            "subComponents": [
                {
                    "subComponentDescription": "Sub Component 1",
                    "subComponentId": 80,
                    "subComponentName": "SUBCOMP1"
                },
                {
                    "subComponentDescription": "Sub Component 2",
                    "subComponentId": 81,
                    "subComponentName": "SUBCOMP2"
                }
            ]
        }
         ]
