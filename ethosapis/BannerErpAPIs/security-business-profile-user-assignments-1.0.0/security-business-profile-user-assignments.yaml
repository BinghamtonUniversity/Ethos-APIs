openapi: 3.0.0
info:
  title: Security Business Profile User Assignments
  description: >
    The Security Business Profile User Assignments API is used to create or delete
    Banner Business Profile User Assignments as shown on the GOAFBPR administrative page in Banner Access Management.
    In addition, the API supports the option to post business profile user assignments in batches.

    
    Note: To maintain strict access control, the required security object must be assigned directly to individual users. 
    Assignment via security classes is not supported for this API.
