openapi: 3.0.0
info:
  title: Security Class Details
  description: >
    The Security Class Details API provides information about Banner Security Classes as shown on the Classes tab on the GSASECR administrative page in Banner Access Management.


    Note: To maintain strict access control, the required security object must be assigned directly to individual users. 
    Assignment via security classes is not supported for this API.
  version: 1.1.0
  x-api-type: erp
  x-release-status: ga
  x-source-system: banner
  x-audience: all
  x-source-domain: Foundation
  x-source-name: GSASECR
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/security-class-details:
    get:
      tags:
      - security-class-details
      summary: Returns security class details.
      description: Returns resources from GTVCLAS, GURUCLS and GURUOBJ.
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          description:  |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object   
          description: >
            ### Security Class

            Returns all records for the Security Class passed.

            ```

            /security-class-details?criteria={"securityClass":"BAN_DEFAULT_C"}

            ```

            ### System Type

            Returns all security class records for the System Type passed.

            ```

            /security-class-details?criteria={"systemType":"G"}

            ```    

            ### Assigned User

            Returns all security class records associated with the Assigned User(s) passed.

            ```

            /security-class-details?criteria={"assignedUsers":["A0000275"]}
            

            ```   
            
            ### Assigned Object

            Returns all security class records associated with the Assigned Object(s) passed.

            ```

            /security-class-details?criteria={"assignedObjects":{"object":["SHQSECT","TestObject2"]}}

            ```         
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
