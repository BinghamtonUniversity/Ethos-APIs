components:
  schemas:
    security-class-details-1.1.0_post_request:
      type: object
      required:
        - securityClass 
      properties:
        securityClass:
          title: Security Class Code
          description: "The name of the security class."
          type: string
          x-lineageReferenceObject: GTVCLAS_CLASS_CODE
          example: "BAN_STUDENT_C"
          maxLength: 30   
        systemType:
          title: System Indicator 
          description: "The system that a security class is associated with."
          type: string
          x-lineageReferenceObject: GTVCLAS_SYSI_CODE
          x-lineageLookupReferenceObject: gtvsysi  
          example: 'G'
          maxLength: 2                 
        owner:
          title: Owner
          description: "The owner of the security class. Defaults to API user if not included in request."
          type: string
          x-lineageReferenceObject: GTVCLAS_OWNER
          example: "BANSECR"
          maxLength: 30
        comment:
          title: Comment
          description: "The comment related to the security class."
          type: string
          x-lineageReferenceObject: GTVCLAS_COMMENTS
          example: "Test class 1234"
          maxLength: 4000    
    security-class-details-1.1.0_put_request:
      type: object   
      properties:
        securityClass:
          title: Security Class Code
          description: "The name of the security class."
          type: string
          x-lineageReferenceObject: GTVCLAS_CLASS_CODE
          example: "BAN_STUDENT_C"
          maxLength: 30   
        systemType:
          title: System Indicator 
          description: "The system that a security class is associated with."
          type: string
          x-lineageReferenceObject: GTVCLAS_SYSI_CODE
          x-lineageLookupReferenceObject: gtvsysi  
          example: 'G'
          maxLength: 2                 
        owner:
          title: Owner
          description: "The owner of the security class."
          type: string
          x-lineageReferenceObject: GTVCLAS_OWNER
          example: "BANSECR"
          maxLength: 30
        comment:
          title: Comment
          description: "The comment related to the security class."
          type: string
          x-lineageReferenceObject: GTVCLAS_COMMENTS
          example: "Test class 1234"
          maxLength: 4000                    
    security-class-details-1.1.0_response:
      type: object
      required:
        - id
        - securityClass 
        - owner    
      properties:
        id:
          title: Security Class ID
          description: "Unique identifier for the security class."
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GTVCLAS_GUID
          example: 49eqfc68-3t89-4036-852c-341aa9d8501a          
          maxLength: 36
        securityClass:
          title: Security Class Code
          description: "The name of the security class."
          type: string
          x-lineageReferenceObject: GTVCLAS_CLASS_CODE
          example: "BAN_STUDENT_C"
          maxLength: 30   
        systemType:
          title: System Indicator 
          description: "The system that a security class is associated with."
          type: string
          x-lineageReferenceObject: GTVCLAS_SYSI_CODE
          x-lineageLookupReferenceObject: gtvsysi  
          example: 'G'
          maxLength: 2                 
        owner:
          title: Owner
          description: "The owner of the security class."
          type: string
          x-lineageReferenceObject: GTVCLAS_OWNER
          example: "BANSECR"
          maxLength: 30
        comment:
          title: Comment
          description: "The comment related to the security class."
          type: string
          x-lineageReferenceObject: GTVCLAS_COMMENTS
          example: "Test class 1234"
          maxLength: 4000          
        assignedUsers:
          title: Assigned Users
          type: array
          description: "User(s) assigned to the security class."   
          x-lineageReferenceObject: GURUCLS_USERID
          x-lineageDerivedLogic: A record in GURUCLS where GURUCLS_CLASS_CODE = GTVCLAS_CLASS_CODE.
          example: "BCMUSER"                 
          minItems: 1
          items:
            minLength: 1
            maxLength: 30
            type: string   
        assignedObjects:
          title: Assigned Objects
          description: "The object(s) assigned to the security class."          
          type: array
          items:
            required:
              - object
              - role
            type: object
            properties:          
              object:
                title: Object 
                description: "The security object name."
                type: string
                x-lineageReferenceObject: GURUOBJ_OBJECT
                x-lineageDerivedLogic: A GURUOBJ_OBJECT record where GURUOBJ_USERID = GTVCLAS_CLASS_CODE and GUVUACC_OBJECT = GURUOBJ_OBJECT.
                example: "GTVCTYP"
                maxLength: 30               
              role:
                title: Role
                description: "The role associated with the security object."
                type: string
                x-lineageReferenceObject: GURUOBJ_ROLE
                x-lineageDerivedLogic: The GURUOBJ_ROLE associated with the GURUOBJ_OBJECT.
                example: "BAN_DEFAULT_M"
                maxLength: 30     
        modifiedOn:
          title: Activity Date
          description: This field identifies the most recent date a record was created or updated.
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          example: 2024-11-17 06:39:14.000
          x-lineageReferenceObject: GTVCLAS_ACTIVITY_DATE
        modifiedBy:
          title: Modified By User ID
          maxLength:  30
          type:  string
          description:  User who inserted or last update the data.
          x-lineageReferenceObject: GTVCLAS_USER_ID
          example: SAISUSR                                          
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
              type: object
              properties:
                id:
                  type: string
                  description: The global identifier of the resource in error.
                sourceId:
                  type: string
                  description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
                code:
                  type: string
                  description: The error message code used to describe the error details.
                description:
                  type: string
                  description: The error description used to describe the error details.
                message:
                  type: string
                  description: The detailed actionable error message.
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic