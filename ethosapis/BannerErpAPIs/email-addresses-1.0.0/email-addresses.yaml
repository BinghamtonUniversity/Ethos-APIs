openapi: 3.0.0
info:
  title: email addresses
  description: >
    The API can be used to retrieve an email holder (person or non-person) and
    an array of emails with details similar to the information provided on the
    GOAEMAL administrative page. The API also supports the creation and update
    of email address details individually and in batches.
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-domain: Foundation
  x-source-system: banner
  x-api-type: erp
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/email-addresses:
    get:
      tags:
        - email-addresses
      summary: Get email address
      description: Query and retrieve email address data based on bannerId, email
        address, and or email type
      parameters:
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
            $ref: "#/components/schemas/email-addresses-1_0_0_get_request"
          description: >
            Retrieving Unique Items: The combination of bannerId, emailAddress,
            and emailType uniquely describe a single record. \
             Retrieving Multiple Items: Multiple records are retieved by providing any other combination of fields. The following example will retrieve all records with the provided bannerId. 
            ```

            /email-addresses?criteria={"bannerId":"331314209"}

            ```
        - name: id
          in: query
          required: false
          schema:
            type: object
            $ref: "#/components/schemas/email-addresses-1_0_0_id_parameter"
          description: >
            Retrieving Unique Items: The combination of bannerId, emailAddress,
            and emailType uniquely describe a single record.All three fields in
            the ID are required.

            ```

            /email-addresses?id={"bannerId":"331314209","emailAddress":"Test123@gmail.com","emailType":"ADMS"}

            ```
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/email-addresses-1_0_0_get_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
