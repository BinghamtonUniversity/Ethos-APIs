openapi: 3.0.0
info:
  title: applicant-disbursement-details
  description: The Applicant Disbursement details API provides information from KVRDISB table.
  version: 1.0.0
  x-source-domain: Financial Aid
  x-source-name: KVRDISB
  x-source-title: Applicant Disbursement Details (Student Aid)
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/applicant-disbursement-details:
    get:
      summary: Returns listing of all applicant disbursements.
      description: Return all information on disbursement details for applicants.
      security:
        - EthosIntegrationBearer: []
      tags:
        - applicant-disbursement-details
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards for more information. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### studentId

            Returns disbursements for a specific student based on Student ID.

            ```

            /applicant-disbursement-details?criteria={"studentId":"123456"}

            ```

            ### Aid Year Code

            Returns disbursements for a specific aid year.

            ```

            /applicant-disbursement-details?criteria={"aidyCode":"2025"}

            ```

            ### Aid Period Code

            Returns disbursements for a specific aid period.

            ```

            /applicant-disbursement-details?criteria={"aidpCode":"LGWNTR20"}

            ```

            ### Fund Code

            Returns disbursements for a specific fund code.

            ```

            /applicant-disbursement-details?criteria={"fndcCode":"D-BURSTYP"}

            ```

            ### Term Code

            Returns disbursements for a specific term.

            ```

            /applicant-disbursement-details?criteria={"termCode":"202501"}

            ```

            ### Posting Method Indicator

            Returns disbursements with specific posting method (R=A/R, P=A/P).

            ```

            /applicant-disbursement-details?criteria={"postingMethodIndicator":"R"}

            ```

            ### Multiple Criteria
            
            Returns disbursements for multiple criteria.

            ```
            
            /applicant-disbursement-details?criteria={"studentId":"123456","aidyCode":"2025","fndcCode":"D-BURSTYP"}
            
            ```
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/applicant-disbursement-details-1.0.0_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
