components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    applicant-disbursement-details-1.0.0_response:
      title: applicant-disbursement-details-1.0.0_response
      description: Retrieves disbursement details for an applicant.
      type: object
      properties:
        pidm:
          title: Student PIDM
          description: The PIDM of the Student.
          type: integer
          x-lineageReferenceObject: KVRDISB_PIDM
        aidyCode:
          title: Aid Year Code
          description: The aid year in which the award was disbursed.
          type: string
          maxLength: 4
          x-lineageReferenceObject: KVRDISB_AIDY_CODE
        aidpCode:
          title: Aid Period Code
          description: The aid period in which the award was disbursed.
          type: string
          maxLength: 8
          x-lineageReferenceObject: KVRDISB_AIDP_CODE
        fndcCode:
          title: Aid Fund Code
          description: The aid fund code of the award that is being processed.
          type: string
          maxLength: 10
          x-lineageReferenceObject: KVRDISB_FNDC_CODE
        fndcSequenceNumber:
          title: Fund Sequence Number
          description: A one-up number used to differentiate one award from another when the same Aid Fund Code is used in the same aid period for the applicant.
          type: integer
          x-lineageReferenceObject: KVRDISB_FNDC_SEQ_NO
        drecSequenceNumber:
          title: Disbursement Record Sequence Number
          description: A one-up number used to sequence the disbursement records for a given award.
          type: integer
          x-lineageReferenceObject: KVRDISB_DREC_SEQ_NO
        termCode:
          title: Term Code
          description: The term where the amount is being disbursed.
          type: string
          maxLength: 6
          x-lineageReferenceObject: KVRDISB_TERM_CODE
        origScheduledPaymentDate:
          title: Original Scheduled Payment Date
          description: Date when payment of this disbursement was originally scheduled to be paid.
          type: string
          format: date
          x-lineageReferenceObject: KVRDISB_ORIG_SCHED_PAY_DATE
        origScheduledPaymentAmount:
          title: Original Scheduled Payment Amount
          description: The original amount that was scheduled to be paid on the original schedule payment date.
          type: number
          format: decimal
          x-lineageReferenceObject: KVRDISB_ORIG_SCHED_PAY_AMT
        scheduledPaymentDate:
          title: Scheduled Payment Date
          description: The date when this disbursement is scheduled to be posted on TBRACCD when disbursement was performed via A/R; or FABINVH when performed via A/P.
          type: string
          format: date
          x-lineageReferenceObject: KVRDISB_SCHED_PAY_DATE
        paymentDate:
          title: Payment Date
          description: The date when this disbursement was actually posted on AR or AP. This field is NULL when the transaction is memoed.
          type: string
          format: date
          x-lineageReferenceObject: KVRDISB_PAY_DATE
        paymentAmount:
          title: Payment Amount
          description: The current amount payable to the applicant for this disbursement record.
          type: number
          format: decimal
          x-lineageReferenceObject: KVRDISB_PAY_AMT
        postingMethodIndicator:
          title: Posting Method Indicator
          description: Indicates if this disbursement record will be posted to Accounts Receivable (A/R) or Accounts Payable (A/P). Valid values are R-Posted to A/R, P-Posted to A/P.
          type: string
          maxLength: 1
          x-lineageReferenceObject: KVRDISB_POSTING_METHOD_IND
        postingConditionIndicator:
          title: Posting Condition Indicator
          description: Indicates the condition in which the disbursement event finalized when posting the fund to A/R or A/P.
          type: string
          maxLength: 1
          x-lineageReferenceObject: KVRDISB_POST_COND_IND
        editCheckIndicator:
          title: Edit Check Indicator
          description: Indicates if the edits required for disbursing an amount have been passed for this disbursement record. Y-Applicant passed the edits. N-Applicant did not pass the edits.
          type: string
          maxLength: 1
          x-lineageReferenceObject: KVRDISB_EDIT_CHECK_IND
        arHoldOverrideIndicator:
          title: AR Hold Override Indicator
          description: Indicates if an existing Accounts Receivable (AR) hold was overridden when the disbursement record was generated for the applicant.
          type: string
          maxLength: 1
          x-lineageReferenceObject: KVRDISB_AR_HOLD_OVR_IND
        paymentOptionIndicator:
          title: Payment Option Indicator
          description: Indicates the mechanism to be used for paying the amount to the applicant when processing disbursements via Accounts Payable (A/P). D-Direct Deposit; C-Cheque.
          type: string
          maxLength: 1
          x-lineageReferenceObject: KVRDISB_PAY_OPTION_IND
        invoiceAtypCode:
          title: Invoice Address Type Code
          description: The address type associated with the address used on the A/P disbursement record which will be used as INVOICE ADDRESS.
          type: string
          maxLength: 2
          x-lineageReferenceObject: KVRDISB_INV_ATYP_CODE
        invAtypSequenceNumber:
          title: Invoice Address Type Sequence Number
          description: The address type sequence number from SPRADDR that is associated with the address type used on the A/P disbursement record.
          type: integer
          x-lineageReferenceObject: KVRDISB_INV_ATYP_SEQNO
        systemPaymentIndicator:
          title: System Payment Processing Indicator
          description: Indicates the type of payment processing that is done in general in the system. C-Client Processing; F-Banner Finance.
          type: string
          maxLength: 1
          x-lineageReferenceObject: KVRDISB_SYS_PAY_IND
        disbursementAmountDecreaseIndicator:
          title: Disbursement Amount Decrease Indicator
          description: When using the Banner Finance option for A/P disbursements, this indicator is used to determine if decreases of amounts will be handled through A/R or not.
          type: string
          maxLength: 1
          x-lineageReferenceObject: KVRDISB_DISB_AMT_DECR_IND
        vendorAtypCode:
          title: Vendor Address Type Code
          description: The address type associated with the address used on the A/P disbursement record which will be used as VENDOR INVOICE ADDRESS.
          type: string
          maxLength: 4
          x-lineageReferenceObject: KVRDISB_VEND_ATYP_CODE
        vendorAtypSequenceNumber:
          title: Vendor Address Type Sequence Number
          description: The address type sequence number from SPRADDR that is associated with the vendor address type used on the A/P disbursement record.
          type: integer
          x-lineageReferenceObject: KVRDISB_VEND_ATYP_SEQNO
        dataOrigin:
          title: Data Origin
          description: The latest source for the data contained in this record.
          type: string
          maxLength: 30
          x-lineageReferenceObject: KVRDISB_DATA_ORIGIN
        createUserId:
          title: Create User ID
          description: The logon ID of the user who created this record.
          type: string
          maxLength: 30
          x-lineageReferenceObject: KVRDISB_CREATE_USER_ID
        createDate:
          title: Create Date
          description: The date this record was created.
          type: string
          format: date
          x-lineageReferenceObject: KVRDISB_CREATE_DATE
        userId:
          title: User ID
          description: The logon ID of the user who created or last updated this record.
          type: string
          maxLength: 30
          x-lineageReferenceObject: KVRDISB_USER_ID
        activityDate:
          title: Activity Date
          description: The most recent date this record was created or updated.
          type: string
          format: date
          x-lineageReferenceObject: KVRDISB_ACTIVITY_DATE
    applicant-disbursement-details-batch-1.0.0_post_request:
      type: object
      properties:
        items:
          title: Items
          description: List of items to be processed.
          type: array
          items:
            type: object
            $ref: "#/components/schemas/applicant-disbursement-details-batch-1.0.0_post_items"
      required:
        - items
    applicant-disbursement-details-batch-1.0.0_post_items:
      $ref: '#/components/schemas/applicant-disbursement-details-1.0.0_post_request'
    applicant-disbursement-details-batch-1.0.0_post_response:
        description: 'Returns batch job details like status, job ID, request ID, resource details, etc. '
        type: object
        required:
        - id
        - jobId
        - status
        - link
        - resource
        - createdOn
        - jobStartOn
        - jobEndOn
        properties:
          id:
            title: Request ID
            description: A globally unique identifier of a batch API request to be used in all external references.
            type: string
            format: guid
            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
            example: cf5ff489-e386-43a3-93cf-04d4b1f77216
            x-lineageReferenceObject: GOBBREQ_GUID
          jobId:
            title: Job ID
            description: Batch job execution ID.
            type: number
            x-lineageReferenceObject: GOBBREQ_JOB_ID
            example: 123
          status:
            title: Status
            description: Status of the batch.
            type: string
            enum:
              - completed
              - inProgress
              - aborted
            x-lineageReferenceObject: GOBBREQ_JOB_STATUS
            example: inProgress
          link:
            title: Status URL
            description: REST API URL to use to get the status of a specific batch job.
            type: string
            example: https://api.example.com/api/applicant-disbursement-details/batches/{id}
          resource:
            title: Resource
            description: The affected resource.
            type: object
            properties:
              name:
                title: Resource Name
                description: The pluralized name of the affected resource.
                type: string
                x-lineageReferenceObject: GOBBREQ_API_RESOURCE
                example: applicant-disbursement-details
              version:
                title: Resource version
                description: The version of the resource.
                type: number
                x-lineageReferenceObject: GOBBREQ_API_VERSION
                example: application/vnd.hedtech.integration.v1.0.0+json
            additionalProperties: false
            required:
              - name
              - version
          createdOn:
            title: Create Date
            description: Date on which the batch job was created.
            type: string
            format: date
            x-lineageReferenceObject: GOBBREQ_CREATEDTIME
            example: '2024-01-01'
          jobStartOn:
            title: Job Start Time
            description: Time when the batch job started.
            type: string
            format: date-time
            x-lineageReferenceObject: BATCH_JOB_EXECUTION.START_TIME
            example: '2024-09-27 12:46:37.058'
          jobEndOn:
            title: Job End Time
            description: Time when the batch job ended.
            type: string
            format: date-time
            x-lineageReferenceObject: BATCH_JOB_EXECUTION.END_TIME
            example: '2024-09-27 12:48:15.976'
    applicant-disbursement-details-batch-1.0.0_get_response:
        description: 'Returns the list of IDs for those applicant disbursement details that were successfully created. For those that were not, it returns the list of error messages.'
        type: object
        x-last-modified:
        required:
        - id
        - jobId
