components:
  schemas:
    event-function-details-v1.0.0_put_request:
      type: object
      properties:
        id:
          title: Function Details Id
          type: string
          description: Unique identifier for the event function.
          maxLength: 19
          x-lineageReferenceObject: GEBFUNC_SURROGATE_ID
        functionLongDescription:
          title: Function Long Description
          maxLength: 4000
          type: string
          description: Long Description for the function.
          x-lineageReferenceObject: GEBFUNC_LONG_DESCRIPTION
        functionType:
          title: Function Type Code
          maxLength: 4
          type: string
          description: Code indicating the type of function.
          x-lineageReferenceObject: GEBFUNC_ETYP_CODE
        functionStatus:
          title: Function Status Code
          maxLength: 1
          type: string
          description: This property identifies the status of the function.
          x-lineageReferenceObject: GEBFUNC_FSTA_CODE
        purpose:
          title: Function Purpose Code
          maxLength: 10
          type: string
          description: This property identifies the purpose of the function.
          x-lineageReferenceObject: GEBFUNC_PURP_CODE
        emphasis:
          title: Function Emphasis Code
          maxLength: 10
          type: string
          description: Emphasis Code for the function.
          x-lineageReferenceObject: GEBFUNC_EMPH_CODE
        invitedOn:
          title: Invitation Date
          maxLength: 11
          type: string
          format: date
          description: Date of the Invitations to the function.
          x-lineageReferenceObject: GEBFUNC_INVITATION_DATE
        letter:
          title: Function Letter Code
          maxLength: 15
          type: string
          description: Letter Code of the letter accompanying the invitation.
          x-lineageReferenceObject: GEBFUNC_LETR_CODE
        rsvpRequiredOn:
          title: RSVP Required Date
          maxLength: 11
          type: string
          format: date
          description: Latest date the RSVP should be received.
          x-lineageReferenceObject: GEBFUNC_RSVP_CONFIRM_DATE
        sponsorOrgBannerId:
          title: Sponsor Organization Banner ID
          maxLength: 9
          type: string
          description: Banner ID of the organization sponsoring the function.
          x-lineageReferenceObject: SPRIDEN_ID
        committee:
          title: Committee Name
          maxLength: 60
          type: string
          description: Name of the Committee associated with the function.
          x-lineageReferenceObject: GEBFUNC_COMMITTEE_NAME
        plannedAttendance:
          title: Planned Attendance Number
          maxLength: 7
          type: number
          description: Number of attendees planned for the function.  Capacity of the
            function.
          x-lineageReferenceObject: GEBFUNC_PLAN_ATTEND
        breakEvenAttendance:
          title: Break Even Attendance Number
          maxLength: 7
          type: number
          description: Attendance required for the function to break even.
          x-lineageReferenceObject: GEBFUNC_BRK_EVEN_ATTEND
        registrantGuestLimit:
          title: Guests Limit Per Registrant
          maxLength: 2
          type: number
          description: How many guests are allowed per registrant. Defaults to '10'.
          x-lineageReferenceObject: GEBFUNC_GUESTS_PER_REGISTRANT
        capacityIncludesGuestIndicator:
          title: Guess Include Indicator
          maxLength: 1
          type: string
          description: Indicates whether guests are included in capacity or not. Defaults
            to 'N'.
          x-lineageReferenceObject: GEBFUNC_GUEST_INCLUDE_IND
        publishStartOn:
          title: Date Publish From
          maxLength: 11
          type: string
          format: date
          description: Date from which the function will be published on web.
          x-lineageReferenceObject: GEBFUNC_DATE_PUBLISH_FROM
        publishEndOn:
          title: Date Publish To
          maxLength: 11
          type: string
          format: date
          description: Date to which the function will be published on web.
          x-lineageReferenceObject: GEBFUNC_DATE_PUBLISH_TO
        overrideCapacity:
          title: Override Capacity
          maxLength: 5
          type: number
          description: Number the planned attendance can be overriden by.
          x-lineageReferenceObject: GEBFUNC_OVERRIDE_CAPACITY
        scheduleDetails:
          title: Schedule Details
          type: array
          items:
            required:
              - meetingBeginTime
              - meetingEndTime
              - meetingStartOn
              - meetingEndOn
            type: object
            properties:
              id:
                title: Meeting Row ID
                maxLength: 19
                type: string
                description: Unique identifier for the meeting row.
                x-lineageReferenceObject: SSRMEET_SURROGATE_ID
              meetingBeginTime:
                title: Meeting Begin Time
                maxLength: 4
                type: string
                description: This property defines the Begin Time of the function meeting being
                  scheduled.  It is a required property and is in the format
                  HHMM using 24-hour clock time.
                x-lineageReferenceObject: SSRMEET_BEGIN_TIME
              meetingEndTime:
                title: Meeting End Time
                maxLength: 4
                type: string
                description: This property defines the End Time of the function meeting being
                  scheduled.  It is a required property and is in the format
                  HHMM using 24-hour clock time.
                x-lineageReferenceObject: SSRMEET_END_TIME
              meetingBuilding:
                title: Meeting Building Code
                maxLength: 6
                type: string
                description: This property defines the Building where the function meeting will
                  be scheduled.
                x-lineageReferenceObject: SSRMEET_BLDG_CODE
              meetingBuildingDescription:
                title: Meeting Building Code Description
                maxLength: 30
                type: string
                description: This property specifies the building associated with the building
                  code.
                x-lineageReferenceObject: STVBLDG_DESC
                x-lineageLookupReferenceObject: stvbldg
              meetingRoom:
                title: Meeting Room Code
                maxLength: 10
                type: string
                description: This property defines the Room where the function meeting will be
                  scheduled.
                x-lineageReferenceObject: SSRMEET_ROOM_CODE
              meetingRoomDescription:
                title: Meeting Room Code Descriptioin
                maxLength: 50
                type: string
                description: This property identifies the description associated with the room.
                x-lineageReferenceObject: SLBRDEF_DESC
                x-lineageLookupReferenceObject: slbrdef
              meetingStartOn:
                title: Meeting Start Date
                maxLength: 11
                type: string
                format: date
                description: Function Meeting Start Date.
                x-lineageReferenceObject: SSRMEET_START_DATE
              meetingEndOn:
                title: Meeting End Date
                maxLength: 11
                type: string
                format: date
                description: Function Meeting End Date.
                x-lineageReferenceObject: SSRMEET_END_DATE
              meetsOnSunday:
                title: Meets on Sunday
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_SUN_DAY
              meetsOnMonday:
                title: Meets on Monday
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_MON_DAY
              meetsOnTuesday:
                title: Meets on Tuesday
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_TUE_DAY
              meetsOnWednesday:
                title: Meets on Wednesday
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_WED_DAY
              meetsOnThursday:
                title: Meets on Thursday
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_THU_DAY
              meetsOnFriday:
                title: Meets on Friday
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_FRI_DAY
              meetsOnSaturday:
                title: Meets on Saturday
                maxLength: 1
                type: boolean
                x-lineageReferenceObject: SSRMEET_SAT_DAY
              overrideConflict:
                title: Function Meeting Conflict Override Indicator
                maxLength: 1
                type: string
                description: Indicates an override of time and/or room conflicts among function
                  meetings. Defaults to null. O - override.
                x-lineageReferenceObject: SSRMEET_OVER_RIDE
      required:
        - id
    event-function-details-v1.0.0_post_request:
