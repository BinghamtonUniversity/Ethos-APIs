openapi: 3.0.0
info:
  title: Event Function Details
  description: The Event Function Details API supports creation and maintenance of
    function details as shown on the Function Information and Function Schedule
    Summary tabs on the SLAEVNT administrative page.
  version: 1.0.0-beta
  x-source-domain: Foundation
  x-source-name: GEBFUNC
  x-source-title: null
  x-source-system: banner
  x-api-type: erp
  x-release-status: beta
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/event-function-details:
    get:
      tags:
        - event-function-details
      summary: Returns event function details.
      description: Returns resources from GEBFUNC and SSRMEET.
      parameters:
        - name: accept
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```     
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          schema:
            type: integer
          in: query
          required: false
          description: |
            ### Event Reference Number
            Returns all records for the event reference number passed.
            ```
            /event-function-details?criteria={"eventReferenceNumber":"A0275"}
            ```
            ### Function Code
            Returns all records for the Function Code passed.
            ```
            /event-function-details?criteria={"function":"BREAK"}
            ```                         
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/event-function-details-v1.0.0_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
