openapi: 3.0.0
info:
  title: proxy-miscellaneous-transactions
  description: This API is used to retrieve insert to the TBRMISD table. This API allows an API USER to post a transaction on behalf of a “user” who has a SPRIDEN ID and has Banner security access to post the transaction. The “user” field requires either the SPRIDEN ID or the Principal User ID from GOAEACC. The user is case sensitive and must match the record in Banner.
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: TFAMISC/TSAMISC
  x-source-domain: Student
  x-source-title: Proxy Miscellaneous Transaction
  x-source-system: banner
  x-api-type: erp
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/proxy-miscellaneous-transactions/{receiptNumber}:  
    get:
      tags:
        - proxy-miscellaneous-transactions
      summary: Return resources from TFAMISC/TSAMISC
      parameters:
        - name: receiptNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/proxy-miscellaneous-transactions-1.0.0_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: API_PROXY_MISC_TRANSACTIONS
      
  /api/proxy-miscellaneous-transactions:          
    post:
      tags:
        - proxy-miscellaneous-transactions
      summary: Creates a new resource in TFAMISC/TSAMISC
      parameters: []
      requestBody:
        required: false
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/proxy-miscellaneous-transactions-1.0.0_post_request"
            examples:
              example1:
                summary: Amount is passed in the request (Simple post).
                value:
                  id: KBECK
                  transDate: "2021-05-20"
                  user: CASHIER
                  transaction: [
                    {
                      workDetailCode: CASH,
                      drCrInd: D,
                      amount: 80,
                      desc: "my description"
                    },
                    {
                      workDetailCode: CASH,
                      drCrInd: C,
                      amount: 80,
                      paymentId: 46,
                      merchantId: 12345,
                    }]
                  name: sample
                  streetLine1: GreatAvenue
                  streetLine2: park
                  streetLine3: street
                  city: Newyork
                  zip: 678233
                  natnCode: 157
              example2:
                summary: Foreign amount and Currency code is passed in the request.
                value:
                  id: KBECK
                  user: CASHIER
                  transaction: [
                    {
                      workDetailCode: CASH,
                      drCrInd: D,
                      currCode: AUD,
                      foreignAmount: 100
                    },
                    {
                      workDetailCode: CASH,
                      drCrInd: C,
                      paymentId: 46,
                      merchantId: 12345,
                      currCode: AUD,
                      foreignAmount: 100
                    }]
                  name: sample
                  streetLine1: GreatAvenue
                  streetLine2: park
                  streetLine3: street
                  city: Newyork
                  zip: 678233
                  natnCode: 157
              example3:
                summary: Amount is passed for debit and Foreign amount and Currency code is passed for credit.
                value:
                  id: KBECK
                  user: CASHIER
                  transDate: "2021-05-20"
                  transaction: [
                    {
                      workDetailCode: CASH,
                      drCrInd: D,
                      amount: 80
                    },
                    {
                      workDetailCode: CASH,
                      drCrInd: C,
                      currCode: AUD,
                      foreignAmount: 100
                    }]
                  name: sample
                  streetLine1: GreatAvenue
                  streetLine2: park
                  streetLine3: street
                  city: Newyork
                  zip: 678233
                  natnCode: 157
              example4:
                summary: FOAPAL params (TFAMISC).
                value:
                  id: KBECK
                  user: CASHIER
                  transaction: [
                    {
                      workDetailCode: CASH,
                      drCrInd: D,
                      paymentId: 46,
                      merchantId: 12345,
                      currCode: AUD,
                      foreignAmount: 100,
                      workCoas: "B",
                      workFund: "S1110",
                      workOrgn: "11001",
                      workAcct: "7120",
                      workProg: "200",
                      workRuclCode: "CR05"
                    },
                    {
                      workDetailCode: CASH,
                      drCrInd: C,
                      amount: 80,
                      paymentId: 46,
                      merchantId: 12345,
                      workCoas: "B",
                      workFund: "S1110",
                      workOrgn: "11001",
                      workAcct: "7120",
                      workProg: "200",
                      workRuclCode: "CR05"
                    }]
                  name: sample
                  streetLine1: GreatAvenue
                  streetLine2: park
                  streetLine3: street
                  city: Newyork
                  zip: 678233
                  natnCode: 157
              example5:
                summary:  Account A/B params (TSAMISC).
                value:
                  id: KBECK
                  user: CASHIER
                  transDate: "2021-05-20"
                  transaction: [
                    {
                      workDetailCode: CASH,
                      drCrInd: D,
                      paymentId: 46,
                      merchantId: 12345,
                      currCode: AUD,
                      foreignAmount: 100,
                      workAccount: 1234
                    },
                    {
                      workDetailCode: CASH,
                      drCrInd: C,
                      amount: 80,
                      workAccount: 1234
                    }]
                  name: sample
                  streetLine1: GreatAvenue
                  streetLine2: park
                  streetLine3: street
                  city: Newyork
                  zip: 678233
                  natnCode: 157                  
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/proxy-miscellaneous-transactions-1.0.0_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: API_PROXY_MISC_TRANSACTIONS    
components:
  schemas:
    proxy-miscellaneous-transactions-1.0.0_post_request:
      required:
        - transaction
        - user
      type: object
      properties:
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        user:
          title: USER
          maxLength: 9
          type: string
          description: "Lineage reference object : user"
          x-lineageReferenceObject: user       
        transDate:
          title: Transaction Date
          maxLength: 11
          type: string
          description: "Lineage reference object : transDate"
          format: date
          x-lineageReferenceObject: transDate
        documentNumber:
          title: Document Number
          maxLength: 8
          type: string
          description: "Lineage reference object : documentNumber, Lookup lineage\
            \ reference object : tbrmisd"
          x-lineageReferenceObject: documentNumber
          x-lineageLookupReferenceObject: tbrmisd
        name:
          title: Name
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBMISC_NAME"
          x-lineageReferenceObject: TBBMISC_NAME
        houseNumber:
          title: House Number
          maxLength: 10
          type: string
          description: "Lineage reference object : TBBMISC_HOUSE_NUMBER"
          x-lineageReferenceObject: TBBMISC_HOUSE_NUMBER 
        zip:
          title: ZIP or Postal Code
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBMISC_ZIP, Lookup lineage reference\
            \ object : gtvzipc"
          x-lineageReferenceObject: TBBMISC_ZIP
          x-lineageLookupReferenceObject: gtvzipc
        streetLine1:
          title: Street Line 1
          maxLength: 75
          type: string
          description: "Lineage reference object : TBBMISC_STREET_LINE1"
          x-lineageReferenceObject: TBBMISC_STREET_LINE1
        streetLine2:
          title: Street Line 2
          maxLength: 75
          type: string
          description: "Lineage reference object : TBBMISC_STREET_LINE2"
          x-lineageReferenceObject: TBBMISC_STREET_LINE2 
        streetLine3:
          title: Street Line 3
          maxLength: 75
          type: string
          description: "Lineage reference object : TBBMISC_STREET_LINE3"
          x-lineageReferenceObject: TBBMISC_STREET_LINE3
        streetLine4:
          title: Street Line 4
          maxLength: 75
          type: string
          description: "Lineage reference object : TBBMISC_STREET_LINE4"
          x-lineageReferenceObject: TBBMISC_STREET_LINE4                        
        statCode:
          title: State or Province
          maxLength: 3
          type: string
          description: "Lineage reference object : TBBMISC_STAT_CODE, Lookup lineage\
            \ reference object : stvstat"
          x-lineageReferenceObject: TBBMISC_STAT_CODE
          x-lineageLookupReferenceObject: stvstat
        natnCode:
          title: Nation
          maxLength: 5
          type: string
          description: "Lineage reference object : TBBMISC_NATN_CODE, Lookup lineage\
            \ reference object : stvnatn"
          x-lineageReferenceObject: TBBMISC_NATN_CODE
          x-lineageLookupReferenceObject: stvnatn
        city:
          title: City
          maxLength: 50
          type: string
          description: "Lineage reference object : TBBMISC_CITY"
          x-lineageReferenceObject: TBBMISC_CITY                   
   
        transaction:
          type: array
          items:
            required:
              - workDetailCode
              - drCrInd
            type: object
            properties:
              amount:
                title: Amount
                maxLength: 16
                type: number
                description: "Lineage reference object : TBRMISD_AMOUNT"
                x-lineageReferenceObject: TBRMISD_AMOUNT
              currCode:
                title: Currency Code
                maxLength: 4
                type: string
                description: "Lineage reference object : TBRMISD_CURR_CODE, Lookup\
                  \ lineage reference object : gtvcurr"
                x-lineageReferenceObject: TBRMISD_CURR_CODE
                x-lineageLookupReferenceObject: gtvcurr
              workCoas:
                title: COA
                maxLength: 1
                type: string
              workOrgn:
                title: Organization
                maxLength: 6
                type: string
              workRuclCode:
                title: Rule Class
                maxLength: 4
                type: string
              workAcct:
                title: Account
                maxLength: 6
                type: string
              workDetailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lookup lineage reference object : tbbdetc"
                x-lineageLookupReferenceObject: tbbdetc
              foreignAmount:
                title: Currency Amount
                maxLength: 16
                type: number
                description: "Lineage reference object : TBRMISD_FOREIGN_AMOUNT"
                x-lineageReferenceObject: TBRMISD_FOREIGN_AMOUNT
              workLocn:
                title: Location
                maxLength: 6
                type: string
              workAcci:
                title: Index
                maxLength: 6
                type: string
              merchantId:
                title: Merchant ID
                maxLength: 20
                type: string
                description: "Lineage reference object : TBRMISD_MERCHANT_ID"
                x-lineageReferenceObject: TBRMISD_MERCHANT_ID
              paymentId:
                title: Payment Number
                maxLength: 20
                type: string
                description: "Lineage reference object : TBRMISD_PAYMENT_ID"
                x-lineageReferenceObject: TBRMISD_PAYMENT_ID
              workProg:
                title: Program
                maxLength: 6
                type: string
              workFund:
                title: Fund
                maxLength: 6
                type: string
              drCrInd:
                title: Debit or Credit
                maxLength: 1
                type: string
                description: "Lineage reference object : TBRMISD_DR_CR_IND"
                x-lineageReferenceObject: TBRMISD_DR_CR_IND
              desc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBRMISD_DESC"
                x-lineageReferenceObject: TBRMISD_DESC
              workActv:
                title: Activity
                maxLength: 6
                type: string
              workAccount:
                title: Activity
                maxLength: 6
                type: string                
            x-lineageReferenceObject: TBRMISD
      x-lineageReferenceObject: TFAMISC/TSAMISC            
    proxy-miscellaneous-transactions-1.0.0_response:
      required:
        - amount
        - billingInd
        - detailCode
        - srceCode
        - user
        - termCode
        - tranNumber
      type: object
      properties:
        Summary:
          type: array
          items:
            type: object
            properties:
              creditTotal:
                title: Credit Total
                maxLength: 18
                type: number
                description: "Lineage reference object : creditTotal"
                x-lineageReferenceObject: creditTotal
              documentNumber:
                title: Document Number
                maxLength: 8
                type: string
                description: "Lineage reference object : documentNumber, Lookup lineage\
                  \ reference object : tbrmisd"
                x-lineageReferenceObject: documentNumber
                x-lineageLookupReferenceObject: tbrmisd
              transDate:
                title: Transaction Date
                maxLength: 26
                type: string
                description: "Lineage reference object : transDate"
                format: date-time
                x-lineageReferenceObject: transDate
              id:
                title: ID
                maxLength: 9
                type: string
                description: "Lineage reference object : id"
                x-lineageReferenceObject: id
              User:
                title: User
                maxLength: 30
                type: string
                description: "Lineage reference object : sessUser"
                x-lineageReferenceObject: sessUser
              receiptNumber:
                title: Receipt Number
                maxLength: 8
                type: string
                description: "Lineage reference object : receiptNumber"
                x-lineageReferenceObject: receiptNumber
              debitTotal:
                title: Debit Total
                maxLength: 18
                type: number
                description: "Lineage reference object : debitTotal"
                x-lineageReferenceObject: debitTotal
              printReceipt:
                title: Print Receipt
                maxLength: 1
                type: string
                description: "Lineage reference object : printReceipt"
                x-lineageReferenceObject: printReceipt
              dupReceiptInd:
                title: Print Duplicate
                maxLength: 1
                type: string
                description: "Lineage reference object : dupReceiptInd"
                x-lineageReferenceObject: dupReceiptInd                
            x-lineageReferenceObject: Summary   
        Address_Information:
          type: array
          items:
            type: object
            properties:
              natnDesc:
                maxLength: 30
                type: string
              streetLine2:
                title: Street Line 2
                maxLength: 75
                type: string
                description: "Lineage reference object : TBBMISC_STREET_LINE2"
                x-lineageReferenceObject: TBBMISC_STREET_LINE2
              zip:
                title: ZIP or Postal Code
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBMISC_ZIP, Lookup lineage\
                  \ reference object : gtvzipc"
                x-lineageReferenceObject: TBBMISC_ZIP
                x-lineageLookupReferenceObject: gtvzipc
              streetLine1:
                title: Street Line 1
                maxLength: 75
                type: string
                description: "Lineage reference object : TBBMISC_STREET_LINE1"
                x-lineageReferenceObject: TBBMISC_STREET_LINE1
              statCode:
                title: State or Province
                maxLength: 3
                type: string
                description: "Lineage reference object : TBBMISC_STAT_CODE, Lookup\
                  \ lineage reference object : stvstat"
                x-lineageReferenceObject: TBBMISC_STAT_CODE
                x-lineageLookupReferenceObject: stvstat
              natnCode:
                title: Nation
                maxLength: 5
                type: string
                description: "Lineage reference object : TBBMISC_NATN_CODE, Lookup\
                  \ lineage reference object : stvnatn"
                x-lineageReferenceObject: TBBMISC_NATN_CODE
                x-lineageLookupReferenceObject: stvnatn
              city:
                title: City
                maxLength: 50
                type: string
                description: "Lineage reference object : TBBMISC_CITY"
                x-lineageReferenceObject: TBBMISC_CITY
              streetLine4:
                title: Street Line 4
                maxLength: 75
                type: string
                description: "Lineage reference object : TBBMISC_STREET_LINE4"
                x-lineageReferenceObject: TBBMISC_STREET_LINE4
              streetLine3:
                title: Street Line 3
                maxLength: 75
                type: string
                description: "Lineage reference object : TBBMISC_STREET_LINE3"
                x-lineageReferenceObject: TBBMISC_STREET_LINE3
              houseNumber:
                title: House Number
                maxLength: 10
                type: string
                description: "Lineage reference object : TBBMISC_HOUSE_NUMBER"
                x-lineageReferenceObject: TBBMISC_HOUSE_NUMBER
              name:
                title: Name
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBMISC_NAME"
                x-lineageReferenceObject: TBBMISC_NAME
            x-lineageReferenceObject: Address_Information 
        Transactions_Information:
          type: array
          items:
            type: object
            properties:
              amount:
                title: Amount
                maxLength: 16
                type: number
                description: "Lineage reference object : TBRMISD_AMOUNT"
                x-lineageReferenceObject: TBRMISD_AMOUNT
              currCode:
                title: Currency Code
                maxLength: 4
                type: string
                description: "Lineage reference object : TBRMISD_CURR_CODE, Lookup\
                  \ lineage reference object : gtvcurr"
                x-lineageReferenceObject: TBRMISD_CURR_CODE
                x-lineageLookupReferenceObject: gtvcurr
              workCoas:
                title: COA
                maxLength: 1
                type: string
              workOrgn:
                title: Organization
                maxLength: 6
