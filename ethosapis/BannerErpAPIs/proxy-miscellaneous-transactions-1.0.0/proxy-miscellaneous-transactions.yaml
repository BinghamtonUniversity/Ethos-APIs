                description: "Lineage reference object : TBRMISD_FOREIGN_AMOUNT"
                x-lineageReferenceObject: TBRMISD_FOREIGN_AMOUNT
              workDetailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lookup lineage reference object : tbbdetc"
                x-lineageLookupReferenceObject: tbbdetc
              workLocn:
                title: Location
                maxLength: 6
                type: string
              workAcci:
                title: Index
                maxLength: 6
                type: string
              merchantId:
                title: Merchant ID
                maxLength: 20
                type: string
                description: "Lineage reference object : TBRMISD_MERCHANT_ID"
                x-lineageReferenceObject: TBRMISD_MERCHANT_ID
              paymentId:
                title: Payment Number
                maxLength: 20
                type: string
                description: "Lineage reference object : TBRMISD_PAYMENT_ID"
                x-lineageReferenceObject:
              workAccount:
                title: Account
                maxLength: 60
                type: string
              workProg:
                title: Program
                maxLength: 6
                type: string
              workFund:
                title: Fund
                maxLength: 6
                type: string
              drCrInd:
                title: Debit or Credit
                maxLength: 1
                type: string
                description: "Lineage reference object : TBRMISD_DR_CR_IND"
                x-lineageReferenceObject: TBRMISD_DR_CR_IND
              desc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBRMISD_DESC"
                x-lineageReferenceObject: TBRMISD_DESC
              workActv:
                title: Activity
                maxLength: 6
                type: string
            example:
              - amount: 0
                currCode: "string"
                foreignAmount: 0
                workDetailCode: "string"
                merchantId: "string"
                paymentId: "string"
                drCrInd: "string"
                desc: "string"
                workCoas: "string"
                workFund: "string"
                workOrgn: "string"
                workAcct: "string"
                workProg: "string"
                workRuclCode: "string"
              - amount: 0
                currCode: "string"
