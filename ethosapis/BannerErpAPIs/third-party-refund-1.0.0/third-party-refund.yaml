openapi: 3.0.0
info:
  title: Third Party Refund
  description: Process Third Party Refunds.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/third-party-refund?statusInd={statusInd}:
    get:
      summary: Return Refund Information
      description: Return resources from TBREFRD, filtered by Status Indicator
      tags:
        - third-party-refund
      parameters:
        - name: statusInd
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/third-party-refund-1.0.0_get_response"
        "400":
          description: Failure. Bad Request. The server cannot or will not process the
            request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      x-method-permissions: API_THIRD_PARTY_REFUND
  /api/third-party-refund?id={id}&termCode={termCode}:
    get:
      summary: Return Refund Information
      description: Return resources from TBREFRD, filtered by Id and Term Code
      tags:
        - third-party-refund
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: termCode
          in: path
          required: true
          schema:
            type: string 
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/third-party-refund-1.0.0_get_response"
        "400":
          description: Failure. Bad Request. The server cannot or will not process the
            request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      x-method-permissions: API_THIRD_PARTY_REFUND
  /api/third-party-refund?id={id}&tranNumber={tranNumber}:
    get:
      summary: Return Refund Information
      description: Return resources from TBREFRD, filtered by Id and Transaction number
      tags:
        - third-party-refund
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: tranNumber
          in: path
          required: true
          schema:
            type: number            
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/third-party-refund-1.0.0_get_response"
        "400":
          description: Failure. Bad Request. The server cannot or will not process the
            request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      x-method-permissions: API_THIRD_PARTY_REFUND            
  /api/third-party-refund/{id}:
    put:
      summary: Update refund information into the respective intermediate tables
      tags:
        - third-party-refund
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Persons for use in all external references
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              $ref: "#/components/schemas/third-party-refund-1.0.0_put_request"
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/third-party-refund-1.0.0_put_response"
        "400":
          description: Failure. Bad Request. The server cannot or will not process the
            request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      x-method-permissions: API_THIRD_PARTY_REFUND
components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    third-party-refund-1_0_0_get_request:
      title: Refund Information GET Request
      type: object
      properties:
        id:
          type: string
          description: Student Banner ID from a join on tbrerfd_pidm
        tranNumber:
          type: number
          description: Transaction number associated with refund.
        termCode:
          type: string
          description: Term associated with the student refund transaction.
        statusInd:
          type: string
          description: Refund Status Indicator. Valid values are P (Pending), I (In
            Process), C (Complete)
    third-party-refund-1.0.0_get_response:
      title: Refund Information GET Result
      type: object
      properties:
        acctFeedInd:
          title: Feed
          maxLength: 1
          type: string
          description: Status of the transaction in the accounting feed.
          x-lineageReferenceObject: TBRACCD_ACCT_FEED_IND
        amount:
          title: Amount of the transaction
          maxLength: 17
          type: number
          description: Amount of the transaction.
          x-lineageReferenceObject: TBRACCD_AMOUNT
        dataOrigin:
          title: Data Origin
          maxLength: 30
          type: string
          description: Source system that last created or updated the data.
          x-lineageReferenceObject: TBRERFD_DATA_ORIGIN
        dcatCode:
          title: Category of the Detail Code Pending
          maxLength: 3
          type: string
          description: This field identifies the category of the detail code.
          x-lineageReferenceObject: TBBDETC_DCAT_CODE
        desc:
          title: Description
          maxLength: 30
          type: string
          description: Free-form description associated with the transaction. Default
            value comes from the Detail Code description (TBBDETC).
          x-lineageReferenceObject: TBRACCD_DESC
        detailCode:
          title: Detail Code
          maxLength: 4
          type: string
          description: Detail code associated with the transaction, valid in TBBDETC.
          x-lineageReferenceObject: TBRACCD_DETAIL_CODE
        detailCodeComplete:
          title: Detail Code Complete
          maxLength: 4
          type: string
          description: Complete Detail code for refund transaction.
          x-lineageReferenceObject: TBRERFD_DETAIL_CODE_COMPLETE
        detailCodePending:
          title: Detail Code Pending
          maxLength: 4
          type: string
          description: Pending Detail code for refund transaction.
          x-lineageReferenceObject: TBRERFD_DETAIL_CODE_PENDING
        detailCodeProcessing:
          title: Detail Code Processing
          maxLength: 4
          type: string
          description: Processing Detail code for refund transaction.
          x-lineageReferenceObject: TBRERFD_DETAIL_CODE_PROCESSING
        effectiveDate:
          title: Effective date of the transaction
          maxLength: 11
          type: string
          description: Effective date of the transaction.
          x-lineageReferenceObject: TBRACCD_EFFECTIVE_DATE
        id:
          type: string
          description: Student Banner ID from a join on tbrerfd_pidm
          x-lineageReferenceObject: TBRERFD_PIDM
        refundInd:
          title: Refund indicator of the Detail Code Pending
          maxLength: 1
          description: Indicates if the detail code is identified as refund detail code
            that will generate an accounts payable transaction in the accounting
            feed. P indicates is a Parent Plus Loan.
          x-lineageReferenceObject: TBBDETC_REFUND_IND
        statusInd:
          title: Refund Status Indicator
          maxLength: 1
          type: string
          description: Refund Status Indicator.  Valid values are P (Pending), I (In
            Process), C (Complete)
          x-lineageReferenceObject: TBRERFD_STATUS_IND
        termCode:
          title: Term
          maxLength: 6
          type: string
          description: Term associated with the student refund transaction.
          x-lineageReferenceObject: TBRERFD_TERM_CODE
        tranNumber:
          title: Trans Number
          maxLength: 8
          type: number
          description: Transaction number associated with refund.
          x-lineageReferenceObject: TBRERFD_TRAN_NUMBER
        tranNumberPaid:
          title: Transaction Number Paid
          maxLength: 8
          type: number
          description: Transaction Number Paid is used in application of payment to force
            this transaction to liquidate a specific transaction on the account.
          x-lineageReferenceObject: TBRACCD_TRAN_NUMBER_PAID
        transDate:
          title: Transaction Date
          maxLength: 11
          type: string
          description: Transaction date used by the finance system to control posting to
            the ledgers.
          x-lineageReferenceObject: TBRACCD_TRANS_DATE
    third-party-refund-1.0.0_put_request:
      title: Refund Update PUT Request
      type: object
      required:
        - id
        - tranNumber
        - statusInd
      properties:
        tranNumber:
          title: Trans Number
          maxLength: 8
          type: number
          description: Transaction number associated with refund.
          x-lineageReferenceObject: TBRERFD_TRAN_NUMBER
        statusInd:
          title: Refund Status Indicator
          maxLength: 1
          type: string
          description: Refund Status Indicator.
          x-lineageReferenceObject: TBRERFD_STATUS_IND
          enum:
            - P
            - I
            - C
        detailCodePending:
          title: Detail Code Pending
          maxLength: 4
          type: string
          description: Pending Detail code for refund transaction.
          x-lineageReferenceObject: TBRERFD_DETAIL_CODE_PENDING
        desc:
          title: Description
          maxLength: 30
          type: string
          description: Free-form description associated with the transaction. Default
            value comes from the Detail Code description (TBBDETC).
          x-lineageReferenceObject: TBRACCD_DESC
        detailCodeProcessing:
          title: Detail Code Processing
          maxLength: 4
          type: string
          description: "Lineage reference object : TBRERFD_DETAIL_CODE_PROCESSING, Lookup
            lineage reference object : tbbdetc"
          x-lineageReferenceObject: TBRERFD_DETAIL_CODE_PROCESSING
          x-lineageLookupReferenceObject: tbbdetc
        detailCodeComplete:
          title: Detail Code Complete
          maxLength: 4
          type: string
          description: Complete Detail code for refund transaction.
          x-lineageReferenceObject: TBRERFD_DETAIL_CODE_COMPLETE
        acctFeedInd:
          title: Feed
          maxLength: 1
          type: string
          description: It is updated to N when Refund Status is In Process and updated to
            Y when Refund Status is Complete
          x-lineageReferenceObject: TBRACCD_ACCT_FEED_IND
        dataOrigin:
          title: Data Origin
          maxLength: 30
          type: string
          description: Source system that created or updated the data.
          x-lineageReferenceObject: TBRERFD_DATA_ORIGIN
        paymentId:
          title: Payment Id
          maxLength: 20
          type: string
          description: Free-form information identifying a payment.
          x-lineageReferenceObject: TBRACCD_PAYMENT_ID
        merchantId:
          title: Merchant Id
          maxLength: 20
          type: string
          description: Merchant ID associated with the Process Name Code, Credit Card Type
            Code, and System Code.
          x-lineageReferenceObject: TBRACCD_MERCHANT_ID
    third-party-refund-1.0.0_put_response:
      title: Refund Update PUT Response
      type: object
      properties:
        type:
          title: Update Type
          type: string
          description: Describes the update applied to the refund record
          enum:
            - PtoI Indicates update from Pending status to In Progress status
            - ItoC Indicates update from In Progress status to Complete status
            - ItoP Inidcates update from In Progress status to Pending status
        id:
          type: string
          description: Student Banner ID from a join on tbrerfd_pidm
          x-lineageReferenceObject: TBRERFD_PIDM
        tranNumber:
          title: Trans Number
          maxLength: 8
          type: number
          description: Transaction number associated with refund.
          x-lineageReferenceObject: TBRERFD_TRAN_NUMBER
        statusInd:
          title: Refund Status Indicator
          maxLength: 1
          type: string
          description: Refund Status Indicator. Valid values are P (Pending), I (In
            Process), C (Complete)
          x-lineageReferenceObject: TBRERFD_STATUS_IND
        dataOrigin:
          title: Data Origin
          maxLength: 30
          type: string
          description: Source system that created or updated the data.
          x-lineageReferenceObject: TBRERFD_DATA_ORIGIN
        paymentId:
          title: Payment Id
          maxLength: 20
          type: string
          description: Free-form information identifying a payment.
          x-lineageReferenceObject: TBRACCD_PAYMENT_ID
        merchantId:
          title: Merchant Id
          maxLength: 20
          type: string
          description: Merchant ID associated with the Process Name Code, Credit Card Type
            Code, and System Code.
          x-lineageReferenceObject: TBRACCD_MERCHANT_ID
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
