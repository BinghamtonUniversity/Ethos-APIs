                     type: string
             termCode:
               type: string
               description: Registration term code
             groupCode:
               type: string
               description: Registration time ticketing group code
         description: >
            ### Banner Id

            Returns all records for the Banner ID.

            ```
            
            /student-registration-group-code-batches?criteria={"bannerId":"231387509"}
            
            ```
            
            ### Term Code

            Returns all records for the TermCode.

            ```
            
            /student-registration-group-code-batches?criteria={"termCode":"202319"}

            ```

            ### Group Code

            Returns all records for the Group Code.

            ```

            /student-registration-group-code-batches?criteria={"groupCode":"P10"}

            ```
            
            ### Banner Id and termCode

            Returns all records for the Banner ID and termCode.

            ```

            /student-registration-group-code-batches?criteria={"bannerId":"231387509","termCode":"202319"}

            ```
            
            ### Banner Id and groupCode

            Returns all records for the Banner ID and groupCode.

            ```

            /student-registration-group-code-batches?criteria={"bannerId":"231387509","groupCode":"P10"}

            ```
            
            ### Banner Id, termCode and groupCode

            Returns all records for the Banner ID.

            ```

            /student-registration-group-code-batches?criteria={"bannerId":"231387509","termCode":"202319","groupCode":"P10"}

            ```
            
            ### Multiple Banner IDs with Single Term

            Returns all records for multiple Banner IDs with the same term code.

            ```

            /student-registration-group-code-batches?criteria={"termCode":"213016","bannerId":["231387511","231387510","210009710"]}

            ```
