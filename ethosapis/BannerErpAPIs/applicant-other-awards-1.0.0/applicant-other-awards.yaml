    applicant-other-awards-batch-1.0.0_post_request:
      type: object
      title: Applicant Other Awards Batch Request
      description: Request body for batch processing of applicant other awards
      required:
        - items
      properties:
        items:
          type: array
          description: Array of applicant other award requests to process in batch
          items:
            $ref: '#/components/schemas/applicant-other-awards-1.0.0_post_request'
      example:
        items:
          - studentId: "000012345"
            aidyCode: "2223"
            aidpCode: "FALL"
            fndcCode: "OTHR"
            fndcSeqNo: 1
            fstaStatusCode: "DOIS"
            awardAmount: 5500
            remitAmount: 5500
            refundAmount: 550
            chequeReleaseDate: "10-11-2020"
            continuingEligInd: "N"
            continuingEligOverrideInd: "N"
            startDate: "20-06-2019"
            endDate: "20-06-2020"
            webQueryIndicator: "Y"
            comment: "Other Award"
          - id:
              studentId: "000012345"
              aidyCode: "2223"
              aidpCode: "FALL"
              fndcCode: "PELLINST"
              fndcSeqNo: 2
            fstaStatusCode: "DOCA"
            awardAmount: 6000
            remitAmount: 550
            refundAmount: 100
            acceptDate: "2023-09-01"
            comment: "Update Other Award"
    applicant-other-awards-batch-1.0.0_post_response:
      type: object
      title: Applicant Other Awards Batch Response
      description: Response body for batch processing submission
      properties:
        id:
          type: string
          description: Unique identifier for the batch request
        status:
          type: string
          description: Current status of the batch job
          enum: ["pending", "processing", "completed", "failed"]
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the batch job was created
        totalRequests:
          type: integer
          description: Total number of requests in the batch
        processedRequests:
          type: integer
          description: Number of requests that have been processed
        successfulRequests:
          type: integer
