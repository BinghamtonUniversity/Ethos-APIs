            ### studentId

            Returns data for a specific student based on Student ID.

            ```
            /applicant-other-awards?criteria={"studentId":123456}

            ```
            ### Aid Year Code

            Returns data for a specific aid year.

            ```
            /applicant-other-awards?criteria={"aidyCode":"2025"}

            ```
            ### Aid Period Code

            Returns data for a specific aid period.

            ```
            /applicant-other-awards?criteria={"aidpCode":"D-FALL08"}

            ```
            ### Fund Code

            Returns data for a specific fund code.

            ```
            /applicant-other-awards?criteria={"fndcCode":"D-OR"}

            ```
            ### Fund Status Code

            Returns awards with specific status.

            ```
            /applicant-other-awards?criteria={"fstaStatusCode":"DOIS"}

            ```
            ### Multiple Criteria

            Returns data for multiple criteria.

            ```
            /applicant-other-awards?criteria={"studentId":"123456","aidyCode":"2025","fndcCode":"D-OR"}

            ```
