openapi: 3.0.0
info:
  title: applicant-other-awards
  description: >
     <p>
      The Applicant Other Awards API  provides information from KVROTHR table
      It allows users to retrieve detailed other award information from the <strong>KVROTHR</strong> table, as well as create new other award records.
      </p>

      <p>
      <strong>GET API</strong> Retrieves all information from KVROTHR table for applicants.
      </p>

      <p>
      <strong>POST API</strong> Creates a new Other Award record. 
      Upon successful creation, the data is stored in KVROTHR table and the same is displayed on KVAOTHR page.
      </p>

      <p>
      <strong>PUT API</strong> Updates an existing Other Award record.  
      The updated record will be reflected on the KVAOTHR page.
      </p>
  
  version: 1.0.0
  x-source-domain: Financial Aid
  x-source-name: KVROTHR
  x-source-title: Applicant Other Awards (Student Aid)
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
      server_url:
