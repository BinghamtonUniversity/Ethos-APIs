components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    applicant-other-awards-1.0.0_response:
      type: object
      required:
        - id
      properties:
        id:
          title: Award Identifier
          description: Composite identifier for the award record.
          type: object
          required:
            - studentId
            - aidyCode
            - aidpCode
            - fndcCode
          properties:
            studentId:
              title: Student ID
              description: The Banner ID of the student.
              type: string
              maxLength: 9
            aidyCode:
              title: Aid Year Code
              description: The aid year in which the Award Fund is being processed.
              type: string
              maxLength: 4
              x-lineageReferenceObject: KVROTHR_AIDY_CODE
            aidpCode:
              title: Aid Period Code
              description: The aid period in which the Award Fund Code is being processed.
              type: string
              maxLength: 8
              x-lineageReferenceObject: KVROTHR_AIDP_CODE
            fndcCode:
              title: Aid Fund Code
              description: The code of the award that is being processed.
              type: string
              maxLength: 10
              x-lineageReferenceObject: KVROTHR_FNDC_CODE
            fndcSeqNo:
              title: Aid Fund Code Sequence Number
              description: It is a one-up number used to differentiate one award from the other when the same Aid Fund Code is used.
              type: integer
              x-lineageReferenceObject: KVROTHR_FNDC_SEQ_NO
        fstaStatusCode:
          title: Fund Status Code
          description: The stage in which this aid fund code is when it has been assigned to this applicant as part of the awarding processing.
          maxLength: 4
          type: string
          x-lineageReferenceObject: KVROTHR_FSTA_STATUS_CDE
        fstaStatusDate:
          title: Fund Status Code Date 
          description: The date associated with the fund status code.
          type: string
          x-lineageReferenceObject: KVROTHR_FSTA_STATUS_DATE
        awardAmount:
          title: Award Amount
          description: The amount of money that has been awarded to the applicant by an external agency for this aid fund code.
          type: number
          format: decimal
          x-lineageReferenceObject: KVROTHR_AWARD_AMT
        remitAmount:
          title: Remit Amount
          description: The amount of the award that will be remitted directly to the institution by the awarding agency.
          type: number
          format: decimal
          x-lineageReferenceObject: KVROTHR_REMIT_AMT
        refundAmount:
          title: Refund Amount
          description: Amount of money sent by the institution to the awarding agency when the student has withdrawn or has not maintained his/her eligibility status anymore.
          type: number
          format: decimal
          x-lineageReferenceObject: KVROTHR_REFUND_AMT
        chequeReleaseDate:
          title: Cheque Release Date
          description: The date the institution released the cheque to the student for this award.
          type: string
          x-lineageReferenceObject: KVROTHR_CHEQUE_RELEASE_DATE
        continuingEligInd:
          title: Continuing Eligibility Indicator
          maxLength:  1
          type:  string
          description:   It indicates if the continuing eligibility has been met or not in order to continue getting this award.Values are Y-eligibility is met, N-Eligibility is not met. NULL-no decision about eligibility has been made for this applicant. Default value is NULL.
          x-lineageReferenceObject: KVROTHR_CONTIN_ELIG_IND  
        continuingEligOverrideInd:
          title: Continuing Eligibility Override Indicator
          description: It indicates if the Continuing Eligibility Output has been overridden when failed.Values are Y-it has been overriden, N-it has not been overriden.
          type: string
          maxLength: 1
          x-lineageReferenceObject: KVROTHR_CE_OVRDE_IND
        startDate:
          title: Start Date
          description:  The award tracking start date for this award for this applicant. 
          type: string
          x-lineageReferenceObject: KVROTHR_START_DATE
        endDate:
          title: End Date
          description: The award tracking end date for this award for this applicant.
          type: string
          x-lineageReferenceObject: KVROTHR_END_DATE
        webQueryIndicator:
          title: Web Query Indicator
          description: Indicates if this award record for this applicant can be displayed or not on the query web page.
          type: string
          maxLength: 1
          x-lineageReferenceObject: KVROTHR_WEB_QUERY_IND
        comment: 
          title: Comment
          description: The comment attached to the Aid Fund Code for the applicant.
          type: string
          maxLength: 2000
          x-lineageReferenceObject: KVROTHR_COMMENT
        dataOrigin:
          title: Data Origin
          description: The latest source for the data contained in this record.
          type: string
          maxLength: 30
          x-lineageReferenceObject: KVROTHR_DATA_ORIGIN
        createUserId:
          title: Create User ID
          description: The logon ID of the user who created this record.
          type: string
          maxLength: 30
          x-lineageReferenceObject: KVROTHR_CREATE_USER_ID
        createDate:
          title: Create Date
          description: The date this record was created.
          type: string  
          x-lineageReferenceObject: KVROTHR_CREATE_DATE
        userId:
          title: User Id
          description: The logon ID of the user who created or last updated this record.
          type: string
          maxLength: 30
          x-lineageReferenceObject: KVROTHR_USER_ID
        activityDate:
          title: Activity Date
          description: The date of the last update to this record.
          type: string 
          x-lineageReferenceObject: KVROTHR_ACTIVITY_DATE
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.      
    applicant-other-awards-1.0.0_post_request:
      type: object
      required:
        - studentId
        - aidyCode
        - aidpCode
        - fndcCode
      properties:
        studentId:
