      example:
        id: "13371b52-1afc-4a98-8186-90f2219dad01"
        status: "pending"
        createdOn: "2024-09-18T13:46:48Z"
        totalRequests: 2
        processedRequests: 0
        successfulRequests: 0
        failedRequests: 0
    applicant-other-awards-batch-1.0.0_get_response:
      type: object
      title: Applicant Other Awards Batch Status
      description: Response body for batch status inquiry
      properties:
        id:
          type: string
          description: Unique identifier for the batch request
        jobId:
          type: integer
          description: Internal job execution ID
        status:
          type: string
          description: Current status of the batch job
          enum: ["pending", "processing", "completed", "failed"]
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the batch job was created
        completedOn:
          type: string
          format: date-time
          description: Timestamp when the batch job completed (if completed)
        totalRequests:
          type: integer
          description: Total number of requests in the batch
        processedRequests:
          type: integer
          description: Number of requests that have been processed
        successfulRequests:
          type: integer
          description: Number of requests that were processed successfully
        failedRequests:
          type: integer
          description: Number of requests that failed during processing
        results:
          type: array
          description: Results for each request in the batch
          items:
            type: object
            properties:
              index:
                type: integer
                description: Index of the request in the original batch
              status:
                type: string
                description: Status of this specific request
                enum: ["pending", "processing", "successful", "failed"]
              id:
                type: object
                description: Generated ID for successful requests
                properties:
                  studentId:
                    type: string
                    description: Student identifier
                  aidyCode:
                    type: string
                    description: Aid year code
                  aidpCode:
                    type: string
                    description: Aid period code
                  fndcCode:
                    type: string
                    description: Aid fund code
                  fndcSeqNo:
                    type: integer
                    description: Fund sequence number
              errors:
                type: array
                description: Error messages for failed requests
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      description: Error code
                    message:
                      type: string
                      description: Error message
      example:
        id: "13371b52-1afc-4a98-8186-90f2219dad01"
        jobId: 123
        status: "completed"
        createdOn: "2024-09-18T13:46:48Z"
        completedOn: "2024-09-18T13:47:12Z"
        totalRequests: 2
        processedRequests: 2
        successfulRequests: 1
        failedRequests: 1
        results:
          - index: 0
            status: "successful"
            id:
              studentId: "000012345"
              aidyCode: "2223"
              aidpCode: "FALL"
              fndcCode: "PELLINST"
              fndcSeqNo: 1
          - index: 1
            status: "failed"
            errors:
              - code: "VALIDATION_ERROR"
                message: "Fund code SUPPLINST is not valid for aid year 2223"