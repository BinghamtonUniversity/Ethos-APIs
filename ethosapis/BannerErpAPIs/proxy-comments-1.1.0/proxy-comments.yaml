      title: GET Response
      type: array
      items:
        type: object
        properties:
          bannerId:
            title: Banner ID
            description: ID of the person or non-person.
            type: string
          form:
            title: Form
            description: This field identified the form identification where the comment was entered.
            type: string
            x-lineageReferenceObject: TBRCMNT_FORM
          sequenceNumber:
            title: Sequence Number
            description: This field identified the internal sequence number associated with each line of comment.
            type: number
            x-lineageReferenceObject: TBRCMNT_SEQ_NUMBER
          commentCode:
            title: Comment Code
            description: This field identifies the comment type code for the comment.
            type: string
            x-lineageReferenceObject: TBRCMNT_COMMENT_CODE
          originator:
            title: Originator
            description: This field identifies the code of the originator of the comment.  The originator could either be an office or individual.
            type: string
            x-lineageReferenceObject: TBRCMNT_ORIG_CODE
          user:
            title: User
            description: This field denotes the user who entered the comment text.
            type: string
            x-lineageReferenceObject: TBRCMNT_USER
          userId:
            title: User ID
            description: The user ID of the person who inserted or last updated this record.
            type: integer
            x-lineageReferenceObject: TBRCMNT_USER_ID
          text:
            title: Text
            description: This field specified the free-format comment text.
            type: string
            x-lineageReferenceObject: TBRCMNT_TEXT
