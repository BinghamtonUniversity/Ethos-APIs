openapi: 3.0.0
info:
  title: Proxy Comments
  description: >
    Creates or updates the comments. This API allows an API USER to post a transaction on behalf of a “user” who has a SPRIDEN ID and has Banner security access to post the transaction. The “user” field requires either the SPRIDEN ID or the Principal User ID from GOAEACC. The user is case sensitive and must match the record in Banner. 
    
     /proxy-comments?criteria={bannerId:LM1} - Get all records related to a specific person.
     
     /proxy-comments/1 - To return the record that has Surrogate ID as 1 in the table.
     
     /proxy-comments/LM1 - This returns error as LM1 is a ID of the person not the unique surrogate ID.
  version: 1.1.0
  x-api-type: erp
  x-release-status: ga
  x-source-system: banner
  x-source-domain: Student
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/proxy-comments/{id}:
    put:
      summary: Updates the comment in TGACOMC.
      description: |
        <p>Searches for the comment code and the ID provided in TBRCMNT table and
           then updates this resource with the new details provided.</p>
