            title: Comment
            description: Free format detailed Comment.
            type: string
            x-lineageReferenceObject: TBRCMNT_COMMENT
          termCode:
            title: Term Code
            description: This field identifies the term associated with the comment type code.
            type: string
            x-lineageReferenceObject: TBRCMNT_TERM
          restrictUpdateInd:
            title: Restrict Update Indicator
            description: This field indicates the restrict update value for the comment type. Y indicates the comment is restricted and can only be updated by the user who created it.  N indicates the comment is not restricted and can be updated by any user.
            type: string
            x-lineageReferenceObject: TBRCMNT_RESTRICT_UPDATE_IND
          purgeInd:
            title: Purge Indicator
            description: This field indicates the purge value for the comment type. Y indicates the comment may be purged.  N indicates the comment will not be purged.
            type: string
            x-lineageReferenceObject: TBRCMNT_PURGE_IND
          endDate:
            title: End Date
