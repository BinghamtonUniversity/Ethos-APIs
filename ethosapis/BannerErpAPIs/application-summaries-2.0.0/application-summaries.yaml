                type: string
                x-lineageReferenceObject: STVLEVL_DESC
                x-lineageLookupReferenceObject: STVLEVL
              fieldsOfStudy:
                type: array
                items:
                  type: object
                  properties:
                    fieldOfStudyTermCode:
                      title: Field of Study Term Code
                      type: string
                      x-lineageReferenceObject: SOVLFOS_TERM_CODE
                      x-lineageLookupReferenceObject: STVTERM
                    fieldOfStudyPriorityNo:
