components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    application-summaries-2.0.0:
      type: object
      properties:
        id:
          title: Application ID
          type: number
          x-lineageReferenceObject: SARADAP_SURROGATE_ID
        admissionApplicationsId:
          title: Admission Application ID
          description: This unique identifier of the application in the
            admission-applications resource.
          type: string
          format: GUID
          x-lineageReferenceObject: SARADAP_GUID
        applicationTermCode:
          title: Application Term Code
          type: string
          x-lineageReferenceObject: SARADAP_TERM_CODE_ENTRY
          x-lineageLookupReferenceObject: STVTERM
        applicationNumber:
          title: Application Number
          type: string
          x-lineageReferenceObject: SARADAP_APPL_NO
        bannerId:
          title: Banner ID
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
        applicationPreference:
          title: Application Preference
          type: string
          x-lineageReferenceObject: SARADAP_APPL_PREFERENCE
        admitCode:
          title: Admit Code
          type: string
          x-lineageReferenceObject: SARADAP_ADMT_CODE
          x-lineageLookupReferenceObject: STVADMT
        studentTypeCode:
          title: Student Type Code
          type: string
          x-lineageReferenceObject: SARADAP_STYP_CODE
          x-lineageLookupReferenceObject: STVSTYP
        residencyCode:
          title: Residency Code
          type: string
          x-lineageReferenceObject: SARADAP_RESD_CODE
          x-lineageLookupReferenceObject: STVRESD
        applicationStatusCode:
          title: Appliation Status Code
          type: string
          x-lineageReferenceObject: SARADAP_APST_CODE
          x-lineageLookupReferenceObject: STVAPST
        applicationStatusDate:
          title: Application Status Date
          type: string
          format: date
          x-lineageReferenceObject: SARADAP_APST_DATE
        applicationDecisionCode:
          title: Application Decision Code
          type: string
          x-lineageReferenceObject: SARAPPD_APDC_CODE
          x-lineageLookupReferenceObject: STVAPDC
        applicationDecisionDate:
          title: Application Decision Date
          type: string
          format: date
          x-lineageReferenceObject: SARAPPD_APDC_DATE
        outstandingRequirement:
          title: Outstanding Requirements
          type: string
          description: An indicator which shows if there are any outstanding mandatory
            requirements for the application.
        curricula:
          type: array
          items:
            type: object
            properties:
              curriculaTermCode:
                title: Curriculm Term Code
                type: string
                x-lineageReferenceObject: SOVLCUR_TERM_CODE
                x-lineageLookupReferenceObject: STVTERM
              termCodeCatalog:
