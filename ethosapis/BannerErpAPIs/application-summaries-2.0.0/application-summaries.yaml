openapi: 3.0.0
info:
  title: Application Summaries
  description: >
    This API retrieves a summary of admissions applications for a person similar
    to the information presented on the Banner SAASUMI admin page.
  version: 2.0.0
  x-source-domain: Student
  x-source-name: SAASUMI
  x-source-title: null
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: application-summaries
paths:
  /api/application-summaries:
    get:
      summary: Returns admissions application summaries
      description: |
        This API retrieves the list of all application summaries.
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      tags:
        - application-summaries
      parameters:
        - name: accept
          in: header
          required: true
          description: |
            ```
            
              application/vnd.hedtech.integration.v2+json
            ```
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Banner Id

            Returns all admission applications for the Banner ID passed.

            ```

            /application-summaries?criteria={"bannerId":"331314209"}

            ```

            ### Application Term Code  

            Returns all admission applications for the application term code
            passed.

            ```

            /application-summaries?criteria={"applicationTermCode":"201410"}

            ```

            ### Application Number

            Returns all admission applications for the application number
            passed.

            ```

            /application-summaries?criteria={"applicationNumber":"1"}

            ```

            ### Application Preference

            Returns all admission applications for the application preference
            passed.

            ```

            /application-summaries?criteria={"applicationPreference":"1"}

            ```

            ### Admit Code

            Returns all admission applications for the admit code passed.

            ```

            /application-summaries?criteria={"admitCode":"ST"}

            ```

            ### Student Type Code

            Returns all admission applications for the Student Type Code passed.

            ```

            /application-summaries?criteria={"studentTypeCode":"N"}

            ```
            
            ### Residency Code

            Returns all admission applications for the residency code passed.

            ```

            /application-summaries?criteria={"residencyCode":"R"}

            ```
            
            ### Application Status Code

            Returns all admission applications for the Application Status Code
            passed.

            ```

            /application-summaries?criteria={"applicationStatusCode":"D"}

            ```
            
            ### Application Status Date

            Returns all admission applications for the Application Status Date
            passed.

            ```

            /application-summaries?criteria={"applicationStatusDate":"2013-09-17"}

            ```

            Returns all admission applications greater than equals the
            Application Status Date passed.

            ```

            /application-summaries?criteria={"applicationStatusDate":{"$gte":
            "2013-09-17"}}

            ```
            
            Returns all admission applications greater than the Application
            Status Date passed.

            ```

            /application-summaries?criteria={"applicationStatusDate":{"$gt":
            "2013-09-17"}}

            ```
            
            Returns all admission applications less than equals to the
            Application Status Date passed.

            ```

            /application-summaries?criteria={"applicationStatusDate":{"$lte":
            "2013-09-17"}}

            ```
            
            Returns all admission applications less than the Application Status
            Date passed.

            ```

            /application-summaries?criteria={"applicationStatusDate":{"$lt":
            "2013-09-17"}}

            ```

            ### Application Decision Code

            Returns all admission applications for the Application Decision Code
            passed.

            ```

            /application-summaries?criteria={"applicationDecisionCode":"25"}

            ```

            ### Application Decision Date

            Returns all admission applications for the Application Decision Date
            passed.

            ```

            /application-summaries?criteria={"applicationDecisionDate":"2013-09-17"}

            ```

            Returns all admission applications greater than equals the
            Application Status Date passed.

            ```

            /application-summaries?criteria={"applicationDecisionDate":{"$gte":
            "2013-09-17"}}

            ```
            
            Returns all admission applications greater than the Application
            Status Date passed.

            ```

            /application-summaries?criteria={"applicationDecisionDate":{"$gt":
            "2013-09-17"}}

            ```
            
            Returns all admission applications less than equals to the
            Application Status Date passed.

            ```

            /application-summaries?criteria={"applicationDecisionDate":{"$lte":
            "2013-09-17"}}

            ```
            
            Returns all admission applications less than the Application Status
            Date passed.

            ```

            /application-summaries?criteria={"applicationDecisionDate":{"$lt":
            "2013-09-17"}}

            ```
            
            ### Campus Code

            Returns all admission applications for the Campus Code passed.

            ```

            /application-summaries?criteria={"curricula":[{"campusCode": "M"}]}

            ```
            
            ### College Code

            Returns all admission applications for the College Code passed.

            ```

            /application-summaries?criteria={"curricula":[{"collegeCode":
            "AD"}]}

            ```
            
            ### Level Code

            Returns all admission applications for the Level Code passed.

            ```

            /application-summaries?criteria={"curricula":[{"levelCode": "UG"}]}

            ```
            
            ### Degree Code

            Returns all admission applications for the Degree Code passed.

            ```

            /application-summaries?criteria={"curricula":[{"degreeCode": "BA"}]}

            ```
            
            ### Program

            Returns all admission applications for the Program passed.

            ```

            /application-summaries?criteria={"curricula":[{"program":
            "BA-ECON"}]}

            ```

            ### Field of Study Type

            Returns all admission applications for the Field of Study Type
            passed.

            ```

            /application-summaries?criteria={"curricula":[{"fieldsOfStudy":
            [{"fieldOfStudyType":"MAJOR"}]}]}

            ```
            
            ### Field of Study Code

            Returns all admission applications for the Field of Study Code
            passed.

            ```

            /application-summaries?criteria={"curricula":[{"fieldsOfStudy":
            [{"fieldOfStudyCode":"ECON"}]}]}\
            
             ```
      
      

      responses:
        "200":
          description: Success
          content:
            application/vnd.hedtech.integration.v2+json:
              schema:
                type: object
                $ref: "#/components/schemas/application-summaries-2.0.0"

          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v2+json
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "500":
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
      x-method-permissions: API_APPLICATION_SUMMARIES
