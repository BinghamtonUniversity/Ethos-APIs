        Retrieves the contact card information of an application-summaries from
        an institution for a specific term.
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      tags:
        - application-summaries
      parameters:
        - name: id
          in: path
          required: true
          description: >
            A global identifier of the resource for use in all external
            references
          schema:
            type: number
            format: integer
            minimum: 1
        - name: accept
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v2+json
            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v2+json
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
