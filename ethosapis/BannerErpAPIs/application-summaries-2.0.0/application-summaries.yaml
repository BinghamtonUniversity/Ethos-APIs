                type: string
                x-lineageReferenceObject: SOVLCUR_PRIORITY_NO
              program:
                title: Program Code
                type: string
                x-lineageReferenceObject: SOVLCUR_PROGRAM
                x-lineageLookupReferenceObject: SMRPRLE
              programDesc:
                title: Program Description
                type: string
                x-lineageReferenceObject: SMRPRLE_PROGRAM_DESC
                x-lineageLookupReferenceObject: SMRPRLE
              collegeCode:
                title: College Code
                type: string
                x-lineageReferenceObject: SOVLCUR_COLL_CODE
                x-lineageLookupReferenceObject: STVCOLL
              collegeDesc:
                title: College Description
                type: string
                x-lineageReferenceObject: STVCOLL_DESC
                x-lineageLookupReferenceObject: STVCOLL
              campusCode:
                title: Campus Code
                type: string
                x-lineageReferenceObject: SOVLCUR_CAMP_CODE
                x-lineageLookupReferenceObject: STVCAMP
              campusDesc:
                title: Campus Description
                type: string
                x-lineageReferenceObject: STVCAMP_DESC
                x-lineageLookupReferenceObject: STVCAMP
              degreeCode:
