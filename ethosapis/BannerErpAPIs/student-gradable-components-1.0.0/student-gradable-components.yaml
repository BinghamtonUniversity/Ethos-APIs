openapi: 3.0.0
info:
  title: student-gradable-components
  description: >
    Retrieves the list of student gradable components for the course reference
    number, term and component Id passed.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
  x-source-title: Student Gradable Components
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: student-gradable-components
paths:
  /api/student-gradable-components:
    get:
      description: >
        __Paging__ Pagination is supported using parameters limit and offset.
        Default value for limit is 500 and upper limit is 1000.

          __Sorting__ NA

        __Filtering__ Filtering is supported using url parameters
        [‘assessmentType’, ‘crn’, ‘term’, ‘componentId’, ‘subComponentId’].
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUD_GRADABLE_COMPS
      tags:
        - student-gradable-components
      parameters:
        - name: accept
          in: header
          required: true
          schema:
            type: string
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```
              application/vnd.hedtech.integration.v1.0.0+json
            ```
        - name: crn
          in: query
          required: true
          schema:
            type: string
          description: course reference number
          example: 35002
        - name: term
          in: query
          required: true
          schema:
            type: string
          description: term code
          example: 201440
        - name: componentId
          in: query
          required: true
          schema:
            type: string
          description: component id
          example: 43
      responses:
        "200":
          description: Success
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/student-gradable-components"
              examples:
                student-grades:
                  $ref: "#/components/examples/student-gradable-components"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    student-gradable-components:
      type: array
      items:
        type: object
        properties:
          bannerId:
            type: string
          bannerSourcedId:
            type: string
          bannerUserName:
            type: string
          comment:
            type: string
          completedDate:
            type: string
          componentName:
            type: string
          currentReason:
            type: string
          extensionDate:
            type: string
          grade:
            type: string
          gradeDate:
            type: string
          gradeScale:
            type: string
          percentage:
            type: number
          personGuid:
            type: string
          rolled:
            type: boolean
          score:
            type: number
          studentFullName:
            type: string
          termCode:
            type: string
          totalScore:
            type: number
  examples:
