      - EthosIntegrationBearer: []
      - BasicAuth: []
      x-method-permissions: API_GRADE_CONFIGURATIONS
      tags:
        - grade-configurations
      parameters:
        - name: id
          in: path
          required: true                       
          description: "A global identifier of a grades resource for use in all external references to the grade."
          schema:
            type: string
            format: guid
            minimum: 1
      responses:
       '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response.
