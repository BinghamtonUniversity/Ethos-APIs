openapi: 3.0.0
info:
  title: holds
  description: |
    Provides the student's current holds information.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
  x-source-title: Holds
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: holds
paths:
  /api/students/{bannerId}/holds:
    get:
      description: >
        Holds are not driven by term but based on banner Id.

          Exception will be thrown for deceased student.

        In the response header, X-hedtech-totalCount will show total number of
        student’s holds.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_HOLDS, API_STUDENTS
      tags:
        - holds
      parameters:
        - name: accept
          in: header
          required: true
          schema:
            type: string
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```
              application/vnd.hedtech.integration.v1.0.0+json
            ```
        - name: bannerId
          in: path
          required: true
          schema:
            type: string
          example: HOSH293
      responses:
        "200":
          description: Success
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/holds"
            application/vnd.hedtech.integration.v1.0.0+xml:
              schema:
                type: object
                $ref: "#/components/schemas/holds"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    holds:
      type: array
      items:
        type: object
        properties:
          amountOwed:
            type: string
          fromDate:
            type: string
            format: date
          holdTypeCode:
            type: number
          holdTypeDescription:
            type: string
          originatorCode:
            type: string
          originatorDescription:
            type: string
          reason:
            type: string
          toDate:
            type: string
            format: date
          processAffectedDescription:
            type: array
            items:
              type: string
