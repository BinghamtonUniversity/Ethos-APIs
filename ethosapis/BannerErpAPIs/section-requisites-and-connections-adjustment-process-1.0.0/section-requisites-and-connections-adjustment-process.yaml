openapi: 3.0.0
info:
  title: Section Requisites and Connections Adjustment Process
  description: >

    The Section Requisites and Connections Adjustment Process API is used to create and maintain links, corequisites
     and prerequisite restrictions for a section. In addition, the API supports the option to post section requisite and connection adjustments in batches.
    
    
    Section requisites and connections can be queried using section-requisites-and-connections. 

  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SSAPREQ SSADETL
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/section-requisites-and-connections-adjustment-process:
    post:
      tags:
        - section-requisites-and-connections-adjustment-process
      summary: Creates or updates resources in SSBSECT, SSRLINK, SSRCORQ and SSRRTST.
      description: >
        Creates or updates the specified section link (SSRLINK), section corequisite (SSRCORQ), 
        and section test score and prerequisite restrictions tab (SSRRTST).
        

        API behavior details:


        * For sections with no existing requisites and connections, the POST requests inserts section requisite and connection records as requested.


        * For existing section requisite and connection records, the POST request replaces any existing data associated with the 
        resource for the specified term and crn with the new data provided in the request. This ensures the record is entirely updated to match the new data set provided.


        * Complete Data Set Required - The POST request must include complete objects or arrays. The data sent must fully represent the resource being updated. 
        Partial data may result in an incomplete or incorrect update. 
      
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          description:  |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
            ```
          required: false
          schema:
            type: integer

        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer            
      requestBody:
        content:
          application/vnd.hedtech.integration.1.0.0+json:
            schema:
              type: object
              $ref: '#/components/schemas/section-requisites-and-connections-adjustment-process-1.0.0_post_request'
      responses:
        '201':
          description: Success
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object  
                $ref: "#/components/schemas/section-requisites-and-connections-adjustment-process-1.0.0_response"                                    
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
