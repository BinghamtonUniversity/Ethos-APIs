components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-extension-premium-earnings.json:
      title: Position Budget Premium Earnings Totals
      description: Displays the details of the Premiume Earnings for the particular
        year and postion.
      type: object
      properties:
        position:
          title: Position Code
          description: Position number for the position.
          type: string
        fiscCode:
          title: Fiscal Year
          description: BANNER HR system defined code for the fiscal year.
          type: string
        coa:
          title: Chart of Accounts code
          description: The BANNER FINANCE Chart of Accounts Code under which the position
            is created.
          type: string
        organization:
          title: Premium Earnings Organization code
          description: Organization that controls the budget for the Premium Earning for
            this position.
          type: string
        budgetId:
          title: Premium Earnings Budget ID code
          description: System defined code for Budget Id of the Premium
            Earning.  Validated against BANNER FINANCE if it is installed.
          type: string
        phase:
          title: Premium Earnings Budget Phase code
          description: A system defined code for the Budget Phase for the Premium
            Earnings.  Validated against BANNER FINANCE if it is installed.
          type: string
        earning:
          title: Earnings Code - Earnings Description
          description: A code and description which identifies the Premium Earning.
          type: string
        budgettopost:
          title: Premium Earnings Budget To post
          description: Amount of the Premium Earning budget that has to be posted to
            Finance.
          type: number
        budget:
          title: Premium Earnings Budget Amount
          description: Amount Budgeted for the Premium Earnings for this position.
          type: number
        expend:
          title: Premium Earnings Expended Amount
          description: Amount of money expended towards the Premium Earning Budget for
            this position.
          type: string
        remaining:
          title: Premium Earnings Remaining Amount
          description: The differnce of Premium Earnings Budgeted Amount and the Expended
            Amount will be the Premium Earnings Remaining Amount.
          type: number
        activityDate:
          title: Activity Date
          description: Date when the record was inserted or last modified.
          type: string
        userId:
          title: User ID
          description: The user ID of the person who inserted or last updated this record.
          type: string
      required:
        - position
        - fiscCode
    schema-extension-premium-earnings-request.json:
      title: Position Budget Premium Earnings Totals Request Body
      description: Displays the details of the Premiume Earnings for the particular
        year and postion.
      type: object
      properties:
        positionCode:
          title: Position Code
          description: Position number for the position.
          type: string
        fiscCode:
          title: Fiscal Year
          description: BANNER HR system defined code for the fiscal year.
          type: string
        coasCode:
          title: Chart of Accounts code
          description: The BANNER FINANCE Chart of Accounts Code under which the position
            is created.
          type: string
        budgetId:
          title: Premium Earnings Budget ID code
          description: System defined code for Budget Id of the Premium
            Earning.  Validated against BANNER FINANCE if it is installed.
          type: string
        phase:
          title: Premium Earnings Budget Phase code
          description: A system defined code for the Budget Phase for the Premium
            Earnings.  Validated against BANNER FINANCE if it is installed.
          type: string
        earningCode:
          title: Earnings Code
          description: A code which identifies the Premium Earning.
          type: string
        budgetedAmount:
          title: Premium Earnings Budget Amount
          description: Amount Budgeted for the Premium Earnings for this position.
          type: number
        expendedAmount:
          title: Premium Earnings Expended Amount
          description: Amount of money expended towards the Premium Earning Budget for
            this position.
          type: string
      required:
        - positionCode
        - fiscCode
        - coasCode
        - budgetId
        - phase
        - earningCode
        - budgetedAmount
      additionalProperties: false
    ErrorsObj:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        message:
          type: string
  examples:
    MandtoryFieldsMissing:
      value: |-
