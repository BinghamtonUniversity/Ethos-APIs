components:
  schemas:
    security-group-details-1.1.0_post_request:
      type: object
      required:
        - securityGroup
        - description
      properties:
        securityGroup:
          title: Security Group Code
          description: "The name of the security group."
          type: string
          x-lineageReferenceObject: GTVSGRP_CODE
          example: "CASHIERS"
          maxLength: 30   
        description:
          title: Description
          description: "Description of the Security Group."
          type: string
          x-lineageReferenceObject: GTVSGRP_DESC
          example: 'All Cashiers'
          maxLength: 60                 
        owner:
          title: Owner
          description: "The owner of the security group. Defaults to PUBLIC if not included in request."
          type: string
          x-lineageReferenceObject: GTVSGRP_OWNER
          example: "BANSECR"
          maxLength: 30                    
    security-group-details-1.1.0_put_request:
      type: object
      properties:
        securityGroup:
          title: Security Group Code
          description: "The name of the security group."
          type: string
          x-lineageReferenceObject: GTVSGRP_CODE
          example: "CASHIERS"
          maxLength: 30   
        description:
          title: Description
          description: "Description of the Security Group."
          type: string
          x-lineageReferenceObject: GTVSGRP_DESC
          example: 'All Cashiers'
          maxLength: 60                 
        owner:
          title: Owner
          description: "The owner of the security group. Defaults to PUBLIC if not included in request."
          type: string
          x-lineageReferenceObject: GTVSGRP_OWNER
          example: "BANSECR"
          maxLength: 30               
    security-group-details-1.1.0_response:
      type: object
      required:
        - id
        - securityGroup 
        - owner    
      properties:
        id:
          title: Security Group ID
          description: "Unique identifier for the security group."
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GTVSGRP_GUID
          example: 49eqfc68-3t89-4036-852c-341aa9d8501a          
          maxLength: 36
        securityGroup:
          title: Security Group Code
          description: "The name of the security group."
          type: string
          x-lineageReferenceObject: GTVSGRP_CODE
          example: "CASHIERS"
          maxLength: 30   
        description:
          title: Description
          description: "Description of the Security Group."
          type: string
          x-lineageReferenceObject: GTVSGRP_DESC
          example: 'All Cashiers'
          maxLength: 60                 
        owner:
          title: Owner
          description: "The owner of the security group."
          type: string
          x-lineageReferenceObject: GTVSGRP_OWNER
          example: "BANSECR"
          maxLength: 30 
        assignedObjects:
          title: Assigned Objects
          type: array
          items:
            required: 
            - object
            - role
            type: object
            properties:
              object:
                title: Object
                description: "Object assigned to the security group."
                x-lineageReferenceObject: GUROGRP_OBJECT
                example: "TSAAREV"
                maxLength: 30
              role:
                title: Role
                description: "Security role assigned to the object."
                x-lineageReferenceObject: GUROGRP_ROLE
                example: "BAN_DEFAULT_M"
                maxLength: 30
        assignedClasses: 
          title: Assigned Classes
          description: "Class(es) assigned to the security group."
          x-lineageReferenceObject: GURCGRP_CLASS
          example: "BAN_ARSYS_C"
          type: array
          minItems: 1
          items: 
            minLength: 1
            maxLength: 30
            type: string                                 
        assignedUsers: 
          title: Assigned Users
          type: array
          description: "User(s) assigned to the security group."
          x-lineageReferenceObject: GURUGRP_USER
          example: "CSZKARAD22"
          minItems: 1
          items: 
            minLength: 1
            maxLength: 30
            type: string  
        modifiedOn:
          title: Activity Date
          description: This field identifies the most recent date a record was created or updated.
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          example: 2024-11-17 06:39:14.000
          x-lineageReferenceObject: GTVSGRP_ACTIVITY_DATE
        modifiedBy:
          title: Modified By User ID
          maxLength:  30
          type:  string
          description:  User who inserted or last updated the data.
          x-lineageReferenceObject: GTVSGRP_USER_ID
          example: SAISUSR                                        
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
              type: object
              properties:
                id:
                  type: string
                  description: The global identifier of the resource in error.
                sourceId:
                  type: string
                  description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
                code:
                  type: string
                  description: The error message code used to describe the error details.
                description:
                  type: string
                  description: The error description used to describe the error details.
                message:
                  type: string
                  description: The detailed actionable error message.
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic