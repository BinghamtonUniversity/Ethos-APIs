openapi: 3.0.0
info:
  title: Finance Transaction Input Details
  description: GURFEED is a holding table for records transmitting into Finance
    tables. This API retrieves all data and deletes the entire table.
  version: 1.0.0
  x-source-domain: Finance
  x-source-name: GURFEED
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/finance-transaction-input-details:
    get:
      tags:
        - finance-transaction-input-details
      summary: Return resources from GURFEED
      description: Return resources from GURFEED
      parameters:
        - name: accept
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```     
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### System Id

            Returns all finance transaction input details for the systemId
            passed.

            ```

            /finance-transaction-input-details?criteria={"systemId":"331314209"}

            ```

            ### System Time Stamp

            Returns all finance transaction input details for the
            systemTimeStamp passed.

            ```

            /finance-transaction-input-details?criteria={"systemTimeStamp":"20230728092214"}

            ```

            ### Document Code

            Returns all finance transaction input details for the Document Code
            passed.

            ```

            /finance-transaction-input-details?criteria={"docCode":"F0003485"}

            ```

            ### Record Type

            Returns all finance transaction input details for the recordType
            passed.

            ```

            /finance-transaction-input-details?criteria={"recordType":"2"}

            ```

            ### Activity Date

            Returns all finance transaction input details for the activityDate
            passed.

            ```

            /finance-transaction-input-details?criteria={"activityDate":"2010-01-01"}

            ```

            ### User Id

            Returns all finance transaction input details for the userId passed.

            ```

            /finance-transaction-input-details?criteria={"userId":"GRAILS"}

            ```

            ### Transaction Date

            Returns all finance transaction input details for the transDate
            passed.

            ```

            /finance-transaction-input-details?criteria={"transDate":"2010-10-10"}

            ```

            ### Transaction Amount

            Returns all finance transaction input details for the transAmt
            passed.

            ```

            /finance-transaction-input-details?criteria={"transAmt":123.12}

            ```
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/finance-transaction-input-details-1.0.0_get_respons\
                    e"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                FilterValueDataTypeInvalid:
                  $ref: "#/components/examples/FilterValueDataTypeInvalid"
                InvalidFilterParameter:
                  $ref: "#/components/examples/InvalidFilterParameter"
        "401":
          description: Failure. Unauthorized.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                Unauthorized:
                  $ref: "#/components/examples/Unauthorized"
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                NoPermission:
                  $ref: "#/components/examples/NoPermission"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                MethodNotAllowed:
                  $ref: "#/components/examples/MethodNotAllowed"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                UnsupportedVersion:
                  $ref: "#/components/examples/UnsupportedVersion"
        "500":
          description: Server error. Unexpected configuration or data.
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      x-method-permissions: API_FIN_TRANS_INPUT_DETAILS
  /api/finance-transaction-input-details/{systemId}:
    delete:
      summary: Removes a resource from GURFEED
      description: >
        Deletes all existing GURFEED records  from GURFEED table with the passed
        in systemId.
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      tags:
        - finance-transaction-input-details
      parameters:
        - name: systemId
          in: path
          required: true
          description: Contains the system identifier from which the transaction originated.
          schema:
            type: string
            minimum: 1
        - name: accept
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```
          schema:
            type: string
      responses:
        "200":
          description: No Content
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                InvalidsystemId:
                  $ref: "#/components/examples/InvalidsystemId"
        "401":
          description: Failure. Unauthorized.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                Unauthorized:
                  $ref: "#/components/examples/Unauthorized"
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                NoPermission:
                  $ref: "#/components/examples/NoPermission"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                MethodNotAllowed:
                  $ref: "#/components/examples/MethodNotAllowed"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
              examples:
                UnsupportedVersion:
                  $ref: "#/components/examples/UnsupportedVersion"
        "500":
          description: Server error. Unexpected configuration or data.
      x-method-permissions: API_FIN_TRANS_INPUT_DETAILS
components:
  schemas:
    finance-transaction-input-details-1.0.0_get_response:
      required:
        - systemId
        - systemTimeStamp
        - docCode
        - recordType
        - activityDate
        - userId
        - transDate
        - transAmt
      type: object
      properties:
        systemId:
          title: System ID
          description: The system identifier from which the transaction originated.
          maxLength: 8
          type: string
          x-lineageReferenceObject: GURFEED_SYSTEM_ID
        systemTimeStamp:
          title: System Time Stamp
          description: The time of the day attached by the system to every record when
            entered into the system.
          maxLength: 14
          type: string
          x-lineageReferenceObject: GURFEED_SYSTEM_TIME_STAMP
        docCode:
          title: Document Code Number
          description: The unique number of the document being updated.
          maxLength: 8
          type: string
          x-lineageReferenceObject: GURFEED_DOC_CODE
        recordType:
          title: Record Type
          description: The indicator of the type of record (type 1 or type 2).
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_REC_TYPE
        submissionNumber:
          title: Submission Number
          description: The number of allowable submissions for a reusable/recurring
            document.
          maxLength: 3
          type: number
          x-lineageReferenceObject: GURFEED_SUBMISSION_NUMBER
        itemNumber:
          title: Item Number
          description: The literal commodity or goods description associated with an
            invoice processing record.
          maxLength: 4
          type: number
          x-lineageReferenceObject: GURFEED_ITEM_NUM
        seqNumber:
          title: Sequence Number
          description: A system generated sequence number relating to transactions within
            a document.
          maxLength: 4
          type: number
          x-lineageReferenceObject: GURFEED_SEQ_NUM
        activityDate:
          title: Activity Date
          description: Date the record was created or last updated.
          type: string
          format: date
          x-lineageReferenceObject: GURFEED_ACTIVITY_DATE
        userId:
          title: User ID
          description: The unique identification code of the user.
          maxLength: 30
          type: string
          x-lineageReferenceObject: GURFEED_USER_ID
        ruleClassCode:
          title: Rule Class Code
          description: The four character alphanumeric code identifying an accounting
            transaction rule class.
          maxLength: 4
          type: string
          x-lineageReferenceObject: GURFEED_RUCL_CODE
        docRefNumber:
          title: Document Reference Number
          description: The user-defined number providing additional identification for the
            encumbrance.
          maxLength: 35
          type: string
          x-lineageReferenceObject: GURFEED_DOC_REF_NUM
        transDate:
          title: Transaction Date
          description: The date the transaction was processed.
          type: string
          format: date
          x-lineageReferenceObject: GURFEED_TRANS_DATE
        transAmt:
          title: Transaction Amount
          description: The dollar amount of the transaction associated with this
            particular account distribution.
          maxLength: 17
          type: number
          x-lineageReferenceObject: GURFEED_TRANS_AMT
        transDesc:
          title: Transaction Description
          description: A brief description of the purpose of the journal voucher record
            being created.
          maxLength: 35
          type: string
          x-lineageReferenceObject: GURFEED_TRANS_DESC
        debitCreditInd:
          title: Debit Credit Indicator
          description: This debit or credit indicator is used for all general ledger
            transactions.  The plus (+) or minus (-) indicators are used for all
            operating account ledger (OPAL) transactions.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_DR_CR_IND
        bankCode:
          title: Bank Code
          description: A user-defined value that is used for identification purposes on
            all cash transactions.
          maxLength: 2
          type: string
          x-lineageReferenceObject: GURFEED_bankCode_CODE
        obudCode:
          title: obudCode
          description: The user-defined unique identifier of a budget id.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURFEED_OBUD_CODE
        obphCode:
          title: obphCode
          description: The user-defined identifier for a budget phase.  The budget phase
            in combination with budget identifier (obud_code) uniquely
            identifies a budget in the budget system.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURFEED_OBPH_CODE
        budgetDurationCode:
          title: Budget Duration Code
          description: Duration code is as follows P = Permanent Budget Amounts, T =
            Temporary Budget Amounts.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_BUDG_DUR_CODE
        coasCode:
          title: COAS Code
          description: The primary identification code for any chart of accounts that
            uniquely identifies that chart from any other in a multi-chart
            environment.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_COAS_CODE
        acciCode:
          title: ACCI Code
          description: The user-defined value representing a summarization of any
            combination of user-defined FOAPAL elements.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURFEED_ACCI_CODE
        fundCode:
          title: Fund Code
          description: Identifies the fund code that appears on a transaction.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURFEED_FUND_CODE
        orgnCode:
          title: Organization Code
          description: Identifies the organization code that appears on a transaction.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURFEED_ORGN_CODE
        acctCode:
          title: Account Code
          description: The user-defined value representing an account.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURFEED_ACCT_CODE
        progCode:
          title: Program Code
          description: The user-defined value to the program classification structure as
            defined by the National Council of Higher Education Management
            Systems.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURFEED_PROG_CODE
        actvCode:
          title: Actvity Code
          description: The activity that is primarily associated with this organization.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURFEED_ACTV_CODE
        locnCode:
          title: Location Code
          description: The physical location of the institution financial manager.  For
            example, Vice President, Finance, Suite 10 Adams Hall, Main Campus.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURFEED_LOCN_CODE
        depositNumber:
          title: Deposit Number
          description: The deposit number assigned to this transaction.
          maxLength: 8
          type: string
          x-lineageReferenceObject: GURFEED_DEP_NUM
        encumbranceNumber:
          title: Encumbrance Number
          description: The unique number of a document.
          maxLength: 8
          type: string
          x-lineageReferenceObject: GURFEED_ENCD_NUM
        encumbranceItemNum:
          title: Encumbrance Item Number
          description: The literal commodity or goods description associated with an
            invoice processing record.
          maxLength: 4
          type: number
          x-lineageReferenceObject: GURFEED_ENCD_ITEM_NUM
        encumbranceSeqNum:
          title: Encumbrance Sequence Number
          description: The sequence number for the account distribution within the
            referenced encumbrance number being effected.
          maxLength: 4
          type: number
          x-lineageReferenceObject: GURFEED_ENCD_SEQ_NUM
        encumbranceActionInd:
          title: Encumbrance Action Indicator
          description: Indicators are as follows T = Total, P = Partial, A = Adjustment.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_ENCD_ACTION_IND
        projectCode:
          title: Project Code
          description: If the encumbrance is related to project (work order) from cost
            accounting, enter the project code.
          maxLength: 8
          type: string
          x-lineageReferenceObject: GURFEED_PRJD_CODE
        distributionPercentage:
          title: Distribution Percentage
          description: The percentage of the total encumbrance to be assigned to this
            accounting distribution.  If a percentage is entered, the system
            calculates the amount, otherwise, an amount must be entered.
          maxLength: 6
          type: number
          x-lineageReferenceObject: GURFEED_DIST_PCT
        budgetDisposition:
          title: Budget Disposition
          description: The indicator that determines the year-end processing or budget
            requested encumbrance amounts.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_BUD_DISPN
        cmtType:
          title: Commitment Type
          description: The encumbrance commitment type roll indicator.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_CMT_TYPE
        cmtPct:
          title: Commitment Percentage
          description: If the encumbrance is committed, this is the percentage of value to
            commit.
          maxLength: 6
          type: number
          x-lineageReferenceObject: GURFEED_CMT_PCT
        encbType:
          title: Encumbrance Type
          description: The encumbrance types are as follows R = Register, P = Purchase
            Order, E = Encumbrance, L = Labor, M = Memo.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_ENCB_TYPE
        budgetPeriod:
          title: Budget Period
          description: The numeric value of the budget period being entered if this is a
            budget journal.
          maxLength: 2
          type: string
          x-lineageReferenceObject: GURFEED_BUDGET_PERIOD
        accrualInd:
          title: Accrual Indicator
          description: This indicator is used during the accrual period.  If set to Y, the
            system automatically generates transactions for both current and
            prior fiscal years.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_ACCRUAL_IND
        abalOverride:
          title: Available Budget Override Indicator
          description: This indicator is used to override the availability of funds
            checking process, if the user has the authority.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_ABAL_OVERRIDE
        bannerId:
          title: Banner ID
          description: The identification number of the person with a student A/R detail
            transaction which is being fed.
          maxLength: 9
          type: string
          x-lineageReferenceObject: GURFEED_ID
        tranNumber:
          title: Transaction Number
          description: The transaction number of the item on the persons A/R account.
          maxLength: 8
          type: string
          x-lineageReferenceObject: GURFEED_TRAN_NUMBER
        detailCode:
          title: Detail Code
          description: The detail code of the transaction on the persons A/R account.
          maxLength: 4
          type: string
          x-lineageReferenceObject: GURFEED_DETAIL_CODE
        termCode:
          title: Term Code
          description: The term code of the of the transaction on the persons A/R account.
          maxLength: 6
          type: string
          x-lineageReferenceObject: GURFEED_TERM_CODE
        account:
          title: Account
          description: The account number associated with the detail code of the persons
            A/R detail transaction.
          maxLength: 60
          type: string
          x-lineageReferenceObject: GURFEED_ACCOUNT
        sourceCode:
          title: Source Code
          description: The source code indicating the origin of the persons A/R detail
            transaction. (e.g. (R)egistration, (D)eposit, (M)emo, etc.)
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_SRCE_CODE
        effectiveDate:
          title: Effective Date
          description: The effective date of the A/R transaction being fed.  In most
            cases, this would be <= the date that the feed is being run. On
            option, detail transactions with future effective dates can be fed.
          maxLength: 11
          type: string
          x-lineageReferenceObject: GURFEED_EFFECTIVE_DATE
        paytCode:
          title: Payment Code
          description: The type of payment represented by the detail code for this A/R
            transaction (cash, financial aid, etc.).
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_PAYT_CODE
        detailCode2:
          title: Detail Code2
          description: The detail code for the other side of an application of payments
            (APPL) tran. For the charge side, this field will contain the pay
            detail code applied to the charge.  This field will be null for
            non-APPL transactions.
          maxLength: 4
          type: string
          x-lineageReferenceObject: GURFEED_DETAIL_CODE2
        paytCode2:
          title: Payment Code2
          description: The type of payment represented by the detail code 2.  This field
            will be null for non-APPL transactions.
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_PAYT_CODE2
        currencyCode:
          title: Currency Code
          description: A code which uniquely identifies a type of currency.
          maxLength: 4
          type: string
          x-lineageReferenceObject: GURFEED_CURR_CODE
        foreignAmount:
          title: Foreign Amount
          description: Amount stated in foreign currency. Dollar amount conversion based
            on currency code and base dollars.
          maxLength: 17
          type: number
          x-lineageReferenceObject: GURFEED_FOREIGN_AMOUNT
        positionTotalStatus:
          title: Position Total Status
          description: Either A (Active) or W (Working).
          maxLength: 1
          type: string
          x-lineageReferenceObject: GURFEED_PTOT_STATUS
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
  examples:
    FilterValueDataTypeInvalid:
      value: |-
        {
            "errors": [
                {
                    "code": "Global.SchemaValidation.Error",
                    "description": "Errors parsing input JSON.",
                    "message": "Invalid filter value for [systemId]"
                }
            ]
        }
    InvalidFilterParameter:
      value: |-
        {
            "errors": [
                {
                    "code": "Global.SchemaValidation.Error",
                    "description": "Errors parsing input JSON.",
                    "message": "Unexpected query parameters [xyz]"
                }
            ]
        }
    InvalidsystemId:
      value: |-
        {
            "errors": [
                {
                    "code": "Global.SchemaValidation.Error",
                    "description": "Errors parsing input JSON.",
                    "message": "Transaction not found"
                }
            ]
        }
    NoPermission:
      value: |-
        {
            "errors": [
                {
                    "code": "403",
                    "message": "Access is denied"
                }
            ]
        }
    MethodNotAllowed:
      value: |-
        {
            "errors": [
                {
                    "code": "Operation.Not.Permitted",
                    "description": "Operation not permitted",
                    "message":  "Method not allowed."
                }
            ]
        }
    Unauthorized:
      value: >-
        {
            "errors": [
                {
                    "code": "401",
                    "message": "Full authentication is required to access this resource"
                }
            ]
        }
    UnsupportedVersion:
      value: >-
        {
            "errors": [
                {
                    "code": "unknownrepresentation.error",
                    "description":  "Unknown representation error",
                    "message": "Unsupported media type 'application/vnd.hedtech.integration.vx+json' for resource 'finance-transaction-input-details'"
                }
            ]
        }
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EthosIntegrationBearer:
      type: http
      scheme: bearer
