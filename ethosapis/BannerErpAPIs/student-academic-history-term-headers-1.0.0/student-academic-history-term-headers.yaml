components:
  schemas:
    student-academic-history-term-headers-1_0_0_id_parameter:
      type: object
      properties:
        bannerId:
          title: Banner Id
          description: Banner Id
          type: string
          maxLength: 9
          x-lineageReferenceObject: SPRIDEN_ID
        termCode:
          title: Term
          description: The term of the student institutional course record.
          type: string
          maxLength: 6
          x-lineageReferenceObject: SHRTTRM_TERM_CODE
      additionalProperties: false
      required:
        - bannerId
        - termCode
    student-academic-history-term-headers-1.0.0_put_request:
      type: object
      properties:
        updateSourceIndicator:
          title: Source Indicator
          maxLength: 1
          type: string
          description: "Source of how a record was created. Valid values: S - system
            created; U - user created"
          x-lineageReferenceObject: SHRTTRM_UPDATE_SOURCE_IND
        preCatalogIndicator:
          title: Pre-Catalog Indicator
          maxLength: 1
          type: string
          description: "Specifies if the term course information is based on the existing
            Banner catalog or is conversion data being entered prior to the
            Banner catalog data. Valid values are: Y - Pre-catalog, and N -
            Current Catalog."
          x-lineageReferenceObject: SHRTTRM_PRE_CATALOG_IND
        recordStatusIndicator:
          title: Record Status Indicator
          maxLength: 1
          type: string
          description: "Specifies the status of the term record. Valid values are: G -
            Grade Mailer Pending, C - Grade Mailer processing complete, R -
            Revised Grade Mailer Pending, N - New Record."
          format: string
          x-lineageReferenceObject: SHRTTRM_RECORD_STATUS_IND
        recordStatusDate:
          title: Record Status Date
          maxLength: 11
          type: string
          description: Date associated with the status of the record.
          format: string
          x-lineageReferenceObject: SHRTTRM_RECORD_STATUS_DATE
        gradeMailingDate:
          title: Grade Mailer Date
          maxLength: 11
          type: string
          description: Indicates the date grade mailer was sent to the student.
          format: string
          x-lineageReferenceObject: SHRTTRM_GRADE_MAILING_DATE
        gradeMailerChangeDate:
          title: Grade Mailer Change Date
          maxLength: 11
          type: string
          description: Indicates the date a revised or duplicate grade mailer was sent to
            the student.
          format: string
          x-lineageReferenceObject: SHRTTRM_GRADE_MAILER_CHG_DATE
        gradeMailerDuplicateIndicator:
          title: Grade Mailer Duplicate Indicator
          maxLength: 1
          type: string
          description: Specifies that duplicate grade mailer should be sent to the
            student.  Valid value is Y - Send duplicate mailer.
          format: string
          x-lineageReferenceObject: SHRTTRM_GRADE_MAILER_DUP
        duplicateGradeMailerDate:
          title: Duplicate Grade Mailer Date
          maxLength: 11
          type: string
          description: Indicates date duplicate grade mailer was sent.
          format: string
          x-lineageReferenceObject: SHRTTRM_GRADE_MAILER_DUP_DATE
        examinationCode:
          title: Examination Code
          maxLength: 2
          type: string
          description: Identifies a special examination the student took during the term.
          format: string
          x-lineageReferenceObject: SHRTTRM_EXAM_CODE
        academicStandingEndTermCode:
          title: End of Term Academic Standing Code
          maxLength: 2
          type: string
          description: Identifies student academic standing for the term (probation, good
            standing, etc.). Calculated based on the academic standing rules
            during the end of term standing process or may be entered directly.
          format: string
          x-lineageReferenceObject: SHRTTRM_ASTD_CODE_END_OF_TERM
        academicStandingEndTermDate:
          title: End of Term Academic Standing Date
          maxLength: 11
          type: string
          description: Date Academic Standing was entered.
          format: string
          x-lineageReferenceObject: SHRTTRM_ASTD_DATE_END_OF_TERM
        lastModifiedDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: Activity Date.  Specifies the date record was created or updated.
          format: string
          x-lineageReferenceObject: SHRTTRM_ACTIVITY_DATE
        deansListCode:
          title: Deans List Code
          maxLength: 2
          type: string
          description: Identifies if student qualified for deans list for the term.
            Calculated based on academic standing deans list rules or may be
            directly entered.
          format: string
          x-lineageReferenceObject: SHRTTRM_ASTD_CODE_DL
        deansListDate:
          title: Deans List Date
          maxLength: 11
          type: string
          description: Date Deans List Status was entered.
          format: string
          x-lineageReferenceObject: SHRTTRM_ASTD_DATE_DL
        reasonForWithdrawalCode:
          title: Withdrawal Reason
          maxLength: 2
          type: string
          description: Reason for withdrawal from this institution.
          format: string
          x-lineageReferenceObject: SHRTTRM_WRSN_CODE
        institutionTransferCode:
          title: Transfer Institution
          maxLength: 20
          type: string
          description: Institution to which the student will transfer.
          format: string
          x-lineageReferenceObject: SHRTTRM_SBGI_CODE_TRANS
        academicHistoryProgressEvaluationCode:
          title: Progress Evaluation
          maxLength: 20
          type: string
          description: Academic History Term record Progress Evaluation code.  This code
            is populated by SHRPREV.
          format: string
          x-lineageReferenceObject: SHRTTRM_PREV_CODE
        academicHistoryProgressEvaluationDate:
          title: Progress Evaluation Date
          maxLength: 11
          type: string
          description: Academic History Term record Progress Evaluation date.  This is the
            date progress evaluation code was updated.
          format: string
          x-lineageReferenceObject: SHRTTRM_PREV_DATE
        academicHistoryCombinedAcademicStandingCode:
          title: Cobmined Academic Standing
          maxLength: 2
          type: string
          description: Academic History Term record Combined Academic Standing code.  This
            code is populated by SHRPREV.
          format: string
          x-lineageReferenceObject: SHRTTRM_CAST_CODE
        academicHistoryCombinedAcademicStandingDate:
          title: Cobmined Academic Standing Date
          maxLength: 11
          type: string
          description: Academic History Term record Combined Academic Standing date.  This
            is the date combined academic standing code was updated.
          format: string
          x-lineageReferenceObject: SHRTTRM_CAST_DATE
        studentCentricPeriodCode:
          title: Student Centric Period
          maxLength: 6
          type: string
          description: Student Centric Period Code
          format: string
          x-lineageReferenceObject: SHRTTRM_SCPS_CODE
      required:
        - bannerId
        - termCode
