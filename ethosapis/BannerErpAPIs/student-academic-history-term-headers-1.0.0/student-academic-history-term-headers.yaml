openapi: 3.0.0
info:
  title: Student Academic History Term Headers
  description: >
    The Student Academic History Term Headers API supports creation and update
    of term course header details.  It also allows the record status indicator
    to be specified.  Single record GET is supported by the
    term-course-maintenance-term-header-information API.
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-domain: Student
  x-source-system: banner
  x-api-type: erp
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-academic-history-term-headers:
    put:
      tags:
        - student-academic-history-term-headers
      summary: Term course header details for a student are updated in SHRTTRM.
      description: Term course header details for a student are updated in the
        Institutional Course Maintenance Term Header Table.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: object
            $ref: "#/components/schemas/student-academic-history-term-headers-1_0_0_id_para\
              meter"
      requestBody:
