openapi: 3.0.0
info:
  title: Pay Stub Infos
  description: API for Pay stub info that fetches details such as gross amount,
    net amount, tax amount and total deductions.
  version: 1.1.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/pay-stub-infos:
    get:
      summary: Return the pay stub data such as gross amount, net amount, tax amount
        and total deductions.
      description: Returs the pay stub data such as gross amount, net amount, tax
        amount and total deductions.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PAY_STUB_INFO
      tags:
        - pay-stub-infos
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.v1.1.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: bannerId
          in: query
          required: true
          schema:
            type: string
        - name: payrollNumber
          in: query
          required: true
          schema:
            type: number
        - name: sequenceNumber
          in: query
          required: true
          schema:
            type: number
        - name: pictCode
          in: query
          required: true
          schema:
            type: string
        - name: year
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-pay-stub-infos.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.v1.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
              examples:
                MandtoryFieldsMissing:
                  $ref: "#/components/examples/MandtoryFieldsMissing"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-pay-stub-infos.json:
      title: Pay Stub Infos
      description: Displays the pay stub deatils for the particular person.
      type: object
      properties:
        grossAmount:
          title: Gross Amount
          description: The total gross amount for the event.
          type: number
        netAmount:
          title: Net Amount
          description: The total net amount for the event.
          type: number
        taxAmount:
          title: Tax Amount
          description: The total tax amount for the event.
          type: number
        deductionAmountWithTax:
          title: Deduction Amount with Tax
          description: The total deduction amount for the event. This field also includes
            the tax amount.
          type: number
        deductionAmountWithoutTax:
          title: Deduction Amount without Tax
          description: The total deduction amount for the event. This field does not
            include the tax amount.
          type: number
      required:
        - bannerId
        - payrollNumber
        - sequenceNumber
        - pictCode
        - year
    ErrorsObj:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        message:
          type: string
  examples:
    MandtoryFieldsMissing:
      value: |-
        {
            "errors": [
                {
                    "code": "Global.SchemaValidation.Error",
                    "description": "Errors parsing input JSON.",
                    "message": "Filter value is required"
                }
            ]
        }
