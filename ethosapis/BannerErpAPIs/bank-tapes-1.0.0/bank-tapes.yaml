openapi: 3.0.0
info:
  title: Bank Tapes
  description: This API can be used to retrieve a bank tape saved in the PHRBKTP table or update its reconciliation indicator. Creating (POST) new bank tapes through this API is not supported; bank tapes are created by the Banner processes PHPDOCM and PHPCHKL.
  version: 1.1.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/bank-tapes:
    get:
      summary: Returns data from the PHRBKTP table.
      description: Returns the data from the PHRBKTP table that matches the passed parameters.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_BANK_TAPES
      tags:
        - bank-tapes
      parameters:
        - name: limit
          in: query
          description:  |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/bank-tapes-1.1.0_get_request'
          description: >
            ### Id

            Returns the bank tape for this Id.

            ```

            /bank-tapes?criteria={"id":"0"}

            ```
            
            ### Doc No

            Returns the bank tape for this docNo.

            ```

            /bank-tapes?criteria={"docNo":"123"}

            ```
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/bank-tapes-1.1.0_get_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client’s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'

  /api/bank-tapes/{id}:
    get:
      summary: Return the requested resource from PHRBKTP
      description: Returns a single bank tape record with the requested global identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_BANK_TAPES
      tags:
        - bank-tapes
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier (GUID) of the resource for use in all external references.
          schema:
            type: string
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response.
              required: true
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                $ref: "#/components/schemas/bank-tapes-1.1.0_get_response"
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client’s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
    put:
      tags:
        - bank-tapes
      summary: Update the reconciliation indicator for a bank tape.
      description: Update the reconciliation indicator for a bank tape.
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.1.0+json:
            schema:
              $ref: '#/components/schemas/bank-tapes-1.1.0_put_request'
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the bank tape row
          schema:
            type: string
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.
            
            ```
            
            application/vnd.hedtech.integration.v1.1.0+json
            
            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 
            
            ```
            
            application/vnd.hedtech.integration.v1.1.0+json
            
            ```
          schema:
            type: string
      responses:
        '200':
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                $ref: "#/components/schemas/bank-tapes-1.1.0_put_response"
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client’s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_1_0_0'

  /api/bank-tapes/batches:
    post:
      summary: Update the reconciliation indicator for multiple bank tapes in a single batch request.
      description: Update the reconciliation indicator for multiple bank tapes in a single batch request.
      tags:
        - bank-tapes
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_BANK_TAPES
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole MAJOR version. See the semantic versioning topic in the API Standards from more information.
             application/vnd.hedtech.integration.v1+json
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to the API source documentation for detailed support information. Prefer to use only the whole MAJOR version.

            application/vnd.hedtech.integration.v1+json
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/bank-tapes-1.1.0_put_batch_response"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/errors_1_0_0'
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              $ref: "#/components/schemas/employee-deductions-batch-1.1.0_post_request"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    employee-deductions-batch-1.1.0_post_request:
      type: object
      properties:
        items:
          title: items
          description: List of items to be processed.
          type: array
          items:
            type: object
            oneOf:
              - $ref: '#/components/schemas/bank-tapes-1.1.0_put_batch_request'
      required:
        - items
    person:
      title: Person
      description: A reference to link an employee deduction to the common persons entity.
      type: object
      properties:
        id:
          title: ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons)
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value
    bank-tapes-1.1.0_get_request:
      type: object
      properties:
        id:
          title: Id
          description: ID of the bank tape.
          type: string
          maxLength: 9
        docNo:
          title: DocNo
          description: DocNo of the bank tape.
          type: string
          maxLength: 9
    bank-tapes-1.1.0_get_response:
      properties:
        id:
          title: Id
          type: string
          maxLength: 19
          description: "The global identifier of the bank tape."
          x-lineageReferenceObject: PHRBKTP_SURROGATE_ID
          example: 0
        amt:
          title: Amount
          maxLength: 9
          type: integer
          description: "The amount that the check was cashed for."
          x-lineageReferenceObject: PHRBKTP_AMT
          example: 0
        docNo:
          title: Document Number
          description: Document (check) number.
          maxLength: 10
          type: string
          example: 123
          x-lineageReferenceObject: PHRBKTP_DOC_NO
        activityDate:
          title: Activity Date
          description: The date on which this record was created or updated.
          maxLength: 10
          type: string
          example: 2024-03-22
          x-lineageReferenceObject: PHRBKTP_ACTIVITY_DATE
    bank-tapes-1.1.0_put_request:
      type: object
      properties:
        reconInd:
          title: Reconciliation Indicator
          description: An (R) in this field indicates that the check has been reconciled,an (E) indicates that the check numbers match but the amounts are in error,a (P) indicates that the bank paid a check that is not recorded in BANNER.
          maxLength: 10
          type: string
          example: R
          x-lineageReferenceObject: PHRBKTP_RECON_IND
    bank-tapes-1.1.0_put_batch_request:
      type: object
      properties:
        id:
          title: Id
          type: string
          maxLength: 19
          description: "The global identifier of the bank tape."
          x-lineageReferenceObject: PHRBKTP_SURROGATE_ID
          example: 0
        reconInd:
          title: Reconciliation Indicator
          description: An (R) in this field indicates that the check has been reconciled,an (E) indicates that the check numbers match but the amounts are in error,a (P) indicates that the bank paid a check that is not recorded in BANNER.
          maxLength: 10
          type: string
          example: R
          x-lineageReferenceObject: PHRBKTP_RECON_IND
    bank-tapes-1.1.0_put_response:
      properties:
        id:
          title: Id
          type: string
          maxLength: 19
          description: "The global identifier of the bank tape."
          x-lineageReferenceObject: PHRBKTP_SURROGATE_ID
          example: 0
        amt:
          title: Amount
          maxLength: 9
          type: integer
          description: "The amount that the check was cashed for."
          x-lineageReferenceObject: PHRBKTP_AMT
          example: 0
        docNo:
          title: Document Number
          description: Document (check) number.
          maxLength: 10
          type: string
          example: 123
          x-lineageReferenceObject: PHRBKTP_DOC_NO
        activityDate:
          title: Activity Date
          description: The date on which this record was created or updated.
          maxLength: 10
          type: string
          example: 2024-03-22
          x-lineageReferenceObject: PHRBKTP_ACTIVITY_DATE
        reconInd:
          title: Reconciliation Indicator
          description: An (R) in this field indicates that the check has been reconciled,an (E) indicates that the check numbers match but the amounts are in error,a (P) indicates that the bank paid a check that is not recorded in BANNER.
          maxLength: 10
          type: string
          example: R
          x-lineageReferenceObject: PHRBKTP_RECON_IND
        reconDate:
          title: Reconciliation Date
          description: The Date the Check Was Reconciled.
          maxLength: 10
          type: string
          example: 2024-06-21
          x-lineageReferenceObject: PHRBKTP_RECON_DATE
    bank-tapes-1.1.0_put_batch_response:
      type: object
      x-last-modified:
      properties:
        id:
          title: Id
          type: string
          maxLength: 19
          description: "The global identifier of the bank tape."
          x-lineageReferenceObject: PHRBKTP_SURROGATE_ID
          example: 0
        status:
          title: status
          description: status of the batch.
          type: string
          enum:
            - completed
            - inProgress
            - aborted
          example: completed
        resource:
          title: Resource
          description: The affected resource.
          type: object
          properties:
            name:
              title: Resource Name
              description: The pluralized name of the affected resource
              type: string
              example: bank-tapes
            version:
              title: Resource version
              description: The version of the resource
              type: string
              example: 1.0.0
          additionalProperties: false
          required:
            - name
            - version
        items:
          type: array
          items:
            type: object
            additionalProperties: true
            oneOf:
              -  $ref: "#/components/schemas/bank-tapes-1.1.0_put_response"
              -  $ref: '#/components/schemas/errors_1_0_0'
            required:
              - items
    errors_1_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
