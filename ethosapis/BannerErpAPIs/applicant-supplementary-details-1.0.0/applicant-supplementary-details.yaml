components:
  schemas:
    applicant-supplementary-details-1.0.0_request:
        type: object
        x-lineageReferenceObject: SPRIDEN
        properties:  
          key:
            title: Key
            type: object     
            required:
              - applicantId     
            properties:
              applicantId:
                title: Applicant id
                type: string
                maxLength: 9
                description: "This field defines the identification number used to access person on-line."  
                x-lineageReferenceObject: SPRIDEN_ID
                x-lineageLookupReferenceObject: SPRIDEN  
          testScores:
            type: array
            items:
              type: object
              x-lineageReferenceObject: SORTEST
              properties:
                testCode:
                  type: string
                  maxLength: 6
                  title: Test Code
                  description: This field identifies the Test Score Code associated with various tests,ie., SAT, ACT, placement scores.
                  x-lineageReferenceObject: SORTEST_TESC_CODE
                testDescription:
                  type: string
                  maxLength: 30
                  title: Test Description
                  description: This field specifies the test (e.g.  SAT Verbal, ACT Composite, Graduate Record Exam) associated with the test code.
                  x-lineageReferenceObject: STVTESC_DESC
                dateOn:
                  type: string
                  format: date
                  title: Date On
                  description: This field identifies the date a particular test was taken.
                  x-lineageReferenceObject: SORTEST_TEST_DATE
                testScore:
                  type: string
                  maxLength: 15
                  title: Test Score
                  description: This field identifies a particular test score.
                  x-lineageReferenceObject: SORTEST_TEST_SCORE
                admissionRequestCode:
                  type: string
                  maxLength: 4
                  title: Admission Request Code
                  description: This field identifies the admissions checklist item code which is cross referenced to this table.
                  x-lineageReferenceObject: SORTEST_ADMR_CODE
                admissionRequestDescription:
                  type: string
                  maxLength: 30
                  title: Admission Request Description
                  description: This field specifies the documents/materials (e.g. high school transcripts,   residency papers, etc.) associated with the request code, which are required  to support an application for admission.
                  x-lineageReferenceObject: STVADMR_DESC
                sourceCode:
                  type: string
                  maxLength: 4
                  title: Source Code
                  description: This field identifies the source, or how the test score was entered, ie., magnetic tape, self reported.
                  x-lineageReferenceObject: SORTEST_TSRC_CODE
                sourceDescription:
                  type: string
                  maxLength: 30
                  title: Source Description
                  description: This field specifies the admission test score source (e.g. test score tape, high school transcript) associated with the source code.
                  x-lineageReferenceObject: STVTSRC_DESC
                equivalencyInd:
                  type: string
                  maxLength: 1
                  title: Equivalency Ind
                  description: Indicator to show if the test score is an equivalency for the actual test taken.
                  x-lineageReferenceObject: SORTEST_EQUIV_IND
                reviseCode:
                  type: string
                  maxLength: 1
                  title: Revise Code
                  description: Indicates whether SAT score has been Recentered and/or Revised.
                  x-lineageReferenceObject: SORTEST_RCRV_IND
                administrationTypeCode:
                  type: string
                  maxLength: 10
                  title: Administration Type Code
                  description: This field identifies the administrative type of a particular test, ie., locally or nationally administered.
                  x-lineageReferenceObject: SORTEST_TADM_CODE
                administrationTypeDescription:
                  type: string
                  maxLength: 30
                  title: Administration Type Description
                  description: This field specifies the test score administration type (e.g. residual/scored by ACT, special (untimed), local) associated with the type code.
                  x-lineageReferenceObject: STVTADM_DESC
                purposeCode:
                  type: string
                  maxLength: 2
                  title: Purpose Code
                  description: Test purpose code
                  x-lineageReferenceObject: SORTEST_TEPR_CODE
                purposeDescription:
                  type: string
                  maxLength: 30
                  title: Purpose Description
                  description: Description of test purpose code
                  x-lineageReferenceObject: STVTEPR_DESC
                formCode:
                  type: string
                  maxLength: 2
                  title: Form Code
                  description: Test form code
                  x-lineageReferenceObject: SORTEST_TEFR_CODE
                formDescription:
                  type: string
                  maxLength: 30
                  title: Form Description
                  description: Description of test form code
                  x-lineageReferenceObject: STVTEFR_DESC
                accommodationCode:
                  type: string
                  maxLength: 4
                  title: Accommodation Code
                  description: Test accomodation code
                  x-lineageReferenceObject: SORTEST_TEAC_CODE
                accommodationDescription:
                  type: string
                  maxLength: 30
                  title: Accommodation Description
                  description: Description of test accomodation code
                  x-lineageReferenceObject: STVTEAC_DESC
                instrumentCode:
                  type: string
                  maxLength: 6
                  title: Instrument Code
                  description: Test instrument code
                  x-lineageReferenceObject: SORTEST_TEIN_CODE
                instrumentDescription:
                  type: string
                  maxLength: 30
                  title: Instrument Description
                  description: Description of test instrument code
                  x-lineageReferenceObject: STVTEIN_DESC
                termCode:
                  type: string
                  maxLength: 6
                  title: Term Code
                  description: This field identifies the term code
                  x-lineageReferenceObject: SORTEST_TERM_CODE_ENTRY
                termDescription:
                  type: string
                  maxLength: 30
                  title: Term Description
                  description: Term code description
                  x-lineageReferenceObject: STVTERM_DESC
                applicationNumber:
                  type: integer
                  maxLength: 2
                  title: Application Number
                  description: Application number.
                  x-lineageReferenceObject: SORTEST_APPL_NO
                releaseInd:
                  type: string
                  maxLength: 1
                  title: Release Ind
                  description: This field identifies the release ind.
                  x-lineageReferenceObject: SORTEST_RELEASE_IND
                instrumentId:
                  type: string
                  maxLength: 10
                  title: Instrument Id
                  description: This field identifies the instrument id
                  x-lineageReferenceObject: SORTEST_INSTR_ID
                essayId:
                  type: string
