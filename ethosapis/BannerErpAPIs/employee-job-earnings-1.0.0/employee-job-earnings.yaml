openapi: 3.0.0
info:
  title: Employee Job Earnings
  description: >
    This API can be used to retrieve, post, or delete an employee's job earning data.
    This information is displayed in the Banner administrative page NBAJOBS.
    Additionally, the API supports the option to create or update employee job earning data in batches.
  version: 1.0.0-beta
  x-audience: all
  x-release-status: beta
  x-source-domain: Human Resources
  x-source-system: banner
  x-source-name: NBREARN
  x-api-type: erp
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employee-job-earnings:
    get:
      tags:
        - employee-job-earnings
      summary: Get employee job earnings
      description: Query and retrieve employee job earning data for a given criteria. Data is extracted from NBREARN.
      parameters:
        - name: limit
          in: query
          description:
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/employee-job-earnings-1.0.0_get_request_criteria'
          description: >
            ### Person ID
            
            Returns the employee job earning information for this Person ID.  This filter should not be used if a Banner ID filter is used.
            
            ```

            /employee-job-earnings?criteria={"personId": "085df706-ee15-4947-93f8-8c260e64795e"}

            ```

            ### Banner ID
            
            Returns the employee job earning information for this Banner ID.   This filter should not be used if a Person ID filter is used.
            
            ```

            /employee-job-earnings?criteria={bannerId":"123456789"}
            
            ```

            ### Position

            Returns the employee job earning information for this Position.

            ```

            /employee-job-earnings?criteria={"position":"A000001"}

            ```
            
            ### Suffix

            Returns the employee job earning information for this position suffix.

            ```

            /employee-job-earnings?criteria={"suffix":"00"}

            ```
            
            ### Effective On

            Returns the employee job earning information that becomes effective on this date.  This filter will support the following operators: $eq, $ne, $gt, $gte, $lt, $lte.

            ```

            /employee-job-earnings?criteria={"effectiveOn":"2024-03-15"}
            

            /employee-job-earnings?criteria={"effectiveOn":{"\$gte": "2024-03-15"}
          
            ```
            
            ### Earn code

            Returns the employee job earning information that matches the earn code.

            ```

            /employee-job-earnings?criteria={"earnCode":"REG"}
            
            ```
            
            ### Active or Inactive

            Returns the employee job earning information that matches the active indicator.
            
            ```

            /employee-job-earnings?criteria={"isActive": true}
            
            ```
        - name: activeAsOf
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/employee-job-earnings-1.0.0_get_request_active_as_of'
          description: >
            A named query that returns a list of employee job earning resources that are active as of the specified "asOf" date and matches on other the filter fields.
            This is an alternative to using the criteria query.
           
            ### As Of

            REQUIRED. Returns the employee job earning information that is active as of this date.

            ```

            /employee-job-earnings?activeAsOf={"asOf":"2024-03-15"}

            ```
           
            ### Person ID
            
            Returns the employee job earning information for this Person ID.  This filter should not be used if a Banner ID filter is used.
            
            ```

            /employee-job-earnings?activeAsOf={"personId": "085df706-ee15-4947-93f8-8c260e64795e"}

            ```

            ### Banner ID
            
            Returns the employee job earning information for this Banner ID.   This filter should not be used if a Person ID filter is used.
            
            ```

            /employee-job-earnings?activeAsOf={bannerId":"123456789"}
            
            ```

            ### Position

            Returns the employee job earning information for this Position.

            ```

            /employee-job-earnings?activeAsOf={"position":"A000001"}

            ```
            
            ### Suffix

            Returns the employee job earning information for this position suffix.

            ```

            /employee-job-earnings?activeAsOf={"suffix":"00"}

            ```

            ### Earn Code

            Returns the employee job earning information that matches the earn code.

            ```

            /employee-job-earnings?activeAsOf={"earnCode":"REG"}
            
            ```
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
