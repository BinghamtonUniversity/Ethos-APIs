components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    employee-job-earnings-1.0.0_get_request_criteria:    
      properties:
        personId:
          title: Person ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"      
        position:
          title: Position
          description: The position to which the job is attached.
          type: string
          x-lineageReferenceObject: NBREARN_POSN
          example: "ADM001"
        suffix:
          title: Suffix
          description: Used to uniquely create multiple jobs in the same position.
          type: string
          x-lineageReferenceObject: NBREARN_SUFF
          example: "00"
        effectiveOn:
          title: Date for which the job earning data becomes effective.
          type: string
          format: date
          description: "Effective date of the job earning data."
          x-lineageReferenceObject: NBREARN_EFFECTIVE_DATE
          example: "2024-03-15"
        earnCode:
          title: Earnings Code
          description: The default earnings code attached to the job and used on timesheet. 
          type: string
          example: "REG"
          x-lineageReferenceObject: NBREARN_EARN_CODE
        isActive:
          title: Active or Inactive
          description: Indicates whether the earnings code is active or inactive.
          type: boolean
          example: true
          x-lineageReferenceObject: NBREARN_ACTIVE_IND
    employee-job-earnings-1.0.0_get_request_active_as_of:
      properties:
        asOf:
          title: As Of Date
          type: string
          format: date
          description: Used to query a job earning resource that is active as of this date.
          example: "2024-03-15"      
        personId:
          title: Person ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          example: "123456789"      
          x-lineageReferenceObject: SPRIDEN_ID
        position:
          title: Position
          description: The position to which the job is attached.
          type: string
          example: "ADM001"
          x-lineageReferenceObject: NBREARN_POSN
        suffix:
          title: Suffix
          description: Used to uniquely create multiple jobs in the same position.
          type: string
          example: "00"
          x-lineageReferenceObject: NBREARN_SUFF
        earnCode:
          title: Earnings Code
          description: The default earnings code attached to the job and used on timesheet. 
          type: string
          example: "REG"
          x-lineageReferenceObject: NBREARN_EARN_CODE
      required:
         - asOf
      additionalProperties: false
    employee-job-earnings-1.0.0_get_response:
      properties:
        id:
          title: Id
          type: string
          description: "The global identifier of the employee job earning."
          example: 085df706-ee15-4947-93f8-8c260e64795e
          x-lineageReferenceObject: NBREARN_GUID
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          example: "123456789"          
          x-lineageReferenceObject: SPRIDEN_ID
        position:
          title: Position
          description: The position to which the job is attached.
          type: string
          example: "ADM001"
          x-lineageReferenceObject: NBREARN_POSN
        suffix:
          title: Suffix
          description: Used to uniquely create multiple jobs in the same position.
          type: string
          example: "00"
          x-lineageReferenceObject: NBREARN_SUFF
        effectiveOn:
          title: Effective Date
          type: string
          format: date
