openapi: 3.0.0
info:
  title: Schedule Bill Rules
  description: This API returns the schedule bill rules
  version: 1.0.0
  x-source-domain: Student
  x-source-name: TBRSBEP, TBRSBMS, TBBSBRl
  x-source-system: banner
  x-api-type: erp
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/schedule-bill-rules:
    get:
      tags:
        - schedule-bill-rules
      summary: Provide the list of schedule bill rule.
      description: Provide the list of schedule bill rules of TSASBRL page from TBBSBRL, TBRSBMS, TBRSBEP tables.
      parameters:
        - name: sbrcCode
          in: query
          description:
            Schedule Bill Rules Code.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schedule-bill-rules-v1_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorsObj'
              examples:
                Filter Value Required:
                  $ref: '#/components/examples/FilterValueRequired'
        '401':
          description: Failure. Unauthorized.
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '500':
          description: Server error. Unexpected configuration or data.
      security:
        - BasicAuth: []
        - EthosIntegrationBearer: []
      x-method-permission: API_SCHEDULE_BILL_RULES
