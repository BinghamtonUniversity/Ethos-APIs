                x-lineageReferenceObject: SORCCON_DAU_IND
              modifiedOn:
                title: Last Date Record was Modified
                type: string
                format: date
                x-lineageReferenceObject: SORCCON_ACTIVITY_DATE
              concentrationMajorRule:
                title: Major/Department Rule Reference
                maxLength: 8
                type: string
                format: integer
                x-lineageReferenceObject: SORCCON_CMJR_RULE
              concentrationCode:
                title: Concentration Code Associated with the Concentration Rule
                maxLength: 4
                type: string
                x-lineageReferenceObject: SORCCON_MAJR_CODE_CONC
                x-lineageLookupReferenceObject: STVMAJR
              ediQualifierCode:
                title: EDI Qualifier Code associated with the EDI Value
