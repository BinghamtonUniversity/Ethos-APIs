components:
  schemas:
    curriculum-rules-1.1.0:
      type: object
      properties:
        id:
          title: Curriculum Rule ID
          maxLength: 19
          type: number
          description: A unique identifier for the base term enrollment record.
          x-lineageReferenceObject: SOBCURR_SURROGATE_ID
        curriculumRule:
          title: Curriculum Rule Number
          maxLength: 8
          type: number
          description: The rule number of the base curriculum rule.
          format: integer
          x-lineageReferenceObject: SOBCURR_CURR_RULE
        termCodeInitial:
          title: Initial Term
          maxLength: 6
          type: string
          description: Starting term of the curriculum rule.
          x-lineageReferenceObject: SOBCURR_TERM_CODE_INIT
          x-lineageLookupReferenceObject: STVTERM
        levelCode:
          title: Level Code
          maxLength: 2
          type: string
          x-lineageReferenceObject: SOBCURR_LEVL_CODE
          x-lineageLookupReferenceObject: STVLEVL
        primaryRollInd:
          title: Primary Curriculum Roll Indicator
          type: boolean
          description: Indicator controlling primary curriculum roll from Student to
            Academic History. true = roll, false = do not roll
          x-lineageReferenceObject: SOBCURR_PRIM_ROLL_IND
        secondaryRollInd:
          title: Secondary Curriculum Roll Indicator
          type: boolean
          description: Indicator controlling secondary curriculum roll from Student to
            Academic History. true = roll, false = do not roll
          x-lineageReferenceObject: SOBCURR_SECD_ROLL_IND
        lockInd:
          title: Lock Indicator
          type: boolean
          description: Indicator controlling updates to base curriculum rule. Only locked
            rules can be assigned to a student. 'true' = locked, 'false' =
            unlocked
          x-lineageReferenceObject: SOBCURR_LOCK_IND
        campusCode:
          title: Campus Code
          maxLength: 3
          type: string
          x-lineageReferenceObject: SOBCURR_CAMP_CODE
          x-lineageLookupReferenceObject: STVCAMP
        collegeCode:
          title: College Code
          maxLength: 2
          type: string
          x-lineageReferenceObject: SOBCURR_COLL_CODE
          x-lineageLookupReferenceObject: STVCOLL
        degreeCode:
          title: Degree Code
          maxLength: 6
          type: string
          x-lineageReferenceObject: SOBCURR_DEGC_CODE
          x-lineageLookupReferenceObject: STVDEGC
        programCode:
          title: Program Code
          maxLength: 12
          type: string
          x-lineageReferenceObject: SOBCURR_PROGRAM
          x-lineageLookupReferenceObject: SMRPRLE
        programCodeDesc:
          title: Program Description
          maxLength: 30
          type: string
          x-lineageReferenceObject: SMRPRLE_PROGRAM_DESC
        studyPathInd:
          title: Study Path Indicator
          type: boolean
          description: Indicator to turn study path creation on for the curriculum from
            the admissions applications. true = on, false = off
          x-lineageReferenceObject: SOBCURR_STUDY_PATH_IND
        academicProgramId:
          title: Academic Program Identifier
          maxLength: 36
          type: string
          format: guid
          description: Unique identifier for the rule in the academic-programs resource.
          x-lineageReferenceObject: SOBCURR_GUID
        majorsDepartments:
          title: MajorsDepartments
          description: The major/department rules associated with the base curriculum rule.
          type: array
          items:
            type: object
            properties:
              curriculumRule:
                title: Curriculum Rule Number
                maxLength: 8
                type: number
                format: integer
                x-lineageReferenceObject: SORCMJR_CURR_RULE
              majorRule:
                title: Major/Department Rule Number
                maxLength: 8
                type: string
                format: integer
                x-lineageReferenceObject: SORCMJR_CMJR_RULE
              termCodeEffective:
                title: Effective Term for Major/Department Rule
                maxLength: 6
                type: string
                format: string
                x-lineageReferenceObject: SORCMJR_TERM_CODE_EFF
                x-lineageLookupReferenceObject: STVTERM
              admissionsInd:
                title: ON-Off Indicator for Major/Department Rule in Admissions
                description: true = On, false = Off in module
                type: boolean
                x-lineageReferenceObject: SORCMJR_ADM_IND
              studentInd:
                title: ON-Off Indicator for Major/Department Rule in Student
                description: true = On, false = Off in module
                type: boolean
                x-lineageReferenceObject: SORCMJR_STU_IND
              historyInd:
                title: ON-Off Indicator for Major/Department Rule in Academic History
                description: true = On, false = Off in module
                type: boolean
                x-lineageReferenceObject: SORCMJR_HIS_IND
              recruitingInd:
                title: ON-Off Indicator for Major/Department Rule in Recruiting
                description: true = On, false = Off in module
                type: boolean
                x-lineageReferenceObject: SORCMJR_REC_IND
              degreeAuditInd:
                title: On-Off Indicator for Major/Department rule in Degree Audit
                description: true = On, false = Off in module
                type: boolean
                x-lineageReferenceObject: SORCMJR_DAU_IND
              modifiedOn:
                title: Last Date Record was Modified
                type: string
                format: date
                x-lineageReferenceObject: SORCMJR_ACTIVITY_DATE
              majorCode:
                title: Major Code Associated with the Major/Department Rule
                maxLength: 4
                type: string
                x-lineageReferenceObject: SORCMJR_MAJR_CODE
                x-lineageLookupReferenceObject: STVMAJR
              departmentCode:
                title: Department Code Associated with the Major/Department Rule
                maxLength: 4
                type: string
                x-lineageReferenceObject: SORCMJR_DEPT_CODE
                x-lineageLookupReferenceObject: STVDEPT
              degreeCode:
                title: EDI Degree Level Code associated with the Major Rule
                maxLength: 3
                type: string
                x-lineageReferenceObject: SORCMJR_DEGR_CDE
              ediQualifierCode:
                title: EDI Qualifier Code associated with the EDI Value
                maxLength: 2
                type: string
                x-lineageReferenceObject: SORCMJR_EDI_QLFR
              ediValue:
                title: EDI Field of Study Identifier associated with the Major Rule
                maxLength: 30
                type: string
                x-lineageReferenceObject: SORCMJR_EDI_VALUE
              webDisplayInd:
                title: Indicator denoting whether the curriculum rule should display on Web
                description: true = display on web, false = do not display
                type: boolean
                x-lineageReferenceObject: SORCMJR_DISP_WEB_IND
              webDescription:
                title: Curriculum Rule Description to be Displayed on Web
