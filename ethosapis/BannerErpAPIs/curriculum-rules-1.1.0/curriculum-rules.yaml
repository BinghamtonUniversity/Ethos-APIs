                maxLength: 19
                type: number
                format: integer
                x-lineageReferenceObject: SRBRICC_SURROGATE_ID
              recruitProgramName:
                title: Recruiting Program Name
                maxLength: 100
                type: string
                x-lineageReferenceObject: SRBRICC_ACAD_PROG_NAME
            required:
              - curriculumRule
              - majorRule
              - termCodeEffective
              - admissionsInd
              - studentInd
              - historyInd
              - recruitingInd
              - degreeAuditInd
              - modifiedOn
              - webDisplayInd
              - autoDecisionInd
        concentrations:
          title: Concentrations
          description: The concentration rules associated with the base curriculum rule.
          type: array
          items:
            type: object
            properties:
              curriculumRule:
                title: Curriculum Rule Number
                maxLength: 8
                type: number
                format: integer
                x-lineageReferenceObject: SORCCON_CURR_RULE
              concentrationRule:
