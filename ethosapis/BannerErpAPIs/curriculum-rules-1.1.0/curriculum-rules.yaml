openapi: 3.0.0
info:
  title: Curriculum Rules
  description: >
    
    This API returns the institutionally defined curriculum rules as seen on the
    SOACURR administrative page.  Curriculum rules are used to define the valid
    combinations of curriculum data usable in the Banner Student recruit,
    admission, student, academic history, and degree audit modules.


    In addition to the base curriculum rule (SOBCURR) record detail, any
    major/department (SORCMJR), concentration (SORCCON), minor (SORCMNR), or
    module control (SORMCRL) records attached to the base curriculum record are
    returned in the response.
  version: 1.1.0
  x-source-domain: Student
  x-source-name: SOACURR
  x-source-title: null
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/curriculum-rules:
    get:
      tags:
        - curriculum-rules
      summary: Institutionally defined curriculum rules.
      description: Returns all SOBCURR records meeting the submitted criteria. Any
        SORCMJR, SORCMNR, SORCCON, or SORMCRL records associated with the base
        curriculum rule are also returned in the response.
      parameters:
        - name: accept
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```     
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Effective Term Code of Curriculum Rule

            Returns all curriculum rules valid for the submitted term.

            ```

            /curriculum-rules?criteria={"effectiveTermCode":"200810"}

            ```

            ### Curriculum Rule Number

            Returns the curriculum rule for the submitted rule number.

            ```

            /curriculum-rules?criteria={"curriculumRule":212}

            ```

            ### Program Code

            Returns all curriculum rules where program code is equal to the
            submitted value.

            ```

            /curriculum-rules?criteria={programCode":"BA-HISTORY"}

            ```

            ### Level Code

            Returns all curriculum rules where the level code is equal to the
            submitted value.

            ```

            /curriculum-rules?criteria={"levelCode:"UG"}

            ```

            ### Campus Code

            Returns all curriculum rules where the campus code is equal to the
            submitted value.

            ```

            /curriculum-rules?criteria={"campusCode:"M"}

            ```

            ### Initial Term Code of Curriculum Rule

            Returns all curriculum rules where the inital term code is equal to
            the submitted value.

            ```

            /curriculum-rules?criteria={"termCodeInitial":"200810"}

            ```

            ### College Code

            Returns all curriculum rules where the college code is equal to the
            submitted value.

            ```

            /curriculum-rules?criteria={"collegeCode":"AS"}

            ```

            ### Degree Code

            Returns all curriculum rules where the degree code is equal to the
            submitted value.

            ```

            /curriculum-rules?criteria={"degreeCode":"AAS"}

            ```

            ### Primary Curriculum Roll Indicator

            Returns all curriculum rules where the primary curriculum roll
            indicator is equal to the submitted value.

            ```

            /curriculum-rules?criteria={"primaryRollInd":true}

            ```

            ### Secondary Curriculum Roll Indicator

            Returns all curriculum rules where the secondary curriculum roll
            indicator is equal to the submitted value.

            ```

            /curriculum-rules?criteria={"secondaryRollInd":true}

            ```

            ### Lock Indicator

            Returns all curriculum rules where the lock indicator equals the
            submitted value.

            ```

            /curriculum-rules?criteria={"lockInd":false}

            ```

            ### Study Path Indicator

            Returns all curriculum rules where the study path indicator equals
            the submitted value.

            ```

            /curriculum-rules?criteria={"studyPathInd":true}

            ```
        - name: recruitmentProgram
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Recruitment Program  

            Returns a list of active recruit academic programs.

            ```

            /academic-programs?recruitmentProgram={"recruitmentProgram":"active"}

            ```
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/curriculum-rules-1.1.0"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "500":
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      x-method-permissions: API_CURRICULUM_RULES
  /api/curriculum-rules/{id}:
