openapi: 3.0.0
info:
  title: Proxy Holds
  description: >
    Creates or updates the holds. This API allows an API USER to post a transaction on behalf of a “user” who has a SPRIDEN ID and has Banner security access to post the transaction. The “user” field requires either the SPRIDEN ID or the Principal User ID from GOAEACC. The user is case sensitive and must match the record in Banner.
  version: 1.0.0
  x-api-type: erp
  x-release-status: ga
  x-source-system: banner
  x-source-domain: Student
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/proxy-holds/{holdSequence}:
    put:
      tags:
        - proxy-holds
      summary: Updates the hold in SPRHOLD.
      description: |
        <p>Searches for the hold Sequence provided in SPRHOLD table and
           then updates this resource with the new details provided.</p>
      parameters:
        - name: holdSequence
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/proxy_holds_put_request"
            example:
              user: ECL001
              amount: 1
              fromDate: 2025-06-01
              toDate: 2025-06-02
              holdTypeCode: A3
              originatorCode: ACCT
              reason: ''
              releaseInd: Y
      security:
        - BasicAuth: []
        - EthosIntegrationBearer: []
      x-method-permissions: API_PROXY_HOLDS

      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                $ref: "#/components/schemas/proxy_holds_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
    delete:
      summary: Delete the hold in SPRHOLD.
      description: |
        <p>Searches for the hold Sequence provided in SPRHOLD table and
           delete it.</p>
      security:
        - BasicAuth: []
        - EthosIntegrationBearer: []
      x-method-permissions: API_PROXY_HOLDS
      tags:
        - proxy-holds
      parameters:
        - name: Accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information.
            Prefer to use only the whole MAJOR version.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: Content-Type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to the API
            source documentation for detailed support information.
            Prefer to use only the whole MAJOR version.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: holdSequence
          in: path
          required: true
          description: Numeric hold Sequence.
          schema:
            type: number
        - name: user
          in: query
          required: true
          schema:
            type: string              
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
  /api/proxy-holds:
    get:
      summary: Returns resources from SPRHOLD.
      description: |
        <p>Returns a paged listing of all the holds that are part of the SPRHOLD table.</p>
      security:
        - BasicAuth: []
        - EthosIntegrationBearer: []
      x-method-permissions: API_PROXY_HOLDS
      tags:
        - proxy-holds
      parameters:
        - name: Accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information.
            Prefer to use only the whole MAJOR version.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### ID list  

            Get holds filtering by ID list.

            ```

            /proxy-holds?idList=HOPTE0204&idList=BANKA1

            ```

            ### from Date to Date 

            Get holds between fromDate and toDate.

            ```

            /proxy-holds?fromDate=2025-06-09&toDate=2025-06-10

            ```

            ### Hold Type Code List  

            Get holds filtering by ID Hold Type Code List.

            ```

            /proxy-holds?holdTypeCodeList=T1&holdTypeCodeList=T2

            ```

            ### Activity Date 

            Get holds made between a range of dates.

            ```

            /proxy-holds?startDate=2025-06-06&endDate=2025-06-06

            ```

            ### Originator Code List  

            Get holds filtering by Originator Code List .

            ```

            /proxy-holds?originatorCodeList=ADV1&originatorCodeList=ADV2

            ```

            ### Filters  

            Get holds using multiple filters

            ```

            /proxy-holds?id=HOSARDEMO&user=ECL001&holdTypeCode=T2&releaseInd=Y&originatorCode=ADV2

            ```    
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                $ref: "#/components/schemas/proxy_holds_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
    post:
      summary: Creates a hold record in SPRHOLD.
      description: |
        <p>Creates a new hold in the SPRHOLD table.</p>
        <p>The user can send a single ID to create hold or can pass multiple ID's to create same hold for all the ID's. </p>
      security:
        - BasicAuth: []
        - EthosIntegrationBearer: []
      x-method-permissions: API_PROXY_HOLDS
      tags:
        - proxy-holds
      parameters: []
      responses:
        "201":
          description: Success
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                $ref: "#/components/schemas/proxy_holds_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              type: object
              $ref: "#/components/schemas/proxy_holds_post_request"
            examples:
              RequestBodyForSingleId:
                $ref: "#/components/examples/RequestBodyForSingleId"
              RequestBodyForMultipleId:
                $ref: "#/components/examples/RequestBodyForMultipleId"
components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    proxy_holds_response:
      title: GET Response
      type: array
      items:
        type: object
        properties:
          id:
            title: Banner ID
            description: ID of the person
            type: string
          amount:
            title: amount
            description: This field identifies a dollar amount associated with hold.
            type: number
            x-lineageReferenceObject: SPRHOLD_AMOUNT_OWED
          dataOrigin:
            title: DATA SOURCE
            description: Source system that created or updated the row
            type: string
            x-lineageReferenceObject: SPRHOLD_DATA_ORIGIN
          user:
            title: user
            description: This field identifies the system user signon id initiating hold.
            type: string
            x-lineageReferenceObject: SPRHOLD_USER
          fromDate:
            title: from Date
            description: This field identifies the effective begin date of hold.
            type: string
            x-lineageReferenceObject: SPRHOLD_FROM_DATE
          toDate:
            title: to Date
            description: This field identifies the end date hold expires.
            type: string
            x-lineageReferenceObject: SPRHOLD_TO_DATE
          activityDate:
            title: Activity date
            description: This field defines the most current date the record is added or changed. This field does not display on the screen.
            type: string
            x-lineageReferenceObject: SPRHOLD_ACTIVITY_DATE
          holdSequence:	
            title: SEQUENCE NUMBER	
            description: Unique Sequence number for each Hold record.
            type: number
            x-lineageReferenceObject: SPRHOLD_SEQUENCE_NO
          holdTypeCode:
            title: hold Type Code
            description: This field identifies the type of hold on person record.
            type: string
            x-lineageReferenceObject: SPRHOLD_HLDD_CODE
          holdTypeCodeDescription:
            title: hold Type Code Description
            description: Thold Type Code Description.
            type: string
          originatorCode:
            title: Originator Code
            description: This field identifies person/office who authorized hold status.
            type: string
            x-lineageReferenceObject: SPRHOLD_ORIG_CODE
          originatorCodeDescription:
            title: originator Code Description
            description: originator Code Description.
            type: string
          reason:
            title: reason
            description: Free format field which identifies the reason hold was placed.
            type: string
            x-lineageReferenceObject: SPRHOLD_REASON
          releaseInd:
            title: Term code entry
            description: This field indicates that only the system user who entered the hold may release the hold.  Valid value is Y allow only system user to release hold.
            type: string
            x-lineageReferenceObject: SPRHOLD_RELEASE_IND
        additionalProperties: false
    proxy_holds_put_request:
      title: PUT Request Body
      description: Updating the Proxy Holds
      type: object
      required:
        - holdSequence
      properties:
          id:
            title: Banner ID
            description: ID of the person
            type: string
          amount:
            title: amount
            description: This field identifies a dollar amount associated with hold.
            type: number
            x-lineageReferenceObject: SPRHOLD_AMOUNT_OWED
          user:
            title: user
            description: This field identifies the system user signon id initiating hold.
            type: string
            x-lineageReferenceObject: SPRHOLD_USER
          fromDate:
            title: from Date
            description: This field identifies the effective begin date of hold.
            type: string
            x-lineageReferenceObject: SPRHOLD_FROM_DATE
          toDate:
            title: to Date
            description: This field identifies the end date hold expires.
            type: string
            x-lineageReferenceObject: SPRHOLD_TO_DATE
          holdSequence:	
            title: SEQUENCE NUMBER	
            description: Unique Sequence number for each Hold record.
            type: number
            x-lineageReferenceObject: SPRHOLD_SEQUENCE_NO
          holdTypeCode:
            title: hold Type Code
            description: This field identifies the type of hold on person record.
            type: string
            x-lineageReferenceObject: SPRHOLD_HLDD_CODE
          originatorCode:
            title: Originator Code
            description: This field identifies person/office who authorized hold status.
            type: string
            x-lineageReferenceObject: SPRHOLD_ORIG_CODE
          reason:
            title: reason
            description: Free format field which identifies the reason hold was placed.
            type: string
            x-lineageReferenceObject: SPRHOLD_REASON
          releaseInd:
            title: Term code entry
            description: This field indicates that only the system user who entered the hold may release the hold.  Valid value is Y allow only system user to release hold.
            type: string
            x-lineageReferenceObject: SPRHOLD_RELEASE_IND
      additionalProperties: false
    proxy_holds_post_request:
      title: POST Request Body
      description: Updating the Proxy Holds
      type: object
      required:
        - holdSequence
        - user
        - id
        - holdTypeCode
        - toDate
      properties:
          id:
            title: Banner ID
            description: ID of the person
            type: string
          amount:
            title: amount
            description: This field identifies a dollar amount associated with hold.
            type: number
            x-lineageReferenceObject: SPRHOLD_AMOUNT_OWED
          user:
            title: user
            description: This field identifies the system user signon id initiating hold.
            type: string
            x-lineageReferenceObject: SPRHOLD_USER
          fromDate:
            title: from Date
            description: This field identifies the effective begin date of hold.
            type: string
            x-lineageReferenceObject: SPRHOLD_FROM_DATE
          toDate:
            title: to Date
            description: This field identifies the end date hold expires.
            type: string
            x-lineageReferenceObject: SPRHOLD_TO_DATE
          holdTypeCode:
            title: hold Type Code
            description: This field identifies the type of hold on person record.
            type: string
            x-lineageReferenceObject: SPRHOLD_HLDD_CODE
          originatorCode:
            title: Originator Code
            description: This field identifies person/office who authorized hold status.
            type: string
            x-lineageReferenceObject: SPRHOLD_ORIG_CODE
          reason:
            title: reason
            description: Free format field which identifies the reason hold was placed.
            type: string
            x-lineageReferenceObject: SPRHOLD_REASON
          releaseInd:
            title: Term code entry
            description: This field indicates that only the system user who entered the hold may release the hold.  Valid value is Y allow only system user to release hold.
            type: string
            x-lineageReferenceObject: SPRHOLD_RELEASE_IND
      additionalProperties: false
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
  examples:
    RequestBodyForSingleId:
      value: |-
        {
          "ID": "HOSH11111"
          ,"fromDate": "2025-06-09"
          ,"toDate": "2025-06-10"
          ,"holdTypeCode": "T2"
          ,"user": "GOBEACUSR"
        }
    RequestBodyForMultipleId:
      value: |-
        {
          "ID": ["HOSH11111","HOSH12222","HOSH13333"]
          ,"fromDate": "2025-06-09"
          ,"toDate": "2025-06-10"
          ,"holdTypeCode": "T2"
          ,"user": "GOBEACUSR"
        }
        
