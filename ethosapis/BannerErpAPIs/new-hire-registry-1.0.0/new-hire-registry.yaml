openapi: 3.0.0
info:
  title: new-hire-registry
  description: New Employee Registry
  version: 1.0.0-beta
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: beta
  x-source-domain: Human Resources
  x-source-title: New Hire Registry
paths:
  /api/new-hire-registry:
    post:
      tags:
        - new-hire-registry
      summary: Update the date of the current report.
      description: Update the date when the report was run.
      operationId: addNewHireRegistry
      requestBody:
        description: Create a new NewHireRegistry Date in the store
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/new-hire-registry-query-request"
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/new-hire-registry-query-respose"
        "405":
          description: Invalid input
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_NEW_HIRE_REGISTRY
  /api/new-hire-registry/{employerId}/{employerCode}:
    get:
      tags:
        - new-hire-registry
      summary: Find new-hire-registry by Employer Id
      description: Returns a list of  employees based on the selection criteria
        outlined in section Selecting New Hires and Rehires and returns employer
        and employee data.
      operationId: getNewHireRegistry
      parameters:
        - name: employerId
          in: path
          description: ID of the employer requested. Either employerId or employerCode is
            required.
          required: true
          schema:
            type: string
        - name: employerCode
          in: path
          description: Code of the employer requested.
          required: true
          schema:
            type: string
        - name: date
          in: query
          description: "Date of the report requested.\r

            \r

            <b>/api/new_hire_registry/{employerId}?date={date}</b>"
          required: true
          schema:
            type: string
            format: date
            pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
        - name: addressType
          in: query
          description: "Used to determine the address to use in the Employee Data Record
            Layout section.\r

            \r

            <b>/api/new_hire_registry/{employerId}?addressType={addressType}</b\
            >"
          schema:
            type: string
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/new-hire-registry-report"
        "400":
          description: Invalid ID supplied
        "404":
          description: NewHireRegistry not found
      security:
        - EthosIntegrationBearer: []
components:
  schemas:
    new-hire-registry-report:
      type: object
      properties:
        employer:
          type: object
          properties:
            fein:
              title: Federal Employer Identification Number
              type: string
              description: employer's assigned FEIN.
            accountNumber:
              title: State Employer Account Number
              type: string
              description: Enter the number assigned by the California EDD
            branchCode:
              title: Branch Code
              type: string
              description: If registered with the EDD as a branch coded employer
            name:
              title: Employer Name
              type: string
              description: Employer's name.
            address:
              type: object
              properties:
                street:
                  title: Street Address
                  type: string
                  description: employer's street address.
                city:
                  title: City
                  type: string
                  description: Employer's city.
                state:
                  title: State
                  type: string
                  description: Employer's state.
                zipCode:
                  title: ZIP Code
                  type: string
                  description: Valid ZIP Code.
                zipCodeExtension:
                  title: ZIP Code Extension
                  type: string
                  description: Four digit extension of the ZIP Code.
        employees:
          type: array
          items:
            type: object
            properties:
              ssn:
                title: Social Security number
                type: string
                description: Social Security number.
              firstName:
                title: Employee First Name
                type: string
                description: Employee's first name.
              middleInitial:
                title: Employee Middle Initial
                type: string
                description: Employee Middle Initial.
              lastName:
                title: Employee Last Name
                type: string
                description: Employee Last Name
              address:
                type: object
                properties:
                  street:
                    title: Employee Street Address
                    type: string
                    description: Employee Street Address.
                  city:
                    title: City
                    type: string
                    description: City.
                  state:
                    title: State
                    type: string
                    description: Employee's state code.
                  zipCode:
                    title: ZIP Code
                    type: string
                    description: ZIP Code
                  zipCodeExtension:
                    title: ZIP Code Extension
                    type: string
                    description: ZIP Code Extension
              startOn:
                title: Employee Start-of-Work Date
                type: string
                format: date
                pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                description: Employee Start-of-Work Date
        employeesTotal:
          title: Number of Employees Reported
          type: string
          description: Number of Employees Reported.
    new-hire-registry-query-request:
      type: object
      properties:
        date:
          title: date
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          description: Date provided that indicates the date employee was last reported.
        employeeIds:
          title: employeeIds
          type: array
          items:
            type: string
          description: Collection of employee ids that will have the reported date.
            Updated to provided date
    new-hire-registry-query-respose:
      type: array
      items:
        type: object
        properties:
          bannerId:
            title: bannerId
            type: string
            description: Banner Identification Code
          currentHireDate:
            title: currentHireDate
            type: string
            format: date
            pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            description: Current Hire date
          pidm:
            title: pidm
            type: string
          reportedDate:
            title: reportedDate
            type: string
            format: date
            pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            description: Date the employee was reported.
  requestBodies:
    NewHireRegistry:
      description: NewHireRegistry object that needs to be added to the store
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/new-hire-registry-query-request"
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
