openapi: 3.0.0
info:
  title: Enrollment Programs
  description: This QAPI returns the list of programs for student enrollment.
  version: 1.0.0
  x-source-domain: Student
  x-source-system: Banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /qapi/enrollment-programs:
    post:
      tags:
        - enrollment-programs QAPI
      summary: Provide the list of term schedule registration processes.
      description: Queries for the requested resource using a set of attributes provided in the post
        request body.  Please note the path to the server is overridden to use /qapi/{resource} 
        in the URL and not /api/{resource}. 
      
        Provide the list of term schedule registration processes.
      parameters:
        - name: limit
          in: query
          description:
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/enrollment-programs-1.0.0_qapi_post_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client's preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - BearerAuth: []
        - BasicAuth: []
      x-method-permission: API_ENROLLMENT_PROGRAMS
components:
  schemas:
    enrollment-programs-1.0.0_qapi_post_request:
      type: object
      required:
        - guid
        - termCode
      properties:
        guid:
          title: GUID
          maxLength: 36
          type: string
          description: Student's GUID.
          x-lineageReferenceObject: GORGUID_GUID
        termCode:
          title: termCode
          description: Term code for the student to enroll
          type: string
          maxLength: 6
          x-lineageReferenceObject: STVTERM.STVTERM_CODE
    enrollment-programs-1.0.0_qapi_post_response:
      type: object
      properties:
        program:
          "title": "program"
          "description": "The program associated with the student for enrollment."
          "type": string
          "maxLength": 12
          "x-lineageReferenceObject": SMRPRLE.SMPRPRLE_PROGRAM
        programDescription:
          "title": "programDescription"
          "description": "The description of the program associated with the student for enrollment."
          "type": string
          "maxLength": 30
          "x-lineageReferenceObject": SMRPRLE.SMPRPRLE_PROGRAM_DESC
        level:
          "title": "level"
          "description": "The level associated with the student for enrollment."
          "type": string
          "maxLength": 2
          "x-lineageReferenceObject": SOVLCUR.SOVLCUR_LEVL_CODE
        campDesc:
          "title": "campDesc"
          "description": "The description of the campus associated with the student for enrollment."
          "type": string
          "maxLength": 3
          "x-lineageReferenceObject": SOVLCUR.SOVLCUR_CAMP_CODE
        admissionType:
          "title": "admissionType"
          "description": "The admission type associated with the student for enrollment."
          "type": string
          "maxLength": 2
          "x-lineageReferenceObject": SARADAP.SARADAP_ADMT_CODE
        lastRow:
          "title": "lastRow"
          "description": "The indicator that the record is the last row for the student."
          "type": string
          "x-lineageReferenceObject": N/A
        description:
          "title": "description"
          "description": "The description of the admission type associated with the student for enrollment."
          "type": string
          "maxLength": 30
          "x-lineageReferenceObject": STVADMT.STVADMT_DESC
        curriculumRule:
          "title": "curriculumRule"
          "description": "The curriculum rule associated with the student for enrollment."
          "type": string
          "maxLength": 8
          "x-lineageReferenceObject": SOVLCUR.SOVLCUR_CURR_RULE
        fieldOfStudyCurriculumRule:
          "title": "fieldOfStudyCurriculumRule"
          "description": "The field of study curriculum rule associated with the student for enrollment."
          "type": string
          "maxLength": 8
          "x-lineageReferenceObject": SOVLFOS.SOVLFOS_LFOS_RULE
        applicationNumber:
          "title": "applicationNumber"
          "description": "The application number associated with the student for enrollment."
          "type": string
          "maxLength": 8
          "x-lineageReferenceObject": SARADAP.SARADAP_APPL_NO

      required:
        - program
        - programDescription
        - level
        - lastRow
        - description
        - applicationNumber
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
