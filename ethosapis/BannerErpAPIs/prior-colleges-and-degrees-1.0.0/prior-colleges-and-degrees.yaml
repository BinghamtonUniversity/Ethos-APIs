openapi: 3.0.0
info:
  title: Prior Colleges and Degrees
  description: >
    The Prior Colleges and Degrees API returns prior college and prior college
    degree details as shown on the SOAPCOL admin page.  The degree details may
    include major, minor and/or concentration information.   
  version: 1.0.0
  x-source-name: SOAPCOL
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/prior-colleges-and-degrees:
    get:
      tags:
        - prior-colleges-and-degrees
      summary: Returns prior college and degree details along with associated majors,
        minors or concentrations.
      description: Returns resources from SORPCOL, SORDEGR, SORMAJR, SORMINR and SORCONC.
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1+json

            ```      
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Banner ID
            Returns all records for the Banner ID passed.
            ```
            /prior-colleges-and-degrees?criteria={"bannerId":"A0000275"}
            ```
            ### Institution
            Returns all records for the Institution passed.
            ```
            /prior-colleges-and-degrees?criteria={"institution":"001115"}
            ```
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/prior-colleges-and-degrees-1.0.0_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "500":
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_PRIOR_COLLEGES_AND_DEGREES
components:
  schemas:
    prior-colleges-and-degrees-1.0.0_response:
      type: object
      required:
        - externalEducationId
        - bannerId
        - institution
        - modifiedOn
      properties:
        externalEducationId:
          title: External Education Id
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          description: The global identifier for the prior college.
          x-lineageReferenceObject: SORPCOL_GUID
          example: 49eqfc68-3t89-4036-852c-341aa9d8501a
        bannerId:
          title: Banner ID
          maxLength: 9
          type: string
          description: Identification number of the student.
          format: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "075204402"
        institution:
          title: Institution
          maxLength: 20
          type: string
          description: The prior college code of the prospect or applicant.
          x-lineageReferenceObject: SORPCOL_SBGI_CODE
          example: "2175"
        institutionDescription:
          title: Institution Description
          maxLength: 100
          type: string
          description: Description of the prior college code.
          x-lineageReferenceObject: STVSBGI_DESC
          x-lineageLookupReferenceObject: stvsbgi
          example: Drake Community College
        transcriptReceivedOn:
          title: Transcript Received Date
          maxLength: 11
          type: string
          description: The date an academic transcript was received from the prior college.
          format: date-time
          x-lineageReferenceObject: SORPCOL_TRANS_RECV_DATE
          example: 2022-07-05
        transcriptReviewedOn:
          title: Transcript Reviewed Date
          maxLength: 11
          type: string
          description: The date an academic transcript was reviewed by the institution.
          format: date-time
          x-lineageReferenceObject: SORPCOL_TRANS_REV_DATE
          example: 2022-07-21
        officialTranscriptIndicator:
          title: Official Transcript Indicator
          type: boolean
          description: "Valid values: true, false.  True indicates an official transcript."
          x-lineageReferenceObject: SORPCOL_OFFICIAL_TRANS
          example: true
        admissionsRequestChecklist:
          title: Admissions Request Checklist Code
          maxLength: 4
          type: string
          description: The admissions checklist request item code.
          x-lineageReferenceObject: SORPCOL_ADMR_CODE
          example: CLT1
        admissionsRequestChecklist Description:
          title: Admissions Request Checklist Code Description
          maxLength: 30
          type: string
          description: Description of the Admissions Request Checklist Code
          x-lineageReferenceObject: STVADMR_DESC
          x-lineageLookupReferenceObject: stvadmr
          example: College Transcript
        modifiedOn:
          title: Activity Date
          maxLength: 11
          type: string
          format: date-time
          description: Most current date the record was created or changed.
          x-lineageReferenceObject: SORPCOL_ACTIVITY_DATE
          example: 2023-07-05
        degreeDetails:
          title: Prior College Degree Details
          type: array
          items:
            required:
              - externalEducationCredentialId
              - degree
              - degreeSequenceNumber
              - modifiedOn
            type: object
            properties:
              externalEducationCredentialId:
                title: External Education Credential Id
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                description: The global identifier for the prior college degree.
                x-lineageReferenceObject: SORDEGR_GUID
                example: 77zxgc94-8q21-9645-237g-528dd8b1089b
              degree:
                title: Degree Code
                maxLength: 6
                type: string
                description: The degree received at the prior college.
                x-lineageReferenceObject: SORDEGR_DEGC_CODE
                example: BA
              degreeDescription:
                title: Degree Code Description
                maxLength: 30
                type: string
                description: Description of the degree code.
                x-lineageReferenceObject: STVDEGC_DESC
                x-lineageLookupReferenceObject: stvdegc
                example: Bachelor of Arts
              degreeSequenceNumber:
                title: Degree Sequence Number
                maxLength: 2
                type: number
                description: A unique sequence number assigned to the prior college degree.
                x-lineageReferenceObject: SORDEGR_DEGR_SEQ_NO
                example: 1
              beginOn:
                title: Attend From
                maxLength: 11
                type: string
                format: date-time
                description: The first date of attendance at the prior college.
                x-lineageReferenceObject: SORDEGR_ATTEND_FROM
                example: 2018-08-24
              endOn:
                title: Attend To
                maxLength: 11
                type: string
                format: date-time
                description: The last date of attendance at the prior college.
                x-lineageReferenceObject: SORDEGR_ATTEND_TO
                example: 2022-05-20
              hoursTransferred:
                title: Hours Transferred
                maxLength: 11
                type: number
                description: The total number of hours transferred from the prior college.  This
                  field is informational and does not update the transfer GPA in
                  Academic History.
                x-lineageReferenceObject: SORDEGR_HOURS_TRANSFERRED
                example: 124
              gpaTransferred:
                title: GPA Transferred
                maxLength: 23
                type: number
                description: The transfer GPA.  This is informational and does not update the
                  transfer GPA in Academic History.
                x-lineageReferenceObject: SORDEGR_GPA_TRANSFERRED
                example: 3.87
              degreeDate:
                title: Degree Date
                maxLength: 11
                type: string
                format: date-time
                description: Prior college degree date.
                x-lineageReferenceObject: SORDEGR_DEGC_DATE
                example: 2022-05-20
              degreeYear:
                title: Degree Year
                maxLength: 4
                type: string
                description: Prior college degree year.
                x-lineageReferenceObject: SORDEGR_DEGC_YEAR
                example: 2022
              college:
                title: College Code
                maxLength: 2
                type: string
                description: Prior college code.
                x-lineageReferenceObject: SORDEGR_COLL_CODE
                example: NU
              collegeDescription:
                title: College Code Description
                maxLength: 100
                type: string
                description: Prior college code description.
                x-lineageReferenceObject: STVCOLL_DESC
                x-lineageLookupReferenceObject: stvcoll
                example: College of Nursing
              educationGoal:
                title: Education Goal Code
                maxLength: 2
                type: string
                description: Education Goal Code
                x-lineageReferenceObject: SORDEGR_EGOL_CODE
                example: JA
              educationGoalDescription:
                title: Education Goal Code Description
                maxLength: 100
                type: string
                description: Prior college code description.
                x-lineageReferenceObject: STVEGOL_DESC
                x-lineageLookupReferenceObject: stvegol
                example: Job Advancement
              primaryDegreeAndAttendancePeriod:
                title: Primary Degree and Attendance Period
                maxLength: 1
                type: boolean
                description: Indicates a primary degree and attendance period at the prior
                  college.
                x-lineageReferenceObject: SORDEGR_PRIMARY_IND
                example: Y
              modifiedOn:
                title: Activity Date
                maxLength: 11
                type: string
                format: date-time
                description: Most current date the record was created or changed.
                x-lineageReferenceObject: SORDEGR_ACTIVITY_DATE
                example: 2023-07-05
              majorDetails:
                title: Prior College Degree Major Details
                type: array
                items:
                  required:
                    - major
                    - modifiedOn
                  type: object
                  properties:
                    major:
                      title: Major Code
                      maxLength: 8
                      type: string
                      description: Major code.  The major code must be previously defined as a major
                        on the Major, Minor, Concentration validation table.
                      x-lineageReferenceObject: SORMAJR_MAJR_CODE_MAJOR
                      example: NURS
                    majorDescription:
                      title: Major Code Description
                      maxLength: 30
                      type: string
                      description: Description of the major code.
                      x-lineageReferenceObject: STVMAJR_DESC
                      x-lineageLookupReferenceObject: stvdegc
                      example: Nursing
                    modifiedOn:
                      title: Activity Date
                      maxLength: 11
                      type: string
                      format: date-time
                      description: Most current date the record was created or changed.
                      x-lineageReferenceObject: SORMAJR_ACTIVITY_DATE
                      example: 2023-07-05
              minorDetails:
                title: Prior College Degree Minor Details
                type: array
                items:
                  required:
                    - minor
                    - modifiedOn
                  type: object
                  properties:
                    minor:
                      title: Minor Code
                      maxLength: 8
                      type: string
                      description: Minor code.  The minor code must be previously defined as a minor
                        on the Major, Minor, Concentration validation table.
                      x-lineageReferenceObject: SORMINR_MAJR_CODE_MINOR
                      example: PSYC
                    minorDescription:
                      title: Minor Code Description
                      maxLength: 30
                      type: string
                      description: Description of the minor code.
                      x-lineageReferenceObject: STVMAJR_DESC
                      x-lineageLookupReferenceObject: stvdegc
                      example: Physcology
                    modifiedOn:
                      title: Activity Date
                      maxLength: 11
                      type: string
                      format: date-time
                      description: Most current date the record was created or changed.
                      x-lineageReferenceObject: SORMINR_ACTIVITY_DATE
                      example: 2023-07-05
              concentrationDetails:
                title: Prior College Degree Concentration Details
                type: array
                items:
                  required:
                    - concentration
                    - modifiedOn
                  type: object
                  properties:
                    concentration:
                      title: Concentration Code
                      maxLength: 4
                      type: string
                      description: Concentration area code.  The concentration code must be previously
                        defined as a concentration on the Major, Minor,
                        Concentration validation table.
                      x-lineageReferenceObject: SORCONC_MAJR_CODE_CONC
                      example: CLAS
                    concentrationDescription:
                      title: Minor Code Description
                      maxLength: 30
                      type: string
                      description: Description of the concentration code.
                      x-lineageReferenceObject: STVMAJR_DESC
                      x-lineageLookupReferenceObject: stvdegc
                      example: Classics
                    modifiedOn:
                      title: Activity Date
                      maxLength: 11
                      type: string
                      format: date-time
                      description: Most current date the record was created or changed.
                      x-lineageReferenceObject: SORCONC_ACTIVITY_DATE
                      example: 2023-07-05
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EthosIntegrationBearer:
      type: http
      scheme: bearer
