      type: object
      required:
        - guid   
        - termCode     
        - lcurSeqNo
        - lfosSeqNo
        - stuType
        - stepNumber
      properties:              
        guid:
          title: GUID
          maxLength: 36
          type: string
          description: Student's GUID.
          x-lineageReferenceObject: GORGUID_GUID
        termCode: 
          title: Term Code
          maxLength: 6
          type: string
          description: The term code associated with the applicant.
          x-lineageReferenceObject: STVTERM_CODE       
        stuType: 
          title: Student Type
          maxLength: 1
          type: string
          description: The student type associated with the applicant.
          x-lineageReferenceObject: STVSTYP_CODE
        stepNumber: 
          title: Step Number
          maxLength: 2
          type: string
          description: The step number associated with the applicant.
          x-lineageReferenceObject: TVRRSST_STEP
        lcurSeqNo:
          title: Base Rule Number
          maxLength: 8
          type: string
          description: The base rule number associated to the applicant.        
          x-lineageLookupReferenceObject: SORLCUR_SEQNO
        lfosSeqNo:
          title: Field of Study
          maxLength: 22
          type: string
          description: The field of study associated to the applicant.         
