openapi: 3.0.0
info:
  title: Student Activity Delinquent Accounts
  description: The Student Activity Delinquent Accounts API provides information on key
    status indicators such as billing and delinquency and student account details.
  version: 1.0.0
  x-source-domain: Student
  x-source-name: TTVDELI, TTVBILL, TBBACCT, TBRACCD
  x-source-title: Student Activity Delinquent Accounts
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-activity-delinquent-accounts:
    get:
      summary: Returns listing of all the key indicators and records from TBRACCD.
      description: Return all information on key status indicators and student account details.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUD_ACCT_DELI_ACCOUNTS
      tags:
        - student-activity-delinquent-accounts
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards for more information.

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
            $ref: "#/components/schemas/student-activity-delinquent-accounts-1.0.0_query_request"
          description: The filter condition should be provided as a solitary URL query parameter. It is required to be a URL encoded JSON representation of the properties mentioned in the query request schema. Limit and Offset are the only supported additional parameters on the URL. For instance:- criteria={"termCodeList":["202310","202410"], "deliCodeList":["IN","01"], "billStartDate":"2020-01-01","billEndDate":"2029-01-01","transStartDate":"2020-01-01","transEndDate":"2029-01-01"}
        - name: bannerId
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on person Id(spriden).
          schema:
            type: string
        - name: billCode
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on bill code.
          schema:
            type: string
        - name: deliCodeList
          in: query
          required: false
          description: Returns the student account details with information on key indicators having specific delinquency code. The delinquency code is passed as a list.
          schema:
            type: string
          examples:
            multipleCodesExample:
              summary: Multiple delinquency codes
              value: "deliCodeList=01&deliCodeList=02"
        - name: refundInd
          in: query
          required: false
          description: Returns the student account details with information on key indicators having specific refund indicator.
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          description: Returns the list of student account details with information on key indicators, beginning from the specified TBBACCT activity date.
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          description: Returns the list of student account details with information on key indicators, filtering data up to the specified TBBACCT activity date.
          schema:
            type: string
        - name: termCode
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on term code.
          schema:
            type: string
        - name: deliCode
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on delinquency code.
          schema:
            type: string
        - name: deliCodeDesc
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on delinquency code description.
          schema:
            type: string
        - name: billCodeDesc
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on bill code description.
          schema:
            type: string
        - name: firstName
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on first name.
          schema:
            type: string
        - name: lastName
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on last name.
          schema:
            type: string
        - name: id
          in: query
          required: false
          description: Returns the student account details with  information on key indicators based on tsrtgid_guid.
          schema:
            type: string
        - name: termCodeList
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on term code. The term code is passed as a list.
          schema:
            type: string
          examples:
            multipleCodesExample:
              summary: Multiple term codes
              value: "termCodeList=01&termCodeList=02"
        - name: acctFeedInd
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on acct feed indicator.
          schema:
            type: string
        - name: tbraccdActivityDate
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on TBRACCD activity date.
          schema:
            type: string
        - name: amount
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on amount.
          schema:
            type: string
        - name: balance
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on balance.
          schema:
            type: string
        - name: billStartDate
          in: query
          required: false
          description: Returns the list of student account details with information on key indicators, beginning from the specified bill start date.
          schema:
            type: string
        - name: billEndDate
          in: query
          required: false
          description: Returns the list of student account details with information on key indicators, filtering data up to the specified bill end date.
          schema:
            type: string
        - name: cpdtInd
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on cpdt indicator.
          schema:
            type: string
        - name: crn
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on crn.
          schema:
            type: string
        - name: crossrefNumber
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on crossref number.
          schema:
            type: string
        - name: crseTitle
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on crse title.
          schema:
            type: string
        - name: dcatCode
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on dcat code.
          schema:
            type: string
        - name: desc
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on TBRACCD description.
          schema:
            type: string
        - name: detailCode
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on detail code.
          schema:
            type: string
        - name: documentNumber
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on document number.
          schema:
            type: string
        - name: dueDate
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on due date.
          schema:
            type: string
        - name: effectiveDate
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on effective date.
          schema:
            type: string
        - name: entryDate
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on entry date.
          schema:
            type: string
        - name: feedDate
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on feed date.
          schema:
            type: string
        - name: feedDocCode
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on feed doc code.
          schema:
            type: string
        - name: invNumberPaid
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on invoice number paid.
          schema:
            type: string
        - name: invoiceNumber
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on invoice number.
          schema:
            type: string
        - name: merchantId
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on merchant id.
          schema:
            type: string
        - name: origChgInd
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on original change indicator.
          schema:
            type: string
        - name: paymentId
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on payment id.
          schema:
            type: string
        - name: receiptNumber
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on receipt number.
          schema:
            type: string
        - name: sessionNumber
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on session number.
          schema:
            type: string
        - name: srceCode
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on srce code.
          schema:
            type: string
        - name: statementDate
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on statement date.
          schema:
            type: string
        - name: tranNumber
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on transaction number.
          schema:
            type: string
        - name: tranNumberPaid
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on transaction number paid.
          schema:
            type: string
        - name: transStartDate
          in: query
          required: false
          description: Returns the list of student account details with information on key indicators, beginning from the specified transaction start date.
          schema:
            type: string
        - name: transEndDate
          in: query
          required: false
          description: Returns the list of student account details with information on key indicators, filtering data up to the specified transaction end date.
          schema:
            type: string
        - name: typeInd
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on type indicator.
          schema:
            type: string
        - name: ptrmCode
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on ptrm code.
          schema:
            type: string
        - name: ptrmStartDate
          in: query
          required: false
          description: Returns the list of student account details with information on key indicators, beginning from the specified ptrm start date.
          schema:
            type: string
        - name: ptrmEndDate
          in: query
          required: false
          description: Returns the list of student account details with information on key indicators, filtering data up to the specified ptrm end date.
          schema:
            type: string
        - name: user
          in: query
          required: false
          description: Returns the student account details with information on key indicators based on user.
          schema:
            type: string
      responses:
