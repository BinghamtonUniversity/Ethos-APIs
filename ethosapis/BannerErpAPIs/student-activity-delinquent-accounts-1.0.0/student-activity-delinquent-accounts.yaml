components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    student-activity-delinquent-accounts-1.0.0-get-response:
      title: student-activity-delinquent-accounts-get_response
      description: Information on key status indicators for an account.
      type: object
      properties:
        acctActivityDate:
          title: Activity Date
          description: Date when the student account was created or last updated.
          type: string
          x-lineageReferenceObject: TBBACCT_ACTIVITY_DATE
        bannerId:
          title: Banner ID
          description: Banner ID of the student holding the account.
          type: string
          maxLength: 9
          x-lineageReferenceObject: SPRIDEN_ID
        billCode:
          title: Bill Code
          description: It indicates why a bill is on hold.
          type: string
          maxLength: 2
          x-lineageReferenceObject: TBBACCT_BILL_CODE
        billCodeDesc:
          title: Bill Code Description
          description: It gives the description of bill code.
          type: string
          maxLength: 30
          x-lineageReferenceObject: TTVBILL_DESC
        deliCode:
          title: Delinquency Code
          description: Delinquency code associated with the student's account.
          type: string
          maxLength: 2
          x-lineageReferenceObject: TBBACCT_DELI_CODE
        deliCodeDesc:
          title: Delinquency Code description
          description: It gives the description of delinquency code.
          type: string
          maxLength: 30
          x-lineageReferenceObject: TTVDELI_DESC
        firstName:
          title: First Name
          description: First name of the account holder.
          type: string
          maxLength: 60
          x-lineageReferenceObject: SPRIDEN_FIRST_NAME
        lastName:
          title: Last Name
          description: Last name of the account holder.
          type: string
          maxLength: 60
          x-lineageReferenceObject: SPRIDEN_LAST_NAME
        refundInd:
          title: Refund Indicator
          description: It indicates whether the credit balance is to be automatically
            refunded.
          type: string
          maxLength: 1
          x-lineageReferenceObject: TBBACCT_REFUND_IND
        acctFeedInd:
          title: Account Feed Indicator
          description: It indicates the status of the transaction in the accounting feed.
          type: string
          maxLength: 1
          x-lineageReferenceObject: tbraccd_acct_feed_ind
        tbraccdActivityDate:
          title: Activity Date
          description: The last date when the record was created or updated.
          type: string
          x-lineageReferenceObject: tbraccd_activity_date
        aidyCode:
          title: Aid Year
          description: The aid year associated with the Financial Aid disbursement.
          type: string
          maxLength: 4
          x-lineageReferenceObject: tbraccd_aidy_code
        amount:
          title: Amount
          description: Amount of the transaction.
          type: number
          maxLength: 12
          x-lineageReferenceObject: tbraccd_amount
        balance:
          title: Balance
          description: Balance of the transaction
          type: number
          maxLength: 12
          x-lineageReferenceObject: tbraccd_balance
        billDate:
          title: Bill Date
          description: Date that the transaction is billed.
          type: string
          x-lineageReferenceObject: tbraccd_bill_date
        cpdtInd:
          title: Contract Payment Detail Indicator.
          description: Indicates that contract payment detail is used for application of a payment to contract charges (Y or NULL).
          type: string
          maxLength: 1
          x-lineageReferenceObject: tbraccd_cpdt_ind
        crn:
          title: Course Reference Number
          description: Course Reference Number of the course which generated the charge, when track by CRN is used in Fee Assessment.
          type: string
          maxLength: 5
          x-lineageReferenceObject: tbraccd_crn
        crossrefDetailCode:
          title: Cross Reference Detail Code
          description: Cross Reference Detail Code for contract or exemption credits calculated based on detail code rules.
          type: string
          maxLength: 4
          x-lineageReferenceObject: tbraccd_crossref_detail_code
        crossrefId:
          title: Cross Reference Id
          description: Cross Reference Banner ID from a join on tbraccd_crossref_pidm
          type: string
        crossrefNumber:
          title: Cross Reference Number
          description: Cross Reference Number for third party transactions.
          type: string
          maxLength: 8
          x-lineageReferenceObject: tbraccd_crossref_number
        crseTitle:
          title: Course Title
          description: The title of the course.
          type: string
          maxLength: 30
          x-lineageReferenceObject: ssbsect_crse_title
        dcatCode:
          title: Detail Category Code
          description: The catagory of the detail code.
          type: string
          maxLength: 3
          x-lineageReferenceObject: tbbdetc_dcat_code
        desc:
          title: Description
          description: Free-form description associated with the transaction.
          type: string
          maxLength: 30
          x-lineageReferenceObject: tbraccd_desc
        detailCode:
          title: Detail Code
          description: Detail code associated with the transaction.
          type: string
          maxLength: 4
          x-lineageReferenceObject: tbraccd_detail_code
        documentNumber:
          title: Document Number
          description: Document number that references a source document for the transaction.
          type: string
          maxLength: 8
          x-lineageReferenceObject: tbraccd_document_number
        dueDate:
          title: Due Date
          description: Due date set when the transaction is billed.
          type: string
          x-lineageReferenceObject: tbraccd_due_date
        effectiveDate:
          title: Effective Date
          description: Effective date of the transaction used to calculate amount due, determine placement on the bill, and control feed to finance system based on Accounts Receivable System Control setting.
          type: string
          x-lineageReferenceObject: tbraccd_effective_date
        entryDate:
          title: Entry Date
          description: Entry date and time of the transaction, when initially created.
          type: string
          x-lineageReferenceObject: tbraccd_entry_date
        feedDate:
          title: Feed Date
          description: Date the transaction was fed to the finance system.
          type: string
          x-lineageReferenceObject: tbraccd_feed_date
        feedDocCode:
          title: Feed Document Code
          description: Document code used to feed the transaction to the finance system.
          type: string
          maxLength: 8
          x-lineageReferenceObject: tbraccd_feed_doc_code
        id:
          type: string
          description: The GUID from tsrtgid_guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          format: guid
        invNumberPaid:
          title: Invoice Number Paid
          description: Invoice Number Paid is used in application of payment to force a payment to liquidate a specific group of charges.
          type: string
          maxLength: 8
          x-lineageReferenceObject: tbraccd_inv_number_paid
        invoiceNumber:
          title: Invoice Number
          description: Invoice Number identifies a group of charges invoiced via one statement.
          type: string
          maxLength: 8
          x-lineageReferenceObject: tbraccd_invoice_number
        merchantId:
          title: Merchant Id
          description: The Merchant ID is included in the credit card payment request transmitted to the vendor handling credit card payments.
          type: string
          maxLength: 20
          x-lineageReferenceObject: tbraccd_merchant_id
        origChgInd:
          title: Original Charge Indicator
          description: Indicates the type of original charge.
          type: string
          maxLength: 1
          x-lineageReferenceObject: tbraccd_orig_chg_ind
        paymentId:
          title: Payment Id
          description: Free-form information identifying a payment.
          type: string
          maxLength: 20
          x-lineageReferenceObject: tbraccd_payment_id
        period:
          title: Period
          description: The enrollment period code for the financial Aid disbursement.
          type: string
          maxLength: 15
          x-lineageReferenceObject: tbraccd_period
        receiptNumber:
          title: Receipt Number
          description: Receipt number associated with the transaction, if generated when the transaction was created.
          type: number
          maxLength: 8
          x-lineageReferenceObject: tbraccd_receipt_number
        sessionNumber:
          title: Session Number
          description: Cashier session number in which this transaction was posted.
          type: number
          x-lineageReferenceObject: tbraccd_session_number
        srceCode:
          title: Source Code
          description: Source of the transaction when created on the account.
          type: string
          maxLength: 1
          x-lineageReferenceObject: tbraccd_srce_code
        statementDate:
          title: Statement Date
          description: The date the statement was generated.
          type: string
          x-lineageReferenceObject: tbraccd_statement_date
        studentId:
          title: Student Id
          description: Student Banner ID from a join on tbraccd_pidm
          type: string
        termCode:
          title: Term Code
          description: Term associated with the transaction.
          type: string
          maxLength: 6
          x-lineageReferenceObject: tbraccd_term_code
        tranNumber:
          title: Transaction Number
          description: Transaction number (one-up within entity) of the transaction.
          type: string
          maxLength: 8
          x-lineageReferenceObject: tbraccd_tran_number
        tranNumberPaid:
          title: Transaction Number Paid
          description: Transaction Number Paid is used in application of payment to force this transaction to liquidate a specific transaction on the account.
          type: string
          maxLength: 8
          x-lineageReferenceObject: tbraccd_tran_number_paid
        transDate:
          title: Transaction Date
          description: Transaction date used by the finance system to control posting to the ledgers.
          type: string
          x-lineageReferenceObject: tbraccd_trans_date
        typeInd:
          title: Type Indicator
          description: It indicates the whether the detail code is a charge or a payment.
          type: string
          maxLength: 1
          x-lineageReferenceObject: tbbdetc_type_ind
        user:
          title: User
          description: User ID of the cashier who created the transaction.
          type: string
          maxLength: 30
          x-lineageReferenceObject: tbraccd_user
      required:
        - bannerId
        - acctActivityDate
        - firstName
        - lastName
        - tranNumber
        - termCode
        - detailCode
        - user
        - entryDate
        - amount
        - balance
        - effectiveDate
        - srceCode
        - acctFeedInd
        - tbraccdActivityDate
        - sessionNumber
        - typeInd
    student-activity-delinquent-accounts-1.0.0_query_request:
      type: object
      properties:
        bannerId:
          title: Banner ID
          description: Banner ID of the student holding the account.
          type: string
          maxLength: 9
          x-lineageReferenceObject: SPRIDEN_ID
        billCode:
          title: Bill Code
          description: It indicates why a bill is on hold.
          type: string
          maxLength: 2
          x-lineageReferenceObject: TBBACCT_BILL_CODE
        deliCodeList:
          title: Delinquency Code
          description: Delinquency code associated with the student's account. The value should be an array of strings, containing one or more delinquency codes.
          type: array
          items:
            type: string
          x-lineageReferenceObject: TBBACCT_DELI_CODE
        refundInd:
          title: Refund Indicator
          description: It indicates whether the credit balance is to be automatically
            refunded.
          type: string
          maxLength: 1
        startDate:
          title: Start Date
          description: It indicates the tbbacct activity date.
          type: string
          maxLength: 10
          x-lineageReferenceObject: TBBACCT_ACTIVITY_DATE
        endDate:
          title: End Date
          description: It indicates the tbbacct activity date.
          type: string
          maxLength: 10
          x-lineageReferenceObject: TBBACCT_ACTIVITY_DATE
        billCodeDesc:
          title: Bill Code Description
          description: It gives the description of bill code.
          type: string
          maxLength: 30
          x-lineageReferenceObject: TTVBILL_DESC
        deliCode:
          title: Delinquency Code
          description: Delinquency code associated with the student's account.
