openapi: 3.0.0
info:
  title: Position Budget Labor Distributions
  description: API for Position Budget Labor Distributions details from NBAPBUD Position Budget Labor Distributions tab.
  version: 2.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: beta
  x-source-domain: Human Resources
servers:
