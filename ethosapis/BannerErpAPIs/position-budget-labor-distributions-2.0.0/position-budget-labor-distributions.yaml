              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorsObj'
              examples:
                Fiscal Year Required:
                  $ref: '#/components/examples/FiscCodeRequired'
                Position Code Required:
                  $ref: '#/components/examples/PositionCodeRequired'
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
