components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    schema-extension-labor-distribution-finance-response-GET.json:
      title: Position Budget Labor Distributions Response - GET/POST (Finance)
      description: Displays the details of the Labor Distribution for the particular year and postion.
      type: object
      properties:
        budgetId:
          title: Labor Distribution Budget ID Code
          description: System defined code for Budget Id of the Labor Distributions.  Validated against BANNER FINANCE if it is installed.
          type: string
        budgetedAmount:
          title: Labor Distribution Budget Amount
          description: Amount Budgeted for the Labor Distribution for this position.
          type: number
        coasCode:
          title: Chart of Accounts Code
          description: The BANNER FINANCE Chart of Accounts Code under which the position is created.
          type: string
        dateCreated:
          title: Effective Date
          description: Date the record becomes effective.
          type: string
        encumberedAmount:
          title: Encumbrance Amount
          description: Total encumbrance amount.
          type: string
        expendedAmount:
          title: Expended Amount
          description: Total amount of money expended.
          type: string
        fiscalYear:
          title: Fiscal Year
          description: BANNER HR system defined code for the fiscal year.
          type: string
        fteInd:
          title: Full Time Equivalency Budget
          description: The full time equivalency budgeted for this position.
          type: string
        orgnCode:
          title: Labor Distribution Organization Code
          description: Organization that controls the budget for the Labor Distribution for this position.
          type: string
        phase:
          title: Labor Distribution Budget Phase Code
          description:  A system defined code for the Budget Phase for the Labor Distribution.  Validated against BANNER FINANCE if it is installed.
          type: string
        remainingAmount:
          title: Remaining Amount
          description: The differnce of Labor Distribution Budgeted Amount and the Expended Amount will be the Labor Distribution Remaining Amount.
          type: number
        salaryGroup:
          title: Labor Distribution Salary Group Code
          description:  Salary group code associated with this record.
          type: string
        status:
          title: Status
          description: Status of Labor Distribution Budget Total Record. Values (C)losed, (A)pproved, (W)orking, (T)ransferred.
          type: string
        ldList:
          title: Labor Distribution List
          description: List of Labor Distribution record
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/schema-extension-labor-distribution-list-finance-response-GET.json'
              - $ref: '#/components/schemas/schema-extension-labor-distribution-list-finance-response-GET.json'
    schema-extension-labor-distribution-list-finance-response-GET.json:
      title: Labor Distributions List Response - GET/POST (Finance)
      description: Displays the details of list of the Labor Distribution for the particular year and postion.
      type: object
      properties:
        acctCode:
          title: Account Code
          description: BANNER FINANCE system defined code which identifies the position account to be charged.
          type: string
        activityDate:
          title: Activity Date
          description: Date the record was inserted or last modified.
          type: string
