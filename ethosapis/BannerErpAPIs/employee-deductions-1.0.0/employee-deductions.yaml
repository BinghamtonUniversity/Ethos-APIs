components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    employee-deductions-batch-1.0.0_post_request:
     type: object
     properties:
        items:
          title: items
          description: List of items to be processed.
          type: array
          items:
            type: object
            oneOf:
              - $ref: "#/components/schemas/schema-extension-employee-deductions-post-request.json"
              - $ref: "#/components/schemas/schema-extension-employee-deductions-put-batch-request.json"
     required:
        - items
    person:
      title: Person
      description: A reference to link an employee deduction to the common persons entity.
      type: object
      properties:
        id:
          title: ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value
    employee-deductions-1.0.0_get_request_criteria:
      type: object
      properties:
        personId:
          title: Person ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value 
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"      
        benefitDeductionCode:
          title: BENEFIT/DEDUCTION CODE
          description:  The code assigned to the benefit/deduction.
          type: string
          example: LIF
          maxLength: 3
          x-LineageReferenceObject:  PDRBDED_BDCA_CODE
    schema-extension-employee-deductions.json:
      title: employee-deductions-1.0.0_response
      description: Returns Deductions information. Null values are not shown
      type: object
      properties:
      
        id:
          title: Id
          type: string
          maxLength: 19
          description: "The global identifier of the employee deduction."
          x-lineageReferenceObject: PDRBDED_GUID
          example: 085df706-ee15-4947-93f8-8c260e64795e
        bannerId:
          title: Banner ID
          description: Banner ID (PIDM Identifier).
          type: string
          example: HOP510001
          x-LineageReferenceObject: SPRIDEN_ID
          maxLength: 9
        benefitDeductionCode:
          title: BENEFIT/DEDUCTION CODE
          description:  The code assigned to the benefit/deduction.
          type: string
          example: LIF
          maxLength: 3
          x-LineageReferenceObject:  PDRBDED_BDCA_CODE
        addOrReplaceAmount:
          title: ADD/REPLACE INDICATOR
          description: >
             IRIndicates whether the amount is to be added to the employees normal deduction or replaces the employees normal. Valid values are:
              * `add`
              * `replace` 
          type: string
          enum:
            - add
            - replace
          example: replace
          x-LineageReferenceObject: PDRBDED_ADD_REPL_IND
        
        addReplaceEmployee:
          title: ADD/REPLACE EMPLOYEE
          description: The employe amount to either add to the normal deduction or replace the normal deduction.
          type: number
          format: float
          example: 1.1
          x-LineageReferenceObject: PDRBDED_ADD_REPL_EMPL
        
        addReplaceEmployer:
          title: ADD/REPLACE EMPLOYER
          description: The employer amount to either add to the normal deduction or replace the normal deduction.
          type: number
          format: float
          example: 1.1
          x-LineageReferenceObject: PDRBDED_ADD_REPL_EMPR
          
        addReplaceTaxBase:
          title: APPLICABLE GROSS
          description: The applicable gross to be used with the add/replace amount.
          type: number
          format: float
          example: 1.1
          x-LineageReferenceObject: PDRBDED_ADD_REPL_TAX_BASE
        
        hasArrears:
          title: ARREARS STATUS
          description: The status of the arrears.
          type: boolean
          example: true
          x-LineageReferenceObject: PDRBDED_ARR_STATUS
        
        arrearsBalance:
          title: ARREARS BALANCE
          description: The arrears balance due the employer.
          type: number
          format: float
          example: 3
          x-LineageReferenceObject: PDRBDED_ARR_BALANCE
          
        bondBalance:
          title: BOND BALANCE
          description:  If the deduction is for savings bonds this field contains the balance available toward the purchase of a bond.
          type: number
          format: float
          example: 1.1
          x-LineageReferenceObject: PDRBDED_BOND_BALANCE
        
        startOn:
          title: BENEFIT/DEDUCTION BEGIN DATE
          description:  The date the benefit/deduction begins.
          type: string
          format: date-time
          example: 2019-12-29
          x-LineageReferenceObject: PDRBDED_BEGIN_DATE
          
          
        endOn:
          title: BENEFIT/DEDUCTION END DATE
          description: The date the benefit/deduction ends.
          type: string
          format: date-time
          example: 2020-01-11
          x-LineageReferenceObject: PDRBDED_END_DATE
          
        arrearsRecoverMax:
          title: MAXIMUM ARREARS RECOVERY
          description:  The maximum amount of arrears allowed to be recovered in a pay event.
          type: number
          format: float
          example: 1.1
          x-LineageReferenceObject: PDRBDED_ARR_RECOVER_MAX
        
        addReplacePictCode:
          title: PAY ID
          description: The Payroll ID where this benefit/deduction override should be applied.
          type: string
          example: XM
          maxLength: 2
          x-LineageReferenceObject: PDRBDED_ADD_REPL_PICT_CODE
          
        activityOn:
          title: ACTIVITY DATE
          description: Date when the record was inserted or last modified.
          type: string
          format: date-time
          example: 2019-12-29
          maxLength: 2
          x-LineageReferenceObject: PDRDEDN_ACTIVITY_DATE
          
        person:
          $ref: '#/components/schemas/person'
          
    schema-extension-employee-batch-deductions.json:
      description: >
        Returns the list of Ids for those employee deductions that were successfully created.
        For those that did not, it returns the list of error messages.
      type: object
      x-last-modified:
      properties:
        id:
          title: ID
          description: A globally unique identifier of a batch to be used in all external references.
          type: string
          example: 085df706-ee15-4947-93f8-8c260e64795e
        status:
          title: status
          description: status of the batch.
          type: string
          enum:
            - completed
            - inProgress
            - aborted
          example: completed
        resource:
          title: Resource
          description: The affected resource.
          type: object
          properties:
            name:
              title: Resource Name
              description: The pluralized name of the affected resource
              type: string
              example: employee-deductions
            version:
              title: Resource version
              description: The version of the resource
              type: string
              example: 2.0.0
          additionalProperties: false
          required:
            - name
            - version
        items:
          type: array
          items:
            type: object
            additionalProperties: true
            oneOf:
              -  $ref: "#/components/schemas/schema-extension-employee-deductions.json"
              -  $ref: '#/components/schemas/errors_2_0_0'
            required:
              - items
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
        
