openapi: 3.0.0
info:
  title: Employee Deductions
  description: >
    This API can be used to retrieve employee base deduction records, update existing base deduction data or
    create new deduction records with both base (PDRBDED) and detail (PDRDEDN) data.
    This information is displayed in the Banner administrative page PDADEDN.
    Additionally, the API supports the option to create or update employee deductions data in batches.
  version: 1.0.0-beta
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: PDRBDED
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employee-deductions:
    get:
      summary: Get base employee deduction records.
      description: Query and retrieve base employee deduction data for a given criteria. Data is extracted from PDRBDED.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_DEDUCTIONS
      tags:
        - employee-deductions
      parameters:
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: string            
        - name: criteria
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/employee-deductions-1.0.0_get_request_criteria'
          description: >
            ### Person ID
            
            Returns the employee deduction information for this Person ID.  This filter should not be used if a Banner ID filter is used.
            
            ```

            /employee-deductions?criteria={"personId": "085df706-ee15-4947-93f8-8c260e64795e"}

            ```

            ### Banner ID
            
            Returns the employee deduction information for this Banner ID.   This filter should not be used if a Person ID filter is used.
            
            ```

            /employee-deductions?criteria={bannerId":"123456789"}
            
            ```

            ### BenefitDeductionCode

            Returns the employee deduction information for this Deduction.

            ```

            /employee-deductions?criteria={"benefitDeductionCode":"LIF"}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object 
                $ref: "#/components/schemas/schema-extension-employee-deductions.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
          
  /api/employee-deductions/{id}:
    get:
      summary: Get base employee deduction record by GUID.
      description: Returns a single base employee deduction record with the requested global identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_DEDUCTIONS
      tags:
        - employee-deductions
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the employee deduction resource.
          schema:
            type: string
            minimum: 1
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object 
                $ref: "#/components/schemas/schema-extension-employee-deductions.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
 
    put:
      summary: Updates an existing PDRBDED resource.
      description: Update the base employee deduction resource for an employee.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_DEDUCTIONS
      tags:
        - employee-deductions
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
        
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Unique identifier of the employee deduction resource.
          schema:
            type: string
            minimum: 1
            
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-extension-employee-deductions.json"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
          
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/schema-extension-employee-deductions-put-request.json"
      
  /api/employee-deductions/:
    post:
      summary: Creates a new resource in PDRBDED.
      description: >
        Creates a new deduction for an employee including data for PDRBDED (base), and PDRDEDN (detail) resources.
      


        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_DEDUCTIONS
      tags:
        - employee-deductions
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
        
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-extension-employee-deductions.json"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorsObj"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/schema-extension-employee-deductions-post-request.json"
  /api/employee-deductions/batches:
    post:
      summary: Submit a batch of employee deductions to be created or updated
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMP_DEDUCTIONS
