components:
  #update schema API properties, include lineage for property
  #and the lookup reference for validated data whenever possible.
  #x- will not render in some OpenAPI doc editors but will publish 
  #on the Ellucian documentation site.
  #Include a schema as needed for supported method requests and responses.
  schemas:
    transcript-requests-1.0.0_response:
      type: object
      properties:
        id:
          title: Id
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$          
          maxLength: 36
          description: "The global identifier of the transcript request."
          x-lineageReferenceObject: SHTTRAN_GUID
          example: 49eqfc68-3t89-4036-852c-341aa9d8501a      
        requestNumber:
          title:  Transcript Request Number
          description: Sequence Number of the transcript request for the student.
          maxLength: 3
          type: number
          x-lineageReferenceObject: SHTTRAN_SEQ_NO
          example:  1
        bannerId:
          title:  Banner ID
          description: Student's Identification Number.
          maxLength: 9
          type: string
          x-lineageReferenceObject: SHTTRAN_ID
          example:  800004487
        studentInformationTerm:
          title:  Student Information Term Code
          description: Identifies the term used to select the student information (e.g. majors, minors, concentrations).
          maxLength: 6
          type: string
          x-lineageReferenceObject: SHTTRAN_TERM
          x-lineageLookupReferenceObject: STVTERM
          example:  202410
        transcriptLevel:
          title:  Transcript Level
          description: Identifies the course level (Undergraduate, Graduate, etc.) the transcript was requested for. "AL" designates all levels.
          maxLength: 2
          type: string
          x-lineageReferenceObject: SHTTRAN_LEVL_CODE
          x-lineageLookupReferenceObject: STVLEVL
          example:  UG
        chargeDetail:
          title:  Charge Detail Code
          description: Identifies charge detail code to be placed on the students account in billing for requesting a transcript.
          maxLength: 4
          type: string
          x-lineageReferenceObject: SHTTRAN_DETC_DETAIL_CODE
          example:  TRAN
        detailDesc:
          title:  Detail Code Description
          description: Identifies the description of the charge detail code if it differs from the default on the Detail Code Control Form.
          maxLength: 30
          type: string
          x-lineageReferenceObject: SHTTRAN_DETC_DESC
          example:  Transcript Request
        chargeAmount:
          title:  Charge Amount
          description: The amount to be charged for the transcript request.
          maxLength: 12
          type: number
          x-lineageReferenceObject: SHTTRAN_DETC_AMOUNT
          example:  15
        requestedOn:
          title:  Transcript Requested On Date
          description: Request Date. Identifies the date the transcript was requested.
          maxLength: 11
          type: string
          format: date
          x-lineageReferenceObject: SHTTRAN_REQUEST_DATE
          example:  2024-11-05
        printedOn:
          title:  Printed On Date
          description: The date the transcript was printed.
          maxLength: 11
          type: string
          format: date
          x-lineageReferenceObject: SHTTRAN_PRINT_DATE
          example:  2024-11-05
        transcriptType:
          title:  Transcript Type
          description: Transcript type which is to be used for this transcript request
          maxLength: 4
          type: string
          x-lineageReferenceObject: SHTTRAN_TPRT_CODE
          x-lineageReferenceLookupObject: STVTPRT
          example:  ADVS
        numberOfCopies:
          title:  Number of Copies
          description: Number of copies of this transcript requested
          maxLength: 3
          type: number
          x-lineageReferenceObject: SHTTRAN_NO_COPIES
          example:  10
        isOfficialTranscriptRequest:
          title:  Transcript Official Indicator
          description: Indicator denoting whether the transcript is official/unofficial. true=yes, false=no.
          type: boolean
          x-lineageReferenceObject: SHTTRAN_OFFICIAL_IND
          example: true
        billingTerm:
          title:  Billing Term Code
          description: Billing term for transcript charge.
          maxLength: 6
          type: string
          x-lineageReferenceObject: SHTTRAN_TERM_CODE_DETC
          x-lineageLookupReferenceObject: STVTERM
          example:  202210
        receiptNumber:
          title:  Receipt Number
          description: Receipt number for the request charge.
          maxLength: 8
          type: number
          x-lineageReferenceObject: SHTTRAN_WPYO_RECEIPT_NUMBER
          example:  55
        inProgressCutoffTerm:
          title:  In-Progress Course Cutoff Term
          description: Cutoff term for in-progress courses included on the transcript.
          maxLength: 6
          type: string
          x-lineageReferenceObject: SHTTRAN_TERM_CODE_IN_PRG
          x-lineageLookupReferenceObject: STVTERM
          example:  202210
        isRequestOnGradeHold:
          title:  Hold Transcript for Grades
          description: Indicator for holding transcript request until after end of term processing. true - hold for grades, false - do not hold
          type: boolean
          x-lineageReferenceObject: SHTTRAN_HOLD_GRDE_IND
          example:  true
        isRequestOnDegreeHold:
          title:  Hold Transcript for Degree Indicator
          description: Indicator for holding transcript request until after degree processing. true - hold for degree, false - do not hold
          type: boolean
          x-lineageReferenceObject: SHTTRAN_HOLD_DEGR_IND
          example:  true
        sentOn:
          title:  Transcript Sent Date
          description: Date the transcript was sent.
          maxLength: 11
          type: string
          format: date
          x-lineageReferenceObject: SHTTRAN_SENT_DATE
          example:  2024-11-05
        recipientDetail:
          title: Transcript Recipient Detail
          description: Identification of the transcript recipient and contact information
          type: object
          properties:
            externalInstitution:
                title:  External Institution
                description: External Institution Code.  Identifies the institution the student wants the transcript sent to.
                maxLength: 20
                type: string
                x-lineageReferenceObject: SHTTRAN_SBGI_CODE
                example:  12504
            outputType:
              title:  Output Type
              description: "Indicates if the transcript is to be sent via EDI or printed on paper. Valid values are: E - EDI, P - PESC/XML, D - PDF, blank or Null - printed transcript."
              maxLength: 1
              type: string
              x-lineageReferenceObject: SHTTRAN_TYPE
              x-lineageLookupReferenceObject: STVTPRT
              example:  P
            internalCollege:
              title:  Internal College
              description: Identifes the internal college the student wants the transcript sent to.
              maxLength: 6
              type: string
              x-lineageReferenceObject: SHTTRAN_COLL_CODE
              x-lineageLookupReferenceObject: STVCOLL
              example:  BU
            issuedToName:
              title:  Issued To Name
              description: Identifies the recipient of the transcript. This may be an institution, college, or person name.
              maxLength: 185
              type: string
              x-lineageReferenceObject: SHTTRAN_ADDR_NAME
              example:  COLLEGE OF BUSINESS
            streetLine1:
              title:  Street line 1
              description: Street Address Line 1 of transcript address.
              maxLength: 75
              type: string
              x-lineageReferenceObject: SHTTRAN_STREET1
              example:  PO BOX 54111
            streetLine2:
              title:  Street line 2
              description: Street Address Line 2 of transcript address.
              maxLength: 75
              type: string
              x-lineageReferenceObject: SHTTRAN_STREET2
              example:  3 APPLE DR
            streetLine3:
              title:  Street line 3
              description: Street Address Line 3 of transcript address.
              maxLength: 75
              type: string
              x-lineageReferenceObject: SHTTRAN_STREET3
              example:  APT 4
            streetLine4:
              title:  Street line 4
              description: This field maintains line four of the street address.
              maxLength: 75
              type: string
              x-lineageReferenceObject: SHTTRAN_STREET_LINE4
              example:  APARTMENT 25
            houseNumber:
              title:  House Number
              description: House or building number in a street or area.
              maxLength: 10
              type: string
              x-lineageReferenceObject: SHTTRAN_HOUSE_NUMBER
              example:  28056          
            city:
              title:  City
              description: City of transcript address.
              maxLength: 50
              type: string
              x-lineageReferenceObject: SHTTRAN_CITY
              example:  CINCINATTI
            state:
