openapi: 3.0.0
info:
  title: Transcript Requests
  description: "This API can be used to retrieve, create, or update the attributes associated with a student's transcript request. This information is displayed in the Banner administrative page SHARQTC. Additionally, the API supports the option to post student transcript request attributes in batches."
  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SHARQTC
  x-source-title: Transcript Requests
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/transcript-requests:
    get:
      tags:
      - transcript-requests
      summary: Return transcript request attributes for a given student.
      description: Return transcript request attributes for a given student. Data is extracted from SHTTRAN and SHTTRNM.
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          description:  |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          #Add into the description an example for each criteria query supported.   
          description: >
            ### Banner Id

            Returns all records for the Banner ID passed.

            ```

            /transcript-requests?criteria={"bannerId":"800004487"}

            ```  

            ### Level Selected

            Returns all records within the level selected

            ```

            /transcript-requests?criteria={"transcriptLevel":"GR"}

            ```    

            ### Transcript Request On     

            Returns all records within the transcript date requested on.

            ```

            /transcript-requests?criteria={"requestedOn":"2024-12-01"}

            ```   

            ### Transcript Print On

            Returns all records within the transcript print date.

            ```

            /transcript-requests?criteria={"printedOn":"2024-12-01"}

            ```   

            ### Transcript Types

            Returns all records within the transcript for all transcript types requested.

            ```

            /transcript-requests?criteria={"transcriptType":"INTL"}

            ``` 

            ### Hold Transcript for Grades

            Returns all records within the transcript for all transcripts with Hold Grades.

            ```

            /transcript-requests?criteria={"isRequestOnGradeHold": true}

            ``` 

            ### Hold Transcript for Degree

            Returns all records within the transcript for all transcripts with Degree Holds.

            ```

            /transcript-requests?criteria={"isRequestOnDegreeHold": false }

            ```                                                                                                
      #responses are standardized
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            #include only the whole version number, e.g. v1 not v1.0.0
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/transcript-requests-1.0.0_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client’s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      #security is standardized
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_TRANSCRIPT_REQUESTS
