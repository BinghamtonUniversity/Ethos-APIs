openapi: 3.0.0
info:
  title: ca-transcript-course-extensions
  description: This API retrieves all California User Defined Extensions elements
    for a Course based on the Banner ID and Level Code.
  version: 1.0.0-beta
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: beta
  x-source-domain: Student
  x-source-title: CA Transcript Course Extensions
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-transcript-course-extensions:
    get:
      summary: Return User Defined Extensions elements for Course Extensions
      description: Return California User Defined Extensions elements for Course Extensions.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_CA_TRANS_COURSE_EXT
      tags:
        - ca-transcript-course-extensions
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: bannerId
          in: query
          required: true
          schema:
            title: Banner ID
            type: string
            description: Banner ID of the student holding the account.
            maxLength: 9
            x-lineageReferenceObject: SPRIDEN_ID
          description: >
            ### Banner ID

            Returns the User Defined Extensions elements based on on the Banner
            ID.

            ```

            /ca-transcript-course-extensions?levlCode=UG&bannerId=A40505078

            ```
        - name: levlCode
          in: query
          required: true
          schema:
            type: string
            title: Level Code
            maxLength: 2
            x-lineageReferenceObject: SHRLGPA_LEVL_CODE
            x-lineageLookupReferenceObject: STVLEVL
          description: >
            ### Level Code

            Returns the User Defined Extensions elements based on on the Level
            Code.

            ```

            /ca-transcript-course-extensions?levlCode=UG&bannerId=A40505078

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-transcript-course-extensions.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-transcript-course-extensions.json:
      title: Course Extensions elements
      description: California User Defined Extensions elements for Course Extensions
        based on the Banner ID and Level Code.
      type: array
      items:
        type: object
        properties:
          attemptedUnitsCalc:
            type: string
          changeReason:
            type: array
            items:
              type: string
          courseActionCode:
            type: string
          earnedUnitsCalc:
            type: string
          gradePointsCalc:
            type: string
          stateArticulationId:
            type: string
          surrogateId:
            type: string
          transferIndicator:
            type: string
          transferability:
            type: array
            items:
              type: string
      additionalProperties: false
