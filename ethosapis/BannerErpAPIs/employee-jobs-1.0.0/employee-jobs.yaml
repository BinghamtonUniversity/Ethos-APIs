openapi: 3.0.0
info:
  title: Employee Jobs
  description: >
    This API can be used to retrieve, post, or delete an employee's job data.
    This information is displayed in the Banner administrative page NBAJOBS.
    Additionally, the API supports the option to create or update employee jobs data in batches.
  version: 1.0.0-beta
  x-audience: all
  x-release-status: beta
  x-source-domain: Human Resources
  x-source-system: banner
  x-source-name: NBRBJOB
  x-api-type: erp
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employee-jobs:
    get:
      tags:
        - employee-jobs
      summary: Get employee jobs
      description: Query and retrieve employee job data for a given criteria. Data is extracted from NBRBJOB.
      parameters:
        - name: limit
          in: query
          description:
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/employee-jobs-1.0.0_get_request_criteria'
          description: >
            ### Person ID
            
            Returns the employee job information for this Person ID.  This filter should not be used if a Banner ID filter is used.
            
            ```

            /employee-jobs?criteria={"personId": "085df706-ee15-4947-93f8-8c260e64795e"}

            ```

            ### Banner ID
            
            Returns the employee job information for this Banner ID.   This filter should not be used if a Person ID filter is used.
            
            ```

            /employee-jobs?criteria={bannerId":"123456789"}
            
            ```

            ### Position

            Returns the employee job information for this Position.

            ```

            /employee-jobs?criteria={"position":"A000001"}

            ```
            
            ### Suffix

            Returns the employee job information for this position suffix.

            ```

            /employee-jobs?criteria={"suffix":"00"}

            ```
            
            ### Contract Type

            Returns the employee job information for this contract type.
            
            ```

            /employee-jobs?criteria={"contractType":"primary"}
            
            ```            
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/employee-jobs-1.0.0_get_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client’s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_EMP_JOB_ASSIGNMENT
    post:
      tags:
        - employee-jobs
      summary: Creates a new resource in NBRBJOB.
      description: >
        Creates a new job for an employee including data for NBRBJOB (base), NBRJOBS (detail), NBREARN (default earnings), NBRWKSH (default work schedules), and NBRJLBD (labor distributions) resources.
      
      
        Note: Either regularRate or annualSalary must be specified when a salaryStep of zero (0) is specified.


        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.
        
      requestBody:
        content:
          application/vnd.hedtech.integration.1.0.0+json:
            schema:
              $ref: '#/components/schemas/employee-jobs-1.0.0_post_request'
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response.
              required: true
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
          content:
