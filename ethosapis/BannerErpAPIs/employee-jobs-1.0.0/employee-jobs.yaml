components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    employee-jobs-1.0.0_get_request_criteria:
      type: object
      properties:
        personId:
          title: Person ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value 
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"      
        position:
          title: Position
          description: The position to which the job is attached.
          type: string
          x-lineageReferenceObject: NBRBJOB_POSN
          example: "ADM001"
        suffix:
          title: Suffix
          description: Used to uniquely create multiple jobs in the same position.
          type: string
          x-lineageReferenceObject: NBRBJOB_SUFF
          example: "00"
    employee-jobs-1.0.0_get_response:
      properties:
        id:
          title: Id
          type: string
          description: "The global identifier of the employee job."
          x-lineageReferenceObject: NBRBJOB_GUID
          example: 085df706-ee15-4947-93f8-8c260e64795e
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"          
        position:
          title: Position
          description: The position to which the job is attached.
          type: string
          x-lineageReferenceObject: NBRBJOB_POSN
          example: "ADM001"
        suffix:
          title: Suffix
          description: Used to uniquely create multiple jobs in the same position.
          type: string
          x-lineageReferenceObject: NBRBJOB_SUFF
          example: "00"
        startOn:
          title: Starts On Date
          type: string
          format: date
          description: "Begin date of the job assignment."
          x-lineageReferenceObject: NBRBJOB_BEGIN_DATE
          example: "2024-03-15"
        endOn:
          title: Ends on date
          type: string
          format: date
          description: "The date the job assignment will terminate."
          x-lineageReferenceObject: NBRBJOB_END_DATE
          example: "2025-15-31"
        coasCode:
          title: Chart of Accounts
          description: The  Chart of Accounts code for the employee.
          type: string
          example: "B"
          x-lineageReferenceObject: PEBEMPL_COAS_CODE_HOME
        contractType:
          title: Contract Type
          description: >
            Indicates the type of job assignment. Valid values are:
              * `primary` Primary job
              * `overload` Overload job
              * `secondary` Secondary job
          type: string
          enum:
            - primary
            - overload
            - secondary
          example: "primary"
          x-lineageReferenceObject: NBRBJOB_CONTRACT_TYPE
        contractStartOn:
          title: Contract Start Date
          type: string
          format: date
          description: "The date on which a contract begins. This date is significant to the encumbering process."
          x-lineageReferenceObject: NBRBJOB_CONTRACT_BEGIN_DATE
          example: "2024-03-15"
        contractEndOn:
          title: Contract End Date
          type: string
          format: date
          description: "The date on which a contract ends. This date is significant to the encumbering process."
          x-lineageReferenceObject: NBRBJOB_CONTRACT_END_DATE
          example: "2025-05-31"
        salaryEncumbrance: 
          title: Salary Encumbrance
          description: The amount of money that this person will be paid in this job during the current fiscal year.
          type: number
          x-lineageReferenceObject: NBRBJOB_SALARY_ENCUMBRANCE
          example: 60000.55  
        fringeEncumbrance: 
          title: Fringe Encumbrance
          description: The cost of fringe benefits that this person will be paid in this job during the current fiscal year.                                
          type: number
          x-lineageReferenceObject: NBRBJOB_FRINGE_ENCUMBRANCE
          example: 5000.34
        hasEncumbranceAmountChange:
          title: Encumbrance Change Indicator
          description: Indicates if the encumbrance amount has changed for this job.
          type: boolean
          x-lineageReferenceObject: NBRBJOB_ENCUMBRANCE_CHANGE_IND
          example: false          
        totalEncumbranceHours: 
          title: Total Encumbrance Hours
          description: The sum of the Job Detail Encumbrance Hours for the currently active fiscal year.
          type: number
          x-lineageReferenceObject: NBRBJOB_TOTAL_ENCUMBRANCE_HRS
          example: 2020.55  
        totalContractHours: 
          title: Total Contract Hours
          description: The total number of hours of the contract.
          type: number
          x-lineageReferenceObject: NBRBJOB_TOTAL_CONTRACT_HRS
          example: 2000.34 
        stepIncreaseMonth:
          title: Step Increase Month
          description:  Month in which an automatic step increase is to take place.
          type: string
          example: "01"
          x-lineageReferenceObject: NBRBJOB_STEP_INCR_MON
        stepIncreaseDay:
          title: Step Increase Day
          description: Day of which an automatic step increase is to take place.
          type: string
          example: "30"
          x-lineageReferenceObject: NBRBJOB_STEP_INCR_DAY
        eligibleOn:
          title: Step Increase Eligibility Date
          description: "Eligibility Date for the Step Increase."
          type: string
          format: date
          x-lineageReferenceObject: NBRBJOB_ELIGIBLE_DATE
          example: "2024-03-15"
        deferBalance: 
          title: Deferred Balance
          description: The amount of deferred pay accumulated for this job.
          type: number
          x-lineageReferenceObject: NBRBJOB_DEFER_BAL
          example: 2100.99
        probationStartOn:
          title: Probation Start Date
          type: string
          format: date
          description: "The begin date of Probationary Period."
          x-lineageReferenceObject: NBRBJOB_PROBATION_BEGIN_DATE
          example: "2024-03-15"
        probationEndOn:
          title: Probation End Date
          type: string
          format: date
          description: "The end date of Probationary Period. This data is calculated based on the Probationary Period and Probation Begin Date, but may be overridden. Overriding this value will NOT change the Probationary Period or Probation Begin Date."
          x-lineageReferenceObject: NBRBJOB_PROBATION_END_DATE
          example: "2025-05-31"
        probationUnits:
          title: Probation Units
          description: Identifies the number of Probationary Units. Will represent months or days depending on the Probationary Period Units institutional setting.
          type: integer
