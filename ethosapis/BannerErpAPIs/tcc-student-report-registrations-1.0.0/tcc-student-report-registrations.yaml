openapi: 3.0.0
info:
  title: tcc-student-report-registrations
  description:
    The TCC Student Report Registrations is designed to maintain cb registration data for students.
    It supports options to post cb registration data requests in batches and retrieve records
    through get requests.
  version: 1.0.0
  x-api-type: erp
  x-release-status: ga
  x-source-system: banner
  x-audience: all
  x-deprecated-on:
  x-source-domain: student
  x-source-name: SZRSCRR
  x-source-title: 
  x-sunset-on:
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/tcc-student-report-registrations:
    get:
      tags:
      - tcc-student-report-registrations
      summary: "This returns the requested student data from SZRSCRR."
      description: "This request will retrieve the specified student data from SZRSCRR"
