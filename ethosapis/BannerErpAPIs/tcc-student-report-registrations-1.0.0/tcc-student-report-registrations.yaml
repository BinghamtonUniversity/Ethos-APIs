components:
  schemas:
    tcc-student-report-registrations-1.0.0_response:
      type: object
      properties:
        id:
          title: id
          description: "Immutable unique key"
          type: integer
          format: int64
          x-lineageReferenceObject: SZRSCRR_SURROGATE_ID
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: 12345
        bannerId:
          title: bannerId
          description: "This field defines the identnumber used to access person on-line."
          maxLength: 9
          type: string
          format: text
          x-lineageReferenceObject: SPRIDEN_ID
          x-lineageLookupReferenceObject: SPRIDEN
          x-product-region: Student
          example: "TCC000001"
        termCode:
          title: termCode
          description: "Term for with this student has manual overrides."
          maxLength: 6
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_TERM_CODE
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "202510"
        crn:
          title: crn
          description: "CRN of the course registration for which overrides exist."
          maxLength: 5
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_CRN
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "1315"
        threePeat:
          title: threePeat
          description: "Manual override of the calculated value for 3-peat reporting. Y is a 3-peat. N, Null or Blank in NOT a 3-peat."
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_TERM_CODE
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "N"
        reported:
          title: reported
          description: "Manual override of the SZASXRF Not Reported flag. Y indicates the CRN is reported. N, Null or Blank indicates the CRN is NOT reported."
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_REPORTED
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "Y"
        exceedsDevelopmentalFunding:
          title: ExceedsDevelopmentalFunding
          description: "Manual override of the system calculated value for Exceeds Developmental Funding. N, Null or Blank indicates the crn is NOT reported as Exceeded Developmental Funding."
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_EXC_DEV_FUNDING
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "Y"
        notFoundedReason:
          title: notFoundedReason
          description: "Manual override of the system calculated value for Not Funded Reason."
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_NOT_FD_REASON
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "N"
        hsCreditStatus:
          title: hsCreditStatus
          description: "Manual override of the default value for HS credit Status."
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_HS_CR_STATUS
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "N"
      required:
        - id
        - bannerId
        - termCode
        - crn
    tcc-student-report-registrations-1.0.0_post_request:
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/tcc-student-report-registrations-items-1.0.0_post_request'
      required:
        - items
    tcc-student-report-registrations-items-1.0.0_post_request:
      type: object
      properties:
        bannerId:
          title: bannerId
          description: "This field defines the identification number used to access person on-line."
          maxLength: 9
          type: string
          format: text
          x-lineageReferenceObject: SPRIDEN_ID
          x-lineageLookupReferenceObject: SPRIDEN
          x-product-region: Student
          example: "TCC000123"
        termCode:
          title: termCode
          description: "Term for with this student has manual overrides."
          maxLength: 6
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_TERM_CODE
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "202520"
        crn:
          title: crn
          description: "CRN of the course registration for which overrides exist."
          maxLength: 5
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_CRN
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "1314"
        threePeat:
          title: threePeat
          description: "Manual override of the calculated value for 3-peat reporting. Y is a 3-peat. N, Null or Blank in NOT a 3-peat."
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_3_PEAT
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "Y"
        reported:
          title: reported
          description: "Manual override of the SZASXRF Not Reported flag. Y indicates the CRN is reported. N, Null or Blank indicates the CRN is NOT reported."
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_REPORTED
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "Y"
        exceedsDevelopmentalFunding:
          title: exceedsDevelopmentalFunding
          description: "Manual override of the system calculated value for Exceeds Developmental Funding. N, Null or Blank indicates the crn is NOT reported as Exceeded Developmental Funding."
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_EXC_DEV_FUNDING
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "Y"
        notFoundedReason:
          title: notFoundedReason
          description: "Manual override of the system calculated value for Not Funded Reason."
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_NOT_FD_REASON
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "N"
        hsCreditStatus:
          title: hsCreditStatus
          description: "Manual override of the default value for HS credit Status."
          maxLength: 1
          type: string
          format: text
          x-lineageReferenceObject: SZRSCRR_HS_CR_STATUS
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: "N"
      required:
        - bannerId
        - termCode
        - crn
    tcc-student-report-registrations-1.0.0-batch-response:
      properties:
        items:
          type: array
          items:
            - $ref: "#/components/schemas/tcc-student-report-registrations-1.0.0_success_batch_response"
            - $ref: "#/components/schemas/tcc-student-report-registrations-1.0.0_error_batch_response"
      required:
        - items
    tcc-student-report-registrations-1.0.0_success_batch_response:
      type: object
      properties:
        id:
          title: id
          description: "Immutable unique key"
          type: integer
          format: int64
          x-lineageReferenceObject: SZRSCRR_SURROGATE_ID
          x-lineageLookupReferenceObject: SZRSCRR
          x-product-region: student
          example: 12345
    tcc-student-report-registrations-1.0.0_error_batch_response:
      type: object
      properties:
        code:
          title: code
          description: "The error message code used to describe the error details."
          type: string
          format: text
          example: "Global.SchemaValidation.Error"
        description:
          title: description
          description: "The error description used to describe the error details."
          type: string
          format: text
          example: "Errors parsing input JSON."
        message:
          title: message
          description: "The detailed actionable error message."
          type: string
          format: text
          example: "hsCreditStatus (G) is not a valid. Valid values are: Y or N."
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
              type: object
              properties:
                id:
                  type: string
                  description: The global identifier of the resource in error.
                sourceId:
                  type: string
                  description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
                code:
                  type: string
                  description: The error message code used to describe the error details.
                description:
                  type: string
                  description: The error description used to describe the error details.
                message:
                  type: string
                  description: The detailed actionable error message.
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
