        - name: limit
          in: query
          description: 
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/employee-student-hour-time-statuses-1.0.0_get_request_criteria'
          description: >
            ### Banner Id
            
            Returns the employee student hour time status information for this Banner Id.
            
            ```

            /employee-student-hour-time-statuses?criteria={"bannerId": "HOP000001"}

            ```

            ### Term Code
            
            Returns the employee student hour time status information for this Term Code.
            
            ```

            /employee-student-hour-time-statuses?criteria={"termCode":"202510"}
            
            ```

            ### Year

            Returns the employee student hour time status information for this Year.

            ```

            /employee-student-hour-time-statuses?criteria={"year":"2025"}

            ```
            
            ### Payroll Identification Code

            Returns the employee student hour time status information for this payroll identification code.

            ```

            /employee-student-hour-time-statuses?criteria={"payrollIdentificationCode":"MN"}

            ```
            
            ### Payroll Number

            Returns the employee student hour time status information for this paroll number.
            
            ```
            
            /employee-student-hour-time-statuses?criteria={"payrollNumber":1}


            ```
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
