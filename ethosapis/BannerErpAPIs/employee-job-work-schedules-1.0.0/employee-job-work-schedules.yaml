components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    employee-job-work-schedules-1.0.0_get_request_criteria:    
      properties:
        personId:
          title: Person ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"      
        effectiveOn:
          title: Date for which the job detail data becomes effective.
          type: string
          format: date
          description: "Effective date of the job detail data."
          x-lineageReferenceObject: NBBWKSH_EFFECTIVE_DATE
          example: "2024-03-15"       
    employee-job-work-schedules-1.0.0_get_response:
      properties:
        id:
          title: Id
          type: string
          description: "The global identifier of the employee job detail."
          x-lineageReferenceObject: NBBWKSH_GUID
          example: 085df706-ee15-4947-93f8-8c260e64795e
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"          
        position:
          title: Position
          description: The position to which the job is attached.
          type: string
          x-lineageReferenceObject: NBBWKSH_POSN
          example: "ADM0001"
        suffix:
          title: Suffix
          description: Used to uniquely create multiple jobs in the same position.
          type: string
          x-lineageReferenceObject: NBBWKSH_SUFF
          example: "00"
        effectiveOn:
          title: Effective Date
          type: string
          format: date
          description:  Date for which the job detail data becomes effective.
          x-lineageReferenceObject: NBBWKSH_EFFECTIVE_DATE
          example: "2024-03-15"
        scheduleBeginDay:
          title: Schedule begin day
          description: Number of the day on which the employee begins the schedule.
          type: number
          x-lineageReferenceObject: NBBWKSH_SCHEDULE_BEGIN_DAY
          example: 1
        scheduleEndOn:
          title: Schedule end date
          description: Date that schedule was no longer in effect for this assignment.
          type: string
          format: date
          x-lineageReferenceObject: NBBWKSH_SCHEDULE_END_DATE
          example: "2024-03-31"
        deemedHours:
          title: Deemed hours
          description: Reportable hours for Canadian Employment Insurance.
          type: number
          x-lineageReferenceObject: NBBWKSH_DEEMED_HRS
          example: 8
        person:
          $ref: '#/components/schemas/person' 
    employee-job-work-schedules-1.0.0_post_request:
      type: object
      properties:
        id:
          title: Id
          type: string
          description: "The global identifier of the employee job detail."
          x-lineageReferenceObject: NBBWKSH_GUID
          example: "00000000-0000-0000-0000-000000000000"
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789" 
        position:
          title: Position
          description: The position to which the job is attached.
          type: string
          x-lineageReferenceObject: NBBWKSH_POSN
          example: "ADM0001"
        suffix:
          title: Suffix
          description: Used to uniquely create multiple jobs in the same position.
          type: string
          x-lineageReferenceObject: NBBWKSH_SUFF
          example: "00"
        effectiveOn:
          title: Effective Date
          type: string
          format: date
          description:  Date for which the job detail data becomes effective.
          x-lineageReferenceObject: NBBWKSH_EFFECTIVE_DATE
          example: "2024-03-15"
        scheduleBeginDay:
          title: Schedule begin day
          description: Number of the day on which the employee begins the schedule.
          type: number
          x-lineageReferenceObject: NBBWKSH_SCHEDULE_BEGIN_DAY
          example: 1
        scheduleEndOn:
          title: Schedule end date
          description: Date that schedule was no longer in effect for this assignment.
          type: string
          format: date
          x-lineageReferenceObject: NBBWKSH_SCHEDULE_END_DATE
          example: "2024-03-31"
        deemedHours:
          title: Deemed hours
          description: Reportable hours for Canadian Employment Insurance.
          type: number
          x-lineageReferenceObject: NBBWKSH_DEEMED_HRS
          example: 8
      required:
        - id
        - bannerId
        - position
        - suffix
        - effectiveOn
        - scheduleBeginDay
    employee-job-work-schedules-1.0.0_post_response:
      $ref: '#/components/schemas/employee-job-work-schedules-1.0.0_get_response'
    employee-job-work-schedules-1.0.0_put_request:
