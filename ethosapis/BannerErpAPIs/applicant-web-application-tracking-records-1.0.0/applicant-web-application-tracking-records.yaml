openapi: 3.0.0
info:
  title: applicant-web-application-tracking-records
  description: >
    <p>
      Creates or retrieves Applicant Web Application Tracking records. This functionality reflects the data displayed on the <strong>KVAFAPP</strong> page.
    </p>

    <p>
      <strong>GET API</strong> – Retrieves all Applicant Web Application Tracking records based on the input parameters provided by the user.  
      Data is sourced from the <strong>KVRFAPP</strong> and <strong>KVRSAWA</strong> tables, as well as <strong>KVVFMAP</strong> and <strong>KVVFMSA</strong> views.
    </p>

    <p>
      <strong>POST API</strong> – Creates a new Applicant Web Application Tracking record.  
      Upon successful creation, the data is stored in the following resource tables: <strong>KVRFAPP</strong>, <strong>KVRFMAP</strong>, <strong>KVRNMAP</strong>, <strong>KVRFMSA</strong>, <strong>KVRNMSA</strong>, and <strong>KVRSAWA</strong>.
    </p>
  version: 1.0.0
  x-api-type: erp
  x-release-status: ga
  x-source-system: banner
  x-source-domain: Financial Aid
  x-source-title: Applicant Web Application Tracking records (Student Aid)
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:  
  /api/applicant-web-application-tracking-records:
