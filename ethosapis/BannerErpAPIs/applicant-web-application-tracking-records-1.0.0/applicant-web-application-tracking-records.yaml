      summary: Creates an Applicant web application tracking record.
      description: |
        <p>
        Creates a new Applicant Web Application Tracking Record. Once successfully created, the record will be visible on the <strong>KVAFAPP</strong> page.
        </p>
        <p>
          The API accepts a single Applicant Web Application Tracking Record in the request payload, which will be persisted to the appropriate resource tables upon successful submission.
        </p>
        <p>
          All date fields must be provided in the <strong>DD-MM-YYYY</strong> format.
