            title: Student Id
            description: User id of the student
            type: string
            x-lineageReferenceObject: SPRIDEN_ID
          userId:
            title: User Id
            description: The logon ID of the user who created or last updated this record.
            type: string
            x-lineageReferenceObject: KVRFAPP_USER_ID
          comment:
            title: Comment
            description: This field identifies the term associated with the comment type code.
            type: string
            x-lineageReferenceObject: KVRFAPP_COMMENT
