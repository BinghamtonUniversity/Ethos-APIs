openapi: 3.0.0
info:
  title: Catalog Course Bases
  description: >
  
    This QAPI returns base catalog course details using a 
    combination of subject, course number and term as seen on the SCACRSE 
    administrative page. 
    

    In addition to the base catalog course (SCBCRSE) record detail, any level 
    (SCRLEVL), grading mode (SCRGMOD), schedule details (SCRSCHD), or alias (SCRCALS)
     records attached to the base catalog course record are returned in the response.

    Base catalog course details can be created using catalog-course-bases-initiation-process, 
    and adjusted using catalog-course-bases-adjustments-process.


  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SCACRSE
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /qapi/catalog-course-bases:
    post:
      tags:
      - catalog-course-bases QAPI
      summary: Returns resources from SCBCRSE, SCRLEVL, SCRGMOD, SCRSCHD and SCRCALS.
      description: >
        Queries for the requested resource using a set of attributes provided in the post
        request body.  Please note the path to use is /qapi/{resource} in the URL and not /api/{resource}.
        
        
        Returns the SCBCRSE record meeting the required submitted criteria of query term subject + course 
        number and/or course alias. 
        
        
        Any SCRLEVL, SCRGMOD, SCRSCHD or SCRCALS records associated 
        with the base catalog course record are also returned in the response.        
          
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          description:  |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer            
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string            
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/catalog-course-bases-1.0.0_qapi_post_request"
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/catalog-course-bases-1.0.0_qapi_post_response'
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized.
        '403':
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the clientâ€™s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_CATALOG_COURSE_BASES
components:
  schemas:
    catalog-course-bases-1.0.0_qapi_post_request:
      type: object
      required:
        - queryTerm        
      properties:              
        subject:
          title: Subject
          maxLength: 4
          type: string
          description: "The subject area of the course."
          x-lineageReferenceObject: SCBCRSE_SUBJ_CODE
          x-lineageLookupReferenceObject: STVSUBJ
          example: MATH
        courseNumber: 
          title: Course Number
          maxLength: 5
          type: string
          description: "The course number associated with the subject for the course."
          x-lineageReferenceObject: SCBCRSE_CRSE_NUMB
          example: ENGL1        
        queryTerm:
          title: Query Term
          maxLength: 6
          type: string
          description: "A user provided value.  The query term code is used to retrieve the most current course details that are less than, or equal to, the provided value."         
          x-lineageLookupReferenceObject: STVTERM
          example: 202201    
        alias:
          title: Course Alias
          maxLength: 50
          type: string
          description: "Alternate identifier for the course. Course Alias is not a unique identifier. If only queryTerm and courseAlias are submitted, more than one course record may be returned."
          x-lineageReferenceObject: SCRCALS_CRSE_ALIAS
          example: CA4            
    catalog-course-bases-1.0.0_qapi_post_response:
      type: object
      required:
        - subject
        - courseNumber
        - queryTerm    
        - courseDetail
        - levelDetail
        - gradingModeDetail
        - scheduleDetail    
      properties:
        subject:
          title: Subject
          maxLength: 4
          type: string
          description: "The subject area of the course."
          x-lineageReferenceObject: SCBCRSE_SUBJ_CODE
          x-lineageLookupReferenceObject: STVSUBJ
          example: MATH
        courseNumber: 
          title: Course Number
          maxLength: 5
          type: string
          description: "The course number associated with the subject for the course."
          x-lineageReferenceObject: SCBCRSE_CRSE_NUMB
          example: ENGL1        
        queryTerm:
          title: Query Term
          maxLength: 6
          type: string
          description: "A user provided value.  The query term code is used to retrieve the most current course details that are less than, or equal to, the provided value."
          x-lineageLookupReferenceObject: STVTERM
          example: 202201      
        courseDetail:
          title: Course Detail
          type: object
          required:
            - subject
            - courseNumber
            - prerequisiteCheckingMethod           
          properties:     
            fromTerm:
              title: Effective Term
              maxLength: 6
              type: string
              description: "The starting term code for a set of base course details."
              x-lineageReferenceObject: SCBCRSE_EFF_TERM
              x-lineageLookupReferenceObject: STVTERM
              example: 202201    
            toTerm:
              title: Ending Term
              maxLength: 6
              type: string
              description: "The ending term code for a set of base course details."
              x-lineageReferenceObject: derived
              x-lineageDerivedLogic: "The to term is derived by querying the system to locate the next effective term that is greater than the from term. On the highest effective term record the system default term of 999999 is displayed as the to term."
              x-lineageLookupReferenceObject: STVTERM
              example: 999999         
            modifiedOn:
              title: Modified On
              maxLength: 11
              type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              description: "Most current date the record was created or changed."
              x-lineageReferenceObject: SCBCRSE_ACTIVITY_DATE
              example: 2024-05-05T04:00:00Z   
            modifiedBy:
              title: Modified By User ID
              maxLength: 30
              type: string
              description: "User who inserted or last updated the data."
              x-lineageReferenceObject: SCBCRSE_USER_ID
              example: SYSTEST08                
            college:
              title: College Code
              maxLength: 2
              type: string
              description: "The college offering the course."
              x-lineageReferenceObject: SCBCRSE_COLL_CODE
              x-lineageLookupReferenceObject: STVCOLL             
              example: NU  
            collegeDescription:
              title: College Code Description
              maxLength: 30
              type: string
              description: "The description of the college offering the course."
              x-lineageReferenceObject: STVCOLL_DESC
              example: College of Nursing    
            division:
              title: Division Code
              maxLength: 4
              type: string
              description: "The division offering the course."
              x-lineageReferenceObject: SCBCRSE_DIVS_CODE
              x-lineageLookupReferenceObject: STVDIVS             
              example: UNDG  
            divisionDescription:
              title: Division Code Description
              maxLength: 30
              type: string
              description: "The description of the division offering the course."
              x-lineageReferenceObject: STVDIVS_DESC
              example: Undergraduate Division
            department:
              title: Department Code
              maxLength: 4
              type: string
              description: "The department offering the course."
              x-lineageReferenceObject: SCBCRSE_DEPT_CODE
              x-lineageLookupReferenceObject: STVDEPT             
              example: NURS  
            departmentDescription:
              title: Department Code Description
              maxLength: 30
              type: string
              description: "The description of the department offering the course."
              x-lineageReferenceObject: STVDEPT_DESC
              example: Nursing
            status:
              title: Status Code
              maxLength: 1
              type: string
              description: "The status of the course."
              x-lineageReferenceObject: SCBCRSE_CSTA_CODE
              x-lineageLookupReferenceObject: STVCSTA             
              example: A 
            statusDescription:
              title: Status Code Description
              maxLength: 30
              type: string
              description: "The description of the course status."
              x-lineageReferenceObject: STVCSTA_DESC
              example: Active   
            shortTitle:
              title: Short Course Title
              maxLength: 30
              type: string
              description: "The short title of the course."
              x-lineageReferenceObject: SCBCRSE_TITLE            
              example: Nursing Care of Adult       
            cipc:
              title: Classification of Instructional Program (CIP) Code
              maxLength: 6
              type: string
              description: "The CIP code of the course. Normally, CIP course codes are used to identify the primary subject matter of a course."
              x-lineageReferenceObject: SCBCRSE_CIPC_CODE
              x-lineageLookupReferenceObject: STVCIPC           
              example: 181101 
            cipcDescription:
              title: Classification of Instructional Program (CIP) Code Description
              maxLength: 30
              type: string
              description: "The description of the CIP code."
              x-lineageReferenceObject: STVCIPC_DESC
              example: Nursing, General   
            creditCeuHoursConnector:
              title: Credit/CEU Hours Connector
              maxLength: 2
              type: string
              description: "This field defines whether the course can be offered for variable credit. OR/TO is used to specify the relationship between minimum and maximum credit hours values."
              x-lineageReferenceObject: SCBCRSE_CREDIT_HR_IND           
              example: TO        
            creditCeuHoursMinimum:
              title: Credit/CEU Hours Minimum
              maxLength: 7
              type: number
              description: "The minimum number of credits/CEU hours for which a course may be offered. Credit/CEU hour values will control the number of credit/CEU hours for which sections can be scheduled and for which students may register."
              x-lineageReferenceObject: SCBCRSE_CREDIT_HR_LOW    
              example: 3  
            creditCeuHoursMaximum:
              title: Credit/CEU Hours Maximum
              maxLength: 7
              type: number
              description: "This property is either a second valid credit/CEU hour value or the maximum credit/CEU hour value within a range. A value may only be entered if the Credit/CEU Hours Connector property is included and the value must be greater than the Credit/CEU Hours Minimum."
              x-lineageReferenceObject: SCBCRSE_CREDIT_HR_HIGH    
              example: 6       
            lectureHoursConnector:
              title: Lecture Hours Connector
              maxLength: 2
              type: string
              description: "This property defines whether the course can be offered for variable lecture hours. OR/TO is used to specify the relationship between the minimum and maximum lecture hour values."
              x-lineageReferenceObject: SCBCRSE_LEC_HR_IND           
              example: TO        
            lectureHoursMinimum:
              title: Lecture Hours Minimum
              maxLength: 7
              type: number
              description: "The minimum number of lecture hours for which a course may be offered."
              x-lineageReferenceObject: SCBCRSE_LEC_HR_LOW    
              example: 2  
            lectureHoursMaximum:
              title: Lecture Hours Maximum
              maxLength: 7
              type: number
              description: "This property is either a second valid lecture hour value or the maximum lecture hour value within a range. A value may only be entered if the Lecture Hours Connector property is included and the value must be greater than the Lecture Hours Minimum."
              x-lineageReferenceObject: SCBCRSE_LEC_HR_HIGH    
              example: 4                           
            labHoursConnector:
              title: Lab Hours Connector
              maxLength: 2
              type: string
              description: "This property defines whether the course can be offered for variable lab hours. OR/TO is used to specify the relationship between the minimum and maximum lab hour values."
              x-lineageReferenceObject: SCBCRSE_LAB_HR_IND           
              example: TO        
            labHoursMinimum:
              title: Lab Hours Minimum
              maxLength: 7
              type: number
              description: "The minimum number of lab hours for which a course may be offered."
              x-lineageReferenceObject: SCBCRSE_LAB_HR_LOW    
              example: 1  
            labHoursMaximum:
              title: Lab Hours Maximum
              maxLength: 7
              type: number
              description: "This property is either a second valid lab hour value or the maximum lab hour value within a range. A value may only be entered if the Lab Hours Connector property is included and the value must be greater than the Lab Hours Minimum."
              x-lineageReferenceObject: SCBCRSE_LAB_HR_HIGH    
              example: 3
            otherHoursConnector:
              title: Other Hours Connector
              maxLength: 2
              type: string
              description: "This property defines whether the course can be offered for variable other hours. OR/TO is used to specify the relationship between the minimum and maximum other hour values."
              x-lineageReferenceObject: SCBCRSE_OTH_HR_IND           
              example: OR        
            otherHoursMinimum:
              title: Other Hours Minimum
              maxLength: 7
              type: number
              description: "The minimum number of other hours for which the course can be offered. Other hours is defined by the institution."
              x-lineageReferenceObject: SCBCRSE_OTH_HR_LOW    
              example: 1  
            otherHoursMaximum:
              title: Other Hours Maximum
              maxLength: 7
              type: number
              description: "This property is either a second valid other hour value or the maximum other hours value within a range. A value may only be entered if the Other Hours Connector property is included and the value must be greater than the Other Hours Minimum."
              x-lineageReferenceObject: SCBCRSE_OTH_HR_HIGH    
              example: 2    
            billingHoursConnector:
              title: Billing Hours Connector
              maxLength: 2
              type: string
              description: "This property defines whether the course can be billed for variable credit. OR/TO is used to specify the relationship between the minimum and maximum billing hour values."
              x-lineageReferenceObject: SCBCRSE_BILL_HR_IND           
              example: TO        
            billingHoursMinimum:
              title: Billing Hours Minimum
              maxLength: 7
              type: number
              description: "The minimum number of credits for which the course can be billed based on defined assessment rules."
              x-lineageReferenceObject: SCBCRSE_BILL_HR_LOW    
              example: 2  
            billingHoursMaximum:
              title: Billing Hours Maximum
              maxLength: 7
              type: number
              description: "This property is either second valid billing hours value or the madimum billing hours value within a range. A value may only be entered if the Billing Hours Connector property is included the value must be greater than the Billing Hours Minimum."
              x-lineageReferenceObject: SCBCRSE_BILL_HR_HIGH    
              example: 3
            contactHoursConnector:
              title: Contact Hours Connector
              maxLength: 2
              type: string
              description: "This property specifies the relationship between the minimum and maximum contact hours.  OR/TO is used to specify the relationship between the minimum and maximum contact hour values."
              x-lineageReferenceObject: SCBCRSE_CONT_HR_IND           
              example: OR        
            contactHoursMinimum:
              title: Contact Hours Minimum
              maxLength: 7
              type: number
              description: "This property is the sum of minimum lecture, lab and other hours or a user set value."
              x-lineageReferenceObject: SCBCRSE_CONT_HR_LOW    
              example: 4  
            contactHoursMaximum:
              title: Contact Hours Maximum
              maxLength: 7
              type: number
              description: "This property is the sum of maximum lecture, lab and others hours. A value may only be entered if the Contact Hours Connector property is included and must be greater than the Contact Hours Minimum."
              x-lineageReferenceObject: SCBCRSE_CONT_HR_HIGH    
              example: 8                                     
            approval:
              title: Approval Code
              maxLength: 1
              type: string
              description: "Code specifying how the course was approved."
              x-lineageReferenceObject: SCBCRSE_APRV_CODE
              x-lineageLookupReferenceObject: STVAPRV             
              example: D 
            approvalDescription:
              title: Status Code Description
              maxLength: 30
              type: string
              description: "Description of the approval code."
              x-lineageReferenceObject: STVAPRV_DESC
              example: Department  
            prerequisiteWaiver:
              title: Prerequisite Waiver Code
              maxLength: 1
              type: string
              description: "The type of role that is allowed to authorize a student to waive a prerequisite requirement (e.g. instructor, registrar, etc.)."
              x-lineageReferenceObject: SCBCRSE_PWAV_CODE
              x-lineageLookupReferenceObject: STVPWAV             
              example: C        
            prerequisiteWaiverDescription:
              title: Prerequisite Waiver Code Description
              maxLength: 30
              type: string
              description: "Description of the prerequisite waiver code."
              x-lineageReferenceObject: STVPWAV_DESC
              example: Division Chairperson  
            isExemptFromTuitionAndFeeRules:
              title: Tuition and Fee Rule Exemption Indicator
              type: boolean
              description: "This property specifies whether the course is exempt from tuition and fees term rules defined on Registration Fees Process Control Admin Page - SFARGFE. If 'Y', all rules on SFARGFE with 'Y' in Override field  will be ignored.  If 'N', rules on SFARGFE apply. (Valid values: null, N, Y)."
              x-lineageReferenceObject: SCBCRSE_TUIW_IND            
              example: true     
            hasAdditionalFees:
              title: Additional Fees Indicator
              type: boolean
              description: "This property indicates that additional fees, outside of the SFARGFE assessment rules, are established for the course."
              x-lineageReferenceObject: SCBCRSE_ADD_FEES_IND            
              example: false
            isContinuingEducation:
              title: Continuing Education Unit (CEU) Indicator
              type: boolean
              description: "Indicates whether the course is a continuing education unit (CEU) course. (Valid values: null, N, Y)."
              x-lineageReferenceObject: SCBCRSE_CEU_IND            
              example: false  
            durationUnit:
              title: Duration Unit Code
              maxLength: 4
              type: string
              description: "The duration for which the course is offered (e.g. week, day, month, etc.)."
              x-lineageReferenceObject: SCBCRSE_DUNT_CODE
              x-lineageLookupReferenceObject: GTVDUNT             
              example: WEEK       
            durationUnitDescription:
              title: Duration Unit Code Description
              maxLength: 30
              type: string
              description: "Description of the duration unit code."
              x-lineageReferenceObject: GTVDUNT_DESC
              example: Weeks         
            durationNumberOfUnits:
              title: Duration Number of Units
              maxLength: 7
              type: number             
              description: "The total number of times the duration unit extends."
              x-lineageReferenceObject: SCBCRSE_NUMBER_OF_UNITS          
              example: 15 
            prerequisiteCheckingMethod:
              title: Prerequisite Checking Method
              maxLength: 1
              type: string  
              enum:
              - basic
              - cappAreas
              - degreeworks                        
              description: "The type of prerequisite checking. B=Banner Basic, C=CAPP, D=DegreeWorks."
              x-lineageReferenceObject: SCBCRSE_PREREQ_CHK_METHOD_CDE          
              example: basic       
            repeatLimit:
              title: Repeat Limit
              maxLength: 2
              type: number
              description: "The maximum number of times the course may be repeated by a student."
              x-lineageReferenceObject: SCBCRSE_REPEAT_LIMIT
              example: 0 
            repeatStatus:
              title: Repeat Status Code
              maxLength: 2
              type: string
              description: "Indicates whether the course is repeatable."                    
              x-lineageReferenceObject: SCBCRSE_REPS_CODE
              x-lineageLookupReferenceObject: STVREPS             
              example: NR  
            repeatStatusDescription:
              title: Repeat Status Code Description
              maxLength: 30
              type: string
              description: "Description of the repeat status."
              x-lineageReferenceObject: STVREPS_DESC
              example: Course may not be repeated                                   
            repeatMaximumHours:
              title: Maximum Repeat Hours
              maxLength: 9
              type: number
              description: "Maximum number of credits permitted."
              x-lineageReferenceObject: SCBCRSE_MAX_RPT_UNITS                       
              example: 3  
            repeatType:
              title: Repeat Type Code
              maxLength: 1
              type: string
              description: "Course's repeat type for registration repeat rules processing. Valid values: NULL (null is treated as an implied N), N (Non-repeatable Credit), L (Legally Mandated Training), A (Activity/Other Repeatable), F (Family Non-repeatable Credit), G (Family Activity/Other Repeatable)."         
              x-lineageReferenceObject: SCBCRSE_REPEAT_CDE     
              x-product-region: CalB-Stu 
              example: N    
            repetitionFamilies:
              title: Repetition Family Details
              type: array               
              items:
                type: object
                required:
                  - repetitionFamily
                  - modifiedOn                
                properties:
                  repetitionFamily:
                    title: Repetition Family Code
                    maxLength: 6
                    type: string
                    description: "Course's repetition family code(s). Used when evaluating registration course repeat limits for families. Only used with the family type of courses."
                    x-lineageReferenceObject: SVRCRFM_CRFM_CODE
                    x-lineageLookupReferenceObject: SVVCRFM
                    x-product-region: CalB-Stu                     
                    example: MATHRE
                  repetitionFamilyDescription: 
                    title: Repetition Family Code Description
                    maxLength: 60
                    type: string
                    description: "The description of the repetition family code."
                    x-lineageReferenceObject: SVVCRFM_DESC
                    x-product-region: CalB-Stu                                
                    example: MATHRE Intro Repeatable                                               
            multipleFamilies:
              title: Course Repetition Family Indicator
              maxLength: 1
              type: string
              description: "Indicates if this course is a family repeat type of course (SCBCRSE_REPEAT_CDE) and is assigned to two or more course repetition families. Y means Yes, course has multiple families assigned in SVRCRFM table. N or Null means No, the course has only one family assigned. (N or null are also used on courses that are not a family repeat type.)."
              x-lineageReferenceObject: SCBCRSE_MULT_FAM_IND     
              x-product-region: CalB-Stu                    
              example: N  
            creditStatusCode:
              title: Credit Status Code
              maxLength: 1
              type: string
              description: "The credit status of the course."
              x-lineageReferenceObject: SCBCRSE_CREDIT_STATUS_CODE
              x-lineageLookupReferenceObject: SVVCCST               
              x-product-region: CalB-Stu               
              example: N      
            creditStatusDescription:
              title: Credit Status Code Description
              maxLength: 30
              type: string
              description: "The description of the credit status."
              x-lineageReferenceObject: SVVCCST_DESC
              x-product-region: CalB-Stu               
              example: N                                                                                                                                                                     
        levelDetail:
          title: Course Level Detail
          type: object
          required:
            - fromTerm 
            - levels            
          properties:
            fromTerm:
              title: Effective Term
              maxLength: 6
              type: string
              format: string              
              description: "The starting term code for a set of base course details."
              x-lineageReferenceObject: SCRLEVL_EFF_TERM
              x-lineageLookupReferenceObject: STVTERM
              example: 202201     
            toTerm:
              title: Ending Term
              maxLength: 6
              type: string
              description: "The ending term code for a set of base course details."
              x-lineageReferenceObject: derived
              x-lineageDerivedLogic: "The to term is derived by querying the system to locate the next effective term that is greater than the from term. On the highest effective term record the system default term of 999999 is displayed as the to term."
              x-lineageLookupReferenceObject: STVTERM
              example: 999999         
