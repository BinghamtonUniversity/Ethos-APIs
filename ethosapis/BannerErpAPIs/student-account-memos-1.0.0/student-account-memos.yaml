openapi: 3.0.0
info:
  title: student-account-memos
  description: This is an alternative representation of the student-account-detail-memos API and provides details from tbrmemo, tbbdetc_dcat_code and tbbdetc_type_ind.
  version: 1.0.0
  x-source-system: banner
  x-source-name: TBRMEMO
  x-source-title: Student Account Memos
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: '{server_url}'
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-account-memos:
    get:
      tags:
        - student-account-memos
      summary: Returns records from TBRMEMO.
      description: Returns records from TBRMEMO. Also included are tbbdetc_dcat_code and tbbdetc_type_ind.
      parameters:
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter condition should be provided as a solitary URL query parameter. It is required to be a URL encoded JSON representation of the properties mentioned in the query request schema. Limit and Offset are the only supported additional parameters on the URL. The version v1.0.0 the filter criteria will support the effectiveDate (effectiveStartDate and effectiveEndDate), expirationDate (expirationStartDate and expirationEndDate) and releaseDate (releaseStartDate and releaseEndDate) .For instance:- criteria={"termCode":"202310","effectiveStartDate":"2020-01-01","effectiveEndDate":"2029-01-01","expirationStartDate":"2020-01-01","expirationEndDate":"2029-01-01","releaseStartDate":"2020-01-01","releaseEndDate":"2029-01-01"}
          required: false
          schema:
            type: string
            $ref: '#/components/schemas/student-account-memos_query_request'
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response.
              required: true
              schema:
                type: string
            X-Content-Restricted:
              description: If the resource is not a full representation of the resource, partial is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.3.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/student-account-memos_get_response'
        '400':
          description: Failure. Bad Request. The server cannot or will not process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '401':
          description: Failure. Unauthorized
        '403':
          description: Failure. Forbidden. The user does not have the necessary permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '404':
          description: Failure. Not Found. Cannot map the URI to a resource.
        '405':
          description: Failure. Method Not Allowed. The client tried to use an HTTP method that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '406':
          description: Failure. Not Acceptable. Not able to generate any of the client’s preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
        '500':
          description: Server error, unexpected configuration or data
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - BasicAuth: []
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_ACCOUNT_MEMOS
components:
  schemas:
    student-account-memos_get_response:
      type: object
      properties:
        bannerId:
          title: Banner ID
          type: string
          description: "This field defines the identification number used to access person on-line."
        termCode:
          title: Term Code
          type: string
          description: "This field defines the identification number used to access person on-line."
        aidyCode:
          title: Aid Year
          type: string
          description: "The aid year associated with the Financial Aid memo disbursement."
        amount:
          title: Amount
          type: integer
          description: "Amount of the memo."
        billingInd:
          title: Billing Indicator
          type: string
          description: "Memo may be included when billing (Y/N)."
        createUser:
          title: Create User
          type: string
          description: "User which created the memo."
        crossRefId:
          title: Cross Reference ID
          type: string
          description: "Cross Reference internal identification number for third party memos.  For the third party account, refers to the associated student.  For the student account, refers to the third party."
        crossRefNumber:
          title: Cross Reference Number
          type: string
          description: "Cross Reference Number for third party credits (contract number when source code is C), exemption credits (exemption number when source code is E), or deposits released (deposit transaction number when source code is D)."
        dcatCode:
          title: Category Code
          type: string 
          description: "This field identifies the catagory of the detail code.  Detail codes can be group for reporting purposes into catagories like cash, tuition, etc."
        description:
          title: Description
          type: string 
          description: "Free-format description associated with the memo.  Default value comes from the Detail Code description (TBBDETC)."
        detailCode:
          title: Detail Code
          type: string
          description: "Detail code associated with the memo, valid in TBBDETC."
        effectiveDate:
          title: Effective Date
          type: string
          description: "Date the memo was created or released on account."
        expirationDate:
          title: Expiration Date
          type: string
          description: "Date after which the memo will no longer appear on bill, will no longer be included in memo balance calculations, and after which it may not be released onto an account."
        entryDate:
          title: Entry Date
          type: string
          description: "Date the memo was created."
        period:
          title: Period
          type: string
          description: "The enrollment period code for the.Financial Aid memo."
        releaseDate:
          title: Release Date
          type: string
          description: "Release date"
        sourceCode:
          title: Source Code
          type: string
          description: "Source of the memo when created, for example (F)inancial Aid, (C)ontract, (E)xemption, (D)eposit, or T (default) if user entered, valid in TTVSRCE."
        transactionNumber:
          title: Transaction Number
          type: integer
          description: "Transaction number (one-up within entity) of the memo."
        typeIndicator:
          title: Type Indicator
          type: string
          description: "This field indicates the whether the detail code is a charge or a payment.  Valid values are: C - Charge, P - Payment."
