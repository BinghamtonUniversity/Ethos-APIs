openapi: 3.0.0
info:
  title: deposit-details
  description: This API is used to retrieve non-student deposit information and update deposit information in TFADETL page, TBRDEPO table. The following parameters—detailCodePayment, addressTypeCode, amount, effectiveDate (effectiveStartDate and effectiveEndDate), expirationDate (expirationStartDate and expirationEndDate), and releaseDate (releaseStartDate and releaseEndDate)—can either be included within the criteria object or passed directly as individual parameters.
  version: 2.3.0
  x-api-type: erp
  x-release-status: ga
  x-source-name: TBRDEPO
  x-source-title: Deposit Details
  x-source-system: banner
  x-source-domain: Student
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/deposit-details:
    get:
      tags:
        - deposit-details
      summary: Provide the list of non-student deposits detail.
      description: Provide the list of non-student deposits detail.
      parameters:
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set. The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter condition should be provided as a solitary URL query
            parameter. It is required to be a URL encoded JSON representation of
            the properties mentioned in the query request schema. Limit and
            Offset are the only supported additional parameters on the URL. The
            version v2.3.0 the filter criteria will support the
            detailCodePayment, amount, addressTypeCode,effectiveDate
            (effectiveStartDate and effectiveEndDate), expirationDate
            (expirationStartDate and expirationEndDate) and releaseDate
            (releaseStartDate and releaseEndDate) .For instance:- criteria=
            {"detailCodePayment":"DCHK", "amount":"500", "addressTypeCode":"PR"
            "effectiveStartDate":"2020-01-01", "effectiveEndDate":"2029-01-01",
            "expirationStartDate":"2020-01-01",
            "expirationEndDate":"2029-01-01", "releaseStartDate":"2020-01-01",
            "releaseEndDate":"2029-01-01" }
          required: false
          schema:
            type: string
        - name: detailCodePayment
          in: query
          description: The detail code payment will be filtered from the result.
          required: false
          schema:
            type: string
        - name: amount
          in: query
          description: The amount will be filtered from the result.
          required: false
          schema:
            type: number
        - name: expirationStartDate
          in: query
          description: The expiration Start date will be filtered from the result.
          required: false
          schema:
            type: string
        - name: expirationEndDate
          in: query
          description: The expiration End date will be filtered from the result.
          required: false
          schema:
            type: string
        - name: releaseStartDate
          in: query
          description: The release Start date will be filtered from the result.
          required: false
          schema:
            type: string
        - name: releaseEndDate
          in: query
          description: The release End date will be filtered from the result.
          required: false
          schema:
            type: string
        - name: effectiveStartDate
          in: query
          description: The effective Start date will be filtered from the result.
          required: false
          schema:
            type: string
        - name: effectiveEndDate
          in: query
          description: The effective End date will be filtered from the result.
          required: false
          schema:
            type: string
        - name: addressTypeCode
          in: query
          description: The address type code will be filtered from the result.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-TypeX-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v2.3.0+json:
              schema:
                type: array
