components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    deposit-details-2.3.0_response:
      title: Deposit Details (Response)
      type: object
      properties:
        accountFeedIndicator:
          title: ACCOUNT FEED INDICATOR
          description: The status of the deposit in the accounting feed.  Valid values are Y - Feed transaction, F - Transaction fed.
          type: string
        addressTypeCode:
          title: ADDRESS TYPE
          description: In combination with ADDRESS TYPE SEQUENCE NUMBER, the address associated with this deposit for non-student transactions.
          type: string
        addressTypeCodeSequenceNumber:
          title: ADDRESS TYPE SEQUENCE NUMBER
          description: In combination with ADDRESS TYPE, the address associated with this deposit for non-student transactions.
          type: number
        amount:
          title: AMOUNT
          description: Amount of the deposit.
          type: number
        automaticReleaseIndicator:
          title: AUTOMATIC RELEASE INDICATOR
          description: Indicates whether the deposit should be automatically released to the account as of the release date.  Valid values are Y - Automatic release, N - Manual release.
          type: string
        bannerId:
          title: BANNER ID
          description: Banner ID is the identification number used to access person.
          type: string
        cashierEndDate:
          title: CASHIER END DATE
          description: End date and time of the cashiering session for this transaction.
          type: string
        createSource:
          title: CREATE SOURCE
          description: Source system that initially created the record.
          type: string
        currencyCode:
          title: CURRENCY CODE
          description: Foreign currency code used when creating a deposit.
          type: string
        dataOrigin:
          title: DATA ORIGIN
          description: Source system that last created or updated the data.
          type: string
        description:
          title: DESCRIPTION
          description: Free-form description associated with the deposit. Default value comes from the Detail Code description.
          type: string
        detailCodeDeposit:
          title: DETAIL CODE DEPOSIT
          description: Detail code deposit identifies the detail code associated with every charge and payment that can be entered onto an account.
          type: string
        detailCodePayment:
          title: DETAIL CODE PAYMENT
          description: Detail code payment is associated with the creation of a new deposit, indicating payment media of check, cash, charge, and so on.
          type: string
        documentNumber:
          title: DOCUMENT NUMBER
          description: Document number that references a source document for the deposit.
          type: string
        effectiveDate:
          title: EFFECTIVE DATE
          description: Effective date of the deposit.  Default value is the date the deposit was entered. without regard to the minimum.
          type: string
        entryDate:
          title: ENTRY DATE
          description: Entry date and time of the deposit, when initially created.
          type: string
        expirationDate:
          title: EXPIRATION DATE
          description: Expiration date of the deposit, after which it may be released to the receivable account without regard to the minimum.
          type: string
        feedDate:
          title: FEED DATE
          description: Date this transaction was fed to the finance system.
          type: string
        feedDocumentCode:
          title: FEED DOCUMENT CODE
          description: Document code used to feed this transaction to the finance system.
          type: string
        foreignAmount:
          title: FOREIGN AMOUNT
          description: The amount of the deposit stated in foreign currency.
          type: number
        lastModified:
          title: LAST MODIFIED
          description: The last date this record was created or updated.
          type: string
        lastModifiedBy:
          title: LAST MODIFIED BY
          description: Last modified by column for TBRDEPO.
          type: string
        minimumAmount:
          title: MINIMUM AMOUNT
          description: Minimum amount that must remain as a deposit balance and not be released until the expiration date has passed.
          type: number
        receiptNumber:
          title: RECEIPT NUMBER
          description: Receipt number for the deposit. Generated one up number automatically when payment detail code receipt indicator is checked; otherwise not generated.
          type: number
        releaseDate:
          title: RELEASE DATE
          description: Earliest date when the deposit may be released either automatically or manually. If this field is blank, the deposit may be released at any time.
          type: string
        sessionNumber:
          title: SESSION NUMBER
          description: Cashier session number in which this transaction was posted.
          type: number
        term:
          title: TERM CODE
