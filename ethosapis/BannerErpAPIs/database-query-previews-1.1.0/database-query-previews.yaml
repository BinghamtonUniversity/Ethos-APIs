            PROJECTION: null
            OBJECT_ALIAS: null
            OPERATION: SELECT STATEMENT
            OBJECT_NAME: null
            DEPTH: 0
            PARTITION_STOP: null
    database-query-previews-execution-query-example-1.0.0:
      summary: Database Query Previews Execution Query example
      value:
        executionQuery: SELECT SPRIDEN.SPRIDEN_CHANGE_IND AS changeInd,SPRIDEN.SPRIDEN_FIRST_NAME AS firstName,SPRIDEN.SPRIDEN_ID AS id,SPRIDEN.SPRIDEN_LAST_NAME AS lastName,SPRIDEN.SPRIDEN_MI AS mi,modelexample.GORGUID_GUID AS guid FROM SPRIDEN inner join  (SELECT GORGUID.GORGUID_DOMAIN_KEY,GORGUID.GORGUID_GUID,GORGUID.GORGUID_LDM_NAME FROM GORGUID)modelexample on TO_CHAR(SPRIDEN.SPRIDEN_PIDM) = TO_CHAR(modelexample.GORGUID_DOMAIN_KEY) WHERE modelexample.GORGUID_LDM_NAME = 'persons'
