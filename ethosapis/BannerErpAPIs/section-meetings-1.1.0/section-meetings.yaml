components:
  schemas:
    section-meetings-1.1.0_post_request:
      type: object
      properties:
        term:
          title: Term
          maxLength: 6
          type: string
          description: Term associated with the section.
          x-lineageReferenceObject: SSRMEET_TERM_CODE
          x-lineageLookupReferenceObject: STVTERM
          example: 202201              
        crn:
          title: CRN
          maxLength: 5
          type: string
          description: Course reference number of the section.
          x-lineageReferenceObject: SSRMEET_CRN
          example: 1001             
        beginTime:
          title: Begin Time
          maxLength: 4
          type: string
          description: Begin time of the meeting.
          x-lineageReferenceObject: SSRMEET_BEGIN_TIME
          example: 0900             
        endTime:
          title: End Time
          maxLength: 4
          type: string
          description: End time of the meeting.
          x-lineageReferenceObject: SSRMEET_END_TIME
          example: 1000    
        building:
          title: Building
          maxLength: 6
          type: string
          description: The building where the meeting is scheduled.        
          x-lineageReferenceObject: SSRMEET_BLDG_CODE
          x-lineageLookupReferenceObject: STVBLDG
          example: NURS  
        room:
          title: Room
          maxLength: 10
          type: string
          description: The room where the meeting is scheduled.
          x-lineageReferenceObject: SSRMEET_ROOM_CODE
          x-lineageLookupReferenceObject: SLARDEF
          example: 208    
        startOn:
          title: Meeting Start Date
          type: string
          format: date
          description: The starting date of the section meeting.
          x-lineageReferenceObject: SSRMEET_START_DATE
          example: 2021-08-15  
        endOn:
          title: Meeting End Date
          type: string
          format: date
          description: The ending date of the section meeting.
          x-lineageReferenceObject: SSRMEET_END_DATE
          example: 2021-12-15 
        session:
          title: Session Indicator
          maxLength: 2
          type: string
          description: Sessions used to identify a unique combination of meeting times. If not submitted a value of 01 will be
            defaulted.
          x-lineageReferenceObject: SSRMEET_CATAGORY
          example: 01    
        meetsOnSunday:
          title: Meets on Sunday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_SUN_DAY
          example: false
        meetsOnMonday:
          title: Meets on Monday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_MON_DAY
          example: true  
        meetsOnTuesday:
          title: Meets on Tuesday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_TUE_DAY
          example: false
        meetsOnWednesday:
          title: Meets on Wednesday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_WED_DAY
          example: true   
        meetsOnThursday:
          title: Meets on Thursday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_THU_DAY
          example: false
        meetsOnFriday:
          title: Meets on Friday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_FRI_DAY
          example: true   
        meetsOnSaturday:
          title: Meets on Saturday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_SAT_DAY
          example: false
        scheduleType:
          title: Schedule Type
          maxLength: 3
          type: string
          description: Schedule type for the meeting. If not submitted the schedule type of the section will be defaulted.
          x-lineageReferenceObject: SSRMEET_SCHD_CODE
          x-lineageLookupReferenceObject: STVSCHD
          example: CLA 
        overrideConflict:
          title: Section meeting conflict override indicator
          maxLength: 1
          type: string
          description: Indicates an override of time and/or room conflicts among meetings.  Values of T (time), R (room), or O (both time and room) specifies the type of conflict override.
          x-lineageReferenceObject: SSRMEET_OVER_RIDE
          example: T      
        sessionCreditHours:
          title: Session Credit Hours
          maxLength: 7
          type: number
          description: Session credit hours for the meeting. Total credit hours across all meetings may not exceed the section credit hours.
          x-lineageReferenceObject: SSRMEET_CREDIT_HR_SESS
          example: 1  
        hoursPerWeek:
          title: Meeting Hours Per Week
          maxLength: 5
          type: number
          description: Calculated meeting hours per week. Value may be manually overriden.
          x-lineageReferenceObject: SSRMEET_HRS_WEEK
          example: 5  
        schedulingInterfaceStatus:
          title: Scheduling Interface Status
          maxLength: 3
          type: string
          description: Schedule status code for use with Scheduling Tool Interface.
          x-lineageReferenceObject: SSRMEET_SCHS_CODE
          x-lineageLookupReferenceObject: GTVSCHS
          example: ASM   
        meetingType:
          title: Meeting Type
          maxLength: 4
          type: string
          description: If not submitted a default of CLAS will be used.
          x-lineageReferenceObject: SSRMEET_MTYP_CODE
          x-lineageLookupReferenceObject: GTVMTYP
          example: CLAS
        breakMinutesIncluded:
          title: Break Minutes Included
          type: boolean
          description: Indicates breaks are included in contact hours. CALBSTU restricted property.
          x-lineageReferenceObject: SSRMEET_BREAK_IND
          example: false
        breakMinutesAdjustment:
          title: Break Minutes Adjustment
          maxLength: 3
          type: number
          description: Number of Daily Break Minutes to be included in the contact hours calculation. CALBSTU restricted property.
          x-lineageReferenceObject: SSRMEET_BREAK_MIN_ADJUST
          example: null
        hoursPerDay:
          title: Hours Per Day
          maxLength: 5
          type: number
          description: Section meeting hours per day. CALBSTU restricted property.
          x-lineageReferenceObject: SSRMEET_HRS_DAY
          example: 1
        hoursPerDayManualOverrideAllowed:
          title: Hours Per Day Override Allowed
          maxLength: 1
          type: boolean
          description: Indicates that hours per day or hours per week calculated fields can be overridden by a manual entry. CALBSTU restricted property.
          x-lineageReferenceObject: SSRMEET_HRS_OVER_IND
          example: true
        totalHours:
          title: Total Meeting Hours
          maxLength: 7
          type: number
          description: Calculated unless the hoursPerDayManualOverrideAllowed is true,
            then it is manually entered. CALBSTU restricted property.
          x-lineageReferenceObject: SSRMEET_HRS_TOTAL
          example: 5
        partitionPreferences:
          title: Partition Preferences
          type: array
          items:
            type: object  
            required:
            - partition
            - preferenceNumber           
            properties:
              partition:
                title: Partition Code
                maxLength: 7
                type: string
                description: "Partition code for the schedule meeting entry."
                x-lineageReferenceObject: SSRMPRT_PARS_CODE
                x-lineageLookupReferenceObject: GTVPARS
                example: THREE
              preferenceNumber: 
                title: Partition Preference Number
                maxLength: 2
                type: number
                description: "Preference number for the partition."
                x-lineageReferenceObject: SSRMPRT_PARS_PREF_NUMBER
                example: 1
        roomAttributePreferences:
          title: Room Attribute Preferences
          type: array
          items:
            type: object 
            required:
            - roomAttribute
            - preferenceNumber              
            properties:
              roomAttribute:
                title: Room Attribute Code
                maxLength: 4
                type: string
                description: "Building/room attribute code for the schedule meeting entry."
                x-lineageReferenceObject: SSRMRDF_RDEF_CODE
                x-lineageLookupReferenceObject: STVRDEF
                example: AUD
              preferenceNumber: 
                title: Room Attribute Preference Number
                maxLength: 2
                type: number
                description: "Preference number for the room attribute."
                x-lineageReferenceObject: SSRMRDF_RDEF_PREF_NUMBER
                example: 1                                        
      required:
        - term
        - crn
        - startOn
        - endOn
    section-meetings-1.1.0_put_request:
      type: object
      properties:
        id:
          title: Meeting Row ID
          maxLength: 19
          type: number
          format: integer
          description: Unique key for the meeting row
          x-lineageReferenceObject: SSRMEET_SURROGATE_ID
          example: 97
        beginTime:
          title: Begin Time
          maxLength: 4
          type: string
          description: Begin time of the meeting
          x-lineageReferenceObject: SSRMEET_BEGIN_TIME
          example: 0900        
        endTime:
          title: End Time
          maxLength: 4
          type: string
          description: End time of the meeting
          x-lineageReferenceObject: SSRMEET_END_TIME
          example: 1000    
        building:
