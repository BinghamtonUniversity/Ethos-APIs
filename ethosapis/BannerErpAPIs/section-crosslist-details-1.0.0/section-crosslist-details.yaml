openapi: 3.0.0
info:
  title: Section Crosslist Details
  description: 
    
    The Section Crosslist Details API is used to create or maintain crosslist section enrollment and 
    crosslist section details as seen on the SSAXLST administrative page.  


    In addition, the API supports the option to post section crosslist adjustments in asynchronous batches.

      
  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SSAXLST
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
