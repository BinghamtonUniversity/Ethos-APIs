openapi: 3.0.0
info:
  title: proxy-charges-payments
  description: This API is used to retrieve, update and insert to the TBRACCD table. This API allows an API USER to post a transaction on behalf of a “user” who has a SPRIDEN ID and has Banner security access to post the transaction. The “user” field requires either the SPRIDEN ID or the Principal User ID from GOAEACC. The user is case sensitive and must match the record in Banner.
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: TBRACCD
  x-source-domain: Student
  x-source-title: Student Account Detail
  x-source-system: banner
  x-api-type: erp
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/proxy-charges-payments/{id}:  
    get:
      tags:
        - proxy-charges-payments
      summary: Return resources from TBRACCD
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/proxy-charges-payments-1.0.0_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: API_PROXY_CHARGES_PAYMENTS
    put:
      tags:
        - proxy-charges-payments
      summary: Updates an existing resource in TBRACCD

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/proxy-charges-payments-1.0.0_put_request"
            example:
              transNumber: 12
              documentNumber: 2
              desc: Refund Code - Manuals
              origChgInd: Y
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/proxy-charges-payments-1.0.0_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: API_PROXY_CHARGES_PAYMENTS
  /api/proxy-charges-payments:          
    post:
      tags:
        - proxy-charges-payments
      summary: Creates a new resource in TBRACCD
      parameters: []
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/proxy-charges-payments-1.0.0_post_request"
            examples:  
              example1:
                summary: Using termCode.
                value:
                  amount: "3"
                  srceCode: T
                  overrideHold: Y
                  acctFeedInd: Y
                  transDate: "2021-05-20"
                  id: A00022293
                  detailCode: T101
                  effectiveDate: "2021-05-20"
                  user: "user"
                  termCode: "201010"
              example2:
                summary: Using Address.
                value:
                  amount: "3"
                  srceCode: T
                  acctFeedInd: Y
                  transDate: "2021-05-20"
                  id: A00022293
                  detailCode: T101
                  effectiveDate: "2021-05-20"
                  user: "user"
                  atypCode: "BU"
                  atypSeqno: "3"
                  rate: "1"
                  units: "3"                
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/proxy-charges-payments-1.0.0_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: API_PROXY_CHARGES_PAYMENTS
