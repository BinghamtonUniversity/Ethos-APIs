openapi: 3.0.0
info:
  title: Term Enrollments
  description: "A bulk extraction of student registration datasets with respect to
    Term Code and other filters used as inputs. Data mappings include: course
    sections, academic history final grade, curricula program  and fields of
    study,  student emails, alternate student Id, and telephone and address
    details"
  version: 1.1.0
  x-source-domain: Student
  x-source-name: SFBETRM
  x-source-title: null
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/term-enrollments:
    get:
      tags:
        - term-enrollments
      summary: Return student information along with registration details.
      description: Return student information along with registration details. Data is
        extracted from SFBETRM, SFRSTCR, SFRENSP, SSBSECT, SPRIDEN, SPBPERS,
        SCBCRSE, SOVCLTR, SORLFOS, GOREMAL, SMRPRLE, SPRADDR, SPRTELE, STVNATN,
        SHRTCKN, and SHRTCKG.
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Term Code (Required) 


            Returns all records for the termCode passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122"} 

            ```            

            ### Enrollment Status Code 


            Returns all records for the enrollmentStatusCode passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122",
            "enrollmentStatusCode":"EL"} 

            ```

            ### Student Id


            Returns all records for the studentId passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122",
            "studentId":"331314209"} 

            ```

            ### Course Registration Status Code 


            Returns all records for the courseRegistrationStatusCode passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122",
            "sectionRegistrations": {"$or": [{"courseRegistrationStatusCode":
            "RW"}, {"courseRegistrationStatusCode": "EL"}]}}

            ```            

            ### Course Reference Number 


            Returns all records for the courseReferenceNumber passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122",
            "sectionRegistrations": {"$or": [{"courseReferenceNumber": "2007"},
            {"courseReferenceNumber": "10012"}]}} 

            ```

            ### Course Number 


            Returns all records for the courseNumber passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122",
            "sectionRegistrations": {"$or": [{"courseNumber":
            "1401"},  {"courseNumber": "2010"}]}}

            ```            

            ### Subject Code 


            Returns all records for the subjectCode passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122",
            "sectionRegistrations": {"$or": [{"subjectCode": "BIOL"},
            {"subjectCode": "ANTH"}]}}

            ```            

            ### Part of Term Code 


            Returns all records for the partOfTermCode passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122",
            "sectionRegistrations": {"$or": [{"partOfTermCode": "1"},
            {"partOfTermCode": "2"}]}}

            ```

            ### Section Sequence Number 


            Returns all records for the sectionSequenceNumber passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122",
            "sectionRegistrations": {"$or": [{"sectionSequenceNumber": "2"},
            {"sectionSequenceNumber": "001"}]}}

            ```            

            ### Email Code 


            Returns all records for the emailCode passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122", "studentDetails":
            {"emails": {"emailCode": "0001"}}}

            ```            

            ### Email Preferred Indicator


            Returns all records for the emailPreferredInd passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122", "studentDetails":
            {"emails": {"emailPreferredInd": true}}} 

            ```

            ### Telephone Code 


            Returns all records for the telephoneCode passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122", "studentDetails" :
            {"telephones" : {"$or" : [{"telephoneCode": "MA"}, {"telephoneCode":
            "PR"}]}}}

            ```            

            ### Address Type 


            Returns all records for the addressType passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122", "studentDetails" :
            {"addresses" : {"$or" : [{"addressType": "BB"}, {"addressType":
            "HQ"}]}}}

            ```            

            ### Program 


            Returns all records for the program passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122", "curricula" :
            {"$or" : [{"program": "BA-ANTHRO"}, {"program" :  "BSCE"}]}}

            ```

            ### Level Code 


            Returns all records for the levelCode passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122", "curricula" :
            {"$or" : [{"levelCode" :  "CR"}, {"levelCode" : "US"}]}}

            ```

            ### Field of Study Type 


            Returns all records for the fieldOfStudyType passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122", "curricula" :
            {"fieldsOfStudy" : {"$or": [{"fieldOfStudyType":"MAJOR"},
            {"fieldOfStudyType":"MINOR"}]}}}

            ``` 
            
            ### Course Identifier Display 


            Returns all records for the courseIdentifierDisplay passed. 

            ```

            /term-enrollments?criteria={"termCode":"202122",
            "sectionRegistrations": {"$or": [{"courseIdentifierDisplay":
            "1401"},  {"courseIdentifierDisplay": "2010"}]}}
            
            ```
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/term-enrollments-1.1.0_get_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the clientâ€™s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "500":
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      x-method-permissions: API_TERM_ENROLLMENTS
