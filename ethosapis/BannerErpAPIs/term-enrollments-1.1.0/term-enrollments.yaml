components:
  schemas:
    term-enrollments-1.1.0_get_response:
      type: object
      properties:
        curricula:
          title: Curricula
          type: array
          items:
            type: object
            properties:
              campusCode:
                title: Campus Code
                description: Campus code of the curriculum.
                maxLength: 3
                type: string
                x-lineageReferenceObject: SOVLCUR_CAMP_CODE
              collegeCode:
                title: College Code
                description: College code of the curriculum.
                maxLength: 2
                type: string
                x-lineageReferenceObject: SOVLCUR_COLL_CODE
              degreeCode:
                title: Degree Code
                description: Degree code of the curriculum.
                maxLength: 6
                type: string
                x-lineageReferenceObject: SOVLCUR_DEGC_CODE
              fieldsOfStudy:
                title: Fields of Study
                type: array
                items:
                  type: object
                  properties:
                    departmentCode:
                      title: Department Code
                      description: Department code.
                      type: string
                      x-lineageReferenceObject: SOVLFOS_DEPT_CODE
                    fieldOfStudyType:
                      title: Field Of Study Type
                      description: Field of study type code, examples are MAJOR, MINOR, CONCENTRATION.
                      maxLength: 15
                      type: string
                      x-lineageReferenceObject: SORLFOS_LFST_CODE
                    fieldOfStudyCode:
                      title: Field Of Study Code
                      description: Field of study code.
                      maxLength: 4
                      type: string
                      x-lineageReferenceObject: SORLFOS_MAJR_CODE
                    majorMinorConcentrationAttach:
                      title: Major Minor Concentration Attached
                      description: Major code to which the concentration is attached.
                      type: string
                      x-lineageReferenceObject: SOVLFOS_MAJR_CODE_ATTACH
                    priorityNo:
                      title: Priority No
                      description: Priority number, or ranking of the field of study.
                      maxLength: 4
                      type: integer
                      x-lineageReferenceObject: SORLFOS_PRIORITY_NO
              keyRecordSequenceNumber:
                title: Key Record Sequence Number
                description: One up number to define the curriculum row.
                maxLength: 4
                type: number
                x-lineageReferenceObject: SOVLCUR_KEY_SEQNO
              levelCode:
                title: Level Code
                description: Level code of the curriculum.
                maxLength: 2
                type: string
                x-lineageReferenceObject: SOVLCUR_LEVL_CODE
              priorityNumber:
                title: Priority Number
                description: Priority of the curriculum.
                maxLength: 4
                type: number
                x-lineageReferenceObject: SOVLCUR_PRIORITY_NO
              program:
                title: Program
                description: Program code of the curriculum.
                maxLength: 12
                type: string
                x-lineageReferenceObject: SOVLCUR_PROGRAM
              programDesc:
                title: Program Description
                description: Program description which further describes program code.
                maxLength: 30
                type: string
                x-lineageReferenceObject: SMRPRLE_PROGRAM_DESC
        enrollmentStatusCode:
          title: Enrollment Status Code
          description: The student enrollment status for the term.
          maxLength: 2
          type: string
          x-lineageReferenceObject: SFBETRM_ESTS_CODE
        enrollmentStatusIncludedInHeadcount:
          title: Enrollment Status Included In Headcount
          description: Identifies whether the student enrollment status is included in the
            term head count.
          maxLength: 1
          type: boolean
        enrollmentTimeStatus:
          title: Enrollment Time Status
          description: The latest time status for the enrollment term.
          maxLength: 2
          type: string
          x-lineageReferenceObject: SFBETRM_TMST_CODE
        id:
          title: ID
          description: Unique key for the enrollment term record.
          maxLength: 19
          type: number
          x-lineageReferenceObject: SFBETRM_SURROGATE_ID
        enrollmentStudyPaths:
          title: Enrollment Study Paths
          type: array
          items:
            type: object
            properties:
              studyPath:
                title: Study Path
                description: Study path sequence number.
                maxLength: 2
                type: number
                x-lineageReferenceObject: SFRENSP_KEY_SEQNO
              enrollmentStatus:
                title: Study Path Enrollment Status
                description: Study path enrollment status for the term.
                maxLength: 2
                type: string
                x-lineageReferenceObject: SFRENSP_ESTS_CODE
        sectionRegistrations:
          title: Section Registrations
          type: array
          items:
            type: object
            properties:
              addedOn:
                title: Added On
                description: The add date of the registrant in the section.
                maxLength: 11
                type: string
                format: date
                x-lineageReferenceObject: SFRSTCR_ADD_DATE
              billingHour:
                title: Billing Hour
                description: The billing hours associated with the section.
                maxLength: 7
                type: number
                x-lineageReferenceObject: SFRSTCR_BILL_HR
              campusCode:
                title: Campus Code
                description: The campus on which the section is scheduled.
                maxLength: 3
                type: string
                x-lineageReferenceObject: SSBSECT_CAMP_CODE
              courseNumber:
                title: Course Number
                description: The course number.
                maxLength: 5
                type: string
                x-lineageReferenceObject: SSBSECT_CRSE_NUMB
              courseReferenceNumber:
                title: Course Reference Number
                description: The course reference number (CRN) associated with the class
                  section.
                maxLength: 5
                type: string
                x-lineageReferenceObject: SFRSTCR_CRN
              courseRegistrationStatusCode:
                title: Course Registration Status Code
                description: The student's course registration status associated with this
                  section.
                maxLength: 2
                type: string
                x-lineageReferenceObject: SFRSTCR_RSTS_CODE
              courseRegistrationStatusDate:
                title: Course Registration Status Date
                description: The date associated with the course registration status of the
                  section.
                maxLength: 11
                type: string
                format: date
                x-lineageReferenceObject: SFRSTCR_RSTS_DATE
              courseTitle:
                title: Course Title
                description: The title of the course section.
                maxLength: 30
                type: string
                x-lineageReferenceObject: SCBCRSE_TITLE
              creditHour:
                title: Credit Hour
                description: The credit hours associated with the section.
                maxLength: 7
                type: number
                x-lineageReferenceObject: SFRSTCR_CREDIT_HR
              finalGrade:
                title: Final Grade
                description: Institutional Course Section Final Grade.
                maxLength: 6
                type: string
                x-lineageReferenceObject: SHRTCKG_GRADE_CODE_FINAL
              gradeCode:
                title: Grade Code
                description: The grade submitted in registration for the section.
                maxLength: 6
                type: string
                x-lineageReferenceObject: SFRSTCR_GRDE_CODE
              gradeDate:
                title: Grade Date
                description: The date associated with the grade submission in registration.
                maxLength: 11
                type: string
                format: date
                x-lineageReferenceObject: SFRSTCR_GRDE_DATE
              partOfTermCode:
                title: Part Of Term Code
                description: The part-of-term in which the section is offered.
                maxLength: 3
                type: string
                x-lineageReferenceObject: SSBSECT_PTRM_CODE
              sectionCourseTitle:
                title: Section Course Title
                description: The title of the course section.
                maxLength: 30
                type: string
                x-lineageReferenceObject: SSBSECT_CRSE_TITLE
              sectionSequenceNumber:
                title: Section Sequence Number
                description: The section sequence number of the course section.
                maxLength: 3
                type: string
                x-lineageReferenceObject: SSBSECT_SEQ_NUMB
              subjectCode:
                title: Subject Code
                description: Subject code of the course section.
                maxLength: 4
                type: string
                x-lineageReferenceObject: SSBSECT_SUBJ_CODE
              studyPath:
                title: Study path
                description: The study path under which the section is registered.
                maxLength: 2
                type: number
                x-lineageReferenceObject: SFRSTCR_STSP_KEY_SEQUENCE
              courseAlias:
                title: Course Alias
                maxLength: 20
                type: string
                description: Additional identifier value associated with the course, example (Course Alias or Common Course Number).
                x-lineagereferenceobject: COURSE_ALIAS
              courseIdentifierDisplay:
                type: string
                maxLength: 20
                description: System-managed course identifier that should be displayed for the course (e.g., Course Number, Course Alias, or Common Course Number).
                x-lineagereferenceobject: COURSE_IDENTIFIER_DISPLAY
        studentDetails:
          title: Student Details
          type: object
          properties:
            addresses:
              title: Student Addresses
              type: array
              items:
                type: object
                properties:
                  nationCode:
                    title: Nation Code
                    description: The nation/country code associated with the address.
                    maxLength: 5
                    type: string
                    x-lineageReferenceObject: SPRADDR_NATN_CODE
                  nation:
                    title: Nation Description
                    description: The nation/country code description.
                    maxLength: 30
                    type: string
                    x-lineageReferenceObject: STVNATN_NATION
                  houseNumber:
                    title: House Number
                    description: Building or lot number on a street or in an area.
                    maxLength: 10
                    type: string
                    x-lineageReferenceObject: SPRADDR_HOUSE_NUMBER
                  city:
                    title: City
                    description: The city associated with the address.
                    maxLength: 50
                    type: string
                    x-lineageReferenceObject: SPRADDR_CITY
                  stateCode:
                    title: State Code
                    description: The state associated with the address.
                    maxLength: 3
                    type: string
                    x-lineageReferenceObject: SPRADDR_STAT_CODE
                  postalCode:
                    title: Postal Code
                    description: The postal or zip code associated with the address.
                    maxLength: 30
                    type: string
                    x-lineageReferenceObject: SPRADDR_ZIP
                  streetLine1:
                    title: Street Line 1
                    description: The first line of the address.
                    maxLength: 75
                    type: string
                    x-lineageReferenceObject: SPRADDR_STREET_LINE1
                  streetLine2:
                    title: Street Line 2
                    description: The second line of the address.
                    maxLength: 75
                    type: string
                    x-lineageReferenceObject: SPRADDR_STREET_LINE2
                  streetLine3:
                    title: Street Line 3
                    description: The third line of the address.
                    maxLength: 75
                    type: string
                    x-lineageReferenceObject: SPRADDR_STREET_LINE3
                  streetLine4:
                    title: Street Line 4
                    description: The fourth line of the address.
                    maxLength: 75
                    type: string
                    x-lineageReferenceObject: SPRADDR_STREET_LINE4
            alternateIdentifications:
              title: Alternate Person Identifications
              type: array
              items:
                type: object
                properties:
                  alternateID:
                    title: Alternate Identification Number
                    description: Alternate identification number for a person.
                    maxLength: 9
                    type: string
                    x-lineageReferenceObject: SPRIDEN_ID
                  alternateIDCreatedOn:
                    title: Alternate Identification Created On
                    description: Alternate Idenification record creation date.
                    maxLength: 11
                    type: string
                    format: date
                    x-lineageReferenceObject: SPRIDEN_CREATE_DATE
                  alternateIDNameType:
                    title: Alternate Identification Name Type
                    description: The code that represents the name type of the alternate
                      identification.
                    maxLength: 4
                    type: string
                    x-lineageReferenceObject: SPRIDEN_NTYP_CODE
            birthDate:
              title: Birth Date
              description: The person's birth date.
              maxLength: 11
              type: string
              format: date
              x-lineageReferenceObject: SPBPERS_BIRTH_DATE
            confidentialInd:
              title: Confidential Indicator
              description: Identifies if a person record is confidential. Y = confidential.
              maxLength: 1
              type: string
              x-lineageReferenceObject: SPBPERS_CONFID_IND
            emails:
              title: Emails
              type: array
              items:
                type: object
                properties:
                  emailCode:
                    title: Email Code
                    description: The type of e-mail address.
                    maxLength: 4
                    type: string
                    x-lineageReferenceObject: GOREMAL_EMAL_CODE
                  email:
                    title: Email
                    description: The e-mail address.
                    maxLength: 128
                    type: string
                    x-lineageReferenceObject: GOREMAL_EMAIL_ADDRESS
                  emailPreferredInd:
                    title: Email Preferred Indicator
                    description: Indicates if the e-mail address is the preferred contact address.
                    maxLength: 1
                    type: boolean
                    x-lineageReferenceObject: GOREMAL_PREFERRED_IND
            ethnicCode:
              title: Ethnic Code
              description: The ethnic code for the person.
              maxLength: 2
              type: string
              x-lineageReferenceObject: SPBPERS_ETHN_CODE
            externalUser:
              title: External User
              description: Value which may be passed to partner systems as a login ID and/or
                email ID.
              maxLength: 30
              type: string
              x-lineageReferenceObject: GOBTPAC_EXTERNAL_USER
            firstName:
              title: First Name
              description: Th first name of the person.
              maxLength: 60
              type: string
              x-lineageReferenceObject: SPRIDEN_FIRST_NAME
            gender:
              title: Gender
              description: "The gender of the person. Valid values are: M - Male, F - Female,
                N - Unknown."
              maxLength: 1
              type: string
              x-lineageReferenceObject: SPBPERS_SEX
            lastName:
              title: Last Name
              description: Th last name of the person.
              maxLength: 60
              type: string
              x-lineageReferenceObject: SPRIDEN_LAST_NAME
