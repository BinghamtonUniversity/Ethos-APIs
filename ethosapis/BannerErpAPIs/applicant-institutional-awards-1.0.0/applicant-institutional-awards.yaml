    post:
      summary: Create a new award record in KVRAWRD table.
      description: |
        <p>
        Creates a new Award Record. Once successfully created, the record will be visible on the <strong>KVAAWRD</strong> page.
        </p>
        <p>
          The API accepts a single Applicant Institutional Award Record in the request payload, which will be persisted to the appropriate resource tables upon successful submission.
        </p>
        <p>
          To create a discount award, set the <strong>discountAward</strong> parameter to 'Y'. Additional parameters are available for fee assessment, amount rounding, award locking, and discount award operations:
        </p>
        <ul>
          <li><strong>discountAward</strong>: Set to 'Y' to create discount-based award</li>
          <li><strong>feeAssess</strong>: Set to 'Y' to enable fee assessment</li>
          <li><strong>roundAmt</strong>: Set to 'Y' to enable amount rounding</li>
          <li><strong>lockAwrd</strong>: Set to 'Y' to lock the award after creation</li>
          <li><strong>acceptDiscAwrd</strong>: Set to 'Y' to automatically accept discount award</li>
          <li><strong>cancelDiscAwrd</strong>: Set to 'Y' to cancel discount award</li>
          <li><strong>declineDiscAwrd</strong>: Set to 'Y' to decline discount award</li>
          <li><strong>revokeDiscAwrd</strong>: Set to 'Y' to revoke discount award</li>
        </ul>
        <p>
          All date fields must be provided in the <strong>DD-MM-YYYY</strong> format.
        </p>
      security:
        - EthosIntegrationBearer: []
      tags:
        - applicant-institutional-awards
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: content-type
          in: header
          required: true
          description: >
            The media type of the request.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              $ref: "#/components/schemas/applicant-award-create-1.0.0_request"
      responses:
        "201":
          description: Created. The award record was successfully created.
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            Location:
              description: The URI of the newly created resource
              schema:
                type: string
          content:
