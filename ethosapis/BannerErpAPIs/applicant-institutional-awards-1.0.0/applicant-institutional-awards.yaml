openapi: 3.0.0
info:
  title: applicant-institutional-awards
  description: >
     <p>
      The Applicant Institutional Awards API provides comprehensive information including awards, disbursements, disbursement history, and disbursement schedules for applicants.  
      It allows users to retrieve detailed award information from the <strong>KVRAWRD</strong>, <strong>KVRDISB</strong>, <strong>KVRDISH</strong>, and <strong>KVRAPDS</strong> tables, as well as create new award records.
      </p>

      <p>
      <strong>GET API</strong> – Retrieves all information from KVRAWRD, KVRDISB, KVRDISH, and KVRAPDS tables for applicants. 
      </p>

      <p>
      <strong>POST API</strong> – Creates a new Award record (both discount-based and non-discount based).  
      Upon successful creation, the data is stored in KVRAWRD table and the same is displayed on KVAAWRD page.
      </p>
  
  version: 1.0.0
  x-source-domain: Financial Aid
  x-source-name: KVRAWRD, KVRDISB, KVRDISH, KVRAPDS
  x-source-title: Applicant Institutional Awards (Student Aid)
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/applicant-institutional-awards:
    get:
      summary: Returns comprehensive information including awards, disbursements, history, and schedules.
      description: Return all awards, disbursements, disbursement history, and disbursement schedule information for applicants from KVRAWRD, KVRDISB, KVRDISH, and KVRAPDS tables.
      security:
        - EthosIntegrationBearer: []
      tags:
        - applicant-institutional-awards
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards for more information. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### studentId

            Returns data for a specific student based on Student ID.

            ```

            /applicant-institutional-awards?criteria={"studentId":123456}

            ```

            ### Aid Year Code

            Returns data for a specific aid year.

            ```

            /applicant-institutional-awards?criteria={"aidyCode":"2025"}

            ```

            ### Aid Period Code

            Returns data for a specific aid period.

            ```

            /applicant-institutional-awards?criteria={"aidpCode":"LGWNTR20"}

            ```

            ### Fund Code

            Returns data for a specific fund code.

            ```

            /applicant-institutional-awards?criteria={"fndcCode":"JA-IA-BUR"}

            ```

            ### Fund Status Code

            Returns awards with specific status.

            ```

            /applicant-institutional-awards?criteria={"fstaStatusCde":"ACPT"}

            ```
            ### Multiple Criteria
            Returns data for multiple criteria.

            ```
            /applicant-institutional-awards?criteria={"studentId":"123456","aidyCode":"2025","fndcCode":"JA-IA-BUR"}

            ```
      responses:
        "200":
          description: OK
          headers:
