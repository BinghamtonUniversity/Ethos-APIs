components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    applicant-institutional-awards-1.0.0_response:
      title: applicant-institutional-awards-1.0.0_response
      description: Comprehensive information including awards with embedded disbursements, history, and schedules.
      type: object
      properties:
        id:
          title: Award Identifier
          description: Composite identifier for the award record.
          type: object
          properties:
            studentId:
              title: Student ID
              description: The Banner ID of the student.
              type: string
              maxLength: 9
            aidyCode:
              title: Aid Year Code
              description: The aid year in which the Award Fund is being processed.
              type: string
              maxLength: 4
            aidpCode:
              title: Aid Period Code
              description: The aid period in which the Award Fund Code is being processed.
              type: string
              maxLength: 8
            fndcCode:
              title: Aid Fund Code
              description: The aid fund code of the award that is being processed.
              type: string
              maxLength: 10
            fndcSeqNo:
              title: Fund Sequence Number
              description: A one-up number used to differentiate one award from another when the same Aid Fund Code is used in the same aid period for the applicant.
              type: integer
          required:
            - studentId
            - aidyCode
            - aidpCode
            - fndcCode
            - fndcSeqNo
        award:
          type: array
          items:
            $ref: "#/components/schemas/award-with-disbursements"
      required:
        - id
        - award
    award-with-disbursements:
      title: Award with Disbursements
      description: Award information from KVRAWRD table with embedded disbursements, history, and schedules.
      type: object
      properties:
        fndcCode:
          title: Aid Fund Code
          description: The aid fund code of the award that is being processed.
          type: string
          maxLength: 10
          x-lineageReferenceObject: KVRAWRD_FNDC_CODE
        fndcSeqNo:
          title: Fund Sequence Number
          description: A one-up number used to differentiate one award from another when the same Aid Fund Code is used in the same aid period for the applicant.
          type: integer
          x-lineageReferenceObject: KVRAWRD_FNDC_SEQ_NO
        fstaStatusCde:
          title: Fund Status Code
          description: The Status Code for this aid fund code award record for this applicant.
          type: string
          maxLength: 4
          x-lineageReferenceObject: KVRAWRD_FSTA_STATUS_CDE
        fstaStatusDate:
          title: Fund Status Date
          description: The Status Date for this aid fund code award record for this applicant.
          type: string
          x-lineageReferenceObject: KVRAWRD_FSTA_STATUS_DATE
        origOfferAmt:
          title: Original Offer Amount
          description: The original amount of the award that was offered to the applicant.
          type: number
          format: decimal
          x-lineageReferenceObject: KVRAWRD_ORIG_OFFER_AMT
        origOfferDate:
          title: Original Offer Date
          description: The original date of the award that was offered to the applicant.
          type: string
          x-lineageReferenceObject: KVRAWRD_ORIG_OFFER_DATE
        offerAmt:
          title: Offer Amount
          description: The current amount of the award that is offered to the applicant.
          type: number
          format: decimal
          x-lineageReferenceObject: KVRAWRD_OFFER_AMT
        offerDate:
          title: Offer Date
          description: The current date of the award that is offered to the applicant.
          type: string
          x-lineageReferenceObject: KVRAWRD_OFFER_DATE
        acceptAmt:
          title: Accept Amount
          description: The amount of the award that was accepted by the applicant.
          type: number
          format: decimal
          x-lineageReferenceObject: KVRAWRD_ACCEPT_AMT
        acceptDate:
          title: Accept Date
          description: The date when the award was accepted by the applicant.
          type: string
          x-lineageReferenceObject: KVRAWRD_ACCEPT_DATE
        declineAmt:
          title: Decline Amount
          description: The amount of the award that was declined by the applicant.
          type: number
          format: decimal
          x-lineageReferenceObject: KVRAWRD_DECLINE_AMT
        declineDate:
          title: Decline Date
          description: The date when the award was declined by the applicant.
          type: string
          x-lineageReferenceObject: KVRAWRD_DECLINE_DATE
        cancelAmt:
