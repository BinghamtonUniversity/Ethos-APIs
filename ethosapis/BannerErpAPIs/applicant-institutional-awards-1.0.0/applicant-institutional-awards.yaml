        <p>
        Creates or Updates multiple Award Records in a single batch operation. Once successfully processed, the records will be visible on the <strong>KVAAWRD</strong> page.
        </p>
        <p>
          The API accepts an array of Applicant Institutional Award Records in the request payload, which will be persisted to the appropriate resource tables upon successful submission.
        </p>
        <p>
          <strong>For creating new records:</strong> Submit the record without an <strong>id</strong> field.
        </p>
        <p>  
          <strong>For updating existing records:</strong> Include the composite <strong>id</strong> structure containing studentId, aidyCode, aidpCode, fndcCode, and fndcSeqNo as shown in the example schema.
        </p>
        <p>
          To create discount awards, set the <strong>discountAward</strong> parameter to 'Y' for each item. Additional parameters are available for fee assessment, amount rounding, award locking, and discount award operations:
        </p>
        <ul>
          <li><strong>discountAward</strong>: Set to 'Y' to create discount-based award</li>
          <li><strong>feeAssess</strong>: Set to 'Y' to enable fee assessment</li>
          <li><strong>roundAmt</strong>: Set to 'Y' to enable amount rounding</li>
          <li><strong>lockAwrd</strong>: Set to 'Y' to lock the award after creation</li>
          <li><strong>acceptDiscAwrd</strong>: Set to 'Y' to automatically accept discount award</li>
          <li><strong>cancelDiscAwrd</strong>: Set to 'Y' to cancel discount award</li>
          <li><strong>declineDiscAwrd</strong>: Set to 'Y' to decline discount award</li>
          <li><strong>revokeDiscAwrd</strong>: Set to 'Y' to revoke discount award</li>
        </ul>
        <p>
          All date fields must be provided in the <strong>DD-MM-YYYY</strong> format.
        </p>
      parameters:
