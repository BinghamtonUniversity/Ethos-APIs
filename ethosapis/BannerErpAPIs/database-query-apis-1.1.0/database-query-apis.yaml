          in: header
          required: true
          description: |
            The version of the resource requested. Prefer to use only the whole MAJOR version.  Refer to the Semantic Versioning topic in the API Standards for more information.
            ```
            application/vnd.hedtech.integration.v1.1.0+json
            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requested for this result set. Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0-based index for a collection of resources for the page requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Filters of the published API 
            ```
            /database-query-apis?criteria={"resource":"x-api"}
            ``` ```
            /database-query-apis?criteria={"statuses":["PUBLISHED", "ARCHIVED"]}
            ```  ```
            /database-query-apis?criteria={"lastModifiedBy":"userName"}
            ``` ```
            /database-query-apis?criteria={"queryStatus":"DRAFT"}
            ```
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schema-database-query-apis-1.1.0'
              examples:
                database-query-apis-example-1.1.0:
                  $ref: '#/components/examples/database-query-apis-example-1.1.0'
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Permission Denied
        '404':
          description: Resource not found
        '500':
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in GURASPC.
      description: Returns all the records/APIs created through API DESIGNER from GURASPC where GURASPC_GORDBQC_GUID is not null.
      security:
