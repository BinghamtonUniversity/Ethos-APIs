components:
  securitySchemes:
    EthosIntegrationBearer:
      scheme: bearer
      type: http
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://integrate.elluciancloud.com
          tokenUrl: https://integrate.elluciancloud.com
          scopes:
            read: Read access
            write: Write access
  schemas:
    schema-database-query-apis-1.1.0:
      title: Database Query APIs
      description: Database query APIs created and published through API DESIGNER.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        apiName:
          title: API Name
          description: The name of the API.
          type: string
          x-lineageReferenceObject: GURASPC_RESOURCE(GURASPC)
        databaseQueryId:
          title: Database Query Id
          description: The id of the database query that is created for this API.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GURASPC_GORDBQC_GUID(GORDQBD)
        publish:
          title: Publish
          description: The Status of the API is in. Allowed values are DRAFT and PUBLISHED.
          type: string
          x-lineageReferenceObject: GURASPC_STATUS(GURASPC)
        description:
          title: Description
          description: The description of the API.
          type: string
          x-lineageReferenceObject: GURASPC_DESCRIPTION(GORDQBD)
        domain:
          title: Domain
          description: The domain to which the API belongs.
          type: string
          x-lineageReferenceObject: GURASPC_MODULE_NAME(GURASPC)
        apiSpecificationId:
          title: Api Specification Id
          description: The unique identifier of API in GURASPC if the API is in PUBLISHED state.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GURASPC_GUID(GURASPC)
        databaseCompiledQueryId:
          title: Database Compiled Query Id
          description: The unique identifier of the compiled query in GORDBQC for the created API query.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORDBQC_GUID(GORDBQC)
        semanticVersion:
          title: Semantic Version
          description: Semantic Version of the API.
          type: string
        version:
          title: Version
          description: Major Version of the API.
          type: number
        maxPageSize:
          title: Max Page Size
          description: Maximum records that the API will return on GET call, by default the value is 500.
          type: number
          x-lineageReferenceObject: GURASPC_MAX_PAGE_SIZE(GURASPC)
        securityRoles:
          title: Security Roles
          description: Self-service roles that can be assigned to grant users authorization to access and view this API.
          type: array
          minItems: 1
          items:
            minLength: 0
            type: string
          x-lineageReferenceObject: GURASPC_SECURITY_ROLES(GURASPC)
        securityObject:
          title: Security Object
          description: The API Designer instantiates a security object to authorize the user responsible for publishing the API. This object enables access to the API using Basic Authentication, ensuring that only authenticated users can view or interact with the published interface.
          type: string
          x-lineageReferenceObject: GURASPC_SECURITY_OBJECT(GURASPC_SECURITY)
        createUserId:
          title: Create User Id
          description: The name of the user who created this  API.
          type: string
          x-lineageReferenceObject: GURASPC_CREATE_USER_ID(GURASPC)
        createDate:
          title: Create Date
          description: The date and time when the entity instance was created.
          type: string
          x-lineageReferenceObject: GORDQBD_CREATE_DATE(GORDQBD)
        lastModified:
          title: Last Modified On
          description: The date and time when the entity instance was last modified.
          type: string
          x-lineageReferenceObject: GORDQBD_ACTIVITY_DATE(GORDQBD)
        lastModifiedBy:
          title: Last Modified By
          description: The name of the modifier (user) of the entity.
          type: string
          x-lineageReferenceObject: GORDQBD_USER_ID(GORDQBD)
        idProperty:
          title: Id Property
          description: Column that is used as ID for custom API(show method) which is created through API DESIGNER.
          type: string
          x-lineageReferenceObject: GURASPC_API_BUILDER_ID(GURASPC)
        registryDocRefId:
          title: Registry Doc Ref Id
          description: Document reference ID obtained from registry API.
          type: string
          x-lineageReferenceObject: GURASPC_DOC_REF_ID(GURASPC)
        draftId:
          title: Draft Id
          description: The unique ID of the draft API which is created through API DESIGNER for this API.
          type: string
          x-lineageReferenceObject: GORDQBD_GUID(GORDQBD)
        deprecationNotice:
          title: Deprecation Notice
          description: The unique ID of the draft API which is created through API DESIGNER for this API.
          type: object
          properties:
            deprecatedOn:
              title: Deprecated On
              description: Date on which the API is deprecated.
              type: string
            description:
              title: Description
              description: Reason why the API is deprecated.
              type: string
            sunsetOn:
              title: Sunset On
              description: Date from which the API won't be available to use.
              type: string
          additionalProperties: false
          required:
            - deprecatedOn
            - description
            - sunsetOn
          x-lineageReferenceObject: GURASPC_DEPRECATION_NOTICE(GURASPC)
      additionalProperties: false
      required:
        - apiSpecificationId
        - apiName
  examples:
