openapi: 3.0.0
info:
  title: Database Query APIs
  version: 1.1.0
  x-source-system: banner
  description: |
    Returns all the records/APIs created through API DESIGNER from GURASPC where GURASPC_GORDBQC_GUID is not null. 
  x-api-type: ethos
  x-source-domain: Foundation
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: '{server_url}'
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/database-query-apis:
    get:
      summary: Returns all the records/APIs created through API DESIGNER from GURASPC where GURASPC_GORDBQC_GUID is not null.
      description: Returns all the records/APIs created through API DESIGNER from GURASPC where GURASPC_GORDBQC_GUID is not null.
