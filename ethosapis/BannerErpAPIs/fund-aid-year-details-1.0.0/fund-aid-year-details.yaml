components:
  schemas:
    fund-aid-year-details-v1.0.0_id_parameter:
      type: object
      properties:
        aidYear:
          title: Aid Year
          description: Aid Year
          maxLength: 4
          type: string
          x-lineageReferenceObject: RFRASPC_AIDY_CODE
        fundCode:
          title: Fund Code
          description: Fund Code
          type: string
          maxLength: 6
          x-lineageReferenceObject: RFRASPC_FUND_CODE
      additionalProperties: false
      required:
        - aidYear
        - fundCode
    fund-aid-year-details-v1.0.0_put_request:
      type: object
      properties:
        priorBalanceAmount:
          title: Prior Balance Amount
          maxLength: 17
          type: number
          description: The prior balance for the fund code from a previous aid year.
          x-lineageReferenceObject: RFRASPC_PRIOR_BAL_AMT
        transferAmount:
          title: Transfer Amount
          maxLength: 17
          type: number
          description: Any dollar amount transferred in or out of a fund which will affect
            the total allocation for the Aid Year.
          x-lineageReferenceObject: RFRASPC_TRANSFER_AMT
        budgetAllocatedAmount:
          title: Budget Allocated Amount
          maxLength: 17
          type: number
          description: The actual allocated budget for a fund code within the given aid
            year.
          x-lineageReferenceObject: RFRASPC_BUDG_ALLOC_AMT
        availableAmountToOffer:
          title: Available Offer Amount
          maxLength: 17
          type: number
          description: The dollar amount of the fund that can be offered including any
            over-commitment amount. This field will be calculated if an
            Available to Offer Percent is entered. Either
            *percentageAmountAvailableToOffer* or *availableAmountToOffer*
            should be provided in the PUT request
          x-lineageReferenceObject: RFRASPC_AVAIL_OFFER_AMT
        percentageAmountAvailableToOffer:
          title: Available Offer Percent
          maxLength: 7
          type: number
          description: This optional field represents the percentage of the total
            allocation that the institution wishes to offer including
            over-commitment. This field will be calculated if an Offer Amount is
            entered. Either *percentageAmountAvailableToOffer* or
            *availableAmountToOffer* should be provided in the PUT request
          x-lineageReferenceObject: RFRASPC_AVAIL_OFFER_PCT
      required:
        - aidYear
        - fundCode
    fund-aid-year-details-v1.0.0_response:
      type: object
      properties:
        id:
          title: Id
          description: id
          type: object
          $ref: "#/components/schemas/fund-aid-year-details-v1.0.0_id_parameter"
        priorBalanceAmount:
          title: Prior Balance Amount
          maxLength: 17
          type: number
          description: The prior balance for the fund code from a previous aid year.
          x-lineageReferenceObject: RFRASPC_PRIOR_BAL_AMT
        transferAmount:
          title: Transfer Amount
          maxLength: 17
          type: number
          description: Any dollar amount transferred in or out of a fund which will affect
            the total allocation for the Aid Year.
          x-lineageReferenceObject: RFRASPC_TRANSFER_AMT
        budgetAllocatedAmount:
          title: Budget Allocated Amount
          maxLength: 17
          type: number
          description: The actual allocated budget for a fund code within the given aid
            year.
          x-lineageReferenceObject: RFRASPC_BUDG_ALLOC_AMT
        availableAmountToOffer:
          title: Available Offer Amount
          maxLength: 17
          type: number
          description: The dollar amount of the fund that can be offered including any
            over-commitment amount. This field will be calculated if an
            Available to Offer Percent is entered.
          x-lineageReferenceObject: RFRASPC_AVAIL_OFFER_AMT
        percentageAmountAvailableToOffer:
          title: Available Offer Percent
          maxLength: 7
          type: number
          description: This optional field represents the percentage of the total
            allocation that the institution wishes to offer including
            over-commitment.
          x-lineageReferenceObject: RFRASPC_AVAIL_OFFER_PCT
        totalAllocated:
          title: Total Allocated Amount
          maxLength: 17
          type: number
          format: date
          description: The total available dollars for the fund for the aid year. It is
            the sum of the prior balance the transferred amount plus the budget
            allocated amount. Not user-enterable.
          x-lineageReferenceObject: RFRASPC_TOTAL_ALLOC_AMT
        updatedOn:
          title: Updated On
          maxLength: 10
          type: string
          format: date
          description: The date that information in this record was entered or last updated.
          x-lineageReferenceObject: RFRASPC_ACTIVITY_DATE
      required:
        - aidYear
        - fundCode
    fund-aid-year-details-v1.0.0_put_request_batch:
      type: object
      properties:
        items:
          title: items
          description: List of items to be processed.
          type: array
          items:
            additionalProperties: false
            allOf:
              - type: object
                properties:
                  id:
                    type: object
                    $ref: "#/components/schemas/fund-aid-year-details-v1.0.0_id_parameter"
              - type: object
                $ref: "#/components/schemas/fund-aid-year-details-v1.0.0_put_request"
      required:
        - items
    fund-aid-year-details-v1.0.0_put_response_batch:
      description: "Returns the list of Ids for those sections that were successfully
        updated or created. For those that did not, it returns the list of error
        messages. "
      type: object
      x-last-modified: 1694460214111
      properties:
        status:
          title: status
          description: status of the batch.
          type: string
          enum:
            - completed
            - inProgress
            - aborted
        resource:
          title: Resource
          description: The affected resource.
          type: object
          properties:
            name:
              title: Resource Name
              description: The pluralized name of the affected resource
              type: string
            version:
              title: Resource version
              description: The version of the resource
              type: string
          additionalProperties: false
          required:
            - name
            - version
        items:
          type: array
          items:
            type: object
            additionalProperties: true
            oneOf:
              - type: object
                properties:
                  id:
                    type: object
                    $ref: "#/components/schemas/fund-aid-year-details-v1.0.0_id_parameter"
              - type: object
                $ref: "#/components/schemas/errors_2_0_0"
          required:
            - items
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EthosIntegrationBearer:
      type: http
      scheme: bearer
