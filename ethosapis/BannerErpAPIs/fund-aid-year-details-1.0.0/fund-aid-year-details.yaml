openapi: 3.0.0
info:
  title: Fund Aid Year Details
  description: The Fund Aid Year Details API provides aid year specific
    information for a specified fund.  This API can also be used to update the
    priorBalanceAmount, transferAmount, budgetAllocatedAmount,
    availableAmountToOffer/percentageAmountAvailableToOffer for an aid year/fund
    combination.
  version: 1.0.0
  x-source-domain: Financial Aid
  x-source-name: RFRMGMT
  x-source-title: null
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/fund-aid-year-details:
    get:
      tags:
        - fund-aid-year-details
      summary: Returns all aid year specific information for a specified fund and aid
        year combination.
      description: Returns resources from RFARSPC.
      parameters:
        - name: accept
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```     
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.\
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Aid Year
            Returns all records for the Aid Year passed.
            ```
            /fund-aid-year-details?criteria={"aidYear":"2324"}
            ```
            ### Fund Code
            Returns all records for the Fund Code passed.
            ```
            /fund-aid-year-details?criteria={"fundCode":"FWS"}
            ```
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/fund-aid-year-details-v1.0.0_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "500":
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_FUND_AID_YEAR_DETAILS
    put:
      tags:
        - fund-aid-year-details
      summary: Updates existing aid year specific information for a specified fund and
        aid year combination.
      description: Updates resources in RFARSPC.
      requestBody:
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/fund-aid-year-details-v1.0.0_put_request"
      parameters:
        - name: id
          in: query
          description: >
            This can be any random number and is not specific to any particular
            data. A value must be included in the API request.
          required: true
          schema:
            type: object
            $ref: "#/components/schemas/fund-aid-year-details-v1.0.0_id_parameter"
        - name: accept
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: |
            ```
            application/vnd.hedtech.integration.v1+json
            ```
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
