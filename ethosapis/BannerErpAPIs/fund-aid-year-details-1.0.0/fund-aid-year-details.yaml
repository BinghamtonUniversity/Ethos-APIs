      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              type: object
              $ref: "#/components/schemas/fund-aid-year-details-v1.0.0_put_request_batch"
      responses:
        "201":
          description: Created
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response.
              required: true
