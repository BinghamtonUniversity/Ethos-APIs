        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_FUND_AID_YEAR_DETAILS
  /api/fund-aid-year-details/batches:
    post:
      tags:
        - fund-aid-year-details
      summary: Batch update of existing aid year specific information for a specified
        fund and aid year combination.
      description: Batch updates resources in RFARSPC
      parameters:
        - name: accept
          in: header
          required: true
          description: |
