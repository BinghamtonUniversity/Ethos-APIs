      tags:
        - section-descriptors-adjustment-process
      summary: Create or update resources in SSRSYLN, SSRSYLO, SSRSYRM, SSRSYTR, SSBDESC, and SSRTEXT.
      description: >
        Create or update the specified Section Syllabus (SSRSYLN, SSRSYLO, SSRSYRM, SSRSYTR), section description (SSBDESC), and course text (SSRTEXT).
        

        API behavior details:


        * Replace Functionality - When the POST request is processed, it will replace any existing data associated with the 
        resource for the specified term and section with the new data provided in the request. This ensures the record is entirely updated to match the new data set provided.


        * Complete Data Set Required - The POST request must include complete objects or arrays. The data sent must fully represent the resource being updated. 
        Partial data may result in an incomplete or incorrect update. 
      
      parameters:
        - name: accept
          in: header
          required: true
          description: >
