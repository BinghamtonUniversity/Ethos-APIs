components:
  schemas:
    section-descriptors-adjustment-process-1.0.0_post_request:
      type: object
      required:
        - term
        - crn
      properties:
        term:
          title: Term
          maxLength: 6
          type: string
          description: The term that this set of section descriptor details becomes effective.
          x-lineageLookupReferenceObject: STVTERM
          example: 202201 
        crn:
          title: Course Reference Number
          maxLength: 5
          type: string
          description: The Course Reference Number (CRN) of the course section associated with the descriptor details.
          x-lineageReferenceObject: SSBSECT_CRN
          example: 101  
        longSectionTitle:
          title: Long Section Title
          maxLength: 100
          type: string
          example: Negotiations and Mediation Seminar
          description: The long title of the section.
          x-lineageReferenceObject: SSRSYLN_LONG_COURSE_TITLE
        sectionUrl:
          title: Section URL
          maxLength: 100
          type: string
          example: www.ellucian.com
          description: The URL provided will be displayed for Banner Self-Service users as an active hypertext link.
          x-lineageReferenceObject: SSRSYLN_SECTION_URL
        objective:
          title: Objective
          maxLength: 32760
          type: string
          example: Students should develop an understanding and appreciation of human biological, linguistic, and cultural diversity, especially those features that separates humans from other species.
          description: This is a CLOB field which can contain a large amount of text used for the Learning Objective of the section.
          x-lineageReferenceObject: SSRSYLO_LEARNING_OBJECTIVES
        requiredSectionMaterials:
          title: Required Section Materials
          maxLength: 32760
          type: string
          example: Required textbook and instituion issued laptop. 
          description: The required materials of the section.
          x-lineageReferenceObject: SSRSYRM_REQUIRED_MATERIALS
        sectionTechnicalRequirements:
          title: Section Technical Requirements
          maxLength: 32760
          type: string
          example: Students must be able to join online discussion sessions.
          description: The technical requirement of the section.
          x-lineageReferenceObject: SSRSYTR_TECHNICAL_REQUIREMENT
        description:
          title: Description
          maxLength: 32760
          type: string
          description: A free form field for the course section description.
          x-lineageReferenceObject: SSBDESC_TEXT_NARRATIVE
        textLines:
          type: array
          title: Section Text Lines
          items:
            type: object
            properties:
              text:
                title: Section Text Lines
                maxLength: 60
                type: string
                example: Initial introductory course in the study of anthropology.
                description: A free form field for section text. 
                x-lineageReferenceObject: SSRTEXT_TEXT
              sequenceNumber:                  
                title: Text line sequence number
                maxLength: 23          
                type: number
                example: 1
                description: The sequence number of the text line.
                x-lineageReferenceObject: SSRTEXT_SEQNO
    section-descriptors-adjustment-process-1.0.0_response:
      type: object     
      required:
        - key
      properties:  
        key:
          title: Key
          type: object     
          required:
            - term  
            - crn    
          properties:
            term:
              title: Term
              maxLength: 6
              type: string
              description: "The term code for the set of section descriptor details."  
              x-lineageReferenceObject: SSBSECT_TERM_CODE
              x-lineageLookupReferenceObject: STVTERM
              example: 202201    
            crn: 
              title: Course Reference Number
              maxLength: 5
              type: string
              description: "The Course Reference Number (CRN) assigned to this course section."
              x-lineageReferenceObject: SSBSECT_CRN
              example: 1001                    
    section-descriptors-adjustment-process-batch-1.0.0_post_request:
      type: object
      properties:
        items:
          title: items
          description: List of items to be processed.
          type: array
          items:
            type: object
            $ref: '#/components/schemas/section-descriptors-adjustment-process-batch-1.0.0_post_items'
      required:
        - items                                     
    section-descriptors-adjustment-process-batch-1.0.0_post_items:
      $ref: '#/components/schemas/section-descriptors-adjustment-process-1.0.0_post_request'
    section-descriptors-adjustment-process-batch-1.0.0_post_response:
        description: 'Returns batch job details like status, job ID, request ID, resource details, etc. '
        type: object
        required:
        - id
        - jobId
        - status
        - link
        - resource
        - createdOn
        - jobStartOn
        - jobEndOn
        properties:
          id:
            title: Request ID
            description: A globally unique identifier of a batch API request to be used in all external references.
            type: string
            format: guid
            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
            example: cf5ff489-e386-43a3-93cf-04d4b1f77216 
            x-lineageReferenceObject: GOBBREQ_GUID   
          jobId:
            title: Job ID
            description: Batch job execution ID.
            type: number
            x-lineageReferenceObject: GOBBREQ_JOB_ID
            example: 123
          status:
            title: Status
            description: Status of the batch.
            type: string
            enum:
              - completed
              - inProgress
              - aborted
            x-lineageReferenceObject: GOBBREQ_JOB_STATUS
            example: inProgress
          link: 
            title: Status URL
            description: REST API URL to use to get the status of a specific batch job.
            type: string
            example: https://api.example.com/api/section-descriptors-adjustment-process/batches/{id}        
          resource:
            title: Resource
            description: The affected resource.
            type: object
            properties:
              name:
                title: Resource Name
                description: The pluralized name of the affected resource.
                type: string
                x-lineageReferenceObject: GOBBREQ_API_RESOURCE            
                example: section-descriptors-adjustment-process
              version:
                title: Resource version
                description: The version of the resource.
                type: number
                x-lineageReferenceObject: GOBBREQ_API_VERSION                
                example: application/vnd.hedtech.integration.v1.0.0+json
            additionalProperties: false
            required:
              - name
