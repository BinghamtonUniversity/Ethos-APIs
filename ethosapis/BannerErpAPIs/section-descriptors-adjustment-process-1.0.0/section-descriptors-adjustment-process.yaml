        API behavior details:


        * Replace Functionality - When the POST request is processed, it will replace any existing data associated with the 
        resource for the specified term and section with the new data provided in the request. This ensures the record is entirely updated to match the new data set provided.


        * Complete Data Set Required - The POST request must include complete objects or arrays. The data sent must fully reporesent the resource being updated. 
        Partial data may result in an incomplete or incorrect udpate. 
        
        * For existing section descriptor records, the POST request replaces the effective record with the section descriptor included 
        in the POST request. This means that the POST request removes any existing data and replaces it with the data provided in the request.        
