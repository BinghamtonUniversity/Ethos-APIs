openapi: 3.0.0
info:
  title: Section Descriptors Adjustment Process
  description: >

    The Section Descriptors Adjustment Process API is used to create and maintain the section syllabus, description, and text. 
    Changes to the section syllabus include the section long title, learning objectives, required materials, and technical materials.
    In addition, the API supports the option to post section descriptors adjustments in batches.
    
    
    Section descriptor details can be queried using section-descriptors. 
    

  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SSASYLB SSATEXT
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/section-descriptors-adjustment-process:
