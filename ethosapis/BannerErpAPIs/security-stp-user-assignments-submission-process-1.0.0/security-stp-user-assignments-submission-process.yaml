openapi: 3.0.0
info:
  title: Security STP User Assignments Submission Process
  description: >
    The Security STP User Assignments Submission Process API is used to associate Banner Shared Technology
     Platform (formerly referred to as MEP) users with institutional identifiers as seen on the GSAVPDI administrative 
     page. The API supports the option to post STP User Assignment resources in batches. 

   
    STP User Assignments can be queried using security-stp-user-assignments.


    STP Identifiers can be queried using security-stp-identifiers.


     Note: To maintain strict access control, the required security object must be assigned directly to individual users. 
     Assignment via security classes is not supported for this API.

  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Foundation
  x-source-name: GURUSRI
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/security-stp-user-assignments-submission-process:
    post:
      tags:
      - security-stp-user-assignments-submission-process
      summary: Creates or updates resources in GURUSRI.
      description: >

      
        Creates or updates an STP User Assignment record in GURUSRI.

       
        API behavior details:

              
          * Replace Functionality -  When the POST request is processed, it will replace any existing STP Assignment data for the 
          specified User with the new STP Assignment data provided in the request. This ensures that the 
          resource is entirely updated to match the new data set provided.

        
          * Complete Data Set Required - The POST request must include complete objects or arrays. This means that the data sent must fully represent 
          the resource being updated. Partial data may result in an incomplete or incorrect update.

      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string 
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/security-stp-user-assignments-submission-process-1.0.0_post_request"                  
      responses:
        '201':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
