components:
  schemas:
    security-stp-user-assignments-submission-process-1.0.0_post_request:
      type: object
      required:
        - userId
        - stpAssignments
      properties:
        userId:
          title: STP User ID
          description: "The Oracle ID or Principal User ID of the STP user."
          type: string
          x-lineageReferenceObject: GURUSRI_VPDI_USER_ID
          x-lineageLookupReferenceObject: GOBEACC            
          example: "BSMITH"
          maxLength: 30  
        stpAssignments:
          title: STP Assignments
          type: array               
          items:
            type: object                
            properties:          
              stpIdentifier:
                title: STP Identifier Code
                description: "The STP Identifier code."
                type: string
                x-lineageReferenceObject: GURUSRI_VPDI_CODE
                example: "INST"
                maxLength: 6   
                x-lineageLookupReferenceObject: GTVVPDI            
              isUserDefaultStpIdentifier:
                title: User Default STP Identifier Indicator
                description: "The default STP identifier for the user.  One STP Identifier must be designated as the default."
                type: boolean
                x-lineageReferenceObject: GURUSRI_USER_DEF_INST_IND
                example: "true"              
    security-stp-user-assignments-submission-process-1.0.0_response:
      type: object     
      required:
        - key
      properties:  
        key:
          title: Key
          type: object     
          required:
            - userId  
            - stpAssignments   
          properties:                
            userId:
              title: STP User ID
              description: "The Oracle ID or Principal User ID of the STP user."
              type: string
              x-lineageReferenceObject: GURUSRI_VPDI_USER_ID
              x-lineageLookupReferenceObject: GOBEACC            
              example: "BSMITH"
              maxLength: 30  
            stpAssignments:
              title: STP Assignments
              type: array               
              items:
                type: object 
                required: 
                - stpIdentifier  
                - isUserDefaultStpIdentifier             
                properties:          
                  stpIdentifier:
                    title: STP Identifier Code
                    description: "The STP Identifier code."
                    type: string
                    x-lineageReferenceObject: GURUSRI_VPDI_CODE
                    example: "INST"
                    maxLength: 6   
                    x-lineageLookupReferenceObject: GTVVPDI       
                  isUserDefaultStpIdentifier:
                    title: User Default STP Identifier Indicator
                    description: "The default STP identifier for the user.  One STP Identifier must be designated as the default."
                    type: boolean
                    x-lineageReferenceObject: GURUSRI_USER_DEF_INST_IND
                    example: "true"                                
    security-stp-user-assignments-submission-process-batch-1.0.0_post_request:
      type: object
      properties:
        items:
          title: items
          description: List of items to be processed.
          type: array
          items:
            type: object
            $ref: '#/components/schemas/security-stp-user-assignments-submission-process-batch-1.0.0_post_items'
      required:
        - items                                     
    security-stp-user-assignments-submission-process-batch-1.0.0_post_items:
      $ref: '#/components/schemas/security-stp-user-assignments-submission-process-1.0.0_post_request'
    security-stp-user-assignments-submission-process-batch-1.0.0_post_response:
        description: 'Returns batch job details like status, job ID, request ID, resource details, etc. '
        type: object
        required:
        - id
        - jobId
        - status
        - link
        - resource
        - createdOn
        - jobStartOn
        - jobEndOn
        properties:
          id:
            title: Request ID
            description: A globally unique identifier of a batch API request to be used in all external references.
            type: string
            format: guid
            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
            example: cf5ff489-e386-43a3-93cf-04d4b1f77216 
            x-lineageReferenceObject: GOBBREQ_GUID   
          jobId:
            title: Job ID
            description: Batch job execution ID.
            type: number
            x-lineageReferenceObject: GOBBREQ_JOB_ID
            example: 123
          status:
            title: Status
            description: Status of the batch.
            type: string
            enum:
              - completed
              - inProgress
              - aborted
            x-lineageReferenceObject: GOBBREQ_JOB_STATUS
            example: inProgress
          link: 
            title: Status URL
            description: REST API URL to use to get the status of a specific batch job.
            type: string
            example: https://api.example.com/api/security-stp-user-assignments-submission-process/batches/{id}        
          resource:
            title: Resource
            description: The affected resource.
            type: object
            properties:
              name:
                title: Resource Name
                description: The pluralized name of the affected resource.
                type: string
                x-lineageReferenceObject: GOBBREQ_API_RESOURCE            
                example: security-stp-user-assignments-submission-process
              version:
                title: Resource version
                description: The version of the resource.
                type: number
                x-lineageReferenceObject: GOBBREQ_API_VERSION                
                example: application/vnd.hedtech.integration.v1.0.0+json
            additionalProperties: false
            required:
              - name
              - version
          createdOn:
            title: Created Date
            description: Date on which the batch job was created.
            type: string
            format: date
            x-lineageReferenceObject: GOBBREQ_CREATEDTIME
            example: '2024-01-01'
          jobStartOn:
            title: Job Start Time
            description: Time when the batch job started.
            type: string
            format: date-time
            x-lineageReferenceObject: BATCH_JOB_EXECUTION.START_TIME           
            example: '2024-09-27 12:46:37.058'
          jobEndOn:
            title: Job End Time
            description: Time when the batch job ended.
            type: string
            format: date-time
            x-lineageReferenceObject: BATCH_JOB_EXECUTION.END_TIME              
            example: '2024-09-27 12:48:15.976'            
    security-stp-user-assignments-submission-process-batch-1.0.0_get_response:    
        description: 'Returns the list of IDs for those STP user assignments that were successfully created. For those that were not, it returns the list of error messages.'
        type: object
        x-last-modified:
        required:
        - id
        - jobId
        - status
        - link
        - resource
        - createdOn
        - jobStartOn
        - jobEndOn
        - modifiedBy
        - modifiedOn
        - totalErrorsCount
        - items                
        properties:            
          id:
            title: Request ID
            description: A globally unique identifier of a batch API request to be used in all external references.
            type: string
            format: guid
            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
            example: cf5ff489-e386-43a3-93cf-04d4b1f77216 
            x-lineageReferenceObject: GOBBREQ_GUID  
          jobId:
            title: Job ID
            description: Batch job execution ID.
            type: number
            x-lineageReferenceObject: GOBBREQ_JOB_ID
            example: 123
          status:
            title: Status
            description: Status of the batch.
            type: string
            enum:
              - completed
              - inProgress
              - aborted
            x-lineageReferenceObject: GOBBREQ_JOB_STATUS
            example: inProgress
