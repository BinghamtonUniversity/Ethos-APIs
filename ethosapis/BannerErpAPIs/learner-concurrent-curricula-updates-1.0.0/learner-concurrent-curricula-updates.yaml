openapi: 3.0.0
info:
  title: Learner Concurrent Curricula Updates
  description: >
    Non-destructive updates to learner curriculum records are supported. Majors
    can be updated or added, major-based concentrations can be updated or added.
  version: 1.0.0
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-audience: all
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/learner-concurrent-curricula-updates:
    put:
      tags:
        - learner-concurrent-curricula
        - learner-concurrent-curricula-updates
      summary: Learner concurrent curricula updates are posted to SORLCUR and SORLFOS.
      description: Non-destructive updates to learner curriculum records are
        supported. Majors can be updated or added, major-based concentrations
        can be updated or added.
      requestBody:
        content:
          application/vnd.hedtech.integration.1.0.0+json:
            schema:
              type: object
              $ref: "#/components/schemas/learner-concurrent-curricula-updates-1.0.0_post_req\
                uest"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response.
              required: true
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a
                partial representation is returned. Otherwise, this header is
                not included.
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/curriculumProfile"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to
            something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "401":
          description: Failure. Unauthorized.
        "403":
          description: Failure. Forbidden. The user does not have the required permissions
            for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "404":
          description: Failure. Not Found. Cannot map the URI to a resource.
        "405":
          description: Failure. Method Not Allowed. The client tried to use an HTTP method
            that the resource does not allow.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "406":
          description: Failure. Not Acceptable. Unable to generate any of the client’s
            preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
        "500":
          description: Server error. Unexpected configuration or data.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: object
                items:
                  $ref: "#/components/schemas/errors_2_0_0"
      security:
        - BasicAuth: []
          EthosIntegrationBearer: []
      x-method-permissions: API_LEARNER_CONC_CURR_UPD
components:
  schemas:
    learner-concurrent-curricula-updates-1.0.0_post_request:
      required:
        - bannerId
        - college
        - level
        - degree
        - program
        - term
        - priorityNumber
        - learnerFieldStudies
      type: object
      properties:
        bannerId:
          title: Banner ID
          maxLength: 9
          type: string
          description: Banner ID
          format: string
          x-lineageReferenceObject: SPRIDEN_ID
        college:
          title: College
          maxLength: 2
          type: string
          description: College code of the curriculum.
          format: string
          x-lineageReferenceObject: SORLCUR_COLL_CODE
        level:
          title: Level
          type: string
          description: Level code of the curriculum.
          format: string
          x-lineageReferenceObject: SORLCUR_LEVL_CODE
        degree:
          title: degree
          type: string
          description: Degree code of the curriculum.
          format: string
          x-lineageReferenceObject: SORLCUR_DEGC_CODE
        program:
          title: program
          type: string
          description: Program of the curriculum.
          format: string
          x-lineageReferenceObject: SORLCUR_PROGRAM
        term:
          title: term
          type: string
          description: Input term used to retrieve current, active learner curricula and
            attached fields of study for the student (bannerID)
          format: string
          x-lineageReferenceObject: SORLCUR_TERM_CODE
        priorityNumber:
          title: priorityNumber
          type: number
          description: Priority of the curriculum within the module.
          format: string
          x-lineageReferenceObject: SORLCUR_PRIORITY_NO
        learnerFieldStudies:
          title: learnerFieldStudies
          type: array
          items:
            type: object
            properties:
              priorityNumber:
                title: priorityNumber
                type: number
                description: Priority of the field of study within the base curriculum for the
                  field of study type.
                format: string
                x-lineageReferenceObject: SORLFOS_PRIORITY_NO
              department:
                title: department
                type: string
                description: Department code associated with the major field of study.
                format: string
                x-lineageReferenceObject: SORLFOS_DEPT_CODE
              majorMinorConcentration:
                title: majorMinorConcentration
                type: string
                description: Major, Minor or Concentration Code.
                format: string
                x-lineageReferenceObject: SORLFOS_MAJR_CODE
              majorToAttachConcentration:
                title: majorToAttachConcentration
                type: string
                description: Major code to which the concentration is attached.
                format: string
                x-lineageReferenceObject: SORLFOS_MAJR_CODE_ATTACH
              learnerFieldStudy:
                title: learnerFieldStudy
                type: string
                description: Field of study type code, examples are MAJOR, MINOR, CONC.
                format: string
                x-lineageReferenceObject: SORLFOS_LFST_CODE
        rollIndicator:
          title: rollIndicator
          maxLength: 1
          type: string
          description: Y/N indicator of whether the learner curriculum should roll to
            academic history when courses are rolled.
          x-lineageReferenceObject: SORLCUR_ROLL_IND
        termGraduation:
          title: termGraduation
          type: string
          description: This is the expected term the learner will graduate.
          x-lineageReferenceObject: SORLCUR_TERM_CODE_GRAD
        graduationApplicationSequenceNumber:
          title: graduationApplicationSequenceNumber
          maxLength: 2
          type: string
          description: The sequence number of the graduation application.
          x-lineageReferenceObject: SORLCUR_GAPP_SEQNO
        expectedGraduationDate:
          title: Graduation Date
          maxLength: 11
          type: string
          description: Expected Graduation date of student.
          format: string
          x-lineageReferenceObject: SORLCUR_EXP_GRAD_DATE
        academicYear:
          title: Academic Year
          maxLength: 4
          type: string
          description: This is the academic year for the graduation.
          format: string
          x-lineageReferenceObject: SORLCUR_ACYR_CODE
        leaveOfAbsence:
          title: leaveOfAbsence
          type: string
          description: This describes the reason for the leave of absence.
          format: string
          x-lineageReferenceObject: SORLCUR_LEAV_CODE
        leaveFromDate:
          title: leaveFromDate
          type: string
          description: This is the start date of the leave.
          format: string
          x-lineageReferenceObject: SORLCUR_LEAV_FROM_DATE
        leaveToDate:
          title: leaveToDate
          maxLength: 4
          type: string
          description: leaveToDate
          format: string
          x-lineageReferenceObject: SORLCUR_LEAV_TO_DATE
        studentType:
          title: studentType
          type: string
          description: This describes the type of student.
          format: string
          x-lineageReferenceObject: SORLCUR_STYP_CODE
        feeAssessmentRate:
          title: feeAssessmentRate
          type: string
          description: This is the fee assessment rate code.
          format: string
          x-lineageReferenceObject: SORLCUR_RATE_CODE
        site:
          title: site
          type: string
          description: Curriculum Site Code
          format: string
          x-lineageReferenceObject: SORLCUR_SITE_CODE
    errors_2_0_0:
      required:
