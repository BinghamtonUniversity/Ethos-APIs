components:
  schemas:
    section-restrictions-adjustment-process-1.0.0_post_request:
      type: object
      required:
        - term  
        - crn
      properties:    
        term:
          title: Term
          maxLength: 6
          type: string
          description: "The term code for a set of section registration restrictions."      
          x-lineageReferenceObject: SSBSECT_TERM_CODE   
          x-lineageLookupReferenceObject: STVTERM
          example: 202201    
        crn: 
          title: Course Reference Number
          maxLength: 5
          type: string
          description: "The course reference number (CRN) assigned to the course section."
          x-lineageReferenceObject: SSBSECT_CRN
          example: 1001                      
        departmentRegistrationRestriction:
          title: Department Registration Restriction
          type: object
          required:
          - departments 
          properties:  
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SSRRDEP_DEPT_IE_CDE   
              enum:
                - includeRestriction
                - excludeRestriction
              example: includeRestriction                             
            departments:
              title: Departments
              type: array             
              items:
                type: object   
                required: 
                - department                          
                properties:            
                  department:
                    title: Department Code
                    maxLength: 4
                    type: string
                    description: "The department of students for which section registration restrictions exist. The Include/Exclude field will determine how the department is restricted. An unlimited number of departments may be defined."
                    x-lineageReferenceObject: SSRRDEP_DEPT_CODE
                    x-lineageLookupReferenceObject: STVDEPT             
                    example: NURS                                                                                                                 
        fieldOfStudyRegistrationRestrictions:
          title: Field of Study Registration Restrictions
          type: array
          items:
            type: object
            required:
            - fieldOfStudyType   
            - fieldsOfStudy    
            properties:    
              restrictionType:
                title: Restriction Type
                maxLength: 1
                type: string
                description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
                x-lineageReferenceObject: SSRRMAJ_MAJOR_IND  
                enum:
                  - includeRestriction
                  - excludeRestriction                        
                example: excludeRestriction                
              fieldOfStudyType:
                description:  Determines whether the field of study restriction is applied to all field of study types or to a specific field of study type.
                oneOf:
                - type: string
                  title: Field of Study Type Code
                  maxLength: 15
                  description: "The field of study type code associated with the field of study."                    
                  x-lineageReferenceObject: SSRRMAJ_LFST_CODE
                  x-lineageLookupReferenceObject: GTVLFST             
                  example: MINOR  
                - type: string
                  enum:
                  - all
                  maxLength: 0                            
              fieldsOfStudy:
                title: Fields of Study
                type: array               
                items:
                  type: object
                  required: 
                  - fieldOfStudy                                
                  properties:            
                    fieldOfStudy:
                      title: Field of Study Code
                      maxLength: 4
                      type: string
                      description: "The field of study of students for which section registration restrictions exist. The Include/Exclude field will determine how the field of study is restricted. An unlimited number of fields of study may be defined."
                      x-lineageReferenceObject: SSRRMAJ_MAJR_CODE
                      x-lineageLookupReferenceObject: STVMAJR             
                      example: CHEE
        classRegistrationRestriction:
          title: Class Registration Restriction
          type: object
          required:
            - classes      
          properties:     
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SSRRCLS_CLASS_IND
              enum:
                - includeRestriction
                - excludeRestriction                 
              example: excludeRestriction                            
            classes:
              title: Classes
              type: array               
              items:
                type: object   
                required: 
                - class         
                properties:            
                  class:
                    title: Class Code
                    maxLength: 2
                    type: string
                    description: "The classification of students for which section registration restrictions exist. The Include/Exclude field will determine how the class is restricted. An unlimited number of classes may be defined."
                    x-lineageReferenceObject: SSRRCLS_CLAS_CODE
                    x-lineageLookupReferenceObject: STVCLAS             
                    example: 01   
        levelRegistrationRestriction:
          title: Level Registration Restriction
          type: object
          required:
            - levels        
          properties:      
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SSRRLVL_LEVL_IND 
              enum:
                - includeRestriction
                - excludeRestriction                         
              example: includeRestriction                            
            levels:
              title: Levels
              type: array               
              items:
                type: object  
                required: 
                - level             
                properties:            
                  level:
                    title: Level Code
                    maxLength: 4
                    type: string
                    description: "The level of students for which section registration restrictions exist. The Include/Exclude field will determine how the level is restricted. An unlimited number of levels may be defined."
                    x-lineageReferenceObject: SSRRLVL_LEVL_CODE
                    x-lineageLookupReferenceObject: STVLEVL             
                    example: UG  
        degreeRegistrationRestriction:
          title: Degree Registration Restriction
          type: object
          required:
            - degrees     
          properties:     
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register. Will default to excludeRestriction if no value is included in POST request."
              x-lineageReferenceObject: SSRRDEG_DEGC_IND   
              enum:
                - includeRestriction
                - excludeRestriction                     
              example: includeRestriction                        
            degrees:
              title: Degrees
              type: array               
              items:
                type: object 
                required:
                - degree              
                properties:            
                  degree:
                    title: Degree Code
                    maxLength: 6
                    type: string
                    description: "The degree of students for which section registration restrictions exist. The Include/Exclude field will determine how the degree is restricted. An unlimited number of degrees may be defined."
                    x-lineageReferenceObject: SSRRDEG_DEGC_CODE
                    x-lineageLookupReferenceObject: STVDEGC             
                    example: BS
        programRegistrationRestriction:
          title: Program Registration Restriction
          type: object
          required: 
            - programs         
          properties:      
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
