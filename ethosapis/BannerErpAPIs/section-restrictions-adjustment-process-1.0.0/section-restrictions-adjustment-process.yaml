          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer   
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          #Add into the description an example for each criteria query supported.   
          description:                      
            |
            ### ID 
            Returns all records for the batch request ID passed.
            ```
            /batch?criteria={"id":"13371b52-1afc-4a98-8186-90f2219dad01"}
            ```
            ### Job ID 
            Returns all records for the job execution ID passed.
            ```
            /batch?criteria={"jobId": 123}
            ```
            ### Start Date
            Returns all records for the start date passed.
            ```
            /batch?criteria={"startDate":"2024-09-18 13:46:48"}
            ```
            ### Job Status
            Returns all records for the job status passed.
            ```
            /batch?criteria={"status":"completed"}
            ```          
                    
      responses:
        '201':
          description: Success
          headers:
            X-Media-Type:
