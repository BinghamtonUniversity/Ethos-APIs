openapi: 3.0.0
info:
  title: Section Restrictions Adjustment Process
  description: >
  
    The Section Restrictions Adjustment Process API is used to create and maintain section registration restrictions.  In addition, the API 
    supports the option to post section restriction adjustments in batches.  
    
    

    Section restriction details can be queried using section-restrictions.

  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SSARRES
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/section-restrictions-adjustment-process:
    post:
      tags:
      - section-restrictions-adjustment-process
      summary: Creates or updates resources in SSRRDEP, SSRRMAJ, SSRRCLS, SSRRLVL, SSRRDEG, SSRRPRG, SSRRCMP, SSRRCOL, SSRRATT and SSRRCHR.
      description: >

        A section restriction record will be created or updated with a POST request in one or all of the following - SSRRDEP, SSRRMAJ, SSRRCLS,
         SSRRLVL, SSRRDEG, SSRRPRG, SSRRCMP, SSRRCOL, SSRRATT and SSRRCHR.
        


        API behavior details:


        * For sections with no existing restrictions, the POST request inserts section restriction records as requested.


        * For existing section restrictions records, the POST request replaces any existing data associated 
        with the resource for the specified term and crn with the new data provided in the request. This ensures that the 
        resource is entirely updated to match the new data set provided.

        
        * Complete Data Set Required - The POST request must include complete objects or arrays. This means that the data sent must fully represent 
        the resource being updated. Partial data may result in an incomplete or incorrect update.

      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string            
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/section-restrictions-adjustment-process-1.0.0_post_request"
      responses:
        '201':
          description: Success
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
