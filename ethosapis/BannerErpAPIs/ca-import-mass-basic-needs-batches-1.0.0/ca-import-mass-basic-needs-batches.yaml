      - BasicAuth: []
      - EthosIntegrationBearer: []
      
components:
  schemas:
    ca-import-mass-basic-needs-batches-v1_post_request:
      type: object
      properties:
        id:
          title: ID
          description: A globally unique identifier of a batch to be used in all external
            references.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        resource:
          title: Resource
          description: The affected resource.
          type: object
          properties:
            name:
              title: Resource Name
              description: The pluralized name of the affected resource
              type: string
            version:
              title: Resource version
              description: The version of the resource
              type: string
          additionalProperties: false
          required:
            - name
            - version
        items:
          title: items
          description: List of items to be processed.
          type: array
          items:
            type: object
            $ref: "#/components/schemas/ca-import-mass-basic-needs-batches-batches-v1_post_request"
      required:
        - items
    ca-import-mass-basic-needs-batches-batches-v1_post_request:
      type: object
      properties:
        stuTermCode:
          "title": "termCode"
          "description": "TERM CODE: This field identifies the term associated with the service received by the student."
          "type": string
          "maxLength": 6
          "x-lineageReferenceObject": SVRPSID.SVRPSID_TERM_CODE
          example: 202210
        stuDicdCode:
          "title": "districtCode"
          "description": "DISTRICT CODE: The district or division associated with a student."
          "type": string
          "maxLength": 3
          "x-lineageReferenceObject": SVRPSID.SVRPSID_DICD_CODE
          example: 123
        fileCode:
          "title": "fileCode"
          "description": "SEID CODE: Social economic identity code."
          "type": string
          "maxLength": 30
          "x-lineageReferenceObject": SVRPSID.SVRPSID_SEID_CODE
          example: FOOD_SRV
        stuId:
          "title": "pidm"
          "description": "ID: Unique person identifier."
          "type": string
          "x-lineageReferenceObject": SVRPSID.SVRPSID_PIDM
          example: A00000719
        stuServiceCode:
          "title": "stuServiceCode"
          "description": Service Code."
          "type": string
          "maxLength": 30
          example: 1
        stuServiceDate:
          "title": "stuServiceDate"
          "description": "Service Date."
          "type": string
          "maxLength": 250
          example: 05/31/2018
        stuStatus:
          type: string
          description: Student Status
          example: A
        stuProviderOrigin:
          type: string
          description: Provider Origin
          example: STDN
      required:
        - stuTermCode
        - stuDicdCode
        - fileCode
        - stuId
    ca-import-mass-basic-needs-batches-batches-v1_response:
      description: "Returns the list of Ids for those applicant-requirements that were
        successfully updated . For those that did not, it returns the list of
        error messages. "
      type: object
      x-last-modified: 1694460214111
      properties:
        id:
          title: ID
          description: A globally unique identifier of a batch to be used in all external
            references.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        status:
          title: status
          description: status of the batch.
          type: string
          enum:
            - completed
            - inProgress
            - aborted
        resource:
          title: Resource
          description: The affected resource.
          type: object
          properties:
            name:
              title: Resource Name
              description: The pluralized name of the affected resource
              type: string
            version:
              title: Resource version
              description: The version of the resource
              type: string
          additionalProperties: false
          required:
            - name
            - version
        items:
          type: array
          items:
            type: object
            additionalProperties: true
            oneOf:
              - type: object
                $ref: "#/components/schemas/ca-import-mass-basic-needs-batches-v1_response"
              - type: object
                $ref: "#/components/schemas/errors_2_0_0"
          required:
            - items    
    ca-import-mass-basic-needs-batches-v1_response:
      type: object
      properties:
        id:
            type: object
            properties:
              stuId:
                  type: string
              serviceCode:
                  type: string
              serviceType:
                  type: string
              providerUserId:
                  type: string
              status:
                  type: string
              providerOrigin:
                  type: string
              message:
                  type: string
      required:
        - stuTermCode
        - stuDicdCode
        - fileCode
        - stuId
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
  securitySchemes:
    BasicAuth:
        type: http
        scheme: basic
    EthosIntegrationBearer:
        type: http
        scheme: bearer