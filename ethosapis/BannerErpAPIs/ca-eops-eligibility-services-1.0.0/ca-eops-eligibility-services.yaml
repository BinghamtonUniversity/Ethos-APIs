            "type": object
            "properties":
              stuTermCode:
                "title": "Effective term"
                "description": "TERM CODE: This field identifies the effective term associated with the service received by the student."
                "type": string
                "maxLength": 6
                "x-lineageReferenceObject": SGRESEL.SGRESEL_TERM_CODE_EFF
              eselCode:
                "title": "Eligibility factor code"
                "description": "ESEL CODE: Eligibility Factor code"
                "type": string
                "maxLength": 2
                "x-lineageReferenceObject": SGRESEL.SGRESEL_ESEL_CODE
              primaryInd:
                "title": "Primary use indicator"
                "description": "PRIMARY INDICATOR: Primary use indicator"
                "type": string
                "maxLength": 1
                "x-lineageReferenceObject": SGRESEL.SGRESEL_PRIMARY_IND
              stuId:
                "title": "Person id number"
                "description": "ID: Unique person identifier."
                "type": string
                "x-lineageReferenceObject": SGRESEL.SGRESEL_PIDM
              stuDicdCode:
                "title": "districtIdentifier"
                "description": "DISTRICT CODE: The district or division associated with a student."
                "type": string
                "maxLength": 3
                "x-lineageReferenceObject": SGRESEL.SGRESEL_DICD_CODE
      required:
        - items
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
  securitySchemes:
    BasicAuth:
      type: http
