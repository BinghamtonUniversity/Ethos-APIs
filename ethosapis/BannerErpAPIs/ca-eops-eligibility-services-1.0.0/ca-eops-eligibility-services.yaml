components:
  schemas:
    ca-eops-eligibility-services-v1_put_request:
      type: object
      properties:
              stuTermCode:
                "title": "Effective term"
                "description": "TERM CODE: This field identifies the effective term associated with the service received by the student."
                "type": string
                "maxLength": 6
                "x-lineageReferenceObject": SGRESEL.SGRESEL_TERM_CODE_EFF
              eselCode:
                "title": "Eligibility factor code"
                "description": "ESEL CODE: Eligibility Factor code"
                "type": string
                "maxLength": 2
                "x-lineageReferenceObject": SGRESEL.SGRESEL_ESEL_CODE
              primaryInd:
                "title": "Primary use indicator"
                "description": "PRIMARY INDICATOR: Primary use indicator"
                "type": string
                "maxLength": 1
                "x-lineageReferenceObject": SGRESEL.SGRESEL_PRIMARY_IND
              stuId:
                "title": "Person id number"
                "description": "ID: Unique person identifier."
                "type": string
                "x-lineageReferenceObject": SGRESEL.SGRESEL_PIDM
              stuDicdCode:
                "title": "districtIdentifier"
                "description": "DISTRICT CODE: The district or division associated with a student."
                "type": string
                "maxLength": 3
                "x-lineageReferenceObject": SGRESEL.SGRESEL_DICD_CODE
      required:
        - stuId
        - stuTermCode
    ca-eops-eligibility-services-v1-batches_post_request:
      type: object
      properties:
        items:
          "title": " List of items to be processed."
          "description": " List of items to be processed."
          "type": array
          "items": 
            "type": object
            "properties":
              stuTermCode:
                "title": "Registration effective term code that esel code is to be used"
                "description": "EFF TERM CODE: Registration term code that esel code is to be used."
                "type": string
                "maxLength": 6
                "x-lineageReferenceObject": SGRESEL.SGRESEL_TERM_CODE_EFF
              pidm:
                "title": "Unique person internal identification number."
                "description": "ID: Unique person identifier.."
                "type": string
                "x-lineageReferenceObject": SGRESEL.SGRESEL_PIDM
              eselCode:
                "title": "Eligibility Factor code"
                "description": "ESEL CODE: Eligibility Factor code"
                "type": string
                "maxLength": 2
                "x-lineageReferenceObject": SGRESEL.SGRESEL_ESEL_CODE
              primaryInd:
                "title": "Primary use Indicator"
                "description": "PRIMARY INDICATOR: Primary use indicator"
                "type": string
                "maxLength": 1
                "x-lineageReferenceObject": SGRESEL.SGRESEL_PRIMARY_IND
      required:
        - items
    ca-eops-eligibility-services-v1_post_request:
      type: object
      properties:
              stuTermCode:
                "title": "Effective term"
                "description": "TERM CODE: This field identifies the effective term associated with the service received by the student."
                "type": string
                "maxLength": 6
                "x-lineageReferenceObject": SGRESEL.SGRESEL_TERM_CODE_EFF
              eselCode:
                "title": "Eligibility factor code"
                "description": "ESEL CODE: Eligibility Factor code"
                "type": string
                "maxLength": 2
                "x-lineageReferenceObject": SGRESEL.SGRESEL_ESEL_CODE
              primaryInd:
                "title": "Primary use indicator"
                "description": "PRIMARY INDICATOR: Primary use indicator"
                "type": string
                "maxLength": 1
                "x-lineageReferenceObject": SGRESEL.SGRESEL_PRIMARY_IND
              stuId:
                "title": "Person id number"
                "description": "ID: Unique person identifier."
                "type": string
                "x-lineageReferenceObject": SGRESEL.SGRESEL_PIDM
              stuDicdCode:
                "title": "districtIdentifier"
                "description": "DISTRICT CODE: The district or division associated with a student."
                "type": string
                "maxLength": 3
                "x-lineageReferenceObject": SGRESEL.SGRESEL_DICD_CODE
      required:
        - stuId
        - stuTermCode
        - eselCode
        - stuDicdCode
    ca-eops-eligibility-services-v1-batches_response:
      type: object
      properties:
        status:
          title: status
          description: status of the batch.
          type: string
          enum:
              - completed
              - inProgress
              - aborted
          example: completed
        resource:
          title: Resource
          description: The affected resource.
          type: object
          properties:
            name:
              title: Resource Name
              description: The pluralized name of the affected resource
              type: string
              example: ca-eops-eligibility-services-v1-batches
            version:
              title: Resource version
              description: The version of the resource
              type: string
              example: application/vnd.hedtech.integration.v1.0.0+json
          additionalProperties: false
          required:
            - name
            - version
        items:
            type: array
            items:
              type: object
              additionalProperties: true
              oneOf: 
                - $ref: '#/components/schemas/ca-eops-eligibility-services-v1-batches_posted_records'
                - $ref: '#/components/schemas/errors_2_0_0'
            required:
