openapi: 3.0.0
info:
  title: ca-eops-eligibility-services
  description: API for the batch import of Eligibility block for SGAEOPS
  version: 1.0.0
  x-release-status: ga
  x-api-type: erp
  x-source-system: Banner
  x-source-domain: Student
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-eops-eligibility-services:
    get:
      tags:
        - ca-eops-eligibility-services
      summary: Provide the list of ca eops eligibility factor service batch.
      description: Provide the list of ca eops eligibility factor service batch.
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          description:
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
            properties:
              stuId:
                oneOf:
                  - type: string
                    description: Single Banner ID
                  - type: array
                    description: Array of Banner IDs
                    items:
                      type: string
              stuTermCode:
                type: string
                description: Registration effective term code
              stuDicdCode:
                type: string
                description: Registration District Identifier code
              eselCode:
                type: string
                description: Registration Eligibility Factor code
              primaryInd:
                type: string
                description: Registration Primary Indicator
            description: >
              ### Stu Id

              Returns all records for the Banner ID.

              ```
              
              /ca-eops-eligibility-services?criteria={"stuId":"231387509"}
              
              ```
              
              ### Stu Term Code

              Returns all records for the stuTermCode.

              ```
              
              /ca-eops-eligibility-services?criteria={"stuTermCode":"202319"}

              ```

              ### Stu Dicd Code

              Returns all records for the Dicd Code.

              ```

              /ca-eops-eligibility-services?criteria={"stuDicdCode":"123"}

              ```

              ### Esel Code

              Returns all records for the Esel Code.

              ```

              /ca-eops-eligibility-services?criteria={"eselCode":"A"}

              ```

              ### Primary Ind

              Returns all records for the Primary Ind.

              ```

              /ca-eops-eligibility-services?criteria={"primaryInd":"Y"}

              ```
              
              ### StuId and stuTermCode

              Returns all records for the Banner ID and stuTermCode.

              ```

              /ca-eops-eligibility-services?criteria={"stuId":"231387509","stuTermCode":"202319"}

              ```
              
              ### StuId, stuTermCode and stuDicdCode

              Returns all records for the Banner ID, stuTermCode and stuDicdCode.

              ```

              /ca-eops-eligibility-services?criteria={"stuId":"231387509","stuTermCode":"202319", "stuDicdCode":"123"}

              ```
              
              ### Stu Id, stuTermCode and eselCode

              Returns all records for the Banner ID, stuTermCode and eselCode

              ```

              /ca-eops-eligibility-services?criteria={"stuId":"231387509","stuTermCode":"202319","eselCode":"A"}

              ```

              ```
              
              ### Stu Id, stuTermCode and primaryInd

              Returns all records for the Banner ID, stuTermCode and primaryInd

              ```

              /ca-eops-eligibility-services?criteria={"stuId":"231387509","stuTermCode":"202319","primaryInd":"Y"}

              ```
              ### Multiple Banner IDs with Single Term

              Returns all records for multiple Banner IDs with the same term code.

              ```

              /ca-eops-eligibility-services?criteria={"stuTermCode":"213016","stuId":["231387511","231387510","210009710"]}

              ```
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response body is associated to"
