openapi: 3.0.0
info:
  title: Employee Job Work Schedule details
  description: >
    This API can be used to retrieve, post, or delete an employee's job work schedule details data.
    This information is displayed in the Banner administrative page NBAJOBS.
    Additionally, the API supports the option to create or update employee job work schedule details data in batches.
  version: 1.0.0-beta
  x-audience: all
  x-release-status: beta
  x-source-domain: Human Resources
  x-source-system: banner
  x-source-name: NBBWKSH
  x-api-type: erp
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employee-job-work-schedule-details:
