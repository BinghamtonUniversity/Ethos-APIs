components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    employee-job-work-schedule-details-1.0.0_get_request_criteria:    
      properties:
        personId:
          title: Person ID
          description: The global identifier for the Person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: persons 
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the PIDM value
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"
        day:
          title: Day
          description: Day number of the schedule.
          type: number
          x-lineageReferenceObject: NBRWKSH_SCHEDULE_BEGIN_DAY
          example: 1      
        workScheduleId:
          title: Work Schedule ID
          description: The global identifier for the work schedule.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: NBBWKSH
          x-lineageReferenceObject: NBBWKSH_GUID
          x-lineageDerivedLogic: A record from NBBWKSH where NBBWKSH_GUID matches the GUID value      
    employee-job-work-schedule-details-1.0.0_get_response:
      properties:
        id:
          title: Id
          type: string
          description: "The global identifier of the employee job detail."
          x-lineageReferenceObject: NBRWKSH_GUID
          example: 085df706-ee15-4947-93f8-8c260e64795e
        bannerId:
          title: Banner ID
          description: Banner ID of the employee.
          type: string
          x-lineageReferenceObject: SPRIDEN_ID
          example: "123456789"          
        position:
          title: Position
          description: The position to which the job is attached.
          type: string
          x-lineageReferenceObject: NBRWKSH_POSN
          example: "ADM0001"
        suffix:
          title: Suffix
          description: Used to uniquely create multiple jobs in the same position.
          type: string
          x-lineageReferenceObject: NBRWKSH_SUFF
          example: "00"
        effectiveOn:
          title: Effective Date
          type: string
          format: date
          description:  Date for which the job work schedule detail data becomes effective.
          x-lineageReferenceObject: NBRWKSH_EFFECTIVE_DATE
          example: "2024-03-15"
        day:
          title: Day
          description: Day number of the schedule.
          type: number
          x-lineageReferenceObject: NBRWKSH_DAY
          example: 1
        shift:
          title: Shift
          description: Shift associated with this day/schedule.
          type: string
          x-lineageReferenceObject: NBRWKSH_SHIFT
          example: "1"
        hours:
          title: Hours
          description: Hours scheduled to work on the day.
          type: number
          x-lineageReferenceObject: NBRWKSH_HOURS
          example: 8
        person:
          $ref: '#/components/schemas/person' 
    employee-job-work-schedule-details-1.0.0_post_request:
      type: object
      properties:
        id:
          title: Id
          type: string
          description: "The global identifier of the employee job detail."
          x-lineageReferenceObject: NBRWKSH_GUID
          example: "00000000-0000-0000-0000-000000000000"
        workScheduleId:
          title: Work Schedule ID
          description: The global identifier for the work schedule.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageLookupReferenceObject: NBBWKSH
          x-lineageReferenceObject: NBBWKSH_GUID
          x-lineageDerivedLogic: A record from NBBWKSH where NBBWKSH_GUID matches the GUID value
          example: "085df706-ee15-4947-93f8-8c260e64795e"
        day:
          title: Day
          description: Day number of the schedule.
          type: number
          x-lineageReferenceObject: NBRWKSH_DAY
          example: 1
        shift:
          title: Shift
          description: Shift associated with this day/schedule.
          type: string
          x-lineageReferenceObject: NBRWKSH_SHIFT
          example: "1"
        hours:
          title: Hours
          description: Hours scheduled to work on the day.
          type: number
          x-lineageReferenceObject: NBRWKSH_HOURS
          example: 8 
      required:
        - id
        - workScheduleId
        - day
        - shift
        - hours
    employee-job-work-schedule-details-1.0.0_post_response:
      $ref: '#/components/schemas/employee-job-work-schedule-details-1.0.0_get_response'
    employee-job-work-schedule-details-1.0.0_put_request:
      type: object
      properties:
        day:
          title: Day
          description: Day number of the schedule.
          type: number
          x-lineageReferenceObject: NBRWKSH_DAY
          example: 1
        shift:
          title: Shift
          description: Shift associated with this day/schedule.
          type: string
          x-lineageReferenceObject: NBRWKSH_SHIFT
          example: "1"
        hours:
          title: Hours
          description: Hours scheduled to work on the day.
          type: number
          x-lineageReferenceObject: NBRWKSH_HOURS
          example: 8         
    employee-job-work-schedule-details-1.0.0_put_request_batch:
      allOf: # Combines the id with the put request model
