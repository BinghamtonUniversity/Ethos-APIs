      tags:
        - employee-job-work-schedule-details
      summary: Get employee job work schedule details
      description: Query and retrieve employee job work schedule details data for a given criteria. Data is extracted from NBRWKSH.
      parameters:
        - name: limit
          in: query
          description:
            The maximum number of resources requesting for this result set.
            The default limit is 500 and the maximum limit is 1000.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/employee-job-work-schedule-details-1.0.0_get_request_criteria'
          description: >
            ### Person ID
            
            Returns the employee job work schedules information for this Person ID.  This filter should not be used if a Banner ID filter is used.
            
            ```

            /employee-job-work-schedule-details?criteria={"personId": "085df706-ee15-4947-93f8-8c260e64795e"}

            ```

            ### Banner ID
            
            Returns the employee job work schedules information for this Banner ID.   This filter should not be used if a Person ID filter is used.
            
            ```

            /employee-job-work-schedule-details?criteria={bannerId":"123456789"}
            
            ```

            ### Day

            Returns the employee job work schedule details information for this day.
            
            ```

            /employee-job-work-schedule-details?criteria={"day": 1}

            ```

            ### Work Schedule ID

            Returns the employee job work schedule details information for this Work Schedule ID.  This filter should not be used if a Person ID or Banner ID filter is used.
            
            ```

            /employee-job-work-schedule-details?criteria={"workScheduleId": "085df706-ee15-4947-93f8-8c260e64795e"}

            ```
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
