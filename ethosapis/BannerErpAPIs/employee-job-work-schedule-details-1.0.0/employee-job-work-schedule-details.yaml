              type: string
              description: "The global identifier of the employee job detail."
              x-lineageReferenceObject: NBRJOBS_GUID
              example: 085df706-ee15-4947-93f8-8c260e64795e
        - $ref: '#/components/schemas/employee-job-work-schedule-details-1.0.0_put_request'
    employee-job-work-schedule-details-1.0.0_put_response:
      $ref: '#/components/schemas/employee-job-work-schedule-details-1.0.0_get_response'
    employee-job-work-schedule-details-batch-1.0.0_post_request:
      type: object
      properties:
        items:
          title: items
          description: List of items to be processed.
          type: array
