openapi: 3.0.0
info:
  title: Section Meetings
  description: >
    API to retrieve, create, update and delete section meetings (SSRMEET
    records).


    Meetings are attached to a specific section in a term. Section meetings are
    displayed on the SSASECT administrative page. A small number of SSRMEET
    properties are applicable only when Banner Student localizations for
    California (CALBSTU) are installed.
  version: 1.0.0
  x-api-type: erp
  x-source-domain: Student
  x-source-name: SSRMEET
  x-source-title: null
  x-source-system: banner
  x-release-status: beta
  x-audience: all
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
