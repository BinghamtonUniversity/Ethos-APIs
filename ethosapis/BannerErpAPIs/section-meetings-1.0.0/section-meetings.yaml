components:
  schemas:
    section-meetings-1.0.0_post_request:
      type: object
      properties:
        term:
          title: Term
          maxLength: 6
          type: string
          description: Term associated with the section.
          x-lineageReferenceObject: SSRMEET_TERM_CODE
          x-lineageLookupReferenceObject: STVTERM
        crn:
          title: CRN
          maxLength: 5
          type: string
          description: Course reference number of the section.
          x-lineageReferenceObject: SSRMEET_CRN
        beginTime:
          title: Begin Time
          maxLength: 4
          type: string
          description: Begin time of the meeting
          x-lineageReferenceObject: SSRMEET_BEGIN_TIME
        endTime:
          title: End Time
          maxLength: 4
          type: string
          description: End time of the meeting
          x-lineageReferenceObject: SSRMEET_END_TIME
        building:
          title: Building
          maxLength: 6
          type: string
          x-lineageReferenceObject: SSRMEET_BLDG_CODE
          x-lineageLookupReferenceObject: STVBLDG
        room:
          title: Room
          maxLength: 10
          type: string
          x-lineageReferenceObject: SSRMEET_ROOM_CODE
          x-lineageLookupReferenceObject: SLARDEF
        startOn:
          title: Meeting Start Date
          type: string
          format: date
          x-lineageReferenceObject: SSRMEET_START_DATE
        endOn:
          title: Meeting End Date
          type: string
          format: date
          x-lineageReferenceObject: SSRMEET_END_DATE
        session:
          title: Session Indicator
          maxLength: 2
          type: string
          description: Meeting Session Indicator. If not submitted a value of 01 will be
            defaulted.
          x-lineageReferenceObject: SSRMEET_CATAGORY
        meetsOnSunday:
          title: Meets on Sunday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_SUN_DAY
        meetsOnMonday:
          title: Meets on Monday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_MON_DAY
        meetsOnTuesday:
          title: Meets on Tuesday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_TUE_DAY
        meetsOnWednesday:
          title: Meets on Wednesday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_WED_DAY
        meetsOnThursday:
          title: Meets on Thursday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_THU_DAY
        meetsOnFriday:
          title: Meets on Friday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_FRI_DAY
        meetsOnSaturday:
          title: Meets on Saturday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_SAT_DAY
        scheduleType:
          title: Schedule Type
          maxLength: 3
          type: string
          description: Schedule type for the meeting. If not submitted the schedule type
            of the section will be defaulted.
          x-lineageReferenceObject: SSRMEET_SCHD_CODE
          x-lineageLookupReferenceObject: STVSCHD
        overrideConflict:
          title: Section meeting conflict override indicator
          maxLength: 1
          type: string
          description: Indicates an override of time and/or room conflicts among meetings.
          x-lineageReferenceObject: SSRMEET_OVER_RIDE
        sessionCreditHours:
          title: Session Credit Hours
          maxLength: 7
          type: number
          description: Session credit hours for the meeting. Total credit hours across all
            meetings may not exceed the section credit hours.
          x-lineageReferenceObject: SSRMEET_CREDIT_HR_SESS
        hoursPerWeek:
          title: Meeting Hours Per Week
          maxLength: 5
          type: number
          description: Calculated meeting hours per week. Value may be manually overriden.
          x-lineageReferenceObject: SSRMEET_HRS_WEEK
        schedulingInterfaceStatus:
          title: Scheduling Interface Status
          maxLength: 3
          type: string
          description: Schedule status code for use with Scheduling Tool Interface.
          x-lineageReferenceObject: SSRMEET_SCHS_CODE
          x-lineageLookupReferenceObject: GTVSCHS
        meetingType:
          title: Meeting Type
          maxLength: 4
          type: string
          description: If not submitted a default of CLAS will be used.
          x-lineageReferenceObject: SSRMEET_MTYP_CODE
          x-lineageLookupReferenceObject: GTVMTYP
        breakMinutesIncluded:
          title: Break Minutes Included
          type: boolean
          description: Indicates breaks are included in contact hours. CALBSTU restricted
            property.
          x-lineageReferenceObject: SSRMEET_BREAK_IND
        breakMinutesAdjustment:
          title: Break Minutes Adjustment
          maxLength: 3
          type: number
          description: Number of Daily Break Minutes to be included in the contact hours
            calculation. CALBSTU restricted property.
          x-lineageReferenceObject: SSRMEET_BREAK_MIN_ADJUST
        hoursPerDay:
          title: Hours Per Day
          maxLength: 5
          type: number
          description: Section meeting hours per day. CALBSTU restricted property.
          x-lineageReferenceObject: SSRMEET_HRS_DAY
        hoursPerDayManualOverrideAllowed:
          title: Hours Per Day Override Allowed
          maxLength: 1
          type: boolean
          description: Hours per day or Hours per week calculated fields can be overridden
            by a manual entry. CALBSTU restricted property.
          x-lineageReferenceObject: SSRMEET_HRS_OVER_IND
        totalHours:
          title: Total Meeting Hours
          maxLength: 7
          type: number
          description: Calculated unless the hoursPerDayManualOverrideAllowed is true,
            then it is manually entered. CALBSTU restricted property.
          x-lineageReferenceObject: SSRMEET_HRS_TOTAL
      required:
        - term
        - crn
        - startOn
        - endOn
    section-meetings-1.0.0_put_request:
      type: object
      properties:
        id:
          title: Meeting Row ID
          maxLength: 19
          type: number
          format: integer
          description: Unique key for the meeting row
          x-lineageReferenceObject: SSRMEET_SURROGATE_ID
        beginTime:
          title: Begin Time
          maxLength: 4
          type: string
          description: Begin time of the meeting
          x-lineageReferenceObject: SSRMEET_BEGIN_TIME
        endTime:
          title: End Time
          maxLength: 4
          type: string
          description: End time of the meeting
          x-lineageReferenceObject: SSRMEET_END_TIME
        building:
          title: Building
          maxLength: 6
          type: string
          x-lineageReferenceObject: SSRMEET_BLDG_CODE
          x-lineageLookupReferenceObject: STVBLDG
        room:
          title: Room
          maxLength: 10
          type: string
          x-lineageReferenceObject: SSRMEET_ROOM_CODE
          x-lineageLookupReferenceObject: SLARDEF
        startOn:
          title: Meeting Start Date
          type: string
          format: date
          x-lineageReferenceObject: SSRMEET_START_DATE
        endOn:
          title: Meeting End Date
          type: string
          format: date
          x-lineageReferenceObject: SSRMEET_END_DATE
        session:
          title: Session Indicator
          maxLength: 2
          type: string
          description: Meeting Session Indicator. If not submitted a value of 01 will be
            defaulted.
          x-lineageReferenceObject: SSRMEET_CATAGORY
        meetsOnSunday:
          title: Meets on Sunday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_SUN_DAY
        meetsOnMonday:
          title: Meets on Monday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_MON_DAY
        meetsOnTuesday:
          title: Meets on Tuesday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_TUE_DAY
        meetsOnWednesday:
          title: Meets on Wednesday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_WED_DAY
        meetsOnThursday:
          title: Meets on Thursday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_THU_DAY
        meetsOnFriday:
          title: Meets on Friday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_FRI_DAY
        meetsmeetsOnSaturday:
          title: Meets on Saturday
          maxLength: 1
          type: boolean
          x-lineageReferenceObject: SSRMEET_SAT_DAY
        scheduleType:
          title: Schedule Type
          maxLength: 3
          type: string
          description: Schedule type for the meeting. If not submitted the schedule type
            of the section will be defaulted.
          x-lineageReferenceObject: SSRMEET_SCHD_CODE
          x-lineageLookupReferenceObject: STVSCHD
        overrideConflict:
