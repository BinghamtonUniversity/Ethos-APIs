              x-lineageReferenceObject: derived
              x-lineageDerivedLogic: "The to term is derived by querying the system to locate the next effective term that is greater than the from term. On the highest effective term record the system default term of 999999 is displayed as the to term."
              x-lineageLookupReferenceObject: STVTERM
              example: 999999                                  
            fees:
              title: Course Fee Details
              type: array
              items: 
                type: object
                required:
                  - detailCode
                  - amount
                  - feeType             
                properties:
                  sequenceNumber:
                    title: Sequence Number
                    maxLength: 4
                    type: number
                    description: "Sequence number identifying the section fee."
                    x-lineageReferenceObject: SCRFEES_SEQ_NO
                    example: 1                 
                  detailCode:
                    title: Detail Code
                    maxLength: 4
                    type: string
                    description: "The detail code associated with the fee."
                    x-lineageReferenceObject: SCRFEES_DETL_CODE
                    x-lineageLookupReferenceObject: TBBDETC
                    example: 0009
                  detailCodeDescription: 
                    title: Attribute Code Description
                    maxLength: 30
                    type: string
                    description: "Description of the detail code."
                    x-lineageReferenceObject: TBBDETC_DESC
                    example: Tuition Fee
                  amount: 
                    title: Fee Amount
                    maxLength: 16
                    multipleOf: 0.01
                    type: number
                    description: "Amount of the fee."
                    x-lineageReferenceObject: SCRFEES_AMOUNT
                    example: 15.99     
                  feeType: 
                    title: Fee Type Code
                    maxLength: 4
                    type: string
                    description: "Code of the fee type, such as flat fee, per credit hour, per billing hour, per duration unit, used in the fee assessment calculation for a student's registration fees for a section/course."
                    x-lineageReferenceObject: SCRFEES_FTYP_CODE
                    x-lineageLookupReferenceObject: STVFTYP
                    example: F  
                  feeTypeDescription: 
                    title: Fee Type Code Description
                    maxLength: 30
                    type: string
                    description: "Description of the fee type code."
                    x-lineageReferenceObject: STVFTYP_DESC
                    example: Tuition Fee                                 
                  modifiedOn:
