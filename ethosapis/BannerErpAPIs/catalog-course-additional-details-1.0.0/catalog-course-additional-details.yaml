              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_CAT_CRSE_ADDTL_DETS
components:
  schemas:
    catalog-course-additional-details-1.0.0_qapi_post_request:
      type: object
      required:
        - queryTerm        
      properties:              
        subject:
          title: Subject
          maxLength: 4
          type: string
          description: "The subject area of the course."
          x-lineageReferenceObject: SCBCRKY_SUBJ_CODE
          x-lineageLookupReferenceObject: STVSUBJ
          example: MATH
        courseNumber: 
          title: Course Number
          maxLength: 5
          type: string
          description: "The course number associated with the subject for the course."
          x-lineageReferenceObject: SCBCRKY_CRSE_NUMB
          example: 101        
        queryTerm:
          title: Query Term
          maxLength: 6
          type: string
          description: "A user provided value.  The query term code is used to retrieve the most current course details that are less than, or equal to, the provided value."         
          x-lineageLookupReferenceObject: STVTERM
          example: 202201    
    catalog-course-additional-details-1.0.0_qapi_post_response:
      type: object
      required:
        - subject
        - courseNumber
        - queryTerm      
      properties:
        subject:
          title: Subject
          maxLength: 4
          type: string
          description: "The subject area of the course."
          x-lineageReferenceObject: SCBCRKY_SUBJ_CODE
          x-lineageLookupReferenceObject: STVSUBJ
          example: MATH
        courseNumber: 
          title: Course Number
          maxLength: 5
          type: string
          description: "The course number associated with the subject for the course."
          x-lineageReferenceObject: SCBCRKY_CRSE_NUMB
          example: 101        
        queryTerm:
          title: Query Term
          maxLength: 6
          type: string
          description: "A user provided value.  The query term code is used to retrieve the most current course details that are less than, or equal to, the provided value."
