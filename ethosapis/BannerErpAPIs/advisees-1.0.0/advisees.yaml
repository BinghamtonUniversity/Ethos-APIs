openapi: 3.0.0
info:
  title: advisees
  description: >
    Retrieves the list of all advisees for an advisor and their personal
    information that are setup at an institution level for a particular term.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: erp
  x-release-status: ga
  x-source-domain: Student
  x-source-title: Advisees
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: advisees
paths:
  /api/advisors/{id}/advisees:
    get:
      description: >
        Retrieves the list of all advisees for an advisor and their personal
        information that are setup at an institution level for a particular
        term.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ADVISEES
      tags:
        - advisees
      parameters:
        - name: term
          in: query
          required: true
          schema:
            type: string
          example: "202014"
        - name: id
          in: path
          required: true
          description: |
            
            ```
            /api/advisors/710000028/advisees?term=202014
            ```
          schema:
            type: string
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 


            ``` application/vnd.hedtech.integration.v1.0.0+json
             ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/advisee"
            application/xml:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/advisee"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/advisors/{advisor_id}/advisees/{advisee_id}:
    get:
      description: >
        Retrieves the primary curriculum information of an advisee for an
        advisor setup at an institution level for a particular term.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ADVISEES
      tags:
        - advisees
      parameters:
        - name: term
          in: query
          required: true
          schema:
            type: string
          example: "202014"
        - name: advisor_id
          in: path
          required: true
          schema:
            type: string
            minimum: 1
        - name: advisee_id
          in: path
          required: true
          description: |
            
            ```
            /api/advisors/710000028/advisees?term=202014
            ```
          schema:
            type: string
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version.  ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/adviseeObject"
            application/xml:
              schema:
                type: object
                $ref: "#/components/schemas/adviseeObject"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    advisee:
      type: object
      properties:
        bannerId:
          type: string
        confidential:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        surnamePrefix:
          type: string
        middleInitial:
          type: string
        registeredForTerm:
          type: string
        email:
          type: string
        deceased:
          type: string
        advisorAdviseeRelationships:
          type: array
          items:
            type: object
            properties:
              advisorType:
                type: string
              primaryIndicator:
                type: string
    adviseeObject:
      type: object
      properties:
        academicStanding:
          type: string
        bannerId:
          type: string
        admitType:
          type: string
        campus:
          type: string
        classDescription:
          type: string
        college:
          type: string
        concentration:
          type: string
        degree:
          type: string
        major:
          type: string
        minor:
          type: string
        overallLevelGPA:
          type: number
        program:
          type: string
        studentStatus:
          type: string
        studentType:
          type: string
        studyLevel:
          type: string
        termAdmit:
          type: string
        termCatalog:
          type: string
