components:
  schemas:
    student-deposit-details-response:
      type: object
      title: Student deposit details response
      properties:
        bannerId:
          title: Banner ID
          description: "Identification name for a student."
          type: string
        transactionNumber:
          title: Transaction Number
          description: "Transaction number (one-up within entity) of the deposit."
          type: number
          x-lineageReferenceObject: TBRDEPO_TRAN_NUMBER
        term:
          title: Term
          description: "Term associated with the deposit. For student deposits valid in STVTERM, or ARTERM for non-student deposits."
          type: string
          x-lineageReferenceObject: TBRDEPO_TERM_CODE
        description:
          title: Description
          description: "Free-form description associated with the deposit.  Default value comes from the Detail Code description (TBBDETC)."
          type: string
          x-lineageReferenceObject: TBRDEPO_DESC
        detailCodeDeposit:
          title: Detail Code Deposit
          description: "Detail code used when the deposit is released to the receivable ledger. Valid in deposit control rules (TBBDEPC)."
          type: string
          x-lineageReferenceObject: TBRDEPO_DETAIL_CODE_DEPOSIT
        amount:
          title: Amount
          description: "The amount of the deposit."
          type: number
          x-lineageReferenceObject: TBRDEPO_AMOUNT
        detailCodePayment:
          title: Detail Code Payment
          description: "Detail code associated with the creation of a new deposit, indicating payment media of check, cash, charge, and so on. Valid in TBBDETC."
          type: string
          x-lineageReferenceObject: TBRDEPO_DETAIL_CODE_PAYMENT
        automaticReleaseIndicator:
          title: Automatic Release Indicator
          description: "Indicates whether the deposit should be automatically released to the account as of the release date.  Valid values are: Y - Automatic release, N - Manual release."
          type: string
          x-lineageReferenceObject: TBRDEPO_AUTO_RELEASE_IND
        accountFeedIndicator:
          title: Account Feed Indicator
          description: "The status of the deposit in the accounting feed.  Valid values are: Y - Feed transaction, F - Transaction fed."
          type: string
          x-lineageReferenceObject: TBRDEPO_ACCT_FEED_IND
        userData:
          title: User
          description: "User ID of the cashier who created the deposit."
          type: string
          x-lineageReferenceObject: TBRDEPO_USER
        entryDate:
          title: Entry Date
          description: "Entry date and time of the deposit, when initially created."
          type: string
          x-lineageReferenceObject: TBRDEPO_ENTRY_DATE
        receiptNumber:
          title: Receipt Number
          description: "Receipt number for the deposit. Generated one up number automatically when payment detail code receipt indicator is checked; otherwise not generated."
          type: number
          x-lineageReferenceObject: TBRDEPO_RECEIPT_NUMBER
        minimumAmount:
          title: Minimum Amount
          description: "Minimum amount that must remain as a deposit balance and not be released until the expiration date has passed."
          type: number
          x-lineageReferenceObject: TBRDEPO_MIN_AMOUNT
        expirationDate:
          title: Expiration Date
          description: "Expiration date of the deposit, after which it may be released to the receivable account without regard to the minimum."
          type: string
          x-lineageReferenceObject: TBRDEPO_EXPIRATION_DATE
        releaseDate:
          title: Release Date
          description: "Earliest date when the deposit may be released either automatically or manually. If this field is blank, the deposit may be released at any time."
          type: string
          x-lineageReferenceObject: TBRDEPO_RELEASE_DATE
        effectiveDate:
          title: Effective Date
          description: "Effective date of the deposit.  Default value is the date the deposit was entered."
          type: string
          x-lineageReferenceObject: TBRDEPO_EFFECTIVE_DATE
        lastModified:
          title: Last Modified Date
          description: "The last date this row was created or updated."
          type: string
          x-lineageReferenceObject: TBRDEPO_ACTIVITY_DATE
        sessionNumber:
          title: Session Number
          description: "Cashier session number in which this transaction was posted (0 = current session)."
          type: number
          x-lineageReferenceObject: TBRDEPO_SESSION_NUMBER
        cashierEndDate:
          title: Cashier End Date
          description: "End date and time of the cashiering session for this transaction."
          type: string
          x-lineageReferenceObject: TBRDEPO_CSHR_END_DATE
        currencyCode:
          title: Currency Code
          description: "Foreign currency code used when creating a deposit, valid in GTVCURR and GURCURR."
          type: string
          x-lineageReferenceObject: TBRDEPO_CURR_CODE
        transactionDate:
          title: Transaction Date
          description: "Transaction date used by the finance system to control posting to the ledgers. "
          type: string
          x-lineageReferenceObject: TBRDEPO_TRANS_DATE
        foreignAmount:
          title: Foreign Amount
          description: "The amount of the deposit stated in foreign currency."
          type: number
          x-lineageReferenceObject: TBRDEPO_FOREIGN_AMOUNT
        feedDate:
          title: Feed Date
          description: "Date this transaction was fed to the finance system."
          type: string
          x-lineageReferenceObject: TBRDEPO_FEED_DATE
        feedDocumentCode:
          title: Feed Document Code
          description: "Document code used to feed this transaction to the finance system."
          type: string
          x-lineageReferenceObject: TBRDEPO_FEED_DOC_CODE
        addressTypeCode:
          title: Address Type Code
          description: "In combination with ATYP_SEQNO, the address associated with this deposit for non-student transactions. Valid in STVATYP."
          type: string
          x-lineageReferenceObject: TBRDEPO_ATYP_CODE
        addressTypeCodeSequenceNumber:
          title: Address Sequence Number
          description: "In combination with ATYP_CODE, the address associated with this deposit for non-student transactions. Combination valid and active in SPRADDR."
          type: number
          x-lineageReferenceObject: TBRDEPO_ATYP_SEQNO
        dataOrigin:
          title: Data Origin
          description: "Source system that last created or updated the data."
          type: string
          x-lineageReferenceObject: TBRDEPO_DATA_ORIGIN
        createSource:
          title: Create Source
          description: "Source system that initially created the record."
          type: string
          x-lineageReferenceObject: TBRDEPO_CREATE_SOURCE
        documentNumber:
          title: Document Number
          description: "Document number that references a source document for the deposit."
          type: number
          x-lineageReferenceObject: TBRDEPO_DOCUMENT_NUMBER
        lastModifiedBy:
          title: Last Modified By
          description: "The user ID of the person who inserted or last updated this record."
          type: string
          x-lineageReferenceObject: TBRDEPO_USER_ID
