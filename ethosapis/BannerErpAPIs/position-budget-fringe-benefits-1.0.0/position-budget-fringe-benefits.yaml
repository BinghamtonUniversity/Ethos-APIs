          description: The amount of money budgeted for the fringe benefits of this
            position.
          type: number
      required:
        - positionCode
        - fiscCode
        - coasCode
        - budgetId
        - phase
      additionalProperties: false
    ErrorsObj:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        message:
          type: string
