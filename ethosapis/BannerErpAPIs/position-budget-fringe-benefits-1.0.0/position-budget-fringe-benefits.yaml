components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-extension-fringe-benefit.json:
      title: Position Budget Fringe Benefits
      description: Displays the details of the Fringe Benefits for the particular year
        and postion.
      type: object
      properties:
        positionCode:
          title: Position Code
          description: Position number for the position.
          type: string
        fiscCode:
          title: Fiscal Year
          description: BANNER HR system defined code for the fiscal year.
          type: string
        coa:
          title: Chart of Accounts code
          description: The BANNER FINANCE Chart of Accounts Code under which the position
            is created.
          type: string
        organization:
          title: Fringe Benefits Organization code
          description: Organization that controls the budget for the Fringe Benefits for
            this position.
          type: string
        budgetId:
          title: Fringe Benefits Budget ID code
          description: System defined code for Budget Id of the Fringe
            Benefits.  Validated against BANNER FINANCE if it is installed.
          type: string
        phase:
          title: Fringe Benefits Budget Phase code
          description: A system defined code for the Budget Phase for the Fringe
            Benefits.  Validated against BANNER FINANCE if it is installed.
          type: string
        benefitCode:
          title: Benefit Code - Benefit Description
          description: A code that identifies the  Benefit/Deduction category.
          type: string
        budgetToPost:
          title: Fringe Benefit Budget To post
          description: Amount of the Fringe Benefits budget that has to be posted to
            Finance.
          type: number
        budgetedAmount:
          title: Fringe Benefits Budget Amount
          description: Amount Budgeted for the Fringe Benefits for this position.
          type: number
        expend:
          title: Fringe Benefits Expended Amount
          description: Amount of money expended towards the Fringe Benefits Budget for
            this position.
          type: string
        ftotRemaining:
          title: Fringe Benefits Remaining Amount
          description: The differnce of Fringe Benefits Budgeted Amount and the Expended
            Amount will be the Fringe Benefits Remaining Amount.
          type: number
        status:
          title: Status
          description: Status of Fringe Benefits Budget Total Record. Values (C)losed,
            (A)pproved, (W)orking, (T)ransferred.
          type: string
        activityDate:
          title: Activity Date
          description: Date when the record was inserted or last modified.
          type: string
        userId:
          title: User ID
          description: The user ID of the person who inserted or last updated this record.
          type: string
      required:
        - positionCode
        - fiscCode
    schema-extension-fringe-charge.json:
      title: Position Budget Fringe Charge Back
      description: Displays the details of the Fringe Charge Back values for the
        particular year and postion when the Fringe Rules are applied in the
        NTRFINI.
      type: object
      properties:
        positionCode:
          title: Position Code
          description: Position number for the position.
          type: string
        fiscCode:
          title: Fiscal Year
          description: BANNER HR system defined code for the fiscal year.
          type: string
        coasCode:
          title: Chart of Accounts code
          description: The BANNER FINANCE Chart of Accounts Code under which the position
            is created.
          type: string
        orgnCode:
          title: Fringe Organization code
          description: Fringe organization code as defined in the Banner Finance system.
          type: string
        salaryOrganizationCode:
          title: Salary Organization Code
          description: Organization code as defined in the Banner Finance system.
          type: string
        budgetId:
          title: Fringe Charge Back Budget ID
          description: System Defined Code for the Position Budget Id.
          type: string
        phase:
          title: Fringe Charge Back Budget Phase code
          description: System Defined Code for the Budget Phase.
          type: string
        budgetedAmount:
          title: Budget Fringe
          description: The amount of money budgeted for the fringe benefits of this
            position.
          type: number
        expendedAmount:
          title: Fringe Expended Amount
          description: The amount of money expended towards the fringe benefits of this
            position.
          type: string
        remainingAmount:
          title: Fringe Charge Back Remaining Amount
          description: The differnce of Fringe Budgeted Amount and the Expended Amount
            will be the Fringe Charge Back Remaining Amount.
          type: number
        encumberedAmount:
          title: Fringe Encumbrance
          description: The amount of money encumbered towards the fringe benefits of this
            position.
          type: number
        status:
          title: Status
          description: Position total status.(C)losed, (A)pproved, (W)orking, (T)ransferred.
          type: string
        indexCode:
          title: Account Index Code
          description: Index defined in the BANNER Finance system.
          type: string
        fundCode:
          title: Fringe Fund Code
          description: Fringe fund code as defined in the Banner Finance system.
          type: string
        accountCode:
          title: Fringe Account Code
          description: Fringe account code as defined in the Banner Finance system.
          type: string
        program:
          title: Fringe Program Code
          description: Fringe program code as defined in the Banner Finance system.
          type: string
        activity:
          title: Fringe Activity Code
          description: Fringe activity code as defined in the Banner Finance system.
          type: string
        location:
          title: Fringe Location Code
          description: Fringe location code as defined in the Banner Finance system.
          type: string
      required:
        - positionCode
        - fiscCode
    schema-extension-fringe-benefit-request.json:
      title: Position Budget Fringe Benefits Request Body
      description: Displays the details of the Fringe Benefits for the particular year
        and postion.
      type: object
      properties:
        positionCode:
          title: Position Code
          description: Position number for the position.
          type: string
        fiscCode:
          title: Fiscal Year
