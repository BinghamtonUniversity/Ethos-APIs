        - fiscCode
        - coasCode
        - budgetId
        - phase
        - earningCode
        - budgetedAmount
      additionalProperties: false
    schema-extension-fringe-charge-request.json:
      title: Position Budget Fringe Charge Request Body
      description: Displays the details of the Fringe Charge Benefits for the
        particular year and postion.
      type: object
      properties:
        positionCode:
          title: Position Code
          description: Position number for the position.
          type: string
        fiscCode:
          title: Fiscal Year
          description: BANNER HR system defined code for the fiscal year.
          type: string
        coasCode:
          title: Chart of Accounts code
          description: The BANNER FINANCE Chart of Accounts Code under which the position
            is created.
          type: string
        budgetId:
          title: Fringe Benefits Budget ID code
          description: System defined code for Budget Id of the Fringe
            Benefits.  Validated against BANNER FINANCE if it is installed.
          type: string
        phase:
          title: Fringe Benefits Budget Phase code
          description: A system defined code for the Budget Phase for the Fringe
            Benefits.  Validated against BANNER FINANCE if it is installed.
          type: string
        indexCode:
          title: Account Index Code
          description: Index defined in the BANNER Finance system.
          type: string
        fundCode:
          title: Fringe Fund Code
          description: Fringe fund code as defined in the Banner Finance system.
          type: string
        orgnCode:
