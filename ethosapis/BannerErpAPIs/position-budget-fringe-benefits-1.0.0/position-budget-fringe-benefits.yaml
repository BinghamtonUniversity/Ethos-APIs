          type: string
        coasCode:
          title: Chart of Accounts code
          description: The BANNER FINANCE Chart of Accounts Code under which the position
            is created.
          type: string
        budgetId:
          title: Fringe Benefits Budget ID code
          description: System defined code for Budget Id of the Fringe
            Benefits.  Validated against BANNER FINANCE if it is installed.
          type: string
        phase:
          title: Fringe Benefits Budget Phase code
          description: A system defined code for the Budget Phase for the Fringe
            Benefits.  Validated against BANNER FINANCE if it is installed.
          type: string
        benefitCode:
          title: Benefit Code
          description: A code which identifies the Deduction code.
          type: string
        budgetedAmount:
          title: Fringe Benefits Budget Amount
          description: Amount Budgeted for the Fringe Benefits for this position.
          type: number
        expendedAmount:
          title: Fringe Benefits Expended Amount
          description: Amount of money expended towards the Fringe Benefits for this
            position.
          type: string
      required:
