        scheduleLaborDistributions:
          title: Schedule Labor Distribution Details
          description: >
                Please note special processing for scheduledLaborDistributions as follows -
                            
                  - **Update Operation**: If the `sequenceNumber` is provided along with other fields (e.g. chart, percentage), the operation is treated as an **update** for the existing schedule labor distribution.
                            
                  - **Delete Operation**: If the `sequenceNumber` is provided without any other fields, the operation is treated as a **delete** for the corresponding schedule labor distribution.
                            
                  - **Create Operation**: If the `sequenceNumber` is omitted, the operation is treated as a **create** for a new schedule labor distribution.

