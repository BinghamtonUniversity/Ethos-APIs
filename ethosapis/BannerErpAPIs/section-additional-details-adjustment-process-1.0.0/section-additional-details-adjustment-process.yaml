components:
  schemas:
    section-additional-details-adjustment-process-1.0.0_post_request:
      type: object
      required:
        - term  
        - crn
      properties:    
        term:
          title: Term
          maxLength: 6
          type: string
          description: "The term code for a set of section registration restrictions."      
          x-lineageReferenceObject: SSBSECT_TERM_CODE   
          x-lineageLookupReferenceObject: STVTERM
          example: 202201    
        crn: 
          title: Course Reference Number
          maxLength: 5
          type: string
          description: "The course reference number (CRN) assigned to the course section."
          x-lineageReferenceObject: SSBSECT_CRN
          example: 1001                      
        fees:
          title: Section Fee Details
          type: array
          items: 
            type: object
            required:
              - detailCode
              - amount
              - feeType             
            properties:
              level:
                title: Level
                maxLength: 2
                type: string
                description: "The level code associated with the fee."
                x-lineageReferenceObject: SSRFEES_LEVL_CODE
                x-lineageLookupReferenceObject: STVLEVL
                example: UG         
              detailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "The detail code associated with the fee."
                x-lineageReferenceObject: SSRFEES_DETL_CODE
                x-lineageLookupReferenceObject: TBBDETC
                example: 0009
              amount: 
                title: Fee Amount
                maxLength: 12
                multipleOf: 0.01
                type: number
                description: "Amount of the fee."
                x-lineageReferenceObject: SSRFEES_AMOUNT
                example: 15.99     
              feeType: 
                title: Fee Type Code
                maxLength: 4
                type: string
                description: "Code of the fee type, such as flat fee, per credit hour, per billing hour, per duration unit, used in the fee assessment calculation for a student's registration fees for a section/course."
                x-lineageReferenceObject: SSRFEES_FTYP_CODE
                x-lineageLookupReferenceObject: STVFTYP
                example: F  
              studentCurriculumRule:
                title: Student Curriculum Rule
                type: object      
                properties:                  
                  level:
                    title: Level Code
                    maxLength: 2
                    type: string
                    description: "Student level for the fee assessment rule."
                    x-lineageReferenceObject: SSRFEES_LEVL_CODE_STDN
                    x-lineageLookupReferenceObject: STVLEVL          
                    example: AP
                  campus:
                    title: Campus Code
                    maxLength: 3
                    type: string
                    description: "Campus for the fee assessment rule."
                    x-lineageReferenceObject: SSRFEES_CAMP_CODE
                    x-lineageLookupReferenceObject: STVCAMP          
                    example: M
                  college:
                    title: College Code
                    maxLength: 2
                    type: string
                    description: "College for the fee assessment rule."
                    x-lineageReferenceObject: SSRFEES_COLL_CODE
                    x-lineageLookupReferenceObject: STVCOLL         
                    example: M
                  degree:
                    title: Degree Code
                    maxLength: 2
                    type: string
                    description: "Degree for the fee assessment rule."
                    x-lineageReferenceObject: SSRFEES_DEGC_CODE
                    x-lineageLookupReferenceObject: STVDEGC         
                    example: BA
                  program:
                    title: Program Code
                    maxLength: 12
                    type: string
                    description: "Program for the fee assessment rule."
                    x-lineageReferenceObject: SSRFEES_PROGRAM
                    x-lineageLookupReferenceObject: SMARPLE         
                    example: BA-ENGL
                  fieldOfStudyType:
                    title: Field of Study Type Code
                    maxLength: 15
                    type: string
                    description: "Student field of study type for the fee assessment rule."
                    x-lineageReferenceObject: SSRFEES_LFST_CODE
                    x-lineageLookupReferenceObject: GTVFLST         
                    example: INTERNSHIP
                  fieldOfStudy:
                    title: Field of Study Code
                    maxLength: 4
                    type: string
                    description: "The field of study of students subject to the fee rule."
                    x-lineageReferenceObject: SSRFEES_MAJR_CODE
                    x-lineageLookupReferenceObject: STVMAJR             
                    example: CHEE
                  department:
                    title: Department Code
                    maxLength: 4
                    type: string
                    description: "The department of students subject to the fee rule."
                    x-lineageReferenceObject: SSRFEES_DEPT_CODE
                    x-lineageLookupReferenceObject: STVDEPT             
                    example: NURS
                  admissionTerm:
                    title: Admission Term
                    maxLength: 6
                    type: string
                    description: "The term code student was admitted to the curriculum."
                    x-lineageReferenceObject: SSRFEES_TERM_CODE_ADMIT
                    x-lineageLookupReferenceObject: STVTERM             
                    example: 202430
                  curriculumRate:
                    title: Curriculum Rate Code
                    maxLength: 5
                    type: string
                    description: "This is the fee assessment rate code on the curriculum record."
                    x-lineageReferenceObject: SSRFEES_RATE_CODE_CURRIC
                    x-lineageLookupReferenceObject: STVRATE             
                    example: LOCAL
                  curriculumStudentType:
                    title: Curriculum Student Type Code
                    maxLength: 1
                    type: string
                    description: "This is the student type code on the curriculum record."
                    x-lineageReferenceObject: SSRFEES_STYP_CODE_CURRIC
                    x-lineageLookupReferenceObject: STVSTYP          
                    example: 0
                  curriculumRank:
                    title: Curriculum Rank
                    description: "Curriculum rank for the fee assessment rule."
                    x-lineageReferenceObject: SSRFEES_PRIM_SEC_CDE        
                    oneOf:
                    - type: string
                      enum: 
                      - primary
                      - secondary
                      - any
                    - type: string
                      maxLength: 0
                    example: primary
              studentCharacteristicRule:
                title: Student Characteristic Rule
                type: object      
                properties:                  
                  residency:
                    title: Residency Status Code
                    maxLength: 1
                    type: string
                    description: "The residency status of the student for the effective term."
                    x-lineageReferenceObject: SSRFEES_RESD_CODE
                    x-lineageLookupReferenceObject: STVRESD
                    example: R        
                  attribute:
                    title: Attribute Code
                    maxLength: 4
                    type: string
                    description: "Attribute code on the general student record."
                    x-lineageReferenceObject: SSRFEES_ATTS_CODE
                    x-lineageLookupReferenceObject: STVATTS
                    example: 01      
                  rate:
                    title: Rate Code
                    maxLength: 5 
                    type: string
                    description: "The fee assessment rate code on the general student record."
                    x-lineageReferenceObject: SSRFEES_RATE_CODE
                    x-lineageLookupReferenceObject: STVRATE
                    example: FPPC     
                  type:
                    title: Student Type Code
                    maxLength: 1 
                    type: string
                    description: "The type of student on the general student record."
                    x-lineageReferenceObject: SSRFEES_STYP_CODE
                    x-lineageLookupReferenceObject: STVSTYP
                    example: R    
                  cohort:
                    title: Cohort Code
                    maxLength: 10 
                    type: string
                    description: "The cohort code on the general student record."
                    x-lineageReferenceObject: SSRFEES_CHRT_CODE
                    x-lineageLookupReferenceObject: STVCHRT
                    example: B148    
                  class:
