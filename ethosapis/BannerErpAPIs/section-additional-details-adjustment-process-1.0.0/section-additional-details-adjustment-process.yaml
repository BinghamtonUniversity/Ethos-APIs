openapi: 3.0.0
info:
  title: Section Additional Details Adjustment Process
  description: >
  
    The Section Additional Details Adjustment Process API is used to create and maintain additional 
    section details including fees, degree program attributes, contracts, anonymous grading, schedule overrides,
    schedule labor distributions and final exam dates.  In addition, the API supports the option to post
     additional section detail adjustments in asynchronous batches.
    
    

    Additional section details can be queried using section-additional-details.

  version: 1.0.0-beta
  x-api-type: erp
  x-release-status: beta
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SSADETL, SSAOVRR, SSACLBD, SOAFNDT
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/section-additional-details-adjustment-process:
    post:
      tags:
      - section-additional-details-adjustment-process
      summary: Creates or updates resources in SSRFEES, SSRATTR, SSRSCCD, SSRANGD, SSRCLBD and SORFNCR.
      description: >

        A section additional details record will be created or updated with a POST request in one or all of the following - 
        SSRFEES, SSRATTR, SSRSCCD, SSRANGD, SSRCLBD and SORFNCR.
        


        API behavior details:


        * For sections with no existing additional details, the POST request inserts section additional detail records as requested.


        * For existing section additional detail records, the POST request replaces any existing data associated 
        with the resource for the specified term and crn with the new data provided in the request. This ensures that the 
        resource is entirely updated to match the new data set provided.

        
        * Complete Data Set Required - The POST request must include complete objects or arrays. This means that the data sent must fully represent 
        the resource being updated. Partial data may result in an incomplete or incorrect update.

      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string            
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/section-additional-details-adjustment-process-1.0.0_post_request"
      responses:
        '201':
          description: Success
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
            X-Content-Restricted:
              description: If the response is not a full representation of the resource, a partial representation is returned. Otherwise, this header is not included.
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
            X-Max-Page-Size:
              description: Specifies the maximum number of resources returned in a response.
              schema:
                type: integer
          content:
            application/vnd.hedtech.integration.v1+json:
              schema:
                type: object
                $ref: "#/components/schemas/section-additional-details-adjustment-process-1.0.0_response"                                    
        '400':
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
