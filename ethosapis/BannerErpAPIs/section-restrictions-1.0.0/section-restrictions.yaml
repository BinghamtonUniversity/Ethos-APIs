                  $ref: '#/components/schemas/errors_2_0_0'
      security:
        - EthosIntegrationBearer: []
        - BasicAuth: []
      x-method-permissions: API_SECTION_RESTRICTIONS
components:
  schemas:
    section-restrictions-1.0.0_qapi_post_request:
      type: object
      required:
        - term        
      properties:              
        term:
          title: Term
          maxLength: 6
          type: string
          description: "A user provided value.  The term code is used to retrieve the most current section 
           restrictions that are equal to the provided value."         
          x-lineageLookupReferenceObject: STVTERM
          example: 202201    
        crn: 
          title: Course Reference Number
          maxLength: 5
          type: string
          description: "The Course Reference Number (CRN) assigned to this course section."
          x-lineageReferenceObject: SSBSECT_CRN
          example: 1001                   
    section-restrictions-1.0.0_qapi_post_response:
      type: object
      required:
        - term        
        - crn
      properties:
        term:
          title: Term
          maxLength: 6
          type: string
          description: "The term code for the set of section restriction details."         
          x-lineageLookupReferenceObject: STVTERM
          example: 202201    
        crn: 
          title: Course Reference Number
          maxLength: 5
          type: string
          description: "The Course Reference Number (CRN) assigned to this course section."
          x-lineageReferenceObject: SSBSECT_CRN
          example: 1001       
        departmentRegistrationRestriction:
          title: Department Registration Restriction
          type: object
          properties:  
            restrictionType:
              title: Restriction Type
              maxLength: 1
              type: string
              description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register."
              x-lineageReferenceObject: SSRRDEP_DEPT_IE_CDE   
              enum:
                - includeRestriction
                - excludeRestriction
              example: includeRestriction                             
            departments:
              title: Departments
              type: array               
              items:
                type: object           
                properties:            
                  department:
                    title: Department Code
                    maxLength: 4
                    type: string
                    description: "The department of students for which section registration restrictions exist. The Include/Exclude field will determine how the department is restricted. An unlimited number of departments may be defined."
                    x-lineageReferenceObject: SSRRDEP_DEPT_CODE
                    x-lineageLookupReferenceObject: STVDEPT             
                    example: NURS
                  departmentDescription:
                    title: Department Code Description
                    maxLength: 30
                    type: string
                    description: "The description of the department."
                    x-lineageReferenceObject: STVDEPT_DESC
                    example: Nursing     
                  modifiedOn:
                    title: Modified On
                    maxLength: 11
                    type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                    description: "Most current date the record was created or changed."
                    x-lineageReferenceObject: SSRRDEP_ACTIVITY_DATE
                    example: 2024-05-05T04:00:00Z   
                  modifiedBy:
                    title: Modified By User ID
                    maxLength: 30
                    type: string
                    description: "User who inserted or last updated the data."
                    x-lineageReferenceObject: SSRRDEP_USER_ID
                    example: SYSTEST08                                                                                                                    
        fieldOfStudyRegistrationRestrictions:
          title: Field of Study Registration Restrictions
          type: array
          items:
            type: object      
            properties:   
              restrictionType:
                title: Restriction Type
                maxLength: 1
                type: string
                description: "Indicates whether the restrictions are to be inclusions or exclusions. Values may be compared to student data to control which students may register."
                x-lineageReferenceObject: SSRRMAJ_MAJOR_IND  
                enum:
                  - includeRestriction
                  - excludeRestriction                        
                example: excludeRestriction                
