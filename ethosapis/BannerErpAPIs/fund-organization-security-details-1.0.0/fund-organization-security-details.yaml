openapi: 3.0.0
info:
  title: fund-organization-security-details
  description: |
            This API can be used to request and verify status of Banner Finance Fund-Organization Security authorizations for a particular user. Each API request checks user authority for one of the following two types of access:  Query access or Posting access.

            For a specified Chart of Accounts, request the authorization status for any number of Funds, any number of Organizations, or any number of Funds and Organizations.

            To support querying long lists of Funds and Organizations, the query API has been created as a QAPI, Query by POST API. The request could be a list of Funds and Organizations, but could also be used for verifying access to a single Fund and Organization in a FOAPAL accounting string.

            Note:  The API request must begin with /qapi rather than /api.
  version: 1.0.0
  x-source-name: FOBPROF
  x-source-title: Fund Organization Security Details
  x-source-system: banner
  x-api-type: erp
  x-release-status: beta
  x-audience: all
  x-source-domain: Finance
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /qapi/fund-organization-security-details: 
    post:
      summary: Returns the user authorization status for each Fund and each Organization in the request.
      description: >-
        Returns the user authorization status for each Fund and each Organization in the request as one of the following statuses:  Authorized, Not Authorized, or Not Found.
      x-method-permissions: API_FUND_ORG_SECURITY_DETAILS
      tags:
        - fund-organization-security-details
      parameters:
        - name: accept
          in: header
          required: true
          description: >
