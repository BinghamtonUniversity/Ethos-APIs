components:
  schemas:
    fund-organization-security-details-v1.0.0_post_request:
      type: object
      properties:
        asOfDate:
          "title": "As Of Date"
          "description": "A request date to validate against the effective date of fund hierarchies and organization hierarchies. (Optional. Default value is system date.)"
          "type": string
          "format": date
          "maxLength": 11
          "x-lineageReferenceObject": FTVFUND.FTVFUND_EFF_DATE
          "x-lineageLookupReferenceObject": FTVFUND
        authority:
          "title": "Authority"
          "description": "Specifies whether query access or posting access should be checked. Valid values are Query or Posting. (Optional. Default value is Query.)"
          "example": 'Posting'
          "type": string
          "maxLength": 6
        chartOfAccountsCode:
          "title": "Chart of Accounts Code"
          "description": "The chart of accounts code to which the fund and organization belong."
          "type": string
          "example": 'B'
          "maxLength": 1
          "x-lineageReferenceObject": FTVFUND.FTVFUND_COAS_CODE
          "x-lineageLookupReferenceObject": FTVFUND
        fundCodes:
          "title": Fund Code Authorization List
          "description": "Identifies one or more fund codes to verify. (Optional. One of fundCodes or organizationCodes is required.)"
          "type": array
          items:
            type: string
          example: [FUND01, FUND02, FUND03]
          "x-lineageReferenceObject": FORUSFN.FORUSFN_FUND_CODE
        organizationCodes:
          "title": Organization Code Authorization List
          "description": "Identifies one or more organization codes to verify. (Optional. One of fundCodes or organizationCodes is required.)"
          "type": array
          items:
            type: string
          example: [ORGN01, ORGN02, ORGN03]
          "x-lineageReferenceObject": FORUSOR.FORUSOR_ORGN_CODE
        userId:
          "title": "User ID"
          "description": "The unique identification code of the user."
          "example": 'TESTUSER'
          "type": string
          "maxLength": 30
          "x-lineageReferenceObject": FOBPROF.FOBPROF_USER_ID
      required:
        - chartOfAccountsCode
        - userId
    fund-organization-security-details-v1.0.0_post_response:
      type: object
      properties:
        asOfDate:
          "title": "As Of Date"
          "description": "The request date used to validate against the effective date of fund hierarchies and organization hierarchies."
          "type": string
          "format": date
          "maxLength": 11
          "x-lineageReferenceObject": FTVFUND.FTVFUND_EFF_DATE
          "x-lineageLookupReferenceObject": FTVFUND
        authority:
          "title": "Authority"
          "description": "Indicates whether query access or posting access has been verified."
          "example": 'Posting'
          "type": string
          "maxLength": 6
        chartOfAccountsCode:
          "title": "Chart of Accounts Code"
          "description": "The chart of accounts code to which the fund and organization belong."
          "type": string
          "example": 'B'
          "maxLength": 1
          "x-lineageReferenceObject": FTVFUND.FTVFUND_COAS_CODE
          "x-lineageLookupReferenceObject": FTVFUND
        fundCodes:
          "title": "Fund Code Authorization Details"
          "description": "An array of zero, one, or more than one that lists fund codes verified as requested reporting authorization as one of the following statuses:  Authorized, Not Authorized, or Not Found."
          "type": object
          "example": {"FUND01":'Authorized',"FUND02":'Not Authorized',"FUND03":'Not Found'}
        organizationCodes:
          "title": "Organization Code Authorization Details"
          "description": "An array of zero, one, or more than one that lists organization codes verified as requested reporting authorization as one of the following statuses:  Authorized, Not Authorized, or Not Found."
          "type": object
          "example": {"ORGN01":'Authorized',"ORGN02":'Not Authorized',"ORGN03":'Not Found'}
        userId:
          "title": "User ID"
          "description": "The unique identification code of the user."
          "example": 'TESTUSER'
          "type": string
          "maxLength": 30
          "x-lineageReferenceObject": FOBPROF.FOBPROF_USER_ID
      required:
        - asOfDate
        - authority
        - chartOfAccountsCode
        - fundCodes
        - organizationCodes
        - userId
    errors_2_0_0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary data entity used to create the resource. This is useful for referencing the source item through the applications administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: The detailed actionable error message.
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic