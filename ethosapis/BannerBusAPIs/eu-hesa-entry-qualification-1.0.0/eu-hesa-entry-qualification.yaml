openapi: 3.0.0
info:
  title: eu-hesa-entry-qualification
  description: API for SOAENTQ administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SOAENTQ
  x-source-domain: Student
  x-source-title: Entry Qualification (Europe - Hesa)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/eu-hesa-entry-qualification:
    get:
      tags:
        - eu-hesa-entry-qualification
      summary: Return resources from SOAENTQ
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: keyblockEngagementNum
          in: query
          required: false
          schema:
            type: string
        - name: entryqualAwardedId
          in: query
          required: false
          schema:
            type: string
        - name: ownqualid
          in: query
          required: false
          schema:
            type: string
        - name: qualificationYear
          in: query
          required: false
          schema:
            type: string
        - name: ssdtCodeQualResult
          in: query
          required: false
          schema:
            type: string
        - name: ssdtCodeQualTypeId
          in: query
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORENTS_ACTIVITY_DATE
        - name: userId
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORENTS_USER_ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/eu-hesa-entry-qualification-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/eu-hesa-entry-qualification:
    post:
      tags:
        - eu-hesa-entry-qualification QAPI (Query by POST)
      summary: Return resources from SOAENTQ
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/eu-hesa-entry-qualification-1.0.0_get_request"
            example:
              keyblockEngagementNum: 1
              id: OFFCAMP01
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/eu-hesa-entry-qualification-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    eu-hesa-entry-qualification-1.0.0_get_response:
      type: object
      properties:
        sorentq:
          type: array
          items:
            required:
              - entryqualAwardedId
            type: object
            properties:
              ssdtCodeQualResultSt:
                title: Qualification Result Description
                type: string
              ssdtCodeQualTypeId:
                title: Qualification Type Identifier
                type: string
                description: "Lineage reference object : SORENTQ_SSDT_CODE_QUAL_TYPE_ID, Lookup
                  lineage reference object : skvssdt,skvssdt"
                x-lineageReferenceObject: SORENTQ_SSDT_CODE_QUAL_TYPE_ID
                x-lineageLookupReferenceObject: skvssdt,skvssdt
              activityDate:
                title: Sorentq Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SORENTQ_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SORENTQ_ACTIVITY_DATE
              SorentqOwnqualId:
                type: string
                description: "Lineage reference object : SORENTQ_OWNQUALID"
                x-lineageReferenceObject: SORENTQ_OWNQUALID
              SorentqQualificationYear:
                type: number
                description: "Lineage reference object : SORENTQ_QUALIFICATION_YEAR"
                x-lineageReferenceObject: SORENTQ_QUALIFICATION_YEAR
              ssdtCodeQualResult:
                title: Qualification Result
                type: string
                description: "Lineage reference object : SORENTQ_SSDT_CODE_QUAL_RESULT, Lookup
                  lineage reference object : skvssdt,skvssdt"
                x-lineageReferenceObject: SORENTQ_SSDT_CODE_QUAL_RESULT
                x-lineageLookupReferenceObject: skvssdt,skvssdt
              ssdtCodeQualTypeIdSt:
                title: Qualification Type Identifier Description
                type: string
              userId:
                title: Sorentq User Id
                maxLength: 30
                type: string
                description: "Lineage reference object : SORENTQ_USER_ID"
                x-lineageReferenceObject: SORENTQ_USER_ID
              entryqualAwardedId:
                title: Entry Qualification Awarded Identifier
                type: string
                description: "Lineage reference object : SORENTQ_ENTRYQUAL_AWARDED_ID"
                x-lineageReferenceObject: SORENTQ_ENTRYQUAL_AWARDED_ID
            x-lineageReferenceObject: sorentq
        sorents:
          type: array
          items:
            type: object
            properties:
              activityDate:
                maxLength: 11
                type: string
                description: "Lineage reference object : SORENTS_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SORENTS_ACTIVITY_DATE
              pidm:
                type: number
                description: "Lineage reference object : SORENTS_PIDM"
                x-lineageReferenceObject: SORENTS_PIDM
              numhus:
                type: string
                description: "Lineage reference object : SORENTS_NUMHUS"
                x-lineageReferenceObject: SORENTS_NUMHUS
              ssdtCodeSubjectIdSt:
                title: Subject Identifier Description
                type: string
              ssdtCodeSubjectId:
                title: Subject Identifier
                type: string
                description: "Lineage reference object : SORENTS_SSDT_CODE_SUBJECT_ID, Lookup
                  lineage reference object : skvssdt,skvssdt"
                x-lineageReferenceObject: SORENTS_SSDT_CODE_SUBJECT_ID
                x-lineageLookupReferenceObject: skvssdt,skvssdt
              userId:
                maxLength: 30
                type: string
                description: "Lineage reference object : SORENTS_USER_ID"
                x-lineageReferenceObject: SORENTS_USER_ID
            x-lineageReferenceObject: sorents
    eu-hesa-entry-qualification-1.0.0_get_request:
      required:
        - entryqualAwardedId
      type: object
      properties:
        ssdtCodeQualTypeId:
          title: Qualification Type Identifier
          type: string
          description: "Lineage reference object : SORENTQ_SSDT_CODE_QUAL_TYPE_ID, Lookup
            lineage reference object : skvssdt,skvssdt"
          x-lineageReferenceObject: SORENTQ_SSDT_CODE_QUAL_TYPE_ID
          x-lineageLookupReferenceObject: skvssdt,skvssdt
        activityDate:
          title: Sorentq Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SORENTQ_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SORENTQ_ACTIVITY_DATE
        qualificationYear:
          type: number
          description: "Lineage reference object : SORENTQ_QUALIFICATION_YEAR"
          x-lineageReferenceObject: SORENTQ_QUALIFICATION_YEAR
        ownqualid:
          type: string
          description: "Lineage reference object : SORENTQ_OWNQUALID"
          x-lineageReferenceObject: SORENTQ_OWNQUALID
        keyblockEngagementNum:
          maxLength: 9
          type: string
          description: "Lineage reference object : keyblockEngagementNum"
          x-lineageReferenceObject: keyblockEngagementNum
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        ssdtCodeQualResult:
          title: Qualification Result
          type: string
          description: "Lineage reference object : SORENTQ_SSDT_CODE_QUAL_RESULT, Lookup
            lineage reference object : skvssdt,skvssdt"
          x-lineageReferenceObject: SORENTQ_SSDT_CODE_QUAL_RESULT
          x-lineageLookupReferenceObject: skvssdt,skvssdt
        userId:
          title: Sorentq User Id
          maxLength: 30
          type: string
          description: "Lineage reference object : SORENTQ_USER_ID"
          x-lineageReferenceObject: SORENTQ_USER_ID
        entryqualAwardedId:
          title: Entry Qualification Awarded Identifier
          type: string
          description: "Lineage reference object : SORENTQ_ENTRYQUAL_AWARDED_ID"
          x-lineageReferenceObject: SORENTQ_ENTRYQUAL_AWARDED_ID
      x-lineageReferenceObject: SORENTQ
    eu-hesa-entry-qualification-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        keyblockEngagementNum:
          type: string
        entryqualAwardedId:
          type: string
        ownqualid:
          type: string
        qualificationYear:
          type: string
        ssdtCodeQualResult:
          type: string
        ssdtCodeQualTypeId:
          type: string
        activityDate:
          maxLength: 11
          type: string
          description: "Lineage reference object : SORENTS_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SORENTS_ACTIVITY_DATE
        userId:
          maxLength: 30
          type: string
          description: "Lineage reference object : SORENTS_USER_ID"
          x-lineageReferenceObject: SORENTS_USER_ID
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
