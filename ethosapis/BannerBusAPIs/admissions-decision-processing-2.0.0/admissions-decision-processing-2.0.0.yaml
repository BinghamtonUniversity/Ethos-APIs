openapi: 3.0.0
info:
  title: admissions-decision-processing
  description: API for SAADCRV administrative page
  version: 2.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SAADCRV
  x-source-domain: Student
  x-source-title: Admissions Decision
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/admissions-decision-processing:
    get:
      tags:
        - admissions-decision-processing
      summary: Return resources from SAADCRV
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: keyblocTermCode
          in: query
          required: false
          schema:
            type: string
        - name: apdcCode
          in: query
          description: Decision Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARAPPD_APDC_CODE
        - name: termCodeEntry
          in: query
          required: false
          schema:
            type: string
        - name: sarappdApdcCode
          in: query
          required: false
          schema:
            type: string
        - name: apstCode
          in: query
          required: false
          schema:
            type: string
        - name: applDate
          in: query
          required: false
          schema:
            type: string
        - name: applNo
          in: query
          required: false
          schema:
            type: string
        - name: admtCode
          in: query
          required: false
          schema:
            type: string
        - name: sessCode
          in: query
          required: false
          schema:
            type: string
        - name: reqDocInd
          in: query
          required: false
          schema:
            type: string
        - name: applPreference
          in: query
          required: false
          schema:
            type: string
        - name: stypCode
          in: query
          required: false
          schema:
            type: string
        - name: resdCode
          in: query
          required: false
          schema:
            type: string
        - name: fullPartInd
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v2.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/admissions-decision-processing-2.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - admissions-decision-processing
      summary: Updates an existing resource in SAADCRV
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v2.0.0+json:
