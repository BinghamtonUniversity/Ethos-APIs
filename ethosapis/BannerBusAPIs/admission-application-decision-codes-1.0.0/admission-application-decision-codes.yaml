          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVAPDC_CODE
        - name: cstsCode
          in: query
          description: Curriculum Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVAPDC_CSTS_CODE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVAPDC_DESC
        - name: instAccInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVAPDC_INST_ACC_IND
        - name: rejectInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVAPDC_REJECT_IND
        - name: signfInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVAPDC_SIGNF_IND
