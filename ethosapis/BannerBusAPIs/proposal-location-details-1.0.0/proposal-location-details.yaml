          schema:
            type: string
        - name: displayFrbpropCode
          in: query
          required: true
          schema:
            type: string
        - name: locnCode
          in: query
          description: Location
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRPLOC_LOCN_CODE
        - name: locnResearchInd
          in: query
          description: Research Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRPLOC_LOCN_RESEARCH_IND
