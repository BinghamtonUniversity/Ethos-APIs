                type: string
                description: "Lineage reference object : RORWEBR_RESOURCE_TAB_IND"
                x-lineageReferenceObject: RORWEBR_RESOURCE_TAB_IND
              nullInfoaccessInd:
                title: Value for Null Info Access Indicator
                maxLength: 30
                type: string
                description: "Lineage reference object : RORWEBR_NULL_INFOACCESS_IND"
                x-lineageReferenceObject: RORWEBR_NULL_INFOACCESS_IND
              ssLetrCode:
                title: Display Housing Status
                maxLength: 30
                type: string
                description: "Lineage reference object : RORWEBR_SS_LETR_CODE, Lookup lineage
                  reference object : gtvletr"
                x-lineageReferenceObject: RORWEBR_SS_LETR_CODE
                x-lineageLookupReferenceObject: gtvletr
              elUrl:
                title: Electronic Loan URL
                maxLength: 60
                type: string
                description: "Lineage reference object : RORWEBR_EL_URL"
                x-lineageReferenceObject: RORWEBR_EL_URL
              acceptImage:
