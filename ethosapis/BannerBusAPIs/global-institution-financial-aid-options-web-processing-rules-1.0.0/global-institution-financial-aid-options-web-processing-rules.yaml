                maxLength: 1
                type: string
                description: "Lineage reference object : RORWEBR_TERMS_TAB_IND"
                x-lineageReferenceObject: RORWEBR_TERMS_TAB_IND
              cumLoanInd:
                title: Display Cumulative Loan Amounts/Not Applicable in 9x
                maxLength: 1
                type: string
                description: "Lineage reference object : RORWEBR_CUM_LOAN_IND"
                x-lineageReferenceObject: RORWEBR_CUM_LOAN_IND
              needCalcInd:
                title: Display Need Calculation/Display EFC (9x)
                maxLength: 1
                type: string
                description: "Lineage reference object : RORWEBR_NEED_CALC_IND"
                x-lineageReferenceObject: RORWEBR_NEED_CALC_IND
              dfltLndrUrl:
