openapi: 3.0.0
info:
  title: global-institution-financial-aid-options-web-processing-rules
  description: API for ROAINST administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: ROAINST
  x-source-domain: Financial Aid
  x-source-title: Global Institution Financial Aid Options
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/global-institution-financial-aid-options-web-processing-rules:
    get:
      tags:
        - global-institution-financial-aid-options-web-processing-rules
      summary: Return resources from ROAINST
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckAidyCode
          in: query
          required: false
          schema:
            type: string
        - name: treqCode
          in: query
          description: Rorweba Treq Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORWEBA_TREQ_CODE
        - name: trstCode
          in: query
          description: Rorweba Trst Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORWEBA_TRST_CODE
        - name: typeCode
          in: query
          description: Type Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORWEBA_TYPE_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/global-institution-financial-aid-options-web-proces\
                    sing-rules-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/global-institution-financial-aid-options-web-processing-rules:
    post:
      tags:
        - global-institution-financial-aid-options-web-processing-rules QAPI
          (Query by POST)
      summary: Return resources from ROAINST
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/global-institution-financial-aid-options-web-proces\
                sing-rules-1.0.0_get_request"
            example:
              keyblckAidyCode: 2122
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/global-institution-financial-aid-options-web-proces\
                    sing-rules-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    global-institution-financial-aid-options-web-processing-rules-1.0.0_qapi_post:
      type: object
      properties:
        keyblckAidyCode:
          type: string
        treqCode:
          title: Rorweba Treq Code
          maxLength: 30
          type: string
          description: "Lineage reference object : RORWEBA_TREQ_CODE"
          x-lineageReferenceObject: RORWEBA_TREQ_CODE
        trstCode:
          title: Rorweba Trst Code
          maxLength: 30
          type: string
          description: "Lineage reference object : RORWEBA_TRST_CODE, Lookup lineage
            reference object : rtvtrst"
          x-lineageReferenceObject: RORWEBA_TRST_CODE
          x-lineageLookupReferenceObject: rtvtrst
        typeCode:
          title: Type Code
          maxLength: 1
          type: string
          description: "Lineage reference object : RORWEBA_TYPE_CODE"
          x-lineageReferenceObject: RORWEBA_TYPE_CODE
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    global-institution-financial-aid-options-web-processing-rules-1.0.0_get_request:
      required:
        - treqCode
        - trstCode
        - typeCode
      type: object
      properties:
        keyblckAidyCode:
          title: Aid Year
          maxLength: 4
          type: string
          description: "Lineage reference object : keyblckAidyCode, Lookup lineage
            reference object : robinst"
          x-lineageReferenceObject: keyblckAidyCode
          x-lineageLookupReferenceObject: robinst
        trstCode:
          title: Rorweba Trst Code
          maxLength: 30
          type: string
          description: "Lineage reference object : RORWEBA_TRST_CODE, Lookup lineage
            reference object : rtvtrst"
          x-lineageReferenceObject: RORWEBA_TRST_CODE
          x-lineageLookupReferenceObject: rtvtrst
        treqCode:
          title: Rorweba Treq Code
          maxLength: 30
          type: string
          description: "Lineage reference object : RORWEBA_TREQ_CODE"
          x-lineageReferenceObject: RORWEBA_TREQ_CODE
        typeCode:
          title: Type Code
          maxLength: 1
          type: string
          description: "Lineage reference object : RORWEBA_TYPE_CODE"
          x-lineageReferenceObject: RORWEBA_TYPE_CODE
      x-lineageReferenceObject: RORWEBA
    global-institution-financial-aid-options-web-processing-rules-1.0.0_get_response:
      type: object
      properties:
        rorwebr:
          type: array
          items:
            required:
              - aidyAwardInd
              - enrollmentStatus
              - nullInfoaccessInd
              - pbudPrefEfc
              - prdsAwardInd
            type: object
            properties:
              resourceTabInd:
