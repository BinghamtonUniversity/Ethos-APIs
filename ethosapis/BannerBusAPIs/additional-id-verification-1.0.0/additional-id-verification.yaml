      tags:
        - additional-id-verification
      summary: Return resources from GKAADIV
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: adidCode
          in: query
          description: ID Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GKRADIV_ADID_CODE
        - name: addId
          in: query
          required: false
          schema:
            type: string
        - name: exemptReason
          in: query
          description: Exemption Reason
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GKRADIV_EXEMPT_REASON
        - name: consent
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GKRADIV_CONSENT
        - name: consentDate
          in: query
          description: Consent Response Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GKRADIV_CONSENT_DATE
        - name: contactMethodCode
          in: query
          required: false
          schema:
            type: string
        - name: docverificationInd
          in: query
          required: false
          schema:
            type: string
        - name: source
          in: query
          description: Source
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GKRADIV_SOURCE
        - name: statusCode
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GKRADIV_STATUS_CODE
        - name: statusDate
          in: query
          description: Status Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GKRADIV_STATUS_DATE
        - name: verifiedDate
          in: query
