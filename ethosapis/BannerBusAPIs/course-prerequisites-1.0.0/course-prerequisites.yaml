  schemas:
    course-prerequisites-1.0.0_get_response:
      type: object
      properties:
        scbcrse:
          type: array
          items:
            required:
            - title
            type: object
            properties:
              prereqChkMethodCde:
                maxLength: 1
                type: string
                description: "Lineage reference object : SCBCRSE_PREREQ_CHK_METHOD_CDE"
                x-lineageReferenceObject: SCBCRSE_PREREQ_CHK_METHOD_CDE
              maint:
                maxLength: 1
                type: string
              title:
                title: Course Title
                maxLength: 30
                type: string
                description: "Lineage reference object : SCBCRSE_TITLE"
                x-lineageReferenceObject: SCBCRSE_TITLE
            x-lineageReferenceObject: scbcrse
        scrrtst:
