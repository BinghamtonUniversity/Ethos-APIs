                type: string
              subjCodePreq:
                title: Prerequisite Subject
                maxLength: 30
                type: string
                description: "Lineage reference object : SCRRTST_SUBJ_CODE_PREQ, Lookup\
                  \ lineage reference object : stvsubj"
                x-lineageReferenceObject: SCRRTST_SUBJ_CODE_PREQ
                x-lineageLookupReferenceObject: stvsubj
              rparen:
                title: )
                maxLength: 1
                type: string
                description: "Lineage reference object : SCRRTST_RPAREN"
                x-lineageReferenceObject: SCRRTST_RPAREN
              testScore:
                title: Prerequisite Test Score
