                maxLength: 1
                type: string
                description: "Lineage reference object : SCRRTST_CONCURRENCY_IND"
                x-lineageReferenceObject: SCRRTST_CONCURRENCY_IND
              lparen:
                title: (
                maxLength: 1
                type: string
                description: "Lineage reference object : SCRRTST_LPAREN"
                x-lineageReferenceObject: SCRRTST_LPAREN
              levlCode:
                title: Prerequisite Level
                maxLength: 30
                type: string
                description: "Lineage reference object : SCRRTST_LEVL_CODE"
                x-lineageReferenceObject: SCRRTST_LEVL_CODE
            x-lineageReferenceObject: scrrtst
        scrrare:
          type: array
          items:
            type: object
            properties:
              area:
                title: Area
                maxLength: 30
                type: string
                description: "Lineage reference object : SCRRARE_AREA"
                x-lineageReferenceObject: SCRRARE_AREA
              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SCRRARE_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SCRRARE_ACTIVITY_DATE
              maint:
                maxLength: 1
                type: string
              areaDesc:
                title: Description
                type: string
            x-lineageReferenceObject: scrrare
    errors-2.0.0:
      required:
      - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
