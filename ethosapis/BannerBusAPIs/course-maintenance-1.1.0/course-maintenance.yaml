          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: keyblckTermCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblckValidationCheck
          in: query
          required: false
          schema:
            type: string
        - name: crn
          in: query
          description: CRN
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_CRN
        - name: subjCode
          in: query
          description: Subject
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_SUBJ_CODE
        - name: crseNumb
          in: query
          description: Course
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_CRSE_NUMB
        - name: crseTitle
          in: query
          description: Course Title
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_CRSE_TITLE
        - name: seqNumb
          in: query
          description: Section
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_SEQ_NUMB
        - name: campCode
          in: query
          description: Campus
          required: false
          schema:
            type: string
