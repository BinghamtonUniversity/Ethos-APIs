        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/course-maintenance:
    post:
      tags:
        - course-maintenance QAPI (Query by POST)
      summary: Return resources from SHATCKN
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/course-maintenance-1.0.0_get_request"
