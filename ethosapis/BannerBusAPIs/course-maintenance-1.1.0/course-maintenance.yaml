        - name: courseComment
          in: query
          description: Comment
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_COURSE_COMMENT
        - name: regStartDate
          in: query
          description: Start Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_REG_START_DATE
        - name: regCompletionDate
          in: query
          description: End Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_REG_COMPLETION_DATE
        - name: longCourseTitle
          in: query
