                x-lineageReferenceObject: SHRTCKN_COLL_CODE
                x-lineageLookupReferenceObject: stvcoll
              deptCode:
                title: Department
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_DEPT_CODE, Lookup lineage
