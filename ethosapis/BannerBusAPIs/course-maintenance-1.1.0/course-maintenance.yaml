            type: string
        - name: stspKeySequence
          in: query
          description: Study Path
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_STSP_KEY_SEQUENCE
        - name: collCode
          in: query
          description: College
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_COLL_CODE
        - name: divsCode
          in: query
          description: Division
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_DIVS_CODE
        - name: deptCode
          in: query
          description: Department
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_DEPT_CODE
        - name: sessCode
          in: query
          description: Session
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_SESS_CODE
        - name: contHr
          in: query
          description: Contact Hours
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_CONT_HR
        - name: ptrmStartDate
          in: query
          description: Part of Term Start Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_PTRM_START_DATE
        - name: ptrmEndDate
          in: query
          description: Part of Term End Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRTCKN_PTRM_END_DATE
        - name: grdeCodeFinal
          in: query
          required: false
          schema:
            type: string
        - name: gmodCode
          in: query
          required: false
          schema:
            type: string
        - name: creditHours
          in: query
          required: false
          schema:
            type: string
        - name: hoursAttempted
          in: query
          required: false
          schema:
            type: string
        - name: gchgCode
          in: query
          required: false
          schema:
            type: string
        - name: incompleteExtDate
          in: query
          required: false
          schema:
            type: string
        - name: grdeCodeIncmpFinal
          in: query
          required: false
          schema:
            type: string
        - name: finalGrdeChgDate
          in: query
          required: false
          schema:
            type: string
        - name: gcmtCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
