components:
  schemas:
    course-maintenance-1.1.0_get_response:
      type: object
      properties:
        shrtckl:
          type: array
          items:
            required:
              - levlCode
            type: object
            properties:
              stvlevlDescShrtckl:
                title: Code Description
                type: string
              primaryLevlInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : SHRTCKL_PRIMARY_LEVL_IND"
                x-lineageReferenceObject: SHRTCKL_PRIMARY_LEVL_IND
              levlCode:
                title: Code
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKL_LEVL_CODE, Lookup lineage
                  reference object : stvlevl"
                x-lineageReferenceObject: SHRTCKL_LEVL_CODE
                x-lineageLookupReferenceObject: stvlevl
            x-lineageReferenceObject: shrtckl
        shrtckg:
          type: array
          items:
            type: object
            properties:
              gmodCode:
                title: Grade Mode
                maxLength: 1
                type: string
                description: "Lineage reference object : SHRTCKG_GMOD_CODE"
                x-lineageReferenceObject: SHRTCKG_GMOD_CODE
              hoursAttempted:
                title: Attempted Hours
                maxLength: 9
                type: number
                description: "Lineage reference object : SHRTCKG_HOURS_ATTEMPTED"
                x-lineageReferenceObject: SHRTCKG_HOURS_ATTEMPTED
              seqNo:
                title: Sequence Number
                maxLength: 2
                type: number
                description: "Lineage reference object : SHRTCKG_SEQ_NO"
                x-lineageReferenceObject: SHRTCKG_SEQ_NO
              nagrCmmt:
                title: Narrative Grade Comment
                maxLength: 200
                type: string
              finalGrdeChgUser:
                title: User
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKG_FINAL_GRDE_CHG_USER"
                x-lineageReferenceObject: SHRTCKG_FINAL_GRDE_CHG_USER
              gchgCode:
                title: Change Reason
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKG_GCHG_CODE, Lookup lineage
                  reference object : stvgchg"
                x-lineageReferenceObject: SHRTCKG_GCHG_CODE
                x-lineageLookupReferenceObject: stvgchg
              creditHours:
                title: Credit Hours
                maxLength: 9
                type: number
                description: "Lineage reference object : SHRTCKG_CREDIT_HOURS"
                x-lineageReferenceObject: SHRTCKG_CREDIT_HOURS
              gcmtDesc:
                title: Grade Comment Description
                type: string
              grdeCodeIncmpFinal:
                title: Incomplete Final Grade
                maxLength: 6
                type: string
                description: "Lineage reference object : SHRTCKG_GRDE_CODE_INCMP_FINAL, Lookup
                  lineage reference object : shrgrde,shrgrde"
                x-lineageReferenceObject: SHRTCKG_GRDE_CODE_INCMP_FINAL
                x-lineageLookupReferenceObject: shrgrde,shrgrde
              finalGrdeChgDate:
                title: Grade Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTCKG_FINAL_GRDE_CHG_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTCKG_FINAL_GRDE_CHG_DATE
              gcmtCode:
                title: Grade Comment
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKG_GCMT_CODE, Lookup lineage
                  reference object : stvgcmt"
                x-lineageReferenceObject: SHRTCKG_GCMT_CODE
                x-lineageLookupReferenceObject: stvgcmt
              incompleteExtDate:
                title: Extension Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTCKG_INCOMPLETE_EXT_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTCKG_INCOMPLETE_EXT_DATE
              stvgchgDesc:
                title: Change Reason Description
                type: string
              gmodCodeDesc:
                title: Grade Mode Description
                type: string
              grdeCodeFinal:
                title: Grade
                maxLength: 6
                type: string
                description: "Lineage reference object : SHRTCKG_GRDE_CODE_FINAL"
                x-lineageReferenceObject: SHRTCKG_GRDE_CODE_FINAL
            x-lineageReferenceObject: shrtckg
        shrtckn:
          type: array
          items:
            type: object
            properties:
              crseTitle:
                title: Course Title
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_CRSE_TITLE"
                x-lineageReferenceObject: SHRTCKN_CRSE_TITLE
              divsDesc:
                title: Division Description
                type: string
              sfrstcrGrdeCode:
                title: Final
                maxLength: 6
                type: string
              sessDesc:
                title: Session Description
                type: string
              regCompletionDate:
                title: End Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTCKN_REG_COMPLETION_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTCKN_REG_COMPLETION_DATE
              schdCode:
                title: Schedule Type
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_SCHD_CODE, Lookup lineage
                  reference object :
                  stvschd,SELECT,stvschd_desc,NULL,scrschd_activity_date,FROM,s\
                  tvschd,scrschd"
                x-lineageReferenceObject: SHRTCKN_SCHD_CODE
                x-lineageLookupReferenceObject: stvschd,SELECT,stvschd_desc,NULL,scrschd_activity_date,FROM,stvschd,scrschd
              sessCode:
                title: Session
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_SESS_CODE, Lookup lineage
                  reference object : stvsess"
                x-lineageReferenceObject: SHRTCKN_SESS_CODE
                x-lineageLookupReferenceObject: stvsess
              sfrstcrGrdeCodeMid:
                title: Mid Term
                maxLength: 6
                type: string
              campCode:
                title: Campus
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_CAMP_CODE, Lookup lineage
                  reference object : stvcamp"
                x-lineageReferenceObject: SHRTCKN_CAMP_CODE
                x-lineageLookupReferenceObject: stvcamp
              campCodeDesc:
                title: Campus Description
                type: string
              collDesc:
                title: College Description
                type: string
              repeatDesc:
                title: System
                maxLength: 10
                type: string
              deptDesc:
                title: Department Description
                type: string
              numberOfExtensions:
                title: Extension
                maxLength: 3
                type: number
                description: "Lineage reference object : SHRTCKN_NUMBER_OF_EXTENSIONS"
                x-lineageReferenceObject: SHRTCKN_NUMBER_OF_EXTENSIONS
              courseComment:
                title: Comment
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_COURSE_COMMENT"
                x-lineageReferenceObject: SHRTCKN_COURSE_COMMENT
              crn:
                title: CRN
                maxLength: 5
                type: string
                description: "Lineage reference object : SHRTCKN_CRN"
                x-lineageReferenceObject: SHRTCKN_CRN
              regStartDate:
                title: Start Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTCKN_REG_START_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTCKN_REG_START_DATE
              ptrmStartDate:
                title: Part of Term Start Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTCKN_PTRM_START_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTCKN_PTRM_START_DATE
              contHr:
                title: Contact Hours
                maxLength: 9
                type: number
                description: "Lineage reference object : SHRTCKN_CONT_HR"
                x-lineageReferenceObject: SHRTCKN_CONT_HR
              stspKeySequence:
                title: Study Path
                maxLength: 30
                type: number
                description: "Lineage reference object : SHRTCKN_STSP_KEY_SEQUENCE, Lookup
                  lineage reference object : SGVSTSP,SGRSTSP"
                x-lineageReferenceObject: SHRTCKN_STSP_KEY_SEQUENCE
                x-lineageLookupReferenceObject: SGVSTSP,SGRSTSP
              subjCode:
                title: Subject
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_SUBJ_CODE, Lookup lineage
                  reference object : stvsubj"
                x-lineageReferenceObject: SHRTCKN_SUBJ_CODE
                x-lineageLookupReferenceObject: stvsubj
              schdCodeDesc:
                title: Schedule Type Description
                type: string
              crseNumb:
                title: Course
                maxLength: 5
                type: string
                description: "Lineage reference object : SHRTCKN_CRSE_NUMB, Lookup lineage
                  reference object : scbcrky"
                x-lineageReferenceObject: SHRTCKN_CRSE_NUMB
                x-lineageLookupReferenceObject: scbcrky
              ptrmCode:
                title: Part of Term
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_PTRM_CODE, Lookup lineage
                  reference object : stvptrm"
                x-lineageReferenceObject: SHRTCKN_PTRM_CODE
                x-lineageLookupReferenceObject: stvptrm
              ShrtcknSubjCodeDesc:
                title: Subject Description
                type: string
              repeatCourseInd:
                title: Repeat
                maxLength: 1
                type: string
                description: "Lineage reference object : SHRTCKN_REPEAT_COURSE_IND"
                x-lineageReferenceObject: SHRTCKN_REPEAT_COURSE_IND
              seqNumb:
                title: Section
                maxLength: 3
                type: string
                description: "Lineage reference object : SHRTCKN_SEQ_NUMB"
                x-lineageReferenceObject: SHRTCKN_SEQ_NUMB
              ceuInd:
                title: Continuing Education Units
                maxLength: 1
                type: string
              longCourseTitle:
                title: Long Course Title
                maxLength: 100
                type: string
                description: "Lineage reference object : SHRTCKN_LONG_COURSE_TITLE"
                x-lineageReferenceObject: SHRTCKN_LONG_COURSE_TITLE
              ptrmEndDate:
                title: Part of Term End Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTCKN_PTRM_END_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTCKN_PTRM_END_DATE
              ptrmCodeDesc:
                title: Part of Term Description
                type: string
              divsCode:
                title: Division
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_DIVS_CODE, Lookup lineage
                  reference object : stvdivs"
                x-lineageReferenceObject: SHRTCKN_DIVS_CODE
                x-lineageLookupReferenceObject: stvdivs
              collCode:
                title: College
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_COLL_CODE, Lookup lineage
