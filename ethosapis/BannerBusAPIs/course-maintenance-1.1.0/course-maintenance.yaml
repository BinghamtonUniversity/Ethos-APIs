        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - course-maintenance
      summary: Updates an existing resource in SHATCKN
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.1.0+json:
            schema:
              $ref: "#/components/schemas/course-maintenance-1.1.0_put_request"
            example:
              criteria.crn: 105
              criteria.creditHours: 2
              gcmtCode: DISPLAY
              keyblckTermCode: 201310
              nagrCmmt: comment new
              ptrmEndDate: 2013-12-31
              id: STRREGG32
              criteria.grdeCodeFinal: A
              criteria.gmodCode: S
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/course-maintenance-1.1.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - course-maintenance
      summary: Creates a new resource in SHATCKN
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.1.0+json:
            schema:
              $ref: "#/components/schemas/course-maintenance-1.1.0_post_request"
            example:
              creditHours: 2
              gmodCode: S
              primaryLevlInd: Y
              keyblckTermCode: 201310
              nagrCmmt: comment new
              id: STRREGG32
              gchgCode: AR
              levlCode: UG
              crn: 105
              grdeCodeFinal: A
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
