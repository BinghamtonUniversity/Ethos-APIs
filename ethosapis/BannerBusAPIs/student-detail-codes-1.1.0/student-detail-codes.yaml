          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/student-detail-codes-1.1.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
        - EllucianOAuthUserToken: []
        - EthosIntegrationBearer: []
    post:
      tags:
        - student-detail-codes
      summary: Creates a new resource in TSADETC
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.1.0+json:
