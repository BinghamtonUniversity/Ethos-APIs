openapi: 3.0.0
info:
  title: student-detail-codes
  description: API for TSADETC administrative page
  version: 1.1.0
  x-audience: all
  x-release-status: ga
  x-source-name: TSADETC
  x-source-domain: Student
  x-source-title: Detail Code Control Form - Student
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-detail-codes:
    get:
      tags:
        - student-detail-codes
      summary: Return resources from TSADETC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema.
          required: false
          schema:
            $ref: "#/components/schemas/student-detail-codes-1.1.0_query_request"
        - name: detailCode
          in: query
          required: false
          schema:
            type: string
        - name: desc
          in: query
          required: false
          schema:
            type: string
        - name: typeInd
          in: query
          required: false
          schema:
            type: string
        - name: dcatCode
          in: query
          required: false
          schema:
            type: string
        - name: detailCodeInd
