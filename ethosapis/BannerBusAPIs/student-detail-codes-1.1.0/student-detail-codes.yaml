components:
  schemas:
    student-detail-codes-1.1.0_get_response:
      type: object
      properties:
        tbbdetc:
          type: array
          items:
            required:
              - dcatCode
              - desc
              - detailCode
              - paytCode
              - priority
              - typeInd
            type: object
            properties:
              detailCodeInd:
                title: Grant Type
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_DETAIL_CODE_IND"
                x-lineageReferenceObject: TBBDETC_DETAIL_CODE_IND
              detcActiveInd:
                title: Active
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_DETC_ACTIVE_IND"
                x-lineageReferenceObject: TBBDETC_DETC_ACTIVE_IND
              payhistInd:
                title: Payment History
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_PAYHIST_IND"
                x-lineageReferenceObject: TBBDETC_PAYHIST_IND
              prebillPrintInd:
                title: Exclude Invoice Print
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_PREBILL_PRINT_IND"
                x-lineageReferenceObject: TBBDETC_PREBILL_PRINT_IND
              tivInd:
                title: Title IV
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_TIV_IND"
                x-lineageReferenceObject: TBBDETC_TIV_IND
              tbdcInd:
                title: Term Based
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_TBDC_IND"
                x-lineageReferenceObject: TBBDETC_TBDC_IND
              likeTermInd:
                title: Like Term
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_LIKE_TERM_IND"
                x-lineageReferenceObject: TBBDETC_LIKE_TERM_IND
              glNosEnterable:
                title: GL Enterable
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_GL_NOS_ENTERABLE"
                x-lineageReferenceObject: TBBDETC_GL_NOS_ENTERABLE
              tbbdectNonAllowChgInd:
                title: Non-Allowable Charge
                maxLength: 1
                type: string
              amount:
                title: Default Amount
                maxLength: 10
                type: number
                description: "Lineage reference object : TBBDETC_AMOUNT"
                x-lineageReferenceObject: TBBDETC_AMOUNT
              typeInd:
                title: Type
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_TYPE_IND"
                x-lineageReferenceObject: TBBDETC_TYPE_IND
              paytCode:
                title: Pay Type
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_PAYT_CODE, Lookup lineage
                  reference object : ttvpayt"
                x-lineageReferenceObject: TBBDETC_PAYT_CODE
                x-lineageLookupReferenceObject: ttvpayt
              refundInd:
                title: Refund Code
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_REFUND_IND"
                x-lineageReferenceObject: TBBDETC_REFUND_IND
              likeAidyInd:
                title: Like Aid Year
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_LIKE_AIDY_IND"
                x-lineageReferenceObject: TBBDETC_LIKE_AIDY_IND
              likePeriodInd:
                title: Like Period
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_LIKE_PERIOD_IND"
                x-lineageReferenceObject: TBBDETC_LIKE_PERIOD_IND
              priority:
                title: Priority
                maxLength: 3
                type: string
                description: "Lineage reference object : TBBDETC_PRIORITY"
                x-lineageReferenceObject: TBBDETC_PRIORITY
              detailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lineage reference object : TBBDETC_DETAIL_CODE"
                x-lineageReferenceObject: TBBDETC_DETAIL_CODE
              receiptInd:
                title: Receipt
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_RECEIPT_IND"
                x-lineageReferenceObject: TBBDETC_RECEIPT_IND
              dcatCode:
                title: Category
                maxLength: 3
                type: string
                description: "Lineage reference object : TBBDETC_DCAT_CODE, Lookup lineage
                  reference object : ttvdcat"
                x-lineageReferenceObject: TBBDETC_DCAT_CODE
                x-lineageLookupReferenceObject: ttvdcat
              abdcInd:
                title: Aid Year Based
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_ABDC_IND"
                x-lineageReferenceObject: TBBDETC_ABDC_IND
              dirdInd:
                title: Direct Deposit
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_DIRD_IND"
                x-lineageReferenceObject: TBBDETC_DIRD_IND
              refundableInd:
                title: Refundable
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_REFUNDABLE_IND"
                x-lineageReferenceObject: TBBDETC_REFUNDABLE_IND
              taxtCode:
                title: Tax Type
                maxLength: 2
                type: string
                description: "Lineage reference object : TBBDETC_TAXT_CODE, Lookup lineage
                  reference object : ttvtaxt"
                x-lineageReferenceObject: TBBDETC_TAXT_CODE
                x-lineageLookupReferenceObject: ttvtaxt
              instChgInd:
                title: Institutional Charges
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_INST_CHG_IND"
                x-lineageReferenceObject: TBBDETC_INST_CHG_IND
              effectiveDate:
                title: Default Effective Date
                maxLength: 26
                type: string
                description: "Lineage reference object : TBBDETC_EFFECTIVE_DATE"
                format: date-time
                x-lineageReferenceObject: TBBDETC_EFFECTIVE_DATE
              desc:
                title: Detail Code Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBDETC_DESC"
                x-lineageReferenceObject: TBBDETC_DESC
              termCode:
                title: Default Term
                maxLength: 6
                type: string
                description: "Lineage reference object : TBBDETC_TERM_CODE, Lookup lineage
                  reference object : stvterm"
                x-lineageReferenceObject: TBBDETC_TERM_CODE
                x-lineageLookupReferenceObject: stvterm
            x-lineageReferenceObject: tbbdetc
        tbracct2:
          type: array
          items:
            type: object
            properties:
              tbracctAAcciCode:
                title: Account A - Index Code
                maxLength: 6
                type: string
                description: "Banner Finance Index Code for account a"
                x-lineageReferenceObject: TBRACCT_A_ACCI_CODE
              tbracctAAcctCode:
                title: Account A - Account Code
                maxLength: 6
                type: string
                description: "Banner Finance Account Code for account a"
                x-lineageReferenceObject: TBRACCT_A_ACCT_CODE
              tbracctAActvCode:
                title: Account A - Activity Code
                maxLength: 6
                type: string
                description: "Banner Finance Activity Code for account a"
                x-lineageReferenceObject: TBRACCT_A_ACTV_CODE
              tbracctACoasCode:
                title: Account A - COA
                maxLength: 1
                type: string
                description: "Banner Finance Chart Of Accounts Code for account a"
                x-lineageReferenceObject: TBRACCT_A_COAS_CODE
              tbracctAFundCode:
                title: Account A - Fund Code
                maxLength: 6
                type: string
                description: "Banner Finance Fund Code for account a"
                x-lineageReferenceObject: TBRACCT_A_FUND_CODE
              tbracctALocnCode:
                title: Account A - Location Code
                maxLength: 6
                type: string
                description: "Banner Finance Location Code for account a"
                x-lineageReferenceObject: TBRACCT_A_LOCN_CODE
              tbracctAOrgnCode:
                title: Account A - Organization Code
                maxLength: 6
                type: string
                description: "Banner Finance Organization Code for account a"
                x-lineageReferenceObject: TBRACCT_A_ORGN_CODE
              tbracctAProgCode:
                title: Account A - Program Code
                maxLength: 6
                type: string
                description: "Banner Finance Program Code for account a"
                x-lineageReferenceObject: TBRACCT_A_PROG_CODE
              tbracctARuclCode1:
                title: Account A - Rule Class 1
                maxLength: 4
                type: string
                description: "This is the rule class code for the A ACCOUNT to be used when the transaction is initially fed to accounting"
                x-lineageReferenceObject: TBRACCT_A_RUCL_CODE1
              tbracctARuclCode2:
                title: Account A - Rule Class 2
                maxLength: 4
                type: string
                description: "This is the rule class code for the A ACCOUNT to be used when the application of payment transaction is fed to accounting and the opposite side of the transaction is the opposite type of detail code"
                x-lineageReferenceObject: TBRACCT_A_RUCL_CODE2
              tbracctARuclCode3:
                title: Account A - Rule Class 3
                maxLength: 4
                type: string
                description: "This is the rule class code for the A ACCOUNT to be used when the application of payment transaction is fed to accounting and the opposite side of the transaction is the same type of detail code"
                x-lineageReferenceObject: TBRACCT_A_RUCL_CODE3
              tbracctBAcciCode:
                title: Account B - Index Code
                maxLength: 6
                type: string
                description: "Banner Finance Index Code for account b"
                x-lineageReferenceObject: TBRACCT_B_ACCI_CODE
              tbracctBAcctCode:
                title: Account B - Account Code
                maxLength: 6
                type: string
                description: "Banner Finance Account Code for account b"
                x-lineageReferenceObject: TBRACCT_B_ACCT_CODE
              tbracctBActvCode:
                title: Account B - Activity Code
                maxLength: 6
                type: string
                description: "Banner Finance Activity Code for account b"
                x-lineageReferenceObject: TBRACCT_B_ACTV_CODE
              tbracctBCoasCode:
                title: Account B - COA
                maxLength: 1
                type: string
                description: "Banner Finance Chart Of Accounts Code for account b"
                x-lineageReferenceObject: TBRACCT_B_COAS_CODE
              tbracctBFundCode:
                title: Account B - Fund Code
                maxLength: 6
                type: string
                description: "Banner Finance Fund Code for account b"
                x-lineageReferenceObject: TBRACCT_B_FUND_CODE
              tbracctBLocnCode:
                title: Account B - Location Code
                maxLength: 6
                type: string
                description: "Banner Finance Location Code for account b"
                x-lineageReferenceObject: TBRACCT_B_LOCN_CODE
              tbracctBOrgnCode:
                title: Account B - Organization Code
                maxLength: 6
                type: string
                description: "Banner Finance Organization Code for account b"
                x-lineageReferenceObject: TBRACCT_B_ORGN_CODE
              tbracctBProgCode:
                title: Account B - Program Code
                maxLength: 6
                type: string
                description: "Banner Finance Program Code for account b"
                x-lineageReferenceObject: TBRACCT_B_PROG_CODE
              tbracctBRuclCode1:
                title: Account B - Rule Class 1
                maxLength: 4
                type: string
                description: "This is the rule class code for the B ACCOUNT to be used when the transaction is initially fed to accounting"
                x-lineageReferenceObject: TBRACCT_B_RUCL_CODE1
              tbracctBRuclCode2:
                title: Account B - Rule Class 2
                maxLength: 4
                type: string
                description: "This is the rule class code for the B ACCOUNT to be used when the application of payment transaction is fed to accounting and the opposite side of the transaction is the opposite type of detail code"
                x-lineageReferenceObject: TBRACCT_B_RUCL_CODE2
              tbracctBRuclCode3:
                title: Account B - Rule Class 3
                maxLength: 4
                type: string
                description: "This is the rule class code for the B ACCOUNT to be used when the application of payment transaction is fed to accounting and the opposite side of the transaction is the same type of detail code"
                x-lineageReferenceObject: TBRACCT_B_RUCL_CODE3
              tbracctCode:
                title: Designator
                maxLength: 2
                type: string
                description: "Identifies the term-based designator for the detail code."
                x-lineageReferenceObject: TBRACCT_TBDS_CODE
              tbracctPercent:
                title: Percent
                maxLength: 8
                type: number
                description: "This field identifies the percentage of the amount associated with the detail that would be posted to Account A and Account B."
                x-lineageReferenceObject: TBRACCT_PERCENT
            x-lineageReferenceObject: tbracct2
        tbbeact:
          type: array
          items:
            required:
              - detailCode
              - effDate
            type: object
            properties:
              detailDesc:
                title: Detail Code Description
                maxLength: 30
                type: string
              effDate:
                title: Effective Date
                maxLength: 26
                type: string
                description: "Lineage reference object : TBBEACT_EFF_DATE"
                format: date-time
                x-lineageReferenceObject: TBBEACT_EFF_DATE
              displayNchgDate:
                title: Next Change Date
                type: string
                format: date-time
              abdcInd:
                title: Aid Year-based
                maxLength: 1
                type: string
                description: "AID YEAR BASED INDICATOR: Indicates whether a detail code is
                  associated with an aid year-based designator (Y/N)."
                x-lineageReferenceObject: TBBEACT_ABDC_IND
              detailCode:
                title: Detail Code
                maxLength: 6
                type: string
                description: "DETAIL CODE: This field identifies the detail code associated with
                  the account definition. The code is validated against the
                  TBBDETC table."
                x-lineageReferenceObject: TBBEACT_DETAIL_CODE
              tbdcInd:
                title: Term-based
                maxLength: 1
                type: string
                description: "TERM-BASED INDICATOR: Indicates whether a detail code is
                  associated with a term-based designator (Y/N)."
                x-lineageReferenceObject: TBBEACT_TBDC_IND
            x-lineageReferenceObject: tbbeact
        tbracct:
          type: array
          items:
            required:
              - accountA
              - accountB
            type: object
            properties:
              code:
                title: Designator
                maxLength: 2
                type: string
              accountB:
                title: Account B
                maxLength: 60
                type: string
                description: This field identifies the actual account number from the finance
                  system associated with this detail code.  For a detailed
                  description see the field usage notes.
                x-lineageReferenceObject: TBRACCT_ACCOUNT_B
              accountA:
                title: Account A
                maxLength: 60
                type: string
                description: This field identifies the actual account number from the finance
                  system associated with this detail code.  For a detailed
                  description see the field usage notes.
                x-lineageReferenceObject: TBRACCT_ACCOUNT_A
              percent:
                title: Percent
                maxLength: 9
                type: number
                description: This field identifies the percentage of the amount associated with
                  the detail that would be posted to Account A and Account B.
                x-lineageReferenceObject: TBRACCT_PERCENT
            x-lineageReferenceObject: tbracct
    student-detail-codes-1.1.0_post_request:
      required:
        - detailCode
        - desc
        - typeInd
        - dcatCode
        - priority
        - paytCode
        - tbbdetcDcatCode
        - tbbeactDetailCode
        - effDate
      type: object
      properties:
        bFundCode:
          title: Account B - Fund
          maxLength: 6
          type: string
          description: "Lineage reference object : TBRACCT_B_FUND_CODE"
          x-lineageReferenceObject: TBRACCT_B_FUND_CODE
        currCode:
          maxLength: 4
          type: string
          description: This field identifies the detail code associated with every charge
            and payment that can be entered onto an account.
          x-lineageLookupReferenceObject: gtvcurr
        detailCodeInd:
          title: Grant Type
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBDETC_DETAIL_CODE_IND"
          x-lineageReferenceObject: TBBDETC_DETAIL_CODE_IND
        aLocnCode:
          title: Account A - Location
          maxLength: 6
          type: string
          description: "Lineage reference object : TBRACCT_A_LOCN_CODE"
          x-lineageReferenceObject: TBRACCT_A_LOCN_CODE
        taxMethod:
          maxLength: 1
          type: string
