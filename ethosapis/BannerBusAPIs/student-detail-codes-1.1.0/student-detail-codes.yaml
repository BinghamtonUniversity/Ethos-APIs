          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
        - EllucianOAuthUserToken: []
        - EthosIntegrationBearer: []
  /qapi/student-detail-codes:
    post:
      tags:
        - student-detail-codes QAPI (Query by POST)
      summary: Return resources from TSADETC
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.1.0+json:
