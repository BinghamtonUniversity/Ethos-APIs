            type: string
        - name: dirdInd
          in: query
          required: false
          schema:
            type: string
        - name: refundableInd
          in: query
          required: false
          schema:
            type: string
        - name: receiptInd
          in: query
          required: false
          schema:
            type: string
        - name: detcActiveInd
          in: query
          required: false
          schema:
            type: string
        - name: tbdcInd
          in: query
          required: false
          schema:
            type: string
        - name: abdcInd
          in: query
          required: false
          schema:
            type: string
        - name: likeTermInd
          in: query
          required: false
          schema:
            type: string
        - name: likeAidyInd
          in: query
          required: false
          schema:
            type: string
        - name: likePeriodInd
          in: query
          required: false
          schema:
            type: string
        - name: likeScpInd
          in: query
          required: false
          schema:
            type: string
        - name: glNosEnterable
          in: query
          required: false
          schema:
            type: string
        - name: paytCode
          in: query
          required: false
          schema:
            type: string
        - name: taxtCode
          in: query
          required: false
          schema:
            type: string
        - name: tivInd
          in: query
          required: false
          schema:
            type: string
        - name: instChgInd
          in: query
          required: false
          schema:
            type: string
        - name: tbbdectNonAllowChgInd
          in: query
          required: false
          schema:
            type: string
        - name: prebillPrintInd
          in: query
          required: false
          schema:
            type: string
        - name: payhistInd
          in: query
          required: false
          schema:
            type: string
        - name: taxProfile
          in: query
          required: false
          schema:
            type: string
        - name: taxMethod
          in: query
          required: false
