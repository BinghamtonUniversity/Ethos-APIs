openapi: 3.0.0
info:
  title: isir-comment-codes
  description: API for RTVICMT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: RTVICMT
  x-source-domain: Financial Aid
  x-source-title: ISIR Comment Code Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/isir-comment-codes:
    get:
      tags:
        - isir-comment-codes
      summary: Return resources from RTVICMT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckAidyCode
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          description: Rtvicmt Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVICMT_TYPE
        - name: code
          in: query
          description: Rtvicmt Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVICMT_CODE
        - name: desc
          in: query
          description: Rtvicmt Desc
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVICMT_DESC
        - name: isirPrintInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVICMT_ISIR_PRINT_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/isir-comment-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/isir-comment-codes:
    post:
      tags:
        - isir-comment-codes QAPI (Query by POST)
      summary: Return resources from RTVICMT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/isir-comment-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/isir-comment-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    isir-comment-codes-1.0.0_qapi_post:
      required:
        - keyblckAidyCode
      type: object
      properties:
        keyblckAidyCode:
          type: string
        type:
          title: Rtvicmt Type
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVICMT_TYPE"
          x-lineageReferenceObject: RTVICMT_TYPE
        code:
          title: Rtvicmt Code
          maxLength: 3
          type: string
          description: "Lineage reference object : RTVICMT_CODE"
          x-lineageReferenceObject: RTVICMT_CODE
        desc:
          title: Rtvicmt Desc
          maxLength: 1000
          type: string
          description: "Lineage reference object : RTVICMT_DESC"
          x-lineageReferenceObject: RTVICMT_DESC
        isirPrintInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVICMT_ISIR_PRINT_IND"
          x-lineageReferenceObject: RTVICMT_ISIR_PRINT_IND
    isir-comment-codes-1.0.0_get_response:
      required:
        - code
        - desc
        - type
      type: object
      properties:
        isirPrintInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVICMT_ISIR_PRINT_IND"
          x-lineageReferenceObject: RTVICMT_ISIR_PRINT_IND
        code:
          title: Rtvicmt Code
          maxLength: 3
          type: string
          description: "Lineage reference object : RTVICMT_CODE"
          x-lineageReferenceObject: RTVICMT_CODE
        type:
          title: Rtvicmt Type
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVICMT_TYPE"
          x-lineageReferenceObject: RTVICMT_TYPE
        desc:
          title: Rtvicmt Desc
          maxLength: 1000
          type: string
          description: "Lineage reference object : RTVICMT_DESC"
          x-lineageReferenceObject: RTVICMT_DESC
      x-lineageReferenceObject: rtvicmt
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    isir-comment-codes-1.0.0_get_request:
      required:
        - type
        - code
        - desc
      type: object
      properties:
        keyblckAidyCode:
          title: Aid Year
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckAidyCode, Lookup lineage
            reference object : robinst"
          x-lineageReferenceObject: keyblckAidyCode
          x-lineageLookupReferenceObject: robinst
        isirPrintInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVICMT_ISIR_PRINT_IND"
          x-lineageReferenceObject: RTVICMT_ISIR_PRINT_IND
        code:
          title: Rtvicmt Code
          maxLength: 3
          type: string
          description: "Lineage reference object : RTVICMT_CODE"
          x-lineageReferenceObject: RTVICMT_CODE
        type:
          title: Rtvicmt Type
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVICMT_TYPE"
          x-lineageReferenceObject: RTVICMT_TYPE
        desc:
          title: Rtvicmt Desc
          maxLength: 1000
          type: string
          description: "Lineage reference object : RTVICMT_DESC"
          x-lineageReferenceObject: RTVICMT_DESC
      x-lineageReferenceObject: RTVICMT
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
