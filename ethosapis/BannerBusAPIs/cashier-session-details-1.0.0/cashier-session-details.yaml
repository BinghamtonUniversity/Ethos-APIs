
openapi: 3.0.0
info:
  title: cashier-session-details
  description: API for TGACREV administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: TGACREV
  x-source-domain: Student
  x-source-title: Cashier Session Details
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/cashier-session-details:
    get:
      tags:
        - cashier-session-details
      summary: Return resources from TGACREV
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: sessionUser
          in: query
          description: Session User
          required: true
          schema:
            type: string
          x-lineageReferenceObject: TBRCOLR_SESSION_USER
        - name: sessionNumber
          in: query
          description: Session Number
          required: true
          schema:
            type: number
          x-lineageReferenceObject: TBRCOLR_SESSION_NUMBER
        - name: typeInd
          in: query
          description: Type Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TYPE_IND
        - name: ttvdcatDcatCode
          in: query
          description: Ttvdcat Dcat Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TTVDCAT_DCAT_CODE
        - name: tbvcdtlDetailCode
          in: query
          description: Detail Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCDTL_DETAIL_CODE
        - name: tbvcdtlDesc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCDTL_DESC
        - name: tbvcdtlAmount
          in: query
          description: Amount
          required: false
          schema:
            type: number
          x-lineageReferenceObject: TBVCDTL_AMOUNT
        - name: tbvcdtlReceiptNumber
          in: query
          description: Receipt Number
          required: false
          schema:
            type: number
          x-lineageReferenceObject: TBVCDTL_RECEIPT_NUMBER
        - name: tbvcdtlEntryDate
          in: query
          description: Entry Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCDTL_ENTRY_DATE
        - name: tbvcdtlTime
          in: query
          description: Time
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCDTL_TIME
        - name: tbvcdtlSrceCode
          in: query
          description: Source Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCDTL_SRCE_CODE
        - name: tbvcdtlAcctFeedInd
          in: query
          description: Account Feed Ind
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCDTL_ACCT_FEED_IND
        - name: tbvcdtlCurrCode
          in: query
          description: Currency Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCDTL_CURR_CODE
        - name: tbvcdtlForeignAmount
          in: query
          description: Foreign Amount
          required: false
          schema:
            type: number
          x-lineageReferenceObject: TBVCDTL_FOREIGN_AMOUNT
        - name: tbvcdtlGrntCode
          in: query
          description: Grant Billing Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCDTL_GRNT_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/cashier-session-details-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    cashier-session-details-1.0.0_get_response:
      type: object
      properties:
        TBVSDTL:
          type: array
          items:
            required:
              - queryTotal
              - sessionTotal
            type: object
            properties:
              rwname:
                title: rwname
                maxLength: 30
                type: string
                description: "Lineage reference object : rwname"
                x-lineageReferenceObject: rwname   
              tbvcdtlAcctFeedInd:
                title: Feed Indicator
                maxLength: 1
                type: string
                description: "Lineage reference object : TBVCDTL_ACCT_FEED_IND"
                x-lineageReferenceObject: TBVCDTL_ACCT_FEED_IND 
              tbvcdtlAmount:
                title: Amount
                maxLength: 19
                type: number
                description: "Lineage reference object : TBVCDTL_AMOUNT"
                x-lineageReferenceObject: TBVCDTL_AMOUNT    
              tbvcdtlDesc:
                title: Desc
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVCDTL_DESC"
                x-lineageReferenceObject: TBVCDTL_DESC   
              tbvcdtlDetailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lineage reference object : tbvcdtlDetailCode, Lookup lineage
                  reference object : tbbdetc"
                x-lineageReferenceObject: tbvcdtlDetailCode
                x-lineageLookupReferenceObject: tbbdetc
              tbvcdtlEntryDate:
                title: Entry Date
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVCDTL_ENTRY_DATE"
                x-lineageReferenceObject: TBVCDTL_ENTRY_DATE                
              tbvcdtlId:
                title: ID
                maxLength: 7
                type: string
                description: "Lineage reference object : ID"
                x-lineageReferenceObject: ID 
              tbvcdtlSrceCode:
                title: Source Code
                maxLength: 1
                type: string
                description: "Lineage reference object : TBVCDTL_SRCE_CODE, Lookup lineage
                  reference object : ttvsrce"
                x-lineageReferenceObject: TBVCDTL_SRCE_CODE
                x-lineageLookupReferenceObject: ttvsrce   
              tbvcdtlTime:
                title: Time
                maxLength: 7
                type: string
                description: "Lineage reference object : TBVCDTL_TIME"
                x-lineageReferenceObject: TBVCDTL_TIME                              
            x-lineageReferenceObject: TBVSDTL
        TOTALS_BLOCK:
          type: array
          items:
            type: object
            properties:
              queryTotal:
                title: Query Total
                maxLength: 19
                type: number
                description: "Lineage reference object : queryTotal"
                x-lineageReferenceObject: queryTotal
              sessionTotal:
                title: Session Total
                maxLength: 19
                type: number
                description: "Lineage reference object : sessionTotal"
                x-lineageReferenceObject: sessionTotal
            x-lineageReferenceObject: TOTALS_BLOCK   
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    cashier-session-details-1.0.0_get_request:
      required:
        - sessionUser
        - sessionNumber
      type: object
      properties:
        sessionUser:
          title: Session User
          maxLength: 30
          type: string
          description: "Lineage reference object : TBRCOLR_SESSION_USER"
          x-lineageReferenceObject: TBRCOLR_SESSION_USER
        sessionNumber:
          title: Session Number
          type: number
          description: "Lineage reference object : TBRCOLR_SESSION_NUMBER"
          x-lineageReferenceObject: TBRCOLR_SESSION_NUMBER
        typeInd:
          title: Type Ind
          maxLength: 1
          type: string
          description: "Lineage reference object : TYPE_IND"
          x-lineageReferenceObject: TYPE_IND
        ttvdcatDcatCode:
          title: Category Detail Code
          maxLength: 3
          type: string
          description: "Lineage reference object : TTVDCAT_DCAT_CODE"
          x-lineageReferenceObject: TTVDCAT_DCAT_CODE
        tbvcdtlDetailCode:
          title: Detail Code
          maxLength: 4
          type: string
          description: "Lineage reference object : TBVCDTL_DETAIL_CODE"
          x-lineageReferenceObject: TBVCDTL_DETAIL_CODE
        tbvcdtlDesc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : TBVCDTL_DESC"
          x-lineageReferenceObject: TBVCDTL_DESC
        tbvcdtlAmount:
          title: Amount
          type: number
          description: "Lineage reference object : TBVCDTL_AMOUNT"
          x-lineageReferenceObject: TBVCDTL_AMOUNT
        tbvcdtlReceiptNumber:
          title: Receipt Number
          type: number
          description: "Lineage reference object : TBVCDTL_RECEIPT_NUMBER"
          x-lineageReferenceObject: TBVCDTL_RECEIPT_NUMBER
        tbvcdtlEntryDate:
          title: Entry Date
          type: string
          description: "Lineage reference object : TBVCDTL_ENTRY_DATE"
          x-lineageReferenceObject: TBVCDTL_ENTRY_DATE
        tbvcdtlTime:
          title: Time
          maxLength: 8
          type: string
          description: "Lineage reference object : TBVCDTL_TIME"
          x-lineageReferenceObject: TBVCDTL_TIME
        tbvcdtlSrceCode:
          title: Source Code
          maxLength: 1
          type: string
          description: "Lineage reference object : TBVCDTL_SRCE_CODE"
          x-lineageReferenceObject: TBVCDTL_SRCE_CODE
        tbvcdtlAcctFeedInd:
          title: Account Feed Indicator
          maxLength: 1
          type: string
          description: "Lineage reference object : TBVCDTL_ACCT_FEED_IND"
          x-lineageReferenceObject: TBVCDTL_ACCT_FEED_IND
        tbvcdtlCurrCode:
          title: Currency Code
          maxLength: 4
          type: string
          description: "Lineage reference object : TBVCDTL_CURR_CODE"
          x-lineageReferenceObject: TBVCDTL_CURR_CODE
        tbvcdtlForeignAmount:
          title: Foreign Amount
          type: number
          description: "Lineage reference object : TBVCDTL_FOREIGN_AMOUNT"
          x-lineageReferenceObject: TBVCDTL_FOREIGN_AMOUNT
        tbvcdtlGrntCode:
          title: Grant Billing Code
          maxLength: 9
          type: string
          description: "Lineage reference object : TBVCDTL_GRNT_CODE"
          x-lineageReferenceObject: TBVCDTL_GRNT_CODE
      x-lineageReferenceObject: TGACREV
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
