openapi: 3.0.0
info:
  title: test-codes
  description: API for STVTESC administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: STVTESC
  x-source-domain: Student
  x-source-title: Test Code Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/test-codes:
    get:
      tags:
        - test-codes
      summary: Return resources from STVTESC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_ACTIVITY_DATE
        - name: admrCode
          in: query
          description: Admissions Checklist Request Item
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_ADMR_CODE
        - name: assessmentForm
          in: query
          description: Assessment Data
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_ASSESSMENT_FORM
        - name: code
          in: query
          description: Test Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_CODE
        - name: dataType
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_DATA_TYPE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_DESC
        - name: maxValue
          in: query
          description: Maximum Score
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_MAX_VALUE
        - name: minValue
          in: query
          description: Minimum Score
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_MIN_VALUE
        - name: misCode
          in: query
          description: MIS
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_MIS_CODE
        - name: noPositions
          in: query
          description: Maximum Number of Positions
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_NO_POSITIONS
        - name: systemReqInd
          in: query
          description: System Required
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_SYSTEM_REQ_IND
        - name: vrMsgNo
          in: query
          description: Voice Response Message Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTESC_VR_MSG_NO
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/test-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/test-codes:
    post:
      tags:
        - test-codes QAPI (Query by POST)
      summary: Return resources from STVTESC
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/test-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/test-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
