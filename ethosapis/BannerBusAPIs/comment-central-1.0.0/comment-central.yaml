openapi: 3.0.0
info:
  title: comment-central
  description: API for TGACOMC administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TGACOMC
  x-source-domain: Student
  x-source-title: Comment Central
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/comment-central:
    get:
      tags:
        - comment-central
      summary: Return resources from TGACOMC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: commentCode
          in: query
          description: Comment Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_COMMENT_CODE
        - name: restrictUpdateInd
          in: query
          description: Restrict Update
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_RESTRICT_UPDATE_IND
        - name: createdBy
          in: query
          description: Created User
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_CREATED_BY
        - name: createdDate
          in: query
          description: Created Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_CREATED_DATE
        - name: origCode
          in: query
          description: Originator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_ORIG_CODE
        - name: purgeInd
          in: query
          description: Purge
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_PURGE_IND
        - name: user
          in: query
          description: Last Updated User
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_USER
        - name: activityDate
          in: query
          description: Last Updated Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_ACTIVITY_DATE
        - name: term
          in: query
          description: Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_TERM
        - name: enddate
          in: query
          description: End Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_ENDDATE
        - name: comment
          in: query
          description: Comment
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRCMNT_COMMENT
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/comment-central-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - comment-central
      summary: Updates an existing resource in TGACOMC
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/comment-central-1.0.0_put_request"
            example:
              enddate: 2021-05-26
              criteria.commentCode: ALL
              id: AIP01
      responses:
        "200":
          description: OK
