        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - comment-central
      summary: Creates a new resource in TGACOMC
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/comment-central-1.0.0_post_request"
            example:
              enddate: 2021-05-25
              commentCode: ARMASS
              restrictUpdateInd: N
              term: ΔΙΑΚ07
              id: AIP01
              purgeInd: Y
              origCode: ACCT
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
