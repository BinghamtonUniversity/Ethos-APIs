          schema:
            type: string
        - name: keyblocTermCode
          in: query
          required: false
          schema:
            type: string
        - name: beginDate
          in: query
          description: Start Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRWCTL_BEGIN_DATE
        - name: hourBegin
          in: query
          description: Start Time
          required: false
