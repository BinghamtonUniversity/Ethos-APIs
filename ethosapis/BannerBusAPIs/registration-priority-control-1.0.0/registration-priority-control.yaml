          x-lineageReferenceObject: SFRWCTL_END_DATE
        - name: hourEnd
          in: query
          description: End Time
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRWCTL_HOUR_END
        - name: priority
          in: query
          description: Priority
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRWCTL_PRIORITY
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRWCTL_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
