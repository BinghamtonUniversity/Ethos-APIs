openapi: 3.0.0
info:
  title: document-approval-history
  description: API for FOIAPPH administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FOIAPPH
  x-source-domain: Finance
  x-source-title: Document Approval History
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/document-approval-history:
    get:
      tags:
        - document-approval-history
      summary: Return resources from FOIAPPH
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: docCode
          in: query
          required: false
          schema:
            type: string
        - name: docType
          in: query
          required: false
          schema:
            type: string
        - name: chgSeqNum
          in: query
          required: false
          schema:
            type: string
        - name: submissionNumber
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/document-approval-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/document-approval-history:
    post:
      tags:
        - document-approval-history QAPI (Query by POST)
      summary: Return resources from FOIAPPH
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/document-approval-history-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/document-approval-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    document-approval-history-1.0.0_qapi_post:
      type: object
      properties:
        docCode:
          type: string
        docType:
          type: string
        chgSeqNum:
          type: string
        submissionNumber:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    document-approval-history-1.0.0_get_request:
      type: object
      properties:
        chgSeqNum:
          title: Change Sequence
          maxLength: 3
          type: number
          description: "Lineage reference object : FOVAPPH_CHG_SEQ_NUM"
          x-lineageReferenceObject: FOVAPPH_CHG_SEQ_NUM
        submissionNumber:
          title: Submission Number
          maxLength: 3
          type: number
          description: "Lineage reference object : FOVAPPH_SUBMISSION_NUMBER"
          x-lineageReferenceObject: FOVAPPH_SUBMISSION_NUMBER
        docType:
          title: Type
          maxLength: 3
          type: string
          description: "Lineage reference object : FOVAPPH_DOC_TYPE"
          x-lineageReferenceObject: FOVAPPH_DOC_TYPE
        docCode:
          title: Document Code
          maxLength: 15
          type: string
          description: "Lineage reference object : FOVAPPH_DOC_CODE"
          x-lineageReferenceObject: FOVAPPH_DOC_CODE
      x-lineageReferenceObject: FOVAPPH
    document-approval-history-1.0.0_get_response:
      type: object
      properties:
        fobapph2:
          type: array
          items:
            type: object
            properties:
              fobapphQueueId:
                title: Queue ID
                maxLength: 4
                type: string
                description: "Lineage reference object : FOBAPPH_QUEUE_ID"
                x-lineageReferenceObject: FOBAPPH_QUEUE_ID
              fobapphActivityDate:
                title: Approved Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FOBAPPH_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: FOBAPPH_ACTIVITY_DATE
              fobapphQueueLevel:
                title: Level
                maxLength: 4
                type: number
                description: "Lineage reference object : FOBAPPH_QUEUE_LEVEL"
                x-lineageReferenceObject: FOBAPPH_QUEUE_LEVEL
              userName:
                title: Approver's Name
                maxLength: 35
                type: string
            x-lineageReferenceObject: fobapph2
        fovapph:
          type: array
          items:
            type: object
            properties:
              chgSeqNum:
                title: Change Sequence
                maxLength: 3
                type: number
                description: "Lineage reference object : FOVAPPH_CHG_SEQ_NUM"
                x-lineageReferenceObject: FOVAPPH_CHG_SEQ_NUM
              submissionNumber:
                title: Submission Number
                maxLength: 3
                type: number
                description: "Lineage reference object : FOVAPPH_SUBMISSION_NUMBER"
                x-lineageReferenceObject: FOVAPPH_SUBMISSION_NUMBER
              docType:
                title: Type
                maxLength: 3
                type: string
                description: "Lineage reference object : FOVAPPH_DOC_TYPE"
                x-lineageReferenceObject: FOVAPPH_DOC_TYPE
              docCode:
                title: Document Code
                maxLength: 15
                type: string
                description: "Lineage reference object : FOVAPPH_DOC_CODE"
                x-lineageReferenceObject: FOVAPPH_DOC_CODE
            x-lineageReferenceObject: fovapph
        display:
          type: array
          items:
            type: object
            properties:
              origUserId:
                title: Originating User
                maxLength: 35
                type: string
                description: "Lineage reference object : origUserId"
                x-lineageReferenceObject: origUserId
              origUserName:
                title: Name
                maxLength: 35
                type: string
                description: "Lineage reference object : origUserName"
                x-lineageReferenceObject: origUserName
            x-lineageReferenceObject: display
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
