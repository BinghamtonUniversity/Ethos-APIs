openapi: 3.0.0
info:
  title: vendor-history-query
  description: API for FAIVHIS administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FAIVHIS
  x-source-domain: Finance
  x-source-title: Vendor History Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/vendor-history-query:
    get:
      tags:
        - vendor-history-query
      summary: Return resources from FAIVHIS
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: faavndhVendCode
          in: query
          required: false
          schema:
            type: string
        - name: invoiceType
          in: query
          required: false
          schema:
            type: string
        - name: favvhi5FsyrCode
          in: query
          description: Fiscal Year
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVHI5_FSYR_CODE
        - name: favvhi5CreditMemoCount
          in: query
          description: Credit Memos Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVHI5_CREDIT_MEMO_COUNT
        - name: favvhi5CreditMemoAmt
          in: query
          description: Credit Memos Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVHI5_CREDIT_MEMO_AMT
        - name: favvhi5OpenCount
          in: query
          description: Open Invoices Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVHI5_OPEN_COUNT
        - name: favvhi5OpenAmt
          in: query
          description: Open Invoices Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVHI5_OPEN_AMT
        - name: favvhi5PaidCount
          in: query
          description: Paid Invoices Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVHI5_PAID_COUNT
        - name: favvhi5PaidAmt
          in: query
          description: Paid Invoices Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVHI5_PAID_AMT
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/vendor-history-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/vendor-history-query:
    post:
      tags:
        - vendor-history-query QAPI (Query by POST)
      summary: Return resources from FAIVHIS
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/vendor-history-query-1.0.0_get_request"
            example:
              favvhi5FsyrCode: 6
              faavndhVendCode: LMRFND002
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/vendor-history-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    vendor-history-query-1.0.0_qapi_post:
      type: object
      properties:
        faavndhVendCode:
          type: string
        invoiceType:
          type: string
        favvhi5FsyrCode:
          title: Fiscal Year
          maxLength: 2
          type: string
          description: "Lineage reference object : FAVVHI5_FSYR_CODE, Lookup lineage
            reference object : ftvfspd,ftvfsyr,ftvfspd"
          x-lineageReferenceObject: FAVVHI5_FSYR_CODE
          x-lineageLookupReferenceObject: ftvfspd,ftvfsyr,ftvfspd
        favvhi5CreditMemoCount:
          title: Credit Memos Number
          maxLength: 7
          type: number
          description: "Lineage reference object : FAVVHI5_CREDIT_MEMO_COUNT"
          x-lineageReferenceObject: FAVVHI5_CREDIT_MEMO_COUNT
        favvhi5CreditMemoAmt:
          title: Credit Memos Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FAVVHI5_CREDIT_MEMO_AMT"
          x-lineageReferenceObject: FAVVHI5_CREDIT_MEMO_AMT
        favvhi5OpenCount:
          title: Open Invoices Number
          maxLength: 7
          type: number
          description: "Lineage reference object : FAVVHI5_OPEN_COUNT"
          x-lineageReferenceObject: FAVVHI5_OPEN_COUNT
        favvhi5OpenAmt:
          title: Open Invoices Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FAVVHI5_OPEN_AMT"
          x-lineageReferenceObject: FAVVHI5_OPEN_AMT
        favvhi5PaidCount:
          title: Paid Invoices Number
          maxLength: 7
          type: number
          description: "Lineage reference object : FAVVHI5_PAID_COUNT"
          x-lineageReferenceObject: FAVVHI5_PAID_COUNT
        favvhi5PaidAmt:
          title: Paid Invoices Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FAVVHI5_PAID_AMT"
          x-lineageReferenceObject: FAVVHI5_PAID_AMT
    vendor-history-query-1.0.0_get_response:
      type: object
      properties:
        favvhi5PaidCount:
          title: Paid Invoices Number
          maxLength: 7
          type: number
          description: "Lineage reference object : FAVVHI5_PAID_COUNT"
          x-lineageReferenceObject: FAVVHI5_PAID_COUNT
        favvhi5FsyrCode:
          title: Fiscal Year
          maxLength: 2
          type: string
          description: "Lineage reference object : FAVVHI5_FSYR_CODE, Lookup lineage
            reference object : ftvfspd,ftvfsyr,ftvfspd"
          x-lineageReferenceObject: FAVVHI5_FSYR_CODE
          x-lineageLookupReferenceObject: ftvfspd,ftvfsyr,ftvfspd
        favvhi5OpenCount:
          title: Open Invoices Number
          maxLength: 7
          type: number
          description: "Lineage reference object : FAVVHI5_OPEN_COUNT"
          x-lineageReferenceObject: FAVVHI5_OPEN_COUNT
        favvhi5CreditMemoAmt:
          title: Credit Memos Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FAVVHI5_CREDIT_MEMO_AMT"
          x-lineageReferenceObject: FAVVHI5_CREDIT_MEMO_AMT
        favvhi5OpenAmt:
          title: Open Invoices Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FAVVHI5_OPEN_AMT"
          x-lineageReferenceObject: FAVVHI5_OPEN_AMT
        favvhi5PaidAmt:
          title: Paid Invoices Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FAVVHI5_PAID_AMT"
          x-lineageReferenceObject: FAVVHI5_PAID_AMT
        favvhi5CreditMemoCount:
          title: Credit Memos Number
          maxLength: 7
          type: number
          description: "Lineage reference object : FAVVHI5_CREDIT_MEMO_COUNT"
          x-lineageReferenceObject: FAVVHI5_CREDIT_MEMO_COUNT
      x-lineageReferenceObject: detail_block_ind
    vendor-history-query-1.0.0_get_request:
      type: object
      properties:
        favvhi5PaidCount:
          title: Paid Invoices Number
          maxLength: 7
          type: number
          description: "Lineage reference object : FAVVHI5_PAID_COUNT"
          x-lineageReferenceObject: FAVVHI5_PAID_COUNT
        favvhi5FsyrCode:
          title: Fiscal Year
          maxLength: 2
          type: string
          description: "Lineage reference object : FAVVHI5_FSYR_CODE, Lookup lineage
            reference object : ftvfspd,ftvfsyr,ftvfspd"
          x-lineageReferenceObject: FAVVHI5_FSYR_CODE
          x-lineageLookupReferenceObject: ftvfspd,ftvfsyr,ftvfspd
        favvhi5OpenCount:
          title: Open Invoices Number
          maxLength: 7
          type: number
          description: "Lineage reference object : FAVVHI5_OPEN_COUNT"
          x-lineageReferenceObject: FAVVHI5_OPEN_COUNT
        faavndhVendCode:
          title: Vendor
          maxLength: 9
          type: string
          description: "Lineage reference object : faavndhVendCode, Lookup lineage
            reference object : ftvvend"
          x-lineageReferenceObject: faavndhVendCode
          x-lineageLookupReferenceObject: ftvvend
        favvhi5CreditMemoAmt:
          title: Credit Memos Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FAVVHI5_CREDIT_MEMO_AMT"
          x-lineageReferenceObject: FAVVHI5_CREDIT_MEMO_AMT
        favvhi5OpenAmt:
          title: Open Invoices Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FAVVHI5_OPEN_AMT"
          x-lineageReferenceObject: FAVVHI5_OPEN_AMT
        favvhi5PaidAmt:
          title: Paid Invoices Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FAVVHI5_PAID_AMT"
          x-lineageReferenceObject: FAVVHI5_PAID_AMT
        invoiceType:
          maxLength: 30
          type: string
          description: "Lineage reference object : invoiceType"
          x-lineageReferenceObject: invoiceType
        favvhi5CreditMemoCount:
          title: Credit Memos Number
          maxLength: 7
          type: number
          description: "Lineage reference object : FAVVHI5_CREDIT_MEMO_COUNT"
          x-lineageReferenceObject: FAVVHI5_CREDIT_MEMO_COUNT
      x-lineageReferenceObject: DETAIL_BLOCK_IND
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
