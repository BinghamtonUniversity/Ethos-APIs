openapi: 3.0.0
info:
  title: grant-contract-pay-methods
  description: API for FTVPAYM administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: FTVPAYM
  x-source-domain: Finance
  x-source-title: Grant/Contract Pay Method Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/grant-contract-pay-methods:
    get:
      tags:
        - grant-contract-pay-methods
      summary: Return resources from FTVPAYM
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: effDate
          in: query
          description: |-
            Effective
            Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPAYM_EFF_DATE
        - name: paymCode
          in: query
          description: Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPAYM_PAYM_CODE
        - name: statusInd
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPAYM_STATUS_IND
        - name: termDate
          in: query
          description: |-
            Termination
            Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPAYM_TERM_DATE
        - name: title
          in: query
          description: Pay Method Title
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPAYM_TITLE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/grant-contract-pay-methods-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/grant-contract-pay-methods:
    post:
      tags:
        - grant-contract-pay-methods QAPI (Query by POST)
      summary: Return resources from FTVPAYM
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/grant-contract-pay-methods-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/grant-contract-pay-methods-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    grant-contract-pay-methods-1.0.0_get_request:
      type: object
      properties:
        effDate:
          title: |-
            Effective
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPAYM_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPAYM_EFF_DATE
        statusInd:
          title: Status
          maxLength: 1
          type: string
          description: "Lineage reference object : FTVPAYM_STATUS_IND"
          x-lineageReferenceObject: FTVPAYM_STATUS_IND
        paymCode:
          title: Code
          maxLength: 4
          type: string
          description: "Lineage reference object : FTVPAYM_PAYM_CODE"
          x-lineageReferenceObject: FTVPAYM_PAYM_CODE
        termDate:
          title: |-
            Termination
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPAYM_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPAYM_TERM_DATE
        title:
          title: Pay Method Title
          maxLength: 35
          type: string
          description: "Lineage reference object : FTVPAYM_TITLE"
          x-lineageReferenceObject: FTVPAYM_TITLE
      x-lineageReferenceObject: FTVPAYM
    grant-contract-pay-methods-1.0.0_qapi_post:
      type: object
      properties:
        effDate:
          title: |-
            Effective
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPAYM_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPAYM_EFF_DATE
        paymCode:
          title: Code
          maxLength: 4
          type: string
          description: "Lineage reference object : FTVPAYM_PAYM_CODE"
          x-lineageReferenceObject: FTVPAYM_PAYM_CODE
        statusInd:
          title: Status
          maxLength: 1
          type: string
          description: "Lineage reference object : FTVPAYM_STATUS_IND"
          x-lineageReferenceObject: FTVPAYM_STATUS_IND
        termDate:
          title: |-
            Termination
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPAYM_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPAYM_TERM_DATE
        title:
          title: Pay Method Title
          maxLength: 35
          type: string
          description: "Lineage reference object : FTVPAYM_TITLE"
          x-lineageReferenceObject: FTVPAYM_TITLE
    grant-contract-pay-methods-1.0.0_get_response:
      type: object
      properties:
        effDate:
          title: |-
            Effective
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPAYM_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPAYM_EFF_DATE
        statusInd:
          title: Status
          maxLength: 1
          type: string
          description: "Lineage reference object : FTVPAYM_STATUS_IND"
          x-lineageReferenceObject: FTVPAYM_STATUS_IND
        paymCode:
          title: Code
          maxLength: 4
          type: string
          description: "Lineage reference object : FTVPAYM_PAYM_CODE"
          x-lineageReferenceObject: FTVPAYM_PAYM_CODE
        termDate:
          title: |-
            Termination
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPAYM_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPAYM_TERM_DATE
        title:
          title: Pay Method Title
          maxLength: 35
          type: string
          description: "Lineage reference object : FTVPAYM_TITLE"
          x-lineageReferenceObject: FTVPAYM_TITLE
      x-lineageReferenceObject: ftvpaym
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
