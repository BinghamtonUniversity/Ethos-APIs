        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - self-service-parameter-configurations
      summary: Creates a new resource in GUACONF
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
