openapi: 3.0.0
info:
  title: user-approval
  description: API for FOAUAPP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FOAUAPP
  x-source-domain: Finance
  x-source-title: User Approval
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/user-approval:
    get:
      tags:
        - user-approval
      summary: Return resources from FOAUAPP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: docCode
          in: query
          description: Document Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBUAPP_DOC_CODE
        - name: nextIndicator
          in: query
          required: false
          schema:
            type: string
        - name: fobuappDocCode
          in: query
          required: false
          schema:
            type: string
        - name: chgSeqNum
          in: query
          description: Change Sequence
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBUAPP_CHG_SEQ_NUM
        - name: submissionNumber
          in: query
          description: Submission
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBUAPP_SUBMISSION_NUMBER
        - name: origUser
          in: query
          description: Originating User
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBUAPP_ORIG_USER
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/user-approval-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/user-approval:
    post:
      tags:
        - user-approval QAPI (Query by POST)
      summary: Return resources from FOAUAPP
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/user-approval-1.0.0_get_request"
            example:
              userId: HRISUSR
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/user-approval-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    user-approval-1.0.0_get_request:
      type: object
      properties:
        chgSeqNum:
          title: Change Sequence
          maxLength: 3
          type: number
          description: "Lineage reference object : FOBUAPP_CHG_SEQ_NUM"
          x-lineageReferenceObject: FOBUAPP_CHG_SEQ_NUM
        submissionNumber:
          title: Submission
          maxLength: 3
          type: number
          description: "Lineage reference object : FOBUAPP_SUBMISSION_NUMBER"
          x-lineageReferenceObject: FOBUAPP_SUBMISSION_NUMBER
        fobuappDocCode:
          title: Document Number
          maxLength: 15
          type: string
          description: "Lineage reference object : FOBUAPP_DOC_CODE"
          x-lineageReferenceObject: FOBUAPP_DOC_CODE
        nextIndicator:
          maxLength: 1
          type: string
          description: "Lineage reference object : nextIndicator"
          x-lineageReferenceObject: nextIndicator
        origUser:
          title: Originating User
          maxLength: 30
          type: string
          description: "Lineage reference object : FOBUAPP_ORIG_USER"
          x-lineageReferenceObject: FOBUAPP_ORIG_USER
        docCode:
          title: Document
          maxLength: 8
          type: string
          description: "Lineage reference object : docCode"
          x-lineageReferenceObject: docCode
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : userId"
          x-lineageReferenceObject: userId
      x-lineageReferenceObject: FOBUAPP
    user-approval-1.0.0_get_response:
      type: object
      properties:
        chgSeqNum:
          title: Change Sequence
          maxLength: 3
          type: number
          description: "Lineage reference object : FOBUAPP_CHG_SEQ_NUM"
          x-lineageReferenceObject: FOBUAPP_CHG_SEQ_NUM
        submissionNumber:
          title: Submission
          maxLength: 3
          type: number
          description: "Lineage reference object : FOBUAPP_SUBMISSION_NUMBER"
          x-lineageReferenceObject: FOBUAPP_SUBMISSION_NUMBER
        abalInd:
          title: NSF
          maxLength: 1
          type: string
        canApprove:
          title: Next Approver
          maxLength: 1
          type: string
        origUser:
          title: Originating User
          maxLength: 30
          type: string
          description: "Lineage reference object : FOBUAPP_ORIG_USER"
          x-lineageReferenceObject: FOBUAPP_ORIG_USER
        approvalType:
          title: Queue Type
          maxLength: 3
          type: string
        dtyp:
          title: Document Type
          maxLength: 3
          type: string
        docCode:
          title: Document Number
          maxLength: 15
          type: string
          description: "Lineage reference object : FOBUAPP_DOC_CODE"
          x-lineageReferenceObject: FOBUAPP_DOC_CODE
        docAmt:
          title: Document Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FOBUAPP_DOC_AMT"
          x-lineageReferenceObject: FOBUAPP_DOC_AMT
      x-lineageReferenceObject: fobuapp
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    user-approval-1.0.0_qapi_post:
      type: object
      properties:
        userId:
          type: string
        docCode:
          title: Document Number
          maxLength: 15
          type: string
          description: "Lineage reference object : FOBUAPP_DOC_CODE"
          x-lineageReferenceObject: FOBUAPP_DOC_CODE
        nextIndicator:
          type: string
        fobuappDocCode:
          type: string
        chgSeqNum:
          title: Change Sequence
          maxLength: 3
          type: number
          description: "Lineage reference object : FOBUAPP_CHG_SEQ_NUM"
          x-lineageReferenceObject: FOBUAPP_CHG_SEQ_NUM
        submissionNumber:
          title: Submission
          maxLength: 3
          type: number
          description: "Lineage reference object : FOBUAPP_SUBMISSION_NUMBER"
          x-lineageReferenceObject: FOBUAPP_SUBMISSION_NUMBER
        origUser:
          title: Originating User
          maxLength: 30
          type: string
          description: "Lineage reference object : FOBUAPP_ORIG_USER"
          x-lineageReferenceObject: FOBUAPP_ORIG_USER
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
