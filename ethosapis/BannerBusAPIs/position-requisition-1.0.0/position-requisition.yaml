                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/position-requisition:
    post:
      tags:
        - position-requisition QAPI (Query by POST)
      summary: Return resources from PAAREQU
      requestBody:
