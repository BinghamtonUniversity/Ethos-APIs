openapi: 3.0.0
info:
  title: application-questions-or-answers
  description: API for SAAQUAN administrative page
  version: 1.1.0
  x-audience: all
  x-release-status: ga
  x-source-name: SAAQUAN
  x-source-domain: Student
  x-source-title: Application Questions/Answers Form
  x-source-system: banner
  x-api-type: bus-poc
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/application-questions-or-answers:
    get:
      tags:
      - application-questions-or-answers
      summary: Return resources from SAAQUAN
      parameters:
      - name: X-SDE-Expand
        in: header
        description: The comma separated value list of block names
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of resources requesting for this result set.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
      - name: id
        in: query
        required: false
        schema:
          type: string
      - name: keyblocTermCode
        in: query
        required: false
        schema:
          type: string
      - name: termCodeEntry
        in: query
        required: false
        schema:
          type: string
      - name: sarappdApdcCode
        in: query
        required: false
        schema:
          type: string
      - name: apstCode
        in: query
        required: false
        schema:
          type: string
      - name: applDate
        in: query
        required: false
        schema:
          type: string
      - name: applNo
        in: query
        required: false
        schema:
          type: string
      - name: admtCode
        in: query
        required: false
        schema:
          type: string
      - name: sessCode
        in: query
        required: false
        schema:
          type: string
      - name: reqDocInd
        in: query
        required: false
        schema:
          type: string
      - name: applPreference
        in: query
        required: false
        schema:
          type: string
      - name: stypCode
        in: query
        required: false
        schema:
          type: string
      - name: resdCode
        in: query
        required: false
        schema:
          type: string
      - name: fullPartInd
        in: query
        required: false
        schema:
          type: string
      - name: seqno
        in: query
        description: Sequence Number
        required: false
        schema:
          type: string 
          x-lineageReferenceObject: SARQUAN_SEQNO
      - name: admrCode
        in: query
        description: Admission Request
        required: false
        schema:
          type: string
          x-lineageReferenceObject: SARQUAN_ADMR_CODE
      - name: question
        in: query
        description: Applicant Question
        required: false
        schema:
          type: string
          x-lineageReferenceObject: SARQUAN_QUESTION
      - name: webInd
        in: query
        required: false
        schema:
          type: string
          x-lineageReferenceObject: SARQUAN_WEB_IND
      - name: displayWebInd
        in: query
        required: false
        schema:
          type: string
          x-lineageReferenceObject: SARQUAN_DISPLAY_WEB_IND
      - name: answer
        in: query
        description: Question Answer
        required: false
        schema:
          type: string
          x-lineageReferenceObject: SARQUAN_ANSWER
      - name: longAnswer
        in: query
        description: Essay Answer
        required: false
        schema:
          type: string
          x-lineageReferenceObject: SARQUAN_LONG_ANSWER
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/application-questions-or-answers-1.1.0_get_response"
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
    put:
      tags:
      - application-questions-or-answers
      summary: Updates an existing resource in SAAQUAN
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.1.0+json:
            schema:
              $ref: "#/components/schemas/application-questions-or-answers-1.1.0_put_request"
            example:
              criteria.admrCode: AJ
              answer: QuestionAnswerTest
              criteria.question: QuestionTest
              keyblocTermCode: 201410
              applNo: 1
              id: A00030988
      responses:
        "200":
          description: OK
