        EllucianOAuthUserToken: []
    post:
      tags:
      - application-questions-or-answers
      summary: Creates a new resource in SAAQUAN
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.1.0+json:
            schema:
              $ref: "#/components/schemas/application-questions-or-answers-1.1.0_post_request"
            example:
              admrCode: AMDF
              question: QuestionTest1
              answer: QuestionAnswerTest1
              keyblocTermCode: 201410
              applNo: 1
              id: A00030988
      responses:
        "200":
          description: OK
