          description: "Lineage reference object : year"
          x-lineageReferenceObject: year
        disp:
          maxLength: 2
          type: string
          description: "Lineage reference object : PHVJOBS_DISP"
          x-lineageReferenceObject: PHVJOBS_DISP
        lastNameSeq:
