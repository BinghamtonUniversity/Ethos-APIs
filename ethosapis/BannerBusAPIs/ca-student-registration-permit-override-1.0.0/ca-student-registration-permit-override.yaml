openapi: 3.0.0
info:
  title: ca-student-registration-permit-override
  description: API for SFASRPO administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SFASRPO
  x-source-domain: Student
  x-source-title: Student Registration Permit-Override (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-student-registration-permit-override:
    get:
      tags:
        - ca-student-registration-permit-override
      summary: Return resources from SFASRPO
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblocId
          in: query
          required: false
          schema:
            type: string
        - name: keyblocTermCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-student-registration-permit-override-1.0.0_get_r\
                    esponse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-student-registration-permit-override:
    post:
      tags:
        - ca-student-registration-permit-override QAPI (Query by POST)
      summary: Return resources from SFASRPO
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-student-registration-permit-override-1.0.0_get_r\
                equest"
            example:
              keyblocTermCode: ZZZZ59
              keyblocId: A00031928
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-student-registration-permit-override-1.0.0_get_r\
                    esponse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-student-registration-permit-override-1.0.0_get_response:
      type: object
      properties:
        sfrsrpo:
          type: array
          items:
            required:
              - rovrCode
            type: object
            properties:
              crseNumb:
                title: Course Number
                maxLength: 30
                type: string
                description: "Lineage reference object : SFRSRPO_CRSE_NUMB"
                x-lineageReferenceObject: SFRSRPO_CRSE_NUMB
              activityDate:
                title: Activity Date
                maxLength: 12
                type: string
                description: "Lineage reference object : SFRSRPO_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SFRSRPO_ACTIVITY_DATE
              rovrDesc:
                title: Permit Description
                type: string
              subjCode:
                title: Subject
                maxLength: 30
                type: string
                description: "Lineage reference object : SFRSRPO_SUBJ_CODE, Lookup lineage
                  reference object : stvsubj"
                x-lineageReferenceObject: SFRSRPO_SUBJ_CODE
                x-lineageLookupReferenceObject: stvsubj
              seqNumb:
                title: Section
                maxLength: 3
                type: string
                description: "Lineage reference object : SFRSRPO_SEQ_NUMB"
                x-lineageReferenceObject: SFRSRPO_SEQ_NUMB
              rovrCode:
                title: Permit
                maxLength: 30
                type: string
                description: "Lineage reference object : SFRSRPO_ROVR_CODE, Lookup lineage
                  reference object : stvrovr,sfrrovr"
                x-lineageReferenceObject: SFRSRPO_ROVR_CODE
                x-lineageLookupReferenceObject: stvrovr,sfrrovr
              user:
                title: User
                maxLength: 30
                type: string
                description: "Lineage reference object : SFRSRPO_USER"
                x-lineageReferenceObject: SFRSRPO_USER
              crn:
                title: CRN
                maxLength: 5
                type: string
                description: "Lineage reference object : SFRSRPO_CRN"
                x-lineageReferenceObject: SFRSRPO_CRN
            x-lineageReferenceObject: sfrsrpo
        sfvstum:
          type: array
          items:
            type: object
            properties:
              squeryLinkIdent:
                title: Link
                maxLength: 2
                type: string
              squeryCrseNumb:
                title: Course Number
                maxLength: 5
                type: string
              squerySstsCode:
                title: Section Status
                maxLength: 1
                type: string
              squeryCampCode:
                title: Campus
                maxLength: 3
                type: string
              errorFlag:
                title: Error
                maxLength: 1
                type: string
                description: "Lineage reference object : SFVSTUM_ERROR_FLAG"
                x-lineageReferenceObject: SFVSTUM_ERROR_FLAG
              squeryXlstGroup:
                title: Crosslist Group
                maxLength: 15
                type: string
              daysCode1:
                maxLength: 1
                type: string
              daysCode2:
                maxLength: 1
                type: string
              daysCode3:
                maxLength: 1
                type: string
              daysCode4:
                maxLength: 1
                type: string
              daysCode5:
                maxLength: 1
                type: string
              daysCode6:
                maxLength: 1
                type: string
              daysCode7:
                maxLength: 1
                type: string
              rstsCode:
                title: Registration Status
                maxLength: 30
                type: string
                description: "Lineage reference object : SFVSTUM_RSTS_CODE, Lookup lineage
                  reference object : stvrsts"
                x-lineageReferenceObject: SFVSTUM_RSTS_CODE
                x-lineageLookupReferenceObject: stvrsts
              squerySubjCode:
                title: Subject
                maxLength: 4
                type: string
              squeryCrn:
                title: CRN
                maxLength: 5
                type: string
              beginTime:
                title: Begin Time
                maxLength: 4
                type: string
                description: "Lineage reference object : SFVSTUM_BEGIN_TIME"
                x-lineageReferenceObject: SFVSTUM_BEGIN_TIME
              squeryPtrmCode:
                title: Part of Term
                maxLength: 3
                type: string
              squerySeqNumb:
                title: Section
                maxLength: 3
                type: string
              squeryWaitCount:
                title: Waitlisted
                maxLength: 4
                type: number
              stumBlockInd:
                title: Block Indicator
                maxLength: 1
                type: string
              squerySeatsAvail:
                title: Available
                maxLength: 4
                type: number
              squeryStudyPath:
                title: Study Path
                maxLength: 2
                type: number
              endTime:
                title: End Time
                maxLength: 4
                type: string
                description: "Lineage reference object : SFVSTUM_END_TIME"
                x-lineageReferenceObject: SFVSTUM_END_TIME
              squerySchdCode:
                title: Schedule Type
                maxLength: 3
                type: string
            x-lineageReferenceObject: sfvstum
    ca-student-registration-permit-override-1.0.0_qapi_post:
      type: object
      properties:
        keyblocId:
          type: string
        keyblocTermCode:
          type: string
    ca-student-registration-permit-override-1.0.0_get_request:
      type: object
      properties:
        keyblocTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocTermCode, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: keyblocTermCode
          x-lineageLookupReferenceObject: stvterm
        keyblocId:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : keyblocId"
          x-lineageReferenceObject: keyblocId
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
