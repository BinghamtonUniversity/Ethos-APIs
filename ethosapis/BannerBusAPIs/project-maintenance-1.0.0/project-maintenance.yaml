openapi: 3.0.0
info:
  title: project-maintenance
  description: API for FTMPROJ administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FTMPROJ
  x-source-domain: Finance
  x-source-title: Project Maintenance
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/project-maintenance:
    get:
      tags:
        - project-maintenance
      summary: Return resources from FTMPROJ
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: ftmprojProjCode
          in: query
          required: true
          schema:
            type: string
        - name: projDesc
          in: query
          required: true
          schema:
            type: string
        - name: effDate
          in: query
          description: Start Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_EFF_DATE
        - name: termDate
          in: query
          description: Termination Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_TERM_DATE
        - name: memoInd
          in: query
          description: Memo Project
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_MEMO_IND
        - name: coasCode
          in: query
          description: Chart of Accounts
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_COAS_CODE
        - name: orgnCodeProj
          in: query
          description: Organization
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_ORGN_CODE_PROJ
        - name: actvCode
          in: query
          description: Activity
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_ACTV_CODE
        - name: acciCode
          in: query
          description: Index
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_ACCI_CODE
        - name: fundCode
          in: query
          description: Fund
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_FUND_CODE
        - name: orgnCode
          in: query
          description: Organization
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_ORGN_CODE
        - name: acctCode
          in: query
          description: Account
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_ACCT_CODE
        - name: progCode
          in: query
          description: Program
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_PROG_CODE
        - name: locnCode
          in: query
          description: Location
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROJ_LOCN_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/project-maintenance-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - project-maintenance
      summary: Updates an existing resource in FTMPROJ
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
