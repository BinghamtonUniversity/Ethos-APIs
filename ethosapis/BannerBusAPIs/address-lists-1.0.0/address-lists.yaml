openapi: 3.0.0
info:
  title: address-lists
  description: API for TUIADDR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TUIADDR
  x-source-domain: Student
  x-source-title: Address List
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/address-lists:
    get:
      tags:
        - address-lists
      summary: Return resources from TUIADDR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/address-lists-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/address-lists:
    post:
      tags:
        - address-lists QAPI (Query by POST)
      summary: Return resources from TUIADDR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/address-lists-1.0.0_get_request"
            example:
              id: MATC4
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/address-lists-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    address-lists-1.0.0_get_request:
      type: object
      properties:
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: KEY_BLOCK
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    address-lists-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
    address-lists-1.0.0_get_response:
      required:
        - atypCode
      type: object
      properties:
        cntyCode:
          title: County
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRADDR_CNTY_CODE, Lookup lineage
            reference object : stvcnty"
          x-lineageReferenceObject: SPRADDR_CNTY_CODE
          x-lineageLookupReferenceObject: stvcnty
        streetLine2:
          title: Street Line 2
          maxLength: 75
          type: string
          description: "Lineage reference object : SPRADDR_STREET_LINE2"
          x-lineageReferenceObject: SPRADDR_STREET_LINE2
        streetLine1:
          title: Street Line 1
          maxLength: 75
          type: string
          description: "Lineage reference object : SPRADDR_STREET_LINE1"
          x-lineageReferenceObject: SPRADDR_STREET_LINE1
        city:
          title: City
          maxLength: 50
          type: string
          description: "Lineage reference object : SPRADDR_CITY"
          x-lineageReferenceObject: SPRADDR_CITY
        streetLine3:
          title: Street Line 3
          maxLength: 75
          type: string
          description: "Lineage reference object : SPRADDR_STREET_LINE3"
          x-lineageReferenceObject: SPRADDR_STREET_LINE3
        carrierRoute:
          title: Carrier Route
          maxLength: 4
          type: string
          description: "Lineage reference object : SPRADDR_CARRIER_ROUTE"
          x-lineageReferenceObject: SPRADDR_CARRIER_ROUTE
        activityDate:
          title: Activity Date
          maxLength: 26
          type: string
          description: "Lineage reference object : SPRADDR_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SPRADDR_ACTIVITY_DATE
        statusInd:
          title: Inactivate Address
          maxLength: 1
          type: string
          description: "Lineage reference object : SPRADDR_STATUS_IND"
          x-lineageReferenceObject: SPRADDR_STATUS_IND
        teleDescription:
          type: string
        statDescription:
          type: string
        correctionDigit:
          title: Correction Digit
          maxLength: 1
          type: number
          description: "Lineage reference object : SPRADDR_CORRECTION_DIGIT"
          x-lineageReferenceObject: SPRADDR_CORRECTION_DIGIT
        zip:
          title: ZIP or Postal Code
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRADDR_ZIP"
          x-lineageReferenceObject: SPRADDR_ZIP
        phoneExt:
          title: Extension
          maxLength: 10
          type: string
        deliveryPoint:
          title: Delivery Point
          maxLength: 2
          type: number
          description: "Lineage reference object : SPRADDR_DELIVERY_POINT"
          x-lineageReferenceObject: SPRADDR_DELIVERY_POINT
        statCode:
          title: State or Province
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRADDR_STAT_CODE, Lookup lineage
            reference object : stvstat"
          x-lineageReferenceObject: SPRADDR_STAT_CODE
          x-lineageLookupReferenceObject: stvstat
        natnCode:
          title: Nation
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRADDR_NATN_CODE, Lookup lineage
            reference object : stvnatn"
          x-lineageReferenceObject: SPRADDR_NATN_CODE
          x-lineageLookupReferenceObject: stvnatn
        seqno:
          title: Sequence Number
          maxLength: 2
          type: number
          description: "Lineage reference object : SPRADDR_SEQNO"
          x-lineageReferenceObject: SPRADDR_SEQNO
        phoneCtry:
          title: Country Code
          maxLength: 4
          type: string
        toDate:
          title: To Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SPRADDR_TO_DATE"
          format: date-time
          x-lineageReferenceObject: SPRADDR_TO_DATE
        asrcCode:
          title: Source
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRADDR_ASRC_CODE, Lookup lineage
            reference object : stvasrc"
          x-lineageReferenceObject: SPRADDR_ASRC_CODE
          x-lineageLookupReferenceObject: stvasrc
        natnDescription:
          type: string
        teleCode:
          title: Telephone Type
          maxLength: 30
          type: string
          description: "Lookup lineage reference object : stvtele"
          x-lineageLookupReferenceObject: stvtele
        cntyDescription:
          type: string
        fromDate:
          title: From Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SPRADDR_FROM_DATE"
          format: date-time
          x-lineageReferenceObject: SPRADDR_FROM_DATE
        phoneNumber:
          title: Phone Number
          maxLength: 12
          type: string
        phoneArea:
          title: Area Code
          maxLength: 6
          type: string
        atypDescription:
          type: string
        user:
          title: User
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRADDR_USER"
          x-lineageReferenceObject: SPRADDR_USER
        atypCode:
          title: Address Type
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRADDR_ATYP_CODE, Lookup lineage
            reference object : stvatyp"
          x-lineageReferenceObject: SPRADDR_ATYP_CODE
          x-lineageLookupReferenceObject: stvatyp
      x-lineageReferenceObject: spraddr
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
