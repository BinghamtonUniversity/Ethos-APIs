                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    section-restriction-student-attribute-and-cohort-1.0.0_qapi_post:
      required:
        - ssasectTermCode
      type: object
      properties:
        ssasectTermCode:
          type: string
        ssasectCrn:
          type: string
    section-restriction-student-attribute-and-cohort-1.0.0_get_response:
      type: object
      properties:
        ssrrchr:
          type: array
          items:
            type: object
            properties:
              chrtCode:
                title: Cohort
                maxLength: 15
                type: string
                description: "Lineage reference object : SSRRCHR_CHRT_CODE"
                x-lineageReferenceObject: SSRRCHR_CHRT_CODE
              userId:
                title: Ssrrchr User Id
                maxLength: 30
                type: string
                description: "Lineage reference object : SSRRCHR_USER_ID"
                x-lineageReferenceObject: SSRRCHR_USER_ID
              chrtDesc:
                title: Description
                type: string
            x-lineageReferenceObject: ssrrchr
        ratt_ctrl_block:
          type: array
          items:
            required:
              - ssrrattAttsIeCde
            type: object
            properties:
              ssrrattAttsIeCde:
                title: "Include/Exclude (I/E):"
                maxLength: 1
                type: string
                description: "Lineage reference object : ssrrattAttsIeCde"
                x-lineageReferenceObject: ssrrattAttsIeCde
            x-lineageReferenceObject: ratt_ctrl_block
        ssrratt:
          type: array
          items:
            type: object
            properties:
              attsCode:
                title: Attribute
                maxLength: 15
                type: string
                description: "Lineage reference object : SSRRATT_ATTS_CODE, Lookup lineage
                  reference object : stvatts"
                x-lineageReferenceObject: SSRRATT_ATTS_CODE
                x-lineageLookupReferenceObject: stvatts
              userId:
                title: Ssrratt User Id
                maxLength: 30
                type: string
                description: "Lineage reference object : SSRRATT_USER_ID"
                x-lineageReferenceObject: SSRRATT_USER_ID
              attsDesc:
                title: Description
                type: string
            x-lineageReferenceObject: ssrratt
        rchr_ctrl_block:
          type: array
          items:
            required:
              - ssrrchrChrtIeCde
            type: object
            properties:
              ssrrchrChrtIeCde:
                title: "Include/Exclude (I/E):"
                maxLength: 1
                type: string
                description: "Lineage reference object : ssrrchrChrtIeCde"
                x-lineageReferenceObject: ssrrchrChrtIeCde
            x-lineageReferenceObject: rchr_ctrl_block
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    section-restriction-student-attribute-and-cohort-1.0.0_get_request:
      required:
        - ssasectTermCode
      type: object
      properties:
        ssasectTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : ssasectTermCode, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: ssasectTermCode
          x-lineageLookupReferenceObject: stvterm
        ssasectCrn:
          title: CRN
          maxLength: 30
          type: string
          description: "Lineage reference object : ssasectCrn"
          x-lineageReferenceObject: ssasectCrn
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
