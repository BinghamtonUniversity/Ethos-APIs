openapi: 3.0.0
info:
  title: zip-postal-codes
  description: API for GTVZIPC administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: GTVZIPC
  x-source-domain: Foundation
  x-source-title: ZIP/Postal Code Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/zip-postal-codes:
    get:
      tags:
        - zip-postal-codes
      summary: Return resources from GTVZIPC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: gtvzipcCity
          in: query
          description: City
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVZIPC_CITY
        - name: gtvzipcCntyCode
          in: query
          description: County
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVZIPC_CNTY_CODE
        - name: gtvzipcCode
          in: query
          description: ZIP or Postal Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVZIPC_CODE
        - name: gtvzipcNatnCode
          in: query
          description: Nation
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVZIPC_NATN_CODE
        - name: gtvzipcNeighborhood
          in: query
          required: false
          schema:
            type: string
        - name: gtvzipcStatCode
          in: query
          description: State or Province
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVZIPC_STAT_CODE
        - name: gtvzipcStreet
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/zip-postal-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/zip-postal-codes:
    post:
      tags:
        - zip-postal-codes QAPI (Query by POST)
      summary: Return resources from GTVZIPC
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/zip-postal-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/zip-postal-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    zip-postal-codes-1.0.0_get_response:
      required:
        - gtvzipcCity
        - gtvzipcCode
      type: object
      properties:
        gtvzipcCity:
          title: City
          maxLength: 50
          type: string
          description: "Lineage reference object : GTVZIPC_CITY"
          x-lineageReferenceObject: GTVZIPC_CITY
        gtvzipcNatnCode:
          title: Nation
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_NATN_CODE, Lookup lineage
            reference object : stvnatn"
          x-lineageReferenceObject: GTVZIPC_NATN_CODE
          x-lineageLookupReferenceObject: stvnatn
        gtvzipcCntyCode:
          title: County
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_CNTY_CODE, Lookup lineage
            reference object : stvcnty"
          x-lineageReferenceObject: GTVZIPC_CNTY_CODE
          x-lineageLookupReferenceObject: stvcnty
        gtvzipcActivityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GTVZIPC_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GTVZIPC_ACTIVITY_DATE
        gtvzipcStatCode:
          title: State or Province
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_STAT_CODE, Lookup lineage
            reference object : stvstat"
          x-lineageReferenceObject: GTVZIPC_STAT_CODE
          x-lineageLookupReferenceObject: stvstat
        gtvzipcCode:
          title: ZIP or Postal Code
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_CODE"
          x-lineageReferenceObject: GTVZIPC_CODE
      x-lineageReferenceObject: gtvzipc_block
    zip-postal-codes-1.0.0_get_request:
      required:
        - gtvzipcCity
        - gtvzipcCode
      type: object
      properties:
        gtvzipcCity:
          title: City
          maxLength: 50
          type: string
          description: "Lineage reference object : GTVZIPC_CITY"
          x-lineageReferenceObject: GTVZIPC_CITY
        gtvzipcNatnCode:
          title: Nation
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_NATN_CODE, Lookup lineage
            reference object : stvnatn"
          x-lineageReferenceObject: GTVZIPC_NATN_CODE
          x-lineageLookupReferenceObject: stvnatn
        gtvzipcCntyCode:
          title: County
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_CNTY_CODE, Lookup lineage
            reference object : stvcnty"
          x-lineageReferenceObject: GTVZIPC_CNTY_CODE
          x-lineageLookupReferenceObject: stvcnty
        gtvzipcStatCode:
          title: State or Province
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_STAT_CODE, Lookup lineage
            reference object : stvstat"
          x-lineageReferenceObject: GTVZIPC_STAT_CODE
          x-lineageLookupReferenceObject: stvstat
        gtvzipcCode:
          title: ZIP or Postal Code
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_CODE"
          x-lineageReferenceObject: GTVZIPC_CODE
      x-lineageReferenceObject: GTVZIPC_BLOCK
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    zip-postal-codes-1.0.0_qapi_post:
      type: object
      properties:
        gtvzipcCity:
          title: City
          maxLength: 50
          type: string
          description: "Lineage reference object : GTVZIPC_CITY"
          x-lineageReferenceObject: GTVZIPC_CITY
        gtvzipcCntyCode:
          title: County
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_CNTY_CODE, Lookup lineage
            reference object : stvcnty"
          x-lineageReferenceObject: GTVZIPC_CNTY_CODE
          x-lineageLookupReferenceObject: stvcnty
        gtvzipcCode:
          title: ZIP or Postal Code
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_CODE"
          x-lineageReferenceObject: GTVZIPC_CODE
        gtvzipcNatnCode:
          title: Nation
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_NATN_CODE, Lookup lineage
            reference object : stvnatn"
          x-lineageReferenceObject: GTVZIPC_NATN_CODE
          x-lineageLookupReferenceObject: stvnatn
        gtvzipcNeighborhood:
          type: string
        gtvzipcStatCode:
          title: State or Province
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVZIPC_STAT_CODE, Lookup lineage
            reference object : stvstat"
          x-lineageReferenceObject: GTVZIPC_STAT_CODE
          x-lineageLookupReferenceObject: stvstat
        gtvzipcStreet:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
