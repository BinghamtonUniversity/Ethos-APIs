openapi: 3.0.0
info:
  title: sde-lov-maintenance
  description: API for GTVSDLV administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: GTVSDLV
  x-source-domain: Foundation
  x-source-title: SDE Validation Maintenance Form
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/sde-lov-maintenance:
    get:
      tags:
        - sde-lov-maintenance
      summary: Return resources from GTVSDLV
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: tableName
          in: query
          required: true
          schema:
            type: string
        - name: attrName
          in: query
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: Goreqpg Eqpm Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVSDLV_CODE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVSDLV_DESC
        - name: userId
          in: query
          description: Goreqpg User Id
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVSDLV_USER_ID
        - name: activityDate
          in: query
          description: Goreqpg Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVSDLV_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/sde-lov-maintenance-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/sde-lov-maintenance:
    post:
      tags:
        - sde-lov-maintenance QAPI (Query by POST)
      summary: Return resources from GTVSDLV
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/sde-lov-maintenance-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/sde-lov-maintenance-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    sde-lov-maintenance-1.0.0_get_request:
      required:
        - tableName
        - code
      type: object
      properties:
        code:
          title: Goreqpg Eqpm Code
          maxLength: 100
          type: string
          description: "Lineage reference object : GTVSDLV_CODE"
          x-lineageReferenceObject: GTVSDLV_CODE
        activityDate:
          title: Goreqpg Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GTVSDLV_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GTVSDLV_ACTIVITY_DATE
        userId:
          title: Goreqpg User Id
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVSDLV_USER_ID"
          x-lineageReferenceObject: GTVSDLV_USER_ID
        attrName:
          title: SDE Attribute
          maxLength: 30
          type: string
          description: "Lineage reference object : attrName, Lookup lineage reference
            object : gtvsdlv,gorsdam,gtvsdlv"
          x-lineageReferenceObject: attrName
          x-lineageLookupReferenceObject: gtvsdlv,gorsdam,gtvsdlv
        tableName:
          title: SDE Table
          maxLength: 30
          type: string
          description: "Lineage reference object : tableName, Lookup lineage reference
            object : gobsdtb,all_tab_comments,dual"
          x-lineageReferenceObject: tableName
          x-lineageLookupReferenceObject: gobsdtb,all_tab_comments,dual
        desc:
          title: Description
          maxLength: 4000
          type: string
          description: "Lineage reference object : GTVSDLV_DESC"
          x-lineageReferenceObject: GTVSDLV_DESC
      x-lineageReferenceObject: GTVSDLV
    sde-lov-maintenance-1.0.0_get_response:
      required:
        - code
      type: object
      properties:
        activityDate:
          title: Goreqpg Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GTVSDLV_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GTVSDLV_ACTIVITY_DATE
        code:
          title: Goreqpg Eqpm Code
          maxLength: 100
          type: string
          description: "Lineage reference object : GTVSDLV_CODE"
          x-lineageReferenceObject: GTVSDLV_CODE
        userId:
          title: Goreqpg User Id
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVSDLV_USER_ID"
          x-lineageReferenceObject: GTVSDLV_USER_ID
        desc:
          title: Description
          maxLength: 4000
          type: string
          description: "Lineage reference object : GTVSDLV_DESC"
          x-lineageReferenceObject: GTVSDLV_DESC
      x-lineageReferenceObject: gtvsdlv
    sde-lov-maintenance-1.0.0_qapi_post:
      required:
        - tableName
      type: object
      properties:
        tableName:
          type: string
        attrName:
          type: string
        code:
          title: Goreqpg Eqpm Code
          maxLength: 100
          type: string
          description: "Lineage reference object : GTVSDLV_CODE"
          x-lineageReferenceObject: GTVSDLV_CODE
        desc:
          title: Description
          maxLength: 4000
          type: string
          description: "Lineage reference object : GTVSDLV_DESC"
          x-lineageReferenceObject: GTVSDLV_DESC
        userId:
          title: Goreqpg User Id
          maxLength: 30
          type: string
          description: "Lineage reference object : GTVSDLV_USER_ID"
          x-lineageReferenceObject: GTVSDLV_USER_ID
        activityDate:
          title: Goreqpg Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GTVSDLV_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GTVSDLV_ACTIVITY_DATE
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
