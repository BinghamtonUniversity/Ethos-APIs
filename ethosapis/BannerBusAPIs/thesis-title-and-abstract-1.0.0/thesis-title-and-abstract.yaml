openapi: 3.0.0
info:
  title: thesis-title-and-abstract
  description: API for SOAHDRE administrative page
  version: 1.0.0
  x-source-name: SOAHDRE
  x-source-title: Higher Degree Research
  x-source-system: banner
  x-api-type: bus-poc
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/thesis-title-and-abstract:
    get:
      tags:
        - thesis-title-and-abstract
      summary: Return resources from SOAHDRE
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: keyStudypath
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/thesis-title-and-abstract-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - thesis-title-and-abstract
      summary: Updates an existing resource in SOAHDRE
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/thesis-title-and-abstract-1.0.0_put_request"
            example:
              thesisAbstract: This project explores whether a neural network is capable of
                predicting summary statistics of electricity usage for five
                common household appliances given only the aggregate signal of a
                smart meter. These appliance-level statistics are needed for
                many kinds of feedback and analytics provided to energy
                consumers so they can reduce electricity consumption and save on
                energy bills. An example of such a statistic is the total energy
                used by a washing machine in a day. Currently the
                state-of-the-art approach is to use non-intrusive load
                monitoring (NILM) to predict appliance-level signals timepoint
                by-timepoint, and then compute the statistics using these
                predictions.
              thesisTitle: Summarizing electricity usage with a neural network
              id: Q00050587
              keyStudypath: 1
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/thesis-title-and-abstract-1.0.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - thesis-title-and-abstract
      summary: Creates a new resource in SOAHDRE
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/thesis-title-and-abstract-1.0.0_post_request"
            example:
              thesisAbstract: Recent opportunities for new hydropower generation in the United
                States have often been in non-powered dams and run-of-river type
                flows occurring in low-impact natural areas and unregulated
                conduits. At the same time, a changing water resource paradigm
                is challenging some existing generation in drought stricken
                areas where supply reservoirs behind many medium and high head
                units are at historically low levels. The result is a developing
                market space which is potentially best captured by machines
                capable of variable speed operation. Variable speed units have a
                wider range of operating conditions compared to their
                synchronous counterparts and have already proven their
                resilience through a 20+ year history in pumped hydro
                applications. This work develops a control scheme for variable
                speed hydropower units operating to deliver a set-point power
                through flow controlling gates. This control scheme increases
                both the hydrologic operating range of a unit as well as the
                speed of response to grid contingencies under droop and
                automatic generator control. Results from simulation are
                confirmed on hardware.
              thesisTitle: Development and Experimental Hardware Validation of Novel Variable
                Speed Hydropower Control Schemes
              id: Q00050587
              keyStudypath: 1
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/thesis-title-and-abstract-1.0.0_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
