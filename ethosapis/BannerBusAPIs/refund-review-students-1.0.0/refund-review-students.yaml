openapi: 3.0.0
info:
  title: refund-review-students
  description: API for TSARFND administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TSARFND
  x-source-domain: Student
  x-source-title: Refund Review Form - Student
  x-source-system: banner
