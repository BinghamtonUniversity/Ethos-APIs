openapi: 3.0.0
info:
  title: flexible-spending-accounts-rule
  description: API for PTRBFSA administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: PTRBFSA
  x-source-domain: Human Resources
  x-source-title: Flexible Spending Accounts Rules
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/flexible-spending-accounts-rule:
    get:
      tags:
        - flexible-spending-accounts-rule
      summary: Return resources from PTRBFSA
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: bdcaCode
          in: query
          description: Benefit Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRFBEN_BDCA_CODE
        - name: planCode
          in: query
          description: Plan
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRFBEN_PLAN_CODE
        - name: availInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRFBEN_AVAIL_IND
        - name: dednFreq
          in: query
          description: Deduction Frequency
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRFBEN_DEDN_FREQ
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRFBEN_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/flexible-spending-accounts-rule-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/flexible-spending-accounts-rule:
    post:
      tags:
        - flexible-spending-accounts-rule QAPI (Query by POST)
      summary: Return resources from PTRBFSA
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/flexible-spending-accounts-rule-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/flexible-spending-accounts-rule-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    flexible-spending-accounts-rule-1.0.0_qapi_post:
      type: object
      properties:
        bdcaCode:
          title: Benefit Code
          maxLength: 30
          type: string
          description: "Lineage reference object : PTRFBEN_BDCA_CODE"
          x-lineageReferenceObject: PTRFBEN_BDCA_CODE
        planCode:
          title: Plan
          maxLength: 30
          type: string
          description: "Lineage reference object : PTRFBEN_PLAN_CODE"
          x-lineageReferenceObject: PTRFBEN_PLAN_CODE
        availInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : PTRFBEN_AVAIL_IND"
          x-lineageReferenceObject: PTRFBEN_AVAIL_IND
        dednFreq:
          title: Deduction Frequency
          maxLength: 2
          type: number
          description: "Lineage reference object : PTRFBEN_DEDN_FREQ"
          x-lineageReferenceObject: PTRFBEN_DEDN_FREQ
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTRFBEN_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PTRFBEN_ACTIVITY_DATE
    flexible-spending-accounts-rule-1.0.0_get_request:
      required:
        - bdcaCode
        - dednFreq
      type: object
      properties:
        availInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : PTRFBEN_AVAIL_IND"
          x-lineageReferenceObject: PTRFBEN_AVAIL_IND
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTRFBEN_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PTRFBEN_ACTIVITY_DATE
        bdcaCode:
          title: Benefit Code
          maxLength: 30
          type: string
          description: "Lineage reference object : PTRFBEN_BDCA_CODE"
          x-lineageReferenceObject: PTRFBEN_BDCA_CODE
        dednFreq:
          title: Deduction Frequency
          maxLength: 2
          type: number
          description: "Lineage reference object : PTRFBEN_DEDN_FREQ"
          x-lineageReferenceObject: PTRFBEN_DEDN_FREQ
        planCode:
          title: Plan
          maxLength: 30
          type: string
          description: "Lineage reference object : PTRFBEN_PLAN_CODE"
          x-lineageReferenceObject: PTRFBEN_PLAN_CODE
      x-lineageReferenceObject: PTRFBEN
    flexible-spending-accounts-rule-1.0.0_get_response:
      type: object
      properties:
        ptrflex:
          type: array
          items:
            required:
              - newPeriod
            type: object
            properties:
              newPeriod:
                title: Ending Benefit Period
                maxLength: 11
                type: string
                description: "Lineage reference object : PTRFLEX_NEW_PERIOD"
                format: date-time
                x-lineageReferenceObject: PTRFLEX_NEW_PERIOD
              curPeriod:
                title: Current Benefit Period
                maxLength: 11
                type: string
                description: "Lineage reference object : PTRFLEX_CUR_PERIOD"
                format: date-time
                x-lineageReferenceObject: PTRFLEX_CUR_PERIOD
            x-lineageReferenceObject: ptrflex
        ptrfben:
          type: array
          items:
            required:
              - bdcaCode
              - dednFreq
            type: object
            properties:
              availInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : PTRFBEN_AVAIL_IND"
                x-lineageReferenceObject: PTRFBEN_AVAIL_IND
              planDesc:
                title: Description
                type: string
              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : PTRFBEN_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: PTRFBEN_ACTIVITY_DATE
              bdcaCode:
                title: Benefit Code
                maxLength: 30
                type: string
                description: "Lineage reference object : PTRFBEN_BDCA_CODE"
                x-lineageReferenceObject: PTRFBEN_BDCA_CODE
              bdcaDesc:
                title: Description
                type: string
              dednFreq:
                title: Deduction Frequency
                maxLength: 2
                type: number
                description: "Lineage reference object : PTRFBEN_DEDN_FREQ"
                x-lineageReferenceObject: PTRFBEN_DEDN_FREQ
              planCode:
                title: Plan
                maxLength: 30
                type: string
                description: "Lineage reference object : PTRFBEN_PLAN_CODE"
                x-lineageReferenceObject: PTRFBEN_PLAN_CODE
            x-lineageReferenceObject: ptrfben
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
