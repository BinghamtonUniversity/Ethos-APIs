        alternatePellInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVCOMP_ALTERNATE_PELL_IND"
          x-lineageReferenceObject: RTVCOMP_ALTERNATE_PELL_IND
        printSeqNo:
          title: Print Order
          maxLength: 3
