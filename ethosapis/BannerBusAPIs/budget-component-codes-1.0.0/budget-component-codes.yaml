          type: string
          description: "Lineage reference object : RTVCOMP_PELL_LT_HALF_IND"
          x-lineageReferenceObject: RTVCOMP_PELL_LT_HALF_IND
        billableInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVCOMP_BILLABLE_IND"
          x-lineageReferenceObject: RTVCOMP_BILLABLE_IND
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : RTVCOMP_DESC"
          x-lineageReferenceObject: RTVCOMP_DESC
      x-lineageReferenceObject: rtvcomp
