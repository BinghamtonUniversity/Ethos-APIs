        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
  /qapi/entity-name-id-search:
    post:
      tags:
      - entity-name-id-search QAPI (Query by POST)
      summary: Return resources from FTIIDEN
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
