        in: query
        required: false
        schema:
          type: string
      - name: changeInd
        in: query
        required: false
        schema:
          type: string
      - name: ntypCode
        in: query
        description: Name Type
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SPRIDEN_NTYP_CODE
      - name: caseInsensitiveRg
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
