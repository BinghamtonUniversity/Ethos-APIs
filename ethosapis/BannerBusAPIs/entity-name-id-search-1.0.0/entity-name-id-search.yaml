      - name: queryAgency
        in: query
        required: false
        schema:
          type: string
      - name: queryAll
        in: query
        required: false
        schema:
          type: string
      - name: id
        in: query
        description: ID
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SPRIDEN_ID
      - name: surnamePrefix
        in: query
        description: Last Name Prefix
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SPRIDEN_SURNAME_PREFIX
      - name: lastName
        in: query
        description: Last Name
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SPRIDEN_LAST_NAME
      - name: firstName
        in: query
        description: First Name
        required: false
