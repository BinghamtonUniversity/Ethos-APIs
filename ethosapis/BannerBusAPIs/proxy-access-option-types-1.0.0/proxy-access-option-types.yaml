          x-lineageReferenceObject: GTVOTYP_CREATE_USER
        - name: dataType
          in: query
          description: Data Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVOTYP_DATA_TYPE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVOTYP_DESC
        - name: optionDefault
          in: query
          description: Default Value
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVOTYP_OPTION_DEFAULT
        - name: systemLevelCde
          in: query
          description: Option Level
          required: false
