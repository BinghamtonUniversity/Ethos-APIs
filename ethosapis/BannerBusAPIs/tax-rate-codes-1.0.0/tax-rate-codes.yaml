openapi: 3.0.0
info:
  title: tax-rate-codes
  description: API for FTVTRAT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: FTVTRAT
  x-source-domain: Finance
  x-source-title: Tax Rate Code Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/tax-rate-codes:
    get:
      tags:
        - tax-rate-codes
      summary: Return resources from FTVTRAT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: |-
            Tax Rate
            Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVTRAT_CODE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVTRAT_DESC
        - name: effDate
          in: query
          description: |-
            Effective
            Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVTRAT_EFF_DATE
        - name: rate
          in: query
          description: |-
            Tax
            Rate
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVTRAT_RATE
        - name: termDate
          in: query
          description: |-
            Termination
            Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVTRAT_TERM_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/tax-rate-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/tax-rate-codes:
    post:
      tags:
        - tax-rate-codes QAPI (Query by POST)
      summary: Return resources from FTVTRAT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/tax-rate-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/tax-rate-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    tax-rate-codes-1.0.0_get_request:
      type: object
      properties:
        effDate:
          title: |-
            Effective
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVTRAT_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: FTVTRAT_EFF_DATE
        code:
          title: |-
            Tax Rate
            Code
          maxLength: 3
          type: string
          description: "Lineage reference object : FTVTRAT_CODE"
          x-lineageReferenceObject: FTVTRAT_CODE
        rate:
          title: |-
            Tax
            Rate
          maxLength: 8
          type: number
          description: "Lineage reference object : FTVTRAT_RATE"
          x-lineageReferenceObject: FTVTRAT_RATE
        termDate:
          title: |-
            Termination
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVTRAT_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: FTVTRAT_TERM_DATE
        desc:
          title: Description
          maxLength: 35
          type: string
          description: "Lineage reference object : FTVTRAT_DESC"
          x-lineageReferenceObject: FTVTRAT_DESC
      x-lineageReferenceObject: FTVTRAT
    tax-rate-codes-1.0.0_qapi_post:
      type: object
      properties:
        code:
          title: |-
            Tax Rate
            Code
          maxLength: 3
          type: string
          description: "Lineage reference object : FTVTRAT_CODE"
          x-lineageReferenceObject: FTVTRAT_CODE
        desc:
          title: Description
          maxLength: 35
          type: string
          description: "Lineage reference object : FTVTRAT_DESC"
          x-lineageReferenceObject: FTVTRAT_DESC
        effDate:
          title: |-
            Effective
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVTRAT_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: FTVTRAT_EFF_DATE
        rate:
          title: |-
            Tax
            Rate
          maxLength: 8
          type: number
          description: "Lineage reference object : FTVTRAT_RATE"
          x-lineageReferenceObject: FTVTRAT_RATE
        termDate:
          title: |-
            Termination
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVTRAT_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: FTVTRAT_TERM_DATE
    tax-rate-codes-1.0.0_get_response:
      type: object
      properties:
        effDate:
          title: |-
            Effective
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVTRAT_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: FTVTRAT_EFF_DATE
        code:
          title: |-
            Tax Rate
            Code
          maxLength: 3
          type: string
          description: "Lineage reference object : FTVTRAT_CODE"
          x-lineageReferenceObject: FTVTRAT_CODE
        rate:
          title: |-
            Tax
            Rate
          maxLength: 8
          type: number
          description: "Lineage reference object : FTVTRAT_RATE"
          x-lineageReferenceObject: FTVTRAT_RATE
        termDate:
          title: |-
            Termination
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVTRAT_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: FTVTRAT_TERM_DATE
        desc:
          title: Description
          maxLength: 35
          type: string
          description: "Lineage reference object : FTVTRAT_DESC"
          x-lineageReferenceObject: FTVTRAT_DESC
      x-lineageReferenceObject: ftvtrat
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
