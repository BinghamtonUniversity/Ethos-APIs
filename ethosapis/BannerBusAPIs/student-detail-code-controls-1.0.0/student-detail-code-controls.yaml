      tags:
        - student-detail-code-controls
      summary: Return resources from TSADETC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: detailCode
          in: query
          required: false
          schema:
            type: string
        - name: desc
          in: query
          required: false
          schema:
            type: string
        - name: typeInd
          in: query
          required: false
          schema:
            type: string
        - name: dcatCode
          in: query
          required: false
          schema:
            type: string
        - name: priority
          in: query
          required: false
          schema:
            type: string
        - name: refundInd
          in: query
          required: false
          schema:
            type: string
        - name: currCode
          in: query
          required: false
          schema:
            type: string
        - name: dirdInd
          in: query
          required: false
          schema:
            type: string
        - name: refundableInd
          in: query
          required: false
          schema:
            type: string
        - name: receiptInd
          in: query
          required: false
          schema:
            type: string
        - name: detcActiveInd
          in: query
          required: false
          schema:
            type: string
        - name: abdcInd
          in: query
          required: false
          schema:
            type: string
        - name: likeAidyInd
          in: query
          required: false
          schema:
            type: string
        - name: likePeriodInd
          in: query
          required: false
          schema:
            type: string
        - name: likeScpInd
          in: query
          required: false
          schema:
            type: string
        - name: glNosEnterable
          in: query
          required: false
          schema:
            type: string
        - name: paytCode
          in: query
          required: false
          schema:
            type: string
        - name: tivInd
          in: query
          required: false
          schema:
            type: string
        - name: instChgInd
          in: query
          required: false
          schema:
            type: string
        - name: tbbdectNonAllowChgInd
          in: query
          required: false
          schema:
            type: string
        - name: payhistInd
          in: query
          required: false
          schema:
            type: string
        - name: taxProfile
          in: query
          required: false
          schema:
            type: string
        - name: taxMethod
          in: query
          required: false
          schema:
            type: string
        - name: effectiveDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
