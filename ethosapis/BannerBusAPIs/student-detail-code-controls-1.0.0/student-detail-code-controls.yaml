components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: "The detailed actionable error message. "
    student-detail-code-controls-1.0.0_post_response:
      required:
        - dcatCode
        - desc
        - detailCode
        - paytCode
        - priority
        - typeInd
        - detcActiveInd
        - payhistInd
        - tivInd
        - likeAidyInd
        - likePeriodInd
        - abdcInd
        - dirdInd
        - instChgInd
      type: object
      properties:
        detcActiveInd:
          title: Active
          maxLength: 1
          type: string
          description: "DETC_ACTIVE_IND: Active Status Indicator of the Detail Code."
          x-lineageReferenceObject: TBBDETC_DETC_ACTIVE_IND
        payhistInd:
          title: Payment History
          maxLength: 1
          type: string
          description: Display transactions with this detail code in Payment History (Y =
            display, N = do not display).
          x-lineageReferenceObject: TBBDETC_PAYHIST_IND
        tivInd:
          title: Title IV
          maxLength: 1
          type: string
          description: "TITLE IV INDICATOR: This field indicates if the detail code is
            identified as Title IV detail code. Valid value is: (Y)es, Title IV
            detail code, and (N)o.  This is used primarily by the application of
            payment process and Refund Process."
          x-lineageReferenceObject: TBBDETC_TIV_IND
        glNosEnterable:
          title: GL Enterable
          maxLength: 1
          type: string
          description: Can accounting distribution information be overridden for
            miscellaneous transactions on the TFAMISC form.  Values are Y and N.
          x-lineageReferenceObject: TBBDETC_GL_NOS_ENTERABLE
        tbbdectNonAllowChgInd:
          title: Non-Allowable Charge
          maxLength: 1
          type: string
        typeInd:
          title: Type
          maxLength: 1
          type: string
          description: "This field indicates the whether the detail code is a charge or a
            payment.  Valid values are: C - Charge, P - Payment."
          x-lineageReferenceObject: TBBDETC_TYPE_IND
        paytCode:
          title: Pay Type
          maxLength: 1
          type: string
          description: This field indicates the type of payment the detail code
            is.  Default value is N - Non-cash.
          x-lineageReferenceObject: TBBDETC_PAYT_CODE
          x-lineageLookupReferenceObject: ttvpayt
        refundInd:
          title: Refund Code
          maxLength: 30
          type: string
          description: "This field indicates if the detail code is identified as refund
            detail code that will generate an accounts payable transaction in
            the accounting feed.  Valid values are: Y - Generate accounts
            payable transaction, blank - Do not."
          x-lineageReferenceObject: TBBDETC_REFUND_IND
        likeAidyInd:
          title: Like Aid Year
          maxLength: 1
          type: string
          description: "AID YEAR INDICATOR: This field indicates if a detail code can only
            be applied to a transaction in the same aid year.  Valid values:
            (Y)es, apply only to a like aid year, and (N)o; Used primarily for
            financial aid transactions."
          x-lineageReferenceObject: TBBDETC_LIKE_AIDY_IND
        likePeriodInd:
          title: Like Period
          maxLength: 1
          type: string
          description: "LIKE PERIOD INDICATOR: This field indicates if a detail code can
            only be applied to a transaction in the same Financial Aid
            Enrollment Period. Valid values:(Y)es, apply only to a like
            enrollment period, and (N)o; Used for financial aid transactions."
          x-lineageReferenceObject: TBBDETC_LIKE_PERIOD_IND
        priority:
          title: Priority
          maxLength: 3
          type: string
          description: This field indicates the priority of the detail code for use in the
            application of payments process.
          x-lineageReferenceObject: TBBDETC_PRIORITY
        detailCode:
          title: Detail Code
          maxLength: 4
          type: string
          description: This field identifies the detail code associated with every charge
            and payment that can be entered onto an account.
          x-lineageReferenceObject: TBBDETC_DETAIL_CODE
        receiptInd:
          title: Receipt
          maxLength: 1
          type: string
          description: "This field indicates if a receipt number should be automatically
            generated when the detail code is entered on an account.  Valid
            values are: Y - Yes, generate a receipt, blank - No receipt number."
          x-lineageReferenceObject: TBBDETC_RECEIPT_IND
        dcatCode:
          title: Category
          maxLength: 3
          type: string
          description: This field identifies the catagory of the detail code.  Detail
            codes can be group for reporting purposes into catagories like cash,
            tuition, etc.
          x-lineageReferenceObject: TBBDETC_DCAT_CODE
          x-lineageLookupReferenceObject: ttvdcat
        abdcInd:
          title: Aid Year Based
          maxLength: 1
          type: string
          description: "AID YEAR BASED INDICATOR: Indicates whether a detail code is
            associated with an aid year-based designator (Y/N)."
          x-lineageReferenceObject: TBBDETC_ABDC_IND
        dirdInd:
          title: Direct Deposit
          maxLength: 1
          type: string
          description: "DIRECT DEPOSIT REFUND INDICATOR: Indicator used to determine
            whether refund code is to be processed through direct deposit
            payment, (Y)es and (N)o."
          x-lineageReferenceObject: TBBDETC_DIRD_IND
        refundableInd:
          title: Refundable
          maxLength: 1
          type: string
          description: "Refundable Indicator: Y to include credit amount in refund process
            (TFRRFND/TSRRFND) and to include in Location Management refund
            calculations; null if not selected."
          x-lineageReferenceObject: TBBDETC_REFUNDABLE_IND
        instChgInd:
          title: Institutional Charges
          maxLength: 1
          type: string
          description: "INSTITUTION CHARGE INDICATOR: This field indicates if the detail
            code is identified as Institutional Charges detail code. Valid value
            is: (Y)es, Institutional charge detail code, and (N)o. This is used
            by the application of payment process"
          x-lineageReferenceObject: TBBDETC_INST_CHG_IND
        effectiveDate:
          title: Default Effective Date
          maxLength: 11
          type: string
          description: This field specifies the default effective date associated with the
            detail code.
          format: date-time
          x-lineageReferenceObject: TBBDETC_EFFECTIVE_DATE
        desc:
          title: Detail Code Description
          maxLength: 30
          type: string
          description: This field specifies a free-format description of the detail code.
          x-lineageReferenceObject: TBBDETC_DESC
      x-lineageReferenceObject: tbbdetc
