      tags:
        - student-detail-code-controls
      summary: Creates a new resource in TSADETC
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/student-detail-code-controls-1.0.0_post_request"
            example:
              typeInd: C
              paytCode: C
              detcActiveInd: Y
              refundInd: Y
              payhistInd: N
