          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGRACMO_INT_MOB_CDE
        - name: natnCode
          in: query
          description: Country of International Academic Mobility
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGRACMO_NATN_CODE
