            schema:
              $ref: "#/components/schemas/account-detail-additional-texts-1.0.0_post_request"
            example:
              lastText: Additional Text Line 2
              holdPassword: '*'
              tranNumber: "1"
              id: A00022293
              TBRACDT:
              - text: Additional Text Line 3
              - text: Additional Text Line 4
