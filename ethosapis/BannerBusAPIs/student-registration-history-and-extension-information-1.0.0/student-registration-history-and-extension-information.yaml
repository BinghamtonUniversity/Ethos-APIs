        required: false
        schema:
          type: string
        x-lineageReferenceObject: SFVRHST_SUBJ_CODE
      - name: crseNumb
        in: query
        description: Course
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SFVRHST_CRSE_NUMB
      - name: levlCode
        in: query
        description: Level
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SFVRHST_LEVL_CODE
      - name: rstsCode
        in: query
