openapi: 3.0.0
info:
  title: finance-additional-information
  description: API for FOAIDEN administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FOAIDEN
  x-source-domain: Finance
  x-source-title: Person Identification Form - Finance
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/finance-additional-information:
    get:
      tags:
        - finance-additional-information
      summary: Return resources from FOAIDEN
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/finance-additional-information-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - finance-additional-information
      summary: Updates an existing resource in FOAIDEN
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/finance-additional-information-1.0.0_put_request"
            example:
              additionalId: Sample Data
              adidCode: BLL
              criteria.adidCode: 1010
              id: 20
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/finance-additional-information-1.0.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/finance-additional-information:
    post:
      tags:
        - finance-additional-information QAPI (Query by POST)
      summary: Return resources from FOAIDEN
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/finance-additional-information-1.0.0_get_request"
            example:
              id: 20
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/finance-additional-information-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    finance-additional-information-1.0.0_get_request:
      type: object
      properties:
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: KEY_BLOCK
    finance-additional-information-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    finance-additional-information-1.0.0_put_request:
      type: object
      properties:
        additionalId:
          title: Additional Identification
          maxLength: 50
          type: string
          description: "Lineage reference object : GORADID_ADDITIONAL_ID"
          x-lineageReferenceObject: GORADID_ADDITIONAL_ID
        criteria.userId:
          title: User
          maxLength: 30
          type: string
          description: "Lineage reference object : GORADID_USER_ID"
          x-lineageReferenceObject: GORADID_USER_ID
        criteria.activityDate:
          title: Activity Date
          maxLength: 26
          type: string
          description: "Lineage reference object : GORADID_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GORADID_ACTIVITY_DATE
        criteria.additionalId:
          title: Additional Identification
          maxLength: 50
          type: string
          description: "Lineage reference object : GORADID_ADDITIONAL_ID"
          x-lineageReferenceObject: GORADID_ADDITIONAL_ID
        adidCode:
          title: ID Type
          maxLength: 4
          type: string
          description: "Lineage reference object : GORADID_ADID_CODE, Lookup lineage
            reference object : gtvadid"
          x-lineageReferenceObject: GORADID_ADID_CODE
          x-lineageLookupReferenceObject: gtvadid
        criteria.adidCode:
          title: ID Type
          maxLength: 4
          type: string
          description: "Lineage reference object : GORADID_ADID_CODE, Lookup lineage
            reference object : gtvadid"
          x-lineageReferenceObject: GORADID_ADID_CODE
          x-lineageLookupReferenceObject: gtvadid
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: GORADID
    finance-additional-information-1.0.0_get_response:
      type: object
      properties:
        adidDesc:
          title: ID Type Description
          type: string
        additionalId:
          title: Additional Identification
          maxLength: 50
          type: string
          description: "Lineage reference object : GORADID_ADDITIONAL_ID"
          x-lineageReferenceObject: GORADID_ADDITIONAL_ID
        activityDate:
          title: Activity Date
          maxLength: 26
          type: string
          description: "Lineage reference object : GORADID_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GORADID_ACTIVITY_DATE
        adidCode:
          title: ID Type
          maxLength: 4
          type: string
          description: "Lineage reference object : GORADID_ADID_CODE, Lookup lineage
            reference object : gtvadid"
          x-lineageReferenceObject: GORADID_ADID_CODE
          x-lineageLookupReferenceObject: gtvadid
        userId:
          title: User
          maxLength: 30
          type: string
          description: "Lineage reference object : GORADID_USER_ID"
          x-lineageReferenceObject: GORADID_USER_ID
      x-lineageReferenceObject: goradid
    finance-additional-information-1.0.0_put_response:
      type: object
      properties:
        adidDesc:
          title: ID Type Description
          type: string
        additionalId:
          title: Additional Identification
          maxLength: 50
          type: string
          description: "Lineage reference object : GORADID_ADDITIONAL_ID"
          x-lineageReferenceObject: GORADID_ADDITIONAL_ID
        activityDate:
          title: Activity Date
          maxLength: 26
          type: string
          description: "Lineage reference object : GORADID_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GORADID_ACTIVITY_DATE
        adidCode:
          title: ID Type
          maxLength: 4
          type: string
          description: "Lineage reference object : GORADID_ADID_CODE, Lookup lineage
            reference object : gtvadid"
          x-lineageReferenceObject: GORADID_ADID_CODE
          x-lineageLookupReferenceObject: gtvadid
        userId:
          title: User
          maxLength: 30
          type: string
          description: "Lineage reference object : GORADID_USER_ID"
          x-lineageReferenceObject: GORADID_USER_ID
      x-lineageReferenceObject: goradid
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
