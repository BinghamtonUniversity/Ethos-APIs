openapi: 3.0.0
info:
  title: preference-details
  description: API for SKAENRL administrative page
  version: 1.0.0
  x-source-name: SKAENRL
  x-source-title: Student Statistical Details
  x-source-system: banner
  x-api-type: bus-poc
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/preference-details:
    get:
      tags:
        - preference-details
      summary: Return resources from SKAENRL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: termCodeEntry
          in: query
          description: Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACPF_TERM_CODE_ENTRY
        - name: applNo
          in: query
          description: Application Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACPF_APPL_NO
        - name: prefOrdinalPosition
          in: query
          description: Preference Position
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACPF_PREF_ORDINAL_POSITION
        - name: intakeYear
          in: query
          description: Intake Year
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACPF_INTAKE_YEAR
        - name: intakeMonth
          in: query
          description: Intake Month
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACPF_INTAKE_MONTH
        - name: sectorCde
          in: query
          description: Sector
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACPF_SECTOR_CDE
        - name: modeAttendanceCde
          in: query
          description: Mode of Attendance
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACPF_MODE_ATTENDANCE_CDE
        - name: campusZip
          in: query
          description: Campus Postcode
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACPF_CAMPUS_ZIP
        - name: courseFoeCde
          in: query
          description: Field of Education
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACPF_COURSE_FOE_CDE
        - name: courseFoeSuppCde
          in: query
          description: Supplementary Field of Education
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACPF_COURSE_FOE_SUPP_CDE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
