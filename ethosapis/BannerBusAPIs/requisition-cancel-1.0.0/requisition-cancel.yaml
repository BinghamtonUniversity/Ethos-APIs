openapi: 3.0.0
info:
  title: requisition-cancel
  description: API for FPARDEL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FPARDEL
  x-source-domain: Finance
  x-source-title: Requisition Cancel
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/requisition-cancel:
    get:
      tags:
        - requisition-cancel
      summary: Return resources from FPARDEL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: displayRqstCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/requisition-cancel-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/requisition-cancel:
    post:
      tags:
        - requisition-cancel QAPI (Query by POST)
      summary: Return resources from FPARDEL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/requisition-cancel-1.0.0_get_request"
            example:
              displayRqstCode: WIND4
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/requisition-cancel-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    requisition-cancel-1.0.0_get_response:
      type: object
      properties:
        hdr_block:
          type: array
          items:
            type: object
            properties:
              fpbreqhReqdDate:
                title: Delivery Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FPBREQH_REQD_DATE"
                format: date-time
                x-lineageReferenceObject: FPBREQH_REQD_DATE
              displayNetAmt:
                title: Net Amount
                maxLength: 25
                type: number
              displayAddlChrgAmt:
                title: Additional Charges
                maxLength: 25
                type: number
              fpbreqhTransDate:
                title: Transaction Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FPBREQH_TRANS_DATE"
                format: date-time
                x-lineageReferenceObject: FPBREQH_TRANS_DATE
              displayVendName:
                maxLength: 230
                type: string
              displayDocAmt:
                title: Extended Amount
                maxLength: 25
                type: number
              displayTaxAmt:
                title: Tax Amount
                maxLength: 25
                type: number
              displayVendCode:
                title: Vendor
                maxLength: 9
                type: string
                description: "Lookup lineage reference object : ftvvend"
                x-lineageLookupReferenceObject: ftvvend
              fpbreqhRqstTypeInd:
                title: Request Type
                maxLength: 1
                type: string
                description: "Lineage reference object : FPBREQH_RQST_TYPE_IND"
                x-lineageReferenceObject: FPBREQH_RQST_TYPE_IND
              fpbreqhOriginCode:
                title: Origin
                maxLength: 26
                type: string
                description: "Lineage reference object : FPBREQH_ORIGIN_CODE"
                x-lineageReferenceObject: FPBREQH_ORIGIN_CODE
              fpbreqhReqhDate:
                title: Request Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FPBREQH_REQH_DATE"
                format: date-time
                x-lineageReferenceObject: FPBREQH_REQH_DATE
              displayDiscAmt:
                title: Discount Amount
                maxLength: 25
                type: number
              displayNsfOnOffInd:
                title: NSF Checking
                maxLength: 1
                type: string
            x-lineageReferenceObject: hdr_block
        level_block:
          type: array
          items:
            type: object
            properties:
              displayActgCount:
                title: Accounting
                maxLength: 3
                type: number
                description: "Lineage reference object : displayActgCount"
                x-lineageReferenceObject: displayActgCount
              displayCommCount:
                title: Commodity
                maxLength: 3
                type: number
                description: "Lineage reference object : displayCommCount"
                x-lineageReferenceObject: displayCommCount
              cancelCrsnCode:
                title: Reason Code
                maxLength: 4
                type: string
                description: "Lineage reference object : cancelCrsnCode, Lookup lineage
                  reference object : ftvcrsn"
                x-lineageReferenceObject: cancelCrsnCode
                x-lineageLookupReferenceObject: ftvcrsn
              displayCancelDate:
                title: Cancel Date Detail
                maxLength: 11
                type: string
                description: "Lineage reference object : displayCancelDate"
                format: date-time
                x-lineageReferenceObject: displayCancelDate
              cancelCrsnDesc:
                type: string
                description: "Lineage reference object : cancelCrsnDesc"
                x-lineageReferenceObject: cancelCrsnDesc
            x-lineageReferenceObject: level_block
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    requisition-cancel-1.0.0_get_request:
      type: object
      properties:
        displayRqstCode:
          title: Request Code
          maxLength: 8
          type: string
          description: "Lineage reference object : displayRqstCode"
          x-lineageReferenceObject: displayRqstCode
      x-lineageReferenceObject: KEY_BLOCK
    requisition-cancel-1.0.0_qapi_post:
      type: object
      properties:
        displayRqstCode:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
