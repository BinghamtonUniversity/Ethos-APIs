openapi: 3.0.0
info:
  title: requirements-tracking-statuses
  description: API for RTVTRST administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: RTVTRST
  x-source-domain: Financial Aid
  x-source-title: Requirements Tracking Status Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/requirements-tracking-statuses:
    get:
      tags:
        - requirements-tracking-statuses
      summary: Return resources from RTVTRST
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVTRST_ACTIVITY_DATE
        - name: code
          in: query
          description: Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVTRST_CODE
        - name: desc
          in: query
          description: Short Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVTRST_DESC
        - name: infoAccessInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVTRST_INFO_ACCESS_IND
        - name: longDesc
          in: query
          description: Long Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVTRST_LONG_DESC
        - name: reqInstrInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVTRST_REQ_INSTR_IND
        - name: satInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVTRST_SAT_IND
        - name: trkLtrInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVTRST_TRK_LTR_IND
        - name: vrMsgNo
          in: query
          description: Reference Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVTRST_VR_MSG_NO
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/requirements-tracking-statuses-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/requirements-tracking-statuses:
    post:
      tags:
        - requirements-tracking-statuses QAPI (Query by POST)
      summary: Return resources from RTVTRST
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/requirements-tracking-statuses-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/requirements-tracking-statuses-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
