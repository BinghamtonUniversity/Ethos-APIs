    errors-2.0.0:
      required:
      - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for
                  the primary data entity used to create the resource. This is useful
                  for referencing the source item through the applications administrative
                  user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: 'The detailed actionable error message. '
    population-selection-base-description-1.0.0_post_response:
      type: object
      properties:
        typeInd:
          title: Manual
          maxLength: 1
          type: string
          nullable: true
          enum:
          - "M"
          description: "Indicates if all joins must be entered manually in the Rules section."
          x-lineageReferenceObject: GLBSLCT_TYPE_IND
        applRulesExistInd:
          title: Application Level Rules Exist
          maxLength: 1
          type: string
          description: "Indicates whether application-level rules exist and will be added to the displayed rules upon compilation."
        deleteInd:
          title: Delete
          maxLength: 1
          type: string
          description: "Indicates if the population selection is marked for deletion."
        lockInd:
          title: Locked
          maxLength: 1
          type: string
          enum:
          - "Y"
          - "N"
          description: "Locks the population selection except for the following users: the user that created the population selection, users that have been granted access on the Population Selection Access Control (GLRPACC) page, or users that have the BAN_POPSEL_SUPER security object assigned."
          x-lineageReferenceObject: GLBSLCT_LOCK_IND
        desc:
          maxLength: 30
          type: string
          description: "Brief description that accurately describes the population selection."
          x-lineageReferenceObject: GLBSLCT_DESC
      x-lineageReferenceObject: glbslct
