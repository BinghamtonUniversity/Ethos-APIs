components:
  schemas:
    population-selection-base-description-1.0.0_delete_request:
      type: object
      properties:
        keyblckApplication:
          title: Application
          maxLength: 30
          type: string
          description: "Functional area that controls the population selection. Any application-level rules are automatically compiled into the population selection rules."
