openapi: 3.0.0
info:
  title: budget-availability-status
  description: API for FGIBAVL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FGIBAVL
  x-source-domain: Finance
  x-source-title: Budget Availability Status
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/budget-availability-status:
    get:
      tags:
        - budget-availability-status
      summary: Return resources from FGIBAVL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblocCoasCode
          in: query
          required: true
          schema:
            type: string
        - name: keyblocFsyrCode
          in: query
          required: true
          schema:
            type: string
        - name: keyblocAcciCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocCmtType
          in: query
          required: false
          schema:
            type: string
        - name: keyblocFundCode
          in: query
          required: true
          schema:
            type: string
        - name: keyblocOrgnCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocAcctCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocProgCode
          in: query
          required: false
          schema:
            type: string
        - name: acctCode
          in: query
          description: Account
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVACCT_ACCT_CODE
        - name: pendingDocBako
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/budget-availability-status-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/budget-availability-status:
    post:
      tags:
        - budget-availability-status QAPI (Query by POST)
      summary: Return resources from FGIBAVL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/budget-availability-status-1.0.0_get_request"
            example:
              keyblocOrgnCode: 11001
              keyblocCoasCode: B
              keyblocCmtType: Both
              keyblocProgCode: 100
              keyblocFundCode: 1
              keyblocFsyrCode: 22
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/budget-availability-status-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    budget-availability-status-1.0.0_qapi_post:
      required:
        - keyblocCoasCode
        - keyblocFsyrCode
        - keyblocFundCode
      type: object
      properties:
        keyblocCoasCode:
          type: string
        keyblocFsyrCode:
          type: string
        keyblocAcciCode:
          type: string
        keyblocCmtType:
          type: string
        keyblocFundCode:
          type: string
        keyblocOrgnCode:
          type: string
        keyblocAcctCode:
          type: string
        keyblocProgCode:
          type: string
        acctCode:
          title: Account
          maxLength: 6
          type: string
          description: "Lineage reference object : FTVACCT_ACCT_CODE"
          x-lineageReferenceObject: FTVACCT_ACCT_CODE
        pendingDocBako:
          maxLength: 1
          type: string
    budget-availability-status-1.0.0_get_response:
      type: object
      properties:
        displaySumRsvr:
          title: Commitments
          maxLength: 31
          type: number
        displayAvailBal:
          title: Available Balance
          maxLength: 25
          type: number
        displaySumAdjt:
          title: Adjusted Budget
          maxLength: 31
          type: number
        displayAcctTitle:
          title: Title
          maxLength: 35
          type: string
        acctCode:
          title: Account
          maxLength: 6
          type: string
          description: "Lineage reference object : FTVACCT_ACCT_CODE"
          x-lineageReferenceObject: FTVACCT_ACCT_CODE
        pendingDocBako:
          maxLength: 1
          type: string
        displaySumYtdActv:
          title: YTD Activity
          maxLength: 31
          type: number
      x-lineageReferenceObject: ftvacct
    budget-availability-status-1.0.0_get_request:
      required:
        - keyblocCoasCode
        - keyblocFsyrCode
      type: object
      properties:
        keyblocOrgnCode:
          title: Organization
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocOrgnCode"
          x-lineageReferenceObject: keyblocOrgnCode
        keyblocCoasCode:
          title: Chart
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocCoasCode, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: keyblocCoasCode
          x-lineageLookupReferenceObject: ftvcoas
        keyblocCmtType:
          title: Commit Type
          maxLength: 1
          type: string
          description: "Lineage reference object : keyblocCmtType"
          x-lineageReferenceObject: keyblocCmtType
        keyblocAcctCode:
          title: Account
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocAcctCode"
          x-lineageReferenceObject: keyblocAcctCode
        keyblocProgCode:
          title: Program
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocProgCode"
          x-lineageReferenceObject: keyblocProgCode
        acctCode:
          title: Account
          maxLength: 6
          type: string
          description: "Lineage reference object : FTVACCT_ACCT_CODE"
          x-lineageReferenceObject: FTVACCT_ACCT_CODE
        pendingDocBako:
          maxLength: 1
          type: string
        keyblocAcciCode:
          title: Index
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocAcciCode, Lookup lineage
            reference object : ftvacci"
          x-lineageReferenceObject: keyblocAcciCode
          x-lineageLookupReferenceObject: ftvacci
        keyblocFundCode:
          title: Fund
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocFundCode"
          x-lineageReferenceObject: keyblocFundCode
        keyblocFsyrCode:
          title: Fiscal Year
          maxLength: 2
          type: string
          description: "Lineage reference object : keyblocFsyrCode, Lookup lineage
            reference object : ftvfspd,ftvfsyr,ftvfspd"
          x-lineageReferenceObject: keyblocFsyrCode
          x-lineageLookupReferenceObject: ftvfspd,ftvfsyr,ftvfspd
      x-lineageReferenceObject: FTVACCT
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
