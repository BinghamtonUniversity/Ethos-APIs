openapi: 3.0.0
info:
  title: finance-account-reviews
  description: API for TFAACCT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TFAACCT
  x-source-domain: Finance
  x-source-title: Account Review Form - Finance
  x-source-system: banner
