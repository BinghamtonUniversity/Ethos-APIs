        - name: asrcCode
          in: query
          description: Source
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PABAPPL_ASRC_CODE
        - name: desiredHourly
          in: query
          description: Desired Hourly Rate
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PABAPPL_DESIRED_HOURLY
        - name: fullPartInd
          in: query
          description: Full or Part Preference
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PABAPPL_FULL_PART_IND
        - name: activityDate
          in: query
