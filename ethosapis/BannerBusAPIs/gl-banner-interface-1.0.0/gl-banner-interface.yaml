openapi: 3.0.0
info:
  title: gl-banner-interface
  description: API for TFADETC administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: TFADETC
  x-source-domain: Finance
  x-source-title: Detail Code Control Form - Finance
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/gl-banner-interface:
    get:
      tags:
        - gl-banner-interface
      summary: Return resources from TFADETC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: detailCode
          in: query
          required: false
          schema:
            type: string
        - name: desc
          in: query
          required: false
          schema:
            type: string
        - name: typeInd
          in: query
          required: false
          schema:
            type: string
        - name: dcatCode
          in: query
          required: false
          schema:
            type: string
        - name: detailCodeInd
          in: query
          required: false
          schema:
            type: string
        - name: priority
          in: query
          required: false
          schema:
            type: string
        - name: refundInd
          in: query
          required: false
          schema:
            type: string
        - name: currCode
          in: query
          required: false
          schema:
            type: string
        - name: dirdInd
          in: query
          required: false
          schema:
            type: string
        - name: refundableInd
          in: query
          required: false
          schema:
            type: string
        - name: receiptInd
          in: query
          required: false
          schema:
            type: string
        - name: payhistInd
          in: query
          required: false
          schema:
            type: string
        - name: glNosEnterable
          in: query
          required: false
          schema:
            type: string
        - name: detcActiveInd
          in: query
          required: false
          schema:
            type: string
        - name: paytCode
          in: query
          required: false
          schema:
            type: string
        - name: taxtCode
          in: query
          required: false
          schema:
            type: string
        - name: taxProfile
          in: query
          required: false
          schema:
            type: string
        - name: taxMethod
          in: query
          required: false
          schema:
            type: string
        - name: amount
          in: query
          required: false
          schema:
            type: string
        - name: effectiveDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/gl-banner-interface-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/gl-banner-interface:
    post:
      tags:
        - gl-banner-interface QAPI (Query by POST)
      summary: Return resources from TFADETC
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/gl-banner-interface-1.0.0_qapi_post_request"
            example:
              amount: "100.0"
              typeInd: C
              paytCode: E
              detcActiveInd: N
              refundInd: M
              payhistInd: Y
              priority: "999"
              detailCode: "0001"
              receiptInd: N
              dcatCode: BIL
              dirdInd: N
              refundableInd: Y
              glNosEnterable: N
              taxtCode: N
              effectiveDate: 2023-09-30
              desc: TUITION
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/gl-banner-interface-1.0.0_qapi_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    gl-banner-interface-1.0.0_get_response:
      required:
        - tbbeactDetailCode
        - tbbeactEffDate
      type: object
      properties:
        tbbeactDetailCode:
          title: Detail Code
          maxLength: 6
          type: string
          description: "Lineage reference object : TBBEACT_DETAIL_CODE"
          x-lineageReferenceObject: TBBEACT_DETAIL_CODE
        tbbeactEffDate:
          title: Effective Date
          maxLength: 26
          type: string
          description: "Lineage reference object : TBBEACT_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: TBBEACT_EFF_DATE
        displayNchgDate:
          title: Next Change Date
          maxLength: 11
          type: string
          format: date-time
        tbbeactDetailDesc:
          maxLength: 30
          type: string
      x-lineageReferenceObject: tbbeact2
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: "The detailed actionable error message. "
    gl-banner-interface-1.0.0_qapi_post_request:
      required:
        - detailCode
        - desc
        - typeInd
        - dcatCode
        - priority
        - paytCode
      type: object
      properties:
        amount:
          title: Default Amount
          maxLength: 10
          type: number
          description: "Lineage reference object : TBBDETC_AMOUNT"
          x-lineageReferenceObject: TBBDETC_AMOUNT
        typeInd:
          title: Type
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBDETC_TYPE_IND"
          x-lineageReferenceObject: TBBDETC_TYPE_IND
        currCode:
          maxLength: 30
          type: string
          description: "Lookup lineage reference object : gtvcurr"
          x-lineageLookupReferenceObject: gtvcurr
        detailCodeInd:
          title: Grant Type
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBDETC_DETAIL_CODE_IND"
          x-lineageReferenceObject: TBBDETC_DETAIL_CODE_IND
        paytCode:
          title: Pay Type
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBDETC_PAYT_CODE, Lookup lineage
            reference object : ttvpayt"
          x-lineageReferenceObject: TBBDETC_PAYT_CODE
          x-lineageLookupReferenceObject: ttvpayt
        taxMethod:
          maxLength: 1
          type: string
        detcActiveInd:
          title: Active
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBDETC_DETC_ACTIVE_IND"
          x-lineageReferenceObject: TBBDETC_DETC_ACTIVE_IND
        refundInd:
          title: Refund Code
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBDETC_REFUND_IND"
          x-lineageReferenceObject: TBBDETC_REFUND_IND
        payhistInd:
          title: Payment History
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBDETC_PAYHIST_IND"
          x-lineageReferenceObject: TBBDETC_PAYHIST_IND
        priority:
          title: Priority
          maxLength: 3
          type: string
          description: "Lineage reference object : TBBDETC_PRIORITY"
          x-lineageReferenceObject: TBBDETC_PRIORITY
        detailCode:
          title: Detail Code
          maxLength: 4
          type: string
          description: "Lineage reference object : TBBDETC_DETAIL_CODE"
          x-lineageReferenceObject: TBBDETC_DETAIL_CODE
        receiptInd:
          title: Receipt
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBDETC_RECEIPT_IND"
          x-lineageReferenceObject: TBBDETC_RECEIPT_IND
        taxProfile:
          type: string
        dcatCode:
          title: Category
          maxLength: 3
          type: string
          description: "Lineage reference object : TBBDETC_DCAT_CODE, Lookup lineage
            reference object : ttvdcat"
          x-lineageReferenceObject: TBBDETC_DCAT_CODE
          x-lineageLookupReferenceObject: ttvdcat
        dirdInd:
          title: Direct Deposit
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBDETC_DIRD_IND"
          x-lineageReferenceObject: TBBDETC_DIRD_IND
        refundableInd:
          title: Refundable
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBDETC_REFUNDABLE_IND"
          x-lineageReferenceObject: TBBDETC_REFUNDABLE_IND
        glNosEnterable:
          title: GL Enterable
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBDETC_GL_NOS_ENTERABLE"
          x-lineageReferenceObject: TBBDETC_GL_NOS_ENTERABLE
        taxtCode:
          title: Tax Type
          maxLength: 2
          type: string
          description: "Lineage reference object : TBBDETC_TAXT_CODE, Lookup lineage
            reference object : ttvtaxt"
          x-lineageReferenceObject: TBBDETC_TAXT_CODE
          x-lineageLookupReferenceObject: ttvtaxt
        effectiveDate:
          title: Default Effective Date
          maxLength: 11
          type: string
          description: "Lineage reference object : TBBDETC_EFFECTIVE_DATE"
          format: date-time
          x-lineageReferenceObject: TBBDETC_EFFECTIVE_DATE
        desc:
          title: Detail Code Description
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBDETC_DESC"
          x-lineageReferenceObject: TBBDETC_DESC
      x-lineageReferenceObject: TBBDETC
    gl-banner-interface-1.0.0_qapi_post_response:
      required:
        - tbbeactDetailCode
        - tbbeactEffDate
      type: object
      properties:
        tbbeactDetailCode:
          title: Detail Code
          maxLength: 6
          type: string
          description: "Lineage reference object : TBBEACT_DETAIL_CODE"
          x-lineageReferenceObject: TBBEACT_DETAIL_CODE
        tbbeactEffDate:
          title: Effective Date
          maxLength: 26
          type: string
          description: "Lineage reference object : TBBEACT_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: TBBEACT_EFF_DATE
        displayNchgDate:
          title: Next Change Date
          maxLength: 11
          type: string
          format: date-time
        tbbeactDetailDesc:
          maxLength: 30
          type: string
      x-lineageReferenceObject: tbbeact2
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
