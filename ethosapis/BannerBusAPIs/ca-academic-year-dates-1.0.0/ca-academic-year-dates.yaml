openapi: 3.0.0
info:
  title: ca-academic-year-dates
  description: API for SVAACYR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SVAACYR
  x-source-domain: Student
  x-source-title: Academic Year Dates Form (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-academic-year-dates:
    get:
      tags:
        - ca-academic-year-dates
      summary: Return resources from SVAACYR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: acyrCode
          in: query
          description: Academic Year Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SVBACYR_ACYR_CODE
        - name: acyrDesc
          in: query
          description: Description
          required: false
          schema:
            type: string
        - name: leadInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SVBACYR_LEAD_IND
        - name: endYear
          in: query
          description: Academic Year Ending
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SVBACYR_END_YEAR
        - name: startDate
          in: query
          description: Start Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SVBACYR_START_DATE
        - name: endDate
          in: query
          description: End Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SVBACYR_END_DATE
        - name: endP1Date
          in: query
          description: End Period 1
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SVBACYR_END_P1_DATE
        - name: endP2Date
          in: query
          description: End Period 2
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SVBACYR_END_P2_DATE
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SVBACYR_ACTIVITY_DATE
        - name: userId
          in: query
          description: User ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SVBACYR_USER_ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-academic-year-dates-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-academic-year-dates:
    post:
      tags:
        - ca-academic-year-dates QAPI (Query by POST)
      summary: Return resources from SVAACYR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-academic-year-dates-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-academic-year-dates-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
