          x-lineageLookupReferenceObject: tbbdetc
        percent:
          title: Percent
          maxLength: 3
          type: number
          description: "Lineage reference object : TBREDET_PERCENT"
          x-lineageReferenceObject: TBREDET_PERCENT
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBEXPT_DESC"
          x-lineageReferenceObject: TBBEXPT_DESC
      x-lineageReferenceObject: TBREDET
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    exemption-authorization-detail-code-level-authorization-1.0.0_get_response:
      type: object
      properties:
        tbbexpt:
          type: array
          items:
            required:
              - desc
              - detailCode
            type: object
            properties:
              detailDesc:
                type: string
              studentExptRollInd:
                title: Roll Students
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBEXPT_STUDENT_EXPT_ROLL_IND"
