              detailCode:
                title: Detail Payment Code
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBEXPT_DETAIL_CODE, Lookup lineage
                  reference object : tbbdetc"
                x-lineageReferenceObject: TBBEXPT_DETAIL_CODE
                x-lineageLookupReferenceObject: tbbdetc
              desc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBEXPT_DESC"
                x-lineageReferenceObject: TBBEXPT_DESC
            x-lineageReferenceObject: tbbexpt
        tbredet:
          type: array
          items:
            required:
              - detailCode
              - detailPriority
              - iESourceInd
              - percent
            type: object
            properties:
              minAmount:
                title: Minimum Amount
                maxLength: 9
                type: number
                description: "Lineage reference object : TBREDET_MIN_AMOUNT"
                x-lineageReferenceObject: TBREDET_MIN_AMOUNT
              tbbdetcDesc:
                title: Description
                type: string
              iESourceInd:
                title: Source Indicator
                maxLength: 1
                type: string
                description: "Lineage reference object : TBREDET_I_E_SOURCE_IND"
                x-lineageReferenceObject: TBREDET_I_E_SOURCE_IND
              detailPriority:
                title: Priority
                maxLength: 3
                type: number
                description: "Lineage reference object : TBREDET_DETAIL_PRIORITY"
                x-lineageReferenceObject: TBREDET_DETAIL_PRIORITY
              maxAmount:
                title: Maximum Amount
                maxLength: 9
                type: number
                description: "Lineage reference object : TBREDET_MAX_AMOUNT"
                x-lineageReferenceObject: TBREDET_MAX_AMOUNT
              detailCode:
                title: Detail Code
                maxLength: 30
                type: string
                description: "Lineage reference object : TBREDET_DETAIL_CODE, Lookup lineage
                  reference object : tbbdetc"
                x-lineageReferenceObject: TBREDET_DETAIL_CODE
                x-lineageLookupReferenceObject: tbbdetc
              percent:
                title: Percent
                maxLength: 3
                type: number
                description: "Lineage reference object : TBREDET_PERCENT"
                x-lineageReferenceObject: TBREDET_PERCENT
            x-lineageReferenceObject: tbredet
        tbredsi:
          type: array
          items:
            required:
              - sourceCode
            type: object
            properties:
              sourceCode:
                title: Source
                maxLength: 30
                type: string
                description: "This field contains the source code which will be paid by the exemption."
                x-lineageReferenceObject: TBREDSI_SOURCE_CODE
            x-lineageReferenceObject: tbredsi
    exemption-authorization-detail-code-level-authorization-1.0.0_post_response:
      type: object
      properties:
        tbrcdet:
          type: array
          items:
            required:
            - detailCode
            - detailPriority
            - iESourceInd
            - percent
            type: object
            properties:
              detailCode:
                title: Detail Code
                type: string
                description: "This field identifies the registration detail code that the exemption will apply to."
                x-lineageReferenceObject: TBREDET_DETAIL_CODE
              detailPriority:
                title: Priority
                type: number
                description: "This indicates the priority of this detail code for contract payment calculation for a student. Used only when student maximum is applied."
                x-lineageReferenceObject: TBREDET_DETAIL_PRIORITY
              percent:
                title: Percent
                type: number
                description: "This field identifies the percentage of the charge associated with the detail code that the exemption will cover."
                x-lineageReferenceObject: TBREDET_PERCENT
              minAmount:
                title: Minimum Amount
                type: string
                description: "This field indicates the minimum amount the student must pay for the registration charge associated with the detail code, that the exemption will not cover."
                x-lineageReferenceObject: TBREDET_MIN_AMOUNT
              maxAmount:
                title: Maximum Amount
                type: number
                description: "This field indicates the maximum amount the exemption will cover of the registration detail code."
                x-lineageReferenceObject: TBREDET_MAX_AMOUNT
              iESourceInd:
                title: Include Exclude Source Indicator
                type: string
                description: "Indicator telling whether the source codes in TBREDSI should be included or excluded. Value of Null indicates that all sources in TTVSRCE are included."
                x-lineageReferenceObject: TBREDET_I_E_SOURCE_IND
