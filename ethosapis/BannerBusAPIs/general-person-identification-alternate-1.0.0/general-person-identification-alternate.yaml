        spridenCreateUser:
          title: Create User
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRIDEN_CREATE_USER"
          x-lineageReferenceObject: SPRIDEN_CREATE_USER
        spridenOrigin:
          title: Origin
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRIDEN_ORIGIN"
          x-lineageReferenceObject: SPRIDEN_ORIGIN
        spridenMi:
          title: Middle Name
          maxLength: 60
          type: string
          description: "Lineage reference object : SPRIDEN_MI"
          x-lineageReferenceObject: SPRIDEN_MI
        previousNtypDesc:
          type: string
        spridenId:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : SPRIDEN_ID"
          x-lineageReferenceObject: SPRIDEN_ID
        spridenFirstName:
