openapi: 3.0.0
info:
  title: course-section-information-copy-crn
  description: API for SSASECT administrative page
  version: 1.1.0
  x-audience: all
  x-release-status: ga
  x-source-name: SSASECT
  x-source-domain: Student
  x-source-title: Schedule
  x-source-system: banner
  x-api-type: bus-poc
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/course-section-information-copy-crn:
    put:
      tags:
      - course-section-information-copy-crn
      summary: Updates an existing resource in SSASECT
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.1.0+json:
            schema:
              $ref: '#/components/schemas/course-section-information-copy-crn-1.1.0_put_request'
            example:
              ssbsectCrseNumb: CR123
              ssasectTermCode: '001010'
              ssbsectTitle: My new sections
              ssasectCrn: 10015
              ssasectCrnDefault: 10015
              ssbsectSubjCode: 1124
              ssasectTermCodeDefault: '001010'
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/course-section-information-copy-crn-1.1.0_put_response'
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
  /qapi/course-section-information-copy-crn: {}
