          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROG_DATA_ENTRY_IND
        - name: title
          in: query
          description: Program Title
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPROG_TITLE
        - name: progCodePred
          in: query
