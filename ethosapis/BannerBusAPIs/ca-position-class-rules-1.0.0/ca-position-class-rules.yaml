          x-lineageReferenceObject: NTRPCLS_ECLS_CODE
        salaHigh:
          title: Range High
          maxLength: 14
          type: number
        esocDesc:
          type: string
        cstbDesc:
          type: string
        esklCode:
          title: Employee Skill
          maxLength: 30
          type: string
          description: "Lineage reference object : NTRPCLS_ESKL_CODE"
          x-lineageReferenceObject: NTRPCLS_ESKL_CODE
        grade:
