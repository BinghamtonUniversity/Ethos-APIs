          maxLength: 1
          type: string
          description: "Lineage reference object : NTRPCLS_ACCRUE_SENIORITY_IND"
          x-lineageReferenceObject: NTRPCLS_ACCRUE_SENIORITY_IND
        csppDesc:
          type: string
        efunDesc:
          type: string
        persHours:
          title: PERS Work Schedule Hours
          maxLength: 8
          type: number
          description: "Lineage reference object : NTRPCLS_PERS_HOURS"
          x-lineageReferenceObject: NTRPCLS_PERS_HOURS
        sclsBaseHrs:
          title: Classification Base Hours
          type: number
          description: "Lineage reference object : NTRPCLS_SCLS_BASE_HRS"
          x-lineageReferenceObject: NTRPCLS_SCLS_BASE_HRS
        esocCode:
