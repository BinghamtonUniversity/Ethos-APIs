openapi: 3.0.0
info:
  title: ca-position-class-rules
  description: API for NTRPCLS administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: NTRPCLS
  x-source-domain: Human Resources
  x-source-title: Position Class Rules (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-position-class-rules:
    get:
      tags:
        - ca-position-class-rules
      summary: Return resources from NTRPCLS
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: pclsCode
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-position-class-rules-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-position-class-rules:
    post:
      tags:
        - ca-position-class-rules QAPI (Query by POST)
      summary: Return resources from NTRPCLS
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-position-class-rules-1.0.0_get_request"
            example:
              pclsCode: AFP01
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-position-class-rules-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-position-class-rules-1.0.0_qapi_post:
      required:
        - pclsCode
      type: object
      properties:
        pclsCode:
          type: string
    ca-position-class-rules-1.0.0_get_request:
      required:
        - pclsCode
      type: object
      properties:
        pclsCode:
          title: Position Class Code
          maxLength: 5
          type: string
          description: "Lineage reference object : pclsCode"
          x-lineageReferenceObject: pclsCode
      x-lineageReferenceObject: KEY_BLOCK
    ca-position-class-rules-1.0.0_get_response:
      required:
        - changeDateTime
        - desc
        - eclsCode
        - esklCode
        - sgrpCode
        - table
      type: object
      properties:
        probationUnits:
          title: Probationary Period
          maxLength: 3
          type: number
          description: "Lineage reference object : NTRPCLS_PROBATION_UNITS"
          x-lineageReferenceObject: NTRPCLS_PROBATION_UNITS
        salaLow:
          title: Range Low
          maxLength: 14
          type: number
        persSchedHrsWeek:
          title: Full Time Hours Per Week
          maxLength: 7
          type: number
          description: "Lineage reference object : NTRPCLS_PERS_SCHED_HRS_WEEK"
          x-lineageReferenceObject: NTRPCLS_PERS_SCHED_HRS_WEEK
        bargCode:
          title: Bargaining Unit
          maxLength: 30
          type: string
          description: "Lineage reference object : NTRPCLS_BARG_CODE"
          x-lineageReferenceObject: NTRPCLS_BARG_CODE
        exemptInd:
          title: Exempt Indicator
          maxLength: 1
          type: string
          description: "Lineage reference object : NTRPCLS_EXEMPT_IND"
          x-lineageReferenceObject: NTRPCLS_EXEMPT_IND
        csstDesc:
          type: string
        ecipCode:
          title: Employment Category
          maxLength: 100
          type: string
          description: "Lineage reference object : NTRPCLS_ECIP_CODE"
          x-lineageReferenceObject: NTRPCLS_ECIP_CODE
        sgrpCode:
          title: Salary Group
          maxLength: 7
          type: string
          description: "Lineage reference object : NTRPCLS_SGRP_CODE"
          x-lineageReferenceObject: NTRPCLS_SGRP_CODE
        accrueSeniorityInd:
