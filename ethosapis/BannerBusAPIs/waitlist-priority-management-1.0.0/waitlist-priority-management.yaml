openapi: 3.0.0
info:
  title: waitlist-priority-management
  description: API for SFAWLPR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SFAWLPR
  x-source-domain: Student
  x-source-title: Waitlist Priority Management
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/waitlist-priority-management:
    get:
      tags:
        - waitlist-priority-management
      summary: Return resources from SFAWLPR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: ssasectTermCode
          in: query
          required: false
          schema:
            type: string
        - name: ssasectCrn
          in: query
          required: false
          schema:
            type: string
        - name: id
          in: query
          description: ID
          required: false
          schema:
            type: string
        - name: regSeq
          in: query
          description: Sequence
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRSTCR_REG_SEQ
        - name: rstsCode
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRSTCR_RSTS_CODE
        - name: rstsDate
          in: query
          description: Registration Date-Time
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRSTCR_RSTS_DATE
        - name: wlPriority
          in: query
          description: Waitlist Priority
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRSTCR_WL_PRIORITY
        - name: wlPrioOriginDesc
          in: query
          description: Waitlist Origin
          required: false
          schema:
            type: string
        - name: user
          in: query
          description: User
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRSTCR_USER
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRSTCR_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/waitlist-priority-management-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/waitlist-priority-management:
    post:
      tags:
        - waitlist-priority-management QAPI (Query by POST)
      summary: Return resources from SFAWLPR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/waitlist-priority-management-1.0.0_qapi_post_reques\
                t"
            example:
              ssasectTermCode: 200120
              ssasectCrn: 10002
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/waitlist-priority-management-1.0.0_qapi_post_respon\
                    se"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
