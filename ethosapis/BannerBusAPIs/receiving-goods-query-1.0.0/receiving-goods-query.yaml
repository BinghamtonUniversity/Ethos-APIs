openapi: 3.0.0
info:
  title: receiving-goods-query
  description: API for FPIRCVD administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FPIRCVD
  x-source-domain: Finance
  x-source-title: Receiving Goods Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/receiving-goods-query:
    get:
      tags:
        - receiving-goods-query
      summary: Return resources from FPIRCVD
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblokRchdCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/receiving-goods-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/receiving-goods-query:
    post:
      tags:
        - receiving-goods-query QAPI (Query by POST)
      summary: Return resources from FPIRCVD
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/receiving-goods-query-1.0.0_get_request"
            example:
              keyblokRchdCode: Y000226
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/receiving-goods-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    receiving-goods-query-1.0.0_get_response:
      type: object
      properties:
        fpbrchd_block:
          type: array
          items:
            type: object
            properties:
              textDescHdr:
                title: Text Exists
                maxLength: 7
                type: string
              fpbrchdRcvdDate:
                title: Date Received
                maxLength: 11
                type: string
                description: "Lineage reference object : FPBRCHD_RCVD_DATE"
                format: date-time
                x-lineageReferenceObject: FPBRCHD_RCVD_DATE
              carrierName:
                maxLength: 230
                type: string
              fpbrchdCarrCode:
                title: Carrier
                maxLength: 9
                type: string
              fpbrchdUserId:
                title: Received By
                maxLength: 30
                type: string
                description: "Lineage reference object : FPBRCHD_USER_ID"
                x-lineageReferenceObject: FPBRCHD_USER_ID
              receivingMethodDesc:
                maxLength: 36
                type: string
              fpbrchdRcmtCode:
                title: Receiving Method
                maxLength: 4
                type: string
                description: "Lineage reference object : FPBRCHD_RCMT_CODE, Lookup lineage
                  reference object : ftvrcmt"
                x-lineageReferenceObject: FPBRCHD_RCMT_CODE
                x-lineageLookupReferenceObject: ftvrcmt
            x-lineageReferenceObject: fpbrchd_block
        fpbrcdt_block:
          type: array
          items:
            type: object
            properties:
              fpbrcdtPackingSlip:
                title: Packing Slip
                maxLength: 15
                type: string
                description: "Lineage reference object : FPBRCDT_PACKING_SLIP"
                x-lineageReferenceObject: FPBRCDT_PACKING_SLIP
              fpbrcdtPohdCode:
                title: Purchase Order
                maxLength: 8
                type: string
                description: "Lineage reference object : FPBRCDT_POHD_CODE"
                x-lineageReferenceObject: FPBRCDT_POHD_CODE
              textDesc:
                title: Text Exists
                maxLength: 7
                type: string
              vendorId:
                title: Vendor
                maxLength: 9
                type: string
              fpbrcdtBillOfLading:
                title: Bill of Lading
                maxLength: 10
                type: string
                description: "Lineage reference object : FPBRCDT_BILL_OF_LADING"
                x-lineageReferenceObject: FPBRCDT_BILL_OF_LADING
              buyerName:
                title: Buyer
                maxLength: 35
                type: string
              vendorName:
                maxLength: 230
                type: string
              fpbrcdtAdjustReceiveInd:
                maxLength: 30
                type: string
                description: "Lineage reference object : FPBRCDT_ADJUST_RECEIVE_IND"
                x-lineageReferenceObject: FPBRCDT_ADJUST_RECEIVE_IND
            x-lineageReferenceObject: fpbrcdt_block
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    receiving-goods-query-1.0.0_get_request:
      type: object
      properties:
        keyblokRchdCode:
          title: Receiver Document Code
          maxLength: 8
          type: string
          description: "Lineage reference object : keyblokRchdCode"
          x-lineageReferenceObject: keyblokRchdCode
      x-lineageReferenceObject: KEY_BLOCK
    receiving-goods-query-1.0.0_qapi_post:
      type: object
      properties:
        keyblokRchdCode:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
