openapi: 3.0.0
info:
  title: holds
  description: API for SOQHOLD administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SOQHOLD
  x-source-domain: Student
  x-source-title: Holds Query-Only
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/holds:
    get:
      tags:
        - holds
      summary: Return resources from SOQHOLD
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/holds-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/holds:
    post:
      tags:
        - holds QAPI (Query by POST)
      summary: Return resources from SOQHOLD
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/holds-1.0.0_get_request"
            example:
              id: A00030988
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/holds-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    holds-1.0.0_get_request:
      required:
        - id
      type: object
      properties:
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: KEY_BLOCK
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    holds-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
    holds-1.0.0_get_response:
      required:
        - fromDate
        - hlddCode
        - toDate
      type: object
      properties:
        fromDate:
          title: From
          maxLength: 11
          type: string
          description: "Lineage reference object : SPRHOLD_FROM_DATE"
          format: date-time
          x-lineageReferenceObject: SPRHOLD_FROM_DATE
        hlddCode:
          title: Hold  Type
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRHOLD_HLDD_CODE, Lookup lineage
            reference object : stvhldd"
          x-lineageReferenceObject: SPRHOLD_HLDD_CODE
          x-lineageLookupReferenceObject: stvhldd
        reason:
          title: Reason
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRHOLD_REASON"
          x-lineageReferenceObject: SPRHOLD_REASON
        origDescription:
          type: string
        toDate:
          title: To
          maxLength: 11
          type: string
          description: "Lineage reference object : SPRHOLD_TO_DATE"
          format: date-time
          x-lineageReferenceObject: SPRHOLD_TO_DATE
        releaseInd:
          title: Release Indicator
          maxLength: 1
          type: string
          description: "Lineage reference object : SPRHOLD_RELEASE_IND"
          x-lineageReferenceObject: SPRHOLD_RELEASE_IND
        user:
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRHOLD_USER"
          x-lineageReferenceObject: SPRHOLD_USER
        hlddDescription:
          type: string
        amountOwed:
          title: Amount
          maxLength: 9
          type: number
          description: "Lineage reference object : SPRHOLD_AMOUNT_OWED"
          x-lineageReferenceObject: SPRHOLD_AMOUNT_OWED
        origCode:
          title: Origination Code
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRHOLD_ORIG_CODE, Lookup lineage
            reference object : stvorig"
          x-lineageReferenceObject: SPRHOLD_ORIG_CODE
          x-lineageLookupReferenceObject: stvorig
      x-lineageReferenceObject: sprhold
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
