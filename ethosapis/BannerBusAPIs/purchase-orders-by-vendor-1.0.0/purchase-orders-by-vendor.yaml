openapi: 3.0.0
info:
  title: purchase-orders-by-vendor
  description: API for FPIOPOV administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FPIOPOV
  x-source-domain: Finance
  x-source-title: Purchase Orders by Vendor
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/purchase-orders-by-vendor:
    get:
      tags:
        - purchase-orders-by-vendor
      summary: Return resources from FPIOPOV
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: displayCoasCode
          in: query
          required: false
          schema:
            type: string
        - name: displayFsyrCode
          in: query
          required: false
          schema:
            type: string
        - name: displayOrgnCode
          in: query
          required: false
          schema:
            type: string
        - name: displayVendCode
          in: query
          required: false
          schema:
            type: string
        - name: statusGrp
          in: query
          required: false
          schema:
            type: string
        - name: commCode
          in: query
          description: Commodity
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FPRPODT_COMM_CODE
        - name: pohdCode
          in: query
          description: Purchase Order
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FPRPODT_POHD_CODE
        - name: uomsCode
          in: query
          description: U/M
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FPRPODT_UOMS_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/purchase-orders-by-vendor-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/purchase-orders-by-vendor:
    post:
      tags:
        - purchase-orders-by-vendor QAPI (Query by POST)
      summary: Return resources from FPIOPOV
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/purchase-orders-by-vendor-1.0.0_get_request"
            example:
              displayCoasCode: B
              displayFsyrCode: 22
              displayVendCode: V9
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/purchase-orders-by-vendor-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    purchase-orders-by-vendor-1.0.0_get_response:
      type: object
      properties:
        commCode:
          title: Commodity
          maxLength: 10
          type: string
          description: "Lineage reference object : FPRPODT_COMM_CODE"
          x-lineageReferenceObject: FPRPODT_COMM_CODE
        stndPoAmt:
          title: Amount
          maxLength: 25
          type: number
        displayCommDesc:
          maxLength: 50
          type: string
        displayPoDate:
          title: Date
          maxLength: 11
          type: string
          format: date-time
        pohdCode:
          title: Purchase Order
          maxLength: 8
          type: string
          description: "Lineage reference object : FPRPODT_POHD_CODE"
          x-lineageReferenceObject: FPRPODT_POHD_CODE
        regPoQuantity:
          title: Quantity
          maxLength: 11
          type: number
        uomsCode:
          title: U/M
          maxLength: 3
          type: string
          description: "Lineage reference object : FPRPODT_UOMS_CODE, Lookup lineage
            reference object : ftvuoms"
          x-lineageReferenceObject: FPRPODT_UOMS_CODE
          x-lineageLookupReferenceObject: ftvuoms
      x-lineageReferenceObject: fprpodt
    purchase-orders-by-vendor-1.0.0_get_request:
      type: object
      properties:
        commCode:
          title: Commodity
          maxLength: 10
          type: string
          description: "Lineage reference object : FPRPODT_COMM_CODE"
          x-lineageReferenceObject: FPRPODT_COMM_CODE
        displayOrgnCode:
          title: Organization
          maxLength: 30
          type: string
          description: "Lineage reference object : displayOrgnCode"
          x-lineageReferenceObject: displayOrgnCode
        pohdCode:
          title: Purchase Order
          maxLength: 8
          type: string
          description: "Lineage reference object : FPRPODT_POHD_CODE"
          x-lineageReferenceObject: FPRPODT_POHD_CODE
        statusGrp:
          maxLength: 1
          type: string
          description: "Lineage reference object : statusGrp"
          x-lineageReferenceObject: statusGrp
        displayCoasCode:
          title: COA
          maxLength: 30
          type: string
          description: "Lineage reference object : displayCoasCode, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: displayCoasCode
          x-lineageLookupReferenceObject: ftvcoas
        displayFsyrCode:
          title: Fiscal Year
          maxLength: 2
          type: string
          description: "Lineage reference object : displayFsyrCode, Lookup lineage
            reference object : ftvfspd,ftvfsyr,ftvfspd"
          x-lineageReferenceObject: displayFsyrCode
          x-lineageLookupReferenceObject: ftvfspd,ftvfsyr,ftvfspd
        displayVendCode:
          title: Vendor
          maxLength: 9
          type: string
          description: "Lineage reference object : displayVendCode"
          x-lineageReferenceObject: displayVendCode
        uomsCode:
          title: U/M
          maxLength: 3
          type: string
          description: "Lineage reference object : FPRPODT_UOMS_CODE, Lookup lineage
            reference object : ftvuoms"
          x-lineageReferenceObject: FPRPODT_UOMS_CODE
          x-lineageLookupReferenceObject: ftvuoms
      x-lineageReferenceObject: FPRPODT
    purchase-orders-by-vendor-1.0.0_qapi_post:
      type: object
      properties:
        displayCoasCode:
          type: string
        displayFsyrCode:
          type: string
        displayOrgnCode:
          type: string
        displayVendCode:
          type: string
        statusGrp:
          type: string
        commCode:
          title: Commodity
          maxLength: 10
          type: string
          description: "Lineage reference object : FPRPODT_COMM_CODE"
          x-lineageReferenceObject: FPRPODT_COMM_CODE
        pohdCode:
          title: Purchase Order
          maxLength: 8
          type: string
          description: "Lineage reference object : FPRPODT_POHD_CODE"
          x-lineageReferenceObject: FPRPODT_POHD_CODE
        uomsCode:
          title: U/M
          maxLength: 3
          type: string
          description: "Lineage reference object : FPRPODT_UOMS_CODE, Lookup lineage
            reference object : ftvuoms"
          x-lineageReferenceObject: FPRPODT_UOMS_CODE
          x-lineageLookupReferenceObject: ftvuoms
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
