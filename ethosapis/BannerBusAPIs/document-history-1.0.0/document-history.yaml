openapi: 3.0.0
info:
  title: document-history
  description: API for FOIDOCH administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FOIDOCH
  x-source-domain: Finance
  x-source-title: Document History
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/document-history:
    get:
      tags:
        - document-history
      summary: Return resources from FOIDOCH
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: displayDtypCode
          in: query
          required: true
          schema:
            type: string
        - name: displayDocCode
          in: query
          required: false
          schema:
            type: string
        - name: fordchcDocCode
          in: query
          description: Document Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FORDCHC_DOC_CODE
        - name: fordchcStatus
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FORDCHC_STATUS
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/document-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/document-history:
    post:
      tags:
        - document-history QAPI (Query by POST)
      summary: Return resources from FOIDOCH
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/document-history-1.0.0_get_request"
            example:
              displayDtypCode: RTN
              displayDocCode: RET0001
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/document-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    document-history-1.0.0_get_request:
      type: object
      properties:
        displayDtypCode:
          title: Document Type
          maxLength: 30
          type: string
          description: "Lineage reference object : displayDtypCode, Lookup lineage
            reference object : ftvdtyp"
          x-lineageReferenceObject: displayDtypCode
          x-lineageLookupReferenceObject: ftvdtyp
        fordchcStatus:
          title: Status
          maxLength: 1
          type: string
          description: "Lineage reference object : FORDCHC_STATUS"
          x-lineageReferenceObject: FORDCHC_STATUS
        displayDocCode:
          title: Document Code
          maxLength: 15
          type: string
          description: "Lineage reference object : displayDocCode"
          x-lineageReferenceObject: displayDocCode
        fordchcDocCode:
          title: Document Number
          maxLength: 15
          type: string
          description: "Lineage reference object : FORDCHC_DOC_CODE"
          x-lineageReferenceObject: FORDCHC_DOC_CODE
      x-lineageReferenceObject: FORDCHC1
    document-history-1.0.0_get_response:
      type: object
      properties:
        statusDesc:
          maxLength: 35
          type: string
        fordchcStatus:
          title: Status
          maxLength: 1
          type: string
          description: "Lineage reference object : FORDCHC_STATUS"
          x-lineageReferenceObject: FORDCHC_STATUS
        docTypeDesc:
          maxLength: 35
          type: string
        fordchcDocCode:
          title: Document Number
          maxLength: 15
          type: string
          description: "Lineage reference object : FORDCHC_DOC_CODE"
          x-lineageReferenceObject: FORDCHC_DOC_CODE
      x-lineageReferenceObject: fordchc1
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    document-history-1.0.0_qapi_post:
      required:
        - displayDtypCode
      type: object
      properties:
        displayDtypCode:
          type: string
        displayDocCode:
          type: string
        fordchcDocCode:
          title: Document Number
          maxLength: 15
          type: string
          description: "Lineage reference object : FORDCHC_DOC_CODE"
          x-lineageReferenceObject: FORDCHC_DOC_CODE
        fordchcStatus:
          title: Status
          maxLength: 1
          type: string
          description: "Lineage reference object : FORDCHC_STATUS"
          x-lineageReferenceObject: FORDCHC_STATUS
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
