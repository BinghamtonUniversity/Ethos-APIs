        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/finance-refund-review:
    post:
      tags:
        - finance-refund-review QAPI (Query by POST)
      summary: Return resources from TFARFND
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/finance-refund-review-1.0.0_qapi_post_request"
      responses:
        "200":
          description: OK
          headers:
