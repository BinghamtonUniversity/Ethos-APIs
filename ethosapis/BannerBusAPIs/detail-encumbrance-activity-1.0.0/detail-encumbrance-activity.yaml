              totLiquidations:
                title: Liquidation
                maxLength: 31
                type: number
              seqNum:
                title: Sequence
                maxLength: 4
                type: number
                description: "Lineage reference object : FGBENCD_SEQ_NUM"
                x-lineageReferenceObject: FGBENCD_SEQ_NUM
              acciCode:
                title: Index
                maxLength: 6
                type: string
                description: "Lineage reference object : FGBENCD_ACCI_CODE, Lookup lineage
                  reference object : ftvacci"
                x-lineageReferenceObject: FGBENCD_ACCI_CODE
                x-lineageLookupReferenceObject: ftvacci
              coasCode:
                title: COA
                maxLength: 1
                type: string
                description: "Lineage reference object : FGBENCD_COAS_CODE, Lookup lineage
                  reference object : ftvcoas"
                x-lineageReferenceObject: FGBENCD_COAS_CODE
                x-lineageLookupReferenceObject: ftvcoas
              fgbencpFsyrCode:
                title: Fiscal Year
                maxLength: 2
                type: string
                description: "Lookup lineage reference object : ftvfspd,ftvfsyr,ftvfspd"
                x-lineageLookupReferenceObject: ftvfspd,ftvfsyr,ftvfspd
              locnCode:
                title: Locn
                maxLength: 6
                type: string
                description: "Lineage reference object : FGBENCD_LOCN_CODE"
                x-lineageReferenceObject: FGBENCD_LOCN_CODE
              acctCode:
                title: Acct
                maxLength: 6
                type: string
                description: "Lineage reference object : FGBENCD_ACCT_CODE"
                x-lineageReferenceObject: FGBENCD_ACCT_CODE
              orgnCode:
                title: Orgn
                maxLength: 6
                type: string
                description: "Lineage reference object : FGBENCD_ORGN_CODE"
                x-lineageReferenceObject: FGBENCD_ORGN_CODE
              origEncbAmt:
                title: Encumbrance
                maxLength: 25
                type: number
              sequenceBalance:
                title: Balance
                maxLength: 25
                type: number
              fundCode:
                title: Fund
                maxLength: 6
                type: string
                description: "Lineage reference object : FGBENCD_FUND_CODE"
