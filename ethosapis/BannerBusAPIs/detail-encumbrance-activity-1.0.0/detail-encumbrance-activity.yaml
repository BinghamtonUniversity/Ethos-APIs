openapi: 3.0.0
info:
  title: detail-encumbrance-activity
  description: API for FGIENCD administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FGIENCD
  x-source-domain: Finance
  x-source-title: Detail Encumbrance Activity
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/detail-encumbrance-activity:
    get:
      tags:
        - detail-encumbrance-activity
      summary: Return resources from FGIENCD
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: encumbranceNumber
          in: query
          required: true
          schema:
            type: string
        - name: item
          in: query
          description: Item
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_ITEM
        - name: orgnCode
          in: query
          description: Orgn
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_ORGN_CODE
        - name: seqNum
          in: query
          description: Sequence
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_SEQ_NUM
        - name: acctCode
          in: query
          description: Acct
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_ACCT_CODE
        - name: fgbencpFsyrCode
          in: query
          description: Fiscal Year
          required: false
          schema:
            type: string
        - name: progCode
          in: query
          description: Prog
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_PROG_CODE
        - name: status
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_STATUS
        - name: actvCode
          in: query
          description: Actv
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_ACTV_CODE
        - name: cmtType
          in: query
          description: Commit Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_CMT_TYPE
        - name: locnCode
          in: query
          description: Locn
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_LOCN_CODE
        - name: prjdCode
          in: query
          description: Proj
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_PRJD_CODE
        - name: coasCode
          in: query
          description: COA
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_COAS_CODE
        - name: acciCode
          in: query
          description: Index
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_ACCI_CODE
        - name: fundCode
          in: query
          description: Fund
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBENCD_FUND_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/detail-encumbrance-activity-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/detail-encumbrance-activity:
    post:
      tags:
        - detail-encumbrance-activity QAPI (Query by POST)
      summary: Return resources from FGIENCD
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/detail-encumbrance-activity-1.0.0_get_request"
            example:
              encumbranceNumber: 2733
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/detail-encumbrance-activity-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
