              actvCode:
                title: Actv
                maxLength: 6
                type: string
                description: "Lineage reference object : FGBENCD_ACTV_CODE"
                x-lineageReferenceObject: FGBENCD_ACTV_CODE
              status:
                title: Status
                maxLength: 1
                type: string
                description: "Lineage reference object : FGBENCD_STATUS"
                x-lineageReferenceObject: FGBENCD_STATUS
            x-lineageReferenceObject: fgbencd
