                maxLength: 11
                type: string
                format: date-time
              docCode:
                title: Document Code
                maxLength: 8
                type: string
                description: "Lineage reference object : FGBTRND_DOC_CODE"
                x-lineageReferenceObject: FGBTRND_DOC_CODE
