          maxLength: 8
          type: string
          description: "Lineage reference object : RKBEXID_CURRENT_LEA"
          x-lineageReferenceObject: RKBEXID_CURRENT_LEA
        externalId:
          title: External ID
          maxLength: 200
          type: string
          description: "Lineage reference object : RKBEXID_EXTERNAL_ID"
          x-lineageReferenceObject: RKBEXID_EXTERNAL_ID
        sslcFinaidYear:
          title: SSLC Fin Aid Year
          maxLength: 4
          type: string
