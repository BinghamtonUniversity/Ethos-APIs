          maxLength: 1
          type: string
          description: "Lineage reference object : RKBEXID_ACTIVE_IND"
          x-lineageReferenceObject: RKBEXID_ACTIVE_IND
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
