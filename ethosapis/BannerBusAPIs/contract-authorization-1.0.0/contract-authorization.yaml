openapi: 3.0.0
info:
  title: contract-authorization
  description: API for TSQCONT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: TSQCONT
  x-source-domain: Student
  x-source-title: Contract Authorization Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/contract-authorization:
    get:
      tags:
        - contract-authorization
      summary: Return resources from TSQCONT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: contractIdValue
          in: query
          required: false
          schema:
            type: string
        - name: contractId
          in: query
          description: ID
          required: false
          schema:
            type: string
        - name: contractNumber
          in: query
          description: Contract Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCONT_CONTRACT_NUMBER
        - name: termCode
          in: query
          description: Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCONT_TERM_CODE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCONT_DESC
        - name: termCodeExpiration
          in: query
          description: Expiration Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCONT_TERM_CODE_EXPIRATION
        - name: detailPayCode
          in: query
          description: Payment
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCONT_DETAIL_PAY_CODE
        - name: detailChgCode
          in: query
          description: Charge
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCONT_DETAIL_CHG_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/contract-authorization-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/contract-authorization:
    post:
      tags:
        - contract-authorization QAPI (Query by POST)
      summary: Return resources from TSQCONT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/contract-authorization-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/contract-authorization-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    contract-authorization-1.0.0_get_request:
      required:
        - detailPayCode
        - detailChgCode
      type: object
      properties:
        detailChgCode:
          title: Charge
          maxLength: 4
          type: string
          description: "Lineage reference object : TBBCONT_DETAIL_CHG_CODE"
          x-lineageReferenceObject: TBBCONT_DETAIL_CHG_CODE
        contractId:
          title: ID
          maxLength: 9
          type: string
        contractNumber:
          title: Contract Number
          maxLength: 8
          type: number
          description: "Lineage reference object : TBBCONT_CONTRACT_NUMBER"
          x-lineageReferenceObject: TBBCONT_CONTRACT_NUMBER
        termCodeExpiration:
          title: Expiration Term
          maxLength: 6
          type: string
          description: "Lineage reference object : TBBCONT_TERM_CODE_EXPIRATION, Lookup
            lineage reference object : stvterm"
          x-lineageReferenceObject: TBBCONT_TERM_CODE_EXPIRATION
          x-lineageLookupReferenceObject: stvterm
        termCode:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : TBBCONT_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: TBBCONT_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBCONT_DESC"
          x-lineageReferenceObject: TBBCONT_DESC
        detailPayCode:
          title: Payment
          maxLength: 4
          type: string
          description: "Lineage reference object : TBBCONT_DETAIL_PAY_CODE"
          x-lineageReferenceObject: TBBCONT_DETAIL_PAY_CODE
      x-lineageReferenceObject: TBBCONT
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    contract-authorization-1.0.0_get_response:
      required:
        - detailChgCode
        - detailPayCode
      type: object
      properties:
        detailChgCode:
          title: Charge
          maxLength: 4
          type: string
          description: "Lineage reference object : TBBCONT_DETAIL_CHG_CODE"
          x-lineageReferenceObject: TBBCONT_DETAIL_CHG_CODE
        contractId:
          title: ID
          maxLength: 9
          type: string
        contractNumber:
          title: Contract Number
          maxLength: 8
          type: number
          description: "Lineage reference object : TBBCONT_CONTRACT_NUMBER"
          x-lineageReferenceObject: TBBCONT_CONTRACT_NUMBER
        termCodeExpiration:
          title: Expiration Term
          maxLength: 6
          type: string
          description: "Lineage reference object : TBBCONT_TERM_CODE_EXPIRATION, Lookup
            lineage reference object : stvterm"
          x-lineageReferenceObject: TBBCONT_TERM_CODE_EXPIRATION
          x-lineageLookupReferenceObject: stvterm
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBCONT_DESC"
          x-lineageReferenceObject: TBBCONT_DESC
        detailPayCode:
          title: Payment
          maxLength: 4
          type: string
          description: "Lineage reference object : TBBCONT_DETAIL_PAY_CODE"
          x-lineageReferenceObject: TBBCONT_DETAIL_PAY_CODE
        termCode:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : TBBCONT_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: TBBCONT_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: tbbcont
    contract-authorization-1.0.0_qapi_post:
      type: object
      properties:
        contractIdValue:
          type: string
        contractId:
          title: ID
          maxLength: 9
          type: string
        contractNumber:
          title: Contract Number
          maxLength: 8
          type: number
          description: "Lineage reference object : TBBCONT_CONTRACT_NUMBER"
          x-lineageReferenceObject: TBBCONT_CONTRACT_NUMBER
        termCode:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : TBBCONT_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: TBBCONT_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBCONT_DESC"
          x-lineageReferenceObject: TBBCONT_DESC
        termCodeExpiration:
          title: Expiration Term
          maxLength: 6
          type: string
          description: "Lineage reference object : TBBCONT_TERM_CODE_EXPIRATION, Lookup
            lineage reference object : stvterm"
          x-lineageReferenceObject: TBBCONT_TERM_CODE_EXPIRATION
          x-lineageLookupReferenceObject: stvterm
        detailPayCode:
          title: Payment
          maxLength: 4
          type: string
          description: "Lineage reference object : TBBCONT_DETAIL_PAY_CODE"
          x-lineageReferenceObject: TBBCONT_DETAIL_PAY_CODE
        detailChgCode:
          title: Charge
          maxLength: 4
          type: string
          description: "Lineage reference object : TBBCONT_DETAIL_CHG_CODE"
          x-lineageReferenceObject: TBBCONT_DETAIL_CHG_CODE
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
