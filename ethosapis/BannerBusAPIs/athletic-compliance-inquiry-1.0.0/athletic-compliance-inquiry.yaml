openapi: 3.0.0
info:
  title: athletic-compliance-inquiry
  description: API for SGISPRT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SGISPRT
  x-source-domain: Student
  x-source-title: Athletic Compliance Inquiry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/athletic-compliance-inquiry:
    get:
      tags:
        - athletic-compliance-inquiry
      summary: Return resources from SGISPRT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: termCode
          in: query
          description: Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_TERM_CODE
        - name: fullName
          in: query
          required: false
          schema:
            type: string
        - name: actcCode
          in: query
          description: Sport
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_ACTC_CODE
        - name: spstCode
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_SPST_CODE
        - name: eligCode
          in: query
          description: Eligible
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_ELIG_CODE
        - name: saelCode
          in: query
          description: Academic Eligibility
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_SAEL_CODE
        - name: ststCode
          in: query
          description: Student Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_STST_CODE
        - name: astdCode
          in: query
          description: Academic Standing
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_ASTD_CODE
        - name: athlAidInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_ATHL_AID_IND
        - name: seasonUsedInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_SEASON_USED_IND
        - name: currentInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_CURRENT_IND
        - name: compActivityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_COMP_ACTIVITY_DATE
        - name: compUserId
          in: query
          description: User ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGVISPT_COMP_USER_ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/athletic-compliance-inquiry-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/athletic-compliance-inquiry:
    post:
      tags:
        - athletic-compliance-inquiry QAPI (Query by POST)
      summary: Return resources from SGISPRT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/athletic-compliance-inquiry-1.0.0_get_request"
            example:
              actcCode: 125
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/athletic-compliance-inquiry-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    athletic-compliance-inquiry-1.0.0_get_request:
      type: object
      properties:
        eligCode:
          title: Eligible
          maxLength: 30
          type: string
          description: "Lineage reference object : SGVISPT_ELIG_CODE, Lookup lineage
            reference object : stvelig"
          x-lineageReferenceObject: SGVISPT_ELIG_CODE
          x-lineageLookupReferenceObject: stvelig
        athlAidInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SGVISPT_ATHL_AID_IND"
          x-lineageReferenceObject: SGVISPT_ATHL_AID_IND
        compUserId:
          title: User ID
          maxLength: 11
          type: string
          description: "Lineage reference object : SGVISPT_COMP_USER_ID"
          x-lineageReferenceObject: SGVISPT_COMP_USER_ID
        fullName:
          title: Full Name
          maxLength: 4000
          type: string
          description: "Lineage reference object : SGVISPT_FULL_NAME"
          x-lineageReferenceObject: SGVISPT_FULL_NAME
        spstCode:
          title: Status
          maxLength: 30
          type: string
          description: "Lineage reference object : SGVISPT_SPST_CODE, Lookup lineage
            reference object : stvspst"
          x-lineageReferenceObject: SGVISPT_SPST_CODE
          x-lineageLookupReferenceObject: stvspst
        compActivityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SGVISPT_COMP_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SGVISPT_COMP_ACTIVITY_DATE
        saelCode:
          title: Academic Eligibility
          maxLength: 30
          type: string
          description: "Lineage reference object : SGVISPT_SAEL_CODE, Lookup lineage
            reference object : stvsael"
          x-lineageReferenceObject: SGVISPT_SAEL_CODE
          x-lineageLookupReferenceObject: stvsael
        seasonUsedInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SGVISPT_SEASON_USED_IND"
          x-lineageReferenceObject: SGVISPT_SEASON_USED_IND
        currentInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SGVISPT_CURRENT_IND"
          x-lineageReferenceObject: SGVISPT_CURRENT_IND
        ststCode:
          title: Student Status
          maxLength: 30
          type: string
          description: "Lineage reference object : SGVISPT_STST_CODE, Lookup lineage
            reference object : stvstst"
          x-lineageReferenceObject: SGVISPT_STST_CODE
          x-lineageLookupReferenceObject: stvstst
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : SGVISPT_ID"
          x-lineageReferenceObject: SGVISPT_ID
        astdCode:
          title: Academic Standing
          maxLength: 30
          type: string
          description: "Lineage reference object : SGVISPT_ASTD_CODE, Lookup lineage
            reference object : stvastd"
          x-lineageReferenceObject: SGVISPT_ASTD_CODE
          x-lineageLookupReferenceObject: stvastd
        actcCode:
          title: Sport
          maxLength: 30
          type: string
          description: "Lineage reference object : SGVISPT_ACTC_CODE, Lookup lineage
            reference object : stvactc"
          x-lineageReferenceObject: SGVISPT_ACTC_CODE
          x-lineageLookupReferenceObject: stvactc
        termCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : SGVISPT_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: SGVISPT_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: SGVISPT
    athletic-compliance-inquiry-1.0.0_get_response:
      type: object
      properties:
        view:
          type: array
          items:
            required:
              - current
              - sport
            type: object
            properties:
              current:
                title: View Current
                maxLength: 30
                type: string
              sport:
                title: View Current
                maxLength: 30
                type: string
            x-lineageReferenceObject: view
        sgvispt:
          type: array
          items:
            type: object
            properties:
              seasonsAvailable:
                type: number
                description: "Lineage reference object : SGVISPT_SEASONS_AVAILABLE"
                x-lineageReferenceObject: SGVISPT_SEASONS_AVAILABLE
              actcDesc:
                type: string
              eligCode:
                title: Eligible
                maxLength: 30
                type: string
                description: "Lineage reference object : SGVISPT_ELIG_CODE, Lookup lineage
                  reference object : stvelig"
                x-lineageReferenceObject: SGVISPT_ELIG_CODE
                x-lineageLookupReferenceObject: stvelig
              eligEndTermCode:
                title: End Term of Eligibility
                type: string
                description: "Lineage reference object : SGVISPT_ELIG_END_TERM_CODE, Lookup
