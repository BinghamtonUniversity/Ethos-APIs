              compUserId:
                title: User ID
                maxLength: 11
                type: string
                description: "Lineage reference object : SGVISPT_COMP_USER_ID"
                x-lineageReferenceObject: SGVISPT_COMP_USER_ID
              sareDesc:
                type: string
              spstCode:
                title: Status
                maxLength: 30
                type: string
                description: "Lineage reference object : SGVISPT_SPST_CODE, Lookup lineage
                  reference object : stvspst"
                x-lineageReferenceObject: SGVISPT_SPST_CODE
                x-lineageLookupReferenceObject: stvspst
              compActivityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SGVISPT_COMP_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SGVISPT_COMP_ACTIVITY_DATE
              saelCode:
                title: Academic Eligibility
                maxLength: 30
                type: string
                description: "Lineage reference object : SGVISPT_SAEL_CODE, Lookup lineage
                  reference object : stvsael"
                x-lineageReferenceObject: SGVISPT_SAEL_CODE
                x-lineageLookupReferenceObject: stvsael
              seasonUsedInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : SGVISPT_SEASON_USED_IND"
                x-lineageReferenceObject: SGVISPT_SEASON_USED_IND
              eligBeginTermCode:
                title: Begin Term of Eligibility
                type: string
                description: "Lineage reference object : SGVISPT_ELIG_BEGIN_TERM_CODE, Lookup
                  lineage reference object : stvterm"
                x-lineageReferenceObject: SGVISPT_ELIG_BEGIN_TERM_CODE
                x-lineageLookupReferenceObject: stvterm
              compSeqNo:
                title: Seasons of Competition Used
                type: number
                description: "Lineage reference object : SGVISPT_COMP_SEQ_NO"
                x-lineageReferenceObject: SGVISPT_COMP_SEQ_NO
              currentInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : SGVISPT_CURRENT_IND"
                x-lineageReferenceObject: SGVISPT_CURRENT_IND
              eligBeginTermDesc:
                type: string
              sareCode:
                title: Reason
                type: string
                description: "Lineage reference object : SGVISPT_SARE_CODE"
                x-lineageReferenceObject: SGVISPT_SARE_CODE
              ststCode:
                title: Student Status
                maxLength: 30
                type: string
                description: "Lineage reference object : SGVISPT_STST_CODE, Lookup lineage
                  reference object : stvstst"
                x-lineageReferenceObject: SGVISPT_STST_CODE
                x-lineageLookupReferenceObject: stvstst
              seasonsRemaining:
                title: Seasons of Competition Remaining
                type: number
              eligEndTermDesc:
                type: string
              termDesc:
                type: string
              seasonsUsed:
                title: Seasons of Competition Used
                type: number
              astdCode:
                title: Academic Standing
                maxLength: 30
                type: string
                description: "Lineage reference object : SGVISPT_ASTD_CODE, Lookup lineage
                  reference object : stvastd"
                x-lineageReferenceObject: SGVISPT_ASTD_CODE
                x-lineageLookupReferenceObject: stvastd
              actcCode:
                title: Sport
                maxLength: 30
                type: string
                description: "Lineage reference object : SGVISPT_ACTC_CODE, Lookup lineage
                  reference object : stvactc"
                x-lineageReferenceObject: SGVISPT_ACTC_CODE
                x-lineageLookupReferenceObject: stvactc
              termCode:
                title: Term
                maxLength: 30
                type: string
                description: "Lineage reference object : SGVISPT_TERM_CODE, Lookup lineage
                  reference object : stvterm"
                x-lineageReferenceObject: SGVISPT_TERM_CODE
                x-lineageLookupReferenceObject: stvterm
            x-lineageReferenceObject: sgvispt
    athletic-compliance-inquiry-1.0.0_qapi_post:
      type: object
      properties:
