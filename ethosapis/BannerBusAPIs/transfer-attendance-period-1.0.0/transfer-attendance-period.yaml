openapi: 3.0.0
info:
  title: transfer-attendance-period
  description: API for SHQTRAM administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SHQTRAM
  x-source-domain: Student
  x-source-title: Transfer Attendance Periods by Person Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/transfer-attendance-period:
    get:
      tags:
        - transfer-attendance-period
      summary: Return resources from SHQTRAM
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: pidm
          in: query
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: lastName
          in: query
          required: false
          schema:
            type: string
        - name: firstName
          in: query
          required: false
          schema:
            type: string
        - name: mi
          in: query
          required: false
          schema:
            type: string
        - name: institution
          in: query
          required: false
          schema:
            type: string
        - name: tritSeqNo
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/transfer-attendance-period-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/transfer-attendance-period:
    post:
      tags:
        - transfer-attendance-period QAPI (Query by POST)
      summary: Return resources from SHQTRAM
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/transfer-attendance-period-1.0.0_get_request"
            example:
              id: A00000695
              tritSeqNo: 2
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/transfer-attendance-period-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    transfer-attendance-period-1.0.0_get_request:
      type: object
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    transfer-attendance-period-1.0.0_qapi_post:
      type: object
      properties:
        pidm:
          type: string
        id:
          type: string
        lastName:
          type: string
        firstName:
          type: string
        mi:
          type: string
        institution:
          type: string
        tritSeqNo:
          type: string
    transfer-attendance-period-1.0.0_get_response:
      type: object
      properties:
        shrtrit_ctrl:
          type: array
          items:
            type: object
            properties:
              shrtritActivityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTRIT_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTRIT_ACTIVITY_DATE
              shrtritSbgiDesc2:
                title: Description
                maxLength: 100
                type: string
              shrtritSbgiCode:
                title: Institution
                maxLength: 6
                type: string
                description: "Lineage reference object : SHRTRIT_SBGI_CODE, Lookup lineage
                  reference object : stvsbgi"
                x-lineageReferenceObject: SHRTRIT_SBGI_CODE
                x-lineageLookupReferenceObject: stvsbgi
              shrtritSeqNo:
                title: Sequence Number
                maxLength: 2
                type: number
                description: "Lineage reference object : SHRTRIT_SEQ_NO"
                x-lineageReferenceObject: SHRTRIT_SEQ_NO
            x-lineageReferenceObject: shrtrit_ctrl
        shrtram_ctrl:
          type: array
          items:
            required:
              - shrtramSeqNo
            type: object
            properties:
              shrtramAttnPeriod:
                title: Attendance Period
                maxLength: 12
                type: string
                description: "Lineage reference object : SHRTRAM_ATTN_PERIOD"
                x-lineageReferenceObject: SHRTRAM_ATTN_PERIOD
              stvlevlDesc:
                title: Description
                maxLength: 30
                type: string
              shrtramActivityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTRAM_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTRAM_ACTIVITY_DATE
              shrtramSeqNo:
                title: Attendance Period Number
                maxLength: 2
                type: number
                description: "Lineage reference object : SHRTRAM_SEQ_NO"
                x-lineageReferenceObject: SHRTRAM_SEQ_NO
              shrtramAcceptanceDate:
                title: Acceptance Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTRAM_ACCEPTANCE_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTRAM_ACCEPTANCE_DATE
              shrtramLevlCode:
                title: Applied to Level
                maxLength: 2
                type: string
                description: "Lineage reference object : SHRTRAM_LEVL_CODE, Lookup lineage
                  reference object : stvlevl"
                x-lineageReferenceObject: SHRTRAM_LEVL_CODE
                x-lineageLookupReferenceObject: stvlevl
            x-lineageReferenceObject: shrtram_ctrl
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
