openapi: 3.0.0
info:
  title: deposit-crosswalk
  description: API for TGADEPX administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TGADEPX
  x-source-domain: Student
  x-source-title: Deposit Crosswalk Form
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/deposit-crosswalk:
    get:
      tags:
        - deposit-crosswalk
      summary: Return resources from TGADEPX
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: baseCode
          in: query
          description: Base Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBDEPX_BASE_CODE
        - name: baseDescription
          in: query
          description: Base Code Description
          required: false
          schema:
            type: string
        - name: dtypCode
          in: query
          description: Deposit Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBDEPX_DTYP_CODE
        - name: dtypDescription
          in: query
          description: Deposit Type Description
          required: false
          schema:
            type: string
        - name: depositCode
          in: query
          description: Deposit Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBDEPX_DEPOSIT_CODE
        - name: depositDescription
          in: query
          description: Deposit Code Description
          required: false
          schema:
            type: string
        - name: paymentCode
          in: query
          description: Payment Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBDEPX_PAYMENT_CODE
        - name: paymentDescription
          in: query
          description: Payment Code Description
          required: false
          schema:
            type: string
        - name: userId
          in: query
          description: Last User
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBDEPX_USER_ID
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBDEPX_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/deposit-crosswalk-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
