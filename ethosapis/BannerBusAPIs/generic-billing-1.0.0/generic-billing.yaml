openapi: 3.0.0
info:
  title: generic-billing
  description: API for FRAGENB administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FRAGENB
  x-source-domain: Finance
  x-source-title: Generic Bill
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/generic-billing:
    get:
      tags:
        - generic-billing
      summary: Return resources from FRAGENB
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: displayGrantCode
          in: query
          required: false
          schema:
            type: string
        - name: displayBfrmCode
          in: query
          required: false
          schema:
            type: string
        - name: displayBillInv
          in: query
          required: false
          schema:
            type: string
        - name: displayBillAdj
          in: query
          required: false
          schema:
            type: string
        - name: grntCode
          in: query
          description: Grant
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRGENB_GRNT_CODE
        - name: billInvSeqNo
          in: query
          description: Bill Invoice Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRGENB_BILL_INV_SEQ_NO
        - name: billInvAdjNo
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRGENB_BILL_INV_ADJ_NO
        - name: updateInd
          in: query
          description: Update Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRGENB_UPDATE_IND
        - name: finalInd
          in: query
          description: Final Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRGENB_FINAL_IND
        - name: billAmt
          in: query
          description: Bill Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRGENB_BILL_AMT
        - name: completeInd
          in: query
          description: Complete Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRGENB_COMPLETE_IND
        - name: budgetAmt
