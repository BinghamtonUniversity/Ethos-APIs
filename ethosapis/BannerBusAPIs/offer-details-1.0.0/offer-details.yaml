openapi: 3.0.0
info:
  title: offer-details
  description: API for SKAENRL administrative page
  version: 1.0.0
  x-source-name: SKAENRL
  x-source-title: Student Statistical Details
  x-source-system: banner
  x-api-type: bus-poc
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/offer-details:
    get:
      tags:
        - offer-details
      summary: Return resources from SKAENRL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: termCodeEntry
          in: query
          description: Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARAPPD_TERM_CODE_ENTRY
        - name: applNo
          in: query
          description: Application Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARAPPD_APPL_NO
        - name: seqNo
          in: query
          description: Sequence Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARAPPD_SEQ_NO
        - name: apdcCode
          in: query
          description: Decision Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARAPPD_APDC_CODE
        - name: apdcDate
          in: query
          description: Decision Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARAPPD_APDC_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/offer-details-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/offer-details:
    post:
      tags:
        - offer-details QAPI (Query by POST)
      summary: Return resources from SKAENRL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/offer-details-1.0.0_qapi_post_request"
            example:
              id: Q00050824
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/offer-details-1.0.0_qapi_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    offer-details-1.0.0_get_response:
      type: object
      properties:
        seqNo:
          title: Sequence Number
          maxLength: 2
          type: number
          description: "Lineage reference object : SARAPPD_SEQ_NO"
          x-lineageReferenceObject: SARAPPD_SEQ_NO
        apdcCode:
          title: Decision Code
          maxLength: 2
          type: string
          description: "Lineage reference object : SARAPPD_APDC_CODE"
          x-lineageReferenceObject: SARAPPD_APDC_CODE
        apdcDate:
          title: Decision Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SARAPPD_APDC_DATE"
          format: date-time
          x-lineageReferenceObject: SARAPPD_APDC_DATE
        applNo:
          title: Application Number
          maxLength: 10
          type: number
          description: "Lineage reference object : SARAPPD_APPL_NO"
          x-lineageReferenceObject: SARAPPD_APPL_NO
        termCodeEntry:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : SARAPPD_TERM_CODE_ENTRY, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: SARAPPD_TERM_CODE_ENTRY
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: sarappd
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: "The detailed actionable error message. "
    offer-details-1.0.0_qapi_post_response:
      type: object
      properties:
        seqNo:
          title: Sequence Number
          maxLength: 2
          type: number
          description: "Lineage reference object : SARAPPD_SEQ_NO"
          x-lineageReferenceObject: SARAPPD_SEQ_NO
        apdcCode:
          title: Decision Code
          maxLength: 2
          type: string
          description: "Lineage reference object : SARAPPD_APDC_CODE"
          x-lineageReferenceObject: SARAPPD_APDC_CODE
        apdcDate:
          title: Decision Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SARAPPD_APDC_DATE"
          format: date-time
          x-lineageReferenceObject: SARAPPD_APDC_DATE
        applNo:
          title: Application Number
          maxLength: 10
          type: number
          description: "Lineage reference object : SARAPPD_APPL_NO"
          x-lineageReferenceObject: SARAPPD_APPL_NO
        termCodeEntry:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : SARAPPD_TERM_CODE_ENTRY, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: SARAPPD_TERM_CODE_ENTRY
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: sarappd
    offer-details-1.0.0_qapi_post_request:
      type: object
      properties:
        seqNo:
          title: Sequence Number
          maxLength: 2
          type: number
          description: "Lineage reference object : SARAPPD_SEQ_NO"
          x-lineageReferenceObject: SARAPPD_SEQ_NO
        applNo:
          title: Application Number
          maxLength: 10
          type: number
          description: "Lineage reference object : SARAPPD_APPL_NO"
          x-lineageReferenceObject: SARAPPD_APPL_NO
        apdcCode:
          title: Decision Code
          maxLength: 2
          type: string
          description: "Lineage reference object : SARAPPD_APDC_CODE"
          x-lineageReferenceObject: SARAPPD_APDC_CODE
        apdcDate:
          title: Decision Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SARAPPD_APDC_DATE"
          format: date-time
          x-lineageReferenceObject: SARAPPD_APDC_DATE
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        termCodeEntry:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : SARAPPD_TERM_CODE_ENTRY, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: SARAPPD_TERM_CODE_ENTRY
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: SARAPPD
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
