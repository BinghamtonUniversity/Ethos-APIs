openapi: 3.0.0
info:
  title: registration-error-messages
  description: API for SFARMSG administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SFARMSG
  x-source-domain: Student
  x-source-title: Registration Error Messages
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/registration-error-messages:
    get:
      tags:
        - registration-error-messages
      summary: Return resources from SFARMSG
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: cde
          in: query
          description: Message Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRRMSG_CDE
        - name: seqno
          in: query
          description: Sequence Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRRMSG_SEQNO
        - name: message
          in: query
          description: Baseline Message
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRRMSG_MESSAGE
        - name: localMessage
          in: query
          description: Custom Message
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRRMSG_LOCAL_MESSAGE
        - name: sysReqInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRRMSG_SYS_REQ_IND
        - name: userId
          in: query
          description: User ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRRMSG_USER_ID
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SFRRMSG_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/registration-error-messages-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/registration-error-messages:
    post:
      tags:
        - registration-error-messages QAPI (Query by POST)
      summary: Return resources from SFARMSG
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/registration-error-messages-1.0.0_get_request"
            example:
              cde: acst
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/registration-error-messages-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    registration-error-messages-1.0.0_qapi_post:
      type: object
      properties:
        cde:
          title: Message Code
          maxLength: 4
          type: string
          description: "Lineage reference object : SFRRMSG_CDE"
          x-lineageReferenceObject: SFRRMSG_CDE
        seqno:
          title: Sequence Number
          maxLength: 2
          type: number
          description: "Lineage reference object : SFRRMSG_SEQNO"
          x-lineageReferenceObject: SFRRMSG_SEQNO
        message:
          title: Baseline Message
          maxLength: 200
          type: string
          description: "Lineage reference object : SFRRMSG_MESSAGE"
          x-lineageReferenceObject: SFRRMSG_MESSAGE
        localMessage:
          title: Custom Message
          maxLength: 200
          type: string
          description: "Lineage reference object : SFRRMSG_LOCAL_MESSAGE"
          x-lineageReferenceObject: SFRRMSG_LOCAL_MESSAGE
        sysReqInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SFRRMSG_SYS_REQ_IND"
          x-lineageReferenceObject: SFRRMSG_SYS_REQ_IND
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : SFRRMSG_USER_ID"
          x-lineageReferenceObject: SFRRMSG_USER_ID
        activityDate:
          title: Activity Date
          maxLength: 26
          type: string
          description: "Lineage reference object : SFRRMSG_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SFRRMSG_ACTIVITY_DATE
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    registration-error-messages-1.0.0_get_response:
      required:
        - cde
        - seqno
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 26
          type: string
          description: "Lineage reference object : SFRRMSG_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SFRRMSG_ACTIVITY_DATE
        seqno:
          title: Sequence Number
          maxLength: 2
          type: number
          description: "Lineage reference object : SFRRMSG_SEQNO"
          x-lineageReferenceObject: SFRRMSG_SEQNO
        cde:
          title: Message Code
          maxLength: 4
          type: string
          description: "Lineage reference object : SFRRMSG_CDE"
          x-lineageReferenceObject: SFRRMSG_CDE
        sysReqInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SFRRMSG_SYS_REQ_IND"
          x-lineageReferenceObject: SFRRMSG_SYS_REQ_IND
        message:
          title: Baseline Message
          maxLength: 200
          type: string
          description: "Lineage reference object : SFRRMSG_MESSAGE"
          x-lineageReferenceObject: SFRRMSG_MESSAGE
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : SFRRMSG_USER_ID"
          x-lineageReferenceObject: SFRRMSG_USER_ID
        localMessage:
          title: Custom Message
          maxLength: 200
          type: string
          description: "Lineage reference object : SFRRMSG_LOCAL_MESSAGE"
          x-lineageReferenceObject: SFRRMSG_LOCAL_MESSAGE
      x-lineageReferenceObject: sfrrmsg
    registration-error-messages-1.0.0_get_request:
      required:
        - cde
        - seqno
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 26
          type: string
          description: "Lineage reference object : SFRRMSG_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SFRRMSG_ACTIVITY_DATE
        seqno:
          title: Sequence Number
          maxLength: 2
          type: number
          description: "Lineage reference object : SFRRMSG_SEQNO"
          x-lineageReferenceObject: SFRRMSG_SEQNO
        cde:
          title: Message Code
          maxLength: 4
          type: string
          description: "Lineage reference object : SFRRMSG_CDE"
          x-lineageReferenceObject: SFRRMSG_CDE
        sysReqInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SFRRMSG_SYS_REQ_IND"
          x-lineageReferenceObject: SFRRMSG_SYS_REQ_IND
        message:
          title: Baseline Message
          maxLength: 200
          type: string
          description: "Lineage reference object : SFRRMSG_MESSAGE"
          x-lineageReferenceObject: SFRRMSG_MESSAGE
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : SFRRMSG_USER_ID"
          x-lineageReferenceObject: SFRRMSG_USER_ID
        localMessage:
          title: Custom Message
          maxLength: 200
          type: string
          description: "Lineage reference object : SFRRMSG_LOCAL_MESSAGE"
          x-lineageReferenceObject: SFRRMSG_LOCAL_MESSAGE
      x-lineageReferenceObject: SFRRMSG
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
