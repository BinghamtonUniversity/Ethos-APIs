openapi: 3.0.0
info:
  title: general-information-examinations
  description: API for PPAGENL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: PPAGENL
  x-source-domain: Human Resources
  x-source-title: General Information
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/general-information-examinations:
    get:
      tags:
        - general-information-examinations
      summary: Return resources from PPAGENL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: sbgiCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/general-information-examinations-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/general-information-examinations:
    post:
      tags:
        - general-information-examinations QAPI (Query by POST)
      summary: Return resources from PPAGENL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/general-information-examinations-1.0.0_get_request"
            example:
              id: A00010003
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/general-information-examinations-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    general-information-examinations-1.0.0_get_request:
      required:
        - sbgiCode
      type: object
      properties:
        sbgiCode:
          title: Prior College
          maxLength: 20
          type: string
          description: "Lineage reference object : SORPCOL_SBGI_CODE, Lookup lineage
            reference object : stvsbgi"
          x-lineageReferenceObject: SORPCOL_SBGI_CODE
          x-lineageLookupReferenceObject: stvsbgi
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: SORPCOL
    general-information-examinations-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        sbgiCode:
          type: string
    general-information-examinations-1.0.0_get_response:
      required:
        - examCode
        - examDate
      type: object
      properties:
        examPercent:
          title: Percent
          maxLength: 7
          type: number
          description: "Lineage reference object : PPREXAM_EXAM_PERCENT"
          x-lineageReferenceObject: PPREXAM_EXAM_PERCENT
        activityDate:
          maxLength: 26
          type: string
          description: "Lineage reference object : PPREXAM_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PPREXAM_ACTIVITY_DATE
        examCode:
          title: Examination
          maxLength: 2
          type: string
          description: "Lineage reference object : PPREXAM_EXAM_CODE"
          x-lineageReferenceObject: PPREXAM_EXAM_CODE
        examDate:
          title: Examination Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PPREXAM_EXAM_DATE"
          format: date-time
          x-lineageReferenceObject: PPREXAM_EXAM_DATE
        passInd:
          title: Pass
          maxLength: 1
          type: string
          description: "Lineage reference object : PPREXAM_PASS_IND"
          x-lineageReferenceObject: PPREXAM_PASS_IND
        examDesc:
          title: Description
          maxLength: 30
          type: string
        examScore:
          title: Score
          maxLength: 6
          type: number
          description: "Lineage reference object : PPREXAM_EXAM_SCORE"
          x-lineageReferenceObject: PPREXAM_EXAM_SCORE
        userId:
          maxLength: 30
          type: string
          description: "Lineage reference object : PPREXAM_USER_ID"
          x-lineageReferenceObject: PPREXAM_USER_ID
      x-lineageReferenceObject: pprexam
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
