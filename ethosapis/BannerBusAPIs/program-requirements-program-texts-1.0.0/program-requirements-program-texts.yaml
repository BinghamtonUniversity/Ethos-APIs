openapi: 3.0.0
info:
  title: program-requirements-program-texts
  description: API for SMAPROG administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SMAPROG
  x-source-domain: Student
  x-source-title: Program Requirements
  x-source-system: banner
  x-api-type: bus-poc
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: '{server_url}'
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/program-requirements-program-texts:
    get:
      tags:
      - program-requirements-program-texts
      summary: Return resources from SMAPROG
      parameters:
      - name: X-SDE-Expand
        in: header
        description: The comma separated value list of block names
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of resources requesting for this result set.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
      - name: program
        in: query
        required: false
        schema:
          type: string
      - name: keyblckTermCode
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response
                body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/program-requirements-program-texts-1.0.0_get_response'
        '401':
          description: Failure. Unauthorized
        '400':
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
    post:
      tags:
      - program-requirements-program-texts
      summary: Creates a new resource in SMAPROG
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: '#/components/schemas/program-requirements-program-texts-1.0.0_post_request'
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response
                body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/program-requirements-program-texts-1.0.0_post_response'
        '401':
          description: Failure. Unauthorized
        '400':
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
  /qapi/program-requirements-program-texts:
    post:
      tags:
      - program-requirements-program-texts QAPI (Query by POST)
      summary: Return resources from SMAPROG
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: '#/components/schemas/program-requirements-program-texts-1.0.0_qapi_post_request'
            example:
              keyblckTermCode: 201410
              program: BAENGLISH
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response
                body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/program-requirements-program-texts-1.0.0_qapi_post_response'
        '401':
          description: Failure. Unauthorized
        '400':
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
components:
  schemas:
    program-requirements-program-texts-1.0.0_post_request:
      type: object
      properties:
        prntCode:
          title: Print
          maxLength: 30
          type: string
          description: 'Lineage reference object : SMRPCMT_PRNT_CODE, Lookup lineage
            reference object : stvprnt'
          x-lineageReferenceObject: SMRPCMT_PRNT_CODE
          x-lineageLookupReferenceObject: stvprnt
        keyblckTermCode:
          title: Term
          maxLength: 30
          type: string
          description: 'Lineage reference object : keyblckTermCode, Lookup lineage
            reference object : stvterm'
          x-lineageReferenceObject: keyblckTermCode
          x-lineageLookupReferenceObject: stvterm
        program:
          title: Course
          maxLength: 30
          type: string
          description: 'Lineage reference object : program'
          x-lineageReferenceObject: program
        text:
          title: Text
          maxLength: 60
          type: string
          description: 'Lineage reference object : SMRPCMT_TEXT'
          x-lineageReferenceObject: SMRPCMT_TEXT
      x-lineageReferenceObject: SMRPCMT
    program-requirements-program-texts-1.0.0_qapi_post_response:
      type: object
      properties:
        smrpcmt:
          type: array
          items:
            type: object
            properties:
              prntCode:
                title: Print
                maxLength: 30
                type: string
                description: 'Lineage reference object : SMRPCMT_PRNT_CODE, Lookup
                  lineage reference object : stvprnt'
                x-lineageReferenceObject: SMRPCMT_PRNT_CODE
                x-lineageLookupReferenceObject: stvprnt
              maint:
                maxLength: 1
                type: string
              text:
                title: Text
                maxLength: 60
                type: string
                description: 'Lineage reference object : SMRPCMT_TEXT'
                x-lineageReferenceObject: SMRPCMT_TEXT
            x-lineageReferenceObject: smrpcmt
        smrpcmt_ctrl_block:
          type: array
          items:
            type: object
            properties:
              smrpcmtTermCodeTo:
                title: To Term
                maxLength: 6
                type: string
                description: 'Lineage reference object : smrpcmtTermCodeTo'
                x-lineageReferenceObject: smrpcmtTermCodeTo
              smrpcmtTermCodeFrom:
                title: From Term
                maxLength: 6
                type: string
                description: 'Lineage reference object : smrpcmtTermCodeFrom'
                x-lineageReferenceObject: smrpcmtTermCodeFrom
            x-lineageReferenceObject: smrpcmt_ctrl_block
    errors-2.0.0:
      required:
      - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for
                  the primary data entity used to create the resource. This is useful
                  for referencing the source item through the applications administrative
                  user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: 'The detailed actionable error message. '
    program-requirements-program-texts-1.0.0_post_response:
      type: object
      properties:
        smrpcmt_ctrl_block:
          type: array
          items:
            type: object
            properties:
              smrpcmtTermCodeTo:
                title: To Term
                maxLength: 6
                type: string
                description: 'Lineage reference object : smrpcmtTermCodeTo'
                x-lineageReferenceObject: smrpcmtTermCodeTo
              smrpcmtTermCodeFrom:
                title: From Term
                maxLength: 6
                type: string
                description: 'Lineage reference object : smrpcmtTermCodeFrom'
                x-lineageReferenceObject: smrpcmtTermCodeFrom
            x-lineageReferenceObject: smrpcmt_ctrl_block
        smrpcmt:
          type: array
          items:
            type: object
            properties:
              prntCode:
                title: Print
                maxLength: 30
                type: string
                description: 'Lineage reference object : SMRPCMT_PRNT_CODE, Lookup
                  lineage reference object : stvprnt'
                x-lineageReferenceObject: SMRPCMT_PRNT_CODE
                x-lineageLookupReferenceObject: stvprnt
              maint:
                maxLength: 1
                type: string
              text:
                title: Text
                maxLength: 60
                type: string
                description: 'Lineage reference object : SMRPCMT_TEXT'
                x-lineageReferenceObject: SMRPCMT_TEXT
            x-lineageReferenceObject: smrpcmt
    program-requirements-program-texts-1.0.0_get_response:
      type: object
      properties:
        smrpcmt:
          type: array
          items:
            type: object
            properties:
              prntCode:
                title: Print
                maxLength: 30
                type: string
                description: 'Lineage reference object : SMRPCMT_PRNT_CODE, Lookup
                  lineage reference object : stvprnt'
                x-lineageReferenceObject: SMRPCMT_PRNT_CODE
                x-lineageLookupReferenceObject: stvprnt
              maint:
                maxLength: 1
                type: string
              text:
                title: Text
                maxLength: 60
                type: string
                description: 'Lineage reference object : SMRPCMT_TEXT'
                x-lineageReferenceObject: SMRPCMT_TEXT
            x-lineageReferenceObject: smrpcmt
        smrpcmt_ctrl_block:
          type: array
          items:
            type: object
            properties:
              smrpcmtTermCodeTo:
                title: To Term
                maxLength: 6
                type: string
                description: 'Lineage reference object : smrpcmtTermCodeTo'
                x-lineageReferenceObject: smrpcmtTermCodeTo
              smrpcmtTermCodeFrom:
                title: From Term
                maxLength: 6
                type: string
                description: 'Lineage reference object : smrpcmtTermCodeFrom'
                x-lineageReferenceObject: smrpcmtTermCodeFrom
            x-lineageReferenceObject: smrpcmt_ctrl_block
    program-requirements-program-texts-1.0.0_qapi_post_request:
      type: object
      properties:
        keyblckTermCode:
          title: Term
          maxLength: 30
          type: string
          description: 'Lineage reference object : keyblckTermCode, Lookup lineage
