openapi: 3.0.0
info:
  title: statistical-details
  description: API for SKAENRL administrative page
  version: 1.0.0
  x-source-name: SKAENRL
  x-source-title: Student Statistical Details
  x-source-system: banner
  x-api-type: bus-poc
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/statistical-details:
    get:
      tags:
        - statistical-details
      summary: Return resources from SKAENRL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: edlvCode
          in: query
          description: Basis for Admission Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBSTDN_EDLV_CODE
        - name: egolCode
          in: query
          description: Highest Level of Participation
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBSTDN_EGOL_CODE
        - name: voedCode
          in: query
          description: Occupation Identifier
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBSTDN_VOED_CODE
        - name: orsnCode
          in: query
          description: Currently At School?
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBSTDN_ORSN_CODE
        - name: bsklCode
          in: query
          description: English Proficiency
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBSTDN_BSKL_CODE
        - name: caplCode
          in: query
          description: Study Reason
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBSTDN_CAPL_CODE
        - name: gainCode
          in: query
          description: Labour Force Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBSTDN_GAIN_CODE
        - name: emexCode
          in: query
          description: Industry of Employment
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBSTDN_EMEX_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/statistical-details-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - statistical-details
      summary: Updates an existing resource in SKAENRL
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/statistical-details-1.0.0_put_request"
            example:
              edlvCode: HS
              caplCode: AN
              bsklCode: DM
              egolCode: BD
              emexCode: A
              id: GENSTUR01
              criteria.edlvCode: HS
              gainCode: JT
              voedCode: VE
              orsnCode: A
