          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: tescCode
          in: query
          required: false
          schema:
            type: string
        - name: stvtescDesc
          in: query
          required: false
          schema:
            type: string
        - name: testScore
          in: query
          required: false
          schema:
            type: string
        - name: testDate
          in: query
          required: false
          schema:
            type: string
        - name: queryTestDate
          in: query
          required: false
          schema:
            type: string
        - name: dispTestDate
          in: query
          required: false
          schema:
            type: string
        - name: admrCode
          in: query
          required: false
          schema:
            type: string
        - name: stvadmrDesc
          in: query
          required: false
          schema:
            type: string
        - name: equivInd
          in: query
          required: false
          schema:
            type: string
        - name: tsrcCode
          in: query
          required: false
          schema:
            type: string
        - name: stvtsrcDesc
          in: query
          required: false
          schema:
            type: string
