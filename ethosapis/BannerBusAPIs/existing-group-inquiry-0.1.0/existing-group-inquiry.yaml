openapi: 3.0.0
info:
  title: existing-group-inquiry
  description: API for SMIGROP administrative page
  version: 0.1.0
  x-audience: all
  x-release-status: beta
  x-source-name: SMIGROP
  x-source-domain: Student
  x-source-title: Existing Group Inquiry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/existing-group-inquiry:
    get:
      tags:
        - existing-group-inquiry
      summary: Return resources from SMIGROP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: group
          in: query
          description: Group
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMBGGEN_GROUP
        - name: termCodeEff
          in: query
          description: Effective Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMBGGEN_TERM_CODE_EFF
        - name: activeInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMBGGEN_ACTIVE_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v0.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/existing-group-inquiry-0.1.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/existing-group-inquiry:
    post:
      tags:
        - existing-group-inquiry QAPI (Query by POST)
      summary: Return resources from SMIGROP
      requestBody:
        content:
          application/vnd.hedtech.integration.v0.1.0+json:
            schema:
              $ref: "#/components/schemas/existing-group-inquiry-0.1.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v0.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/existing-group-inquiry-0.1.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    existing-group-inquiry-0.1.0_get_request:
      required:
        - group
      type: object
      properties:
        termCodeEff:
          title: Effective Term
          maxLength: 6
          type: string
          description: "Lineage reference object : SMBGGEN_TERM_CODE_EFF"
          x-lineageReferenceObject: SMBGGEN_TERM_CODE_EFF
        activeInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGGEN_ACTIVE_IND"
          x-lineageReferenceObject: SMBGGEN_ACTIVE_IND
        group:
          title: Group
          maxLength: 10
          type: string
          description: "Lineage reference object : SMBGGEN_GROUP"
          x-lineageReferenceObject: SMBGGEN_GROUP
      x-lineageReferenceObject: SMBGGEN
    existing-group-inquiry-0.1.0_qapi_post:
      type: object
      properties:
        group:
          title: Group
          maxLength: 10
          type: string
          description: "Lineage reference object : SMBGGEN_GROUP"
          x-lineageReferenceObject: SMBGGEN_GROUP
        termCodeEff:
          title: Effective Term
          maxLength: 6
          type: string
          description: "Lineage reference object : SMBGGEN_TERM_CODE_EFF"
          x-lineageReferenceObject: SMBGGEN_TERM_CODE_EFF
        activeInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGGEN_ACTIVE_IND"
          x-lineageReferenceObject: SMBGGEN_ACTIVE_IND
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    existing-group-inquiry-0.1.0_get_response:
      required:
        - group
      type: object
      properties:
        levlCodeStu:
          title: Student Level
          maxLength: 30
          type: string
        termCodeEff:
          title: Effective Term
          maxLength: 6
          type: string
          description: "Lineage reference object : SMBGGEN_TERM_CODE_EFF"
          x-lineageReferenceObject: SMBGGEN_TERM_CODE_EFF
        groupDesc:
          title: Description
          maxLength: 30
          type: string
        activeInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGGEN_ACTIVE_IND"
          x-lineageReferenceObject: SMBGGEN_ACTIVE_IND
        levlCode:
          title: Course Level
          maxLength: 3
          type: string
        group:
          title: Group
          maxLength: 10
          type: string
          description: "Lineage reference object : SMBGGEN_GROUP"
          x-lineageReferenceObject: SMBGGEN_GROUP
      x-lineageReferenceObject: smbggen
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
