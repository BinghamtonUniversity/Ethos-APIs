openapi: 3.0.0
info:
  title: ca-faculty-assignment
  description: API for SIAASGN administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SIAASGN
  x-source-domain: Student
  x-source-title: Faculty Assignment (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-faculty-assignment:
    get:
      tags:
        - ca-faculty-assignment
      summary: Return resources from SIAASGN
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: keyblocTermCodeEff
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-faculty-assignment-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-faculty-assignment:
    post:
      tags:
        - ca-faculty-assignment QAPI (Query by POST)
      summary: Return resources from SIAASGN
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-faculty-assignment-1.0.0_get_request"
            example:
              keyblocTermCodeEff: 201010
              id: BERRY
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-faculty-assignment-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    ca-faculty-assignment-1.0.0_get_response:
      required:
        - category
        - crn
        - percentResponse
        - percentSess
      type: object
      properties:
        percentResponse:
          title: Percent Responsibility
          maxLength: 3
          type: number
          description: "Lineage reference object : SIRASGN_PERCENT_RESPONSE"
          x-lineageReferenceObject: SIRASGN_PERCENT_RESPONSE
        addInst:
          title: Additional Instructors
          maxLength: 1
          type: string
        compensationAppliedCbox:
          maxLength: 1
          type: string
        workloadAdjust:
          title: Override Workload
          maxLength: 10
          type: number
          description: "Lineage reference object : SIRASGN_WORKLOAD_ADJUST"
          x-lineageReferenceObject: SIRASGN_WORKLOAD_ADJUST
        sessHrs:
          title: Session Credit
          maxLength: 8
          type: number
        generatedCredits:
          title: Generated Credits
          maxLength: 12
          type: number
        suff:
          title: Position Number Suffix
          maxLength: 2
          type: string
          description: "Lineage reference object : SIRASGN_SUFF"
          x-lineageReferenceObject: SIRASGN_SUFF
        crn:
          title: CRN
          maxLength: 5
          type: string
          description: "Lineage reference object : SIRASGN_CRN"
          x-lineageReferenceObject: SIRASGN_CRN
        overRide:
          maxLength: 1
          type: string
          description: "Lineage reference object : SIRASGN_OVER_RIDE"
          x-lineageReferenceObject: SIRASGN_OVER_RIDE
        assignFte:
          title: FTE
          maxLength: 10
          type: number
        subjCode:
          title: Subject
          maxLength: 4
          type: string
        fcntCode:
          title: Contract Type
          maxLength: 2
          type: string
          description: "Lineage reference object : SIRASGN_FCNT_CODE, Lookup lineage
            reference object : stvfcnt,siricnt,siricnt"
          x-lineageReferenceObject: SIRASGN_FCNT_CODE
          x-lineageLookupReferenceObject: stvfcnt,siricnt,siricnt
        workload:
          title: Workload
          maxLength: 10
          type: number
        calcWorkload:
          title: Calculated Workload
          maxLength: 10
          type: number
        compensationExtractedCbox:
          maxLength: 1
          type: string
        posn:
          title: Position Number
          maxLength: 6
          type: string
          description: "Lineage reference object : SIRASGN_POSN"
          x-lineageReferenceObject: SIRASGN_POSN
        totalContact:
          title: Total Contact
          maxLength: 8
          type: number
        crseNumb:
          title: Course
          maxLength: 5
          type: string
        seqNumb:
          title: Section
          maxLength: 3
          type: string
        weeklyContact:
          title: Weekly Contact
          type: number
        category:
          title: Session
          maxLength: 2
          type: string
          description: "Lineage reference object : SIRASGN_CATEGORY"
          x-lineageReferenceObject: SIRASGN_CATEGORY
        instCred:
          title: Institutional Credit
          maxLength: 8
          type: number
        astyCode:
          title: Assignment Type
          maxLength: 30
          type: string
          description: "Lineage reference object : SIRASGN_ASTY_CODE, Lookup lineage
            reference object : stvasty"
          x-lineageReferenceObject: SIRASGN_ASTY_CODE
          x-lineageLookupReferenceObject: stvasty
        percentSess:
          title: Percentage of Session
          maxLength: 3
          type: number
          description: "Lineage reference object : SIRASGN_PERCENT_SESS"
          x-lineageReferenceObject: SIRASGN_PERCENT_SESS
        primaryInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SIRASGN_PRIMARY_IND"
          x-lineageReferenceObject: SIRASGN_PRIMARY_IND
      x-lineageReferenceObject: sirasgn
    ca-faculty-assignment-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        keyblocTermCodeEff:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-faculty-assignment-1.0.0_get_request:
      type: object
      properties:
        keyblocTermCodeEff:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocTermCodeEff, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: keyblocTermCodeEff
          x-lineageLookupReferenceObject: stvterm
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
