          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - medical-details
      summary: Creates a new resource in SKAENRL
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/medical-details-1.0.0_post_request"
            example:
              disaCode: 12
              id: A00037350
              mediCode: ABCDEABCDE
              spsrCode: HA
      responses:
        "200":
          description: OK
