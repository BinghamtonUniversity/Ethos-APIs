openapi: 3.0.0
info:
  title: student-disability-services
  description: API for SGADISA administrative page Student Disabilities section.
  version: 2.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SGADISA
  x-source-domain: Student
  x-source-title: Athletic Academic Progress
  x-source-system: banner
  x-api-type: bus-poc
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/student-disability-services:
    get:
      tags:
      - student-disability-services
      summary: Return resources from SGADISA
      parameters:
      - name: X-SDE-Expand
        in: header
        description: The comma separated value list of block names
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of resources requesting for this result set.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
      - name: sgastdnId
        in: query
        required: false
        schema:
          type: string
      - name: sgastdnTermCodeEff
        in: query
        required: false
        schema:
          type: string
      - name: termCode
        in: query
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDISA_TERM_CODE
      - name: disaCode
        in: query
        description: Disability Code
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDISA_DISA_CODE
      - name: mediCode
        in: query
        description: Medical Code
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDISA_MEDI_CODE
      - name: spsrCode
        in: query
        description: Service Code
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDISA_SPSR_CODE
      - name: primaryInd
        in: query
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDISA_PRIMARY_IND
      - name: disaEffFromDate
        in: query
        description: Effective From Date
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDISA_DISA_EFF_FROM_DATE
      - name: disaEffToDate
        in: query
        description: Effective To Date
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDISA_DISA_EFF_TO_DATE
      - name: activityDate
        in: query
        description: Activity Date
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDISA_ACTIVITY_DATE
