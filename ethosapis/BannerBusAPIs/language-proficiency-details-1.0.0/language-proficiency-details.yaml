    variables:
      server_url:
        default: localhost
paths:
  /api/language-proficiency-details:
    get:
      tags:
        - language-proficiency-details
      summary: Return resources from SOALANP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: langCode
          in: query
          description: Language Identifier
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORLANP_LANG_CODE
        - name: lptyCode
          in: query
          description: Proficiency Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORLANP_LPTY_CODE
        - name: lplvCode
          in: query
          description: Proficiency Level
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORLANP_LPLV_CODE
        - name: userId
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORLANP_USER_ID
        - name: activityDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORLANP_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/language-proficiency-details-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - language-proficiency-details
      summary: Updates an existing resource in SOALANP
