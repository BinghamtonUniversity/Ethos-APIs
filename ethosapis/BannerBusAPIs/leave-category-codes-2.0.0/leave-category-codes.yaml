          description: Leave Report Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTVLCAT_REPORT_IND
        - name: accrueOrder
          in: query
          description: Leave Processing Order
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTVLCAT_ACCRUE_ORDER
        - name: leaveRollOrder
          in: query
          description: Leave Balance Roll Order
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTVLCAT_LEAVE_ROLL_ORDER
        - name: accrueMaxCalcMethod
          in: query
          description: Leave Accrual and Maximum Calculated Using
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTVLCAT_ACCRUE_MAX_CALC_METHOD
