openapi: 3.0.0
info:
  title: cashier-sessions
  description: API for TGACREV administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: TGACREV
  x-source-domain: Student
  x-source-title: Cashier Sessions
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/cashier-sessions:
    get:
      tags:
        - cashier-sessions
      summary: Return resources from TGACREV
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: sessionUser
          in: query
          description: Session User
          required: true
          schema:
            type: string
          x-lineageReferenceObject: TBRCOLR_SESSION_USER
        - name: sessionNumber
          in: query
          description: Session Number
          required: true
          schema:
            type: number
          x-lineageReferenceObject: TBRCOLR_SESSION_NUMBER
        - name: typeInd
          in: query
          description: Type Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TYPE_IND
        - name: ttvdcatDcatCode
          in: query
          description: Ttvdcat Dcat Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TTVDCAT_DCAT_CODE

        - name: detailCode
          in: query
          description: detail Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCSUM_DETAIL_CODE
        - name: srceCode
          in: query
          description: source Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCSUM_SRCE_CODE
        - name: amount
          in: query
          description: amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCSUM_AMOUNT
        - name: currCode
          in: query
          description: currency Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBVCSUM_CURR_CODE
        - name: foreignAmount
          in: query
          description: foreign Amount
          required: false
          schema:
            type: number
          x-lineageReferenceObject: TBVCSUM_FOREIGN_AMOUNT                                                  
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/cashier-sessions-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - cashier-sessions
      summary: Updates resources from TGACREV
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/cashier-sessions-1.0.0_put_request"
            example:
              tbrcolrSessionNumber: 0
              sessionUser: ARTHINC
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/cashier-sessions-1.0.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
      x-method-permissions: CASHIER_SESSIONS        
components:
  schemas:
    cashier-sessions-1.0.0_get_response:
      type: object
      properties:
        TBVCSUM:
          type: array
          items:
            required:
              - queryTotal
              - sessionTotal
            type: object
            properties:
              amount:
                title: Amount
                maxLength: 19
                type: number
                description: "Lineage reference object : TBVCSUM_AMOUNT"
                x-lineageReferenceObject: TBVCSUM_AMOUNT     
              detailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lineage reference object : TBVCSUM_DETAIL_CODE, Lookup lineage
                  reference object : tbbdetc"
                x-lineageReferenceObject: TBVCSUM_DETAIL_CODE
                x-lineageLookupReferenceObject: tbbdetc
              detailDesc:
                title: detailDesc
                maxLength: 30
                type: string
                description: "Lineage reference object : detailDesc"
                x-lineageReferenceObject: detailDesc                
              detailType:
                title: detail Type
                maxLength: 1
                type: string
                description: "Lineage reference object : TBVCSUM_DETAIL_TYPE"
                x-lineageReferenceObject: TBVCSUM_DETAIL_TYPE                
              srceCode:
                title: Source Code
                maxLength: 1
                type: string
                description: "Lineage reference object : TBVCSUM_SRCE_CODE, Lookup lineage
                  reference object : ttvsrce"
                x-lineageReferenceObject: TBVCSUM_SRCE_CODE
                x-lineageLookupReferenceObject: ttvsrce                
            x-lineageReferenceObject: TBVCSUM
        TOTALS_BLOCK:
          type: array
          items:
            type: object
            properties:
              queryTotal:
                title: Query Total
                maxLength: 19
                type: number
                description: "Lineage reference object : queryTotal"
                x-lineageReferenceObject: queryTotal
              sessionTotal:
                title: Session Total
                maxLength: 19
                type: number
                description: "Lineage reference object : sessionTotal"
                x-lineageReferenceObject: sessionTotal
            x-lineageReferenceObject: TOTALS_BLOCK   
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    cashier-sessions-1.0.0_get_request:
      required:
        - sessionUser
        - sessionNumber
      type: object
      properties:
        sessionUser:
          title: Session User
          maxLength: 30
          type: string
          description: "Lineage reference object : TBRCOLR_SESSION_USER"
          x-lineageReferenceObject: TBRCOLR_SESSION_USER
        sessionNumber:
          title: Session Number
          type: number
          description: "Lineage reference object : TBRCOLR_SESSION_NUMBER"
          x-lineageReferenceObject: TBRCOLR_SESSION_NUMBER
        typeInd:
          title: Type Ind
          maxLength: 1
          type: string
          description: "Lineage reference object : TYPE_IND"
          x-lineageReferenceObject: TYPE_IND
        ttvdcatDcatCode:
          title: Category Detail Code
          maxLength: 3
          type: string
          description: "Lineage reference object : TTVDCAT_DCAT_CODE"
          x-lineageReferenceObject: TTVDCAT_DCAT_CODE
        detailCode:
          title: Detail Code
          maxLength: 4
          type: string
          description: "Lineage reference object : TBVCSUM_DETAIL_CODE"
          x-lineageReferenceObject: TBVCSUM_DETAIL_CODE
        srceCode:
          title: Source Code
          maxLength: 1
          type: string
          description: "Lineage reference object : TBVCSUM_SRCE_CODE"
          x-lineageReferenceObject: TBVCSUM_SRCE_CODE
        amount:
          title: Amount
          type: number
          description: "Lineage reference object : TBVCSUM_AMOUNT"
          x-lineageReferenceObject: TBVCSUM_AMOUNT
        currCode:
          title: Currency Code
          maxLength: 4
          type: string
          description: "Lineage reference object : TBVCSUM_CURR_CODE"
          x-lineageReferenceObject: TBVCSUM_CURR_CODE
        foreignAmount:
          title: Tbvcdtl Foreign Amount
          type: number
          description: "Lineage reference object : TBVCSUM_FOREIGN_AMOUNT"
          x-lineageReferenceObject: TBVCSUM_FOREIGN_AMOUNT
      x-lineageReferenceObject: TGACREV
    cashier-sessions-1.0.0_put_request:
      required:
        - sessionUser
        - tbrcolrSessionNumber
      type: object
      properties:
        sessionUser:
          title: Session User
          maxLength: 30
          type: string
          description: "Lineage reference object : TBRCOLR_SESSION_USER"
          x-lineageReferenceObject: TBRCOLR_SESSION_USER
        tbrcolrSessionNumber:
          title: Session Number
          type: number
          description: "Lineage reference object : TBRCOLR_SESSION_NUMBER"
          x-lineageReferenceObject: TBRCOLR_SESSION_NUMBER
      x-lineageReferenceObject: TGACREV      
    cashier-sessions-1.0.0_put_response:
      type: object
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer