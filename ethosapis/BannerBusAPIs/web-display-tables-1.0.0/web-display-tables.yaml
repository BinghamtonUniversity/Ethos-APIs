openapi: 3.0.0
info:
  title: web-display-tables
  description: API for STVVTAB administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: STVVTAB
  x-source-domain: Student
  x-source-title: Web Display Tables Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/web-display-tables:
    get:
      tags:
        - web-display-tables
      summary: Return resources from STVVTAB
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVVTAB_ACTIVITY_DATE
        - name: systemReqInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVVTAB_SYSTEM_REQ_IND
        - name: tableName
          in: query
          description: Table Name
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVVTAB_TABLE_NAME
        - name: userId
          in: query
          description: User
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVVTAB_USER_ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/web-display-tables-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/web-display-tables:
    post:
      tags:
        - web-display-tables QAPI (Query by POST)
      summary: Return resources from STVVTAB
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/web-display-tables-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/web-display-tables-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    web-display-tables-1.0.0_get_response:
      required:
        - tableName
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : STVVTAB_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: STVVTAB_ACTIVITY_DATE
        systemReqInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : STVVTAB_SYSTEM_REQ_IND"
          x-lineageReferenceObject: STVVTAB_SYSTEM_REQ_IND
        userId:
          title: User
          maxLength: 30
          type: string
          description: "Lineage reference object : STVVTAB_USER_ID"
          x-lineageReferenceObject: STVVTAB_USER_ID
        tableName:
          title: Table Name
          maxLength: 7
          type: string
          description: "Lineage reference object : STVVTAB_TABLE_NAME"
          x-lineageReferenceObject: STVVTAB_TABLE_NAME
      x-lineageReferenceObject: stvvtab
    web-display-tables-1.0.0_get_request:
      required:
        - tableName
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : STVVTAB_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: STVVTAB_ACTIVITY_DATE
        systemReqInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : STVVTAB_SYSTEM_REQ_IND"
          x-lineageReferenceObject: STVVTAB_SYSTEM_REQ_IND
        userId:
          title: User
          maxLength: 30
          type: string
          description: "Lineage reference object : STVVTAB_USER_ID"
          x-lineageReferenceObject: STVVTAB_USER_ID
        tableName:
          title: Table Name
          maxLength: 7
          type: string
          description: "Lineage reference object : STVVTAB_TABLE_NAME"
          x-lineageReferenceObject: STVVTAB_TABLE_NAME
      x-lineageReferenceObject: STVVTAB
    web-display-tables-1.0.0_qapi_post:
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : STVVTAB_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: STVVTAB_ACTIVITY_DATE
        systemReqInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : STVVTAB_SYSTEM_REQ_IND"
          x-lineageReferenceObject: STVVTAB_SYSTEM_REQ_IND
        tableName:
          title: Table Name
          maxLength: 7
          type: string
          description: "Lineage reference object : STVVTAB_TABLE_NAME"
          x-lineageReferenceObject: STVVTAB_TABLE_NAME
        userId:
          title: User
          maxLength: 30
          type: string
          description: "Lineage reference object : STVVTAB_USER_ID"
          x-lineageReferenceObject: STVVTAB_USER_ID
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
