openapi: 3.0.0
info:
  title: position-history
  description: API for NBIPOSH administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: NBIPOSH
  x-source-domain: Human Resources
  x-source-title: Position History
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/position-history:
    get:
      tags:
        - position-history
      summary: Return resources from NBIPOSH
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: posn
          in: query
          required: true
          schema:
            type: string
        - name: queryDate
          in: query
          required: true
          schema:
            type: string
        - name: apptPct
          in: query
          description: Appointment Percentage
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_APPT_PCT
        - name: bargCode
          in: query
          description: Bargaining Unit
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_BARG_CODE
        - name: ecipCode
          in: query
          description: Employment Category
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_ECIP_CODE
        - name: eclsCode
          in: query
          description: Employee Class
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_ECLS_CODE
        - name: esocCode
          in: query
          description: Standard Occupational Category
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_ESOC_CODE
        - name: exemptInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_EXEMPT_IND
        - name: grade
          in: query
          description: Salary Grade
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_GRADE
        - name: jblnCode
          in: query
          description: Job Location
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_JBLN_CODE
        - name: jobpCode
          in: query
          description: Job Progression
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_JOBP_CODE
        - name: pclsCode
          in: query
          description: Position Class
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_PCLS_CODE
        - name: pgrpCode
          in: query
          description: Position Group
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_PGRP_CODE
        - name: posnReports
          in: query
          description: Reports to
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_POSN_REPORTS
        - name: probationUnits
          in: query
          description: Probation Period
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_PROBATION_UNITS
        - name: step
          in: query
          description: Salary Step
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_STEP
        - name: table
          in: query
          description: Salary Table
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_TABLE
        - name: title
          in: query
          description: Position Title
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NBRPOSH_TITLE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/position-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/position-history:
    post:
      tags:
        - position-history QAPI (Query by POST)
      summary: Return resources from NBIPOSH
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
