components:
  schemas:
    errors-2.0.0:
      required:
      - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for
                  the primary data entity used to create the resource. This is useful
                  for referencing the source item through the applications administrative
                  user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: 'The detailed actionable error message. '
    student-course-maintenance-components-1.0.0_get_response:
      type: object
      properties:
        shrtckn:
          type: array
          items:
            type: object
            properties:
              crseTitle:
                title: Course Title
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_CRSE_TITLE"
                x-lineageReferenceObject: SHRTCKN_CRSE_TITLE
              crseAlias:
                title: Course Alias
                maxLength: 20
                type: string
                description: "Lineage reference object : SHRTCKN_CRSE_ALIAS, Lookup\
                  \ lineage reference object : scrcarl"
                x-lineageReferenceObject: SHRTCKN_CRSE_ALIAS
                x-lineageLookupReferenceObject: scrcarl
              divsDesc:
                title: Division Description
                type: string
              sfrstcrGrdeCode:
                title: Final
                maxLength: 6
                type: string
              sessDesc:
                title: Session Description
                type: string
              regCompletionDate:
                title: End Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTCKN_REG_COMPLETION_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTCKN_REG_COMPLETION_DATE
              schdCode:
                title: Schedule Type
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_SCHD_CODE, Lookup\
                  \ lineage reference object : stvschd,SELECT,stvschd_desc,NULL,scrschd_activity_date,FROM,stvschd,scrschd"
                x-lineageReferenceObject: SHRTCKN_SCHD_CODE
                x-lineageLookupReferenceObject: "stvschd,SELECT,stvschd_desc,NULL,scrschd_activity_date,FROM,stvschd,scrschd"
              sessCode:
                title: Session
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_SESS_CODE, Lookup\
                  \ lineage reference object : stvsess"
                x-lineageReferenceObject: SHRTCKN_SESS_CODE
                x-lineageLookupReferenceObject: stvsess
              sfrstcrGrdeCodeMid:
                title: Mid Term
                maxLength: 6
                type: string
              campCode:
                title: Campus
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_CAMP_CODE, Lookup\
                  \ lineage reference object : stvcamp"
                x-lineageReferenceObject: SHRTCKN_CAMP_CODE
                x-lineageLookupReferenceObject: stvcamp
              campCodeDesc:
                title: Campus Description
                type: string
              collDesc:
                title: College Description
                type: string
              repeatDesc:
                title: System
                maxLength: 10
                type: string
              deptDesc:
                title: Department Description
                type: string
              numberOfExtensions:
                title: Extension
                maxLength: 3
                type: number
                description: "Lineage reference object : SHRTCKN_NUMBER_OF_EXTENSIONS"
                x-lineageReferenceObject: SHRTCKN_NUMBER_OF_EXTENSIONS
              courseComment:
                title: Comment
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_COURSE_COMMENT"
                x-lineageReferenceObject: SHRTCKN_COURSE_COMMENT
              crn:
                title: CRN
                maxLength: 5
                type: string
                description: "Lineage reference object : SHRTCKN_CRN"
                x-lineageReferenceObject: SHRTCKN_CRN
              regStartDate:
                title: Start Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTCKN_REG_START_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTCKN_REG_START_DATE
              ptrmStartDate:
                title: Part of Term Start Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTCKN_PTRM_START_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTCKN_PTRM_START_DATE
              contHr:
                title: Contact Hours
                maxLength: 9
                type: number
                description: "Lineage reference object : SHRTCKN_CONT_HR"
                x-lineageReferenceObject: SHRTCKN_CONT_HR
              stspKeySequence:
                title: Study Path
                maxLength: 30
                type: number
                description: "Lineage reference object : SHRTCKN_STSP_KEY_SEQUENCE,\
