                title: Component
                maxLength: 10
                type: string
              shrmrksGrdeCode:
                title: Letter Grade
                maxLength: 6
                type: string
                description: "Lookup lineage reference object : shrgrde"
                x-lineageLookupReferenceObject: shrgrde
            x-lineageReferenceObject: shrgcom
