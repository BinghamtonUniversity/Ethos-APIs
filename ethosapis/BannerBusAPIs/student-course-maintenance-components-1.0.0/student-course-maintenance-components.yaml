                description: "Lineage reference object : SHRGCOM_PASS_IND"
                x-lineageReferenceObject: SHRGCOM_PASS_IND
              shrscomShrgcomScore:
                title: Score
                maxLength: 11
                type: number
              description:
                title: Description
                type: string
                description: "Lineage reference object : SHRGCOM_DESCRIPTION"
                x-lineageReferenceObject: SHRGCOM_DESCRIPTION
              weight:
