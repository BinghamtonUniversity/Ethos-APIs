              activityDate:
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRCMRK_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SHRCMRK_ACTIVITY_DATE
              gcmtCode:
                title: Comment
                type: string
                description: "Lineage reference object : SHRCMRK_GCMT_CODE, Lookup\
                  \ lineage reference object : stvgcmt"
                x-lineageReferenceObject: SHRCMRK_GCMT_CODE
                x-lineageLookupReferenceObject: stvgcmt
              pidm:
                type: number
                description: "Lineage reference object : SHRCMRK_PIDM"
                x-lineageReferenceObject: SHRCMRK_PIDM
              percentage:
                title: Percent
                type: number
                description: "Lineage reference object : SHRCMRK_PERCENTAGE"
                x-lineageReferenceObject: SHRCMRK_PERCENTAGE
              gchgCodeDesc:
                title: Change Reason Description
                maxLength: 200
                type: string
              rectypeInd:
                title: Midterm/Final
                type: string
                description: "Lineage reference object : SHRCMRK_RECTYPE_IND"
                x-lineageReferenceObject: SHRCMRK_RECTYPE_IND
              crn:
                type: string
                description: "Lineage reference object : SHRCMRK_CRN"
                x-lineageReferenceObject: SHRCMRK_CRN
              termCode:
                type: string
                description: "Lineage reference object : SHRCMRK_TERM_CODE"
                x-lineageReferenceObject: SHRCMRK_TERM_CODE
            x-lineageReferenceObject: shrcmrk
        shrgcom:
          type: array
          items:
            required:
            - shrmrksGchgCode
            type: object
            properties:
              shrcmrkGchgCodeDesc:
                title: Description
                maxLength: 200
                type: string
              shrmrksScore:
                title: Score
                maxLength: 10
