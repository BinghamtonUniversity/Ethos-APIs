                  \ lineage reference object : stvptrm"
                x-lineageReferenceObject: SHRTCKN_PTRM_CODE
                x-lineageLookupReferenceObject: stvptrm
              ShrtcknSubjCodeDesc:
                title: Subject Description
                type: string
              repeatCourseInd:
                title: Repeat
                maxLength: 1
                type: string
                description: "Lineage reference object : SHRTCKN_REPEAT_COURSE_IND"
                x-lineageReferenceObject: SHRTCKN_REPEAT_COURSE_IND
              seqNumb:
                title: Section
                maxLength: 3
                type: string
                description: "Lineage reference object : SHRTCKN_SEQ_NUMB"
                x-lineageReferenceObject: SHRTCKN_SEQ_NUMB
              ceuInd:
                title: Continuing Education Units
                maxLength: 1
                type: string
              longCourseTitle:
                title: Long Course Title
                maxLength: 100
                type: string
                description: "Lineage reference object : SHRTCKN_LONG_COURSE_TITLE"
                x-lineageReferenceObject: SHRTCKN_LONG_COURSE_TITLE
              ptrmEndDate:
                title: Part of Term End Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRTCKN_PTRM_END_DATE"
                format: date-time
                x-lineageReferenceObject: SHRTCKN_PTRM_END_DATE
              ptrmCodeDesc:
                title: Part of Term Description
                type: string
              divsCode:
                title: Division
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_DIVS_CODE, Lookup\
                  \ lineage reference object : stvdivs"
                x-lineageReferenceObject: SHRTCKN_DIVS_CODE
                x-lineageLookupReferenceObject: stvdivs
              collCode:
                title: College
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCKN_COLL_CODE, Lookup\
                  \ lineage reference object : stvcoll"
                x-lineageReferenceObject: SHRTCKN_COLL_CODE
                x-lineageLookupReferenceObject: stvcoll
              deptCode:
                title: Department
                maxLength: 30
                type: string
