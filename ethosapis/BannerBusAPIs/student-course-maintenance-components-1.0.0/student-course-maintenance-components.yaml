openapi: 3.0.0
info:
  title: student-course-maintenance-components
  description: API for SHATCKN administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SHATCKN
  x-source-domain: Student
  x-source-title: Student Course Maintenance
  x-source-system: banner
  x-api-type: bus-poc
servers:
