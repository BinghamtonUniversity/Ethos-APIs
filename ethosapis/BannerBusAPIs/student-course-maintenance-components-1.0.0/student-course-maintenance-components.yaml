                maxLength: 10
                type: string
                description: "Lineage reference object : SHRGCOM_NAME"
                x-lineageReferenceObject: SHRGCOM_NAME
              shrscomShrgcomName:
                title: Component
                maxLength: 10
                type: string
              shrmrksGchgCode:
                title: Change  Reason
                maxLength: 2
                type: string
                description: "Lookup lineage reference object : stvgchg"
                x-lineageLookupReferenceObject: stvgchg
              shrmrksComments:
                maxLength: 30
                type: string
