                maxLength: 10
                type: number
                description: "Lineage reference object : SHRMRKA_PERCENTAGE"
                x-lineageReferenceObject: SHRMRKA_PERCENTAGE
              extensionDate:
                title: Extension Date
                maxLength: 11
                type: string
