          description: "Lineage reference object : STVRESD_SYSTEM_REQ_IND"
          x-lineageReferenceObject: STVRESD_SYSTEM_REQ_IND
        ediEquiv:
          title: EDI Equiv
          maxLength: 1
          type: string
          description: "Lineage reference object : STVRESD_EDI_EQUIV"
          x-lineageReferenceObject: STVRESD_EDI_EQUIV
        vrMsgNo:
          title: VR Msg
          maxLength: 6
          type: number
          description: "Lineage reference object : STVRESD_VR_MSG_NO"
          x-lineageReferenceObject: STVRESD_VR_MSG_NO
        desc:
