          description: "Lineage reference object : STVRESD_VR_MSG_NO"
          x-lineageReferenceObject: STVRESD_VR_MSG_NO
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : STVRESD_DESC"
          x-lineageReferenceObject: STVRESD_DESC
      x-lineageReferenceObject: stvresd
