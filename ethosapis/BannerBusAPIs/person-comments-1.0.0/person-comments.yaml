      tags:
        - person-comments
      summary: Return resources from SPACMNT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: cmttCode
          in: query
          description: Comment Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRCMNT_CMTT_CODE
        - name: contactToTime
          in: query
          description: To Time
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRCMNT_CONTACT_TO_TIME
        - name: origCode
          in: query
          description: Originator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRCMNT_ORIG_CODE
        - name: confidentialInd
          in: query
          description: Confidentiality
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRCMNT_CONFIDENTIAL_IND
        - name: ctypCode
          in: query
          description: Contact
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRCMNT_CTYP_CODE
        - name: date
          in: query
          description: Add Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRCMNT_DATE
        - name: contactDate
          in: query
          description: Contact Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRCMNT_CONTACT_DATE
        - name: userId
          in: query
          description: Last Updated by
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRCMNT_USER_ID
        - name: contactFromTime
          in: query
          description: From Time
          required: false
          schema:
            type: string
