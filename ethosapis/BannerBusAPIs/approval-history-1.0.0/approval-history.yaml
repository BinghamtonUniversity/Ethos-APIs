openapi: 3.0.0
info:
  title: approval-history
  description: API for FOIAPHT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FOIAPHT
  x-source-domain: Finance
  x-source-title: Approval History
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/approval-history:
    get:
      tags:
        - approval-history
      summary: Return resources from FOIAPHT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: Approved Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOVAPHT_ACTIVITY_DATE
        - name: chgSeqNum
          in: query
          description: Change Sequence
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOVAPHT_CHG_SEQ_NUM
        - name: docCode
          in: query
          description: Document Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOVAPHT_DOC_CODE
        - name: docType
          in: query
          description: Document Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOVAPHT_DOC_TYPE
        - name: queueId
          in: query
          description: Queue ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOVAPHT_QUEUE_ID
        - name: queueLevel
          in: query
          description: Queue Level
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOVAPHT_QUEUE_LEVEL
        - name: submissionNumber
          in: query
          description: Submission Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOVAPHT_SUBMISSION_NUMBER
        - name: userId
          in: query
          description: Approver's ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOVAPHT_USER_ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/approval-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/approval-history:
    post:
      tags:
        - approval-history QAPI (Query by POST)
      summary: Return resources from FOIAPHT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/approval-history-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/approval-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
