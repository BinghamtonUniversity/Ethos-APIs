          maxLength: 8
          type: string
          description: "Lineage reference object : FOVAPHT_DOC_CODE"
          x-lineageReferenceObject: FOVAPHT_DOC_CODE
        origUserId:
          title: Originating User
          maxLength: 30
          type: string
        queueLevel:
          title: Queue Level
          maxLength: 4
          type: number
          description: "Lineage reference object : FOVAPHT_QUEUE_LEVEL"
          x-lineageReferenceObject: FOVAPHT_QUEUE_LEVEL
        origUserName:
