        submissionNumber:
          title: Submission Number
          maxLength: 3
          type: number
          description: "Lineage reference object : FOVAPHT_SUBMISSION_NUMBER"
          x-lineageReferenceObject: FOVAPHT_SUBMISSION_NUMBER
        queueId:
          title: Queue ID
          maxLength: 4
          type: string
          description: "Lineage reference object : FOVAPHT_QUEUE_ID"
          x-lineageReferenceObject: FOVAPHT_QUEUE_ID
        activityDate:
          title: Approved Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FOVAPHT_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FOVAPHT_ACTIVITY_DATE
        docType:
