          type: number
          description: "Lineage reference object : FOVAPHT_SUBMISSION_NUMBER"
          x-lineageReferenceObject: FOVAPHT_SUBMISSION_NUMBER
        userId:
          title: Approver's ID
          maxLength: 30
          type: string
          description: "Lineage reference object : FOVAPHT_USER_ID"
          x-lineageReferenceObject: FOVAPHT_USER_ID
    approval-history-1.0.0_get_request:
      type: object
      properties:
        chgSeqNum:
