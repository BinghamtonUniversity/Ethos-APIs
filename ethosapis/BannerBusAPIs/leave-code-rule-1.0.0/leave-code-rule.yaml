openapi: 3.0.0
info:
  title: leave-code-rule
  description: API for PTRLEAV administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: PTRLEAV
  x-source-domain: Human Resources
  x-source-title: Leave Code Rules
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/leave-code-rule:
    get:
      tags:
        - leave-code-rule
      summary: Return resources from PTRLEAV
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: Leave Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRLEAV_CODE
        - name: longDesc
          in: query
          description: Long Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRLEAV_LONG_DESC
        - name: shortDesc
          in: query
          description: Short Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRLEAV_SHORT_DESC
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRLEAV_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/leave-code-rule-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/leave-code-rule:
    post:
      tags:
        - leave-code-rule QAPI (Query by POST)
      summary: Return resources from PTRLEAV
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/leave-code-rule-1.0.0_get_request"
            example:
              code: ANNL
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/leave-code-rule-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    leave-code-rule-1.0.0_qapi_post:
      type: object
      properties:
        code:
          title: Leave Code
          maxLength: 4
          type: string
          description: "Lineage reference object : PTRLEAV_CODE"
          x-lineageReferenceObject: PTRLEAV_CODE
        longDesc:
          title: Long Description
          maxLength: 30
          type: string
          description: "Lineage reference object : PTRLEAV_LONG_DESC"
          x-lineageReferenceObject: PTRLEAV_LONG_DESC
        shortDesc:
          title: Short Description
          maxLength: 8
          type: string
          description: "Lineage reference object : PTRLEAV_SHORT_DESC"
          x-lineageReferenceObject: PTRLEAV_SHORT_DESC
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTRLEAV_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PTRLEAV_ACTIVITY_DATE
    leave-code-rule-1.0.0_get_request:
      required:
        - code
        - longDesc
        - shortDesc
        - activityDate
      type: object
      properties:
        code:
          title: Leave Code
          maxLength: 4
          type: string
          description: "Lineage reference object : PTRLEAV_CODE"
          x-lineageReferenceObject: PTRLEAV_CODE
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTRLEAV_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PTRLEAV_ACTIVITY_DATE
        shortDesc:
          title: Short Description
          maxLength: 8
          type: string
          description: "Lineage reference object : PTRLEAV_SHORT_DESC"
          x-lineageReferenceObject: PTRLEAV_SHORT_DESC
        longDesc:
          title: Long Description
          maxLength: 30
          type: string
          description: "Lineage reference object : PTRLEAV_LONG_DESC"
          x-lineageReferenceObject: PTRLEAV_LONG_DESC
      x-lineageReferenceObject: PTRLEAV
    leave-code-rule-1.0.0_get_response:
      required:
        - activityDate
        - code
        - longDesc
        - shortDesc
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTRLEAV_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PTRLEAV_ACTIVITY_DATE
        code:
          title: Leave Code
          maxLength: 4
          type: string
          description: "Lineage reference object : PTRLEAV_CODE"
          x-lineageReferenceObject: PTRLEAV_CODE
        shortDesc:
          title: Short Description
          maxLength: 8
          type: string
          description: "Lineage reference object : PTRLEAV_SHORT_DESC"
          x-lineageReferenceObject: PTRLEAV_SHORT_DESC
        longDesc:
          title: Long Description
          maxLength: 30
          type: string
          description: "Lineage reference object : PTRLEAV_LONG_DESC"
          x-lineageReferenceObject: PTRLEAV_LONG_DESC
      x-lineageReferenceObject: ptrleav
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
