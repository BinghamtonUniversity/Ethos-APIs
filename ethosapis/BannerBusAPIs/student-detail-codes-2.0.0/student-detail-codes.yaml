openapi: 3.0.0
info:
  title: student-detail-codes
  description: API for the second page of TSADETC administrative page, form TBBEACT table.
  version: 2.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: TSADETC
  x-source-domain: Student
  x-source-title: Detail Code Control Form - Student
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-detail-codes:
    get:
      tags:
        - student-detail-codes
      summary: Return resources from TSADETC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema.
          required: false
          schema:
            $ref: "#/components/schemas/student-detail-codes-2.0.0_query_request"
        - name: detailCode
          in: query
          required: true
          schema:
            type: string
        - name: effDate
          in: query
          required: false
          schema:
            type: string
        - name: tbbeactTbdcInd
          in: query
          required: false
          schema:
            type: string
        - name: tbbeactAbdcInd
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v2.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/student-detail-codes-2.0.0_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                Record exist in TBBDETC but not exist in TBBEACT:
                  $ref: '#/components/examples/RecordExistInTBBDETCButNotExistInTBBEACT'
                Invalid Parameter:
                  $ref: '#/components/examples/InvalidParameter'
        "401":
          description: Failure. Unauthorized
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                Unauthorized:
                  $ref: '#/components/examples/Unauthorized'
        "403":
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                AccessDenied:
                  $ref: '#/components/examples/AccessDenied'
        '404':
          description: Failure. Not Found.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                RecordNotFound-TBBDETC:
                  $ref: '#/components/examples/RecordNotFound-TBBDETC'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                Unsupported Version:
                  $ref: '#/components/examples/UnsupportedVersion'
        '500':
          description: Server error. Unexpected configuration or data.
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
    post:
      tags:
        - student-detail-codes
      summary: Creates a new resource in TSADETC
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v2.0.0+json:
            schema:
              $ref: "#/components/schemas/student-detail-codes-2.0.0_post_request"
            example:
              criteria.detailCode: "A1B2"
              tbbeactDetailCode: "A1B2"
              tbbeactEffDate: 2023-10-05
              TBRACCT:
                - percent: "100"
                  aCoasCode: B
                  aAcciCode: AR1
                  aRuclCode1 : CHS1
                  aRuclCode2: APS2
                  aRuclCode3: APS3
                  bCoasCode :   B
                  bRuclCode1 : CHS1
                  bRuclCode2 : APS2
                  bRuclCode3 : APS1
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v2.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/student-detail-codes-2.0.0_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
              examples:
                Invalid Parameter:
                  $ref: '#/components/examples/InvalidParameter'
                criteria.detailCode is Required:
                  $ref: '#/components/examples/criteria.detailCodeRequired'
                tbbeactEffDate is Required:
                  $ref: '#/components/examples/tbbeactEffDateRequired'
                tbbeactDetailCode is Required:
                  $ref: '#/components/examples/tbbeactDetailCodeRequired'
                percent is Required:
                  $ref: '#/components/examples/percentRequired'
                aCoasCode is Required:
                  $ref: '#/components/examples/aCoasCodeRequired'
                aRuclCode1 is Required:
                  $ref: '#/components/examples/aRuclCode1Required'
                aRuclCode2 is Required:
                  $ref: '#/components/examples/aRuclCode2Required'
                aRuclCode3 is Required:
                  $ref: '#/components/examples/aRuclCode3Required'
                bCoasCode is Required:
                  $ref: '#/components/examples/bCoasCodeRequired'
                bRuclCode1 is Required:
                  $ref: '#/components/examples/bRuclCode1Required'
                bRuclCode2 is Required:
