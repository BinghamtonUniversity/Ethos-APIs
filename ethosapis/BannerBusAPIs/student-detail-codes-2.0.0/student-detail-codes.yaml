                Designator is Required for Aid Year Based:
                  $ref: '#/components/examples/DesignatorRequiredForAidYearBased'
                Record cannot be both Aid Year Based and Term Based:
                  $ref: '#/components/examples/RecordCannotBothAidYearBasedAndTermBased'
                Percentage Value is Incorrect:
                  $ref: '#/components/examples/IncorrectPercentage'
                Percentage Total Not Equal to Hundred:
                  $ref: '#/components/examples/PercentageTotalNotEqualToHundred'
                Account A CoasCode Length is Incorrect:
                  $ref: '#/components/examples/IncorrectACoasCodeLength'
                Account A CoasCode Value is Invalid:
                  $ref: '#/components/examples/InvalidACoasCodeValue'
                Account A Index Code Value is Invalid:
                  $ref: '#/components/examples/InvalidAAcciCodeValue'
                Account A Fund Code Value is Invalid:
                  $ref: '#/components/examples/InvalidAFundCodeValue'
                Account A Organization Code Value is Invalid:
                  $ref: '#/components/examples/InvalidAOrgnCodeValue'
                Account A Account Code Value is Invalid:
                  $ref: '#/components/examples/InvalidAAcctCodeValue'
                Account A Program Code Value is Invalid:
                  $ref: '#/components/examples/InvalidAProgCodeValue'
                Account A Activity Code Value is Invalid:
                  $ref: '#/components/examples/InvalidAActvCodeValue'
                Account A Location Code Value is Invalid:
                  $ref: '#/components/examples/InvalidALocnCodeValue'
                Account A Rule Class 1 Length is Incorrect:
                  $ref: '#/components/examples/IncorrectARuclCode1Length'
                Account A Rule Class 1 Value is Invalid:
                  $ref: '#/components/examples/InvalidARuclCode1Value'
                Account A Rule Class 2 Length is Incorrect:
                  $ref: '#/components/examples/IncorrectARuclCode2Length'
                Account A Rule Class 2 Value is Invalid:
                  $ref: '#/components/examples/InvalidARuclCode2Value'
                Account A Rule Class 3 Length is Incorrect:
                  $ref: '#/components/examples/IncorrectARuclCode3Length'
                Account A Rule Class 3 Value is Invalid:
                  $ref: '#/components/examples/InvalidARuclCode3Value'
                Account B CoasCode Length is Incorrect:
                  $ref: '#/components/examples/IncorrectBCoasCodeLength'
                Account B CoasCode Value is Invalid:
                  $ref: '#/components/examples/InvalidBCoasCodeValue'
                Account B Index Code Value is Invalid:
                  $ref: '#/components/examples/InvalidBAcciCodeValue'
                Account B Fund Code Value is Invalid:
                  $ref: '#/components/examples/InvalidBFundCodeValue'
                Account B Organization Code Value is Invalid:
                  $ref: '#/components/examples/InvalidBOrgnCodeValue'
                Account B Account Code Value is Invalid:
                  $ref: '#/components/examples/InvalidBAcctCodeValue'
                Account B Program Code Value is Invalid:
                  $ref: '#/components/examples/InvalidBProgCodeValue'
                Account B Activity Code Value is Invalid:
                  $ref: '#/components/examples/InvalidBActvCodeValue'
                Account B Location Code Value is Invalid:
                  $ref: '#/components/examples/InvalidBLocnCodeValue'
                Account B Rule Class 1 Length is Incorrect:
                  $ref: '#/components/examples/IncorrectBRuclCode1Length'
                Account B Rule Class 1 Value is Invalid:
                  $ref: '#/components/examples/InvalidBRuclCode1Value'
                Account B Rule Class 2 Length is Incorrect:
                  $ref: '#/components/examples/IncorrectBRuclCode2Length'
                Account B Rule Class 2 Value is Invalid:
                  $ref: '#/components/examples/InvalidBRuclCode2Value'
                Account B Rule Class 3 Length is Incorrect:
                  $ref: '#/components/examples/IncorrectBRuclCode3Length'
                Account B Rule Class 3 Value is Invalid:
                  $ref: '#/components/examples/InvalidBRuclCode3Value'

        "401":
          description: Failure. Unauthorized
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                Unauthorized:
                  $ref: '#/components/examples/Unauthorized'
        "403":
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                AccessDenied:
                  $ref: '#/components/examples/AccessDenied'
        '404':
          description: Failure. Not Found.
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                Unsupported Version:
                  $ref: '#/components/examples/UnsupportedVersion'
        '500':
          description: Server error. Unexpected configuration or data.
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
  /qapi/student-detail-codes:
    post:
      tags:
        - student-detail-codes QAPI (Query by POST)
      summary: Return resources from TSADETC
      requestBody:
        content:
          application/vnd.hedtech.integration.v2.0.0+json:
            schema:
              $ref: "#/components/schemas/student-detail-codes-2.0.0_qapi_post_request"
            example:
              detailCode: ABC1
              effDate : 2008-06-21
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v2.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/student-detail-codes-2.0.0_response"
        "400":
          description: Failure. Bad Request. The server cannot process the request due to something that is perceived to be a client error.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                Record exist in TBBDETC but not exist in TBBEACT:
                  $ref: '#/components/examples/RecordExistInTBBDETCButNotExistInTBBEACT'
                Invalid Parameter:
                  $ref: '#/components/examples/InvalidParameter'
        "401":
          description: Failure. Unauthorized
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                Unauthorized:
                  $ref: '#/components/examples/Unauthorized'
        "403":
          description: Failure. Forbidden. The user does not have the required permissions for the resource.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                AccessDenied:
                  $ref: '#/components/examples/AccessDenied'
        '404':
          description: Failure. Not Found.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
              examples:
                Record Not Found - TBBDETC:
                  $ref: '#/components/examples/RecordNotFound-TBBDETC'
                Record Not Found - TBBEACT:
                  $ref: '#/components/examples/RecordNotFound-TBBEACT'
        '406':
          description: Failure. Not Acceptable. Unable to generate any of the client preferred media types, as indicated by the Accept request header.
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
