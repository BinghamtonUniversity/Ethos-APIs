openapi: 3.0.0
info:
  title: user-profile-lists
  description: API for FUVPROF administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FUVPROF
  x-source-domain: Finance
  x-source-title: User Profile List
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/user-profile-lists:
    get:
      tags:
        - user-profile-lists
      summary: Return resources from FUVPROF
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: |-
            Activity
            Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBPROF_ACTIVITY_DATE
        - name: coasCode
          in: query
          description: COA
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBPROF_COAS_CODE
        - name: userId
          in: query
          description: User ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBPROF_USER_ID
        - name: userName
          in: query
          description: User Name
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBPROF_USER_NAME
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/user-profile-lists-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/user-profile-lists:
    post:
      tags:
        - user-profile-lists QAPI (Query by POST)
      summary: Return resources from FUVPROF
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/user-profile-lists-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/user-profile-lists-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    user-profile-lists-1.0.0_get_response:
      type: object
      properties:
        activityDate:
          title: |-
            Activity
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FOBPROF_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FOBPROF_ACTIVITY_DATE
        coasCode:
          title: COA
          maxLength: 1
          type: string
          description: "Lineage reference object : FOBPROF_COAS_CODE, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: FOBPROF_COAS_CODE
          x-lineageLookupReferenceObject: ftvcoas
        userName:
          title: User Name
          maxLength: 35
          type: string
          description: "Lineage reference object : FOBPROF_USER_NAME"
          x-lineageReferenceObject: FOBPROF_USER_NAME
        userId:
          title: User ID
          maxLength: 35
          type: string
          description: "Lineage reference object : FOBPROF_USER_ID"
          x-lineageReferenceObject: FOBPROF_USER_ID
      x-lineageReferenceObject: fobprof
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    user-profile-lists-1.0.0_get_request:
      type: object
      properties:
        activityDate:
          title: |-
            Activity
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FOBPROF_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FOBPROF_ACTIVITY_DATE
        coasCode:
          title: COA
          maxLength: 1
          type: string
          description: "Lineage reference object : FOBPROF_COAS_CODE, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: FOBPROF_COAS_CODE
          x-lineageLookupReferenceObject: ftvcoas
        userName:
          title: User Name
          maxLength: 35
          type: string
          description: "Lineage reference object : FOBPROF_USER_NAME"
          x-lineageReferenceObject: FOBPROF_USER_NAME
        userId:
          title: User ID
          maxLength: 35
          type: string
          description: "Lineage reference object : FOBPROF_USER_ID"
          x-lineageReferenceObject: FOBPROF_USER_ID
      x-lineageReferenceObject: FOBPROF
    user-profile-lists-1.0.0_qapi_post:
      type: object
      properties:
        activityDate:
          title: |-
            Activity
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FOBPROF_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FOBPROF_ACTIVITY_DATE
        coasCode:
          title: COA
          maxLength: 1
          type: string
          description: "Lineage reference object : FOBPROF_COAS_CODE, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: FOBPROF_COAS_CODE
          x-lineageLookupReferenceObject: ftvcoas
        userId:
          title: User ID
          maxLength: 35
          type: string
          description: "Lineage reference object : FOBPROF_USER_ID"
          x-lineageReferenceObject: FOBPROF_USER_ID
        userName:
          title: User Name
          maxLength: 35
          type: string
          description: "Lineage reference object : FOBPROF_USER_NAME"
          x-lineageReferenceObject: FOBPROF_USER_NAME
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
