openapi: 3.0.0
info:
  title: batch-posting-type-codes
  description: API for RTVPTYP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: RTVPTYP
  x-source-domain: Financial Aid
  x-source-title: Batch Posting Type Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/batch-posting-type-codes:
    get:
      tags:
        - batch-posting-type-codes
      summary: Return resources from RTVPTYP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: amtReqInd
          in: query
          description: Amount Required
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_AMT_REQ_IND
        - name: code
          in: query
          description: Type Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_CODE
        - name: commentRjctCdeInd
          in: query
          description: Reject Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_COMMENT_RJCT_CDE_IND
        - name: commentRjctTypeInd
          in: query
          description: Reject Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_COMMENT_RJCT_TYPE_IND
        - name: dateReqInd
          in: query
          description: Date Required
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_DATE_REQ_IND
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_DESC
        - name: miscCde2ReqInd
          in: query
          description: Misc Code 2 Required
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_MISC_CDE_2_REQ_IND
        - name: miscCdeReqInd
          in: query
          description: Misc Code 1 Required
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_MISC_CDE_REQ_IND
        - name: periodReqInd
          in: query
          description: Period Required
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_PERIOD_REQ_IND
        - name: postCodeReqInd
          in: query
          description: Code Required
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_POST_CODE_REQ_IND
        - name: statusReqInd
          in: query
          description: Status Required
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_STATUS_REQ_IND
        - name: termReqInd
          in: query
          description: Term Required
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVPTYP_TERM_REQ_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/batch-posting-type-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/batch-posting-type-codes:
    post:
      tags:
        - batch-posting-type-codes QAPI (Query by POST)
      summary: Return resources from RTVPTYP
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
