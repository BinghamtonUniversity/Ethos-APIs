paths:
  /api/lockbox-correction-batchs:
    get:
      tags:
        - lockbox-correction-batchs
      summary: Return resources from TSALBOX
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: tbrlboxBatchNumber
          in: query
          required: false
          schema:
            type: string
        - name: tbrlboxBatchTransDate
          in: query
          description: Transaction Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRLBOX_BATCH_TRANS_DATE
        - name: calculatedTotal
          in: query
          required: false
          schema:
            type: string
        - name: tbrlboxAmount
          in: query
          description: Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRLBOX_AMOUNT
        - name: tbrlboxBatchVerifyInd
          in: query
          required: false
          schema:
            type: string
        - name: tbrlboxIdNumber
          in: query
          description: ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRLBOX_ID_NUMBER
        - name: transDate
          in: query
          required: false
          schema:
            type: string
        - name: amount
          in: query
          required: false
          schema:
            type: string
        - name: tbrlboxInvoiceNumberPaid
          in: query
          description: Invoice Number Paid
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRLBOX_INVOICE_NUMBER_PAID
        - name: tbrlboxErrorMessage
          in: query
          description: Message
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRLBOX_ERROR_MESSAGE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/lockbox-correction-batchs-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
