openapi: 3.0.0
info:
  title: institution-sponsor-account-maintenance
  description: API for FRVISAC administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: FRVISAC
  x-source-domain: Finance
  x-source-title: Institution/Sponsor Account Maintenance
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/institution-sponsor-account-maintenance:
    get:
      tags:
        - institution-sponsor-account-maintenance
      summary: Return resources from FRVISAC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: displayAgcyCode
          in: query
          required: false
          schema:
            type: string
        - name: coasCode
          in: query
          description: COA
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRVISAC_COAS_CODE
        - name: acctCode
          in: query
          description: Institution Account
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRVISAC_ACCT_CODE
        - name: sactCode
          in: query
          description: Sponsor Account
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRVISAC_SACT_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/institution-sponsor-account-maintenance-1.0.0_get_r\
                    esponse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/institution-sponsor-account-maintenance:
    post:
      tags:
        - institution-sponsor-account-maintenance QAPI (Query by POST)
      summary: Return resources from FRVISAC
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/institution-sponsor-account-maintenance-1.0.0_get_r\
                equest"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/institution-sponsor-account-maintenance-1.0.0_get_r\
                    esponse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    institution-sponsor-account-maintenance-1.0.0_get_response:
      type: object
      properties:
        key_block:
          type: array
          items:
            type: object
            properties:
              displayAgcyCode:
                title: Agency
                maxLength: 9
                type: string
                description: "Lineage reference object : displayAgcyCode"
                x-lineageReferenceObject: displayAgcyCode
              agencyName:
                maxLength: 230
                type: string
                description: "Lineage reference object : agencyName"
                x-lineageReferenceObject: agencyName
            x-lineageReferenceObject: key_block
        frvisac:
          type: array
          items:
            required:
              - acctCode
              - coasCode
              - sactCode
            type: object
            properties:
              displaySactDesc:
                type: string
              coasCode:
                title: COA
                maxLength: 30
                type: string
                description: "Lineage reference object : FRVISAC_COAS_CODE, Lookup lineage
                  reference object : ftvcoas"
                x-lineageReferenceObject: FRVISAC_COAS_CODE
                x-lineageLookupReferenceObject: ftvcoas
              sactCode:
                title: Sponsor Account
                maxLength: 30
                type: string
                description: "Lineage reference object : FRVISAC_SACT_CODE"
                x-lineageReferenceObject: FRVISAC_SACT_CODE
              displayAcctTitle:
                type: string
              acctCode:
                title: Institution Account
                maxLength: 30
                type: string
                description: "Lineage reference object : FRVISAC_ACCT_CODE"
                x-lineageReferenceObject: FRVISAC_ACCT_CODE
            x-lineageReferenceObject: frvisac
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    institution-sponsor-account-maintenance-1.0.0_qapi_post:
      type: object
      properties:
        displayAgcyCode:
          type: string
        coasCode:
          title: COA
          maxLength: 30
          type: string
          description: "Lineage reference object : FRVISAC_COAS_CODE, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: FRVISAC_COAS_CODE
          x-lineageLookupReferenceObject: ftvcoas
        acctCode:
          title: Institution Account
          maxLength: 30
          type: string
          description: "Lineage reference object : FRVISAC_ACCT_CODE"
          x-lineageReferenceObject: FRVISAC_ACCT_CODE
        sactCode:
          title: Sponsor Account
          maxLength: 30
          type: string
          description: "Lineage reference object : FRVISAC_SACT_CODE"
          x-lineageReferenceObject: FRVISAC_SACT_CODE
    institution-sponsor-account-maintenance-1.0.0_get_request:
      required:
        - coasCode
        - acctCode
        - sactCode
      type: object
      properties:
        coasCode:
          title: COA
          maxLength: 30
          type: string
          description: "Lineage reference object : FRVISAC_COAS_CODE, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: FRVISAC_COAS_CODE
          x-lineageLookupReferenceObject: ftvcoas
        sactCode:
          title: Sponsor Account
          maxLength: 30
          type: string
          description: "Lineage reference object : FRVISAC_SACT_CODE"
          x-lineageReferenceObject: FRVISAC_SACT_CODE
        displayAgcyCode:
          title: Agency
          maxLength: 9
          type: string
          description: "Lineage reference object : displayAgcyCode"
          x-lineageReferenceObject: displayAgcyCode
        acctCode:
          title: Institution Account
          maxLength: 30
          type: string
          description: "Lineage reference object : FRVISAC_ACCT_CODE"
          x-lineageReferenceObject: FRVISAC_ACCT_CODE
      x-lineageReferenceObject: FRVISAC
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
