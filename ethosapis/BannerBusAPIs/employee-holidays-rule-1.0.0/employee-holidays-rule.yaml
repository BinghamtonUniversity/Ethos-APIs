openapi: 3.0.0
info:
  title: employee-holidays-rule
  description: API for PTREHOL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: PTREHOL
  x-source-domain: Human Resources
  x-source-title: Employee Holidays Rules
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employee-holidays-rule:
    get:
      tags:
        - employee-holidays-rule
      summary: Return resources from PTREHOL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: ecls
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          description: Holiday Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTREHOL_DATE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTREHOL_DESC
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTREHOL_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/employee-holidays-rule-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/employee-holidays-rule:
    post:
      tags:
        - employee-holidays-rule QAPI (Query by POST)
      summary: Return resources from PTREHOL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/employee-holidays-rule-1.0.0_get_request"
            example:
              date: 2019-01-01
              ecls: 1
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/employee-holidays-rule-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    employee-holidays-rule-1.0.0_get_request:
      required:
        - ecls
        - date
        - desc
      type: object
      properties:
        date:
          title: Holiday Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTREHOL_DATE"
          format: date-time
          x-lineageReferenceObject: PTREHOL_DATE
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTREHOL_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PTREHOL_ACTIVITY_DATE
        ecls:
          title: Employee Class Code
          maxLength: 2
          type: string
          description: "Lineage reference object : ecls"
          x-lineageReferenceObject: ecls
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : PTREHOL_DESC"
          x-lineageReferenceObject: PTREHOL_DESC
      x-lineageReferenceObject: PTREHOL
    employee-holidays-rule-1.0.0_get_response:
      required:
        - date
        - desc
      type: object
      properties:
        date:
          title: Holiday Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTREHOL_DATE"
          format: date-time
          x-lineageReferenceObject: PTREHOL_DATE
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTREHOL_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PTREHOL_ACTIVITY_DATE
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : PTREHOL_DESC"
          x-lineageReferenceObject: PTREHOL_DESC
      x-lineageReferenceObject: ptrehol
    employee-holidays-rule-1.0.0_qapi_post:
      required:
        - ecls
      type: object
      properties:
        ecls:
          type: string
        date:
          title: Holiday Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTREHOL_DATE"
          format: date-time
          x-lineageReferenceObject: PTREHOL_DATE
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : PTREHOL_DESC"
          x-lineageReferenceObject: PTREHOL_DESC
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTREHOL_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PTREHOL_ACTIVITY_DATE
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
