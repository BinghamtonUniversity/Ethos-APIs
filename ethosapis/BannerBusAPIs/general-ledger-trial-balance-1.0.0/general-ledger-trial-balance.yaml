openapi: 3.0.0
info:
  title: general-ledger-trial-balance
  description: API for FGITBAL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FGITBAL
  x-source-domain: Finance
  x-source-title: General Ledger Trial Balance
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/general-ledger-trial-balance:
    get:
      tags:
        - general-ledger-trial-balance
      summary: Return resources from FGITBAL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblocCoasCode
          in: query
          required: true
          schema:
            type: string
        - name: keyblocFsyrCode
          in: query
          required: true
          schema:
            type: string
        - name: keyblocFundCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocAcctCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocAtypCode
          in: query
          required: false
          schema:
            type: string
        - name: fgvtbl1AcctCode
          in: query
          required: false
          schema:
            type: string
        - name: fgvtbl1AcctTitle
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/general-ledger-trial-balance-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/general-ledger-trial-balance:
    post:
      tags:
        - general-ledger-trial-balance QAPI (Query by POST)
      summary: Return resources from FGITBAL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/general-ledger-trial-balance-1.0.0_get_request"
            example:
              keyblocCoasCode: B
              keyblocFundCode: 10
              keyblocFsyrCode: 22
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/general-ledger-trial-balance-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    general-ledger-trial-balance-1.0.0_get_request:
      required:
        - keyblocCoasCode
        - keyblocFsyrCode
      type: object
      properties:
        fgvtbl1AcctTitle:
          title: Description
          maxLength: 35
          type: string
          description: "Lineage reference object : FGVTBL1_ACCT_TITLE"
          x-lineageReferenceObject: FGVTBL1_ACCT_TITLE
        keyblocCoasCode:
          title: Chart
          maxLength: 1
          type: string
          description: "Lineage reference object : keyblocCoasCode, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: keyblocCoasCode
          x-lineageLookupReferenceObject: ftvcoas
        keyblocAtypCode:
          title: Account Type
          maxLength: 2
          type: string
          description: "Lineage reference object : keyblocAtypCode, Lookup lineage
            reference object : ftvatyp"
          x-lineageReferenceObject: keyblocAtypCode
          x-lineageLookupReferenceObject: ftvatyp
        keyblocAcctCode:
          title: Account
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocAcctCode"
          x-lineageReferenceObject: keyblocAcctCode
        fgvtbl1AcctCode:
          title: Account
          maxLength: 6
          type: string
          description: "Lineage reference object : FGVTBL1_ACCT_CODE"
          x-lineageReferenceObject: FGVTBL1_ACCT_CODE
        keyblocFundCode:
          title: Fund
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocFundCode"
          x-lineageReferenceObject: keyblocFundCode
        keyblocFsyrCode:
          title: Fiscal Year
          maxLength: 2
          type: string
          description: "Lineage reference object : keyblocFsyrCode, Lookup lineage
            reference object : ftvfspd,ftvfsyr,ftvfspd"
          x-lineageReferenceObject: keyblocFsyrCode
          x-lineageLookupReferenceObject: ftvfspd,ftvfsyr,ftvfspd
      x-lineageReferenceObject: FGVTBL1_BLOCK
    general-ledger-trial-balance-1.0.0_qapi_post:
      required:
        - keyblocCoasCode
        - keyblocFsyrCode
      type: object
      properties:
        keyblocCoasCode:
          type: string
        keyblocFsyrCode:
          type: string
        keyblocFundCode:
          type: string
        keyblocAcctCode:
          type: string
        keyblocAtypCode:
          type: string
        fgvtbl1AcctCode:
          type: string
        fgvtbl1AcctTitle:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    general-ledger-trial-balance-1.0.0_get_response:
      type: object
      properties:
        fgvtbl1_block:
          type: array
          items:
            type: object
            properties:
              displayBegBal:
                title: Beginning Balance
                maxLength: 25
                type: number
              fgvtbl1AcctTitle:
                title: Description
                maxLength: 35
                type: string
                description: "Lineage reference object : FGVTBL1_ACCT_TITLE"
                x-lineageReferenceObject: FGVTBL1_ACCT_TITLE
              begDrCrDesc:
                title: Debit/Credit
                maxLength: 30
                type: string
              curDrCrDesc:
                title: Debit/Credit
                maxLength: 30
                type: string
              displayBegBalDrCr:
                title: "*"
                maxLength: 2
                type: string
              displayCurrBalDrCr:
                title: "*"
                maxLength: 2
                type: string
              fgvtbl1AcctCode:
                title: Account
                maxLength: 6
                type: string
                description: "Lineage reference object : FGVTBL1_ACCT_CODE"
                x-lineageReferenceObject: FGVTBL1_ACCT_CODE
              displayCurrBal:
                title: Current Balance
                maxLength: 25
                type: number
            x-lineageReferenceObject: fgvtbl1_block
        fgvtbl1_block_tot:
          type: array
          items:
            type: object
            properties:
              totalTitle:
                title: Total
                maxLength: 35
                type: string
                description: "Lineage reference object : totalTitle"
                x-lineageReferenceObject: totalTitle
              displayTotCurrDrCr:
                maxLength: 2
                type: string
                description: "Lineage reference object : displayTotCurrDrCr"
                x-lineageReferenceObject: displayTotCurrDrCr
              holdCurrTot:
                maxLength: 31
                type: number
                description: "Lineage reference object : holdCurrTot"
                x-lineageReferenceObject: holdCurrTot
              begTotDrCrDesc:
                maxLength: 30
                type: string
                description: "Lineage reference object : begTotDrCrDesc"
                x-lineageReferenceObject: begTotDrCrDesc
              holdBegTot:
                maxLength: 31
                type: number
                description: "Lineage reference object : holdBegTot"
                x-lineageReferenceObject: holdBegTot
              curTotDrCrDesc:
                maxLength: 30
                type: string
                description: "Lineage reference object : curTotDrCrDesc"
                x-lineageReferenceObject: curTotDrCrDesc
              displayTotBegDrCr:
                maxLength: 2
                type: string
                description: "Lineage reference object : displayTotBegDrCr"
                x-lineageReferenceObject: displayTotBegDrCr
            x-lineageReferenceObject: fgvtbl1_block_tot
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
