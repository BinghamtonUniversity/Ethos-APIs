        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - exemption-authorization
      summary: Creates a new resource in TSAEXPT
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/exemption-authorization-1.0.0_post_request"
            example:
              exemptionCode: 1
              studentExptRollInd: N
              keyblocTermCode: ZZ0002
              exemptionRollInd: N
              detailCode: EXPT
              desc: teste123
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
