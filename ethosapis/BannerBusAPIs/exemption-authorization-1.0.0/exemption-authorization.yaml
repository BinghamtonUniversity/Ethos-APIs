        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/exemption-authorization:
    post:
      tags:
        - exemption-authorization QAPI (Query by POST)
      summary: Return resources from TSAEXPT
      requestBody:
