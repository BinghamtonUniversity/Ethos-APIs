openapi: 3.0.0
info:
  title: enterprise-access-control
  description: API for GOAEACC administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: GOAEACC
  x-source-domain: Foundation
  x-source-title: Enterprise Access Controls
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/enterprise-access-control:
    get:
      tags:
        - enterprise-access-control
      summary: Return resources from GOAEACC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: username
          in: query
          description: Gobwacs User Id
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GOBEACC_USERNAME
        - name: wacsId
          in: query
          description: ID
          required: false
          schema:
            type: string
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/enterprise-access-control-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - enterprise-access-control
      summary: Creates a new resource in GOAEACC
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/enterprise-access-control-1.0.0_post_request"
            example:
              wacsId: A00083309
              username: A00083309
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/enterprise-access-control-1.0.0_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/enterprise-access-control:
    post:
      tags:
        - enterprise-access-control QAPI (Query by POST)
      summary: Return resources from GOAEACC
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/enterprise-access-control-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/enterprise-access-control-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    enterprise-access-control-1.0.0_qapi_post:
      type: object
      properties:
        username:
          title: Gobwacs User Id
          maxLength: 30
          type: string
          description: "Lineage reference object : GOBEACC_USERNAME, Lookup lineage
            reference object : all_users"
          x-lineageReferenceObject: GOBEACC_USERNAME
          x-lineageLookupReferenceObject: all_users
        wacsId:
          title: ID
          maxLength: 9
          type: string
        userId:
          type: string
        activityDate:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    enterprise-access-control-1.0.0_get_response:
      required:
        - username
      type: object
      properties:
        wacsId:
          title: ID
          maxLength: 9
          type: string
        nname:
          maxLength: 230
          type: string
        username:
          title: Gobwacs User Id
          maxLength: 30
          type: string
          description: "Lineage reference object : GOBEACC_USERNAME, Lookup lineage
            reference object : all_users"
          x-lineageReferenceObject: GOBEACC_USERNAME
          x-lineageLookupReferenceObject: all_users
      x-lineageReferenceObject: gobeacc
    enterprise-access-control-1.0.0_post_request:
      required:
        - username
      type: object
      properties:
        wacsId:
          title: ID
          maxLength: 9
          type: string
        username:
          title: Gobwacs User Id
          maxLength: 30
          type: string
          description: "Lineage reference object : GOBEACC_USERNAME, Lookup lineage
            reference object : all_users"
          x-lineageReferenceObject: GOBEACC_USERNAME
          x-lineageLookupReferenceObject: all_users
      x-lineageReferenceObject: GOBEACC
    enterprise-access-control-1.0.0_post_response:
      required:
        - username
      type: object
      properties:
        wacsId:
          title: ID
          maxLength: 9
          type: string
        nname:
          maxLength: 230
          type: string
        username:
          title: Gobwacs User Id
          maxLength: 30
          type: string
          description: "Lineage reference object : GOBEACC_USERNAME, Lookup lineage
            reference object : all_users"
          x-lineageReferenceObject: GOBEACC_USERNAME
          x-lineageLookupReferenceObject: all_users
      x-lineageReferenceObject: gobeacc
    enterprise-access-control-1.0.0_get_request:
      required:
        - username
        - activityDate
      type: object
      properties:
        wacsId:
          title: ID
          maxLength: 9
          type: string
        activityDate:
          title: Gobwacs Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GOBEACC_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GOBEACC_ACTIVITY_DATE
        userId:
          maxLength: 30
          type: string
          description: "Lineage reference object : GOBEACC_USER_ID"
          x-lineageReferenceObject: GOBEACC_USER_ID
        username:
          title: Gobwacs User Id
          maxLength: 30
          type: string
          description: "Lineage reference object : GOBEACC_USERNAME, Lookup lineage
            reference object : all_users"
          x-lineageReferenceObject: GOBEACC_USERNAME
          x-lineageLookupReferenceObject: all_users
      x-lineageReferenceObject: GOBEACC
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
