openapi: 3.0.0
info:
  title: application-type-codes
  description: API for STVWAPP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: STVWAPP
  x-source-domain: Student
  x-source-title: Application Type Code Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/application-type-codes:
    get:
      tags:
        - application-type-codes
      summary: Return resources from STVWAPP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVWAPP_ACTIVITY_DATE
        - name: admtCode
          in: query
          description: Admission Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVWAPP_ADMT_CODE
        - name: code
          in: query
          description: Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVWAPP_CODE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVWAPP_DESC
        - name: dispWebInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVWAPP_DISP_WEB_IND
        - name: levlCode
          in: query
          description: Level
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVWAPP_LEVL_CODE
        - name: stypCode
          in: query
          description: Student Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVWAPP_STYP_CODE
        - name: systemReqInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVWAPP_SYSTEM_REQ_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/application-type-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/application-type-codes:
    post:
      tags:
        - application-type-codes QAPI (Query by POST)
      summary: Return resources from STVWAPP
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/application-type-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/application-type-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    application-type-codes-1.0.0_get_request:
      required:
        - admtCode
        - code
        - desc
        - levlCode
        - stypCode
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : STVWAPP_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: STVWAPP_ACTIVITY_DATE
        admtCode:
          title: Admission Type
          maxLength: 30
          type: string
          description: "Lineage reference object : STVWAPP_ADMT_CODE, Lookup lineage
            reference object : stvadmt"
          x-lineageReferenceObject: STVWAPP_ADMT_CODE
          x-lineageLookupReferenceObject: stvadmt
        code:
          title: Code
          maxLength: 2
          type: string
          description: "Lineage reference object : STVWAPP_CODE"
          x-lineageReferenceObject: STVWAPP_CODE
        systemReqInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : STVWAPP_SYSTEM_REQ_IND"
          x-lineageReferenceObject: STVWAPP_SYSTEM_REQ_IND
        dispWebInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : STVWAPP_DISP_WEB_IND"
          x-lineageReferenceObject: STVWAPP_DISP_WEB_IND
        stypCode:
          title: Student Type
          maxLength: 30
          type: string
          description: "Lineage reference object : STVWAPP_STYP_CODE, Lookup lineage
            reference object : stvstyp"
          x-lineageReferenceObject: STVWAPP_STYP_CODE
          x-lineageLookupReferenceObject: stvstyp
        levlCode:
          title: Level
          maxLength: 30
          type: string
          description: "Lineage reference object : STVWAPP_LEVL_CODE, Lookup lineage
            reference object : stvlevl"
          x-lineageReferenceObject: STVWAPP_LEVL_CODE
          x-lineageLookupReferenceObject: stvlevl
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : STVWAPP_DESC"
          x-lineageReferenceObject: STVWAPP_DESC
      x-lineageReferenceObject: STVWAPP
    application-type-codes-1.0.0_qapi_post:
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : STVWAPP_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: STVWAPP_ACTIVITY_DATE
        admtCode:
