openapi: 3.0.0
info:
  title: transfer-institution-catalog-entry
  description: API for SHATATC administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SHATATC
  x-source-domain: Student
  x-source-title: Transfer Institution Catalog Entry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/transfer-institution-catalog-entry:
    get:
      tags:
        - transfer-institution-catalog-entry
      summary: Return resources from SHATATC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: sbgiCode
          in: query
          required: false
          schema:
            type: string
        - name: program
          in: query
          required: false
          schema:
            type: string
        - name: sbgiCodeDef
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/transfer-institution-catalog-entry-1.0.0_get_respon\
                    se"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/transfer-institution-catalog-entry:
    post:
      tags:
        - transfer-institution-catalog-entry QAPI (Query by POST)
      summary: Return resources from SHATATC
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/transfer-institution-catalog-entry-1.0.0_get_reques\
                t"
            example:
              sbgiCode: 1005
              program: BA-ANTHRO
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/transfer-institution-catalog-entry-1.0.0_get_respon\
                    se"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    transfer-institution-catalog-entry-1.0.0_qapi_post:
      type: object
      properties:
        sbgiCode:
          type: string
        program:
          type: string
        sbgiCodeDef:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    transfer-institution-catalog-entry-1.0.0_get_response:
      type: object
      properties:
        shrtcat:
          type: array
          items:
            required:
              - attrCde
              - attrDesc
            type: object
            properties:
              attrCde:
                title: Code
                maxLength: 4
                type: string
                description: "Lineage reference object : SHRTCAT_ATTR_CDE"
                x-lineageReferenceObject: SHRTCAT_ATTR_CDE
              attrDesc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRTCAT_ATTR_DESC"
                x-lineageReferenceObject: SHRTCAT_ATTR_DESC
            x-lineageReferenceObject: shrtcat
        shbtatc:
          type: array
          items:
            type: object
            properties:
              termCodeEffTrns:
                title: Term
                maxLength: 30
                type: string
                description: "Lineage reference object : SHBTATC_TERM_CODE_EFF_TRNS, Lookup
                  lineage reference object : stvterm"
                x-lineageReferenceObject: SHBTATC_TERM_CODE_EFF_TRNS
                x-lineageLookupReferenceObject: stvterm
              protectInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : SHBTATC_PROTECT_IND"
                x-lineageReferenceObject: SHBTATC_PROTECT_IND
              trnsHighHrs:
                title: Credits High
                maxLength: 8
                type: number
                description: "Lineage reference object : SHBTATC_TRNS_HIGH_HRS"
                x-lineageReferenceObject: SHBTATC_TRNS_HIGH_HRS
              crseNumbTrns:
                title: Course
                maxLength: 60
                type: string
                description: "Lineage reference object : SHBTATC_CRSE_NUMB_TRNS"
                x-lineageReferenceObject: SHBTATC_CRSE_NUMB_TRNS
              trnsCatalog:
                title: Catalog
                maxLength: 4
                type: string
                description: "Lineage reference object : SHBTATC_TRNS_CATALOG"
                x-lineageReferenceObject: SHBTATC_TRNS_CATALOG
              trnsLowHrs:
                title: Credits Low
                maxLength: 8
                type: number
                description: "Lineage reference object : SHBTATC_TRNS_LOW_HRS"
                x-lineageReferenceObject: SHBTATC_TRNS_LOW_HRS
              tlvlCode:
                title: Level
                maxLength: 30
                type: string
                description: "Lineage reference object : SHBTATC_TLVL_CODE, Lookup lineage
                  reference object : stvtlvl,sorbtal,sorbtal"
                x-lineageReferenceObject: SHBTATC_TLVL_CODE
                x-lineageLookupReferenceObject: stvtlvl,sorbtal,sorbtal
              trnsTitle:
                title: Title
                maxLength: 30
                type: string
                description: "Lineage reference object : SHBTATC_TRNS_TITLE"
                x-lineageReferenceObject: SHBTATC_TRNS_TITLE
              groupPrimaryInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : SHBTATC_GROUP_PRIMARY_IND"
                x-lineageReferenceObject: SHBTATC_GROUP_PRIMARY_IND
              crseDesc:
                title: Course Description
                maxLength: 32767
                type: string
                description: "Lineage reference object : SHBTATC_CRSE_DESC"
                x-lineageReferenceObject: SHBTATC_CRSE_DESC
              trnsReviewInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : SHBTATC_TRNS_REVIEW_IND"
                x-lineageReferenceObject: SHBTATC_TRNS_REVIEW_IND
              tgrdCodeMin:
                title: Minimum Grade
                maxLength: 30
                type: string
                description: "Lineage reference object : SHBTATC_TGRD_CODE_MIN, Lookup lineage
                  reference object : shrtgrd,shrtgrd,shrtgrd"
                x-lineageReferenceObject: SHBTATC_TGRD_CODE_MIN
                x-lineageLookupReferenceObject: shrtgrd,shrtgrd,shrtgrd
              subjCodeTrns:
                title: Subject
                maxLength: 60
                type: string
                description: "Lineage reference object : SHBTATC_SUBJ_CODE_TRNS"
                x-lineageReferenceObject: SHBTATC_SUBJ_CODE_TRNS
              group:
                title: Group
                maxLength: 2
                type: string
                description: "Lineage reference object : SHBTATC_GROUP"
                x-lineageReferenceObject: SHBTATC_GROUP
              tastCode:
                title: Status
                maxLength: 30
                type: string
                description: "Lineage reference object : SHBTATC_TAST_CODE, Lookup lineage
                  reference object : stvtast"
                x-lineageReferenceObject: SHBTATC_TAST_CODE
                x-lineageLookupReferenceObject: stvtast
            x-lineageReferenceObject: shbtatc
        shrtcmt:
          type: array
          items:
            type: object
            properties:
              text:
                title: Comment
                maxLength: 60
                type: string
                description: "Lineage reference object : SHRTCMT_TEXT"
                x-lineageReferenceObject: SHRTCMT_TEXT
            x-lineageReferenceObject: shrtcmt
    transfer-institution-catalog-entry-1.0.0_get_request:
      type: object
      properties:
        sbgiCode:
          title: Institution
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocSbgiCode, Lookup lineage
            reference object : stvsbgi"
          x-lineageReferenceObject: keyblocSbgiCode
          x-lineageLookupReferenceObject: stvsbgi
        program:
          title: Program
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocProgram, Lookup lineage
            reference object : smrprle"
          x-lineageReferenceObject: keyblocProgram
          x-lineageLookupReferenceObject: smrprle
        sbgiCodeDef:
          title: Default Institution
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocSbgiCodeDef, Lookup lineage
            reference object : stvsbgi"
          x-lineageReferenceObject: keyblocSbgiCodeDef
          x-lineageLookupReferenceObject: stvsbgi
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
