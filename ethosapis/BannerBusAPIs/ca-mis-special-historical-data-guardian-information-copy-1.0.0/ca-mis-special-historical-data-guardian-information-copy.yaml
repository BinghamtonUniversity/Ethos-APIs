            lineage reference object : SVVGEDL"
          x-lineageReferenceObject: SVBSGPD_GUARD_2_GEDL_CODE
          x-lineageLookupReferenceObject: SVVGEDL
        activityDate:
          maxLength: 11
          type: string
          description: "Lineage reference object : SVBSGPD_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SVBSGPD_ACTIVITY_DATE
        guard2GedlDesc:
          type: string
        guard1GedlDesc:
          type: string
        userId:
          maxLength: 30
          type: string
