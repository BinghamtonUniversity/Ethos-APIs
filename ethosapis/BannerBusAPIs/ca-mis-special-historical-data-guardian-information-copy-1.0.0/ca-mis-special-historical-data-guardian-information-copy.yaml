    post:
      tags:
        - ca-mis-special-historical-data-guardian-information-copy
      summary: Creates a new resource in SVAMISH
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-mis-special-historical-data-guardian-information\
                -copy-1.0.0_post_request"
            example:
              guard1GedlCode: "7"
              guard2GedlCode: "8"
              id: A00036216
              svamishEffTerm: TERM19
              svamishDicdCode: "104"
              svbsgpdGuard2GedlCode: "7"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-mis-special-historical-data-guardian-information\
                    -copy-1.0.0_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-mis-special-historical-data-guardian-information-copy: {}
components:
