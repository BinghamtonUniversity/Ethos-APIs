      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-mis-special-historical-data-guardian-information-copy-1.0.0_post_response:
      type: object
      properties:
        guard1GedlCode:
