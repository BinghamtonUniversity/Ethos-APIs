paths:
  /api/curriculum-rules-module-control:
    get:
      tags:
        - curriculum-rules-module-control
      summary: Return resources from SOACURR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: termCode
          in: query
          required: false
          schema:
            type: string
        - name: currRule
          in: query
          required: false
          schema:
            type: string
        - name: program
          in: query
          required: false
          schema:
            type: string
        - name: levlCode
          in: query
          required: false
          schema:
            type: string
        - name: campCode
          in: query
          required: false
          schema:
            type: string
        - name: termCodeInit
          in: query
          required: false
          schema:
            type: string
        - name: collCode
          in: query
          required: false
          schema:
            type: string
        - name: degcCode
          in: query
          required: false
          schema:
            type: string
        - name: primRollInd
          in: query
          required: false
          schema:
            type: string
        - name: secdRollInd
          in: query
          required: false
          schema:
            type: string
        - name: lockInd
          in: query
          required: false
          schema:
            type: string
        - name: studyPathInd
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
