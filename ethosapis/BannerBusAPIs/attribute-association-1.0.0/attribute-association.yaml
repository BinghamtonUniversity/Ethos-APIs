openapi: 3.0.0
info:
  title: attribute-association
  description: API for FTMFATA administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FTMFATA
  x-source-domain: Finance
  x-source-title: FOAPAL Attribute Association
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/attribute-association:
    get:
      tags:
        - attribute-association
      summary: Return resources from FTMFATA
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: coas
          in: query
          required: false
          schema:
            type: string
        - name: foapalType
          in: query
          required: false
          schema:
            type: string
        - name: foapalCode
          in: query
          required: false
          schema:
            type: string
        - name: ftrfndaAtttCode
          in: query
          description: Ftrfnda Attt Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTRFNDA_ATTT_CODE
        - name: ftrfndaAttvCode
          in: query
          description: Ftrfnda Attv Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTRFNDA_ATTV_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/attribute-association-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/attribute-association:
    post:
      tags:
        - attribute-association QAPI (Query by POST)
      summary: Return resources from FTMFATA
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/attribute-association-1.0.0_get_request"
            example:
              coas: B
              foapalCode: 1
              foapalType: F
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/attribute-association-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    attribute-association-1.0.0_qapi_post:
      type: object
      properties:
        coas:
          type: string
        foapalType:
          type: string
        foapalCode:
          type: string
        ftrfndaAtttCode:
          title: Ftrfnda Attt Code
          maxLength: 30
          type: string
          description: "Lineage reference object : FTRFNDA_ATTT_CODE, Lookup lineage
            reference object : ftvsatv"
          x-lineageReferenceObject: FTRFNDA_ATTT_CODE
          x-lineageLookupReferenceObject: ftvsatv
        ftrfndaAttvCode:
          title: Ftrfnda Attv Code
          maxLength: 30
          type: string
          description: "Lineage reference object : FTRFNDA_ATTV_CODE, Lookup lineage
            reference object : ftrattv"
          x-lineageReferenceObject: FTRFNDA_ATTV_CODE
          x-lineageLookupReferenceObject: ftrattv
    attribute-association-1.0.0_get_request:
      required:
        - coas
      type: object
      properties:
        coas:
          title: Chart of Accounts
          maxLength: 30
          type: string
          description: "Lineage reference object : coasCode, Lookup lineage reference
            object : ftvcoas"
          x-lineageReferenceObject: coasCode
          x-lineageLookupReferenceObject: ftvcoas
        foapalCode:
          maxLength: 35
          type: string
          description: "Lineage reference object : foapalCode"
          x-lineageReferenceObject: foapalCode
        ftrfndaAttvCode:
          title: Ftrfnda Attv Code
          maxLength: 30
          type: string
          description: "Lineage reference object : FTRFNDA_ATTV_CODE, Lookup lineage
            reference object : ftrattv"
          x-lineageReferenceObject: FTRFNDA_ATTV_CODE
          x-lineageLookupReferenceObject: ftrattv
        foapalType:
          maxLength: 30
          type: string
          description: "Lineage reference object : foapalType"
          x-lineageReferenceObject: foapalType
        ftrfndaAtttCode:
          title: Ftrfnda Attt Code
          maxLength: 30
          type: string
          description: "Lineage reference object : FTRFNDA_ATTT_CODE, Lookup lineage
            reference object : ftvsatv"
          x-lineageReferenceObject: FTRFNDA_ATTT_CODE
          x-lineageLookupReferenceObject: ftvsatv
      x-lineageReferenceObject: FTRFNDA_TYPE
    attribute-association-1.0.0_get_response:
      type: object
      properties:
        attvDesc:
          title: Description
          maxLength: 50
          type: string
        beginDate:
          title: Begin Date
          maxLength: 11
          type: string
          format: date-time
        atttStatusInd:
          maxLength: 30
          type: string
        ftrfndaAttvCode:
          title: Ftrfnda Attv Code
          maxLength: 30
          type: string
          description: "Lineage reference object : FTRFNDA_ATTV_CODE, Lookup lineage
            reference object : ftrattv"
          x-lineageReferenceObject: FTRFNDA_ATTV_CODE
          x-lineageLookupReferenceObject: ftrattv
        endDate:
          title: End Date
          maxLength: 11
          type: string
          format: date-time
        ftrfndaAtttCode:
          title: Ftrfnda Attt Code
          maxLength: 30
          type: string
          description: "Lineage reference object : FTRFNDA_ATTT_CODE, Lookup lineage
            reference object : ftvsatv"
          x-lineageReferenceObject: FTRFNDA_ATTT_CODE
          x-lineageLookupReferenceObject: ftvsatv
        atttDesc:
          title: Description
          maxLength: 50
          type: string
      x-lineageReferenceObject: ftrfnda_type
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
