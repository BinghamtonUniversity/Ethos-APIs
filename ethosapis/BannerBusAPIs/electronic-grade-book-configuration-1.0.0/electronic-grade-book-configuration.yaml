    variables:
      server_url:
        default: localhost
paths:
  /api/electronic-grade-book-configuration:
    get:
      tags:
        - electronic-grade-book-configuration
      summary: Return resources from SHAEGBC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: ssasectTermCode
          in: query
          required: false
          schema:
            type: string
        - name: ssasectCrn
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/electronic-grade-book-configuration-1.0.0_get_respo\
                    nse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - electronic-grade-book-configuration
      summary: Updates an existing resource in SHAEGBC
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/electronic-grade-book-configuration-1.0.0_put_reque\
                st"
            example:
              compLateRule: BOTS_DEMOS
              compResitRule: BOTS_DEMOS
              scoreOpenDate: 2021-05-26
              reasGrdePubDate: 2021-05-26
              reasScoreOpenDate: 2021-05-26
              ssasectCrn: 52012
              reasScoreCtofDate: 2021-05-26
              detGrdePubDate: 2021-05-26
              scoreCutoffDate: 2021-05-26
              reasScoreCutoffDate: 2021-05-26
              reasDetGrdePubDate: 2021-05-26
              subResitRule: BOTS_DEMOS
              ssasectTermCode: 201520
              finScoreCutoff: 2016-07-31
              finalGrdePubDate: 2021-05-26
              reasDetGrdPbDate: 2021-05-26
              subLateRule: BOTS_DEMOS
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
