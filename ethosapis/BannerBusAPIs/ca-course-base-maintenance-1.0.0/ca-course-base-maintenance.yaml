      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-course-base-maintenance-1.0.0_put_request:
      required:
        - criteria.termCodeStart
        - criteria.termCodeEnd
        - termCodeStart
        - termCodeEnd
      type: object
      properties:
        termCodeStart:
          title: Start Term
          maxLength: 30
          type: string
          description: "Lineage reference object : SCBCRKY_TERM_CODE_START, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: SCBCRKY_TERM_CODE_START
          x-lineageLookupReferenceObject: stvterm
        scacrseCrseNumb:
