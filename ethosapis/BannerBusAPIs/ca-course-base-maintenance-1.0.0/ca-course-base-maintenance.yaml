        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-course-base-maintenance:
    post:
      tags:
        - ca-course-base-maintenance QAPI (Query by POST)
      summary: Return resources from SCABASE
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
