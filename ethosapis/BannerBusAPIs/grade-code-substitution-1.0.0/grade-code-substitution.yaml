                maxLength: 2
                type: string
                description: "Lineage reference object : SHRGRDE_LEVL_CODE, Lookup lineage
                  reference object : stvlevl"
                x-lineageReferenceObject: SHRGRDE_LEVL_CODE
                x-lineageLookupReferenceObject: stvlevl
            x-lineageReferenceObject: shrgrde
        shrgrds:
          type: array
