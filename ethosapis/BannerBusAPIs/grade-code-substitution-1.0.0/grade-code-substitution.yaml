                maxLength: 7
                type: string
                description: "Lineage reference object : SHRGRDE_ABBREV"
                x-lineageReferenceObject: SHRGRDE_ABBREV
              termCodeEffective:
                title: Effective Term
                maxLength: 6
                type: string
                description: "Lineage reference object : SHRGRDE_TERM_CODE_EFFECTIVE, Lookup
                  lineage reference object : stvterm"
                x-lineageReferenceObject: SHRGRDE_TERM_CODE_EFFECTIVE
                x-lineageLookupReferenceObject: stvterm
              grdeStatusInd:
                title: Status
                maxLength: 1
                type: string
                description: "Lineage reference object : SHRGRDE_GRDE_STATUS_IND"
                x-lineageReferenceObject: SHRGRDE_GRDE_STATUS_IND
              levlCode:
