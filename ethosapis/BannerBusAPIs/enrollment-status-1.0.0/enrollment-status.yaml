openapi: 3.0.0
info:
  title: enrollment-status
  description: API for SFQESTS administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SFQESTS
  x-source-domain: Student
  x-source-title: Enrollment Status Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/enrollment-status:
    get:
      tags:
        - enrollment-status
      summary: Return resources from SFQESTS
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: globalTerm
          in: query
          required: false
          schema:
            type: string
        - name: globalDate
          in: query
          required: false
          schema:
            type: string
        - name: xxxxxxxtermcode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/enrollment-status-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/enrollment-status:
    post:
      tags:
        - enrollment-status QAPI (Query by POST)
      summary: Return resources from SFQESTS
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/enrollment-status-1.0.0_get_request"
            example:
              xxxxxxxtermcode: 201520
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/enrollment-status-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    enrollment-status-1.0.0_get_request:
      type: object
      properties:
        xxxxxxxtermcode:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : xxxxxxxTermCode"
          x-lineageReferenceObject: xxxxxxxTermCode
      x-lineageReferenceObject: KEY_BLOCK
    enrollment-status-1.0.0_get_response:
      type: object
      properties:
        sfbests:
          type: array
          items:
            type: object
            properties:
              estsCode:
                title: Status Code
                maxLength: 30
                type: string
                description: "Lineage reference object : SFBESTS_ESTS_CODE, Lookup lineage
                  reference object : stvests"
                x-lineageReferenceObject: SFBESTS_ESTS_CODE
                x-lineageLookupReferenceObject: stvests
              endDate:
                title: End Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SFBESTS_END_DATE"
                format: date-time
                x-lineageReferenceObject: SFBESTS_END_DATE
              stvestsDesc:
                title: Description
                type: string
              startDate:
                title: Start Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SFBESTS_START_DATE"
                format: date-time
                x-lineageReferenceObject: SFBESTS_START_DATE
            x-lineageReferenceObject: sfbests
        sfbrfst:
          type: array
          items:
            type: object
            properties:
              estsCode:
                title: Status
                maxLength: 2
                type: string
                description: "Lineage reference object : SFBRFST_ESTS_CODE, Lookup lineage
                  reference object : stvests"
                x-lineageReferenceObject: SFBRFST_ESTS_CODE
                x-lineageLookupReferenceObject: stvests
              fromDate:
                title: Start Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SFBRFST_FROM_DATE"
                format: date-time
                x-lineageReferenceObject: SFBRFST_FROM_DATE
              feesRefund:
                title: Percentage Fees Refund
                maxLength: 3
                type: number
                description: "Lineage reference object : SFBRFST_FEES_REFUND"
                x-lineageReferenceObject: SFBRFST_FEES_REFUND
              toDate:
                title: End Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SFBRFST_TO_DATE"
                format: date-time
                x-lineageReferenceObject: SFBRFST_TO_DATE
              tuitRefund:
                title: Percentage Tuition Refund
                maxLength: 3
                type: number
                description: "Lineage reference object : SFBRFST_TUIT_REFUND"
                x-lineageReferenceObject: SFBRFST_TUIT_REFUND
            x-lineageReferenceObject: sfbrfst
    enrollment-status-1.0.0_qapi_post:
      type: object
      properties:
        globalTerm:
          type: string
        globalDate:
          type: string
        xxxxxxxtermcode:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
