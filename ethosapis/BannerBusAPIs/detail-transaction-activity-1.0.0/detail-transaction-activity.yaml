openapi: 3.0.0
info:
  title: detail-transaction-activity
  description: API for FGITRND administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FGITRND
  x-source-domain: Finance
  x-source-title: Detail Transaction Activity
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/detail-transaction-activity:
    get:
      tags:
        - detail-transaction-activity
      summary: Return resources from FGITRND
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckCoasCode
          in: query
          required: true
          schema:
            type: string
        - name: keyblckFsyrCode
          in: query
          required: true
          schema:
            type: string
        - name: keyblckAcciCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblckFundCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblckOrgnCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblckAcctCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblckProgCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblckActvCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblckLocnCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblckPeriod
          in: query
          required: false
          schema:
            type: string
        - name: keyblckCmtType
          in: query
          required: false
          schema:
            type: string
        - name: displayAcctCode
          in: query
          description: Account
          required: false
          schema:
            type: string
        - name: orgnCode
          in: query
          description: Organization
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGVTRND_ORGN_CODE
        - name: displayProgCode
          in: query
          description: Program
          required: false
          schema:
            type: string
        - name: fieldDesc
          in: query
          description: Field
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGVTRND_FIELD_DESC
        - name: transAmt
          in: query
          description: Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGVTRND_TRANS_AMT
        - name: drCrInd
          in: query
          description: Increase (+) or Decrease (-)
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGVTRND_DR_CR_IND
        - name: ruclCode
          in: query
          description: Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGVTRND_RUCL_CODE
        - name: transDate
          in: query
          description: Transaction Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGVTRND_TRANS_DATE
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGVTRND_ACTIVITY_DATE
        - name: docCode
          in: query
          description: Document
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGVTRND_DOC_CODE
        - name: transDesc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGVTRND_TRANS_DESC
        - name: fundCode
          in: query
          description: Fund
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGVTRND_FUND_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/detail-transaction-activity-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/detail-transaction-activity:
    post:
      tags:
        - detail-transaction-activity QAPI (Query by POST)
      summary: Return resources from FGITRND
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/detail-transaction-activity-1.0.0_get_request"
            example:
              keyblckCoasCode: B
              keyblckFsyrCode: 22
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/detail-transaction-activity-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    detail-transaction-activity-1.0.0_get_request:
      required:
        - transDate
        - activityDate
        - docCode
        - fundCode
      type: object
      properties:
        keyblckFundCode:
          title: Fund
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckFundCode"
          x-lineageReferenceObject: keyblckFundCode
        keyblckLocnCode:
          title: Location
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckLocnCode"
          x-lineageReferenceObject: keyblckLocnCode
        keyblckCoasCode:
          title: COA
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckCoasCode, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: keyblckCoasCode
          x-lineageLookupReferenceObject: ftvcoas
        keyblckProgCode:
          title: Program
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckProgCode"
          x-lineageReferenceObject: keyblckProgCode
        keyblckFsyrCode:
          title: Fiscal Year
          maxLength: 2
          type: string
          description: "Lineage reference object : keyblckFsyrCode, Lookup lineage
            reference object : ftvfspd,ftvfsyr,ftvfspd"
          x-lineageReferenceObject: keyblckFsyrCode
          x-lineageLookupReferenceObject: ftvfspd,ftvfsyr,ftvfspd
        keyblckAcciCode:
          title: Index
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckAcciCode, Lookup lineage
            reference object : ftvacci"
          x-lineageReferenceObject: keyblckAcciCode
          x-lineageLookupReferenceObject: ftvacci
        fieldDesc:
          title: Field
          maxLength: 3
          type: string
          description: "Lineage reference object : FGVTRND_FIELD_DESC"
          x-lineageReferenceObject: FGVTRND_FIELD_DESC
        docCode:
          title: Document
          maxLength: 8
          type: string
          description: "Lineage reference object : FGVTRND_DOC_CODE"
          x-lineageReferenceObject: FGVTRND_DOC_CODE
        keyblckActvCode:
          title: Activity
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckActvCode"
          x-lineageReferenceObject: keyblckActvCode
        displayProgCode:
          title: Program
          maxLength: 6
          type: string
        orgnCode:
          title: Organization
          maxLength: 6
          type: string
          description: "Lineage reference object : FGVTRND_ORGN_CODE"
          x-lineageReferenceObject: FGVTRND_ORGN_CODE
        displayAcctCode:
          title: Account
          maxLength: 6
          type: string
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FGVTRND_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FGVTRND_ACTIVITY_DATE
        keyblckPeriod:
          title: Period
          maxLength: 2
          type: string
          description: "Lineage reference object : keyblckPeriod"
          x-lineageReferenceObject: keyblckPeriod
        fundCode:
          title: Fund
          maxLength: 6
          type: string
          description: "Lineage reference object : FGVTRND_FUND_CODE"
          x-lineageReferenceObject: FGVTRND_FUND_CODE
        keyblckCmtType:
          title: Commit Type
          maxLength: 1
          type: string
          description: "Lineage reference object : keyblckCmtType"
          x-lineageReferenceObject: keyblckCmtType
        transDesc:
          title: Description
          maxLength: 90
          type: string
          description: "Lineage reference object : FGVTRND_TRANS_DESC"
          x-lineageReferenceObject: FGVTRND_TRANS_DESC
        keyblckAcctCode:
          title: Account
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckAcctCode"
          x-lineageReferenceObject: keyblckAcctCode
        transAmt:
          title: Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FGVTRND_TRANS_AMT"
          x-lineageReferenceObject: FGVTRND_TRANS_AMT
        transDate:
          title: Transaction Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FGVTRND_TRANS_DATE"
          format: date-time
          x-lineageReferenceObject: FGVTRND_TRANS_DATE
        ruclCode:
          title: Type
          maxLength: 4
          type: string
          description: "Lineage reference object : FGVTRND_RUCL_CODE"
          x-lineageReferenceObject: FGVTRND_RUCL_CODE
        keyblckOrgnCode:
          title: Organization
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckOrgnCode"
          x-lineageReferenceObject: keyblckOrgnCode
        drCrInd:
          title: Increase (+) or Decrease (-)
          maxLength: 1
          type: string
          description: "Lineage reference object : FGVTRND_DR_CR_IND"
          x-lineageReferenceObject: FGVTRND_DR_CR_IND
      x-lineageReferenceObject: FGVTRND
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    detail-transaction-activity-1.0.0_qapi_post:
      required:
        - keyblckCoasCode
        - keyblckFsyrCode
      type: object
      properties:
        keyblckCoasCode:
          type: string
        keyblckFsyrCode:
          type: string
        keyblckAcciCode:
          type: string
        keyblckFundCode:
          type: string
        keyblckOrgnCode:
          type: string
        keyblckAcctCode:
          type: string
        keyblckProgCode:
          type: string
        keyblckActvCode:
          type: string
        keyblckLocnCode:
          type: string
        keyblckPeriod:
          type: string
        keyblckCmtType:
          type: string
        displayAcctCode:
          title: Account
          maxLength: 6
          type: string
        orgnCode:
          title: Organization
          maxLength: 6
          type: string
          description: "Lineage reference object : FGVTRND_ORGN_CODE"
          x-lineageReferenceObject: FGVTRND_ORGN_CODE
        displayProgCode:
          title: Program
          maxLength: 6
          type: string
        fieldDesc:
          title: Field
          maxLength: 3
          type: string
          description: "Lineage reference object : FGVTRND_FIELD_DESC"
          x-lineageReferenceObject: FGVTRND_FIELD_DESC
        transAmt:
          title: Amount
          maxLength: 25
          type: number
          description: "Lineage reference object : FGVTRND_TRANS_AMT"
          x-lineageReferenceObject: FGVTRND_TRANS_AMT
        drCrInd:
          title: Increase (+) or Decrease (-)
          maxLength: 1
          type: string
          description: "Lineage reference object : FGVTRND_DR_CR_IND"
          x-lineageReferenceObject: FGVTRND_DR_CR_IND
        ruclCode:
          title: Type
          maxLength: 4
          type: string
          description: "Lineage reference object : FGVTRND_RUCL_CODE"
          x-lineageReferenceObject: FGVTRND_RUCL_CODE
        transDate:
          title: Transaction Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FGVTRND_TRANS_DATE"
          format: date-time
          x-lineageReferenceObject: FGVTRND_TRANS_DATE
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FGVTRND_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FGVTRND_ACTIVITY_DATE
        docCode:
          title: Document
          maxLength: 8
          type: string
          description: "Lineage reference object : FGVTRND_DOC_CODE"
          x-lineageReferenceObject: FGVTRND_DOC_CODE
        transDesc:
          title: Description
          maxLength: 90
          type: string
          description: "Lineage reference object : FGVTRND_TRANS_DESC"
          x-lineageReferenceObject: FGVTRND_TRANS_DESC
        fundCode:
          title: Fund
          maxLength: 6
          type: string
          description: "Lineage reference object : FGVTRND_FUND_CODE"
          x-lineageReferenceObject: FGVTRND_FUND_CODE
    detail-transaction-activity-1.0.0_get_response:
      type: object
      properties:
        total_block:
          type: array
          items:
            type: object
            properties:
              dispTotalAmt:
                title: Total
                maxLength: 31
                type: number
                description: "Lineage reference object : dispTotalAmt"
                x-lineageReferenceObject: dispTotalAmt
              totalDrCrInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : totalDrCrInd"
                x-lineageReferenceObject: totalDrCrInd
            x-lineageReferenceObject: total_block
        fgvtrnd:
          type: array
          items:
            required:
              - activityDate
              - docCode
              - fundCode
              - transDate
            type: object
            properties:
              docCode:
                title: Document
                maxLength: 8
                type: string
                description: "Lineage reference object : FGVTRND_DOC_CODE"
                x-lineageReferenceObject: FGVTRND_DOC_CODE
              fieldDesc:
                title: Field
                maxLength: 3
                type: string
                description: "Lineage reference object : FGVTRND_FIELD_DESC"
                x-lineageReferenceObject: FGVTRND_FIELD_DESC
              displayProgCode:
                title: Program
                maxLength: 6
                type: string
              locnCode:
                title: Location
                maxLength: 30
                type: string
                description: "Lineage reference object : FGVTRND_LOCN_CODE"
                x-lineageReferenceObject: FGVTRND_LOCN_CODE
              orgnCode:
                title: Organization
                maxLength: 6
                type: string
                description: "Lineage reference object : FGVTRND_ORGN_CODE"
                x-lineageReferenceObject: FGVTRND_ORGN_CODE
              displayAcctCode:
                title: Account
                maxLength: 6
                type: string
              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FGVTRND_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: FGVTRND_ACTIVITY_DATE
              fundCode:
                title: Fund
                maxLength: 6
                type: string
                description: "Lineage reference object : FGVTRND_FUND_CODE"
                x-lineageReferenceObject: FGVTRND_FUND_CODE
              cmtType:
                title: Commit Type
                maxLength: 1
                type: string
                description: "Lineage reference object : FGVTRND_CMT_TYPE"
                x-lineageReferenceObject: FGVTRND_CMT_TYPE
              transDesc:
                title: Description
                maxLength: 90
                type: string
                description: "Lineage reference object : FGVTRND_TRANS_DESC"
                x-lineageReferenceObject: FGVTRND_TRANS_DESC
              transAmt:
                title: Amount
                maxLength: 25
                type: number
                description: "Lineage reference object : FGVTRND_TRANS_AMT"
                x-lineageReferenceObject: FGVTRND_TRANS_AMT
              transDate:
                title: Transaction Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FGVTRND_TRANS_DATE"
                format: date-time
                x-lineageReferenceObject: FGVTRND_TRANS_DATE
              ruclCode:
                title: Type
                maxLength: 4
                type: string
                description: "Lineage reference object : FGVTRND_RUCL_CODE"
                x-lineageReferenceObject: FGVTRND_RUCL_CODE
              actvCode:
                title: Activity
                maxLength: 6
                type: string
                description: "Lineage reference object : FGVTRND_ACTV_CODE"
                x-lineageReferenceObject: FGVTRND_ACTV_CODE
              drCrInd:
                title: Increase (+) or Decrease (-)
                maxLength: 1
                type: string
                description: "Lineage reference object : FGVTRND_DR_CR_IND"
                x-lineageReferenceObject: FGVTRND_DR_CR_IND
            x-lineageReferenceObject: fgvtrnd
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
