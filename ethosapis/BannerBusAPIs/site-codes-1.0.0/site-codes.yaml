openapi: 3.0.0
info:
  title: site-codes
  description: API for STVSITE administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: STVSITE
  x-source-domain: Student
  x-source-title: Site Code Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/site-codes:
    get:
      tags:
        - site-codes
      summary: Return resources from STVSITE
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: city
          in: query
          description: City
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_CITY
        - name: code
          in: query
          description: Site Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_CODE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_DESC
        - name: foreignCountry
          in: query
          description: Other Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_FOREIGN_COUNTRY
        - name: houseNumber
          in: query
          required: false
          schema:
            type: string
        - name: natnCode
          in: query
          description: Nation
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_NATN_CODE
        - name: state
          in: query
          description: State or Province
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_STATE
        - name: streetAddr1
          in: query
          description: Street Line 1
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_STREET_ADDR1
        - name: streetAddr2
          in: query
          description: Street Line 2
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_STREET_ADDR2
        - name: streetAddr3
          in: query
          description: Street Line 3
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_STREET_ADDR3
        - name: streetAddr4
          in: query
          required: false
          schema:
            type: string
        - name: zipc
          in: query
          description: ZIP or Postal Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_ZIPC
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVSITE_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/site-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/site-codes:
    post:
      tags:
        - site-codes QAPI (Query by POST)
      summary: Return resources from STVSITE
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/site-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/site-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
