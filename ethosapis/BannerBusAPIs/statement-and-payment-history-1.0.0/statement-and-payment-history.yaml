openapi: 3.0.0
info:
  title: statement-and-payment-history
  description: API for TGISTMT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TGISTMT
  x-source-domain: Student
  x-source-title: Statement and Payment History Inquiry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/statement-and-payment-history:
    get:
      tags:
        - statement-and-payment-history
      summary: Return resources from TGISTMT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: globalId
          in: query
          required: false
          schema:
            type: string
        - name: globalInstitution
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/statement-and-payment-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/statement-and-payment-history:
    post:
      tags:
        - statement-and-payment-history QAPI (Query by POST)
      summary: Return resources from TGISTMT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/statement-and-payment-history-1.0.0_get_request"
            example:
              globalId: A00030988
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/statement-and-payment-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    statement-and-payment-history-1.0.0_get_response:
      type: object
      properties:
        tbbstmt:
          type: array
          items:
            required:
              - billDate
            type: object
            properties:
              amountDue:
                title: Amount Due
                maxLength: 18
                type: number
                description: "Lineage reference object : TBBSTMT_AMOUNT_DUE"
                x-lineageReferenceObject: TBBSTMT_AMOUNT_DUE
              balance:
                title: Balance when Billed
                maxLength: 18
                type: number
                description: "Lineage reference object : TBBSTMT_BALANCE"
                x-lineageReferenceObject: TBBSTMT_BALANCE
              dueDate:
                title: Due Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBBSTMT_DUE_DATE"
                format: date-time
                x-lineageReferenceObject: TBBSTMT_DUE_DATE
              emailAddr:
                title: Email Address
                maxLength: 90
                type: string
                description: "Lineage reference object : TBBSTMT_EMAIL_ADDR"
                x-lineageReferenceObject: TBBSTMT_EMAIL_ADDR
              billDate:
                title: Bill Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBBSTMT_BILL_DATE"
                format: date-time
                x-lineageReferenceObject: TBBSTMT_BILL_DATE
              viewableInd:
                maxLength: 1
                type: string
              termCode:
                title: Term
                maxLength: 6
                type: string
                description: "Lineage reference object : TBBSTMT_TERM_CODE"
                x-lineageReferenceObject: TBBSTMT_TERM_CODE
            x-lineageReferenceObject: tbbstmt
        tbvphst:
          type: array
          items:
            required:
              - detailCode
              - termCode
            type: object
            properties:
              amount:
                title: Amount
                maxLength: 18
                type: number
                description: "Lineage reference object : TBVPHST_AMOUNT"
                x-lineageReferenceObject: TBVPHST_AMOUNT
              entryDate:
                title: Entry Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBVPHST_ENTRY_DATE"
                format: date-time
                x-lineageReferenceObject: TBVPHST_ENTRY_DATE
              billDate:
                title: Bill Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBVPHST_BILL_DATE"
                format: date-time
                x-lineageReferenceObject: TBVPHST_BILL_DATE
              detailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lineage reference object : TBVPHST_DETAIL_CODE"
                x-lineageReferenceObject: TBVPHST_DETAIL_CODE
              desc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVPHST_DESC"
                x-lineageReferenceObject: TBVPHST_DESC
              termCode:
                title: Term
                maxLength: 6
                type: string
                description: "Lineage reference object : TBVPHST_TERM_CODE"
                x-lineageReferenceObject: TBVPHST_TERM_CODE
            x-lineageReferenceObject: tbvphst
        tbraccd:
          type: array
          items:
            required:
              - detailCode
              - effectiveDate
              - entryDate
              - termCode
            type: object
            properties:
              charge:
                maxLength: 18
                type: number
              entryDate:
                title: Entry Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBRACCD_ENTRY_DATE"
                format: date-time
                x-lineageReferenceObject: TBRACCD_ENTRY_DATE
              payment:
                maxLength: 18
                type: number
              detailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lineage reference object : TBRACCD_DETAIL_CODE"
                x-lineageReferenceObject: TBRACCD_DETAIL_CODE
              effectiveDate:
                title: Effective Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBRACCD_EFFECTIVE_DATE"
                format: date-time
                x-lineageReferenceObject: TBRACCD_EFFECTIVE_DATE
              desc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBRACCD_DESC"
                x-lineageReferenceObject: TBRACCD_DESC
              termCode:
                title: Term
                maxLength: 6
                type: string
                description: "Lineage reference object : TBRACCD_TERM_CODE"
                x-lineageReferenceObject: TBRACCD_TERM_CODE
            x-lineageReferenceObject: tbraccd
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    statement-and-payment-history-1.0.0_qapi_post:
      type: object
      properties:
        globalId:
          type: string
        globalInstitution:
          type: string
    statement-and-payment-history-1.0.0_get_request:
      type: object
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
