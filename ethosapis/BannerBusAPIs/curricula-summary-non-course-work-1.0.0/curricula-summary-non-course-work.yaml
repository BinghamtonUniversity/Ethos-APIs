openapi: 3.0.0
info:
  title: curricula-summary-non-course-work
  description: API for SHADEGR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SHADEGR
  x-source-domain: Student
  x-source-title: Degree and Other Formal Awards
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/curricula-summary-non-course-work:
    get:
      tags:
        - curricula-summary-non-course-work
      summary: Return resources from SHADEGR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: dgmrSeqNo
          in: query
          required: false
          schema:
            type: string
        - name: viewCurrent
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/curricula-summary-non-course-work-1.0.0_get_respons\
                    e"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/curricula-summary-non-course-work:
    post:
      tags:
        - curricula-summary-non-course-work QAPI (Query by POST)
      summary: Return resources from SHADEGR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/curricula-summary-non-course-work-1.0.0_get_request"
            example:
              id: A00030988
              dgmrSeqNo: 1
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/curricula-summary-non-course-work-1.0.0_get_respons\
                    e"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    curricula-summary-non-course-work-1.0.0_get_response:
      type: object
      properties:
        ncrsApplInd:
          maxLength: 1
          type: string
        satInd:
          maxLength: 1
          type: string
        advrId:
          title: Advisor
          maxLength: 9
          type: string
        qpnmSeqNo:
          title: Paper
          maxLength: 3
          type: string
          description: "Lineage reference object : SHRNCRS_QPNM_SEQ_NO"
          x-lineageReferenceObject: SHRNCRS_QPNM_SEQ_NO
        ncstCode:
          title: Status Code
          maxLength: 2
          type: string
          description: "Lineage reference object : SHRNCRS_NCST_CODE, Lookup lineage
            reference object : stvncst"
          x-lineageReferenceObject: SHRNCRS_NCST_CODE
          x-lineageLookupReferenceObject: stvncst
        evenCode:
          title: Event
          maxLength: 3
          type: string
          description: "Lineage reference object : SHRNCRS_EVEN_CODE, Lookup lineage
            reference object : stveven"
          x-lineageReferenceObject: SHRNCRS_EVEN_CODE
          x-lineageLookupReferenceObject: stveven
        ncrqCode:
          title: CAPP Non-Course Requirement
          maxLength: 4
          type: string
          description: "Lineage reference object : SHRNCRS_NCRQ_CODE, Lookup lineage
            reference object : stvncrq"
          x-lineageReferenceObject: SHRNCRS_NCRQ_CODE
          x-lineageLookupReferenceObject: stvncrq
        comtCode:
          title: Committee
          maxLength: 10
          type: string
          description: "Lineage reference object : SHRNCRS_COMT_CODE, Lookup lineage
            reference object : stvcomt"
          x-lineageReferenceObject: SHRNCRS_COMT_CODE
          x-lineageLookupReferenceObject: stvcomt
        levlCode:
          title: Level
          maxLength: 2
          type: string
          description: "Lineage reference object : SHRNCRS_LEVL_CODE, Lookup lineage
            reference object : stvlevl"
          x-lineageReferenceObject: SHRNCRS_LEVL_CODE
          x-lineageLookupReferenceObject: stvlevl
        ncstDate:
          title: Status Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SHRNCRS_NCST_DATE"
          format: date-time
          x-lineageReferenceObject: SHRNCRS_NCST_DATE
        completeDate:
          title: Completed By
          maxLength: 11
          type: string
          description: "Lineage reference object : SHRNCRS_COMPLETE_DATE"
          format: date-time
          x-lineageReferenceObject: SHRNCRS_COMPLETE_DATE
      x-lineageReferenceObject: shrncrs
    curricula-summary-non-course-work-1.0.0_get_request:
      type: object
      properties:
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        dgmrSeqNo:
          title: Degree Sequence
          maxLength: 2
          type: number
          description: "Lineage reference object : dgmrSeqNo"
          x-lineageReferenceObject: dgmrSeqNo
        viewCurrent:
          title: View Current/Active Curricula
          maxLength: 30
          type: string
          description: "Lineage reference object : viewCurrent"
          x-lineageReferenceObject: viewCurrent
      x-lineageReferenceObject: KEY_BLOCK
    curricula-summary-non-course-work-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        dgmrSeqNo:
          type: string
        viewCurrent:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
