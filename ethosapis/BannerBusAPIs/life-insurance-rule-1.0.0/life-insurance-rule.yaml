          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRLIFI_INCL_OVERLOAD_JOB_IND
        - name: covMinAmt
          in: query
          description: Coverage Minimum Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRLIFI_COV_MIN_AMT
        - name: bdplCode
          in: query
          description: Plan
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRLIFI_BDPL_CODE
        - name: roundingInd
          in: query
          description: Rounding
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PTRLIFI_ROUNDING_IND
        - name: covMaxAmt
          in: query
          description: Coverage Maximum Amount
          required: false
