openapi: 3.0.0
info:
  title: gradable-component-definition
  description: API for SHAGCOM administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SHAGCOM
  x-source-domain: Student
  x-source-title: Gradable Component Definition
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/gradable-component-definition:
    get:
      tags:
        - gradable-component-definition
      summary: Return resources from SHAGCOM
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: termCode
          in: query
          required: false
          schema:
            type: string
        - name: crn
          in: query
          required: false
          schema:
            type: string
        - name: componentSort
          in: query
          required: false
          schema:
            type: string
        - name: seqNo
          in: query
          required: false
          schema:
            type: string
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: description
          in: query
          required: false
          schema:
            type: string
        - name: weight
          in: query
          required: false
          schema:
            type: string
        - name: totalScore
          in: query
          required: false
          schema:
            type: string
        - name: date
          in: query
          required: false
          schema:
            type: string
        - name: passInd
          in: query
          required: false
          schema:
            type: string
        - name: inclInd
          in: query
          required: false
          schema:
            type: string
        - name: andorSeqNo
          in: query
          required: false
          schema:
            type: string
        - name: gradeScale
          in: query
          required: false
          schema:
            type: string
        - name: compLateRule
          in: query
          required: false
          schema:
            type: string
        - name: compResitRule
          in: query
          required: false
          schema:
            type: string
        - name: minPassScore
          in: query
          required: false
          schema:
            type: string
        - name: bestOfSub
          in: query
          required: false
          schema:
            type: string
        - name: subsetOfSub
          in: query
          required: false
          schema:
            type: string
        - name: anonymousInd
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/gradable-component-definition-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - gradable-component-definition
      summary: Updates an existing resource in SHAGCOM
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
