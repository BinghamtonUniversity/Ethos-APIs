      tags:
        - gradable-component-definition
      summary: Creates a new resource in SHAGCOM
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/gradable-component-definition-1.0.0_post_request"
            example:
              date: 2021-05-27
              seqNo: 1
              passInd: Y
              name: JOHN APPLE
              description: apple
              weight: 86
              totalScore: 100
              crn: 51138
              componentSort: Y
              termCode: 201510
      responses:
        "200":
