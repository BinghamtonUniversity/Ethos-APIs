          required: false
          schema:
            type: string
          x-lineageReferenceObject: GLVEXTR_NAME
        - name: deadInd
          in: query
          required: false
          schema:
            type: string
        - name: confInd
          in: query
          required: false
          schema:
            type: string
        - name: sysInd
          in: query
          required: false
          schema:
            type: string
