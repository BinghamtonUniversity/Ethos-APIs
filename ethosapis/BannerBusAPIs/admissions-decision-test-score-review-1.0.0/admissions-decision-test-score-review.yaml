            type: string
        - name: apstCode
          in: query
          required: false
          schema:
            type: string
        - name: applDate
          in: query
          required: false
          schema:
            type: string
        - name: applNo
          in: query
          required: false
          schema:
            type: string
        - name: admtCode
          in: query
          required: false
          schema:
            type: string
        - name: sessCode
          in: query
          required: false
          schema:
            type: string
        - name: reqDocInd
          in: query
          required: false
          schema:
            type: string
        - name: applPreference
          in: query
          required: false
          schema:
            type: string
        - name: stypCode
          in: query
          required: false
          schema:
            type: string
        - name: resdCode
          in: query
          required: false
          schema:
            type: string
        - name: fullPartInd
          in: query
          required: false
          schema:
            type: string
