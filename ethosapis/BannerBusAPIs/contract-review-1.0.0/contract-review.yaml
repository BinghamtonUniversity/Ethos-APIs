              tbvrconrStuName:
                maxLength: 230
                type: string
                description: "Lineage reference object : TBVCONR_STU_NAME"
                x-lineageReferenceObject: TBVCONR_STU_NAME
              balance:
                title: Balance
                maxLength: 17
                type: number
                description: "Lineage reference object : TBVCONR_BALANCE"
                x-lineageReferenceObject: TBVCONR_BALANCE
              transDate:
                title: Trans Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBVCONR_TRANS_DATE"
                format: date-time
                x-lineageReferenceObject: TBVCONR_TRANS_DATE
              crossrefDcatCode:
