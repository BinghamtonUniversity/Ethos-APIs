                maxLength: 19
                type: number
                description: "Lineage reference object : ctlAmount"
                x-lineageReferenceObject: ctlAmount
            x-lineageReferenceObject: tbvconr_ctrl
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
