openapi: 3.0.0
info:
  title: contract-review
  description: API for TSACONR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TSACONR
  x-source-domain: Student
  x-source-title: Contract Review
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/contract-review:
    get:
      tags:
        - contract-review
      summary: Return resources from TSACONR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: contractNumber
          in: query
          required: false
          schema:
            type: string
        - name: keyblocTermCode
          in: query
          required: false
          schema:
            type: string
        - name: idstudent
          in: query
          required: false
          schema:
            type: string
        - name: stuId
          in: query
          required: false
          schema:
            type: string
        - name: tbvrconrStuName
          in: query
          required: false
          schema:
            type: string
        - name: detailCode
          in: query
          required: false
          schema:
            type: string
        - name: desc
          in: query
          required: false
          schema:
            type: string
        - name: tranNumber
          in: query
          required: false
          schema:
            type: string
        - name: transDate
          in: query
          required: false
          schema:
            type: string
        - name: termCode
          in: query
          required: false
          schema:
            type: string
        - name: contNumber
          in: query
          required: false
          schema:
            type: string
        - name: detailTranNumber
          in: query
          required: false
          schema:
            type: string
        - name: charge
          in: query
          required: false
          schema:
            type: string
        - name: balance
          in: query
          required: false
          schema:
            type: string
        - name: payment
          in: query
          required: false
          schema:
            type: string
        - name: crossrefDetailCode
          in: query
          required: false
          schema:
            type: string
        - name: crossrefSrceCode
          in: query
          required: false
          schema:
            type: string
        - name: crossrefDcatCode
          in: query
          required: false
          schema:
            type: string
        - name: cpdtInd
          in: query
          required: false
          schema:
            type: string
        - name: refundInd
          in: query
          required: false
          schema:
            type: string
        - name: finalInd
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/contract-review-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/contract-review:
    post:
      tags:
        - contract-review QAPI (Query by POST)
      summary: Return resources from TSACONR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/contract-review-1.0.0_get_request"
            example:
              idstudent: 811120606
              keyblocTermCode: 201610
              contractNumber: 1
              id: 123INC
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/contract-review-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    contract-review-1.0.0_get_response:
      type: object
      properties:
        tbvconr:
          type: array
          items:
            type: object
            properties:
              charge:
                title: Charge
                maxLength: 17
                type: number
                description: "Lineage reference object : TBVCONR_CHARGE"
                x-lineageReferenceObject: TBVCONR_CHARGE
              stuId:
                title: Student ID
                maxLength: 9
                type: string
                description: "Lineage reference object : TBVCONR_STU_ID"
                x-lineageReferenceObject: TBVCONR_STU_ID
              crossrefDetailCode:
                title: Detail Code
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVCONR_CROSSREF_DETAIL_CODE"
                x-lineageReferenceObject: TBVCONR_CROSSREF_DETAIL_CODE
              refundInd:
                title: Credit Student
                maxLength: 1
                type: string
                description: "Lineage reference object : TBVCONR_REFUND_IND"
                x-lineageReferenceObject: TBVCONR_REFUND_IND
              tranNumber:
                title: Tran Number
                maxLength: 9
                type: number
                description: "Lineage reference object : TBVCONR_TRAN_NUMBER"
                x-lineageReferenceObject: TBVCONR_TRAN_NUMBER
              detailCode:
                title: Detail Code
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVCONR_DETAIL_CODE, Lookup lineage
                  reference object : tbbdetc"
                x-lineageReferenceObject: TBVCONR_DETAIL_CODE
