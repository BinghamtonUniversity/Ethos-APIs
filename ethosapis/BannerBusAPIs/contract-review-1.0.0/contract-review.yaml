                type: number
                description: "Lineage reference object : TBVCONR_PAYMENT"
                x-lineageReferenceObject: TBVCONR_PAYMENT
              cpdtInd:
                title: Pay Detail
                maxLength: 1
                type: string
                description: "Lineage reference object : TBVCONR_CPDT_IND"
                x-lineageReferenceObject: TBVCONR_CPDT_IND
              detailTranNumber:
                title: Detail Tran
                maxLength: 40
                type: number
                description: "Lineage reference object : TBVCONR_DETAIL_TRAN_NUMBER"
                x-lineageReferenceObject: TBVCONR_DETAIL_TRAN_NUMBER
              user:
                title: User
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVCONR_USER"
                x-lineageReferenceObject: TBVCONR_USER
              contNumber:
                title: Contract Number
                maxLength: 9
                type: number
                description: "Lineage reference object : TBVCONR_CONT_NUMBER, Lookup lineage
                  reference object : tbbcont"
                x-lineageReferenceObject: TBVCONR_CONT_NUMBER
                x-lineageLookupReferenceObject: tbbcont
              desc:
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVCONR_DESC"
                x-lineageReferenceObject: TBVCONR_DESC
              termCode:
                title: Term
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVCONR_TERM_CODE, Lookup lineage
                  reference object : stvterm"
                x-lineageReferenceObject: TBVCONR_TERM_CODE
                x-lineageLookupReferenceObject: stvterm
            x-lineageReferenceObject: tbvconr
        tbvconr_ctrl:
          type: array
          items:
            type: object
            properties:
              ctlDetailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lineage reference object : ctlDetailCode"
                x-lineageReferenceObject: ctlDetailCode
              ctlDescription:
                maxLength: 30
                type: string
                description: "Lineage reference object : ctlDescription"
                x-lineageReferenceObject: ctlDescription
              queryBalance:
                title: Query Balance
                maxLength: 19
                type: number
                description: "Lineage reference object : queryBalance"
                x-lineageReferenceObject: queryBalance
              accountBalance:
                title: Account Balance
                maxLength: 19
                type: number
                description: "Lineage reference object : accountBalance"
                x-lineageReferenceObject: accountBalance
              ctlAmount:
