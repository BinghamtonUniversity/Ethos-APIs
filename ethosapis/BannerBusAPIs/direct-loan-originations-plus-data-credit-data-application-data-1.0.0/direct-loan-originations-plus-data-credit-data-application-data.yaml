openapi: 3.0.0
info:
  title: direct-loan-originations-plus-data-credit-data-application-data
  description: API for RLADLOR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: RLADLOR
  x-source-domain: Financial Aid
  x-source-title: Direct Loan Origination
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/direct-loan-originations-plus-data-credit-data-application-data:
    get:
      tags:
        - direct-loan-originations-plus-data-credit-data-application-data
      summary: Return resources from RLADLOR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: true
          schema:
            type: string
        - name: keyblckAidyCode
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/direct-loan-originations-plus-data-credit-data-appl\
                    ication-data-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/direct-loan-originations-plus-data-credit-data-application-data:
    post:
      tags:
        - direct-loan-originations-plus-data-credit-data-application-data QAPI
          (Query by POST)
      summary: Return resources from RLADLOR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/direct-loan-originations-plus-data-credit-data-appl\
                ication-data-1.0.0_get_request"
            example:
              keyblckAidyCode: 2122
              id: 204001
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/direct-loan-originations-plus-data-credit-data-appl\
                    ication-data-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    direct-loan-originations-plus-data-credit-data-application-data-1.0.0_qapi_post:
      required:
        - id
        - keyblckAidyCode
      type: object
      properties:
        id:
          type: string
        keyblckAidyCode:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    direct-loan-originations-plus-data-credit-data-application-data-1.0.0_get_response:
      type: object
      properties:
        appLoanAmt:
          title: Loan Amount
          maxLength: 14
          type: number
          description: "Lineage reference object : RLRPAPP_APP_LOAN_AMT"
          x-lineageReferenceObject: RLRPAPP_APP_LOAN_AMT
        reviewInd:
          title: Reviewed
          maxLength: 1
          type: string
          description: "Lineage reference object : RLRPAPP_REVIEW_IND"
          x-lineageReferenceObject: RLRPAPP_REVIEW_IND
        unknownLoanAmtInd:
          title: Loan Amount Unknown
          maxLength: 1
          type: string
          description: "Lineage reference object : RLRPAPP_UNKNOWN_LOAN_AMT_IND"
          x-lineageReferenceObject: RLRPAPP_UNKNOWN_LOAN_AMT_IND
        maxLoanInd:
          title: Maximum Loan
          maxLength: 1
          type: string
          description: "Lineage reference object : RLRPAPP_MAX_LOAN_IND"
          x-lineageReferenceObject: RLRPAPP_MAX_LOAN_IND
        reqAwardStartDate:
          title: Requested Award Start Date
          type: string
          description: "Lineage reference object : RLRPAPP_REQ_AWARD_START_DATE"
          format: date-time
          x-lineageReferenceObject: RLRPAPP_REQ_AWARD_START_DATE
        type:
          title: Loan Type
          maxLength: 30
          type: string
          description: "Lineage reference object : RLRPAPP_TYPE"
          x-lineageReferenceObject: RLRPAPP_TYPE
        defermentOpt:
          title: Deferment
          maxLength: 1
          type: string
          description: "Lineage reference object : RLRPAPP_DEFERMENT_OPT"
          x-lineageReferenceObject: RLRPAPP_DEFERMENT_OPT
        schoolCrBalanceOpt:
          title: School Credit Balance Option
          maxLength: 1
          type: string
          description: "Lineage reference object : RLRPAPP_SCHOOL_CR_BALANCE_OPT"
          x-lineageReferenceObject: RLRPAPP_SCHOOL_CR_BALANCE_OPT
        previousAppId:
          title: Previous PLUS Application ID
          maxLength: 10
          type: number
          description: "Lineage reference object : RLRPAPP_PREVIOUS_APP_ID"
          x-lineageReferenceObject: RLRPAPP_PREVIOUS_APP_ID
        reqAwardEndDate:
          title: Requested Award End Date
          type: string
          description: "Lineage reference object : RLRPAPP_REQ_AWARD_END_DATE"
          format: date-time
          x-lineageReferenceObject: RLRPAPP_REQ_AWARD_END_DATE
        appCompDate:
          title: Complete Date
          type: string
          description: "Lineage reference object : RLRPAPP_APP_COMP_DATE"
          format: date-time
          x-lineageReferenceObject: RLRPAPP_APP_COMP_DATE
        comment:
          title: Comment
          maxLength: 4000
          type: string
          description: "Lineage reference object : RLRPAPP_COMMENT"
          x-lineageReferenceObject: RLRPAPP_COMMENT
        documentId:
          title: PLUS Application Document ID
          maxLength: 30
          type: string
          description: "Lineage reference object : RLRPAPP_DOCUMENT_ID"
          x-lineageReferenceObject: RLRPAPP_DOCUMENT_ID
        plusAppReason:
          title: PLUS Application Reason
          maxLength: 30
          type: string
          description: "Lineage reference object : RLRPAPP_PLUS_APP_REASON"
          x-lineageReferenceObject: RLRPAPP_PLUS_APP_REASON
      x-lineageReferenceObject: rlrpapp
    direct-loan-originations-plus-data-credit-data-application-data-1.0.0_get_request:
      type: object
      properties:
        keyblckAidyCode:
          title: Aid Year
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckAidyCode, Lookup lineage
            reference object : robinst"
          x-lineageReferenceObject: keyblckAidyCode
          x-lineageLookupReferenceObject: robinst
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
