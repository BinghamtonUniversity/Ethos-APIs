openapi: 3.0.0
info:
  title: currency-codes
  description: API for GTVCURR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: GTVCURR
  x-source-domain: Foundation
  x-source-title: Currency Codes Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/currency-codes:
    get:
      tags:
        - currency-codes
      summary: Return resources from GTVCURR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: currCode
          in: query
          description: |-
            Currency
             Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVCURR_CURR_CODE
        - name: rateEffDate
          in: query
          description: |-
            Effective
            Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVCURR_RATE_EFF_DATE
        - name: rateTermDate
          in: query
          description: |-
            Termination
             Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVCURR_RATE_TERM_DATE
        - name: scodCodeIso
          in: query
          description: |-
            ISO
            Standard
            Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVCURR_SCOD_CODE_ISO
        - name: statusInd
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVCURR_STATUS_IND
        - name: title
          in: query
          description: Title
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVCURR_TITLE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/currency-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/currency-codes:
    post:
      tags:
        - currency-codes QAPI (Query by POST)
      summary: Return resources from GTVCURR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/currency-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/currency-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    currency-codes-1.0.0_get_request:
      type: object
      properties:
        rateTermDate:
          title: |-
            Termination
             Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GTVCURR_RATE_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: GTVCURR_RATE_TERM_DATE
        currCode:
          title: |-
            Currency
             Code
          maxLength: 4
          type: string
          description: "Lineage reference object : GTVCURR_CURR_CODE"
          x-lineageReferenceObject: GTVCURR_CURR_CODE
        scodCodeIso:
          title: |-
            ISO
            Standard
            Code
          maxLength: 3
          type: string
          description: "Lineage reference object : GTVCURR_SCOD_CODE_ISO"
          x-lineageReferenceObject: GTVCURR_SCOD_CODE_ISO
        statusInd:
          title: Status
          maxLength: 1
          type: string
          description: "Lineage reference object : GTVCURR_STATUS_IND"
          x-lineageReferenceObject: GTVCURR_STATUS_IND
        title:
          title: Title
          maxLength: 35
          type: string
          description: "Lineage reference object : GTVCURR_TITLE"
          x-lineageReferenceObject: GTVCURR_TITLE
        rateEffDate:
          title: |-
            Effective
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GTVCURR_RATE_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: GTVCURR_RATE_EFF_DATE
      x-lineageReferenceObject: GTVCURR
    currency-codes-1.0.0_qapi_post:
      type: object
      properties:
        currCode:
          title: |-
            Currency
             Code
          maxLength: 4
          type: string
          description: "Lineage reference object : GTVCURR_CURR_CODE"
          x-lineageReferenceObject: GTVCURR_CURR_CODE
        rateEffDate:
          title: |-
            Effective
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GTVCURR_RATE_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: GTVCURR_RATE_EFF_DATE
        rateTermDate:
          title: |-
            Termination
             Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GTVCURR_RATE_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: GTVCURR_RATE_TERM_DATE
        scodCodeIso:
          title: |-
            ISO
            Standard
            Code
          maxLength: 3
          type: string
          description: "Lineage reference object : GTVCURR_SCOD_CODE_ISO"
          x-lineageReferenceObject: GTVCURR_SCOD_CODE_ISO
        statusInd:
          title: Status
          maxLength: 1
          type: string
          description: "Lineage reference object : GTVCURR_STATUS_IND"
          x-lineageReferenceObject: GTVCURR_STATUS_IND
        title:
          title: Title
          maxLength: 35
          type: string
          description: "Lineage reference object : GTVCURR_TITLE"
          x-lineageReferenceObject: GTVCURR_TITLE
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    currency-codes-1.0.0_get_response:
      type: object
      properties:
        displayConvRate:
          title: |-
            Conversion 
             Rate Divisor
          maxLength: 31
          type: number
        rateTermDate:
          title: |-
            Termination
             Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GTVCURR_RATE_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: GTVCURR_RATE_TERM_DATE
        currCode:
          title: |-
            Currency
             Code
          maxLength: 4
          type: string
          description: "Lineage reference object : GTVCURR_CURR_CODE"
          x-lineageReferenceObject: GTVCURR_CURR_CODE
        scodCodeIso:
          title: |-
            ISO
            Standard
            Code
          maxLength: 3
          type: string
          description: "Lineage reference object : GTVCURR_SCOD_CODE_ISO"
          x-lineageReferenceObject: GTVCURR_SCOD_CODE_ISO
        statusInd:
          title: Status
          maxLength: 1
          type: string
          description: "Lineage reference object : GTVCURR_STATUS_IND"
          x-lineageReferenceObject: GTVCURR_STATUS_IND
        title:
          title: Title
          maxLength: 35
          type: string
          description: "Lineage reference object : GTVCURR_TITLE"
          x-lineageReferenceObject: GTVCURR_TITLE
        rateEffDate:
          title: |-
            Effective
            Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GTVCURR_RATE_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: GTVCURR_RATE_EFF_DATE
      x-lineageReferenceObject: gtvcurr
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
