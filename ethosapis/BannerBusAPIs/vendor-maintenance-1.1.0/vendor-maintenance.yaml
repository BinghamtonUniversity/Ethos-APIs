            example:
              effDate: 2021-08-25
              vendCheckAtypCode: "00"
              taxFormStatus: 91
              addrSeqno: 1
              ftvvendName: API
              collectTax: S
              persSSN: 112233445
              vendCheckAddrSeqno: 2
              atypCode: "00"
