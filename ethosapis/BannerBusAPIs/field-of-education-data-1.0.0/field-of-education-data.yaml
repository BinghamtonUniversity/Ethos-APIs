info:
  title: field-of-education-data
  description: API for SKADRCO administrative page
  version: 1.0.0
  x-source-name: SKADRCO
  x-source-title: Course File Data
  x-source-system: banner
  x-api-type: bus-poc
  x-release-status: ga
