openapi: 3.0.0
info:
  title: finance-person-search
  description: API for FOIIDEN administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FOIIDEN
  x-source-domain: Finance
  x-source-title: Finance Person Search
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/finance-person-search:
    get:
      tags:
        - finance-person-search
      summary: Return resources from FOIIDEN
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          description: ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_ID
        - name: lastName
          in: query
          description: Last Name
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_LAST_NAME
        - name: firstName
          in: query
          description: First Name
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_FIRST_NAME
        - name: mi
          in: query
          description: Middle Name
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_MI
        - name: changeInd
          in: query
          description: Change Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_CHANGE_IND
        - name: ntypCode
          in: query
          description: Name Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_NTYP_CODE
        - name: caseInsensitiveRg
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/finance-person-search-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/finance-person-search:
    post:
      tags:
        - finance-person-search QAPI (Query by POST)
      summary: Return resources from FOIIDEN
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/finance-person-search-1.0.0_get_request"
            example:
              id: A00075953
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/finance-person-search-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    finance-person-search-1.0.0_get_response:
      type: object
      properties:
        firstName:
          title: First Name
          maxLength: 60
          type: string
          description: "Lineage reference object : SPRIDEN_FIRST_NAME"
          x-lineageReferenceObject: SPRIDEN_FIRST_NAME
        lastName:
          title: Last Name
          maxLength: 60
          type: string
          description: "Lineage reference object : SPRIDEN_LAST_NAME"
          x-lineageReferenceObject: SPRIDEN_LAST_NAME
        changeInd:
          title: Change Type
          maxLength: 1
          type: string
          description: "Lineage reference object : SPRIDEN_CHANGE_IND"
          x-lineageReferenceObject: SPRIDEN_CHANGE_IND
        ntypCode:
          title: Name Type
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRIDEN_NTYP_CODE, Lookup lineage
            reference object : gtvntyp"
          x-lineageReferenceObject: SPRIDEN_NTYP_CODE
          x-lineageLookupReferenceObject: gtvntyp
        birthdate:
          title: Birthdate
          maxLength: 11
          type: string
          format: date-time
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : SPRIDEN_ID"
          x-lineageReferenceObject: SPRIDEN_ID
        mi:
          title: Middle Name
          maxLength: 60
          type: string
          description: "Lineage reference object : SPRIDEN_MI"
          x-lineageReferenceObject: SPRIDEN_MI
      x-lineageReferenceObject: spriden
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    finance-person-search-1.0.0_get_request:
      type: object
      properties:
        lastName:
          title: Last Name
          maxLength: 60
          type: string
          description: "Lineage reference object : SPRIDEN_LAST_NAME"
          x-lineageReferenceObject: SPRIDEN_LAST_NAME
        firstName:
          title: First Name
          maxLength: 60
          type: string
          description: "Lineage reference object : SPRIDEN_FIRST_NAME"
          x-lineageReferenceObject: SPRIDEN_FIRST_NAME
        changeInd:
          title: Change Type
          maxLength: 1
          type: string
          description: "Lineage reference object : SPRIDEN_CHANGE_IND"
          x-lineageReferenceObject: SPRIDEN_CHANGE_IND
        ntypCode:
          title: Name Type
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRIDEN_NTYP_CODE, Lookup lineage
            reference object : gtvntyp"
          x-lineageReferenceObject: SPRIDEN_NTYP_CODE
          x-lineageLookupReferenceObject: gtvntyp
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : SPRIDEN_ID"
          x-lineageReferenceObject: SPRIDEN_ID
        caseInsensitiveRg:
          maxLength: 1
          type: string
          description: "Lineage reference object : caseInsensitiveRg"
          x-lineageReferenceObject: caseInsensitiveRg
        mi:
          title: Middle Name
          maxLength: 60
          type: string
          description: "Lineage reference object : SPRIDEN_MI"
          x-lineageReferenceObject: SPRIDEN_MI
      x-lineageReferenceObject: BUTTON_CONTROL_BLOCK
    finance-person-search-1.0.0_qapi_post:
      type: object
      properties:
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : SPRIDEN_ID"
          x-lineageReferenceObject: SPRIDEN_ID
        lastName:
          title: Last Name
          maxLength: 60
          type: string
          description: "Lineage reference object : SPRIDEN_LAST_NAME"
          x-lineageReferenceObject: SPRIDEN_LAST_NAME
        firstName:
          title: First Name
          maxLength: 60
          type: string
          description: "Lineage reference object : SPRIDEN_FIRST_NAME"
          x-lineageReferenceObject: SPRIDEN_FIRST_NAME
        mi:
          title: Middle Name
          maxLength: 60
          type: string
          description: "Lineage reference object : SPRIDEN_MI"
          x-lineageReferenceObject: SPRIDEN_MI
        changeInd:
          title: Change Type
          maxLength: 1
          type: string
          description: "Lineage reference object : SPRIDEN_CHANGE_IND"
          x-lineageReferenceObject: SPRIDEN_CHANGE_IND
        ntypCode:
          title: Name Type
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRIDEN_NTYP_CODE, Lookup lineage
            reference object : gtvntyp"
          x-lineageReferenceObject: SPRIDEN_NTYP_CODE
          x-lineageLookupReferenceObject: gtvntyp
        caseInsensitiveRg:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
