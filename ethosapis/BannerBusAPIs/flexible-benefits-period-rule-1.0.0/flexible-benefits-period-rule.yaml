          x-lineageReferenceObject: PTRFLEX_CALC_FACTOR
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PTRFLEX_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PTRFLEX_ACTIVITY_DATE
        bdcaOvgCode:
