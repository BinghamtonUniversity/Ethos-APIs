          x-lineageReferenceObject: PTRFLEX_NEW_PERIOD
        curPeriod:
          title: Current Benefit Period
          maxLength: 11
          type: string
          description: "Lineage reference object : PTRFLEX_CUR_PERIOD"
          format: date-time
          x-lineageReferenceObject: PTRFLEX_CUR_PERIOD
      x-lineageReferenceObject: ptrflex
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
