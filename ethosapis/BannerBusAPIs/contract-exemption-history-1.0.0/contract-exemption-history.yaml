openapi: 3.0.0
info:
  title: contract-exemption-history
  description: API for TSIAUTH administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TSIAUTH
  x-source-domain: Student
  x-source-title: Contract/Exemption History Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/contract-exemption-history:
    get:
      tags:
        - contract-exemption-history
      summary: Return resources from TSIAUTH
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: termCode
          in: query
          description: Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCSTU_TERM_CODE
        - name: contractPriority
          in: query
          description: Priority
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCSTU_CONTRACT_PRIORITY
        - name: contractNumber
          in: query
          description: Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCSTU_CONTRACT_NUMBER
        - name: contId
          in: query
          description: Contractor ID
          required: false
          schema:
            type: string
        - name: contDesc
          in: query
          description: Description
          required: false
          schema:
            type: string
        - name: delInd
          in: query
          description: Delete
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCSTU_DEL_IND
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBCSTU_ACTIVITY_DATE
        - name: tbbestuTermCode
          in: query
          required: false
          schema:
            type: string
        - name: exemptionPriority
          in: query
          required: false
          schema:
            type: string
        - name: exemptionCode
          in: query
          required: false
          schema:
            type: string
        - name: exptDesc
          in: query
          required: false
          schema:
            type: string
        - name: tbbestuDelInd
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/contract-exemption-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/contract-exemption-history:
    post:
      tags:
        - contract-exemption-history QAPI (Query by POST)
      summary: Return resources from TSIAUTH
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/contract-exemption-history-1.0.0_get_request"
            example:
              id: HOSFA001
              termCode: 201410
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/contract-exemption-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    contract-exemption-history-1.0.0_get_request:
      required:
        - termCode
        - tbbestuTermCode
      type: object
      properties:
        exemptionCode:
          title: Code
          maxLength: 8
          type: string
          description: "Lineage reference object : TBBESTU_EXEMPTION_CODE"
          x-lineageReferenceObject: TBBESTU_EXEMPTION_CODE
        tbbestuTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBESTU_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: TBBESTU_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
        contDesc:
          title: Description
          maxLength: 30
          type: string
        tbbestuDelInd:
          title: Delete
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBESTU_DEL_IND"
          x-lineageReferenceObject: TBBESTU_DEL_IND
        contractNumber:
          title: Number
          maxLength: 10
          type: number
          description: "Lineage reference object : TBBCSTU_CONTRACT_NUMBER"
          x-lineageReferenceObject: TBBCSTU_CONTRACT_NUMBER
        exemptionPriority:
          title: Priority
          maxLength: 2
          type: number
          description: "Lineage reference object : TBBESTU_EXEMPTION_PRIORITY"
          x-lineageReferenceObject: TBBESTU_EXEMPTION_PRIORITY
        exptDesc:
          title: Description
          maxLength: 30
          type: string
        contractPriority:
          title: Priority
          maxLength: 5
          type: number
          description: "Lineage reference object : TBBCSTU_CONTRACT_PRIORITY"
          x-lineageReferenceObject: TBBCSTU_CONTRACT_PRIORITY
        contId:
          title: Contractor ID
          maxLength: 9
          type: string
        delInd:
          title: Delete
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBCSTU_DEL_IND"
          x-lineageReferenceObject: TBBCSTU_DEL_IND
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : TBBCSTU_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: TBBCSTU_ACTIVITY_DATE
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        termCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBCSTU_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: TBBCSTU_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: TBBESTU
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    contract-exemption-history-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        termCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBCSTU_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: TBBCSTU_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
        contractPriority:
          title: Priority
          maxLength: 5
          type: number
          description: "Lineage reference object : TBBCSTU_CONTRACT_PRIORITY"
          x-lineageReferenceObject: TBBCSTU_CONTRACT_PRIORITY
        contractNumber:
          title: Number
          maxLength: 10
          type: number
          description: "Lineage reference object : TBBCSTU_CONTRACT_NUMBER"
          x-lineageReferenceObject: TBBCSTU_CONTRACT_NUMBER
        contId:
          title: Contractor ID
          maxLength: 9
          type: string
        contDesc:
          title: Description
          maxLength: 30
          type: string
        delInd:
          title: Delete
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBCSTU_DEL_IND"
          x-lineageReferenceObject: TBBCSTU_DEL_IND
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : TBBCSTU_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: TBBCSTU_ACTIVITY_DATE
        tbbestuTermCode:
          type: string
        exemptionPriority:
          type: string
        exemptionCode:
          type: string
        exptDesc:
          type: string
        tbbestuDelInd:
          type: string
    contract-exemption-history-1.0.0_get_response:
      type: object
      properties:
        tbbestu:
          type: array
          items:
            required:
              - termCode
            type: object
            properties:
              exemptionCode:
                title: Code
                maxLength: 8
                type: string
                description: "Lineage reference object : TBBESTU_EXEMPTION_CODE"
                x-lineageReferenceObject: TBBESTU_EXEMPTION_CODE
              delInd:
                title: Delete
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBESTU_DEL_IND"
                x-lineageReferenceObject: TBBESTU_DEL_IND
              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBBESTU_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: TBBESTU_ACTIVITY_DATE
              exemptionPriority:
                title: Priority
                maxLength: 2
                type: number
                description: "Lineage reference object : TBBESTU_EXEMPTION_PRIORITY"
                x-lineageReferenceObject: TBBESTU_EXEMPTION_PRIORITY
              exptDesc:
                title: Description
                maxLength: 30
                type: string
              termCode:
                title: Term
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBESTU_TERM_CODE, Lookup lineage
                  reference object : stvterm"
                x-lineageReferenceObject: TBBESTU_TERM_CODE
                x-lineageLookupReferenceObject: stvterm
            x-lineageReferenceObject: tbbestu
        tbbcstu:
          type: array
          items:
            required:
              - termCode
            type: object
            properties:
              contractPriority:
                title: Priority
                maxLength: 5
                type: number
                description: "Lineage reference object : TBBCSTU_CONTRACT_PRIORITY"
                x-lineageReferenceObject: TBBCSTU_CONTRACT_PRIORITY
              contId:
                title: Contractor ID
                maxLength: 9
                type: string
              delInd:
                title: Delete
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBCSTU_DEL_IND"
                x-lineageReferenceObject: TBBCSTU_DEL_IND
              contDesc:
                title: Description
                maxLength: 30
                type: string
              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBBCSTU_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: TBBCSTU_ACTIVITY_DATE
              contractNumber:
                title: Number
                maxLength: 10
                type: number
                description: "Lineage reference object : TBBCSTU_CONTRACT_NUMBER"
                x-lineageReferenceObject: TBBCSTU_CONTRACT_NUMBER
              termCode:
                title: Term
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBCSTU_TERM_CODE, Lookup lineage
                  reference object : stvterm"
                x-lineageReferenceObject: TBBCSTU_TERM_CODE
                x-lineageLookupReferenceObject: stvterm
            x-lineageReferenceObject: tbbcstu
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
