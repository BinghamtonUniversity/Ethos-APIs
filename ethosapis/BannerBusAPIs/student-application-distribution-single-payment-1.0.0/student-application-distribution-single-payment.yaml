        - name: detailCode
          in: query
          description: Detail Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_DETAIL_CODE
        - name: tagOption
          in: query
          required: false
          schema:
            type: string
        - name: paymentId
          in: query
          required: false
          schema:
            type: string
        - name: documentNumber
          in: query
          description: Document
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_DOCUMENT_NUMBER
        - name: invNumberPaid
          in: query
          description: Invoice Number Paid
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_INV_NUMBER_PAID
        - name: holdPassword
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
