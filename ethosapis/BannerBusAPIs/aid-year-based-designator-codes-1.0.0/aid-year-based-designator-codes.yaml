          schema:
            type: string
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TTVABDS_ACTIVITY_DATE
        - name: code
          in: query
          description: Code
          required: false
