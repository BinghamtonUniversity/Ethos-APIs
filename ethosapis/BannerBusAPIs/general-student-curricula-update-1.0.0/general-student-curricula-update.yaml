openapi: 3.0.0
info:
  title: general-student-curricula-update
  description: API for SGASTDN administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SGASTDN
  x-source-domain: Student
  x-source-title: "General Student Form "
  x-source-system: banner
