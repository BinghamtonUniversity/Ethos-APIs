servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/general-student-curricula-update:
    put:
      tags:
        - general-student-curricula-update
      summary: Updates an existing resource in SGASTDN
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/general-student-curricula-update-1.0.0_put_request"
            example:
              criteria.termCodeEff: 202021
              sorlfosCactCode: ACTIVe
              tmstCode: "00"
              criteria.cactCode: ACTIVE
              termCodeMatric: 201410
              program: 1-11JZQ0
              criteria.termCode: 202021
              majrCode: "0000"
              sorlfosEndDate: 2022-01-11
              id: A00087131
              stvtermTermCode: 202021
              cactCode: ACTIVE
              sorlfosStartDate: 2022-01-01
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/general-student-curricula-update-1.0.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/general-student-curricula-update: {}
