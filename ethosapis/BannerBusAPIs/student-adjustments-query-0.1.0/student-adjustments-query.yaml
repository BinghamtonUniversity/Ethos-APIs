servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-adjustments-query:
    get:
      tags:
        - student-adjustments-query
      summary: Return resources from SMISLIB
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          description: Id
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMVSLIB_ID
        - name: name
          in: query
          description: Name
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMVSLIB_NAME
        - name: adjProgramInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMVSLIB_ADJ_PROGRAM_IND
        - name: adjAreaInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMVSLIB_ADJ_AREA_IND
        - name: adjGroupInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMVSLIB_ADJ_GROUP_IND
        - name: adjTargetInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMVSLIB_ADJ_TARGET_IND
        - name: adjWaiverInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMVSLIB_ADJ_WAIVER_IND
        - name: adjSubstInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMVSLIB_ADJ_SUBST_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v0.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/student-adjustments-query-0.1.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/student-adjustments-query:
    post:
      tags:
