              amount: 100
              stspKeySequence: 2
              keyblocTermCode: 201520
              documentNumber: 1
              invNumberPaid: 1
              detailCode: 0
              origChgInd: Y
              holdPassword: "*"
              paymentId: 1
              id: 20
              tranNumberPaid: 1
              effectiveDate: 2021-01-07
              desc: Pat test put
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
