openapi: 3.0.0
info:
  title: student-payment
  description: API for TSASPAY administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TSASPAY
  x-source-domain: Student
  x-source-title: Student Payment
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-payment:
    get:
      tags:
        - student-payment
      summary: Return resources from TSASPAY
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblocTermCode
          in: query
          required: true
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: holdPassword
          in: query
          required: false
          schema:
            type: string
        - name: detailCode
          in: query
          description: Detail Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_DETAIL_CODE
        - name: currCodeV
          in: query
          description: Currency
          required: false
          schema:
            type: string
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_DESC
        - name: amount
          in: query
          description: Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_AMOUNT
        - name: taxAmount
          in: query
          description: Tax
          required: false
          schema:
            type: string
        - name: taxMethod
          in: query
          description: Tax Method
          required: false
          schema:
            type: string
        - name: stspKeySequence
          in: query
          required: false
          schema:
            type: string
        - name: tranNumberPaid
          in: query
          description: Trans Paid
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_TRAN_NUMBER_PAID
        - name: srceCode
          in: query
          description: Source Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_SRCE_CODE
        - name: crossrefNumber
          in: query
          description: Cross Reference Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_CROSSREF_NUMBER
        - name: crossrefDetailCode
          in: query
          description: Cross Reference Detail
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_CROSSREF_DETAIL_CODE
        - name: crossrefDcatCode
          in: query
          description: Cross Reference Category
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_CROSSREF_DCAT_CODE
        - name: effectiveDate
          in: query
          description: Effective Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_EFFECTIVE_DATE
        - name: origChgInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_ORIG_CHG_IND
        - name: documentNumber
          in: query
          description: Document Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_DOCUMENT_NUMBER
        - name: invNumberPaid
          in: query
          description: Invoice Paid
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_INV_NUMBER_PAID
        - name: paymentId
          in: query
          description: Payment Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRACCD_PAYMENT_ID
