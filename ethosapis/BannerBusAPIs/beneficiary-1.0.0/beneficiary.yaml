openapi: 3.0.0
info:
  title: beneficiary
  description: API for PDABENE administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: PDABENE
  x-source-domain: Human Resources
  x-source-title: Beneficiary
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/beneficiary:
    get:
      tags:
        - beneficiary
      summary: Return resources from PDABENE
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: seqNo
          in: query
          description: Sequence Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PDRBENE_SEQ_NO
        - name: spouseEmployedInd
          in: query
          description: Spouse Employed
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PDRBENE_SPOUSE_EMPLOYED_IND
        - name: beneIdNo
          in: query
          description: ID
          required: false
          schema:
            type: string
        - name: brelCode
          in: query
          description: Relationship to Employee
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PDRBENE_BREL_CODE
        - name: activeInd
          in: query
          description: Active
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PDRBENE_ACTIVE_IND
        - name: beneSsn
          in: query
          description: SSN
          required: false
          schema:
            type: string
        - name: beneSurnamePrefix
          in: query
          required: false
          schema:
            type: string
        - name: birthDate
          in: query
          description: Birth Date
          required: false
          schema:
            type: string
        - name: persAge
          in: query
          description: Age
          required: false
          schema:
            type: string
        - name: sexInd
          in: query
          description: Gender
          required: false
          schema:
            type: string
        - name: disabilityInd
          in: query
          description: Disabled
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PDRBENE_DISABILITY_IND
        - name: collegeInd
          in: query
          description: Attending College
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PDRBENE_COLLEGE_IND
        - name: beneMrtlCode
          in: query
          description: Marital Status
          required: false
          schema:
            type: string
        - name: collegeBeginDate
          in: query
          description: From
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PDRBENE_COLLEGE_BEGIN_DATE
        - name: addedDate
          in: query
          description: Date Added
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PDRBENE_ADDED_DATE
        - name: collegeEndDate
          in: query
          description: To
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PDRBENE_COLLEGE_END_DATE
        - name: acaChildReportInd
