openapi: 3.0.0
info:
  title: indicative-fee
  description: API for SKADRCO administrative page
  version: 1.0.0
  x-source-name: SKADRCO
  x-source-title: Course File Data
  x-source-system: banner
  x-api-type: bus-poc
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/indicative-fee:
    get:
      tags:
        - indicative-fee
      summary: Return resources from SKADRCO
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: smrprleProgram
          in: query
          required: false
          schema:
            type: string
        - name: termCodeEff
          in: query
          required: false
          schema:
            type: string
        - name: feeType
          in: query
          description: Fee Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORIFEE_FEE_TYPE
        - name: currCode
          in: query
          description: Currency
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORIFEE_CURR_CODE
        - name: indFeeAmt
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORIFEE_IND_FEE_AMT
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/indicative-fee-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - indicative-fee
      summary: Updates an existing resource in SKADRCO
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/indicative-fee-1.0.0_put_request"
            example:
              indFeeAmt: 100000
              termCodeEff: 602320
              criteria.feeType: DURN
              currCode: USD
              criteria.currCode: USD
              smrprleProgram: BEDPRIMARY
              feeType: DURN
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
