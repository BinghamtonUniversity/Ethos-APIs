openapi: 3.0.0
info:
  title: address-details
  description: API for SKAENRL administrative page
  version: 1.0.0
  x-source-name: SKAENRL
  x-source-title: Student Statistical Details
  x-source-system: banner
  x-api-type: bus-poc
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/address-details:
    get:
      tags:
        - address-details
      summary: Return resources from SKAENRL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: atypCode
          in: query
          description: Address Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_ATYP_CODE
        - name: city
          in: query
          description: City
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_CITY
        - name: seqno
          in: query
          description: Sequence Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_SEQNO
        - name: statCode
          in: query
          description: State or Province
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STAT_CODE
        - name: fromDate
          in: query
          description: From Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_FROM_DATE
        - name: zip
          in: query
          description: ZIP or Postal Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_ZIP
        - name: toDate
          in: query
          description: To Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_TO_DATE
        - name: natnCode
          in: query
          description: Nation
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_NATN_CODE
        - name: houseNumber
          in: query
          description: House Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_HOUSE_NUMBER
        - name: streetLine1
          in: query
          description: Street Line 1
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STREET_LINE1
        - name: streetLine2
          in: query
          description: Street Line 2
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STREET_LINE2
        - name: streetLine3
          in: query
          description: Street Line 3
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STREET_LINE3
        - name: streetLine4
          in: query
          description: Street Line 4
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STREET_LINE4
        - name: statusInd
          in: query
          description: Inactivate Address
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STATUS_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/address-details-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
