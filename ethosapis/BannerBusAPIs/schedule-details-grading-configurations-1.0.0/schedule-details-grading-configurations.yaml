openapi: 3.0.0
info:
  title: schedule-details-grading-configurations
  description: API for SSADETL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SSADETL
  x-source-domain: Student
  x-source-title: Schedule Detail Form
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/schedule-details-grading-configurations:
    get:
      tags:
        - schedule-details-grading-configurations
      summary: Return resources from SSADETL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: ssasectTermCode
          in: query
          required: true
          schema:
            type: string
        - name: ssasectCrn
          in: query
          required: false
          schema:
            type: string
        - name: anonGradingInd
          in: query
          description: Grading by Anonymous ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SSRANGD_ANON_GRADING_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schedule-details-grading-configurations-1.0.0_get_r\
                    esponse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/schedule-details-grading-configurations:
    post:
      tags:
        - schedule-details-grading-configurations QAPI (Query by POST)
      summary: Return resources from SSADETL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/schedule-details-grading-configurations-1.0.0_qapi_\
                post_request"
            example:
              ssasectTermCode: "001010"
              ssasectCrn: 10009
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schedule-details-grading-configurations-1.0.0_qapi_\
                    post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    schedule-details-grading-configurations-1.0.0_get_response:
      type: object
      properties:
        anonGradingInd:
          title: Grading by Anonymous ID
          type: string
          description: "Lineage reference object : SSRANGD_ANON_GRADING_IND"
          x-lineageReferenceObject: SSRANGD_ANON_GRADING_IND
        dataOrigin:
          maxLength: 30
          type: string
          description: "Lineage reference object : SSRANGD_DATA_ORIGIN"
          x-lineageReferenceObject: SSRANGD_DATA_ORIGIN
        userId:
          maxLength: 11
          type: string
          description: "Lineage reference object : SSRANGD_USER_ID"
          x-lineageReferenceObject: SSRANGD_USER_ID
      x-lineageReferenceObject: ssrangd
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: "The detailed actionable error message. "
    schedule-details-grading-configurations-1.0.0_qapi_post_response:
      type: object
      properties:
        anonGradingInd:
          title: Grading by Anonymous ID
          type: string
          description: "Lineage reference object : SSRANGD_ANON_GRADING_IND"
          x-lineageReferenceObject: SSRANGD_ANON_GRADING_IND
        dataOrigin:
          maxLength: 30
          type: string
          description: "Lineage reference object : SSRANGD_DATA_ORIGIN"
          x-lineageReferenceObject: SSRANGD_DATA_ORIGIN
        userId:
          maxLength: 11
          type: string
          description: "Lineage reference object : SSRANGD_USER_ID"
          x-lineageReferenceObject: SSRANGD_USER_ID
      x-lineageReferenceObject: ssrangd
    schedule-details-grading-configurations-1.0.0_qapi_post_request:
      required:
        - ssasectTermCode
      type: object
      properties:
        anonGradingInd:
          title: Grading by Anonymous ID
          type: string
          description: "Lineage reference object : SSRANGD_ANON_GRADING_IND"
          x-lineageReferenceObject: SSRANGD_ANON_GRADING_IND
        ssasectTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : ssasectTermCode, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: ssasectTermCode
          x-lineageLookupReferenceObject: stvterm
        ssasectCrn:
          title: CRN
          maxLength: 30
          type: string
          description: "Lineage reference object : ssasectCrn"
          x-lineageReferenceObject: ssasectCrn
      x-lineageReferenceObject: SSRANGD
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
