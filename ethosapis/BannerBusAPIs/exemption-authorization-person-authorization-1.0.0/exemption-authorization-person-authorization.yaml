openapi: 3.0.0
info:
  title: exemption-authorization-person-authorization
  description: API for TSAEXPT, Person Authorization administrative page.
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: TSAEXPT
  x-source-domain: Student
  x-source-title: Exemption Authorization
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/exemption-authorization-person-authorization:
    get:
      tags:
        - exemption-authorization-person-authorization
      summary: Return resources from TSAEXPT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: exemptionCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocTermCode
          in: query
          required: false
          schema:
            type: string
        - name: desc
          in: query
          required: false
          schema:
            type: string
        - name: delInd
          in: query
          description: Delete
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBESTU_DEL_IND
        - name: stuId
          in: query
          description: Student ID
          required: false
          schema:
            type: string
        - name: stuName
          in: query
          description: Name
          required: false
          schema:
            type: string
        - name: studentExptRollInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBESTU_STUDENT_EXPT_ROLL_IND
        - name: termCodeExpiration
          in: query
          description: Expiration Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBESTU_TERM_CODE_EXPIRATION
        - name: exemptionPriority
          in: query
          description: Priority
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBESTU_EXEMPTION_PRIORITY
        - name: maxStudentAmount
          in: query
          description: Maximum Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBESTU_MAX_STUDENT_AMOUNT
        - name: stspKeySequence
          in: query
          required: false
          schema:
            type: string
        - name: studypathName
          in: query
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBBESTU_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/exemption-authorization-person-authorization-1.0.0_\
                    get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
      - exemption-authorization-person-authorization
      summary: Updates an existing resource in TSAEXPT
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: '#/components/schemas/exemption-authorization-person-authorization-1.0.0_put_request'
            example:
              exemptionCode: '1'
              keyblocTermCode: '202010'
              criteria.stuId: 'HOSARUSR1'
              criteria.exemptionPriority: '2'
              maxStudentAmount: '2'
              tbbestuTermCodeExpiration: '201901'
              studentExptRollInd: 'Y'
              stspKeySequence: '1'
              delInd: 'D'
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/exemption-authorization-person-authorization-1.0.0_put_response'
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
    post:
      tags:
      - exemption-authorization-person-authorization
      summary: Creates a new resource in TSAEXPT
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: '#/components/schemas/exemption-authorization-person-authorization-1.0.0_post_request'
            example:
              exemptionCode: '1'
              keyblocTermCode: "12345"
              stuId: 'HOSH11111'
              tbbestuTermCodeExpiration: '201210'
              studentExptRollInd: 'N'
              exemptionPriority: '2'
              maxStudentAmount: '1'
              stspKeySequence: '1'
              delInd: 'D'
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/exemption-authorization-person-authorization-1.0.0_post_response'
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
  /qapi/exemption-authorization-person-authorization:
    post:
      tags:
        - exemption-authorization-person-authorization QAPI (Query by POST)
      summary: Return resources from TSAEXPT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
