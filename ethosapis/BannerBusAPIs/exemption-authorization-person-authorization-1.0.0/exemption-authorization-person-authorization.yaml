              keyblocTermCode: 199510
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/exemption-authorization-person-authorization-1.0.0_\
                    get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    exemption-authorization-person-authorization-1.0.0_get_request:
      required:
        - desc
        - exemptionPriority
      type: object
      properties:
        exemptionCode:
          title: Exemption Code
          maxLength: 8
          type: string
          description: "Lineage reference object : exemptionCode"
          x-lineageReferenceObject: exemptionCode
        studypathName:
          maxLength: 4000
          type: string
        stspKeySequence:
          title: Study Path
          maxLength: 30
          type: number
          description: "Lineage reference object : TBBESTU_STSP_KEY_SEQUENCE"
          x-lineageReferenceObject: TBBESTU_STSP_KEY_SEQUENCE
        stuId:
          title: Student ID
          maxLength: 9
          type: string
        keyblocTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocTermCode, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: keyblocTermCode
          x-lineageLookupReferenceObject: stvterm
        termCodeExpiration:
          title: Expiration Term
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBESTU_TERM_CODE_EXPIRATION, Lookup
            lineage reference object : stvterm"
          x-lineageReferenceObject: TBBESTU_TERM_CODE_EXPIRATION
          x-lineageLookupReferenceObject: stvterm
        stuName:
          title: Name
          maxLength: 230
          type: string
        exemptionPriority:
          title: Priority
          maxLength: 2
          type: number
          description: "Lineage reference object : TBBESTU_EXEMPTION_PRIORITY"
          x-lineageReferenceObject: TBBESTU_EXEMPTION_PRIORITY
        delInd:
          title: Delete
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBESTU_DEL_IND"
          x-lineageReferenceObject: TBBESTU_DEL_IND
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : TBBESTU_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: TBBESTU_ACTIVITY_DATE
        studentExptRollInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : TBBESTU_STUDENT_EXPT_ROLL_IND"
          x-lineageReferenceObject: TBBESTU_STUDENT_EXPT_ROLL_IND
        maxStudentAmount:
          title: Maximum Amount
          maxLength: 9
          type: number
          description: "Lineage reference object : TBBESTU_MAX_STUDENT_AMOUNT"
          x-lineageReferenceObject: TBBESTU_MAX_STUDENT_AMOUNT
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : TBBEXPT_DESC"
          x-lineageReferenceObject: TBBEXPT_DESC
      x-lineageReferenceObject: TBBESTU
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    exemption-authorization-person-authorization-1.0.0_get_response:
      type: object
      properties:
        tbbexpt:
          type: array
          items:
            required:
              - desc
              - detailCode
            type: object
            properties:
              detailDesc:
                type: string
              studentExptRollInd:
                title: Roll Students
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBEXPT_STUDENT_EXPT_ROLL_IND"
                x-lineageReferenceObject: TBBEXPT_STUDENT_EXPT_ROLL_IND
              termCodeExpiration:
                title: Roll Expiration Term
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBEXPT_TERM_CODE_EXPIRATION, Lookup
                  lineage reference object : stvterm"
                x-lineageReferenceObject: TBBEXPT_TERM_CODE_EXPIRATION
                x-lineageLookupReferenceObject: stvterm
              expTermCodeDesc:
                type: string
              exemptionRollInd:
                title: Roll Exemptions
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBEXPT_EXEMPTION_ROLL_IND"
                x-lineageReferenceObject: TBBEXPT_EXEMPTION_ROLL_IND
              detailCode:
                title: Detail Payment Code
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBEXPT_DETAIL_CODE, Lookup lineage
                  reference object : tbbdetc"
                x-lineageReferenceObject: TBBEXPT_DETAIL_CODE
                x-lineageLookupReferenceObject: tbbdetc
              desc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBEXPT_DESC"
                x-lineageReferenceObject: TBBEXPT_DESC
            x-lineageReferenceObject: tbbexpt
        tbbestu:
          type: array
          items:
            required:
              - exemptionPriority
            type: object
            properties:
              delInd:
                title: Delete
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBESTU_DEL_IND"
                x-lineageReferenceObject: TBBESTU_DEL_IND
              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBBESTU_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: TBBESTU_ACTIVITY_DATE
              stuId:
                title: Student ID
                maxLength: 9
                type: string
              studentExptRollInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBESTU_STUDENT_EXPT_ROLL_IND"
                x-lineageReferenceObject: TBBESTU_STUDENT_EXPT_ROLL_IND
              maxStudentAmount:
                title: Maximum Amount
                maxLength: 9
                type: number
                description: "Lineage reference object : TBBESTU_MAX_STUDENT_AMOUNT"
                x-lineageReferenceObject: TBBESTU_MAX_STUDENT_AMOUNT
              termCodeExpiration:
                title: Expiration Term
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBESTU_TERM_CODE_EXPIRATION, Lookup
                  lineage reference object : stvterm"
                x-lineageReferenceObject: TBBESTU_TERM_CODE_EXPIRATION
                x-lineageLookupReferenceObject: stvterm
              stuName:
                title: Name
                maxLength: 230
                type: string
              exemptionPriority:
                title: Priority
                maxLength: 2
                type: number
                description: "Lineage reference object : TBBESTU_EXEMPTION_PRIORITY"
                x-lineageReferenceObject: TBBESTU_EXEMPTION_PRIORITY
            x-lineageReferenceObject: tbbestu
    exemption-authorization-person-authorization-1.0.0_qapi_post:
      type: object
      properties:
        exemptionCode:
          type: string
        keyblocTermCode:
          type: string
        desc:
          type: string
        delInd:
          title: Delete
          maxLength: 1
