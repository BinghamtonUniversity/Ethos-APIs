          x-lineageReferenceObject: TBBESTU_TERM_CODE_EXPIRATION
          x-lineageLookupReferenceObject: stvterm
        exemptionPriority:
          title: Priority
          maxLength: 2
          type: number
          description: "Lineage reference object : TBBESTU_EXEMPTION_PRIORITY"
          x-lineageReferenceObject: TBBESTU_EXEMPTION_PRIORITY
        maxStudentAmount:
          title: Maximum Amount
          maxLength: 9
          type: number
          description: "Lineage reference object : TBBESTU_MAX_STUDENT_AMOUNT"
          x-lineageReferenceObject: TBBESTU_MAX_STUDENT_AMOUNT
        stspKeySequence:
          type: string
        studypathName:
          type: string
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : TBBESTU_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: TBBESTU_ACTIVITY_DATE
    exemption-authorization-person-authorization-1.0.0_put_request:
      required:
      - criteria.stuId
      - criteria.exemptionPriority
      type: object
      properties:
        criteria.stuId:
          title: Student ID
          type: string
          description: "Student ID"
        criteria.exemptionPriority:
          title: Exemption Priority
          type: string
          description: "Indicates the priority of this exemption for the student, if the student is authorized for more than one exemption."
          x-lineageReferenceObject: TBBESTU_EXEMPTION_PRIORITY
        delInd:
          title: Delete Indicator
          maxLength: 1
          type: string
          description: "Delete Indicator"
          x-lineageReferenceObject: TBBESTU_DEL_IND
        studentExptRollInd:
          title: Roll Indicator
          maxLength: 1
          type: string
          description: "Y denotes that when the process TSRROLL is executed, if the exemption the student is in rolls then the student will also roll, N will cause student not to roll."
          x-lineageReferenceObject: TBBESTU_STUDENT_EXPT_ROLL_IND
        tbbestuTermCodeExpiration:
          title: Term Code Expiration
          maxLength: 9
          type: string
          description: "The process TSRROLL will check to see if this term is greater than the term the exemption is being rolled to and if it is will consider the student exemption expired and not roll it."
          x-lineageReferenceObject: TBBESTU_TERM_CODE_EXPIRATION
        exemptionPriority:
          title: Exemption Priority
          type: number
          description: "EXEMPTION PRIORITY: This indicates the priority of this exemption for the student, if the student is authorized for more than one exemption."
          x-lineageReferenceObject: TBBESTU_EXEMPTION_PRIORITY
        maxStudentAmount:
          title: Max Student Amount
          type: string
          description: "This field indicates the maximum amount a student can be exempted from."
          x-lineageReferenceObject: TBBESTU_MAX_STUDENT_AMOUNT
        stspKeySequence:
          title: Study Path Key Sequence
          type: string
          description: "Sequence number of the study path for the exemption."
          x-lineageReferenceObject: TBBESTU_STSP_KEY_SEQUENCE
      x-lineageReferenceObject: TBBESTU
