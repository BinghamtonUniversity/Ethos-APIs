openapi: 3.0.0
info:
  title: css-country-coefficient-and-crosswalk-codes
  description: API for RTVCCOE administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: RTVCCOE
  x-source-domain: Financial Aid
  x-source-title: CSS Country Coefficient and Crosswalk Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/css-country-coefficient-and-crosswalk-codes:
    get:
      tags:
        - css-country-coefficient-and-crosswalk-codes
      summary: Return resources from RTVCCOE
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckAidyCode
          in: query
          required: true
          schema:
            type: string
        - name: code
          in: query
          description: Country Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVCCOE_CODE
        - name: description
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVCCOE_DESCRIPTION
        - name: crosswalkCode
          in: query
          description: Crosswalk Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVCCOE_CROSSWALK_CODE
        - name: countryCoefficient
          in: query
          description: Country Coefficient
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVCCOE_COUNTRY_COEFFICIENT
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/css-country-coefficient-and-crosswalk-codes-1.0.0_g\
                    et_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/css-country-coefficient-and-crosswalk-codes:
    post:
      tags:
        - css-country-coefficient-and-crosswalk-codes QAPI (Query by POST)
      summary: Return resources from RTVCCOE
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/css-country-coefficient-and-crosswalk-codes-1.0.0_g\
                et_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/css-country-coefficient-and-crosswalk-codes-1.0.0_g\
                    et_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    css-country-coefficient-and-crosswalk-codes-1.0.0_qapi_post:
      required:
        - keyblckAidyCode
      type: object
      properties:
        keyblckAidyCode:
          type: string
        code:
          title: Country Code
          maxLength: 2
          type: string
          description: "Lineage reference object : RTVCCOE_CODE"
          x-lineageReferenceObject: RTVCCOE_CODE
        description:
          title: Description
          maxLength: 50
          type: string
          description: "Lineage reference object : RTVCCOE_DESCRIPTION"
          x-lineageReferenceObject: RTVCCOE_DESCRIPTION
        crosswalkCode:
          title: Crosswalk Code
          maxLength: 30
          type: string
          description: "Lineage reference object : RTVCCOE_CROSSWALK_CODE, Lookup lineage
            reference object : stvnatn"
          x-lineageReferenceObject: RTVCCOE_CROSSWALK_CODE
          x-lineageLookupReferenceObject: stvnatn
        countryCoefficient:
          title: Country Coefficient
          maxLength: 10
          type: number
          description: "Lineage reference object : RTVCCOE_COUNTRY_COEFFICIENT"
          x-lineageReferenceObject: RTVCCOE_COUNTRY_COEFFICIENT
    css-country-coefficient-and-crosswalk-codes-1.0.0_get_response:
      required:
        - code
        - countryCoefficient
        - description
      type: object
      properties:
        code:
          title: Country Code
          maxLength: 2
          type: string
          description: "Lineage reference object : RTVCCOE_CODE"
          x-lineageReferenceObject: RTVCCOE_CODE
        countryCoefficient:
          title: Country Coefficient
          maxLength: 10
          type: number
          description: "Lineage reference object : RTVCCOE_COUNTRY_COEFFICIENT"
          x-lineageReferenceObject: RTVCCOE_COUNTRY_COEFFICIENT
        crosswalkCode:
          title: Crosswalk Code
          maxLength: 30
          type: string
          description: "Lineage reference object : RTVCCOE_CROSSWALK_CODE, Lookup lineage
            reference object : stvnatn"
          x-lineageReferenceObject: RTVCCOE_CROSSWALK_CODE
          x-lineageLookupReferenceObject: stvnatn
        description:
          title: Description
          maxLength: 50
          type: string
          description: "Lineage reference object : RTVCCOE_DESCRIPTION"
          x-lineageReferenceObject: RTVCCOE_DESCRIPTION
      x-lineageReferenceObject: rtvccoe
    css-country-coefficient-and-crosswalk-codes-1.0.0_get_request:
      required:
        - code
        - description
        - countryCoefficient
      type: object
      properties:
        keyblckAidyCode:
          title: Aid Year
          maxLength: 4
          type: string
          description: "Lineage reference object : keyblckAidyCode, Lookup lineage
            reference object : robinst"
          x-lineageReferenceObject: keyblckAidyCode
          x-lineageLookupReferenceObject: robinst
        code:
          title: Country Code
          maxLength: 2
          type: string
          description: "Lineage reference object : RTVCCOE_CODE"
          x-lineageReferenceObject: RTVCCOE_CODE
        crosswalkCode:
          title: Crosswalk Code
          maxLength: 30
          type: string
          description: "Lineage reference object : RTVCCOE_CROSSWALK_CODE, Lookup lineage
            reference object : stvnatn"
          x-lineageReferenceObject: RTVCCOE_CROSSWALK_CODE
          x-lineageLookupReferenceObject: stvnatn
        countryCoefficient:
          title: Country Coefficient
          maxLength: 10
          type: number
          description: "Lineage reference object : RTVCCOE_COUNTRY_COEFFICIENT"
          x-lineageReferenceObject: RTVCCOE_COUNTRY_COEFFICIENT
        description:
          title: Description
          maxLength: 50
          type: string
          description: "Lineage reference object : RTVCCOE_DESCRIPTION"
          x-lineageReferenceObject: RTVCCOE_DESCRIPTION
      x-lineageReferenceObject: RTVCCOE
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
