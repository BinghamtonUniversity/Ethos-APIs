      type: object
      properties:
        stvcstsDesc:
          type: string
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : STVDEGS_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: STVDEGS_ACTIVITY_DATE
        code:
          title: Degree Status Code
          maxLength: 2
          type: string
          description: "Lineage reference object : STVDEGS_CODE"
          x-lineageReferenceObject: STVDEGS_CODE
        nextStatus:
          title: Next Degree Status
          maxLength: 2
          type: string
          description: "Lineage reference object : STVDEGS_NEXT_STATUS"
          x-lineageReferenceObject: STVDEGS_NEXT_STATUS
        systemReqInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : STVDEGS_SYSTEM_REQ_IND"
          x-lineageReferenceObject: STVDEGS_SYSTEM_REQ_IND
        awardStatusInd:
          title: Awarded Indicator
          maxLength: 1
          type: string
          description: "Lineage reference object : STVDEGS_AWARD_STATUS_IND"
          x-lineageReferenceObject: STVDEGS_AWARD_STATUS_IND
        cstsCode:
          title: Curriculum Status
          maxLength: 30
          type: string
          description: "Lineage reference object : STVDEGS_CSTS_CODE, Lookup lineage
            reference object : stvcsts"
          x-lineageReferenceObject: STVDEGS_CSTS_CODE
          x-lineageLookupReferenceObject: stvcsts
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : STVDEGS_DESC"
          x-lineageReferenceObject: STVDEGS_DESC
      x-lineageReferenceObject: stvdegs
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
