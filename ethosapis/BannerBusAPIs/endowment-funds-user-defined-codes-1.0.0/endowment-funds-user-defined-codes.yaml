    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/endowment-funds-user-defined-codes:
    get:
      tags:
        - endowment-funds-user-defined-codes
      summary: Return resources from FNVSDAT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: data
          in: query
          description: Frvsdat Data
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FNVSDAT_DATA
        - name: sdatCodeAttr
          in: query
          description: Frvsdat Sdat Code Attr
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FNVSDAT_SDAT_CODE_ATTR
        - name: sdatCodeOpt1
          in: query
          description: Frvsdat Sdat Code Opt 1
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FNVSDAT_SDAT_CODE_OPT1
        - name: shortTitle
          in: query
          description: Frvsdat Short Title
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FNVSDAT_SHORT_TITLE
        - name: title
          in: query
          description: Frvsdat Title
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FNVSDAT_TITLE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/endowment-funds-user-defined-codes-1.0.0_get_respon\
                    se"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/endowment-funds-user-defined-codes:
    post:
      tags:
        - endowment-funds-user-defined-codes QAPI (Query by POST)
      summary: Return resources from FNVSDAT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/endowment-funds-user-defined-codes-1.0.0_get_reques\
                t"
      responses:
