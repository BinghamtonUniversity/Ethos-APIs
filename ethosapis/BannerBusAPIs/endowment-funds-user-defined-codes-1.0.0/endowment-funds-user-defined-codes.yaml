openapi: 3.0.0
info:
  title: endowment-funds-user-defined-codes
  description: API for FNVSDAT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FNVSDAT
  x-source-domain: Finance
