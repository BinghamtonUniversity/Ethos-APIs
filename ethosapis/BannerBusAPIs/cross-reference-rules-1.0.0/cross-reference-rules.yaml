          schema:
            type: string
          x-lineageReferenceObject: SORXREF_DISP_WEB_IND
        - name: pescXmlInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORXREF_PESC_XML_IND
        - name: bannerValue
          in: query
          description: Banner Value
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORXREF_BANNER_VALUE
        - name: desc
