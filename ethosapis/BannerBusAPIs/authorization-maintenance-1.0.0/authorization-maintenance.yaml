        x-lineageReferenceObject: TVRAUTH_START_DATE
      - name: endDate
        in: query
        description: End Date
        required: false
        schema:
          type: string
        x-lineageReferenceObject: TVRAUTH_END_DATE
      - name: userId
        in: query
        description: User ID
        required: false
        schema:
          type: string
        x-lineageReferenceObject: TVRAUTH_USER_ID
      - name: activityDate
        in: query
        description: Activity Date
        required: false
        schema:
          type: string
        x-lineageReferenceObject: TVRAUTH_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/authorization-maintenance-1.0.0_get_response'
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
        EthosIntegrationBearer: []
