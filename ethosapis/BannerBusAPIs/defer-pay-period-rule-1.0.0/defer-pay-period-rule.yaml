openapi: 3.0.0
info:
  title: defer-pay-period-rule
  description: API for PTRDFPR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: PTRDFPR
  x-source-domain: Human Resources
  x-source-title: Defer Pay Period Rules
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/defer-pay-period-rule:
    get:
      tags:
        - defer-pay-period-rule
      summary: Return resources from PTRDFPR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: dfprCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/defer-pay-period-rule-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/defer-pay-period-rule:
    post:
      tags:
        - defer-pay-period-rule QAPI (Query by POST)
      summary: Return resources from PTRDFPR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/defer-pay-period-rule-1.0.0_get_request"
            example:
              dfprCode: DF10
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/defer-pay-period-rule-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    defer-pay-period-rule-1.0.0_qapi_post:
      type: object
      properties:
        dfprCode:
          type: string
    defer-pay-period-rule-1.0.0_get_response:
      type: object
      properties:
        ptrdfpr:
          type: array
          items:
            required:
              - activityDate
              - beginPayno
              - desc
              - endPayno
              - factor
              - pictCode
            type: object
            properties:
              endPayno:
                title: End Payroll Number
                maxLength: 3
                type: number
                description: "Lineage reference object : PTRDFPR_END_PAYNO"
                x-lineageReferenceObject: PTRDFPR_END_PAYNO
              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : PTRDFPR_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: PTRDFPR_ACTIVITY_DATE
              pictCode:
                title: Payroll ID
                maxLength: 2
                type: string
                description: "Lineage reference object : PTRDFPR_PICT_CODE"
                x-lineageReferenceObject: PTRDFPR_PICT_CODE
              factor:
                title: Factor
                maxLength: 6
                type: number
                description: "Lineage reference object : PTRDFPR_FACTOR"
                x-lineageReferenceObject: PTRDFPR_FACTOR
              beginPayno:
                title: Begin Payroll Number
                maxLength: 3
                type: number
                description: "Lineage reference object : PTRDFPR_BEGIN_PAYNO"
                x-lineageReferenceObject: PTRDFPR_BEGIN_PAYNO
              pictDesc:
                maxLength: 30
                type: string
              desc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : PTRDFPR_DESC"
                x-lineageReferenceObject: PTRDFPR_DESC
              pays:
                title: Pays
                maxLength: 6
                type: number
                description: "Lineage reference object : PTRDFPR_PAYS"
                x-lineageReferenceObject: PTRDFPR_PAYS
            x-lineageReferenceObject: ptrdfpr
        ptrdfpn:
          type: array
          items:
            required:
              - activityDate
              - deferInd
            type: object
            properties:
              deferInd:
                title: Defer Indicator
                maxLength: 1
                type: string
                description: "Lineage reference object : PTRDFPN_DEFER_IND"
                x-lineageReferenceObject: PTRDFPN_DEFER_IND
              payno:
                title: Payroll Number
                maxLength: 3
                type: number
                description: "Lineage reference object : PTRDFPN_PAYNO"
                x-lineageReferenceObject: PTRDFPN_PAYNO
              activityDate:
                title: Activity Date
                maxLength: 26
                type: string
                description: "Lineage reference object : PTRDFPN_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: PTRDFPN_ACTIVITY_DATE
            x-lineageReferenceObject: ptrdfpn
    defer-pay-period-rule-1.0.0_get_request:
      type: object
      properties:
        dfprCode:
          title: Defer Pay Code
          maxLength: 4
          type: string
          description: "Lineage reference object : dfprCode"
          x-lineageReferenceObject: dfprCode
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
