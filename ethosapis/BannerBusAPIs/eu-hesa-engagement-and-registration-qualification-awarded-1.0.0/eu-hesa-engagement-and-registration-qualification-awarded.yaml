              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/eu-hesa-engagement-and-registration-qualification-awarded:
    post:
      tags:
        - eu-hesa-engagement-and-registration-qualification-awarded QAPI (Query
          by POST)
      summary: Return resources from SOAENRE
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/eu-hesa-engagement-and-registration-qualification-a\
                warded-1.0.0_get_request"
            example:
              numhus: 1
              id: OFFCAMP01
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/eu-hesa-engagement-and-registration-qualification-a\
                    warded-1.0.0_get_response"
        "400":
