          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    eu-hesa-engagement-and-registration-qualification-awarded-1.0.0_get_request:
      required:
        - qualAwardId
        - qualId
      type: object
      properties:
        activityDate:
          maxLength: 26
          type: string
          description: "Lineage reference object : SOBREQA_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SOBREQA_ACTIVITY_DATE
        thesisTitle:
          title: Thesis Title
          type: string
          description: "Lineage reference object : SOBREQA_THESIS_TITLE"
          x-lineageReferenceObject: SOBREQA_THESIS_TITLE
        numhus:
          title: Engagement Number
          type: string
          description: "Lineage reference object : numhus"
          x-lineageReferenceObject: numhus
        qualId:
          title: Qualification Identifier
          type: string
          description: "Lineage reference object : SOBREQA_QUAL_ID"
          x-lineageReferenceObject: SOBREQA_QUAL_ID
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        qualAwardId:
          title: Qualification Awarded Identifier
          type: string
          description: "Lineage reference object : SOBREQA_QUAL_AWARD_ID"
          x-lineageReferenceObject: SOBREQA_QUAL_AWARD_ID
        ssdtCodeQualResult:
          title: Qualification Result
          type: string
          description: "Lineage reference object : SOBREQA_SSDT_CODE_QUAL_RESULT, Lookup
            lineage reference object : skvssdt,skvssdt"
          x-lineageReferenceObject: SOBREQA_SSDT_CODE_QUAL_RESULT
          x-lineageLookupReferenceObject: skvssdt,skvssdt
        userId:
          maxLength: 30
          type: string
          description: "Lineage reference object : SOBREQA_USER_ID"
          x-lineageReferenceObject: SOBREQA_USER_ID
      x-lineageReferenceObject: SOBREQA
    eu-hesa-engagement-and-registration-qualification-awarded-1.0.0_get_response:
      type: object
      properties:
        sobreqa:
          type: array
          items:
            required:
              - qualAwardId
              - qualId
            type: object
            properties:
              ssdtCodeQualResultSt:
                title: Qualification Result Description
                type: string
              activityDate:
                maxLength: 26
                type: string
                description: "Lineage reference object : SOBREQA_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SOBREQA_ACTIVITY_DATE
              thesisTitle:
                title: Thesis Title
                type: string
                description: "Lineage reference object : SOBREQA_THESIS_TITLE"
                x-lineageReferenceObject: SOBREQA_THESIS_TITLE
              qualId:
                title: Qualification Identifier
                type: string
                description: "Lineage reference object : SOBREQA_QUAL_ID"
                x-lineageReferenceObject: SOBREQA_QUAL_ID
              qualAwardId:
                title: Qualification Awarded Identifier
                type: string
                description: "Lineage reference object : SOBREQA_QUAL_AWARD_ID"
                x-lineageReferenceObject: SOBREQA_QUAL_AWARD_ID
              ssdtCodeQualResult:
                title: Qualification Result
                type: string
                description: "Lineage reference object : SOBREQA_SSDT_CODE_QUAL_RESULT, Lookup
                  lineage reference object : skvssdt,skvssdt"
                x-lineageReferenceObject: SOBREQA_SSDT_CODE_QUAL_RESULT
                x-lineageLookupReferenceObject: skvssdt,skvssdt
              userId:
                maxLength: 30
                type: string
                description: "Lineage reference object : SOBREQA_USER_ID"
                x-lineageReferenceObject: SOBREQA_USER_ID
            x-lineageReferenceObject: sobreqa
        sobrqaa:
          type: array
          items:
            type: object
            properties:
              activityDate:
                maxLength: 26
                type: string
                description: "Lineage reference object : SOBRQAA_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SOBRQAA_ACTIVITY_DATE
              ssdtCodeAccredId:
                title: Qualification Award Accreditation
                type: string
                description: "Lineage reference object : SOBRQAA_SSDT_CODE_ACCRED_ID, Lookup
                  lineage reference object : skvssdt,skvssdt"
                x-lineageReferenceObject: SOBRQAA_SSDT_CODE_ACCRED_ID
                x-lineageLookupReferenceObject: skvssdt,skvssdt
              ssdtCodeAccredIdSt:
                title: Qualification Award Accreditation Description
                type: string
              userId:
                maxLength: 30
                type: string
                description: "Lineage reference object : SOBRQAA_USER_ID"
                x-lineageReferenceObject: SOBRQAA_USER_ID
            x-lineageReferenceObject: sobrqaa
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    eu-hesa-engagement-and-registration-qualification-awarded-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        numhus:
          type: string
        qualAwardId:
          type: string
        qualId:
          type: string
        ssdtCodeQualResult:
          type: string
        thesisTitle:
          type: string
        userId:
          maxLength: 30
          type: string
          description: "Lineage reference object : SOBRQAA_USER_ID"
          x-lineageReferenceObject: SOBRQAA_USER_ID
        activityDate:
          maxLength: 26
          type: string
          description: "Lineage reference object : SOBRQAA_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SOBRQAA_ACTIVITY_DATE
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
