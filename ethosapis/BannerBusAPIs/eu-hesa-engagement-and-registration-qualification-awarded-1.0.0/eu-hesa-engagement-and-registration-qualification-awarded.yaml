openapi: 3.0.0
info:
  title: eu-hesa-engagement-and-registration-qualification-awarded
  description: API for SOAENRE administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SOAENRE
  x-source-domain: Student
  x-source-title: Engagement and Registration (Europe - Hesa)
  x-source-system: banner
