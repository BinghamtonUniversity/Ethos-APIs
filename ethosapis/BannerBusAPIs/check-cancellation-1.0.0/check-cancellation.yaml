openapi: 3.0.0
info:
  title: check-cancellation
  description: API for FAACHKS administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FAACHKS
  x-source-domain: Finance
  x-source-title: Check Cancellation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/check-cancellation:
    get:
      tags:
        - check-cancellation
      summary: Return resources from FAACHKS
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: faachksCheckNum
          in: query
          required: true
          schema:
            type: string
        - name: bankCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/check-cancellation-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/check-cancellation:
    post:
      tags:
        - check-cancellation QAPI (Query by POST)
      summary: Return resources from FAACHKS
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/check-cancellation-1.0.0_get_request"
            example:
              bankCode: 1
              faachksCheckNum: S0000004
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/check-cancellation-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    check-cancellation-1.0.0_get_request:
      required:
        - faachksCheckNum
        - bankCode
      type: object
      properties:
        bankCode:
          title: Bank
          maxLength: 30
          type: string
          description: "Lineage reference object : faachksBankCode, Lookup lineage
            reference object : gxvbank"
          x-lineageReferenceObject: faachksBankCode
          x-lineageLookupReferenceObject: gxvbank
        faachksCheckNum:
          title: Check
          maxLength: 8
          type: string
          description: "Lineage reference object : faachksCheckNum"
          x-lineageReferenceObject: faachksCheckNum
      x-lineageReferenceObject: KEY_BLOCK
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    check-cancellation-1.0.0_get_response:
      type: object
      properties:
        faachksAddr3:
          title: Street Line 3
          maxLength: 75
          type: string
        faachksVendCheckName:
          maxLength: 230
          type: string
        faachksAddr2:
          title: Street Line 2
          maxLength: 75
          type: string
        faachksAddr1:
          title: Street Line 1
          maxLength: 75
          type: string
        faachksVendCode:
          title: Vendor
          maxLength: 9
          type: string
          description: "Lookup lineage reference object : ftvvend"
          x-lineageLookupReferenceObject: ftvvend
        fabchksCheckDate:
          title: Date
          maxLength: 11
          type: string
          format: date-time
        faachksZip:
          title: ZIP or Postal Code
          maxLength: 30
          type: string
        faachksCity:
          title: City
          maxLength: 50
          type: string
        faachksState:
          title: State or Province
          maxLength: 3
          type: string
        fabchksCheckAmt:
          title: Amount
          maxLength: 25
          type: number
        faachksVendCheckCode:
          title: Check Vendor
          maxLength: 9
          type: string
        faachksVendName:
          maxLength: 230
          type: string
      x-lineageReferenceObject: faachks_header
    check-cancellation-1.0.0_qapi_post:
      required:
        - faachksCheckNum
      type: object
      properties:
        faachksCheckNum:
          type: string
        bankCode:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
