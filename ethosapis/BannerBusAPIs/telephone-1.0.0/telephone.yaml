        required: false
        schema:
          type: string
        x-lineageReferenceObject: SPRTELE_PRIMARY_IND
      - name: unlistInd
        in: query
        description: Unlisted
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SPRTELE_UNLIST_IND
      - name: statusInd
        in: query
        description: Inactivate
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SPRTELE_STATUS_IND
      - name: phoneArea
        in: query
        description: Area Code
        required: false
