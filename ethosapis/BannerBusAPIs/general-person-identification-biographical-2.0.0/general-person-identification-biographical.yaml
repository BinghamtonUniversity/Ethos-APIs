openapi: 3.0.0
info:
  title: general-person-identification-biographical
  description: API for SPAIDEN administrative page <p>To create a record with no
    race information, use `gorprac` with empty array in the request body e.g.,
    `"gorprac":[{}]`</p>
  version: 2.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SPAIDEN
  x-source-domain: Student
  x-source-title: General Person Identification
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
