paths:
  /api/immunization-information:
    get:
      tags:
      - immunization-information
      summary: Return resources from GOAIMMU
      parameters:
      - name: X-SDE-Expand
        in: header
        description: The comma separated value list of block names
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of resources requesting for this result set.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
      - name: id
        in: query
        required: false
        schema:
          type: string
      - name: immuCode
        in: query
        description: Immunization
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GORIMMU_IMMU_CODE
      - name: imstCode
        in: query
        description: Status
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GORIMMU_IMST_CODE
      - name: immuDate
        in: query
        description: Immunization Date
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GORIMMU_IMMU_DATE
      - name: comment
        in: query
        description: Comment
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GORIMMU_COMMENT
      - name: seqNo
        in: query
        description: Sequence Number
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GORIMMU_SEQ_NO
      - name: userId
        in: query
        description: User ID
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GORIMMU_USER_ID
      - name: activityDate
        in: query
        description: Activity Date
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GORIMMU_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/immunization-information-1.0.0_get_response"
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
