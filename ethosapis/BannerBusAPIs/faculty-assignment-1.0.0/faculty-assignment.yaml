          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - faculty-assignment
      summary: Creates a new resource in SIAASGN
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/faculty-assignment-1.0.0_post_request"
            example:
              percentResponse: 100
              topsCode: FDFDQ
              nistCode: AA
              nistWorkload: 1
              keyblocTermCodeEff: 201520
              weeklyHrs: 1
              id: A00030988
