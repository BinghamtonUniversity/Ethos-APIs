      - BasicAuth: []
        EllucianOAuthUserToken: []
  /qapi/pool-section:
    post:
      tags:
      - pool-section QAPI (Query by POST)
      summary: Return resources from SSAPOOL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: '#/components/schemas/pool-section-1.0.0_qapi_post_request'
            example:
              poolInd: "Y"
              keyblocTermCodeEff: 201010
              scbcrkyCrseNumb: 1
              keyBlckSessCode: A
              blckCode: 11
              ssbsectSubjCode: '001'
              keyBlckCampCode: ' JO'
              SSBSECT.ssbsectSubjCode: '001'
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
