        in: query
        required: false
        schema:
          type: string
      - name: ssbsectCrn
        in: query
        required: false
        schema:
          type: string
      - name: ssbsectPtrmCode
        in: query
        required: false
        schema:
          type: string
      - name: SSBSECT.ssbsectSubjCode
        in: query
        required: false
        schema:
          type: string
      - name: ssbsectCrseNumb
        in: query
        required: false
        schema:
          type: string
      - name: ssbsectSeqNumb
        in: query
        required: false
        schema:
          type: string
      - name: ssbsectSstsCode
        in: query
