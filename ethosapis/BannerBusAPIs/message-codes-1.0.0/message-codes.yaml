openapi: 3.0.0
info:
  title: message-codes
  description: API for RTVMESG administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: RTVMESG
  x-source-domain: Financial Aid
  x-source-title: Message Code Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/message-codes:
    get:
      tags:
        - message-codes
      summary: Return resources from RTVMESG
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: Message Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVMESG_CODE
        - name: infoAccessInd
          in: query
          description: Information Access
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVMESG_INFO_ACCESS_IND
        - name: mesgDesc
          in: query
          description: Text
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVMESG_MESG_DESC
        - name: stopAwrdProcess
          in: query
          description: Stop Electronic Award Process
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVMESG_STOP_AWRD_PROCESS
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/message-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/message-codes:
    post:
      tags:
        - message-codes QAPI (Query by POST)
      summary: Return resources from RTVMESG
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/message-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/message-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    message-codes-1.0.0_get_response:
      required:
        - code
      type: object
      properties:
        code:
          title: Message Code
          maxLength: 4
          type: string
          description: "Lineage reference object : RTVMESG_CODE"
          x-lineageReferenceObject: RTVMESG_CODE
        mesgDesc:
          title: Text
          maxLength: 2000
          type: string
          description: "Lineage reference object : RTVMESG_MESG_DESC"
          x-lineageReferenceObject: RTVMESG_MESG_DESC
        stopAwrdProcess:
          title: Stop Electronic Award Process
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVMESG_STOP_AWRD_PROCESS"
          x-lineageReferenceObject: RTVMESG_STOP_AWRD_PROCESS
        infoAccessInd:
          title: Information Access
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVMESG_INFO_ACCESS_IND"
          x-lineageReferenceObject: RTVMESG_INFO_ACCESS_IND
      x-lineageReferenceObject: rtvmesg
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    message-codes-1.0.0_get_request:
      required:
        - code
      type: object
      properties:
        code:
          title: Message Code
          maxLength: 4
          type: string
          description: "Lineage reference object : RTVMESG_CODE"
          x-lineageReferenceObject: RTVMESG_CODE
        mesgDesc:
          title: Text
          maxLength: 2000
          type: string
          description: "Lineage reference object : RTVMESG_MESG_DESC"
          x-lineageReferenceObject: RTVMESG_MESG_DESC
        stopAwrdProcess:
          title: Stop Electronic Award Process
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVMESG_STOP_AWRD_PROCESS"
          x-lineageReferenceObject: RTVMESG_STOP_AWRD_PROCESS
        infoAccessInd:
          title: Information Access
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVMESG_INFO_ACCESS_IND"
          x-lineageReferenceObject: RTVMESG_INFO_ACCESS_IND
      x-lineageReferenceObject: RTVMESG
    message-codes-1.0.0_qapi_post:
      type: object
      properties:
        code:
          title: Message Code
          maxLength: 4
          type: string
          description: "Lineage reference object : RTVMESG_CODE"
          x-lineageReferenceObject: RTVMESG_CODE
        infoAccessInd:
          title: Information Access
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVMESG_INFO_ACCESS_IND"
          x-lineageReferenceObject: RTVMESG_INFO_ACCESS_IND
        mesgDesc:
          title: Text
          maxLength: 2000
          type: string
          description: "Lineage reference object : RTVMESG_MESG_DESC"
          x-lineageReferenceObject: RTVMESG_MESG_DESC
        stopAwrdProcess:
          title: Stop Electronic Award Process
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVMESG_STOP_AWRD_PROCESS"
          x-lineageReferenceObject: RTVMESG_STOP_AWRD_PROCESS
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
