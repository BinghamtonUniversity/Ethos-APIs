      - student-disability-service-support
      summary: Return resources from SGADISA
      parameters:
      - name: X-SDE-Expand
        in: header
        description: The comma separated value list of block names
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of resources requesting for this result set.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
      - name: sgastdnId
        in: query
        required: false
        schema:
          type: string
      - name: sgastdnTermCodeEff
        in: query
        required: false
        schema:
          type: string
      - name: termCode
        in: query
        required: true
        schema:
          type: string
      - name: disaCode
        in: query
        required: true
        schema:
          type: string
      - name: mediCode
        in: query
        required: false
        schema:
          type: string
      - name: spsrCode
        in: query
        required: false
        schema:
          type: string
      - name: primaryInd
        in: query
        required: false
        schema:
          type: string
      - name: disaEffFromDate
        in: query
        required: false
        schema:
          type: string
      - name: disaEffToDate
        in: query
        required: false
        schema:
          type: string
      - name: activityDate
        in: query
        required: false
        schema:
          type: string
      - name: sserCode
        in: query
        description: Service Type
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDSER_SSER_CODE
      - name: ssstCode
        in: query
        description: Status Code
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDSER_SSST_CODE
      - name: seprCode
        in: query
        description: Provided Code
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SGRDSER_SEPR_CODE
      - name: sprvCode
