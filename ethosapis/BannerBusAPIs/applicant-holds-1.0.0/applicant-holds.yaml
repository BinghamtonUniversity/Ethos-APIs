openapi: 3.0.0
info:
  title: applicant-holds
  description: API for ROAHOLD administrative page<br><br>When using this API, if
    you are trying to lock or unlock a hold, you need to perform two APIs calls
    as the API cannot perform an update to another field(s) at the same time as
    a lock (unlock).
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: ROAHOLD
  x-source-domain: Financial Aid
  x-source-title: Applicant Holds
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/applicant-holds:
    get:
      tags:
        - applicant-holds
      summary: Return resources from ROAHOLD
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckId
          in: query
          required: false
          schema:
            type: string
        - name: holdCode
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORHOLD_HOLD_CODE
        - name: fundCode
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORHOLD_FUND_CODE
        - name: reason
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORHOLD_REASON
        - name: releaseInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORHOLD_RELEASE_IND
        - name: aidyCode
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORHOLD_AIDY_CODE
        - name: period
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORHOLD_PERIOD
        - name: fromDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORHOLD_FROM_DATE
        - name: toDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORHOLD_TO_DATE
        - name: userId
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RORHOLD_USER_ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/applicant-holds-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - applicant-holds
      summary: Updates an existing resource in ROAHOLD
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/applicant-holds-1.0.0_put_request"
            example:
              reason: putTest
