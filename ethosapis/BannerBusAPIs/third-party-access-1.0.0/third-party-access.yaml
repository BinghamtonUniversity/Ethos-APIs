openapi: 3.0.0
info:
  title: third-party-access
  description: API for GOATPAC administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: GOATPAC
  x-source-domain: Foundation
  x-source-title: Third Party Access
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/third-party-access:
    get:
      tags:
        - third-party-access
      summary: Return resources from GOATPAC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/third-party-access-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - third-party-access
      summary: Updates an existing resource in GOATPAC
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/third-party-access-1.0.0_put_request"
            example:
              pinExpDate: 5182021
              id: A00030988
              pinDisabledInd: Y
              usageAcceptInd: Y
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/third-party-access-1.0.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/third-party-access:
    post:
      tags:
        - third-party-access QAPI (Query by POST)
      summary: Return resources from GOATPAC
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/third-party-access-1.0.0_get_request"
            example:
              id: A00030988
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/third-party-access-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    third-party-access-1.0.0_get_request:
      type: object
      properties:
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: KEY_BLOCK
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    third-party-access-1.0.0_get_response:
      type: object
      properties:
        externalUser:
          title: Third Party ID
          maxLength: 30
          type: string
          description: "Lineage reference object : GOBTPAC_EXTERNAL_USER"
          x-lineageReferenceObject: GOBTPAC_EXTERNAL_USER
        ldapUser:
          title: LDAP User ID
          maxLength: 55
          type: string
          description: "Lineage reference object : GOBTPAC_LDAP_USER"
          x-lineageReferenceObject: GOBTPAC_LDAP_USER
        pinExpDate:
          title: PIN Expiration Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GOBTPAC_PIN_EXP_DATE"
          format: date-time
          x-lineageReferenceObject: GOBTPAC_PIN_EXP_DATE
        lastAccessDate:
          title: Last Web Access Date
          maxLength: 11
          type: string
          format: date-time
        pinDisabledInd:
          title: PIN Disabled
          maxLength: 1
          type: string
          description: "Lineage reference object : GOBTPAC_PIN_DISABLED_IND"
          x-lineageReferenceObject: GOBTPAC_PIN_DISABLED_IND
        usageAcceptInd:
          title: Web Access Terms Accepted
          maxLength: 1
          type: string
          description: "Lineage reference object : GOBTPAC_USAGE_ACCEPT_IND"
          x-lineageReferenceObject: GOBTPAC_USAGE_ACCEPT_IND
      x-lineageReferenceObject: gobtpac
    third-party-access-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
    third-party-access-1.0.0_put_response:
      type: object
      properties:
        externalUser:
          title: Third Party ID
          maxLength: 30
          type: string
          description: "Lineage reference object : GOBTPAC_EXTERNAL_USER"
          x-lineageReferenceObject: GOBTPAC_EXTERNAL_USER
        ldapUser:
          title: LDAP User ID
          maxLength: 55
          type: string
          description: "Lineage reference object : GOBTPAC_LDAP_USER"
          x-lineageReferenceObject: GOBTPAC_LDAP_USER
        pinExpDate:
          title: PIN Expiration Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GOBTPAC_PIN_EXP_DATE"
          format: date-time
          x-lineageReferenceObject: GOBTPAC_PIN_EXP_DATE
        lastAccessDate:
          title: Last Web Access Date
          maxLength: 11
          type: string
          format: date-time
        pinDisabledInd:
          title: PIN Disabled
          maxLength: 1
          type: string
          description: "Lineage reference object : GOBTPAC_PIN_DISABLED_IND"
          x-lineageReferenceObject: GOBTPAC_PIN_DISABLED_IND
        usageAcceptInd:
          title: Web Access Terms Accepted
          maxLength: 1
          type: string
          description: "Lineage reference object : GOBTPAC_USAGE_ACCEPT_IND"
          x-lineageReferenceObject: GOBTPAC_USAGE_ACCEPT_IND
      x-lineageReferenceObject: gobtpac
    third-party-access-1.0.0_put_request:
      type: object
      properties:
        criteria.externalUser:
          title: Third Party ID
          maxLength: 30
          type: string
          description: "Lineage reference object : GOBTPAC_EXTERNAL_USER"
          x-lineageReferenceObject: GOBTPAC_EXTERNAL_USER
        pinExpDate:
          title: PIN Expiration Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GOBTPAC_PIN_EXP_DATE"
          format: date-time
          x-lineageReferenceObject: GOBTPAC_PIN_EXP_DATE
        criteria.ldapUser:
          title: LDAP User ID
          maxLength: 55
          type: string
          description: "Lineage reference object : GOBTPAC_LDAP_USER"
          x-lineageReferenceObject: GOBTPAC_LDAP_USER
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        pinDisabledInd:
          title: PIN Disabled
          maxLength: 1
          type: string
          description: "Lineage reference object : GOBTPAC_PIN_DISABLED_IND"
          x-lineageReferenceObject: GOBTPAC_PIN_DISABLED_IND
        usageAcceptInd:
          title: Web Access Terms Accepted
          maxLength: 1
          type: string
          description: "Lineage reference object : GOBTPAC_USAGE_ACCEPT_IND"
          x-lineageReferenceObject: GOBTPAC_USAGE_ACCEPT_IND
        criteria.pinDisabledInd:
          title: PIN Disabled
          maxLength: 1
          type: string
          description: "Lineage reference object : GOBTPAC_PIN_DISABLED_IND"
          x-lineageReferenceObject: GOBTPAC_PIN_DISABLED_IND
        criteria.usageAcceptInd:
          title: Web Access Terms Accepted
          maxLength: 1
          type: string
          description: "Lineage reference object : GOBTPAC_USAGE_ACCEPT_IND"
          x-lineageReferenceObject: GOBTPAC_USAGE_ACCEPT_IND
        criteria.pinExpDate:
          title: PIN Expiration Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GOBTPAC_PIN_EXP_DATE"
          format: date-time
          x-lineageReferenceObject: GOBTPAC_PIN_EXP_DATE
        criteria.lastAccessDate:
          title: Last Web Access Date
          maxLength: 11
          type: string
          format: date-time
      x-lineageReferenceObject: GOBTPAC
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
