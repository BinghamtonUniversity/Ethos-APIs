openapi: 3.0.0
info:
  title: fixed-asset-transfer
  description: API for FFATRAN administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: FFATRAN
  x-source-domain: Finance
  x-source-title: Fixed Asset Transfer
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: '{server_url}'
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/fixed-asset-transfer:
    get:
      tags:
        - fixed-asset-transfer
      summary: Return resources from FFATRAN
      description: |
        Returns all asset transfer records from the FFRTRAN table, sorted with the highest Sequence Numbers first.

        If no transfer records exist, the API query creates a new transfer record Sequence Number 0 in the FFRTRAN table using data retrieved from the current Asset Master record (FFBMAST) viewable in the FFIMAST "Transfer Data" section.  After the initial query, Sequence Number 0 data is static and may not be up-to-date versus FFIMAST if there were any subsequent updates with the Asset Master (FFAMAST) page.
        
        The second record returned is equivalent to the FFATRAN Tools menu "Transfer Information" option which is data presented with the API response but is not present in the transfer tables. The Transfer Information in the second record of the response can be identified because the non-persistent Transfer Information never contains the following properties that are present for Sequence Number 0 and all transfers with Sequence Numbers 1 or higher:
        
        - Sequence Number "seqNum"
        - Transfer Reason "trfReason"
        - Transfer Reference Document "trfDocNum" - optional reference number
        - User ID "userId"
        - Activity Date "activityDate"
        
        
          **Additional information for the second record:**
        
        - Before creating a transfer for Sequence Number 1, the Transfer Information in the second record can be useful to review up-to-date information from FFBMAST for cases when Sequence Number 0 data in the FFRTRAN table returned by the API query is no longer the same as the current data in FFBMAST.
        - After transfers exist with at least Sequence Number 1, then the second record Transfer Information is always redundant to the first record and the second record with Transfer Information can be ignored.  This is true because after a transfer record exists, the Asset Master can no longer be updated using the Asset Master (FFAMAST) page.
        
        Warning:  Queries can fail when the Custodian for a transfer record does not have a telephone number indicated as Primary with FOAIDEN, and the following error message applies for the BPAPI and the FFATRAN page, "Receiver ID is not in the Telephone table."  Customers can update the Custodian information to resolve the API error.
        
        **The GET method and the QAPI POST method have the same functionality and the same response schema.**
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: |
            The maximum number of resources requesting for this result set.
            <br><br>
            
            **Note:**
            The only value supported for limit is 1. When used, the record with the highest Sequence Number is returned without a second record for the Transfer Information which is redundant when the last Sequence Number is 1 or higher.
            
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: |
            The filter criteria as a single URL query parameter. Use this parameter or the individual parameters listed. Must be a JSON representation of the property searching for. This can be any of the properties listed on the URL or QAPI and must be a json representation that can be validated against the GET schema. Limit and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: ptagCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/fixed-asset-transfer-1.0.0_get_response'
        '400':
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
        '401':
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
    post:
      tags:
        - fixed-asset-transfer
      summary: Creates a new resource in FFATRAN
      description: |
        The API can create a new transfer record using the next one-up Sequence Number.
        
        - If there are existing transfer records in the FFRTRAN table for an asset tag including a tag with just one transfer record for Sequence Number 0, then the API adds one transfer record with the next one-up Sequence Number.
          - The POST response is one record for the last Sequence Number inserted for the given transfer.
          - The new transfer record contains "Transfer From" information from the previous "Transfer To" information.
        
        - If there are no existing transfer records in FFRTRAN, then the API creates Sequence Number 0 with the pre-existing information from the Asset Master FFBMAST and adds Sequence Number 1 with the Transfer Information given.
          - The POST response is one record for Sequence Number 1 for the given transfer.
          - The transfer record inserted for Sequence Number 0 not returned in the response contains "Transfer To" information from the Asset Master FFBMAST.
          - The transfer record inserted for Sequence Number 1 contains "Transfer From" information from the Sequence Number 0 "Transfer To" information.

        Warning:  POST fails when a Custodian does not have a telephone number indicated as Primary with FOAIDEN, and the following error message would apply for the BPAPI, "Receiver ID is not in the Telephone table."  The Fixed Asset Transfer (FFATRAN) page contains the same error message. Customers can update the Custodian information to resolve the API error.
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: '#/components/schemas/fixed-asset-transfer-1.0.0_post_request'
            example:
              keyBlockPtagCode: B00000003
              grntCodeTo: TESTGRNT
              trfDocNum: '1'
              trfReason: TEST SEQUENCE 4
              orgnCodeTo: '11004'
              trfDate: '2025-10-31'
              equipMgrId: MGRID01
              otagCodePrimary: B00000002
              userStatusCode: G
              ttstCode: FG
              coasCodeTo: B
              rcvrId: A00000001
              aconCode: A1
              locnCodeTo: '100101'
              ptagCode: B00000003
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/fixed-asset-transfer-1.0.0_post_response'
        '400':
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
        '401':
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
  /qapi/fixed-asset-transfer:
    post:
      tags:
        - fixed-asset-transfer QAPI (Query by POST)
      summary: Return resources from FFATRAN
      description: |
        <br><br>
        **The GET method and the QAPI POST method have the same functionality and the same response schema.**
        <br><br>
        (Information shown below is the same as for the GET method above.)
            
        <br><br>
        Returns all asset transfer records from the FFRTRAN table, sorted with the highest Sequence Numbers first.

        If no transfer records exist, the API query creates a new transfer record Sequence Number 0 in the FFRTRAN table using data retrieved from the current Asset Master record (FFBMAST) viewable in the FFIMAST "Transfer Data" section.  After the initial query, Sequence Number 0 data is static and may not be up-to-date versus FFIMAST if there were any subsequent updates with the Asset Master (FFAMAST) page.
        
        The second record returned is equivalent to the FFATRAN Tools menu "Transfer Information" option which is data presented with the API response but is not present in the transfer tables. The Transfer Information in the second record of the response can be identified because the non-persistent Transfer Information never contains the following properties that are present for Sequence Number 0 and all transfers with Sequence Numbers 1 or higher:
        
        - Sequence Number "seqNum"
        - Transfer Reason "trfReason"
        - Transfer Reference Document "trfDocNum" - optional reference number
        - User ID "userId"
        - Activity Date "activityDate"
        
        
          **Additional information for the second record:**
        
        - Before creating a transfer for Sequence Number 1, the Transfer Information in the second record can be useful to review up-to-date information from FFBMAST for cases when Sequence Number 0 data in the FFRTRAN table returned by the API query is no longer the same as the current data in FFBMAST.
        - After transfers exist with at least Sequence Number 1, then the second record Transfer Information is always redundant to the first record and the second record with Transfer Information can be ignored.  This is true because after a transfer record exists, the Asset Master can no longer be updated using the Asset Master (FFAMAST) page.
        
        Warning:  Queries can fail when the Custodian for a transfer record does not have a telephone number indicated as Primary with FOAIDEN, and the following error message applies for the BPAPI and the FFATRAN page, "Receiver ID is not in the Telephone table."  Customers can update the Custodian information to resolve the API error.
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: '#/components/schemas/fixed-asset-transfer-1.0.0_qapi_post_request'
            example:
              ptagCode: '1000001'
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/fixed-asset-transfer-1.0.0_get_response'
        '400':
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
        '401':
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
