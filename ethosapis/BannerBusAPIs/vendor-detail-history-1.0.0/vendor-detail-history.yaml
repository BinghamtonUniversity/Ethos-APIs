        favvic2CheckDate:
          title: Check Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FAVVIC2_CHECK_DATE"
          format: date-time
          x-lineageReferenceObject: FAVVIC2_CHECK_DATE
        favvic2PayType:
          title: Pay Type
          maxLength: 30
