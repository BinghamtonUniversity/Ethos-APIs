          x-lineageReferenceObject: FAVVIC2_PMT_DUE_DATE
        favvic2CheckDate:
          title: Check Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FAVVIC2_CHECK_DATE"
          format: date-time
          x-lineageReferenceObject: FAVVIC2_CHECK_DATE
        favvic2CheckNum:
          title: Check Number
          maxLength: 8
          type: string
          description: "Lineage reference object : FAVVIC2_CHECK_NUM"
          x-lineageReferenceObject: FAVVIC2_CHECK_NUM
        favvic2PayType:
          type: string
    vendor-detail-history-1.0.0_get_request:
      type: object
      properties:
        favvic2PmtDueDate:
          title: Due Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FAVVIC2_PMT_DUE_DATE"
          format: date-time
          x-lineageReferenceObject: FAVVIC2_PMT_DUE_DATE
        faavndhVendCode:
          title: Vendor
