openapi: 3.0.0
info:
  title: vendor-detail-history
  description: API for FAIVNDH administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FAIVNDH
  x-source-domain: Finance
  x-source-title: Vendor Detail History
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/vendor-detail-history:
    get:
      tags:
        - vendor-detail-history
      summary: Return resources from FAIVNDH
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: faavndhVendCode
          in: query
          required: false
          schema:
            type: string
        - name: faavndhVendName
          in: query
          required: false
          schema:
            type: string
        - name: faavndhSelInd
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
        - name: displayFsyrCode
          in: query
          required: false
          schema:
            type: string
        - name: favvic2VendInvCode
          in: query
          description: Vendor Invoice
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_VEND_INV_CODE
        - name: favvic2InvhCode
          in: query
          description: Invoice
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_INVH_CODE
        - name: favvic2ApprInd
          in: query
          description: Approval
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_APPR_IND
        - name: favvic2MultipleInvInd
          in: query
          description: Multiple
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_MULTIPLE_INV_IND
        - name: favvic2CrMemoInd
          in: query
          description: Credit Memo
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_CR_MEMO_IND
        - name: favvic2OpenPaidInd
          in: query
          description: Open/Paid
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_OPEN_PAID_IND
        - name: favvic2CancelInd
          in: query
          description: Cancel
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_CANCEL_IND
        - name: favvic2VendInvTotal
          in: query
          description: Vendor Invoice Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_VEND_INV_TOTAL
        - name: favvic2PmtDueDate
          in: query
          description: Due Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_PMT_DUE_DATE
        - name: favvic2CheckDate
          in: query
          description: Check Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_CHECK_DATE
        - name: favvic2CheckNum
          in: query
          description: Check Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FAVVIC2_CHECK_NUM
        - name: favvic2PayType
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/vendor-detail-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/vendor-detail-history:
    post:
      tags:
        - vendor-detail-history QAPI (Query by POST)
      summary: Return resources from FAIVNDH
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/vendor-detail-history-1.0.0_get_request"
            example:
              faavndhVendCode: V9
              faavndhVendName: ATT
              displayFsyrCode: 22
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/vendor-detail-history-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    vendor-detail-history-1.0.0_get_response:
      type: object
      properties:
        total_block:
          type: array
          items:
            type: object
            properties:
              total:
                title: Total
                maxLength: 31
                type: number
                description: "Lineage reference object : total"
                x-lineageReferenceObject: total
            x-lineageReferenceObject: total_block
        fabinvh_block:
          type: array
          items:
            type: object
            properties:
              favvic2PmtDueDate:
                title: Due Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FAVVIC2_PMT_DUE_DATE"
                format: date-time
                x-lineageReferenceObject: FAVVIC2_PMT_DUE_DATE
              favvic2ApprInd:
                title: Approval
                maxLength: 1
                type: string
                description: "Lineage reference object : FAVVIC2_APPR_IND"
                x-lineageReferenceObject: FAVVIC2_APPR_IND
              favvic2InvhCode:
                title: Invoice
                maxLength: 8
                type: string
                description: "Lineage reference object : FAVVIC2_INVH_CODE"
                x-lineageReferenceObject: FAVVIC2_INVH_CODE
              favvic2VendInvTotal:
                title: Vendor Invoice Amount
                maxLength: 25
                type: number
                description: "Lineage reference object : FAVVIC2_VEND_INV_TOTAL"
                x-lineageReferenceObject: FAVVIC2_VEND_INV_TOTAL
              favvic2CheckNum:
                title: Check Number
                maxLength: 8
                type: string
                description: "Lineage reference object : FAVVIC2_CHECK_NUM"
                x-lineageReferenceObject: FAVVIC2_CHECK_NUM
              favvic2CancelInd:
                title: Cancel
                maxLength: 1
                type: string
                description: "Lineage reference object : FAVVIC2_CANCEL_IND"
                x-lineageReferenceObject: FAVVIC2_CANCEL_IND
              favvic2CrMemoInd:
                title: Credit Memo
                maxLength: 1
                type: string
                description: "Lineage reference object : FAVVIC2_CR_MEMO_IND"
                x-lineageReferenceObject: FAVVIC2_CR_MEMO_IND
              favvic2OpenPaidInd:
                title: Open/Paid
                maxLength: 1
                type: string
                description: "Lineage reference object : FAVVIC2_OPEN_PAID_IND"
                x-lineageReferenceObject: FAVVIC2_OPEN_PAID_IND
              favvic2MultipleInvInd:
                title: Multiple
                maxLength: 1
                type: string
                description: "Lineage reference object : FAVVIC2_MULTIPLE_INV_IND"
                x-lineageReferenceObject: FAVVIC2_MULTIPLE_INV_IND
              favvic2VendInvCode:
                title: Vendor Invoice
                maxLength: 35
                type: string
                description: "Lineage reference object : FAVVIC2_VEND_INV_CODE"
                x-lineageReferenceObject: FAVVIC2_VEND_INV_CODE
              favvic2CheckDate:
                title: Check Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FAVVIC2_CHECK_DATE"
                format: date-time
                x-lineageReferenceObject: FAVVIC2_CHECK_DATE
            x-lineageReferenceObject: fabinvh_block
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    vendor-detail-history-1.0.0_qapi_post:
      type: object
      properties:
        faavndhVendCode:
          type: string
        faavndhVendName:
          type: string
        faavndhSelInd:
          type: string
        startDate:
