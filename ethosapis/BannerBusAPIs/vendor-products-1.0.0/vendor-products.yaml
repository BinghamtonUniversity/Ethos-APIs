openapi: 3.0.0
info:
  title: vendor-products
  description: API for FPVVPRD administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FPVVPRD
  x-source-domain: Finance
  x-source-title: Vendor Products Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/vendor-products:
    get:
      tags:
        - vendor-products
      summary: Return resources from FPVVPRD
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: displayVendCode
          in: query
          required: false
          schema:
            type: string
        - name: ftvprceUomsCode
          in: query
          description: U/M
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPRCE_UOMS_CODE
        - name: ftvprceEffDate
          in: query
          description: Effective Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPRCE_EFF_DATE
        - name: ftvprceTermDate
          in: query
          description: Termination Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPRCE_TERM_DATE
        - name: ftvprceNchgDate
          in: query
          description: Next Change Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPRCE_NCHG_DATE
        - name: ftvprceActivityDate
          in: query
          description: Last Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVPRCE_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/vendor-products-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/vendor-products:
    post:
      tags:
        - vendor-products QAPI (Query by POST)
      summary: Return resources from FPVVPRD
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/vendor-products-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/vendor-products-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    vendor-products-1.0.0_get_request:
      type: object
      properties:
        ftvprceNchgDate:
          title: Next Change Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPRCE_NCHG_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPRCE_NCHG_DATE
        ftvprceActivityDate:
          title: Last Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPRCE_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPRCE_ACTIVITY_DATE
        ftvprceUomsCode:
          title: U/M
          maxLength: 3
          type: string
          description: "Lineage reference object : FTVPRCE_UOMS_CODE"
          x-lineageReferenceObject: FTVPRCE_UOMS_CODE
        displayVendCode:
          title: Vendor
          maxLength: 9
          type: string
          description: "Lineage reference object : displayVendCode, Lookup lineage
            reference object : ftvvend"
          x-lineageReferenceObject: displayVendCode
          x-lineageLookupReferenceObject: ftvvend
        ftvprceEffDate:
          title: Effective Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPRCE_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPRCE_EFF_DATE
        ftvprceTermDate:
          title: Termination Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPRCE_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPRCE_TERM_DATE
      x-lineageReferenceObject: FTVPRCE_BLOCK
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    vendor-products-1.0.0_qapi_post:
      type: object
      properties:
        displayVendCode:
          type: string
        ftvprceUomsCode:
          title: U/M
          maxLength: 3
          type: string
          description: "Lineage reference object : FTVPRCE_UOMS_CODE"
          x-lineageReferenceObject: FTVPRCE_UOMS_CODE
        ftvprceEffDate:
          title: Effective Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPRCE_EFF_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPRCE_EFF_DATE
        ftvprceTermDate:
          title: Termination Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPRCE_TERM_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPRCE_TERM_DATE
        ftvprceNchgDate:
          title: Next Change Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPRCE_NCHG_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPRCE_NCHG_DATE
        ftvprceActivityDate:
          title: Last Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FTVPRCE_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FTVPRCE_ACTIVITY_DATE
    vendor-products-1.0.0_get_response:
      type: object
      properties:
        key_block:
          type: array
          items:
            type: object
            properties:
              vendorHold:
                title: Vendor Hold
                maxLength: 1
                type: string
                description: "Lineage reference object : vendorHold"
                x-lineageReferenceObject: vendorHold
              vendorName:
                maxLength: 230
                type: string
                description: "Lineage reference object : vendorName"
                x-lineageReferenceObject: vendorName
              displayVendCode:
                title: Vendor
                maxLength: 9
                type: string
                description: "Lineage reference object : displayVendCode, Lookup lineage
                  reference object : ftvvend"
                x-lineageReferenceObject: displayVendCode
                x-lineageLookupReferenceObject: ftvvend
            x-lineageReferenceObject: key_block
        ftvprce_block:
          type: array
          items:
            type: object
            properties:
              ftvprceNchgDate:
                title: Next Change Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FTVPRCE_NCHG_DATE"
                format: date-time
                x-lineageReferenceObject: FTVPRCE_NCHG_DATE
              ftvprceVendRefNum:
                title: Part Number
                maxLength: 15
                type: string
                description: "Lineage reference object : FTVPRCE_VEND_REF_NUM"
                x-lineageReferenceObject: FTVPRCE_VEND_REF_NUM
              ftvprceActivityDate:
                title: Last Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FTVPRCE_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: FTVPRCE_ACTIVITY_DATE
              ftvprceUomsCode:
                title: U/M
                maxLength: 3
                type: string
                description: "Lineage reference object : FTVPRCE_UOMS_CODE"
                x-lineageReferenceObject: FTVPRCE_UOMS_CODE
              ftvprceCommCode:
                title: Commodity
                maxLength: 10
                type: string
                description: "Lineage reference object : FTVPRCE_COMM_CODE"
                x-lineageReferenceObject: FTVPRCE_COMM_CODE
              commodityDesc:
                maxLength: 60
                type: string
              ftvprceEffDate:
                title: Effective Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FTVPRCE_EFF_DATE"
                format: date-time
                x-lineageReferenceObject: FTVPRCE_EFF_DATE
              ftvprceTermDate:
                title: Termination Date
                maxLength: 11
                type: string
                description: "Lineage reference object : FTVPRCE_TERM_DATE"
                format: date-time
                x-lineageReferenceObject: FTVPRCE_TERM_DATE
              ftvprceAgreCode:
                title: Agreement Number
                maxLength: 15
                type: string
                description: "Lineage reference object : FTVPRCE_AGRE_CODE"
                x-lineageReferenceObject: FTVPRCE_AGRE_CODE
              ftvprceUnitPrice:
                title: Unit Price
                maxLength: 21
                type: number
                description: "Lineage reference object : FTVPRCE_UNIT_PRICE"
                x-lineageReferenceObject: FTVPRCE_UNIT_PRICE
            x-lineageReferenceObject: ftvprce_block
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
