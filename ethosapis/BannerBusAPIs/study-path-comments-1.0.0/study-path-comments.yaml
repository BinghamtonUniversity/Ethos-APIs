          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: stspKeySeqno
          in: query
          required: false
          schema:
            type: string
        - name: cmttCode
          in: query
          description: Comment Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGRSPCM_CMTT_CODE
        - name: seqNo
          in: query
          description: Sequence Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGRSPCM_SEQ_NO
        - name: fromDate
          in: query
          description: From Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGRSPCM_FROM_DATE
        - name: toDate
          in: query
          description: To Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGRSPCM_TO_DATE
        - name: reportInd
          in: query
          description: Report
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGRSPCM_REPORT_IND
        - name: text
          in: query
          description: Comments
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGRSPCM_TEXT
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
