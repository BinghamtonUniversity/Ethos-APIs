openapi: 3.0.0
info:
  title: ca-ccpg-processing-options-award
  description: API for RVAPROP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: RVAPROP
  x-source-domain: Financial Aid
  x-source-title: CCPG Processing Options (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-ccpg-processing-options-award:
    post:
      tags:
        - ca-ccpg-processing-options-award
      summary: Creates a new resource in RVAPROP
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-ccpg-processing-options-award-1.0.0_post_request"
            example:
              eligCode: FW-2
              period: 202120
              aidyCode: 2021
              acceptAmt: 100
              fundCode: BOGA0D
              collCode: AH
              misSumrAidyCode: 2122
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-ccpg-processing-options-award-1.0.0_post_respons\
                    e"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-ccpg-processing-options-award: {}
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-ccpg-processing-options-award-1.0.0_post_request:
      required:
        - eligCode
        - fundCode
        - period
        - acceptAmt
      type: object
      properties:
        eligCode:
          title: Eligibility Code
          maxLength: 6
          type: string
          description: "Lineage reference object : RVRFAMC_ELIG_CODE, Lookup lineage
            reference object : RVVELIG"
          x-lineageReferenceObject: RVRFAMC_ELIG_CODE
          x-lineageLookupReferenceObject: RVVELIG
        period:
          title: Period
          maxLength: 15
          type: string
          description: "Lineage reference object : RVRAPRD_PERIOD, Lookup lineage
            reference object : robprds"
          x-lineageReferenceObject: RVRAPRD_PERIOD
          x-lineageLookupReferenceObject: robprds
        aidyCode:
          title: Aid Year
          maxLength: 30
          type: string
          description: "Lineage reference object : aidyCode, Lookup lineage reference
            object : robinst,rvbbogw"
          x-lineageReferenceObject: aidyCode
          x-lineageLookupReferenceObject: robinst,rvbbogw
        acceptAmt:
          title: Amount
          maxLength: 10
          type: number
          description: "Lineage reference object : RVRAPRD_ACCEPT_AMT"
          x-lineageReferenceObject: RVRAPRD_ACCEPT_AMT
        fundCode:
          title: Fund Code
          maxLength: 30
          type: string
          description: "Lineage reference object : RVRFAMC_FUND_CODE, Lookup lineage
            reference object : rfrbase,rfraspc"
          x-lineageReferenceObject: RVRFAMC_FUND_CODE
          x-lineageLookupReferenceObject: rfrbase,rfraspc
        collCode:
          title: College
          maxLength: 30
          type: string
          description: "Lineage reference object : collCode, Lookup lineage reference
            object : stvcoll"
          x-lineageReferenceObject: collCode
          x-lineageLookupReferenceObject: stvcoll
        misSumrAidyCode:
          title: MIS Reporting Aid Year
          maxLength: 30
          type: string
          description: "Lineage reference object : RVRAPRD_MIS_SUMR_AIDY_CODE, Lookup
            lineage reference object : robinst,ROBINST"
          x-lineageReferenceObject: RVRAPRD_MIS_SUMR_AIDY_CODE
          x-lineageLookupReferenceObject: robinst,ROBINST
      x-lineageReferenceObject: RVRAPRD
    ca-ccpg-processing-options-award-1.0.0_post_response:
      type: object
      properties:
        rvrfamc:
          type: array
          items:
            required:
              - eligCode
              - fundCode
            type: object
            properties:
              fundDesc:
                title: Fund Code Description
                type: string
              eligCode:
                title: Eligibility Code
                maxLength: 6
                type: string
                description: "Lineage reference object : RVRFAMC_ELIG_CODE, Lookup lineage
                  reference object : RVVELIG"
                x-lineageReferenceObject: RVRFAMC_ELIG_CODE
                x-lineageLookupReferenceObject: RVVELIG
              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : RVRFAMC_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: RVRFAMC_ACTIVITY_DATE
              fundCode:
                title: Fund Code
                maxLength: 30
                type: string
                description: "Lineage reference object : RVRFAMC_FUND_CODE, Lookup lineage
                  reference object : rfrbase,rfraspc"
                x-lineageReferenceObject: RVRFAMC_FUND_CODE
                x-lineageLookupReferenceObject: rfrbase,rfraspc
              eligDesc:
                title: Eligibility Code Description
                type: string
              userId:
                title: User
                maxLength: 30
                type: string
                description: "Lineage reference object : RVRFAMC_USER_ID"
                x-lineageReferenceObject: RVRFAMC_USER_ID
            x-lineageReferenceObject: rvrfamc
        rvraprd:
          type: array
          items:
            required:
              - acceptAmt
              - period
            type: object
            properties:
              period:
                title: Period
                maxLength: 15
                type: string
                description: "Lineage reference object : RVRAPRD_PERIOD, Lookup lineage
                  reference object : robprds"
                x-lineageReferenceObject: RVRAPRD_PERIOD
                x-lineageLookupReferenceObject: robprds
              periodDesc:
                title: Period Description
                type: string
              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : RVRAPRD_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: RVRAPRD_ACTIVITY_DATE
              acceptAmt:
                title: Amount
                maxLength: 10
                type: number
                description: "Lineage reference object : RVRAPRD_ACCEPT_AMT"
                x-lineageReferenceObject: RVRAPRD_ACCEPT_AMT
              misSumrAidyCode:
                title: MIS Reporting Aid Year
                maxLength: 30
                type: string
                description: "Lineage reference object : RVRAPRD_MIS_SUMR_AIDY_CODE, Lookup
                  lineage reference object : robinst,ROBINST"
                x-lineageReferenceObject: RVRAPRD_MIS_SUMR_AIDY_CODE
                x-lineageLookupReferenceObject: robinst,ROBINST
              userId:
                title: User
                maxLength: 30
                type: string
                description: "Lineage reference object : RVRAPRD_USER_ID"
                x-lineageReferenceObject: RVRAPRD_USER_ID
            x-lineageReferenceObject: rvraprd
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
