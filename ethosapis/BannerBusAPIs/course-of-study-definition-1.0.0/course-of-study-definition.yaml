          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORCRST_PROGRAM_EFTSL
        - name: cmbCrsStudyInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORCRST_CMB_CRS_STUDY_IND
        - name: activeInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORCRST_ACTIVE_IND
        - name: statusCde
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORCRST_STATUS_CDE
        - name: activityDate
          in: query
