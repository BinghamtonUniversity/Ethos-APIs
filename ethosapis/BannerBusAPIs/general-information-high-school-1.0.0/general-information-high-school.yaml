openapi: 3.0.0
info:
  title: general-information-high-school
  description: API for PPAGENL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: PPAGENL
  x-source-domain: Human Resources
  x-source-title: General Information
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/general-information-high-school:
    get:
      tags:
        - general-information-high-school
      summary: Return resources from PPAGENL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: sbgiCode
          in: query
          description: High School
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORHSCH_SBGI_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/general-information-high-school-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/general-information-high-school:
    post:
      tags:
        - general-information-high-school QAPI (Query by POST)
      summary: Return resources from PPAGENL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/general-information-high-school-1.0.0_get_request"
            example:
              id: A00010003
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/general-information-high-school-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    general-information-high-school-1.0.0_get_response:
      required:
        - sbgiCode
      type: object
      properties:
        dplmCode:
          title: Diploma
          maxLength: 30
          type: string
          description: "Lineage reference object : SORHSCH_DPLM_CODE, Lookup lineage
            reference object : stvdplm"
          x-lineageReferenceObject: SORHSCH_DPLM_CODE
          x-lineageLookupReferenceObject: stvdplm
        collPrepInd:
          title: College Preparation
          maxLength: 1
          type: string
          description: "Lineage reference object : SORHSCH_COLL_PREP_IND"
          x-lineageReferenceObject: SORHSCH_COLL_PREP_IND
        sbgiCode:
          title: High School
          maxLength: 20
          type: string
          description: "Lineage reference object : SORHSCH_SBGI_CODE"
          x-lineageReferenceObject: SORHSCH_SBGI_CODE
        userId:
          maxLength: 30
          type: string
          description: "Lineage reference object : SORHSCH_USER_ID"
          x-lineageReferenceObject: SORHSCH_USER_ID
        classRank:
          title: Class Rank and Size
          maxLength: 4
          type: number
          description: "Lineage reference object : SORHSCH_CLASS_RANK"
          x-lineageReferenceObject: SORHSCH_CLASS_RANK
        transRecvDate:
          title: Transcript Received Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SORHSCH_TRANS_RECV_DATE"
          format: date-time
          x-lineageReferenceObject: SORHSCH_TRANS_RECV_DATE
        classSize:
          title: High School Class Size
          maxLength: 4
          type: number
          description: "Lineage reference object : SORHSCH_CLASS_SIZE"
          x-lineageReferenceObject: SORHSCH_CLASS_SIZE
        activityDate:
          title: Sorhsch Activity Date
          maxLength: 26
          type: string
          description: "Lineage reference object : SORHSCH_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SORHSCH_ACTIVITY_DATE
        percentile:
          title: Percentile
          maxLength: 6
          type: number
          description: "Lineage reference object : SORHSCH_PERCENTILE"
          x-lineageReferenceObject: SORHSCH_PERCENTILE
        graduationDate:
          title: Graduation Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SORHSCH_GRADUATION_DATE"
          format: date-time
          x-lineageReferenceObject: SORHSCH_GRADUATION_DATE
        stvsbgiDesc:
          type: string
        gpa:
          title: GPA
          maxLength: 24
          type: string
          description: "Lineage reference object : SORHSCH_GPA"
          x-lineageReferenceObject: SORHSCH_GPA
        stvdplmDesc:
          type: string
      x-lineageReferenceObject: sorhsch
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    general-information-high-school-1.0.0_get_request:
      required:
        - sbgiCode
      type: object
      properties:
        sbgiCode:
          title: Prior College
          maxLength: 20
          type: string
          description: "Lineage reference object : SORPCOL_SBGI_CODE, Lookup lineage
            reference object : stvsbgi"
          x-lineageReferenceObject: SORPCOL_SBGI_CODE
          x-lineageLookupReferenceObject: stvsbgi
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: SORPCOL
    general-information-high-school-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        sbgiCode:
          title: High School
          maxLength: 20
          type: string
          description: "Lineage reference object : SORHSCH_SBGI_CODE"
          x-lineageReferenceObject: SORHSCH_SBGI_CODE
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
