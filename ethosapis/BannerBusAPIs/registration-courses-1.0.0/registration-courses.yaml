                maxLength: 3
                type: number
                description: "Lineage reference object : SSBSECT_WAIT_COUNT"
                x-lineageReferenceObject: SSBSECT_WAIT_COUNT
            x-lineageReferenceObject: ssbsect
        sfrstcr:
          type: array
          items:
            type: object
            properties:
              preqOver:
