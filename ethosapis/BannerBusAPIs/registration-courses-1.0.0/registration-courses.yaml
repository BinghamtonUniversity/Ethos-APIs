              linkOver:
                title: Link
                maxLength: 1
                type: string
                description: "Lineage reference object : SFRSTCR_LINK_OVER"
                x-lineageReferenceObject: SFRSTCR_LINK_OVER
              reptOver:
                title: Repeat Limit
                maxLength: 1
                type: string
                description: "Lineage reference object : SFRSTCR_REPT_OVER"
                x-lineageReferenceObject: SFRSTCR_REPT_OVER
              timeOver:
                title: Time
                maxLength: 1
