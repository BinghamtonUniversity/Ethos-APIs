            required:
              - campCode
              - crseNumb
              - schdCode
              - seqNumb
              - sstsCode
              - subjCode
            type: object
            properties:
              scbcrseOthHrLow:
                title: Other
                maxLength: 9
                type: number
              creditHrs:
                title: Section
                maxLength: 9
                type: number
                description: "Lineage reference object : SSBSECT_CREDIT_HRS"
                x-lineageReferenceObject: SSBSECT_CREDIT_HRS
              scbcrseOthHrHigh:
                maxLength: 9
                type: number
              scbcrseBillHrInd:
                title: Course
                maxLength: 2
                type: string
              scbcrseContHrHigh:
                maxLength: 9
                type: number
              scbcrseContHrInd:
                maxLength: 2
                type: string
              title:
