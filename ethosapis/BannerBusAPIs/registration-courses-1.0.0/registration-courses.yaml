openapi: 3.0.0
info:
  title: registration-courses
  description: API for SFQSECT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SFQSECT
  x-source-domain: Student
  x-source-title: Registration Course Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/registration-courses:
    get:
      tags:
        - registration-courses
      summary: Return resources from SFQSECT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: ssasectTermCode
          in: query
          required: false
          schema:
            type: string
        - name: ssasectCrn
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/registration-courses-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/registration-courses:
    post:
      tags:
        - registration-courses QAPI (Query by POST)
      summary: Return resources from SFQSECT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/registration-courses-1.0.0_get_request"
            example:
              ssasectTermCode: 1010
              ssasectCrn: 10009
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/registration-courses-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    registration-courses-1.0.0_get_response:
      type: object
      properties:
        ssrmeet:
          type: array
          items:
            type: object
            properties:
              endDate:
                title: End Date
                maxLength: 30
                type: string
                description: "Lineage reference object : SSRMEET_END_DATE"
                format: date-time
                x-lineageReferenceObject: SSRMEET_END_DATE
              buildingDescription:
                title: Building Description
                maxLength: 30
                type: string
              wedDay:
                maxLength: 1
                type: string
                description: "Lineage reference object : SSRMEET_WED_DAY"
                x-lineageReferenceObject: SSRMEET_WED_DAY
              tueDay:
                maxLength: 1
                type: string
                description: "Lineage reference object : SSRMEET_TUE_DAY"
                x-lineageReferenceObject: SSRMEET_TUE_DAY
              roomCode:
