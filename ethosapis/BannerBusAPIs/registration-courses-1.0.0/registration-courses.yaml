                maxLength: 10
                type: string
                description: "Lineage reference object : SSRMEET_ROOM_CODE"
                x-lineageReferenceObject: SSRMEET_ROOM_CODE
              sunDay:
                maxLength: 1
                type: string
                description: "Lineage reference object : SSRMEET_SUN_DAY"
                x-lineageReferenceObject: SSRMEET_SUN_DAY
              friDay:
                maxLength: 1
                type: string
                description: "Lineage reference object : SSRMEET_FRI_DAY"
                x-lineageReferenceObject: SSRMEET_FRI_DAY
              thuDay:
                maxLength: 1
                type: string
                description: "Lineage reference object : SSRMEET_THU_DAY"
                x-lineageReferenceObject: SSRMEET_THU_DAY
              beginTime:
                title: Begin Time
                maxLength: 4
                type: string
                description: "Lineage reference object : SSRMEET_BEGIN_TIME"
                x-lineageReferenceObject: SSRMEET_BEGIN_TIME
              endTime:
                title: End Time
                maxLength: 4
                type: string
                description: "Lineage reference object : SSRMEET_END_TIME"
                x-lineageReferenceObject: SSRMEET_END_TIME
              bldgCode:
                title: Building
                maxLength: 6
                type: string
                description: "Lineage reference object : SSRMEET_BLDG_CODE"
                x-lineageReferenceObject: SSRMEET_BLDG_CODE
              startDate:
                title: Start Date
                maxLength: 30
                type: string
                description: "Lineage reference object : SSRMEET_START_DATE"
                format: date-time
                x-lineageReferenceObject: SSRMEET_START_DATE
              monDay:
                maxLength: 1
                type: string
                description: "Lineage reference object : SSRMEET_MON_DAY"
                x-lineageReferenceObject: SSRMEET_MON_DAY
              satDay:
                maxLength: 1
                type: string
                description: "Lineage reference object : SSRMEET_SAT_DAY"
                x-lineageReferenceObject: SSRMEET_SAT_DAY
