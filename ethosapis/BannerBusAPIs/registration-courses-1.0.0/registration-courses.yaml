              othHr:
                maxLength: 9
                type: number
                description: "Lineage reference object : SSBSECT_OTH_HR"
                x-lineageReferenceObject: SSBSECT_OTH_HR
              scbcrseLecHrLow:
                title: Lecture
                maxLength: 9
                type: number
              contHr:
                maxLength: 9
                type: number
                description: "Lineage reference object : SSBSECT_CONT_HR"
                x-lineageReferenceObject: SSBSECT_CONT_HR
              gmodCode:
                title: Grade Mode
                maxLength: 1
                type: string
                description: "Lineage reference object : SSBSECT_GMOD_CODE"
                x-lineageReferenceObject: SSBSECT_GMOD_CODE
              scbcrseBillHrHigh:
                maxLength: 9
