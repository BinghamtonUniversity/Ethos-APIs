                type: string
                description: "Lineage reference object : SFRSTCR_MAJR_OVER"
                x-lineageReferenceObject: SFRSTCR_MAJR_OVER
            x-lineageReferenceObject: sfrstcr
    registration-courses-1.0.0_get_request:
      type: object
      properties:
        ssasectTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : ssasectTermCode, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: ssasectTermCode
          x-lineageLookupReferenceObject: stvterm
        ssasectCrn:
          title: CRN
          maxLength: 5
          type: string
          description: "Lineage reference object : ssasectCrn"
          x-lineageReferenceObject: ssasectCrn
      x-lineageReferenceObject: KEY_BLOCK
    registration-courses-1.0.0_qapi_post:
      type: object
      properties:
        ssasectTermCode:
          type: string
        ssasectCrn:
          type: string
  securitySchemes:
