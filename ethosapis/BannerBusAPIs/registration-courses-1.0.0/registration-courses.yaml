                maxLength: 4
                type: number
              labHr:
                maxLength: 9
                type: number
                description: "Lineage reference object : SSBSECT_LAB_HR"
                x-lineageReferenceObject: SSBSECT_LAB_HR
              seatsAvail:
                title: Seats Available
                maxLength: 3
                type: number
                description: "Lineage reference object : SSBSECT_SEATS_AVAIL"
                x-lineageReferenceObject: SSBSECT_SEATS_AVAIL
              scbcrseCeuInd:
                title: CEU
                maxLength: 1
                type: string
              scbcrseCreditHrLow:
                title: Credit CEU
                maxLength: 9
                type: number
              scbcrseLecHrInd:
                maxLength: 2
                type: string
              blockInd:
                title: Block
                maxLength: 1
                type: string
              crseNumb:
