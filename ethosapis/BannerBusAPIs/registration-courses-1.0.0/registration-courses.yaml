                maxLength: 1
                type: string
                description: "Lineage reference object : SSBSECT_SSTS_CODE"
                x-lineageReferenceObject: SSBSECT_SSTS_CODE
              scbcrseLecHrHigh:
                maxLength: 9
                type: number
              scbcrseCreditHrInd:
                title: Course
                maxLength: 2
                type: string
              scbcrseLabHrInd:
                maxLength: 2
                type: string
              scbcrseContHrLow:
                title: Contact
                maxLength: 8
