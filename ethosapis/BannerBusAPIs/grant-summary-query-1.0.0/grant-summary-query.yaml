openapi: 3.0.0
info:
  title: grant-summary-query
  description: API for FRIGSUM administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FRIGSUM
  x-source-domain: Finance
  x-source-title: Research Accounting Grant Summary Review
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/grant-summary-query:
    get:
      tags:
        - grant-summary-query
      summary: Return resources from FRIGSUM
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckGrntCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblckPmsCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/grant-summary-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/grant-summary-query:
    post:
      tags:
        - grant-summary-query QAPI (Query by POST)
      summary: Return resources from FRIGSUM
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/grant-summary-query-1.0.0_get_request"
            example:
              keyblckGrntCode: 146161
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/grant-summary-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    grant-summary-query-1.0.0_get_request:
      type: object
      properties:
        keyblckPmsCode:
          title: PMS Code
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckPmsCode"
          x-lineageReferenceObject: keyblckPmsCode
        keyblckGrntCode:
          title: Grant
          maxLength: 9
          type: string
          description: "Lineage reference object : keyblckGrntCode"
          x-lineageReferenceObject: keyblckGrntCode
      x-lineageReferenceObject: KEY_BLOCK
    grant-summary-query-1.0.0_qapi_post:
      type: object
      properties:
        keyblckGrntCode:
          type: string
        keyblckPmsCode:
          type: string
    grant-summary-query-1.0.0_get_response:
      type: object
      properties:
        unbilledChargesAmt:
          title: +  Unbilled Charges
          maxLength: 25
          type: number
          description: "Lineage reference object : unbilledChargesAmt"
          x-lineageReferenceObject: unbilledChargesAmt
        grossBillingAmt:
          title: Gross Billing
          maxLength: 25
          type: number
          description: "Lineage reference object : grossBillingAmt"
          x-lineageReferenceObject: grossBillingAmt
        refundTotalAmt:
          title: +  Refunds
          maxLength: 25
          type: number
          description: "Lineage reference object : refundTotalAmt"
          x-lineageReferenceObject: refundTotalAmt
        witholdChrgTotalAmt:
          title: "-  Retainage Withholding"
          maxLength: 25
          type: number
          description: "Lineage reference object : witholdChrgTotalAmt"
          x-lineageReferenceObject: witholdChrgTotalAmt
        billedTotalAmt3160:
          title: 31 - 60
          maxLength: 25
          type: number
          description: "Lineage reference object : billedTotalAmt3160"
          x-lineageReferenceObject: billedTotalAmt3160
        witholdPmtTotalAmt:
          title: Payment Withholding
          maxLength: 25
          type: number
          description: "Lineage reference object : witholdPmtTotalAmt"
          x-lineageReferenceObject: witholdPmtTotalAmt
        netBillingAmt:
          title: =  Net Billing
          maxLength: 25
          type: number
          description: "Lineage reference object : netBillingAmt"
          x-lineageReferenceObject: netBillingAmt
        billedTotalAmt030:
          title: 0 - 30
          maxLength: 25
          type: number
          description: "Lineage reference object : billedTotalAmt030"
          x-lineageReferenceObject: billedTotalAmt030
        unbilledTotalAmt:
          title: Unbilled or Held
          maxLength: 31
          type: number
          description: "Lineage reference object : unbilledTotalAmt"
          x-lineageReferenceObject: unbilledTotalAmt
        netDueAmt:
          title: =  Net Due
          maxLength: 25
          type: number
          description: "Lineage reference object : netDueAmt"
          x-lineageReferenceObject: netDueAmt
        totalOutstandingAmt:
          title: =  Total Outstanding
          maxLength: 31
          type: number
          description: "Lineage reference object : totalOutstandingAmt"
          x-lineageReferenceObject: totalOutstandingAmt
        paymentsTotalAmt:
          title: "-  Payments and Transfers"
          maxLength: 25
          type: number
          description: "Lineage reference object : paymentsTotalAmt"
          x-lineageReferenceObject: paymentsTotalAmt
        billedTotalAmt90:
          title: Over 90
          maxLength: 25
          type: number
          description: "Lineage reference object : billedTotalAmt90"
          x-lineageReferenceObject: billedTotalAmt90
        billedTotalAmt6190:
          title: 61 - 90
          maxLength: 25
          type: number
          description: "Lineage reference object : billedTotalAmt6190"
          x-lineageReferenceObject: billedTotalAmt6190
        billedTotalAmtSt:
          title: Total Billed
          maxLength: 25
          type: number
          description: "Lineage reference object : billedTotalAmtSt"
          x-lineageReferenceObject: billedTotalAmtSt
        grantTotalAmt:
          title: =  Grand Total
          maxLength: 31
          type: number
          description: "Lineage reference object : grantTotalAmt"
          x-lineageReferenceObject: grantTotalAmt
        holdChargesAmt:
          title: +  Held Charges
          maxLength: 25
          type: number
          description: "Lineage reference object : holdChargesAmt"
          x-lineageReferenceObject: holdChargesAmt
      x-lineageReferenceObject: total_block
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
