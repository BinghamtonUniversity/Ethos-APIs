openapi: 3.0.0
info:
  title: web-user-defined-questions
  description: API for SAAWUDQ administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SAAWUDQ
  x-source-domain: Student
  x-source-title: Web User Defined Questions
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/web-user-defined-questions:
    get:
      tags:
        - web-user-defined-questions
      summary: Return resources from SAAWUDQ
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: wappCode
          in: query
          description: Application Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARWUDQ_WAPP_CODE
        - name: seqno
          in: query
          description: Ordering Sequence
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARWUDQ_SEQNO
        - name: question
          in: query
          description: Question Text
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARWUDQ_QUESTION
        - name: yesNoQstnInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARWUDQ_YES_NO_QSTN_IND
        - name: qstnCde
          in: query
          description: EDI Question Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARWUDQ_QSTN_CDE
        - name: admrCode
          in: query
          description: Admission Request Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARWUDQ_ADMR_CODE
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SARWUDQ_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/web-user-defined-questions-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - web-user-defined-questions
      summary: Updates an existing resource in SAAWUDQ
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
