          EthosIntegrationBearer: []
    post:
      tags:
        - web-user-defined-questions
      summary: Creates a new resource in SAAWUDQ
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/web-user-defined-questions-1.0.0_post_request"
            example:
              seqno: 1
              question: What's your favorite color?
              wappCode: 0
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
