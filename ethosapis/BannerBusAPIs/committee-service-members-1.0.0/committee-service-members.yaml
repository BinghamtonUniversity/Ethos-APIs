        - committee-service-members
      summary: Return resources from SHACOMI
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: shacomiComtCode
          in: query
          required: true
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: memberId
          in: query
          description: Member
          required: false
          schema:
            type: string
        - name: fromDate
          in: query
          description: Participation From
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRCOMM_FROM_DATE
        - name: toDate
          in: query
          description: Participation To
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRCOMM_TO_DATE
        - name: comfCode
          in: query
          description: Role
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRCOMM_COMF_CODE
        - name: comsCode
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRCOMM_COMS_CODE
        - name: dicdCode
          in: query
          description: District/Division
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRCOMM_DICD_CODE
        - name: collCode
          in: query
          description: Home College
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRCOMM_COLL_CODE
        - name: deptCode
          in: query
          description: Home Department
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRCOMM_DEPT_CODE
