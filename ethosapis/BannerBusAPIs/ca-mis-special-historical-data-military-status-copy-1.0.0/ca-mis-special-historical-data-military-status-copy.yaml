              svbsmssStatCode: AB
              statCode: Y
              guardianActiveInd: Y
              guardianReserveInd: Y
              id: A00027372
              studentActiveInd: Y
              studentReserveInd: Y
              svamishEffTerm: "202220"
              svamishDicdCode: "123"
              studentVeteranInd: Y
              guardianVeteranInd: Y
      responses:
