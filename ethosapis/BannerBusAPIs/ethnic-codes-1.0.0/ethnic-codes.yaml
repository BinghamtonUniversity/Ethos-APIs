          x-lineageReferenceObject: STVETHN_ETCT_CODE
          x-lineageLookupReferenceObject: stvetct
        ethnCde:
          title: New Ethnicity
          maxLength: 1
          type: string
          description: "Lineage reference object : STVETHN_ETHN_CDE"
          x-lineageReferenceObject: STVETHN_ETHN_CDE
        lmsEquiv:
          title: LMS Equivalent
          maxLength: 1
          type: string
          description: "Lineage reference object : STVETHN_LMS_EQUIV"
          x-lineageReferenceObject: STVETHN_LMS_EQUIV
        raceCde:
          title: Institution Race Code
          maxLength: 30
          type: string
          description: "Lineage reference object : STVETHN_RACE_CDE, Lookup lineage
            reference object : gorrace"
          x-lineageReferenceObject: STVETHN_RACE_CDE
          x-lineageLookupReferenceObject: gorrace
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
