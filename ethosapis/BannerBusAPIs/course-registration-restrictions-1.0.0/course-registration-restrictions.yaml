                maxLength: 30
                type: string
                description: "Lineage reference object : SCRRDEP_DEPT_CODE, Lookup lineage
                  reference object : stvdept"
                x-lineageReferenceObject: SCRRDEP_DEPT_CODE
                x-lineageLookupReferenceObject: stvdept
            x-lineageReferenceObject: scrrdep
        scrrmaj:
