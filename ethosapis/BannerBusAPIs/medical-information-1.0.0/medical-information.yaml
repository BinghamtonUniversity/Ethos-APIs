openapi: 3.0.0
info:
  title: medical-information
  description: API for GOAMEDI administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: GOAMEDI
  x-source-domain: Foundation
  x-source-title: General Medical Information
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/medical-information:
    get:
      tags:
        - medical-information
      summary: Return resources from GOAMEDI
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: mediCode
          in: query
          description: Medical Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRMEDI_MEDI_CODE
        - name: disbInd
          in: query
          description: Primary Disability
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRMEDI_DISB_IND
        - name: mediCodeDate
          in: query
          description: Medical Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRMEDI_MEDI_CODE_DATE
        - name: mdeqCode
          in: query
          description: Equipment Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRMEDI_MDEQ_CODE
        - name: disaCode
          in: query
          description: Disability Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRMEDI_DISA_CODE
        - name: spsrCode
          in: query
          description: Disability Service
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRMEDI_SPSR_CODE
        - name: onsetAge
          in: query
          description: Disability Onset Age
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRMEDI_ONSET_AGE
        - name: comment
          in: query
          description: Comment
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRMEDI_COMMENT
        - name: userId
          in: query
          description: User ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRMEDI_USER_ID
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRMEDI_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/medical-information-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - medical-information
      summary: Updates an existing resource in GOAMEDI
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
