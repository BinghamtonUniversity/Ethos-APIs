servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/fips-code-validation:
    get:
      tags:
        - fips-code-validation
      summary: Return resources from GTVFIPS
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON representation
            of the property searching for. This can be any of the properties listed
            on the URL or QAPI and must be a json representation that can be validated
            against the GET schema. Limit and Offset are the only supported additional
            parameters on the URL.
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVFIPS_CODE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVFIPS_DESC
        - name: userId
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVFIPS_USER_ID
        - name: activityDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GTVFIPS_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/fips-code-validation-1.0.0_get_response"
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
    put:
      tags:
        - fips-code-validation
      summary: Updates an existing resource in GTVFIPS
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/fips-code-validation-1.0.0_put_request"
            example:
              criteria.code: '01001'
              criteria.desc: "Autauga County, AL"
              desc: "Autauga County, AL 2"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
