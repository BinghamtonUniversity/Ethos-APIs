openapi: 3.0.0
info:
  title: fips-code-validation
  description: API for GTVFIPS administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: GTVFIPS
  x-source-domain: Foundation
  x-source-title: FIPS Code Validation
  x-source-system: banner
