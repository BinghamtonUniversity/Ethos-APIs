openapi: 3.0.0
info:
  title: cohort-codes
  description: API for STVCHRT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: STVCHRT
  x-source-domain: Student
  x-source-title: Cohort Code Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/cohort-codes:
    get:
      tags:
        - cohort-codes
      summary: Return resources from STVCHRT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVCHRT_ACTIVITY_DATE
        - name: code
          in: query
          description: Cohort Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVCHRT_CODE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVCHRT_DESC
        - name: dlevCode
          in: query
          description: Degree Level
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVCHRT_DLEV_CODE
        - name: rightInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVCHRT_RIGHT_IND
        - name: termCode100Prcnt
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVCHRT_TERM_CODE_100PRCNT
        - name: termCodeEnd
          in: query
          description: End Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVCHRT_TERM_CODE_END
        - name: termCodeStart
          in: query
          description: Start Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVCHRT_TERM_CODE_START
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/cohort-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - cohort-codes
      summary: Creates a new resource in STVCHRT
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/cohort-codes-1.0.0_post_request"
            example:
              code: TESTREC
              termCodeStart: 200610
              termCode100Prcnt: 200610
              dlevCode: BA
              termCodeEnd: 200810
              desc: Test Recording
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/cohort-codes-1.0.0_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/cohort-codes:
    post:
      tags:
        - cohort-codes QAPI (Query by POST)
      summary: Return resources from STVCHRT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
