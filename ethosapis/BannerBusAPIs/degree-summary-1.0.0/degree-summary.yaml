openapi: 3.0.0
info:
  title: degree-summary
  description: API for SHADGMQ administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SHADGMQ
  x-source-domain: Student
  x-source-title: Degree Summary
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/degree-summary:
    get:
      tags:
        - degree-summary
      summary: Return resources from SHADGMQ
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: levlCode
          in: query
          required: false
          schema:
            type: string
        - name: campCode
          in: query
          required: false
          schema:
            type: string
        - name: collCode
          in: query
          required: false
          schema:
            type: string
        - name: degcCode
          in: query
          required: false
          schema:
            type: string
        - name: stvtermTermCode
          in: query
          required: false
          schema:
            type: string
        - name: program
          in: query
          required: false
          schema:
            type: string
        - name: lfstCode
          in: query
          required: false
          schema:
            type: string
        - name: majrCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/degree-summary-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/degree-summary:
    post:
      tags:
        - degree-summary QAPI (Query by POST)
      summary: Return resources from SHADGMQ
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/degree-summary-1.0.0_get_request"
            example:
              id: A00030988
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/degree-summary-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    degree-summary-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        levlCode:
          type: string
        campCode:
          type: string
        collCode:
          type: string
        degcCode:
          type: string
        stvtermTermCode:
          type: string
        program:
          type: string
        lfstCode:
          type: string
        majrCode:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    degree-summary-1.0.0_get_request:
      type: object
      properties:
        lfstCode:
          title: Field of Study Type
          maxLength: 30
          type: string
          description: "Lineage reference object : lfstCode, Lookup lineage reference
            object : gtvlfst"
          x-lineageReferenceObject: lfstCode
          x-lineageLookupReferenceObject: gtvlfst
        campCode:
          title: Campus
          maxLength: 30
          type: string
          description: "Lineage reference object : campCode, Lookup lineage reference
            object : stvcamp"
          x-lineageReferenceObject: campCode
          x-lineageLookupReferenceObject: stvcamp
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        degcCode:
          title: Degree
          maxLength: 30
          type: string
          description: "Lineage reference object : degcCode, Lookup lineage reference
            object : stvdegc"
          x-lineageReferenceObject: degcCode
          x-lineageLookupReferenceObject: stvdegc
        program:
          title: Program
          maxLength: 30
          type: string
          description: "Lineage reference object : program, Lookup lineage reference
            object : smrprle"
          x-lineageReferenceObject: program
          x-lineageLookupReferenceObject: smrprle
        collCode:
          title: College
          maxLength: 30
          type: string
          description: "Lineage reference object : collCode, Lookup lineage reference
            object : stvcoll"
          x-lineageReferenceObject: collCode
          x-lineageLookupReferenceObject: stvcoll
        stvtermTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : stvtermTermCode, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: stvtermTermCode
          x-lineageLookupReferenceObject: stvterm
        majrCode:
          title: Field of Study Code
          maxLength: 30
          type: string
          description: "Lineage reference object : majrCode, Lookup lineage reference
            object : stvmajr"
          x-lineageReferenceObject: majrCode
          x-lineageLookupReferenceObject: stvmajr
        levlCode:
          title: Level
          maxLength: 30
          type: string
          description: "Lineage reference object : levlCode, Lookup lineage reference
            object : stvlevl"
          x-lineageReferenceObject: levlCode
          x-lineageLookupReferenceObject: stvlevl
      x-lineageReferenceObject: KEY_BLOCK
    degree-summary-1.0.0_get_response:
      type: object
      properties:
        shrdgmr:
          type: array
          items:
            required:
              - seqNo
            type: object
            properties:
              stspKeySequence:
                title: Study Path
                maxLength: 4
                type: number
                description: "Lineage reference object : SHRDGMR_STSP_KEY_SEQUENCE"
                x-lineageReferenceObject: SHRDGMR_STSP_KEY_SEQUENCE
              seqNo:
                title: Sequence Number
                maxLength: 2
                type: number
                description: "Lineage reference object : SHRDGMR_SEQ_NO"
                x-lineageReferenceObject: SHRDGMR_SEQ_NO
              grstCode:
                title: Graduation Status
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRDGMR_GRST_CODE, Lookup lineage
                  reference object : stvgrst"
                x-lineageReferenceObject: SHRDGMR_GRST_CODE
                x-lineageLookupReferenceObject: stvgrst
              dualDegInd:
                maxLength: 2
                type: string
              acyrCodeBulletin:
                title: Bulletin Year
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRDGMR_ACYR_CODE_BULLETIN, Lookup
                  lineage reference object : stvacyr"
                x-lineageReferenceObject: SHRDGMR_ACYR_CODE_BULLETIN
                x-lineageLookupReferenceObject: stvacyr
              degsCode:
                title: Outcome Status
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRDGMR_DEGS_CODE, Lookup lineage
                  reference object : stvdegs"
                x-lineageReferenceObject: SHRDGMR_DEGS_CODE
                x-lineageLookupReferenceObject: stvdegs
              diplomaName:
                title: Diploma Name
                maxLength: 500
                type: string
              gradDate:
                title: Graduation Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SHRDGMR_GRAD_DATE"
                format: date-time
                x-lineageReferenceObject: SHRDGMR_GRAD_DATE
              termCodeSturec:
                title: Learner Record Term
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRDGMR_TERM_CODE_STUREC, Lookup
                  lineage reference object : stvterm"
                x-lineageReferenceObject: SHRDGMR_TERM_CODE_STUREC
                x-lineageLookupReferenceObject: stvterm
              termCodeGrad:
                title: Graduation Term
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRDGMR_TERM_CODE_GRAD, Lookup lineage
                  reference object : stvterm"
                x-lineageReferenceObject: SHRDGMR_TERM_CODE_GRAD
                x-lineageLookupReferenceObject: stvterm
              termCodeComp:
                title: Outcome Completion Term
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRDGMR_TERM_CODE_COMPLETED, Lookup
                  lineage reference object : stvterm"
                x-lineageReferenceObject: SHRDGMR_TERM_CODE_COMPLETED
                x-lineageLookupReferenceObject: stvterm
            x-lineageReferenceObject: shrdgmr
        sorlfos:
          type: array
          items:
            type: object
            x-lineageReferenceObject: sorlfos
        sorlcur:
          type: array
          items:
            type: object
            x-lineageReferenceObject: sorlcur
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
