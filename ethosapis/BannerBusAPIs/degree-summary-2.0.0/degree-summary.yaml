openapi: 3.0.0
info:
  title: degree-summary
  description: API for SHADGMQ administrative page
  version: 2.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SHADGMQ
  x-source-domain: Student
  x-source-title: Degree Summary
  x-source-system: banner
  x-api-type: bus-poc
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/degree-summary:
    get:
      tags:
      - degree-summary
      summary: Return resources from SHADGMQ
      parameters:
      - name: X-SDE-Expand
        in: header
        description: The comma separated value list of block names
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of resources requesting for this result set.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
      - name: id
        in: query
        required: true
        schema:
          type: string
      - name: levlCode
        in: query
        required: false
        schema:
          type: string
      - name: campCode
        in: query
        required: false
        schema:
          type: string
      - name: collCode
        in: query
        required: false
        schema:
          type: string
      - name: degcCode
        in: query
        required: false
        schema:
          type: string
      - name: stvtermTermCode
        in: query
        required: false
        schema:
          type: string
      - name: program
        in: query
        required: false
        schema:
          type: string
      - name: lfstCode
        in: query
        required: false
        schema:
          type: string
      - name: majrCode
        in: query
        required: false
        schema:
          type: string
      - name: criteria.seqNo
        in: query
        required: false
        schema:
          type: string
      - name: criteria.degsCode
        in: query
        required: false
        schema:
          type: string
      - name: criteria.termCodeSturec
        in: query
        required: false
        schema:
          type: string
      - name: criteria.acyrCodeBulletin
        in: query
        required: false
        schema:
          type: string
      - name: criteria.termCodeComp
        in: query
        required: false
        schema:
          type: string
      - name: criteria.termCodeGrad
        in: query
        required: false
        schema:
          type: string
      - name: criteria.grstCode
        in: query
        required: false
        schema:
          type: string
      - name: criteria.gradDate
        in: query
        required: false
        schema:
          type: string
      - name: criteria.stspKeySequence
        in: query
        required: false
