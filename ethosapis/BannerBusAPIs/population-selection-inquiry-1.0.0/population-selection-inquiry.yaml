openapi: 3.0.0
info:
  title: population-selection-inquiry
  description: API for GLISLCT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: GLISLCT
  x-source-domain: Foundation
  x-source-title: Population Selection Inquiry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/population-selection-inquiry:
    get:
      tags:
        - population-selection-inquiry
      summary: Return resources from GLISLCT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckApplication
          in: query
          required: false
          schema:
            type: string
        - name: selection
          in: query
          required: false
          schema:
            type: string
        - name: desc
          in: query
          required: false
          schema:
            type: string
        - name: creatorId
          in: query
          required: false
          schema:
            type: string
        - name: lockInd
          in: query
          required: false
          schema:
            type: string
        - name: typeInd
          in: query
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/population-selection-inquiry-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/population-selection-inquiry:
    post:
      tags:
        - population-selection-inquiry QAPI (Query by POST)
      summary: Return resources from GLISLCT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/population-selection-inquiry-1.0.0_get_request"
            example:
              keyblckApplication: ALUMNI
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/population-selection-inquiry-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    population-selection-inquiry-1.0.0_get_response:
      type: object
      properties:
        glbslct:
          type: array
          items:
            type: object
            properties:
              activityDate:
                title: Activity Date
                maxLength: 26
                type: string
                description: "Lineage reference object : GLBSLCT_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: GLBSLCT_ACTIVITY_DATE
              typeInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : GLBSLCT_TYPE_IND"
                x-lineageReferenceObject: GLBSLCT_TYPE_IND
              selection:
                title: Selection ID
                maxLength: 30
                type: string
                description: "Lineage reference object : GLBSLCT_SELECTION"
                x-lineageReferenceObject: GLBSLCT_SELECTION
              creatorId:
                title: Creator
                maxLength: 30
                type: string
                description: "Lineage reference object : GLBSLCT_CREATOR_ID"
                x-lineageReferenceObject: GLBSLCT_CREATOR_ID
              lockInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : GLBSLCT_LOCK_IND"
                x-lineageReferenceObject: GLBSLCT_LOCK_IND
              desc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : GLBSLCT_DESC"
                x-lineageReferenceObject: GLBSLCT_DESC
            x-lineageReferenceObject: glbslct
        glvslct:
          type: array
          items:
            type: object
            properties:
              glbextrUserId:
                title: User ID
                maxLength: 30
                type: string
              glbextrCount:
                title: Count
                type: number
            x-lineageReferenceObject: glvslct
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    population-selection-inquiry-1.0.0_get_request:
      type: object
      properties:
        typeInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : GLBSLCT_TYPE_IND"
          x-lineageReferenceObject: GLBSLCT_TYPE_IND
        activityDate:
          title: Activity Date
          maxLength: 26
          type: string
          description: "Lineage reference object : GLBSLCT_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GLBSLCT_ACTIVITY_DATE
        selection:
          title: Selection ID
          maxLength: 30
          type: string
          description: "Lineage reference object : GLBSLCT_SELECTION"
          x-lineageReferenceObject: GLBSLCT_SELECTION
        keyblckApplication:
          title: Application
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckApplication, Lookup lineage
            reference object : glbappl"
          x-lineageReferenceObject: keyblckApplication
          x-lineageLookupReferenceObject: glbappl
        creatorId:
          title: Creator
          maxLength: 30
          type: string
          description: "Lineage reference object : GLBSLCT_CREATOR_ID"
          x-lineageReferenceObject: GLBSLCT_CREATOR_ID
        lockInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : GLBSLCT_LOCK_IND"
          x-lineageReferenceObject: GLBSLCT_LOCK_IND
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : GLBSLCT_DESC"
          x-lineageReferenceObject: GLBSLCT_DESC
      x-lineageReferenceObject: GLBSLCT
    population-selection-inquiry-1.0.0_qapi_post:
      type: object
      properties:
        keyblckApplication:
          type: string
        selection:
          type: string
        desc:
          type: string
        creatorId:
          type: string
        lockInd:
          type: string
        typeInd:
          type: string
        activityDate:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
