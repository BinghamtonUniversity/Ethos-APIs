          required: false
          schema:
            type: string
          x-lineageReferenceObject: TTVSRCE_CODE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TTVSRCE_DESC
        - name: inputInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TTVSRCE_INPUT_IND
        - name: sysreqInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TTVSRCE_SYSREQ_IND
