openapi: 3.0.0
info:
  title: ca-financial-aid-mis-reporting-rules
  description: API for RVRMISR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: RVRMISR
  x-source-domain: Financial Aid
  x-source-title: Financial Aid MIS Reporting Rules (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-financial-aid-mis-reporting-rules:
    get:
      tags:
        - ca-financial-aid-mis-reporting-rules
      summary: Return resources from RVRMISR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: aidyCode
          in: query
          required: false
          schema:
            type: string
        - name: collCode
          in: query
          required: false
          schema:
            type: string
        - name: detailCode
          in: query
          description: Detail Payment Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RVRMISD_DETAIL_CODE
        - name: faacCode
          in: query
          description: MIS SF21
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RVRMISD_FAAC_CODE
        - name: exemptionCode
          in: query
          description: Exemption Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RVRMISD_EXEMPTION_CODE
        - name: termCode
          in: query
          description: Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RVRMISD_TERM_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-financial-aid-mis-reporting-rules-1.0.0_get_resp\
                    onse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-financial-aid-mis-reporting-rules:
    post:
      tags:
        - ca-financial-aid-mis-reporting-rules QAPI (Query by POST)
      summary: Return resources from RVRMISR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-financial-aid-mis-reporting-rules-1.0.0_get_requ\
                est"
            example:
              aidyCode: CL20
              collCode: 0
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-financial-aid-mis-reporting-rules-1.0.0_get_resp\
                    onse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    ca-financial-aid-mis-reporting-rules-1.0.0_get_request:
      required:
        - detailCode
        - faacCode
      type: object
      properties:
        exemptionCode:
          title: Exemption Code
          maxLength: 8
          type: string
          description: "Lineage reference object : RVRMISD_EXEMPTION_CODE"
          x-lineageReferenceObject: RVRMISD_EXEMPTION_CODE
        aidyCode:
          title: Aid Year
          maxLength: 4
          type: string
          description: "Lineage reference object : aidyCode, Lookup lineage reference
            object : robinst"
          x-lineageReferenceObject: aidyCode
          x-lineageLookupReferenceObject: robinst
        faacCode:
          title: MIS SF21
          maxLength: 2
          type: string
          description: "Lineage reference object : RVRMISD_FAAC_CODE, Lookup lineage
            reference object : RVVFAAC"
          x-lineageReferenceObject: RVRMISD_FAAC_CODE
          x-lineageLookupReferenceObject: RVVFAAC
        collCode:
          title: College
          maxLength: 2
          type: string
          description: "Lineage reference object : collCode, Lookup lineage reference
            object : stvcoll"
          x-lineageReferenceObject: collCode
          x-lineageLookupReferenceObject: stvcoll
        detailCode:
          title: Detail Payment Code
          maxLength: 4
          type: string
          description: "Lineage reference object : RVRMISD_DETAIL_CODE, Lookup lineage
            reference object : tbbdetc"
          x-lineageReferenceObject: RVRMISD_DETAIL_CODE
          x-lineageLookupReferenceObject: tbbdetc
        termCode:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : RVRMISD_TERM_CODE"
          x-lineageReferenceObject: RVRMISD_TERM_CODE
      x-lineageReferenceObject: RVRMISD
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-financial-aid-mis-reporting-rules-1.0.0_qapi_post:
      type: object
      properties:
        aidyCode:
          type: string
        collCode:
          type: string
        detailCode:
          title: Detail Payment Code
          maxLength: 4
          type: string
          description: "Lineage reference object : RVRMISD_DETAIL_CODE, Lookup lineage
            reference object : tbbdetc"
          x-lineageReferenceObject: RVRMISD_DETAIL_CODE
          x-lineageLookupReferenceObject: tbbdetc
        faacCode:
          title: MIS SF21
          maxLength: 2
          type: string
          description: "Lineage reference object : RVRMISD_FAAC_CODE, Lookup lineage
            reference object : RVVFAAC"
          x-lineageReferenceObject: RVRMISD_FAAC_CODE
          x-lineageLookupReferenceObject: RVVFAAC
        exemptionCode:
          title: Exemption Code
          maxLength: 8
          type: string
          description: "Lineage reference object : RVRMISD_EXEMPTION_CODE"
          x-lineageReferenceObject: RVRMISD_EXEMPTION_CODE
        termCode:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : RVRMISD_TERM_CODE"
          x-lineageReferenceObject: RVRMISD_TERM_CODE
    ca-financial-aid-mis-reporting-rules-1.0.0_get_response:
      required:
        - detailCode
        - faacCode
      type: object
      properties:
        exemptionCode:
          title: Exemption Code
          maxLength: 8
          type: string
          description: "Lineage reference object : RVRMISD_EXEMPTION_CODE"
          x-lineageReferenceObject: RVRMISD_EXEMPTION_CODE
        detailDesc:
          title: Detail Code Description
          maxLength: 60
          type: string
        faacDesc:
          title: MIS SF21 Description
          maxLength: 60
          type: string
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : RVRMISD_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: RVRMISD_ACTIVITY_DATE
        faacCode:
          title: MIS SF21
          maxLength: 2
          type: string
          description: "Lineage reference object : RVRMISD_FAAC_CODE, Lookup lineage
            reference object : RVVFAAC"
          x-lineageReferenceObject: RVRMISD_FAAC_CODE
          x-lineageLookupReferenceObject: RVVFAAC
        exemptionDesc:
          title: Exemption Code Description
          maxLength: 60
          type: string
        detailCode:
          title: Detail Payment Code
          maxLength: 4
          type: string
          description: "Lineage reference object : RVRMISD_DETAIL_CODE, Lookup lineage
            reference object : tbbdetc"
          x-lineageReferenceObject: RVRMISD_DETAIL_CODE
          x-lineageLookupReferenceObject: tbbdetc
        userId:
          title: User
          maxLength: 30
          type: string
          description: "Lineage reference object : RVRMISD_USER_ID"
          x-lineageReferenceObject: RVRMISD_USER_ID
        termCode:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : RVRMISD_TERM_CODE"
          x-lineageReferenceObject: RVRMISD_TERM_CODE
      x-lineageReferenceObject: rvrmisd
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
