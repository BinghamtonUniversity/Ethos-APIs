    variables:
      server_url:
        default: localhost
paths:
  /api/indirect-cost-rate-codes:
    get:
      tags:
        - indirect-cost-rate-codes
      summary: Return resources from FRVINDR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRINDR_CODE
        - name: effDate
          in: query
          description: |-
            Effective 
            Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRINDR_EFF_DATE
        - name: fedNegRateInd
          in: query
          description: |-
            Federal
            Negotiated Rate
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRINDR_FED_NEG_RATE_IND
        - name: indirectRate
          in: query
          description: Rate
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRINDR_INDIRECT_RATE
        - name: memoRate
          in: query
          description: |-
            Memo
            Rate
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRINDR_MEMO_RATE
        - name: termDate
          in: query
          description: |-
            Termination
            Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRINDR_TERM_DATE
        - name: indrDesc
          in: query
          description: |-
            Indirect Cost Rate
            Description
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/indirect-cost-rate-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/indirect-cost-rate-codes:
    post:
      tags:
