openapi: 3.0.0
info:
  title: saved-output-review
  description: API for GJIREVO administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: GJIREVO
  x-source-domain: Foundation
  x-source-title: Saved Output Review
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/saved-output-review:
    get:
      tags:
        - saved-output-review
      summary: Return resources from GJIREVO
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckJob
          in: query
          required: false
          schema:
            type: string
        - name: keyblckOneUpNo
          in: query
          required: false
          schema:
            type: string
        - name: keyblckFileName
          in: query
          required: false
          schema:
            type: string
        - name: keyblckStartDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/saved-output-review-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/saved-output-review:
    post:
      tags:
        - saved-output-review QAPI (Query by POST)
      summary: Return resources from GJIREVO
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/saved-output-review-1.0.0_get_request"
            example:
              keyblckOneUpNo: 434486
              keyblckFileName: gjrjlis_434486.log
              keyblckJob: TGRDELI
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/saved-output-review-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    saved-output-review-1.0.0_qapi_post:
      type: object
      properties:
        keyblckJob:
          type: string
        keyblckOneUpNo:
          type: string
        keyblckFileName:
          type: string
        keyblckStartDate:
          type: string
    saved-output-review-1.0.0_get_response:
      type: object
      properties:
        outputEnd:
          maxLength: 1
          type: string
        outputLine:
          maxLength: 2000
          type: string
      x-lineageReferenceObject: guroutp
    saved-output-review-1.0.0_get_request:
      type: object
      properties:
        keyblckOneUpNo:
          title: Number
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckOneUpNo"
          x-lineageReferenceObject: keyblckOneUpNo
        keyblckStartDate:
          title: Beginning Date Saved
          maxLength: 11
          type: string
          description: "Lineage reference object : keyblckStartDate"
          format: date-time
          x-lineageReferenceObject: keyblckStartDate
        keyblckFileName:
          title: File Name
          maxLength: 60
          type: string
          description: "Lineage reference object : keyblckFileName"
          x-lineageReferenceObject: keyblckFileName
        keyblckJob:
          title: Process
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckJob"
          x-lineageReferenceObject: keyblckJob
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
