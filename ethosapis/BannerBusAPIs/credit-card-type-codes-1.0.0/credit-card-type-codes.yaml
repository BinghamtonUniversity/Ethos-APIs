        - name: type
          in: query
          description: Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TTVCCRD_TYPE
        - name: vrMsgNo
          in: query
          description: Voice Response Message Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TTVCCRD_VR_MSG_NO
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TTVCCRD_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
