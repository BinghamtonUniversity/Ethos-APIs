        birthDate:
          title: Date of Birth
          type: string
          description: "Lineage reference object : RERCSID_BIRTH_DATE"
          format: date-time
          x-lineageReferenceObject: RERCSID_BIRTH_DATE
        documentId:
          title: Document ID
          maxLength: 30
          type: string
          description: "Lineage reference object : RERCSID_DOCUMENT_ID"
          x-lineageReferenceObject: RERCSID_DOCUMENT_ID
        lastName:
          title: Last Name
          maxLength: 60
          type: string
          description: "Lineage reference object : RERCSID_LAST_NAME"
          x-lineageReferenceObject: RERCSID_LAST_NAME
        seqNo:
