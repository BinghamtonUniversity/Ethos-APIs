        birthDate:
          title: Date of Birth
          type: string
          description: "Lineage reference object : RERCSID_BIRTH_DATE"
          format: date-time
          x-lineageReferenceObject: RERCSID_BIRTH_DATE
        ssn:
          title: Social Security Number
          maxLength: 30
          type: string
          description: "Lineage reference object : RERCSID_SSN"
          x-lineageReferenceObject: RERCSID_SSN
      x-lineageReferenceObject: rercsid
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
