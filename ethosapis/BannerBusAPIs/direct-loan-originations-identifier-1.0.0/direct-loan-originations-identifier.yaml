          x-lineageReferenceObject: keyblckAidyCode
          x-lineageLookupReferenceObject: robinst
        lastName:
          title: Last Name
          maxLength: 60
          type: string
          description: "Lineage reference object : RERCSID_LAST_NAME"
          x-lineageReferenceObject: RERCSID_LAST_NAME
        seqNo:
          title: Sequence
          maxLength: 3
          type: number
          description: "Lineage reference object : RERCSID_SEQ_NO"
          x-lineageReferenceObject: RERCSID_SEQ_NO
        statusCde:
          title: Status
          maxLength: 30
          type: string
          description: "Lineage reference object : RERCSID_STATUS_CDE"
          x-lineageReferenceObject: RERCSID_STATUS_CDE
        documentId:
