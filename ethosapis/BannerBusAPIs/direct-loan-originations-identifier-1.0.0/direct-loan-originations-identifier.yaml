          x-lineageReferenceObject: RERCSID_DOCUMENT_ID
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        birthDate:
          title: Date of Birth
          type: string
          description: "Lineage reference object : RERCSID_BIRTH_DATE"
          format: date-time
          x-lineageReferenceObject: RERCSID_BIRTH_DATE
        ssn:
          title: Social Security Number
          maxLength: 30
          type: string
          description: "Lineage reference object : RERCSID_SSN"
          x-lineageReferenceObject: RERCSID_SSN
      x-lineageReferenceObject: RERCSID
    direct-loan-originations-identifier-1.0.0_get_response:
      required:
        - seqNo
      type: object
      properties:
        lastName:
          title: Last Name
          maxLength: 60
          type: string
          description: "Lineage reference object : RERCSID_LAST_NAME"
          x-lineageReferenceObject: RERCSID_LAST_NAME
        seqNo:
          title: Sequence
          maxLength: 3
          type: number
          description: "Lineage reference object : RERCSID_SEQ_NO"
          x-lineageReferenceObject: RERCSID_SEQ_NO
        statusCde:
          title: Status
