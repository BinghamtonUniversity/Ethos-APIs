openapi: 3.0.0
info:
  title: customer-services
  description: API for TSICSRV administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TSICSRV
  x-source-domain: Student
  x-source-title: Customer Service Inquiry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/customer-services:
    get:
      tags:
        - customer-services
      summary: Return resources from TSICSRV
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: holdPassword
          in: query
          required: false
          schema:
            type: string
        - name: sumByEffDate
          in: query
          required: false
          schema:
            type: string
        - name: detailCode
          in: query
          required: false
          schema:
            type: string
        - name: detailCodeDesc
          in: query
          required: false
          schema:
            type: string
        - name: termCode
          in: query
          required: false
          schema:
            type: string
        - name: aidyCode
          in: query
          required: false
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
        - name: balance
          in: query
          required: false
          schema:
            type: string
        - name: stspKeySequence
          in: query
          required: false
          schema:
            type: string
        - name: effectiveDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/customer-services-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/customer-services:
    post:
      tags:
        - customer-services QAPI (Query by POST)
      summary: Return resources from TSICSRV
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/customer-services-1.0.0_get_request"
            example:
              sumByEffDate: Y
              id: HOS000474
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/customer-services-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    customer-services-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        holdPassword:
          type: string
        sumByEffDate:
          type: string
        detailCode:
          type: string
        detailCodeDesc:
          type: string
        termCode:
          type: string
        aidyCode:
          type: string
        period:
          type: string
        balance:
          type: string
        stspKeySequence:
          type: string
        effectiveDate:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    customer-services-1.0.0_get_request:
      required:
        - detailCode
        - detailCodeDesc
        - termCode
        - effectiveDate
      type: object
      properties:
        detailCodeDesc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : TBVCSRV_DETAIL_CODE_DESC"
          x-lineageReferenceObject: TBVCSRV_DETAIL_CODE_DESC
        period:
          title: Period
          maxLength: 15
          type: string
          description: "Lineage reference object : TBVCSRV_PERIOD"
          x-lineageReferenceObject: TBVCSRV_PERIOD
        stspKeySequence:
          title: Study Path
          maxLength: 2
          type: number
          description: "Lineage reference object : TBVCSRV_STSP_KEY_SEQUENCE"
          x-lineageReferenceObject: TBVCSRV_STSP_KEY_SEQUENCE
        sumByEffDate:
          title: Sum by Effective Date
          maxLength: 30
          type: string
          description: "Lineage reference object : sumByEffDate"
          x-lineageReferenceObject: sumByEffDate
        aidyCode:
          title: Aid Year
          maxLength: 4
          type: string
          description: "Lineage reference object : TBVCSRV_AIDY_CODE"
          x-lineageReferenceObject: TBVCSRV_AIDY_CODE
        balance:
          title: Balance
          maxLength: 19
          type: number
          description: "Lineage reference object : TBVCSRV_BALANCE"
          x-lineageReferenceObject: TBVCSRV_BALANCE
        holdPassword:
          title: Holds
          maxLength: 3
          type: string
          description: "Lineage reference object : holdPassword"
          x-lineageReferenceObject: holdPassword
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        detailCode:
          title: Detail Code
          maxLength: 4
          type: string
          description: "Lineage reference object : TBVCSRV_DETAIL_CODE, Lookup lineage
            reference object : tbbdetc"
          x-lineageReferenceObject: TBVCSRV_DETAIL_CODE
          x-lineageLookupReferenceObject: tbbdetc
        effectiveDate:
          title: Effective Date
          maxLength: 11
          type: string
          description: "Lineage reference object : TBVCSRV_EFFECTIVE_DATE"
          format: date-time
          x-lineageReferenceObject: TBVCSRV_EFFECTIVE_DATE
        termCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : TBVCSRV_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: TBVCSRV_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: TBVCSRV
    customer-services-1.0.0_get_response:
      type: object
      properties:
        tbvcsrv:
          type: array
          items:
            required:
              - detailCode
              - detailCodeDesc
              - effectiveDate
              - termCode
            type: object
            properties:
              detailCodeDesc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVCSRV_DETAIL_CODE_DESC"
                x-lineageReferenceObject: TBVCSRV_DETAIL_CODE_DESC
              period:
                title: Period
                maxLength: 15
                type: string
                description: "Lineage reference object : TBVCSRV_PERIOD"
                x-lineageReferenceObject: TBVCSRV_PERIOD
              aidyCode:
                title: Aid Year
                maxLength: 4
                type: string
                description: "Lineage reference object : TBVCSRV_AIDY_CODE"
                x-lineageReferenceObject: TBVCSRV_AIDY_CODE
              balance:
                title: Balance
                maxLength: 19
                type: number
                description: "Lineage reference object : TBVCSRV_BALANCE"
                x-lineageReferenceObject: TBVCSRV_BALANCE
              chargeAmount:
                title: Charge
                maxLength: 19
                type: number
                description: "Lineage reference object : TBVCSRV_CHARGE_AMOUNT"
                x-lineageReferenceObject: TBVCSRV_CHARGE_AMOUNT
              detailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lineage reference object : TBVCSRV_DETAIL_CODE, Lookup lineage
                  reference object : tbbdetc"
                x-lineageReferenceObject: TBVCSRV_DETAIL_CODE
                x-lineageLookupReferenceObject: tbbdetc
              paymentAmount:
                title: Payment
                maxLength: 19
                type: number
                description: "Lineage reference object : TBVCSRV_PAYMENT_AMOUNT"
                x-lineageReferenceObject: TBVCSRV_PAYMENT_AMOUNT
              effectiveDate:
                title: Effective Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBVCSRV_EFFECTIVE_DATE"
                format: date-time
                x-lineageReferenceObject: TBVCSRV_EFFECTIVE_DATE
              termCode:
                title: Term
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVCSRV_TERM_CODE, Lookup lineage
                  reference object : stvterm"
                x-lineageReferenceObject: TBVCSRV_TERM_CODE
                x-lineageLookupReferenceObject: stvterm
            x-lineageReferenceObject: tbvcsrv
        tbraccd_ctrl:
          type: array
          items:
            type: object
            properties:
              amountDue:
                title: Current Due
                maxLength: 19
                type: number
                description: "Lineage reference object : amountDue"
                x-lineageReferenceObject: amountDue
              memoBalance:
                title: Financial Aid Memo Balance
                maxLength: 18
                type: number
                description: "Lineage reference object : memoBalance"
                x-lineageReferenceObject: memoBalance
              queryBalance:
                title: Query Balance
                maxLength: 19
                type: number
                description: "Lineage reference object : queryBalance"
                x-lineageReferenceObject: queryBalance
              authAidBalance:
                title: Authorized Aid Balance
                maxLength: 18
                type: number
                description: "Lineage reference object : authAidBalance"
                x-lineageReferenceObject: authAidBalance
              accountBalance:
                title: Account Balance
                maxLength: 19
                type: number
                description: "Lineage reference object : accountBalance"
                x-lineageReferenceObject: accountBalance
              nsfCount:
                title: NSF
                maxLength: 3
                type: number
                description: "Lineage reference object : nsfCount"
                x-lineageReferenceObject: nsfCount
              otherMemoBalance:
                title: Other Memos
                maxLength: 18
                type: number
                description: "Lineage reference object : otherMemoBalance"
                x-lineageReferenceObject: otherMemoBalance
            x-lineageReferenceObject: tbraccd_ctrl
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
