          type: string
          description: "Lineage reference object : SMBPOGN_CAPTIVE_IND"
          x-lineageReferenceObject: SMBPOGN_CAPTIVE_IND
      x-lineageReferenceObject: SMBPOGN
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
