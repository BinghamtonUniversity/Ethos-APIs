openapi: 3.0.0
info:
  title: program-output-inquiry
  description: API for SMIPOUT administrative page
  version: 0.1.0
  x-audience: all
  x-release-status: beta
  x-source-name: SMIPOUT
  x-source-domain: Student
  x-source-title: Program Output Inquiry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/program-output-inquiry:
    get:
      tags:
        - program-output-inquiry
      summary: Return resources from SMIPOUT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: requestNo
          in: query
          required: false
          schema:
            type: string
        - name: termCodeEff
          in: query
          description: Term Effective
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMBPOGN_TERM_CODE_EFF
        - name: captiveInd
          in: query
          description: Captive Program
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMBPOGN_CAPTIVE_IND
        - name: singleInd
          in: query
          description: Single Entity
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMBPOGN_SINGLE_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v0.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/program-output-inquiry-0.1.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/program-output-inquiry:
    post:
      tags:
        - program-output-inquiry QAPI (Query by POST)
      summary: Return resources from SMIPOUT
      requestBody:
        content:
          application/vnd.hedtech.integration.v0.1.0+json:
            schema:
              $ref: "#/components/schemas/program-output-inquiry-0.1.0_get_request"
            example:
              id: SLCAP01
              requestNo: 20
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v0.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/program-output-inquiry-0.1.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    program-output-inquiry-0.1.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        requestNo:
          type: string
        termCodeEff:
          title: Term Effective
          maxLength: 6
          type: string
          description: "Lineage reference object : SMBPOGN_TERM_CODE_EFF"
          x-lineageReferenceObject: SMBPOGN_TERM_CODE_EFF
        captiveInd:
          title: Captive Program
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBPOGN_CAPTIVE_IND"
          x-lineageReferenceObject: SMBPOGN_CAPTIVE_IND
        singleInd:
          title: Single Entity
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBPOGN_SINGLE_IND"
          x-lineageReferenceObject: SMBPOGN_SINGLE_IND
    program-output-inquiry-0.1.0_get_request:
      type: object
      properties:
