          schema:
            type: string
          x-lineageReferenceObject: SKRUFDS_DESCR_FIELD
        - name: skrufdsSkvssdtEntity
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRUFDS_SKVSSDT_ENTITY
        - name: skrufdsMapTable
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRUFDS_MAP_TABLE
        - name: skrufdsSkvssdtAttr
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRUFDS_SKVSSDT_ATTR
        - name: skrufdsLovForm
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRUFDS_LOV_FORM
        - name: skrufdsMapFromField
          in: query
