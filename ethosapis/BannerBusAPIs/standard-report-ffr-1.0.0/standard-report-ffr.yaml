              schema:
                type: array
                items:
                  $ref: "#/components/schemas/standard-report-ffr-1.0.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/standard-report-ffr:
    post:
      tags:
        - standard-report-ffr QAPI (Query by POST)
      summary: Return resources from FRAFFRR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
