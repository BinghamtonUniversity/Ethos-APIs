openapi: 3.0.0
info:
  title: standard-report-ffr
  description: API for FRAFFRR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FRAFFRR
  x-source-domain: Finance
  x-source-title: Federal Financial Report
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/standard-report-ffr:
    get:
      tags:
        - standard-report-ffr
      summary: Return resources from FRAFFRR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: displayGrantCode
          in: query
          required: false
          schema:
            type: string
        - name: displayPmsCode
          in: query
          required: false
          schema:
            type: string
        - name: periodFromDate
          in: query
          description: Period From
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRFFRR_PERIOD_FROM_DATE
        - name: periodToDate
          in: query
          description: Period To
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRFFRR_PERIOD_TO_DATE
        - name: repType
          in: query
          description: Frequency
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRFFRR_REP_TYPE
        - name: finalInd
          in: query
          description: Final Report
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRFFRR_FINAL_IND
        - name: dateSubmitted
          in: query
          description: Submission Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRRFFRR_DATE_SUBMITTED
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/standard-report-ffr-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - standard-report-ffr
      summary: Updates an existing resource in FRAFFRR
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/standard-report-ffr-1.0.0_put_request"
            example:
              displayGrantCode: 146161
              criteria.periodFromDate: 2021-08-01
              dateSubmitted: 2021-02-09
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
