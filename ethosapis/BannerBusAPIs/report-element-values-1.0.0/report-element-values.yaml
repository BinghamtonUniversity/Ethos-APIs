paths:
  /api/report-element-values:
    get:
      tags:
        - report-element-values
      summary: Return resources from SKARVAL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: elmtCode
          in: query
          description: Element Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRRVAL_ELMT_CODE
        - name: elmtValue
          in: query
          description: Element Value
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRRVAL_ELMT_VALUE
        - name: elmtValueDesc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRRVAL_ELMT_VALUE_DESC
        - name: activeInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRRVAL_ACTIVE_IND
        - name: endDate
          in: query
          description: End Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRRVAL_END_DATE
        - name: userId
          in: query
          description: User ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRRVAL_USER_ID
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRRVAL_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
