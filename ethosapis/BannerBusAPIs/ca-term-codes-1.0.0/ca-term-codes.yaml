openapi: 3.0.0
info:
  title: ca-term-codes
  description: API for STVTERM administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: STVTERM
  x-source-domain: Student
  x-source-title: Term Code Validation (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-term-codes:
    get:
      tags:
        - ca-term-codes
      summary: Return resources from STVTERM
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: acyrCode
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_ACYR_CODE
        - name: apportCde
          in: query
          required: false
          schema:
            type: string
        - name: code
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_CODE
        - name: desc
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_DESC
        - name: endDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_END_DATE
        - name: faEndPeriod
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_FA_END_PERIOD
        - name: faPeriod
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_FA_PERIOD
        - name: faProcYr
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_FA_PROC_YR
        - name: faSummerInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_FA_SUMMER_IND
        - name: faTerm
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_FA_TERM
        - name: housingEndDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_HOUSING_END_DATE
        - name: housingStartDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_HOUSING_START_DATE
        - name: misTermId
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_START_DATE
        - name: systemReqInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_SYSTEM_REQ_IND
        - name: termLenMult
          in: query
          required: false
          schema:
            type: string
        - name: termLenMultIs
          in: query
          required: false
          schema:
            type: string
        - name: trmtCode
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_TRMT_CODE
        - name: activityDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVTERM_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-term-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-term-codes:
    post:
