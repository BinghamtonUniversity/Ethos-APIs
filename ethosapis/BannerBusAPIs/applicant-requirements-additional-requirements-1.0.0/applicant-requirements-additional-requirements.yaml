        - name: rrrareqEstDate
          in: query
          description: Established Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RRRAREQ_EST_DATE
        - name: rrrareqSatInd
          in: query
          description: Satisfied
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RRRAREQ_SAT_IND
        - name: rrrareqFundCode
          in: query
          description: Fund
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RRRAREQ_FUND_CODE
        - name: rrrareqPeriod
          in: query
          description: Period
          required: false
