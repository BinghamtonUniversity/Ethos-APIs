openapi: 3.0.0
info:
  title: address-summary
  description: API for SOADDRQ administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SOADDRQ
  x-source-domain: Student
  x-source-title: Address Summary
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/address-summary:
    get:
      tags:
        - address-summary
      summary: Return resources from SOADDRQ
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: atypCode
          in: query
          description: Address Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_ATYP_CODE
        - name: city
          in: query
          description: City
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_CITY
        - name: seqno
          in: query
          description: Sequence Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_SEQNO
        - name: statusInd
          in: query
          description: Inactive
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STATUS_IND
        - name: asrcCode
          in: query
          description: Source
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_ASRC_CODE
        - name: fromDate
          in: query
          description: From Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_FROM_DATE
        - name: houseNumber
          in: query
          required: false
          schema:
            type: string
        - name: toDate
          in: query
          description: To Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_TO_DATE
        - name: streetLine1
          in: query
          description: Street Line 1
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STREET_LINE1
        - name: statCode
          in: query
          description: State or Province
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STAT_CODE
        - name: streetLine2
          in: query
          description: Street Line 2
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STREET_LINE2
        - name: zip
          in: query
          description: ZIP or Postal Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_ZIP
        - name: streetLine3
          in: query
          description: Street Line 3
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_STREET_LINE3
        - name: natnCode
          in: query
          description: Nation
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRADDR_NATN_CODE
        - name: natnDesc
          in: query
          required: false
          schema:
            type: string
        - name: streetLine4
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/address-summary-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/address-summary:
    post:
      tags:
        - address-summary QAPI (Query by POST)
      summary: Return resources from SOADDRQ
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/address-summary-1.0.0_get_request"
            example:
              id: 20
              atypCode: BB
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/address-summary-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    address-summary-1.0.0_get_response:
      type: object
      properties:
        key_block:
          type: array
          items:
            type: object
            properties:
              nname:
                maxLength: 230
                type: string
                description: "Lineage reference object : nname"
                x-lineageReferenceObject: nname
              id:
                title: ID
                maxLength: 9
                type: string
                description: "Lineage reference object : id"
                x-lineageReferenceObject: id
              confidInfo:
                maxLength: 16
                type: string
                description: "Lineage reference object : confidInfo"
                x-lineageReferenceObject: confidInfo
              deceasedInd:
                maxLength: 12
                type: string
                description: "Lineage reference object : deceasedInd"
                x-lineageReferenceObject: deceasedInd
            x-lineageReferenceObject: key_block
        spraddr:
          type: array
          items:
            type: object
            properties:
              natnDesc:
                type: string
              streetLine2:
                title: Street Line 2
                maxLength: 75
                type: string
                description: "Lineage reference object : SPRADDR_STREET_LINE2"
                x-lineageReferenceObject: SPRADDR_STREET_LINE2
              zip:
                title: ZIP or Postal Code
                maxLength: 30
                type: string
                description: "Lineage reference object : SPRADDR_ZIP"
                x-lineageReferenceObject: SPRADDR_ZIP
              streetLine1:
                title: Street Line 1
                maxLength: 75
                type: string
                description: "Lineage reference object : SPRADDR_STREET_LINE1"
                x-lineageReferenceObject: SPRADDR_STREET_LINE1
              statCode:
                title: State or Province
                maxLength: 3
                type: string
                description: "Lineage reference object : SPRADDR_STAT_CODE, Lookup lineage
                  reference object : stvstat"
                x-lineageReferenceObject: SPRADDR_STAT_CODE
                x-lineageLookupReferenceObject: stvstat
              natnCode:
                title: Nation
                maxLength: 5
                type: string
                description: "Lineage reference object : SPRADDR_NATN_CODE"
                x-lineageReferenceObject: SPRADDR_NATN_CODE
              seqno:
                title: Sequence Number
                maxLength: 4
                type: number
                description: "Lineage reference object : SPRADDR_SEQNO"
                x-lineageReferenceObject: SPRADDR_SEQNO
              city:
                title: City
                maxLength: 50
                type: string
                description: "Lineage reference object : SPRADDR_CITY"
                x-lineageReferenceObject: SPRADDR_CITY
              streetLine3:
                title: Street Line 3
                maxLength: 75
                type: string
                description: "Lineage reference object : SPRADDR_STREET_LINE3"
                x-lineageReferenceObject: SPRADDR_STREET_LINE3
              toDate:
                title: To Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SPRADDR_TO_DATE"
                format: date-time
                x-lineageReferenceObject: SPRADDR_TO_DATE
              asrcCode:
                title: Source
                maxLength: 4
                type: string
                description: "Lineage reference object : SPRADDR_ASRC_CODE, Lookup lineage
                  reference object : stvasrc"
                x-lineageReferenceObject: SPRADDR_ASRC_CODE
                x-lineageLookupReferenceObject: stvasrc
              fromDate:
                title: From Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SPRADDR_FROM_DATE"
                format: date-time
                x-lineageReferenceObject: SPRADDR_FROM_DATE
              statusInd:
                title: Inactive
                maxLength: 1
                type: string
                description: "Lineage reference object : SPRADDR_STATUS_IND"
                x-lineageReferenceObject: SPRADDR_STATUS_IND
              atypCode:
                title: Address Type
                maxLength: 2
                type: string
                description: "Lineage reference object : SPRADDR_ATYP_CODE, Lookup lineage
                  reference object : stvatyp"
                x-lineageReferenceObject: SPRADDR_ATYP_CODE
                x-lineageLookupReferenceObject: stvatyp
            x-lineageReferenceObject: spraddr
    address-summary-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        atypCode:
          title: Address Type
          maxLength: 2
          type: string
          description: "Lineage reference object : SPRADDR_ATYP_CODE, Lookup lineage
            reference object : stvatyp"
          x-lineageReferenceObject: SPRADDR_ATYP_CODE
          x-lineageLookupReferenceObject: stvatyp
        city:
          title: City
          maxLength: 50
          type: string
          description: "Lineage reference object : SPRADDR_CITY"
          x-lineageReferenceObject: SPRADDR_CITY
        seqno:
          title: Sequence Number
          maxLength: 4
          type: number
          description: "Lineage reference object : SPRADDR_SEQNO"
          x-lineageReferenceObject: SPRADDR_SEQNO
        statusInd:
          title: Inactive
          maxLength: 1
          type: string
          description: "Lineage reference object : SPRADDR_STATUS_IND"
          x-lineageReferenceObject: SPRADDR_STATUS_IND
        asrcCode:
          title: Source
          maxLength: 4
          type: string
          description: "Lineage reference object : SPRADDR_ASRC_CODE, Lookup lineage
