          x-lineageReferenceObject: SPRADDR_ASRC_CODE
          x-lineageLookupReferenceObject: stvasrc
        fromDate:
          title: From Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SPRADDR_FROM_DATE"
          format: date-time
          x-lineageReferenceObject: SPRADDR_FROM_DATE
        houseNumber:
          type: string
        toDate:
          title: To Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SPRADDR_TO_DATE"
          format: date-time
          x-lineageReferenceObject: SPRADDR_TO_DATE
        streetLine1:
          title: Street Line 1
          maxLength: 75
          type: string
          description: "Lineage reference object : SPRADDR_STREET_LINE1"
          x-lineageReferenceObject: SPRADDR_STREET_LINE1
        statCode:
          title: State or Province
          maxLength: 3
          type: string
          description: "Lineage reference object : SPRADDR_STAT_CODE, Lookup lineage
            reference object : stvstat"
          x-lineageReferenceObject: SPRADDR_STAT_CODE
          x-lineageLookupReferenceObject: stvstat
        streetLine2:
          title: Street Line 2
          maxLength: 75
          type: string
          description: "Lineage reference object : SPRADDR_STREET_LINE2"
          x-lineageReferenceObject: SPRADDR_STREET_LINE2
        zip:
          title: ZIP or Postal Code
          maxLength: 30
          type: string
          description: "Lineage reference object : SPRADDR_ZIP"
          x-lineageReferenceObject: SPRADDR_ZIP
        streetLine3:
          title: Street Line 3
          maxLength: 75
          type: string
          description: "Lineage reference object : SPRADDR_STREET_LINE3"
          x-lineageReferenceObject: SPRADDR_STREET_LINE3
        natnCode:
          title: Nation
          maxLength: 5
          type: string
          description: "Lineage reference object : SPRADDR_NATN_CODE"
          x-lineageReferenceObject: SPRADDR_NATN_CODE
        natnDesc:
          type: string
        streetLine4:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    address-summary-1.0.0_get_request:
      type: object
      properties:
        streetLine2:
