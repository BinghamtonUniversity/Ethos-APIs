        desc:
          title: Stvproc Desc
          maxLength: 30
          type: string
          description: "Lineage reference object : STVPROC_DESC"
          x-lineageReferenceObject: STVPROC_DESC
      x-lineageReferenceObject: STVPROC
    process-control-codes-1.0.0_qapi_post:
      type: object
