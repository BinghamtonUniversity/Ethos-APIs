openapi: 3.0.0
info:
  title: admissions-application-curricula
  description: API for SAAADMS administrative page
  version: 2.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SAAADMS
  x-source-domain: Student
  x-source-title: Admissions Application
  x-source-system: banner
