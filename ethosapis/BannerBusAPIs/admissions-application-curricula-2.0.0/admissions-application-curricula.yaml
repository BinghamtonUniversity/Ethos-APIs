          application/vnd.hedtech.integration.v2.0.0+json:
            schema:
              $ref: "#/components/schemas/admissions-application-curricula-2.0.0_post_request"
            example:
              termCodeCtlg: "202010"
              applDate: 2021-05-13
              kbentryTermCode: "202010"
              resdCode: R
              program: BA-MATH
              degcCode: BS
              sorflos:
                - lfstCode: MAJOR
                  sorlfosPriorityNo: 1
                  sorlfosCactCode: ACTIVE
                  tmstCode: GR
                  cstsCode: INPROGRESS
                  majrCode: BIOL
                  deptCode: BIOL
