openapi: 3.0.0
info:
  title: schedule-details-links-and-corequisites
  description: API for SSADETL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SSADETL
  x-source-domain: Student
  x-source-title: Schedule Detail
  x-source-system: banner
  x-api-type: bus-poc
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/schedule-details-links-and-corequisites:
    get:
      tags:
      - schedule-details-links-and-corequisites
      summary: Return resources from SSADETL
      parameters:
      - name: X-SDE-Expand
        in: header
        description: The comma separated value list of block names
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of resources requesting for this result set.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
      - name: ssasectTermCode
        in: query
        required: true
        schema:
          type: string
      - name: ssasectCrn
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schedule-details-links-and-corequisites-1.0.0_get_response'
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
  /qapi/schedule-details-links-and-corequisites:
    post:
      tags:
      - schedule-details-links-and-corequisites QAPI (Query by POST)
      summary: Return resources from SSADETL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: '#/components/schemas/schedule-details-links-and-corequisites-1.0.0_qapi_post_request'
            example:
              ssasectTermCode: '001010'
              ssasectCrn: 10009
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/schedule-details-links-and-corequisites-1.0.0_qapi_post_response'
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
components:
  schemas:
    errors-2.0.0:
      required:
      - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for
                  the primary data entity used to create the resource. This is useful
                  for referencing the source item through the applications administrative
                  user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: 'The detailed actionable error message. '
    schedule-details-links-and-corequisites-1.0.0_get_response:
      type: object
      properties:
        ssrlink:
          type: array
          items:
            required:
            - linkConn
            type: object
            properties:
              linkConn:
                title: Link Connector
                maxLength: 2
                type: string
                description: "Lineage reference object : SSRLINK_LINK_CONN"
                x-lineageReferenceObject: SSRLINK_LINK_CONN
            x-lineageReferenceObject: ssrlink
        ssrcorq:
          type: array
          items:
            required:
            - crnCorq
            - crseNumb
            - sectNumb
            - subjCode
            type: object
            properties:
              crseNumb:
                title: Course
                maxLength: 5
                type: string
              crnCorq:
                title: CRN
                maxLength: 30
                type: string
                description: "Lineage reference object : SSRCORQ_CRN_CORQ, Lookup\
                  \ lineage reference object : ssbsect,scrcorq"
                x-lineageReferenceObject: SSRCORQ_CRN_CORQ
                x-lineageLookupReferenceObject: "ssbsect,scrcorq"
              subjCode:
                title: Subject
                maxLength: 4
                type: string
              courseAlias:
                title: Course Alias
                maxLength: 20
                type: string
              sectNumb:
                title: Section
                maxLength: 3
                type: string
            x-lineageReferenceObject: ssrcorq
    schedule-details-links-and-corequisites-1.0.0_qapi_post_response:
      type: object
      properties:
        ssrlink:
          type: array
          items:
            required:
            - linkConn
            type: object
            properties:
              linkConn:
                title: Link Connector
                maxLength: 2
                type: string
                description: "Lineage reference object : SSRLINK_LINK_CONN"
                x-lineageReferenceObject: SSRLINK_LINK_CONN
            x-lineageReferenceObject: ssrlink
        ssrcorq:
          type: array
          items:
            required:
            - crnCorq
            - crseNumb
            - sectNumb
            - subjCode
            type: object
            properties:
              crseNumb:
                title: Course
                maxLength: 5
                type: string
              crnCorq:
                title: CRN
                maxLength: 30
                type: string
                description: "Lineage reference object : SSRCORQ_CRN_CORQ, Lookup\
                  \ lineage reference object : ssbsect,scrcorq"
                x-lineageReferenceObject: SSRCORQ_CRN_CORQ
                x-lineageLookupReferenceObject: "ssbsect,scrcorq"
              subjCode:
                title: Subject
                maxLength: 4
                type: string
              courseAlias:
                title: Course Alias
                maxLength: 20
                type: string
              sectNumb:
                title: Section
                maxLength: 3
                type: string
            x-lineageReferenceObject: ssrcorq
    schedule-details-links-and-corequisites-1.0.0_qapi_post_request:
      required:
      - ssasectTermCode
      type: object
      properties:
        ssasectTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : ssasectTermCode, Lookup lineage\
            \ reference object : stvterm"
          x-lineageReferenceObject: ssasectTermCode
          x-lineageLookupReferenceObject: stvterm
        ssasectCrn:
          title: CRN
          maxLength: 30
          type: string
          description: "Lineage reference object : ssasectCrn"
          x-lineageReferenceObject: ssasectCrn
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer