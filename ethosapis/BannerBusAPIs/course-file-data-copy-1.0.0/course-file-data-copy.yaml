openapi: 3.0.0
info:
  title: course-file-data-copy
  description: API for SKADRCO administrative page
  version: 1.0.0
  x-source-name: SKADRCO
  x-source-title: Course File Data
  x-source-system: banner
  x-api-type: bus-poc
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/course-file-data-copy:
    post:
      tags:
        - course-file-data-copy
      summary: Creates a new resource in SKADRCO
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/course-file-data-copy-1.0.0_post_request"
            example:
              termCodeEff: 201910
              smrprleProgram: AHC50416
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/course-file-data-copy-1.0.0_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/course-file-data-copy: {}
components:
  schemas:
    course-file-data-copy-1.0.0_post_request:
      type: object
      properties:
        termCodeEff:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : termCodeEff, Lookup lineage reference
            object : stvterm"
          x-lineageReferenceObject: termCodeEff
          x-lineageLookupReferenceObject: stvterm
        smrprleProgram:
          title: Program
          maxLength: 12
          type: string
          description: "Lineage reference object : smrprleProgram, Lookup lineage
            reference object : smrprle"
          x-lineageReferenceObject: smrprleProgram
          x-lineageLookupReferenceObject: smrprle
      x-lineageReferenceObject: KEY_BLOCK
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: "The detailed actionable error message. "
    course-file-data-copy-1.0.0_post_response:
      required:
        - courseCode
        - courseName
        - crsStudyCode
        - duration
        - effFromDate
        - programEftsl
      type: object
      properties:
        activeIndicator:
          maxLength: 1
          type: string
          description: "Lineage reference object : SKRDRCO_ACTIVE_IND"
          x-lineageReferenceObject: SKRDRCO_ACTIVE_IND
        feeCap:
          title: Program Loan Cap
          maxLength: 13
          type: number
          description: "Lineage reference object : SKRDRCO_FEE_CAP"
          x-lineageReferenceObject: SKRDRCO_FEE_CAP
        courseType:
          title: Course of Study Type
          maxLength: 30
          type: string
          description: "Lineage reference object : SKRDRCO_COURSE_TYPE, Lookup lineage
            reference object : SKRRVAL"
          x-lineageReferenceObject: SKRDRCO_COURSE_TYPE
          x-lineageLookupReferenceObject: SKRRVAL
        courseCode:
          title: Course
          maxLength: 30
          type: string
          description: "Lineage reference object : SKRDRCO_COURSE_CODE, Lookup lineage
            reference object : SKRRVAL"
          x-lineageReferenceObject: SKRDRCO_COURSE_CODE
          x-lineageLookupReferenceObject: SKRRVAL
        programEftsl:
          title: Program EFTSL
          maxLength: 3
          type: string
          description: "Lineage reference object : SKRDRCO_PROGRAM_EFTSL"
          x-lineageReferenceObject: SKRDRCO_PROGRAM_EFTSL
        tcsiExclInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SKRDRCO_TCSI_EXCLUDE_IND"
          x-lineageReferenceObject: SKRDRCO_TCSI_EXCLUDE_IND
        combCrsStudy:
          maxLength: 1
          type: string
          description: "Lineage reference object : SKRDRCO_COMB_CRS_STUDY"
          x-lineageReferenceObject: SKRDRCO_COMB_CRS_STUDY
        effToDate:
          title: Effective To Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SKRDRCO_EFF_TO_DATE"
          format: date-time
          x-lineageReferenceObject: SKRDRCO_EFF_TO_DATE
        statusCde:
          type: string
          description: "Lineage reference object : SKRDRCO_STATUS_CDE"
          x-lineageReferenceObject: SKRDRCO_STATUS_CDE
        artsExclInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SKRDRCO_ARTS_EXCLUDE_IND"
          x-lineageReferenceObject: SKRDRCO_ARTS_EXCLUDE_IND
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : SKRDRCO_USER_ID"
          x-lineageReferenceObject: SKRDRCO_USER_ID
        providerType:
          title: Sector
          maxLength: 3
          type: string
          description: "Lineage reference object : SKRDRCO_PROVIDER_TYPE"
          x-lineageReferenceObject: SKRDRCO_PROVIDER_TYPE
        orgPidmId:
          title: ID
          maxLength: 9
          type: string
        totalUnits:
          title: Number of units in program
          maxLength: 3
          type: number
          description: "Lineage reference object : SKRDRCO_TOTAL_UNITS"
          x-lineageReferenceObject: SKRDRCO_TOTAL_UNITS
        duration:
          title: Standard Course Duration
          maxLength: 5
          type: number
          description: "Lineage reference object : SKRDRCO_DURATION"
          x-lineageReferenceObject: SKRDRCO_DURATION
        courseName:
          title: Course Name
          maxLength: 210
          type: string
          description: "Lineage reference object : SKRDRCO_COURSE_NAME"
          x-lineageReferenceObject: SKRDRCO_COURSE_NAME
        activityDate:
          title: Activity Date
          maxLength: 26
          type: string
          description: "Lineage reference object : SKRDRCO_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SKRDRCO_ACTIVITY_DATE
        programFee:
          title: Program Fee
          maxLength: 13
          type: number
          description: "Lineage reference object : SKRDRCO_PROGRAM_FEE"
          x-lineageReferenceObject: SKRDRCO_PROGRAM_FEE
        botpInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SKRDRCO_BOTP_IND"
          x-lineageReferenceObject: SKRDRCO_BOTP_IND
        crsStudyCode:
          title: Course of Study
          maxLength: 30
          type: string
          description: "Lineage reference object : SKRDRCO_CRS_STUDY_CODE, Lookup lineage
            reference object : SORCRST,spriden,spriden"
          x-lineageReferenceObject: SKRDRCO_CRS_STUDY_CODE
          x-lineageLookupReferenceObject: SORCRST,spriden,spriden
        name:
          maxLength: 100
          type: string
        effFromDate:
          title: Effective From Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SKRDRCO_EFF_FROM_DATE"
          format: date-time
          x-lineageReferenceObject: SKRDRCO_EFF_FROM_DATE
        courseTypeDesc:
          type: string
        crsStudyName:
          title: Course of Study Name
          type: string
          description: "Lineage reference object : SKRDRCO_CRS_STUDY_NAME"
          x-lineageReferenceObject: SKRDRCO_CRS_STUDY_NAME
      x-lineageReferenceObject: skrdrco
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
