openapi: 3.0.0
info:
  title: sections-inquiry
  description: API for SSASECQ administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SSASECQ
  x-source-domain: Student
  x-source-title: Schedule Section Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/sections-inquiry:
    get:
      tags:
      - sections-inquiry
      summary: Return resources from SSASECQ
      parameters:
      - name: X-SDE-Expand
        in: header
        description: The comma separated value list of block names
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of resources requesting for this result set.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
      - name: termCode
        in: query
        description: Term
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SSBSECT_TERM_CODE
      - name: ptrmCode
        in: query
        description: Part of Term
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SSBSECT_PTRM_CODE
      - name: regFromDate
        in: query
        description: Registration From
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SSBSECT_REG_FROM_DATE
      - name: regToDate
        in: query
        description: Registration To
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SSBSECT_REG_TO_DATE
      - name: crn
        in: query
        description: CRN
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SSBSECT_CRN
      - name: blockInd
        in: query
        description: Block Schedule
        required: false
        schema:
          type: string
      - name: subjCode
        in: query
        description: Subject
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SSBSECT_SUBJ_CODE
      - name: crseNumb
        in: query
        description: Course
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SSBSECT_CRSE_NUMB
      - name: seqNumb
