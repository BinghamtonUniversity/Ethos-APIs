            type: string
          x-lineageReferenceObject: SHRSCOM_NAME
        - name: description
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRSCOM_DESCRIPTION
        - name: weight
          in: query
          description: Weight
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRSCOM_WEIGHT
        - name: totalScore
          in: query
          description: Marked Out of
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRSCOM_TOTAL_SCORE
        - name: date
          in: query
          required: false
          schema:
            type: string
        - name: passInd
          in: query
          required: false
          schema:
            type: string
