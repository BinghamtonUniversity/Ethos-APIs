        - name: bestOfSub
          in: query
          required: false
          schema:
            type: string
        - name: subsetOfSub
          in: query
          required: false
          schema:
            type: string
        - name: anonymousInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRSCOM_ANONYMOUS_IND
        - name: shrscomName
          in: query
          required: false
          schema:
            type: string
        - name: shrscomDescription
          in: query
          required: false
          schema:
            type: string
        - name: shrscomWeight
          in: query
          required: false
