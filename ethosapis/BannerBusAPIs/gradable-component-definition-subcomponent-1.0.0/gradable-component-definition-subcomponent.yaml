      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/gradable-component-definition-subcomponent-1.0.0_po\
                st_request"
            example:
              minPassScore: 50
              subResitRule: MTLATRUL
              dueDate: 2021-10-27
