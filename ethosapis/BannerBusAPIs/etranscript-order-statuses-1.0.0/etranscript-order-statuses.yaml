openapi: 3.0.0
info:
  title: etranscript-order-statuses
  description: API for STVETST administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: STVETST
  x-source-domain: Student
  x-source-title: eTranscript Electronic Transcript Status Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/etranscript-order-statuses:
    get:
      tags:
        - etranscript-order-statuses
      summary: Return resources from STVETST
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: Order Status Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVETST_CODE
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVETST_DESC
        - name: sendCloudInd
          in: query
          description: "Send To Cloud:"
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVETST_SEND_CLOUD_IND
        - name: sendVendorInd
          in: query
          description: "Send To Vendor:"
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVETST_SEND_VENDOR_IND
        - name: translationValue
          in: query
          description: Third Party Translation
          required: false
          schema:
            type: string
          x-lineageReferenceObject: STVETST_TRANSLATION_VALUE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/etranscript-order-statuses-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/etranscript-order-statuses:
    post:
      tags:
        - etranscript-order-statuses QAPI (Query by POST)
      summary: Return resources from STVETST
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/etranscript-order-statuses-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/etranscript-order-statuses-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    etranscript-order-statuses-1.0.0_get_response:
      required:
        - activityDate
      type: object
      properties:
        translationValue:
          title: Third Party Translation
          maxLength: 50
          type: string
          description: "Lineage reference object : STVETST_TRANSLATION_VALUE"
          x-lineageReferenceObject: STVETST_TRANSLATION_VALUE
        sendVendorInd:
          title: "Send To Vendor:"
          maxLength: 1
          type: string
          description: "Lineage reference object : STVETST_SEND_VENDOR_IND"
          x-lineageReferenceObject: STVETST_SEND_VENDOR_IND
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : STVETST_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: STVETST_ACTIVITY_DATE
        code:
          title: Order Status Code
          maxLength: 4
          type: string
          description: "Lineage reference object : STVETST_CODE"
          x-lineageReferenceObject: STVETST_CODE
        sendCloudInd:
          title: "Send To Cloud:"
          maxLength: 1
          type: string
          description: "Lineage reference object : STVETST_SEND_CLOUD_IND"
          x-lineageReferenceObject: STVETST_SEND_CLOUD_IND
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : STVETST_DESC"
          x-lineageReferenceObject: STVETST_DESC
      x-lineageReferenceObject: stvetst
    etranscript-order-statuses-1.0.0_get_request:
      type: object
      properties:
        translationValue:
          title: Third Party Translation
          maxLength: 50
          type: string
          description: "Lineage reference object : STVETST_TRANSLATION_VALUE"
          x-lineageReferenceObject: STVETST_TRANSLATION_VALUE
        sendVendorInd:
          title: "Send To Vendor:"
          maxLength: 1
          type: string
          description: "Lineage reference object : STVETST_SEND_VENDOR_IND"
          x-lineageReferenceObject: STVETST_SEND_VENDOR_IND
        code:
          title: Order Status Code
          maxLength: 4
          type: string
          description: "Lineage reference object : STVETST_CODE"
          x-lineageReferenceObject: STVETST_CODE
        sendCloudInd:
          title: "Send To Cloud:"
          maxLength: 1
          type: string
          description: "Lineage reference object : STVETST_SEND_CLOUD_IND"
          x-lineageReferenceObject: STVETST_SEND_CLOUD_IND
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : STVETST_DESC"
          x-lineageReferenceObject: STVETST_DESC
      x-lineageReferenceObject: STVETST
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    etranscript-order-statuses-1.0.0_qapi_post:
      type: object
      properties:
        code:
          title: Order Status Code
          maxLength: 4
          type: string
          description: "Lineage reference object : STVETST_CODE"
          x-lineageReferenceObject: STVETST_CODE
        desc:
          title: Description
          maxLength: 30
          type: string
          description: "Lineage reference object : STVETST_DESC"
          x-lineageReferenceObject: STVETST_DESC
        sendCloudInd:
          title: "Send To Cloud:"
          maxLength: 1
          type: string
          description: "Lineage reference object : STVETST_SEND_CLOUD_IND"
          x-lineageReferenceObject: STVETST_SEND_CLOUD_IND
        sendVendorInd:
          title: "Send To Vendor:"
          maxLength: 1
          type: string
          description: "Lineage reference object : STVETST_SEND_VENDOR_IND"
          x-lineageReferenceObject: STVETST_SEND_VENDOR_IND
        translationValue:
          title: Third Party Translation
          maxLength: 50
          type: string
          description: "Lineage reference object : STVETST_TRANSLATION_VALUE"
          x-lineageReferenceObject: STVETST_TRANSLATION_VALUE
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
