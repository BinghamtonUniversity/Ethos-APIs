openapi: 3.0.0
info:
  title: check-detail-inquiry
  description: API for PHICHEK administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: PHICHEK
  x-source-domain: Human Resources
  x-source-title: Check Detail Inquiry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/check-detail-inquiry:
    get:
      tags:
        - check-detail-inquiry
      summary: Return resources from PHICHEK
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: true
          schema:
            type: string
        - name: year
          in: query
          required: true
          schema:
            type: string
        - name: pictCode
          in: query
          required: true
          schema:
            type: string
        - name: payno
          in: query
          required: true
          schema:
            type: string
        - name: seqNo
          in: query
          required: true
          schema:
            type: string
        - name: gross
          in: query
          description: Gross
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PHRHIST_GROSS
        - name: disp
          in: query
          description: Disposition
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PHRHIST_DISP
        - name: dispDesc
          in: query
          required: false
          schema:
            type: string
        - name: net
          in: query
          description: Net Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PHRHIST_NET
        - name: uiWeeks
          in: query
          description: Unemployment Insurance Weeks
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PHRHIST_UI_WEEKS
        - name: dednAmt
          in: query
          description: Deductions
          required: false
          schema:
            type: string
        - name: uiExceptionInd
          in: query
          description: Unemployment Insurance Exception Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: PHRHIST_UI_EXCEPTION_IND
        - name: docNo
          in: query
          required: false
          schema:
            type: string
        - name: typeDesc
          in: query
          required: false
          schema:
            type: string
        - name: phrdocmNet
          in: query
          required: false
          schema:
            type: string
        - name: docDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/check-detail-inquiry-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/check-detail-inquiry:
    post:
      tags:
        - check-detail-inquiry QAPI (Query by POST)
      summary: Return resources from PHICHEK
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/check-detail-inquiry-1.0.0_get_request"
            example:
              payno: 11
              pictCode: XM
              seqNo: 0
              year: 2011
              id: HOP510002
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/check-detail-inquiry-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    check-detail-inquiry-1.0.0_get_request:
      required:
        - pictCode
        - payno
        - seqNo
      type: object
      properties:
        dednAmt:
          title: Deductions
          maxLength: 14
          type: number
        typeDesc:
          title: Type
          maxLength: 14
          type: string
        seqNo:
          title: Sequence Number
          maxLength: 2
          type: number
          description: "Lineage reference object : seqNo"
          x-lineageReferenceObject: seqNo
        gross:
          title: Gross
          maxLength: 14
          type: number
          description: "Lineage reference object : PHRHIST_GROSS"
          x-lineageReferenceObject: PHRHIST_GROSS
        year:
          title: Year
          maxLength: 4
          type: string
          description: "Lineage reference object : year"
          x-lineageReferenceObject: year
        docDate:
          title: Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PHRDOCM_DOC_DATE"
          format: date-time
          x-lineageReferenceObject: PHRDOCM_DOC_DATE
        docNo:
          title: Number
          maxLength: 9
          type: string
          description: "Lineage reference object : PHRDOCM_DOC_NO"
          x-lineageReferenceObject: PHRDOCM_DOC_NO
        disp:
          title: Disposition
          maxLength: 2
          type: string
          description: "Lineage reference object : PHRHIST_DISP"
          x-lineageReferenceObject: PHRHIST_DISP
        uiExceptionInd:
          title: Unemployment Insurance Exception Indicator
          maxLength: 1
          type: string
          description: "Lineage reference object : PHRHIST_UI_EXCEPTION_IND"
          x-lineageReferenceObject: PHRHIST_UI_EXCEPTION_IND
        payno:
          title: Payroll Number
          maxLength: 3
          type: number
          description: "Lineage reference object : payno"
          x-lineageReferenceObject: payno
        pictCode:
          title: Payroll ID
          maxLength: 2
          type: string
          description: "Lineage reference object : pictCode"
          x-lineageReferenceObject: pictCode
        uiWeeks:
          title: Unemployment Insurance Weeks
          maxLength: 6
          type: number
          description: "Lineage reference object : PHRHIST_UI_WEEKS"
          x-lineageReferenceObject: PHRHIST_UI_WEEKS
        dispDesc:
          maxLength: 30
          type: string
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        net:
          title: Net Amount
          maxLength: 14
          type: number
          description: "Lineage reference object : PHRHIST_NET"
          x-lineageReferenceObject: PHRHIST_NET
        phrdocmNet:
          title: Amount
          maxLength: 14
          type: number
          description: "Lineage reference object : PHRDOCM_NET"
          x-lineageReferenceObject: PHRDOCM_NET
      x-lineageReferenceObject: PHRDOCM
    check-detail-inquiry-1.0.0_get_response:
      type: object
      properties:
        phrdocm:
          type: array
          items:
            type: object
            properties:
              activityDate:
                maxLength: 26
                type: string
                description: "Lineage reference object : PHRDOCM_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: PHRDOCM_ACTIVITY_DATE
              typeDesc:
                title: Type
                maxLength: 14
                type: string
              docDate:
                title: Date
                maxLength: 11
                type: string
                description: "Lineage reference object : PHRDOCM_DOC_DATE"
                format: date-time
                x-lineageReferenceObject: PHRDOCM_DOC_DATE
              docNo:
                title: Number
                maxLength: 9
                type: string
                description: "Lineage reference object : PHRDOCM_DOC_NO"
                x-lineageReferenceObject: PHRDOCM_DOC_NO
              net:
                title: Amount
                maxLength: 14
                type: number
                description: "Lineage reference object : PHRDOCM_NET"
                x-lineageReferenceObject: PHRDOCM_NET
              userId:
                maxLength: 30
                type: string
                description: "Lineage reference object : PHRDOCM_USER_ID"
                x-lineageReferenceObject: PHRDOCM_USER_ID
            x-lineageReferenceObject: phrdocm
        phrhist:
          type: array
          items:
            type: object
            properties:
              dednAmt:
                title: Deductions
                maxLength: 14
                type: number
              activityDate:
                maxLength: 26
                type: string
                description: "Lineage reference object : PHRHIST_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: PHRHIST_ACTIVITY_DATE
              gross:
                title: Gross
                maxLength: 14
                type: number
                description: "Lineage reference object : PHRHIST_GROSS"
                x-lineageReferenceObject: PHRHIST_GROSS
              uiWeeks:
                title: Unemployment Insurance Weeks
                maxLength: 6
                type: number
                description: "Lineage reference object : PHRHIST_UI_WEEKS"
                x-lineageReferenceObject: PHRHIST_UI_WEEKS
              dispDesc:
                maxLength: 30
                type: string
              net:
                title: Net Amount
                maxLength: 14
                type: number
                description: "Lineage reference object : PHRHIST_NET"
                x-lineageReferenceObject: PHRHIST_NET
              disp:
                title: Disposition
                maxLength: 2
                type: string
                description: "Lineage reference object : PHRHIST_DISP"
                x-lineageReferenceObject: PHRHIST_DISP
              uiExceptionInd:
                title: Unemployment Insurance Exception Indicator
                maxLength: 1
                type: string
                description: "Lineage reference object : PHRHIST_UI_EXCEPTION_IND"
                x-lineageReferenceObject: PHRHIST_UI_EXCEPTION_IND
              userId:
                maxLength: 30
                type: string
                description: "Lineage reference object : PHRHIST_USER_ID"
                x-lineageReferenceObject: PHRHIST_USER_ID
            x-lineageReferenceObject: phrhist
    check-detail-inquiry-1.0.0_qapi_post:
      required:
        - id
        - payno
        - pictCode
        - seqNo
        - year
      type: object
      properties:
        id:
          type: string
        year:
          type: string
        pictCode:
          type: string
        payno:
          type: string
        seqNo:
          type: string
        gross:
          title: Gross
          maxLength: 14
          type: number
          description: "Lineage reference object : PHRHIST_GROSS"
          x-lineageReferenceObject: PHRHIST_GROSS
        disp:
          title: Disposition
          maxLength: 2
          type: string
          description: "Lineage reference object : PHRHIST_DISP"
          x-lineageReferenceObject: PHRHIST_DISP
        dispDesc:
          maxLength: 30
          type: string
        net:
          title: Net Amount
          maxLength: 14
          type: number
          description: "Lineage reference object : PHRHIST_NET"
          x-lineageReferenceObject: PHRHIST_NET
        uiWeeks:
          title: Unemployment Insurance Weeks
          maxLength: 6
          type: number
          description: "Lineage reference object : PHRHIST_UI_WEEKS"
          x-lineageReferenceObject: PHRHIST_UI_WEEKS
        dednAmt:
          title: Deductions
          maxLength: 14
          type: number
        uiExceptionInd:
          title: Unemployment Insurance Exception Indicator
          maxLength: 1
          type: string
          description: "Lineage reference object : PHRHIST_UI_EXCEPTION_IND"
          x-lineageReferenceObject: PHRHIST_UI_EXCEPTION_IND
        docNo:
          type: string
        typeDesc:
          type: string
        phrdocmNet:
          type: string
        docDate:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
