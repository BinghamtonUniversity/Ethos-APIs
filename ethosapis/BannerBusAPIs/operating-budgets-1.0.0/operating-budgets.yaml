openapi: 3.0.0
info:
  title: operating-budgets
  description: API for FTVOBUD administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: FTVOBUD
  x-source-domain: Finance
  x-source-title: Operating Budget Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/operating-budgets:
    get:
      tags:
        - operating-budgets
      summary: Return resources from FTVOBUD
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: budgPrdType
          in: query
          description: Period Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVOBUD_BUDG_PRD_TYPE
        - name: budgTitle
          in: query
          description: Title
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVOBUD_BUDG_TITLE
        - name: coasCode
          in: query
          description: COA
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVOBUD_COAS_CODE
        - name: obudCode
          in: query
          description: Budget ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVOBUD_OBUD_CODE
        - name: yrsBudgeted
          in: query
          description: Years Budgeted
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVOBUD_YRS_BUDGETED
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/operating-budgets-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/operating-budgets:
    post:
      tags:
        - operating-budgets QAPI (Query by POST)
      summary: Return resources from FTVOBUD
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/operating-budgets-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/operating-budgets-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    operating-budgets-1.0.0_get_response:
      type: object
      properties:
        obudCode:
          title: Budget ID
          maxLength: 6
          type: string
          description: "Lineage reference object : FTVOBUD_OBUD_CODE"
          x-lineageReferenceObject: FTVOBUD_OBUD_CODE
        budgPrdType:
          title: Period Type
          maxLength: 1
          type: string
          description: "Lineage reference object : FTVOBUD_BUDG_PRD_TYPE"
          x-lineageReferenceObject: FTVOBUD_BUDG_PRD_TYPE
        coasCode:
          title: COA
          maxLength: 1
          type: string
          description: "Lineage reference object : FTVOBUD_COAS_CODE"
          x-lineageReferenceObject: FTVOBUD_COAS_CODE
        budgTitle:
          title: Title
          maxLength: 35
          type: string
          description: "Lineage reference object : FTVOBUD_BUDG_TITLE"
          x-lineageReferenceObject: FTVOBUD_BUDG_TITLE
        yrsBudgeted:
          title: Years Budgeted
          maxLength: 2
          type: number
          description: "Lineage reference object : FTVOBUD_YRS_BUDGETED"
          x-lineageReferenceObject: FTVOBUD_YRS_BUDGETED
      x-lineageReferenceObject: ftvobud
    operating-budgets-1.0.0_get_request:
      type: object
      properties:
        obudCode:
          title: Budget ID
          maxLength: 6
          type: string
          description: "Lineage reference object : FTVOBUD_OBUD_CODE"
          x-lineageReferenceObject: FTVOBUD_OBUD_CODE
        budgPrdType:
          title: Period Type
          maxLength: 1
          type: string
          description: "Lineage reference object : FTVOBUD_BUDG_PRD_TYPE"
          x-lineageReferenceObject: FTVOBUD_BUDG_PRD_TYPE
        coasCode:
          title: COA
          maxLength: 1
          type: string
          description: "Lineage reference object : FTVOBUD_COAS_CODE"
          x-lineageReferenceObject: FTVOBUD_COAS_CODE
        budgTitle:
          title: Title
          maxLength: 35
          type: string
          description: "Lineage reference object : FTVOBUD_BUDG_TITLE"
          x-lineageReferenceObject: FTVOBUD_BUDG_TITLE
        yrsBudgeted:
          title: Years Budgeted
          maxLength: 2
          type: number
          description: "Lineage reference object : FTVOBUD_YRS_BUDGETED"
          x-lineageReferenceObject: FTVOBUD_YRS_BUDGETED
      x-lineageReferenceObject: FTVOBUD
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    operating-budgets-1.0.0_qapi_post:
      type: object
      properties:
        budgPrdType:
          title: Period Type
          maxLength: 1
          type: string
          description: "Lineage reference object : FTVOBUD_BUDG_PRD_TYPE"
          x-lineageReferenceObject: FTVOBUD_BUDG_PRD_TYPE
        budgTitle:
          title: Title
          maxLength: 35
          type: string
          description: "Lineage reference object : FTVOBUD_BUDG_TITLE"
          x-lineageReferenceObject: FTVOBUD_BUDG_TITLE
        coasCode:
          title: COA
          maxLength: 1
          type: string
          description: "Lineage reference object : FTVOBUD_COAS_CODE"
          x-lineageReferenceObject: FTVOBUD_COAS_CODE
        obudCode:
          title: Budget ID
          maxLength: 6
          type: string
          description: "Lineage reference object : FTVOBUD_OBUD_CODE"
          x-lineageReferenceObject: FTVOBUD_OBUD_CODE
        yrsBudgeted:
          title: Years Budgeted
          maxLength: 2
          type: number
          description: "Lineage reference object : FTVOBUD_YRS_BUDGETED"
          x-lineageReferenceObject: FTVOBUD_YRS_BUDGETED
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
