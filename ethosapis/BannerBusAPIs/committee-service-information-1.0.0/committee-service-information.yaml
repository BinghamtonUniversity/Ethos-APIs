openapi: 3.0.0
info:
  title: committee-service-information
  description: API for SHACOMI administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SHACOMI
  x-source-domain: Student
  x-source-title: "Committee/Service Form "
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/committee-service-information:
    get:
      tags:
        - committee-service-information
      summary: Return resources from SHACOMI
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: shacomiComtCode
          in: query
          required: true
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: initiatedDate
          in: query
          description: Date Initiated
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHBCOMI_INITIATED_DATE
        - name: dissolvedInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHBCOMI_DISSOLVED_IND
        - name: dissolvedDate
          in: query
          description: Date Dissolved
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHBCOMI_DISSOLVED_DATE
        - name: comsCode
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHBCOMI_COMS_CODE
        - name: dicdCode
          in: query
          description: District/Division
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHBCOMI_DICD_CODE
        - name: collCode
          in: query
          description: Home College
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHBCOMI_COLL_CODE
        - name: deptCode
          in: query
          description: Home Department
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHBCOMI_DEPT_CODE
        - name: transPrint
          in: query
          description: Print on Transcript
          required: false
          schema:
            type: string
            x-lineageReferenceObject: SHBCOMI_TRANS_PRINT
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/committee-service-information-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
