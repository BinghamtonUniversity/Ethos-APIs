openapi: 3.0.0
info:
  title: soacomp-non-person-search
  description: API for SOACOMP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SOACOMP
  x-source-domain: Student
  x-source-title: Non-Person Search
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/soacomp-non-person-search:
    get:
      tags:
        - soacomp-non-person-search
      summary: Return resources from SOACOMP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: Activity
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_ACTIVITY_DATE
        - name: id
          in: query
          description: ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_ID
        - name: lastName
          in: query
          description: Name
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_LAST_NAME
        - name: ntypCode
          in: query
          description: Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_NTYP_CODE
        - name: changeInd
          in: query
          description: Change Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRIDEN_CHANGE_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/soacomp-non-person-search-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/soacomp-non-person-search:
    post:
      tags:
        - soacomp-non-person-search QAPI (Query by POST)
      summary: Return resources from SOACOMP
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/soacomp-non-person-search-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/soacomp-non-person-search-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    soacomp-non-person-search-1.0.0_get_response:
      type: object
      properties:
        lastName:
          title: Name
          maxLength: 65
          type: string
          description: "Lineage reference object : SPRIDEN_LAST_NAME"
          x-lineageReferenceObject: SPRIDEN_LAST_NAME
        changeInd:
          title: Change Indicator
          maxLength: 1
          type: string
          description: "Lineage reference object : SPRIDEN_CHANGE_IND"
          x-lineageReferenceObject: SPRIDEN_CHANGE_IND
        ntypCode:
          title: Type
          maxLength: 4
          type: string
          description: "Lineage reference object : SPRIDEN_NTYP_CODE, Lookup lineage
            reference object : gtvntyp"
          x-lineageReferenceObject: SPRIDEN_NTYP_CODE
          x-lineageLookupReferenceObject: gtvntyp
        activityDate:
          title: Activity
          maxLength: 11
          type: string
          description: "Lineage reference object : SPRIDEN_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SPRIDEN_ACTIVITY_DATE
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : SPRIDEN_ID"
          x-lineageReferenceObject: SPRIDEN_ID
      x-lineageReferenceObject: spriden
    soacomp-non-person-search-1.0.0_qapi_post:
      type: object
      properties:
        activityDate:
          title: Activity
          maxLength: 11
          type: string
          description: "Lineage reference object : SPRIDEN_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SPRIDEN_ACTIVITY_DATE
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : SPRIDEN_ID"
          x-lineageReferenceObject: SPRIDEN_ID
        lastName:
          title: Name
          maxLength: 65
          type: string
          description: "Lineage reference object : SPRIDEN_LAST_NAME"
          x-lineageReferenceObject: SPRIDEN_LAST_NAME
        ntypCode:
          title: Type
          maxLength: 4
          type: string
          description: "Lineage reference object : SPRIDEN_NTYP_CODE, Lookup lineage
            reference object : gtvntyp"
          x-lineageReferenceObject: SPRIDEN_NTYP_CODE
          x-lineageLookupReferenceObject: gtvntyp
        changeInd:
          title: Change Indicator
          maxLength: 1
          type: string
          description: "Lineage reference object : SPRIDEN_CHANGE_IND"
          x-lineageReferenceObject: SPRIDEN_CHANGE_IND
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    soacomp-non-person-search-1.0.0_get_request:
      type: object
      properties:
        lastName:
          title: Name
          maxLength: 65
          type: string
          description: "Lineage reference object : SPRIDEN_LAST_NAME"
          x-lineageReferenceObject: SPRIDEN_LAST_NAME
        ntypCode:
          title: Type
          maxLength: 4
          type: string
          description: "Lineage reference object : SPRIDEN_NTYP_CODE, Lookup lineage
            reference object : gtvntyp"
          x-lineageReferenceObject: SPRIDEN_NTYP_CODE
          x-lineageLookupReferenceObject: gtvntyp
        changeInd:
          title: Change Indicator
          maxLength: 1
          type: string
          description: "Lineage reference object : SPRIDEN_CHANGE_IND"
          x-lineageReferenceObject: SPRIDEN_CHANGE_IND
        activityDate:
          title: Activity
          maxLength: 11
          type: string
          description: "Lineage reference object : SPRIDEN_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SPRIDEN_ACTIVITY_DATE
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : SPRIDEN_ID"
          x-lineageReferenceObject: SPRIDEN_ID
      x-lineageReferenceObject: SPRIDEN
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
