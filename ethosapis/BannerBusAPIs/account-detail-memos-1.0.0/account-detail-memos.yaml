paths:
  /api/account-detail-memos:
    get:
      tags:
        - account-detail-memos
      summary: Return resources from TFADETL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: true
          schema:
            type: string
        - name: holdPassword
          in: query
          required: false
          schema:
            type: string
        - name: detailCode
          in: query
          description: Detail Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRMEMO_DETAIL_CODE
        - name: desc
          in: query
          description: Memo Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRMEMO_DESC
        - name: billingInd
          in: query
          description: Bill Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRMEMO_BILLING_IND
        - name: amount
          in: query
          description: Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRMEMO_AMOUNT
        - name: atypCode
          in: query
          description: Address Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRMEMO_ATYP_CODE
        - name: atypSeqno
          in: query
          description: Sequence
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRMEMO_ATYP_SEQNO
        - name: srceCode
          in: query
          description: Source
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TBRMEMO_SRCE_CODE
        - name: expirationDate
          in: query
          description: Expiration Date
          required: false
