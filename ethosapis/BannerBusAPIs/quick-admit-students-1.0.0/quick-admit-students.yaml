openapi: 3.0.0
info:
  title: quick-admit-students
  description: API for SAAQUIK administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SAAQUIK
  x-source-domain: Student
  x-source-title: Quick Entry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/quick-admit-students:
    post:
      tags:
        - quick-admit-students
      summary: Creates a new resource in SAAQUIK
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/quick-admit-students-1.0.0_post_request"
            example:
              edlvCode: HS
              addAdmInd: Y
              stdrecrSbgiCode: A00003
              sorlfosMajrCode: ANTH
              resdCode: R
              stdadapAdmtCode: SP
              rateCode: LOCAL
              ststCode: AS
              stdappdApdcCode: 30
              egolCode: BD
              addRecrInd: Y
              sorlcurProgram: BA-ANTHRO
              id: A00034151
              stypCode: N
              stdadapApstCode: D
              raceCde: 2AA
              levlCode: UG
              termCode: 201520
              fullPartInd: F
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/quick-admit-students-1.0.0_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/quick-admit-students: {}
