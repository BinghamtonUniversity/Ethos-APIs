              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : RVREXMC_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: RVREXMC_ACTIVITY_DATE
              exemptionDesc:
                title: Exemption Code Description
                type: string
              userId:
                title: User
                maxLength: 30
                type: string
                description: "Lineage reference object : RVREXMC_USER_ID"
                x-lineageReferenceObject: RVREXMC_USER_ID
            x-lineageReferenceObject: rvrexmc
        rvbexmc:
          type: array
          items:
            required:
              - eligCode
            type: object
