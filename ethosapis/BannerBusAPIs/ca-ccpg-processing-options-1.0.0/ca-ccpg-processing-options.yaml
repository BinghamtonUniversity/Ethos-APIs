                description: "Lineage reference object : RVBEXMC_USER_ID"
                x-lineageReferenceObject: RVBEXMC_USER_ID
            x-lineageReferenceObject: rvbexmc
        rvretrm:
          type: array
          items:
            required:
              - exempStartDate
              - termCode
            type: object
            properties:
              activityDate:
                title: Activity Date
                maxLength: 11
