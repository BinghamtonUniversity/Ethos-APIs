openapi: 3.0.0
info:
  title: finance-detail-codes
  description: API for TFADETC administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TFADETC
  x-source-domain: Finance
  x-source-title: Detail Code Control Form - Finance
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/finance-detail-codes:
    get:
      tags:
        - finance-detail-codes
      summary: Return resources from TFADETC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: detailCode
          in: query
          required: false
          schema:
            type: string
        - name: desc
          in: query
          required: false
          schema:
            type: string
        - name: typeInd
          in: query
          required: false
          schema:
            type: string
        - name: dcatCode
          in: query
          required: false
          schema:
            type: string
        - name: detailCodeInd
          in: query
          required: false
          schema:
            type: string
        - name: priority
          in: query
          required: false
          schema:
            type: string
        - name: refundInd
          in: query
          required: false
          schema:
            type: string
        - name: currCode
          in: query
          required: false
          schema:
            type: string
        - name: dirdInd
          in: query
          required: false
          schema:
            type: string
        - name: refundableInd
          in: query
          required: false
          schema:
            type: string
        - name: receiptInd
          in: query
          required: false
          schema:
            type: string
        - name: payhistInd
          in: query
          required: false
          schema:
            type: string
        - name: glNosEnterable
          in: query
          required: false
          schema:
            type: string
        - name: detcActiveInd
          in: query
          required: false
          schema:
            type: string
        - name: paytCode
          in: query
          required: false
          schema:
            type: string
        - name: taxtCode
          in: query
          required: false
          schema:
            type: string
        - name: taxProfile
          in: query
          required: false
          schema:
            type: string
        - name: taxMethod
          in: query
          required: false
          schema:
            type: string
        - name: amount
          in: query
          required: false
          schema:
            type: string
        - name: effectiveDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/finance-detail-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - finance-detail-codes
      summary: Updates an existing resource in TFADETC
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/finance-detail-codes-1.0.0_put_request"
            example:
              amount: 200
              dcatCode: BIL
              priority: 111
              desc: Sample Data Put
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
