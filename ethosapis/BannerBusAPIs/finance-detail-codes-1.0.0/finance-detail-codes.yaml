                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/finance-detail-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    finance-detail-codes-1.0.0_post_response:
      type: object
      properties:
        tbbdetc:
          type: array
          items:
            required:
              - dcatCode
              - desc
              - detailCode
              - paytCode
              - priority
              - typeInd
            type: object
            properties:
              tbbdectNonAllowChgInd:
                title: Non-Allowable Charge
                maxLength: 1
                type: string
              amount:
                title: Default Amount
                maxLength: 10
                type: number
                description: "Lineage reference object : TBBDETC_AMOUNT"
                x-lineageReferenceObject: TBBDETC_AMOUNT
              typeInd:
                title: Type
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_TYPE_IND"
