          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - finance-detail-codes
      summary: Creates a new resource in TFADETC
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/finance-detail-codes-1.0.0_post_request"
            example:
              tbracctAOrgnCode: 11001T
              tbracctBRuclCode2: ACII
              tbracctBRuclCode3: AAA1
              tbracctBOrgnCode: 11001T
              tbracctBRuclCode1: AAA
              tbracctBFundCode: 1110
              tbracctAFundCode: 1110
              accountPercent2: 100
              tbracctBCoasCode: B
              tbracctACoasCode: B
              tbracctBAcciCode: AR1
              amount: 100
              typeInd: C
              tbracctAAcciCode: AR1
              priority: 999
              detailCode: 14
              tbracctARuclCode1: AAA
              tbracctARuclCode2: ACII
              tbracctARuclCode3: AAA1
              tbracctBAcctCode: 1221
              tbracctAProgCode: 12
              dcatCode: TUI
              tbracctBProgCode: 12
              tbracctAAcctCode: 1221
              desc: Sample Data Post
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/finance-detail-codes-1.0.0_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/finance-detail-codes:
    post:
      tags:
        - finance-detail-codes QAPI (Query by POST)
      summary: Return resources from TFADETC
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/finance-detail-codes-1.0.0_get_request"
            example:
              tbbdetcDcatCode: TUI
              tbbdetcDetailCode: 000A
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
