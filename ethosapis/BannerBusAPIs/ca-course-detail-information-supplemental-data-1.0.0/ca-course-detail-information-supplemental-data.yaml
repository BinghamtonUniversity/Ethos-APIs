          x-lineageReferenceObject: SCBSUPP_CUDA_CODE
          x-lineageLookupReferenceObject: stvcuda
        cudaDescription:
          type: string
        cudcCode:
          title: Element 3
          maxLength: 30
          type: string
          description: "Lineage reference object : SCBSUPP_CUDC_CODE, Lookup lineage
            reference object : stvcudc"
          x-lineageReferenceObject: SCBSUPP_CUDC_CODE
          x-lineageLookupReferenceObject: stvcudc
        cudcDescription:
          type: string
        occsCode:
          title: Occupational Course
          maxLength: 30
          type: string
