          x-lineageReferenceObject: SCBSUPP_OCCS_CODE
          x-lineageLookupReferenceObject: stvoccs
      x-lineageReferenceObject: scbsupp
    ca-course-detail-information-supplemental-data-1.0.0_qapi_post:
      type: object
