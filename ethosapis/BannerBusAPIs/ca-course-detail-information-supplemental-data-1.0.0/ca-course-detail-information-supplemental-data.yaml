        cudbDescription:
          type: string
        ccslCode:
          title: Classification
          maxLength: 30
          type: string
          description: "Lineage reference object : SCBSUPP_CCSL_CODE, Lookup lineage
            reference object : stvccsl"
          x-lineageReferenceObject: SCBSUPP_CCSL_CODE
          x-lineageLookupReferenceObject: stvccsl
        cudbCode:
          title: Element 2
          maxLength: 30
          type: string
          description: "Lineage reference object : SCBSUPP_CUDB_CODE, Lookup lineage
            reference object : stvcudb"
          x-lineageReferenceObject: SCBSUPP_CUDB_CODE
          x-lineageLookupReferenceObject: stvcudb
        cuddCode:
          title: Element 4
          maxLength: 30
          type: string
          description: "Lineage reference object : SCBSUPP_CUDD_CODE, Lookup lineage
            reference object : stvcudd"
          x-lineageReferenceObject: SCBSUPP_CUDD_CODE
          x-lineageLookupReferenceObject: stvcudd
        cudfCode:
          title: Element 6
          maxLength: 30
          type: string
          description: "Lineage reference object : SCBSUPP_CUDF_CODE, Lookup lineage
            reference object : STVCUDF"
          x-lineageReferenceObject: SCBSUPP_CUDF_CODE
          x-lineageLookupReferenceObject: STVCUDF
        creditCategoryInd:
