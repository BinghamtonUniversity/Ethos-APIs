      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-course-detail-information-supplemental-data-1.0.0_get_request:
      type: object
      properties:
        scacrseCrseNumb:
          title: Course
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseCrseNumb, Lookup lineage
            reference object : scbcrse,scbcrky"
          x-lineageReferenceObject: scacrseCrseNumb
          x-lineageLookupReferenceObject: scbcrse,scbcrky
        scacrseSubjCode:
          title: Subject
          maxLength: 30
          type: string
