openapi: 3.0.0
info:
  title: common-matching-source
  description: API for GOICMSS administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: GOICMSS
  x-source-domain: Foundation
  x-source-title: Common Matching Source Search
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/common-matching-source:
    get:
      tags:
        - common-matching-source
      summary: Return resources from GOICMSS
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: columnCode
          in: query
          required: false
          schema:
            type: string
        - name: cmscCode
          in: query
          description: Source
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORCMSR_CMSC_CODE
        - name: dataReqInd
          in: query
          description: Data Requirement
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORCMSR_DATA_REQ_IND
        - name: length
          in: query
          description: Length
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORCMSR_LENGTH
        - name: priorityNo
          in: query
          description: Rule Set
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORCMSR_PRIORITY_NO
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORCMSR_ACTIVITY_DATE
        - name: userId
          in: query
          description: User ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORCMSR_USER_ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/common-matching-source-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/common-matching-source:
    post:
      tags:
        - common-matching-source QAPI (Query by POST)
      summary: Return resources from GOICMSS
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/common-matching-source-1.0.0_get_request"
            example:
              columnCode: AMCAS ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/common-matching-source-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    common-matching-source-1.0.0_get_response:
      required:
        - cmscCode
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GORCMSR_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GORCMSR_ACTIVITY_DATE
        priorityNo:
          title: Rule Set
          maxLength: 3
          type: number
          description: "Lineage reference object : GORCMSR_PRIORITY_NO"
          x-lineageReferenceObject: GORCMSR_PRIORITY_NO
        cmscDesc:
          type: string
        length:
          title: Length
          maxLength: 3
          type: number
          description: "Lineage reference object : GORCMSR_LENGTH"
          x-lineageReferenceObject: GORCMSR_LENGTH
        cmscCode:
          title: Source
          maxLength: 30
          type: string
          description: "Lineage reference object : GORCMSR_CMSC_CODE"
          x-lineageReferenceObject: GORCMSR_CMSC_CODE
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : GORCMSR_USER_ID"
          x-lineageReferenceObject: GORCMSR_USER_ID
        dataReqInd:
          title: Data Requirement
          maxLength: 1
          type: string
          description: "Lineage reference object : GORCMSR_DATA_REQ_IND"
          x-lineageReferenceObject: GORCMSR_DATA_REQ_IND
      x-lineageReferenceObject: gorcmsr
    common-matching-source-1.0.0_get_request:
      required:
        - cmscCode
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GORCMSR_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GORCMSR_ACTIVITY_DATE
        priorityNo:
          title: Rule Set
          maxLength: 3
          type: number
          description: "Lineage reference object : GORCMSR_PRIORITY_NO"
          x-lineageReferenceObject: GORCMSR_PRIORITY_NO
        length:
          title: Length
          maxLength: 3
          type: number
          description: "Lineage reference object : GORCMSR_LENGTH"
          x-lineageReferenceObject: GORCMSR_LENGTH
        columnCode:
          title: Element
          maxLength: 30
          type: string
          description: "Lineage reference object : columnCode, Lookup lineage reference
            object : gorcmdd"
          x-lineageReferenceObject: columnCode
          x-lineageLookupReferenceObject: gorcmdd
        cmscCode:
          title: Source
          maxLength: 30
          type: string
          description: "Lineage reference object : GORCMSR_CMSC_CODE"
          x-lineageReferenceObject: GORCMSR_CMSC_CODE
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : GORCMSR_USER_ID"
          x-lineageReferenceObject: GORCMSR_USER_ID
        dataReqInd:
          title: Data Requirement
          maxLength: 1
          type: string
          description: "Lineage reference object : GORCMSR_DATA_REQ_IND"
          x-lineageReferenceObject: GORCMSR_DATA_REQ_IND
      x-lineageReferenceObject: GORCMSR
    common-matching-source-1.0.0_qapi_post:
      type: object
      properties:
        columnCode:
          type: string
        cmscCode:
          title: Source
          maxLength: 30
          type: string
          description: "Lineage reference object : GORCMSR_CMSC_CODE"
          x-lineageReferenceObject: GORCMSR_CMSC_CODE
        dataReqInd:
          title: Data Requirement
          maxLength: 1
          type: string
          description: "Lineage reference object : GORCMSR_DATA_REQ_IND"
          x-lineageReferenceObject: GORCMSR_DATA_REQ_IND
        length:
          title: Length
          maxLength: 3
          type: number
          description: "Lineage reference object : GORCMSR_LENGTH"
          x-lineageReferenceObject: GORCMSR_LENGTH
        priorityNo:
          title: Rule Set
          maxLength: 3
          type: number
          description: "Lineage reference object : GORCMSR_PRIORITY_NO"
          x-lineageReferenceObject: GORCMSR_PRIORITY_NO
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : GORCMSR_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: GORCMSR_ACTIVITY_DATE
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : GORCMSR_USER_ID"
          x-lineageReferenceObject: GORCMSR_USER_ID
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
