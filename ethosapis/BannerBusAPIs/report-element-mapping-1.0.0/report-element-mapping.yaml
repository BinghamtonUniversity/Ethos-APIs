        '401':
          description: Failure. Unauthorized
        '400':
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
  /qapi/report-element-mapping:
    post:
      tags:
      - report-element-mapping QAPI (Query by POST)
      summary: Return resources from SKARMAP
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: '#/components/schemas/report-element-mapping-1.0.0_qapi_post_request'
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
