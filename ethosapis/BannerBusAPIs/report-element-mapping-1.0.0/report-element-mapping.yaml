openapi: 3.0.0
info:
  title: report-element-mapping
  description: API for SKARMAP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga 
  x-source-name: SKARMAP
  x-source-domain: Student
  x-source-title: Report Element Mapping
  x-source-system: banner
  x-api-type: bus-poc
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: '{server_url}'
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/report-element-mapping:
    get:
      tags:
      - report-element-mapping
      summary: Return resources from SKARMAP
      parameters:
      - name: X-SDE-Expand
        in: header
        description: The comma separated value list of block names
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of resources requesting for this result set.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
      - name: code
        in: query
        required: true
        schema:
          type: string
      - name: BannerField
        in: query
        required: false
        schema:
          type: string
      - name: bannerValue
        in: query
        description: Banner Value
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SKRRMAP_BANNER_VALUE
      - name: elmtCode
        in: query
        description: Element Code
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SKRRMAP_ELMT_CODE
      - name: elmtValue
        in: query
        description: Element Value
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SKRRMAP_ELMT_VALUE
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response
                body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/report-element-mapping-1.0.0_get_response'
        '401':
          description: Failure. Unauthorized
        '400':
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
    post:
      tags:
      - report-element-mapping
      summary: Creates a new resource in SKARMAP
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: '#/components/schemas/report-element-mapping-1.0.0_post_request'
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
