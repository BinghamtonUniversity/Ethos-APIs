          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckDocCode
          in: query
          required: true
          schema:
            type: string
        - name: keyblckSubmissionNumber
          in: query
          required: false
          schema:
            type: string
        - name: keyblckDtypCode
          in: query
          required: true
          schema:
            type: string
        - name: submissionNumber
          in: query
          description: Sub Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBTRNH_SUBMISSION_NUMBER
        - name: itemNum
          in: query
          description: Item
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBTRNH_ITEM_NUM
        - name: seqNum
          in: query
          description: Sequence
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBTRNH_SEQ_NUM
        - name: ruclCode
          in: query
          description: Journal Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBTRNH_RUCL_CODE
        - name: transDesc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FGBTRNH_TRANS_DESC
        - name: transAmt
          in: query
          description: Amount
          required: false
