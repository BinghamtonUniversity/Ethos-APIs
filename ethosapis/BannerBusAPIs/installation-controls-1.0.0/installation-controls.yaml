        - city
        - highedGovtInd
        - name
        - operatingSystemInd
        - sinMsgType
        - ssnMaxLength
      type: object
      properties:
        streetLine2:
          title: Street Line 2
          maxLength: 75
          type: string
          description: "Lineage reference object : GUBINST_STREET_LINE2"
          x-lineageReferenceObject: GUBINST_STREET_LINE2
        streetLine1:
          title: Street Line 1
          maxLength: 75
          type: string
          description: "Lineage reference object : GUBINST_STREET_LINE1"
          x-lineageReferenceObject: GUBINST_STREET_LINE1
