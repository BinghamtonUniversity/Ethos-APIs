openapi: 3.0.0
info:
  title: ca-faculty-id-load-history-query
  description: API for SVILOQR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SVILOQR
  x-source-domain: Student
  x-source-title: Faculty ID Load History Query (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-faculty-id-load-history-query:
    get:
      tags:
        - ca-faculty-id-load-history-query
      summary: Return resources from SVILOQR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: displayOnlyTerm
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-faculty-id-load-history-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-faculty-id-load-history-query:
    post:
      tags:
        - ca-faculty-id-load-history-query QAPI (Query by POST)
      summary: Return resources from SVILOQR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-faculty-id-load-history-query-1.0.0_get_request"
            example:
              displayOnlyTerm: N
              id: FACV1
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-faculty-id-load-history-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-faculty-id-load-history-query-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        displayOnlyTerm:
          type: string
    ca-faculty-id-load-history-query-1.0.0_get_response:
      type: object
      properties:
        RLoadActiveInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : R_LOAD_ACTIVE_IND"
          x-lineageReferenceObject: R_LOAD_ACTIVE_IND
        RTermDesc:
          title: Description
          type: string
          description: "Lineage reference object : R_TERM_DESC"
          x-lineageReferenceObject: R_TERM_DESC
        RMessage:
          title: Message
          type: string
          description: "Lineage reference object : R_MESSAGE"
          x-lineageReferenceObject: R_MESSAGE
        RTermCode:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : R_TERM_CODE"
          x-lineageReferenceObject: R_TERM_CODE
        RLoadLimit:
          title: Faculty ID Load Limit (FTE)
          maxLength: 7
          type: number
          description: "Lineage reference object : R_LOAD_LIMIT"
          x-lineageReferenceObject: R_LOAD_LIMIT
        RTotalFte:
          title: Calculated Total Term FTE
          maxLength: 40
          type: number
          description: "Lineage reference object : R_TOTAL_FTE"
          x-lineageReferenceObject: R_TOTAL_FTE
        totalLimitFte:
          title: Calculated Term FTE Subject to Load Limit
          maxLength: 40
          type: number
      x-lineageReferenceObject: stvterm
    ca-faculty-id-load-history-query-1.0.0_get_request:
      type: object
      properties:
        displayOnlyTerm:
          title: Display Only Term Over Faculty Load Limits
          maxLength: 1
          type: string
          description: "Lineage reference object : displayOnlyTerm"
          x-lineageReferenceObject: displayOnlyTerm
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
