openapi: 3.0.0
info:
  title: external-report-codes
  description: API for FTVEELI administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: FTVEELI
  x-source-domain: Finance
  x-source-title: External Report Code Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/external-report-codes:
    get:
      tags:
        - external-report-codes
      summary: Return resources from FTVEELI
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: coasCode
          in: query
          description: COA
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVEELI_COAS_CODE
        - name: eelcCode
          in: query
          description: |-
            Internal
            Element
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVEELI_EELC_CODE
        - name: eeliCode
          in: query
          description: |-
            External
            Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVEELI_EELI_CODE
        - name: eentCode
          in: query
          description: Entity
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVEELI_EENT_CODE
        - name: effDate
          in: query
          description: |-
            Effective
            Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVEELI_EFF_DATE
        - name: statusInd
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVEELI_STATUS_IND
        - name: title
          in: query
          description: Title
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVEELI_TITLE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/external-report-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/external-report-codes:
    post:
      tags:
        - external-report-codes QAPI (Query by POST)
      summary: Return resources from FTVEELI
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/external-report-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/external-report-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
