openapi: 3.0.0
info:
  title: organization-budget-status
  description: API for FGIBDST administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FGIBDST
  x-source-domain: Finance
  x-source-title: Organization Budget Status
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/organization-budget-status:
    get:
      tags:
        - organization-budget-status
      summary: Return resources from FGIBDST
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblocCoasCode
          in: query
          required: true
          schema:
            type: string
        - name: keyblocFsyrCode
          in: query
          required: true
          schema:
            type: string
        - name: keyblocAcciCode
          in: query
          required: false
          schema:
            type: string
        - name: queryAcct
          in: query
          required: false
          schema:
            type: string
        - name: inclRev
          in: query
          required: false
          schema:
            type: string
        - name: keyblocCmtType
          in: query
          required: false
          schema:
            type: string
        - name: keyblocOrgnCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocFundCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocProgCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocAcctCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocAtypCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocActvCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblocLocnCode
          in: query
          required: false
          schema:
            type: string
        - name: ftvacctAcctCode
          in: query
          description: Account
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVACCT_ACCT_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/organization-budget-status-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/organization-budget-status:
    post:
      tags:
        - organization-budget-status QAPI (Query by POST)
      summary: Return resources from FGIBDST
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/organization-budget-status-1.0.0_get_request"
            example:
              keyblocCoasCode: B
              keyblocFsyrCode: 22
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/organization-budget-status-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    organization-budget-status-1.0.0_get_response:
      type: object
      properties:
        net_total:
          type: array
          items:
            type: object
            properties:
              netSumYtdActv:
                maxLength: 31
                type: number
                description: "Lineage reference object : netSumYtdActv"
                x-lineageReferenceObject: netSumYtdActv
              netSumAdjt:
                title: Net Total
                maxLength: 31
                type: number
                description: "Lineage reference object : netSumAdjt"
                x-lineageReferenceObject: netSumAdjt
              netSumRsrv:
                maxLength: 31
                type: number
                description: "Lineage reference object : netSumRsrv"
                x-lineageReferenceObject: netSumRsrv
              netSumAbal:
                maxLength: 31
                type: number
                description: "Lineage reference object : netSumAbal"
                x-lineageReferenceObject: netSumAbal
            x-lineageReferenceObject: net_total
        ftvacct_block:
          type: array
          items:
            type: object
            properties:
              displaySumRsvr:
                title: Commitments
                maxLength: 31
                type: number
              displayAvailBal:
                title: Available Balance
                maxLength: 25
                type: number
              displaySumAdjt:
                title: Adjusted Budget
                maxLength: 31
                type: number
              ftvacctAcctCode:
                title: Account
                maxLength: 6
                type: string
                description: "Lineage reference object : FTVACCT_ACCT_CODE"
                x-lineageReferenceObject: FTVACCT_ACCT_CODE
              ftvacctTitle:
                title: Title
                maxLength: 35
                type: string
                description: "Lineage reference object : FTVACCT_TITLE"
                x-lineageReferenceObject: FTVACCT_TITLE
              displaySumYtdActv:
                title: YTD Activity
                maxLength: 31
                type: number
              itypeDesc:
                title: Type
                maxLength: 30
                type: string
            x-lineageReferenceObject: ftvacct_block
    organization-budget-status-1.0.0_qapi_post:
      required:
        - keyblocCoasCode
        - keyblocFsyrCode
      type: object
      properties:
        keyblocCoasCode:
          type: string
        keyblocFsyrCode:
          type: string
        keyblocAcciCode:
          type: string
        queryAcct:
          type: string
        inclRev:
          type: string
        keyblocCmtType:
          type: string
        keyblocOrgnCode:
          type: string
        keyblocFundCode:
          type: string
        keyblocProgCode:
          type: string
        keyblocAcctCode:
          type: string
        keyblocAtypCode:
          type: string
        keyblocActvCode:
          type: string
        keyblocLocnCode:
          type: string
        ftvacctAcctCode:
          title: Account
          maxLength: 6
          type: string
          description: "Lineage reference object : FTVACCT_ACCT_CODE"
          x-lineageReferenceObject: FTVACCT_ACCT_CODE
    organization-budget-status-1.0.0_get_request:
      required:
        - keyblocCoasCode
        - keyblocFsyrCode
      type: object
      properties:
        keyblocLocnCode:
          title: Location
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocLocnCode"
          x-lineageReferenceObject: keyblocLocnCode
        keyblocCoasCode:
          title: Chart
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocCoasCode, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: keyblocCoasCode
          x-lineageLookupReferenceObject: ftvcoas
        keyblocAtypCode:
          title: Account Type
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocAtypCode, Lookup lineage
            reference object : ftvatyp"
          x-lineageReferenceObject: keyblocAtypCode
          x-lineageLookupReferenceObject: ftvatyp
        keyblocAcctCode:
          title: Account
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocAcctCode"
          x-lineageReferenceObject: keyblocAcctCode
        keyblocProgCode:
          title: Program
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocProgCode"
          x-lineageReferenceObject: keyblocProgCode
        keyblocAcciCode:
          title: Index
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocAcciCode, Lookup lineage
            reference object : ftvacci"
          x-lineageReferenceObject: keyblocAcciCode
          x-lineageLookupReferenceObject: ftvacci
        keyblocOrgnCode:
          title: Organization
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocOrgnCode"
          x-lineageReferenceObject: keyblocOrgnCode
        keyblocCmtType:
          title: Commit Type
          maxLength: 1
          type: string
          description: "Lineage reference object : keyblocCmtType"
          x-lineageReferenceObject: keyblocCmtType
        keyblocActvCode:
          title: Activity
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocActvCode"
          x-lineageReferenceObject: keyblocActvCode
        ftvacctAcctCode:
          title: Account
          maxLength: 6
          type: string
          description: "Lineage reference object : FTVACCT_ACCT_CODE"
          x-lineageReferenceObject: FTVACCT_ACCT_CODE
        inclRev:
          title: Include Revenue Accounts
          maxLength: 30
          type: string
          description: "Lineage reference object : inclRev"
          x-lineageReferenceObject: inclRev
        keyblocFundCode:
          title: Fund
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocFundCode"
          x-lineageReferenceObject: keyblocFundCode
        keyblocFsyrCode:
          title: Fiscal Year
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblocFsyrCode, Lookup lineage
            reference object : ftvfsyr,ftvfspd,ftvfspd,ftvfspd,ftvfspd"
          x-lineageReferenceObject: keyblocFsyrCode
          x-lineageLookupReferenceObject: ftvfsyr,ftvfspd,ftvfspd,ftvfspd,ftvfspd
        queryAcct:
          title: Query Specific Account
          maxLength: 1
          type: string
          description: "Lineage reference object : queryAcct"
          x-lineageReferenceObject: queryAcct
      x-lineageReferenceObject: FTVACCT_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
