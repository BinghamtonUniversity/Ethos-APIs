openapi: 3.0.0
info:
  title: installment-payment-plan-amount
  description: API for TSAISTP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: TSAISTP
  x-source-domain: Student
  x-source-title: Installment Plan Payment Amount
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/installment-payment-plan-amount:
    get:
      tags:
        - installment-payment-plan-amount
      summary: Return resources from TSAISTP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: true
          schema:
            type: string
        - name: termCode
          in: query
          required: true
          schema:
            type: string
        - name: detailCode
          in: query
          required: false
          schema:
            type: string
        - name: desc
          in: query
          required: false
          schema:
            type: string
        - name: amount
          in: query
          required: false
          schema:
            type: number
        - name: effDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/installment-payment-plan-amount-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/installment-payment-plan-amount:
    post:
      tags:
        - installment-payment-plan-amount QAPI (Query by POST)
      summary: Return resources from TSAISTP
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/installment-payment-plan-amount-1.0.0_get_request"
            example:
              id: AIP01
              termCode: 200520
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/installment-payment-plan-amount-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    installment-payment-plan-amount-1.0.0_qapi_post:
      required:
        - id
        - termCode
      type: object
      properties:
        id:
          type: string
        termCode:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    installment-payment-plan-amount-1.0.0_get_request:
      type: object
      properties:
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        termCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : termCode, Lookup lineage reference
            object : stvterm"
          x-lineageReferenceObject: termCode
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: KEY_BLOCK
    installment-payment-plan-amount-1.0.0_get_response:
      type: object
      properties:
        tbvinss:
          type: array
          items:
            type: object
            properties:
              amount:
                title: Amount
                maxLength: 17
                type: number
                description: "Lineage reference object : TBVINSS_AMOUNT"
                x-lineageReferenceObject: TBVINSS_AMOUNT
              effDate:
                title: Effective Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBVINSS_EFF_DATE"
                format: date-time
                x-lineageReferenceObject: TBVINSS_EFF_DATE
              detailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lineage reference object : TBVINSS_DETAIL_CODE"
                x-lineageReferenceObject: TBVINSS_DETAIL_CODE
              desc:
                title: Detail Code Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVINSS_DESC"
                x-lineageReferenceObject: TBVINSS_DESC
            x-lineageReferenceObject: tbvinss
        tbvinsp:
          type: array
          items:
            type: object
            properties:
              calcExisting:
                title: Existing or Calculated
                maxLength: 1
                type: string
                description: "Lineage reference object : TBVINSP_CALC_EXISTING"
                x-lineageReferenceObject: TBVINSP_CALC_EXISTING
              amount:
                title: Amount
                maxLength: 18
                type: number
                description: "Lineage reference object : TBVINSP_AMOUNT"
                x-lineageReferenceObject: TBVINSP_AMOUNT
              effDate:
                title: Effective Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBVINSP_EFF_DATE"
                format: date-time
                x-lineageReferenceObject: TBVINSP_EFF_DATE
              installmentPlan:
                title: Plan Code
                maxLength: 2
                type: string
                description: "Lineage reference object : TBVINSP_INSTALLMENT_PLAN"
                x-lineageReferenceObject: TBVINSP_INSTALLMENT_PLAN
              detailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lineage reference object : TBVINSP_DETAIL_CODE"
                x-lineageReferenceObject: TBVINSP_DETAIL_CODE
              desc:
                title: Detail Code Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBVINSP_DESC"
                x-lineageReferenceObject: TBVINSP_DESC
            x-lineageReferenceObject: tbvinsp
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
