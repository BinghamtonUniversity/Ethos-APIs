openapi: 3.0.0
info:
  title: block-schedule-query
  description: API for SSABLKQ administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SSABLKQ
  x-source-domain: Student
  x-source-title: Block Schedule Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/block-schedule-query:
    get:
      tags:
        - block-schedule-query
      summary: Return resources from SSABLKQ
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: ssablkqTermCodeEff
          in: query
          required: false
          schema:
            type: string
        - name: ssablkqKeyCrn
          in: query
          required: false
          schema:
            type: string
        - name: criteria.blckCode
          in: query
          required: false
          schema:
            type: string
        - name: criteria.blckDescription
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/block-schedule-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/block-schedule-query:
    post:
      tags:
        - block-schedule-query QAPI (Query by POST)
      summary: Return resources from SSABLKQ
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/block-schedule-query-1.0.0_get_request"
            example:
              ssablkqTermCodeEff: 201510
              criteria.blckCode: B3
              ssablkqKeyCrn: 51053
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/block-schedule-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    block-schedule-query-1.0.0_get_response:
      type: object
      properties:
        blckDescription:
          title: Description
          type: string
        blckCode:
          title: Block Code
          maxLength: 30
          type: string
          description: "Lineage reference object : SSRBLCK_BLCK_CODE"
          x-lineageReferenceObject: SSRBLCK_BLCK_CODE
      x-lineageReferenceObject: ssrblck
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    block-schedule-query-1.0.0_get_request:
      type: object
      properties:
        ssablkqTermCodeEff:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : ssablkqTermCodeEff, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: ssablkqTermCodeEff
          x-lineageLookupReferenceObject: stvterm
        criteria.blckCode:
          title: Block Code
          maxLength: 30
          type: string
          description: "Lineage reference object : SSRBLCK_BLCK_CODE"
          x-lineageReferenceObject: SSRBLCK_BLCK_CODE
        ssablkqKeyCrn:
          title: CRN
          maxLength: 30
          type: number
          description: "Lineage reference object : ssablkqKeyCrn"
          x-lineageReferenceObject: ssablkqKeyCrn
        criteria.blckDescription:
          title: Description
          type: string
      x-lineageReferenceObject: SSRBLCK
    block-schedule-query-1.0.0_qapi_post:
      type: object
      properties:
        ssablkqTermCodeEff:
          type: string
        ssablkqKeyCrn:
          type: string
        criteria.blckCode:
          type: string
        criteria.blckDescription:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
