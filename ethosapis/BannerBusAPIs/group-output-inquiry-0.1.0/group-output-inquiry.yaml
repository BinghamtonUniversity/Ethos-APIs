openapi: 3.0.0
info:
  title: group-output-inquiry
  description: API for SMIGOUT administrative page
  version: 0.1.0
  x-audience: all
  x-release-status: beta
  x-source-name: SMIGOUT
  x-source-domain: Student
  x-source-title: Group Output Inquiry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/group-output-inquiry:
    get:
      tags:
        - group-output-inquiry
      summary: Return resources from SMIGOUT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: requestNo
          in: query
          required: false
          schema:
            type: string
        - name: area
          in: query
          required: false
          schema:
            type: string
        - name: group
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v0.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/group-output-inquiry-0.1.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/group-output-inquiry:
    post:
      tags:
        - group-output-inquiry QAPI (Query by POST)
      summary: Return resources from SMIGOUT
      requestBody:
        content:
          application/vnd.hedtech.integration.v0.1.0+json:
            schema:
              $ref: "#/components/schemas/group-output-inquiry-0.1.0_get_request"
            example:
              area: DETAILADLG
              id: SLSAP200
              requestNo: 20
              group: DETAILADLG
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v0.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/group-output-inquiry-0.1.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    group-output-inquiry-0.1.0_get_request:
      type: object
      properties:
        area:
          title: Area
          maxLength: 30
          type: string
          description: "Lineage reference object : area, Lookup lineage reference object :
            smbaogn,smralib,smbgogn"
          x-lineageReferenceObject: area
          x-lineageLookupReferenceObject: smbaogn,smralib,smbgogn
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id, Lookup lineage reference object :
            spriden,smbgogn"
          x-lineageReferenceObject: id
          x-lineageLookupReferenceObject: spriden,smbgogn
        requestNo:
          title: Request Number
          maxLength: 30
          type: number
          description: "Lineage reference object : requestNo, Lookup lineage reference
            object : smbpogn,smbgogn"
          x-lineageReferenceObject: requestNo
          x-lineageLookupReferenceObject: smbpogn,smbgogn
        group:
          title: Group
          maxLength: 10
          type: string
          description: "Lineage reference object : group, Lookup lineage reference object
            : smbgogn,smrglib"
          x-lineageReferenceObject: group
          x-lineageLookupReferenceObject: smbgogn,smrglib
      x-lineageReferenceObject: KEY_BLOCK
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    group-output-inquiry-0.1.0_get_response:
      required:
        - connectorInst
        - connectorINontrad
        - connectorITrad
        - connectorOverall
        - connectorTransfer
      type: object
      properties:
        actCoursesOverall:
          title: Courses Used
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_ACT_COURSES_OVERALL"
          x-lineageReferenceObject: SMBGOGN_ACT_COURSES_OVERALL
        reqCreditsITrad:
          title: Required Institutional Traditional
          maxLength: 14
          type: number
          description: "Lineage reference object : SMBGOGN_REQ_CREDITS_I_TRAD"
          x-lineageReferenceObject: SMBGOGN_REQ_CREDITS_I_TRAD
        reqCreditsOverall:
          title: Total Required
          maxLength: 14
          type: number
          description: "Lineage reference object : SMBGOGN_REQ_CREDITS_OVERALL"
          x-lineageReferenceObject: SMBGOGN_REQ_CREDITS_OVERALL
        complCredits:
          title: Compliance
          maxLength: 14
          type: number
          description: "Lineage reference object : SMBGOGN_COMPL_CREDITS"
          x-lineageReferenceObject: SMBGOGN_COMPL_CREDITS
        crseReuseInd:
          title: Course Reuse
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGOGN_CRSE_REUSE_IND"
          x-lineageReferenceObject: SMBGOGN_CRSE_REUSE_IND
        maxCreditsINontrad:
          title: Maximum Institutional Non-Traditional
          maxLength: 14
          type: number
          description: "Lineage reference object : SMBGOGN_MAX_CREDITS_I_NONTRAD"
          x-lineageReferenceObject: SMBGOGN_MAX_CREDITS_I_NONTRAD
        maxCreditsTransfer:
          title: Maximum Transfer
          maxLength: 12
          type: number
          description: "Lineage reference object : SMBGOGN_MAX_CREDITS_TRANSFER"
          x-lineageReferenceObject: SMBGOGN_MAX_CREDITS_TRANSFER
        actCoursesINontrad:
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_ACT_COURSES_I_NONTRAD"
          x-lineageReferenceObject: SMBGOGN_ACT_COURSES_I_NONTRAD
        actCreditsITrad:
          maxLength: 14
          type: number
          description: "Lineage reference object : SMBGOGN_ACT_CREDITS_I_TRAD"
          x-lineageReferenceObject: SMBGOGN_ACT_CREDITS_I_TRAD
        connectorInst:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGOGN_CONNECTOR_INST"
          x-lineageReferenceObject: SMBGOGN_CONNECTOR_INST
        attrReuseInd:
          title: Attribute Reuse
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGOGN_ATTR_REUSE_IND"
          x-lineageReferenceObject: SMBGOGN_ATTR_REUSE_IND
        connectorOverall:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGOGN_CONNECTOR_OVERALL"
          x-lineageReferenceObject: SMBGOGN_CONNECTOR_OVERALL
        activeInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGOGN_ACTIVE_IND"
          x-lineageReferenceObject: SMBGOGN_ACTIVE_IND
        connectorTransfer:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGOGN_CONNECTOR_TRANSFER"
          x-lineageReferenceObject: SMBGOGN_CONNECTOR_TRANSFER
        connectorINontrad:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGOGN_CONNECTOR_I_NONTRAD"
          x-lineageReferenceObject: SMBGOGN_CONNECTOR_I_NONTRAD
        complCourses:
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_COMPL_COURSES"
          x-lineageReferenceObject: SMBGOGN_COMPL_COURSES
        actCoursesTransfer:
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_ACT_COURSES_TRANSFER"
          x-lineageReferenceObject: SMBGOGN_ACT_COURSES_TRANSFER
        actCoursesITrad:
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_ACT_COURSES_I_TRAD"
          x-lineageReferenceObject: SMBGOGN_ACT_COURSES_I_TRAD
        actCoursesInst:
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_ACT_COURSES_INST"
          x-lineageReferenceObject: SMBGOGN_ACT_COURSES_INST
        actCreditsInst:
          title: Credits Required
          maxLength: 14
          type: number
          description: "Lineage reference object : SMBGOGN_ACT_CREDITS_INST"
          x-lineageReferenceObject: SMBGOGN_ACT_CREDITS_INST
        termCodeEff:
          title: Term Effective
          maxLength: 6
          type: string
          description: "Lineage reference object : SMBGOGN_TERM_CODE_EFF"
          x-lineageReferenceObject: SMBGOGN_TERM_CODE_EFF
        sourceText:
          title: Source
          maxLength: 8
          type: string
        maxCoursesTransfer:
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_MAX_COURSES_TRANSFER"
          x-lineageReferenceObject: SMBGOGN_MAX_COURSES_TRANSFER
        connectorITrad:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBGOGN_CONNECTOR_I_TRAD"
          x-lineageReferenceObject: SMBGOGN_CONNECTOR_I_TRAD
        yearRule:
          title: Course Year Limit
          maxLength: 2
          type: number
          description: "Lineage reference object : SMBGOGN_YEAR_RULE"
          x-lineageReferenceObject: SMBGOGN_YEAR_RULE
        actCreditsTransfer:
          maxLength: 12
          type: number
          description: "Lineage reference object : SMBGOGN_ACT_CREDITS_TRANSFER"
          x-lineageReferenceObject: SMBGOGN_ACT_CREDITS_TRANSFER
        reqCoursesOverall:
          title: Courses Required
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_REQ_COURSES_OVERALL"
          x-lineageReferenceObject: SMBGOGN_REQ_COURSES_OVERALL
        maxCoursesINontrad:
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_MAX_COURSES_I_NONTRAD"
          x-lineageReferenceObject: SMBGOGN_MAX_COURSES_I_NONTRAD
        reqCoursesITrad:
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_REQ_COURSES_I_TRAD"
          x-lineageReferenceObject: SMBGOGN_REQ_COURSES_I_TRAD
        reqCreditsInst:
          title: Required Institutional
          maxLength: 14
          type: number
          description: "Lineage reference object : SMBGOGN_REQ_CREDITS_INST"
          x-lineageReferenceObject: SMBGOGN_REQ_CREDITS_INST
        reqCoursesInst:
          maxLength: 4
          type: number
          description: "Lineage reference object : SMBGOGN_REQ_COURSES_INST"
          x-lineageReferenceObject: SMBGOGN_REQ_COURSES_INST
        actCreditsOverall:
          maxLength: 14
          type: number
          description: "Lineage reference object : SMBGOGN_ACT_CREDITS_OVERALL"
          x-lineageReferenceObject: SMBGOGN_ACT_CREDITS_OVERALL
        actCreditsINontrad:
          maxLength: 14
          type: number
          description: "Lineage reference object : SMBGOGN_ACT_CREDITS_I_NONTRAD"
          x-lineageReferenceObject: SMBGOGN_ACT_CREDITS_I_NONTRAD
        grdeCodeMin:
          title: Minimum Course Grade
          maxLength: 6
          type: string
          description: "Lineage reference object : SMBGOGN_GRDE_CODE_MIN"
          x-lineageReferenceObject: SMBGOGN_GRDE_CODE_MIN
      x-lineageReferenceObject: smbgogn
    group-output-inquiry-0.1.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        requestNo:
          type: string
        area:
          type: string
        group:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
