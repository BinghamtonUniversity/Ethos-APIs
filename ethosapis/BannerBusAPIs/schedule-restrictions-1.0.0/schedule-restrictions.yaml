    schedule-restrictions-1.0.0_get_response:
      type: object
      properties:
        scrrcmp:
          type: array
          items:
            required:
              - campCode
            type: object
            properties:
              campusDescription:
                title: Description
                type: string
              campCode:
                title: Campus
                maxLength: 30
                type: string
                description: "Lineage reference object : SCRRCMP_CAMP_CODE, Lookup lineage
                  reference object : stvcamp"
                x-lineageReferenceObject: SCRRCMP_CAMP_CODE
                x-lineageLookupReferenceObject: stvcamp
            x-lineageReferenceObject: scrrcmp
        scrrtrm:
          type: array
