            schema:
              $ref: "#/components/schemas/schedule-restrictions-1.0.0_post_request"
            example:
              scacrseCrseNumb: 1
              scacrseSubjCode: 4
              rtrmCode: 10
              scacrseTermCodeEff: 200005
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
