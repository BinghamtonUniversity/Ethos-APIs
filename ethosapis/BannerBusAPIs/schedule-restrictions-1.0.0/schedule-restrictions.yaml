          description: "Lineage reference object : SCRRTRM_RTRM_CODE, Lookup lineage
            reference object : stvrtrm"
          x-lineageReferenceObject: SCRRTRM_RTRM_CODE
          x-lineageLookupReferenceObject: stvrtrm
        scacrseSubjCode:
          title: Subject
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseSubjCode, Lookup lineage
            reference object : stvsubj"
          x-lineageReferenceObject: scacrseSubjCode
          x-lineageLookupReferenceObject: stvsubj
        scrrtrmTermInd:
          title: Include/Exclude (I/E)
          maxLength: 1
          type: string
          description: "Lineage reference object : scrrtrmTermInd"
          x-lineageReferenceObject: scrrtrmTermInd
        rtrmCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : SCRRTRM_RTRM_CODE, Lookup lineage
