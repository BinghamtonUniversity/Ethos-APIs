            reference object : stvterm,scbcrky,scbcrky"
          x-lineageReferenceObject: scacrseTermCodeEff
          x-lineageLookupReferenceObject: stvterm,scbcrky,scbcrky
      x-lineageReferenceObject: SCRRTRM
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    schedule-restrictions-1.0.0_post_request:
      required:
