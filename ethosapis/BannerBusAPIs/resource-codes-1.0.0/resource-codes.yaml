openapi: 3.0.0
info:
  title: resource-codes
  description: API for RTVARSC administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: RTVARSC
  x-source-domain: Financial Aid
  x-source-title: Resource Code Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/resource-codes:
    get:
      tags:
        - resource-codes
      summary: Return resources from RTVARSC
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVARSC_ACTIVITY_DATE
        - name: arscDesc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVARSC_ARSC_DESC
        - name: athleticsInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVARSC_ATHLETICS_IND
        - name: code
          in: query
          description: Resource Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVARSC_CODE
        - name: infoAccessInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVARSC_INFO_ACCESS_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/resource-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/resource-codes:
    post:
      tags:
        - resource-codes QAPI (Query by POST)
      summary: Return resources from RTVARSC
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/resource-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/resource-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    resource-codes-1.0.0_qapi_post:
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : RTVARSC_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: RTVARSC_ACTIVITY_DATE
        arscDesc:
          title: Description
          maxLength: 50
          type: string
          description: "Lineage reference object : RTVARSC_ARSC_DESC"
          x-lineageReferenceObject: RTVARSC_ARSC_DESC
        athleticsInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVARSC_ATHLETICS_IND"
          x-lineageReferenceObject: RTVARSC_ATHLETICS_IND
        code:
          title: Resource Code
          maxLength: 6
          type: string
          description: "Lineage reference object : RTVARSC_CODE"
          x-lineageReferenceObject: RTVARSC_CODE
        infoAccessInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVARSC_INFO_ACCESS_IND"
          x-lineageReferenceObject: RTVARSC_INFO_ACCESS_IND
    resource-codes-1.0.0_get_request:
      required:
        - arscDesc
        - code
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : RTVARSC_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: RTVARSC_ACTIVITY_DATE
        code:
          title: Resource Code
          maxLength: 6
          type: string
          description: "Lineage reference object : RTVARSC_CODE"
          x-lineageReferenceObject: RTVARSC_CODE
        infoAccessInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVARSC_INFO_ACCESS_IND"
          x-lineageReferenceObject: RTVARSC_INFO_ACCESS_IND
        athleticsInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVARSC_ATHLETICS_IND"
          x-lineageReferenceObject: RTVARSC_ATHLETICS_IND
        arscDesc:
          title: Description
          maxLength: 50
          type: string
          description: "Lineage reference object : RTVARSC_ARSC_DESC"
          x-lineageReferenceObject: RTVARSC_ARSC_DESC
      x-lineageReferenceObject: RTVARSC
    resource-codes-1.0.0_get_response:
      required:
        - arscDesc
        - code
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : RTVARSC_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: RTVARSC_ACTIVITY_DATE
        code:
          title: Resource Code
          maxLength: 6
          type: string
          description: "Lineage reference object : RTVARSC_CODE"
          x-lineageReferenceObject: RTVARSC_CODE
        infoAccessInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVARSC_INFO_ACCESS_IND"
          x-lineageReferenceObject: RTVARSC_INFO_ACCESS_IND
        athleticsInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVARSC_ATHLETICS_IND"
          x-lineageReferenceObject: RTVARSC_ATHLETICS_IND
        arscDesc:
          title: Description
          maxLength: 50
          type: string
          description: "Lineage reference object : RTVARSC_ARSC_DESC"
          x-lineageReferenceObject: RTVARSC_ARSC_DESC
      x-lineageReferenceObject: rtvarsc
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
