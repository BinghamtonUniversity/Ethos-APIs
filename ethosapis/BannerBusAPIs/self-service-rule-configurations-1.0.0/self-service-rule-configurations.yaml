  description: API for GUACONF administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: GUACONF
  x-source-domain: Foundation
  x-source-title: Banner Applications Configurations
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/self-service-rule-configurations:
    get:
      tags:
        - self-service-rule-configurations
      summary: Return resources from GUACONF
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblockProcessCode
          in: query
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TWTVROLE_CODE
        - name: timeOut
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TWTVROLE_TIME_OUT
        - name: activityDate
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TWTVROLE_ACTIVITY_DATE
        - name: userId
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: TWTVROLE_USER_ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/self-service-rule-configurations-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - self-service-rule-configurations
      summary: Updates an existing resource in GUACONF
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/self-service-rule-configurations-1.0.0_put_request"
            example:
              javaClasspath: TEST
              loginAttempts: 5
              startPageDesc: Main Menu
              dtdType: HTML PUBLIC
              cgibinDirAdm: o
              dateInputFmt: MM/DD/YYYY
              language: en
              pinExpDays: 365
              dtdUrl: http://www.w3.org/TR/html4/loose.dtd
              keyblockProcessCode: GLOBAL
              timeFmt: HH:MI am
              timeOut: 480
              httpRedirectInd: N
              dispUsageInd: Y
              startPageMenuInd: Y
              cacheInd: Y
              cgibinDir: /gvudb
              dateFmt: MM/DD/YYYY
              dispAdminDescInd: Y
              dtdFpi: -//W3C//DTD HTML 4.01 Transitional//EN
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/self-service-rule-configurations-1.0.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
