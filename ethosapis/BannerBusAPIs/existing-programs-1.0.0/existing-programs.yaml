openapi: 3.0.0
info:
  title: existing-programs
  description: API for SMIPROG administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SMIPROG
  x-source-domain: Student
  x-source-title: Existing Program Inquiry
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/existing-programs:
    get:
      tags:
        - existing-programs
      summary: Return resources from SMIPROG
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: description
          in: query
          description: Description
          required: false
          schema:
            type: string
        - name: levelCode
          in: query
          description: Course Level
          required: false
          schema:
            type: string
        - name: levelCodeStudent
          in: query
          description: Student Level
          required: false
          schema:
            type: string
        - name: activeInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMBPGEN_ACTIVE_IND
        - name: program
          in: query
          description: Program
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMBPGEN_PROGRAM
        - name: termCodeEff
          in: query
          description: Effective Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SMBPGEN_TERM_CODE_EFF
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/existing-programs-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/existing-programs:
    post:
      tags:
        - existing-programs QAPI (Query by POST)
      summary: Return resources from SMIPROG
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/existing-programs-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/existing-programs-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    existing-programs-1.0.0_get_request:
      type: object
      properties:
        levelCode:
          title: Course Level
          maxLength: 2
          type: string
        termCodeEff:
          title: Effective Term
          maxLength: 6
          type: string
          description: "Lineage reference object : SMBPGEN_TERM_CODE_EFF"
          x-lineageReferenceObject: SMBPGEN_TERM_CODE_EFF
        activeInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBPGEN_ACTIVE_IND"
          x-lineageReferenceObject: SMBPGEN_ACTIVE_IND
        description:
          title: Description
          maxLength: 30
          type: string
        program:
          title: Program
          maxLength: 12
          type: string
          description: "Lineage reference object : SMBPGEN_PROGRAM"
          x-lineageReferenceObject: SMBPGEN_PROGRAM
        levelCodeStudent:
          title: Student Level
          maxLength: 2
          type: string
      x-lineageReferenceObject: SMBPGEN
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    existing-programs-1.0.0_get_response:
      type: object
      properties:
        levelCode:
          title: Course Level
          maxLength: 2
          type: string
        termCodeEff:
          title: Effective Term
          maxLength: 6
          type: string
          description: "Lineage reference object : SMBPGEN_TERM_CODE_EFF"
          x-lineageReferenceObject: SMBPGEN_TERM_CODE_EFF
        activeInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBPGEN_ACTIVE_IND"
          x-lineageReferenceObject: SMBPGEN_ACTIVE_IND
        description:
          title: Description
          maxLength: 30
          type: string
        program:
          title: Program
          maxLength: 12
          type: string
          description: "Lineage reference object : SMBPGEN_PROGRAM"
          x-lineageReferenceObject: SMBPGEN_PROGRAM
        levelCodeStudent:
          title: Student Level
          maxLength: 2
          type: string
      x-lineageReferenceObject: smbpgen
    existing-programs-1.0.0_qapi_post:
      type: object
      properties:
        description:
          title: Description
          maxLength: 30
          type: string
        levelCode:
          title: Course Level
          maxLength: 2
          type: string
        levelCodeStudent:
          title: Student Level
          maxLength: 2
          type: string
        activeInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SMBPGEN_ACTIVE_IND"
          x-lineageReferenceObject: SMBPGEN_ACTIVE_IND
        program:
          title: Program
          maxLength: 12
          type: string
          description: "Lineage reference object : SMBPGEN_PROGRAM"
          x-lineageReferenceObject: SMBPGEN_PROGRAM
        termCodeEff:
          title: Effective Term
          maxLength: 6
          type: string
          description: "Lineage reference object : SMBPGEN_TERM_CODE_EFF"
          x-lineageReferenceObject: SMBPGEN_TERM_CODE_EFF
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
