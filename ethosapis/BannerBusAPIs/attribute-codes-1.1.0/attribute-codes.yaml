paths:
  /api/attribute-codes:
    put:
      tags:
      - attribute-codes
      summary: Updates an existing resource in STVATTR
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.1.0+json:
            schema:
              $ref: "#/components/schemas/attribute-codes-1.1.0_put_request"
            example:
              criteria:
                activityDate: 2025-09-16
                code: TEST
                desc: Test Attribute
              desc: Test Attribute Description
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/attribute-codes-1.1.0_put_response"
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
