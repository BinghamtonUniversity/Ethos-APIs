          description: "Lineage reference object : RRRGREQ_TREQ_CODE"
          x-lineageReferenceObject: RRRGREQ_TREQ_CODE
        displayTreqDesc:
          title: Code Description
          type: string
        pckgInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RRRGREQ_PCKG_IND"
          x-lineageReferenceObject: RRRGREQ_PCKG_IND
      x-lineageReferenceObject: rrrgreq
    requirements-tracking-group-requirements-rules-1.0.0_qapi_post:
      type: object
      properties:
        keyblckAidyCode:
          type: string
        keyblckTgrpCode:
          type: string
        treqCode:
          title: Requirement Code
          maxLength: 30
          type: string
          description: "Lineage reference object : RRRGREQ_TREQ_CODE"
          x-lineageReferenceObject: RRRGREQ_TREQ_CODE
        pckgInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RRRGREQ_PCKG_IND"
          x-lineageReferenceObject: RRRGREQ_PCKG_IND
        memoInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RRRGREQ_MEMO_IND"
          x-lineageReferenceObject: RRRGREQ_MEMO_IND
        disbInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RRRGREQ_DISB_IND"
          x-lineageReferenceObject: RRRGREQ_DISB_IND
