          description: "Lineage reference object : RRRGREQ_DISB_IND"
          x-lineageReferenceObject: RRRGREQ_DISB_IND
        keyblckTgrpCode:
          title: Tracking Group
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckTgrpCode, Lookup lineage
            reference object : rtvtgrp"
          x-lineageReferenceObject: keyblckTgrpCode
          x-lineageLookupReferenceObject: rtvtgrp
        treqCode:
          title: Requirement Code
          maxLength: 30
          type: string
          description: "Lineage reference object : RRRGREQ_TREQ_CODE"
          x-lineageReferenceObject: RRRGREQ_TREQ_CODE
        pckgInd:
