          x-lineageReferenceObject: SGRDISA_SPSR_CODE
          x-lineageLookupReferenceObject: stvspsr
        disaDescription:
          title: Description
          type: string
        disaEffToDate:
          title: Effective To Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SGRDISA_DISA_EFF_TO_DATE"
          format: date-time
          x-lineageReferenceObject: SGRDISA_DISA_EFF_TO_DATE
        primaryInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SGRDISA_PRIMARY_IND"
          x-lineageReferenceObject: SGRDISA_PRIMARY_IND
        termCode:
          maxLength: 6
