openapi: 3.0.0
info:
  title: ca-student-disabilities
  description: API for SGADISA administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SGADISA
  x-source-domain: Student
  x-source-title: Student Disability Services (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-student-disabilities:
    get:
      tags:
        - ca-student-disabilities
      summary: Return resources from SGADISA
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: sgastdnId
          in: query
          required: true
          schema:
            type: string
        - name: sgastdnTermCodeEff
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-student-disabilities-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-student-disabilities:
    post:
      tags:
        - ca-student-disabilities QAPI (Query by POST)
      summary: Return resources from SGADISA
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-student-disabilities-1.0.0_qapi_post_request"
            example:
              sgastdnId: GENSTU001
              sgastdnTermCodeEff: "201010"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-student-disabilities-1.0.0_qapi_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: "The detailed actionable error message. "
    ca-student-disabilities-1.0.0_get_response:
      type: object
      properties:
        dummy:
          maxLength: 1
          type: string
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SGRDISA_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SGRDISA_ACTIVITY_DATE
        disaCode:
          title: Disability Code
          maxLength: 30
          type: string
          description: "Lineage reference object : SGRDISA_DISA_CODE, Lookup lineage
            reference object : stvdisa"
          x-lineageReferenceObject: SGRDISA_DISA_CODE
          x-lineageLookupReferenceObject: stvdisa
        mediCode:
          title: Medical Code
          maxLength: 10
          type: string
          description: "Lineage reference object : SGRDISA_MEDI_CODE, Lookup lineage
            reference object : stvmedi"
          x-lineageReferenceObject: SGRDISA_MEDI_CODE
          x-lineageLookupReferenceObject: stvmedi
        disaEffFromDate:
          title: Effective From Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SGRDISA_DISA_EFF_FROM_DATE"
          format: date-time
          x-lineageReferenceObject: SGRDISA_DISA_EFF_FROM_DATE
        spsrCode:
          title: Service Code
          maxLength: 30
          type: string
          description: "Lineage reference object : SGRDISA_SPSR_CODE, Lookup lineage
            reference object : stvspsr"
          x-lineageReferenceObject: SGRDISA_SPSR_CODE
          x-lineageLookupReferenceObject: stvspsr
        disaDescription:
          title: Description
          type: string
        disaEffToDate:
          title: Effective To Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SGRDISA_DISA_EFF_TO_DATE"
          format: date-time
          x-lineageReferenceObject: SGRDISA_DISA_EFF_TO_DATE
        primaryInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : SGRDISA_PRIMARY_IND"
          x-lineageReferenceObject: SGRDISA_PRIMARY_IND
        termCode:
          maxLength: 6
          type: string
          description: "Lineage reference object : SGRDISA_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: SGRDISA_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: sgrdisa
    ca-student-disabilities-1.0.0_qapi_post_request:
      type: object
      properties:
        sgastdnId:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : sgastdnId"
          x-lineageReferenceObject: sgastdnId
        sgastdnTermCodeEff:
