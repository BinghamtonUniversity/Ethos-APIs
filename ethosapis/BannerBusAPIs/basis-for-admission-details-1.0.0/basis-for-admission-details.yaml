          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACBA_SEQ_NO
        - name: basisForAdmCde
          in: query
          description: Admission Basis Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SORACBA_BASIS_FOR_ADM_CDE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/basis-for-admission-details-1.0.0_get_response"
