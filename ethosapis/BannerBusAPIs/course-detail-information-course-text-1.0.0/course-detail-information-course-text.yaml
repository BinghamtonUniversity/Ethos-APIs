openapi: 3.0.0
info:
  title: course-detail-information-course-text
  description: API for SCADETL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SCADETL
  x-source-domain: Student
  x-source-title: Course Detail Information
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/course-detail-information-course-text:
    get:
      tags:
        - course-detail-information-course-text
      summary: Return resources from SCADETL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: scacrseSubjCode
          in: query
          required: false
          schema:
            type: string
        - name: scacrseCrseNumb
          in: query
          required: false
          schema:
            type: string
        - name: scacrseTermCodeEff
          in: query
          required: false
          schema:
            type: string
        - name: text
          in: query
          description: Course Text
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SCRTEXT_TEXT
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/course-detail-information-course-text-1.0.0_get_res\
                    ponse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/course-detail-information-course-text:
    post:
      tags:
        - course-detail-information-course-text QAPI (Query by POST)
      summary: Return resources from SCADETL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/course-detail-information-course-text-1.0.0_get_req\
                uest"
            example:
              scacrseCrseNumb: 106
              scacrseSubjCode: AC
              scacrseTermCodeEff: 201009
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/course-detail-information-course-text-1.0.0_get_res\
                    ponse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    course-detail-information-course-text-1.0.0_get_response:
      type: object
      properties:
        scacrse_key_block:
          type: array
          items:
            type: object
            properties:
              crseTitle:
                title: Course Title
                type: string
                description: "Lineage reference object : crseTitle"
                x-lineageReferenceObject: crseTitle
              scacrseCrseNumb:
                title: Course
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseCrseNumb, Lookup lineage
                  reference object : scbcrse,scbcrky"
                x-lineageReferenceObject: scacrseCrseNumb
                x-lineageLookupReferenceObject: scbcrse,scbcrky
              subjDescription:
                type: string
                description: "Lineage reference object : subjDescription"
                x-lineageReferenceObject: subjDescription
              scacrseSubjCode:
                title: Subject
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseSubjCode, Lookup lineage
                  reference object : stvsubj"
                x-lineageReferenceObject: scacrseSubjCode
                x-lineageLookupReferenceObject: stvsubj
              scacrseTermCodeEff:
                title: Term
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseTermCodeEff, Lookup lineage
                  reference object : stvterm,scbcrky,scbcrky"
                x-lineageReferenceObject: scacrseTermCodeEff
                x-lineageLookupReferenceObject: stvterm,scbcrky,scbcrky
            x-lineageReferenceObject: scacrse_key_block
        text_ctrl_block:
          type: array
          items:
            type: object
            properties:
              scrtextTermCodeTo:
                title: To Term
                maxLength: 6
                type: string
                description: "Lineage reference object : scrtextTermCodeTo"
                x-lineageReferenceObject: scrtextTermCodeTo
              scrtextTermCodeFrom:
                title: From Term
                maxLength: 6
                type: string
                description: "Lineage reference object : scrtextTermCodeFrom"
                x-lineageReferenceObject: scrtextTermCodeFrom
            x-lineageReferenceObject: text_ctrl_block
        scrtext:
          type: array
          items:
            required:
              - text
            type: object
            properties:
              text:
                title: Course Text
                maxLength: 60
                type: string
                description: "Lineage reference object : SCRTEXT_TEXT"
                x-lineageReferenceObject: SCRTEXT_TEXT
            x-lineageReferenceObject: scrtext
    course-detail-information-course-text-1.0.0_qapi_post:
      type: object
      properties:
        scacrseSubjCode:
          type: string
        scacrseCrseNumb:
          type: string
        scacrseTermCodeEff:
          type: string
        text:
          title: Course Text
          maxLength: 60
          type: string
          description: "Lineage reference object : SCRTEXT_TEXT"
          x-lineageReferenceObject: SCRTEXT_TEXT
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    course-detail-information-course-text-1.0.0_get_request:
      required:
        - text
      type: object
      properties:
        scacrseCrseNumb:
          title: Course
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseCrseNumb, Lookup lineage
            reference object : scbcrse,scbcrky"
          x-lineageReferenceObject: scacrseCrseNumb
          x-lineageLookupReferenceObject: scbcrse,scbcrky
        scacrseSubjCode:
          title: Subject
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseSubjCode, Lookup lineage
            reference object : stvsubj"
          x-lineageReferenceObject: scacrseSubjCode
          x-lineageLookupReferenceObject: stvsubj
        text:
          title: Course Text
          maxLength: 60
          type: string
          description: "Lineage reference object : SCRTEXT_TEXT"
          x-lineageReferenceObject: SCRTEXT_TEXT
        scacrseTermCodeEff:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseTermCodeEff, Lookup lineage
            reference object : stvterm,scbcrky,scbcrky"
          x-lineageReferenceObject: scacrseTermCodeEff
          x-lineageLookupReferenceObject: stvterm,scbcrky,scbcrky
      x-lineageReferenceObject: SCRTEXT
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
