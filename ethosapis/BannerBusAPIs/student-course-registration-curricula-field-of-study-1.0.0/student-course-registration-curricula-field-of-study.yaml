info:
  title: student-course-registration-curricula-field-of-study
  description: >
    API for SFAREGS administrative page


    Use the student-course-registration-curricula API to fetch the applicable
    program curriculum records and then use this API to retrieve the associated
    fields of study for a specific program record.
