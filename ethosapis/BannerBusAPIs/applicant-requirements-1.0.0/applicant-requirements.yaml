paths:
  /api/applicant-requirements:
    get:
      tags:
        - applicant-requirements
      summary: Return resources from RRAAREQ
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckAidyCode
          in: query
          required: false
          schema:
            type: string
        - name: keyblckId
          in: query
          required: false
          schema:
            type: string
        - name: treqCode
          in: query
          required: false
          schema:
            type: string
        - name: displayTreqDesc
          in: query
          required: false
          schema:
            type: string
        - name: trstCode
          in: query
          required: false
          schema:
            type: string
        - name: statDate
          in: query
          required: false
          schema:
            type: string
        - name: estDate
          in: query
          required: false
          schema:
            type: string
        - name: satInd
          in: query
          required: false
          schema:
            type: string
        - name: fundCode
          in: query
          required: false
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
        - name: displayPckgInd1
          in: query
          required: false
          schema:
            type: string
        - name: displayMemoInd1
          in: query
          required: false
          schema:
            type: string
        - name: displayDisbInd1
          in: query
          required: false
          schema:
            type: string
        - name: displayTrkLtrInd1
          in: query
          required: false
          schema:
            type: string
        - name: infoAccessInd
          in: query
          required: false
