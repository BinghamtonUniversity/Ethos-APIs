      tags:
        - academic-non-course
      summary: Return resources from SHANCRS
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: qpnmSeqNo
          in: query
          description: Paper
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRNCRS_QPNM_SEQ_NO
        - name: comtCode
          in: query
          description: Committee
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRNCRS_COMT_CODE
        - name: evenCode
          in: query
          description: Event
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRNCRS_EVEN_CODE
        - name: levlCode
          in: query
          description: Level
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRNCRS_LEVL_CODE
        - name: completeDate
          in: query
          description: Complete By
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRNCRS_COMPLETE_DATE
        - name: ncrqCode
          in: query
          description: CAPP Non-Course Requirement
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRNCRS_NCRQ_CODE
        - name: ncstCode
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRNCRS_NCST_CODE
        - name: ncstDate
          in: query
          description: Status Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SHRNCRS_NCST_DATE
        - name: dgmrSeqNo
