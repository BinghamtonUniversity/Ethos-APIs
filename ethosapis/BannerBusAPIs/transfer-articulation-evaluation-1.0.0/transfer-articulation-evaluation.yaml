        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
      - name: id
        in: query
        required: false
        schema:
          type: string
      - name: keyblocSbgiCode
        in: query
        required: false
        schema:
          type: string
      - name: keyblocProgram
        in: query
        required: false
        schema:
          type: string
      - name: tramSeq
        in: query
        description: Attendance Period
        required: false
        schema:
          type: string
      - name: termCode
        in: query
        description: Term
        required: false
        schema:
          type: string
      - name: levlCode
        in: query
        description: Level
        required: false
        schema:
          type: string
      - name: jgroup
        in: query
        description: Transfer Group
        required: false
        schema:
          type: string
      - name: tsubjCode
        in: query
        description: Transfer Subject
        required: false
        schema:
          type: string
      - name: tcrseNumb
        in: query
        description: Transfer Course
        required: false
        schema:
          type: string
      - name: credHours
        in: query
        description: Transfer Credit Hours
        required: false
        schema:
          type: string
      - name: tgrdCode
        in: query
        description: Transfer Grade
        required: false
        schema:
          type: string
      - name: duplicate
        in: query
        description: Transfer Duplicate
        required: false
        schema:
          type: string
        x-lineageReferenceObject: SHRTRTK_DUPLICATE
      - name: tcrseTitle
        in: query
        description: Transfer Title
        required: false
