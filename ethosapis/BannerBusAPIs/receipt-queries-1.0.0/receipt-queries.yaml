          maxLength: 38
          type: number
          description: "Lineage reference object : TBVRCP1_SESSION_NUMBER"
          x-lineageReferenceObject: TBVRCP1_SESSION_NUMBER
        feedDocCode:
          title: Feed Document
          maxLength: 8
          type: string
          description: "Lineage reference object : TBVRCP1_FEED_DOC_CODE"
          x-lineageReferenceObject: TBVRCP1_FEED_DOC_CODE
        acctFeedInd:
          title: Tbvrcp2 Type
          maxLength: 1
          type: string
          description: "Lineage reference object : TBVRCP1_ACCT_FEED_IND"
          x-lineageReferenceObject: TBVRCP1_ACCT_FEED_IND
        name:
          title: Name
          maxLength: 230
          type: string
        id:
          title: ID
          maxLength: 9
          type: string
        user:
          title: User
          maxLength: 49
          type: string
          description: "Lineage reference object : TBVRCP1_USER"
          x-lineageReferenceObject: TBVRCP1_USER
        receiptNumber:
          title: Receipt Number
          maxLength: 8
          type: number
          description: "Lineage reference object : TBVRCP1_RECEIPT_NUMBER"
          x-lineageReferenceObject: TBVRCP1_RECEIPT_NUMBER
        termCode:
          title: Tbvrcp2 Term Code
          maxLength: 6
          type: string
          description: "Lineage reference object : TBVRCP2_TERM_CODE"
          x-lineageReferenceObject: TBVRCP2_TERM_CODE
        desc:
          title: Tbvrcp2 Desc
          maxLength: 30
          type: string
          description: "Lineage reference object : TBVRCP2_DESC"
          x-lineageReferenceObject: TBVRCP2_DESC
      x-lineageReferenceObject: TBVRCP2
    receipt-queries-1.0.0_qapi_post:
      type: object
      properties:
        tagOption:
          type: string
        receiptNumber:
          type: string
        id:
          type: string
        name:
          type: string
