        sessionNumber:
          type: string
        feedDocCode:
          type: string
        acctFeedInd:
          type: string
        feedDate:
          type: string
        tranNumber:
          title: Tbvrcp2 Tran Number
          maxLength: 42
          type: number
          description: "Lineage reference object : TBVRCP2_TRAN_NUMBER"
          x-lineageReferenceObject: TBVRCP2_TRAN_NUMBER
        termCode:
          title: Tbvrcp2 Term Code
          maxLength: 6
          type: string
          description: "Lineage reference object : TBVRCP2_TERM_CODE"
          x-lineageReferenceObject: TBVRCP2_TERM_CODE
        detailCode:
          title: Tbvrcp2 Detail Code
          maxLength: 4
          type: string
          description: "Lineage reference object : TBVRCP2_DETAIL_CODE"
          x-lineageReferenceObject: TBVRCP2_DETAIL_CODE
        desc:
          title: Tbvrcp2 Desc
          maxLength: 30
          type: string
          description: "Lineage reference object : TBVRCP2_DESC"
          x-lineageReferenceObject: TBVRCP2_DESC
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
