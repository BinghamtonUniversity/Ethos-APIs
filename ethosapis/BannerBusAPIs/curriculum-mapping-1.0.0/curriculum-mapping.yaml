      summary: Creates a new resource in SOACMAP
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/curriculum-mapping-1.0.0_post_request"
            example:
              academicYear: 2096
              admitCourseCode: 1
              admitCategoryCode: CCC
              program: 1-11A2SDL
              majrCode: ANTH
              termCode: CASE1
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
