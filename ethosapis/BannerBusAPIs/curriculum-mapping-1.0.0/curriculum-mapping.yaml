openapi: 3.0.0
info:
  title: curriculum-mapping
  description: API for SOACMAP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SOACMAP
  x-source-domain: Student
  x-source-title: Curriculum Mapping
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/curriculum-mapping:
    get:
      tags:
        - curriculum-mapping
      summary: Return resources from SOACMAP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: academicYear
          in: query
          required: false
          schema:
            type: string
        - name: termCode
          in: query
          description: Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_TERM_CODE
        - name: program
          in: query
          description: Program
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_PROGRAM
        - name: campCode
          in: query
          description: Campus
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_CAMP_CODE
        - name: majrCode
          in: query
          description: Major
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_MAJR_CODE
        - name: admitCategoryCode
          in: query
          description: Admit Category
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_ADMIT_CATEGORY_CODE
        - name: admitCourseCode
          in: query
          description: Admit Curriculum
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_ADMIT_COURSE_CODE
        - name: ptrmCode
          in: query
          description: Part of Term
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_PTRM_CODE
        - name: expiryDate
          in: query
          description: Expiry Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_EXPIRY_DATE
        - name: chrtCode
          in: query
          description: Cohort
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_CHRT_CODE
        - name: sbgiCode
          in: query
          description: Source/Background Institution
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_SBGI_CODE
        - name: activeInd
          in: query
          description: Active
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_ACTIVE_IND
        - name: fullPartInd
          in: query
          description: Full or Part Time
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_FULL_PART_IND
        - name: sessCode
          in: query
          description: Session
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_SESS_CODE
        - name: resdCode
          in: query
