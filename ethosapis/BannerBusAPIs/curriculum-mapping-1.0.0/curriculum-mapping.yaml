        - name: enrolled
          in: query
          description: Enrolled
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_ENROLLED
        - name: expAcceptPercentage
          in: query
          description: Expected Acceptance Percentage
          required: false
          schema:
            type: string
