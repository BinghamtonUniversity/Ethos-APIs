        - name: crsCode
          in: query
          description: TCSI Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_CRS_CODE
        - name: nationalId
          in: query
          description: National ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_NATIONAL_ID
        - name: quotaCount
          in: query
          description: Quota Count
          required: false
