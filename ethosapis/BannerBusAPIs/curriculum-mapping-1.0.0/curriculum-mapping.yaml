          in: query
          description: Enforce Lapse Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SKRPOFR_ENFORCE_LAPSE_DATE_IND
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
