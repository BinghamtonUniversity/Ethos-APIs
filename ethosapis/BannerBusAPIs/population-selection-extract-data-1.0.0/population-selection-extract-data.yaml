paths:
  /api/population-selection-extract-data:
    get:
      tags:
        - population-selection-extract-data
      summary: Return resources from GLAEXTR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckApplication
          in: query
          required: false
          schema:
            type: string
        - name: keyblckSelection
          in: query
          required: false
          schema:
            type: string
        - name: keyblckCreatorId
          in: query
          required: false
          schema:
            type: string
        - name: deleteInd
          in: query
          required: false
          schema:
            type: string
        - name: sortByInd
          in: query
          required: false
          schema:
            type: string
        - name: sortManualFirst
          in: query
          required: false
          schema:
            type: string
        - name: id
          in: query
          description: ID
          required: false
          schema:
            type: string
        - name: lastName
          in: query
          required: false
          schema:
            type: string
        - name: deadInd
          in: query
          required: false
          schema:
            type: string
        - name: confInd
          in: query
          required: false
          schema:
            type: string
        - name: sysInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GLBEXTR_SYS_IND
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GLBEXTR_ACTIVITY_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/population-selection-extract-data-1.0.0_get_respons\
                    e"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
