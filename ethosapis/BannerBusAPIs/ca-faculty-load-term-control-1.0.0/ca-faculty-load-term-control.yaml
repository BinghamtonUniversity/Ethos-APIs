openapi: 3.0.0
info:
  title: ca-faculty-load-term-control
  description: API for SIATERM administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SIATERM
  x-source-domain: Student
  x-source-title: Faculty Load Term Control (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-faculty-load-term-control:
    get:
      tags:
        - ca-faculty-load-term-control
      summary: Return resources from SIATERM
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: keyblckTermCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-faculty-load-term-control-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - ca-faculty-load-term-control
      summary: Updates an existing resource in SIATERM
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-faculty-load-term-control-1.0.0_put_request"
            example:
              calcDevFactor: 2
              keyblckTermCode: 201010
              fteFactor: 2
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-faculty-load-term-control-1.0.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-faculty-load-term-control:
    post:
      tags:
        - ca-faculty-load-term-control QAPI (Query by POST)
      summary: Return resources from SIATERM
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-faculty-load-term-control-1.0.0_get_request"
            example:
              keyblckTermCode: 201010
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-faculty-load-term-control-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    ca-faculty-load-term-control-1.0.0_put_request:
      required:
        - criteria.fteFactor
        - criteria.calcDevFactor
        - calcDevFactor
        - fteFactor
      type: object
      properties:
        criteria.activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SIBTERM_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SIBTERM_ACTIVITY_DATE
        calcDevFactor:
          title: Duration Factor
          maxLength: 2
          type: number
          description: "Lineage reference object : SIBTERM_CALC_DEV_FACTOR"
          x-lineageReferenceObject: SIBTERM_CALC_DEV_FACTOR
        keyblckTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckTermCode, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: keyblckTermCode
          x-lineageLookupReferenceObject: stvterm
        criteria.calcDevFactor:
          title: Duration Factor
          maxLength: 2
          type: number
          description: "Lineage reference object : SIBTERM_CALC_DEV_FACTOR"
          x-lineageReferenceObject: SIBTERM_CALC_DEV_FACTOR
        fteFactor:
          title: FTE Factor
          maxLength: 3
          type: number
          description: "Lineage reference object : SIBTERM_FTE_FACTOR"
          x-lineageReferenceObject: SIBTERM_FTE_FACTOR
        criteria.fteFactor:
          title: FTE Factor
          maxLength: 3
          type: number
          description: "Lineage reference object : SIBTERM_FTE_FACTOR"
          x-lineageReferenceObject: SIBTERM_FTE_FACTOR
      x-lineageReferenceObject: SIBTERM
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-faculty-load-term-control-1.0.0_put_response:
      required:
        - calcDevFactor
        - fteFactor
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SIBTERM_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SIBTERM_ACTIVITY_DATE
        calcDevFactor:
          title: Duration Factor
          maxLength: 2
          type: number
          description: "Lineage reference object : SIBTERM_CALC_DEV_FACTOR"
          x-lineageReferenceObject: SIBTERM_CALC_DEV_FACTOR
        fteFactor:
          title: FTE Factor
          maxLength: 3
          type: number
          description: "Lineage reference object : SIBTERM_FTE_FACTOR"
          x-lineageReferenceObject: SIBTERM_FTE_FACTOR
      x-lineageReferenceObject: sibterm
    ca-faculty-load-term-control-1.0.0_get_response:
      required:
        - calcDevFactor
        - fteFactor
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SIBTERM_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SIBTERM_ACTIVITY_DATE
        calcDevFactor:
          title: Duration Factor
          maxLength: 2
          type: number
          description: "Lineage reference object : SIBTERM_CALC_DEV_FACTOR"
          x-lineageReferenceObject: SIBTERM_CALC_DEV_FACTOR
        fteFactor:
          title: FTE Factor
          maxLength: 3
          type: number
          description: "Lineage reference object : SIBTERM_FTE_FACTOR"
          x-lineageReferenceObject: SIBTERM_FTE_FACTOR
      x-lineageReferenceObject: sibterm
    ca-faculty-load-term-control-1.0.0_qapi_post:
      type: object
      properties:
        keyblckTermCode:
          type: string
    ca-faculty-load-term-control-1.0.0_get_request:
      type: object
      properties:
        keyblckTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : keyblckTermCode, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: keyblckTermCode
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
