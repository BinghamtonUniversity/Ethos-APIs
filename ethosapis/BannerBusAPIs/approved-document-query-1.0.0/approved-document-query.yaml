openapi: 3.0.0
info:
  title: approved-document-query
  description: API for FOIAPPD administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: FOIAPPD
  x-source-domain: Finance
  x-source-title: Approved Document Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/approved-document-query:
    get:
      tags:
        - approved-document-query
      summary: Return resources from FOIAPPD
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBAPPD_ACTIVITY_DATE
        - name: bankNum
          in: query
          description: |-
            Bank
            Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBAPPD_BANK_NUM
        - name: docNum
          in: query
          description: |-
            Document
            Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBAPPD_DOC_NUM
        - name: docType
          in: query
          description: |-
            Document
            Type
          required: false
          schema:
            type: string
        - name: seqNum
          in: query
          description: |-
            Submission
            Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FOBAPPD_SEQ_NUM
        - name: userId
          in: query
          description: User ID
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/approved-document-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/approved-document-query:
    post:
      tags:
        - approved-document-query QAPI (Query by POST)
      summary: Return resources from FOIAPPD
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/approved-document-query-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/approved-document-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    approved-document-query-1.0.0_qapi_post:
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FOBAPPD_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FOBAPPD_ACTIVITY_DATE
        bankNum:
          title: |-
            Bank
            Code
          maxLength: 3
          type: string
          description: "Lineage reference object : FOBAPPD_BANK_NUM"
          x-lineageReferenceObject: FOBAPPD_BANK_NUM
        docNum:
          title: |-
            Document
            Number
          maxLength: 16
          type: string
          description: "Lineage reference object : FOBAPPD_DOC_NUM"
          x-lineageReferenceObject: FOBAPPD_DOC_NUM
        docType:
          title: |-
            Document
            Type
          maxLength: 4
          type: string
        seqNum:
          title: |-
            Submission
            Number
          maxLength: 4
          type: number
          description: "Lineage reference object : FOBAPPD_SEQ_NUM"
          x-lineageReferenceObject: FOBAPPD_SEQ_NUM
        userId:
          title: User ID
          maxLength: 20
          type: string
    approved-document-query-1.0.0_get_response:
      type: object
      properties:
        docNum:
          title: |-
            Document
            Number
          maxLength: 16
          type: string
          description: "Lineage reference object : FOBAPPD_DOC_NUM"
          x-lineageReferenceObject: FOBAPPD_DOC_NUM
        bankNum:
          title: |-
            Bank
            Code
          maxLength: 3
          type: string
          description: "Lineage reference object : FOBAPPD_BANK_NUM"
          x-lineageReferenceObject: FOBAPPD_BANK_NUM
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FOBAPPD_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FOBAPPD_ACTIVITY_DATE
        docType:
          title: |-
            Document
            Type
          maxLength: 4
          type: string
        seqNum:
          title: |-
            Submission
            Number
          maxLength: 4
          type: number
          description: "Lineage reference object : FOBAPPD_SEQ_NUM"
          x-lineageReferenceObject: FOBAPPD_SEQ_NUM
        docTypeDesc:
          title: |-
            Document Type
            Description
          maxLength: 35
          type: string
        userId:
          title: User ID
          maxLength: 20
          type: string
      x-lineageReferenceObject: fobappd
    approved-document-query-1.0.0_get_request:
      type: object
      properties:
        docNum:
          title: |-
            Document
            Number
          maxLength: 16
          type: string
          description: "Lineage reference object : FOBAPPD_DOC_NUM"
          x-lineageReferenceObject: FOBAPPD_DOC_NUM
        bankNum:
          title: |-
            Bank
            Code
          maxLength: 3
          type: string
          description: "Lineage reference object : FOBAPPD_BANK_NUM"
          x-lineageReferenceObject: FOBAPPD_BANK_NUM
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : FOBAPPD_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: FOBAPPD_ACTIVITY_DATE
        docType:
          title: |-
            Document
            Type
          maxLength: 4
          type: string
        seqNum:
          title: |-
            Submission
            Number
          maxLength: 4
          type: number
          description: "Lineage reference object : FOBAPPD_SEQ_NUM"
          x-lineageReferenceObject: FOBAPPD_SEQ_NUM
        userId:
          title: User ID
          maxLength: 20
          type: string
      x-lineageReferenceObject: FOBAPPD
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
