openapi: 3.0.0
info:
  title: account-review-form-collections
  description: API for TSAACCT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: TSAACCT
  x-source-domain: Student
  x-source-title: Account Review Form - Student
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/account-review-form-collections:
    put:
      tags:
        - account-review-form-collections
      summary: Updates an existing resource in TSAACCT
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/account-review-form-collections-1.0.0_put_request"
            example:
              colcId: "210009104"
              criteria.colcId: "210009102"
              id: "210009103"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/account-review-form-collections-1.0.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/account-review-form-collections: {}
components:
  schemas:
    account-review-form-collections-1.0.0_put_request:
      required:
        - criteria.colcId
        - colcId
      type: object
      properties:
        colcId:
          title: Agency ID
          maxLength: 9
          type: string
        criteria.colcId:
          title: Agency ID
          maxLength: 9
          type: string
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: TBRCOLC
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    account-review-form-collections-1.0.0_put_response:
      required:
        - colcId
      type: object
      properties:
        colcId:
          title: Agency ID
          maxLength: 9
          type: string
        colcName:
          title: Collections Agency Name
          maxLength: 230
          type: string
        colcAgencyDate:
          title: Collection Date
          maxLength: 11
          type: string
          description: "Lineage reference object : TBRCOLC_COLC_AGENCY_DATE"
          format: date-time
          x-lineageReferenceObject: TBRCOLC_COLC_AGENCY_DATE
      x-lineageReferenceObject: tbrcolc
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
