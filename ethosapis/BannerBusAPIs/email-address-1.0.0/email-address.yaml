        x-lineageReferenceObject: GOREMAL_PREFERRED_IND
      - name: statusInd
        in: query
        description: Inactivate
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GOREMAL_STATUS_IND
      - name: dispWebInd
        in: query
        description: Display on Web
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GOREMAL_DISP_WEB_IND
      - name: comment
        in: query
        description: Comment
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GOREMAL_COMMENT
      - name: userId
        in: query
        description: User
        required: false
        schema:
          type: string
        x-lineageReferenceObject: GOREMAL_USER_ID
      - name: activityDate
        in: query
        description: Activity Date
