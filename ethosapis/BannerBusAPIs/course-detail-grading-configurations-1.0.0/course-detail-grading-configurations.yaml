openapi: 3.0.0
info:
  title: course-detail-grading-configurations
  description: API for SCADETL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SCADETL
  x-source-domain: Student
  x-source-title: Course Detail Information Form
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/course-detail-grading-configurations:
    get:
      tags:
        - course-detail-grading-configurations
      summary: Return resources from SCADETL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: scacrseSubjCode
          in: query
          required: false
          schema:
            type: string
        - name: scacrseCrseNumb
          in: query
          required: false
          schema:
            type: string
        - name: scacrseTermCodeEff
          in: query
          required: false
          schema:
            type: string
        - name: anonGradingInd
          in: query
          description: Grading by Anonymous ID
          required: false
          schema:
            type: string
            x-lineageReferenceObject: SCRANGD_ANON_GRADING_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/course-detail-grading-configurations-1.0.0_get_resp\
                    onse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/course-detail-grading-configurations:
    post:
      tags:
        - course-detail-grading-configurations QAPI (Query by POST)
      summary: Return resources from SCADETL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/course-detail-grading-configurations-1.0.0_qapi_pos\
                t_request"
            example:
              scacrseCrseNumb: 106
              scacrseSubjCode: AC
              scacrseTermCodeEff: 201009
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/course-detail-grading-configurations-1.0.0_qapi_pos\
                    t_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    course-detail-grading-configurations-1.0.0_get_response:
      type: object
      properties:
        scacrse_key_block:
          type: array
          items:
            type: object
            properties:
              crseTitle:
                title: Course Title
                type: string
                description: "Lineage reference object : crseTitle"
                x-lineageReferenceObject: crseTitle
              scacrseCrseNumb:
                title: Course
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseCrseNumb"
                x-lineageReferenceObject: scacrseCrseNumb
              subjDescription:
                type: string
                description: "Lineage reference object : subjDescription"
                x-lineageReferenceObject: subjDescription
              scacrseSubjCode:
                title: Subject
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseSubjCode, Lookup lineage
                  reference object : stvsubj"
                x-lineageReferenceObject: scacrseSubjCode
                x-lineageLookupReferenceObject: stvsubj
              scacrseCourseAlias:
                title: Course Alias
                maxLength: 50
                type: string
                description: "Lineage reference object : scacrseCourseAlias"
                x-lineageReferenceObject: scacrseCourseAlias
              scacrseTermCodeEff:
                title: Term
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseTermCodeEff, Lookup lineage
                  reference object : stvterm,scbcrky,scbcrky"
                x-lineageReferenceObject: scacrseTermCodeEff
                x-lineageLookupReferenceObject: stvterm,scbcrky,scbcrky
        angd_ctlr_block:
          type: array
          items:
            type: object
            properties:
              scrangdTermCodeTo:
                maxLength: 6
                type: string
                description: "Lineage reference object : scrangdTermCodeTo"
                x-lineageReferenceObject: scrangdTermCodeTo
              scrangdTermCodeFrom:
                maxLength: 6
                type: string
                description: "Lineage reference object : scrangdTermCodeFrom"
                x-lineageReferenceObject: scrangdTermCodeFrom
        scrangd:
          type: array
          items:
            type: object
            properties:
              anonGradingInd:
                title: Grading by Anonymous ID
                type: string
                description: "Lineage reference object : SCRANGD_ANON_GRADING_IND"
                x-lineageReferenceObject: SCRANGD_ANON_GRADING_IND
              activityDate:
                maxLength: 11
                type: string
                description: "Lineage reference object : SCRANGD_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SCRANGD_ACTIVITY_DATE
              userId:
                maxLength: 11
                type: string
                description: "Lineage reference object : SCRANGD_USER_ID"
                x-lineageReferenceObject: SCRANGD_USER_ID
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for the primary
                  data entity used to create the resource. This is useful for
                  referencing the source item through the applications
                  administrative user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: "The detailed actionable error message. "
    course-detail-grading-configurations-1.0.0_qapi_post_request:
      type: object
      properties:
        anonGradingInd:
          title: Grading by Anonymous ID
          type: string
          description: "Lineage reference object : SCRANGD_ANON_GRADING_IND"
          x-lineageReferenceObject: SCRANGD_ANON_GRADING_IND
        scacrseCrseNumb:
          title: Course
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseCrseNumb"
          x-lineageReferenceObject: scacrseCrseNumb
        scacrseSubjCode:
          title: Subject
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseSubjCode, Lookup lineage
            reference object : stvsubj"
          x-lineageReferenceObject: scacrseSubjCode
          x-lineageLookupReferenceObject: stvsubj
        scacrseTermCodeEff:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseTermCodeEff, Lookup lineage
            reference object : stvterm,scbcrky,scbcrky"
          x-lineageReferenceObject: scacrseTermCodeEff
          x-lineageLookupReferenceObject: stvterm,scbcrky,scbcrky
    course-detail-grading-configurations-1.0.0_qapi_post_response:
      type: object
      properties:
        scacrse_key_block:
          type: array
          items:
            type: object
            properties:
              crseTitle:
                title: Course Title
                type: string
                description: "Lineage reference object : crseTitle"
                x-lineageReferenceObject: crseTitle
              scacrseCrseNumb:
                title: Course
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseCrseNumb"
                x-lineageReferenceObject: scacrseCrseNumb
              subjDescription:
                type: string
                description: "Lineage reference object : subjDescription"
                x-lineageReferenceObject: subjDescription
              scacrseSubjCode:
                title: Subject
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseSubjCode, Lookup lineage
                  reference object : stvsubj"
                x-lineageReferenceObject: scacrseSubjCode
                x-lineageLookupReferenceObject: stvsubj
              scacrseCourseAlias:
                title: Course Alias
                maxLength: 50
                type: string
                description: "Lineage reference object : scacrseCourseAlias"
                x-lineageReferenceObject: scacrseCourseAlias
              scacrseTermCodeEff:
                title: Term
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseTermCodeEff, Lookup lineage
                  reference object : stvterm,scbcrky,scbcrky"
                x-lineageReferenceObject: scacrseTermCodeEff
                x-lineageLookupReferenceObject: stvterm,scbcrky,scbcrky
        angd_ctlr_block:
          type: array
          items:
            type: object
            properties:
              scrangdTermCodeTo:
                maxLength: 6
                type: string
                description: "Lineage reference object : scrangdTermCodeTo"
                x-lineageReferenceObject: scrangdTermCodeTo
              scrangdTermCodeFrom:
                maxLength: 6
                type: string
                description: "Lineage reference object : scrangdTermCodeFrom"
                x-lineageReferenceObject: scrangdTermCodeFrom
        scrangd:
          type: array
          items:
            type: object
            properties:
              anonGradingInd:
                title: Grading by Anonymous ID
                type: string
                description: "Lineage reference object : SCRANGD_ANON_GRADING_IND"
                x-lineageReferenceObject: SCRANGD_ANON_GRADING_IND
              activityDate:
                maxLength: 11
                type: string
                description: "Lineage reference object : SCRANGD_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SCRANGD_ACTIVITY_DATE
              userId:
                maxLength: 11
                type: string
                description: "Lineage reference object : SCRANGD_USER_ID"
                x-lineageReferenceObject: SCRANGD_USER_ID
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
