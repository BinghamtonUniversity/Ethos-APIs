        required: false
        schema:
          type: string
        x-lineageReferenceObject: STVTERM_END_DATE
      - name: faEndPeriod
        in: query
        description: Ending Period
        required: false
        schema:
          type: string
        x-lineageReferenceObject: STVTERM_FA_END_PERIOD
      - name: faPeriod
        in: query
        description: Beginning Period
        required: false
        schema:
          type: string
        x-lineageReferenceObject: STVTERM_FA_PERIOD
      - name: faProcYr
