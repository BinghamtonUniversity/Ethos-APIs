          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVDISC_END_OF_MONTH_IND
        - name: days
          in: query
          description: Discount Days
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVDISC_DAYS
        - name: netDays
          in: query
          description: Net Days
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVDISC_NET_DAYS
        - name: pct
          in: query
          description: Percent
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVDISC_PCT
        - name: effDate
          in: query
          description: Effective Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVDISC_EFF_DATE
        - name: termDate
          in: query
          description: Termination Date
          required: false
