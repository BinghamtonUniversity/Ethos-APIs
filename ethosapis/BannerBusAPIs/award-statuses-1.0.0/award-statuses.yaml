openapi: 3.0.0
info:
  title: award-statuses
  description: API for RTVAWST administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: RTVAWST
  x-source-domain: Financial Aid
  x-source-title: Award Status Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/award-statuses:
    get:
      tags:
        - award-statuses
      summary: Return resources from RTVAWST
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: acceptInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVAWST_ACCEPT_IND
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVAWST_ACTIVITY_DATE
        - name: awdLtrInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVAWST_AWD_LTR_IND
        - name: cancelInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVAWST_CANCEL_IND
        - name: code
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVAWST_CODE
        - name: declineInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVAWST_DECLINE_IND
        - name: desc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVAWST_DESC
        - name: infoAccessInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVAWST_INFO_ACCESS_IND
        - name: offerInd
          in: query
          required: false
          schema:
            type: string
          x-lineageReferenceObject: RTVAWST_OFFER_IND
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/award-statuses-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/award-statuses:
    post:
      tags:
