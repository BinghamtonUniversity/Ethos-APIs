      tags:
        - holds-by-study-path
      summary: Return resources from SGASTHD
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: hlddCode
          in: query
          description: Hold Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRHOLD_HLDD_CODE
        - name: stspKeySequence
          in: query
          required: false
          schema:
            type: string
        - name: reason
          in: query
          description: Reason
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRHOLD_REASON
        - name: releaseInd
          in: query
          description: Release Indicator
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRHOLD_RELEASE_IND
        - name: amountOwed
          in: query
          description: Amount
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRHOLD_AMOUNT_OWED
        - name: fromDate
          in: query
          description: From
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRHOLD_FROM_DATE
        - name: toDate
          in: query
          description: To
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRHOLD_TO_DATE
        - name: origCode
          in: query
          description: Origination Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SPRHOLD_ORIG_CODE
