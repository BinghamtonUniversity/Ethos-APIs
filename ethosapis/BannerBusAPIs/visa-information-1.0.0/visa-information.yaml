openapi: 3.0.0
info:
  title: visa-information
  description: API for SKAENRL administrative page
  version: 1.0.0
  x-source-name: SKAENRL
  x-source-title: Student Statistical Details
  x-source-system: banner
  x-api-type: bus-poc
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/visa-information:
    get:
      tags:
        - visa-information
      summary: Return resources from SKAENRL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: vtypCode
          in: query
          description: Visa Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_VTYP_CODE
        - name: entryInd
          in: query
          description: Entry
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_ENTRY_IND
        - name: visaNumber
          in: query
          description: Visa Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_VISA_NUMBER
        - name: noEntries
          in: query
          description: Number of Entries
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_NO_ENTRIES
        - name: natnCodeIssue
          in: query
          description: Nation of Issue
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_NATN_CODE_ISSUE
        - name: visaReqDate
          in: query
          description: Date Requested
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_VISA_REQ_DATE
        - name: vissCode
          in: query
          description: Issuing Authority
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_VISS_CODE
        - name: visaIssueDate
          in: query
          description: Date Issued
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_VISA_ISSUE_DATE
        - name: pentCode
          in: query
          description: Port of Entry
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_PENT_CODE
        - name: visaStartDate
          in: query
          description: Start Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_VISA_START_DATE
        - name: visaExpireDate
          in: query
          description: End Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORVISA_VISA_EXPIRE_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/visa-information-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - visa-information
      summary: Updates an existing resource in SKAENRL
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
