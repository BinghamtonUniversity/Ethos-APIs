openapi: 3.0.0
info:
  title: exemption-authorization-account-level-authorization
  description: API for TSAEXPT, Account Level Authorization administrative page.
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: TSAEXPT
  x-source-domain: Student
  x-source-title: Exemption Authorization
  x-source-system: banner
  x-api-type: bus-poc
servers:
