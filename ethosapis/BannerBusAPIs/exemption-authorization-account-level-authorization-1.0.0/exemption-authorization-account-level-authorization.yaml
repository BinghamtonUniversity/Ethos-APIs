                x-lineageReferenceObject: TBREACC_SRCE_CODE
                x-lineageLookupReferenceObject: ttvsrce
              maxAmount:
                title: Maximum Amount
                maxLength: 9
                type: number
                description: "Lineage reference object : TBREACC_MAX_AMOUNT"
                x-lineageReferenceObject: TBREACC_MAX_AMOUNT
              accPriority:
                title: Priority
                maxLength: 3
                type: number
                description: "Lineage reference object : TBREACC_ACC_PRIORITY"
                x-lineageReferenceObject: TBREACC_ACC_PRIORITY
