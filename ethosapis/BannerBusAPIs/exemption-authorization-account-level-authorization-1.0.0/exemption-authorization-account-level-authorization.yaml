      required:
      - criteria.srceCode
      type: object
      properties:
        criteria.srceCode:
          title: Source Code
          type: string
          description: "This field contains the source code which will be paid by the exemption."
          x-lineageReferenceObject: TBREACC_SRCE_CODE
        srceCode:
          title: Source Code
          maxLength: 30
          type: string
          description: "This field contains the source code which will be paid by the exemption."
          x-lineageReferenceObject: TBREACC_SRCE_CODE
        percent:
          title: Percent
          type: string
          description: "This field identifies the percentage of the total of the students registration charges the exemption will pay."
          x-lineageReferenceObject: TBREACC_PERCENT
        minimumAmount:
          title: Minimum Amount
          type: number
          description: "This field indicates the minimum amount the student must pay on their registration charges that the exemption will not cover."
          x-lineageReferenceObject: TBREACC_MIN_AMOUNT
        maxAmount:
          title: Maximum Amount
          type: number
          description: "This field indicates the maximum amount the exemption will cover of the students registration charges."
