    exemption-authorization-account-level-authorization-1.0.0_get_response:
      type: object
      properties:
        tbbexpt:
          type: array
          items:
            required:
              - desc
              - detailCode
            type: object
            properties:
              detailDesc:
                type: string
              studentExptRollInd:
                title: Roll Students
