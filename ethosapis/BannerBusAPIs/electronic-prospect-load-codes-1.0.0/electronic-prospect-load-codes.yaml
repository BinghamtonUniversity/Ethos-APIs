        infcCode:
          title: Interface Code
          maxLength: 30
          type: string
          description: "Lineage reference object : STVPREL_INFC_CODE, Lookup lineage
            reference object : stvinfc"
          x-lineageReferenceObject: STVPREL_INFC_CODE
          x-lineageLookupReferenceObject: stvinfc
        tapeCode:
