paths:
  /api/proposal-budget-inquiry-details:
    get:
      tags:
        - proposal-budget-inquiry-details
      summary: Return resources from FRIBUDP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this parameter or the individual parameters listed. Must be a JSON representation of the property searching for. This can be any of the properties listed on the URL or QAPI and must be a json representation that can be validated against the GET schema. Limit and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: propCode
          in: query
          description: Proposal
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRBBUDP_PROP_CODE
        - name: budgetCode
          in: query
          description: Budget Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRBBUDP_BUDGET_CODE
        - name: budgetDesc
          in: query
          description: Description
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRBBUDP_BUDGET_DESC
        - name: coasCode
          in: query
          description: COA
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRBBUDP_COAS_CODE
        - name: typeCode
          in: query
          description: Type
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRBBUDP_TYPE_CODE
        - name: begDate
          in: query
          description: Begin Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRBBUDP_BEG_DATE
        - name: endDate
          in: query
          description: End Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FRBBUDP_END_DATE
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/proposal-budget-inquiry-details-1.0.0_get_response'
        '400':
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
        '401':
          description: Failure. Unauthorized
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
  /qapi/proposal-budget-inquiry-details:
    post:
      tags:
        - proposal-budget-inquiry-details QAPI (Query by POST)
      summary: Return resources from FRIBUDP
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
