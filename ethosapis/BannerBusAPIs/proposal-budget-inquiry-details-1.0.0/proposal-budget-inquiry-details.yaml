            example:
              budgetDesc: Full Grant Budget
              budgetCode: BC1
              begDate: 01/12/2004
              endDate: 01/12/2007
              coasCode: B
              propCode: DMP1201
              typeCode: A
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/proposal-budget-inquiry-details-1.0.0_qapi_post_response'
        '400':
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/errors-2.0.0'
        '401':
          description: Failure. Unauthorized
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
