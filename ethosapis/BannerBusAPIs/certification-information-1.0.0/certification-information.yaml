openapi: 3.0.0
info:
  title: certification-information
  description: API for PPACERT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: PPACERT
  x-source-domain: Human Resources
  x-source-title: Certification Information
  x-source-system: banner
