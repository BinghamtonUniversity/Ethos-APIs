            type: object
            properties:
              message:
                type: string
              description:
                type: string
    employee-status-change-emcumbrance-1.0.0_get_request:
      required:
        - actionList
      type: object
      properties:
        allCbox:
          title: All Records
          maxLength: 1
          type: string
