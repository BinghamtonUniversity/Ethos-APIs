                t"
            example:
              allCbox: Y
              actionList: L
              lreaCode: Y
              id: Z001
              actionDate: 2021-01-07
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
