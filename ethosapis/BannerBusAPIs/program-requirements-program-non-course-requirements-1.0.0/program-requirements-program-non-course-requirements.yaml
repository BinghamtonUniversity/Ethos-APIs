openapi: 3.0.0
info:
  title: program-requirements-program-non-course-requirements
  description: API for SMAPROG administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SMAPROG
  x-source-domain: Student
  x-source-title: Program Requirements
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/program-requirements-program-non-course-requirements:
    get:
      tags:
        - program-requirements-program-non-course-requirements
      summary: Return resources from SMAPROG
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: program
          in: query
          required: false
          schema:
            type: string
        - name: keyblckTermCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/program-requirements-program-non-course-requirement\
                    s-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/program-requirements-program-non-course-requirements:
    post:
      tags:
        - program-requirements-program-non-course-requirements QAPI (Query by
          POST)
      summary: Return resources from SMAPROG
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/program-requirements-program-non-course-requirement\
                s-1.0.0_get_request"
            example:
              keyblckTermCode: 202100
              program: FINTECH
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/program-requirements-program-non-course-requirement\
                    s-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    program-requirements-program-non-course-requirements-1.0.0_get_response:
      type: object
      properties:
        smrpncr:
          type: array
          items:
            type: object
            properties:
              ncrsDesc:
                title: Description
                type: string
              maint:
                maxLength: 1
                type: string
              ncrqCode:
                title: Non-Course Code
                maxLength: 30
                type: string
                description: "Lineage reference object : SMRPNCR_NCRQ_CODE, Lookup lineage
                  reference object : stvncrq"
                x-lineageReferenceObject: SMRPNCR_NCRQ_CODE
                x-lineageLookupReferenceObject: stvncrq
              yearRule:
                title: Non-Course Year Limit
                maxLength: 2
                type: number
                description: "Lineage reference object : SMRPNCR_YEAR_RULE"
                x-lineageReferenceObject: SMRPNCR_YEAR_RULE
            x-lineageReferenceObject: smrpncr
        smrpncr_ctrl_block:
          type: array
          items:
            type: object
            properties:
              smrpncrTermCodeTo:
                title: To Term
                maxLength: 6
                type: string
                description: "Lineage reference object : SMRPNCR_TERM_CODE_TO"
                x-lineageReferenceObject: SMRPNCR_TERM_CODE_TO
              smrpncrTermCodeFrom:
                title: From Term
                maxLength: 6
                type: string
                description: "Lineage reference object : SMRPNCR_TERM_CODE_FROM"
                x-lineageReferenceObject: SMRPNCR_TERM_CODE_FROM
            x-lineageReferenceObject: smrpncr_ctrl_block
    program-requirements-program-non-course-requirements-1.0.0_get_request:
      type: object
      properties:
        keyblckTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : KEYBLCK_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: KEYBLCK_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
        program:
          title: Program
          maxLength: 30
          type: string
          description: "Lineage reference object : PROGRAM"
          x-lineageReferenceObject: PROGRAM
      x-lineageReferenceObject: KEY_BLOCK
    program-requirements-program-non-course-requirements-1.0.0_qapi_post:
      type: object
      properties:
        program:
          type: string
        keyblckTermCode:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
