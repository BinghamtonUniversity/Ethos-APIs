          required: false
          schema:
            type: string
          x-lineageReferenceObject: SOVCASA_ACTIVITY_CODE
        - name: casvDesc
          in: query
          description: Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SOVCASA_CASV_DESC
        - name: collCode
          in: query
          description: College
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SOVCASA_COLL_CODE
        - name: sequenceNumber
          in: query
          description: CA Request ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SOVCASA_SEQUENCE_NUMBER
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/complementary-activities-submission-inquiry-1.0.0_g\
                    et_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
