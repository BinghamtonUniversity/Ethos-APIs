      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/activity-types:
    post:
      tags:
        - activity-types QAPI (Query by POST)
      summary: Return resources from STVACTP
      requestBody:
