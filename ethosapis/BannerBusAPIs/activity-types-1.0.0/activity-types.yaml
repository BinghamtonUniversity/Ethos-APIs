          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - activity-types
      summary: Creates a new resource in STVACTP
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/activity-types-1.0.0_post_request"
            example:
              code: TEST
              desc: testDescription
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
