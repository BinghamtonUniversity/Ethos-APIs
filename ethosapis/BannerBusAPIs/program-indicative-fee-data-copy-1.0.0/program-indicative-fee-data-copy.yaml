openapi: 3.0.0
info:
  title: program-indicative-fee-data-copy
  description: API for SMAPFPA administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SMAPFPA
  x-source-domain: Student
  x-source-title: Program Detail Information
  x-source-system: banner
  x-api-type: bus-poc
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: '{server_url}'
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/program-indicative-fee-data-copy:
    post:
      tags:
      - program-indicative-fee-data-copy
      summary: Creates a new resource in SMAPFPA
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/program-indicative-fee-data-copy-1.0.0_post_request"
            example:
              keyblckProgram: '0001'
              keyblckTermCodeEff: 222226
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/program-indicative-fee-data-copy-1.0.0_post_response"
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
  /qapi/program-indicative-fee-data-copy: {}
components:
  schemas:
    program-indicative-fee-data-copy-1.0.0_post_response:
      type: object
      properties:
        key_block:
          type: array
          items:
            type: object
            properties:
              keyblckProgram:
                title: Program
                maxLength: 12
                type: string
                description: "Lineage reference object : keyblckProgram, Lookup lineage\
                  \ reference object : smrprle"
                x-lineageReferenceObject: keyblckProgram
                x-lineageLookupReferenceObject: smrprle
              keyblckTermDesc:
                type: string
                description: "Lineage reference object : keyblckTermDesc"
                x-lineageReferenceObject: keyblckTermDesc
              keyblckProgramDesc:
                type: string
                description: "Lineage reference object : keyblckProgramDesc"
                x-lineageReferenceObject: keyblckProgramDesc
              keyblckTermCodeEff:
                title: Term
                maxLength: 6
                type: string
                description: "Lineage reference object : keyblckTermCodeEff, Lookup\
                  \ lineage reference object : stvterm"
                x-lineageReferenceObject: keyblckTermCodeEff
                x-lineageLookupReferenceObject: stvterm
            x-lineageReferenceObject: key_block
        sorifee_ctrl_block:
          type: array
          items:
            type: object
            properties:
              sorifeeTermCodeFrom:
                title: From Term
                maxLength: 6
                type: string
                description: "Lineage reference object : sorifeeTermCodeFrom"
                x-lineageReferenceObject: sorifeeTermCodeFrom
              sorifeeTermCodeTo:
                title: To Term
                maxLength: 6
                type: string
                description: "Lineage reference object : sorifeeTermCodeTo"
                x-lineageReferenceObject: sorifeeTermCodeTo
            x-lineageReferenceObject: sorifee_ctrl_block
        sorifee:
          type: array
          items:
            type: object
            properties:
              feeMaximum:
                title: Program Loan Maximum
                maxLength: 13
                type: number
                description: "Lineage reference object : SORIFEE_FEE_MAXIMUM"
                x-lineageReferenceObject: SORIFEE_FEE_MAXIMUM
              indFeeAmt:
                maxLength: 10
                type: number
                description: "Lineage reference object : SORIFEE_IND_FEE_AMT"
                x-lineageReferenceObject: SORIFEE_IND_FEE_AMT
              currCode:
                title: Currency
                maxLength: 4
                type: string
                description: "Lineage reference object : SORIFEE_CURR_CODE, Lookup\
                  \ lineage reference object : GTVCURR"
                x-lineageReferenceObject: SORIFEE_CURR_CODE
                x-lineageLookupReferenceObject: GTVCURR
              feeTypeDesc:
                type: string
              feeType:
                title: Fee Type
                maxLength: 4
                type: string
                description: "Lineage reference object : SORIFEE_FEE_TYPE"
                x-lineageReferenceObject: SORIFEE_FEE_TYPE
              currCodeDesc:
                type: string
            x-lineageReferenceObject: sorifee
    errors-2.0.0:
      required:
      - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The global identifier of the resource in error.
              sourceId:
                type: string
                description: The source applications data reference identifier for
                  the primary data entity used to create the resource. This is useful
                  for referencing the source item through the applications administrative
                  user interface.
              code:
                type: string
                description: The error message code used to describe the error details.
              description:
                type: string
                description: The error description used to describe the error details.
              message:
                type: string
                description: 'The detailed actionable error message. '
    program-indicative-fee-data-copy-1.0.0_post_request:
      type: object
      properties:
        keyblckProgram:
          title: Program
          maxLength: 12
          type: string
          description: "Lineage reference object : keyblckProgram, Lookup lineage\
            \ reference object : smrprle"
          x-lineageReferenceObject: keyblckProgram
          x-lineageLookupReferenceObject: smrprle
        keyblckTermCodeEff:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : keyblckTermCodeEff, Lookup lineage\
            \ reference object : stvterm"
          x-lineageReferenceObject: keyblckTermCodeEff
          x-lineageLookupReferenceObject: stvterm
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer