openapi: 3.0.0
info:
  title: electronic-approval-type-rule
  description: API for NTRAPTY administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: NTRAPTY
  x-source-domain: Human Resources
  x-source-title: Electronic Approval Type Rules
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/electronic-approval-type-rule:
    get:
      tags:
        - electronic-approval-type-rule
      summary: Return resources from NTRAPTY
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: aptyCode
          in: query
          required: true
          schema:
            type: string
        - name: aufmCode
          in: query
          description: Form
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NTRAPFB_AUFM_CODE
        - name: aubkCode
          in: query
          description: Block
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NTRAPFB_AUBK_CODE
        - name: applySeqNo
          in: query
          description: Update Databaseb Sequence Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: NTRAPFB_APPLY_SEQ_NO
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/electronic-approval-type-rule-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/electronic-approval-type-rule:
    post:
      tags:
        - electronic-approval-type-rule QAPI (Query by POST)
      summary: Return resources from NTRAPTY
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/electronic-approval-type-rule-1.0.0_get_request"
            example:
              aptyCode: 11GTES
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/electronic-approval-type-rule-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    electronic-approval-type-rule-1.0.0_get_response:
      required:
        - applySeqNo
        - aubkCode
        - aufmCode
      type: object
      properties:
        formDesc:
          title: Description
          type: string
        aufmCode:
          title: Form
          maxLength: 30
          type: string
          description: "Lineage reference object : NTRAPFB_AUFM_CODE, Lookup lineage
            reference object : ntraufm"
          x-lineageReferenceObject: NTRAPFB_AUFM_CODE
          x-lineageLookupReferenceObject: ntraufm
        aubkCode:
          title: Block
          maxLength: 30
          type: string
          description: "Lineage reference object : NTRAPFB_AUBK_CODE, Lookup lineage
            reference object : ntraubk"
          x-lineageReferenceObject: NTRAPFB_AUBK_CODE
          x-lineageLookupReferenceObject: ntraubk
        applySeqNo:
          title: Update Databaseb Sequence Number
          maxLength: 5
          type: number
          description: "Lineage reference object : NTRAPFB_APPLY_SEQ_NO"
          x-lineageReferenceObject: NTRAPFB_APPLY_SEQ_NO
        blockDesc:
          title: Description
          type: string
      x-lineageReferenceObject: ntrapfb
    electronic-approval-type-rule-1.0.0_qapi_post:
      required:
        - aptyCode
      type: object
      properties:
        aptyCode:
          type: string
        aufmCode:
          title: Form
          maxLength: 30
          type: string
          description: "Lineage reference object : NTRAPFB_AUFM_CODE, Lookup lineage
            reference object : ntraufm"
          x-lineageReferenceObject: NTRAPFB_AUFM_CODE
          x-lineageLookupReferenceObject: ntraufm
        aubkCode:
          title: Block
          maxLength: 30
          type: string
          description: "Lineage reference object : NTRAPFB_AUBK_CODE, Lookup lineage
            reference object : ntraubk"
          x-lineageReferenceObject: NTRAPFB_AUBK_CODE
          x-lineageLookupReferenceObject: ntraubk
        applySeqNo:
          title: Update Databaseb Sequence Number
          maxLength: 5
          type: number
          description: "Lineage reference object : NTRAPFB_APPLY_SEQ_NO"
          x-lineageReferenceObject: NTRAPFB_APPLY_SEQ_NO
    electronic-approval-type-rule-1.0.0_get_request:
      required:
        - aptyCode
        - aufmCode
        - aubkCode
        - applySeqNo
      type: object
      properties:
        aufmCode:
          title: Form
          maxLength: 30
          type: string
          description: "Lineage reference object : NTRAPFB_AUFM_CODE, Lookup lineage
            reference object : ntraufm"
          x-lineageReferenceObject: NTRAPFB_AUFM_CODE
          x-lineageLookupReferenceObject: ntraufm
        aubkCode:
          title: Block
          maxLength: 30
          type: string
          description: "Lineage reference object : NTRAPFB_AUBK_CODE, Lookup lineage
            reference object : ntraubk"
          x-lineageReferenceObject: NTRAPFB_AUBK_CODE
          x-lineageLookupReferenceObject: ntraubk
        aptyCode:
          title: Approval Type
          maxLength: 30
          type: string
          description: "Lineage reference object : aptyCode, Lookup lineage reference
            object : ntvapty"
          x-lineageReferenceObject: aptyCode
          x-lineageLookupReferenceObject: ntvapty
        applySeqNo:
          title: Update Databaseb Sequence Number
          maxLength: 5
          type: number
          description: "Lineage reference object : NTRAPFB_APPLY_SEQ_NO"
          x-lineageReferenceObject: NTRAPFB_APPLY_SEQ_NO
      x-lineageReferenceObject: NTRAPFB
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
