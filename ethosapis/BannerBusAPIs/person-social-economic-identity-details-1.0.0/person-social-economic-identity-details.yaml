          description: Gorpsid Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORPSID_ACTIVITY_DATE
        - name: userId
          in: query
          description: Gorpsid User Id
          required: false
          schema:
            type: string
          x-lineageReferenceObject: GORPSID_USER_ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
