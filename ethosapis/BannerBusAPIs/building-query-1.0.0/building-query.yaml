openapi: 3.0.0
info:
  title: building-query
  description: API for SLABQRY administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SLABQRY
  x-source-domain: Student
  x-source-title: Building Query
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/building-query:
    get:
      tags:
        - building-query
      summary: Return resources from SLABQRY
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: campCode
          in: query
          description: Campus
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SLBBLDG_CAMP_CODE
        - name: siteCode
          in: query
          description: Site
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SLBBLDG_SITE_CODE
        - name: bldgCode
          in: query
          description: Building
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SLBBLDG_BLDG_CODE
        - name: bldgDesc
          in: query
          description: Description
          required: false
          schema:
            type: string
        - name: capacity
          in: query
          description: Capacity
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SLBBLDG_CAPACITY
        - name: siteCode
          in: query
          description: Site
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SLBBLDG_SITE_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/building-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/building-query:
    post:
      tags:
        - building-query QAPI (Query by POST)
      summary: Return resources from SLABQRY
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/building-query-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/building-query-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    building-query-1.0.0_get_request:
      type: object
      properties:
        siteCode:
          title: Site
          maxLength: 30
          type: string
          description: "Lineage reference object : SLBBLDG_SITE_CODE, Lookup lineage
            reference object : stvsite"
          x-lineageReferenceObject: SLBBLDG_SITE_CODE
          x-lineageLookupReferenceObject: stvsite
        campCode:
          title: Campus
          maxLength: 30
          type: string
          description: "Lineage reference object : SLBBLDG_CAMP_CODE, Lookup lineage
            reference object : stvcamp"
          x-lineageReferenceObject: SLBBLDG_CAMP_CODE
          x-lineageLookupReferenceObject: stvcamp
        bldgDesc:
          title: Description
          type: string
        maximumCapacity:
          title: Maximum
          maxLength: 7
          type: number
          description: "Lineage reference object : SLBBLDG_MAXIMUM_CAPACITY"
          x-lineageReferenceObject: SLBBLDG_MAXIMUM_CAPACITY
        bldgCode:
          title: Building
          maxLength: 30
          type: string
          description: "Lineage reference object : SLBBLDG_BLDG_CODE, Lookup lineage
            reference object : stvbldg"
          x-lineageReferenceObject: SLBBLDG_BLDG_CODE
          x-lineageLookupReferenceObject: stvbldg
        capacity:
          title: Capacity
          maxLength: 7
          type: number
          description: "Lineage reference object : SLBBLDG_CAPACITY"
          x-lineageReferenceObject: SLBBLDG_CAPACITY
      x-lineageReferenceObject: SLBBLDG
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    building-query-1.0.0_get_response:
      type: object
      properties:
        siteCode:
          title: Site
          maxLength: 30
          type: string
          description: "Lineage reference object : SLBBLDG_SITE_CODE, Lookup lineage
            reference object : stvsite"
          x-lineageReferenceObject: SLBBLDG_SITE_CODE
          x-lineageLookupReferenceObject: stvsite
        campCode:
          title: Campus
          maxLength: 30
          type: string
          description: "Lineage reference object : SLBBLDG_CAMP_CODE, Lookup lineage
            reference object : stvcamp"
          x-lineageReferenceObject: SLBBLDG_CAMP_CODE
          x-lineageLookupReferenceObject: stvcamp
        bldgDesc:
          title: Description
          type: string
        maximumCapacity:
          title: Maximum
          maxLength: 7
          type: number
          description: "Lineage reference object : SLBBLDG_MAXIMUM_CAPACITY"
          x-lineageReferenceObject: SLBBLDG_MAXIMUM_CAPACITY
        bldgCode:
          title: Building
          maxLength: 30
          type: string
          description: "Lineage reference object : SLBBLDG_BLDG_CODE, Lookup lineage
            reference object : stvbldg"
          x-lineageReferenceObject: SLBBLDG_BLDG_CODE
          x-lineageLookupReferenceObject: stvbldg
        capacity:
          title: Capacity
          maxLength: 7
          type: number
          description: "Lineage reference object : SLBBLDG_CAPACITY"
          x-lineageReferenceObject: SLBBLDG_CAPACITY
      x-lineageReferenceObject: slbbldg
    building-query-1.0.0_qapi_post:
      type: object
      properties:
        campCode:
          title: Campus
          maxLength: 30
          type: string
          description: "Lineage reference object : SLBBLDG_CAMP_CODE, Lookup lineage
            reference object : stvcamp"
          x-lineageReferenceObject: SLBBLDG_CAMP_CODE
          x-lineageLookupReferenceObject: stvcamp
        siteCode:
          title: Site
          maxLength: 30
          type: string
          description: "Lineage reference object : SLBBLDG_SITE_CODE, Lookup lineage
            reference object : stvsite"
          x-lineageReferenceObject: SLBBLDG_SITE_CODE
          x-lineageLookupReferenceObject: stvsite
        bldgCode:
          title: Building
          maxLength: 30
          type: string
          description: "Lineage reference object : SLBBLDG_BLDG_CODE, Lookup lineage
            reference object : stvbldg"
          x-lineageReferenceObject: SLBBLDG_BLDG_CODE
          x-lineageLookupReferenceObject: stvbldg
        bldgDesc:
          title: Description
          type: string
        capacity:
          title: Capacity
          maxLength: 7
          type: number
          description: "Lineage reference object : SLBBLDG_CAPACITY"
          x-lineageReferenceObject: SLBBLDG_CAPACITY
        maximumCapacity:
          title: Maximum
          maxLength: 7
          type: number
          description: "Lineage reference object : SLBBLDG_MAXIMUM_CAPACITY"
          x-lineageReferenceObject: SLBBLDG_MAXIMUM_CAPACITY
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
