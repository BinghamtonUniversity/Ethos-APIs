openapi: 3.0.0
info:
  title: curricula-summary-honors
  description: API for SHADEGR administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SHADEGR
  x-source-domain: Student
  x-source-title: Degree and Other Formal Awards
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/curricula-summary-honors:
    get:
      tags:
        - curricula-summary-honors
      summary: Return resources from SHADEGR
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: dgmrSeqNo
          in: query
          required: false
          schema:
            type: string
        - name: viewCurrent
          in: query
          required: false
          schema:
            type: string
        - name: degsCode
          in: query
          required: false
          schema:
            type: string
        - name: honrCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/curricula-summary-honors-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/curricula-summary-honors:
    post:
      tags:
        - curricula-summary-honors QAPI (Query by POST)
      summary: Return resources from SHADEGR
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/curricula-summary-honors-1.0.0_get_request"
            example:
              id: A00030988
              dgmrSeqNo: 1
              viewCurrent: Y
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/curricula-summary-honors-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    curricula-summary-honors-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        dgmrSeqNo:
          type: string
        viewCurrent:
          type: string
        degsCode:
          type: string
        honrCode:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    curricula-summary-honors-1.0.0_get_request:
      type: object
      properties:
        honrCode:
          title: Code
          maxLength: 30
          type: string
          description: "Lineage reference object : SHRDGIH_HONR_CODE, Lookup lineage
            reference object : stvhonr"
          x-lineageReferenceObject: SHRDGIH_HONR_CODE
          x-lineageLookupReferenceObject: stvhonr
        degsCode:
          title: Outcome Status
          maxLength: 30
          type: string
          description: "Lineage reference object : SHRDGMR_DEGS_CODE, Lookup lineage
            reference object : stvdegs"
          x-lineageReferenceObject: SHRDGMR_DEGS_CODE
          x-lineageLookupReferenceObject: stvdegs
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        dgmrSeqNo:
          title: Degree Sequence
          maxLength: 2
          type: number
          description: "Lineage reference object : dgmrSeqNo"
          x-lineageReferenceObject: dgmrSeqNo
        viewCurrent:
          title: View Current/Active Curricula
          maxLength: 30
          type: string
          description: "Lineage reference object : viewCurrent"
          x-lineageReferenceObject: viewCurrent
      x-lineageReferenceObject: SHRDGIH
    curricula-summary-honors-1.0.0_get_response:
      type: object
      properties:
        shrdgih:
          type: array
          items:
            type: object
            properties:
              honrCode:
                title: Code
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRDGIH_HONR_CODE, Lookup lineage
                  reference object : stvhonr"
                x-lineageReferenceObject: SHRDGIH_HONR_CODE
                x-lineageLookupReferenceObject: stvhonr
              commencePrtInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : SHRDGIH_COMMENCE_PRT_IND"
                x-lineageReferenceObject: SHRDGIH_COMMENCE_PRT_IND
              stvhonrDesc:
                title: Institutional Honors Description
                type: string
              transcPrtInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : SHRDGIH_TRANSC_PRT_IND"
                x-lineageReferenceObject: SHRDGIH_TRANSC_PRT_IND
              ediDefault:
                maxLength: 1
                type: string
                description: "Lineage reference object : SHRDGIH_EDI_DEFAULT"
                x-lineageReferenceObject: SHRDGIH_EDI_DEFAULT
            x-lineageReferenceObject: shrdgih
        shrdgdh:
          type: array
          items:
            type: object
            properties:
              stvhondDesc:
                title: Description
                type: string
              commencePrtInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : SHRDGDH_COMMENCE_PRT_IND"
                x-lineageReferenceObject: SHRDGDH_COMMENCE_PRT_IND
              transcPrtInd:
                maxLength: 1
                type: string
                description: "Lineage reference object : SHRDGDH_TRANSC_PRT_IND"
                x-lineageReferenceObject: SHRDGDH_TRANSC_PRT_IND
              hondCode:
                title: Code
                maxLength: 30
                type: string
                description: "Lineage reference object : SHRDGDH_HOND_CODE, Lookup lineage
                  reference object : stvhond"
                x-lineageReferenceObject: SHRDGDH_HOND_CODE
                x-lineageLookupReferenceObject: stvhond
            x-lineageReferenceObject: shrdgdh
        shrdgcm:
          type: array
          items:
            type: object
            properties:
              comment:
                title: Degree Comments
                maxLength: 60
                type: string
                description: "Lineage reference object : SHRDGCM_COMMENT"
                x-lineageReferenceObject: SHRDGCM_COMMENT
            x-lineageReferenceObject: shrdgcm
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
