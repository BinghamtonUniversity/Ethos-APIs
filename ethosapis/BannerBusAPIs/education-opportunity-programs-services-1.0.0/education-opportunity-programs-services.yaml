        - education-opportunity-programs-services
      summary: Return resources from SGAEOPS
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma separated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: keyblckTermCode
          in: query
          required: false
          schema:
            type: string
        - name: eopsCode
          in: query
          description: EOPS Status
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBEOPS_EOPS_CODE
        - name: wthdCode
          in: query
          description: Withdrawal Reason
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBEOPS_WTHD_CODE
        - name: sfaeCode
          in: query
          description: State Financial Aid Eligibility
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBEOPS_SFAE_CODE
        - name: tracCode
          in: query
          description: Acceptance Reason
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBEOPS_TRAC_CODE
        - name: acceptDate
          in: query
          description: Acceptance Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SGBEOPS_ACCEPT_DATE
        - name: eselCode
          in: query
          required: false
          schema:
            type: string
        - name: primaryInd
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
