openapi: 3.0.0
info:
  title: ship-to-codes
  description: API for FTVSHIP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: FTVSHIP
  x-source-domain: Finance
  x-source-title: Ship To Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ship-to-codes:
    get:
      tags:
        - ship-to-codes
      summary: Return resources from FTVSHIP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: ftvshipBuilding
          in: query
          description: Building
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVSHIP_BUILDING
        - name: ftvshipCode
          in: query
          description: Ship To Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVSHIP_CODE
        - name: ftvshipContact
          in: query
          description: Contact Name
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVSHIP_CONTACT
        - name: ftvshipCtryCodePhone
          in: query
          required: false
          schema:
            type: string
        - name: ftvshipEffDate
          in: query
          description: Effective Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVSHIP_EFF_DATE
        - name: ftvshipFloor
          in: query
          description: Floor
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVSHIP_FLOOR
        - name: ftvshipPhoneArea
          in: query
          description: Area Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVSHIP_PHONE_AREA
        - name: ftvshipPhoneExt
          in: query
          description: Extension
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVSHIP_PHONE_EXT
        - name: ftvshipPhoneNum
          in: query
          description: Phone Number
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVSHIP_PHONE_NUM
        - name: ftvshipTermDate
          in: query
          description: Termination Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTVSHIP_TERM_DATE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ship-to-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ship-to-codes:
    post:
      tags:
        - ship-to-codes QAPI (Query by POST)
      summary: Return resources from FTVSHIP
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ship-to-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ship-to-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
