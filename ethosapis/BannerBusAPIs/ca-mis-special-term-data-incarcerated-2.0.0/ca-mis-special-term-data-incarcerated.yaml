openapi: 3.0.0
info:
  title: ca-mis-special-term-data-incarcerated
  description: API for SVAMIST administrative page
  version: 2.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SVAMIST
  x-source-domain: Student
  x-source-title: MIS Special Term Data (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-mis-special-term-data-incarcerated:
    get:
      tags:
        - ca-mis-special-term-data-incarcerated
      summary: Return resources from SVAMIST
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
        - name: svamistTermCode
          in: query
          required: false
          schema:
            type: string
        - name: svamistDicdCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v2.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-mis-special-term-data-incarcerated-2.0.0_get_res\
                    ponse"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-mis-special-term-data-incarcerated:
    post:
      tags:
        - ca-mis-special-term-data-incarcerated QAPI (Query by POST)
      summary: Return resources from SVAMIST
      requestBody:
        content:
          application/vnd.hedtech.integration.v2.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-mis-special-term-data-incarcerated-2.0.0_qapi_po\
                st_request"
            example:
              svamistTermCode: "201521"
              id: DEMO15
              svamistDicdCode: "123"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v2.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-mis-special-term-data-incarcerated-2.0.0_qapi_po\
                    st_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    ca-mis-special-term-data-incarcerated-2.0.0_qapi_post_request:
      type: object
      properties:
        svamistTermCode:
          title: Term
          maxLength: 6
          type: string
          description: "Lineage reference object : svamistTermCode, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: svamistTermCode
          x-lineageLookupReferenceObject: stvterm
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
        svamistDicdCode:
          title: District/College ID
          maxLength: 3
          type: string
          description: "Lineage reference object : svamistDicdCode, Lookup lineage
            reference object : gtvdicd"
          x-lineageReferenceObject: svamistDicdCode
          x-lineageLookupReferenceObject: gtvdicd
      x-lineageReferenceObject: KEY_BLOCK
    ca-mis-special-term-data-incarcerated-2.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
        svamistTermCode:
          type: string
        svamistDicdCode:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-mis-special-term-data-incarcerated-2.0.0_get_response:
      type: object
      properties:
        sistCode:
          title: Student Incarcerated Status
          maxLength: 2
          type: string
          description: "Lineage reference object : SVBSIST_SIST_CODE, Lookup lineage
            reference object : svvsist"
          x-lineageReferenceObject: SVBSIST_SIST_CODE
          x-lineageLookupReferenceObject: svvsist
        justiceDesc:
          type: string
        justiceCode:
          title: Student Youth Justice Status
          maxLength: 2
          type: string
          description: "Lineage reference object : SVBSIST_JUSTICE_CODE, Lookup lineage
            reference object : gorseid"
          x-lineageReferenceObject: SVBSIST_JUSTICE_CODE
          x-lineageLookupReferenceObject: gorseid
        sistDesc:
          type: string
      x-lineageReferenceObject: svbsist
    ca-mis-special-term-data-incarcerated-2.0.0_qapi_post_response:
      type: object
      properties:
        sistCode:
          title: Student Incarcerated Status
          maxLength: 2
          type: string
          description: "Lineage reference object : SVBSIST_SIST_CODE, Lookup lineage
            reference object : svvsist"
          x-lineageReferenceObject: SVBSIST_SIST_CODE
          x-lineageLookupReferenceObject: svvsist
        justiceDesc:
          type: string
        justiceCode:
          title: Student Youth Justice Status
          maxLength: 2
          type: string
          description: "Lineage reference object : SVBSIST_JUSTICE_CODE, Lookup lineage
            reference object : gorseid"
          x-lineageReferenceObject: SVBSIST_JUSTICE_CODE
          x-lineageLookupReferenceObject: gorseid
        sistDesc:
          type: string
      x-lineageReferenceObject: svbsist
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
