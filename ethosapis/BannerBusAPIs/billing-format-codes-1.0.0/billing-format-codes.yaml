          maxLength: 1
          type: string
          description: "Lineage reference object : FRVBFRM_TYPE_IND"
          x-lineageReferenceObject: FRVBFRM_TYPE_IND
        systemReqInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : FRVBFRM_SYSTEM_REQ_IND"
