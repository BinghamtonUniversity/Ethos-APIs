openapi: 3.0.0
info:
  title: electronic-approval-category-rule
  description: API for NTRACAT administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: NTRACAT
  x-source-domain: Human Resources
  x-source-title: Electronic Approval Category Rules
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/electronic-approval-category-rule:
    get:
      tags:
        - electronic-approval-category-rule
      summary: Return resources from NTRACAT
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: acatCode
          in: query
          required: true
          schema:
            type: string
        - name: aptyCode
          in: query
          required: false
          schema:
            type: string
        - name: aptyEntrySeqNo
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/electronic-approval-category-rule-1.0.0_get_respons\
                    e"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/electronic-approval-category-rule:
    post:
      tags:
        - electronic-approval-category-rule QAPI (Query by POST)
      summary: Return resources from NTRACAT
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/electronic-approval-category-rule-1.0.0_get_request"
            example:
              acatCode: 2ADDR
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/electronic-approval-category-rule-1.0.0_get_respons\
                    e"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    electronic-approval-category-rule-1.0.0_get_request:
      required:
        - acatCode
        - aptyCode
        - aptyEntrySeqNo
      type: object
      properties:
        acatCode:
          title: Approval Category
          maxLength: 30
          type: string
          description: "Lineage reference object : acatCode"
          x-lineageReferenceObject: acatCode
        aptyEntrySeqNo:
          title: Approval Type Entry Sequence Number
          maxLength: 2
          type: number
          description: "Lineage reference object : NTRACAT_APTY_ENTRY_SEQ_NO"
          x-lineageReferenceObject: NTRACAT_APTY_ENTRY_SEQ_NO
        aptyCode:
          title: Approval Type
          maxLength: 30
          type: string
          description: "Lineage reference object : NTRACAT_APTY_CODE, Lookup lineage
            reference object : ntvapty"
          x-lineageReferenceObject: NTRACAT_APTY_CODE
          x-lineageLookupReferenceObject: ntvapty
      x-lineageReferenceObject: NTRACAT
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    electronic-approval-category-rule-1.0.0_get_response:
      type: object
      properties:
        ntracat:
          type: array
          items:
            required:
              - aptyCode
              - aptyEntrySeqNo
            type: object
            properties:
              activityDate:
                maxLength: 26
                type: string
                description: "Lineage reference object : NTRACAT_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: NTRACAT_ACTIVITY_DATE
              aptyEntrySeqNo:
                title: Approval Type Entry Sequence Number
                maxLength: 2
                type: number
                description: "Lineage reference object : NTRACAT_APTY_ENTRY_SEQ_NO"
                x-lineageReferenceObject: NTRACAT_APTY_ENTRY_SEQ_NO
              typeDesc:
                title: Description
                type: string
              aptyCode:
                title: Approval Type
                maxLength: 30
                type: string
                description: "Lineage reference object : NTRACAT_APTY_CODE, Lookup lineage
                  reference object : ntvapty"
                x-lineageReferenceObject: NTRACAT_APTY_CODE
                x-lineageLookupReferenceObject: ntvapty
              defaultOverrideInd:
                maxLength: 1
                type: string
              userId:
                maxLength: 30
                type: string
                description: "Lineage reference object : NTRACAT_USER_ID"
                x-lineageReferenceObject: NTRACAT_USER_ID
            x-lineageReferenceObject: ntracat
        ntraclv:
          type: array
          items:
            required:
              - actionInd
              - alvlCode
            type: object
            properties:
              activityDate:
                maxLength: 26
                type: string
                description: "Lineage reference object : NTRACLV_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: NTRACLV_ACTIVITY_DATE
              level:
                title: Level
                maxLength: 6
                type: number
              actionInd:
                title: Required Action
                maxLength: 30
                type: string
                description: "Lineage reference object : NTRACLV_ACTION_IND"
                x-lineageReferenceObject: NTRACLV_ACTION_IND
              userId:
                maxLength: 30
                type: string
                description: "Lineage reference object : NTRACLV_USER_ID"
                x-lineageReferenceObject: NTRACLV_USER_ID
              alvlCode:
                title: Level Code
                maxLength: 30
                type: string
                description: "Lineage reference object : NTRACLV_ALVL_CODE, Lookup lineage
                  reference object : ntralvl"
                x-lineageReferenceObject: NTRACLV_ALVL_CODE
                x-lineageLookupReferenceObject: ntralvl
              desc:
                title: Description
                type: string
            x-lineageReferenceObject: ntraclv
    electronic-approval-category-rule-1.0.0_qapi_post:
      required:
        - acatCode
      type: object
      properties:
        acatCode:
          type: string
        aptyCode:
          type: string
        aptyEntrySeqNo:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
