    variables:
      server_url:
        default: localhost
paths:
  /api/ca-mis-success-and-support-services-historical-data-education-goals:
    post:
      tags:
        - ca-mis-success-and-support-services-historical-data-education-goals
      summary: Creates a new resource in SVAMSHD
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-mis-success-and-support-services-historical-data\
                -education-goals-1.0.0_post_request"
            example:
              svamshdDicdCode: 1
              goalCode: AAS
              goalOpt: O
              svamshdEffTerm: 201410
              id: A00030988
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-mis-success-and-support-services-historical-data\
                    -education-goals-1.0.0_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-mis-success-and-support-services-historical-data-education-goals: {}
components:
  schemas:
    ca-mis-success-and-support-services-historical-data-education-goals-1.0.0_post_request:
      type: object
      properties:
        svamshdDicdCode:
          title: District/College ID
          maxLength: 3
          type: string
          description: "Lineage reference object : svamshdDicdCode, Lookup lineage
            reference object : gtvdicd"
          x-lineageReferenceObject: svamshdDicdCode
          x-lineageLookupReferenceObject: gtvdicd
        goalCode:
          title: Goal
          maxLength: 4
          type: string
          description: "Lineage reference object : SVREDGL_GOAL_CODE, Lookup lineage
            reference object : STVGOAL"
          x-lineageReferenceObject: SVREDGL_GOAL_CODE
          x-lineageLookupReferenceObject: STVGOAL
        goalOpt:
          title: Goal Type
          maxLength: 1
          type: string
          description: "Lineage reference object : SVREDGL_GOAL_OPT"
          x-lineageReferenceObject: SVREDGL_GOAL_OPT
        svamshdEffTerm:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : svamshdEffTerm, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: svamshdEffTerm
          x-lineageLookupReferenceObject: stvterm
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: SVREDGL
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-mis-success-and-support-services-historical-data-education-goals-1.0.0_post_response:
      type: object
      properties:
        goalDesc:
          title: Description
          type: string
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SVREDGL_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SVREDGL_ACTIVITY_DATE
        goalCode:
          title: Goal
          maxLength: 4
          type: string
          description: "Lineage reference object : SVREDGL_GOAL_CODE, Lookup lineage
            reference object : STVGOAL"
          x-lineageReferenceObject: SVREDGL_GOAL_CODE
          x-lineageLookupReferenceObject: STVGOAL
        goalOpt:
          title: Goal Type
          maxLength: 1
          type: string
          description: "Lineage reference object : SVREDGL_GOAL_OPT"
          x-lineageReferenceObject: SVREDGL_GOAL_OPT
        dataOrigin:
          title: Source
          maxLength: 30
          type: string
          description: "Lineage reference object : SVREDGL_DATA_ORIGIN"
          x-lineageReferenceObject: SVREDGL_DATA_ORIGIN
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : SVREDGL_USER_ID"
          x-lineageReferenceObject: SVREDGL_USER_ID
      x-lineageReferenceObject: svredgl
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
