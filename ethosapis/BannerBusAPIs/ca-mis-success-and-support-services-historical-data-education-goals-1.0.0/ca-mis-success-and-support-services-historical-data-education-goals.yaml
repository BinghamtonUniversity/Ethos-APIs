openapi: 3.0.0
info:
  title: ca-mis-success-and-support-services-historical-data-education-goals
  description: API for SVAMSHD administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SVAMSHD
  x-source-domain: Student
  x-source-title: MIS Success and Support Services Historical Data (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
