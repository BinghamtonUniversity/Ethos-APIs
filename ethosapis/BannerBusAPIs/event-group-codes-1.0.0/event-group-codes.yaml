openapi: 3.0.0
info:
  title: event-group-codes
  description: API for FRVEGRP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FRVEGRP
  x-source-domain: Finance
  x-source-title: Event Group Validation
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/event-group-codes:
    get:
      tags:
        - event-group-codes
      summary: Return resources from FRVEGRP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: displayEgrpCode
          in: query
          required: false
          schema:
            type: string
        - name: evntCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/event-group-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/event-group-codes:
    post:
      tags:
        - event-group-codes QAPI (Query by POST)
      summary: Return resources from FRVEGRP
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/event-group-codes-1.0.0_get_request"
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/event-group-codes-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    event-group-codes-1.0.0_get_request:
      type: object
      properties:
        displayEgrpCode:
          title: Event Group Code
          maxLength: 6
          type: string
          description: "Lineage reference object : displayEgrpCode, Lookup lineage
            reference object : frvegrp"
          x-lineageReferenceObject: displayEgrpCode
          x-lineageLookupReferenceObject: frvegrp
        evntCode:
          title: Event Code
          maxLength: 30
          type: string
          description: "Lineage reference object : FRREGRP_EVNT_CODE"
          x-lineageReferenceObject: FRREGRP_EVNT_CODE
      x-lineageReferenceObject: FRREGRP
    event-group-codes-1.0.0_get_response:
      type: object
      properties:
        frregrp:
          type: array
          items:
            type: object
            properties:
              evntCode:
                title: Event Code
                maxLength: 30
                type: string
                description: "Lineage reference object : FRREGRP_EVNT_CODE"
                x-lineageReferenceObject: FRREGRP_EVNT_CODE
              desc:
                title: Description
                type: string
            x-lineageReferenceObject: frregrp
        frvegrp:
          type: array
          items:
            required:
              - desc
            type: object
            properties:
              desc:
                title: Description
                maxLength: 35
                type: string
                description: "Lineage reference object : FRVEGRP_DESC"
                x-lineageReferenceObject: FRVEGRP_DESC
            x-lineageReferenceObject: frvegrp
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    event-group-codes-1.0.0_qapi_post:
      type: object
      properties:
        displayEgrpCode:
          type: string
        evntCode:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
