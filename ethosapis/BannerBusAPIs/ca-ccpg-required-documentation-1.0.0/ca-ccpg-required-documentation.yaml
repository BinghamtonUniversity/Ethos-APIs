openapi: 3.0.0
info:
  title: ca-ccpg-required-documentation
  description: API for RVAREQD administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: RVAREQD
  x-source-domain: Financial Aid
  x-source-title: CCPG Required Documentation (California)
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/ca-ccpg-required-documentation:
    get:
      tags:
        - ca-ccpg-required-documentation
      summary: Return resources from RVAREQD
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: aidyCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-ccpg-required-documentation-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - ca-ccpg-required-documentation
      summary: Updates an existing resource in RVAREQD
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-ccpg-required-documentation-1.0.0_put_request"
            example:
              aidyCode: 2021
              docRequiredInd: Y
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-ccpg-required-documentation-1.0.0_put_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    post:
      tags:
        - ca-ccpg-required-documentation
      summary: Creates a new resource in RVAREQD
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-ccpg-required-documentation-1.0.0_post_request"
            example:
              eligCode: A
              aidyCode: 2021
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-ccpg-required-documentation-1.0.0_post_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/ca-ccpg-required-documentation:
    post:
      tags:
        - ca-ccpg-required-documentation QAPI (Query by POST)
      summary: Return resources from RVAREQD
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/ca-ccpg-required-documentation-1.0.0_get_request"
            example:
              aidyCode: 2021
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ca-ccpg-required-documentation-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    ca-ccpg-required-documentation-1.0.0_qapi_post:
      type: object
      properties:
        aidyCode:
          type: string
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    ca-ccpg-required-documentation-1.0.0_put_request:
      required:
        - criteria.rvrreqdEligCode
      type: object
      properties:
        criteria.rvrreqdActivityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : RVRREQD_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: RVRREQD_ACTIVITY_DATE
        criteria.rvrreqdUserId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : RVRREQD_USER_ID"
          x-lineageReferenceObject: RVRREQD_USER_ID
        aidyCode:
          title: Aid Year
          maxLength: 4
          type: string
          description: "Lineage reference object : aidyCode, Lookup lineage reference
            object : robinst,rvbbogw"
          x-lineageReferenceObject: aidyCode
          x-lineageLookupReferenceObject: robinst,rvbbogw
        criteria.rvrreqdDocRequiredInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RVRREQD_DOC_REQUIRED_IND"
          x-lineageReferenceObject: RVRREQD_DOC_REQUIRED_IND
        docRequiredInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RVRREQD_DOC_REQUIRED_IND"
          x-lineageReferenceObject: RVRREQD_DOC_REQUIRED_IND
        criteria.rvrreqdEligCode:
          title: Eligibility Code
          maxLength: 6
          type: string
          description: "Lineage reference object : RVRREQD_ELIG_CODE, Lookup lineage
            reference object : rvvelig"
          x-lineageReferenceObject: RVRREQD_ELIG_CODE
          x-lineageLookupReferenceObject: rvvelig
      x-lineageReferenceObject: RVRREQD
    ca-ccpg-required-documentation-1.0.0_put_response:
      required:
        - eligCode
      type: object
      properties:
        eligCode:
          title: Eligibility Code
          maxLength: 6
          type: string
          description: "Lineage reference object : RVRREQD_ELIG_CODE, Lookup lineage
            reference object : rvvelig"
          x-lineageReferenceObject: RVRREQD_ELIG_CODE
          x-lineageLookupReferenceObject: rvvelig
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : RVRREQD_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: RVRREQD_ACTIVITY_DATE
        reqdEligDesc:
          title: Eligibility Code Description
          type: string
        docRequiredInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RVRREQD_DOC_REQUIRED_IND"
          x-lineageReferenceObject: RVRREQD_DOC_REQUIRED_IND
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : RVRREQD_USER_ID"
          x-lineageReferenceObject: RVRREQD_USER_ID
      x-lineageReferenceObject: rvrreqd
    ca-ccpg-required-documentation-1.0.0_get_response:
      required:
        - eligCode
      type: object
      properties:
        eligCode:
          title: Eligibility Code
          maxLength: 6
          type: string
          description: "Lineage reference object : RVRREQD_ELIG_CODE, Lookup lineage
            reference object : rvvelig"
          x-lineageReferenceObject: RVRREQD_ELIG_CODE
          x-lineageLookupReferenceObject: rvvelig
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : RVRREQD_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: RVRREQD_ACTIVITY_DATE
        reqdEligDesc:
          title: Eligibility Code Description
          type: string
        docRequiredInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RVRREQD_DOC_REQUIRED_IND"
          x-lineageReferenceObject: RVRREQD_DOC_REQUIRED_IND
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : RVRREQD_USER_ID"
          x-lineageReferenceObject: RVRREQD_USER_ID
      x-lineageReferenceObject: rvrreqd
    ca-ccpg-required-documentation-1.0.0_post_response:
      required:
        - eligCode
      type: object
      properties:
        eligCode:
          title: Eligibility Code
          maxLength: 6
          type: string
          description: "Lineage reference object : RVRREQD_ELIG_CODE, Lookup lineage
            reference object : rvvelig"
          x-lineageReferenceObject: RVRREQD_ELIG_CODE
          x-lineageLookupReferenceObject: rvvelig
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : RVRREQD_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: RVRREQD_ACTIVITY_DATE
        reqdEligDesc:
          title: Eligibility Code Description
          type: string
        docRequiredInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RVRREQD_DOC_REQUIRED_IND"
          x-lineageReferenceObject: RVRREQD_DOC_REQUIRED_IND
        userId:
          title: User ID
          maxLength: 30
          type: string
          description: "Lineage reference object : RVRREQD_USER_ID"
          x-lineageReferenceObject: RVRREQD_USER_ID
      x-lineageReferenceObject: rvrreqd
    ca-ccpg-required-documentation-1.0.0_get_request:
      type: object
      properties:
        aidyCode:
          title: Aid Year
          maxLength: 4
          type: string
          description: "Lineage reference object : aidyCode, Lookup lineage reference
            object : robinst,rvbbogw"
          x-lineageReferenceObject: aidyCode
          x-lineageLookupReferenceObject: robinst,rvbbogw
      x-lineageReferenceObject: KEY_BLOCK
    ca-ccpg-required-documentation-1.0.0_post_request:
      required:
        - eligCode
      type: object
      properties:
        eligCode:
          title: Eligibility Code
          maxLength: 6
          type: string
          description: "Lineage reference object : RVRREQD_ELIG_CODE, Lookup lineage
            reference object : rvvelig"
          x-lineageReferenceObject: RVRREQD_ELIG_CODE
          x-lineageLookupReferenceObject: rvvelig
        aidyCode:
          title: Aid Year
          maxLength: 4
          type: string
          description: "Lineage reference object : aidyCode, Lookup lineage reference
            object : robinst,rvbbogw"
          x-lineageReferenceObject: aidyCode
          x-lineageLookupReferenceObject: robinst,rvbbogw
        docRequiredInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RVRREQD_DOC_REQUIRED_IND"
          x-lineageReferenceObject: RVRREQD_DOC_REQUIRED_IND
      x-lineageReferenceObject: RVRREQD
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
