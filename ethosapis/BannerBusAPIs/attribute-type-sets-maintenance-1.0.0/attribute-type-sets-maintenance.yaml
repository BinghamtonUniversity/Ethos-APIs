openapi: 3.0.0
info:
  title: attribute-type-sets-maintenance
  description: API for FTMATTS administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: FTMATTS
  x-source-domain: Finance
  x-source-title: Attribute Type Sets Maintenance form
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/attribute-type-sets-maintenance:
    get:
      tags:
        - attribute-type-sets-maintenance
      summary: Return resources from FTMATTS
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: ftvattsCoasCode
          in: query
          required: false
          schema:
            type: string
        - name: ftvattsValidFoapal
          in: query
          required: false
          schema:
            type: string
        - name: ftvattsCode
          in: query
          required: false
          schema:
            type: string
        - name: atttCode
          in: query
          description: Ftratts Attt Code
          required: false
          schema:
            type: string
          x-lineageReferenceObject: FTRATTS_ATTT_CODE
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/attribute-type-sets-maintenance-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/attribute-type-sets-maintenance:
    post:
      tags:
        - attribute-type-sets-maintenance QAPI (Query by POST)
      summary: Return resources from FTMATTS
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/attribute-type-sets-maintenance-1.0.0_get_request"
            example:
              ftvattsCoasCode: A
              ftvattsCode: G4GFA2GL
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/attribute-type-sets-maintenance-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    attribute-type-sets-maintenance-1.0.0_get_response:
      required:
        - atttCode
      type: object
      properties:
        locnInd:
          maxLength: 1
          type: string
        allInd:
          maxLength: 1
          type: string
        fundInd:
          maxLength: 1
          type: string
        ftvatttDesc:
          title: Description
          type: string
        acctInd:
          maxLength: 1
          type: string
        atttCode:
          title: Ftratts Attt Code
          maxLength: 8
          type: string
          description: "Lineage reference object : FTRATTS_ATTT_CODE"
          x-lineageReferenceObject: FTRATTS_ATTT_CODE
        progInd:
          maxLength: 1
          type: string
        ftvatttStatusInd:
          maxLength: 1
          type: string
        actvInd:
          maxLength: 1
          type: string
        orgnInd:
          maxLength: 1
          type: string
      x-lineageReferenceObject: ftratts
    attribute-type-sets-maintenance-1.0.0_qapi_post:
      type: object
      properties:
        ftvattsCoasCode:
          type: string
        ftvattsValidFoapal:
          type: string
        ftvattsCode:
          type: string
        atttCode:
          title: Ftratts Attt Code
          maxLength: 8
          type: string
          description: "Lineage reference object : FTRATTS_ATTT_CODE"
          x-lineageReferenceObject: FTRATTS_ATTT_CODE
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    attribute-type-sets-maintenance-1.0.0_get_request:
      required:
        - atttCode
      type: object
      properties:
        ftvattsCoasCode:
          title: Ftvatts Coas Code
          maxLength: 30
          type: string
          description: "Lineage reference object : ftvattsCoasCode, Lookup lineage
            reference object : ftvcoas"
          x-lineageReferenceObject: ftvattsCoasCode
          x-lineageLookupReferenceObject: ftvcoas
        ftvattsValidFoapal:
          maxLength: 30
          type: string
          description: "Lineage reference object : ftvattsValidFoapal"
          x-lineageReferenceObject: ftvattsValidFoapal
        atttCode:
          title: Ftratts Attt Code
          maxLength: 8
          type: string
          description: "Lineage reference object : FTRATTS_ATTT_CODE"
          x-lineageReferenceObject: FTRATTS_ATTT_CODE
        ftvattsCode:
          title: Set Code
          maxLength: 8
          type: string
          description: "Lineage reference object : ftvattsCode, Lookup lineage reference
            object : ftvatts"
          x-lineageReferenceObject: ftvattsCode
          x-lineageLookupReferenceObject: ftvatts
      x-lineageReferenceObject: FTRATTS
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
