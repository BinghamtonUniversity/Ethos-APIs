        tbbdetc:
          type: array
          items:
            required:
              - desc
              - detailCode
              - priority
              - typeInd
            type: object
            properties:
              taxCalculation:
                title: Tax Calculation Method
                maxLength: 30
                type: string
              typeInd:
                title: Type
                maxLength: 1
                type: string
                description: "Lineage reference object : TBBDETC_TYPE_IND"
                x-lineageReferenceObject: TBBDETC_TYPE_IND
              taxProfileDescription:
                type: string
              taxProfileStatus:
                maxLength: 1
                type: string
              taxMethod:
                maxLength: 1
                type: string
              taxProfile:
                type: string
              dcatCode:
                title: Category
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBDETC_DCAT_CODE, Lookup lineage
                  reference object : TTVDCAT"
                x-lineageReferenceObject: TBBDETC_DCAT_CODE
                x-lineageLookupReferenceObject: TTVDCAT
              priority:
                title: Priority
                maxLength: 3
                type: string
                description: "Lineage reference object : TBBDETC_PRIORITY"
                x-lineageReferenceObject: TBBDETC_PRIORITY
              detailCode:
                title: Detail Code
                maxLength: 4
                type: string
                description: "Lineage reference object : TBBDETC_DETAIL_CODE"
                x-lineageReferenceObject: TBBDETC_DETAIL_CODE
              tbrdCurrCode:
                title: Currency Code
                maxLength: 30
                type: string
                description: "Lineage reference object : TBRDCUR_CURR_CODE"
                x-lineageReferenceObject: TBRDCUR_CURR_CODE
              desc:
                title: Description
                maxLength: 30
                type: string
                description: "Lineage reference object : TBBDETC_DESC"
                x-lineageReferenceObject: TBBDETC_DESC
            x-lineageReferenceObject: tbbdetc
        tbrdctx:
          type: array
          items:
            required:
              - effDate
              - txprCode
            type: object
            properties:
              effDate:
                title: Effective Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBRDCTX_EFF_DATE"
                format: date-time
                x-lineageReferenceObject: TBRDCTX_EFF_DATE
              taxCalculation:
                title: Tax Calculation Method
                type: string
              displayNchgDate:
                maxLength: 11
                type: string
                format: date-time
              txprCode:
                title: Tax Profile
                maxLength: 30
                type: string
                description: "Lineage reference object : TBRDCTX_TXPR_CODE, Lookup lineage
                  reference object :
                  NEW,TVRTXPR_DATE_TO,NEW,TVRTXPR_TAX_ESTIMATION_MODE,FROM,NEW,\
                  TVVTXPR,TRUNC,SYSDATE,AND,TRUNC,NEW,TVRTXPR_DATE_TO,TRUNC,SYS\
                  DATE,OR,TVRTXPR_DATE_TO,NULL,AND,NEW,TVRTXPR_DATE_FROM,SELECT\
                  ,TRUNC,OLD,TVRTXPR_DATE_FROM,FROM,OLD"
                x-lineageReferenceObject: TBRDCTX_TXPR_CODE
                x-lineageLookupReferenceObject: NEW,TVRTXPR_DATE_TO,NEW,TVRTXPR_TAX_ESTIMATION_MODE,FROM,NEW,TVVTXPR,TRUNC,SYSDATE,AND,TRUNC,NEW,TVRTXPR_DATE_TO,TRUNC,SYSDATE,OR,TVRTXPR_DATE_TO,NULL,AND,NEW,TVRTXPR_DATE_FROM,SELECT,TRUNC,OLD,TVRTXPR_DATE_FROM,FROM,OLD
              tvvtxprDesc:
                title: Tax Profile Description
                type: string
              termDate:
                title: Termination Date
                maxLength: 11
                type: string
                description: "Lineage reference object : TBRDCTX_TERM_DATE"
                format: date-time
                x-lineageReferenceObject: TBRDCTX_TERM_DATE
              detcCode:
                maxLength: 30
                type: string
                description: "Lineage reference object : TBRDCTX_DETC_CODE"
                x-lineageReferenceObject: TBRDCTX_DETC_CODE
            x-lineageReferenceObject: tbrdctx
    multiple-detail-codes-currency-and-tax-profile-1.0.0_qapi_post:
      type: object
      properties:
        detailCode:
          type: string
        desc:
          type: string
        taxProfile:
          type: string
        taxProfileStatus:
          type: string
        taxMethod:
          type: string
        typeInd:
          type: string
        priority:
          type: string
        dcatCode:
          type: string
        tbrdcurCurrCode:
          type: string
        txprCode:
          title: Tax Profile
          maxLength: 30
          type: string
          description: "Lineage reference object : TBRDCTX_TXPR_CODE, Lookup lineage
            reference object :
            NEW,TVRTXPR_DATE_TO,NEW,TVRTXPR_TAX_ESTIMATION_MODE,FROM,NEW,TVVTXP\
