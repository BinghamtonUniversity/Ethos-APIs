          x-lineageReferenceObject: RTVLNST_ACTIVITY_DATE
        code:
          title: Loan Status
          maxLength: 4
          type: string
          description: "Lineage reference object : RTVLNST_CODE"
          x-lineageReferenceObject: RTVLNST_CODE
        desc:
          title: Loan Description
          maxLength: 30
          type: string
          description: "Lineage reference object : RTVLNST_DESC"
          x-lineageReferenceObject: RTVLNST_DESC
        holdInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVLNST_HOLD_IND"
          x-lineageReferenceObject: RTVLNST_HOLD_IND
        inactiveInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVLNST_INACTIVE_IND"
          x-lineageReferenceObject: RTVLNST_INACTIVE_IND
        infoAccessInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVLNST_INFO_ACCESS_IND"
          x-lineageReferenceObject: RTVLNST_INFO_ACCESS_IND
        vrMsgNo:
          title: VR Msg No
          maxLength: 6
          type: number
          description: "Lineage reference object : RTVLNST_VR_MSG_NO"
          x-lineageReferenceObject: RTVLNST_VR_MSG_NO
    loan-statuses-1.0.0_get_request:
      required:
        - code
        - desc
      type: object
      properties:
        holdInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVLNST_HOLD_IND"
          x-lineageReferenceObject: RTVLNST_HOLD_IND
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : RTVLNST_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: RTVLNST_ACTIVITY_DATE
        code:
          title: Loan Status
          maxLength: 4
          type: string
          description: "Lineage reference object : RTVLNST_CODE"
          x-lineageReferenceObject: RTVLNST_CODE
        infoAccessInd:
          maxLength: 1
          type: string
          description: "Lineage reference object : RTVLNST_INFO_ACCESS_IND"
          x-lineageReferenceObject: RTVLNST_INFO_ACCESS_IND
        vrMsgNo:
