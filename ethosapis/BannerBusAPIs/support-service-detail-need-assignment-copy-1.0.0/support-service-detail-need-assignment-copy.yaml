openapi: 3.0.0
info:
  title: support-service-detail-need-assignment-copy
  description: API for SEADETL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SEADETL
  x-source-domain: Student
