                type: string
            x-lineageReferenceObject: scrsytr
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    course-syllabus-1.0.0_put_request:
      type: object
      properties:
        crseNumb:
          title: Course
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseCrseNumb, Lookup lineage
            reference object : scbcrse,scbcrky"
          x-lineageReferenceObject: scacrseCrseNumb
          x-lineageLookupReferenceObject: scbcrse,scbcrky
        technicalRequirement:
          maxLength: 32767
          description: "Lineage reference object : SCRSYTR_TECHNICAL_REQUIREMENT"
          x-lineageReferenceObject: SCRSYTR_TECHNICAL_REQUIREMENT
        termCodeEff:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseTermCodeEff, Lookup lineage
