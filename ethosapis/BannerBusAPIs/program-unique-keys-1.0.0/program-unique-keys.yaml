openapi: 3.0.0
info:
  title: program-unique-keys
  description: API for GOANPID administrative page
  version: 1.0.0
  extensions:
    x-audience: all
    x-release-status: ga
    x-source-name: GOANPID
    x-source-domain: Foundation
    x-source-title: General Overall Administration Non-Person Identity Details
    x-source-system: banner
    x-api-type: bus-poc
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
  description: Ethos Integration API Canada
- url: https://integrate.elluciancloud.ie
  description: Ethos Integration API Europe
- url: https://integrate.elluciancloud.com.au
  description: Ethos Integration API Asia-Pacific
- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/program-unique-keys:
    get:
      tags:
      - program-unique-keys
      summary: Return resources from GOANPID
      parameters:
      - name: X-SDE-Expand
        in: header
        description: The comma separated value list of block names
        required: false
        schema:
          type: string
          exampleSetFlag: false
      - name: limit
        in: query
        description: The maximum number of resources requesting for this result set.
        required: false
        schema:
          type: integer
          exampleSetFlag: false
      - name: offset
        in: query
        description: The 0 based index for a collection of resources for the page
          requested.
        required: false
        schema:
          type: integer
          exampleSetFlag: false
      - name: criteria
        in: query
        description: The filter criteria as a single URL query parameter. Use this
          parameter or the individual parameters listed. Must be a JSON representation
          of the property searching for. This can be any of the properties listed
          on the URL or QAPI and must be a json representation that can be validated
          against the GET schema. Limit and Offset are the only supported additional
          parameters on the URL.
        required: false
        schema:
          type: string
          exampleSetFlag: false
      - name: termcode
        in: query
        required: false
        schema:
          type: string
          exampleSetFlag: false
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
                exampleSetFlag: false
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
                exampleSetFlag: false
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
                exampleSetFlag: false
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                exampleSetFlag: false
                items:
                  $ref: "#/components/schemas/program-unique-keys-1.0.0_get_response"
                  exampleSetFlag: false
                types:
                - array
              exampleSetFlag: false
        "401":
          description: Failure. Unauthorized
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                exampleSetFlag: false
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
                  exampleSetFlag: false
                types:
                - array
              exampleSetFlag: false
      security:
      - BasicAuth: []
        EllucianOAuthUserToken: []
    post:
      tags:
      - program-unique-keys
      summary: Creates a new resource in GOANPID
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/program-unique-keys-1.0.0_post_request"
              exampleSetFlag: false
            example:
              major: 1120
              keyValue: HND FOUND~F2~1120~HIST
              campus: F2
              concentration: HIST
              termcode: 202730
              programId: HND FOUND
            exampleSetFlag: true
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
                exampleSetFlag: false
            X-STP-Code:
              description: "If STP (MEP) is enabled, returns the MEP code the response\
                \ body is associated to"
              schema:
                type: string
                exampleSetFlag: false
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
                exampleSetFlag: false
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                exampleSetFlag: false
                items:
                  $ref: "#/components/schemas/program-unique-keys-1.0.0_post_response"
                  exampleSetFlag: false
                types:
