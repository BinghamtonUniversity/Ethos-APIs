openapi: 3.0.0
info:
  title: applicant-information-status-log
  description: API for PAAAPPL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: PAAAPPL
  x-source-domain: Human Resources
  x-source-title: Applicant Information
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/applicant-information-status-log:
    get:
      tags:
        - applicant-information-status-log
      summary: Return resources from PAAAPPL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/applicant-information-status-log-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/applicant-information-status-log:
    post:
      tags:
        - applicant-information-status-log QAPI (Query by POST)
      summary: Return resources from PAAAPPL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/applicant-information-status-log-1.0.0_get_request"
            example:
              id: P002
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/applicant-information-status-log-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    applicant-information-status-log-1.0.0_get_response:
      required:
        - appsDate
        - seqNo
      type: object
      properties:
        appsCode:
          title: Status
          maxLength: 2
          type: string
          description: "Lineage reference object : PARAPST_APPS_CODE"
          x-lineageReferenceObject: PARAPST_APPS_CODE
        activityDate:
          maxLength: 11
          type: string
          description: "Lineage reference object : PARAPST_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: PARAPST_ACTIVITY_DATE
        seqNo:
          title: Sequence Number
          maxLength: 3
          type: number
          description: "Lineage reference object : PARAPST_SEQ_NO"
          x-lineageReferenceObject: PARAPST_SEQ_NO
        comment:
          title: Comment
          maxLength: 32767
          type: string
          description: "Lineage reference object : PARAPST_COMMENT"
          x-lineageReferenceObject: PARAPST_COMMENT
        appsDesc:
          maxLength: 30
          type: string
        userId:
          maxLength: 30
          type: string
          description: "Lineage reference object : PARAPST_USER_ID"
          x-lineageReferenceObject: PARAPST_USER_ID
        appsDate:
          title: Status Date
          maxLength: 11
          type: string
          description: "Lineage reference object : PARAPST_APPS_DATE"
          format: date-time
          x-lineageReferenceObject: PARAPST_APPS_DATE
      x-lineageReferenceObject: parapst
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    applicant-information-status-log-1.0.0_get_request:
      type: object
      properties:
        id:
          title: ID
          maxLength: 9
          type: string
          description: "Lineage reference object : id"
          x-lineageReferenceObject: id
      x-lineageReferenceObject: KEY_BLOCK
    applicant-information-status-log-1.0.0_qapi_post:
      type: object
      properties:
        id:
          type: string
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
