openapi: 3.0.0
info:
  title: group-requirements-group-texts
  description: API for SMAGROP administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: ga
  x-source-name: SMAGROP
  x-source-domain: Student
  x-source-title: Group Requirements
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/group-requirements-group-texts:
    get:
      tags:
        - group-requirements-group-texts
      summary: Return resources from SMAGROP
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: group
          in: query
          required: false
          schema:
            type: string
        - name: keyblckTermCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/group-requirements-group-texts-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/group-requirements-group-texts:
    post:
      tags:
        - group-requirements-group-texts QAPI (Query by POST)
      summary: Return resources from SMAGROP
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/group-requirements-group-texts-1.0.0_get_request"
            example:
              keyblckTermCode: 201410
              group: PRCAT_G_01
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/group-requirements-group-texts-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    group-requirements-group-texts-1.0.0_qapi_post:
      type: object
      properties:
        group:
          type: string
        keyblckTermCode:
          type: string
    group-requirements-group-texts-1.0.0_get_response:
      type: object
      properties:
        smrgcmt:
          type: array
          items:
            type: object
            properties:
              prntCode:
                title: Print
                maxLength: 30
                type: string
                description: "Lineage reference object : SMRGCMT_PRNT_CODE, Lookup lineage
                  reference object : stvprnt"
                x-lineageReferenceObject: SMRGCMT_PRNT_CODE
                x-lineageLookupReferenceObject: stvprnt
              maint:
                maxLength: 1
                type: string
              text:
                title: Text
                maxLength: 60
                type: string
                description: "Lineage reference object : SMRGCMT_TEXT"
                x-lineageReferenceObject: SMRGCMT_TEXT
            x-lineageReferenceObject: smrgcmt
        smrgcmt_ctrl_block:
          type: array
          items:
            type: object
            properties:
              smrgcmtTermCodeFrom:
                title: From Term
                maxLength: 6
                type: string
                description: "Lineage reference object : SMRGCMT_TERM_CODE_FROM"
                x-lineageReferenceObject: SMRGCMT_TERM_CODE_FROM
              smrgcmtTermCodeTo:
                title: To Term
                maxLength: 6
                type: string
                description: "Lineage reference object : SMRGCMT_TERM_CODE_TO"
                x-lineageReferenceObject: SMRGCMT_TERM_CODE_TO
            x-lineageReferenceObject: smrgcmt_ctrl_block
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    group-requirements-group-texts-1.0.0_get_request:
      type: object
      properties:
        keyblckTermCode:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : KEYBLCK_TERM_CODE, Lookup lineage
            reference object : stvterm"
          x-lineageReferenceObject: KEYBLCK_TERM_CODE
          x-lineageLookupReferenceObject: stvterm
        group:
          title: Group
          maxLength: 30
          type: string
          description: "Lineage reference object : GROUP, Lookup lineage reference object
            : smbggen,smrglib"
          x-lineageReferenceObject: GROUP
          x-lineageLookupReferenceObject: smbggen,smrglib
      x-lineageReferenceObject: KEY_BLOCK
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
