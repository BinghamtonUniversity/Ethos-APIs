openapi: 3.0.0
info:
  title: course-detail-information-integration-partners
  description: API for SCADETL administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SCADETL
  x-source-domain: Student
  x-source-title: Course Detail Information
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/course-detail-information-integration-partners:
    get:
      tags:
        - course-detail-information-integration-partners
      summary: Return resources from SCADETL
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: scacrseSubjCode
          in: query
          required: false
          schema:
            type: string
        - name: scacrseCrseNumb
          in: query
          required: false
          schema:
            type: string
        - name: scacrseTermCodeEff
          in: query
          required: false
          schema:
            type: string
        - name: intgCde
          in: query
          description: Integration Partners
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SCRINTG_INTG_CDE
        - name: activityDate
          in: query
          description: Activity Date
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SCRINTG_ACTIVITY_DATE
        - name: userId
          in: query
          description: User ID
          required: false
          schema:
            type: string
          x-lineageReferenceObject: SCRINTG_USER_ID
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/course-detail-information-integration-partners-1.0.\
                    0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
  /qapi/course-detail-information-integration-partners:
    post:
      tags:
        - course-detail-information-integration-partners QAPI (Query by POST)
      summary: Return resources from SCADETL
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/course-detail-information-integration-partners-1.0.\
                0_get_request"
            example:
              scacrseCrseNumb: 106
              scacrseSubjCode: AC
              scacrseTermCodeEff: 201009
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/course-detail-information-integration-partners-1.0.\
                    0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
components:
  schemas:
    course-detail-information-integration-partners-1.0.0_get_request:
      required:
        - intgCde
      type: object
      properties:
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SCRINTG_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SCRINTG_ACTIVITY_DATE
        scacrseCrseNumb:
          title: Course
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseCrseNumb, Lookup lineage
            reference object : scbcrse,scbcrky"
          x-lineageReferenceObject: scacrseCrseNumb
          x-lineageLookupReferenceObject: scbcrse,scbcrky
        scacrseSubjCode:
          title: Subject
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseSubjCode, Lookup lineage
            reference object : stvsubj"
          x-lineageReferenceObject: scacrseSubjCode
          x-lineageLookupReferenceObject: stvsubj
        intgCde:
          title: Integration Partners
          maxLength: 30
          type: string
          description: "Lineage reference object : SCRINTG_INTG_CDE"
          x-lineageReferenceObject: SCRINTG_INTG_CDE
        scacrseTermCodeEff:
          title: Term
          maxLength: 30
          type: string
          description: "Lineage reference object : scacrseTermCodeEff, Lookup lineage
            reference object : stvterm,scbcrky,scbcrky"
          x-lineageReferenceObject: scacrseTermCodeEff
          x-lineageLookupReferenceObject: stvterm,scbcrky,scbcrky
        userId:
          title: User ID
          maxLength: 11
          type: string
          description: "Lineage reference object : SCRINTG_USER_ID"
          x-lineageReferenceObject: SCRINTG_USER_ID
      x-lineageReferenceObject: SCRINTG
    errors-2.0.0:
      required:
        - errors
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              description:
                type: string
    course-detail-information-integration-partners-1.0.0_qapi_post:
      type: object
      properties:
        scacrseSubjCode:
          type: string
        scacrseCrseNumb:
          type: string
        scacrseTermCodeEff:
          type: string
        intgCde:
          title: Integration Partners
          maxLength: 30
          type: string
          description: "Lineage reference object : SCRINTG_INTG_CDE"
          x-lineageReferenceObject: SCRINTG_INTG_CDE
        activityDate:
          title: Activity Date
          maxLength: 11
          type: string
          description: "Lineage reference object : SCRINTG_ACTIVITY_DATE"
          format: date-time
          x-lineageReferenceObject: SCRINTG_ACTIVITY_DATE
        userId:
          title: User ID
          maxLength: 11
          type: string
          description: "Lineage reference object : SCRINTG_USER_ID"
          x-lineageReferenceObject: SCRINTG_USER_ID
    course-detail-information-integration-partners-1.0.0_get_response:
      type: object
      properties:
        scacrse_key_block:
          type: array
          items:
            type: object
            properties:
              crseTitle:
                title: Course Title
                type: string
                description: "Lineage reference object : crseTitle"
                x-lineageReferenceObject: crseTitle
              scacrseCrseNumb:
                title: Course
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseCrseNumb, Lookup lineage
                  reference object : scbcrse,scbcrky"
                x-lineageReferenceObject: scacrseCrseNumb
                x-lineageLookupReferenceObject: scbcrse,scbcrky
              subjDescription:
                type: string
                description: "Lineage reference object : subjDescription"
                x-lineageReferenceObject: subjDescription
              scacrseSubjCode:
                title: Subject
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseSubjCode, Lookup lineage
                  reference object : stvsubj"
                x-lineageReferenceObject: scacrseSubjCode
                x-lineageLookupReferenceObject: stvsubj
              scacrseTermCodeEff:
                title: Term
                maxLength: 30
                type: string
                description: "Lineage reference object : scacrseTermCodeEff, Lookup lineage
                  reference object : stvterm,scbcrky,scbcrky"
                x-lineageReferenceObject: scacrseTermCodeEff
                x-lineageLookupReferenceObject: stvterm,scbcrky,scbcrky
            x-lineageReferenceObject: scacrse_key_block
        intg_ctlr_block:
          type: array
          items:
            type: object
            properties:
              scrintgTermCodeTo:
                title: To Term
                maxLength: 6
                type: string
                description: "Lineage reference object : scrintgTermCodeTo"
                x-lineageReferenceObject: scrintgTermCodeTo
              scrintgTermCodeFrom:
                title: From Term
                maxLength: 6
                type: string
                description: "Lineage reference object : scrintgTermCodeFrom"
                x-lineageReferenceObject: scrintgTermCodeFrom
            x-lineageReferenceObject: intg_ctlr_block
        scrintg:
          type: array
          items:
            required:
              - intgCde
            type: object
            properties:
              activityDate:
                title: Activity Date
                maxLength: 11
                type: string
                description: "Lineage reference object : SCRINTG_ACTIVITY_DATE"
                format: date-time
                x-lineageReferenceObject: SCRINTG_ACTIVITY_DATE
              intgDescription:
                title: Description
                type: string
              intgCde:
                title: Integration Partners
                maxLength: 30
                type: string
                description: "Lineage reference object : SCRINTG_INTG_CDE"
                x-lineageReferenceObject: SCRINTG_INTG_CDE
              userId:
                title: User ID
                maxLength: 11
                type: string
                description: "Lineage reference object : SCRINTG_USER_ID"
                x-lineageReferenceObject: SCRINTG_USER_ID
            x-lineageReferenceObject: scrintg
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EllucianOAuthUserToken:
      type: http
      scheme: bearer
    EthosIntegrationBearer:
      type: http
      scheme: bearer
