openapi: 3.0.0
info:
  title: enrollment-status-control
  description: API for SFAESTS administrative page
  version: 1.0.0
  x-audience: all
  x-release-status: beta
  x-source-name: SFAESTS
  x-source-domain: Student
  x-source-title: Enrollment Status Control Form
  x-source-system: banner
  x-api-type: bus-poc
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/enrollment-status-control:
    get:
      tags:
        - enrollment-status-control
      summary: Return resources from SFAESTS
      parameters:
        - name: X-SDE-Expand
          in: header
          description: The comma seperated value list of block names
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of resources requesting for this result set.
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: The 0 based index for a collection of resources for the page
            requested.
          required: false
          schema:
            type: integer
        - name: criteria
          in: query
          description: The filter criteria as a single URL query parameter. Use this
            parameter or the individual parameters listed. Must be a JSON
            representation of the property searching for. This can be any of the
            properties listed on the URL or QAPI and must be a json
            representation that can be validated against the GET schema. Limit
            and Offset are the only supported additional parameters on the URL.
          required: false
          schema:
            type: string
        - name: xxxxxxxTermCode
          in: query
          required: false
          schema:
            type: string
        - name: xxxxxxxTermCodeDef
          in: query
          required: false
          schema:
            type: string
        - name: criteria.estsCode
          in: query
          required: false
          schema:
            type: string
        - name: criteria.stvestsDesc
          in: query
          required: false
          schema:
            type: string
        - name: criteria.startDate
          in: query
          required: false
          schema:
            type: string
        - name: criteria.endDate
          in: query
          required: false
          schema:
            type: string
        - name: activityDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response
              schema:
                type: string
            X-STP-Code:
              description: If STP (MEP) is enabled, returns the MEP code the response body is
                associated to
              schema:
                type: string
            X-SDE-Enabled:
              description: If SDE is enabled for this page
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/enrollment-status-control-1.0.0_get_response"
        "400":
          description: Error
          content:
            application/vnd.hedtech.integration.errors.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/errors-2.0.0"
        "401":
          description: Failure. Unauthorized
      security:
        - BasicAuth: []
          EllucianOAuthUserToken: []
          EthosIntegrationBearer: []
    put:
      tags:
        - enrollment-status-control
      summary: Updates an existing resource in SFAESTS
      parameters: []
      requestBody:
        content:
          application/vnd.hedtech.integration.v1.0.0+json:
            schema:
              $ref: "#/components/schemas/enrollment-status-control-1.0.0_put_request"
            example:
              estsCode: 1A
              fromDate: 2021-01-01
              endDate: 2021-01-01
              xxxxxxxTermCode: TERM20
              toDate: 2021-01-01
              feesRefund: 50
              xxxxxxxTermCodeDef: TERM20
