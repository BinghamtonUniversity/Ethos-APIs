        roles:
          title: Role
          description: The roles that a person fills as he/she interacts with the
            institution.
          type: array
          items:
            type: object
            properties:
              role:
                title: Role
                description: The actions and activities assigned to, required of, or expected of
                  a person. For example, the roles of "Faculty" or "Student".
                enum:
                  - student
                  - instructor
                  - employee
                  - vendor
                  - alumni
                  - prospectiveStudent
                  - advisor
                type: string
              startOn:
                title: Start Date
                description: The date when a person starts filling a role.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
              endOn:
                title: End Date
                description: The date when a person stops filling a role.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
            additionalProperties: false
            required:
              - role
