openapi: 3.0.0
info:
  title: Persons
  description: >
    An individual who interacts independently with the institution in a variety
    of roles (for example: student, constituent or vendor)


    ISO code configurations for countries, regions and subregions should be configured appropriately. Please refer to "Additional configuration for the persons and addresses APIs" section in Banner Ethos API handbook.


    This resource supports a query by POST operation. Using the Servers base URL with the QAPI path, a POST operation will perform a query based on the search criteria included in request body.
  version: "12.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: persons
  - name: persons QAPI
paths:
  /api/persons:
    get:
      summary: Returns resources from SPRIDEN
      description: >
        Returns a paged listing of all the person records from SPRIDEN where
        SPRIDEN_ENTITY_IND ='P'.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSONS
      tags:
        - persons
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 500.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Title  

            Returns all persons records with title equals the value passed. Filter is done only on the current name records (SPRIDEN_CHANGE_IND = null).

            ```

            /persons?criteria={"names":[{"title":"Mr."}]}

            ```

            ### First Name  

            Returns all persons records whose first name starts with the value passed. Filter is done only on the current name records (SPRIDEN_CHANGE_IND = null).

            ```

            /persons?criteria={"names":[{"firstName":"James"}]}

            ```

            ### Middle Name  

            Returns all persons records whose middle name contains the value passed. Filter is done only on the current name records (SPRIDEN_CHANGE_IND = null).

            ```

            /persons?criteria={"names":[{"middleName":"Emory"}]}

            ```

            ### Last Name Prefix  

            Returns all persons records with last name prefix equals the value passed. Filter is done only on the current name records (SPRIDEN_CHANGE_IND = null).

            ```

            /persons?criteria={"names":[{"lastNamePrefix":"Van"}]}

            ```

            ### Last Name  

            Returns all persons records whose last name starts with the value passed. Filter is done only on the current name records (SPRIDEN_CHANGE_IND = null).

            ```

            /persons?criteria={"names":[{"lastName":"Abbot"}]}

            ```

            ### Role  

            Returns all persons for the role passed.

            ```

            /persons?criteria={"roles":[{"role":"instructor"}]}

            ```

            ### Credentials  

            Returns all persons for the credential type and value passed

            ```

            /persons?criteria={"credentials":[{"type":"bannerId","value":"A00000718"}]}

            ```

            ### Alternative Credentials  

            Returns persons for the alternative credentials passed. Both alternative credential type and value are required.

            ```

            /persons?criteria={"alternativeCredentials":[{"type":{"id":"6cc4a853-2ff4-4ef3-9595-5d3eddcbbbcd"},"value":"DEANNE"}]}

            ```

            ### Email Address  

            Returns all persons who have the email address passed. Filter will search for all active email records with email types mapped in GORICCR setting EMAILS.EMAILTYPE.

            ```

            /persons?criteria={"emails":[{"address":"sample@ellucian.xyz"}]}

            ```
        - name: personFilter
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Person Filter  

            Returns all persons for the person population selection filter id passed.

            ```

            /persons?personFilter={"personFilter":"6729a17e-3dfa-4517-95df-acdf160c24ab"}

            ```

            ```

            /persons?personFilter={"personFilter":{"id":"cb3ebfe9-4a31-4933-a504-04d110413a29"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-persons.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12.3.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in SPRIDEN
      description: >
        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.


        Creates a new person record in SPRIDEN.


        Minimum required properties for a POST request: id, names.firstName, names.lastName


        Below are the API behavior details for names, ethnicities and credentials properties on a create request:


        Names


        - Banner requires one name to be 'current' i.e. SPRIDEN_CHANGE_IND = null. When one name is sent in the create request, person record is created in SPRIDEN with this name as current name.

        - When multiple names are sent in the create request, a name with preference = preferred will be considered as current. If preference is not sent with any name then a name without a name type is considered as current. If both preference and name without name type is not sent, then the 'PERSON.NAMES.HIERARCHY' API configuration setting that defines the hierarchy of the name type is considered to decide which name is considered current.

        - When a name with legal name type is sent without the first and last name, the API processes the create request and stores the name as full legal name in SPBPERS_LEGL_NAME field

        - When a name with favored name type is sent, the API processes the create request by creating SPRIDEN record and additionally populates the preffered first name in SPBPERS_PREF_FIRST_NAME field

        - Full name is not a stored value and will be ignored if sent in the create request


        Ethnicities


        - If the value mapped in API configuration setting 'PERSON.ETHNICITY.FIELDS.USED' is 'C' then the API considers the hispanic and nonHispanic ethnicity categories defined in GORGUID table and stores the person ethnicity in 'STVETHN_ETHN_CDE' field

        - If setting in API configuration setting 'PERSON.ETHNICITY.FIELDS.USED' is 'E' then the API considers the ethnicity records from STVETHN table and stored the person ethnicity in 'SPBPERS_ETHN_CODE' field


        Credentials


        - SSN - If the ISO nation code configured in STVNATN_SCOD_CODE_ISO for the home institution nation code in GUBINST_NATN_CODE is US or USA, the SSN value sent in the create request is stored in the Banner baseline field SPBPERS_SSN. If the home institution is any other country then the SSN value in the create request is stored in the Ethos integration field SPBPERSS_SSN

        - SIN - If the ISO nation code configured in STVNATN_SCOD_CODE_ISO for the home institution nation code in GUBINST_NATN_CODE is CA or CAN, the SIN value sent in the create request is stored in the Banner baseline field SPBPERS_SSN. If the home institution is any other country then the SIN value in the create request is stored in the Ethos integration field SPBPERSS_SIN

        - Tax Identification Number - If the ISO nation code configured in STVNATN_SCOD_CODE_ISO for the home institution nation code in GUBINST_NATN_CODE is other than US or USA and CA or CAN, the taxIdentificationNumber value sent in the create request is stored in the Banner baseline field SPBPERS_SSN. If the home institution is USA or CAN, the value is stored in the Ethos integration field SPBPERSS_TIN
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSONS
      tags:
        - persons
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12.3.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v12.3.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-persons.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v12+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-persons.json"
  /api/persons/{id}:
    get:
      summary: Return the requested resource from SPRIDEN
      description: |
        Returns a single SPRIDEN resource with the requested identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSONS
      tags:
        - persons
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12.3.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v12.3.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-persons.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    put:
      summary: Update the requested resource from SPRIDEN
      description: >
        Updates an existing SPRIDEN record. Note that the properties roles and
        credentials.type = bannerUdcId cannot be changed.


        Please refer to the notes in POST section of this document for API behavior details on names, ethnicities and credentials properties.


        Minimum required properties for a PUT request: id, names.firstName, names.lastName
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSONS
      tags:
        - persons
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Persons for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v12+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v12+json 

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12.3.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v12.3.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-persons.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v12+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-persons.json"
  /qapi/persons:
    post:
      summary: Returns resources from SPRIDEN
      description: >
        Queries for the requested resource using a set of attributes provided in
        the POST request body. Please note the path to the server is overriden
        to use /qapi/{resource} in the URL and not /api/{resource}.


        This API allows to search for persons based on given search criteria. The search criteria can be specified in the request body.


        - The V12 version of person search QAPI supports :

        - Search based on all the name types.

        - Search based on first name, last name, bannerId, gender, SSN, date of birth, emails.


        - Searching person while having multiple name types together in the request body is not supported. The appropriate error will be thrown.

        - First name and last name are required.

        - ‘PERSON.MATCHRULE’ setting should be configured with the matching source code (GTVCMSC_CODE) in the API Management Center. The QAPI performs person duplicate check based on the rules defined for this matching source code in the common matching source rules form GORCMSC.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSONS
      tags:
        - persons QAPI
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12.3.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v12.3.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-persons.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v12+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-persons.json"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-persons.json:
      title: Persons
      description: An individual who interacts independently with the institution in a
        variety of roles (for example, "student", "constituent", or "vendor").
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: A global identifier of a person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        privacyStatus:
          title: Privacy Status
          description: A privacy status of person's information.
          oneOf:
            - type: object
              properties:
                privacyCategory:
                  title: Privacy Category
                  description: The global category of information privacy protection.
                  enum:
                    - unrestricted
                    - restricted
                  type: string
                detail:
                  title: Detail
                  description: ""
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Detail.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: privacy-statuses
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
              additionalProperties: false
              required:
                - privacyCategory
            - type: object
              maxProperties: 0
        names:
          title: Names
          description: The names associated with a person, specified by type (for example,
            "legal" or "birth").
          type: array
          minItems: 1
          items:
            type: object
            properties:
              type:
                title: Name Type
                description: The type of a person's name being defined. For example, a "Primary"
                  name.
                oneOf:
                  - type: object
                    properties:
                      category:
                        title: Name Type Category
                        description: The global category of person name types.
                        enum:
                          - personal
                          - birth
                          - legal
                          - favored
                        type: string
                      detail:
                        title: Detail
                        description: The type of a person's name being defined.
                        oneOf:
                          - type: object
                            properties:
                              id:
                                title: ID
                                description: The global identifier for the Detail.
                                type: string
                                format: guid
                                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                                x-lineageLookupReferenceObject: person-name-types
                            additionalProperties: false
                            required:
                              - id
                          - type: object
                            maxProperties: 0
                    additionalProperties: false
                    required:
                      - category
                  - type: object
                    maxProperties: 0
              preference:
                title: Name Preference
                description: Indicates the preferred name for the person. Only one name should
                  be set to preferred for a person.
                oneOf:
                  - type: string
                    enum:
                      - preferred
                  - type: string
                    maxLength: 0
              fullName:
                title: Full Name
                description: The person's full name.
                type: string
                minLength: 1
              title:
                title: Title
                description: The person's title. For example, "Mr.", "Mrs.", or "Dr.".
                type: string
              firstName:
                title: First Name
                description: The person's first, or given, name.
                type: string
              middleName:
                title: Middle Name
                description: The person's middle name.
                type: string
              lastNamePrefix:
                title: Last Name Prefix
                description: The article or preposition portion of a person's last name. For
                  example, "De la", "Van", or "Van der Von".
                type: string
              lastName:
                title: Last Name
                description: The person's last, or family, name.
                type: string
              pedigree:
                title: Pedigree/Suffix
                description: The person's pedigree. For example, "Jr." or "Sr.".
                type: string
              professionalAbbreviations:
                title: Professional Abbreviation
                description: A post-nominal professional abbreviation, reflecting an earned
                  degree or honor. For example, "M.D." or "Ph.D.".
                type: array
                items:
                  type: string
            additionalProperties: false
            required:
              - fullName
        dateOfBirth:
          title: Date of Birth
          description: The date when a person was born.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            - type: string
              maxLength: 0
        dateDeceased:
          title: Date Deceased
          description: The date when a person died.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            - type: string
              maxLength: 0
        gender:
          title: Gender
          description: The biological or social cultural masculinity or femininity of the
            person.
          oneOf:
            - type: string
              enum:
                - male
                - female
                - unknown
            - type: string
              maxLength: 0
        religion:
          title: Religion
          description: The religion of the person.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Religion.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: religions
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        ethnicity:
          title: Ethnicity
          description: The ethnicity association of the person.
          type: object
          properties:
            ethnicGroup:
              title: Ethnic Group
              description: The ethnic group with which the person identifies.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Ethnic Group.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: ethnicities
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
            reporting:
              title: Reporting
              description: Properties required for governmental or other reporting.
              type: array
              items:
                type: object
                properties:
                  country:
                    title: Country
                    description: The country with specific reporting requirements.
                    oneOf:
                      - title: USA
                        description: Reporting requirements for the United States of America
                        type: object
                        properties:
                          code:
                            title: Code
                            description: The country code for the United States of America.
                            enum:
                              - USA
                            type: string
                          ethnicCategory:
                            title: Ethnic Category
                            description: The category of ethnic origin to which a person belongs.
                            enum:
                              - hispanic
                              - nonHispanic
                            type: string
                        additionalProperties: false
                        required:
                          - code
                          - ethnicCategory
                additionalProperties: false
          additionalProperties: false
        races:
          title: Races
          description: The racial groups to which a person belongs.
          type: array
          items:
            type: object
            properties:
              race:
                title: Race
                description: The race to which a person belongs.
                oneOf:
                  - type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Race.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: races
                    additionalProperties: false
                    required:
                      - id
                  - type: object
                    maxProperties: 0
              reporting:
                title: Reporting
                description: Properties required for governmental or other reporting.
                type: array
                items:
                  type: object
                  properties:
                    country:
                      title: Country
                      description: The country with specific reporting requirements.
                      oneOf:
                        - title: USA
                          description: Reporting requirements for the United States of America
                          type: object
                          properties:
                            code:
                              title: Code
                              description: The country code for the United States of America.
                              enum:
                                - USA
