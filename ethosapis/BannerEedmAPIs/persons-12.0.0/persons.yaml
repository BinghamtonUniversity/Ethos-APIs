              type:
                title: Type
                description: A type of address for a person. Includes a standard type (e.g.
                  'home', 'school') and an optional, custom type to further
                  identify the type of address.
                type: object
                properties:
                  addressType:
                    title: Type
                    description: A mapping to a standard type for the address type.
                    enum:
                      - home
                      - school
                      - vacation
                      - billing
                      - shipping
                      - mailing
                      - business
                      - parent
                      - family
                      - pobox
                      - main
                      - branch
                      - region
                      - support
                      - matchingGifts
                      - other
                    type: string
                  detail:
                    title: Detail
                    description: ""
                    oneOf:
                      - type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Detail.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: address-types
                        additionalProperties: false
                        required:
                          - id
                      - type: object
                        maxProperties: 0
                additionalProperties: false
                required:
                  - addressType
              startOn:
                title: Start On
                description: The earliest date that this address was valid for the person.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
              endOn:
                title: End On
                description: The latest date when this address was valid for the person.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
              preference:
                title: Preferred Address
                description: Specifies if the address is preferred over others of the same type.
                  Only one address should be set to primary for a person.
                oneOf:
                  - type: string
                    enum:
                      - primary
                  - type: string
                    maxLength: 0
              seasonalOccupancies:
                title: Seasonal Occupancies
                description: Seasons during the year when the location is typically occupied,
                  expressed as repeating time periods.
                type: array
                items:
                  type: object
                  properties:
                    recurrence:
                      title: Recurrence
                      description: ""
                      oneOf:
                        - type: object
                          format: recurrence
                          properties:
                            timePeriod:
                              title: Time Period
                              description: The period of time to be repeated.
                              type: object
                              properties:
                                startOn:
                                  title: Start On
                                  description: The beginning of the time period being repeated.
                                  type: string
                                  format: date-time
                                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                                endOn:
                                  title: End On
                                  description: The end of the time period being repeated.
