components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-vendors.json:
      title: Vendors
      description: A person or organization who offers products or services to an
        institution.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the vendor.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        vendorDetail:
          title: Vendor Detail
          description: The person or organization acting as the vendor.
          oneOf:
            - title: organization
              description: Detail information of the organization acting as the vendor.
              type: object
              properties:
                organization:
                  title: Organization
                  description: Detail information of the organization acting as the vendor.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Organization.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: organizations
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - organization
            - title: person
              description: Detail information of the person acting as the vendor.
              type: object
              properties:
                person:
                  title: Person
                  description: Detail information of the person acting as the vendor.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Person.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: persons
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - person
            - title: institution
              description: Detail information of the educational institution acting as the
                vendor.
              type: object
              properties:
                institution:
                  title: Institution
                  description: Detail information of the educational institution acting as the
                    vendor.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Institution.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: educational-institutions
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
        relatedVendor:
          title: Related Vendor
          description: The vendor assigned to receive payment for this vendor or the
            parent vendor.
          type: array
          items:
            type: object
            properties:
              type:
                title: Type
                description: The type of related vendor.
                enum:
                  - paymentVendor
                  - parentVendor
                type: string
              vendor:
                title: Vendor
                description: The related vendor.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Vendor.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: vendors
                additionalProperties: false
                required:
                  - id
            additionalProperties: false
            required:
              - type
              - vendor
        classifications:
          title: Classifications
          description: The vendor's classification (E.g. federal contract, small business,
            etc. )
          type: array
          items:
            title: Classifications
            description: The vendor's classification (E.g. federal contract, small business,
              etc. )
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Classifications.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: vendor-classifications
            additionalProperties: false
            required:
              - id
        paymentTerms:
          title: Payment Terms
          description: The payment terms and conditions that may be applied to the vendor.
          type: array
          items:
            title: Payment Terms
            description: The payment terms and conditions that may be applied to the vendor.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Payment Terms.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: vendor-payment-terms
            additionalProperties: false
            required:
              - id
        paymentSources:
          title: Payment Sources
          description: The accounts payable sources associated with the vendor.
          type: array
          items:
            title: Payment Sources
            description: The accounts payable sources associated with the vendor.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Payment Sources.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: accounts-payable-sources
            additionalProperties: false
            required:
              - id
        statuses:
          title: Statuses
          description: The statuses (active, approved, stop payment) that apply to the
            vendor.
          type: array
          items:
            enum:
              - active
              - holdPayment
              - approved
            type: string
        vendorHoldReasons:
          title: Vendor Hold Reasons
          description: The reasons the vendor has been placed on hold.
          type: array
          items:
            title: Vendor Hold Reasons
            description: The reasons the vendor has been placed on hold.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Vendor Hold Reasons.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: vendor-hold-reasons
            additionalProperties: false
            required:
              - id
        startOn:
          title: Start On
          description: The first date when the vendor was active/registered.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            - type: string
              maxLength: 0
        endOn:
          title: End On
          description: The last date when the vendor was active.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            - type: string
              maxLength: 0
        defaultCurrency:
          title: Default Currency
          description: The default currency for the vendor.
          oneOf:
            - type: string
              enum:
                - AED
                - AFN
                - ALL
                - AMD
                - ANG
                - AOA
                - ARS
