                        - TRY
                        - TTD
                        - TWD
                        - TZS
                        - UAH
                        - UGX
                        - USD
                        - UYU
                        - UZS
                        - VEF
                        - VND
                        - VUV
                        - WST
                        - XAF
                        - XCD
                        - XOF
                        - XPF
                        - YER
                        - ZAR
                        - ZMW
                        - ZWL
                      type: string
                      x-lineageReferenceObject: GUBINST_BASE_CURR_CODE(GUBINST)
                  additionalProperties: false
                  required:
                    - value
                    - currency
              additionalProperties: false
              required:
                - period
                - rate
            - type: object
              maxProperties: 0
        employmentPreference:
          title: Employment Preference
          description: The preference of employment (e.g. full-time, part-time and no
            preference).
          oneOf:
            - type: string
              enum:
                - fullTime
                - partTime
                - noPreference
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: If PABAPPL_FULL_PART_IND is 'F' then display as 'fullTime', if 'P' then display as 'partTime' and if 'N' then display as 'noPreference'
            - type: string
              maxLength: 0
        status:
          title: Status
          description: The status of the job application.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Status.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: job-application-statuses 
                  x-lineageReferenceObject: PTRAPPS_GUID(PTRAPPS)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        source:
          title: Source
          description: The source of information for the employment opportunity.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Source.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: job-application-sources 
                  x-lineageReferenceObject: PABAPPL_ASRC_CODE(PABAPPL)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        appliedOn:
          title: Applied On
          description: The date when the application was submitted.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: PABAPPL_DATE(PABAPPL)
            - type: string
              maxLength: 0
      required:
        - id
        - person
      additionalProperties: false
