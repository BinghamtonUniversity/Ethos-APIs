openapi: 3.0.0
info:
  title: Campus Involvements
  description: A person's involvement with a campus organization
  version: "7.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/campus-involvements:
    get:
      summary: Return all resources from SGRSACT, SGRSPRT and SHRCOMM
      description: Returns a paged listing of all the campus involvement records where
        student activities are retrieved from SGRSACT table, sports involvements
        are retrieved from SGRSPRT table and committee involvements are
        retrieved from SHRCOMM table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_CAMPUS_INVOLVEMENTS
      tags:
        - campus-involvements
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-campus-involvements.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/campus-involvements/{id}:
    get:
      summary: Return the requested resource
      description: Returns the single campus organization record with the requested
        identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_CAMPUS_INVOLVEMENTS
      tags:
        - campus-involvements
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Campus Involvements for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v7+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-campus-involvements.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-campus-involvements.json:
      title: Campus Involvements
      description: A person's involvement with a campus organization
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the Campus Involvements.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SGRSPRT_GUID(SGRSPRT) or SHRCOMM_GUID(SHRCOMM) or SGRSACT_GUID(SGRSACT)
        person:
          title: Person
          description: The id of the student who is involved in the organization.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Person.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons)
              x-lineageDerivedLogic: A record in GORGUID with GORGUID_LDM_NAME as 'persons' and GORGUID_DOMAIN_KEY=SGRSACT_PIDM, or GORGUID_DOMAIN_KEY=SGRSPRT_PIDM. or  GORGUID_DOMAIN_KEY = SHRCOMM_PIDM_MEMBER
          additionalProperties: false
          required:
            - id
        campusOrganization:
          title: Campus Organization
          description: The organization in the campus the student is involved with.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Campus Organization.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: campus-organizations 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = student-activity) or GORGUID_GUID(LDM_NAME = committee-type)
              x-lineageDerivedLogic: A record in GORGUID with GORGUID_LDM_NAME as 'student-activity' and GORGUID_DOMAIN_KEY=SGRSACT_ACTC_CODE or A record in GORGUID with GORGUID_LDM_NAME as 'committee-type' and GORGUID_DOMAIN_KEY =SHRCOMM_COMT_CODE AND SHBCOMI_COMS_CODE = 'AC' and the current system date is between or equal to SHRCOMM_FROM_DATE and SHRCOMM_TO_DATE or A record in GORGUID with GORGUID_LDM_NAME as 'student-activity' and GORGUID_DOMAIN_KEY =SGRSPRT_ACTC_CODE AND SGRSPRT_SPST_CODE = STVSPST_CODE and STVSPST_ACTIVE_IND = 'Y'
          additionalProperties: false
          required:
            - id
        startOn:
          title: Start On
          description: The involvement to the organization started on.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              x-lineageReferenceObject: SHRCOMM_FROM_DATE(SHRCOMM) or STVTERM_START_DATE(STVTERM)
            - type: string
              maxLength: 0
        endOn:
          title: End On
          description: The involvement to the organization ended on.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              x-lineageReferenceObject: SHRCOMM_TO_DATE(SHRCOMM)
            - type: string
              maxLength: 0
        academicPeriod:
          title: Academic Period
          description: Academic period in which the student was involved in this
            organization.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Academic Period.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-periods 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = term)
                  x-lineageDerivedLogic: A record in GORGUID with GORGUID_LDM_NAME as 'term' and GORGUID_DOMAIN_KEY =SGRSACT_TERM_CODE or A record in GORGUID with GORGUID_LDM_NAME as 'term' and GORGUID_DOMAIN_KEY =SGRSPRT_TERM_CODE
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        role:
          title: Role
          description: Role of the student in the organization.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Role.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: campus-involvement-roles 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = committee-function)
                  x-lineageDerivedLogic: If no committee role is assigned to the person, this field will be null. Not available in for SGRSACT and SGRSPRT.
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
      required:
        - id
        - person
        - campusOrganization
      additionalProperties: false
