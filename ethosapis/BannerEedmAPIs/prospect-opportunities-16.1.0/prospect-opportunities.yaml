openapi: 3.0.0
info:
  title: Prospect Opportunities
  description: >
    The prospective student information housed in Banner. A person can have
    multiple recruit records for different terms or for a same term. Includes
    the campus information and prospect opportunity source.


    Please refer to the section 'API Integration Configuration Settings' in Banner Ethos API Handbook for all the configuration settings needed for this API.
  version: 16.1.0-beta
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Recruitment
  x-audience: all
  x-release-status: beta
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: prospect-opportunities
paths:
  /api/prospect-opportunities:
    get:
      summary: Returns resources from SRBRECR
      description: >
        Returns all prospect records from SRBRECR table. For every SRBRECR
        record, the API retrieves all associated current and active SORLCUR
        records with SORLCUR_LMOD_CODE='RECRUIT'.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PROSPECT_OPPORTUNITIES
      tags:
        - prospect-opportunities
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v16+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Prospect  

            The person who is interested in attending the institution.

            ```

            /prospect-opportunities?criteria={"prospect":{"id":"5674f28b-b216-4055-b236-81a922d93b4c"}}

            ```

            ### Entry Academic Period  

            The academic period the prospect is interested in beginning attendance at the institution.

            ```

            /prospect-opportunities?criteria={"entryAcademicPeriod":{"id":"060d0dd1-75aa-4c43-989c-0015b6f01d6e"}}

            ```
        - name: personFilter
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Person Filter  

            Retrieve information for a specified population

            ```

            /prospect-opportunities?personFilter={"personFilter":{"id":"0925960d-3741-43c0-98eb-b12c6bed5820"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-prospect-opportunities.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v16.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/prospect-opportunities/{id}:
    get:
      summary: Return the requested resource from SRBRECR
      description: >
        Returns the single prospect record from SRBRECR for the passed in
        identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PROSPECT_OPPORTUNITIES
      tags:
        - prospect-opportunities
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v16+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v16.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v16.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-prospect-opportunities.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-prospect-opportunities.json:
      title: Prospect Opportunities
      description: The opportunities for a prospective student at an institution.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the prospect opportunity.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SRBRECR_GUID(SRBRECR)
        prospect:
          title: Prospect
          description: The person who is interested in attending the institution.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Prospect.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
              x-lineageDerivedLogic: Display the GUID from GORGUID where GORGUID_LDM_NAME='persons' and GORGUID_DOMAIN_KEY matches the SRBRECR_PIDM
          additionalProperties: false
          required:
            - id
        recruitAcademicPrograms:
          title: Recruit Academic Programs
          description: The person who is interested in attending the institution and the
            academic program(s) they are considering at the institution.
          type: array
          minItems: 1
          items:
            title: Recruit Academic Programs
            description: The person who is interested in attending the institution and the
              academic program(s) they are considering at the institution.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Recruit Academic Programs.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: student-academic-programs 
                x-lineageReferenceObject: SORLCUR_GUID(SORLCUR)
            additionalProperties: false
            required:
              - id
        entryAcademicPeriod:
          title: Entry Academic Period
          description: The academic period the prospect is interested in beginning
            attendance at the institution.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Entry Academic Period.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-periods 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = term) 
                  x-lineageDerivedLogic: Display the GUID from GORGUID where GORGUID_LDM_NAME='term' and GORGUID_DOMAIN_KEY matches the SRBRECR_TERM_CODE
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        academicLoad:
          title: Academic Load
          description: The academic load selection, e.g., full- or part-time
          oneOf:
            - type: string
              enum:
              - fullTime
              - partTime
            - type: string
              maxLength: 0
        type:
          title: Type
          description: The type of opportunity.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Type.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        admissionPopulation:
          title: Admission Population
          description: The admission population the prospect would be included within at
            the institution if they attend the institution.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Admission Population.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: admission-populations 
                  x-lineageReferenceObject: SRBRECR_STYP_CODE(SRBRECR)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        site:
          title: Site
          description: The institution site (campus) the prospect is considering.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Site.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: sites 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = campuses) 
                  x-lineageDerivedLogic: Display the GUID from GORGUID where GORGUID_LDM_NAME='campuses' and GORGUID_DOMAIN_KEY matches the SRBRECR_CAMP_CODE
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        opportunitySource:
          title: Opportunity Source
          description: The source associated with the prospect opportunity.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Opportunity Source.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: prospect-opportunity-sources 
                  x-lineageReferenceObject: SARRSRC_SBGI_CODE(SARRSRC)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        educationalGoal:
          title: Educational Goal
          description: The educational goal associated with the prospect opportunity.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Educational Goal.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: educational-goals
                  x-lineageReferenceObject: unsupported
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        careerGoals:
          title: Career Goals
          description: The career goals associated with the prospect opportunity.
          type: array
          items:
            title: Career Goals
            description: The career goals associated with the prospect opportunity.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Career Goals.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: career-goals
                x-lineageReferenceObject: unsupported
            additionalProperties: false
            required:
              - id
      required:
        - id
        - prospect
        - recruitAcademicPrograms
      additionalProperties: false
