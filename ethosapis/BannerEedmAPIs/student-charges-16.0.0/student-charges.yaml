        reportingDetail:
          title: Reporting Detail
          description: Attributes specific to the transaction when identified for tax
            reporting only.
          oneOf:
            - type: object
              properties:
                usage:
                  title: Usage
                  description: The usage associated with the charge (i.e. tax reporting only).
                  enum:
                    - taxReportingOnly
                  type: string
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: Always defaults to 'taxReportingOnly'
                originatedOn:
                  title: Originated On
                  description: The date the charge originated for consideration in tax report
                    generation.
                  type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  x-lineageReferenceObject: TBREACD_ENTRY_DATE(TBREACD)
                activityDates:
                  title: Activity Dates
                  description: The activity dates (e.g., section start and end date) associated
                    with the charge for tax reporting purposes.
                  oneOf:
                    - type: object
                      properties:
                        startOn:
                          title: Start On
                          description: The start date of the activity associated with the charge.
                          type: string
                          format: date
                          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                          x-lineageReferenceObject: TBREACDS_START_DATE(TBREACDS)
                        endOn:
                          title: End On
                          description: The end date of the activity associated with the charge.
                          type: string
                          format: date
                          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                          x-lineageReferenceObject: TBREACDS_END_DATE(TBREACDS)
                      additionalProperties: false
                      required:
                        - startOn
                        - endOn
                    - type: object
                      maxProperties: 0
              additionalProperties: false
