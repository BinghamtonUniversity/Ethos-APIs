openapi: 3.0.0
info:
  title: Person Contacts
  description: >-
    **API Deprecation Notice**



    Deprecated on: 30-Sep-2019



    Sunset on: 01-Oct-2021



    Description: Replaced by person-emergency-contacts v1.0.0.



    ----


    People who will be contacted in case of emergency or other situations related to the subject person


    ISO code configurations for countries, regions and subregions should be configured appropriately. Please refer to "Additional configuration for the persons and addresses APIs" section in Banner Ethos API handbook for details on ISO configuration.
  version: "7.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
  x-deprecated-on: 2019-09-30
  x-sunset-on: 2021-10-01
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/person-contacts:
    get:
      summary: Return all resources from SPREMRG
      description: Returns a paged listing of all the person contact records from
        SPREMRG table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_CONTACTS
      tags:
        - person-contacts
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Person  
            Returns all person contacts for the person ID passed.
            ```
            /person-contacts?person=6729a17e-3dfa-4517-95df-acdf160c24ab
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-person-contacts.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      deprecated: true
  /api/person-contacts/{id}:
    get:
      summary: Return the requested resource from SPREMRG
      description: Returns the single person contact record with the requested identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_CONTACTS
      tags:
        - person-contacts
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Person Contacts for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v7+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-person-contacts.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      deprecated: true
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-person-contacts.json:
      title: Person Contacts
      description: People who will be contacted in case of emergency or other
        situations related to the subject person
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the person contacts information resource
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SPREMRG_GUID(SPREMRG)
        person:
          title: Person
          description: The subject person
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Person.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
              x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches the SPREMRG_PIDM
          additionalProperties: false
          required:
            - id
        contacts:
          title: Contacts
          description: The subject person's contacts
          type: array
          items:
            type: object
            properties:
              name:
                title: Name
                description: The name of the contact
                type: object
                properties:
                  fullName:
                    title: Full Name
                    description: The full name of the contact
                    type: string
                    x-lineageReferenceObject: derived  
                    x-lineageDerivedLogic: Display the concatenated string of SPREMRG_FIRST_NAME + SPREMRG_MI + SPREMRG_LAST_NAME
                  firstName:
                    title: First Name
                    description: The first name of the contact
                    type: string
                    x-lineageReferenceObject: SPREMRG_FIRST_NAME(SPREMRG)
                  middleName:
                    title: Middle Name
                    description: The middle name of the contact
                    type: string
                    x-lineageReferenceObject: SPREMRG_MI(SPREMRG)
                  lastName:
                    title: Last Name
                    description: The last name of the contact
                    type: string
                    x-lineageReferenceObject: SPREMRG_LAST_NAME(SPREMRG)
                additionalProperties: false
                minProperties: 1
              types:
                title: Types
                description: The types of the contact
                type: array
                items:
                  enum:
                    - emergency
                    - missingPerson
                  type: string
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: Displayed as 'emergency'
              contactAddress:
                title: Contact Address
                description: The associated physical or mailing address of the contact
                type: object
                properties:
                  address:
                    title: Address
                    description: The complete address (optionally, split into multiple lines)
                    oneOf:
                      - title: Full Address
                        description: The complete physical or mailing address
                        type: array
                        items:
                          type: string
                          x-lineageReferenceObject: unsupported
                      - title: Address Components
                        description: Components of the address
                        oneOf:
                          - type: object
                            properties:
                              type:
                                title: Type
                                description: A type of address for a person. Includes a standard type (e.g.
                                  'home', 'school') and an optional, custom type
                                  to further identify the type of address.
                                oneOf:
                                  - type: object
                                    properties:
                                      addressType:
                                        title: Type
                                        description: A mapping to a standard type for the address type.
                                        enum:
                                          - home
                                          - school
                                          - vacation
                                          - billing
                                          - shipping
                                          - mailing
                                          - business
                                          - parent
                                          - family
                                          - pobox
                                          - main
                                          - branch
                                          - region
                                          - support
                                          - matchingGifts
                                          - other
                                        type: string
                                        x-lineageReferenceObject: SPREMRG_ATYP_CODE(SPREMRG)
                                      detail:
                                        title: Detail
                                        description: ""
                                        oneOf:
                                          - type: object
                                            properties:
                                              id:
                                                title: ID
                                                description: The global identifier for the Detail.
                                                type: string
                                                format: guid
                                                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                                                x-lineageLookupReferenceObject: address-types 
                                                x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = address-types) 
                                                x-lineageDerivedLogic: A record in GORGUID with GORGUID_LDM_NAME as 'address-types' will refer to the SPREMRG_ATYP_CODE
                                            additionalProperties: false
                                            required:
                                              - id
                                          - type: object
                                            maxProperties: 0
                                    additionalProperties: false
                                    required:
                                      - addressType
                                  - type: object
                                    maxProperties: 0
                              addressLines:
                                title: Address Lines
                                description: The address lines (e.g., street name and building number, apartment
                                  or suite, etc.)
                                type: array
                                items:
                                  type: string
                                  x-lineageReferenceObject: SPREMRG_STREET_LINE2(SPREMRG) or  SPREMRG_STREET_LINE1(SPREMRG) or SPREMRG_STREET_LINE3(SPREMRG)
                              place:
                                title: Place
                                description: A country specific postal region.  Postal regions are expressed as
                                  a hierarchy of country, region, and
                                  sub-region, and as a locality with postal
                                  automation codes
                                oneOf:
                                  - type: object
                                    properties:
                                      country:
                                        title: Country
                                        description: The country where the mailing address is located.
                                        oneOf:
                                          - title: Australia
                                            description: ""
                                            type: object
                                            properties:
                                              code:
                                                title: Code
                                                description: The ISO 3166-1 alpha-3 country code.
                                                enum:
                                                  - AUS
                                                type: string
                                                x-lineageReferenceObject: SPREMRG_NATN_CODE(SPREMRG)
                                              title:
                                                title: Country
                                                description: The name of the country, as used in everyday speech.
                                                type: string
                                                x-lineageReferenceObject: derived  
                                                x-lineageDerivedLogic: Country description from STVNATN is displayed.
                                              postalTitle:
                                                title: Postal Country
                                                description: The name of the country when mail is being addressed from an
                                                  international sender.
                                                oneOf:
                                                  - type: string
                                                    enum:
                                                      - AUSTRALIA
                                                    x-lineageReferenceObject: derived  
                                                    x-lineageDerivedLogic: Display the corresponding country name for the place.country.code. For e.g if place.country.code ='USA', display UNITED STATES OF AMERICA
                                                  - type: string
                                                    maxLength: 0
                                              region:
                                                title: Region
                                                description: A region within the country
                                                type: object
                                                properties:
                                                  code:
                                                    title: Code
                                                    description: The ISO 3166-2 code of a region within the country
                                                    oneOf:
                                                      - type: string
                                                        x-lineageReferenceObject: SPREMRG_STAT_CODE(SPREMRG)
                                                        enum:
                                                          - AU-NSW
                                                          - AU-ACT
                                                          - AU-VIC
                                                          - AU-QLD
                                                          - AU-SA
                                                          - AU-WA
