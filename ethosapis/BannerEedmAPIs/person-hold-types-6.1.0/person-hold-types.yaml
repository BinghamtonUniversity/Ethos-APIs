openapi: 3.0.0
info:
  title: Person Hold Types
  description: Types of holds on persons records.
  version: "6.1.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/person-hold-types:
    get:
      summary: Return all resources from STVHLDD
      description: Returns a paged listing of all the person hold type records from
        STVHLDD table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_HOLD_TYPES
      tags:
        - person-hold-types
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v6.1.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-person-hold-types.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/person-hold-types/{id}:
    get:
      summary: Return the requested resource from STVHLDD
      description: Returns a single person hold type record with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_HOLD_TYPES
      tags:
        - person-hold-types
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Person Hold Types for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6.1.0+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v6+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-person-hold-types.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-person-hold-types.json:
      title: Person Hold Types
      description: Types of holds on persons records.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of a student hold type
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= restriction-types) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'restriction-types' is displayed
        title:
          title: Title
          description: The full name of a student hold type
          type: string
          minLength: 1
          x-lineageReferenceObject: STVHLDD_DESC(STVHLDD)
        description:
          title: Description
          description: The description of a student hold type
          type: string
          x-lineageReferenceObject: unsupported
        code:
          title: Code
          description: The code of a student hold type
          type: string
          x-lineageReferenceObject: STVHLDD_CODE(STVHLDD)
        category:
          title: Category
          description: A global category of student hold types
          enum:
            - academic
            - administrative
            - disciplinary
            - financial
            - health
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Display 'academic' if STVHLDD_REG_HOLD_IND is Y and/or STVHLDD_TRANS_HOLD_IND is Y and/or STVHLDD_GRAD_HOLD_IND is Y and/or STVHLDD_GRADE_HOLD_IND is  Y and/or STVHLDD_ENV_HOLD_IND is  Y and/or STVHLDD_APPLICATION_HOLD_IND is Y and/or STVHLDD_COMPLIANCE_HOLD_IND is Y. Display  'financial' if STVHLDD_AR_HOLD_IND is Y . Only 'academic' and 'financial' categories are supported.
        notificationIndicator:
          title: Notification Indicator
          description: Indicates if the person should be notified of the hold being placed.
          enum:
            - notify
            - doNotNotify
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Display 'notify' if STVHLDD_DISP_WEB_IND is Y else display 'doNotNotify' STVHLDD_DISP_WEB_IND is N.
      
      required:
        - id
        - title
        - category
      additionalProperties: false