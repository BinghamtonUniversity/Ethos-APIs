          items:
            type: object
            properties:
              type:
                title: Type
                description: A type of phone for the unit. Includes a standard type (e.g.,
                  'main', 'support') and an optional, custom type to further
                  identify the type of phone.
                type: object
                properties:
                  phoneType:
                    title: Type
                    description: A type of phone contact for the unit.
                    enum:
                      - mobile
                      - home
                      - school
                      - vacation
                      - business
                      - fax
                      - pager
                      - tdd
                      - parent
                      - family
                      - main
                      - branch
                      - region
                      - support
                      - billing
                      - matchingGifts
                      - other
                    type: string
                  detail:
                    title: Detail
                    description: An optional, custom phone type.
                    oneOf:
                      - type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Detail.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: phone-types
                        additionalProperties: false
                        required:
                          - id
                      - type: object
                        maxProperties: 0
                additionalProperties: false
                required:
                  - phoneType
              preference:
                title: Preferred Phone
                description: Specifies if the phone is preferred over others of the same type.
                oneOf:
                  - type: string
                    enum:
                      - primary
                  - type: string
                    maxLength: 0
              countryCallingCode:
                title: Country Calling Code
                description: The country calling code of telephone and/or mobile device when
                  dialing internationally.
                oneOf:
                  - type: string
                    format: countryCallingCode
                    pattern: ^\+?[1-9][0-9]{0,3}$
                  - type: string
                    maxLength: 0
              number:
                title: Number
                description: The number assigned to the phone
                type: string
              extension:
                title: Extension
                description: The extension used to connect to the phone when multiple phones
                  share the same primary number.
                type: string
            additionalProperties: false
            required:
              - type
              - number
