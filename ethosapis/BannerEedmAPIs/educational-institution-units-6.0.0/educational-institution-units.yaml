          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        title:
          title: Title
          description: The full name of the unit
          type: string
          minLength: 1
        description:
          title: Description
          description: The description of the unit
          type: string
