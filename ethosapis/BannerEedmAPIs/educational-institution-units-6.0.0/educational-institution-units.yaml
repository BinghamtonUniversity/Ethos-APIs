              type:
                title: Type
                description: A type of location for the unit. Includes a standard type (e.g.
                  'main', 'support') and an optional, custom type to further
                  identify the type of location.
                type: object
                properties:
                  addressType:
                    title: Address Type
                    description: A mapping to a standard type for the address
                    enum:
                      - home
                      - school
                      - vacation
                      - billing
                      - shipping
                      - mailing
                      - business
                      - parent
                      - family
                      - pobox
                      - main
                      - branch
                      - region
                      - support
                      - matchingGifts
                      - other
                    type: string
                  detail:
                    title: Detail
                    description: An optional, custom address type.
                    oneOf:
                      - type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Detail.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: address-types
                        additionalProperties: false
                        required:
                          - id
                      - type: object
                        maxProperties: 0
                additionalProperties: false
                required:
                  - addressType
              startOn:
                title: Start On
                description: The earliest date that this location was valid for the unit
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
              endOn:
                title: End On
                description: The latest date when this location was valid for the unit
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
