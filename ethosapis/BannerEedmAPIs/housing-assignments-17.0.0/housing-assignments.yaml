                      type: string
                      x-lineageReferenceObject: SLRRASG_RATE_CURRENCY(SLRRASG)
                  additionalProperties: false
                  required:
                    - value
                    - currency
                reason:
                  title: Reason
                  description: The reason the standard room rate was overridden.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Reason.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: billing-override-reasons 
                          x-lineageReferenceObject: SLRRASG_REASON_GUID(SLRRASG)
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
              additionalProperties: false
              required:
                - rate
            - type: object
              maxProperties: 0
        additionalCharges:
          title: Additional Charges
          description: The additional charges applied to the person for the housing
            assignment.
          type: array
          items:
            type: object
            properties:
              accountingCode:
                title: Accounting Code
                description: The accounting code associated with the additional charge.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Accounting Code.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: accounting-codes 
                    x-lineageReferenceObject: SLRRASGM_ACC_CODE_GUID(SLRRASGM)
                additionalProperties: false
                required:
                  - id
              charge:
                title: Charge
                description: The amount of the additional charge.
                format: currency
