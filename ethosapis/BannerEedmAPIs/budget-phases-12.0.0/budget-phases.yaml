openapi: 3.0.0
info:
  title: Budget Phases
  description: Information on versions of working or final budgets.
  version: "12.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Finance
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/budget-phases:
    get:
      summary: Return all resources from FTVOBPH
      description: Returns a paged listing of all the budget phases from FTVOBPH table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_BUDGET_PHASES
      tags:
        - budget-phases
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Budget Code  

            Returns all budget phases for the given budgetCode

            ```

            /budget-phases?criteria={"budgetCode":{"id":"3d8636c8-6481-4b6e-91ea-46213e022f6e"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-budget-phases.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/budget-phases/{id}:
    get:
      summary: Return the requested resource from FTVOBPH
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_BUDGET_PHASES
      tags:
        - budget-phases
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Budget Phases for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v12+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-budget-phases.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-budget-phases.json:
      title: Budget Phases
      description: Information on versions of working or final budgets.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the budget phase.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FTVOBPH_GUID(FTVOBPH)
        title:
          title: Title
          description: The full name of the budget phase.
          type: string
          minLength: 1
          x-lineageReferenceObject: FTVOBPH_BUDG_PHASE_TITLE(FTVOBPH)
        description:
          title: Description
          description: The description of the budget phase.
          type: string
          x-lineageReferenceObject: unsupported
        code:
          title: Code
          description: The code used to identify the budget phase.
          type: string
          x-lineageReferenceObject: FTVOBPH_OBPH_CODE(FTVOBPH)
        budgetCode:
          title: Budget Code
          description: The budget code with which the budget phase is associated.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Budget Code.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: budget-codes 
              x-lineageReferenceObject: FTVOBPH_OBUD_CODE(FTVOBPH)
          additionalProperties: false
          required:
            - id
        status:
          title: Status
          description: The status of the budget phase.
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: If FTVOBPH_BUDG_PHASE_STATUS = O, display open; else display closed.
          enum:
            - open
            - closed
          type: string
        basePhase:
          title: Base Phase
          description: The phase on which the budget phase is based.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Base Phase.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: budget-phases 
                  x-lineageReferenceObject: FTVOBPH_OBPH_CODE_BASE(FTVOBPH)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
      required:
        - id
        - title
        - budgetCode
        - status
      additionalProperties: false
