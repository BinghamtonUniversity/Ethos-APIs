openapi: 3.0.0
info:
  title: Person Publications
  description: Publications (e.g. journal, research papers, etc) published by individuals.
  version: "10.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/person-publications:
    get:
      summary: Return all resources from PPAGENL
      description: Returns a paged listing of all the person publication records from
        PPAGENL table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_PUBLICATIONS
      tags:
        - person-publications
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-person-publications.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/person-publications/{id}:
    get:
      summary: Return the requested resource from PPAGENL
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_PUBLICATIONS
      tags:
        - person-publications
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Person Publications for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v10+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-person-publications.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-person-publications.json:
      title: Person Publications
      description: Publications (e.g. journal, research papers, etc) published by
        individuals.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the person publication.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: PPRPUBL_GUID(PPRPUBL)
        title:
          title: Title
          description: The title of the publication.
          type: string
          minLength: 1
          x-lineageReferenceObject: PPRPUBL_TITLE(PPRPUBL)
        person:
          title: Person
          description: The person who authored or contributed to the publication.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Person.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
              x-lineageDerivedLogic: For PPRPUBL_PIDM,person GUID is displayed
          additionalProperties: false
          required:
            - id
        type:
          title: Type
          description: The type of publication (e.g. newspaper, journal, etc).
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Type.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: publication-types 
              x-lineageReferenceObject: PPRPUBL_PUBT_CODE(PPRPUBL)
          additionalProperties: false
          required:
            - id
        publishedOn:
          title: Published On
          description: The date on which the publication was published.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: PPRPUBL_PUBT_DATE(PPRPUBL)
            - type: string
              maxLength: 0
        publisher:
          title: Publisher
          description: The name of the publisher.
          type: string
          x-lineageReferenceObject: PPRPUBL_PUBLISHER(PPRPUBL)
        issue:
          title: Issue
          description: The issue of the publication, typically refers to how many times
            the publication has been published during that year.
          type: string
          x-lineageReferenceObject: PPRPUBL_ISSUE(PPRPUBL)
        volume:
          title: Volume
          description: The volume of the publication.
          type: string
          x-lineageReferenceObject: PPRPUBL_VOLUME(PPRPUBL)
        pageRange:
          title: PageRange
          description: The page reference range(s) of the publication.
          type: string
          x-lineageReferenceObject: PPRPUBL_PAGES(PPRPUBL)
      required:
        - id
        - title
        - person
        - type
      additionalProperties: false
