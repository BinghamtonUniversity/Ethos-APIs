openapi: 3.0.0
info:
  title: Person Matching Requests Initiations Prospects
  description: >-
    Information that may be used for new prospective student person requests
    that will be processed by duplicate prevention matching rules.


    The person-matching-requests-initiations-propects API is an alternate representation of the person-matching-requests API. The person-matching-requests API tracks the status of the duplicate checking process that will begin with a person-matching-requests-initiations-prospects POST request submitted by an integrating system to create a new prospective student person record.


    Please refer to "Person matching process" section in the Banner Ethos API Handbook for additional processing details on this API.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/person-matching-requests:
    post:
      summary: Create a new resource in GOBPMRQ
      description: Creates a new person matching request record in GOBPMRQ
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_MATCHING_REQUESTS
      tags:
        - person-matching-requests-initiations-prospects
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.person-matching-requests-initiations-prospects.v1+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-person-matching-requests-initiations-prospec\
                  ts.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-person-matching-requests-initiations-prospec\
                ts.json"
components:
