                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the person matching request.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        names:
          title: Names
          description: The names associated with a prospect.
          type: object
          properties:
            legal:
              title: Legal
              description: The legal name of the prospect.
              type: object
              properties:
                firstName:
                  title: First Name
                  description: The prospect's legal first, or given, name.
                  type: string
                  minLength: 1
                middleName:
                  title: Middle Name
                  description: The prospect's legal middle name.
                  type: string
                lastName:
                  title: Last Name
                  description: The prospect's legal last, or family, name.
                  type: string
                  minLength: 1
              additionalProperties: false
              required:
                - firstName
                - lastName
            former:
              title: Former
              description: The former name of the prospect.
              oneOf:
                - type: object
                  properties:
                    firstName:
                      title: First Name
                      description: The prospect's former first, or given name.
                      type: string
                    middleName:
                      title: Middle Name
                      description: The prospect's former middle name.
                      type: string
                    lastName:
                      title: Last Name
                      description: The prospect's former last, or family, name.
                      type: string
                      minLength: 1
                  additionalProperties: false
                  required:
                    - lastName
                - type: object
                  maxProperties: 0
            favored:
              title: Favored
              description: The favored name of the prospect.
              type: object
              properties:
                firstName:
                  title: First Name
                  description: The prospect's favored first, or given name.
                  type: string
                middleName:
                  title: Middle Name
                  description: The prospect's favored middle name.
                  type: string
                lastName:
                  title: Last Name
                  description: The prospect's favored last name.
                  type: string
              additionalProperties: false
          additionalProperties: false
          minProperties: 1
          required:
            - legal
        gender:
          title: Gender
          description: The biological masculinity or femininity of the prospect.
          oneOf:
            - type: string
              enum:
                - male
                - female
                - unknown
            - type: string
              maxLength: 0
        matchingCriteria:
          title: Matching Criteria
          description: Additional matching criteria - minimum of one is required.
          type: object
          properties:
            dateOfBirth:
              title: Date Of Birth
              description: The date when a prospect was born.
              oneOf:
                - type: string
                  format: date
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                - type: string
                  maxLength: 0
            credential:
              title: Credential
              description: Information that identifies a user to a system.
              oneOf:
                - type: object
                  properties:
                    type:
                      title: Type
                      description: The type of credential (SSN, SIN, or Tax Identification Number).
                      enum:
                        - ssn
                        - sin
                        - taxIdentificationNumber
                      type: string
                    value:
                      title: Value
                      description: The current value of the credential.
                      type: string
                  additionalProperties: false
                  required:
                    - type
                    - value
                - type: object
                  maxProperties: 0
            alternativeCredentials:
              title: Alternative Credentials
              description: Alternative information that uniquely identifies a user.
              type: array
              items:
                type: object
                properties:
                  type:
                    title: Type
                    description: The type of alternative credential.
                    oneOf:
                      - type: object
