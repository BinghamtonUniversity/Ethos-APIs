openapi: 3.0.0
info:
  title: User Identity Profiles
  description: Identity profile details for users to be integrated with Ethos
    Identity for provisioning service.
  version: 1.0.0
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/user-identity-profiles:
    get:
      summary: Return all resources from SPRIDEN
      description: Returns a paged listing of single or all the person records from
        SPRIDEN table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_USER_IDENTITY_PROFILES
      tags:
        - user-identity-profiles
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-user-identity-profiles.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/user-identity-profiles/{id}:
    get:
      summary: Return the requested resource from SPRIDEN
      description: Return the single person record with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_USER_IDENTITY_PROFILES
      tags:
        - user-identity-profiles
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of User Identity Profiles for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-user-identity-profiles.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-user-identity-profiles.json:
      title: User Identity Profiles
      description: Identity profile details for users to be integrated with Ethos
        Identity for provisioning service.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the user-identity-profiles.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        udcIdentifier:
          title: udcIdentifier
          description: the UDCIdentifier value for person
          type: string
          maxLength: 32
        dateOfBirth:
          title: Date Of Birth
          description: The date of birth of the person
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            - type: string
              maxLength: 0
        bannerId:
          title: bannerId
          description: The spriden ID for the person
          type: string
        personIdentity:
          title: Person Identity
          description: person details
          type: object
          properties:
            personName:
              title: Person Name
              description: Person name details
              type: object
              properties:
                formattedName:
                  title: Formatted Name
                  description: Combination of first ,middle and last name
                  type: string
                givenName:
                  title: Given Name
                  description: First name of the person
                  type: string
                familyName:
                  title: Family Name
                  description: Last name of the person
                  type: string
                middleName:
                  title: Middle Name
                  description: Middle name of the person
                  type: string
                preferredGivenName:
                  title: Preferred Given Name
                  description: Preferred first name of the person
                  type: string
                affix:
                  title: Affix
                  description: Form of address for the person.
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        title: Type
                        description: Type of the affix
                        type: string
                      value:
                        title: Value
                        description: Value of the affix
                        type: string
                    additionalProperties: false
              additionalProperties: false
              required:
                - givenName
                - familyName
          additionalProperties: false
          required:
            - personName
        emailAddress:
          title: Email Address
          description: Email address of the person
          type: string
        primaryAddress:
          title: Primary Address
          description: Address of the person
          type: object
          properties:
            postalCode:
              title: Postal Code
              description: Code established by postal authorities.
              type: string
            region:
              title: Region
              description: State or province portion of the address.
              type: string
            municipality:
              title: Municipality
              description: City, town, village, or hamlet portion of the address
              type: string
            addressLines:
              title: Address Line
              description: One formatted address line with all pieces in their proper place.
              type: array
              items:
                type: string
          additionalProperties: false
        mobilePhone:
          title: Mobile Phone
          description: Contact number of the person
          type: object
          properties:
            areaCityCode:
              title: Area City Code
              description: Telephone area code.
              type: string
            subscriberNumber:
              title: Subscriber Number
              description: '"Local” phone number.'
              type: string
          additionalProperties: false
        institutionRoles:
          title: Institution Roles
          description: Roles assigned to the person.
          type: array
          items:
            type: string
        principal:
          title: Principal
          description: Principal name of the person
          type: string
        credential:
          title: Credential
          description: Credential of the person
          type: string
      required:
        - id
        - udcIdentifier
        - personIdentity
      additionalProperties: false

