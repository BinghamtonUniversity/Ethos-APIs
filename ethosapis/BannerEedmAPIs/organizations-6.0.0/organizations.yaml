openapi: 3.0.0
info:
  title: Organizations
  description: >
    An organized body of people with a particular purpose, especially a
    business, society, association, etc.


    ISO code configurations for countries, regions and subregions should be configured appropriately. Please refer to "Additional configuration for the organizations and addresses APIs" section in Banner Ethos API handbook.


    This API version supports mapping multiple Banner address type, email type and phone type values to a single Ethos enumeration in API configuration settings. Please refer to "Map multiple Banner values to an Ethos enumeration" section in Banner Ethos API handbook for details on API behavior when multiple mappings are available in these settings for the same Ethos enumeration.


    Please refer to "API Integration Configuration Settings" section in the Banner Ethos API Handbook for details on API configuration settings that needs to be configured for this API.
  version: "6.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/organizations:
    get:
      summary: Returns resources from SPRIDEN
      description: >
        Returns a paged listing of all the organization records from SPRIDEN
        where SPRIDEN_ENTITY_IND ='C'.


        The API retrieves all the active addresses associated with the organization from SPRADDR table. The addresses property is published with only the address GUID, addressLines and place details are not published.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ORGANIZATIONS
      tags:
        - organizations
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 500.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Vendor  

            Returns all organizations with ‘vendor’ role.

            ```

            /organizations?role=vendor

            ```

            ### Credential type and Credential value  

            Returns organization for the credentialType and credentialValue passed. Both credentialType and credentialValue are required. Only ‘credentialType=bannerId’ is supported.

            ```

            /organizations?credentialType=bannerId&credentialValue=A00000718

            ```
          example: '/organizations?credentialType=bannerId&credentialValue=A00000718'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-organizations.json"
              example:
                metadata:
                  createdBy: admin
                  createdOn: '2023-01-01T00:00:00Z'
                  modifiedBy: admin
                  modifiedOn: '2023-01-02T00:00:00Z'
                id: 123e4567-e89b-12d3-a456-426614174000
                title: Global Education Partners
                description: A non-profit organization supporting global education
                  initiatives.
                roles:
                - role: vendor
                  startOn: '2024-01-01T00:00:00Z'
                  endOn: '2025-01-01T00:00:00Z'
                credentials:
                - type: bannerId
                  value: A00000718
                  startOn: '2023-01-01T00:00:00Z'
                  endOn: '2025-12-31T23:59:59Z'
                addresses:     
                - address: 
                    id: 393e648a-74ca-da10-20bd-0c611029fa42       
                  type: 
                    addressType: home
                    detail: 
                      id: 8d4ba397-1b07-c757-a0e8-c097868accb8        
                    startOn: '1995-05-01T00:00:00+00:00'
                    endOn: '2025-12-31T23:59:59Z'
                    preference: primary
                phones:  
                - type: 
                    phoneType: mobile
                    detail: 
                      id: 10511ba0-9932-268a-85b3-72dd35a3a39e      
                  preference: primary
                  countryCallingCode: '+1'
                  number: '4155551234'
                  extension: '334'
                emails:     
                - type: 
                    emailType: personal
                    detail: 
                      id: 7bea19d2-662e-1943-5766-b52d3c99eb5f
                  preference: primary
                  address: user@example.com
                socialMedia: 
                - type: 
                    socialMediaType: website
                    detail: 
                      id: 4180c693-aa26-7cfd-db8f-c0c2239990cb
                  preference: primary
                  address: https://www.ellucian.com
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in SPRIDEN
      description: >
        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.


        Creates a new organization record in SPRIDEN where SPRIDEN_ENTITY_IND ='C'.


        Below are the API behavior details for addresses property on a create request:


        Addresses


        - The create request should be sent with 'addresses.address.addressLines' and 'addresses.address.place' properties to create a new organization address . A create request sent without addressLines will be rejected with an error message.

        - The create request should be sent with valid 3166-1-alpha-3 country ISO code, 3166-2 region and subregion ISO codes. The create request sent without ISO codes will be rejected with an error message.
