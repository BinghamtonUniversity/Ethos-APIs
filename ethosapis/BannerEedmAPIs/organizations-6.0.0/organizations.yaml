components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-organizations.json:
      title: Organizations
      description: An organized body of people with a particular purpose, especially a
        business, society, association, etc.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the organization
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= non-persons) 
          x-lineageDerivedLogic: Display the GUID from GORGUID where GORGUID_LDM_NAME is 'non-persons' and GORGUID_DOMAIN_KEY matches SPRIDEN_PIDM.
        title:
          title: Title
          description: The full name of the organization
          type: string
          minLength: 1
          x-lineageReferenceObject: SPRIDEN_LAST_NAME(SPRIDEN)
        description:
          title: Description
          description: The description of the organization
          type: string
          x-lineageReferenceObject: unsupported
        roles:
          title: Roles
          description: The roles the organization plays with respect to the home
            educational institution
          type: array
          items:
            type: object
            properties:
              role:
                title: Role
                description: The role of the organization
                enum:
                  - vendor
                  - partner
                  - affiliate
                  - constituent
                type: string
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: For the SPRIDEN_PIDM, if there are matching records existing in FTVVEND then display as 'vendor', else display as 'affiliate'
              startOn:
                title: Start On
                description: The start date of the relationship in this role
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                    x-lineageReferenceObject: unsupported
                  - type: string
                    maxLength: 0
              endOn:
                title: End On
                description: The end date of the relationship in this role
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                    x-lineageReferenceObject: unsupported
                  - type: string
                    maxLength: 0
            additionalProperties: false
            required:
              - role
        credentials:
          title: Credentials
          description: Information that identifies a user to a system such as a network or
            computer
          type: array
          items:
            type: object
            properties:
              type:
                title: Type
                description: The type of credential, such as "Person ID", "Organization ID",
