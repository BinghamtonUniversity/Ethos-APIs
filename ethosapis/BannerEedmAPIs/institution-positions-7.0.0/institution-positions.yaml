openapi: 3.0.0
info:
  title: Institution Positions
  description: A detailed description of the positions at an institution.
  version: "7.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/institution-positions:
    get:
      summary: Return all resources
      description: This version of the resource uses a legacy filter format and cannot
        be displayed as a parameter.  Please refer to the API source
        documentation for more information.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_INSTITUTION_POSITIONS
      tags:
        - institution-positions
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-institution-positions.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/institution-positions/{id}:
    get:
      summary: Return the requested resource
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_INSTITUTION_POSITIONS
      tags:
        - institution-positions
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Institution Positions for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v7.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-institution-positions.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-institution-positions.json:
      title: Institution Positions
      description: A detailed description of the positions at an institution.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the institution position.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        title:
          title: Title
          description: The title of the Institution Position.
          type: string
          minLength: 1
        description:
          title: Description
          description: The description of the Institution Position.
          type: string
        campus:
          title: Campus
          description: The physical location of the Institution Position.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Campus.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: sites
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        departments:
          title: Departments
          description: The operational units of the institution to which the position
            belongs.
          type: array
          items:
            type: object
            properties:
              name:
                title: Name
                description: The name of the department to which the position belongs.
                type: string
                minLength: 1
              detail:
                title: Detail
                description: The educational institutional unit associated with the position.
                oneOf:
                  - type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Detail.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: educational-institution-units
                    additionalProperties: false
                    required:
                      - id
                  - type: object
                    maxProperties: 0
            additionalProperties: false
            required:
              - name
        accountingStrings:
          title: Accounting Strings
          description: The accounting strings associated with the position.
          type: array
          items:
            type: string
        status:
          title: Status
          description: The status of the position (e.g. active, frozen, cancelled,
            inactive).
          enum:
            - active
            - frozen
            - cancelled
            - inactive
          type: string
        hoursPerPeriod:
          title: Hours Per Period
          description: The number of hours of work in specified time periods.
          type: array
          items:
            type: object
            properties:
              period:
                title: Period
                description: The defined time period (e.g. day, week, month, etc.)
                enum:
                  - day
                  - week
                  - month
                  - year
                  - payPeriod
                type: string
              hours:
                title: Hours
                description: The number of hours of work in the specified time period.
                minimum: 0
                type: number
                format: positiveNumber
            additionalProperties: false
            required:
              - period
              - hours
        fullTimeEquivalent:
          title: Full Time Equivalent
          description: The ratio of hours of work for the position to the hours of work
            expected of a full-time employee.
          oneOf:
            - type: number
              minimum: 0
              format: positiveNumber
            - type: string
              nullable: true
        bargainingUnit:
          title: Bargaining Unit
          description: The group or union associated with the position.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Bargaining Unit.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: bargaining-units
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        reportsTo:
          title: Reports To
          description: The positions to which this position reports.
          type: array
          items:
            type: object
            properties:
              position:
                title: Position
                description: The position to which this position reports.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Position.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: institution-positions
                additionalProperties: false
                required:
                  - id
              type:
                title: Type
                description: The type of reporting position (e.g. primary, alternate, etc.).
                enum:
                  - primary
                  - alternate
                type: string
            additionalProperties: false
            required:
              - position
              - type
        exemptionType:
          title: Exemption Type
          description: An indicator if the position is exempt or non-exempt.
          oneOf:
            - type: string
              enum:
                - exempt
                - nonExempt
            - type: string
              maxLength: 0
        compensation:
          title: Compensation
          description: The salary or wages awarded for the position.
          type: object
          properties:
            type:
              title: Type
              description: The type of compensation awarded (e.g. salary, wages, etc.)
              enum:
                - salary
                - wages
              type: string
            range:
              title: Range
              description: The range of compensation awarded for the position.
              type: object
              properties:
                lowerBound:
                  title: Lower Bound
                  description: The lower bound of compensation offered for the position.
                  minimum: 0
                  type: number
                  format: positiveNumber
                upperBound:
                  title: Upper Bound
                  description: The upper bound of compensation offered for the position.
                  minimum: 0
                  type: number
                  format: positiveNumber
                currencyCode:
                  title: Currency Code
                  description: The ISO 4217 currency code
                  enum:
                    - AED
                    - AFN
                    - ALL
                    - AMD
                    - ANG
                    - AOA
                    - ARS
                    - AUD
                    - AWG
                    - AZN
                    - BAM
                    - BBD
                    - BDT
                    - BGN
                    - BHD
                    - BIF
                    - BMD
