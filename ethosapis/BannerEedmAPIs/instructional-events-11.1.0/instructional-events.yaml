components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-instructional-events.json:
      title: Instructional Events
      description: An instructional activity that takes place during a section.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: A globally unique identifier of an instructional activity to be
            used in all external references.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= instructional-events) 
          x-lineageDerivedLogic: A record in GORGUID where  GORGUID_LDM_NAME as 'instructional-events'
        title:
          title: Title
          description: The full name of an instructional activity.
          type: string
          x-lineageReferenceObject: unsupported
        description:
          title: Description
          description: A description of an instructional activity.
          type: string
          x-lineageReferenceObject: unsupported
        section:
          title: Section
          description: An instance of a course.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Section.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: sections 
              x-lineageReferenceObject: SSRMEET_CRN(SSRMEET)
          additionalProperties: false
          required:
            - id
        instructionalMethod:
          title: Instructional Method
          description: The method, style, or format of instruction associated with the
            instructor's involvement with the section (for example, 'Lecture',
            'Lab').
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Instructional Method.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: instructional-methods 
              x-lineageReferenceObject: SSRMEET_SCHD_CODE(SSRMEET)
          additionalProperties: false
          required:
            - id
        workLoad:
          title: Work Load
          description: The total amount of work associated with the instructional event.
          oneOf:
            - type: number
              x-lineageReferenceObject: SCRSCHD_ADJ_WORKLOAD(SCRSCHD)
            - type: string
              nullable: true
        recurrence:
          title: Recurrence
          description: The recurring meeting time pattern associated with the
            instructional event.
          oneOf:
            - type: object
              format: recurrence
              properties:
                timePeriod:
                  title: Time Period
                  description: The period of time to be repeated.
                  type: object
                  properties:
                    startOn:
                      title: Start On
                      description: The beginning of the time period being repeated.
                      type: string
                      format: date-time
                      pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                      x-lineageReferenceObject: derived  
                      x-lineageDerivedLogic: Display the concatenated value of 'SSRMEET_START_DATE and SSRMEET_BEGIN_TIME'
                    endOn:
                      title: End On
                      description: The end of the time period being repeated.
                      oneOf:
                        - type: string
                          format: date-time
                          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                          x-lineageReferenceObject: derived  
                          x-lineageDerivedLogic: Display the concatenated value of 'SSRMEET_END_DATE  and  SSRMEET_END_TIME'
                        - type: string
                          maxLength: 0
                  additionalProperties: false
                  required:
                    - startOn
                repeatRule:
                  title: Repeat Rule
                  description: The rule that describes how to repeat the time period.
                  oneOf:
                    - title: Daily
                      description: Rules for repeating on a daily basis.
                      type: object
                      properties:
                        type:
                          title: Type
                          description: ""
                          enum:
                            - daily
                          type: string
                          x-lineageReferenceObject: unsupported
                        interval:
                          title: Interval
                          description: Number of days between each repetition.
                          oneOf:
                            - type: integer
                              x-lineageReferenceObject: unsupported
                            - type: string
                              nullable: true
                        ends:
                          title: Ends
                          description: When to end the daily repetitions.
                          oneOf:
                            - title: One Of-1
                              description: ""
                              type: object
                              properties:
                                repetitions:
                                  title: Repetitions
                                  description: Number of times to repeat, then stop.
                                  type: integer
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
                              required:
                                - repetitions
                            - title: One Of-2
                              description: ""
                              type: object
                              properties:
                                date:
                                  title: Date
                                  description: The date after which to stop repeating.
                                  type: string
                                  format: date
                                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
                              required:
                                - date
                            - type: object
                              maxProperties: 0
                      additionalProperties: false
                      required:
                        - type
                    - title: Weekly
                      description: Rules for repeating on a weekly basis.
                      type: object
                      properties:
                        type:
                          title: Type
                          description: ""
                          enum:
                            - weekly
                          type: string
                          x-lineageReferenceObject: derived  
                          x-lineageDerivedLogic: Display weekly
                        interval:
                          title: Interval
                          description: Number of weeks between each repetition.
                          oneOf:
                            - type: integer
                              x-lineageReferenceObject: derived  
                              x-lineageDerivedLogic: Display 1
                            - type: string
                              nullable: true
                        daysOfWeek:
                          title: Days of Week
                          description: The days of the week on which to repeat the event.
                          type: array
                          items:
                            enum:
                              - sunday
                              - monday
                              - tuesday
                              - wednesday
                              - thursday
                              - friday
                              - saturday
                            type: string
                            x-lineageReferenceObject: SSRMEET_SAT_DAY(SSRMEET) or  SSRMEET_SUN_DAY(SSRMEET) or  SSRMEET_WED_DAY(SSRMEET) or  SSRMEET_THU_DAY(SSRMEET) or  SSRMEET_FRI_DAY(SSRMEET) or  SSRMEET_MON_DAY(SSRMEET) or  SSRMEET_TUE_DAY(SSRMEET)
                        ends:
                          title: Ends
                          description: When to end the weekly repetitions.
                          oneOf:
                            - title: One Of-1
                              description: ""
                              type: object
                              properties:
                                repetitions:
                                  title: Repetitions
                                  description: Number of times to repeat, then stop.
                                  type: integer
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
                              required:
                                - repetitions
                            - title: One Of-2
                              description: ""
                              type: object
                              properties:
                                date:
                                  title: Date
                                  description: The date after which to stop repeating.
                                  type: string
                                  format: date
                                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                                  x-lineageReferenceObject: STVTERM_END_DATE(STVTERM)
                              additionalProperties: false
                              required:
                                - date
                            - type: object
                              maxProperties: 0
                      additionalProperties: false
                      required:
                        - type
                    - title: Monthly
                      description: Rules for repeating on a monthly basis.
                      type: object
                      properties:
                        type:
                          title: Type
                          description: ""
                          enum:
                            - monthly
                          type: string
                          x-lineageReferenceObject: unsupported
                        interval:
                          title: Interval
                          description: Number of months between each repetition.
                          oneOf:
                            - type: integer
                              x-lineageReferenceObject: unsupported
                            - type: string
                              nullable: true
                        repeatBy:
                          title: Repeat By
                          description: How to calculate the day of the month on which to start repeating.
                          oneOf:
                            - title: One Of-1
                              description: ""
                              type: object
                              properties:
                                dayOfMonth:
                                  title: Day of Month
                                  description: The number of the day in the month on which to start repeating.
                                  type: integer
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
                              required:
                                - dayOfMonth
                            - title: One Of-2
                              description: ""
                              type: object
                              properties:
                                dayOfWeek:
                                  title: Day of Week
                                  description: The cardinal day of the week (e.g., the first Tuesday, the last
                                    Friday, etc.) in the month on which to start
                                    repeating.
                                  type: object
                                  properties:
                                    occurrence:
                                      title: Occurrence
                                      description: The nth occurrence of the day of the week in the month. Use a
                                        positive number to count from the start
                                        of the month (e.g., 1 = first in the
                                        month, 2 = second in the month), and a
                                        negative number to count from the end of
                                        the month (e.g. -1 = last in the month,
                                        -2 = second from last, etc.).
                                      type: integer
                                      x-lineageReferenceObject: unsupported
                                    day:
                                      title: Day of Week
                                      description: A day in a week.
                                      enum:
                                        - sunday
                                        - monday
                                        - tuesday
                                        - wednesday
                                        - thursday
                                        - friday
                                        - saturday
                                      type: string
                                      x-lineageReferenceObject: unsupported
                                  additionalProperties: false
                                  required:
                                    - occurrence
                                    - day
                              additionalProperties: false
                              required:
                                - dayOfWeek
                        ends:
                          title: Ends
                          description: When to end the monthly repetitions.
                          oneOf:
                            - title: One Of-1
                              description: ""
                              type: object
                              properties:
                                repetitions:
                                  title: Repetitions
                                  description: Number of times to repeat, then stop.
                                  type: integer
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
                              required:
                                - repetitions
                            - title: One Of-2
                              description: ""
                              type: object
                              properties:
                                date:
                                  title: Date
                                  description: The date after which to stop repeating.
                                  type: string
                                  format: date
                                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
                              required:
                                - date
                            - type: object
                              maxProperties: 0
                      additionalProperties: false
                      required:
                        - type
                        - repeatBy
                    - title: Yearly
                      description: Rules for repeating on an annual basis.
                      type: object
                      properties:
                        type:
                          title: Type
                          description: ""
                          enum:
                            - yearly
                          type: string
                          x-lineageReferenceObject: unsupported
                        interval:
                          title: Interval
                          description: Number of years between each repetition.
                          oneOf:
                            - type: integer
                              x-lineageReferenceObject: unsupported
                            - type: string
                              nullable: true
                        ends:
                          title: Ends
                          description: When to end the yearly repetitions.
                          oneOf:
                            - title: One Of-1
                              description: ""
                              type: object
                              properties:
                                repetitions:
                                  title: Repetitions
                                  description: Number of times to repeat, then stop.
                                  type: integer
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
                              required:
                                - repetitions
                            - title: One Of-2
                              description: ""
                              type: object
                              properties:
                                date:
                                  title: Date
                                  description: The date after which to stop repeating.
                                  type: string
                                  format: date
                                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
