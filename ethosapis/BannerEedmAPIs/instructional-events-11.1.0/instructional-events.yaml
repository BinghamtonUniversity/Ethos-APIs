openapi: 3.0.0
info:
  title: Instructional Events
  description: >
    The Instructional Events entity contains a set of meetings or gatherings of
    students and teachers such as lectures, discussions, or lab experiments that
    are scheduled in a specific learning environment suitable for the type of
    event. An instructional event is associated with a course section and an
    appropriate instructional method. Instructional events can be recurrent and
    are scheduled to occur in a specific location.


    The instructional-events API supports set of meetings or gatherings of students and teachers such as lectures, discussions, or lab experiments. The 'startOn' and 'endOn' in this API are date-time properties which use UTC time zone processing. The institution time zone on GUBINST or the corresponding campus time zone on STVCAMP should be defined. For details on UTC time zone processing please refer to 'UTC time zone support in instructional-events' section of Banner Ethos API handbook.


    Please refer to "API Integration Configuration Settings" section in the Banner Ethos API Handbook" for details on API configuration settings that needs to be configured for this API.
  version: 11.1.0-beta
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: beta
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: instructional-events
paths:
  /api/instructional-events:
    get:
      summary: Returns resources from SSRMEET
      description: >
        Returns a paged listing of all the instructional event records from
        SSRMEET table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_INSTRUCTIONAL_EVENTS
      tags:
        - instructional-events
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v11.1.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 20 and upper limit is 30.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Section  

            Returns all instructional events for the section ID passed.

            ```

            /instructional-events?criteria={"section":{"id":"891f5018-5056-44b4-8adf-2d318c64f33f"}}

            ```
            
            ### Start On  

            Returns all instructional events for the start on date passed.

            ```

            /instructional-events?criteria={"recurrence":{"timePeriod":{"startOn":"1994-08-29T11:30:00-05:00"}}}
            
            ```
            
            ### End On  

            Returns all instructional events for the end on date passed.

            ```

            /instructional-events?criteria={"recurrence":{"timePeriod":{"endOn":"1994-12-09T11:50:00-06:00"}}}
            
            ```
            
        - name: academicPeriod
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Academic Period  

            Returns all instructional events for the academic period ID passed.

            ```

            /instructional-events?academicPeriod={"academicPeriod":{"id":"4a0c95f7-0903-408a-8694-77b313809909"}}


            ```
      responses:
        "200":
          description: Success
          content:
            application/vnd.hedtech.integration.v11.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-instructional-events.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in SSRMEET
      description: >
        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.


        Creates a new instructional event record in SSRMEET.


        The properties 'title','description', 'recurrence.repeatRule.type of daily, monthly and yearly', approvals.approvalEntity and 'location.type of site and other' are not supported on a create request.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_INSTRUCTIONAL_EVENTS
      tags:
        - instructional-events
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11.1.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11.1.0+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-instructional-events.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v11.1.0+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-instructional-events.json"
  /api/instructional-events/{id}:
    get:
      summary: Return the requested resource from SSRMEET
      description: >
        Returns a single instructional event record from SSRMEET table with the
        requested identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_INSTRUCTIONAL_EVENTS
      tags:
        - instructional-events
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
