openapi: 3.0.0
info:
  title: Instructors
  description: Information about individuals who provide instruction at an
    educational institution.
  version: "9.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/instructors:
    get:
      summary: Return all resources from SIBINST
      description: Return a paged listing of all the instructor records from SIBINST table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_INSTRUCTORS
      tags:
        - instructors
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v9+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Instructor   

            Returns all instructors for the given instructor

            ```

            /instructors?criteria={"instructor":"28a071aa-a99d-4541-a5d1-054e5ad80cc4"}

            ```

            ```

            /instructors?criteria={"instructor":{"id":"28a071aa-a99d-4541-a5d1-054e5ad80cc4"}}

            ```

            ### Primary Location  

            Not Supported
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-instructors.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v9+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/instructors/{id}:
    get:
      summary: Return the requested resource from SIBINST
      description: Return the single instructor record with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_INSTRUCTORS
      tags:
        - instructors
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Instructors for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v9+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v9+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v9+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-instructors.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-instructors.json:
      title: Instructors
      description: Information about individuals who provide instruction at an
        educational institution.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the instructor.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SIBINST_GUID(SIBINST)
        instructor:
          title: Instructor
          description: A link to the person filling the instructor role.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Instructor.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: SIBINST_PIDM(SIBINST)
          additionalProperties: false
          required:
            - id
        institutionalUnits:
          title: Institutional Units
          description: Information about the institutional units to which the instructor
            is assigned.
          type: array
          items:
            type: object
            properties:
              school:
                title: School
                description: The school to which the instructor is assigned.
                oneOf:
                  - type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the School.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: educational-institution-units 
                        x-lineageReferenceObject: SIRDPCL_COLL_CODE(SIRDPCL)
                    additionalProperties: false
                    required:
                      - id
                  - type: object
                    maxProperties: 0
              division:
                title: Division
                description: The division to which the instructor is assigned.
                oneOf:
                  - type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Division.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: educational-institution-units 
                        x-lineageReferenceObject: unsupported
                    additionalProperties: false
                    required:
                      - id
                  - type: object
                    maxProperties: 0
              department:
                title: Department
                description: The department to which the instructor is assigned.
                oneOf:
                  - type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Department.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: educational-institution-units 
                        x-lineageReferenceObject: SIRDPCL_DEPT_CODE(SIRDPCL)
                    additionalProperties: false
                    required:
                      - id
                  - type: object
                    maxProperties: 0
              percentage:
                title: Percentage
                description: The percentage of the instructor's responsibility allocated to the
                  institutional unit.
                oneOf:
                  - type: number
                    x-lineageReferenceObject: SIRDPCL_PERCENTAGE(SIRDPCL)
                  - type: string
                    nullable: true
              administrativeUnit:
                title: Administrative Unit
                description: An indicator of the instructor's administrative organization.
                oneOf:
                  - type: string
                    enum:
                      - primary
                    x-lineageReferenceObject: derived  
                    x-lineageDerivedLogic: If SIRDPCL_HOME_IND = 'Y' publish primary;else property is not published.
                  - type: string
                    maxLength: 0
            additionalProperties: false
          minProperties: 1
        primaryLocation:
          title: Primary Location
          description: The location where the instructor typically performs his/her duties.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Primary Location.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: sites 
                  x-lineageReferenceObject: unsupported
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        category:
          title: Category
          description: The category to which the instructor belongs (e.g. professor,
            associate professor, adjunct professor, auxiliary, etc.)
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Category.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: instructor-categories 
                  x-lineageReferenceObject: STVFCTG_GUID(STVFCTG)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        staffType:
          title: Staff Type
          description: The staff type of the instructor (e.g. full time, part time,
            continuing education).
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Staff Type.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: instructor-staff-types 
                  x-lineageReferenceObject: STVFSTP_GUID(STVFSTP)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        tenure:
          title: Tenure
          description: The tenure of the instructor.
          type: object
          properties:
            type:
              title: Type
              description: The type of tenure (e.g tenured, non-tenured, on track, ineligible,
                without faculty status).
              type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Type.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: instructor-tenure-types 
                  x-lineageReferenceObject: SIBFACD_TENR_CODE(SIBFACD)
              additionalProperties: false
              required:
                - id
            startOn:
              title: Start On
              description: The date when tenure was awarded to the instructor.
              oneOf:
                - type: string
                  format: date
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                  x-lineageReferenceObject: SIBFACD_TENURE_DATE(SIBFACD)
                - type: string
                  maxLength: 0
            reviewedOn:
              title: Reviewed On
              description: The date the instructor was last reviewed for tenure.
              oneOf:
                - type: string
                  format: date
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                  x-lineageReferenceObject: SIBFACD_TENURE_REV_DATE(SIBFACD)
                - type: string
                  maxLength: 0
          additionalProperties: false
          required:
            - type
      required:
        - id
        - instructor
      additionalProperties: false
