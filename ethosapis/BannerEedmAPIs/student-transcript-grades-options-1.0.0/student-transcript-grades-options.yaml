openapi: 3.0.0
info:
  title: Student Transcript Grades Options
  description: >
    Student transcript grade options is an alternate representation of
    student-transcript-grades API that exposes grading options for all the
    transcript grade records in SHRTCKN table. The response also includes grade
    scheme from SHRGSCH table and grade options along with any incomplete grades
    associated from SHRGRDE table.
  version: 1.0.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Student
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-transcript-grades:
    get:
      summary: Returns resources from SHRGRDE
      description: >
        Returns a paged list of student transcript grading options from SHRGRDE
        table for all the student transcript grade records from SHRTCKN table.


        Based on the level and grade mode of the SHRTCKN record, all grades applicable for student transcript are retrieved.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_TRANSCRIPT_GRADES
      tags:
        - student-transcript-grades-options
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.student-transcript-grades-options.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: student
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Student  

            Filter to return student associated with a transcript grade.

            ```

            /student-transcript-grades?student={"student":{"id":"86a94f19-9216-4c52-a4b0-31e3bf674280"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-student-transcript-grades-options.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/student-transcript-grades/{id}:
    get:
      summary: Return the requested resource from SHRGRDE
      description: >
        Returns the student transcript grading options from SHRGRDE for the
        student transcript grade identifier from SHRTCKN table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_TRANSCRIPT_GRADES
      tags:
        - student-transcript-grades-options
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.student-transcript-grades-options.v1+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-student-transcript-grades-options.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-student-transcript-grades-options.json:
      title: Student Transcript Grades Options
      description: The options associated with the student transcript grade.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the student transcript grade.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SHRTNID_GUID(SHRTNID)
        gradeScheme:
          title: Grade Scheme
          description: The grading scheme used to award the student their grade.
          oneOf:
            - type: object
              properties:
                detail:
                  title: Detail
                  description: The grading scheme used to award the student their grade.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Detail.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: grade-schemes 
                      x-lineageReferenceObject: SHRGSCH_GUID(SHRGSCH)
                  additionalProperties: false
                  required:
                    - id
                title:
                  title: Title
                  description: The full name of the grading scheme.
                  type: string
                  x-lineageReferenceObject: SHRGSCH_GRADE_SCHEME_DESC(SHRGSCH)
              additionalProperties: false
              required:
                - detail
            - type: object
              maxProperties: 0
        grades:
          title: Grades
          description: The grading options associated with the student transcript grade.
          type: array
          items:
            type: object
            properties:
              grade:
                title: Grade
                description: The grade that may be awarded to the student by the instructor.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Grade.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: grade-definitions 
                    x-lineageReferenceObject: SHRGDID_GUID(SHRGDID)
                additionalProperties: false
                required:
                  - id
              value:
                title: Value
                description: The grade value.
                type: string
                x-lineageReferenceObject: SHRGDID_GRDE_CODE(SHRGDID)
              incompleteGrade:
                title: Incomplete Grade
                description: The default incomplete final grade and the extension date
                  associated with the student's grade.
                type: object
                properties:
                  finalGrade:
                    title: Final Grade
                    description: The default final grade.
                    oneOf:
                      - type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Final Grade.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: grade-definitions 
                            x-lineageReferenceObject: SHRGRDE_GRDE_CODE_INCMP_FINA(SHRGRDE)
                        additionalProperties: false
                        required:
                          - id
                      - type: object
                        maxProperties: 0
                  extensionDate:
                    title: Extension Date
                    description: The date after which the default final grade may be applied.
                    oneOf:
                      - type: string
                        format: date
                        pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                        x-lineageReferenceObject: derived  
                        x-lineageDerivedLogic: If SHRTCKN_PTRM_CODE is not null, then fetch the corresponding part of term record from SOBPTRM where SHRTCKN_TERM_CODE = SOBPTRM_TERM_CODE and display extension date from SOBPTRM_INCOMPLETE_EXT_DATE if not null. Else if SOBPTRM_INCOMPLETE_EXT_DATE is null then display SOBPTRM_END_DATE. Else, if SHRTCKN_PTRM_CODE is null then display STVTERM_END_DATE  for the SHRTCKN_TERM_CODE If SHRTCKN_PTRM_CODE is not null
                      - type: string
                        maxLength: 0
                additionalProperties: false
            additionalProperties: false
            required:
              - grade
      required:
        - id
      additionalProperties: false
