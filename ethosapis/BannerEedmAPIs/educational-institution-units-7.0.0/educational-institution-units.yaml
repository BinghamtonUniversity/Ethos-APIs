openapi: 3.0.0
info:
  title: Educational Institution Units
  description: Operational units of an educational institution, such as a department
  version: "7.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/educational-institution-units:
    get:
      summary: Return all resources from STVCOLL, STVDIVS and STVDEPT
      description: Returns a paged listing of all the educational institution unit
        records. The API retrieves all the college records from STVCOLL table,
        all the division records from STVDIVS table and all the department
        records from STVDEPT table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EDU_INST_UNITS
      tags:
        - educational-institution-units
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Type  
            Returns all educational institution units for the type passed
            ```
            /api/educational-institution-units?type=college
            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-educational-institution-units.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/educational-institution-units/{id}:
    get:
      summary: Return the requested resource
      description: Returns a single educational institution unit record with the
        passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EDU_INST_UNITS
      tags:
        - educational-institution-units
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Educational Institution Units for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v7+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-educational-institution-units.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
