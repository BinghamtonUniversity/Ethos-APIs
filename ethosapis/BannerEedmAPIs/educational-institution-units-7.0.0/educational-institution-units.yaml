          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= departments) or GORGUID_GUID(LDM_NAME= divisions) or GORGUID_GUID(LDM_NAME= colleges)
          x-lineageDerivedLogic: A records in GORGUID with GORGUID_LDM_NAME as 'departments' will refer to each STVDEPT_CODE(STVDEPT) or 
            a record with GORGUID_LDM_NAME as 'divisions' will refer to each STVDIVS_CODE(STVDIVS) or 
            a record with GORGUID_LDM_NAME as 'colleges' will refer to each STVCOLL_CODE(STVCOLL).
        title:
          title: Title
          description: The full name of the unit
          type: string
          minLength: 1
          x-lineageReferenceObject: STVDEPT_DESC(STVDEPT) or STVDIVS_DESC(STVDIVS) or STVCOLL_DESC(STVCOLL)
