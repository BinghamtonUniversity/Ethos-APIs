          title: Description
          description: The description of the unit
          type: string
          x-lineageReferenceObject: unsupported
        code:
          title: Code
          description: The code of the educational institution unit.
          type: string
          x-lineageReferenceObject: STVDEPT_CODE(STVDEPT) or STVDIVS_CODE(STVDIVS) or STVCOLL_CODE(STVCOLL)
        type:
          title: Type
          description: The type of the unit (e.g., school, division, department, etc.)
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: If record is from STVCOLL publish 'college' or if record is from STVDIVS publish 'division' or if record is from STVDEPT publish 'department'.
