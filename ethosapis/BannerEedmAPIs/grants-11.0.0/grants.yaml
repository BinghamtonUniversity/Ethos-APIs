openapi: 3.0.0
info:
  title: Grants
  description: >-
    Information about grants that are offered by various sponsors to help fund
    research efforts.


    Please refer to "API Integration Configuration Settings" section in the Banner Ethos API Handbook for details on API configuration settings that needs to be configured for this API.
  version: "11.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Finance
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/grants:
    get:
      summary: Return all resources from FRBGRNT
      description: Returns a paged listing of all the grants that are offered by
        various institutions to help fund research efforts from FRBGRNT table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_GRANTS
      tags:
        - grants
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Reporting Segment  
            Returns all grants for the given reportingSegment
            ```
            /grants?criteria={"reportingSegment":"B"}
            ```
        - name: Fiscal Year
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Fiscal Year  

            Returns all grants with all or part of the Project Date range included in a fiscal year

            ```

            /grants?fiscalYear={"fiscalYear":{"id":"c9b09ecd-9f04-4d9d-a897-8a650a2bf1a3"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-grants.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/grants/{id}:
    get:
      summary: Return the requested resource from FRBGRNT
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_GRANTS
      tags:
        - grants
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Grants for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-grants.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-grants.json:
      title: Grants
      description: Information about grants that are offered by various sponsors to
        help fund research efforts.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the grant.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FRBGRNT_GUID(FRBGRNT)
        title:
          title: Title
          description: The full name of the grant.
          type: string
          minLength: 1
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: If FRBGRNT_TITLE is not null, display the column value else display the column value of FRBGRNT_LONG_TITLE
        referenceCode:
          title: Reference Code
          description: The reference code used to identify the grant or project.
          type: string
          minLength: 1
          x-lineageReferenceObject: FRBGRNT_CODE(FRBGRNT)
        sponsorReferenceCode:
          title: Sponsor Reference Code
          description: The reference code used by the sponsor.
          type: string
          x-lineageReferenceObject: FRBGRNT_SPONSOR_ID(FRBGRNT)
        reportingSegment:
          title: Reporting Segment
          description: The segment of the educational institution used for reporting
            purposes.
          type: string
          x-lineageReferenceObject: FRBGRNT_COAS_CODE(FRBGRNT)
        startOn:
          title: Start On
          description: The first date when transactions can be processed for the grant or
            project.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FRBGRNT_PROJECT_START_DATE(FRBGRNT)
        endOn:
          title: End On
          description: The last date when transactions can be processed for the grant or
            project.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: FRBGRNT_PROJECT_END_DATE(FRBGRNT)
            - type: string
              maxLength: 0
        sponsor:
          title: Sponsor
          description: The person or organization sponsoring the grant.
          oneOf:
            - title: Person
              description: The person sponsoring the grant.
              type: object
              properties:
                person:
                  title: Person
                  description: The person sponsoring the grant.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Person.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: persons 
                      x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
                      x-lineageDerivedLogic: A record in GORGUID where GORGUID_LDM_NAME = 'persons' for FRBGRNT_AGENCY_PIDM
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - person
            - title: Organization
              description: The organization sponsoring the grant.
              type: object
              properties:
                organization:
                  title: Organization
                  description: The organization sponsoring the grant.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Organization.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: organizations 
                      x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = non-persons) 
                      x-lineageDerivedLogic: A record in GORGUID where GORGUID_LDM_NAME = 'nonpersons' for FRBGRNT_AGENCY_PIDM
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - organization
            - type: object
              maxProperties: 0
        status:
          title: Status
          description: The status of the grant.
          oneOf:
            - type: string
              enum:
                - active
                - inactive
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: If current date is between FRBGRNT_PROJECT_START_DATE and FRBGRNT_PROJECT_END_DATE then display 'active' else display 'inactive'
            - type: string
              maxLength: 0
        accountingStrings:
          title: Accounting Strings
          description: The formatted accounting strings associated with the grant.
          type: array
          items:
            type: string
            x-lineageReferenceObject: derived  
            x-lineageDerivedLogic: SELECT FRRGRNL_COAS_CODE,FRRGRNL_FUND_CODE, FRRGRNL_ORGN_CODE,FRRGRNL_ACCT_CODE,FRRGRNL_PROG_CODE, FRRGRNL_ACTV_CODE, FRRGRNL_LOCN_CODE from FRRGRNL where FRRGRNL_GRNT_CODE = 'grantcode'
        amount:
          title: Amount
          description: The total amount budgeted for the grant or project.
          oneOf:
            - type: object
              format: currency
              properties:
                value:
                  title: Value
                  description: The monetary value
                  type: number
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: Display the amount value (sum of revenue acct types) - (sum of expenditure acct types)
                currency:
                  title: Currency
                  description: The ISO 4217 currency code
                  enum:
                    - AED
                    - AFN
                    - ALL
                    - AMD
                    - ANG
                    - AOA
                    - ARS
                    - AUD
                    - AWG
                    - AZN
