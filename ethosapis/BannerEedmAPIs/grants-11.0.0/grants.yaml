                    - VUV
                    - WST
                    - XAF
                    - XCD
                    - XOF
                    - XPF
                    - YER
                    - ZAR
                    - ZMW
                    - ZWL
                  type: string
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: Display 'USD'
              additionalProperties: false
              required:
                - value
                - currency
            - type: object
              maxProperties: 0
        category:
          title: Category
          description: The category of the grant. (For example, research grant,
            construction project, etc.)
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: SELECT FTVSDAT_TITLE FROM FTVSDAT,FRBGRNT WHERE FTVSDAT_SDAT_CODE_ENTITY='FRBGRNT' AND FTVSDAT_SDAT_CODE_ATTR ='GRANT_TYPE' AND FTVSDAT_SDAT_CODE_OPT_1 = FRBGRNT_GRANT_TYPE AND FRBGRNT_GRANT_TYPE IS NOT NULL;
        reportingPeriods:
          title: Reporting Periods
          description: The reporting periods associated with the grant.
          type: array
          items:
            type: object
            properties:
              startOn:
                title: Start On
                description: The first date of the reporting period.
                type: string
                format: date
                pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                x-lineageReferenceObject: FTVFSPD_PRD_START_DATE(FTVFSPD)
              endOn:
                title: End On
                description: The last date of the reporting period.
                type: string
                format: date
                pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                x-lineageReferenceObject: FTVFSPD_PRD_END_DATE(FTVFSPD)
            additionalProperties: false
            required:
              - startOn
              - endOn
        principalInvestigator:
          title: Principal Investigator
          description: The principal investigator associated with the grant or project.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Principal Investigator.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: persons 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
                  x-lineageDerivedLogic: A record in GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY=FRBGRNT_AGENCY_PIDM
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
      required:
        - id
        - title
        - referenceCode
        - startOn
      additionalProperties: false
