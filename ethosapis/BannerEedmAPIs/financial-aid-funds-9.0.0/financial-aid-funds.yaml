openapi: 3.0.0
info:
  title: Financial Aid Funds
  description: |
    The details of named grants, loans, scholarships, etc.
  version: "9.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Financial Aid
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/financial-aid-funds:
    get:
      summary: Returns resources from RFRBASE
      description: >
        Returns a paged listing of all the financial aid funds from RFRBASE
        table.


        The API configuration setting 'FINANCIAL.AID.FUNDS.PRIVACY' is used to map the fund category values from RTVFCAT associated with the fund to either restricted or nonRestricted.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_FINANCIAL_AID_FUNDS
      tags:
        - financial-aid-funds
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v9+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-financial-aid-funds.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v9.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/financial-aid-funds/{id}:
    get:
      summary: Return the requested resource from RFRBASE
      description: >
        Returns a single financial aid fund from RFRBASE table with the
        requested identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_FINANCIAL_AID_FUNDS
      tags:
        - financial-aid-funds
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v9+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v9.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v9.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-financial-aid-funds.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-financial-aid-funds.json:
      title: Financial Aid Funds
      description: The details of named grants, loans, scholarships, etc.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the financial aid fund.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: RFRBASE_GUID(RFRBASE)
        title:
          title: Title
          description: The full name of the financial aid fund.
          type: string
          minLength: 1
          x-lineageReferenceObject: RFRBASE_FUND_TITLE(RFRBASE)
        description:
          title: Description
          description: The description of the financial aid fund.
          type: string
          x-lineageReferenceObject: RFRBASE_FUND_TITLE_LONG(RFRBASE)
        code:
          title: Code
          description: The code that identifies the financial aid fund.
          type: string
          x-lineageReferenceObject: RFRBASE_FUND_CODE(RFRBASE)
        source:
          title: Source
          description: The source of the financial aid fund (federal, state,
            institutional, other).
          oneOf:
            - type: string
              enum:
                - federal
                - institutional
                - state
                - other
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display 'federal' if RTVFSRC_IND = 'F' for the RTVFSRC_CODE. Display 'institutional' if RTVFSRC_IND = 'I' for the RTVFSRC_CODE. Display 'state' if RTVFSRC_IND = 'S' for the RTVFSRC_CODE. Display 'other' if RTVFSRC_IND = 'O' for the RTVFSRC_CODE
            - type: string
              maxLength: 0
        aidType:
          title: Aid Type
          description: Type of the financial aid fund (loan, grant, scholarship, work).
          oneOf:
            - type: string
              enum:
                - loan
                - grant
                - scholarship
                - work
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display 'loan' if RTVFTYP_ATYP_IND = 'L' for the RTVFTYP_CODE. Display 'grant' if RTVFTYP_ATYP_IND = 'G' for the RTVFTYP_CODE. Display 'scholarship' if RTVFTYP_ATYP_IND = 'S' for the RTVFTYP_CODE. Display 'work' if RTVFTYP_ATYP_IND = 'W' for the RTVFTYP_CODE
            - type: string
              maxLength: 0
        classifications:
          title: Classifications
          description: The classifications assigned to the financial aid fund.
          type: array
          items:
            title: Classifications
            description: The classifications assigned to the financial aid fund.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Classifications.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: financial-aid-fund-classifications 
                x-lineageReferenceObject: RFRBASE_FUND_CODE(RFRBASE)
            additionalProperties: false
            required:
              - id
        category:
          title: Category
          description: Category of the financial aid fund.
          oneOf:
            - type: object
              properties:
                name:
                  title: Name
                  description: Name of the financial aid fund category.
                  enum:
                    - pellGrant
                    - federalUnsubsidizedLoan
                    - federalSubsidizedLoan
                    - graduateTeachGrant
                    - undergraduateTeachGrant
                    - parentPlusLoan
                    - graduatePlusLoan
                    - federalWorkStudyProgram
                    - iraqAfghanistanServiceGrant
                    - academicCompetitivenessGrant
                    - bureauOfIndianAffairsFederalGrant
                    - robertCByrdScholarshipProgram
                    - paulDouglasTeacherScholarship
                    - generalTitleIVloan
                    - healthEducationAssistanceLoan
                    - healthProfessionalStudentLoan
                    - incomeContingentLoan
                    - loanForDisadvantagesStudent
                    - leveragingEducationalAssistancePartnership
                    - nationalHealthServicesCorpsScholarship
                    - nursingStudentLoan
                    - primaryCareLoan
                    - federalPerkinsLoan
                    - rotcScholarship
                    - federalSupplementaryEducationalOpportunityGrant
                    - stayInSchoolProgram
                    - federalSupplementaryLoanForParent
                    - nationalSmartGrant
                    - stateStudentIncentiveGrant
                    - vaHealthProfessionsScholarship
                    - nonGovernmental
                  type: string
                  x-lineageReferenceObject: RFRBASE_FED_FUND_ID(RFRBASE)
                detail:
                  title: Detail
                  description: The extension to the category of the financial aid fund.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Detail.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: financial-aid-fund-categories 
                          x-lineageReferenceObject: RFRBASE_FED_FUND_ID(RFRBASE)
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
              additionalProperties: false
              required:
                - name
            - type: object
              maxProperties: 0
        privacy:
          title: Privacy
          description: The privacy level of the financial aid fund based on privacy
            concerns (restricted, non-restricted). This indicates whether the
            award of this fund to a student is restricted or not for view.
          oneOf:
            - type: string
              enum:
                - restricted
                - nonRestricted
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: For the RFRBASE_FUND_CODE, fetch the corresponding RFRFCAT_FCAT_CODE from RFRFCAT table. Display the privacy status defined for this code in the API configuration setting FINANCIAL.AID.FUNDS.PRIVACY. 'privacy' is not displayed if value not configured in the setting
            - type: string
              maxLength: 0
        financials:
          title: Financials
          description: Financial details related to the financial aid fund by aid year and
            financial aid office.
          type: array
          items:
            type: object
            properties:
              aidYear:
                title: Aid Year
                description: The year that the financial aid fund is available for.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Aid Year.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: financial-aid-years 
                    x-lineageReferenceObject: ROBINST_GUID(ROBINST)
                additionalProperties: false
                required:
                  - id
              office:
                title: Office
                description: The financial aid office handling the funds.
                oneOf:
                  - type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Office.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: financial-aid-offices 
                        x-lineageReferenceObject: unsupported
                    additionalProperties: false
                    required:
                      - id
                  - type: object
                    maxProperties: 0
              budgetedAmount:
                title: Budgeted Amount
                description: Maximum total amount that can be accepted by all students for a
                  given financial aid year and office.
                format: currency
                type: object
                properties:
                  value:
                    title: Value
                    description: The monetary value
                    type: number
                    x-lineageReferenceObject: RFRASPC_TOTAL_ALLOC_AMT(RFRASPC)
                  currency:
                    title: Currency
                    description: The ISO 4217 currency code
