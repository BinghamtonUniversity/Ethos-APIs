                      type: string
                      x-lineageReferenceObject: GUBINST_BASE_CURR_CODE(GUBINST)
                  additionalProperties: false
                  required:
                    - lowerBound
                    - upperBound
                    - currencyCode
              additionalProperties: false
              required:
                - type
                - range
            - type: object
              maxProperties: 0
        startOn:
          title: Start On
          description: The date when the position is first available.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: NBBPOSN_BEGIN_DATE(NBBPOSN)
        endOn:
          title: End On
          description: The date when the position is last available.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: NBBPOSN_END_DATE(NBBPOSN)
            - type: string
              maxLength: 0
        authorizedOn:
          title: Authorized On
          description: The date when the position is authorized.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: unsupported
