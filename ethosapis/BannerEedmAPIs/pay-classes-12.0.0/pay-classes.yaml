openapi: 3.0.0
info:
  title: Pay Classes
  description: The standard method of paying employees.
  version: "12.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/pay-classes:
    get:
      summary: Return all resources from PTRECLS
      description: Returns a paged listing of all the pay classes from PTRECLS table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PAY_CLASSES
      tags:
        - pay-classes
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-pay-classes.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/pay-classes/{id}:
    get:
      summary: Return the requested resource from PTRECLS
      description: Returns the single pay class record with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PAY_CLASSES
      tags:
        - pay-classes
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Pay Classes for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v12.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-pay-classes.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-pay-classes.json:
      title: Pay Classes
      description: The standard method of paying employees.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the pay class.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        title:
          title: Title
          description: The full name of the pay class.
          type: string
          minLength: 1
        description:
          title: Description
          description: The description of the pay class.
          type: string
        code:
          title: Code
          description: A code that may be used to identify the pay class.
          type: string
        paysPerYear:
          title: Pays Per Year
          description: The number of pays per year employees are scheduled to receive.
          oneOf:
            - type: integer
            - type: string
              nullable: true
        classType:
          title: Class Type
          description: An indicator if the pay class is supplemental to (used in addition
            to) another pay class.
          oneOf:
            - type: string
              enum:
                - supplemental
                - notSupplemental
            - type: string
              maxLength: 0
        payCycle:
          title: Pay Cycle
          description: The cycle which determines how employees are paid for the given pay
            class.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Pay Cycle.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: pay-cycles
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        payFrequency:
          title: Pay Frequency
          description: The frequency at which employees are paid when they are working.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Pay Frequency.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: employment-frequencies
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        hoursPerPeriod:
          title: Hours Per Period
          description: The default pay period work hours for positions associated with the
            pay class.
          type: array
          items:
            type: object
            properties:
              period:
                title: Period
                description: The default time period (e.g. day, week, month, etc.).
                enum:
                  - day
                  - week
                  - month
                  - year
                  - payPeriod
                type: string
              hours:
                title: Hours
                description: The default work hours in the specified time period.
                type: number
            additionalProperties: false
            required:
              - period
              - hours
        status:
          title: Status
          description: The status of the pay class (e.g. active or inactive).
          oneOf:
            - type: string
              enum:
                - active
                - inactive
            - type: string
              maxLength: 0
        compensationType:
          title: Compensation Type
          description: The compensation type associated with the pay class (e.g. salary or
            wages).
          oneOf:
            - type: string
              enum:
                - salary
                - wages
            - type: string
              maxLength: 0
      required:
        - id
        - title
      additionalProperties: false
