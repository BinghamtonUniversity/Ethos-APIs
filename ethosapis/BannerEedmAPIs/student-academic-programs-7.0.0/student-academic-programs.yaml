openapi: 3.0.0
info:
  title: Student Academic Programs
  description: >-
    **API Deprecation Notice**



    Deprecated on: 30-Sep-2019



    Sunset on: 01-Oct-2021



    Description: Replaced by V16.0.0 which removes performance measure and credit information that are now contained in student-grade-point-averages and replaces subdisciplines with parentDiscipline to better represent data. Replaces admissionClassification object with admissionCategory (link to admission-populations) and adds recruited and applied enumerations to curriculumObjective.



    ----


    The academic programs in the home institution in which a student has beed enrolled.
  version: "7.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Student
  x-deprecated-on: 2019-09-30
  x-sunset-on: 2021-10-01
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
