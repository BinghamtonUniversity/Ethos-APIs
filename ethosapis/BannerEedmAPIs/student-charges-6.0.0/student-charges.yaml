openapi: 3.0.0
info:
  title: Student Charges
  description: >-
    **API Deprecation Notice**



    Deprecated on: 31-Mar-2020



    Sunset on: 31-Mar-2022



    Description: Version 16.0.0 replaces this version of student-charges and removes the chargeType property, updates the academicPeriod property to required, and adds functionality for tax reporting.



    ----


    Charges for expenses incurred by a student.
