openapi: 3.0.0
info:
  title: Student Advisor Relationships Submission Process
  description: Process student advisor relationship adjustments and deletions.
  version: 1.0.0
  x-api-type: ethos
  x-release-status: ga
  x-source-system: banner
  x-audience: all
  x-source-domain: Student
  x-source-name: SGRADVR
servers:
- url: https://integrate.elluciancloud.com
  description: Ethos Integration API U.S.
- url: https://integrate.elluciancloud.ca
