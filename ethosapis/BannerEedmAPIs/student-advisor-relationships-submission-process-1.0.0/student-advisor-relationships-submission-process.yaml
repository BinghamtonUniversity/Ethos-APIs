- url: "{server_url}"
  description: Custom server url
  variables:
    server_url:
      default: localhost
paths:
  /api/student-advisor-relationships-submission-process:
    post:
      tags:
        - student-advisor-relationships-submission-process
      summary: The student-advisor-relationships-submission-process API will allow the advisor record for the student (SubjectPerson) to be modified, ended, or removed from the SGRADVR table.
      description: > 
        The student-advisor-relationships-submission-process API will allow the advisor record for the student (SubjectPerson) to be modified, ended, or removed from the SGRADVR table.  
        This is a companion API to student-advisor-relationships to retrieve advising assignments.
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
      requestBody:
        content:
          application/vnd.hedtech.integration.1.0.0+json:
            schema:
              type: object
              $ref: '#/components/schemas/student-advisor-relationships-submission-process-1.0.0_post_request'
      responses:
        '200':
          description: OK
          headers:
            X-Media-Type:
              description: The full semantic version with the media type of the response.
