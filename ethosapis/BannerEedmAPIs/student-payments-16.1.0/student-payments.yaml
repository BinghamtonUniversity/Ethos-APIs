                - TZS
                - UAH
                - UGX
                - USD
                - UYU
                - UZS
                - VEF
                - VND
                - VUV
                - WST
                - XAF
                - XCD
                - XOF
                - XPF
                - YER
                - ZAR
                - ZMW
                - ZWL
              type: string
              x-lineageReferenceObject: GUBINST_BASE_CURR_CODE(GUBINST)
          additionalProperties: false
          required:
            - value
            - currency
        reportingDetail:
          title: Reporting Detail
          description: Attributes specific to the transaction when identified for tax
            reporting only.
          oneOf:
            - type: object
              properties:
                usage:
                  title: Usage
                  description: The usage associated with the payment (i.e. tax reporting only).
                  enum:
                    - taxReportingOnly
                  type: string
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: For tax reported items only - defaults to 'taxReportingOnly'
                originatedOn:
                  title: Originated On
                  description: The date the payment originated for consideration in tax report
                    generation.
                  type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  x-lineageReferenceObject: TBREACD_ENTRY_DATE(TBREACD)
              additionalProperties: false
              required:
                - usage
                - originatedOn
            - type: object
              maxProperties: 0
        overrideDescription:
          title: Override Description
          description: The override description associated with the payment.
          type: string
          x-lineageReferenceObject: TBREACD_DESC(TBREACD) or TBRACCD_DESC(TBRACCD)
        comments:
          title: Comments
          description: The comments associated with the payment.
          type: array
          items:
            type: string
            x-lineageReferenceObject: TBRACDT_TEXT(TBRACDT) or TBREACDM_COMMENT(TBREACDM)
      required:
        - id
        - student
        - fundingSource
        - academicPeriod
        - paymentType
        - paidOn
        - amount
      additionalProperties: false