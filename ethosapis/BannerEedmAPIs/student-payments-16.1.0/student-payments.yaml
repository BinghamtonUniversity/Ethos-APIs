openapi: 3.0.0
info:
  title: Student Payments
  description: >
    The Student Payments API contains information about payments on a student account.


    This version of student payments API supports U.S. 1098T tax reporting student payment transactions.


    Please refer to "API Integration Configuration Settings" section in the Banner Ethos API Handbook" for details on API configuration settings that needs to be configured for this API.
  version: 16.1.0
  x-source-system: banner
  x-source-title: Student Payments
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Student
  x-audience: all
  
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: student-payments
paths:
  /api/student-payments:
    get:
      summary: Returns resources from TBRACCD and TBREACD
      description: >
        Returns a paged listing of all the student payment transactions from
        TBRACCD and tax reporting payment transactions from TBREACD tables
        excluding the records with term code ‘ARTERM’.

        The payment trasactions in TBRACCD and TBREACD are identified through the TBBDETC_TYPE_IND of the accounting code associated with the student payment record in TBRACCD_DETAIL_CODE and TBREACD_DETAIL_CODE.  The TBBDETC_TYPE_IND type of 'P' denotes the transaction as a Payment. The student payments API publishes the non student payments along with student related payments if the configuration setting 'STUD-PAYMENTS-NONPERSONS' is set to 'Y'. 


        Note: The API does not allow to create a non student payments record. For non student payments, the student.id will not be published though it is a required property.
      security:
        - BasicAuth: []
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_PAYMENTS
      tags:
        - student-payments
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v16.1.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: string
          description: >
            ### Student  

            The person (student) who made the payment.

            ```

            /student-payments?criteria={"student": {"id": "5674f28b-b216-4055-b236-81a922d93b4c"}}

            ```

            ### Funding Source  

            The accounting code of the funding source associated with the student payment.

            ```

            /student-payments?criteria={"fundingSource": {"id": "16da50f1-94d7-4e64-9e4d-3e6a049bf532"}}

            ```

            ### Funding Destination  

            The accounting code of the funding destination associated with the student payment.

            ```

            /student-payments?criteria={"fundingDestination": {"id": "a37ff472-ee18-49e4-afdf-9a1508b80cb5"}}

            ```

            ### Academic Period  

            The academic period to which the payment is attached.

            ```

            /student-payments?criteria={"academicPeriod": {"id": "060d0dd1-75aa-4c43-989c-0015b6f01d6e"}}

            ```

            ### Payment Type  

            The type of the payment.

            ```

            /student-payments?criteria={"paymentType": "cash"}

            ```

            ### Usage  

            The usage associated with the payment (i.e. tax reporting only).

            ```

            /student-payments?criteria={"reportingDetail":{"usage":"taxReportingOnly"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-student-payments.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v16.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in TBRACCD and TBREACD
      description: >
        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.


        Creates a new student payment record. A create request sent with 'reportingDetail' property will create a tax reporting payment transaction record in TBREACD table. A create request sent without 'reportingDetail' property will create a student payment record in TBRACCD table.


        Below are the API behavior details for fundingSource and paidOn properties on a create request:


        fundingSource:


        - The accounting code GUID sent as fundingSource.id should match the fundingDestination.id.

        - If the fundingDestination.id is not equal to fundingSource.id, the create request will be rejected with an error message.


        paidOn:


        - A create request sent for a student payment transaction without reportingDetail property will not allow future dated values.

        - A create request sent for a tax reporting payment transaction with reportingDetail property will allow backdating chargeableOn. Request will be rejected if future dated value is sent.
      security:
        - BasicAuth: []
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_PAYMENTS
      tags:
        - student-payments
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v16.1.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v16.1.0+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v16.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v16.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-student-payments.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v16.1.0+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-student-payments.json"
  /api/student-payments/{id}:
    get:
      summary: Return the requested resource from TBRACCD and TBREACD
      description: >
        Returns a single student payment record from TBRACCD or TBREACD table
        with the requested identifier
      security:
        - BasicAuth: []
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_PAYMENTS
      tags:
        - student-payments
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v16.1.0+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v16.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v16.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-student-payments.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-student-payments.json:
      title: Student Payments
      description: Details of payments for a student account (excluding financial aid
        payments).
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the student payment.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: TBREACD_GUID(TBREACD) or TSRTGID_GUID(TSRTGID)
        student:
          title: Student
          description: The person (student) who made the payment.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Student.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
              x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME is 'persons' and GORGUID_DOMAIN_KEY matches TBREACD_PIDM or TBRACCD_PIDM
          additionalProperties: false
          required:
            - id
        fundingSource:
          title: Funding Source
          description: The accounting code of the funding source associated with the
            student payment.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Funding Source.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: accounting-codes 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = accounting-codes)
              x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME is 'accounting-codes' and GORGUID_DOMAIN_KEY matches TBREACD_DETAIL_CODE or TBRACCD_DETAIL_CODE
          additionalProperties: false
          required:
            - id
        fundingDestination:
          title: Funding Destination
          description: The accounting code of the funding destination associated with the student payment.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Funding Destination/Detail Code.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: accounting-codes 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = accounting-codes)
                  x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME is 'accounting-codes' and GORGUID_DOMAIN_KEY matches TBRACCD_DETAIL_CODE or TBREACD_DETAIL_CODE
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        academicPeriod:
          title: Academic Period
          description: The academic period to which the payment is attached.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Academic Period.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: academic-periods 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = term)
              x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME is 'term' and GORGUID_DOMAIN_KEY matches TBREACD_TERM_CODE or TBRACCD_TERM_CODE
          additionalProperties: false
          required:
            - id
        paymentType:
          title: Payment Type
          description: The type of the payment.
          enum:
            - deposit
            - sponsor
            - payroll
            - cash
            - waiver
            - exemption
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Display the valid paymentType enum for the TBBDETC_DETAIL_CODE mapped in the API configuration setting 'STUDENT.AR.CATEGORY.CODES'
        paidOn:
          title: paid On
          description: The date when the payment was made.
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          x-lineageReferenceObject: TBREACD_EFFECTIVE_DATE(TBREACD) or TBRACCD_EFFECTIVE_DATE(TBRACCD)
        amount:
          title: Amount
          description: The amount of the payment.
          format: currency
          type: object
          properties:
            value:
              title: Value
              description: The monetary value
              type: number
              x-lineageReferenceObject: TBRACCD_AMOUNT(TBRACCD) or TBREACD_AMOUNT(TBREACD)
            currency:
              title: Currency
              description: The ISO 4217 currency code
              enum:
                - AED
                - AFN
                - ALL
                - AMD
                - ANG
                - AOA
                - ARS
                - AUD
                - AWG
                - AZN
                - BAM
                - BBD
                - BDT
                - BGN
                - BHD
                - BIF
                - BMD
                - BND
                - BOB
