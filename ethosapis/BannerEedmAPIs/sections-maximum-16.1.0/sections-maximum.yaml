                    x-lineageDerivedLogic: For the SSBSECT_TERM_CODE and SSBSECT_CRN fetch the matching record from SSBOVRR. Display GUID from GORGUID where GORGUID_LDM_NAME is 'colleges' and GORGUID_DOMAIN_KEY matches SSBOVRR_COLL_CODE. Else if SSBOVRR_COLL_CODE is null then, For the SSBSECT_SUBJ_CODE and SSBSECT_CRSE_NUMB fetch the matching course record from SCBCRSE and display GUID from GORGUID where GORGUID_LDM_NAME is 'colleges' and GORGUID_DOMAIN_KEY matches SCBCRSE_COLL_CODE For the SSBSECT_TERM_CODE and SSBSECT_CRN fetch the matching record from SSBOVRR. Display GUID from GORGUID where GORGUID_LDM_NAME is 'divisions' and GORGUID_DOMAIN_KEY matches SSBOVRR_DIVS_CODE. Else if SSBOVRR_DIVS_CODE is null then, For the SSBSECT_SUBJ_CODE and SSBSECT_CRSE_NUMB fetch the matching course record from SCBCRSE and display GUID from GORGUID where GORGUID_LDM_NAME is 'colleges' and GORGUID_DOMAIN_KEY matches SCBCRSE_DIVS_CODE For the SSBSECT_TERM_CODE and SSBSECT_CRN fetch the matching record from SSBOVRR. Display GUID from GORGUID where GORGUID_LDM_NAME is 'departments' and GORGUID_DOMAIN_KEY matches SSBOVRR_DEPT_CODE. Else if SSBOVRR_DEPT_CODE is null then, For the SSBSECT_SUBJ_CODE and SSBSECT_CRSE_NUMB fetch the matching course record from SCBCRSE and display GUID from GORGUID where GORGUID_LDM_NAME is 'departments' and GORGUID_DOMAIN_KEY matches SCBCRSE_DEPT_CODE
