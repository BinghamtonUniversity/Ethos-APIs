openapi: 3.0.0
info:
  title: Sections Maximum
  description: >
    A section is an instance of a course that is used to group students
    interested in taking the course. When students are enrolled in a course,
    they are actually enrolled in one of the sections of that course. All
    sections of a course share the same content associated with the course.


    Sections maximum is an alternate representation of sections that retrieves more details of Banner sections from SSBSECT table. The API includes additional attributes of a course associated with section from SCBCRSE, academic levels from SCRLEVL, grade schemes from SHRGSCH, instructional events from SSRMEET and instructors from SIRASGN. 
  version: 16.1.0 
  x-source-system: banner 
  x-api-type: ethos 
  x-source-domain: Student 
  x-audience: all 
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/sections:
    get:
      summary: Returns resources from SSBSECT
      description: |
        Returns a paged list of sections from SSBSECT in the Banner system.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_SECTIONS
      tags:
        - sections-maximum
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.sections-maximum.v16+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 100 and upper limit is 250.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Title  

            Returns all sections which contains the title passed in the course short title, long title and section short title, long title.

            ```

            /sections?criteria={"title":"AstronomyLab"}

            ```

            ### Start On  

            Returns all sections with start date greater than or equal to the date passed.

            ```

            /sections?criteria={"startOn":"2015-08-29"}

            ```

            ### End On  

            Returns all sections with end date lesser than or equal to the date passed.

            ```

            /sections?criteria={"endOn":"2025-08-29"}

            ```

            ### Code  

            Returns all sections for the code passed.

            ```

            /sections?criteria={"code":"10001"}

            ```

            ### Number  

            Returns all sections for the number passed.

            ```

            /sections?criteria={"number":"1"}

            ```

            ### Instructional Platform Detail  

            Returns all sections for the instructional platform(intergration partner system rule) id passed.

            ```

            /sections?criteria={"instructionalPlatform":{"detail":{"id":"a1cde877-a535-41ad-9a19-44ab4c23d6f8"}}}

            ```

            ### Course Detail  

            Returns all sections for the Course id passed.

            ```

            /sections?criteria={"course":{"detail":{"id":"09b5960d-3741-43c0-98eb-b12c6bed5820"}}}

            ```

            ### Site Detail  

            Returns all sections for the Site id passed.

            ```

            /sections?criteria={"site":{"detail":{"id":"7bb8ce69-3e77-4bc7-982d-07041726502e"}}}

            ```

            ### Category  

            Returns all sections for the status category passed.

            ```

            /sections?criteria={"status":{"category":"open"}}

            ```

            ### Owning Institution Unit  

            Returns all sections for the owning institution units ID passed.

            ```

            /sections?criteria={"owningInstitutionUnits":[{"institutionUnit":{"id":"b23bb183-7d73-4726-af1b-661510324c88"}}]}

            ```

            ### Instructor Roster Details Instructor Details  

            Returns all sections for the instructor ids passed.

            ```

            /sections?criteria={"instructorRosterDetails":[{"instructor":{"detail":{"id":"47bffoc4-202a-4835-a657-773763adf1f0"}}}]}

            ```

            ### Academic Period Detail  

            Returns all sections for the academic period id passed.

            ```

            /sections?criteria={"academicPeriod":{"detail":{"id":"47bffac4-202a-4835-a657-773763adf1f0"}}}

            ```

            ### Reporting Academic Period  

            Returns all sections for the reporting academic period id (section term) passed.

            ```

            /sections?criteria={"reportingAcademicPeriod":{"id":"47bffac4-202a-4835-a657-773763adf1f0"}}

            ```

            ### Schedule Academic Period Detail  

            Returns all sections for the schedule academic period ID passed.

            ```

            /sections?criteria={"scheduleAcademicPeriod":{"detail":{"id":"6582835d-3e14-435b-b74f-4311746987ch"}}}

            ```

            ### Academic Levels

            Not Supported
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-sections-maximum.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.sections-maximum.v16.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/sections/{id}:
    get:
      summary: Return the requested resource from SSBSECT
      description: |
        Returns the section record from SSBSECT with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_SECTIONS
      tags:
        - sections-maximum
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.sections-maximum.v16+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.sections-maximum.v16.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.sections-maximum.v16.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-sections-maximum.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-sections-maximum.json:
      title: Sections Maximum
      description: An instance of a course with all properties fully resolved.
      type: object
      properties:
        id:
          title: ID
          description: A globally unique identifier of a section maximum to be used in all
            external references.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SSBSGID_GUID(SSBSGID)
        title:
          title: Title
          description: The full name of a section.
          type: string
          minLength: 1
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: For the SSBSECT_TERM_CODE and SSBSECT_CRN, fetch the matching record from SSRSYLN. Display title from SSRSYLN_LONG_COURSE_TITLE field if not null, else if SSRSYLN_LONG_COURSE_TITLE is null, then display title from SSBSECT_CRSE_TITLE field if not null, else if SSRSYLN_LONG_COURSE_TITLE and SSBSECT_CRSE_TITLE are null, then for the SSBSECT_SUBJ_CODE and SSBSECT_CRSE_NUMB fetch the matching record from SCBCRSE. Display title from SCBCRSE_TITLE
        description:
          title: Description
          description: A description of a section.
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: For the SSBSECT_TERM_CODE and SSBSECT_CRN, fetch the matching record from SSBDESC and display description from SSBDESC_TEXT_NARRATIVE field if not null. Else if SSBDESC_TEXT_NARRATIVE is null, then for the SSBSECT_TERM_CODE and SSBSECT_CRN fetch the matching record from SSRTEXT and display description from SSRTEXT_TEXT field if not null. Else if SSBDESC_TEXT_NARRATIVE and SSRTEXT_TEXT are null, then for the SSBSECT_SUBJ_CODE and SSBSECT_CRSE_NUMB fetch the matching record from SCBDESC and display description from SCBDESC_TEXT_NARRATIVE field if not null. Else if SCBDESC_TEXT_NARRATIVE is null, then for the SSBSECT_SUBJ_CODE and SSBSECT_CRSE_NUMB fetch the matching record from SCRTEXT and display description from SCRTEXT_TEXT field if not null. If displaying description from SSRTEXT_TEXT then concatenate all the text for all the sequence numbers SSRTEXT_SEQNO for the term and CRN
        startOn:
          title: Offering Start Date
          description: The starting date at which a section may be scheduled to be taken.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: SSBSECT_LEARNER_REGSTART_FDATE(SSBSECT) or SSBSECT_PTRM_START_DATE(SSBSECT)
        endOn:
          title: Offering End Date
          description: The ending date at which a section may no longer be scheduled to be
            taken.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: SSBSECT_PTRM_END_DATE(SSBSECT) or SSBSECT_LEARNER_REGSTART_TDATE(SSBSECT)
            - type: string
              maxLength: 0
        code:
          title: Section Code
          description: The human-readable identifier of a section. It is generally unique
            within an academic period.
          type: string
          x-lineageReferenceObject: SSBSECT_CRN(SSBSECT)
        number:
          title: Section Number
          description: A numbering scheme or other mark that distinguishes between
            multiple sections. It is generally unique within an academic period
            and course.
          type: string
          x-lineageReferenceObject: SSBSECT_SEQ_NUMB(SSBSECT)
        instructionalPlatform:
          title: Instructional Platform
          description: The technology platform used to manage the administration of a
            section
          oneOf:
            - type: object
              properties:
                code:
                  title: Code
                  description: Human-readable code that identifies a technology platform.
                  type: string
                  x-lineageReferenceObject: SSBSECT_INTG_CDE(SSBSECT)
                title:
                  title: Title
                  description: The full name of a technology platform.
                  type: string
                  minLength: 1
                  x-lineageReferenceObject: GORINTG_DESC(GORINTG)
                detail:
                  title: Instructional Platform
                  description: The instructional platform used in this section.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Instructional Platform.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: instructional-platforms 
                      x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = instructional-platforms) 
                      x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME is 'instructional-platforms' and GORGUID_DOMAIN_KEY matches SSBSECT_INTG_CDE
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - title
                - detail
            - type: object
              maxProperties: 0
        academicPeriod:
          title: Academic Period
          description: The academic time period associated with this section.
          oneOf:
            - type: object
              properties:
                code:
                  title: Code
                  description: The code that identifies an academic time period.
                  type: string
                  x-lineageReferenceObject: SSBSECT_PTRM_CODE(SSBSECT) or derived
                  x-lineageDerivedLogic: For the OLR Sections where SSBSECT_PTRM_CODE is null,  fetch the matching record from SOBODTE for the SSBSECT_TERM_CODE  and SSBSECT_INSM_CODE. Display academicPeriod code from SOBODTE as a concatenated value of SOBODTE_TERM_CODE||'(OLR)'||SOBODTE_INSM_CODE
                title:
                  title: Title
                  description: The full name of an academic time period (for example, 'Fall
                    2014').
                  type: string
                  minLength: 1
                  x-lineageReferenceObject: SOBPTRM_DESC(SOBPTRM) or derived 
                  x-lineageDerivedLogic: "For the OLR Sections where SSBSECT_PTRM_CODE is null - fetch the matching record from SOBODTE for the SSBSECT_TERM_CODE  and SSBSECT_INSM_CODE. Display academicPeriod title from SOBODTE as a concatenated value: SOBODTE_TERM_CODE||' Open Learning Rule '||'INSM: '||SOBODTE_INSM_CODE||' SCHD: '||nvl(SOBODTE_SCHD_CODE,'None')||' CAMP: '||nvl(SOBODTE_CAMP_CODE,'None')||' COLL: '||nvl(SOBODTE_COLL_CODE,'None')||' DEPT: '||nvl(SOBODTE_DEPT_CODE,'None')"
                startOn:
                  title: Period Start Date
                  description: The date at which the academic time period begins
                  type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  x-lineageReferenceObject: SOBODTE_REG_START_DATE(SOBODTE) or SOBPTRM_START_DATE(SOBPTRM)
                endOn:
                  title: Period End Date
                  description: The date at which the academic time period ends
                  type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  x-lineageReferenceObject: SOBPTRM_END_DATE(SOBPTRM) or SOBODTE_REG_END_DATE(SOBODTE)
                censusDates:
                  title: Census Dates
                  description: The default dates at which section enrollment/headcount is
                    determined for the academic period.
                  type: array
                  items:
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                    type: string
                    format: date
                    x-lineageReferenceObject: SOBODTE_CENSUS_DATE_ONE or SOBODTE_CENSUS_DATE_TWO(SOBODTE) or SOBPTRM_CENSUS_DATE or SOBPTRM_CENSUS_2_DATE(SOBPTRM)
                category:
                  title: Category
                  description: A category for the academic period.
                  oneOf:
                    - title: Year
                      description: An academic year.
                      type: object
                      properties:
                        type:
                          title: Type
                          description: A type of academic period.
                          enum:
                            - year
                          type: string
                          x-lineageReferenceObject: derived  
                          x-lineageDerivedLogic: Always display as 'subterm'. academicPeriod category type of 'term' and 'year' is not supported
                      additionalProperties: false
                      required:
                        - type
                    - title: Term
                      description: A term within an academic year (for example, Semester).
                      type: object
                      properties:
                        type:
                          title: Type
                          description: A type of period within an academic year.
                          enum:
                            - term
                          type: string
                          x-lineageReferenceObject: derived  
                          x-lineageDerivedLogic: Always display as 'subterm'. academicPeriod category type of 'term' and 'year' is not supported
                        parent:
                          title: Parent
                          description: The academic period or year in which a term occurs.
                          oneOf:
                            - title: Academic Period
                              description: The academic period in which a term occurs.
                              type: object
                              properties:
                                academicPeriod:
                                  title: Academic Period
                                  description: The academic period in which a term occurs.
                                  type: object
                                  properties:
                                    id:
                                      title: ID
                                      description: The global identifier for the Academic Period.
                                      type: string
                                      format: guid
                                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                                      x-lineageLookupReferenceObject: academic-periods 
                                      x-lineageReferenceObject: unsupported
                                  additionalProperties: false
                                  required:
                                    - id
                              additionalProperties: false
                              required:
                                - academicPeriod
                            - title: Academic Year
                              description: The academic year in which a term occurs.
                              type: object
                              properties:
                                academicYear:
                                  title: Academic Year
                                  description: The academic year in which a term occurs.
                                  type: number
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
                              required:
                                - academicYear
                        preceding:
                          title: Preceding
                          description: The term that immediately precedes the current academic term.
                          oneOf:
                            - type: object
                              properties:
                                id:
                                  title: ID
                                  description: The global identifier for the Preceding.
                                  type: string
                                  format: guid
                                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
                              required:
                                - id
                            - type: object
                              maxProperties: 0
                      additionalProperties: false
                      required:
                        - type
                    - title: Subterm
                      description: A subterm within an academic term (for example, Part of a
                        Semester).
                      type: object
                      properties:
                        type:
                          title: Type
                          description: A type of period within a term.
                          enum:
                            - subterm
                          type: string
                          x-lineageReferenceObject: derived  
                          x-lineageDerivedLogic: Always display as 'subterm'. academicPeriod category type of 'term' and 'year' is not supported
                        parent:
                          title: Parent
                          description: The term in which the current subterm occurs.
                          type: object
                          properties:
                            id:
                              title: ID
                              description: The global identifier for the Parent.
                              type: string
                              format: guid
                              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                              x-lineageLookupReferenceObject: academic-periods 
                              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = term) 
                              x-lineageDerivedLogic: For Non-OLR Sections - Display GUID from GORGUID where GORGUID_LDM_NAME is 'term' and GORGUID_DOMAIN_KEY matches the SOBPTRM_TERM_CODE. For OLR Sections - Display GUID from GORGUID where GORGUID_LDM_NAME is 'term' and GORGUID_DOMAIN_KEY matches SOBODTE_TERM_CODE.
                          additionalProperties: false
                          required:
                            - id
                        preceding:
                          title: Preceding
                          description: The subterm that immediately precedes the current subterm.
                          oneOf:
                            - type: object
                              properties:
                                id:
                                  title: ID
                                  description: The global identifier for the Preceding.
                                  type: string
                                  format: guid
                                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                                  x-lineageLookupReferenceObject: academic-periods 
                                  x-lineageReferenceObject: unsupported
                              additionalProperties: false
                              required:
                                - id
                            - type: object
                              maxProperties: 0
                        sectionDateOverride:
                          title: Section Date Override
                          description: An indicator as to whether section date override has been disabled.
                          oneOf:
                            - type: string
                              enum:
                                - notAllowed
                              x-lineageReferenceObject: unsupported
                            - type: string
                              maxLength: 0
                      additionalProperties: false
                      required:
                        - type
                        - parent
                detail:
                  title: Detail
                  description: The academic period used in this section.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Detail.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: academic-periods 
                      x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = subterm) or SOBODTE_GUID(SOBODTE)
                      x-lineageDerivedLogic: For Non-OLR Sections -  Display GUID from GORGUID where GORGUID_LDM_NAME is 'subterm' and GORGUID_DOMAIN_KEY matches SSBSECT_PTRM_CODE
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - title
                - startOn
                - endOn
                - category
                - detail
            - type: object
              maxProperties: 0
        reportingAcademicPeriod:
          title: Reporting Academic Period
          description: The reporting academic period associated with a section.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Reporting Academic Period.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-periods 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = term) 
                  x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME is 'term' and GORGUID_DOMAIN_KEY matches SSBSECT_TERM_CODE
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        scheduleAcademicPeriod:
          title: Schedule Academic Period
          description: The schedule academic period associated with a section.
          oneOf:
            - type: object
              properties:
                code:
                  title: Code
                  description: The code that identifies a schedule academic period.
                  type: string
                  x-lineageReferenceObject: SSBSECT_TERM_CODE(SSBSECT)
                title:
                  title: Title
                  description: The full name of the schedule academic period.
                  type: string
                  minLength: 1
                  x-lineageReferenceObject: STVTERM_DESC(STVTERM)
                detail:
                  title: Detail
                  description: The schedule academic period used in this section.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Detail.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: academic-periods 
                      x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = term) 
                      x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME is 'term' and GORGUID_DOMAIN_KEY matches SSBSECT_TERM_CODE
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - title
                - detail
            - type: object
              maxProperties: 0
        censusDates:
          title: Census Dates
          description: The dates at which the section's enrollment/headcount is determined.
          type: array
          items:
            pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            type: string
            format: date
            x-lineageReferenceObject: derived  
            x-lineageDerivedLogic: censusDates property is an array, dates from both SSBSECT_CENSUS_ENRL_DATE and SSBSECT_CENSUS_2_DATE are displayed
        course:
          title: Course
          description: The smallest unit of instruction for which an Organization grants
            credits.
          type: object
          properties:
            titles:
              title: Titles
              description: The course titles details.
              type: array
              items:
                type: object
                properties:
                  type:
                    title: Type
                    description: The type of course title (e.g. short title, long title).
                    type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Type.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: course-title-types 
                        x-lineageReferenceObject: STVCTTPE_GUID(STVCTTPE)
                    additionalProperties: false
                    required:
                      - id
