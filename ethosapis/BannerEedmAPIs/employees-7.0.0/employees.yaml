openapi: 3.0.0
info:
  title: Employees
  description: Information about persons employed in the institution.
  version: "7.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employees:
    get:
      summary: Return all resources
      description: This version of the resource uses a legacy filter format and cannot
        be displayed as a parameter.  Please refer to the API source
        documentation for more information.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMPLOYEES
      tags:
        - employees
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-employees.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/employees/{id}:
    get:
      summary: Return the requested resource
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMPLOYEES
      tags:
        - employees
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Employees for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v7.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-employees.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-employees.json:
      title: Employees
      description: Information about persons employed in the institution.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the employee.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        person:
          title: Person
          description: A reference to link an employee to the common persons entity.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Person.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons
          additionalProperties: false
          required:
            - id
        campus:
          title: Campus
          description: The physical location assigned to an employee.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Campus.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: sites
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        contractType:
          title: Contract Type
          description: The type of employment (Eg. Full-time or Part-time)
          enum:
            - fullTime
            - partTime
          type: string
        payStatus:
          title: Pay Status
          description: The pay status of the employee (with pay, without pay or partial pay)
          oneOf:
            - type: string
              enum:
                - withPay
                - withoutPay
                - partialPay
            - type: string
              maxLength: 0
        benefitsStatus:
          title: Benefits Status
          description: The benefits status of the employee. (with or without benefits)
          oneOf:
            - type: string
              enum:
                - withBenefits
                - withoutBenefits
            - type: string
              maxLength: 0
        hoursPerPeriod:
          title: Hours Per Period
          description: The number of hours worked per period.
          type: array
          items:
            type: object
            properties:
              period:
                title: Period
                description: The time period for which working hours are considered.
                enum:
                  - day
                  - week
                  - month
                  - year
                  - payPeriod
                type: string
              hours:
                title: Hours
                description: The number of hours worked per period.
                type: number
                format: positiveNumber
                minimum: 0
            additionalProperties: false
            required:
              - period
              - hours
        status:
          title: Status
          description: The employment status (active, terminated, on leave)
          enum:
            - active
            - terminated
            - leave
          type: string
        startOn:
          title: Start On
          description: The first date of employment.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
        endOn:
          title: End On
          description: The last date of employment.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            - type: string
              maxLength: 0
        terminationReason:
          title: Termination Reason
          description: The reason for employment termination.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Termination Reason.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: employment-termination-reasons
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        rehireableStatus:
          title: Rehireable Status
          description: The eligibility status for being rehired.
          oneOf:
            - type: object
              properties:
                eligibility:
                  title: Eligibility
                  description: The eligibility status for being rehired.
                  enum:
                    - eligible
                    - ineligible
                  type: string
                type:
                  title: Type
                  description: The type of rehire.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Type.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: rehire-types
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - eligibility
                - type
            - type: object
              maxProperties: 0
        leaveReason:
          title: Leave Reason
          description: The reason for leave of absence.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Leave Reason.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: employment-leave-of-absence-reasons
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
      required:
        - id
        - person
        - contractType
        - status
        - startOn
      additionalProperties: false
