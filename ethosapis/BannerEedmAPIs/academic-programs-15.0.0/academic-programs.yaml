openapi: 3.0.0
info:
  title: Academic Programs
  description: An offering by an institution that represents a combination of
    courses and requirements leading to a degree, diploma, or certificate for a
    defined set of majors, minors, or concentrations.
  version: "15.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/academic-programs:
    get:
      summary: Return all resources
      description: Returns a paged listing of all the resources in the system.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ACADEMIC_PROGRAMS
      tags:
        - academic-programs
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v15+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: academicCatalog
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Academic Catalog  

            Returns an empty array for any academic catalog id passed.

            ```

            /academic-programs?academicCatalog={"academicCatalog":{"id":"57bffac4-202a-4835-a657-773763adf1f0"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-academic-programs.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v15.2.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/academic-programs/{id}:
    get:
      summary: Return the requested resource
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ACADEMIC_PROGRAMS
      tags:
        - academic-programs
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Academic Programs for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v15+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v15.2.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v15.2.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-academic-programs.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-academic-programs.json:
      title: Academic Programs
      description: An offering by an institution that represents a combination of
        courses and requirements leading to a degree, diploma, or certificate
        for a defined set of majors, minors, or concentrations.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of an academic program.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        title:
          title: Title
          description: The full name of an academic program.
          type: string
          minLength: 1
        description:
          title: Description
          description: The description of an academic program.
          type: string
        code:
          title: Code
          description: A code that identifies an academic program.
          type: string
        authorizing:
          title: Authorizing
          description: The institutional unit that authorizes the academic program.
          oneOf:
            - title: institution
              description: The institution that authorizes the academic program.
              type: object
              properties:
                institution:
                  title: Institution
                  description: The institution that authorizes the academic program.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Institution.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: educational-institutions
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
              additionalProperties: false
            - title: institutionalUnit
              description: The institutional unit that authorizes the academic program.
              type: object
              properties:
                institutionalUnit:
                  title: Institutional Unit
                  description: The institutional unit that authorizes the academic program,
                    typically a school or college within the institution.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Institutional Unit.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: educational-institution-units
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
              additionalProperties: false
            - title: organization
              description: The organization that authorizes the academic program.
              type: object
              properties:
                organization:
                  title: Organization
                  description: The organization that authorizes the academic program.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Organization.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: organizations
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
              additionalProperties: false
            - type: object
              maxProperties: 0
        programOwners:
          title: Program Owners
          description: The owners of the academic program.
          type: array
          items:
            title: Program Owners
            description: The owners of the academic program.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Program Owners.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: educational-institution-units
            additionalProperties: false
            required:
              - id
        sites:
          title: Sites
          description: The sites (campuses) the program is offered at
          type: array
          items:
            title: Sites
            description: The sites (campuses) the program is offered at
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Sites.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: sites
            additionalProperties: false
            required:
              - id
        academicLevel:
          title: Academic Level
          description: The level of academic progress that is associated with an academic
            program.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Academic Level.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-levels
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        credentials:
          title: Credentials
          description: The academic credentials that can be awarded for completing an
            academic program.
          type: array
          items:
            title: Credentials
            description: The academic credentials that can be awarded for completing an
              academic program.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Credentials.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: academic-credentials
            additionalProperties: false
            required:
              - id
        disciplines:
          title: Discipline
          description: The academic disciplines offered as part of an academic program.
          type: array
          items:
            type: object
            properties:
              discipline:
                title: Discipline
                description: An academic discipline associated with the academic program.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Discipline.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: academic-disciplines
                additionalProperties: false
                required:
                  - id
              subdisciplines:
                title: Subdisciplines
                description: A list of academic disciplines that are subordinate to the
                  discipline.
                type: array
                items:
                  type: object
                  properties:
                    subdiscipline:
                      title: Sub-discipline
                      description: An academic discipline that is subordinate to the discipline.
                      type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Sub-discipline.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: academic-disciplines
                      additionalProperties: false
                      required:
                        - id
                  additionalProperties: false
                  required:
                    - subdiscipline
            additionalProperties: false
            required:
              - discipline
        status:
          title: Status
          description: The status of an academic program.
          enum:
            - active
            - inactive
          type: string
        startOn:
          title: Start Date
          description: The date that an academic program starts.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
        endOn:
          title: End Date
          description: The date that an academic program ends.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            - type: string
              maxLength: 0
      required:
        - id
        - title
        - status
        - startOn
      additionalProperties: false
