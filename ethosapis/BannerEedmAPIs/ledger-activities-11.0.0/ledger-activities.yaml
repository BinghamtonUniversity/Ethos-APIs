              type: string
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display ISO code for GUBINST base currency
          additionalProperties: false
          required:
            - value
            - currency
        status:
          title: Status
          description: The status associated with the activity (posted or pending posting).
          oneOf:
            - type: string
              enum:
                - posted
                - pendingPosting
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display posted for FGBTRND records else display 'pendingPosting' for FGRBAKO records.
            - type: string
              maxLength: 0
        billingStatus:
          title: Billing Status
          description: The billing status of the expenditure activity (billed or unbilled).
          oneOf:
            - type: string
              enum:
                - billed
                - unbilled
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display 'billed' if FRRBDET_BILL_STATUS = B  Display 'unbilled' if FRRBDET_BILL_STATUS = U. Not supported for FGRBAKO records"
            - type: string
