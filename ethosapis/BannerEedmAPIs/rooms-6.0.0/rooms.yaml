openapi: 3.0.0
info:
  title: Rooms
  description: A room within a building on a floor.
  version: "6.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/rooms:
    get:
      summary: Return all resources
      description: Returns a paged listing of all the resources in the system.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ROOMS
      tags:
        - rooms
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-rooms.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/rooms/{id}:
    get:
      summary: Return the requested resource
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ROOMS
      tags:
        - rooms
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Rooms for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v6.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-rooms.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-rooms.json:
      title: Rooms
      description: A room within a building on a floor.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: A global identifier of a room to be used in all external references
            to the room.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        title:
          title: Title
          description: The full name of a room.
          type: string
        description:
          title: Description
          description: A description of a room.
          type: string
        number:
          title: Number
          description: A numbering scheme to distinguish different buildings, floors, and
            rooms located in the same site. Typically, this is a string.
          type: string
        floor:
          title: Floor
          description: The name of the floor where a room is located.
          type: string
        roomTypes:
          title: Room Types
          description: The type or style of a of room's layout. For example, "Classroom"
            or "Lecture Hall" style. A room may support multiple types of
            layouts.
          type: array
          items:
            type: object
            properties:
              type:
                title: Room Type
                description: The type or style of a of room's layout, for example, "Classroom"
                  style, "Lecture Hall" style, etc.
                enum:
                  - residencehallroom
                  - residentialsingleroom
                  - residentialdoubleroom
                  - residentialtripleroom
                  - residentialsuiteroom
                  - apartment
                  - house
                  - classroom
                  - lecturehall
                  - seminarroom
                  - conferenceroom
                  - sciencelaboratory
                  - computerlaboratory
                  - mechanicslab
                  - audiovisuallab
                  - artstudio
                  - musicroom
                  - performingartsstudio
                  - ballroom
                  - office
                  - studyfacility
                  - clinic
                  - animalquarters
                  - greenhouse
                  - specialusefacility
                  - generalusefacility
                  - foodfacility
                  - daycare
                  - lounge
                  - merchandisingroom
                  - supportfacility
                  - healthcarefacility
                  - atrium
                  - amphitheater
                  - auditorium
                  - booth
                  - other
                type: string
              detail:
                title: Detail
                description: ""
                oneOf:
                  - type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Detail.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: room-types
                    additionalProperties: false
                    required:
                      - id
                  - type: object
                    maxProperties: 0
            additionalProperties: false
            required:
              - type
        occupancies:
          title: Occupancies
          description: For rooms with multiple layouts. For example, a gymnasium can be
            used for a seminar or a conference, with different maximum
            occupancies. For rooms with single occupancy type, "Default" can be
            used.
          type: array
          items:
            type: object
            properties:
              type:
                title: Room Layout
                description: For rooms with multiple layouts, this can be used. For example, a
                  gymnasium can be used for a seminar or a conference, with
                  different maximum occupancies. For rooms with single occupancy
                  type, "Default" can be used.
                enum:
                  - banquet
                  - conference
                  - sportsevent
                  - graduationceremony
                  - seminar
                  - boardmeeting
                  - performance
                  - convention
                  - convocation
                  - pressmeet
                  - workshops
                  - exam
                  - classroom
                  - laboratory
                  - default
                type: string
              maxOccupancy:
                title: Maximum Occupancy
                description: The maximum number of persons who may occupy a room arranged in a
                  given layout.
                type: number
            additionalProperties: false
            required:
              - type
              - maxOccupancy
        site:
          title: Site
          description: The institution's site.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Site.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: sites
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        building:
          title: Building
          description: A physical structure, usually containing rooms, that is located at
            a specified physical location.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Building.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: buildings
          additionalProperties: false
          required:
            - id
        wing:
          title: Wing
          description: The named section of a building in which the resides.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Wing.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: building-wings
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        roomCharacteristics:
          title: Room Characteristics
          description: The list of characteristics specified for the room.
          type: array
          items:
            title: Room Characteristics
            description: The list of characteristics specified for the room.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Room Characteristics.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: room-characteristics
            additionalProperties: false
            required:
              - id
      required:
        - id
        - building
      additionalProperties: false

