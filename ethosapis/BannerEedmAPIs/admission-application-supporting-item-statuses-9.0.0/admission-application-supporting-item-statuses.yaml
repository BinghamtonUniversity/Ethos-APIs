openapi: 3.0.0
info:
  title: Admission Application Supporting Item Statuses
  description: >-
    The list of valid statuses for admission application supporting items.


    Please refer to "API Integration Configuration Settings" section in the Banner Ethos API Handbook for details on API configuration settings that needs to be configured for this API.
  version: "9.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Recruitment
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/admission-application-supporting-item-statuses:
    get:
      summary: Return all resources
      description: >-
        Returns a paged listing of admission application supporting item
        statuses from STVCKST table.


        The API retrieves all the STVCKST records where STVCKST_CODE is mapped to one of the valid 'type' enumerations (incomplete, receieved and waived) in the API configuration setting 'ADM.CHECKLIST.STATUS'
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ADM_APPL_SUPP_ITEM_STATS
      tags:
        - admission-application-supporting-item-statuses
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v9+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-admission-application-supporting-item-statuses.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v9+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/admission-application-supporting-item-statuses/{id}:
    get:
      summary: Return the requested resource
      description: Return the one admission application supporting item status with
        the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ADM_APPL_SUPP_ITEM_STATS
      tags:
        - admission-application-supporting-item-statuses
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Admission Application Supporting Item
            Statuses for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v9+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v9+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v9+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-admission-application-supporting-item-status\
                  es.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-admission-application-supporting-item-statuses.json:
      title: Admission Application Supporting Item Statuses
      description: The list of valid statuses for admission application supporting items.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the admission application supporting item
            status.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: STVCKST_GUID(STVCKST)
        title:
          title: Title
          description: The full name of the admission application supporting item status.
          type: string
          minLength: 1
          x-lineageReferenceObject: STVCKST_DESC(STVCKST)
        description:
          title: Description
          description: The description of the admission application supporting item status.
          type: string
          x-lineageReferenceObject: unsupported
        type:
          title: Type
          description: The type of the admission application supporting item status.
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Only the admission application supporting item status records corresponding to the STVCKST codes that are mapped to a valid type enum in API configuration setting ADM.CHECKLIST.STATUS are published.
          enum:
            - incomplete
            - received
            - waived
          type: string
        code:
          title: Code
          description: A code that may be used to identify the admission application
            supporting item status.
          type: string
          x-lineageReferenceObject: STVCKST_CODE(STVCKST)
      required:
        - id
        - title
        - type
      additionalProperties: false
