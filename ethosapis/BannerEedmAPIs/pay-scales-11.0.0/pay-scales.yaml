openapi: 3.0.0
info:
  title: Pay Scales
  description: Information on pay for employees at each level.
  version: "11.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/pay-scales:
    get:
      summary: Return all resources from NTRSALB
      description: Returns a paged listing of all the pay scale records from NTRSALB table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PAY_SCALES
      tags:
        - pay-scales
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-pay-scales.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/pay-scales/{id}:
    get:
      summary: Return the requested resource from NTRSALB
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PAY_SCALES
      tags:
        - pay-scales
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Pay Scales for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-pay-scales.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-pay-scales.json:
      title: Pay Scales
      description: Information on pay for employees at each level.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the pay scale.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: NTRSALB_GUID(NTRSALB)
        title:
          title: Title
          description: The full name of the pay scale.
          type: string
          minLength: 1
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: For the NTRSALB_SGRP_CODE, fetch a matching record from NTRSGRP. Display the concatenated value of NTRSALB_SGRP_CODE, NTRSGRP_DESC, NTRSALB_TABLE and NTRSALB_GRADE
        code:
          title: Code
          description: The code used to identify the pay scale.
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Display the concatenated value of NTRSALB_SGRP_CODE, NTRSALB_TABLE and NTRSALB_GRADE
        startOn:
          title: Start On
          description: The start date of the pay scale.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: unsupported
            - type: string
              maxLength: 0
        endOn:
          title: End On
          description: The end date of the pay scale.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: unsupported
            - type: string
              maxLength: 0
        classification:
          title: Classification
          description: The classification associated with the pay scale.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Classification.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: pay-classifications 
              x-lineageReferenceObject: NTRSGRP_GUID(NTRSGRP)
          additionalProperties: false
          required:
            - id
        scales:
          title: Scales
          description: The pay structure based on grades with step levels.
          type: array
          minItems: 1
          items:
            type: object
            properties:
              grade:
                title: Grade
                description: The grouping of salary or wage steps within a pay structure.
                type: string
                minLength: 1
                x-lineageReferenceObject: NTRSALA_GRADE(NTRSALA)
              step:
                title: Step
                description: The different level of compensation for a position within the
                  salary grade.
                type: string
                minLength: 1
                x-lineageReferenceObject: NTRSALA_STEP(NTRSALA)
              amount:
                title: Amount
                description: The amount associated with the specific pay scale.
                oneOf:
                  - type: object
                    format: currency
                    properties:
                      value:
                        title: Value
                        description: The monetary value
                        type: number
                        x-lineageReferenceObject: NTRSALA_AMOUNT(NTRSALA)
                      currency:
