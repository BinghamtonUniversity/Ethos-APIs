openapi: 3.0.0
info:
  title: Student Unverified Grades
  description: The unverified grades for a student.
  version: 2.0.0-beta
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Student
  x-audience: all
  x-release-status: beta
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-unverified-grades:
    get:
      summary: Return all resources
      description: Returns a paged listing of all the mid term and final grades and/or
        last attendance date for all student registration records in SFRSTCR
        across the terms before the grades are rolled to academic history.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_UNVERIFIED_GRADES
      tags:
        - student-unverified-grades
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v2+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Section Registration  

            Returns all student-unverified-grades for the registration passed.

            ```

            /student-unverified-grades?criteria={"sectionRegistration": {"id": "9844ed40-2005-4167-a7f8-40648989eed8"}}

            ```

            ### Student  

            Returns all student-unverified-grades for the student passed.

            ```

            /student-unverified-grades?criteria={"student": {"id": "e7f969af-8d53-41d0-b04b-0ea3b4c89ce9"}}

            ```
        - name: section
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Section  

            Filter to return section associated with a student unverified grade.

            ```

            /student-unverified-grades?section={"section": {"id": "2f3aac5e-305a-4dec-8f8e-6056c0270101"}}

            ```
        - name: studentByAcademicPeriod
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Student By Academic Period  

            Filter to return student and academic period associated with a student unverified grade.

            ```

            /student-unverified-grades?studentByAcademicPeriod={"student": {"id": "987345ac-4346-4671-b0d5-71408b3ba5c6"},"academicPeriod": {"id": "5e0f7fde-2303-4db5-9397-50a3409640c7"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-student-unverified-grades.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v2.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/student-unverified-grades/{id}:
    get:
      summary: Return the requested resource
      description: Return the single student unverified record with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_UNVERIFIED_GRADES
      tags:
        - student-unverified-grades
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Student Unverified Grades for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v2+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v2.0.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v2.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-student-unverified-grades.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-student-unverified-grades.json:
      title: Student Unverified Grades
      description: The unverified grades for a student.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the student unverified grade.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SFRUGID_GUID(SFRUGID)
        student:
          title: Student
          description: The student associated with the unverified grade.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Student.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
              x-lineageDerivedLogic: Display student GUID from GORGUID where GORGUID_LDM_NAME is 'persons' and GORGUID_DOMAIN_KEY matches SFRSTCR_PIDM
          additionalProperties: false
          required:
            - id
        sectionRegistration:
          title: Section Registration
          description: The section registration associated with the grade.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Section Registration.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: section-registrations 
              x-lineageReferenceObject: SFRRGID_GUID(SFRRGID)
          additionalProperties: false
          required:
            - id
        awardGradeScheme:
          title: Award Grade Scheme
          description: The award grade scheme associated with the student.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Award Grade Scheme.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: grade-schemes 
                  x-lineageReferenceObject: SHRGSCH_GUID(SHRGSCH)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        incompleteGrade:
          title: Incomplete Grade
          description: The default incomplete final grade and the extension date
            associated with the student's grade.
          oneOf:
            - type: object
              properties:
                finalGrade:
                  title: Final Grade
                  description: The default final grade.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Final Grade.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: grade-definitions 
                      x-lineageReferenceObject: SFRSTCR_GRDE_CODE_INCMP_FINAL(SFRSTCR)
                  additionalProperties: false
                  required:
                    - id
                extensionDate:
                  title: Extension Date
                  description: The date after which the default final grade may be applied.
                  type: string
                  format: date
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                  x-lineageReferenceObject: SFRSTCR_INCOMPLETE_EXT_DATE(SFRSTCR)
              additionalProperties: false
              required:
                - finalGrade
                - extensionDate
            - type: object
              maxProperties: 0
        details:
          title: Details
          description: The grade and/or last attendance details.
          type: object
          properties:
            grades:
              title: Grades
              description: The grade details.
              type: array
              items:
                type: object
                properties:
                  grade:
                    title: Grade
                    description: The actual grade.
                    type: object
                    properties:
                      id:
                        title: Id
                        description: The global identifier for the Grade.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: grade-definitions 
                        x-lineageReferenceObject: derived
                        x-lineageDerivedLogic: If processing a final grade - For the awardGradeScheme GUID and SFRSTCR_GRDE_CODE fetch the matching record from SHRGDID and display SHRGDID_GUID from the matched record. If processing a midterm grade - For the awardGradeScheme GUID and SFRSTCR_GRDE_CODE_MID fetch the matching record from SHRGDID and display SHRGDID_GUID from the matched record.
                      value:
                        title: Value
                        description: Grade code value.
                        type: string
                        x-lineageReferenceObject: derived
                        x-lineageDerivedLogic: If processing a final grade - For the awardGradeScheme GUID and SFRSTCR_GRDE_CODE fetch the matching record from SHRGDID and display SHRGDID_GRDE_CODE from the matched record. If processing a midterm grade - For the awardGradeScheme GUID and SFRSTCR_GRDE_CODE_MID fetch the matching record from SHRGDID and display SHRGDID_GRDE_CODE from the matched record.
                    additionalProperties: false
                    required:
                      - id
                  type:
                    title: Type
                    description: The type of grade (e.g. midterm, final).
                    type: object
                    properties:
                      id:
                        title: Id
                        description: The global identifier for the Type.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: section-grade-types 
                        x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = section-grade-types) 
                        x-lineageDerivedLogic: If processing a final grade - Display GORGUID_GUID where GORGUID_LDM_NAME = 'section-grade-types' and GORGUID_DOMAIN_KEY='Final'. If processing a midterm grade - Display GORGUID_GUID where GORGUID_LDM_NAME = 'section-grade-types' and GORGUID_DOMAIN_KEY='Midterm'.
                      title:
                        title: Title
                        description: The full name of the section grade type.
                        type: string
                        x-lineageReferenceObject: derived
                        x-lineageDerivedLogic: "Display 'Final' for code 'FINAL'. Display 'Midterm' for code 'MID1 ' "
                      code:
                        title: Code
                        description: A code that may be used to represent the section grade type.
                        type: string
                        x-lineageReferenceObject: derived
                        x-lineageDerivedLogic: "Display 'FINAL' for 'final' code. Display  'MID1' for 'Midterm' code."
                    additionalProperties: false
                    required:
                      - id
                  submittedOn:
                    title: Submitted On
                    description: The date the unverified grade was submitted.
                    oneOf:
                      - type: string
                        format: date
                        pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                        x-lineageReferenceObject: unsupported
                      - type: string
                        maxLength: 0
                additionalProperties: false
                required:
                  - grade
                  - type
            lastAttendance:
              title: Last Attendance
              description: The details regarding the student's last known attendance.
              oneOf:
                - title: Date
                  description: The last date the student attended the course.
                  type: object
                  properties:
                    date:
                      title: Date
                      description: The last date the student attended the course.
                      type: string
                      format: date
                      pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                      x-lineageReferenceObject: SFRSTCR_LAST_ATTEND(SFRSTCR)
                  additionalProperties: false
                  required:
                    - date
                - title: Status
                  description: The details of the student's last known attendance.
                  type: object
                  properties:
                    status:
                      title: Status
                      description: The details of the student's last known attendance.
                      enum:
                        - neverAttended
                      type: string
                      x-lineageReferenceObject: unsupported
                  additionalProperties: false
                  required:
                    - status
                - type: object
                  maxProperties: 0
          additionalProperties: false
          minProperties: 1
      required:
        - id
        - student
        - sectionRegistration
        - details
      additionalProperties: false
