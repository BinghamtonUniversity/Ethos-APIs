openapi: 3.0.0
info:
  title: Fiscal Years
  description: The periods of time that an institution uses for accounting and
    financial statement purposes.
  version: "11.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Finance
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/fiscal-years:
    get:
      summary: Return all resources from FTVFSYR
      description: Returns a paged listing of all the fiscal year records from FTVFSYR
        table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_FISCAL_YEARS
      tags:
        - fiscal-years
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Reporting Segment  

            The segment of the educational institution used for reporting purposes.

            ```

            /fiscal-years?criteria={"reportingSegment:"A"}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-fiscal-years.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/fiscal-years/{id}:
    get:
      summary: Return the requested resource from FTVFSYR
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_FISCAL_YEARS
      tags:
        - fiscal-years
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Fiscal Years for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-fiscal-years.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-fiscal-years.json:
      title: Fiscal Years
      description: The periods of time that an institution uses for accounting and
        financial statement purposes.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the fiscal year.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FTVFSYR_GUID(FTVFSYR)
        title:
          title: Title
          description: The full name of the fiscal year.
          type: string
          minLength: 1
          x-lineageReferenceObject: FTVFSYR_FSYR_CODE(FTVFSYR)
        reportingSegment:
          title: Reporting Segment
          description: The segment of the educational institution used for reporting
            purposes.
          type: string
          minLength: 1
          x-lineageReferenceObject: FTVFSYR_COAS_CODE(FTVFSYR)
        startOn:
          title: Start On
          description: The start date of the fiscal year.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FTVFSYR_START_DATE(FTVFSYR)
        endOn:
          title: End On
          description: The end date of the fiscal year.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FTVFSYR_END_DATE(FTVFSYR)
        numberOfPeriods:
          title: Number Of Periods
          description: The number of periods in the fiscal year.
          oneOf:
            - type: integer
              x-lineageReferenceObject: FTVFSYR_LAST_PERIOD(FTVFSYR)
            - type: string
              nullable: true
        yearEndAdjustment:
          title: Year End Adjustment
          description: An indication whether the year end adjustment is active or inactive.
          oneOf:
            - type: string
              enum:
                - active
                - inactive
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display 'active' if FTVFSYR_EOY_ACCR_STATUS_IND =O else display 'inactive'
            - type: string
              maxLength: 0
        status:
          title: Status
          description: The status of the fiscal year.
          oneOf:
            - type: string
              enum:
                - defined
                - open
                - closed
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display 'open' if atleast one period FTVFSPD_PRD_STATUS_IND is open else if all periods are closed display 'closed'
            - type: string
              maxLength: 0
      required:
        - id
        - title
        - reportingSegment
        - startOn
        - endOn
      additionalProperties: false
