openapi: 3.0.0
info:
  title: Admission Applications
  description: >-
    **API Deprecation Notice**



    Deprecated on: 31-Dec-2019



    Sunset on: 31-Dec-2021



    Description: V16.0.0 moves program, level and school properties to student-academic-programs, moves POST/PUT functionality to admission-applications-submissions, updates withdrawnOn from date-time to date format, and replaces source property with applicationSource to provide more robust support for admission applications.



    ----


    Higher education institution admission applications
  version: "9.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Recruitment
  x-deprecated-on: 2019-12-31
  x-sunset-on: 2021-12-31
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/admission-applications:
    get:
      summary: Return all resources
      description: Returns a paged listing of all the resources in the system.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ADM_APPLICATIONS
      tags:
        - admission-applications
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v9+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-admission-applications.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v9.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      deprecated: true
  /api/admission-applications/{id}:
    get:
      summary: Return the requested resource
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ADM_APPLICATIONS
      tags:
        - admission-applications
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Admission Applications for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v9+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v9.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v9.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-admission-applications.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      deprecated: true
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-admission-applications.json:
      title: Admission Applications
      description: Higher education institution admission applications
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the admission application
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        referenceId:
          title: Reference ID
          description: The identifier of the application at its origin
          type: string
        applicant:
          title: Applicant
          description: The person applying for the admission.
          oneOf:
            - title: Recruit
              description: The person applying for the admission as specified in the
                recruitment system.
              type: object
              properties:
                recruit:
                  title: Recruit
                  description: The person applying for the admission as specified in the
                    recruitment system.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Recruit.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: recruitment-persons
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
              additionalProperties: false
            - title: Student
              description: The person applying for the admission as specified in the student
                system.
              type: object
              properties:
                student:
                  title: Student
                  description: The person applying for the admission as specified in the student
                    system.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Student.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: persons
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
              additionalProperties: false
        recruitmentOpportunity:
          title: Recruitment Opportunity
          description: Admission recruitment opportunity associated with the application
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Recruitment Opportunity.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: admission-recruitment-opportunities
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        type:
          title: Type
          description: The type of the application
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Type.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: admission-application-types
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        academicPeriod:
          title: Academic Period
          description: The starting academic period for the admission
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Academic Period.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-periods
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        statuses:
          title: Statuses
          description: The statuses of the application through the admission process stages
          type: array
          minItems: 1
          items:
            type: object
            properties:
              type:
                title: Type
                description: The top level category for the status of the application
                oneOf:
                  - type: string
                    enum:
                      - started
                      - submitted
                      - readyForReview
                      - decisionMade
                      - enrollmentComplete
                      - admitted
                      - movedToStudentSystem
                  - type: string
                    maxLength: 0
              detail:
                title: Detail
                description: The extension of the top level type category
                oneOf:
                  - type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Detail.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: admission-appliation-status-types
                    additionalProperties: false
                    required:
                      - id
                  - type: object
                    maxProperties: 0
              startOn:
                title: Start On
                description: The date when the status was assigned
                type: string
                format: date-time
                pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
            additionalProperties: false
            required:
              - startOn
        latestDecision:
          title: Latest Decision
          description: The latest or final decision for the application
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Latest Decision.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: admission-decision-types
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        source:
          title: Source
          description: The source of information associated with the application
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Source.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: sources
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        owner:
          title: Owner
          description: The institution representative assigned to manage the application
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Owner.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: persons
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        admissionPopulation:
          title: Admission Population
          description: The type of admission populations the applicant belongs to
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Admission Population.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: admission-populations
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        decisionPlan:
          title: Decision Plan
          description: The decision plan associated with the application
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Decision Plan.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: admission-decision-plans
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        site:
          title: Site
          description: The institution site (campus) selected by the applicant
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Site.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: sites
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        residencyType:
          title: Residency Type
          description: The residency type of the applicant, e.g., "international".
          oneOf:
            - title: Recruit
              description: The residency type of the applicant as specified in the recruitment
                system.
              type: object
              properties:
                recruit:
                  title: Recruit
                  description: The residency type of the applicant as specified in the recruitment
                    system.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Recruit.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: admission-residency-types
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - recruit
            - title: Student
              description: The residency type of the applicant as specified in the student
                system.
              type: object
              properties:
                student:
                  title: Student
                  description: The residency type of the applicant as specified in the student
                    system.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Student.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: residency-types
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - student
            - type: object
              maxProperties: 0
        academicLoad:
          title: Academic Load
          description: The academic load selection, e.g., full- or part-time
          oneOf:
            - type: string
              enum:
                - fullTime
                - partTime
            - type: string
              maxLength: 0
        program:
          title: Program
          description: The academic program applied for
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Program.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-programs
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        level:
          title: Level
          description: Academic level
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Level.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-levels
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        disciplines:
          title: Disciplines
          description: The list of academic disciplines the applicant chose
          type: array
          items:
            type: object
            properties:
              discipline:
                title: Discipline
                description: The academic discipline that defines the course of study
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Discipline.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: academic-disciplines
                additionalProperties: false
                required:
                  - id
              subdisciplines:
                title: Subdisciplines
                description: The list of academic disciplines that are subordinate to the
                  discipline
                type: array
                items:
                  title: Subdisciplines
                  description: The list of academic disciplines that are subordinate to the
                    discipline
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Subdisciplines.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: academic-disciplines
                  additionalProperties: false
                  required:
                    - id
            additionalProperties: false
            required:
              - discipline
        credential:
          title: Credential
          description: The academic credential (degree, diploma, etc.) to be earned on
            completion of the study
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Credential.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-credentials
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        school:
          title: School
          description: The school or college of the institution the application is
            associated with
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the School.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: educational-institution-units
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        withdrawal:
          title: Withdrawal
          description: Application withdrawal related information
          type: object
          properties:
            withdrawnOn:
              title: Withdrawn On
              description: The date when the application was withdrawn
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            reason:
              title: Reason
              description: The application withdrawal reason
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Reason.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: admission-application-withdrawal-reasons
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
            institutionAttended:
              title: Institution Attended
              description: The institution attended by the applicant
              oneOf:
                - title: name
                  description: The name of the educational institution
                  type: string
                - title: Institution
                  description: The ID of the educational institution attended
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Institution.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: educational-institutions
                  additionalProperties: false
                  required:
                    - id
          additionalProperties: false
        comment:
          title: Comment
          description: The comment associated with the application
          type: string
      required:
        - id
        - applicant
        - statuses
      additionalProperties: false
