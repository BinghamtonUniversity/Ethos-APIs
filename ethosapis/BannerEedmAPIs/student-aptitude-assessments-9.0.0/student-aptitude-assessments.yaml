components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-student-aptitude-assessments.json:
      title: Student Aptitude Assessments
      description: The results of a aptitude assessment for a student.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the Student Aptitude Assessment.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        student:
          title: Student
          description: The student taking the aptitude assessment.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Student.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons
          additionalProperties: false
          required:
            - id
        assessment:
          title: Assessment
          description: The aptitude assessment the student took.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Assessment.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: aptitude-assessments
          additionalProperties: false
          required:
            - id
        assessedOn:
          title: Assessed On
          description: The date on which the assessment occurred.
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
        score:
          title: Score
          description: The score the student received for the assessment.
          oneOf:
            - title: Literal
              description: The literal score the student received for the assessment.
              type: object
              properties:
                type:
                  title: Type
                  description: The type of score specified for the assessment.
                  enum:
                    - literal
                  type: string
                value:
                  title: Value
                  description: The value of the score the student received for the assessment.
                  type: string
              additionalProperties: false
              required:
                - type
                - value
            - title: Numeric
              description: ""
              type: object
              properties:
                type:
                  title: Type
                  description: ""
                  enum:
                    - numeric
                  type: string
                value:
                  title: Value
                  description: ""
                  type: number
              additionalProperties: false
              required:
                - type
                - value
        percentiles:
          title: Percentiles
          description: The percentile values and types associated with the score.
          type: array
          items:
            type: object
            properties:
              value:
                title: Percentile Value
                description: The percentile calculated for the score.
                type: number
              type:
                title: Percentile Type
                description: The user defined type of the percentile.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Percentile Type.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: assessment-percentile-types
                additionalProperties: false
                required:
                  - id
            additionalProperties: false
            required:
              - value
              - type
        form:
          title: Form
          description: The name and number of the form used for the assessment for this
            result.
          type: object
          properties:
            number:
              title: Number
              description: The number of the form.
              type: string
            name:
              title: Name
              description: The name of the form.
              type: string
          additionalProperties: false
        specialCircumstances:
          title: Special Circumstances
          description: Special circumstances surrounding the taking of the assessment
          type: array
          items:
            title: Special Circumstances
            description: Special circumstances surrounding the taking of the assessment
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Special Circumstances.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: assessment-special-circumstances
            additionalProperties: false
            required:
              - id
        update:
          title: Update
          description: The update status of the student's assessment result.
          oneOf:
            - type: string
              enum:
                - original
                - revised
                - recentered
            - type: string
              maxLength: 0
        preference:
          title: Preference
          description: An indicator that this result of the assessment are the preferred
            values for the assessment
          oneOf:
            - type: string
              enum:
                - primary
            - type: string
              maxLength: 0
        source:
          title: Source
          description: The sources of the assessment results for the student.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Source.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: sources
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        status:
          title: Status
          description: The status of this assessment results for the student.
          oneOf:
            - type: string
              enum:
                - active
                - inactive
            - type: string
              maxLength: 0
        reported:
          title: Reported
          description: An indicator of the nature of the assessment results.
          oneOf:
            - type: string
              enum:
                - official
                - unofficial
            - type: string
              maxLength: 0
      required:
        - id
        - student
        - assessment
        - assessedOn
        - score
      additionalProperties: false
