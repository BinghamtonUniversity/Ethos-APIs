components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-general-ledger-transactions.json:
      title: General Ledger Transactions
      description: The details of transactions to be entered into the general ledger.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the general ledger transaction.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GURTRNH_GUID(GURTRNH)
        processMode:
          title: Process Mode
          description: An indicator that specifies if the authoritative source should just
            validate the accounting string or if it should post/update a general
            ledger transaction.
          enum:
            - updateImmediate
            - validate
            - updateBatch
          type: string
          x-lineageReferenceObject: GURTRNH_PROCESS_MODE(GURTRNH)
        submittedBy:
          title: Submitted By
          description: The person submitting the general ledger transactions.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Submitted By.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: persons 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
                  x-lineageDerivedLogic: A record in GORGUID where GORGUID_LDM_NAME='persons' where GORGUID_DOMAIN_KEY=(Select GOBEACC_PIDM from GOBEACC where GOBEACC_USERNAME= FGBJVCH_USER_ID) or  GOBEACC_USERNAME= GURTRNH_USER_ID
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        comment:
          title: Comment
          description: The comment associated with the transaction.
          type: string
          x-lineageReferenceObject: FOBTEXT_TEXT(FOBTEXT)
        transactions:
          title: Transactions
          description: A list of associated general ledger transactions.
          type: array
          minItems: 1
          items:
            type: object
            properties:
              type:
                title: Type
                description: The type of the general ledger transaction (e.g. journal entry,
                  encumbrance, budget).
                enum:
                  - approvedBudget
                  - contingentBudget
                  - approvedBudgetAdjustment
                  - temporaryBudget
                  - temporaryBudgetAdjustment
                  - encumbranceOpenBalance
                  - generalEncumbranceCreate
                  - generalEncumbranceAdjust
                  - generalEncumbranceLiquidation
                  - generalEncumbranceClose
                  - payrollEncumbranceCreate
                  - payrollEncumbranceAdjust
                  - payrollEncumbranceLiquidation
                  - payrollEncumbranceClose
                  - travelEncumbranceCreate
                  - travelEncumbranceAdjust
                  - travelEncumbranceClose
                  - donation
                  - donationEndowed
                  - pledge
                  - pledgeEndowed
                  - financialAidTransmittal
                  - studentCharge
                  - studentInvoice
                  - studentPayment
                  - grantCharge
                  - grantInvoice
                  - grantPayment
                  - otherCharge
                  - otherInvoice
                  - otherPayment
                  - paymentAllocation
                  - depositAllocation
                  - miscCashReceipt
                  - cashDisbursement
                  - purchaseCardCharge
                  - miscGeneralLedgerTransaction
                  - purchaseJournal
                  - travelAdvance
                  - travelExpense
                  - yearEndCloseEntry
                  - payroll
                  - payrollWithLiquidation
                  - actualOpenBalance
                type: string
                x-lineageReferenceObject: GURTRNH_TRANS_TYPE(GURTRNH)
              referenceNumber:
                title: Reference Number
                description: A source reference number/document number for the transaction.
                type: string
                x-lineageReferenceObject: FGBJVCD_DOC_REF_NUM(FGBJVCD) or  GURTRNH_DOC_REF_NUM(GURTRNH)
              transactionNumber:
                title: Transaction Number
                description: A sequential number associated with the transaction.
                type: string
                x-lineageReferenceObject: FGBJVCH_DOC_NUM(FGBJVCH) or  GURTRNH_DOC_CODE(GURTRNH)
              ledgerDate:
                title: Ledger Date
                description: The date the transaction is credited/debited to the account in the
                  general ledger (i.e. posting date).
                type: string
                format: date-time
                pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                x-lineageReferenceObject: GURTRNH_TRANS_DATE(GURTRNH) or  FGBJVCH_TRANS_DATE(FGBJVCH)
              transactionTypeReferenceDate:
                title: Transaction Type Reference Date
                description: A supplementary date assigned to the transaction based on the
                  transaction type.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                    x-lineageReferenceObject: FGBJVCD_GIFT_DATE(FGBJVCD) or  GURTRNH_TRANS_TYPE_REF_DATE(GURTRNH)
                  - type: string
                    maxLength: 0
              reference:
                title: Reference
                description: The person or organization associated with the transaction.
                oneOf:
                  - title: Person
                    description: The person associated with the transaction.
                    type: object
                    properties:
                      person:
                        title: Person
                        description: The person associated with the transaction.
                        type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Person.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: persons 
                            x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
                            x-lineageDerivedLogic: A record in GORGUID where GORGUID_LDM_NAME='persons' where GORGUID_DOMAIN_KEY=FGBJVCD_VENDOR_PIDM or GURTRNH_VENDOR_ID
                        additionalProperties: false
                        required:
                          - id
                    additionalProperties: false
                    required:
                      - person
                  - title: Organization
                    description: The organization associated with the transaction.
                    type: object
                    properties:
                      organization:
                        title: Organization
                        description: The organization associated with the transaction.
                        type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Organization.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: organizations 
                            x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
                            x-lineageDerivedLogic: A record in GORGUID where GORGUID_LDM_NAME='persons' where GORGUID_DOMAIN_KEY=FGBJVCD_VENDOR_PIDM or GURTRNH_VENDOR_ID
                        additionalProperties: false
                        required:
                          - id
                    additionalProperties: false
                    required:
                      - organization
                  - type: object
                    maxProperties: 0
              transactionDetailLines:
                title: Transaction Detail Lines
                description: The detailed accounting lines associated with the transaction.
                type: array
                minItems: 1
                items:
                  type: object
                  properties:
                    sequenceNumber:
                      title: Sequence Number
                      description: An optional tracking number for the detailed accounting line.
                      oneOf:
                        - type: number
                          x-lineageReferenceObject: GURTRNH_SEQ_NUM(GURTRNH) or  FGBJVCD_SEQ_NUM(FGBJVCD)
                        - type: string
                          nullable: true
                    accountingString:
                      title: Accounting String
                      description: The accounting string associated with the transaction detail line.
                      type: string
                      minLength: 1
                      x-lineageReferenceObject: derived  
                      x-lineageDerivedLogic: Display the concatenated value of GURTRNH_COAS_CODE,GURTRNH_ACCI_CODE,GURTRNH_FUND_CODE,GURTRNH_ORGN_CODE,GURTRNH_ACCT_CODE,GURTRNH_PROG_CODE,GURTRNH_ACTV_CODE,GURTRNH_LOCN_CODE,GURTRNH_PRJD_CODE,GURTRNH_RUCL_CODE,GURTRNH_BANK_CODE, or Display the concatenated value of FGBJVCD_COAS_CODE,FGBJVCD_ACCI_CODE,FGBJVCD_FUND_CODE,FGBJVCD_ORGN_CODE,FGBJVCD_ACCT_CODE,FGBJVCD_PROG_CODE,FGBJVCD_ACTV_CODE,FGBJVCD_LOCN_CODE,FGBJVCD_PRJD_CODE,FGBJVCD_RUCL_CODE,FGBJVCD_BANK_CODE
                    description:
                      title: Description
                      description: The description of the detailed accounting line.
                      type: string
                      minLength: 1
                      x-lineageReferenceObject: FGBJVCD_TRANS_DESC(FGBJVCD) or  GURTRNH_TRANS_DESC(GURTRNH)
                    type:
                      title: Type
                      description: The type of detailed accounting line (credit/debit).
                      enum:
                        - credit
                        - debit
                      type: string
                      x-lineageReferenceObject: FGBJVCD_DR_CR_IND(FGBJVCD) or  GURTRNH_DR_CR_IND(GURTRNH)
                    amount:
                      title: Amount
                      description: The amount of the credit or debit.
                      format: currency
                      type: object
                      properties:
                        value:
                          title: Value
                          description: The monetary value
                          type: number
                          x-lineageReferenceObject: GURTRNH_TRANS_AMT(GURTRNH) or  FGBJVCD_TRANS_AMT(FGBJVCD)
                        currency:
