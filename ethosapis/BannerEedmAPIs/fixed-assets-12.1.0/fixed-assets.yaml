        acquisitionCost:
          title: Acquisition Cost
          description: The acquisition cost of the fixed asset.
          oneOf:
            - type: object
              format: currency
              properties:
                value:
                  title: Value
                  description: The monetary value
                  type: number
                  x-lineageReferenceObject: derived
                  x-lineageDerivedLogic: >-
                    If FFBMAST_CAP_DATE is null, display the FFRMASF_AMT from
                    FFRMASF where FFRMASF_OTAG_CODE = FFBMAST_OTAG_CODE. If
                    there are multiple sequences for one FFRMASF_OTAG_CODE, then
                    the sum of the amounts for each sequence is calculated and
                    displayed. If FFBMAST_CAP_DATE is not null, display the
                    FFRMASA_AMT from FFRMASA where FFRMASA_OTAG_CODE =
                    FFBMAST_OTAG_CODE. If there are multiple change sequences
                    for this capitalized tag in FFRMASA, then the maximum change
                    sequence number is considered and the sum of all amounts of
                    the associated sequences of this max change sequence number
                    is calculated and displayed as the total acquisition cost.
                    If there are no records created in FFRMASA or FFRMASF, then
                    the acquisition cost is not displayed.
