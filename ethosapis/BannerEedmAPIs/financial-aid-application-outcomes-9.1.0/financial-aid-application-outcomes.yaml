openapi: 3.0.0
info:
  title: Financial Aid Application Outcomes
  description: >
    The financial-aid-application outcomes API represents the Institutional and
    Federal financial aid applications results that are being processed by the
    institution for the aid year.
  version: 9.1.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Financial Aid
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/financial-aid-application-outcomes:
    get:
      summary: Returns resources from RCRAPP1
      description: >
        Returns a paged listing of all the institutional and federal financial
        aid application results from RCRAPP1 table.


        The institutional applications are the RCRAPP1 records with Information Source Code (RCRAPP1_INFC_CODE ) as CSS or MANUAL and RCRAPP1_SEQ_NO = 0.


        The federal applications are the RCRAPP1 records with RCRAPP1_INFC_CODE as EDE or MANUAL, RCRAPP1_SEQ_NO > 0 and RCRAPP1_CURR_REC_IND = 'Y'. The current record of EDE application is published.


        The API does not retrieve the RCRAPP1 records with RCRAPP1_INFC_CODE = MANUAL and RCRAPP1_SEQ_NO = -1. These are the records which hold noncustodial parent information and are considered an extension of the RCRAPP1_SEQ_NO = 0 record. The API does not support RCRAPP1_INFC_CODE = 'CAL' records.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_FINAID_APP_OUTCOMES
      tags:
        - financial-aid-application-outcomes
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v9+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Person  

            Returns all financial aid application outcomes for the applicant person id passed.

            ```

            /financial-aid-application-outcomes?criteria={"applicant":{"person":{"id":"c26f215b-960c-43d6-b1e0-6e43272b9f30"}}}

            ```

            ### Aid Year  

            Returns all financial aid application outcomes for the aidYear id passed.

            ```

            /financial-aid-application-outcomes?criteria={"aidYear":{"id":"7a88a305-4d49-47bc-a47d-ffb31877d210"}}

            ```

            ### Methodology  

            Returns all financial aid application outcomes for the methodology passed.

            ```

            /financial-aid-application-outcomes?criteria={"methodology":"federal"}

            ```

            ### Application  

            Returns all financial aid application outcomes for the application id passed.

            ```

            /financial-aid-application-outcomes?criteria={"application":{"id":"eabb077e-da07-4d37-866f-35a9c8db9ccd"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-financial-aid-application-outcomes.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v9.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/financial-aid-application-outcomes/{id}:
    get:
      summary: Return the requested resource from RCRAPP1
      description: >
        Returns a single financial aid application result from RCRAPP1 table
        with the requested identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_FINAID_APP_OUTCOMES
      tags:
        - financial-aid-application-outcomes
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v9+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v9.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v9.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-financial-aid-application-outcomes.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-financial-aid-application-outcomes.json:
      title: Financial Aid Application Outcomes
      description: The analysis results of applicants' financial aid applications.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the financial aid application outcome.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: RCRAPP1_OUTCOME_GUID(RCRAPP1)
        applicant:
          title: Applicant
          description: The person who applied for financial aid.
          type: object
          properties:
            person:
              title: Person
              description: A reference link to the common Persons entity for an applicant who
                is known to the student information system.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Person.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: persons 
                      x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
                      x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME is 'persons' and GORGUID_DOMAIN_KEY matches RCRAPP!_PIDM
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
            financialAidApplicant:
              title: Financial Aid Applicant
              description: A reference link to the Financial Aid Applicants entity for an
                applicant who may not be known to the student information
                system.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Financial Aid Applicant.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: financial-aid-applicants 
                      x-lineageReferenceObject: unsupported
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
          additionalProperties: false
          minProperties: 1
        aidYear:
          title: Aid Year
          description: The financial aid year for which the applicant applied.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Aid Year.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: financial-aid-years 
              x-lineageReferenceObject: RCRAPP1_AIDY_CODE(RCRAPP1)
          additionalProperties: false
          required:
            - id
        methodology:
          title: Methodology
          description: The methodology used to analyze the application.
          enum:
            - institutional
            - federal
            - institutionalFederal
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: If RCRAPP1_INFC_CODE is either 'CSS' or 'MANUAL' and RCRAPP1_SEQ_NO = 0 then display as 'institutional' If RCRAPP1_INFC_CODE is either 'EDE' or 'MANUAL' and RCRAPP1_SEQ_NO > 0 and RCRAPP1_CURR_REC_IND = 'Y' then display as 'federal'. Only federal and institutional is supported. primarySourceUI - RNAPR** where ** refers to the aid year
        application:
          title: Application
          description: The application analyzed to generate the outcome.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Application.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: financial-aid-applications 
              x-lineageReferenceObject: RCRAPP1_APP_GUID(RCRAPP1)
          additionalProperties: false
          required:
            - id
        rejectionStatus:
          title: Rejection Status
          description: An indication if the financial aid application has been rejected.
          oneOf:
            - type: string
              enum:
                - rejected
                - notRejected
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: For the RCRAPP1_AIDY_CODE, RCRAPP1_PIDM, RCRAPP1_SEQ_NO and RCRAPP1_CURR_REC_IND = 'Y', fetch the matching record from RCRAPP3. If RCRAPP3_INFC_CODE = 'EDE' and RCRAPP3_REJ_REASON_PRTY_1 through RCRAPP3_REJ_REASON_PRTY_14 is NULL then display as 'nonRejected', else display as 'rejected' RNARS** where ** refers to aid year priamarySourceUI - RNARS** where ** refers to the aid year
            - type: string
              maxLength: 0
        studentAidReportResolution:
          title: Student Aid Report Resolution
          description: An indication that the SAR C flag has been set and requires
            resolution.
          oneOf:
            - type: string
              enum:
                - flagged
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: For the RCRAPP1_AIDY_CODE, RCRAPP1_PIDM, RCRAPP1_SEQ_NO and RCRAPP1_CURR_REC_IND = 'Y', fetch the matching record from RCRAPP2. For this record if RCRAPP2_INFC_CODE = 'EDE' and RCRAPP2_ELIGIBILITY_MSG = 1 then display as 'flagged'. Else do not display. primarySourceUI - RNARS** where ** refers to the aid year
            - type: string
              maxLength: 0
        dependency:
          title: Dependency
          description: An indication of the applicant's dependency status.
          oneOf:
            - type: string
              enum:
                - independent
                - dependent
                - rejectedIndependent
                - rejectedDependent
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: If methodology = 'federal' For the RCRAPP1_AIDY_CODE, RCRAPP1_PIDM, RCRAPP1_SEQ_NO and RCRAPP1_CURR_REC_IND = 'Y' fetch the matching record from RCRESAR. For this record from RCRESAR, if RCRESAR_INFC_CODE = 'EDE' and if RCRESAR_DEP_INDEP_IND = 'I' then display as 'independent' else if RCRESAR_DEP_INDEP_IND = 'D' then display as 'dependent' else if RCRESAR_DEP_INDEP_IND = 'Y' then display as 'rejectedIndependent' else if RCRESAR_DEP_INDEP_IND = 'X' then display as 'rejectedDependent' For the RCRAPP1_AIDY_CODE, RCRAPP1_PIDM, RCRAPP1_SEQ_NO and RCRAPP1_CURR_REC_IND = 'Y' fetch the matching record from RCRAPP4. For this record from RCRAPP4, if RCRAPP4_INFC_CODE = 'MANUAL' and if RCRAPP4_FM_FORMULA_FOR_CALC in ('2', '3', '5', '6') then display as 'independent' else if RCRAPP4_FM_FORMULA_FOR_CALC in ('1','4') then display as 'dependent' primarySourceUI - RNARS** where ** refers to the aid year. If methodology = 'institutional' - For the RCRAPP1_AIDY_CODE, RCRAPP1_PIDM, RCRAPP1_SEQ_NO and RCRAPP1_CURR_REC_IND = 'Y' fetch the matching record from RCRAPP4. For this record from RCRAPP4, if RCRAPP4_INFC_CODE is 'CSS' or 'MANUAL' AND RCRAPP4_SEQ_NO = 0 and if RCRAPP4_IM_FORMULA_FOR_CALC = '2' then display as 'independent' else if RCRAPP4_IM_FORMULA_FOR_CALC = '1' then display as 'dependent' primarySourceUI - RNARS** where ** refers to the aid year
            - type: string
              maxLength: 0
        dependencyOverride:
          title: Dependency Override
          description: An indication that the applicant's dependency status has been
            overridden.
          oneOf:
            - type: string
              enum:
                - overridden
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: If methodology = 'federal' then for the RCRAPP1_AIDY_CODE, RCRAPP1_PIDM, RCRAPP1_SEQ_NO and RCRAPP1_CURR_REC_IND = 'Y', fetch the matching record from RCRAPP3. For this record if RCRAPP3_INFC_CODE is 'EDE' and RCRAPP3_FAA_DEP_OVERRIDE is 1 or 4 then display as 'overridden' If methodology = 'federal' - For RCRAPP1_INFC_CODE = 'MANUAL' and  RCRAPP1_SEQ_NO >= 1 and RCRAPP1_CURR_REC_IND = 'Y' and if RNROVRD_CHG_DEPEND_FM = 'I' then display as 'overridden' If methodology = 'institutional' - For RCRAPP1_INFC_CODE is 'CSS' or 'MANUAL' and  RCRAPP1_SEQ_NO = 0 and if RNROVRD_CHG_DEPEND_IM = 'I' then display as 'overridden'. primarySourceUI - RNIMS** where ** refers to the aid year
            - type: string
              maxLength: 0
        expectedFamilyContribution:
          title: Expected Family Contribution
          description: The expected contribution from the family.
          oneOf:
            - type: object
              format: currency
              properties:
                value:
                  title: Value
                  description: The monetary value
