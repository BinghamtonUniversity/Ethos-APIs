        pellEligibility:
          title: Pell Eligibility
          description: An indication that the applicant may be eligible to receive a Pell
            grant.
          oneOf:
            - type: string
              enum:
                - eligible
                - notEligible
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: If methodology = 'federal' then for the RCRAPP1_AIDY_CODE, RCRAPP1_PIDM, RCRAPP1_SEQ_NO and RCRAPP1_CURR_REC_IND = 'Y', fetch the matching record from RCRESAR. For this record if RCRESAR_INFC_CODE is 'EDE' and RCRESAR_PELL_ELGBL is 'Y' then display as 'eligible' else if RCRESAR_PELL_ELGBL  is null then display as 'notEligible'. primarySourceUI - RNIMS** where ** refers to the aid year
            - type: string
              maxLength: 0
        automaticZeroContribution:
          title: Automatic Zero Contribution
          description: An indication that automatic zero contribution has been applied.
          oneOf:
            - type: string
              enum:
                - applied
                - notApplied
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: If methodology = 'federal' then for the RCRAPP1_AIDY_CODE, RCRAPP1_PIDM, RCRAPP1_SEQ_NO and RCRAPP1_CURR_REC_IND = 'Y', fetch the matching record from RCRESAR. For this record if RCRESAR_INFC_CODE is 'EDE' or 'MANUAL' and RCRESAR_AUTO_ZERO_EFC_FLAG is 'Y' then display as 'applied' else if RCRESAR_AUTO_ZERO_EFC_FLAG is null then display as 'notApplied'. primarySourceUI - RNIMS** where ** refers to the aid year
            - type: string
              maxLength: 0
        simplifiedNeedsTest:
          title: Simplified Needs Test
          description: An indication that the requirements for the simplified needs test
            have been met.
          oneOf:
            - type: string
              enum:
                - met
                - notMet
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: If methodology = 'federal' - for RCRAPP2_INFC_CODE = 'EDE', if RCRAPP2_PELL_ANLY_TYPE = 'Y' then display as 'met' else if RCRAPP2_PELL_ANLY_TYPE = 'N' then display as 'notMet'. primarySourceUI - RNIMS** where ** refers to the aid year
            - type: string
              maxLength: 0
        professionalJudgement:
          title: Professional Judgement
          description: The response to a professional judgement request for the application.
          oneOf:
            - type: string
              enum:
                - processed
                - requestFailed
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: If methodology = 'federal' - for RCRAPP3_INFC_CODE = 'EDE', if RCRAPP3_ADJ_EFC_CALC_REQ = '1' then display as 'processed' else if RCRAPP3_ADJ_EFC_CALC_REQ = '2' then display as 'requestFailed' else do not display this property. primarySourceUI - RNIMS** where ** refers to the aid year
            - type: string
              maxLength: 0
        verificationStatus:
          title: Verification Status
          description: An indication if the application has been federally selected for
            information verification.
          oneOf:
            - type: string
              enum:
                - selected
                - notSelected
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: If methodology = 'federal' - for RCRAPP1_INFC_CODE = 'EDE' and RCRAPP1_AIDY_CODE and RCRAPP1_CURR_REC_IND = 'Y' and if RCRAPP1_VERIFICATION_MSG = '1' then display as 'selected' else if RCRAPP1_VERIFICATION_MSG = '2' then display as 'notSelected'. primarySourceUI - RNARS** where ** refers to the aid year
            - type: string
              maxLength: 0
        verificationCategory:
          title: Verification Category
          description: The verification category applied to the application.
          type: string
          x-lineageReferenceObject: RCRAPP1_VERIFICATION_PRTY(RCRAPP1)
      required:
        - id
        - applicant
        - aidYear
        - methodology
        - application
