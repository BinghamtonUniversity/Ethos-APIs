openapi: 3.0.0
info:
  title: Persons Credentials
  description: >
    Persons credentials API contains the details that are a subset of persons
    API which includes a person's Banner credentials such as Banner ID, SSN,
    SIN, tax identification number and system login information.


    Please refer to "API Integration Configuration Settings" section in the Banner Ethos API Handbook" for details on API configuration settings that needs to be configured for this API.
  version: 11.2.0
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/persons-credentials:
    get:
      summary: Returns resources
      description: >
        Returns a paged listing of all the person credentials information for
        all the person records in SPRIDEN table
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_CREDENTIALS
      tags:
        - persons-credentials
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
          example: "application/vnd.hedtech.integration.v11+json"
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
          example: 100
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
          example: 0
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Credentials  

            Returns all person credentials for the credential type and value sent in request

            ```

            /persons-credentials?criteria={"credentials":[{"type":"bannerId","value":"A00000718"}]}

            ```

            ### Alternative Credentials  

            Returns all person credentials for the alternativeCredentials type and value sent in request

            ```

            /persons-credentials?criteria={"alternativeCredentials":[{"type":{"id":"6cc4a853-2ff4-4ef3-9595-5d3eddcbbbcd"},"value":"DEANNE"}]}

            ```
          example: '{"credentials":[{"type":"bannerId","value":"A00000718"}]}'
        - name: personFilter
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Person Filter  

            Returns all persons for the person population selection filter id passed.

            ```

            /persons?personFilter={"personFilter":{"id":"cb3ebfe9-4a31-4933-a504-04d110413a29"}}

            ```
          example: '{"personFilter":{"id":"cb3ebfe9-4a31-4933-a504-04d110413a29"}}'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                items:
                  $ref: "#/components/schemas/schema-persons-credentials.json"
              example:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  credentials:
                    - type: "bannerId"
                      value: "A00000718"
                      startOn: "2023-01-15T09:00:00.000Z"
                      endOn: "2024-12-31T23:59:59.999Z"
                    - type: "ssn"
                      value: "123-45-6789"
                      startOn: "2023-01-15T09:00:00.000Z"
                      endOn: "2024-01-15T09:00:00.000Z"
                  alternativeCredentials:
                    - type:
                        id: "6cc4a853-2ff4-4ef3-9595-5d3eddcbbbcd"
                      value: "JDOE"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.2.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/persons-credentials/{id}:
    get:
      summary: Return the requested resource
      description: |
        Returns a single person credential record with the requested identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_CREDENTIALS
      tags:
        - persons-credentials
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
          example: "application/vnd.hedtech.integration.v11+json"
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.2.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.2.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-persons-credentials.json"
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                credentials:
                  - type: "bannerId"
                    value: "A00000718"
                    startOn: "2023-01-15T09:00:00.000Z"
                    endOn: "2024-12-31T23:59:59.999Z"
                  - type: "ssn"
                    value: "123-45-6789"
                    startOn: "2023-01-15T09:00:00.000Z"
                    endOn: "2024-12-31T23:59:59.999Z"
                  - type: "bannerUserName"
                    value: "jdoe2023"
                    startOn: "2023-01-15T09:00:00.000Z"
                    endOn: "2024-12-31T23:59:59.999Z"
                alternativeCredentials:
                  - type:
                      id: "6cc4a853-2ff4-4ef3-9595-5d3eddcbbbcd"
                    value: "JDOE"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    put:
      summary: Update the requested resource
      description: >
        Updates the person credentials for an existing SPRIDEN record. Note that
        the credentials.type of bannerUdcId cannot be changed.


        Below are the API behavior details for credentials and alternateCredentials properties on an update request:


        Credentials


        - SSN - If the ISO nation code configured in STVNATN_SCOD_CODE_ISO for the home institution nation code in GUBINST_NATN_CODE is US or USA, the SSN value sent in the create request is stored in the Banner baseline field SPBPERS_SSN. If the home institution is any other country then the SSN value in the create request is stored in the Ethos integration field SPBPERSS_SSN

        - SIN - If the ISO nation code configured in STVNATN_SCOD_CODE_ISO for the home institution nation code in GUBINST_NATN_CODE is CA or CAN, the SIN value sent in the create request is stored in the Banner baseline field SPBPERS_SSN. If the home institution is any other country then the SIN value in the create request is stored in the Ethos integration field SPBPERSS_SIN

        - Tax Identification Number - If the ISO nation code configured in STVNATN_SCOD_CODE_ISO for the home institution nation code in GUBINST_NATN_CODE is other than US or USA and CA or CAN, the taxIdentificationNumber value sent in the create request is stored in the Banner baseline field SPBPERS_SSN. If the home institution is USA or CAN, the value is stored in the Ethos integration field SPBPERSS_TIN


        Alternate Credentials


        - The alternateCredentials property is used to process credentials stored in GORADID table that are not mapped as Elevate ID, Colleague ID or Colleague User Name in the API configuration settings CREDENTIALS.COLLEAGUE_ID, CREDENTIALS.COLLEAGUE_USERNAME, CREDENTIALS.ELEVATE_ID

        - Updates to Elevate ID, Colleague ID and Colleague User Name in GORADID table should be done through credentials property. Any update request to these credentials sent as part of this property will be rejected with an error message
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_CREDENTIALS
      tags:
        - persons-credentials
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Persons Credentials for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json 

            ```
          schema:
            type: string
          example: "application/vnd.hedtech.integration.v11+json"
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json 

            ```
          schema:
            type: string
          example: "application/vnd.hedtech.integration.v11+json"
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.2.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.2.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-persons-credentials.json"
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                credentials:
                  - type: "bannerId"
                    value: "A00000718"
                    startOn: "2023-01-15T09:00:00.000Z"
                    endOn: "2024-12-31T23:59:59.999Z"
                  - type: "bannerUserName"
                    value: "jdoe2024_updated"
                    startOn: "2024-01-01T00:00:00.000Z"
                    endOn: "2024-12-31T23:59:59.999Z"
                alternativeCredentials:
                  - type:
                      id: "6cc4a853-2ff4-4ef3-9595-5d3eddcbbbcd"
                    value: "JDOE_UPDATED"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v11+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-persons-credentials.json"
            example:
              id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              credentials:
                - type: "bannerId"
                  value: "A00000718"
                  startOn: "2023-01-15T09:00:00.000Z"
                  endOn: "2024-12-31T23:59:59.999Z"
                - type: "bannerUserName"
                  value: "jdoe2024_updated"
                  startOn: "2024-01-01T00:00:00.000Z"
                  endOn: "2024-12-31T23:59:59.999Z"
              alternativeCredentials:
                - type:
                    id: "6cc4a853-2ff4-4ef3-9595-5d3eddcbbbcd"
                  value: "JDOE_UPDATED"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-persons-credentials.json:
      title: Persons Credentials
      description: A subset of person's data, including only their credentials.
      type: object
      properties:
        id:
          title: ID
          description: A global identifier of a person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= persons) 
          x-lineageDerivedLogic: Displays the person GUID from GORGUID where GORGUID_LDM_NAME is 'persons' and GORGUID_DOMAIN_KEY matches SPRIDEN_PIDM
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        credentials:
          title: Credential
          description: Information that identifies a user to a system such as a network or
            computer.
          type: array
          items:
            type: object
            properties:
              type:
                title: Type
                description: The type of credential, such as "Person ID" or "System ID".
                enum:
                  - ssn
                  - sin
                  - bannerId
                  - colleaguePersonId
                  - elevateId
                  - bannerSourcedId
                  - bannerUserName
                  - bannerUdcId
                  - colleagueUserName
                  - taxIdentificationNumber
                  - powerCampusId
                  - campusLogicId
                  - quercusId
                  - powerCampusUserName
                  - quercusUserName
                  - campusLogicUserName
                type: string
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: Displays the credential type enum 'bannerSourcedId' if GOBSRID_SOURCED_ID is populated, 'bannerUdcId' if GOBUMAP_UDC_ID is populated, 'taxIdentificationNumber' if the person has a value in SPBPERS_SSN and country code in GUBINST_NATN_CODE is not USA or CAN, 'colleagueUserName' if the person has a value in GORADID_ADDITIONAL_ID where GORADID_ADID_CODE matches the ID mapped in the API configuration setting CREDENTIALS.COLLEAGUE_USERNAME, 'sin' if the person has a value in SPBPERS_SSN and country code in GUBINST_NATN_CODE is CAN, 'ssn' if the person has a value in SPBPERS_SSN and country code in GUBINST_NATN_CODE is USA, 'elevateId' if the person has a value in GORADID_ADDITIONAL_ID where GORADID_ADID_CODE matches the ID mapped in the API configuration setting CREDENTIALS.ELEVATE_ID, 'colleaguePersonId' if the person has a value in GORADID_ADDITIONAL_ID where GORADID_ADID_CODE = ID type set on CREDENTIALS.COLLEAGUE_ID, 'bannerUserName' if GOBTPAC_EXTERNAL_USER is populated, 'bannerId' if the person has a value in SPRIDEN_ID
                example: "bannerId"
              value:
                title: Value
                description: The current value of the credential.
                type: string
                minLength: 1
                x-lineageReferenceObject: GOBSRID_SOURCED_ID(GOBSRID) or GOBTPAC_EXTERNAL_USER(GOBTPAC) or GORADID_ADDITIONAL_ID(GORADID) or SPBPERS_SSN(SPBPERS) or SPBPERSS_SIN(SPBPERSS) or SPBPERSS_SSN(SPBPERSS) or SPBPERSS_TIN(SPBPERSS) or SPRIDEN_ID(SPRIDEN) or GOBUMAP_UDC_ID(GOBUMAP) or GORADID_ADDITIONAL_ID(GORADID) or SPBPERS_SSN(SPBPERS) or GORADID_ADDITIONAL_ID(GORADID) 
                example: "A00000718"
              startOn:
                title: Start Date
                description: The date when the credential starts being valid.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                    x-lineageReferenceObject: SPBPERSS_BANNER_ID_START_ON(SPBPERSS) or SPBPERSS_BAN_SRC_START_ON(SPBPERSS) or SPBPERSS_COLL_ID_START_ON(SPBPERSS) or SPBPERSS_SIN_START_ON(SPBPERSS) or SPBPERSS_SSN_START_ON(SPBPERSS) or SPBPERSS_BAN_USER_START_ON(SPBPERSS) or SPBPERSS_ELEV_ID_START_ON(SPBPERSS) or SPBPERSS_BAN_UDC_START_ON(SPBPERSS) or SPBPERSS_COLL_USER_START_ON(SPBPERSS) or SPBPERSS_TIN_START_ON(SPBPERSS)
                  - type: string
                    maxLength: 0
                example: "2023-01-15T09:00:00.000Z"
              endOn:
                title: End Date
                description: The date when the credential stops being valid.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                    x-lineageReferenceObject: SPBPERSS_BAN_SRC_END_ON(SPBPERSS) or SPBPERSS_BAN_UDC_END_ON(SPBPERSS) or SPBPERSS_BAN_USER_END_ON(SPBPERSS) or SPBPERSS_COLL_ID_END_ON(SPBPERSS) or SPBPERSS_ELEV_ID_END_ON(SPBPERSS) or SPBPERSS_SIN_END_ON(SPBPERSS) or SPBPERSS_SSN_END_ON(SPBPERSS) or SPBPERSS_TIN_END_ON(SPBPERSS) or SPBPERSS_BANNER_ID_END_ON(SPBPERSS) or SPBPERSS_COLL_USER_END_ON(SPBPERSS)  
                  - type: string
                    maxLength: 0
                example: ""
            additionalProperties: false
            required:
              - type
              - value
        alternativeCredentials:
          title: Alternative Credentials
          description: Alternative information that uniquely identifies a user.
          type: array
          items:
            type: object
            properties:
              type:
                title: Type
                description: The type of alternative credential.
                oneOf:
                  - type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Type.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: alternative-credential-types 
                        x-lineageReferenceObject: GTVADID_GUID(GTVADID)
                        example: "6cc4a853-2ff4-4ef3-9595-5d3eddcbbbcd"
                    additionalProperties: false
                    required:
                      - id
                  - type: object
                    maxProperties: 0
                example:
                  id: "6cc4a853-2ff4-4ef3-9595-5d3eddcbbbcd"
              value:
                title: Value
                description: The value of the alternative credential.
                type: string
                minLength: 1
                x-lineageReferenceObject: GORADID_ADDITIONAL_ID(GORADID)
                example: "JDOE"
            additionalProperties: false
            required:
              - value
      required:
        - id
      additionalProperties: false