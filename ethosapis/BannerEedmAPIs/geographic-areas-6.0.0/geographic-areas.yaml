openapi: 3.0.0
info:
  title: Geographic Areas
  description: A geographic area defined for a specific purpose.
  version: "6.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/geographic-areas:
    get:
      summary: Return all resources from SORGEOR
      description: Returns a paged listing of all the geographic area records from
        SORGEOR table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_GEOGRAPHIC_AREAS
      tags:
        - geographic-areas
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-geographic-areas.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/geographic-areas/{id}:
    get:
      summary: Return the requested resource from SORGEOR
      description: Return the single geographic area record with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_GEOGRAPHIC_AREAS
      tags:
        - geographic-areas
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Geographic Areas for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v6+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-geographic-areas.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-geographic-areas.json:
      title: Geographic Areas
      description: A geographic area defined for a specific purpose.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: Id
          description: The global identifier of a geographic area.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= geographic-areas) 
          x-lineageDerivedLogic: Records from SORGEOR whose GUIDs are from GORGUID where GORGUID_LDM_NAME is 'geographic-areas' and GORGUID_DOMAIN_KEY is a concatenated value of SORGEOR_GEOR_CODE and SORGEOR_GEOD_CODE
        title:
          title: Title
          description: The full name of a geographic area.
          type: string
          minLength: 1
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Display the concatenated description of STVGEOR_DESC and STVGEOD_DESC
        description:
          title: Description
          description: The description of a geographic area.
          type: string
          x-lineageReferenceObject: unsupported
        type:
          title: Type
          description: The type of a geographic area.
          type: object
          properties:
            category:
              title: Category
              description: A category of geographic area type.
              enum:
                - governmental
                - postal
                - fundraising
                - recruitment
                - institutional
              type: string
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Always display as 'institutional'
            detail:
              title: Detail
              description: A custom geographic area type.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Detail.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: geographic-area-types 
                      x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = geographic-regions) 
                      x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME is 'geographic-regions' and GORGUID_DOMAIN_KEY matches SORGEOR_GEOR_CODE
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
          additionalProperties: false
          required:
            - category
        code:
          title: Code
          description: The code of the area.
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Dipaly the concatenated code value of STVGEOR_CODE and STVGEOD_CODE for the SORGEOR_GEOR_CODE value.
        includedAreas:
          title: Included Areas
          description: Areas included in this instance.
          type: array
          items:
            title: Included Areas
            description: Areas included in this instance.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Included Areas.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: geographic-areas 
                x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = geographic-divisions) 
                x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME is 'geographic-divisions' and GORGUID_DOMAIN_KEY matches SORGEOR_GEOD_CODE
            additionalProperties: false
            required:
              - id
      required:
        - id
        - title
        - type
      additionalProperties: false

