components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-persons-credentials.json:
      title: Persons Credentials
      description: A subset of person's data, including only their credentials.
      type: object
      properties:
        id:
          title: ID
          description: A global identifier of a person.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        credentials:
          title: Credential
          description: Information that identifies a user to a system such as a network or
            computer.
          type: array
          items:
            type: object
            properties:
              type:
                title: Type
                description: The type of credential, such as "Person ID" or "System ID".
                enum:
                  - ssn
                  - sin
                  - bannerId
                  - colleaguePersonId
                  - elevateId
                  - bannerSourcedId
                  - bannerUserName
                  - bannerUdcId
                  - colleagueUserName
                type: string
              value:
                title: Value
                description: The current value of the credential.
                type: string
              startOn:
                title: Start Date
                description: The date when the credential starts being valid.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
              endOn:
                title: End Date
                description: The date when the credential stops being valid.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
            additionalProperties: false
            required:
              - type
              - value
      required:
        - id
      additionalProperties: false

