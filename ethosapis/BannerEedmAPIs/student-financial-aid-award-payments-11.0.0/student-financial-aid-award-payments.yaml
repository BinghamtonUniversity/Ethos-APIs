            - currency
        academicPeriod:
          title: Academic Period
          description: The academic period associated with the payment.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Academic Period.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-periods 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = term) 
                  x-lineageDerivedLogic: Display the academicPeriod GUID from GORGUID where GORGUID_LDM_NAME is 'terms' and GORGUID_DOMAIN_KEY = TBRACCD_TERM_CODE
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        awardPeriod:
          title: Award Period
          description: The financial aid award period associated with the payment.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Award Period.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: financial-aid-award-periods 
