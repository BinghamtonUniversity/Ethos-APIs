openapi: 3.0.0
info:
  title: Marital Statuses
  description: >
    The Marital Statuses entity contains a user defined list of marital statuses
    that are mapped to the standard marital categories in the API configuration
    setting 'MARITALSTATUS.MARITALCATEGORY'. This setting supports multiple
    mapping.
  version: 6.1.0
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/marital-statuses:
    get:
      summary: Returns resources from STVMRTL
      description: >
        Returns a paged listing of marital status records from STVMRTL that are
        mapped to the standard categories of single, divorced, widowed,
        separated, married and other in the API configuration setting
        'MARITALSTATUS.MARITALCATEGORY'.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_MARITAL_STATUSES
      tags:
        - marital-statuses
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-marital-statuses.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in STVMRTL
      description: >
        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.


        Creates a new marital status record in STVMRTL. This new marital status code should be mapped to a valid marital category enumeration in the API configuration setting 'MARITALSTATUS.MARITALCATEGORY' for maritalCategory property to be displayed. The maritalCategory property value sent in the request will be ignored.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_MARITAL_STATUSES
      tags:
        - marital-statuses
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v6.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-marital-statuses.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v6+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-marital-statuses.json"
  /api/marital-statuses/{id}:
    get:
      summary: Return the requested resource from STVMRTL
      description: >
        Returns a single marital status record from STVMRTL with the requested
        identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_MARITAL_STATUSES
      tags:
        - marital-statuses
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v6.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-marital-statuses.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    put:
      summary: Update the requested resource from STVMRTL
      description: |
        Updates an existing marital status record
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_MARITAL_STATUSES
      tags:
        - marital-statuses
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Marital Statuses for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6+json 

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v6.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-marital-statuses.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v6+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-marital-statuses.json"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-marital-statuses.json:
      title: Marital Statuses
      description: A user defined list of marital statuses.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of a marital status to be used in all
            external references to a marital status.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= marital-status) 
          x-lineageDerivedLogic: A record in GORGUID with GORGUID_LDM_NAME as 'marital-status' will refer to each STVMRTL_CODE in STVMRTL
        code:
          title: Code
          description: The human-readable code that identifies a marital status.
          type: string
          x-lineageReferenceObject: STVMRTL_CODE(STVMRTL)
        title:
          title: Title
          description: The full name of a marital status.
          type: string
          minLength: 1
          x-lineageReferenceObject: STVMRTL_DESC(STVMRTL)
        description:
          title: Description
          description: A description of a marital status.
          type: string
          x-lineageReferenceObject: unsupported
        maritalCategory:
          title: Marital Category
          description: The name of a higher level marital category to which this member
            category belongs.
          enum:
            - single
            - divorced
            - widowed
            - separated
            - married
            - other
          type: string
          x-lineageReferenceObject: GORICCR_TRANSLATION_VALUE(GORICCR)
          x-lineageDerivedLogic: Only the GUIDs corresponding to the STVMRTL codes that are mapped to a valid marital-status enum in MARITALSTATUS.MARITALCATEGORY setting are published.
      required:
        - id
        - title
        - maritalCategory
      additionalProperties: false

