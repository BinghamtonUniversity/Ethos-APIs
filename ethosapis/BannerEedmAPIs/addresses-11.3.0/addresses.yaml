              maximum: 180
            - type: string
              nullable: true
        geographicAreas:
          title: Geographic Areas
          description: The geographic areas assigned to this location.
          type: array
          items:
            title: Geographic Areas
            description: The geographic areas assigned to this location.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Geographic Areas.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= geographic-areas)
                x-lineageDerivedLogic: For the institution SBGI_CODE, corresponding to the SOBSBGI address record, active GORSGEO_GEOR_CODE and GORSGEO_GEOD_CODE is fetched and corresponding GUID is displayed from GORGUID with GORGUID_LDM_NAME ='geographic-areas'. 
                  For the person PIDM, address type code and sequence number corresponding to the SPRADDR address record, active GORPGEO_GEOR_CODE and GORPGEO_GEOD_CODE is fetched and corresponding GUID is displayed from GORGUID with GORGUID_LDM_NAME ='geographic-areas'.
            additionalProperties: false
            required:
              - id
