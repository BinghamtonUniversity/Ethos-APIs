openapi: 3.0.0
info:
  title: Addresses
  description: >
    The place where a person, organization is located or may be reached.


    ISO code configurations for countries, regions and subregions should be configured appropriately. Please refer to "Additional configuration for the persons and addresses APIs" section in Banner Ethos API handbook.
  version: 11.3.0
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/addresses:
    get:
      summary: Returns resources from SPRADDR and SOBSBGI
      description: >
        Returns a paged listing of all the person, organization addresses in
        Banner from SPRADDR table and high school, prior college addresses in
        Banner from SOBSBGI table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ADDRESSES
      tags:
        - addresses
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: personFilter
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Person Filter  
            Retrieve information for a specified population.
            ```
            /addresses?personFilter={"personFilter": {"id": $id}}
            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-addresses.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.3.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/addresses/{id}:
    get:
      summary: Return the requested resource from SPRADDR and SOBSBGI
      description: >
        Returns a single addresses record from SPRADDR or SOBSBGI with the
        requested identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ADDRESSES
      tags:
        - addresses
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.3.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.3.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-addresses.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    put:
      summary: Update the requested resource from ADDRESS
      description: >
        Update the existing address for the passed in identifier for SPRADDR. The intention
        of the PUT request is to correct an address rather than change it to an
        entirely different address.
    

      security:
        - EthosIntegrationBearer: []
      tags:
        - addresses
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Addresses for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json 

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.3.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.3.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-addresses.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v11+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-addresses.json"
      x-method-permissions: API_ADDRESSES
    delete:
      summary: Removes a resource from ADDRESS
      description: >
        Delete an existing address record of SPRADDR Table entries.
      security:
        - EthosIntegrationBearer: []
      tags:
        - addresses
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Addresses for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      x-method-permissions: API_ADDRESSES
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-addresses.json:
      title: Addresses
      description: The place where a person, organization, or the like is located or
        may be reached.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the address.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SPRADDR_GUID(SPRADDR) or SOBSBGI_GUID(SOBSBGI)
        code:
          title: Code
          description: A code used to uniquely identify the address type instance.
          type: string
          x-lineageReferenceObject: SPRADDR_SEQNO(SPRADDR)
        addressLines:
          title: Address
          description: The address lines of the address, such as a street address, post
            office box number, or city, region, and postal code.
          x-lineageReferenceObject: SPRADDR_STREET_LINE1(SPRADDR) or SPRADDR_STREET_LINE2(SPRADDR) or SPRADDR_STREET_LINE3(SPRADDR) or SPRADDR_STREET_LINE4(SPRADDR) or 
            SOBSBGI_STREET_LINE1(SOBSBGI) or SOBSBGI_STREET_LINE2(SOBSBGI) or SOBSBGI_STREET_LINE3(SOBSBGI) or SOBSBGI_STREET_LINE4(SOBSBGI)
          type: array
          minItems: 1
          items:
            minLength: 1
            type: string
        place:
          title: Place
          description: A country specific postal region.  Postal regions are expressed as
            a hierarchy of country, region, and sub-region, and as a locality
            with postal automation codes
          oneOf:
            - type: object
              format: place
              properties:
                country:
                  title: Country
                  description: The country specific postal region definition.
                  oneOf:
                    - title: Australia
                      description: The postal region definition for Australia.
                      type: object
                      properties:
                        code:
                          title: Code
                          description: The ISO 3166-1 alpha-3 country code for Australia.
                          x-lineageReferenceObject: SPRADDR_NATN_CODE(SPRADDR) or SOBSBGI_NATN_CODE(SOBSBGI)
                          x-lineageDerivedLogic: ISO code corresponding to the country code is displayed. If 2 char ISO codes are established in STVNATN, the NATION.ISOCODE API configuration setting should be set to 2. Else, set it to 3.
                          enum:
                            - AUS
                          type: string
                        title:
                          title: Country
                          description: The name of the country, as used in everyday speech.
                          type: string
                          x-lineageReferenceObject: STVNATN_DESC(STVNATN)
                        postalTitle:
                          title: Postal Country
                          description: The name of the country when mail is being addressed from an
                            international sender.
                          x-lineageReferenceObject: derived
                          x-lineageDerivedLogic: If place.country.code ='AUS', display AUSTRALIA
                          oneOf:
                            - type: string
                              enum:
                                - AUSTRALIA
                            - type: string
                              maxLength: 0
                        region:
                          title: Region
                          description: A region within the country
                          oneOf:
                            - type: object
                              properties:
                                code:
                                  title: Code
                                  description: The ISO 3166-2 code used to identify the region within the country.
                                  x-lineageReferenceObject: SPRADDR_STAT_CODE(SPRADDR) or SOBSBGI_STAT_CODE(SOBSBGI)
                                  x-lineageDerivedLogic: State ISO code from STVSTAT is displayed.
                                  enum:
                                    - AU-NSW
                                    - AU-ACT
                                    - AU-VIC
                                    - AU-QLD
                                    - AU-SA
                                    - AU-WA
                                    - AU-TAS
                                    - AU-NT
                                  type: string
                                title:
                                  title: Title
                                  description: The full name of the region
                                  type: string
                                  x-lineageReferenceObject: STVSTAT_DESC(STVSTAT)
                              additionalProperties: false
                              required:
                                - code
                            - type: object
                              maxProperties: 0
                        subRegion:
                          title: Subregion
                          description: A subregion within the country and region
                          type: object
                          properties:
                            code:
                              title: Code
                              description: A code that may be used to identify the sub-region. This should be
                                the ISO 3166-2 code, if one exists, otherwise, a
                                user defined code may be optionally specified.
                              type: string
                              x-lineageReferenceObject: SPRADDR_CNTY_CODE_ISO(SPRADDR) or SPRADDR_CNTY_CODE(SPRADDR) or STVCNTY_SCOD_CODE_ISO(STVCNTY) or SOBSBGI_CNTY_CODE(SOBSBGI)
