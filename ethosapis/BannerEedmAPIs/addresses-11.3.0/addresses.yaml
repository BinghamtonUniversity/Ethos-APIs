                              x-lineageReferenceObject: SPRADDR_ZIP(SPRADDR) or SOBSBGI_ZIP(SOBSBGI)
                            - type: string
                              maxLength: 0
                      additionalProperties: false
                      required:
                        - code
                    - title: Brazil
                      description: The postal region definition for Brazil.
                      type: object
                      properties:
                        code:
                          title: Code
                          description: The ISO 3166-1 alpha-3 country code for Brazil.
                          x-lineageReferenceObject: SPRADDR_NATN_CODE(SPRADDR) or SOBSBGI_NATN_CODE(SOBSBGI)
                          x-lineageDerivedLogic: ISO code corresponding to the country code is displayed. If 2 char ISO codes are established in STVNATN, the NATION.ISOCODE API configuration setting should be set to 2. Else, set it to 3.
                          enum:
