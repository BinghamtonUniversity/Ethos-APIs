                          additionalProperties: false
                        locality:
                          title: city
                          description: The name of the city or town.
                          type: string
                          x-lineageReferenceObject: SPRADDR_CITY(SPRADDR) or SOBSBGI_CITY(SOBSBGI)
                        postalCode:
