openapi: 3.0.0
info:
  title: Employment Performance Reviews
  description: Information about employees&#x27; performance reviews.
  version: "10.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employment-performance-reviews:
    get:
      summary: Return all resources from PERREVW
      description: Returns a paged listing of all the employment performance review
        records from PERREVW table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMPLOYMENT_PERF_REVIEWS
      tags:
        - employment-performance-reviews
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-employment-performance-reviews.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource from PERREVW
      description: >-
        Create a new employment performance review record in PERREVW table.


        The person details sent in the create request should have an employee record existing in the PEBEMPL table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMPLOYMENT_PERF_REVIEWS
      tags:
        - employment-performance-reviews
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v10+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-employment-performance-reviews.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-employment-performance-reviews.json"
  /api/employment-performance-reviews/{id}:
    get:
      summary: Return the requested resource from PERREVW
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMPLOYMENT_PERF_REVIEWS
      tags:
        - employment-performance-reviews
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Employment Performance Reviews for use in
            all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v10+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-employment-performance-reviews.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    put:
      summary: Update the requested resource in PERREVW
      description: Update the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMPLOYMENT_PERF_REVIEWS
      tags:
        - employment-performance-reviews
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Employment Performance Reviews for use in
            all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v10+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v10+json 

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v10.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-employment-performance-reviews.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v10+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-employment-performance-reviews.json"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-employment-performance-reviews.json:
      title: Employment Performance Reviews
      description: Information about employees' performance reviews.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the employment performance review.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: PERREVW_GUID(PERREVW)
        person:
          title: Person
          description: The employee who is the subject of the performance review.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Person.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: PERREVW_PIDM(PERREVW)
          additionalProperties: false
          required:
            - id
        job:
          title: Job
          description: The job for which the person's performance was reviewed.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Job.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: institution-jobs 
                  x-lineageReferenceObject: PERREVEA_JOB_GUID(PERREVEA)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        dueOn:
          title: Due On
          description: The date by which the review must be completed.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: PERREVW_REVT_DATE(PERREVW)
            - type: string
              maxLength: 0
        completedOn:
          title: Completed On
          description: The date when the review was completed.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: PERREVW_COMPLETED_DATE(PERREVW)
            - type: string
              maxLength: 0
        type:
          title: Type
          description: The type of the performance review.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Type.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: employment-performance-review-types 
              x-lineageReferenceObject: PERREVW_REVT_CODE(PERREVW)
          additionalProperties: false
          required:
            - id
        reviewedBy:
          title: Reviewed By
          description: The person conducting the performance review.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Reviewed By.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: persons 
                  x-lineageReferenceObject: PERREVW_REVIEWER_PIDM(PERREVW)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        rating:
          title: Rating
          description: The rating given in the performance review.
          type: object
          properties:
            value:
              title: Value
              description: The value of the rating given.
              type: string
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display PERREVA_REVT_RATING if this field is not null, else display value from Ethos Integration column PERREVEA_REVT_RATING.
            detail:
              title: Detail
              description: The details of the performance review rating.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Detail.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: employment-review-ratings
                      x-lineageReferenceObject: PERREVEA_REVT_RATING_GUID(PERREVEA)
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
          additionalProperties: false
        comment:
          title: Comment
          description: Any comments associated with the performance review.
          type: string
          x-lineageReferenceObject: PREREVW_COMMENT(PREREVW)
      required:
        - id
        - person
        - type
      additionalProperties: false
