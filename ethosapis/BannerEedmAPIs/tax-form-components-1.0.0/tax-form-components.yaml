openapi: 3.0.0
info:
  title: Tax Form Components
  description: The specific elements included on a tax form (i.e. non-exempt
    income, prizes and awards, etc).
  version: 1.0.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Finance
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/tax-form-components:
    get:
      summary: Return all resources from FTMITYP
      description: Returns a paged listing of all the specific elements that may be
        included on a tax form (i.e. non-exempt income, prizes and awards, etc)
        from FTVITYP table
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_TAX_FORM_COMPONENTS
      tags:
        - tax-form-components
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: >
            The maximum number of resources requesting for this result set. The
            default limit is 500 and the maximum limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### N/A  
        - name: sort
          in: query
          required: false
          schema:
            type: object
          description: |
            ### N/A  
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-tax-form-components.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/tax-form-components/{id}:
    get:
      summary: Return the requested resource from FTMITYP
      description: Returns a specific element that may be included on a tax form (i.e.
        non-exempt income, prizes and awards, etc) from FTVITYP table for the
        passed identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_TAX_FORM_COMPONENTS
      tags:
        - tax-form-components
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of a tax form component for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-tax-form-components.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-tax-form-components.json:
      title: Tax Form Components
      description: The specific elements included on a tax form (i.e. non-exempt
        income, prizes and awards, etc).
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the tax form component.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FTVITYP_GUID(FTVITYP)
        title:
          title: Title
          description: The full name of the tax form component.
          type: string
          minLength: 1
          x-lineageReferenceObject: FTVITYP_DESC(FTVITYP)
        description:
          title: Description
          description: The description of the tax form component.
          type: string
          x-lineageReferenceObject: unsupported
        code:
          title: Code
          description: The code used to identify the tax form component.
          type: string
          x-lineageReferenceObject: FTVITYP_CODE(FTVITYP)
        taxForm:
          title: Tax Form
          description: The tax form with which the components are associated.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Tax Form.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: tax-forms 
              x-lineageReferenceObject: FTVTXFME_GUID(FTVTXFME)
          additionalProperties: false
          required:
            - id
      required:
        - id
        - title
        - taxForm
      additionalProperties: false
