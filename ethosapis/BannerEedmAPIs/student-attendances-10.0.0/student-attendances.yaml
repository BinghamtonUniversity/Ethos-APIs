openapi: 3.0.0
info:
  title: Student Attendances
  description: The detailed information of students&#x27; attendances at
    instructional events.
  version: "10.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-attendances:
    get:
      summary: Return all resources from SORSATR
      description: Returns a paged listing of all the student attendance records from
        SORSATR table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_ATTENDANCES
      tags:
        - student-attendances
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: Section
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Section 

            Returns all student attendances for the given section

            ```

            /student-attendances?sectionAttendance={"sectionId":"713a56b0-5ec9-41bd-908d-1bf741ab9f52"}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-student-attendances.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/student-attendances/{id}:
    get:
      summary: Return the requested resource from SORSATR
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUDENT_ATTENDANCES
      tags:
        - student-attendances
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Student Attendances for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v10+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-student-attendances.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-student-attendances.json:
      title: Student Attendances
      description: The detailed information of students' attendances at instructional
        events.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the student attendance.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SORSATR_GUID(SORSATR)
        student:
          title: Student
          description: The student for whom attendance was taken.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Student.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
              x-lineageDerivedLogic: Display the GORGUID_GUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY = SORSATR_PIDM
          additionalProperties: false
          required:
            - id
        instructionalEvent:
          title: Instructional Event
          description: The instructional event for which the student’s attendance applies.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Instructional Event.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: instructional-events 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = instructional-events) 
              x-lineageDerivedLogic: Display the GORGUID_GUID where GORGUID_LDM_NAME = 'instructional-events' and GORGUID_DOMAIN_KEY contains the SORSATR_SURROGATE_ID_SSRMEET
          additionalProperties: false
          required:
            - id
        instructionalEventInstance:
          title: Instructional Event Instance
          description: The instance of the instructional event for which attendance was
            taken.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Instructional Event Instance.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: instructional-event-instances 
                  x-lineageReferenceObject: unsupported
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        attendanceTaken:
          title: Attendance Taken
          description: The date and time for which the attendance applies.
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          x-lineageReferenceObject: SORSATR_MEET_DATE(SORSATR)
        attendance:
          title: Attendance
          description: The categorization of the student's attendance.
          type: object
          properties:
            category:
              title: Category
              description: The student’s attendance category.
              enum:
                - presentFull
                - presentPartial
                - absentExcused
                - absentNotExcused
              type: string
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display 'presentFull' when SORSATR_ATTEND_IND = Y and SORSATR_EXPECT_HRS is equal to SORSATR_ACTUAL_HRS. Display 'presentPartial' when SORSATR_ATTEND_IND = Y and SORSATR_EXPECT_HRS is greater than SORSATR_ACTUAL_HRS. Display 'absentExcused' when SORSATR_ATTEND_IND = N and SORSATR_AUTH_IND = Y. Display 'absentNotExcused' when SORSATR_ATTEND_IND = N and (SORSATR_AUTH_IND = N or SORSATR_AUTH_IND is null)
            detail:
              title: Detail
              description: A user defined category applied to the student's attendance.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Detail.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: attendance-categories 
                      x-lineageReferenceObject: unsupported
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
          additionalProperties: false
          required:
            - category
        percentAttended:
          title: Percent Attended
          description: The percentage of the total session time the student was in
            attendance.
          oneOf:
            - type: number
              x-lineageReferenceObject: unsupported
            - type: string
              nullable: true
        comment:
          title: Comment
          description: Comments regarding the student’s attendance.
          type: string
          x-lineageReferenceObject: SORSATR_COMMENT(SORSATR)
      required:
        - id
        - student
        - instructionalEvent
        - attendanceTaken
        - attendance
      additionalProperties: false
