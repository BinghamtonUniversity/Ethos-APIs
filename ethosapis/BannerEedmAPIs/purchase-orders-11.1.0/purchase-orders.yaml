                    budgetCheck:
                      title: Budget Check
                      description: An indication that budget checking should be overridden for the
                        accounting string.
                      oneOf:
                        - type: string
                          enum:
                            - override
                          x-lineageReferenceObject: FGBENCD_ABAL_OVERRIDE(FGBENCD) or  FPRPODA_NSF_OVERRIDE_IND(FPRPODA)
                        - type: string
                          maxLength: 0
                    submittedBy:
                      title: Submitted By
                      description: The person who made the submit request for the line item.
                      oneOf:
                        - type: object
                          properties:
                            id:
                              title: ID
                              description: The global identifier for the Submitted By.
                              type: string
                              format: guid
                              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                              x-lineageLookupReferenceObject: persons 
                              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons)
                              x-lineageDerivedLogic: For travel type documents,a record in GORGUID where GORGUID_LDM_NAME='persons' where GORGUID_DOMAIN_KEY=(Select GOBEACC_PIDM from GOBEACC where GOBEACC_USERNAME=FGBENCD_USER_ID). For procurement and eProcurement type documents,a record in GORGUID where GORGUID_LDM_NAME='persons' where GORGUID_DOMAIN_KEY=(Select GOBEACC_PIDM from GOBEACC where GOBEACC_USERNAME=FPRPODA_USER_ID)
                          additionalProperties: false
                          required:
