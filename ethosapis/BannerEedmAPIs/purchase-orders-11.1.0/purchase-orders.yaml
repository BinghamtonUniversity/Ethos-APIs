openapi: 3.0.0
info:
  title: Purchase Orders
  description: >
    Commercial agreements with vendors for the purchasing of commodities. The
    purchase orders API supports travel, procurement and eProcurement type
    purchase orders.


    Please refer to the section 'API Integration Configuration Settings' in Banner Ethos API Handbook for all the configuration settings needed for this API.
  version: 11.1.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Finance
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/purchase-orders:
    get:
      summary: Returns resources from FPBPOHD and FGBENCH
      description: >
        All the FGBENCH records for travel type purchase orders are retrieved.
        All the FPBPOHD records with FPBPOHD_ORIGIN_CODE = 'Banner' or
        'SELF_SERVICE' and FPBPOHD_PO_TYPE_IND = 'R' for procurement type
        purchase orders are retrieved and all the FPBPOHD records with
        FPBPOHD_ORIGIN_CODE = EPROCUREMENT and FPBPOHD_PO_TYPE_IND = R for
        eProcurement type purchase orders are retrieved.


        If the procurement or eProcurement type purchase order is created from the requisition, the requisition reference for each line item (lineItems.reference.document.requisition) is retrieved in the response.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PURCHASE_ORDERS
      tags:
        - purchase-orders
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 30 and upper limit is 100.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Order Number  
            The order number generated by the finance system.
            ```
            /purchase-orders?criteria={"orderNumber":"P0003134"}
            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-purchase-orders.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in FPBPOHD and FGBENCH
      description: >
        Creates a new purchase order record. A create request sent with 'type'
        as procurement or eProcurement will create a purchase order record in
        FPBPOHD. A create request sent with 'type' as travel will create a
        purchase order record in FGBENCH.


        For travel type purchase order only one line item is supported.


        Procurement/eProcurement type purchase order:


        • The API supports creating an inProgress and completed purchase order document. 


        • If a create request is sent with status = inProgress, the API creates a purchase order with 'inProgress' status. 


        • If a create request is sent with status other than 'inProgress', the API creates a completed purchase order and returns the status as 'outstanding' if the document is approved. For a completed and not approved document, the API returns the status as 'notApproved'.


        • If requisition is sent in the purchase orders line items(lineItems.reference.document.requisition), the API converts the requisition to eProcuremnet type purchase order.



        POST requests must include a nil GUID value ("00000000-0000-0000-0000-000000000000") for the root id property.


        In addition to the required properties defined in the data model, the following are required for a POST request: lineItems.accountDetails.allocation
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PURCHASE_ORDERS
      tags:
        - purchase-orders
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-purchase-orders.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v11+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-purchase-orders.json"
  /api/purchase-orders/{id}:
    get:
      summary: Return the requested resource from FPBPOHD and FGBENCH
      description: >
        If the PO is of Procurement or eProcurement type, the API returns the
        record from FPBPOHD table with the passed in identifier.

        If the PO is a travel type, returns the record from FGBENCH table with the passed in identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PURCHASE_ORDERS
      tags:
        - purchase-orders
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-purchase-orders.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    put:
      summary: Update the requested resource from FPBPOHD and FGBENCH
      description: >
        Travel type purchase order:

        A travel purchase order can be adjusted with an update request and can be closed when header status or line-item status is sent as 'closed'.


        Procurement/eProcurement type purchase order:


        • An update request sent for an inProgress purchase order updates the existing document with the changes. A change order will not be created.


        • For a purchase order with inProgress status if an update request is sent with status = outstanding, the API completes the inProgress document if the document header amount matches the totals of line item amounts and sets the document complete indicator to Y (FPBPOHD_COMPLETE_IND = Y).


        • If an update request is sent with header status as 'voided' for an inProgress purchase order, the API deletes the inProgress purchase order and returns an empty response.


        • An update request sent for an outstanding purchase order creates a change order.


        • An update request sent with header status 'voided' for an outstanding purchase order will cancel the purchase order and all the associated change orders. If this purchase order is of eProcurement type, the associated requisition is also cancelled.


        • Only the document which is completed, approved and posted can be cancelled with an update request.


        • An update request sent with line-item level status with status = closed, the purchase order will close the line item. If this purchase order is of eProcurement type, the associated requisition’s line item is also closed.


        • An update request sent with document level status = closed, the purchase order will close the whole purchase order. If this purchase order is of eProcurement type, the associated requisition is also closed.


        • Only the document which is completed, approved and posted can be closed with an update request.



        In addition to the required properties defined in the data model, the following are required for a PUT request: lineItems.accountDetails.allocation
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PURCHASE_ORDERS
      tags:
        - purchase-orders
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Purchase Orders for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json 

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-purchase-orders.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v11+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-purchase-orders.json"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-purchase-orders.json:
      title: Purchase Orders
      description: Commercial agreements with vendors for the purchasing of commodities.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the purchase order.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FPBPOHD_GUID(FPBPOHD) or FGBENCH_GUID(FGBENCH)
        type:
          title: Type
          description: The type of purchase order, i.e. Procurement, eProcurement, or
            Travel.
          oneOf:
            - type: string
              enum:
                - procurement
                - eProcurement
                - travel
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: For travel type documents, if the record is from FGBENCH table and FGBENCHEA_TYPE=travel, then display type ='travel'. For procurement and eProcurement type documents, if the record is from FPBPOHD table and if FPBPOHD_ORIGIN_CODE = 'BANNER' or 'SELFSERVICE', then display type = 'procurement' If the record is from FPBPOHD table and if FPBPOHD_ORIGIN_CODE ='EPROCUREMENT ', then display type = 'eProcurement'.
            - type: string
              maxLength: 0
        description:
          title: Description
          description: The description of the purchase order.
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic:  FGBENCH_DESC(FGBENCH) or For procurement and eProcurement type documents, if FPBPOHD_DELIVERY_COMMENT is not null then display the column value from FPBPOHD_DELIVERY_COMMENT else display the column value of FPBPOHDEA_DESCRIPTION
        orderNumber:
          title: Order Number
          description: The order number generated by the finance system.
          type: string
          x-lineageReferenceObject: FPBPOHD_CODE(FPBPOHD) or FGBENCH_NUM(FGBENCH)
        referenceNumbers:
          title: Reference Numbers
          description: A reference number which represents the originating system's source
            document.
          type: array
          items:
            type: string
            x-lineageReferenceObject: derived  
            x-lineageDerivedLogic: For travel type documents, if FGBENCH_DOC_REF_NUM is not NULL then display FGBENCH_DOC_REF_NUM else display FGBENHEA_DOC_REF_NUM. For procurement and eProcurement type documents, if FPBPOHDEA_REFERENCE_NUMBER is not null then display FPBPOHDEA_REFERENCE_NUMBER else display FPBPOHD_DOC_REF_CODE
        paymentSource:
          title: Payment Source
          description: The source account for the purchase order
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Payment Source.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: accounts-payable-sources 
                  x-lineageReferenceObject: FGBENCHEA_PAYMENTSOURCE_ID(FGBENCHEA) or FPBPOHDEA_PAYMENTSOURCE_ID(FPBPOHDEA)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        orderedOn:
          title: Ordered On
          description: The date the purchase order was created.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FGBENCHEA_ORDERED_ON(FGBENCHEA) or FPBPOHD_PO_DATE(FPBPOHD)
        transactionDate:
          title: Transaction Date
          description: The transaction date for the purchase order. This will be the date
            used when entering the transactions into the general ledger.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FGBENCH_TRANS_DATE(FGBENCHEA) or FPBPOHD_TRANS_DATE(FPBPOHD)
        deliveredBy:
          title: Delivered By
          description: The expected delivery date for the purchase order.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: FGBENCHEA_DELIVERED_BY(FGBENCH) or FPBPOHD_REQD_DATE(FPBPOHD)
            - type: string
              maxLength: 0
        status:
          title: Status
          description: The status of the purchase order.
          oneOf:
            - type: string
              enum:
                - notApproved
                - outstanding
                - voided
                - closed
                - inProgress
                - accepted
                - backordered
                - invoiced
                - paid
                - reconciled
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: For travel type documents, if FGBENCD_STATUS_IND = O, FGBENCD_APPR_IND = Y and the document does not exist in FOBAPPD, display as 'outstanding'; If FGBENCH_APPR_IND = N, display 'notApproved'; If FGBENCH_STATUS_IND = O and not posted, display'inProgress'; If FGBENCH_STATUS_IND = C, display 'closed'; If FGBENCD_STATUS_IND = O, FGBENCH_APPR_IND = Y, and line item exists in Encumbrance/Invoice mapping table, display as 'invoiced'.  For procurement and eProcurement type documents,If FPBPOHD_CANCEL_IND=YES AND FPBPOHD_CLOSED_IND=null, display 'voided'; if FPBPOHD_CANCEL_IND=YES AND FPBPOHD_CLOSED_IND=YES, display 'closed'; if FPBPOHD_COMPLETE_IND=NO, display 'InProgress'; if FPBPOHD_COMPLETE_IND=YES AND FBPOHD_APPR_IND=NO, display 'notApproved'; if FPBPOHD_COMPLETE_IND=YES AND FPBPOHD_APPR_IND=YES and if the Document is present in FOBAPPD table, display 'inProgress' ; if FPBPOHD_COMPLETE_IND=YES AND FPBPOHD_APPR_IND=YES and is posted, display as 'outstanding'; if the purchase order is invoiced, then display as 'invoiced'
            - type: string
              maxLength: 0
        statusDate:
          title: Status Date
          description: The date associated with the purchase order's status.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: FGBENCH_TRANS_DATE(FGBENCH) or For procurement and eProcurement type documents;If status = voided, then display FPBPOHD_CANCEL_DATE;If status = closed, then display FPBPOHD_CLOSED_DATE;
            - type: string
              maxLength: 0
        buyer:
          title: Buyer
          description: The buyer associated with the purchase order.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Buyer.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: buyers 
                  x-lineageReferenceObject: FGBENCHEA_BUYER_ID(FGBENCHEA) or FPBPOHD_BUYR_CODE(FPBPOHD)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        initiator:
          title: Initiator
          description: The initiator of the purchase order.
          oneOf:
            - type: object
              properties:
                name:
                  title: Name
                  description: The name of the initiator.
                  type: string
                  minLength: 1
                  x-lineageReferenceObject: FGBENCHEA_INIT_NAME(FGBENCHEA) or  FPBPOHD_NAME(FPBPOHD)
                detail:
                  title: Detail
                  description: The details of the person who initiated the purchase order.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Detail.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: persons 
                          x-lineageReferenceObject: FGBENCHEA_INIT_DETAIL_ID(FGBENCHEA) or FPBPOHDEA_INIT_DETAIL_ID(FPBPOHDEA)
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
                email:
                  title: Email
                  description: The email address associated with the initiator.
                  type: string
                  x-lineageReferenceObject: FGBENCHEA_INIT_EMAIL(FGBENCHEA) or FPBPOHD_EMAIL_ADDR(FPBPOHD)
                phone:
                  title: Phone
                  description: The phone number of the initiator.
                  oneOf:
                    - type: object
                      properties:
                        number:
                          title: Number
                          description: The number assigned to the phone.
                          type: string
                          minLength: 1
                          x-lineageReferenceObject: derived  
                          x-lineageDerivedLogic: FGBENCHEA_INIT_PHONE_NUM(FGBENCHEA) or For procurement and eProcurement type documents;Display the concatenated values of FPBPOHD_PHONE_AREA and FPBPOHD_PHONE_NUM
                        extension:
                          title: Extension
                          description: The extension used to connect to the phone when multiple phones
                            share the same primary number.
                          type: string
                          x-lineageReferenceObject: FGBENCHEA_INIT_PHONE_EXT(FGBENCHEA) or  FPBPOHD_PHONE_EXT(FPBPOHD)
                      additionalProperties: false
                      required:
                        - number
                    - type: object
                      maxProperties: 0
                fax:
                  title: Fax
                  description: The fax number of the initiator.
                  oneOf:
                    - type: object
                      properties:
                        number:
                          title: Number
                          description: The number assigned to the fax machine.
                          type: string
                          minLength: 1
                        extension:
                          title: Extension
                          description: The extension used to connect to the fax machine when multiple fax
                            machines share the same primary number.
                          type: string
                      additionalProperties: false
                      required:
                        - number
                    - type: object
                      maxProperties: 0
              additionalProperties: false
              required:
                - name
            - type: object
              maxProperties: 0
        shipping:
          title: Shipping
          description: The shipping information associated with the purchase order.
          type: object
          properties:
            attention:
              title: Attention
              description: The person or office to which the shipment is directed.
              type: string
            shipTo:
              title: Ship To
              description: The destination to which the items should be shipped.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Ship To.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: ship-to-destinations 
                      x-lineageReferenceObject: FGBENCHEA_SHIPTO_ID(FGBENCHEA) or FPBPOHD_SHIP_CODE(FPBPOHD)
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
            freeOnBoard:
              title: Free On Board
              description: The free on board (FOB) type specified for the purchase order.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Free On Board.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: free-on-board-types 
                      x-lineageReferenceObject: FPBPOHD_FOB_CODE(FPBPOHD) or  FGBENCHEA_FREE_ONBOARD_ID(FGBENCHEA)
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
          additionalProperties: false
        overrideShippingDestination:
          title: Override Shipping Destination
          description: Override of the shipping information specified in the ship to
            destination.
          type: object
          properties:
            description:
              title: Description
              description: The description of the shipping destination.
              type: string
              x-lineageReferenceObject: FGBENCHEA_DEST_DESC(FGBENCHEA) or FPBPOHDEA_DEST_DESC(FPBPOHDEA)
            addressLines:
              title: Address Lines
              description: The address lines of the destination's location, such as a street
                address or post office box number, city, region, and postal
                code.
              type: array
              items:
                type: string
                x-lineageReferenceObject: derived  
