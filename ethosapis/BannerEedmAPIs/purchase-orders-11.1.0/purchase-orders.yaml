                        - type: object
                          maxProperties: 0
                    status:
                      title: Status
                      description: The status of the account details associated with the line item.
                      oneOf:
                        - type: string
                          enum:
                            - closed
                            - inProgress
                            - notApproved
                            - outstanding
                            - accepted
                            - backordered
                            - invoiced
                            - paid
                            - reconciled
                            - voided
                          x-lineageReferenceObject: derived  
                          x-lineageDerivedLogic: For procurement and eProcurement type documents, If FPBPOHD_COMPLETE_IND = Y and FPBPOHD_APPR_IND = N, display as notApproved (there is a FPRPODA_APPR_IND, but it doesn't appear to be updating consistently); If FPBPOHD_COMPLETE_IND = Y and FPBPOHD_APPR_IND = Y, and document does not exist in FOBAPPD  or PO/Invoice mapping table, display as 'outstanding';If FPRPODT_CANCEL_IND = Y display as 'voided'; If FPRPODA_CLOSED_IND = Y, display as 'closed'; If FPBPOHD_COMPLETE_IND = N, display as 'inProgress';If FPBPOHD_COMPLETE_IND = Y and FPBPOHD_APPR_IND = Y, and document exists in FOBAPPD display as 'inProgress'; If FPBPOHD_COMPLETE_IND = Y and FPBPOHD_APPR_IND = Y, and document exists in PO/Invoice mapping table, display as 'invoiced'. For travel type documents, if FGBENCD_STATUS = 'O' and FGBENCD_APPR_IND = N (or null), display as 'notApproved'; If FGBENCD_STATUS_IND = O, FGBENCD_APPR_IND = Y and the document does not exist in FOBAPPD, display as 'outstanding'; If FGBENCD_STATUS_IND = C, display as 'closed'; If FGBENCD_STATUS_IND = O and document exists in FOBAPPD, display as 'inProgress'; If FGBENCH_STATUS = I, display as 'inProgress'; If FGBENCD_STATUS_IND = O, FGBENCH_APPR_IND = Y, and line item exists in Encumbrance/Invoice mapping table, display as 'invoiced'; If FGBENCD_STATUS_IND = C, display as 'closed'; If FGBENCD_STATUS_IND = O and document exists in FOBAPPD, display as 'inProgress'; If FGBENCH_STATUS = I, display as 'inProgress'; If FGBENCD_STATUS_IND = O, FGBENCH_APPR_IND = Y, and line item exists in Encumbrance/Invoice mapping table, display as 'invoiced'
                        - type: string
                          maxLength: 0
