openapi: 3.0.0
info:
  title: Restricted Student Financial Aid Awards
  description: >
    The restricted student financial aid award represents the award amounts and
    disbursements made to a student for the aid year when the category of award
    fund is restricted.


    Please refer to "API Integration Configuration Settings" section in the Banner Ethos API Handbook" for details on API configuration settings that needs to be configured for this API.
  version: 11.1.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Financial Aid
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: restricted-student-financial-aid-awards
paths:
  /api/restricted-student-financial-aid-awards:
    get:
      summary: Returns resources from RPRAWRD
      description: >
        Returns a paged listing of all the restricted student financial aid
        awards from RPRAWRD where the category of award fund is mapped to
        'restricted' in the API configuration setting
        'FINANCIAL.AID.FUNDS.PRIVACY'. If the fund category associated with the
        award fund has no mapping in this setting, then the award is by default
        identified as a restricted student award.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_RES_STU_FIN_AID_AWARDS
      tags:
        - restricted-student-financial-aid-awards
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Student  

            The student who will be receiving the financial aid award.

            ```

            /restricted-student-financial-aid-awards?criteria={"student":{"id":"5674f28b-b216-4055-b236-81a922d93b4c"}}

            ```

            ### Aid Year  

            The year that the award is assigned.

            ```

            /restricted-student-financial-aid-awards?criteria={"aidYear":{"id":"faec7f83-96e3-4eae-b78b-1800838373e6"}}

            ```

            ### Award Fund  

            The fund that is awarded to the student.

            ```

            /restricted-student-financial-aid-awards?criteria={"awardFund":{"id":"c267a5dc-c057-4041-b96b-e0b00b3a255d"}}

            ```
        - name: personFilter
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Person Filter  

            Retrieve information for a specified population.

            ```

            /restricted-student-financial-aid-awards?personFilter={"personFilter":{"id":"f15db88d-b3fe-4ca6-8036-a34f01bc511c"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-restricted-student-financial-aid-awards.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/restricted-student-financial-aid-awards/{id}:
    get:
      summary: Return the requested resource from RPRAWRD
      description: >
        Returns a single restricted student financial aid award from RPRAWRD
        table with the requested identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_RES_STU_FIN_AID_AWARDS
      tags:
        - restricted-student-financial-aid-awards
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-restricted-student-financial-aid-awards.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-restricted-student-financial-aid-awards.json:
      title: Restricted Student Financial Aid Awards
      description: Financial aid awards made to students when the knowledge of awards
        is restricted.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the restricted student financial aid award.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: RPRAWRD_GUID(RPRAWRD)
        student:
          title: Student
          description: The student who will be receiving the financial aid award.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Student.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
              x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME='persons' and GORGUID_DOMAIN_KEY matches the RPRAWRD_PIDM
          additionalProperties: false
          required:
            - id
        awardFund:
          title: Award Fund
          description: The fund that is awarded to the student.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Award Fund.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: financial-aid-funds 
              x-lineageReferenceObject: RPRAWRD_FUND_CODE(RPRAWRD)
          additionalProperties: false
          required:
            - id
        aidYear:
          title: Aid Year
          description: The year that the award is assigned.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Aid Year.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: financial-aid-years 
              x-lineageReferenceObject: RPRAWRD_AIDY_CODE(RPRAWRD)
          additionalProperties: false
          required:
            - id
        originallyOfferedOn:
          title: Originally Offered On
          description: The date of the first offer.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: RPRAWRD_ORIG_OFFER_DATE(RPRAWRD)
            - type: string
              maxLength: 0
        awardsByPeriod:
          title: Awards By Period
          description: Financial award details by period.
          type: array
          items:
            type: object
            properties:
              awardPeriod:
                title: Award Period
                description: The period in which the award was bestowed.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Award Period.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: financial-aid-award-periods 
                    x-lineageReferenceObject: RORTPRD_GUID(RORTPRD)
                additionalProperties: false
                required:
                  - id
              academicPeriods:
                title: Academic Periods
                description: Academic periods for which the financial award was made.
                type: array
                items:
                  title: Academic Periods
                  description: Academic periods for which the financial award was made.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Academic Periods.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: academic-periods 
                      x-lineageReferenceObject: RORPRDS_TERM_CODE(RORPRDS)
                  additionalProperties: false
                  required:
                    - id
              status:
                title: Status
                description: The status of the financial aid award.
                oneOf:
                  - type: object
                    properties:
                      state:
                        title: State
                        description: The state of the award.
                        enum:
                          - offered
                          - accepted
                          - declined
                          - cancelled
                        type: string
                        x-lineageReferenceObject: derived  
                        x-lineageDerivedLogic: For the RPRAWRD_AIDY_CODE, RPRAWRD_PIDM and RPRAWRD_FUND_CODE fetch the corresponding record in RPRATRM. For this record from RPRATRM, match the RPRATRM_AWST_CODE value with the RTVAWST_CODE from RTVAWST table. For this corresponding record from RTVAWST, if RTVAWST_DECLINE_IND = 'Y' then display as 'declined', if RTVAWST_ACCEPT_IND = 'Y' then display as 'accepted', if RTVAWST_OFFER_IND = 'Y' then display as 'offered', if RTVAWST_CANCEL_IND = 'Y' then display as 'cancelled'
                      stateOn:
                        title: State On
                        description: The effective date of the state.
                        oneOf:
                          - type: string
                            format: date
                            pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                            x-lineageReferenceObject: RPRATRM_AWST_DATE(RPRATRM)
                          - type: string
                            maxLength: 0
                    additionalProperties: false
                    required:
                      - state
                  - type: object
                    maxProperties: 0
              amounts:
                title: Amounts
                description: Various amounts involved in a financial aid award.
                type: object
                properties:
                  originalOffered:
                    title: Original Offered
                    description: The amount that was originally offered for the award period.
                    oneOf:
                      - type: object
                        format: currency
                        properties:
                          value:
                            title: Value
                            description: The monetary value
                            type: number
                            x-lineageReferenceObject: RPRATRM_ORIG_OFFER_AMT(RPRATRM)
                          currency:
                            title: Currency
                            description: The ISO 4217 currency code
                            enum:
                              - AED
                              - AFN
                              - ALL
                              - AMD
                              - ANG
                              - AOA
                              - ARS
                              - AUD
                              - AWG
