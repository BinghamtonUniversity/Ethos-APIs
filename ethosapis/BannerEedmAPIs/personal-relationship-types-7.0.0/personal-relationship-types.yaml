openapi: 3.0.0
info:
  title: Personal Relationship Types
  description: >-
    **API Deprecation Notice**



    Deprecated on: 30-Sep-2019



    Sunset on: 01-Oct-2021



    Description: Replaced by relationship-types v1.0.0.



    ----


    A type of relationship between people.


    Please refer to "API Integration Configuration Settings" section in the Banner Ethos API Handbook for details on API configuration settings that needs to be configured for this API.
  version: "7.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
  x-deprecated-on: 2019-09-30
  x-sunset-on: 2021-10-01
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/personal-relationship-types:
    get:
      summary: Return all resources from STVRELT
      description: >-
        Returns a paged listing of all the personal relationship type records
        from STVRELT table.


        The STVRELT_CODE mapped to a valid relationship type enumeration in the API configuration setting 'PERSONAL.RELATIONSHIP.TYPES' are displayed.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSONAL_REL_TYPES
      tags:
        - personal-relationship-types
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-personal-relationship-types.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      deprecated: true
  /api/personal-relationship-types/{id}:
    get:
      summary: Return the requested resource from STVRELT
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSONAL_REL_TYPES
      tags:
        - personal-relationship-types
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Personal Relationship Types for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v7+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-personal-relationship-types.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      deprecated: true
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-personal-relationship-types.json:
      title: Personal Relationship Types
      description: A type of relationship between people.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the personal relationship type
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= personal-relationship-types) 
          x-lineageDerivedLogic: A record from GORGUID where GORGUID_LDM_NAME = 'personal-relationship-types' is displayed. Only STVRELT records that are mapped to a valid relationship type enumeration in the API configuration setting 'PERSONAL.RELATIONSHIP.TYPES' are published.
        title:
          title: Title
          description: The full name of the personal relationship type
          type: string
          minLength: 1
          x-lineageReferenceObject: STVRELT_DESC(STVRELT)
        description:
          title: Description
          description: The full description of the personal  relationship type
          type: string
          x-lineageReferenceObject: unsupported
        relationshipType:
          title: Personal Relationship Type
          description: Type of relationships between two people
          enum:
            - parent
            - stepParent
            - mother
            - stepMother
            - father
            - stepFather
            - child
            - stepChild
            - daughter
            - stepDaughter
            - son
            - stepSon
            - sibling
            - stepSibling
            - brother
