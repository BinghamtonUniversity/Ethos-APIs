            - fatherInLaw
            - childInLaw
            - daughterInLaw
            - sonInLaw
            - siblingInLaw
            - sisterInLaw
            - brotherInLaw
            - siblingOfParent
            - aunt
            - uncle
            - childOfSibling
            - niece
            - nephew
            - cousin
            - friend
            - relative
            - coworker
            - neighbor
            - classmate
            - caregiver
            - other
            - husband
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: For the STVRELT_CODE mapped to a valid relationship type enumeration in the API configuration setting 'PERSONAL.RELATIONSHIP.TYPES' is displayed
        validReciprocalRelationships:
          title: Valid Reciprocal Relationships
          description: Valid reciprocal relationships that a direct relationship of a
            person can have.
          type: array
          items:
            type: object
            properties:
              type:
                title: Type
                description: The type of the reciprocal relationship.
                enum:
                  - parent
                  - stepParent
                  - mother
                  - stepMother
                  - father
                  - stepFather
                  - child
                  - stepChild
                  - daughter
                  - stepDaughter
                  - son
