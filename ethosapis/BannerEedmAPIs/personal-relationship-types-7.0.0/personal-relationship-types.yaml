                  - spouse
                  - wife
                  - partner
                  - grandParent
                  - grandMother
                  - grandFather
                  - grandChild
                  - grandDaughter
                  - grandSon
                  - parentInLaw
                  - motherInLaw
                  - fatherInLaw
                  - childInLaw
                  - daughterInLaw
                  - sonInLaw
                  - siblingInLaw
                  - sisterInLaw
                  - brotherInLaw
                  - siblingOfParent
                  - aunt
                  - uncle
                  - childOfSibling
                  - niece
                  - nephew
                  - cousin
                  - friend
                  - relative
                  - coworker
                  - neighbor
                  - classmate
                  - caregiver
                  - other
                  - husband
                type: string
                x-lineageReferenceObject: unsupported
              detail:
                title: Detail
                description: The extension to the type of the reciprocal relationship.
                oneOf:
                  - type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Detail.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: personal-relationship-types 
                        x-lineageReferenceObject: unsupported
                    additionalProperties: false
                    required:
                      - id
                  - type: object
                    maxProperties: 0
            additionalProperties: false
            required:
              - type
        code:
          title: Code
          description: The code of the personal  relationship type.
          type: string
          x-lineageReferenceObject: STVRELT_CODE(STVRELT)
      required:
        - id
        - title
        - relationshipType
      additionalProperties: false

