            - title: Monthly Pay Periods
              description: A list of pay periods during a month when deductions should occur.
                Use a positive number to count from the start of the month
                (e.g., 1 = first pay period of the month, 2 = second pay period
                of the month), and a negative number to count from the end of
                the month (e.g. -1 = last pay period of the month).
              type: object
              properties:
                monthlyPayPeriods:
                  title: Monthly Pay Periods
                  description: A list of pay periods during a month when deductions should occur.
                    Use a positive number to count from the start of the month
                    (e.g., 1 = first pay period of the month, 2 = second pay
                    period of the month), and a negative number to count from
