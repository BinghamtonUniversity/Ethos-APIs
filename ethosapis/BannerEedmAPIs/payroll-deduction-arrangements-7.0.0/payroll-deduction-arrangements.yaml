              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: PDRBDED_END_DATE(PDRBDED)
            - type: string
              maxLength: 0
        payPeriodOccurence:
          title: Pay Period Occurence
          description: The pay periods for which the payroll deductions are applicable.
          oneOf:
            - title: Interval
              description: The number of pay periods between deductions, e.g 1 = every pay
                period, 2 = every other pay period).
              type: object
              properties:
                interval:
                  title: Interval
                  description: The number of pay periods between deductions, e.g. 1 = every pay
                    period, 2 = every other pay period).
                  type: integer
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: If PTRBDCA_WEEK1_IND = 'Y' AND PTRBDCA_WEEK2_IND = 'Y' AND PTRBDCA_WEEK3_IND = 'Y' AND PTRBDCA_WEEK4_IND = 'Y' then display '1' else do not publish.
              additionalProperties: false
              required:
