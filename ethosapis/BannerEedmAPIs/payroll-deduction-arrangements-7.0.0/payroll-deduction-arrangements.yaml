                    x-lineageReferenceObject: derived  
                    x-lineageDerivedLogic: If PTRBDCA_WEEK1_IND = 'Y' AND PTRBDCA_WEEK2_IND = 'N' AND PTRBDCA_WEEK3_IND = 'N' AND PTRBDCA_WEEK4_IND = 'N' then display '1' else do not publish.
