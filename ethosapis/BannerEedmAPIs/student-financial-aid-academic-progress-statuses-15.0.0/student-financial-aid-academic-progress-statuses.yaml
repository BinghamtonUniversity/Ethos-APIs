openapi: 3.0.0
info:
  title: Student Financial Aid Academic Progress Statuses
  description: The financial aid satisfactory academic progress (SAP) status of a person.
  version: "15.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Financial Aid
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-financial-aid-academic-progress-statuses:
    get:
      summary: Return all resources from RORSAPR
      description: Returns a paged listing of all the student's financial aid
        Satisfactory Academic Progress (SAP) status records from RORSAPR table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STU_FIN_AID_ACAD_PROG_STAT
      tags:
        - student-financial-aid-academic-progress-statuses
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v15+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Person  

            The person associated with the financial aid satisfactory academic progress status.

            ```

            /student-financial-aid-academic-progress-statuses?criteria={"person":{"id":"2a70ac72-65e4-4014-8805-56a5aa182a86"}}

            ```

            ### Status  

            The financial aid satisfactory academic progress status of the person.

            ```

            /student-financial-aid-academic-progress-statuses?criteria={"status":{"id":"1234ea56-65e4-4014-8805-56a5aa182a86"}}

            ```

            ### Type  

            The categorization of the financial aid satisfactory academic progress (SAP) status.

            ```

            /student-financial-aid-academic-progress-statuses?criteria={"type":{"id":"9eea5e5a-7e92-4511-bd42-043ca665e7e4"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-student-financial-aid-academic-progress-stat\
                  uses.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v15+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/student-financial-aid-academic-progress-statuses/{id}:
    get:
      summary: Return the requested resource from RORSAPR
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STU_FIN_AID_ACAD_PROG_STAT
      tags:
        - student-financial-aid-academic-progress-statuses
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Student Financial Aid Academic Progress
            Statuses for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v15+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v15+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v15+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-student-financial-aid-academic-progress-stat\
                  uses.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-student-financial-aid-academic-progress-statuses.json:
      title: Student Financial Aid Academic Progress Statuses
      description: The financial aid satisfactory academic progress (SAP) status of a
        person.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the student financial aid academic
            progress status.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: RORSAPR_GUID(RORSAPR)
        person:
          title: Person
          description: The person associated with the financial aid satisfactory academic
            progress status.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Person.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
              x-lineageDerivedLogic: Display the GUID from GORGUID where GORGUID_LDM_NAME is 'persons' and GORGUID_DOMAIN_KEY matches the RORSAPR_PIDM
          additionalProperties: false
          required:
            - id
        status:
          title: Status
          description: The financial aid satisfactory academic progress status of the
            person.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Status.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: financial-aid-academic-progress-statuses 
              x-lineageReferenceObject: RORSAPR_SAPR_CODE(RORSAPR)
          additionalProperties: false
          required:
            - id
        effectiveOn:
          title: Effective On
          description: The date the financial aid satisfactory academic progress status is
            effective.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: STVTERM_START_DATE(STVTERM)
            - type: string
              maxLength: 0
        assignedOn:
          title: Assigned On
          description: The date the financial aid satisfactory academic progress status
            was assigned.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: RORSAPR_ACTIVITY_DATE(RORSAPR)
            - type: string
              maxLength: 0
        type:
          title: Type
          description: The categorization of the financial aid satisfactory academic
            progress (SAP) status.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Type.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: financial-aid-academic-progress-types 
                  x-lineageReferenceObject: RORSAPR_SAPR_CODE(RORSAPR)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
      required:
        - id
        - person
        - status
      additionalProperties: false
