openapi: 3.0.0
info:
  title: Grade Schemes
  description: A specification for how grades should be calculated and reported
    for a course.
  version: "6.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Student
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/grade-schemes:
    get:
      summary: Return all resources from SHRGSCH
      description: Returns a paged listing of all the grade schemes from SHRGSCH table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_GRADE_SCHEMES
      tags:
        - grade-schemes
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-grade-schemes.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/grade-schemes/{id}:
    get:
      summary: Return the requested resource from SHRGSCH
      description: Return the one grade scheme record with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_GRADE_SCHEMES
      tags:
        - grade-schemes
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Grade Schemes for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v6+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-grade-schemes.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-grade-schemes.json:
      title: Grade Schemes
      description: A specification for how grades should be calculated and reported
        for a course.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: A global identifier of a grade scheme.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SHRGSCH_GUID(SHRGSCH)
        title:
          title: Title
          description: The full name of a grade scheme.
          type: string
          minLength: 1
          x-lineageReferenceObject: SHRGSCH_GRADE_SCHEME_DESC(SHRGSCH)
        code:
          title: Code
          description: The code for the grade scheme that may be used a reference or for
            reporting.
          type: string
          x-lineageReferenceObject: SHRGSCH_GRADE_SCHEME_CODE(SHRGSCH)
        description:
          title: Description
          description: The description of a grade scheme.
          type: string
          x-lineageReferenceObject: unsupported
        academicLevel:
          title: Academic Level
          description: A designation of the level of instruction of a course or a program
            of study.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Academic Level.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-levels 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = grade-schemes) 
                  x-lineageDerivedLogic: Display academicLevel GUID from GORGUID where GORGUID_LDM_NAME is 'grade-schemes' and GORGUID_DOMAIN_KEY matches SHRGSCH_GRADE_MODE
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        gradeMode:
          title: Grade Mode
          description: The grade mode associated with the grade scheme.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Grade Mode.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: grade-modes 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = academic-levels) 
                  x-lineageDerivedLogic: Display academicLevel GUID from GORGUID where GORGUID_LDM_NAME is 'academic-levels' and GORGUID_DOMAIN_KEY matches SHRGSCH_GRADE_SCHEME_LEVEL
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        startOn:
          title: Start Date
          description: The date after which a grade scheme may be used.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              x-lineageReferenceObject: unsupported
            - type: string
              maxLength: 0
        endOn:
          title: End Date
          description: The date after which a grade scheme may no longer be used.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              x-lineageReferenceObject: unsupported
            - type: string
              maxLength: 0
      required:
        - id
        - title
      additionalProperties: false
