openapi: 3.0.0
info:
  title: Procurement Receipts
  description: >
    The information about receipts of goods or services received against
    approved purchase orders.
  version: 13.1.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Finance
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/procurement-receipts:
    get:
      summary: Returns resources from FPBRCHD
      description: >
        Returns all procurement receipts from FPBRCHD with FPBRCHD_COMPLETE_IND
        = Y.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PROCUREMENT_RECEIPTS
      tags:
        - procurement-receipts
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v13+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Purchase Order  

            The originating purchase order associated with the procurement receipt.

            ```

            /procurement-receipts?criteria={"purchaseOrder":{"id":"47bffac4-202a-4835-a657-773763adf1f0"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-procurement-receipts.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v13.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in FPBRCHD
      description: >
        Creates a completed procurement receipt in FPBRCHD with
        FPBRCHD_COMPLETE_IND = Y for a create request. Only creates a
        procurement receipt for a completed and posted purchase orders.


        POST requests must include a nil GUID value ("00000000-0000-0000-0000-000000000000") for the root id property.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PROCUREMENT_RECEIPTS
      tags:
        - procurement-receipts
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v13+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v13+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v13.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v13.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-procurement-receipts.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v13+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-procurement-receipts.json"
  /api/procurement-receipts/{id}:
    get:
      summary: Return the requested resource from FPBRCHD
      description: |
        Returns a procurement receipt from FPBRCHD for the passed in identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PROCUREMENT_RECEIPTS
      tags:
        - procurement-receipts
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v13+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v13.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v13.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-procurement-receipts.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-procurement-receipts.json:
      title: Procurement Receipts
      description: Information about receipts of goods or services received against
        approved purchase orders.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the procurement receipt.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FPBRCHD_GUID(FPBRCHD)
        purchaseOrder:
          title: Purchase Order
          description: The originating purchase order associated with the procurement
            receipt.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Purchase Order.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: purchase-orders 
              x-lineageReferenceObject: FPBPOHD_GUID(FPBPOHD)
          additionalProperties: false
          required:
            - id
        packingSlipNumber:
          title: Packing Slip Number
          description: The packing slip number or receiving reference document number
            associated with the procurement receipt.
          type: string
          x-lineageReferenceObject: FPRRCDT_PACKING_SLIP(FPRRCDT)
        receiptNumber:
          title: Receipt Number
          description: The receipt number generated by the finance system.
          type: string
          x-lineageReferenceObject: FPBRCHD_CODE(FPBRCHD)
        lineItems:
          title: Line Items
          description: The individual line items associated with the procurement receipt.
          type: array
          minItems: 1
          items:
            type: object
            properties:
              lineItemNumber:
                title: Line Item Number
                description: The line item number referenced from the purchase order.
                type: string
                minLength: 1
                x-lineageReferenceObject: FPRRCDT_ITEM(FPRRCDT)
              received:
                title: Received
                description: The received quantity or amount for the line item including the
                  rejected quantity or amount.
                oneOf:
                  - title: Quantity
                    description: The quantity received including the rejected quantity.
                    type: object
                    properties:
                      quantity:
                        title: Quantity
                        description: The quantity received.
                        type: number
                        x-lineageReferenceObject: FPRRCDT_QTY_REJD(FPRRCDT)
                    additionalProperties: false
                    required:
                      - quantity
                  - title: Amount
                    description: The amount received including the rejected amount.
                    type: object
                    properties:
                      amount:
                        title: Amount
                        description: The amount received.
                        format: currency
                        type: object
                        properties:
                          value:
                            title: Value
                            description: The monetary value
                            type: number
                            x-lineageReferenceObject: derived  
                            x-lineageDerivedLogic: Display FPRRCDTS_AMT_RCVD if the value is not NULL, else display FPRRCDT_QTY_RCVD when FPBPOHD_PO_TYPE_IND ='R'
