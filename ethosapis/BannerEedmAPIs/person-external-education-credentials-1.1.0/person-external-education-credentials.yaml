openapi: 3.0.0
info:
  title: Person External Education Credentials
  description: >
    The Person external education credentials API contains information about the
    credentials received at the external institutions associated with a person
    in Banner. Each record of the API represents the person educational pursuit
    at the institution specified.
  version: 1.1.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Foundation
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/person-external-education-credentials:
    get:
      summary: Returns resources
      description: >
        Returns a pages listing of person external education credentials details
        where high school diploma records are retrieved from SORHSCH table with
        institution type as 'H', prior college degree records from SORDEGR table
        where institution type is 'C' and transfer institution degree records
        from SHRTRAM table where institution type is 'C'.


        The person-external-education-credentials API is part of Integration application, however some of the Banner tables (SORHSCH and SHRTRAM) supporting these APIs are part of Banner Student. Customers without Banner Student license would only see the records for prior college from SORDEGR  table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_EXT_EDU_CREDENTIALS
      tags:
        - person-external-education-credentials
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### External Education  

            Returns all person external educations credentials for the externalEducation id passed.

            ```

            /person-external-education-credentials?criteria={"externalEducation":{"id":"ff5f51a4-29c0-44de-bb7b-0633aad5583f"}}

            ```
        - name: personFilter
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Person Filter  

            Returns all person external education credentials records for the person-filter guid passed.

            ```

            /person-external-education-credentials?personFilter={"personFilter":{"id":"b5427b09-422b-98e5-c44d-e6a25b210a44"}}

            ```
        - name: person
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Person  

            Returns all person external education credentials records for the person guid passed.

            ```

            /person-external-education-credentials?person={"person":{"id":"03c0d321-7912-43f9-bfcb-ed1153b1dfa5"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-person-external-education-credentials.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource
      description: >
        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.


        Creates a new person external education credential record.


        For a create request with high school diploma, the existing person-external-educations record in SORHSCH is updated with diploma details. Prior college degree records are created in SORDEGR . Creating a credential record for transfer institution is not supported.


        The person-external-education-credentials API is part of Integration application, however the Banner table for high school SORHSCH is part of Banner Student. Customers without Banner Student license would not be allowed to created high school records. A request sent to update a high school record with diploma would be rejected with an error.


        The properties - disciplines, performanceMeasure, classSize, classPercentile, classRank and thesisTitle are not supported for high school. Create request sent with these properties will be rejected with an error message.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_EXT_EDU_CREDENTIALS
      tags:
        - person-external-education-credentials
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-person-external-education-credentials.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-person-external-education-credentials.json"
  /api/person-external-education-credentials/{id}:
    get:
      summary: Return the requested resource
      description: >
        Returns a single person external education credential record with the
        requested Identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_EXT_EDU_CREDENTIALS
      tags:
        - person-external-education-credentials
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-person-external-education-credentials.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    put:
      summary: Update the requested resource
      description: >
        Updates an existing person-external-education-credentials record.


        The properties - disciplines, performanceMeasure, classSize, classPercentile, classRank and thesisTitle are not supported for high school. Update request sent with these properties will be rejected with an error message.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_EXT_EDU_CREDENTIALS
      tags:
        - person-external-education-credentials
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Person External Education Credentials for
            use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json 

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-person-external-education-credentials.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v1+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-person-external-education-credentials.json"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-person-external-education-credentials.json:
      title: Person External Education Credentials
      description: Credentials earned by persons outside of their home institution.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the person external education credential.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SORDEGR_GUID(SORDEGR) or SHRTRAM_GUID(SHRTRAM) or SORHSCH_CRED_GUID(SORHSCH)
          x-lineageDerivedLogic: Prior college records are displayed from SORDEGR, Transfer institution records from SHRTRAM where SHRTRAM_DEGC_CODE is not null, High school records from SORHSCH where SORHSCH_DPLM_CODE is not null.
        externalEducation:
          title: External Education
          description: The details of the external education associated with the credential.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the External Education.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: person-external-education 
              x-lineageReferenceObject: SHRTRIT_GUID(SHRTRIT) or SORHSCH_GUID(SORHSCH) or SORPCOL_GUID(SORPCOL)
          additionalProperties: false
          required:
            - id
        credential:
          title: Credential
          description: The academic credential (degree, diploma, etc.) the person earned
            at the institution.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Credential.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: academic-credentials 
              x-lineageReferenceObject: SORHSCH_DPLM_CODE(SORHSCH) or GORGUID_GUID(LDM_NAME = academic-credentials) 
              x-lineageDerivedLogic: Prior college - Display GUID from GORGUID where GORGUID_LDM_NAME is 'academic-credentials' and GORGUID_DOMAIN_KEY matches SORDEGR_DEGC_CODE. Transfer institution - Display GUID from GORGUID where GORGUID_LDM_NAME is 'academic-credentials' and GORGUID_DOMAIN_KEY matches SHRTRAM_DEGC_CODE. High school - Display GUID from STVDPLM where STVDPLM_CODE matches SORHSCH_DPLM_CODE
          additionalProperties: false
          required:
            - id
        earnedOn:
          title: Earned On
          description: The date when the person earned the credential.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: SORDEGR_DEGC_DATE(SORDEGR) or SORHSCH_GRADUATION_DATE(SORHSCH)
            - type: string
              maxLength: 0
        disciplines:
          title: Disciplines
          description: The academic disciplines associated with the person's course of
            study at the institution.
          type: array
          items:
            title: Disciplines
            description: The academic disciplines associated with the person's course of
              study at the institution.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Disciplines.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: academic-disciplines 
                x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = academic-disciplines) 
                x-lineageDerivedLogic: Prior college - For the SORDEGR_PIDM, SORDEGR_SBGI_CODE and SORDEGR_DEGC_CODE fetch the matching records from SORMAJR, SORMINR and SORCONC. 'discipline' is not supported for high school and transfer institution
            additionalProperties: false
            required:
              - id
        supplementalCredentials:
          title: Supplemental Credentials
          description: The supplemental academic credential (degree, diploma, etc.) the
            person earned at the institution.
          type: array
          items:
            type: object
            properties:
              credential:
                title: Credential
                description: The academic credential (degree, diploma, etc.) the person earned
                  at the institution.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Credential.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageReferenceObject: SORHSCHM_SUPP_CRED_ID(SORHSCHM) or SORDEGRM_SUPP_CRED_ID(SORDEGRM)
                additionalProperties: false
                required:
                  - id
              earnedOn:
                title: Earned On
                description: The date when the person earned the credential.
                oneOf:
                  - type: string
                    format: date
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                    x-lineageReferenceObject: SORDEGR_DEGC_DATE(SORDEGR) or SORHSCH_GRADUATION_DATE(SORHSCH)
                  - type: string
                    maxLength: 0
            additionalProperties: false
            required:
              - credential
        attendancePeriods:
          title: Attendance Periods
          description: The periods associated with the person's attendance at the
            institution.
          type: array
          items:
            type: object
            properties:
              startOn:
                title: Start On
                description: The date when the person's education at the institution began.
                oneOf:
                  - type: string
                    format: date
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                    x-lineageReferenceObject: SORHSCHM_ATTN_BEGIN_DATE(SORHSCHM) or SHRTRAM_ATTN_BEGIN_DATE(SHRTRAM) or SORDEGR_ATTEND_FROM(SORDEGR)
                  - type: string
                    maxLength: 0
              endOn:
                title: End On
                description: The date when the person's education at the institution ended.
                oneOf:
                  - type: string
                    format: date
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                    x-lineageReferenceObject: SHRTRAM_ATTN_END_DATE(SHRTRAM) or SORDEGR_ATTEND_TO(SORDEGR) or SORHSCHM_ATTN_END_DATE(SORHSCHM)
                  - type: string
                    maxLength: 0
            additionalProperties: false
          minProperties: 1
        performanceMeasure:
          title: Performance Measure
          description: A measurement of the student's educational performance at the
            institution (e.g. GPA).
          type: string
          x-lineageReferenceObject: SORDEGR_GPA_TRANSFERRED(SORDEGR)
        recognitions:
          title: Recognitions
          description: The academic recognitions received by the person at the institution.
          type: array
          items:
            title: Recognitions
            description: The academic recognitions received by the person at the
              institution.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Recognitions.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: academic-honors 
                x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = institutional-honors) or  SORHSCH_CRED_GUID(SORHSCH) or  SORDEGR_GPA_TRANSFERRED(SORDEGR)
                x-lineageDerivedLogic: Prior college - If person has only one recognition associated, display GUID from GORGUID where GORGUID_LDM_NAME is 'institutional-honors' and GORGUID_DOMAIN_KEY matches SORDEGR_HONR_CODE
            additionalProperties: false
            required:
              - id
        classSize:
          title: Class Size
          description: The size of the person’s postsecondary school graduating class.
          oneOf:
            - type: integer
              x-lineageReferenceObject: SORDEGR_CRED_CLASS_SIZE(SORDEGR)
            - type: string
              nullable: true
        classPercentile:
          title: Class Percentile
          description: The person's percentile within their postsecondary school
            graduating class.
          oneOf:
            - type: number
              x-lineageReferenceObject: SORDEGR_CRED_PERCENTILE(SORDEGR)
            - type: string
              nullable: true
        classRank:
          title: Class Rank
          description: The person's rank within their postsecondary school graduating class.
          oneOf:
            - type: integer
              x-lineageReferenceObject: SORDEGR_CRED_CLASS_RANK(SORDEGR)
            - type: string
              nullable: true
        thesisTitle:
          title: Thesis Title
          description: The person's thesis (dissertation) title.
          type: string
          x-lineageReferenceObject: SORDEGR_THESIS_TITLE(SORDEGR)
      required:
        - id
        - externalEducation
        - credential
      additionalProperties: false
