openapi: 3.0.0
info:
  title: Accounting String Component Values
  description: >-
    The details of an accounting string component values.


    Please refer to the section 'API Integration Configuration Settings' in Banner Ethos API Handbook for all the configuration settings needed for this API.
  version: "15.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Finance
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/accounting-string-component-values:
    get:
      summary: Returns all resources from FTVFTYP
      description: >
        Returns all accounting accounting string component value records from
        FTVFTYP table in the system.


        Note:


        • Map Level 1 fund type codes from FTVFTYP_FTYP_CODE_PRED column in FUND.COMPONENT.TYPE configuration setting to get type.fund property for fund records.


        • Map Level 1 account type codes from FTVATYP_ATYP_CODE_PRED column in ACCOUNT.COMPONENT.TYPE configuration setting to get type.account property for account records.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ACCOUNTING_STRG_COMPVALS
      tags:
        - accounting-string-component-values
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v15+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set. The
            default limit is 500 and the maximum limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Component  

            Accounting string component used in the accounting string.

            ```

            /accounting-string-component-values?criteria={"component":{"id":"662ad735-4d8d-4689-907e-47e163234657"}}

            ```

            ### Transaction Status  

            Indicates if accounting string component value is available for transaction entry.

            ```

            /accounting-string-component-values?criteria={"transactionStatus":"available"}

            ```

            ### Account Type  

            Filter based on the type of account of the component.

            ```

            /accounting-string-component-values?criteria={"type":{"account":"expense"}}

            ```

            ### Fund Type  

            Filter based on the type of fund of account component.

            ```

            /accounting-string-component-values?criteria={"type":{"fund":"studentLoan"}}

            ```

            ### Status  

            The status of the accounting string component value (active or inactive).

            ```

            /accounting-string-component-values?criteria={"status":"active"}

            ```

            ### Grants  

            The grant(s) associated with the accounting string component value.

            ```

            /accounting-string-component-values?criteria={"grants":[{"id":"b62ad735-4d8d-4689-907e-47e163234647"}]}

            ```
        - name: effectiveOn
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Effective On  

            Filter to return all records effective on a given date.

            ```

            /accounting-string-component-values?effectiveOn={"effectiveOn":"2015-08-29"}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-accounting-string-component-values.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v15+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/accounting-string-component-values/{id}:
    get:
      summary: Returns the requested resource from FTVFTYP
      description: >
        Returns one accounting string component value record from FTVFTYP


        Note:


        • Map Level 1 fund type codes from FTVFTYP_FTYP_CODE_PRED column in FUND.COMPONENT.TYPE configuration setting to get type.fund property for fund records.


        • Map Level 1 account type codes from FTVATYP_ATYP_CODE_PRED column in ACCOUNT.COMPONENT.TYPE configuration setting to get type.account property for account records.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ACCOUNTING_STRG_COMPVALS
      tags:
        - accounting-string-component-values
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Accounting String Component Values for use
            in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v15+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v15+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v15+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-accounting-string-component-values.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-accounting-string-component-values.json:
      title: Accounting String Component Values
      description: The details of an accounting string component.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the accounting string component value.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FTVORGN_GUID(FTVORGN) or FTVLOCN_GUID(FTVLOCN) or FTVCOAS_GUID(FTVCOAS) or FTVFUND_GUID(FTVFUND) or FTVFTYP_GUID(FTVFTPY) or FTVATYP_GUID(FTVATYP) or 
            FTVACTV_GUID(FTVACTV) or FTVACCT_GUID(FTVACCT) or FTVPROJ_GUID(FTVPROJ) or FTVACCI_GUID(FTVACCI) or FTVRUCL_GUID(FTVRUCL) or FTVPROG_GUID(FTVPROG) or GXVBANK_GUID(GXVBANK)
        value:
          title: Value
          description: The value of the accounting string component.
          type: string
          minLength: 1
          x-lineageReferenceObject: FTVACCI_ACCI_CODE(FTVACCI) or FTVFTYP_FTYP_CODE(FTVFTYP) or FTVPROG_PROG_CODE(FTVPROG) or FTVRUCL_RUCL_CODE(FTVRUCL) or 
            FTVACCT_ACCT_CODE(FTVACCT) or FTVACTV_ACTV_CODE(FTVACTV) or FTVLOCN_LOCN_CODE(FTVLOCN) or GXVBANK_BANK_CODE(GXVBANK) or FTVATYP_ATYP_CODE(FTVATYP) or
            FTVCOAS_COAS_CODE(FTVCOAS) or FTVFUND_FUND_CODE(FTVFUND) or FTVORGN_ORGN_CODE(FTVORGN) or FTVPROJ_CODE(FTVPROJ)
        description:
          title: Description
          description: The description of the accounting string component value.
          type: string
          x-lineageReferenceObject: FTVCOAS_TITLE(FTVCOAS) or FTVFTYP_TITLE(FTVFTYP) or FTVLOCN_TITLE(FTVLOCN) or FTVPROG_TITLE(FTVPROG) or FTVACCI_TITLE(FTVACCI) or 
            FTVATYP_TITLE(FTVATYP) or FTVFUND_TITLE(FTVFUND) or GXVBANK_ACCT_NAME(GXVBANK) or FTVACCT_TITLE(FTVACCT) or FTVACTV_TITLE(FTVACTV) or FTVORGN_TITLE(FTVORGN) or 
            FTVPROJ_LONG_DESC(FTVPROJ) or FTVRUCL_CLASS_TITLE(FTVRUCL)
        component:
          title: Component
          description: Accounting string component used in the accounting string.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Component.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: accounting-string-components 
              x-lineageReferenceObject: FTVSDAT_GUID(FTVSDAT)
          additionalProperties: false
          required:
            - id
        subcomponents:
          title: Subcomponents
          description: The subcomponents which are part of the component.
          type: array
          items:
            title: Subcomponents
            description: The subcomponents which are part of the component.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Subcomponents.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: accounting-string-subcomponent-values 
                x-lineageReferenceObject: unsupported
            additionalProperties: false
            required:
              - id
        determiningComponent:
          title: Determining Component
          description: The accounting string component identifying a relationship with a
            prerequisite domain component.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Determining Component.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: accounting-string-component-values 
                  x-lineageReferenceObject: FTVACCT_COAS_CODE(FTVACCT) or FTVATYP_COAS_CODE(FTVATYP) or FTVPROG_COAS_CODE(FTVPROG) or 
                    FTVACCI_COAS_CODE(FTVACCI) or FTVACTV_COAS_CODE(FTVACTV) or FTVFTYP_COAS_CODE(FTVFTYP) or FTVFUND_COAS_CODE(FTVFUND) or 
                    FTVLOCN_COAS_CODE(FTVLOCN) or FTVORGN_COAS_CODE(FTVORGN) or FTVPROJ_COAS_CODE(FTVPROJ)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        relatedComponentDefaults:
          title: Related Component Defaults
          description: The default accounting string component values related to this
            component value
          type: array
          items:
            title: Related Component Defaults
            description: The default accounting string component values related to this
              component value
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Related Component Defaults.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: accounting-string-component-values 
                x-lineageReferenceObject: FTVORGN_ORGN_CODE(FTVORGN) or GXVBANK_BANK_CODE(GXVBANK) or FTVFUND_FUND_CODE(FTVFUND) or 
                  FTVPROJ_CODE(FTVPROJ) or FTVACCI_ACCI_CODE(FTVACCI)
            additionalProperties: false
            required:
              - id
        parentComponent:
          title: Parent Component
          description: The accounting string component that is one level higher in the
            component hierarchy.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Parent Component.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: accounting-string-component-values 
                  x-lineageReferenceObject: FTVACCT_ACCT_CODE_PRED(FTVACCT) or FTVLOCN_LOCN_CODE_PRED(FTVLOCN) or FTVORGN_ORGN_CODE_PRED(FTVORGN) or 
                    FTVFUND_FUND_CODE_PRED(FTVFUND) or FTVPROG_PROG_CODE_PRED(FTVPROG) or FTVFTYP_FTYP_CODE_PRED(FTVFTYP) or FTVATYP_ATYP_CODE_PRED(FTVATYP)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        transactionStatus:
          title: Transaction Status
          description: Indicates if accounting string component value is available for
            transaction entry.
          x-lineageReferenceObject: FTVORGN_DATA_ENTRY_IND(FTVORGN) or FTVACCT_DATA_ENTRY_IND(FTVACCT) or FTVPROG_DATA_ENTRY_IND(FTVPROG) or FTVFUND_DATA_ENTRY_IND(FTVFUND)
          x-lineageDerivedLogic: Display 'available' if the indicator FTVORGN_DATA_ENTRY_IND is Y or FTVACCT_DATA_ENTRY_IND is Y or 
            FTVPROG_DATA_ENTRY_IND is Y or FTVFUND_DATA_ENTRY_IND is Y, else unavailable.
          oneOf:
            - type: string
              enum:
                - available
                - unavailable
            - type: string
              maxLength: 0
        type:
          title: Type
          description: Type of the account component.
          oneOf:
            - title: Account
              description: Type of account of the component.
              type: object
              properties:
                account:
                  title: Account
                  description: Type of account of the component.
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: Display the translation value set in ACCOUNT.COMPONENT.TYPE configuration setting for FTVATYP_ATYP_CODE_PRED column value 
                    in FTVATYP where FTVATYP_ATYP_CODE= FTVACCT_ATYP_CODE and FTVATYP_COAS_CODE = FTVACCT_COAS_CODE. The account type code should be valid for the 
                    effective date as the account component value. Users need to map Level 1 account type codes from FTVATYP_ATYP_CODE_PRED column in ACCOUNT.COMPONENT.TYPE configuration setting.
                  oneOf:
                    - type: string
                      enum:
                        - asset
                        - liability
                        - fundBalance
                        - revenue
                        - expense
                        - personalExpense
                        - nonPersonalExpense
                    - type: string
                      maxLength: 0
              additionalProperties: false
            - title: Fund
              description: Type of fund of account component.
              type: object
              properties:
                fund:
                  title: Fund
                  description: Type of fund of the account component.
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: Display the translation value set in FUND.COMPONENT.TYPE configuration setting for FTVFTYP_FTYP_CODE_PRED column value 
                    in FTVFTYP where FTVFTYP_FTYP_CODE=FTVFUND_FTYP_CODE and FTVFTYP_COAS_CODE = FTVFUND_COAS_CODE. The fund type code should be valid for the 
                    effective date as the account component value. Users need to map Level 1 fund type codes from FTVFTYP_FTYP_CODE_PRED column in FUND.COMPONENT.TYPE configuration setting."
                  oneOf:
                    - type: string
                      enum:
                        - currentUnrestricted
                        - currentRestricted
                        - auxiliaryEnterprise
                        - studentLoan
                        - quasiEndowment
                        - endowment
                        - annuityAndLifeIncome
                        - agency
                        - plant
                    - type: string
                      maxLength: 0
              additionalProperties: false
            - type: object
              maxProperties: 0
        budgetPools:
          title: Budget Pools
          description: The pool accounts associated with the accounting string component
            value by fiscal year.
          type: array
          items:
            type: object
            properties:
              fiscalYear:
                title: Fiscal Year
                description: The fiscal year associated with the budget pool.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Fiscal Year.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: fiscal-years 
                    x-lineageReferenceObject: FTVFSYR_COAS_CODE(FTVFSYR)
                    x-lineageDerivedLogic: Display the fiscal year for the effective date of the account code record, if not found do not display budgetPools.
                required:
                  - id
              accountingComponent:
                title: Accounting Component
                description: The pool account associated with the accounting string component
                  value.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Accounting Component.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: accounting-string-component-values 
                    x-lineageReferenceObject: FTVACCT_ACCT_CODE_POOL(FTVACCT)
                    x-lineageDerivedLogic: Display the GUID for the account pool period that is effective on the last day of the fiscal year period defined.
                additionalProperties: false
                required:
                  - id
            additionalProperties: false
            required:
              - fiscalYear
              - accountingComponent
        effectiveStartOn:
          title: Effective Start On
          description: The first date and time that the version of the accounting string
            component value is effective.
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          x-lineageReferenceObject: FTVATYP_EFF_DATE(FTVATYP) or FTVFTYP_EFF_DATE(FTVFTYP) or FTVPROG_EFF_DATE(FTVPROG) or FTVPROJ_EFF_DATE(FTVPROJ) or FTVACTV_EFF_DATE(FTVACTV) or 
            FTVCOAS_EFF_DATE(FTVCOAS) or FTVORGN_EFF_DATE(FTVORGN) or FTVRUCL_EFF_DATE(FTVRUCL) or GXVBANK_EFF_DATE(GXVBANK) or FTVACCT_EFF_DATE(FTVACCT) or FTVFUND_EFF_DATE(FTVFUND) or FTVACCI_EFF_DATE(FTVACCI) or FTVLOCN_EFF_DATE(FTVLOCN)
        effectiveEndOn:
          title: Effective End On
          description: The last date and time that the version of the accounting string
            component value is effective.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              x-lineageReferenceObject: FTVPROJ_TERM_DATE(FTVPROJ) or derived  
              x-lineageDerivedLogic: Display the termination date FTVACCI_TERM_DATE if populated else display the next change date FTVACCI_NCHG_DATE. 
                Display the termination date FTVFUND_TERM_DATE if populated else display the next change date FTVFUND_NCHG_DATE. 
                Display the termination date FTVACCT_TERM_DATE if populated else display the next change date FTVACCT_NCHG_DATE. 
                Display the termination date FTVATYP_TERM_DATE if populated else display the next change date FTVATYP_NCHG_DATE. 
                Display the termination date FTVFTYP_TERM_DATE if populated else display the next change date FTVFTYP_NCHG_DATE. 
                Display the termination date FTVORGN_TERM_DATE if populated else display the next change date FTVORGN_NCHG_DATE. 
                Display the termination date GXVBANK_TERM_DATE if populated else display the next change date GXVBANK_NCHG_DATE. 
                Display the termination date FTVACTV_TERM_DATE if populated else display the next change date FTVACTV_NCHG_DATE. 
                Display the termination date FTVCOAS_TERM_DATE if populated else display the next change date FTVCOAS_NCHG_DATE. 
                Display the termination date FTVLOCN_TERM_DATE if populated else display the next change date FTVLOCN_NCHG_DATE. 
                Display the termination date FTVPROG_TERM_DATE if populated else display the next change date FTVPROG_NCHG_DATE. 
                Display the termination date FTVRUCL_TERM_DATE if populated else display the next change date FTVRUCL_NCHG_DATE. 
                If next change date is 31-Dec-99 do not display the end on property.
            - type: string
              maxLength: 0
        status:
          title: Status
          description: The status of the accounting string component value (active or
            inactive).
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Display 'inactive' if FTVFTYP_STATUS_IND is 'I' or FTVFTYP_TERM_DATE is not null. Display 'active' if FTVFTYP_STATUS_IND is 'A' and  FTVFTYP_TERM_DATE is null. 
            Display 'inactive' if GXVBANK_STATUS_IND is 'I' or GXVBANK_TERM_DATE is not null. Display 'active' if GXVBANK_STATUS_IND is 'A' and  GXVBANK_TERM_DATE is null. 
            Display 'inactive' if FTVACCI_STATUS_IND is 'I' or FTVACCI_TERM_DATE is not null. Display 'active' if FTVACCI_STATUS_IND is 'A' and  FTVACCI_TERM_DATE is null. 
            Display 'inactive' if FTVATYP_STATUS_IND is 'I' or FTVATYP_TERM_DATE is not null. Display 'active' if FTVATYP_STATUS_IND is 'A' and  FTVATYP_TERM_DATE is null.
            Display 'inactive' if FTVFUND_STATUS_IND is 'I' or FTVFUND_TERM_DATE is not null. Display 'active' if FTVFUND_STATUS_IND is 'A' and  FTVFUND_TERM_DATE is null. 
            Display 'inactive' if FTVACCT_STATUS_IND is 'I' or FTVACCT_TERM_DATE is not null. Display 'active' if FTVACCT_STATUS_IND is 'A' and  FTVACCT_TERM_DATE is null. 
            Display 'inactive' if FTVACTV_STATUS_IND is 'I' or FTVACTV_TERM_DATE is not null. Display 'active' if FTVACTV_STATUS_IND is 'A' and  FTVACTV_TERM_DATE is null. 
            Display 'inactive' if FTVCOAS_STATUS_IND is 'I' or FTVCOAS_TERM_DATE is not null. Display 'active' if FTVCOAS_STATUS_IND is 'A' and  FTVCOAS_TERM_DATE is null. 
            Display 'inactive' if FTVORGN_STATUS_IND is 'I' or FTVORGN_TERM_DATE is not null. Display 'active' if FTVORGN_STATUS_IND is 'A' and  FTVORGN_TERM_DATE is null. 
            Display 'inactive' if FTVRUCL_STATUS_IND is 'I' or FTVRUCL_TERM_DATE is not null. Display 'active' if FTVRUCL_STATUS_IND is 'A' and  FTVRUCL_TERM_DATE is null. 
            Display 'inactive' if FTVLOCN_STATUS_IND is 'I' or FTVLOCN_TERM_DATE is not null. Display 'active' if FTVLOCN_STATUS_IND is 'A' and  FTVLOCN_TERM_DATE is null. 
            Display 'inactive' if FTVPROG_STATUS_IND is 'I' or FTVPROG_TERM_DATE is not null. Display 'active' if FTVPROG_STATUS_IND is 'A' and  FTVPROG_TERM_DATE is null. 
            No Status indicator for PROJ.
          enum:
            - active
            - inactive
          type: string
        grants:
          title: Grants
          description: The grant(s) associated with the accounting string component value.
          type: array
          items:
            title: Grants
            description: The grant(s) associated with the accounting string component value.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Grants.
