openapi: 3.0.0
info:
  title: Fiscal Periods
  description: Accounting periods for particular duration. The API publishes
    information about fiscal periods to interested parties, and also to
    facilitate the closing of fiscal periods.  Fiscal periods are monthly
    accounting periods within the Fiscal Year.  They are a two digit code
    beginning with 01 and ending with 12/13 based on whether an institution uses
    a monthly reporting cycle or 4 week reporting cycle.  Fiscal period 14 is
    used for identifying year to date activity.
  version: "11.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Finance
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/fiscal-periods:
    get:
      summary: Returns all resources from FTVFSPD
      description: Returns all fiscal period records from FTVFSPD table in the system.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_FISCAL_PERIODS
      tags:
        - fiscal-periods
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set. The
            default limit is 500 and the maximum limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Fiscal Year  

            The fiscal year associated with the fiscal period.

            ```

            /fiscal-periods?filter={"fiscalYear:":{"id":"4ff5a7da-1db9-4f5f-9c6c-86b05374eb52"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-fiscal-periods.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/fiscal-periods/{id}:
    get:
      summary: Returns the requested resource from FTVFSPD
      description: Returns one fiscal period  record from FTVFSPD table with the
        passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_FISCAL_PERIODS
      tags:
        - fiscal-periods
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Fiscal Periods for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-fiscal-periods.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-fiscal-periods.json:
      title: Fiscal Periods
      description: Accounting periods for particular duration.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the fiscal period.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FTVFSPD_GUID(FTVFSPD)
        title:
          title: Title
          description: The full name of the fiscal period.
          type: string
          minLength: 1
          x-lineageReferenceObject: FTVFSPD_FSPD_CODE(FTVFSPD)
        fiscalYear:
          title: Fiscal Year
          description: The fiscal year associated with the fiscal period.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Fiscal Year.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: fiscal-years 
              x-lineageReferenceObject: FTVFSPD_FSYR_CODE(FTVFSPD)
          additionalProperties: false
          required:
            - id
        startOn:
          title: Start On
          description: The start date of the fiscal period.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FTVFSPD_PRD_START_DATE(FTVFSPD)
        endOn:
          title: End On
          description: The end date of the fiscal period.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FTVFSPD_PRD_END_DATE(FTVFSPD)
        status:
          title: Status
          description: The status of the fiscal period.
          oneOf:
            - type: string
              enum:
                - defined
                - open
                - closed
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display 'defined' if status FTVFSPD_PRD_STATUS_IND = N. Display 'open' if status FTVFSPD_PRD_STATUS_IND = O. Display 'closed' If status FTVFSPD_PRD_STATUS_IND = C."
            - type: string
              maxLength: 0
      required:
        - id
        - title
        - fiscalYear
        - startOn
        - endOn
      additionalProperties: false
