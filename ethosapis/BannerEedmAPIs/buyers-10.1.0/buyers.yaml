                  type: string
              additionalProperties: false
              required:
                - value
                - currency
            - type: object
              maxProperties: 0
        status:
          title: Status
          description: An indication of the buyer's status.
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: If SYSDATE falls between start and end dates, display status as 'active', else display status as 'inactive'.
          oneOf:
            - type: string
              enum:
                - active
                - inactive
            - type: string
              maxLength: 0
      required:
        - id
        - buyer
      additionalProperties: false
