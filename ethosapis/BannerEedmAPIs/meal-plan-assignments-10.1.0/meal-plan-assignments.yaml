info:
  title: Meal Plan Assignments
  description: >-
    **API Deprecation Notice**



    Deprecated on: 30-Sep-2019



    Sunset on: 01-Oct-2021



    Description: V16.0.0 updates the assignedRates object to an array to accommodate multiple rates per meal plan assignment.



    ----


    Assignments of meal plans to a person.
