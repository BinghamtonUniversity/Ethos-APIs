        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Person  
            The person to whom a meal plan is assigned.
            ```
            /meal-plan-assignments?criteria={"person": {"id": $id}}
            ```
            ### Meal Plan  
            The meal plan assigned to the person.
            ```
            /meal-plan-assignments?criteria={"mealPlan": {"id": $id}}
            ```
            ### Academic Period  
            The academic period for the meal plan assignment.
            ```
            /meal-plan-assignments?criteria={"academicPeriod": {"id": $id}}
            ```
            ### Start On  
            The start date when the meal plan assignments become effective.
            ```
            /meal-plan-assignments?criteria={"startOn": $startOn}
            ```
            ### Status  
            The status of the meal plan assignment.
            ```
            /meal-plan-assignments?criteria={"status": $status}
            ```
            ### End On  
            The end date of the meal plan assignment.
            ```
            /meal-plan-assignments?criteria={"endOn": $endOn}
            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-meal-plan-assignments.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10.1.0+json
