                        - XPF
                        - YER
                        - ZAR
                        - ZMW
                        - ZWL
                      type: string
                  additionalProperties: false
                  required:
                    - value
                    - currency
                ratePeriod:
                  title: Rate Period
                  description: The period for which the rate is set.
                  enum:
                    - day
                    - week
                    - term
                    - meal
                    - month
                    - year
                  type: string
                overrideReason:
                  title: Override Reason
                  description: The reason for the rate override.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Override Reason.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: billing-override-reasons
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
                accountingCode:
                  title: Accounting Code
                  description: The accounting code associated with the override rate.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Accounting Code.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: accounting-codes
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
              additionalProperties: false
              required:
                - rate
                - ratePeriod
            - type: object
              maxProperties: 0
        numberOfPeriods:
          title: Number Of Periods
          description: The number of time periods in the meal plan assignment.
          oneOf:
            - type: number
              minimum: 0
              format: positiveInteger
            - type: string
              nullable: true
        mealCard:
          title: Meal Card
          description: The meal card associated with the meal plan assignment.
          type: string
        consumption:
          title: Consumption
          description: The number or percentage of units consumed by the person on the plan.
          oneOf:
            - title: units
              description: The number of units consumed on the plan.
              type: object
