openapi: 3.0.0
info:
  title: Employment Classifications
  description: A list of standard employment classifications that may be specified
    for an organization.
  version: "7.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employment-classifications:
    get:
      summary: Return all resources from PTRECLS and NTRPCLS
      description: Returns a paged listing of all the employment classification
        records from PTRECLS and NTRPCLS tables.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMPLOYMENT_CLASSIFICATIONS
      tags:
        - employment-classifications
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Type  
            Not Supported
            ```
            /employment-classifications?type=employee
            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-employment-classifications.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/employment-classifications/{id}:
    get:
      summary: Return the requested resource from PTRECLS or NTRPCLS
      description: Return the single employment classification record with the passed
        in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMPLOYMENT_CLASSIFICATIONS
      tags:
        - employment-classifications
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Employment Classifications for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v7+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-employment-classifications.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-employment-classifications.json:
      title: Employment Classifications
      description: A list of standard employment classifications that may be specified
        for an organization.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the Employment Classification
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: NTRPCLS_GUID(NTRPCLS) or PTRECLS_GUID(PTRECLS)
        title:
          title: Title
          description: The full name of the Employment Classification
          type: string
          minLength: 1
          x-lineageReferenceObject: NTRPCLS_DESC(NTRPCLS) or PTRECLS_LONG_DESC(PTRECLS)
        description:
          title: Description
          description: The description of the Employment Classification
          type: string
          x-lineageReferenceObject: unsupported
        type:
          title: Type
          description: The type of Employment Classification (e.g. employee or position)
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: For records from PTRECLS,display type as 'employee'. For records from NTRPCLS, display types as 'position'.
          enum:
            - employee
            - position
          type: string
        code:
          title: Code
          description: The code that designates the employment classification.
          type: string
          x-lineageReferenceObject: NTRPCLS_CODE(NTRPCLS) or PTRECLS_CODE(PTRECLS)
      required:
        - id
        - title
        - type
      additionalProperties: false
