openapi: 3.0.0
info:
  title: Employee Leave Transactions
  description: Information on recorded transactions for leaves taken by employees.
    The transactions that take place to reveal the amount of leave remaining.
  version: "11.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/employee-leave-transactions:
    get:
      summary: Returns all resources from PHRACCR
      description: Returns all employee's leave transaction records from PHRACCR table
        in the system.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMPLOYEE_LEAVE_TRANSACTION
      tags:
        - employee-leave-transactions
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set. The
            default limit is 500 and the maximum limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-employee-leave-transactions.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/employee-leave-transactions/{id}:
    get:
      summary: Return the requested resource from PHRACCR
      description: Returns an employee's leave transaction record from PHRACCR table
        with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_EMPLOYEE_LEAVE_TRANSACTION
      tags:
        - employee-leave-transactions
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Employee Leave Transactions for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-employee-leave-transactions.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-employee-leave-transactions.json:
      title: Employee Leave Transactions
      description: Information on recorded transactions for leaves taken by employees.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the employee leave transaction.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: PHRACCR_GUID(PHRACCR)
        employeeLeave:
          title: Employee Leave
          description: The leave plan for which the transaction occurred.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Employee Leave.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: employee-leave-plans 
              x-lineageReferenceObject: PHRACCR_LEAVE_CODE(PHRACCR)
          additionalProperties: false
          required:
            - id
        transactionDate:
          title: Transaction Date
          description: The date of the transaction.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: PHRACCR_ACTIVITY_DATE(PHRACCR)
        accrued:
          title: Accrued
          description: The number of hours accrued for leave.
          x-lineageReferenceObject: PHRACCR_CURR_ACCR(PHRACCR)
          oneOf:
            - type: number
            - type: string
              nullable: true
        taken:
          title: Taken
          description: The number of hours taken for leave.
          x-lineageReferenceObject: PHRACCR_CURR_TAKEN(PHRACCR)
          oneOf:
            - type: number
            - type: string
              nullable: true
        available:
          title: Available
          description: The number of hours available for leave.
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Difference between PHACCR_CURR_ACCRUED and PHACCR_CURR_TAKEN is displayed
          oneOf:
            - type: number
            - type: string
              nullable: true
      required:
        - id
        - employeeLeave
        - transactionDate
      additionalProperties: false
