openapi: 3.0.0
info:
  title: Contribution Payroll Deductions
  description: >
    The details of payroll deductions related to contributions of all employees
    (includes retirees).


    Please refer to the section "API Integration Configuration Settings" in Banner Ethos API Handbook for all the configuration settings needed for this API.
  version: 8.1.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Human Resources
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/contribution-payroll-deductions:
    get:
      summary: Returns resources from PHRDEDN
      description: >
        Returns all the deduction records from PHRDEDN for the deduction
        codes(PTRBDCA_CODE) mapped in PDA.COMMITMENT.PLEDGE,
        PDA.COMMITMENT.RECURRDONATION and PDA.COMMITMENT.MEMBERDUES
        configuration settings.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_CONTRI_PAYROLL_DEDUCTION
      tags:
        - contribution-payroll-deductions
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v8+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Arrangement  

            Returns all contribution payroll deductions for the given arrangement

            ```

            /contribution-payroll-deductions?criteria={"arrangement":"eedbdd4b-1b92-4aed-b966-34fcebd95f0c"}

            ```

            ```

            /contribution-payroll-deductions?criteria={"arrangement":{"id":"eedbdd4b-1b92-4aed-b966-34fcebd95f0c}}

            ```


            ### Deducted on  

            Supported operators are $gte or the default of equals if operator is not specified.


            Returns all contribution payroll deductions for the given deductedOn date

            ```

            /contribution-payroll-deductions?criteria={"deductedOn":"1995-02-06"}

            ```


            Returns all contribution payroll deductions with deductedOn date greater than or equals to the deductedOn date passed.

            ```

            /contribution-payroll-deductions?criteria={"deductedOn":{"$gte":"1995-01-01"}}

            ```

            ```

            /contribution-payroll-deductions?criteria={"deductedOn":{"$eq":"1995-01-01"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-contribution-payroll-deductions.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v8.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/contribution-payroll-deductions/{id}:
    get:
      summary: Return the requested resource from PHRDEDN
      description: |
        Returns a record from PHRDEDN with the passed in identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_CONTRI_PAYROLL_DEDUCTION
      tags:
        - contribution-payroll-deductions
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v8+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v8.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v8.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-contribution-payroll-deductions.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-contribution-payroll-deductions.json:
      title: Contribution Payroll Deductions
      description: The details of payroll deductions related to contributions.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the contribution payroll-deduction.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: PHRDEDN_GUID(PHRDEDN)
        arrangement:
          title: Arrangement
          description: The arrangement details related to the payroll deduction.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Arrangement.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: payroll-deduction-arrangements 
              x-lineageReferenceObject: PDRBDED_GUID(PDRBDED)
              x-lineageDerivedLogic: A record in PDRBDED where PDRBDED_PIDM= PHRDEDN_PIDM and  PDRBDED_BDCA_CODE =PHRDEDN_BDCA_CODE.
          additionalProperties: false
          required:
            - id
        deductedOn:
          title: Deducted On
          description: The date the payroll deduction was made.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: PHRHIST_EVENT_DATE(PHRHIST)
          x-lineageDerivedLogic: The PHRHIST_EVENT_DATE value in PHRHIST where PHRHIST_PIDM=PHRDEDN_PIDM AND
            PHRHIST_YEAR=PHRDEDN_YEAR AND PHRHIST_PICT_CODE=PHRDEDN_PICT_CODE AND PHRHIST_PAYNO=PHRDEDN_PAYNO AND 
            PHRHIST_SEQ_NO=PHRDEDN_SEQ_NO AND PHRHIST_DISP >= '60'.

        amount:
          title: Amount
          description: The amount that was deducted from the payroll.
          format: currency
          type: object
          properties:
            value:
              title: Value
              description: The monetary value
              type: number
              x-lineageReferenceObject: PHRDEDN_EMPLOYEE_AMT(PHRDEDN)
            currency:
