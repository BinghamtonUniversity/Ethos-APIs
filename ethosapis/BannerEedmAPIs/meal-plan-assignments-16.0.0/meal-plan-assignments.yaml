openapi: 3.0.0
info:
  title: Meal Plan Assignments
  description: >
    The meal plan assignment entity records an applicant's meal assignments for
    a specified range of terms. The API supports meal plan code with multiple
    values for a term. Each meal-plan-rate may have a daily, monthly, or term
    type and have different charges accordingly.


    Please refer to the section "API Integration Configuration Settings" in Banner Ethos API Handbook for all the configuration settings needed for this API.
  version: 16.0.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Foundation
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: meal-plan-assignments
paths:
  /api/meal-plan-assignments:
    get:
      summary: Returns resources from SLRMASG
      description: |
        Returns all the records from SLRMASG.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_MEAL_PLAN_ASSIGNMENTS
      tags:
        - meal-plan-assignments
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v16+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Person  

            The person to whom a meal plan is assigned.

            ```

            /meal-plan-assignments?criteria={"person":{"id":"d884b6e3-8547-4067-bacc-fde82e3db5b5"}}

            ```

            ### Meal Plan  

            The meal plan assigned to the person.

            ```

            /meal-plan-assignments?criteria={"mealPlan":{"id":"d5fa4384-f39a-4afd-872c-269dc1f775d6"}}

            ```

            ### Academic Period  

            The academic period for the meal plan assignment.

            ```

            /meal-plan-assignments?criteria={"academicPeriod":{"id":"060d0dd1-75aa-4c43-989c-0015b6f01d6e"}}

            ```

            ### Start On  

            The start date when the meal plan assignments become effective.

            ```

            /meal-plan-assignments?criteria={"startOn":"2014-01-12T00:00:00+00:00"}

            ```

            ### Status  

            The status of the meal plan assignment.

            ```

            /meal-plan-assignments?criteria={"status":"cancelled"}

            ```

            ### End On  

            The end date of the meal plan assignment.

            ```

            /meal-plan-assignments?criteria={"endOn":"2014-04-11T15:37:18+00:00"}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-meal-plan-assignments.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v16.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in SLRMASG
      description: >
        POST requests must include a nil GUID value
        ("00000000-0000-0000-0000-000000000000") for the root id property.


        A meal plan assignment will be created with a POST request in SLRMASG.


        Note:


        • When academicPeriod is not sent in the request, depending on the 'MIN' and 'MAX' values defined in the DERIVE.TERM_RULE integration configuration setting, the API uses either the DERIVE_MIN_TERM or DERIVE_MAX_TERM delivered in GORRSQL to derive the effective term of the meal plan request application. Please refer to 'Housing and meal plan APIs' section in Banner Ethos API handbook for more details.

        • An active meal plan request must exist for the person and term for a create request to be processed.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_MEAL_PLAN_ASSIGNMENTS
      tags:
        - meal-plan-assignments
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v16+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v16+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v16.0.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v16.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-meal-plan-assignments.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v16+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-meal-plan-assignments.json"
  /api/meal-plan-assignments/{id}:
