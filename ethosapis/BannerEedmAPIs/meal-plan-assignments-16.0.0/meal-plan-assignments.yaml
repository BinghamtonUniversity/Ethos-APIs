components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-meal-plan-assignments.json:
      title: Meal Plan Assignments
      description: Assignments of meal plans to a person.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the meal plan assignment.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SLRMASG_GUID(SLRMASG)
        person:
          title: Person
          description: The person to whom a meal plan is assigned.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Person.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
              x-lineageDerivedLogic: A record in  GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY = SLRMASG_PIDM.
          additionalProperties: false
          required:
            - id
        mealPlan:
          title: Meal Plan
          description: The meal plan assigned to the person.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Meal Plan.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: meal-plans 
              x-lineageReferenceObject: SLRMASG_MRCD_CODE(SLRMASG)
          additionalProperties: false
          required:
            - id
        academicPeriod:
          title: Academic Period
          description: The academic period for the meal plan assignment.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Academic Period.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-periods 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = term) 
                  x-lineageDerivedLogic: A record in GORGUID where GORGUID_LDM_NAME = 'term' and GORGUID_DOMAIN_KEY = SLRMASG_TERM_CODE
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        startOn:
          title: Start On
          description: The start date when the meal plan assignments become effective.
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          x-lineageReferenceObject: SLRMASG_BEGIN_DATE(SLRMASG)
        endOn:
          title: End On
          description: The end date of the meal plan assignment.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              x-lineageReferenceObject: SLRMASG_END_DATE(SLRMASG)
            - type: string
              maxLength: 0
        status:
          title: Status
          description: The status of the meal plan assignment.
          enum:
            - assigned
            - cancelled
            - terminated
            - prorated
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: The GORICCR_TRANSLATION_VALUE for setting MEALS.ACTIVE.APPLICATN.STATUS where GORICCR_VALUE = SLRMASG_MSCD_CODE in GORICCR table.
        statusDate:
          title: Status Date
          description: The date when the meal plan assignment status was set or modified.
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          x-lineageReferenceObject: SLRMASG_MSCD_DATE(SLRMASG)
        assignedRates:
          title: Assigned Rates
          description: The effective regular rate(s) for the meal plan assignment.
          type: array
          items:
            title: Assigned Rates
            description: The effective regular rate(s) for the meal plan assignment.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Assigned Rates.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: meal-plan-rates 
                x-lineageReferenceObject: SLRLMFE_GUID(SLRLMFE)
            additionalProperties: false
            required:
              - id
        rateOverride:
          title: Rate Override
          description: The override rate for the meal plan assignment.
          oneOf:
            - type: object
              properties:
                rate:
                  title: Rate
                  description: The override rate for the meal plan assignment.
                  format: currency
                  type: object
                  properties:
                    value:
                      title: Value
                      description: The monetary value
                      type: number
                      x-lineageReferenceObject: unsupported
                    currency:
                      title: Currency
                      description: The ISO 4217 currency code
                      enum:
                        - AED
                        - AFN
                        - ALL
                        - AMD
                        - ANG
