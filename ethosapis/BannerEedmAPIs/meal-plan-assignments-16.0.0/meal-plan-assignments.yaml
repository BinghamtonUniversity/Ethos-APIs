                      type: string
                      x-lineageReferenceObject: unsupported
                  additionalProperties: false
                  required:
                    - value
                    - currency
                ratePeriod:
                  title: Rate Period
                  description: The period for which the rate is set.
                  enum:
                    - day
                    - week
                    - term
                    - meal
                    - month
                    - year
                  type: string
                  x-lineageReferenceObject: unsupported
                overrideReason:
                  title: Override Reason
                  description: The reason for the rate override.
                  oneOf:
                    - type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Override Reason.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: billing-override-reasons 
                          x-lineageReferenceObject: unsupported
                      additionalProperties: false
                      required:
                        - id
                    - type: object
                      maxProperties: 0
