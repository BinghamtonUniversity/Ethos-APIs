        numberOfPeriods:
          title: Number Of Periods
          description: The number of time periods in the meal plan assignment.
          oneOf:
            - type: number
              minimum: 0
              format: positiveInteger
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: if SLRLMFE_M_D_T = 'M' then display the value of SLRMASG_TOTAL_MONTHS and if SLRLMFE_M_D_T = 'D' then display the value of SLRMASG_TOTAL_DAYS and if SLRLMFE_M_D_T = 'T' then display the value of SLRMASG_TOTAL_TERMS
            - type: string
              nullable: true
        mealCard:
          title: Meal Card
          description: The meal card associated with the meal plan assignment.
          type: string
          x-lineageReferenceObject: SLRMASGS_MEAL_CARD(SLRMASGS)
        consumption:
          title: Consumption
          description: The number or percentage of units consumed by the person on the plan.
          oneOf:
            - title: units
              description: The number of units consumed on the plan.
              type: object
              properties:
                units:
                  title: Units
                  description: The number of units consumed on the plan.
                  minimum: 0
                  type: number
                  format: positiveNumber
                  x-lineageReferenceObject: SLRMASGS_CONSUMPTION_UNITS(SLRMASGS)
              additionalProperties: false
              required:
                - units
            - title: percent
              description: The percent of units consumed on the meal plan.
              type: object
              properties:
                percent:
                  title: Percent
                  description: The percent of units consumed on the meal plan.
                  type: number
