components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-section-registrations.json:
      title: Section Registrations
      description: A record of a student's interaction with a specific section such as
        registration, grades, and involvement.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: A global identifier of a course.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          minLength: 1
        registrant:
          title: Registrant
          description: A person registered for a section.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Registrant.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons
          additionalProperties: false
          required:
            - id
        section:
          title: Section
          description: An instance of a course for which a person is registering.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Section.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: sections
          additionalProperties: false
          required:
            - id
        academicLevel:
          title: Academic Level
          description: The academic level at which the student is registering for the
            course (The level specified should match one of the levels allowed
            for the section).
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Academic Level.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: academic-levels
          additionalProperties: false
          required:
            - id
        status:
          title: Status
          description: ""
          oneOf:
            - title: Not registered
              description: A person is not registered in the section.
              oneOf:
                - type: object
                  properties:
                    registrationStatus:
                      title: Registration Status
                      description: The status of this person's registration in the section
                      enum:
                        - notRegistered
                      type: string
                      minLength: 1
                    sectionRegistrationStatusReason:
                      title: Reason
                      description: Status reason for non-registration
                      enum:
                        - pending
                        - dropped
                        - withdrawn
                        - canceled
                      type: string
                      minLength: 1
                    detail:
                      title: Detail
                      description: ""
                      oneOf:
                        - type: object
                          properties:
                            id:
                              title: ID
                              description: The global identifier for the Detail.
                              type: string
                              format: guid
                              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                              x-lineageLookupReferenceObject: section-registration-statuses
                          additionalProperties: false
                          required:
                            - id
                        - type: object
                          maxProperties: 0
                  additionalProperties: false
                  required:
                    - registrationStatus
                    - sectionRegistrationStatusReason
                - type: object
                  maxProperties: 0
            - title: Registered
              description: A person is registered in the section.
              oneOf:
                - type: object
                  properties:
                    registrationStatus:
                      title: Registration Status
                      description: The status of this person's registration in the section.
                      enum:
                        - registered
                      type: string
                      minLength: 1
                    sectionRegistrationStatusReason:
                      title: Registered
                      description: A person was registered.
                      enum:
                        - registered
                      type: string
                      minLength: 1
                    detail:
                      title: Detail
                      description: ""
                      oneOf:
                        - type: object
                          properties:
                            id:
                              title: ID
                              description: The global identifier for the Detail.
                              type: string
                              format: guid
                              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                              x-lineageLookupReferenceObject: section-registration-statuses
                          additionalProperties: false
                          required:
                            - id
                        - type: object
                          maxProperties: 0
                  additionalProperties: false
                  required:
                    - registrationStatus
                    - sectionRegistrationStatusReason
                - type: object
                  maxProperties: 0
        approvals:
          title: Approval
          description: The method of approval.
          type: array
          items:
            type: object
            properties:
              approvalType:
                title: Type
                description: The type of approval granted.
                enum:
                  - all
                type: string
                minLength: 1
              approvalEntity:
                title: Entity
                description: The entity granting approval.
                enum:
                  - user
                  - system
                type: string
                minLength: 1
            additionalProperties: false
            required:
              - approvalType
              - approvalEntity
        repeatedSection:
          title: Repeated Section
          description: Specifies if the section has been repeated and if the credit and/or
            quality points should be included in calculations.
          enum:
            - notRepeated
            - repeatedIncludeCredit
            - repeatedIncludeQualityPoints
            - repeatedIncludeBoth
            - repeatedIncludeNeither
          type: string
        awardGradeScheme:
          title: Award Grade Scheme
          description: The grading scheme that will be used to award the student a grade
            for the section.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Award Grade Scheme.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: grade-schemes
          additionalProperties: false
          required:
            - id
        credit:
          title: Credit
          description: Unit specification that can be awarded for completing a section
          oneOf:
            - type: object
              properties:
                creditCategory:
                  title: Credit Category
                  description: The category of credit associated with the registration
                  type: object
                  properties:
                    creditType:
                      title: Credit Type
                      description: The higher-level category of academic credits
                      enum:
                        - ce
                        - institution
                        - transfer
                        - exchange
                        - exam
                        - workLifeExperience
                        - other
                        - noCredit
                      type: string
                    detail:
                      title: Detail
                      description: ""
                      oneOf:
                        - type: object
                          properties:
                            id:
                              title: ID
                              description: The global identifier for the Detail.
                              type: string
                              format: guid
                              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                              x-lineageLookupReferenceObject: credit-categories
                          additionalProperties: false
                          required:
                            - id
                        - type: object
                          maxProperties: 0
                  additionalProperties: false
                  required:
                    - creditType
                measure:
                  title: Measure
                  description: A unit or standard of measurement
                  oneOf:
                    - type: string
                      enum:
                        - credit
                        - ceu
                        - hour
                    - type: string
                      maxLength: 0
                attemptedCredit:
                  title: Attempted Credit
                  description: The academic credit for the section assessed at the registration
                  oneOf:
                    - type: number
                    - type: string
                      nullable: true
                earnedCredit:
                  title: Earned Credit
                  description: The credit the student actually earned by completing the section
                  oneOf:
                    - type: number
                    - type: string
                      nullable: true
              additionalProperties: false
              required:
                - creditCategory
            - type: object
              maxProperties: 0
        qualityPoints:
          title: Quality Points
          description: A value, based on the grade awarded, that represents the student's
            performance in the section that may be used to determine a student's
            overall performance.
          oneOf:
            - type: number
            - type: string
              nullable: true
        transcript:
          title: Transcript
          description: Details on how the student elected to have their transcript grades
            recorded.
          oneOf:
            - type: object
              properties:
                gradeScheme:
                  title: Transcript Grade Scheme
                  description: The grading scheme that will be used to record the student's grade
                    for the section on a transcript.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Transcript Grade Scheme.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: grade-schemes
                  additionalProperties: false
                  required:
                    - id
                mode:
                  title: Transcript Mode
                  description: The manner in which a student's transcript grade will be reported.
                  enum:
                    - standard
                    - passFail
                    - audit
                    - withdraw
                    - incomplete
                  type: string
                  minLength: 1
              additionalProperties: false
              required:
                - gradeScheme
                - mode
            - type: object
              maxProperties: 0
        grades:
          title: Grades
          description: Grades that have been assigned to this section registration.
          type: array
          items:
            type: object
            properties:
              type:
                title: Type
                description: The type of section grade.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Type.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: section-grade-types
                additionalProperties: false
                required:
                  - id
              grade:
                title: Grade
                description: The grade awarded to the student by the instructor.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Grade.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: grade-definitions
                additionalProperties: false
                required:
                  - id
              submission:
                title: Submission
                description: Properties related to the submission of the section grade.
                type: object
                properties:
                  submittedBy:
                    title: Submitted By
                    description: The person who submitted the section grade.
                    oneOf:
                      - type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Submitted By.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: persons
                        additionalProperties: false
                        required:
                          - id
                      - type: object
                        maxProperties: 0
                  submittedOn:
                    title: Submitted On
                    description: The date the section grade was submitted.
                    oneOf:
                      - type: string
                        format: date-time
                        pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                      - type: string
                        maxLength: 0
                  method:
                    title: Method
                    description: The method by which the section grade was submitted.
                    oneOf:
                      - type: string
                        enum:
                          - auto
                          - manual
                      - type: string
                        maxLength: 0
                  reason:
                    title: Reason
                    description: The reason for the section grade submission.
                    oneOf:
                      - type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Reason.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: grade-change-reasons
                        additionalProperties: false
                        required:
                          - id
                      - type: object
                        maxProperties: 0
                additionalProperties: false
            additionalProperties: false
            required:
              - type
              - grade
        process:
          title: Process
          description: Properties associated with the processing of section grades.
          type: object
          properties:
            gradeExtension:
              title: Grade Extension
              description: Default grade and expiration date for incomplete grades.
              oneOf:
                - type: object
                  properties:
                    expiresOn:
                      title: Expires On
                      description: The date the incomplete grade expires and is replaced with the
                        default grade.
                      type: string
                      format: date-time
                      pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                      minLength: 1
                    defaultGrade:
                      title: Default Grade
                      description: The grade to which an incomplete will revert if not updated by the
                        expiration date.
                      oneOf:
                        - type: object
                          properties:
                            id:
                              title: ID
                              description: The global identifier for the Default Grade.
                              type: string
                              format: guid
                              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                              x-lineageLookupReferenceObject: grade-definitions
                          additionalProperties: false
                          required:
                            - id
                        - type: object
                          maxProperties: 0
                  additionalProperties: false
                  required:
                    - expiresOn
                - type: object
                  maxProperties: 0
            transcript:
              title: Transcript
              description: Properties dealing with the transcript processing of the grade.
              oneOf:
                - type: object
                  properties:
                    verifiedOn:
                      title: Verified On
                      description: The date the grade was verified and rolled into a student's
                        transcript.
                      type: string
                      format: date-time
                      pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                      minLength: 1
                    verifiedBy:
                      title: Verified By
                      description: The person who verified the grade and rolled it into the student's
                        transcript.
                      oneOf:
                        - type: object
                          properties:
                            id:
                              title: ID
                              description: The global identifier for the Verified By.
                              type: string
                              format: guid
                              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                              x-lineageLookupReferenceObject: persons
                          additionalProperties: false
                          required:
                            - id
                        - type: object
                          maxProperties: 0
                  additionalProperties: false
                  required:
                    - verifiedOn
                - type: object
                  maxProperties: 0
          additionalProperties: false
        involvement:
          title: Involvement
          description: The range of dates between which a student was involved with a
            section.
          type: object
          properties:
            startOn:
              title: Start On
              description: The date when the section was first attended or accessed online.
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            endOn:
              title: End On
              description: The date when the section was last attended or accessed online.
              oneOf:
