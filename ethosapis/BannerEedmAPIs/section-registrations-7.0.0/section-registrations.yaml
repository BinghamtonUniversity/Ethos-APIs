  title: Section Registrations
  description: >-
    **API Deprecation Notice**



    Deprecated on: 30-Mar-2019



    Sunset on: 01-Apr-2021



    Description: v16.0.0 removes grade-related information. This information is now available in student-grade-point-averages, student-transcript-grades and student-unverified-grades and can be updated using student-transcript-grades-adjustments and student-unverified-grades-submissions.



    ----


    A record of a student&#x27;s interaction with a specific section such as registration, grades, and involvement.
