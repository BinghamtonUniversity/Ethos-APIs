openapi: 3.0.0
info:
  title: Geographic Area Types
  description: Custom types of geographic areas.
  version: "6.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/geographic-area-types:
    get:
      summary: Return all resources from STVGEOR
      description: Returns a paged listing of all the geographic area type records
        from STVGEOR table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_GEOGRAPHIC_AREA_TYPES
      tags:
        - geographic-area-types
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-geographic-area-types.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/geographic-area-types/{id}:
    get:
      summary: Return the requested resource from STVGEOR
      description: Returns the single geographic area type record with the requested
        identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_GEOGRAPHIC_AREA_TYPES
      tags:
        - geographic-area-types
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Geographic Area Types for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v6+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-geographic-area-types.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-geographic-area-types.json:
      title: Geographic Area Types
      description: Custom types of geographic areas.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of a geographic area type.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= geographic-divisions) 
          x-lineageDerivedLogic: Display records from STVGEOD and STVGEOR where GUIDs are displayed from GORGUID where GORGUID_LDM_NAME is 'geographic-divisions' and GORGUID_DOMAIN_KEY matches STVGEOD_CODE or STVGEOR_CODE
        title:
          title: Title
          description: The full name of a geographic area type.
          type: string
          minLength: 1
          x-lineageReferenceObject: STVGEOD_DESC(STVGEOD) or STVGEOR_DESC(STVGEOR)
        description:
          title: Description
          description: The description of a geographic area type.
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: For records displayed from STVGEOR, Always display as 'Geographic Region'.  For records displayed from STVGEOD, always display as 'Geographic Division'
        code:
          title: Code
          description: The code of the geographic area type
          type: string
          x-lineageReferenceObject: STVGEOD_CODE(STVGEOD) or  STVGEOR_CODE(STVGEOR)
        category:
          title: Category
          description: A category of geographic area types.
          enum:
            - governmental
            - postal
            - fundraising
            - recruitment
            - institutional
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Always display as 'institutional'
      required:
        - id
        - title
        - category
      additionalProperties: false

