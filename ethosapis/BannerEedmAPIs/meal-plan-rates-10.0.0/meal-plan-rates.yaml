                - GTQ
                - GYD
                - HKD
                - HNL
                - HRK
                - HTG
                - HUF
                - IDR
                - ILS
                - INR
                - IQD
                - IRR
                - ISK
                - JMD
                - JOD
                - JPY
                - KES
                - KGS
                - KHR
                - KMF
                - KPW
                - KRW
                - KWD
                - KYD
                - KZT
                - LAK
                - LBP
                - LKR
                - LRD
                - LSL
                - LYD
                - MAD
                - MDL
                - MGA
                - MKD
                - MMK
                - MNT
                - MOP
                - MRO
                - MUR
                - MVR
                - MWK
                - MXN
                - MYR
                - MZN
                - NAD
                - NGN
                - NIO
                - NOK
                - NPR
                - NZD
                - OMR
                - PAB
                - PEN
                - PGK
                - PHP
                - PKR
                - PLN
                - PYG
                - QAR
                - RON
                - RSD
                - RUB
                - RWF
                - SAR
                - SBD
                - SCR
                - SDG
                - SEK
                - SGD
                - SHP
                - SLL
                - SOS
                - SRD
                - SSP
                - STD
                - SVC
                - SYP
                - SZL
                - THB
                - TJS
                - TMT
                - TND
                - TOP
                - TRY
                - TTD
                - TWD
                - TZS
                - UAH
                - UGX
                - USD
                - UYU
                - UZS
                - VEF
                - VND
                - VUV
                - WST
                - XAF
                - XCD
                - XOF
                - XPF
                - YER
                - ZAR
                - ZMW
                - ZWL
              type: string
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display the currency ISO code mapped in the API configuration setting 'ISO.BASE.CURRENCY.CODE'
          additionalProperties: false
          required:
            - value
            - currency
        ratePeriod:
          title: Rate Period
          description: The time period for the rate.
          enum:
            - day
            - week
            - term
            - meal
            - month
            - year
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: If SLRLMFE_M_D_T = 'D' then display as 'day' else if SLRLMFE_M_D_T = 'M' then display as 'month' else if SLRLMFE_M_D_T = 'T' then display as 'term'
        academicPeriod:
          title: Academic Period
          description: A term within an academic year for which the rate is defined.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Academic Period.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-periods 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = term) 
                  x-lineageDerivedLogic: Display the academicPeriod GUID from GORGUID where GORGUID_LDM_NAME is 'term' and GORGUID_DOMAIN_KEY matches SLRLMFE_TERM_CODE
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        startOn:
          title: Start On
          description: The start date for the rate.
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
          x-lineageReferenceObject: STVTERM_START_DATE(STVTERM)
        endOn:
          title: End On
          description: The end date for the rate.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              x-lineageReferenceObject: STVTERM_END_DATE(STVTERM)
            - type: string
              maxLength: 0
        accountingCode:
          title: Accounting Code
          description: The accounting code associated with the rate.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Accounting Code.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: accounting-codes 
                  x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = accounting-codes) 
                  x-lineageDerivedLogic: Display the accountingCode GUID from GORGUID where GORGUID_LDM_NAME is 'accounting-codes' and GORGUID_DOMAIN_KEY matches SLRLMFE_DETAIL_CODE
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
      required:
        - id
        - title
        - mealPlan
        - rate
        - ratePeriod
        - startOn
      additionalProperties: false
