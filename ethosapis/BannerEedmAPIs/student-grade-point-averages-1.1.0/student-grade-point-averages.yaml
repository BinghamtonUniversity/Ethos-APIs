openapi: 3.0.0
info:
  title: Student Grade Point Averages
  description: >
    The information about grade point averages for a student. The key
    quantitative measurements about a student's academic progress such as grade
    point averages, credits earned, quality points, etc.
           
    Please refer to the section 'API Integration Configuration Settings' in Banner Ethos API Handbook for all the configuration settings needed for this API.


    Please refer to the 'SHRDGPA' process details in 'Banner Job Processes' section of Banner Ethos API Handbook to get the degree GPA processing details.
  version: 1.1.0
  x-source-name: SHRDGPA, SHRTGPA, SHRLGPA, SHRDGMRS
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-audience: all 
  x-source-domain: student   
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-grade-point-averages:
    get:
      summary: Returns resources from SHRTGPA,SHRLGPA,SHRDGMRS
      description: >
        Retrieves the list of all student grade point average records from
        SHRTGPA(Term GPA), SHRLGPA(Academic level GPA) and SHRDGMRS(Degree GPA).


        Note: Earned degree GPA will be displayed only if the API configuration setting DISPLAY.EARNEDDEGREEGPA is configured to 'Y' and the SHRDGPA job submission process is run.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUD_GRADE_POINT_AVERAGES
      tags:
        - student-grade-point-averages
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### student  

            The student associated with the grade point averages.

            ```

            /student-grade-point-averages?criteria={"student": {"id": "0d180d5b-d945-40f8-a9cd-c8ddc38206bd"}}

            ```

            ### Academic Period  

            Filter to return all students with a GPA for an academicPeriod.

            ```

            /student-grade-point-averages?criteria={"periodBased": [{"academicPeriod": {"id":"e7f969af-8d53-41d0-b04b-0ea3b4c89ce9"}}]}

            ```
        - name: gradeDate
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Grade Date  
            Not Supported
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-student-grade-point-averages.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/student-grade-point-averages/{id}:
    get:
      summary: Return the requested resource from SHRTGPA,SHRLGPA,SHRDGMRS
      description: >
        Retrieves the detailed student grade point averages from SHRTGPA(Term
        GPA), SHRLGPA(Academic level GPA) and SHRDGMRS(Degree GPA) with the
        passed in identifier.


        Note: Earned degree GPA will be displayed only if the API configuration setting DISPLAY.EARNEDDEGREEGPA is configured to 'Y' and the SHRDGPA job submission process is run.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STUD_GRADE_POINT_AVERAGES
      tags:
        - student-grade-point-averages
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-student-grade-point-averages.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-student-grade-point-averages.json:
      title: Student Grade Point Averages
      description: The information about grade point averages for a student.
      type: object
      properties:
        id:
          title: ID
          description: The global identifier of the student grade point average.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: SHRLGID_GUID(SHRLGID)
        student:
          title: Student
          description: The student associated with the grade point averages.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Student.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons 
              x-lineageReferenceObject: SHRLGPA_PIDM(SHRLGPA)
          additionalProperties: false
          required:
            - id
        periodBased:
          title: Period Based
          description: The period based grade point averages for the student.
          type: array
          items:
            type: object
            properties:
              academicPeriod:
                title: Academic Period
                description: The academic period associated with the calculated grade point
                  average.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Academic Period.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: academic-periods 
                    x-lineageReferenceObject: SHRTGPA_TERM_CODE(SHRTGPA)
                additionalProperties: false
                required:
                  - id
              academicSource:
                title: Academic Source
                description: An indication of the academic sources that have been included in
                  the grade point average (e.g. institution, transfer or all).
                type: string
                minLength: 1
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: publish 'institution' if SHRTGPA_GPA_TYPE_IND = 'I' or 'transfer' if SHRTGPA_GPA_TYPE_IND = 'T' or 'all' if the periodBased object is included in the payload for the student (i.e. an SHRTGPA record exists), for each period/level published, also publish an 'all' source record - the values will not come from the SHRTGPA table though, instead they will be retrieved using the procedure P_COMB_TERM_GPA from the SHKCGPA package
              academicLevel:
                title: Academic Level
                description: The academic level associated with the calculated grade point
                  average.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Academic Level.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: academic-levels 
                    x-lineageReferenceObject: SHRTGPA_LEVL_CODE(SHRTGPA)
                additionalProperties: false
                required:
                  - id
              value:
                title: Value
                description: The grade point average.
                type: number
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: for the 'all' source report the COMB_GPA output from the P_COMB_TERM_GPA
              attemptedCredits:
                title: Attempted Credits
                description: The number of attempted credits used to compute the grade point
                  average.
                type: number
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: for the 'all' source report the COMB_HOURS_ATTEMPTED output from the P_COMB_TERM_GPA
              earnedCredits:
                title: Earned Credits
                description: The number of earned credits used to compute the grade point
                  average.
                type: number
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: for the 'all' source report the COMB_HOURS_EARNED output from the P_COMB_TERM_GPA
              qualityPoints:
                title: Quality Points
                description: The number of quality points used to compute the grade point
                  average.
                type: number
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: for the 'all' source report the COMB_QUALITY_POINTS output from the P_COMB_TERM_GPA
              gpaCredits:
                title: Grade Point Average Credits
                description: >-
                  Number of GPA credits, as defined by the institution, used to
                  compute the grade point average.
                type: number
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: for the 'all' source report the COMB_GPA_HOURS output from the P_COMB_TERM_GPA                
              passedCredits:
                title: Passed Credits
                description: >-
                  Number of passed credits, as defined by the institution, used to
                  compute the grade point average.
                type: number  
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: for the 'all' source report the COMB_HOURS_PASSED output from the P_COMB_TERM_GPA                                         
            additionalProperties: false
            required:
              - academicPeriod
              - academicSource
              - academicLevel
              - value
              - attemptedCredits
              - earnedCredits
              - qualityPoints
        cumulative:
          title: Cumulative
          description: The cumulative grade point averages for the student.
          type: array
          items:
            type: object
            properties:
              academicSource:
                title: Academic Source
                description: An indication of the academic sources that have been included in
                  the grade point average (e.g. institution, transfer or all).
                type: string
                minLength: 1
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: publish 'institution' if SHRLGPA_GPA_TYPE_IND = 'I' or 'transfer' if SHRLGPA_GPA_TYPE_IND = 'T' or 'all' if SHRLGPA_GPA_TYPE_IND = 'O'"
              academicLevel:
                title: Academic Level
                description: The academic level associated with the calculated grade point
                  average.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Academic Level.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: academic-levels 
                    x-lineageReferenceObject: SHRLGPA_LEVL_CODE(SHRLGPA)
                additionalProperties: false
                required:
                  - id
              value:
                title: Value
                description: The grade point average.
                type: number
                x-lineageReferenceObject: SHRLGPA_GPA(SHRLGPA)
              attemptedCredits:
                title: Attempted Credits
                description: The number of attempted credits used to compute the grade point
                  average.
                type: number
                x-lineageReferenceObject: SHRLGPA_HOURS_ATTEMPTED(SHRLGPA)
              earnedCredits:
                title: Earned Credits
                description: The number of earned credits used to compute the grade point
                  average.
                type: number
                x-lineageReferenceObject: SHRLGPA_HOURS_EARNED(SHRLGPA)
              qualityPoints:
                title: Quality Points
                description: The number of quality points used to compute the grade point
                  average.
                type: number
                x-lineageReferenceObject: SHRLGPA_QUALITY_POINTS(SHRLGPA)
              gpaCredits:
                title: Grade Point Average Credits
                description: >-
                  Number of GPA credits, as defined by the institution, used to
                  compute the grade point average.
                type: number
                x-lineageReferenceObject: SHRLGPA_GPA_HOURS(SHRLGPA)
              passedCredits:
                title: Passed Credits
                description: >-
                  Number of passed credits, as defined by the institution, used to
                  compute the grade point average.
                type: number                     
                x-lineageReferenceObject: SHRLGPA_HOURS_PASSED(SHRLGPA)                
            additionalProperties: false
            required:
              - academicSource
              - academicLevel
              - value
              - attemptedCredits
              - earnedCredits
              - qualityPoints
        earnedDegrees:
          title: Earned Degrees
          description: The grade point average of the student for earned degrees.
          type: array
          items:
            type: object
            properties:
              academicProgram:
                title: Academic Program
                description: The academic program associated with the grade point average.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Academic Program.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: student-academic-programs 
                    x-lineageReferenceObject: derived
                    x-lineageDerivedLogic: where SHRDGMRS_PIDM = SHRDGMR_PIDM and SHRDGMRS_SEQ_NO = SHRDGMR_SEQ_NO AND SHRDGMR_SEQ_NO = SORLCUR_KEY_SEQNO AND SORLCUR_CACT_CODE is 'active' AND SORLCUR_CURRENT_CDE = Y AND SORLCUR_LMOD_CODE = OUTCOME (sb_curriculum_str.f_outcome) is the procedure used in stud-acad-program API
                additionalProperties: false
                required:
                  - id
              academicSource:
                title: Academic Source
                description: An indication of the academic sources that have been included in
                  the grade point average (e.g. institution, transfer or all).
                type: string
                minLength: 1
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: Use 'institution' if SHRDGMRS_INST_GPA or 'transfer' if SHRDGMRS_TRAN_GPA or 'all' if SHRDGMRS_OVER_GPA
              earnedOn:
                title: Earned On
                description: The date the student earned the degree.
                type: string
                format: date
                pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                x-lineageReferenceObject: SHRDGMR_GRAD_DATE(SHRDGMR)
              value:
                title: Value
                description: The grade point average.
                type: number
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: P_DEGR_GPA.inst_gpa if academic source = 'institution' OR P_DEGR_GPA.tran_gpa if academic source = 'transfer' OR P_DEGR_GPA.over_gpa if academic source = 'all'
              attemptedCredits:
                title: Attempted Credits
                description: The number of attempted credits used to compute the grade point
                  average.
                type: number
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: P_DEGR_GPA.inst_hours_attempted if academic source = 'institution' OR P_DEGR_GPA.tran_hours_attempted if academic source = 'transfer' OR P_DEGR_GPA.over_hours_attempted if academic source = 'all'
              earnedCredits:
                title: Earned Credits
                description: The number of earned credits used to compute the grade point
                  average.
                type: number
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: P_DEGR_GPA.inst_hours_earned if academic source = 'institution' OR P_DEGR_GPA.tran_hours_earned if academic source = 'transfer' OR P_DEGR_GPA.over_hours_earned if academic source = 'all'
              qualityPoints:
                title: Quality Points
                description: The number of quality points used to compute the grade point
                  average.
                type: number
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: P_DEGR_GPA.inst_quality_points if academic source = 'institution' OR P_DEGR_GPA.tran_quality_points if academic source = 'transfer' OR P_DEGR_GPA.over_quality_points if academic source = 'all'
              gpaCredits:
                title: Grade Point Average Credits
                description: >-
                  Number of GPA credits, as defined by the institution, used to
                  compute the grade point average.
                type: number
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: P_DEGR_GPA.inst_gpa_hours if academic source = 'institution' OR P_DEGR_GPA.tran_gpa_hours if academic source = 'transfer' OR P_DEGR_GPA.over_gpa_hours if academic source = 'all'
              passedCredits:
                title: Passed Credits
                description: >-
                  Number of passed credits, as defined by the institution, used to
                  compute the grade point average.
                type: number                      
                x-lineageReferenceObject: derived  
                x-lineageDerivedLogic: P_DEGR_GPA.inst_hours_passed if academic source = 'institution' OR P_DEGR_GPA.tran_hours_passed if academic source = 'transfer' OR P_DEGR_GPA.over_hours_passed if academic source = 'all'
            additionalProperties: false
            required:
              - academicProgram
              - academicSource
              - earnedOn
              - value
              - attemptedCredits
              - earnedCredits
              - qualityPoints
      required:
        - id
        - student
      additionalProperties: false
