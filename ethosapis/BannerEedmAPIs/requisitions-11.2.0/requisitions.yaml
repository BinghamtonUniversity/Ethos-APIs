openapi: 3.0.0
info:
  title: Requisitions
  description: >
    Requisitions are requests to purchase goods or services that may reserve
    funds in financial ledgers.


    Please refer to the section 'API Integration Configuration Settings' in Banner Ethos API Handbook for all the configuration settings needed for this API.
  version: "11.2.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Finance
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/requisitions:
    get:
      summary: Returns resources from FPBREQH
      description: >
        Returns a paged listing of all the purchase requisitions from FPBREQH
        with FPBREQH_RQST_TYPE_IND = P.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_REQUISITIONS
      tags:
        - requisitions
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v11.2.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 30 and upper limit is 100.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-requisitions.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.2.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in FPBREQH
      description: >
        A purchase requisition will be created with a POST request in FPBREQH
        with FPBREQH_RQST_TYPE_IND = P.


        POST requests must include a nil GUID value ("00000000-0000-0000-0000-000000000000") for the root id property.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_REQUISITIONS
      tags:
        - requisitions
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11.2.0+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11.2.0+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.2.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.2.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-requisitions.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-requisitions.json"
  /api/requisitions/{id}:
    get:
      summary: Return the requested resource from FPBREQH
      description: >
        Returns a purchase requisition from FPBREQH with the passed in
        identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_REQUISITIONS
      tags:
        - requisitions
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11.2.0+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.2.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.2.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-requisitions.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    put:
      summary: Update the requested resource from FPBREQH
      description: >
        A requisition record cannot be updated. If an update request is sent
        with 'status' as cancelled at header level, the API cancels the purchase
        requisition.


        Note: Only the requisition which is completed, approved and posted can be cancelled with an update request.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_REQUISITIONS
      tags:
        - requisitions
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Requisitions for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11.2.0+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11.2.0+json 

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.2.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.2.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-requisitions.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-requisitions.json"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-requisitions.json:
      title: Requisitions
      description: Requests to purchase goods or services that may reserve funds in
        financial ledgers.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the requisition.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FPBREQH_GUID(FPBREQH)
        requisitionNumber:
          title: Requisition Number
          description: The number associated with the requisition assigned by the finance
            system.
          type: string
          x-lineageReferenceObject: FPBREQH_CODE(FPBREQH)
        referenceNumber:
          title: Reference Number
          description: A reference number specified for the requisition by an external
            system.
          type: string
          x-lineageReferenceObject: FPBREQH_DOC_REF_CODE(FPBREQH)
        paymentSource:
          title: Payment Source
          description: The payment source associated with the requisition which is used
            while calculating taxes.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Payment Source.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: accounts-payable-sources 
                  x-lineageReferenceObject: unsupported
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        requestedOn:
          title: Requested On
          description: The date when the request was originated.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FPBREQH_REQH_DATE(FPBREQH)
        transactionDate:
          title: Transaction Date
          description: The transaction date for the requisition. This will be the date
            used when entering the transactions into the general ledger.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FBPREQH_TRANS_DATE(FPBREQH)
        status:
          title: Status
          description: The status of the requisition.
          oneOf:
            - type: string
              enum:
                - notApproved
                - outstanding
                - cancelled
                - purchaseOrderCreated
                - inProgress
              x-lineageReferenceObject: derived  
              x-lineageDerivedLogic: Display 'inProgress' if FPBREQH_COMPLETE_IND IS NULL OR FPBREQH_COMPLETE_IND= N OR ( FPBREQH_COMPLETE_IND =Y AND FPBREQH_APPR_IND = Y AND SELECT count(1) FROM FOBAPPD WHERE FOBAPPD_DOC_NUM = :DISPLAY_RQST_CODE AND FOBAPPD_SEQ_CODE = 1); Display 'notApproved' if FPBREQH_COMPLETE_IND = Y AND FPBREQH_APPR_IND = N;  Display 'outstanding' if FPBREQH_COMPLETE_IND =Y AND FPBREQH_APPR_IND = Y;  Display 'purchaseOrderCreated' if FPBREQH_COMPLETE_IND =Y AND FPBREQH_APPR_IND = Y AND (select count(1) from ftvrqpo where ftvrqpo_reqd_code= xxxx) > 0; Display 'cancelled' if FPBREQH_CANCEL_IND = 'Y'
            - type: string
              maxLength: 0
        deliveredBy:
          title: Delivered By
          description: The date by which the items are requested to be delivered.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: FPBREQH_REQD_DATE(FPBREQH)
            - type: string
              maxLength: 0
        initiator:
          title: Initiator
          description: The initiator of the requisition.
          type: object
          properties:
            name:
              title: Name
              description: The name of the initiator.
              type: string
              minLength: 1
              x-lineageReferenceObject: FPBREQH_NAME(FPBREQH)
            detail:
              title: Detail
              description: The details of the person who initiated the requisition.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Detail.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: persons 
                      x-lineageReferenceObject: FPBREQHS_INIT_DETAIL_ID(FPBREQHS)
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
            email:
              title: Email
              description: The email address of the initiator.
              type: string
              x-lineageReferenceObject: FPBREQH_EMAIL_ADDR(FPBREQH)
            phone:
              title: Phone
              description: The phone number of the initiator.
              type: object
              properties:
                number:
                  title: Number
                  description: The number assigned to the phone.
                  type: string
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: Display the concatenated values of FPBREQH_PHONE_AREA and FPBREQH_PHONE_NUM
                extension:
                  title: Extension
                  description: The extension used to connect to the phone when multiple phones
                    share the same primary number.
                  type: string
                  x-lineageReferenceObject: FPBREQH_PHONE_EXT(FPBREQH)
              additionalProperties: false
            fax:
              title: Fax
              description: The fax number of the initiator.
              type: object
              properties:
                number:
                  title: Number
                  description: The number assigned to the fax line.
                  type: string
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: Display the concatenated values of FBPREQH_FAX_AREA and FPBREQH_FAX_NUM.
                extension:
                  title: Extension
                  description: The extension used to connect to the fax line when multiple lines
                    share the same primary number.
                  type: string
                  x-lineageReferenceObject: FBPREQH_FAX_EXT(FPBREQH)
              additionalProperties: false
          additionalProperties: false
          required:
            - name
        buyer:
          title: Buyer
          description: The purchasing agent assigned to the requisition.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Buyer.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: buyers 
                  x-lineageReferenceObject: FPRREQD_BUYR_CODE(FPRREQD)
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        shipping:
          title: Shipping
          description: The shipping information associated with the requisition.
          type: object
          properties:
            attention:
              title: Attention
              description: The person or office to which the shipment is directed.
              type: string
              x-lineageReferenceObject: FPBREQH_ATTENTION_TO(FPBREQH)
            shipTo:
              title: Ship To
              description: The destination to which the items should be shipped.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Ship To.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: ship-to-destinations 
                      x-lineageReferenceObject: FPBREQH_SHIP_CODE(FPBREQH)
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
            freeOnBoard:
              title: Free On Board
              description: The free on board (FOB) type specified for the requisition.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Free On Board.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: free-on-board-types 
                      x-lineageReferenceObject: FPBREQHS_FREE_ONBOARD_ID(FPBREQHS)
                  additionalProperties: false
                  required:
                    - id
                - type: object
                  maxProperties: 0
          additionalProperties: false
        overrideShippingDestination:
          title: Override Shipping Destination
          description: Override of the shipping information specified in the ship to
            destination.
          oneOf:
            - type: object
              properties:
                description:
                  title: Description
                  description: The description of the shipping destination.
                  type: string
                addressLines:
                  title: Address Lines
                  description: The address lines of the shipping address, such as a street
                    address, post office box number, or city, region, and postal
                    code.
                  type: array
                  items:
                    type: string
                    x-lineageReferenceObject: FPBREQHS_SHIP_DEST_ADLINES1(FPBREQHS) or FPBREQHS_SHIP_DEST_ADLINES3(FPBREQHS) or FPBREQHS_SHIP_DEST_ADLINES2(FPBREQHS) or FPBREQHS_SHIP_DEST_ADLINES5(FPBREQHS) or FPBREQHS_SHIP_DEST_ADLINES4(FPBREQHS)
                place:
                  title: Place
                  description: A country specific postal region. Postal regions are expressed as a
                    hierarchy of country, region, and sub-region, and as a
                    locality with postal automation codes.
                  oneOf:
                    - type: object
                      format: place
                      properties:
                        country:
                          title: Country
                          description: The country specific postal region definition.
                          oneOf:
                            - title: Australia
                              description: The postal region definition for Australia.
                              type: object
                              properties:
                                code:
                                  title: Code
                                  description: The ISO 3166-1 alpha-3 country code for Australia.
                                  enum:
                                    - AUS
                                  type: string
                                  x-lineageReferenceObject: FPBREQHS_DEST_NATN_CODE(FPBREQHS)
                                title:
                                  title: Country
                                  description: The name of the country, as used in everyday speech.
                                  type: string
                                  x-lineageReferenceObject: FPBREQHS_DEST_NATN_TITLE(FPBREQHS)
                                postalTitle:
                                  title: Postal Country
                                  description: The name of the country when mail is being addressed from an
                                    international sender.
                                  oneOf:
                                    - type: string
                                      enum:
                                        - AUSTRALIA
                                      x-lineageReferenceObject: FPBREQHS_DEST_POSTCODE(FPBREQHS)
                                    - type: string
                                      maxLength: 0
                                region:
                                  title: Region
                                  description: A region within the country
                                  oneOf:
                                    - type: object
                                      properties:
                                        code:
                                          title: Code
                                          description: The ISO 3166-2 code used to identify the region within the country.
                                          enum:
                                            - AU-NSW
                                            - AU-ACT
                                            - AU-VIC
                                            - AU-QLD
                                            - AU-SA
                                            - AU-WA
                                            - AU-TAS
                                            - AU-NT
                                          type: string
                                          x-lineageReferenceObject: FPBREQHS_SHIP_DES_STAT_CODE(FPBREQHS)
                                        title:
                                          title: Title
                                          description: The full name of the region
                                          type: string
                                          x-lineageReferenceObject: FPBREQHS_DEST_STAT_TITLE(FPBREQHS)
                                      additionalProperties: false
                                      required:
                                        - code
                                    - type: object
                                      maxProperties: 0
                                subRegion:
                                  title: Subregion
                                  description: A subregion within the country and region
                                  type: object
                                  properties:
                                    code:
                                      title: Code
                                      description: A code that may be used to identify the sub-region. This should be
                                        the ISO 3166-2 code, if one exists,
                                        otherwise, a user defined code may be
                                        optionally specified.
                                      type: string
                                      x-lineageReferenceObject: FPBREQHS_DEST_CNTY_CODE(FPBREQHS)
                                    title:
                                      title: Title
                                      description: The name of a subregion
                                      type: string
                                      x-lineageReferenceObject: FPBREQHS_DEST_CNTY_TITLE(FPBREQHS)
                                  additionalProperties: false
                                locality:
                                  title: city
                                  description: The name of the city or town.
                                  type: string
                                  x-lineageReferenceObject: FPBREQHS_DEST_LOCALITY(FPBREQHS)
                                postalCode:
                                  title: Postal Code
                                  description: The mailing postal code.
                                  oneOf:
                                    - type: string
                                      pattern: ^(0[289][0-9]{2})|([1345689][0-9]{3})|(2[0-8][0-9]{2})|(290[0-9])|(291[0-4])|(7[0-4][0-9]{2})|(7[8-9][0-9]{2})$
                                      x-lineageReferenceObject: FPBREQHS_DEST_POSTCODE(FPBREQHS)
                                    - type: string
                                      maxLength: 0
                              additionalProperties: false
                              required:
                                - code
                            - title: Brazil
                              description: The postal region definition for Brazil.
                              type: object
                              properties:
                                code:
                                  title: Code
                                  description: The ISO 3166-1 alpha-3 country code for Brazil.
                                  enum:
                                    - BRA
                                  type: string
                                  x-lineageReferenceObject: FPBREQHS_DEST_NATN_CODE(FPBREQHS)
                                title:
                                  title: Country
                                  description: The name of the country, as used in everyday speech.
                                  type: string
                                  x-lineageReferenceObject: FPBREQHS_DEST_NATN_TITLE(FPBREQHS)
                                postalTitle:
                                  title: Postal Country
                                  description: The name of the country when mail is being addressed from an
                                    international sender.
                                  oneOf:
                                    - type: string
                                      enum:
                                        - BRAZIL
                                      x-lineageReferenceObject: FPBREQHS_DEST_POSTCODE(FPBREQHS)
                                    - type: string
                                      maxLength: 0
                                region:
                                  title: Region
                                  description: A region within the country
                                  oneOf:
                                    - type: object
                                      properties:
                                        code:
                                          title: Code
                                          description: The ISO 3166-2 code used to identify the region within the country.
                                          enum:
                                            - BR-AC
                                            - BR-AL
                                            - BR-AM
                                            - BR-AP
                                            - BR-BA
                                            - BR-CE
                                            - BR-DF
                                            - BR-ES
                                            - BR-GO
                                            - BR-MA
                                            - BR-MG
                                            - BR-MS
                                            - BR-MT
                                            - BR-PA
                                            - BR-PB
                                            - BR-PE
                                            - BR-PI
                                            - BR-PR
                                            - BR-RJ
                                            - BR-RN
                                            - BR-RO
                                            - BR-RR
                                            - BR-RS
                                            - BR-SC
                                            - BR-SE
                                            - BR-SP
                                            - BR-TO
                                          type: string
                                          x-lineageReferenceObject: FPBREQHS_SHIP_DES_STAT_CODE(FPBREQHS)
                                        title:
                                          title: Title
                                          description: The full name of the region
                                          type: string
                                          x-lineageReferenceObject: FPBREQHS_DEST_STAT_TITLE(FPBREQHS)
                                      additionalProperties: false
                                      required:
                                        - code
                                    - type: object
                                      maxProperties: 0
                                subRegion:
                                  title: Subregion
                                  description: A subregion within the country and region
                                  type: object
                                  properties:
                                    code:
                                      title: Code
