                      type: string
                  additionalProperties: false
                  required:
                    - value
                    - currency
              additionalProperties: false
              required:
                - period
                - rate
          additionalProperties: false
          required:
            - amount
        classification:
          title: Classification
          description: The employment classification of the job.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Classification.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: employment-classifications
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        preference:
          title: Preference
          description: The preference for a job (primary).
          oneOf:
            - type: string
              enum:
                - primary
            - type: string
              maxLength: 0
      required:
        - id
        - person
        - employer
        - position
        - department
        - startOn
        - status
      additionalProperties: false
