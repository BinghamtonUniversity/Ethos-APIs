openapi: 3.0.0
info:
  title: Institution Jobs
  description: A detailed description of the job at an institution.
  version: "8.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Human Resources
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/institution-jobs:
    get:
      summary: Return all resources
      description: This version of the resource uses a legacy filter format and cannot
        be displayed as a parameter.  Please refer to the API source
        documentation for more information.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_INSTITUTION_JOBS
      tags:
        - institution-jobs
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v8+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-institution-jobs.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v8.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/institution-jobs/{id}:
    get:
      summary: Return the requested resource
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_INSTITUTION_JOBS
      tags:
        - institution-jobs
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Institution Jobs for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v8+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v8.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v8.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-institution-jobs.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-institution-jobs.json:
      title: Institution Jobs
      description: A detailed description of the job at an institution.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the institution job.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        person:
          title: Person
          description: The employee to which the job is associated.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Person.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons
          additionalProperties: false
          required:
            - id
        employer:
          title: Employer
          description: The operational unit of the institution to which the job belongs.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Employer.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: educational-institutions
          additionalProperties: false
          required:
            - id
        position:
          title: Position
          description: The position associated with the job.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Position.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: institution-positions
          additionalProperties: false
          required:
            - id
        department:
          title: Department
          description: The department of the institution to which the job belongs.
          type: string
          minLength: 1
        startOn:
          title: Start On
          description: The first day of the job.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
        endOn:
          title: End On
          description: The last day of the job.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            - type: string
              maxLength: 0
        jobChangeReason:
          title: Job Change Reason
          description: The reason associated with the change of job.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Job Change Reason.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: job-change-reasons
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        accountingStrings:
          title: Accounting Strings
          description: The accounting strings associated with the job.
          type: array
          items:
            type: string
        status:
          title: Status
          description: The status of the employee on the job.
          enum:
            - active
            - ended
            - leave
          type: string
        payStatus:
          title: Pay Status
          description: The pay status of the employee.
          oneOf:
            - type: string
              enum:
                - withPay
                - withoutPay
                - partialPay
            - type: string
              maxLength: 0
        benefitsStatus:
          title: Benefits Status
          description: The benefit status of the employee.
          oneOf:
            - type: string
              enum:
                - withBenefits
                - withoutBenefits
            - type: string
              maxLength: 0
        hoursPerPeriod:
          title: Hours Per Period
          description: The number of hours of work in specified time periods.
          type: array
          items:
            type: object
            properties:
              period:
                title: Period
                description: The defined time period (e.g. day, week, month, etc.)
                enum:
                  - day
                  - week
                  - month
                  - year
                  - payPeriod
                type: string
              hours:
                title: Hours
                description: The number of hours of work in the specified time period.
                minimum: 0
                type: number
                format: positiveNumber
            additionalProperties: false
            required:
              - period
              - hours
        fullTimeEquivalent:
          title: Full Time Equivalent
          description: The ratio of hours of work for the position to the hours of work
            expected of a full-time employee.
          oneOf:
            - type: number
              minimum: 0
              format: positiveNumber
            - type: string
              nullable: true
        appointmentPercentage:
          title: Appointment Percentage
          description: The percentage of the position filled by the employee.
          oneOf:
            - type: number
              minimum: 0
              format: positiveNumber
            - type: string
              nullable: true
        supervisors:
          title: Supervisors
          description: The supervisor associated with the job.
          type: array
          items:
            type: object
            properties:
              supervisor:
                title: Supervisor
                description: The supervisor for the job.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Supervisor.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: persons
                additionalProperties: false
                required:
                  - id
              type:
                title: Type
                description: The type of supervisor (e.g. primary, alternate, etc.)
                enum:
                  - primary
                  - alternate
                type: string
            additionalProperties: false
            required:
              - supervisor
              - type
        salary:
          title: Salary
          description: The details of the salary associated with the job.
          type: object
          properties:
            grade:
              title: Grade
              description: The grade of salary for the job.
              type: string
            step:
              title: Step
              description: The step of salary for the job.
              type: string
            amount:
              title: Amount
              description: The amount of salary for the job.
              type: object
              properties:
                period:
                  title: Period
                  description: The time period of the salary.
                  enum:
                    - hour
                    - year
                    - contract
                  type: string
                rate:
                  title: Rate
                  description: The amount awarded per time period.
                  format: currency
                  type: object
                  properties:
                    value:
                      title: Value
                      description: The monetary value
                      type: number
                    currency:
                      title: Currency
                      description: The ISO 4217 currency code
                      enum:
                        - AED
                        - AFN
                        - ALL
                        - AMD
                        - ANG
                        - AOA
                        - ARS
                        - AUD
                        - AWG
                        - AZN
                        - BAM
                        - BBD
                        - BDT
