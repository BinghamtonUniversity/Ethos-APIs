components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-person-holds.json:
      title: Person Holds
      description: A customized list of holds that may be applied to a person.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of a person hold
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = person-holds) or SPRTHLD_GUID(SPRTHLD)
          x-lineageDerivedLogic: >
            For Date Based holdPeriod, display GUID from GORGUID where GORGUID_LDM_NAME = 'person-holds', sourced from SPRHOLD via SVQ_SPRHOLD_PERSON_HOLD.
            For Period Based holdPeriod, display SPRTHLD_GUID directly from SPRTHLD via SVQ_SPRTHLD_TERM_HOLD. No GORGUID entry is created for period based holds.
        person:
          title: Person
          description: The person, for whom the hold has been recorded
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Person.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons)
              x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME = 'persons' and GORGUID_DOMAIN_KEY matches SPRHOLD_PIDM or SPRTHLD_PIDM
          additionalProperties: false
          required:
            - id
        hold:
          title: Hold
          description: The hold applied to the person.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Hold.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: person-hold-types
              x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = person-hold-types)
              x-lineageDerivedLogic: Display GUID from GORGUID where GORGUID_LDM_NAME = 'person-hold-types' and GORGUID_DOMAIN_KEY matches SPRHOLD_HLDD_CODE or SPRTHLD_HLDD_CODE
          additionalProperties: false
          required:
            - id
        holdPeriod:
          title: Hold Period
          description: The time components applicable to the hold.
          oneOf:
            - title: Date Based
              description: Date range applied to the person hold.
              type: object
              properties:
                startOn:
                  title: Start On
                  description: The date when the hold goes into effect
                  type: string
                  format: date
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                  x-lineageReferenceObject: SPRHOLD_FROM_DATE(SPRHOLD)
                endOn:
                  title: End On
                  description: The date when the hold ends
                  oneOf:
                    - type: string
                      format: date
                      pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                    - type: string
                      maxLength: 0
                  x-lineageReferenceObject: SPRHOLD_TO_DATE(SPRHOLD)
              additionalProperties: false
              required:
                - startOn
            - title: Period Based
              description: Academic period based person hold details
              type: object
              properties:
                academicPeriod:
                  title: Academic Period
                  description: The academic period associated with the person hold.
                  type: object
