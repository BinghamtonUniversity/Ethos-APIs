                      hold:
                        id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      holdPeriod:
                        startOn: "2026-01-15"
                        endOn: "2026-08-31"
                      notificationIndicator: notify
                      comment: "Pending transcript review"
                      reason: "Missing transcript"
                    - id: "c3f4a7b2-1d9e-4c6f-8a2b-5e7d9f1c3a08"
                      person:
                        id: "c3f4a7b2-1d9e-4c6f-8a2b-5e7d9f1c3a08"
                      hold:
                        id: "b5c6d7e8-f9a0-1234-bcde-f01234567890"
                      holdPeriod:
