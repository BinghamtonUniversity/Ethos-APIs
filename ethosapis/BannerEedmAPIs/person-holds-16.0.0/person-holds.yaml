openapi: 3.0.0
info:
  title: Person Holds
  description: >
    Persons holds API processes the holds that are defined for an individual
    person.
  version: 16.0.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Student
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
tags:
  - name: person-holds
paths:
  /api/person-holds:
    get:
      summary: Returns resources from SPRHOLD and SPRTHLD
      description: >
        Returns a paged listing of all the person hold records from SPRHOLD and SPRTHLD
        table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PERSON_HOLDS
      tags:
        - person-holds
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards for more information.

            ```

            application/vnd.hedtech.integration.v16.0.0+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: object
            properties:
              person:
                type: object
                description: Filter by the person's global identifier.
                properties:
                  id:
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                required:
                  - id
                additionalProperties: false
              type:
                type: object
                description: Filter by the hold type's global identifier.
                properties:
                  id:
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                required:
                  - id
                additionalProperties: false
          description: |
            Filters the collection of person holds. Supported criteria filters:

            ### Filter by Person
            Returns all person holds for the specified person GUID.
            ```
            /api/person-holds?criteria={"person":{"id":"<guid>"}}
            ```

            ### Filter by Hold Type
            Returns all person holds of the specified hold type GUID.
            ```
            /api/person-holds?criteria={"type":{"id":"<guid>"}}
            ```
        - name: allActiveHolds
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: object
            properties:
              status:
                type: string
                enum:
                  - active
            required:
              - status
            additionalProperties: false
          description: |
            Named query that returns all currently active person holds.
            ```
            /api/person-holds?allActiveHolds={"status":"active"}
            ```
        - name: personActiveHolds
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: object
            properties:
              status:
                type: string
                enum:
                  - active
              person:
                type: object
                properties:
                  id:
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                required:
                  - id
                additionalProperties: false
            required:
              - status
              - person
            additionalProperties: false
          description: |
            Named query that returns all currently active person holds for the specified person GUID.
            ```
            /api/person-holds?personActiveHolds={"status":"active","person":{"id":"<guid>"}}
            ```
      responses:
        "200":
          description: Success
          content:
            application/vnd.hedtech.integration.v16.0.0+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-person-holds.json"
              examples:
                mixed:
                  summary: Mixed holdPeriod types
                  value:
                    - id: "d2e3b6a1-4f8c-4e2d-9b7a-1c5e3f2a0d94"
                      person:
