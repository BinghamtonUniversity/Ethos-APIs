openapi: 3.0.0
info:
  title: Housing Assignments
  description: >-
    **API Deprecation Notice**



    Deprecated on: 30-Sep-2019



    Sunset on: 01-Oct-2021



    Description: V16.0.0 updates the roomRates object to an array to accommodate multiple rates per housing assignment.



    ----


    The assignment of a person to institution provided housing.
  version: 10.1.0
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
  x-deprecated-on: 2019-09-30
  x-sunset-on: 2021-10-01
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/housing-assignments:
    get:
      summary: Return all resources
      description: Returns a paged listing of all the resources in the system.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_HOUSING_ASSIGNMENTS
      tags:
        - housing-assignments
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: |
            ### Person  
            A reference to the person assigned a room.
            ```
            /housing-assignments?criteria={"person": {"id": $id}}
            ```
            ### Academic Period  
            The academic period associated with the housing assignment.
            ```
            /housing-assignments?criteria={"academicPeriod": {"id": $id}}
            ```
            ### Status  
            The status of the room assignment.
            ```
            /housing-assignments?criteria={"status": {$status}}
            ```
            ### Start On  
            The date the housing assignment starts.
            ```
            /housing-assignments?criteria={"startOn:": {$startOn}}
            ```
            ### End On  
            The date the housing assignment ends.
            ```
            /housing-assignments?criteria={"endOn:": {$endOn}}
            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-housing-assignments.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      deprecated: true
    post:
      summary: Create a new resource
      description: Create a new resource
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_HOUSING_ASSIGNMENTS
      tags:
