components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-housing-assignments.json:
      title: Housing Assignments
      description: The assignment of a person to institution provided housing.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the housing assignment.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        person:
          title: Person
          description: A reference to the person assigned a room.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Person.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons
          additionalProperties: false
          required:
            - id
        room:
          title: Room
          description: The room assigned to the person.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Room.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: rooms
          additionalProperties: false
          required:
            - id
        academicPeriod:
          title: Academic Period
          description: The academic period associated with the housing assignment.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Academic Period.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: academic-periods
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        startOn:
          title: Start On
          description: The date the housing assignment starts.
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
        endOn:
          title: End On
          description: The date the housing assignment ends.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
            - type: string
              maxLength: 0
        status:
          title: Status
          description: The status of the room assignment.
          enum:
            - pending
            - assigned
            - canceled
            - terminated
            - prorated
          type: string
        statusDate:
          title: Status Date
          description: The date when the status was updated.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            - type: string
              maxLength: 0
        request:
          title: Request
          description: A reference to the person's request for housing.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Request.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: housing-requests
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        roomRate:
          title: Room Rate
          description: A reference to the charge to the person for the housing assignment.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Room Rate.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: room-rates
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        ratePeriod:
          title: Rate Period
          description: The interval for which rate is defined.
          oneOf:
            - type: string
              enum:
                - day
                - week
                - month
                - term
                - year
            - type: string
              maxLength: 0
        rateOverride:
          title: Rate Override
          description: The override rate for the room assignment.
          oneOf:
            - type: object
              properties:
                rate:
                  title: Rate
                  description: The rate to be charged to the person in place of the standard room
                    rate.
                  format: currency
                  type: object
                  properties:
                    value:
                      title: Value
                      description: The monetary value
                      type: number
                    currency:
