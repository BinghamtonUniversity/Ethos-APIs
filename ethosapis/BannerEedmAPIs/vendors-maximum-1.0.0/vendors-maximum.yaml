openapi: 3.0.0
info:
  title: Vendors Maximum
  description: >
    The person or organization that offers products or services to an
    institution. The information about the classification of vendor, the
    conditions for vendor payment, the accounts payable source, the status of
    the vendor, the hold reasons if a payment is put on hold, the dates when the
    vendor was registered and last active, the default currency used to deal
    with the vendor, address defaults, the federal tax id number, associated tax
    forms, and any comments related to the vendor is published.


    Vendors maximum is an alternate representation of vendors that exposes more attributes related to Banner vendors in FTVVEND than that are exposed in the vendors primary representation. The response also includes additional attributes from SPRADDR table for address information, vendor contact details and default address details from FTVVEND table.
  version: 1.0.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Finance
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/vendors:
    get:
      summary: Returns resources from FTVVEND
      description: |
        Returns a paged list of records from FTVVEND in the Banner system.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_VENDORS
      tags:
        - vendors-maximum
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.vendors-maximum.v1+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Organization  

            Detail information of the organization acting as the vendor.

            ```

            /vendors?criteria={"vendorDetail":{"organization":{"id":"0d316912-b8d1-4cbf-ab62-e7bf1f2be576"}}}

            ```

            ### Person  

            Detail information of the person acting as the vendor.

            ```

            /vendors?criteria={"vendorDetail":{"person":{"id":"0d316912-b8d1-4cbf-ab62-e7bf1f2be576"}}}

            ```

            ### Institution  

            Not Supported in Banner

            ```

            /vendors?criteria={"vendorDetail":{"institution":{"id":"2daff712-165d-46d2-a12b-63e28afe5b6e"}}}

            ```

            ### Statuses  

            The statuses (active, approved, stop payment) that apply to the vendor.

            ```

            /vendors?criteria={"statuses":["active","approved"]}

            ```

            ### Types  

            The type(s) of vendor, i.e. Procurement, eProcurement, or Travel.

            ```

            /vendors?criteria={"types":["procurement","eProcurement"]}

            ```

            ### Addresses Detail  

            The details associated with the address.

            ```

            /vendors?criteria={"addresses":[{"detail":{"id":"2daff712-165d-46d2-a12b-63e28afe5b6e"}}]}

            ```

            ### Tax ID  

            The federal tax identification number for the vendor.

            ```

            /vendors?criteria={"taxId":"9900"}

            ```
        - name: vendorDetail
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Vendor Detail  

            Filter based on the person, organization or institution acting as the vendor.

            ```

            /vendors?vendorDetail={"vendorDetail":{"id":"9c5e4f0e-b0e9-4399-835e-5e7f21da42d3"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-vendors-maximum.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.vendors-maximum.v1.0.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/vendors/{id}:
    get:
      summary: Return the requested resource from FTVVEND
      description: |
        Returns a record from FTVVEND with the passed in identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_VENDORS
      tags:
        - vendors-maximum
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.vendors-maximum.v1+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.vendors-maximum.v1.0.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.vendors-maximum.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-vendors-maximum.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-vendors-maximum.json:
      title: Vendors Maximum
      description: A person or organization that offers products or services to an
        institution.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the vendors maximum.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FTVVEND_GUID
        types:
          title: Types
          description: The type(s) of vendor, i.e. Procurement, eProcurement, or Travel.
          type: array
          items:
            enum:
              - procurement
              - eProcurement
              - travel
            type: string
            x-lineageReferenceObject: derived  
            x-lineageDerivedLogic: If FTVVEND_EPROC_IND = Y, then display 'eProcurement' else if FTVVENDS_TRAVEL_IND='Y', then display 'travel'
        vendorDetail:
          title: Vendor Detail
          description: The person, organization or educational institution acting as the
            vendor.
          oneOf:
            - title: Person
              description: Detail information of the person acting as the vendor.
              type: object
              properties:
                person:
                  title: Person
                  description: Detail information of the person acting as the vendor.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Person.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: persons 
                      x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
                      x-lineageDerivedLogic: A record in GORGUID where GORGUID_LDM_NAME='persons' and   GORGUID_DOMAIN_KEY= FTVVEND_PIDM and FTVVEND_ENTITY_IND = 'P'
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - person
            - title: Organization
              description: Detail information of the organization acting as the vendor.
              type: object
              properties:
                organization:
                  title: Organization
                  description: Detail information of the organization acting as the vendor.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Organization.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: organizations 
                      x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = non-persons) 
                      x-lineageDerivedLogic: A record in GORGUID where GORGUID_LDM_NAME='nonpersons' and   GORGUID_DOMAIN_KEY= FTVVEND_PIDM and FTVVEND_ENTITY_IND = 'C'
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - organization
            - title: Institution
              description: Detail information of the educational institution acting as the
                vendor.
              type: object
              properties:
                institution:
                  title: Institution
                  description: Detail information of the educational institution acting as the
                    vendor.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Institution.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: educational-institutions 
                      x-lineageReferenceObject: unsupported
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - institution
        taxId:
          title: Tax Id
          description: The federal tax identification number for the vendor.
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: If FTVVEND_ENTITY_IND for the vendor = 'C', taxId should be displayed in the format- xx-xxxxxxx (2-7); If FTVVEND_ENTITY_IND for the vendor = 'P', taxId should be displayed in the format- xxx-xx-xxxx (3-2-4).
        statuses:
          title: Statuses
          description: The statuses (active, approved, hold payment) that apply to the
            vendor.
          type: array
          items:
            enum:
              - active
              - holdPayment
              - approved
            type: string
            x-lineageReferenceObject: derived  
            x-lineageDerivedLogic: Display 'active', if system date is between FTVVEND_EFF_DATE) and Termination Date (FTVVEND_TERM_DATE); else display 'holdPayment' if FTVVEND_PMT_HOLD_RSN_CODE has any data; else display 'approved'
        startOn:
          title: Start On
          description: The first date when the vendor was active/registered.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: FTVVEND_EFF_DATE(FTVVEND)
            - type: string
              maxLength: 0
        endOn:
          title: End On
          description: The last date when the vendor was active.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: FTVVEND_TERM_DATE(FTVVEND)
            - type: string
              maxLength: 0
        addresses:
          title: Addresses
          description: The address(es) associated with the vendor.
          type: array
          items:
            type: object
            properties:
              code:
                title: Code
                description: A code used to uniquely identify the address type instance.
                type: string
                x-lineageReferenceObject: SPRADDR_SEQNO(SPRADDR)
              addressLines:
                title: Address Lines
                description: The address lines of the vendor's location, such as a street
                  address, post office box number, or city, region, and postal
                  code.
                type: array
                items:
                  minLength: 1
                  type: string
                  x-lineageReferenceObject: derived  
                  x-lineageDerivedLogic: Display the concatenated values of SPRADDR_STREET_LINE1, SPRADDR_STREET_LINE2, SPRADDR_STREET_LINE3, SPRADDR_STREET_LINE4.
              place:
                title: Place
                description: A country specific postal region. Postal regions are expressed as a
                  hierarchy of country, region, and sub-region, and as a
                  locality with postal automation codes.
                oneOf:
                  - type: object
                    format: place
                    properties:
                      country:
                        title: Country
                        description: The country specific postal region definition.
                        oneOf:
                          - title: Australia
                            description: The postal region definition for Australia.
                            type: object
                            properties:
                              code:
                                title: Code
                                description: The ISO 3166-1 alpha-3 country code for Australia.
                                enum:
                                  - AUS
                                type: string
                                x-lineageReferenceObject: SPRADDR_NATN_CODE(SPRADDR)
                              title:
                                title: Country
                                description: The name of the country, as used in everyday speech.
                                type: string
                                x-lineageReferenceObject: derived  
                                x-lineageDerivedLogic: Country description from STVNATN is displayed.
                              postalTitle:
                                title: Postal Country
                                description: The name of the country when mail is being addressed from an
                                  international sender.
                                oneOf:
                                  - type: string
                                    enum:
                                      - AUSTRALIA
                                    x-lineageReferenceObject: derived  
                                    x-lineageDerivedLogic: If place.country.code ='AUS', display AUSTRALIA
                                  - type: string
                                    maxLength: 0
                              region:
                                title: Region
                                description: A region within the country
                                oneOf:
                                  - type: object
                                    properties:
                                      code:
                                        title: Code
                                        description: The ISO 3166-2 code used to identify the region within the country.
                                        enum:
                                          - AU-NSW
                                          - AU-ACT
                                          - AU-VIC
                                          - AU-QLD
                                          - AU-SA
                                          - AU-WA
                                          - AU-TAS
                                          - AU-NT
                                        type: string
                                        x-lineageReferenceObject: SPRADDR_STAT_CODE(SPRADDR)
                                      title:
                                        title: Title
                                        description: The full name of the region
                                        type: string
                                        x-lineageReferenceObject: derived  
                                        x-lineageDerivedLogic: State description from STVSTAT is displayed.
                                    additionalProperties: false
                                    required:
                                      - code
                                  - type: object
                                    maxProperties: 0
                              subRegion:
                                title: Subregion
                                description: A subregion within the country and region
                                type: object
                                properties:
                                  code:
                                    title: Code
                                    description: A code that may be used to identify the sub-region. This should be
                                      the ISO 3166-2 code, if one exists,
