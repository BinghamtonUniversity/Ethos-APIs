                                            - CA-YT
                                          type: string
                                        title:
                                          title: Title
                                          description: The full name of the region
                                          type: string
                                          x-lineageReferenceObject: FABINHEA_MANVEN_STAT_TITLE(FABINHEA)
                                      additionalProperties: false
                                      required:
                                        - code
                                    - type: object
                                      maxProperties: 0
                                subRegion:
                                  title: Subregion
                                  description: A subregion within the country and region
                                  type: object
                                  properties:
                                    code:
