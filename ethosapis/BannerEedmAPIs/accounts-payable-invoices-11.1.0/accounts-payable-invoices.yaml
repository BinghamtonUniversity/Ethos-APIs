        payment:
          title: Payment
          description: Information concerning the payment of the invoice.
          type: object
          properties:
            source:
              title: Source
              description: The source account for the payment of the invoice.
              oneOf:
                - type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Source.
