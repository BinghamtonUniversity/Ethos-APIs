openapi: 3.0.0
info:
  title: Accounts Payable Invoices
  description: >
    A request for payment for goods sold, services provided or expenses
    incurred, containing individual prices, additional charges, payment terms
    and account information. The API allows to create an invoice from a travel
    purchase order, procurement and eProcurement purchase order. The API also
    allows to create a direct pay invoice.


    Please refer to the section 'API Integration Configuration Settings' in Banner Ethos API Handbook for all the configuration settings needed for this API.
  version: 11.1.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Finance
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/accounts-payable-invoices:
    get:
      summary: Returns resources from FABINVH
      description: >
        Returns all the records from FABINVH that have vendor information and at
        least one line item with an accounting string associated.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ACCOUNTS_PAYABLE_INVOICES
      tags:
        - accounts-payable-invoices
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 30 and upper limit is 100.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Invoice Number  

            A system-generated number associated with the invoice.

            ```

            /acounts-payable-invoices?criteria={"invoiceNumber": {$invoiceNumber}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-accounts-payable-invoices.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    post:
      summary: Create a new resource in FABINVH
      description: >
        Creates a direct pay or a travel type invoice or a procurement and
        eProcurement type invoice in FABINVH. If a create request is sent with
        type as procurement or eProcurement, the API creates a regular invoice
        record in FABINVH. If a create request is sent with type as travel will
        create a general encumbrance invoice record in FABINVH. A create request
        sent without 'type' will create a direct pay invoice. Though the
        lineItems.accountDetails.sequenceNumber is an optional property, the
        right sequence number values for the General Encumbrance that match up
        with the FOAPALs stored in Banner for the general encumbrance sequence
        numbers are to be sent in the request so that the right enumbrance
        sequence is liquidated by the invoice as expected. 


        POST requests must include a nil GUID value ("00000000-0000-0000-0000-000000000000") for the root id property.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ACCOUNTS_PAYABLE_INVOICES
      tags:
        - accounts-payable-invoices
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-accounts-payable-invoices.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v11+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-accounts-payable-invoices.json"
  /api/accounts-payable-invoices/{id}:
    get:
      summary: Return the requested resource from FABINVH
      description: >
        Returns the record from FABINVH with the passed in identifier that has
        vendor information and at least one line item with an accounting string
        associated.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ACCOUNTS_PAYABLE_INVOICES
      tags:
        - accounts-payable-invoices
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-accounts-payable-invoices.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
    put:
      summary: Update the requested resource from FABINVH
      description: >
        An invoice cannot be updated. If an update request is sent with
        'processState' as voided at header level, the API cancels the invoice.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ACCOUNTS_PAYABLE_INVOICES
      tags:
        - accounts-payable-invoices
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Accounts Payable Invoices for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json 

            ```
          schema:
            type: string
        - name: content type
          in: header
          required: true
          description: >
            The version of the resource supplied in the request. Please refer to
            the API source documentation for detailed support information.
            Prefer to use only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v11+json 

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v11.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v11.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-accounts-payable-invoices.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "500":
          description: Server error, unexpected configuration or data
      requestBody:
        required: true
        content:
          application/vnd.hedtech.integration.v11+json:
            schema:
              type: object
              $ref: "#/components/schemas/schema-accounts-payable-invoices.json"
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-accounts-payable-invoices.json:
      title: Accounts Payable Invoices
      description: A request for payment for goods sold, services provided or expenses
        incurred, containing individual prices, additional charges, payment
        terms and account information.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the accounts payable invoice.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FABINVH_GUID(FABINVH)
        type:
          title: Type
          description: The type of accounts payable invoice, i.e. Procurement,
            eProcurement, or Travel.
          x-lineageReferenceObject: derived
          x-lineageDerivedLogic: For eProcurement or procurement PO in FPBPOHD table check if FPBPOHD_ORIGIN_CODE = 'BANNER' or 'SELFSERVICE', then display type = 'procurement', else if FPBPOHD_ORIGIN_CODE ='EPROCUREMENT ', then display type = 'eProcurement'. For travel type documents, all records from FGBENCH displayed are of type ='travel'. For Direct pay invoices, the type will not be published.
          oneOf:
            - type: string
              enum:
                - procurement
                - eprocurement
                - travel
            - type: string
              maxLength: 0
        vendor:
          title: Vendor
          description: The vendor associated with the invoice.
          type: object
          properties:
            existingVendor:
              title: Existing Vendor
              description: The details associated with an existing vendor.
              oneOf:
                - type: object
                  properties:
                    vendor:
                      title: Vendor
                      description: The details associated with an existing vendor.
                      type: object
                      properties:
                        id:
                          title: ID
                          description: The global identifier for the Vendor.
                          type: string
                          format: guid
                          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                          x-lineageLookupReferenceObject: vendors 
                          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME = persons) 
                          x-lineageDerivedLogic: A record in GORGUID where GORGUID_LDM_NAME = 'PERSONS' and GORGUID_DOMAIN_KEY=FABINVH_VEND_PIDM on the invoice where FABINVH_CODE = FABINCK_INVH_CODE
                      additionalProperties: false
                      required:
                        - id
                    alternativeVendorAddress:
                      title: Alternative Vendor Address
                      description: The details of an alternative stored address for an existing vendor
                        when the default address is not used.
                      oneOf:
                        - type: object
                          properties:
                            id:
                              title: ID
                              description: The global identifier for the Alternative Vendor Address.
                              type: string
                              format: guid
                              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                              x-lineageLookupReferenceObject: addresses 
                              x-lineageReferenceObject: SPRADDR_GUID(SPRADDR)
                              x-lineageDerivedLogic: A record in SPRADDR where SPRADDR_ATYP_CODE=FABINVH_ATYP_CODE_VEND and SPRADDR_SEQNO=FABINVH_ATYP_SEQ_NUM_VEND and SPRADDR_PIDM= FABINVH_PIDM
                          additionalProperties: false
                          required:
                            - id
                        - type: object
                          maxProperties: 0
                  additionalProperties: false
                  required:
                    - vendor
                - type: object
                  maxProperties: 0
            manualVendorDetails:
              title: Manual Vendor Details
              description: The details associated with an undefined vendor or an override to
                an existing vendor's information.
              type: object
              properties:
                name:
                  title: Name
                  description: The name of the vendor.
                  type: string
                  x-lineageReferenceObject: FABINHEA_MANVEN_NAME(FABINHEA)
                type:
                  title: Type
                  description: An indication of whether the vendor is a person or an organization.
                  x-lineageReferenceObject: FABINHEA_MANVEN_TYPE(FABINHEA)
                  oneOf:
                    - type: string
                      enum:
                        - person
                        - organization
                    - type: string
                      maxLength: 0
                addressLines:
                  title: Address Lines
                  description: The address lines of the vendor's address, such as a street
                    address, post office box number, or city, region, and postal
                    code.
                  x-lineageReferenceObject: derived
                  x-lineageDerivedLogic: Display the concatenated values of FABINHEA_MANVEN_ADDLINES1, FABINHEA_MANVEN_ADDLINES2, FABINHEA_MANVEN_ADDLINES3, FABINHEA_MANVEN_ADDLINES4, FABINHEA_MANVEN_ADDLINES5
                  type: array
                  items:
                    type: string
                place:
                  title: Place
                  description: A country specific postal region. Postal regions are expressed as a
                    hierarchy of country, region, and sub-region, and as a
                    locality with postal automation codes.
                  oneOf:
                    - type: object
                      format: place
                      properties:
                        country:
                          title: Country
                          description: The country specific postal region definition.
                          oneOf:
                            - title: Australia
                              description: The postal region definition for Australia.
                              type: object
                              properties:
                                code:
                                  title: Code
                                  description: The ISO 3166-1 alpha-3 country code for Australia.
                                  x-lineageReferenceObject: FABINHEA_MANVEN_NATN_CODE(FABINHEA)
                                  enum:
                                    - AUS
                                  type: string
                                title:
                                  title: Country
                                  description: The name of the country, as used in everyday speech.
                                  type: string
                                  x-lineageReferenceObject: FABINHEA_MANVEN_NATN_TITLE(FABINHEA)
                                postalTitle:
                                  title: Postal Country
                                  description: The name of the country when mail is being addressed from an
                                    international sender.
                                  x-lineageReferenceObject: FABINHEA_MANVEN_POSTITLE(FABINHEA)
                                  oneOf:
                                    - type: string
                                      enum:
                                        - AUSTRALIA
                                    - type: string
                                      maxLength: 0
                                region:
                                  title: Region
                                  description: A region within the country
                                  oneOf:
                                    - type: object
                                      properties:
                                        code:
                                          title: Code
                                          description: The ISO 3166-2 code used to identify the region within the country.
                                          x-lineageReferenceObject: FABINHEA_MANVEN_STAT_CODE(FABINHEA)
                                          enum:
                                            - AU-NSW
                                            - AU-ACT
                                            - AU-VIC
                                            - AU-QLD
                                            - AU-SA
                                            - AU-WA
                                            - AU-TAS
                                            - AU-NT
                                          type: string
                                        title:
                                          title: Title
                                          description: The full name of the region
                                          type: string
                                          x-lineageReferenceObject: FABINHEA_MANVEN_STAT_TITLE(FABINHEA)
                                      additionalProperties: false
                                      required:
                                        - code
                                    - type: object
                                      maxProperties: 0
                                subRegion:
                                  title: Subregion
                                  description: A subregion within the country and region
                                  type: object
                                  properties:
                                    code:
                                      title: Code
                                      description: A code that may be used to identify the sub-region. This should be
                                        the ISO 3166-2 code, if one exists,
                                        otherwise, a user defined code may be
                                        optionally specified.
                                      type: string
                                      x-lineageReferenceObject: FABINHEA_MANVEN_CNTY_CODE(FABINHEA)
                                    title:
                                      title: Title
                                      description: The name of a subregion
                                      type: string
                                      x-lineageReferenceObject: FABINHEA_MANVEN_CNTY_TITLE(FABINHEA)
                                  additionalProperties: false
                                locality:
                                  title: city
                                  description: The name of the city or town.
                                  type: string
                                  x-lineageReferenceObject: FABINHEA_MANVEN_LOCALITY(FABINHEA)
                                postalCode:
                                  title: Postal Code
                                  description: The mailing postal code.
                                  oneOf:
                                    - type: string
                                      pattern: ^(0[289][0-9]{2})|([1345689][0-9]{3})|(2[0-8][0-9]{2})|(290[0-9])|(291[0-4])|(7[0-4][0-9]{2})|(7[8-9][0-9]{2})$
                                      x-lineageReferenceObject: FABINHEA_MANVEN_POSTCODE(FABINHEA)
                                    - type: string
                                      maxLength: 0
                              additionalProperties: false
                              required:
                                - code
                            - title: Brazil
                              description: The postal region definition for Brazil.
                              type: object
                              properties:
                                code:
                                  title: Code
                                  description: The ISO 3166-1 alpha-3 country code for Brazil.
                                  x-lineageReferenceObject: FABINHEA_MANVEN_NATN_CODE(FABINHEA)
                                  enum:
                                    - BRA
                                  type: string
                                title:
                                  title: Country
                                  description: The name of the country, as used in everyday speech.
                                  type: string
                                  x-lineageReferenceObject: FABINHEA_MANVEN_NATN_TITLE(FABINHEA)
                                postalTitle:
                                  title: Postal Country
                                  description: The name of the country when mail is being addressed from an
                                    international sender.
                                  x-lineageReferenceObject: FABINHEA_MANVEN_POSTITLE(FABINHEA)
                                  oneOf:
                                    - type: string
                                      enum:
                                        - BRAZIL
                                    - type: string
                                      maxLength: 0
                                region:
                                  title: Region
                                  description: A region within the country
                                  oneOf:
                                    - type: object
                                      properties:
                                        code:
                                          title: Code
                                          description: The ISO 3166-2 code used to identify the region within the country.
                                          x-lineageReferenceObject: FABINHEA_MANVEN_STAT_CODE(FABINHEA)
                                          enum:
                                            - BR-AC
                                            - BR-AL
                                            - BR-AM
                                            - BR-AP
                                            - BR-BA
                                            - BR-CE
                                            - BR-DF
                                            - BR-ES
                                            - BR-GO
                                            - BR-MA
                                            - BR-MG
                                            - BR-MS
                                            - BR-MT
                                            - BR-PA
                                            - BR-PB
                                            - BR-PE
                                            - BR-PI
                                            - BR-PR
                                            - BR-RJ
                                            - BR-RN
                                            - BR-RO
                                            - BR-RR
                                            - BR-RS
                                            - BR-SC
                                            - BR-SE
                                            - BR-SP
                                            - BR-TO
                                          type: string
                                        title:
                                          title: Title
                                          description: The full name of the region
                                          type: string
                                          x-lineageReferenceObject: FABINHEA_MANVEN_STAT_TITLE(FABINHEA)
                                      additionalProperties: false
                                      required:
                                        - code
                                    - type: object
                                      maxProperties: 0
                                subRegion:
                                  title: Subregion
                                  description: A subregion within the country and region
                                  type: object
                                  properties:
                                    code:
                                      title: Code
                                      description: A code that may be used to identify the sub-region. This should be
