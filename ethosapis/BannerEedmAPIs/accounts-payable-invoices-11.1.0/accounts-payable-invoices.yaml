                                      type: string
                                      x-lineageReferenceObject: FABINHEA_MANVEN_CNTY_CODE(FABINHEA)
                                    title:
                                      title: Title
                                      description: The name of a subregion
                                      type: string
                                      x-lineageReferenceObject: FABINHEA_MANVEN_CNTY_TITLE(FABINHEA)
                                  additionalProperties: false
                                locality:
                                  title: city
                                  description: The name of the city or town.
                                  type: string
                                  x-lineageReferenceObject: FABINHEA_MANVEN_LOCALITY(FABINHEA)
                                postalCode:
