        referenceNumber:
          title: Reference Number
          description: The purchase order number, encumbrance number, or other reference
            number associated with the invoice.
          type: string
          x-lineageReferenceObject: FABINVH_POHD_CODE(FABINVH)
        invoiceNumber:
          title: Invoice Number
          description: A system-generated number associated with the invoice.
          type: string
          x-lineageReferenceObject: FABINVH_CODE(FABINVH)
        vendorInvoiceNumber:
          title: Vendor Invoice Number
          description: The invoice number specified by the vendor.
          type: string
          x-lineageReferenceObject: FABINVH_VEND_INV_CODE(FABINVH)
        transactionDate:
          title: Transaction Date
          description: The transaction date for the invoice. This will be the date used
            when entering the transactions into the general ledger.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FABINVH_TRANS_DATE(FABINVH)
        vendorInvoiceDate:
          title: Vendor Invoice Date
          description: The invoice date as specified by the vendor.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: FABINVH_INVOICE_DATE(FABINVH)
            - type: string
              maxLength: 0
        voidDate:
          title: Void Date
          description: The date on which the invoice was voided, if applicable.
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
              x-lineageReferenceObject: FABINVH_CANCEL_DATE(FABINVH)
              x-lineageDerivedLogic: Display only if FABINVH_CANCEL_IND='Y' and FABINVH_INVD_RE_ESTABLISH_IND is not 'Y'.
            - type: string
              maxLength: 0
        processState:
          title: Process State
          description: The current state of the processing of the invoice.
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Display 'inProgress' if FABINVH_COMPLETE_IND='N' or null and FABINVH_SUSP_IND='N'; Display
            'suspended' if FABINVH_COMPLETE_IND='N' or null and FABINVH_SUSP_IND='Y'; Display 'notApproved' if FABINVH_COMPLETE_IND='Y' and 
            FABINVH_APPR_IND='N' or null; Display 'approved' if FABINVH_COMPLETE_IND='Y' and FABINVH_APPR_IND='Y' and FABINVH_CANCEL_IND='N' and 
            Doc type/Doc Number/Submission in FOBAPPD and Doc type/Doc Number/Submission not in FGBTRNH; Display 'submitted' if FABINVH_COMPLETE_IND='Y' and 
            FABINVH_APPR_IND='Y' and FABINVH_CANCEL_IND='N' and Doc type/Doc Number/Submission not in FOBAPPD and Doc type/Doc Number/Submission not in FGBTRNH; 
            Display 'outstanding' if FABINVH_OPEN_PAID_IND='O' and FABINVH_CANCEL_IND='N' and Doc type/Doc Number/Submission in FGBTRNH; Display 
            'paid' if FABINVH_OPEN_PAID_IND='P' and at least one related, non-void check is not reconciled FABCHKS_RECON_IND; Display 'reconciled' if 
            FABINVH_OPEN_PAID_IND='P' and all related, non-void checks are reconciled FABCHKS_RECON_IND. Display 'voided' if FABINVH_CANCEL_IND='Y' and FABINVH_INVD_RE_ESTABLISH_IND<>'Y'.
          enum:
            - inProgress
            - suspended
            - submitted
            - awaitingReceipt
            - notApproved
            - approved
            - outstanding
            - paid
            - reconciled
            - voided
          type: string
        paymentStatus:
          title: Payment Status
          description: An indicator specifying if payment for the invoice is on hold.
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Display 'hold'if FABINVH_HOLD_IND = Y or AND FTVVEND_PMT_HOLD_RSN_CODE is not null for FABINVH_VEND_PIDM; Display 'noHold' if FABINVH_HOLD_IND = N AND FTVVEND_PMT_HOLD_RSN_CODE = null for FABINVH_VEND_PIDM
          enum:
            - hold
            - noHold
          type: string
