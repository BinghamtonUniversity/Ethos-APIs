openapi: 3.0.0
info:
  title: Meal Plans
  description: The meal plans offered by the institution.
  version: "10.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/meal-plans:
    get:
      summary: Return all resources from STVMRCD
      description: Returns a paged listing of all the meal plan records from STVMRCD table.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_MEAL_PLANS
      tags:
        - meal-plans
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-meal-plans.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/meal-plans/{id}:
    get:
      summary: Return the requested resource from STVMRCD
      description: Return the single meal plan record with the passed in identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_MEAL_PLANS
      tags:
        - meal-plans
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Meal Plans for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v10+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v10+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v10+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-meal-plans.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-meal-plans.json:
      title: Meal Plans
      description: The meal plans offered by the institution.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the meal plan.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: STVMRCD_GUID(STVMRCD)
        title:
          title: Title
          description: The full name of the meal plan.
          type: string
          minLength: 1
          x-lineageReferenceObject: STVMRCD_DESC(STVMRCD)
        description:
          title: Description
          description: The description of the meal plan.
          type: string
          x-lineageReferenceObject: unsupported
        code:
          title: Code
          description: The code of the meal plan.
          type: string
          x-lineageReferenceObject: STVMRCD_CODE(STVMRCD)
        studentResidentialCategories:
          title: Student Residential Categories
          description: The residential categories of students to which the plan applies.
          type: array
          items:
            title: Student Residential Categories
            description: The residential categories of students to which the plan applies.
            type: object
            properties:
              id:
                title: ID
                description: The global identifier for the Student Residential Categories.
                type: string
                format: guid
                pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                x-lineageLookupReferenceObject: student-residential-categories 
                x-lineageReferenceObject: unsupported
            additionalProperties: false
            required:
              - id
        components:
          title: Components
          description: The meal plan components.
          type: array
          items:
            type: object
            properties:
              numberOfUnits:
                title: Number Of Units
                description: The number of units included into the component of the meal plan.
                minimum: 0
                type: number
                format: positiveNumber
                x-lineageReferenceObject: unsupported
              unitType:
                title: Unit Type
                description: The type of the meal plan units.
                enum:
                  - meal
                  - swipe
                  - mealPoint
                  - money
                type: string
                x-lineageReferenceObject: unsupported
              timePeriod:
                title: Time Period
                description: The period of time for which the number of units is specified.
                enum:
                  - day
                  - week
                  - month
                  - term
                  - year
                type: string
                x-lineageReferenceObject: unsupported
              restrictions:
                title: Restrictions
                description: The restrictions for the component of the meal plan.
                type: array
                items:
                  type: object
                  properties:
                    mealTypes:
                      title: Meal Types
                      description: The meal types to which the meal plan component is restricted.
                      type: array
                      items:
                        title: Meal Types
                        description: The meal types to which the meal plan component is restricted.
                        type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Meal Types.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: meal-types 
                            x-lineageReferenceObject: unsupported
                        additionalProperties: false
                        required:
                          - id
                    diningFacilities:
                      title: Dining Facilities
                      description: The dining facilities permitted in the meal plan.
                      type: array
                      items:
                        title: Dining Facilities
                        description: The dining facilities permitted in the meal plan.
                        type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Dining Facilities.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: rooms 
                            x-lineageReferenceObject: unsupported
                        additionalProperties: false
                        required:
                          - id
                    buildings:
                      title: Buildings
                      description: The buildings permitted in the meal plan.
                      type: array
                      items:
                        title: Buildings
                        description: The buildings permitted in the meal plan.
                        type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Buildings.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: buildings 
                            x-lineageReferenceObject: unsupported
                        additionalProperties: false
                        required:
                          - id
                    sites:
                      title: Sites
                      description: The sites permitted in the meal plan.
                      type: array
                      items:
                        title: Sites
                        description: The sites permitted in the meal plan.
                        type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Sites.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: sites 
                            x-lineageReferenceObject: unsupported
                        additionalProperties: false
                        required:
                          - id
                    daysOfWeek:
                      title: Days Of Week
                      description: The days of the week covered by the meal plan component.
                      type: array
                      items:
                        enum:
                          - sunday
                          - monday
                          - tuesday
                          - wednesday
                          - thursday
                          - friday
                          - saturday
                        type: string
                        x-lineageReferenceObject: unsupported
                    unitsPerPeriod:
                      title: Units Per Period
                      description: The maximum number of units within a time period allowed for the
                        meal plan component.
                      type: object
                      properties:
                        numberOfUnits:
                          title: Number of Units
                          description: The number of units allowed.
                          oneOf:
                            - type: number
                              minimum: 0
                              format: positiveInteger
                              x-lineageReferenceObject: unsupported
                            - type: string
                              nullable: true
                        period:
                          title: Period
                          description: The time period for the restriction.
                          oneOf:
                            - type: string
                              enum:
                                - day
                                - week
                                - month
                                - term
                                - year
                              x-lineageReferenceObject: unsupported
                            - type: string
                              maxLength: 0
                      additionalProperties: false
                  additionalProperties: false
            additionalProperties: false
            required:
              - numberOfUnits
              - unitType
              - timePeriod
        startOn:
          title: Start On
          description: The start date of the meal plan.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              x-lineageReferenceObject: unsupported
            - type: string
              maxLength: 0
        endOn:
          title: End On
          description: The end date of the meal plan.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
              x-lineageReferenceObject: unsupported
            - type: string
              maxLength: 0
      required:
        - id
        - title
      additionalProperties: false
