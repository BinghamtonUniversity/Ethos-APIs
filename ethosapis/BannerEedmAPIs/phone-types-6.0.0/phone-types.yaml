openapi: 3.0.0
info:
  title: Phone Types
  description: A type of phone.
  version: "6.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Foundation
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/phone-types:
    get:
      summary: Return all resources
      description: Returns a paged listing of the phone type records from STVTELE
        table. Only the phone type records corresponding to the STVTELE codes
        that are mapped to a valid phone type enum in API configuration setting
        PHONES.PHONETYPE are retrieved.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PHONE_TYPES
      tags:
        - phone-types
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-phone-types.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/phone-types/{id}:
    get:
      summary: Return the requested resource
      description: Returns the single phone type record with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PHONE_TYPES
      tags:
        - phone-types
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Phone Types for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v6+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v6+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v6+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-phone-types.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-phone-types.json:
      title: Phone Types
      description: A type of phone.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: A globally unique identifier of a type of phone.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: GORGUID_GUID(LDM_NAME= phone-types) 
          x-lineageDerivedLogic: A record in GORGUID with GORGUID_LDM_NAME as 'phone-types' will refer to each STVTELE_CODE in STVTELE
        code:
          title: Code
          description: The code that identifies a phone type.
          type: string
          x-lineageReferenceObject: STVTELE_CODE(STVTELE)
        title:
          title: Title
          description: The full name of a type of phone.
          type: string
          minLength: 1
          x-lineageReferenceObject: STVTELE_DESC(STVTELE)
        description:
          title: Description
          description: The full description of a type of phone.
          type: string
          x-lineageReferenceObject: unsupported
        phoneType:
          title: Type
          description: A mapping to a standard type for the phone type.
          enum:
            - mobile
            - home
            - school
            - vacation
            - business
            - fax
            - pager
            - tdd
            - parent
            - family
            - main
            - branch
            - region
            - support
            - billing
            - matchingGifts
            - other
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: Only the phone types records corresponding to the STVTELE codes that are mapped to a valid phone type enum in API configuration setting PHONES.PHONETYPE are published.
      required:
        - id
        - title
        - phoneType
      additionalProperties: false

