openapi: 3.0.0
info:
  title: Sections Maximum
  description: >-
    **API Deprecation Notice**



    Deprecated on: 30-Mar-2019



    Sunset on: 01-Apr-2021



    Description: v16.0.0 aligns with v16.0.0 sections.



    ----


    Alternative representation for sections. Includes, additional section information such as term, course, course section, and subject.
  version: "6.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Student
  x-deprecated-on: 2018-09-30
  x-sunset-on: 2021-04-01
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/sections:
    get:
      summary: Return all resources
      description: This version of the resource uses a legacy filter format and cannot
        be displayed as a parameter.  Please refer to the API source
        documentation for more information.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_SECTIONS
      tags:
        - sections
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.maximum.v6+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-sections-maximum.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.maximum.v6+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/sections/{id}:
    get:
      summary: Return the requested resource
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_SECTIONS
      tags:
        - sections
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Sections for use in all external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.maximum.v6+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.maximum.v6+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.maximum.v6+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-sections-maximum.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-sections-maximum.json:
      title: Sections Maximum
      description: An instance of a course.
      type: object
      properties:
        id:
          title: ID
          description: A globally unique identifier of a section maximum to be used in all
            external references.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        title:
          title: Title
          description: The full name of a section.
          type: string
          minLength: 1
        description:
          title: Description
          description: A description of a section.
          type: string
        startOn:
          title: Offering Start Date
          description: The starting date at which a section may be scheduled to be taken.
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
        endOn:
          title: Offering End Date
          description: The ending date at which a section may no longer be scheduled to be
            taken.
          oneOf:
            - type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
            - type: string
              maxLength: 0
        code:
          title: Section Code
          description: The human-readable identifier of a section. It is generally unique
            within an academic period.
          type: string
        number:
          title: Section Number
          description: A numbering scheme or other mark that distinguishes between
            multiple sections. It is generally unique within an academic period
            and course.
          type: string
        instructionalPlatform:
          title: Instructional Platform
          description: The technology platform used to manage the administration of a
            section
          oneOf:
            - type: object
              properties:
                code:
                  title: Code
                  description: The code that identifies a Technology Platform.
                  type: string
                title:
                  title: Title
                  description: The full name of a Technology Platform.
                  type: string
                  minLength: 1
                detail:
                  title: Instructional Platform
                  description: The instructional platform used in this section.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Instructional Platform.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: instructional-platforms
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - title
                - detail
            - type: object
              maxProperties: 0
        academicPeriod:
          title: Academic Period
          description: The academic time period associated with this section.
          oneOf:
            - type: object
              properties:
                code:
                  title: Code
                  description: The code that identifies an academic time period.
                  type: string
                title:
                  title: Title
                  description: The full name of an academic time period.
                  type: string
                  minLength: 1
                startOn:
                  title: Period Start Date
                  description: The date at which the academic time period begins
                  type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                endOn:
                  title: Period End Date
                  description: The date at which the academic time period ends
                  type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                detail:
                  title: Academic Period
                  description: The academic period used in this section.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Academic Period.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: academic-periods
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - title
                - startOn
                - endOn
                - detail
            - type: object
              maxProperties: 0
        administrativePeriod:
          title: Administrative Time Period
          description: The administrative time period associated with this section.
          oneOf:
            - type: object
              properties:
                code:
                  title: Code
                  description: The code that identifies an administrative time period.
                  type: string
                title:
                  title: Title
                  description: The full name of an administrative time period.
                  type: string
                  minLength: 1
                startOn:
                  title: Period Start Date
                  description: The date at which the administrative time period begins
                  type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                endOn:
                  title: Period End Date
                  description: The date at which the administrative time period ends
                  type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                detail:
                  title: Administrative Period
                  description: The administrative period used in this section.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Administrative Period.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: administrative-periods
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - title
                - startOn
                - endOn
                - detail
            - type: object
              maxProperties: 0
        course:
          title: Course
          description: The course associated with this section.
          type: object
          properties:
            title:
              title: Title
              description: The full name of a course.
              type: string
              minLength: 1
            subject:
              title: Subject
              description: A branch of knowledge typically used as a course of study, such as
                "Mathematics" or "Biology".
              type: object
              properties:
                abbreviation:
                  title: Abbreviation
                  description: The abbreviated name of a subject.
                  type: string
                title:
                  title: Title
                  description: The full name of a subject.
                  type: string
                  minLength: 1
                detail:
                  title: Subject
                  description: The subject associated with this course.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Subject.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: subjects
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - title
                - detail
            number:
              title: Course Number
              description: A numbering scheme to distinguish different Courses. Typically this
                is an integer, but can be any string.
              type: string
              minLength: 1
            detail:
              title: Course
              description: The course associated with this section.
              type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Course.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: courses
              additionalProperties: false
              required:
                - id
          additionalProperties: false
          required:
            - title
            - subject
            - number
            - detail
        credits:
          title: Credits
          description: ""
          type: array
          items:
            type: object
            properties:
              creditCategory:
                title: Credit Category
                description: ""
                type: object
                properties:
                  code:
                    title: Code
                    description: The code that identifies a credit category.
                    type: string
                  title:
                    title: Title
                    description: The full name of a credit category.
                    type: string
                    minLength: 1
                  creditType:
                    title: Credit Type
                    description: The higher-level category of academic credits.
                    enum:
                      - ce
                      - institution
                      - transfer
                      - exchange
                      - exam
                      - workLifeExperience
                      - other
                      - noCredit
                    type: string
                  detail:
                    title: Credit Category
                    description: The category of credit earned in this section.
                    type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Credit Category.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: credit-categories
                    additionalProperties: false
                    required:
                      - id
                additionalProperties: false
                required:
                  - title
                  - detail
              measure:
                title: Unit of Measure
                description: A unit or standard of measurement.
                enum:
                  - credit
                  - ceu
                  - hours
                type: string
              minimum:
                title: Minimum number
                description: The lower number, inclusive bound of a numeric range of values.
                type: number
              maximum:
                title: Maximum number
                description: The upper, inclusive bound of a numeric range of values.
                oneOf:
                  - type: number
                  - type: string
                    nullable: true
              increment:
                title: Increment number
                description: The multiple by which a numeric range of values can be stepped from
                  the minimum to the maximum. For example, a range of 1 to 3
                  with an increment of 1 would evaluate to 1, 2, or 3.
                  Specifying an increment of 0.5 would evaluate to 1, 1.5, 2,
                  2.5, or 3
                oneOf:
                  - type: number
                  - type: string
                    nullable: true
            additionalProperties: false
            required:
              - creditCategory
              - measure
              - minimum
        site:
          title: Site
          description: A physical location within the organization where this section
            events will be held.
          oneOf:
            - type: object
              properties:
                code:
                  title: Code
                  description: The code that identifies the site.
                  type: string
                title:
                  title: Title
                  description: The full name of the site.
                  type: string
                detail:
                  title: Site
                  description: The site where this section's events will be held.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Site.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: sites
                  additionalProperties: false
                  required:
                    - id
              additionalProperties: false
              required:
                - detail
            - type: object
              maxProperties: 0
        academicLevels:
          title: Academic Levels
          description: ""
          type: array
          items:
            type: object
            properties:
              code:
                title: Code
                description: The code that identifies the academic level.
                type: string
              title:
                title: Title
                description: The full name of the academic level.
                type: string
                minLength: 1
              detail:
                title: Academic Level
                description: The academic level associated with this section.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Academic Level.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: academic-levels
                additionalProperties: false
                required:
                  - id
            additionalProperties: false
            required:
              - code
              - title
              - detail
        awardGradeSchemes:
          title: Award Grade Schemes
          description: The grading schemes that may be awarded by an instructor to a
            student taking this section of the course. Must be a subset of the
            award grade schemes of the course.
          type: array
          items:
            type: object
            properties:
              code:
                title: Code
                description: The code for the grade scheme that may be used a reference or for
                  reporting.
                type: string
              title:
                title: Title
                description: The full name of a grade scheme.
                type: string
                minLength: 1
              academicLevel:
                title: Academic Level
                description: A designation of the level of instruction of a course or a program
                  of study.
                type: object
                properties:
                  code:
                    title: Code
                    description: The code that identifies the academic level (e.g. 'UG').
                    type: string
                  title:
                    title: Title
                    description: The full name of the academic level (e.g. 'Undergraduate').
                    type: string
                    minLength: 1
                  detail:
                    title: Detail
                    description: A designation of the level of instruction of a course or a program
                      of study.
                    type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Detail.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: academic-levels
                    additionalProperties: false
                    required:
                      - id
                additionalProperties: false
              startOn:
                title: Start Date
                description: The date after which a grade scheme may be used.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
              endOn:
                title: End Date
                description: The date after which a grade scheme may no longer be used.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
              detail:
                title: Detail
                description: The scheme to which the grade belongs, such as pass/fail, etc.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Detail.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: grade-schemes
                additionalProperties: false
                required:
                  - id
            additionalProperties: false
            required:
              - title
              - detail
        transcriptGradeSchemes:
          title: Transcript Grade Schemes
          description: The grading schemes that may be used to record a student's grade on
            a transcript of this section of the course. Must be a subset of the
            transcript grade schemes of the course.
          type: array
          items:
            type: object
            properties:
              code:
                title: Code
                description: The code for the grade scheme that may be used a reference or for
                  reporting.
                type: string
              title:
                title: Title
                description: The full name of a grade scheme.
                type: string
                minLength: 1
              academicLevel:
                title: Academic Level
                description: A designation of the level of instruction of a course or a program
                  of study.
                type: object
                properties:
                  code:
                    title: Code
                    description: The code that identifies the academic level (e.g. 'UG').
                    type: string
                  title:
                    title: Title
                    description: The full name of the academic level (e.g. 'Undergraduate').
                    type: string
                    minLength: 1
                  detail:
                    title: Detail
                    description: A designation of the level of instruction of a course or a program
                      of study.
                    type: object
                    properties:
                      id:
                        title: ID
                        description: The global identifier for the Detail.
                        type: string
                        format: guid
                        pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                        x-lineageLookupReferenceObject: academic-levels
                    additionalProperties: false
                    required:
                      - id
                additionalProperties: false
              startOn:
                title: Start Date
                description: The date after which a grade scheme may be used.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
              endOn:
                title: End Date
                description: The date after which a grade scheme may no longer be used.
                oneOf:
                  - type: string
                    format: date-time
                    pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                  - type: string
                    maxLength: 0
              detail:
                title: Detail
                description: The scheme to which the grade belongs, such as pass/fail, etc.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Detail.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: grade-schemes
                additionalProperties: false
                required:
                  - id
            additionalProperties: false
            required:
              - title
              - detail
        courseLevels:
          title: Course Levels
          description: ""
          type: array
          items:
            type: object
            properties:
              code:
                title: Code
                description: The code that identifies a course level.
                type: string
              title:
                title: Title
                description: The full name of a course level.
                type: string
                minLength: 1
              detail:
                title: Course Level
                description: The course level associated with this section.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Course Level.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: course-levels
                additionalProperties: false
                required:
                  - id
            additionalProperties: false
            required:
              - title
              - detail
        status:
          title: Status
          description: The status of a section, for example, "Open" or "Closed".
          oneOf:
            - type: string
              enum:
                - closed
                - open
                - pending
                - cancelled
            - type: string
              maxLength: 0
        duration:
          title: Duration
          description: The scheme for calculating the duration of a section
          oneOf:
            - type: object
              properties:
                length:
                  title: Length
                  description: The duration length, expressed in duration units
                  type: number
                unit:
                  title: Unit
                  description: The calendar period of time equivalent to 1 unit of duration
                  enum:
                    - days
                    - weeks
                    - months
                    - years
                  type: string
              additionalProperties: false
              required:
                - length
                - unit
            - type: object
              maxProperties: 0
        maxEnrollment:
          title: Maximum Enrollment
          description: The maximum number of persons who are allowed to enroll for a
            section.
          oneOf:
            - type: number
            - type: string
              nullable: true
