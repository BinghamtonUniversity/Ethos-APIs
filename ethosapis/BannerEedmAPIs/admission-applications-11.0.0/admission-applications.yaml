openapi: 3.0.0
info:
  title: Admission Applications
  description: >-
    **API Deprecation Notice**



    Deprecated on: 31-Dec-2019



    Sunset on: 31-Dec-2021



    Description: V16.0.0 moves program, level and school properties to student-academic-programs, moves POST/PUT functionality to admission-applications-submissions, updates withdrawnOn from date-time to date format, and replaces source property with applicationSource to provide more robust support for admission applications.



    ----


    Higher education institution admission applications.
  version: "11.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Recruitment
  x-deprecated-on: 2019-12-31
  x-sunset-on: 2021-12-31
