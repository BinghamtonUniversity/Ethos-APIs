openapi: 3.0.0
info:
  title: Accounting String Formats
  description: The details of accounting string formats. The API publishes the
    accounting string structure to combine the independent (FOAPAL) components
    i.e. accounting string delimiter and order of components like a string
    template.
  version: "8.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Finance
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/accounting-string-formats:
    get:
      summary: Returns all resources from FTVSDAT
      description: Returns the effective dated and active accouting string format
        defined in FTVSDAT table in the system.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ACCOUNTING_STRG_FORMATS
      tags:
        - accounting-string-formats
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v8+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set. The
            default limit is 500 and the maximum limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-accounting-string-formats.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v8+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/accounting-string-formats/{id}:
    get:
      summary: Returns the requested resource from FTVSDAT
      description: Returns the effective dated and active accouting string format
        defined in FTVSDAT table with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_ACCOUNTING_STRG_FORMATS
      tags:
        - accounting-string-formats
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Accounting String Formats for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v8+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v8+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v8+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-accounting-string-formats.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-accounting-string-formats.json:
      title: Accounting String Formats
      description: The details of accounting string formats.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the accounting string format.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FTVSDAT_GUID(FTVSDAT)
          x-lineageDerivedLogic: Only one record with GUID corresponding to FTVSDAT_SDAT_CODE_ENTITY ='ETHOS' and FTVSDAT_SDAT_CODE_ATTR ='DELIMITER'
        delimiter:
          title: Delimiter
          description: The delimiter that separates the accounting components within an
            accounting string.
          type: string
          minLength: 1
          x-lineageReferenceObject: FTVSDAT_DATA(FTVSDAT)
          x-lineageDerivedLogic: Display the FTVSDAT_DATA defined for the FTVSDAT_SDAT_CODE_ENTITY ='ETHOS' and FTVSDAT_SDAT_CODE_ATTR ='DELIMITER'.
        components:
          title: Components
          description: The accounting string components that make a valid accounting
            string along with their position within that string
          type: array
          minItems: 1
          items:
            type: object
            properties:
              component:
                title: Component
                description: An accounting string component that is part of a valid accounting
                  string.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Component.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: accounting-string-components 
                    x-lineageReferenceObject: FTVSDAT_GUID(FTVSDAT)
                    x-lineageDerivedLogic: For FTVSDAT_SDAT_CODE_ENTITY ='ETHOS', the GUIDs for 11 accounting string components are displayed. The 11 components/attributes are ACCOUNT, ACTIVITY, BANK_CODE, CHART, FUND, INDEX, LOCATION,ORGANIZATION, PROJECT, PROGRAM, and RULE_CLASS.
                additionalProperties: false
                required:
                  - id
              order:
                title: Order
                description: The position of the accounting component within a valid accounting
                  string.
                type: integer
                x-lineageReferenceObject: FTVSDAT_DATA(FTVSDAT)
                x-lineageDerivedLogic: For FTVSDAT_SDAT_CODE_ENTITY ='ETHOS', the FTVSDAT_DATA for 11 accounting string components is displayed.
            additionalProperties: false
            required:
              - component
              - order
      required:
        - id
        - delimiter
        - components
      additionalProperties: false
