openapi: 3.0.0
info:
  title: DfE Admission Decisions
  description: >
    DfE Admission Decisions API processes the Banner Decision / Interview / Note
    on DfE Candidate application.        
  version: 1.3.0        
  x-source-system: banner        
  x-api-type: ethos        
  x-source-domain: Recruitment        
  x-audience: all        
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/dfe-admission-decisions/{id}:
    get:
      summary: Return the requested resource from SARCDCN and SARACMT
      description: >
        Returns a single DfE admission decision / interview / note record for
        the requested identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_DFE_ADMISSION_DECISIONS
      tags:
        - dfe-admission-decisions
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v1.0.0+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v1.0.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v1.0.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-dfe-admission-decisions.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-dfe-admission-decisions.json:
      title: DfE Admission Decisions
      description: Decisions made on teachers training applications in UK under UK
        Government Department, DfE (Department for Education).
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the decision for the admission application.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        application:
          title: Application
          description: The admission application on which this decision was made.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Application.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: admission-applications
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        dfeApplicationId:
          title: DfE Application ID
          description: The unique DfE ID of the application on which this decision was made.
          type: string
          minLength: 1
        admissionDecision:
          title: Admission Decision
          description: Decisions made on admission applications.
          oneOf:
            - type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Admission Decision.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: admission-decisions
              additionalProperties: false
              required:
                - id
            - type: object
              maxProperties: 0
        decision:
          title: Decision
          description: The decision made on DfE admission application.
          oneOf:
            - title: Offer
              description: Make an offer to the candidate.
              type: object
              properties:
                offer:
                  title: Offer
                  description: Make an offer to the candidate.
                  type: string
              additionalProperties: false
              required:
                - offer
            - title: Reject Reason
              description: Reject the candidate’s application with a reason.
              type: object
              properties:
                rejectReason:
                  title: Reject Reason
                  description: Reject the candidate’s application with a reason.
                  type: string
                  minLength: 1
              additionalProperties: false
              required:
                - rejectReason
        interview:
          title: Interview
          description: Interviews made on teachers training applications in UK under UK
            Government Department, DfE (Department for Education).
          type: object
          properties:
            id:
              title: Id
              description: The global identifier of the interview for the admission
                application.
              type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Id.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: admission-interviews
              additionalProperties: false
              required:
                - id
            interviewId:
              title: Interview Id
              description: The unique ID of interview.
              type: string
            providerCode:
              title: Provider Code
              description: The Provider Code of the Interview on the admission application.
              type: string
            interviewDate:
              title: Interview Date
              description: The Date and time of the interview.
              type: string
              format: date-time
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
            location:
              title: Location
              description: A string describing where or how the interview will take place.
              type: string
            additionalDetails:
              title: Additional Details
              description: Optional string for additional notes.
              type: string
            cancellationReason:
              title: Cancellation Reason
              description: The reason for the cancellation of Interview.
              type: string
          additionalProperties: false
          required:
            - id
        note:
          title: Note
          description: Notes made on teachers training applications in UK under UK
            Government Department, DfE (Department for Education).
          type: object
          properties:
            id:
              title: Id
              description: The global identifier of the note for the admission application.
              type: object
              properties:
                id:
                  title: ID
                  description: The global identifier for the Id.
                  type: string
                  format: guid
                  pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                  x-lineageLookupReferenceObject: admission-notes
              additionalProperties: false
              required:
                - id
            noteId:
              title: Note Id
              description: The unique ID of note.
              type: string
            noteMessage:
              title: Note Message
              description: The content of note.
              type: string
          additionalProperties: false
          required:
            - id
        courseInformation:
          title: Course Information
          description: Identifies the subject offered by the institution and all related
            information.
          oneOf:
            - type: object
              properties:
                year:
                  title: Year
                  description: The course’s recruitment cycle year.
                  type: integer
                providerCode:
                  title: Provider Code
                  description: The provider’s code.
                  type: string
                dfeCourseCode:
                  title: DfE Course Code
                  description: The course’s code.
                  type: string
                  minLength: 1
                dfeSiteCode:
                  title: DfE Site Code
                  description: The site’s code.
                  type: string
                  minLength: 1
                studyMode:
                  title: Study Mode
                  description: Can be 'full_time' or 'part_time'.
                  type: string
                startDate:
                  title: Start Date
                  description: Indicates when this course starts.
                  type: string
              additionalProperties: false
              required:
                - year
                - dfeCourseCode
                - dfeSiteCode
            - type: object
              maxProperties: 0
        conditions:
          title: Conditions
          description: The conditions of the offer.
          type: array
          items:
            type: string
        conditionsMet:
          title: Conditions Met
          description: Flag to identify if conditions are Met or nor Met.
          type: boolean
        decidedOn:
          title: Decided On
          description: The date of the decision on the admission application.
          type: string
          format: date-time
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
        representative:
          title: Representative
          description: The individual representing the institution who made this decision.
          type: object
          properties:
            fullName:
              title: Full Name
              description: The full name of the user who made this update.
              type: string
              minLength: 1
            userId:
              title: User ID
              description: The ID of the user in the Student Record System.
              type: string
              minLength: 1
            email:
              title: Email
              description: The email address of the user who made this update.
              type: string
              minLength: 1
          additionalProperties: false
          required:
            - fullName
            - userId
            - email
      required:
        - id
        - dfeApplicationId
        - representative
      additionalProperties: false
