                        - type: object
                          maxProperties: 0
                  additionalProperties: false
                  required:
                    - accountingString
                    - type
                    - amount
            additionalProperties: false
            required:
              - type
              - transactionDetailLines
      required:
        - transactions
      additionalProperties: false
