                          type: string
                      additionalProperties: false
                      required:
                        - value
                        - currency
                    submittedBy:
                      title: Submitted By
                      description: The person who made the submit request.
                      oneOf:
                        - type: object
                          properties:
                            id:
                              title: ID
                              description: The global identifier for the Submitted By.
                              type: string
                              format: guid
                              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                              x-lineageLookupReferenceObject: persons
                          additionalProperties: false
                          required:
                            - id
                        - type: object
                          maxProperties: 0
                    referenceDocument:
                      title: Reference Document
                      description: The reference document that may be liquidated or adjusted with the
                        account funds available transaction request.
                      oneOf:
                        - type: object
                          properties:
                            encumbranceNumber:
                              title: Encumbrance Number
                              description: The encumbrance number of the reference document.
                              type: string
                              minLength: 1
                            itemNumber:
                              title: Item Number
                              description: The item number of the reference document.
                              type: string
                            sequenceNumber:
                              title: Sequence Number
                              description: The sequence number of the reference document.
                              type: string
                          additionalProperties: false
                          required:
