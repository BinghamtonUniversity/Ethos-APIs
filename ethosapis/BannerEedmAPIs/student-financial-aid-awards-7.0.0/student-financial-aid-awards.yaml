openapi: 3.0.0
info:
  title: Student Financial Aid Awards
  description: Financial aid awards made to students.
  version: "7.0"
  x-audience: all
  x-source-system: banner
  x-api-type: ethos
  x-release-status: ga
  x-source-domain: Financial Aid
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/student-financial-aid-awards:
    get:
      summary: Return all resources
      description: Returns a paged listing of all the resources in the system.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STU_FIN_AID_AWARDS
      tags:
        - student-financial-aid-awards
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-student-financial-aid-awards.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/student-financial-aid-awards/{id}:
    get:
      summary: Return the requested resource
      description: Return the one resource with the passed in identifier
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_STU_FIN_AID_AWARDS
      tags:
        - student-financial-aid-awards
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of Student Financial Aid Awards for use in all
            external references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v7+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v7.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v7.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-student-financial-aid-awards.json"
        "401":
          description: Unauthorized
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-student-financial-aid-awards.json:
      title: Student Financial Aid Awards
      description: Financial aid awards made to students.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the student-financial-aid-awards.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
        student:
          title: Student
          description: Student who will be receiving the financial aid award
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Student.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: persons
          additionalProperties: false
          required:
            - id
        awardFund:
          title: Award Fund
          description: The fund that is awarded to the student.
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Award Fund.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: financial-aid-funds
          additionalProperties: false
          required:
            - id
        aidYear:
          title: Aid Year
          description: The year that the award is assigned
          type: object
          properties:
            id:
              title: ID
              description: The global identifier for the Aid Year.
              type: string
              format: guid
              pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
              x-lineageLookupReferenceObject: financial-aid-years
          additionalProperties: false
          required:
            - id
        originallyOfferedOn:
          title: Originally Offered On
          description: Date of the first offer
          oneOf:
            - type: string
              format: date
              pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
            - type: string
              maxLength: 0
        awardsByPeriod:
          title: Awards By Period
          description: Financial award details by period.
          type: array
          items:
            type: object
            properties:
              awardPeriod:
                title: Award Period
                description: The period in which the award was bestowed.
                type: object
                properties:
                  id:
                    title: ID
                    description: The global identifier for the Award Period.
                    type: string
                    format: guid
                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                    x-lineageLookupReferenceObject: financial-aid-award-periods
                additionalProperties: false
                required:
                  - id
              academicPeriods:
                title: Academic Periods
                description: Academic periods for which the financial award was made.
                type: array
                items:
                  title: Academic Periods
                  description: Academic periods for which the financial award was made.
                  type: object
                  properties:
                    id:
                      title: ID
                      description: The global identifier for the Academic Periods.
                      type: string
                      format: guid
                      pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                      x-lineageLookupReferenceObject: academic-periods
                  additionalProperties: false
                  required:
                    - id
              status:
                title: Status
                description: Status of the financial aid award.
                type: object
                properties:
                  state:
                    title: State
                    description: The state of the award.
                    enum:
                      - offered
                      - accepted
                      - declined
                      - cancelled
                    type: string
                  stateOn:
                    title: State On
                    description: Effective date of the state
                    oneOf:
                      - type: string
                        format: date
                        pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
                      - type: string
                        maxLength: 0
                additionalProperties: false
                required:
                  - state
              amounts:
                title: Amounts
                description: Various amounts involved in a financial aid award.
                type: object
                properties:
                  originalOffered:
                    title: Original Offered
                    description: Amount that was originally offered for the award period.
