openapi: 3.0.0
info:
  title: Payment Transactions
  description: >
    The details of transactions representing disbursements from the institution.
    All paid disbursements details for all invoices with information like
    payment method used for the transaction, date the payment occurred, the
    amount paid for each, status of the payment transaction, the reference
    documents of a payment transaction to originating purchase order and blanket
    purchase order etc.


    ISO code configurations for countries, regions and subregions should be configured appropriately to retrieve the addresses information for a vendor. Please refer to "ISO Code mapping enhancement" section in Banner Ethos API handbook.
  version: 12.1.0
  x-source-system: banner
  x-api-type: ethos
  x-source-domain: Finance
  x-audience: all
  x-release-status: ga
servers:
  - url: https://integrate.elluciancloud.com
    description: Ethos Integration API U.S.
  - url: https://integrate.elluciancloud.ca
    description: Ethos Integration API Canada
  - url: https://integrate.elluciancloud.ie
    description: Ethos Integration API Europe
  - url: https://integrate.elluciancloud.com.au
    description: Ethos Integration API Asia-Pacific
  - url: "{server_url}"
    description: Custom server url
    variables:
      server_url:
        default: localhost
paths:
  /api/payment-transactions:
    get:
      summary: Returns resources from FABCHKS
      description: |
        Returns all records of payment transactions details from FABCHKS.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PAYMENT_TRANSACTIONS
      tags:
        - payment-transactions
      parameters:
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Prefer to use only the whole
            MAJOR version.  See the semantic versioning topic in the API
            Standards from more information.

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: The maximum number of resources requesting for this result set.
            Default page limit is 500 and upper limit is 1000.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The 0 based index for a collection of resources for the page
            requested.
          schema:
            type: integer
        - name: criteria
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Document Number  

            The document number associated with the payment transaction (i.e. check number, payment transaction number).

            ```

            /payment-transactions?criteria={"documentNumber":"T1234567"}

            ```

            ### Payments For Invoice Reference Document  

            Returns all payment transactions for the purchase order ID passed

            ```

            /payment-transactions?criteria={"paymentsFor":[{"document":{"referenceDocument":{"purchaseOrder":{"id":"5a1a56c6-0d50-4867-b196-2403c28137c1"}}}}]}

            ```

            Returns all payment transactions for the blanket purchase order ID passed.

            ```

            /payment-transactions?criteria={"paymentsFor":[{"document":{"referenceDocument":{"blanketPurchaseOrder":{"id":"5a1a56c6-0d50-4867-b196-2403c28137c1"}}}}]}

            ```

            Filter on payments for reference document recurringVoucher and purchasingArrangement are not supported
        - name: document
          in: query
          required: false
          schema:
            type: object
          description: >
            ### Document  

            Filter to return payment transactions by document type and ID.

            ```

            /payment-transactions?document={"document":{"type":"invoice","id":"637995e8-a008-4e4c-93bc-72ab1ddd479e"}}

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/schema-payment-transactions.json"
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12.1.0+json
              schema:
                type: string
            X-Total-Count:
              description: Specifies the total number of resources that satisfy the query.
              schema:
                type: integer
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
  /api/payment-transactions/{id}:
    get:
      summary: Return the requested resource from FABCHKS
      description: >
        Returns the detail of a payment transaction from FABCHKS for the passed
        in identifier.
      security:
        - EthosIntegrationBearer: []
      x-method-permissions: API_PAYMENT_TRANSACTIONS
      tags:
        - payment-transactions
      parameters:
        - name: id
          in: path
          required: true
          description: A global identifier of the resource for use in all external
            references
          schema:
            type: string
            format: GUID
            minimum: 1
        - name: accept
          in: header
          required: true
          description: >
            The version of the resource requested. Please refer to the API
            source documentation for detailed support information. Prefer to use
            only the whole MAJOR version. 

            ```

            application/vnd.hedtech.integration.v12+json

            ```
          schema:
            type: string
      responses:
        "200":
          description: Success
          headers:
            X-Media-Type:
              description: application/vnd.hedtech.integration.v12.1.0+json
              schema:
                type: string
          content:
            application/vnd.hedtech.integration.v12.1.0+json:
              schema:
                type: object
                $ref: "#/components/schemas/schema-payment-transactions.json"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Permission Denied
        "404":
          description: Resource not found
        "500":
          description: Server error, unexpected configuration or data
components:
  securitySchemes:
    EthosIntegrationBearer:
      type: http
      scheme: bearer
  schemas:
    schema-payment-transactions.json:
      title: Payment Transactions
      description: The details of transactions representing disbursements from the
        institution.
      type: object
      properties:
        metadata:
          title: Metadata
          description: Metadata about the JSON payload
          type: object
          properties:
            createdBy:
              title: Created By
              description: The name of the originator (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            createdOn:
              title: Created On
              description: The date and time when the entity instance was created
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
            modifiedBy:
              title: Modified By
              description: The name of the modifier (user or system) of the data. This is
                informational only, do not use in business logic!
              type: string
            modifiedOn:
              title: Modified On
              description: The date and time when the entity instance was last modified
              oneOf:
                - type: string
                  format: date-time
                  pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])T(2[0-3]|[0-1][0-9]):([0-5][0-9]):([0-5][0-9])(\.[0-9]+)?(Z|[+-](?:2[0-3]|[0-1][0-9]):[0-5][0-9])?$
                - type: string
                  maxLength: 0
          additionalProperties: false
        id:
          title: ID
          description: The global identifier of the payment transaction.
          type: string
          format: guid
          pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
          x-lineageReferenceObject: FABCHKS_GUID(FABCHKS)
        documentNumber:
          title: Document Number
          description: The document number associated with the payment transaction (i.e.
            check number, payment transaction number).
          type: string
          minLength: 1
          x-lineageReferenceObject: FABCHKS_CHECK_NUM(FABCHKS)
        referenceNumber:
          title: Reference Number
          description: The reference number associated with the payment transaction.
          type: string
          x-lineageReferenceObject: unsupported
        paymentMethod:
          title: Payment Method
          description: The payment method used for the transaction.
          enum:
            - check
            - directDeposit
            - wire
            - eCheck
            - creditCard
            - debitCard
          type: string
          x-lineageReferenceObject: derived  
          x-lineageDerivedLogic: If FABCHKS_ACH_IND = Y, display 'directDeposit' and if FABCHKS_ACH_IND = N or is null, display 'check'.
        paymentDate:
          title: Payment Date
          description: The date the payment occurred.
          type: string
          format: date
          pattern: ^(-?(?:[1-9][0-9]*)?[0-9]{4})-(1[0-2]|0[1-9])-(3[0-1]|0[1-9]|[1-2][0-9])$
          x-lineageReferenceObject: FABCHKS_CHECK_DATE(FABCHKS)
        paymentsFor:
          title: Payments For
          description: The invoices or refunds for which the payment occurred.
          type: array
          items:
            type: object
            properties:
              document:
                title: Document
                description: The invoice or refunds for which the payment occurred.
                oneOf:
                  - title: Invoice
                    description: The invoice for which the payment occurred.
                    type: object
                    properties:
                      invoice:
                        title: Invoice
                        description: The invoice for which the payment occurred.
                        type: object
                        properties:
                          id:
                            title: ID
                            description: The global identifier for the Invoice.
                            type: string
                            format: guid
                            pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                            x-lineageLookupReferenceObject: accounts-payable-invoices 
                            x-lineageReferenceObject: FABCHKS_CHECK_NUM(FABCHKS)
                        additionalProperties: false
                        required:
                          - id
                      referenceDocument:
                        title: Reference Document
                        description: The originating purchase order or encumbrance document associated
                          with the invoice.
                        oneOf:
                          - title: Purchase Order
                            description: The originating purchase order associated with the invoice.
                            type: object
                            properties:
                              purchaseOrder:
                                title: Purchase Order
                                description: The originating purchase order associated with the invoice.
                                type: object
                                properties:
                                  id:
                                    title: ID
                                    description: The global identifier for the Purchase Order.
                                    type: string
                                    format: guid
                                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                                    x-lineageLookupReferenceObject: purchase-orders 
                                    x-lineageReferenceObject: FABCHKS_CHECK_NUM(FABCHKS)
                                    x-lineageDerivedLogic: A record in FPBPOHD where FPBPOHD_CODE = FABINVH_POHD_CODE and FPBPOHD_PO_TYPE_IND = 'R' for the invoice record in FABINVH table where FABINVH_CODE= FABINCK_INVH_CODE and FABINCK_CHECK_NUM = FABCHKS_CHECK_NUM.
                                additionalProperties: false
                                required:
                                  - id
                            additionalProperties: false
                            required:
                              - purchaseOrder
                          - title: Blanket Purchase Order
                            description: The originating blanket purchase order associated with the invoice.
                            type: object
                            properties:
                              blanketPurchaseOrder:
                                title: Blanket Purchase Order
                                description: The originating blanket purchase order associated with the invoice.
                                type: object
                                properties:
                                  id:
                                    title: ID
                                    description: The global identifier for the Blanket Purchase Order.
                                    type: string
                                    format: guid
                                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                                    x-lineageLookupReferenceObject: blanket-purchase-orders 
                                    x-lineageReferenceObject: FABCHKS_CHECK_NUM(FABCHKS)
                                    x-lineageDerivedLogic: A record in FPBPOHD where FPBPOHD_CODE = FABINVH_POHD_CODE and FPBPOHD_PO_TYPE_IND = 'S' for the invoice record in FABINVH table where FABINVH_CODE= FABINCK_INVH_CODE and FABINCK_CHECK_NUM = FABCHKS_CHECK_NUM.
                                additionalProperties: false
                                required:
                                  - id
                            additionalProperties: false
                            required:
                              - blanketPurchaseOrder
                          - title: Recurring Voucher
                            description: The originating recurring voucher associated with the invoice.
                            type: object
                            properties:
                              recurringVoucher:
                                title: Recurring Voucher
                                description: The originating recurring voucher associated with the invoice.
                                type: string
                                minLength: 1
                                x-lineageReferenceObject: unsupported
                            additionalProperties: false
                            required:
                              - recurringVoucher
                          - title: Purchasing Arrangement
                            description: The originating purchasing arrangement associated with the invoice.
                            type: object
                            properties:
                              purchasingArrangement:
                                title: Purchasing Arrangement
                                description: The originating purchasing arrangement associated with the invoice.
                                type: object
                                properties:
                                  id:
                                    title: ID
                                    description: The global identifier for the Purchasing Arrangement.
                                    type: string
                                    format: guid
                                    pattern: ^[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}$
                                    x-lineageLookupReferenceObject: purchasing-arrangements 
                                    x-lineageReferenceObject: unsupported
                                additionalProperties: false
                                required:
                                  - id
                            additionalProperties: false
                            required:
                              - purchasingArrangement
                          - type: object
                            maxProperties: 0
                      lineItems:
                        title: Line Items
                        description: The line items for which the payment occurred.
                        type: array
                        items:
                          type: object
                          properties:
                            number:
                              title: Number
                              description: The line item number.
                              type: string
                              x-lineageReferenceObject: FABCHKA_ITEM(FABCHKA)
                            amount:
                              title: Amount
                              description: The amount associated with the line item.
                              oneOf:
